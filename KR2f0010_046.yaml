body:
  text: 唐大詔令集卷五十六宋宋敏求編大臣宰相罷免下李鄘户部尚書制王涯兵部尚書制崔羣湖南觀察使制令狐楚宣歙池觀察使制蕭俯右僕射制崔植刑部尚書制元稹同州刺史制裴度右僕射制宋申錫太子右庶子制陳夷行左僕射制杜悰右僕射崔鉉户部尚書制鄭朗太子少師制鄭畋太子少傅分司東都制裴𦙍鄂嶽觀察使制崔𦙍吏部尚書制裴樞崔逺左右僕射制罷免下李鄘户部尚書制夫為君者求舊以申其用施恕以遂其情為臣者陳力以效其能奉身以明其志故在上則終始之道備居下則進退之義全兹惟休哉用厚恩禮銀青光祿大夫守門下侍郎同中書門下平章事上柱國江夏縣開國侯食邑一千户李鄘居潔履方端明審固有沉毅莊重之質有堅剛迅敏之心徑節夙表於屯夷利器久彰於中外朕所以跡其衆善詢及庶工登之台階授以政柄將欲藉其碩德𢎞厥壯猷而固辭之誠再疏頗切然猶未允其請所冀式副豫懷逮此旬時勞於夙夜益願頤養堅稱衰遲宜罷樞軸之殷俾居喉舌之重就間髙秩式示優崇可守户部尚書元和十三年三月王涯兵部尚書制股肱之任與國同體茍或取容於位啓沃無聞將何以寅亮天工𢎞宣德化朕嗣膺丕業爰任鈞衡知善必升見否而退兹所以推至公於天下也銀青光祿大夫守中書侍郎同中書門下平章事上柱國清源縣開國男王涯素以藝文早登華貫參我宥密再處內庭位踐公台拔於非次誠宜匪躬峻節納誨盡忠而乃因循自持謙默無補期於進道屢復星霜空勞虛懷未副明奬雖夙夜之勤久著而具瞻之望何從君臣之大義存終始宜解職於樞務俾副曹於夏官尚謂優崇勉敬斯任可行尚書兵部侍郎元和十三年八月崔羣湖南觀察使制致君之道爰在輔臣發輝政經端理教化其或彝倫未叙公議不明免其所職我常典也正議大夫守中書侍郎同中書門下平章事上柱國賜紫金魚袋崔羣根於溫敬發以詞采踐歷臺閣潤色絲綸嘗以敏才列於宥密考能觀行益表謙勤擢處鈞衡用參大政緝熙之績每竭其謀猷翊贊之心亦彰於夙夜旰食思理注於話言善而可行無不虛受而顧問之際謂近於至公詳聽之間或違於事實將何以同底于道化洽萬方宜罷印於中樞俾報政於外服優以顯秩爾其勉之可持節都督潭州諸軍事潭州刺史兼御史大夫湖南都團練觀察處置等使勳賜如故元和十四年十一月令狐楚宣歙池觀察使制朕聞為政以德必推誠而任人為君以道必存體以立國况乎位崇元輔職總庶寮衆方具瞻時以輕重得不明進退之禮全始終之恩大中大夫守門下侍郎同中書門下平章事上輕車都尉賜紫金魚袋令狐楚夙擅懿文纍階清貫先朝特加寵命奬擢內庭出擁旌旄入居鼎鉉朕祗膺寶位注意舊臣方屬奉陵之時委以復土之務是宜竭心盡慮使下不欺而頗聞工徒之訴纍彰官吏之罪遽有章表固求退閒宜歸相印之權往授使符之命仍兼榮於司憲俾奉法以惠人勉率乃心表豫洪覆可使持節宣州諸軍事宣州刺史兼御史大夫宣歙池等州都團練觀察處置使勳賜如故元和十五年七月蕭俯右僕射制師長庶工總詳六職重任久曠益難其人自非體參股肱位列鈞鼎能引義以知退爰致禮而加恩則授受之間何以允兹任也朝議大夫守門下侍郎同中書門下平章事徐國公賜紫金魚袋蕭俯門承華衮位列清貫用能周物志在匡時勤內署之論思肅南臺之綱紀朕自承大序擢處台階推一心獻納之誠贊四方經營之績及此踰嵗纍誠懇辭微恙所侵堅請難奪朕憂勤庶政親委大臣務厚始終以全進退既謝弼諧之任宜加端揆之崇爾其戒之服我優秩可守尚書右僕射勳賜如故長慶元年正月崔植刑部尚書制門下宰相者朕之腹心和合天下在乎鎮靜藩服附親逺方將𢎞遂物之宜必有更張之道正議大夫守中書侍郎同中書門下平章事武騎尉賜紫金魚袋崔植往在先朝頗推廣直馴行惟謹保萬石之風清德不渝繼四公之業遂升左掖實著能名駁正之美稱於朝列朕以孝公太傅代載忠貞擢於相門授以台席顧惟寡昧奉以丕圗每念為君之難敢忘從諫之義推誠聽納虛已咨詢庶洽羣心以迎和氣叔敖是期於秉羽汲黯謂致於寢謀宵分以興日旰忘食昔藩國多事平津讓侯隂陽未和石慶辭位爾惟謙遜豈常求安稱疾拜章勤亦至矣雖愒日之年未及而寢氷之意尚堅遂輟樞機用成美志崇以天秩長於秋官君臣之間朕無所愧可守刑部尚書散官勳賜如故長慶三年二月元稹同州刺史制宰相者位列巖廊權參造化內操政柄上代天工朕嗣守丕圗思與至治每於擢用冀獲雋良為善有聞必資奬寵罹於愆謗用罷台階通議大夫守尚書工部侍郎同中書門下平章事上柱國賜紫金魚袋元稹游藝資身明經筮仕纍膺科選益振榮華茂識宏才登名朝董之列佳辭麗句馳聲謝鮑之間頃在憲臺嘗推舉職比及遷黜亦以直聞是以擢在周行典斯誥命洎參處密近旋委台衡宜竭謀猷盡以匡贊而乃不思𢎞益之道遂纓詿誤之愆察以衷情雖非為已行兹左道豈曰效忠體涉異端理宜偕罷朕以君臣之分貴獲始終任使之時亦獻誠懇每思加膝寧忍墜泉猶𢎞在宥之心俾列專城之寄左郡之大三輔推雄控壓關河連屬宫苑勉於政績副我優恩可使持節同州諸軍事守同州刺史充本州防禦使長春宫等使散官勳賜如故長慶二年六月裴度右僕射制朕端已推誠資於輔相求人與衆諒在訏謨所以詢公卿之言從士庶之望輟任淮海俾居台階舉先朝勳舊之臣當四海具瞻之位推心委柄期在賢能成效靡孚余將何望守司空兼門下侍郎同中書門下平章事上柱國晉國公食邑三千户裴度器本端誠道惟謇諤挺筠松之操藴圭玉之姿望著巖廊功書竹帛䇿勳報爵寵極人臣朕恭守睿圗推心弼輔聿求俊彥思致雍熙擢升論道之司再授樞衡之任虛心日矢佇乃嘉猷而鼎飪未調弛張異制誠宜有犯無隱忠讜必陳使余誠懷不惑聞聽何容違於造次致有間於笙簧棘木既窮匪辭焉驗昔漢以隂陽不和冊免丞相今爾訏謨或爽宜罷台司疇勳績以尚功録忠勞而念舊俾居右揆非謂左遷用崇師長之榮勿以優間自薄可守本官尚書右僕射散官勳封如故長慶三年六月宋申錫太子右庶子制君臣之道義切始終股肱之良任存正直茍涉邪枉自紊憲章既虧恪慎之心難委弼諧之任正議大夫行尚書右丞同中書門下平章事上柱國賜紫金魚袋宋申錫學習儒門職參翰苑備我顧問洽兹寵光謂其啓沃竭忠擢登台鉉而乃踐修不慎日底愆尤知臣之規俾豫增愧欲遏姦回之路宜先勸懲之源豈可猶秉樞機仍司考轄罷居台席列位龍樓誠謂寬恩周全至體朕以事狀之間慮其寃濫鞫驗之際洎務詳明當竚得情以復申明可行太子右庶子散官勳封如故太和五年三月陳夷行左僕射制王者推至公以御天下成庶務以佚羣才况乎寅亮所資安危攸屬顧是進退實惟矜慎其有績懋致君誠深知止則豈可不優其恩禮遂以便安上德尊賢於是乎在銀青光祿大夫守尚書左僕射兼門下侍郎同中書門下平章事監修國史陳夷行受天正性味道至和雅量川渟厚德山峙慮必經逺詞皆托微舒遲見君子之容端肅得大臣之體文推訓誥學奧泉源膏腴五常枝葉百行早以精懿列侍禁闈溫樹既彰於不言王度每資於密贊洎踐登衮職左右文宗遇事必陳犯鱗靡懼標揭令範振揚直聲逮余纂承再諧夢卜輔我以大中之道𢎞我以可久之規匡益居多厥庸甚茂近者寒暑乖候步履或難雖嘉猷屢竭於沃心微恙有妨於造膝朕雖倚賴方樂優崇而獻疏披誠固懷退讓眷言美志難議强煩用是輟燮贊於三台專儀刑於百揆庶可資乎頤養且無替其崇髙仍加貴勳式表光寵可守尚書左僕射仍賜上柱國會昌二年六月杜悰右僕射崔鉉户部尚書制君之任臣也進則用其才勞則逸其事况丹青大化佐佑朕躬謨明之效已彰嵗月之勤亦至俾其宴息用保初終尚書右僕射兼門下侍郎同中書門下平章事杜悰貞莊有容沉厚多敏早歷內外之任備陳經濟之謀剛厲馳聲肅恭推美通議大夫守中書侍郎兼户部尚書同中書門下平章事充集賢殿大學士上柱國博陵縣開國子食邑五百户賜紫金魚袋崔鉉誠明挺操溫粹含章擢自禁垣之中列於台司之上獻替不倦沉研益光而皆披衮在廷事君𢎞道方當注意資爾令猷或趨尚之間時聞朋比黜陟之際迹涉依違朕尊禮大臣虛襟庶政將務羲唐之化所期伊吕之賢茍曰未諧豈副僉屬臨軒永念能不憮然宜解職三台列官八座長揆天臺之右地居户版之雄勉思令圗服我成命悰可行尚書右僕射鉉可守户部尚書會昌五年四月鄭朗太子少師制相輔之臣賢傑是膺茍或道茂台階功宣時柄洪化方深於倚汪微疴遽告其退休宜降寵私俾安頤攝庶得君臣之義實全終始之恩通議大夫守中書侍郎兼禮部尚書同中書門下平章事監修國史上柱國賜紫金魚袋鄭朗靈鳳耀儀非熊表德貞厚可以鎮風俗謙恭可以和神人量合澄波氣凝金璞論議必根於王化文章雅叶於國經起於卑寮積乃重望自周旋臺閣總領藩方故事書著於典章仁聲藹流於謠詠頃司邦計國用以殷逮領憲闈朝綱載肅洎乎克符夢卜遂委鈞衡理庶政而百度惟貞調元氣而三光增耀而又勤獻納稍失節宣屢陳謝病之辭待舉優賢之命是用釋兹機務允乃至誠爾其專一精神輔助藥石將圗有間務在無營往參六傅之榮仍加二令之職用為羽翼爰輟股肱嘉猷永播於事公深眷豈忘於興寢慎爾多福祗膺恩寵可檢校尚書右僕射兼太子少師大中十一年十月鄭畋太子少傅分司東都制門下將相之權安危所係注專戎律秉持國鈞謂成靖亂之謀以著匡時之績方期功就俄以疾辭仍乖撫字之方且異毗豫之道尚居崇秩猶念初心諸軍四面行營都統鳳翔隴等州節度觀察處置等使開府儀同三司守司空兼門下侍郎同中書門下平章事鳳翔尹上柱國滎陽縣開國子食邑二千户鄭畋藝髙冊府譽動詞林禮樂在躬衣簮奕代虹玉動連城之價朱絃含清廟之音才無不周識無不綜踐歷既久聞望時稱禁林傳麗藻之工鳳沼著經綸之業洎凶徒犯順上國罹災駕當出於全蜀鎮方臨於右輔因時建䇿遂首興師上寬焦灼之懷下慰蒸黎之望念其竭節頻降殊恩任三事之優崇専之節制許於除授皆俾遵行則朕於施功之臣可謂無有愛惜而不能傾心養士盡力惜人致興半菽之嗟竟起多寒之怨既乖撫馭幾誤機權賴仗義之徒叶心王事舉善暗符於朕意推姦必違於勳庸尚保傅於承華仍優游於東洛未妨頤養猶示渥恩凡百庶寮宜體朕意可太子少師分司東都散官勳封如故仍且於興元管內便將養候疾損日赴任主者施行裴𦙍鄂嶽觀察使制原闕特進行門下侍郎兼兵部尚書同中書門下平章事監修國史上柱國裴𦙍秀挺華宗光膺積慶髙懸天爵煥發人文早著令名亟升清貫自超翔宥密演暢綸言因成魚水之歡遂委棟梁之任張子房之借筯遽展謨猷謝安石之圍碁將明氣度繄乃之力毗豫化源旋屬寇犯京師駕惟巡省益表忠貞之節備彰患難之時冒白刃以脫身激丹誠而報國安危所注中外具瞻道方被於匡周功已參於微管每寬宵旰用慰憂勤既在輿言當存國體爰從燮贊待假優崇朕以夏口奧區武昌重地况今雈蒲尚擾細柳猶勤全資濟物之仁式叶觀風之政念兹鈞軸付以察亷連數郡之豐盈問兆人之疾苦即冀烽烟弭息寰宇清寧俾俟侯藩重歸相印往踐乃位可檢校兵部尚書兼御史大夫充鄂嶽州觀察使散官勳封如故主者施行崔𦙍吏部尚書制門下天地廣運寒暑所以推遷帝王任人理亂係於周稔故叔敖三相往道堪思胡廣七為前功斯在因詳文冊爰示徽章扶危匡國致理功臣光祿大夫守中書侍郎兼吏部尚書同中書門下平章事判度支上柱國清河郡開國公食邑二千户崔𦙍金莖擢用玉燭資和朱絃含理代之音蒼璧是禮天之器自付政柄纍遇時艱或已去而復還每勤官而蒞事雖矜直道終失中庸朕昨者初復上京方安庶品且期靜理貴保和光而於敷奏之間獨有去留之說徒妨事體俾長紛爭是用輟乃鈞衡專兹銓鏡亦將示朝廷之典制保君臣之始終更茂前功永孚於道可守吏部尚書光化二年正月裴樞崔逺左右僕射制門下入則秉鈞衡而凝庶政出則正冠冕以長百寮式資夙舊之臣咸謂重難之地銀青光祿大夫守尚書右僕射兼門下侍郎同中書門下平章事充太清宫使𢎞文館大學士延資庫使諸道鹽鐵轉運等使上柱國河東郡開國侯食邑一千户裴樞周事歷年慎守三紀再持國柄屢竭訏謨光祿大夫門下侍郎兼兵部尚書同中書門下平章事監修國史上柱國博陵郡開國公食邑二千户崔逺語默有程得喪無撓中樞薦履盡瘁克彰俱宣夙夜之勤備罄匡扶之業是用均其勞逸顯爾便蕃燮調暫輟於劇權師表並資於碩望無虧懿效式使當仁或增疏爵之榮更表優賢之禮樞可光祿大夫守尚書左僕射仍進封開國公加食邑一千户勳如故逺可守尚書右僕射散官勳封並如故天祐二年三月二十五日唐大詔令集卷五十六
