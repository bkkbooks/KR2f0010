body:
  text: 唐大詔令集卷四十八宋宋敏求編大臣宰相命相五韓𢎞中書令制牛僧孺平章事制李程平章事制竇易直平章事制裴度平章事制韋處厚平章事制王播平章事制路隨平章事制李宗閔平章事制牛僧孺平章事制宋申錫平章事制李德裕平章事制王涯平章事制李宗閔平章事制賈餗平章事制李固言平章事制命相五韓𢎞中書令制帝王之理天下也外有方嶽所以宣教化內立宰輔所以秉樞衡授任之重莫踰人臣之位斯極至於出分垣翰入作股肱非聞望尊髙功庸顯赫則何以允膺僉屬光贊謀猷前忠晉絳隰等州節度觀察處置使開府儀同三司守司徒兼中書令河中尹上柱國許國公食邑三千户韓𢎞德器寬𢎞識度邁逺才資英特學茂韜鈐持蕭何畫一之心有闕立斷之利頃以開河右地藩屏近郊爰輟台臣仗兹戎節以清靜廉平之理牧我黎元通明簡正之方撫我師旅姦盜自息欺詐不生晨勿飲羊夜無驚犬五都富庶已飽仁惠之風三軍訓齊既習嚴明之令寧資借寇是用徴黃今選日來朝乘軒即路宜先極拜光我元臣上宰重權三公崇秩俾復乃位惟其敬之可守司徒兼中書令散官勳封如故長慶二年十月牛僧孺平章事制舟楫所以濟大川棟梁所以成大厦舟具而湍波不竦材具而廊廟用崇朕若涉之心浩然增畏垂衣端拱期在股肱是用擢彼英髦付以衡右朝議郎守尚書户部侍郎上柱國賜紫金魚袋牛僧孺方直秉心誠敬由巳玉堅持操松貞表姿文著經邦業推匡代中立不倚孤標介然日者選自南宫演綸西掖升諸憲府授以人曺典謨訓誥之詞紀綱準繩之度施之必當僉曰汝能朕將寄以台階委之鼎鉉貞我庶績登諸化源爾宜克念前修聿懷明哲體乾坤易簡之法廣日月無私之照使風化日厚澆浮自泯好惡不競彞倫永清於戲豫視以能乃升於位我心慎擇惟賢自求昔公孫𢎞以射䇿馳聲名光相府爾以掞天髙稱亦踐台司勉同素絲之風克副臯陶之舉乃加命秩用表新恩可朝散大夫尚書戶部侍郎同平章事勳封如故長慶二年三月李程平章事制門下理多務者必資經逺之能總衆材者實在選舊而任爰疇咨輿議參詢廟廷果獲誠臣乃豫高位正議大夫尚書吏部侍郎上柱國渭源縣開國男食邑三百户賜紫金魚袋程文含鐘律器挺圭璋行巳蹈常與物無吝早以詞翰密侍帷幄開𢎞碩問發揮訓謨周旋臺閣閲歷中外秀造稱其得俊衡鏡表於無私卑牧難踰深藏不耀朕負荷重任祗守大業自顧寡昧動遵先規委成台司不操匠斫自居無悔之地以馳至正之途而元輔披陳勇於進類嘗思任人與自任不若因賢以求賢命之僉求以明名列上而程為舉首是必至公爾宜謹繩墨以視諸侯平好惡以待多士秉彞倫以一流競核名實以鎮浮虛叶睦乃僚無替朕命爰因銓品之鑒載佇烹飪之功可尚書吏部侍郎同中書門下平章事散官勳賜如故長慶四年五月竇易平章事制門下昔周宣王漢宣帝思𢎞祖業克紹先搆用申甫邴魏為相然後周道重熙漢德纍洽朕以沖眇託於億兆之上𬗟惟文祖玄宗之理若涉大水浩無津涯詢於巖廊俾舉髦碩而果得才傑副豫虛求必惟其人乃命以位朝議郎守尚書户部侍郎兼御史大夫判度支上柱國賜紫金魚袋竇易端厚靜慤直方簡廉氣深而和識敏而達每黜華而務實不為善而近名早以器能揚歷中外司憲著紀綱之績廉俗垂惻隱之仁輟於天官掌我邦計底慎財貨均莭委輸賙給不窮贍濟皆足國有大柄屬於全才况朕新臨寶圖萬務資始審儀而授其代豫言爾尚弼豫一人用底於道且朕以丞相調兵食以冢宰執歲成我國家參用古制以重其事也爾往欽哉無忝成命可朝散大夫守尚書戶部侍郎同中書門下平章事判度支長慶四年五月裴度平章事制朕周觀帝王之道春秋富則倚附舊老享歷久則簡擢俊髦故我玄宗開元之始任宋璟姚元之之輩以調隂陽東封以後乃用李元紘張九齡之儔以承法度洎豫恭守大位於今三年巖廟藩封建於左右前後皆皇祖聖父之人罔有易置况勳望冠代器業絶倫副豫揣掄贊此休運凡百有位敬而聽之山南西道節度觀察處置等使光祿大夫守司空同中書門下平章事興元尹上柱國晉國公裴度以忘家抵患協於憲宗以匪躬不撓佐於先帝十拜相詔四登帥壇接士猶布衣之心忠時急戀闕之思價重於內外名殷於華夷藉是風猷俾參大柄且輔吾志亦用僉聞於戲君臣合符不可多得千載一遇猶為比肩爾宜援古以自強垂後以居重文終之畫一平陽之并容諸葛持衡之公相如引車之意率彼四子是為成人服兹昌言往踐乃位可守司空同中書門下平章事仍令有司擇日備禮册命寶歷二年二月韋處厚平章事制搆大厦者實先梁棟之材濟巨川者必資舟楫之用朕越自藩邸膺明大統夙夜震兢若蹈泉谷况齊􅡦思乂艱步甫寧上奉山陵七月之期內佇訏謨庶政之始匡我眇末置之樞極將恢興運之功俾協具瞻之望博求名實獲茲忠賢實帝賚豫其誰與讓正議大夫尚書兵部侍郎知制誥充翰林學士上柱國賜紫金魚袋韋處厚體道為徒見義能往居易以行古至和而不流氷霜挺松柏之姿貞白秉圭璋之德文揮風雅學該儒玄器洽而保之以謙識明而用之以晦選自經藝侍於穆宗擢司密命實贊先帝一彼直操彰其逺猷臨危勵難奪之誠推忠備𢎞益之道屬者變生宫掖謀俟經綸首參底定之功載竭忠貞之效雪憤橫涕披肝貢詞約我以禹湯罪己之勤博我以古今致治之要聽必感動悉其條陳洪纎靡差夢卜斯協必能式是中外啓茲雍熙俾豫沖人克垂端拱是用擢升鼎鉉式亮帝圖庶無愧於知人且用光於斯道於戲前哲有言良臣惟聖處殷憂舉衆之任荷濟理沃心之期任四方傾聽之勤在百度維新之際無怠於誨無廢於身無曠於登庸無忽於詢度慎爾初守固其持平協朝廷卿士之和心復貞觀開元之令政用乂乃辟罔非其中崇易簡久大之規茂庶富阜康之績勿替明戒時惟永圖汝往欽哉無忝我命可中書侍郎同中書門下平章事勳賜如故寶歷二年二月王播平章事制宰相之制所以撫鎮國家出納王命弼亮刑政燮理隂陽為一人之股肱注四方之耳目僕射之職在於參贊萬務統率六官師長百寮總臨臺寺冠中朝之碩望為多士之具曕其有久司利權纍分閫寄位重邦教任隆台階爰因入覲之榮冉賜登庸之命俾升鼎鉉用輟旌旄淮南節度副大使知節度事管內營田觀察處置臨海縣牧等使兼諸道鹽鐡轉運等使銀青光祿大夫檢校司徒同中書門下平章事揚州大都督府長史上柱國太原縣開國男食邑七百户王播知識精深機神敏逹長才適於通變雅量得於寬明亟登將壇仍佩相印休聲早振於全蜀成績近著於維揚山澤之貨無遺輸轉之資相繼用佐經費克彰忠勞朕獲守宗祧君臨億兆尚賴匡救底於輯寧於戲爾有嘉謨我求懿德將期納誨以及交修冀霖雨之濡能普施於四海舟楫之利無専美於一方寵以端揆之榮仍茲𣙜管之重往踐乃位汝其欽哉可尚書左僕射同中書門下平章事依前充諸道鹽鐡轉運等使散官勳封如故天中元年六月路隨平章事制綏輯萬邦實資乎元首弼成庶績允屬於股肱將以道宣化源崇固理本立我皇極贊於時雍故任賢著於禹謨納誨載於説命眷求懿德斯惟僉諧中散大夫守尚書兵部侍郎知制誥充翰林學士上輕車都尉賜紫金魚袋路隨性稟中庸氣含大雅身無擇行學不為人敏識周通宏才恢博挺然仁者之勇蔚為君子之儒祗事穆宗侍經內殿敷堯舜之大典暢周孔之遺風雅言玉音奧義氷釋潤色王度發揮聖聰出入禁闈踐歷華胄位彌髙而唯謹任愈重而滋恭逮及先朝復參密命雍容侍從早已賦於甘泉左右便蕃未嘗言於溫樹周旋九載終始一心直道匪躬讜言盈耳每訪謨猷之指用陳匡益之誠出不忘於詭詞退必嚴于削藁器可經國忠能致君迹其公正之方用升毗倚之任於戲干戈未息爾其𢎞智用以靜冦攘役戍尚勤爾其宣柔服以懷戎狄均國賦以阜安百姓振朝綱以綜核羣才退無後言動必慮善貞爾百度弼豫一人寵以峻階委以極務往踐厥位時乃之休可正議大夫守中書侍郎同中書門下平章事勳賜如故太和二年十一月李宗閔平章事制王者祗順天道統理人極茂育品類燮調隂陽必在旁求股肱宣翼機務朕嗣守寶位於今四年屬滄景搆姦河朔未靖兵甲屢興蒸黎匪寧納隍在豫輟食興嘆今苗頑既革華夏思安爰登台座弼我元化正議大夫尚書吏部侍郎上柱國襄武縣開國侯食邑一千户賜紫金魚袋李宗閔立德秉懿履道居業文行可以經邦國忠正可以動神祗周知變通識達古今自望髙多士名重四朝奉絲綸於掖垣平銓衡於省闥公直有裕清貞自持固可以相導雍熙光膺夢卜匡弼台德用濟巨川宜升樞機之尊俾叶鈞衡之政於戲知臣匪易求賢惟艱膺三台之崇贊萬機之重啓沃之義注於豫懷爾其舉正去邪以清百辟提綱舉法以肅羣司簡政勤心以安兆姓惟誠忠恕以靖四方嚴制度以𢎞典常信賞罰以旌淑慝有犯無隱進思弼違服兹寵光尚致豫理敬戒休命無替嘉猷可守本官同中書門下侍郎平章事散官勳封如故太和三年八月牛僧孺平章事制昔漢宣帝用丙魏以盛中興之業我玄宗任姚宋以致開元之理其術無他得賢而已朕猥居大寶首涉五年宵旰靡遑憂勤至切將倚任於國柄宜登進於人傑俾其復運樞極載清化源斷自朕懷允膺僉屬武昌軍節度使鄂嶽蘄安黃申等州觀察處置等使金紫光祿大夫檢校吏部尚書同中書門下平章事持節鄂州諸軍事鄂州刺史上柱國竒章郡國公牛僧孺氣含元精體包大雅識用夷密襟靈沉粹窮聖賢旨奧之學鋪邦國經緯之文蔚為名臣秀出羣萃長慶御歷登賢濟人廊廟有光臣工得職代天協理時乃之休先朝與能出兼征鎮毗俗丕變師旅大和宣力事君時乃之績朕飽聞器業虛佇風儀會曺參之促裝喜韓侯之來覲便殿延對前席與言通古今理亂之全源知教化損益之物務其應如響不知所然是宜卿長夏官平章大政康濟四海毗豫一人於戲君不能自為堯舜必待其臣以致之臣不能自為伊臯必待其君而任之致則期於盡忠任固在於從善然後上下交泰君臣相須爾其使百官得其人萬事得其敘邪正之路必判清濁之流必分金堅一心柅制羣類無重否德豫皆仰成可兵部尚書同中書門下平章事散官勳封如故太和四年正月宋申錫平章事制出納大命宰司化元調四氣以統和天人貞百度以鎮安夷夏必資髦傑用委鈞衡朕嗣守丕圖思𢎞至理萬務之重屬於台臣仄席勤求冀匡不逮况素效久彰於密勿精材巳得於詢謨擢自內廷授以袞職爰立左右斯為得人朝議即守尚書右丞上柱國賜紫金魚袋宋申錫嶽降全德天資正性處約居厚蹈中秉彞文每掇其菁華學必採其玄賾風播休聞超乎羣倫自選於同行參我內署奉職恭肅率心坦夷藴沖用以究國經鋪訓詞以潤王度密贊彌久𢎞益滋多朕纍因暇日召於别殿訪以大政觀其立誠而胸襟洞開肝鬲無隱識精詞直實契虛求固可以提持化權參決理本是用升於鼎鉉付以樞機由仙闈總轄之司當宰輔具瞻之地熙此庶績弼豫一人於戲元首以司牧萬方股肱以協贊皇極上推公以馭下臣竭忠以戴君際會交感而臻大化歷視前古何莫由斯豫方悉是道以臨兆人爾宜悉乃心以成一德敬戒厥位永孚於休可正議大夫行尚書右丞同中書門下平章事勳賜如故太和四年七月李德裕平章事制弼亮鈞衡宣翼統紀明景化以凝庶績啓嘉謨以建大中爰求國楨以輔台德銀青光祿大夫守兵部尚書上柱國贊皇縣開國伯食邑七百户李德裕元精孕靈和氣育德堅直成性清明保躬貞規淡夷敏識沖逺學總九流之奧文師六義之宗令聞丕昭僉諧允屬自提綱柏署掌詰禁闈釐紀律詳平之司竭訏謨密勿之節洎廉視浙右總鎮􅉸臺再委旌旄緝安卭蜀克有殊政咸懷去思諒惟全才茂此聲績朕以疇庸之典彞訓所先入遷司馬之崇彌積濟川之望是宜納誨朝夕擢居股肱𢎞伊吕之勳以嗣章平之美業傳相印門襲戎旃紹絲綸內職之榮繼鼎鼐中樞之重圭紱之盛恩輝罕儔爾罄乃忠貞副我毗倚無忝朕命服兹寵光可守本官同中書門下平章事散官勳封如故太和七年七月王涯平章事制居端揆之任再踐國鈞稽管𣙜之功兼司邦計爰崇舊德以輯親規簡自朕心用光僉屬金紫光祿大夫守尚書右僕射充諸道鹽鐡轉運等使上柱國開國公食邑二千户王涯元精降靈粹體秉哲恬智成性清貞保躬文行可以經邦風操可以鎮俗以明用晦處貴滋恭憲宗以禁署竭忠擢登輔弼先帝以台階宿望寵授旄旃隂陽燮調藩宗寧謐機務允理政經交修洎銓綜九流式序百禮提釐紀律統明貨泉法必便人事先體國聲績茂暢洽於羣謡朕以邉鄙防禦猶存兵戍資儲之備供億尚繁頃者支費轉輸任分兩使量入制用誠患多門俾足食以豐財在省員而簡務是用合此兩柄委於元僚正資通變之初藉我股肱之重勉思率職無或憚煩敬戒乃心欽承休命可守本官同中書門下平章事充度支及諸道鹽鐡轉運使太和七年七月李宗閔平章事制職代天工望歸人傑必資求舊允副僉諧山南西道節度管內觀察處置等使銀青光祿大夫檢校禮部尚書同中書門下平章事兼興元尹上柱國襄武縣開國侯食邑一千户李宗閔岩廊正人宗室全德才惟不器道實生知悴茂體隂陽之和周旋成禮樂之用外𢎞疏朗中實誠明白璧凝溫朱絲秉直文窮三變學洞九源早以忠規契豫審象雅有全略能宣大猷底寧戎蠻協贊郊祀見可而進知難靡回啓心常罄其嘉謀造膝必聞其法語行父事君志存於嫉惡臯陶承弼道逺於不仁康濟而金鏡有倫燮調而玉燭無爽謇諤勵大臣之節端莊清至化之源修明典章慎選方嶽敷我利澤臻於治平自出鎮漢中既周星律巴俗雖歌於來暮國人頗篤於去思遂用徴還蓋從公望及延召宣室益加前籌是宜再陟中樞直修袞職咨爾良輔其聽朕言夫天地交泰則時和君臣欣合則國治眷求一德出納萬機勉𢎞如水之心式副濟川之用命官罔及於私昵詔爵必俟於賢能俾庶績惟凝彞倫攸敘無忝注意敬之戒之可守中書侍郎同中書門下平章事散官勳封如故太和八年十月賈餗平章事制寅亮皇猷丹青景化爰從選衆之舉乃得非常之才前浙江西道都團練觀察處置等使朝議大夫檢校禮部尚書使持節潤州諸軍事兼潤州刺史大夫上柱國姑臧縣開國男食邑三百户賜紫金魚袋賈餗識達韻孤學正行直貞和自立介特不羣能操至公每契中道聲逸羣聽善諧朕心自尹京師尤彰望實亟召便殿屢陳嘉謨罄肝膈以納忠規推誠明而無外飾察言考事深用得之近命列藩聞兹僉論固可以參我大政陟於中樞天起豫懷賚此良弼爾其守法制平鈞衡匡王度以振國經釐百工以凝庶績舉直錯枉當官而行於戲為君之戒在知賢而不任為臣之患在保位而不言罔或依違虧吾則哲可守中書侍郎同中書門下平章事散官勳封如故太和九年四月李固言平章事制惟昔太宗聰明睿聖克致治平惟魏徴佐佑文祖叶建皇極矧朕寡薄思紹丕業旁求魏徴之比置諸巖廊庶匡不逮用底於道御史大夫李固言生於山東瑞此王國爰在下位早揚直聲介然無朋中立不懼文經邦俗行表人倫和嶠負棟梁之材辛毗有骨鯁之操便蕃華貫光啓令圖日者徴自近郊延於便殿言多方格道不容回嘉謨有倫正色無撓朱絃暢疏越之韻美玉呈特達之姿洎長憲臺彌彰休問固可以斟酌理本燮調化源疇咨僉同夢卜斯叶命爾豫弼倚為月肱登於黃樞參我大政爾當一乃心志罄其忠貞澄清流品旌别淑慝俾邉域殊方咸率吾教侯伯卿士各稱厥官罔曰難理惟其至公罔曰弗能惟其悉力欽哉是式無忝前良可門下侍郎平章事太和九年七月唐大詔令集卷四十八
