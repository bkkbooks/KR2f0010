body:
  text: 唐大詔令集卷四十四宋宋敏求編大臣宰相命相一裴寂蕭瑀左右僕射制裴寂司空制長孫無忌右僕射制房𤣥齡杜如晦左右僕射制李靖右僕射制長孫無忌司空制溫彥博右僕射制髙士廉右僕射制長孫無忌司徒制房𤣥齡司空制狄仁傑內史制韋嗣立平章事制崔日用參知機務制姚元之同三品制張說檢校中書制劉幽求知軍國大事制劉幽求同三品制張說中書令制姚崇兼紫微令制盧懷慎平章事制盧懷慎檢校黃門監制源乾耀平章事制宋璟兼黃門監蘇頲平章事制張說同三品制張說兼中書令制命相一裴寂蕭瑀左右僕射制端揆之職綜理百司任望斯重勳賢攸寄尚書左僕射魏國公寂風格淹粹局量𢎞雅早預經綸元功特著燮諧治本茂績以宣中書令宋國公蕭瑀志懷貞確業履冲素歷居顯要礪精治術獻納惟允周順有聞宜穆彞章允釐庶政寂可尚書左僕射瑀可尚書右僕射武德六年四月裴寂司空制槐路清肅台階重峻經邦論道燮諧是屬然而表德優賢昔王令典庸勳紀績列代通規尚書左僕射魏國公寂地胄清華風神間悟立志溫裕局量𢎞雅爰自義旗早參締搆宜契所感實資同德譬茲梁棟有若鹽梅翊贊綢繆庶政惟允歷居端揆彞章緝穆元功𢡟德寵秩未臻宜處鼎司膺茲重望可司空武德九年九月長孫無忌右僕射制望隆朝右任重國鈞尚想風徽義惟賢戚吏部尚書齊國公長孫無忌識量宏逺神情警發道昭搢紳才資文武樽俎之䇿電斷風馳干戈所指雲銷露徹機深之理彌著忠義之節以彰斯固立德佐時降靈輔闕宜期以翼贊授之端揆可尚書右僕射貞觀元年七月房𤣥齡杜如晦左右僕射制尚書政本端揆任隆自非經國大材莫或斯舉中書令兼太子詹事邢國公房𤣥齡器宇沉邃風度宏逺譽彰遐邇道冠簪纓兵部尚書檢校侍中蔡國公杜如晦識量清舉神彩凝映德宣內外聲溢廟堂朕自克平宇縣締構資始叶贊經綸厥功甚茂深謀祕略動合規矩忠義讜言事多啓沃及典司樞要綢繆宸扆開物成務知無不為可謂神降英靈天資人傑並宜總司衡軸光闡大猷𤣥齡可尚書左僕射餘如故如晦可尚書右僕射貞觀三年二月李靖右僕射制端右望隆寄任尤重實資勳德朝難其選左光祿大夫行兵部尚書代國公李靖識度宏逺才略優贍博綜機務兼資文武誠著夷險效彰吐納便蕃省闥詳謹有聞宜緝彞倫允茲名器可尚書左僕射貞觀四年八月長孫無忌司空制論道台階實賴明哲丹青神化寄深燮理自非鹽梅是屬棟幹有歸則曠職俟能罔或必備開府儀同三司齊國公無忌器宇凝正風度峻逺才包文武地兼賢戚誠著草昧之辰業預艱難之始功侔十亂聲髙三傑亮采銓衡庶僚有序儀型端右彞章以穆自任參鼎司位班槐路撝挹之美形於搢紳翼贊之規章於帷扆宜崇名器允副具瞻可司空所司具禮以時册命貞觀七年十一月溫彥博右僕射制文昌治本端副望隆朝綱所屬選衆斯在中書令虞國公溫彥博體業貞固學藝該明器惟瑚璉材稱棟幹任總絲綸職居近密乃心著於帷幄嘉謀表於樽俎寄深啓沃義切鹽梅宜升禮闈允兹彞序可尚書右僕射勳封如故貞觀十年三月髙士廉左僕射制司㑹政本執法任隆歷選攸難惟賢是屬特進尚書申州刺史上柱國申國公髙士廉器宇冲邈機神峻逺材稱棟幹望重縉紳地惟姻婭乃誠著於疇昔業預經綸嘉庸彰於夷險出總方嶽入贊機衡獻替之情譽光八舍銓總之美聲洽九荒啓沃是寄鹽梅斯在宜二端右允副式瞻可尚書左僕射特進刺史勳官封並如故貞觀十二年七月長孫無忌司徒制古先哲后咸正庶官德優者爵髙功多者祿厚是以經邦緯國必俟蕭曺之勳燮理隂陽允歸鍾華之望司徒趙國公無忌識量𢎞博風度峻逺地惟親賢材稱梁棟締構霸業茂勳著於艱難弼成王道乃心竭於寅亮鹽梅是寄丹青攸屬德綜機衡聲猷具舉自升槐鉉歲月亟移固以勒美太常書忠甲令者矣宜陟中台式典邦教可司徒貞觀十六年七月房𤣥齡司空制惟天為大資四序以成功惟王建國候三台以𢎞化故隆漢受命吳鄧飛聲有晉勃興荀何底績開府儀同三司尚書左僕射太子少師上柱國梁國公房𤣥齡器範忠肅識具明允才稱王佐望乃時英霸圖爰始預經綸之業鼎命惟新贊隆平之化誠固金石勳勒鐘鼎自任總庶尹職重朝端心力盡於翼亮憂勞積於歲序而志在冲退有懷止足固陳衰疴屢上表疏然則燮揆禮閣職務實繁論道槐庭望實攸屬宜加寵命平茲水土可司空貞觀十六年七月狄仁傑內史制鸞臺贊謀帷幄秉鈞之任為重典綜絲綸揮翰之才是屬銀青光祿大夫守納言上柱國汝陽縣開國男狄仁傑地華簪組材標棟幹城府凝深宫牆峻邈有八龍之藝術兼三冬之文史雅逹政方早膺朝寄出移節傳播良守之風入踐臺閣得名臣之體豈惟懷道佐明見期於管樂故以竭誠匡主思致於堯舜九重肅侍則深陳可否百辟在庭則顯言得失雖從容顧問禮被於皇闈而斟酌輕重事隆於紫誥宜遷掌閫之秩式𢡟専車之寵可守內史散官勳封如故主者施行聖歷三年十二月十八日韋嗣立平章事制鸞臺鳯池清切鸞渚便繁諷納兩闈允資一德中散大夫守天官侍郎韋嗣立當朝人望奕代相門道周性全才髙識逺誠以待物寬而容衆往自綸翰五字見推洎處提衡九流式序懷宗廟之掌有社稷之能宜竭忠賢翊宣化政可守鳯閣侍郎同鳯閣鸞臺平章事散官如故主者施行崔日用參知機務制蘇頲門下才為於時以宣可大之業精貫於日以定非常之勛古稱王佐今乃人傑大中大夫守兵部侍郎兼知雍州長史修文館學士騎都尉安平縣開國子崔日用果行育德修辭立誠孝則揚親忠於事主堂堂乎貌暢君子之風諤諤其言藴大臣之節故能書讀萬卷文窮四始髙步登朝平心待物日者醜孽未殄嘉謀潛斷臨危不顧見義而作是用底績實所繄賴師兵戢矣京兆晏如宜緝台階之政式拜掖垣之寵可銀青光祿大夫行黃門侍即參知機務學士勳封如故主者施行唐隆元年七月四日姚元之同三品制門下王佐之重師兵之任旁求棟幹膺此具瞻同州刺史姚元之宏略冠時偉才生代識精鑒逺正詞強學有忠臣之操得賢相之風纍踐台衡匡益斯在頃居藩郡循良是屬載懷一德分命六官訏謨允歸文武兼濟式憑帷幄之算宜副韜鈐之委可兵部尚書同中書門下三品先天二年六月張說檢校中書令制門下殷命百工傅膺審象漢推三傑良屬運籌不有斯人孰賚豫弼尚書左丞張說居正合道體直理精朕昔在承華首延博望談經之際欽若讜言撝翰之間潤色鴻業屢陳匡益見嫉奸回頃雖抗跡踈逺而載懷飢渴今羣凶巳服大猷伊始永言亮采光朕側席之期俾兹啓沃成朕濟川之望宜登鼎鉉式綜絲綸可檢校中書令先天二年七月劉幽求知軍國大事制蘇頲門下尚書佐理四方取則端揆成務百工是師非允具瞻孰康庶績封州流人劉幽求風雲𤣥感川嶽粹靈學綜九流文窮三變義以臨事精能貫日忠以成謀用若投水茂勳立艱難之際嘉話盈啓沃之初存讜直以不顧為奸邪之所忌萌釁頗露僭端竊發元宰見逐讒人孔多既斥羣凶方宣大化期問政於經始載登賢於夢卜可依舊金紫光祿大夫尚書左僕射知軍國大事監修國史上柱國徐國公仍依舊還實封主者施行先天二年八月一日劉幽求同三品制蘇頲門下弼諧庶政亮采有邦不遇人傑孰膺王佐金紫光祿大夫守尚書左僕射知軍國大事監修國史上柱國徐國公劉幽求緯量天假宏才代出子産之道四既取諸身臯陶之德九以成其用伊昔構屯感憤謀始洎於開泰防萌釁初景化俟其丹青讒詞淆於白黑頃居炎瘴受釐之封莫聞重踐台衡從政之言益啓眷茲密勿方總訏謨宜兼委於掖垣仍具瞻於禮闈可同中書門下三品餘如故主者施行先天二年九月八日張說中書令制門下咸有其德委廊廟之元宰知無不為歸掖垣之成務銀青光祿大夫檢校中書令上柱國燕國公張說含𢎞育粹特表人師懸解精通見期王佐立言布文武之用定䇿勵忠公之典才冠代而不有功至大而若虛自頃𢎞益時政發揮王道萬事必理一心從乂以觀其獨伯起慎於四知嘗得其真叔敖謹於三省故能深而不竭久而彌芳宣大號於紫宸潤昌圖於清禁我憑柱石爾作鹽梅正名之謂羣識斯集可守中書令散官勳封如故先天二年九月十一日姚崇兼紫微令制蘇頲黃門天之紫微地在清禁宰臣為重庶政攸先不有殊才曷云兼寄金紫光祿大夫兵部尚書同紫微黃門三品監修國史上柱國梁國公姚崇河山粹氣禮樂清英德量在寬公心益謹詞必體要行之自逺學以窮微志於可大允茲忠讜光我謀謨聞善若警欲仁斯至衣冠以為蓍蔡廊廟資其柱石朕之欽者管樂人之傑者蕭張遂能以身許國開物成務邦是用乂朝惟得賢北辰環拱四垣近密俾因題劍之榮式演如絲之命可兼紫微令餘如故主者施行開元元年十二月九日盧懷慎平章事制門下宰輔之任謨猷是屬不有大才孰康景化黃門侍郎盧懷慎貞良敦朴孝悌仁厚度量深於江海堅清邁於氷雪事皆體大詎觀非聖之書心必在公雅契惟賢之典故能危言正色直道匪躬比之微管而求得說宜寵瑣闈參乎鼎坐可同紫微黃門平章事開元元年十二月盧懷慎檢校黃門監制黃門古稱納言亦號常伯厥命惟允朕之股肱俾乂成績聿歸良輔銀青光祿大夫行黃門侍即同紫微黃門平章事上柱國漁陽伯開國伯盧懷慎氣資溫厚生於薊北年始英妙出自山東王佐所期人師見屬考彼揚歷多所獻替學以充其忠讜才以運其清明所謂許國忘身立朝正色有仲山甫之節成管夷吾之能故其道彌髙其心益下可以敷我王度弼於朕躬用增華於侍帷宜拜寵於參乘可檢校黃門監散官黃門如故主者施行開元三年正月十九日源乾曜平章事制門下軒夢三相舜舉八元必佇人傑以宣邦政尚書左丞上柱國安陽縣開國男源乾曜博文强學逹識周才貞白可以勵時道義可以𢎞物虛懷同於抱月懸鏡不疲利器比於成風刜鐘無滯固可光左曺之駮議翊中禁之謀猷用參金鉉之司兼踐玉壺之副可黃門侍郎紫微黃門平章事勳封如故開元四年十一月宋璟兼黃門監蘇頲平章事制黃門虞廷稱盛任以夔龍周邦以寧屬於閎散是知出納惟允必俟英竒啓沃以光實資茂彥銀青光祿大夫守刑部尚書上柱國廣平郡開國公宋璟宇量凝峻執心徑直銀青光祿大夫行紫微侍郎兼知制誥上柱國許公蘇頲風檢詳密藻思清華或掌獻南宫持平邦典或揮翰西掖匡輔政途咸竭奉上之心俱盡匪躬之節九流俟其澄序衆務資其弼諧宜委銓官兼侍帷幄璟可守吏部尚書兼黃門監頲可同紫微黃門平章事散官勳封並各如故開元四年閏十二月張說同三品制門下乾坤以隂陽化成后王以輔弼興理所以寅亮天極緝熙帝圖匪賴大賢孰寄斯任天平軍節度大使右羽林將軍兼并州長史攝御史大夫燕國公兼修國史張說挺其公才生我王國體文武之道則出將入相盡忠貞之節則前凝後丞諒可以𢎞此大猷總其邦政允釐庶績保乂皇家可守兵部尚書同中書門下三品勳封修國史如故即馳驛赴京開元九年九月張說兼中書令制中書政本實管王言咨爾夏部僉曰惟允兵部尚書同中書門下三品燕國公張說道合忠孝文武典禮當朝師表一代詞宗有公輔之材懷大臣之節儲宫侍講早申翼贊台座訏謨備陳匡益入則式是百辟出則敷政四方嘉績簡於朕心茂功著於王室賚豫良弼光輔中興乃眷専車是稱樞密宜兼出納之任式副具瞻之舉可兼中書令開元十一年二月唐大詔令集卷四十四
