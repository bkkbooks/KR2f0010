body:
  text: 唐大詔令集卷七十六宋宋敏求編典禮省侍元和元年正月輟朝侍膳敕元和十一年皇太后寢疾權不聽政敕大中元年積慶皇后寢疾權不聽政敕大中二年太皇太后寢疾權不聽政敕咸通六年太皇太后寢疾權不聽政敕服紀代宗再行期服詔義安太后服制敕陵寢上營卜九峻山卜陵詔充奉厚奉建陵詔大行太后山陵修奉事敕扈從靈駕太祖允百官表請不親至山陵詔隨靈駕赴陵所詔親至和陵敕答百僚不赴陵敕省侍元和元年輟朝侍膳敕敕朕聞為子之道莫大於寧親順色之方必先於養志此文王之孝曽氏之心每聆遺風常所景行伏以太上皇帝怡神間館追想大庭將以保靜延休滌慮寧體初陽變候舊恙愆和寢食之間有不安節夙夜憂灼豈遑寧居而內奉庭闈冀承安否嘗藥視膳且不暇於衣冠一日萬機固有虧於聽覽庶政關決遂闕躬親恐中外具寮未悉豫志起今月十八日以後權不聽政故茲宣示當體朕懷正月元和十一年皇太后寢疾權不聽政敕朕聞事親之禮問安雖限於晨昏為子之心就養在勤於左右斯實虞帝明訓周王遺風朕率而行之不敢有墜伏以皇太后母臨萬國子惠兆人存神保和養素全道屬韶陽改候濡露感恩舊恙有加常膳頓減夙夜惶惕不知所寧今當専奉庭闈躬嘗藥餌脫冠解帶且無暇於寢興負扆臨軒安能親於聽斷起今月三日以後權不聽政故兹宣示宜體朕懷三月大中元年積慶皇太后寢疾權不聽政敕門下朕聞恭孝之道人倫大經省奉之儀臣節攸重况發自誠恪稽諸典謨庶叶禮文式遵前憲伏以積慶殿皇太后坤元降秀皇極居尊道冠母臨訓彰壼職屬時當濡露感切於孝思氣爽保和恙生於寒暑自春歷夏有加無瘳焦憂匪遑旦夕增灼豈尚安於聽斷且欲專於候問恐中外具寮未諒豫意起今月十四日以後權不聽政故兹宣示宜體朕懷四月大中二年太皇太后寢疾權不聽政敕敕朕聞孝發乎因心服勤於遺體周典著問安之範戴經存就養之文垂為格言式示達禮惟朕小子敢廢前修伏以太皇太后母臨六宫子育羣品清淨養性恬和保神屬時暑小侵違裕不安寢膳未復憂灼靡寧日欲親於藥餌情豈安於聽斷凡有事務且委司存恐中外具寮未悉豫意起今月二十日以後權不聽政故茲宣示宜體朕懷五月咸通六年太皇太后寢疾權不聽政敕門下朕聞孝養之道發於因心誠敬之文著在前典平居以問安自慰寢疾則省侍宜專太皇太后玉衣兆祥瑶齊啓聖母儀天下德被寰中春秋既髙飲酒微減朕親自迎奉移居永安期宿恙就平勿藥有喜而精誠未感良醫無效情方切於焦憂政豈遑於聽斷日須躬問以冀平和恐中外具寮未諒豫意起今月三十日以後權不聽政故兹宣示宜體朕懷十一月紀服代宗行再期服詔三年之喪天下達禮茍或變革何以教人朕遘此憫凶攀號罔極公卿固請俾聽朝暮斬焉縗絰痛費心靈豈可更議公除便移諒暗昨見所司儀注以今月十三日大祥十五日從吉仰憑遺旨又欲抑豫切惟哀荒深謂未可其百寮並宜以此日釋服朕將此武丁之道成素冠之詩恭守再周不忍權釋凡厥在位宜悉哀懷羣臣三表請公除從義安太后服制敕皇帝為義安皇太后制服重輕事權知禮部侍郎陳商等狀伏觀義安皇太后遺令皇帝三日而聽政十三日小祥二十五日大祥二十七日釋服者皇帝遵奉遺旨將欲施行臣等商量事貴得中禮從順燮伏以宣懿太后常奉太皇太后之令追尊徽名附配廟室今云議禮合有等差伏請皇帝降服期周行以日易月之制十三日釋服其內外臣寮便以其日除釋至於所奉陵寢制度法物一事以上即請準舊例無更降授謹具如前公卿等議大行皇太后喪禮狀中書門下奏今月十一日大行皇太后遺令十三日小祥二十五日大祥二十七日除服者伏見陛下以因心之孝𢎞博愛之仁輟視萬機形於四海非臣等愚淺敢窺聖德然酌於羣議恐未得中伏思殷周之禮年代古逺史傳所記簡而未詳自兩漢以降文籍大備未有兄弟相友三葉重光如聖朝之禮所以母后之制罕聞故事考禮經之訓時為大體次之順次之稱次之宜次之臣等奉太皇太后令已命宣懿太后升祔禰宫昭配之禮既存令典尊親之義必在正名皇帝服宜有所降期年之制羣臣隨君而服亦從降禮其山陵制度及禮儀法物並如太皇后故事一無所降雖屈巳申情陛下動循於禮法而酌宜定制羣臣難抑於義心伏希聖明必賜察納謹具如前敕朕恭承遺令既遵易月之文而公卿庶寮願舉酌中之典徴引古義發揮舊章閎茲敷陳良用酸惻朕嗣纘鴻業豈以自私勉副羣情倍深感切所請降服及山陵制度並依會昌五年正月十五日陵寢上營卜九嵕山卜陵詔夫生者天地之大德夀者修短之常數故生有七尺之形夀以百齡為限含靈稟氣莫不同焉皆得之於自然不可以分企也雖復回天轉日之力盡妙窮神之智生必有終皆不能免是以禮記云君即位而為椑莊周云勞我以形息我以死聖人之至鑒通賢之深識著之典誥貽之話言顯説正詞曽無隱諱末代以來明辟蓋寡靡不矜黃屋之尊慮白駒之過並多拘忌希慕遐齡謂雲車易乘曦輪可駐軌同趨並其弊甚矣有隋之季海內橫流豺狠肆暴吞噬黔首邑里凋殘鞠為丘墟朕投袂發憤情深拯溺扶翼義師用濟塗炭賴蒼昊降鑒股肱宣力提劍指麾天下大定氛祲清殄區宇平一反澆弊於淳朴致王道於中和此朕之宿志於斯已畢猶恐身後之日子子孫孫尚習流俗猶循常禮加四重之櫬伐百祀之木勞擾百姓崇厚墳陵今預為此制務從儉約於九嵕之山足容一棺而已積以歲月漸以備之木馬塗車土桴葦籥事合古典不為世用又佐命功臣義深舟楫或定謀帷幄或身摧行陳同濟艱危克成鴻業追念在昔何日忘之使逝者無知咸歸寂寞若塋魂有識還如疇曩居止相望不亦善乎漢代時使將相陪陵又給以東園祕器篤送終之義恩意深厚古人之志豈異我哉自今以後功臣密戚及德業尤著如有薨亡宜賜塋地一所賜以祕器使窀穸時喪事無闕所司依此營備稱朕意焉貞觀十年二月充奉厚奉建陵詔人子之道存乎色養穹蒼不德巨創誠深朕觸目哀荒攀號無計終天永訣先逺有期欲報之心不任罔極務崇兆宅庶竭哀懷應緣山陵監護鹵簿等事宜令有司備具厚禮不得節減盡庫之所有成遷厝之大儀公卿百寮宜悉朕意大行太后山陵修奉事敕蓋聞天地至德常存煦育之仁皇王大孝克念述遵之義朕纂承丕構每務躬行而釁禍相延再罹煢疾大行太后慈順永逺仙馭莫追遺旨丁寧俾親庶政祗奉號咽不知所措𬗟懷風樹之感俯追龜筮之期以復土方興役車未已慮失農桑之候或貽凍餒之憂惻然憫傷思獲均濟緣山陵所要車牛夫役等除官中自有外並須和雇仍先折本戶夏稅錢訖度支以不折估匹段充填如本戶所折稅錢已盡即所司給付無令損折仍委山陵使與所司切加勾當不得輒令侵欺元和十一年三月扈從靈駕太祖允百官表請不親至山陵詔朕永懷罔極實願匍匐園陵今汝等既以宗社事重固相敦迫敬依所請倍增號絶隨靈駕赴陵所詔伏以山靈卜兆追號罔極日月遄流先逺將至且如追慕之痛感在因心終天之喪思遵達禮來月十一日靈駕發引朕侍從親赴陵所宜令有司隨事供擬親至和陵敕敕朕祗荷丕圖惟仰先訓方追號弓之痛俯臨同軌之期將展孝思宜親營護皇太后義深鳴鳯情極攀龍亦欲專奉靈輿躬及園陵寢廟務盡追摧之道用終哀敬之儀其大行皇帝發引日朕當從皇太后親至陵所宜令中書門下準此指揮天祐二年三月答百僚不赴陵詔朕以痛深創巨園陵有期冀當復土之辰以慰終天之報而公卿大臣敷陳典故援引今古以為一日萬機不可斯須而曠既執禮而愈切難順情而有違深抑荼蓼之哀懷俯徇股肱之讜議爰因晨省已啓慈順倍極摧傷勉從來請天祐二年正月唐大詔令集卷七十六
