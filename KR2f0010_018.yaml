body:
  text: 唐大詔令集巻二十八宋宋敏求編皇太子册文册晉王為皇太子册代王為皇太子册平王為皇太子册郢王為皇太子册忠王為皇太子册成王為皇太子册雍王為皇太子册廣陵郡王為皇太子册鄧王為皇太子册遂王為皇太子册景王為皇太子册魯王為皇太子册德王為皇太子册文册晉王為皇太子文維貞觀十七年歳次甲辰四月某朔日於戲惟爾并州都督右武侯大將軍晉王治忠肅㳟懿宣慈恵和仁孝出於自然信義備於成德禎祥夙著睿哲日新永言少陽匕鬯是寄疇咨朝列卿士協從是用命爾為皇太子往欽哉爾其思王道之艱難遵聖人之烱戒勤修六德勉行三善無或舉非法度忘㳟儉而好驕奢無或理乖彞倫逺忠良而近邪佞非履道無以彰名非任賢無以成德爾身為善國家以安爾身為惡天下以殆睦九族而禮庶僚懷萬邦而憂遐邇兢兢業業無怠無荒克念爾祖宗以寜我社禝可不慎與册代王為皇太子文維永徽七年歳次丁巳正月丙寅朔六日辛未於戲夫明兩載象道貫三才元良表德業隆千古是以夏啟作貳光闡髙猷姬誦升儲發揮王道詳求典册式瞻匕鬯固本垂統允歸正緒惟爾代王𢎞猗蘭毓祉喬桂凝華岐嶷表於天姿符瑞彰於神授器業宏逺風鑒昭朗踐嘉義而總深仁捨㓜志而標成德爰資玉裕早振金聲朕䖍奉靈圖肅膺丕業仰惟七廟之重思隆萬葉之慶疇咨列辟欽若前修是用命爾為皇太子往欽哉爾其祗奉憲章率由軌度盡謙㳟於齒胄審方俗於迎郊春禮冬詩趨庭靡懈三善六德勗志無愆絶驕奢之心納忠良之諌播徽猷於外宇申敬奉於中闈允睦周親務殷堯族永隆四術式寜萬𩔖無荒無怠保我宗基可不慎與册平王為皇太子文維唐隆元年嵗次庚戌七月庚申朔二十日己巳皇帝若曰天有丕命集寳位於朕躬所以奉若天道建兹元嗣其明聽朕言咨爾平王隆基幼而聰允長而寛博有夙成之量焉夫禮以修外樂以修内者是務於文也春夏學干戈秋冬學羽籥者是兼於武也繫於百姓聞於天下者是由於仁也一日三朝甞藥侍膳者是資於孝也爾有文武仁孝之德以知父子君臣之道朕甚休之間者賊臣搆逆窺竊神器則我有唐之祚危若綴旒爾乂寜邦家忠衛社稷誅其㐫惡以之康濟主匕鬯者非爾而誰是用命爾為皇太子古人有言曰爾身克正罔敢不正人心罔中惟爾之中昭昭臨下不可不畏慎簡乃僚允廸端士㳟儉惟德逺於憸人則萬邦以貞答揚我四聖之鴻烈敬之哉册郢王為皇太子文維開元三年歳次乙卯正月甲申朔四日丁亥皇帝若曰於戲書不云乎一人元良萬邦以貞易不云乎黄離元吉得中道也將以守監從撫主器承祧執經陳東序之容端冕見南郊之禮本支百世宜哉福祿咨爾郢王嗣謙忠肅㳟懿元良利貞遵在鎬之恵慈禀生譙之祥應學能知道孝乃因心書及春卿懸推早秀言窮淑譽逺愧生知當試象之年備成人之敏九𤣥贊命百姓與能正位少陽欽惟大典是用命爾為皇太子其在靖恭爾位聿修厥德詩書禮樂敦説為本父子君臣威儀罔忒寢門問䜿必視寒暄望逺招賢用資端直使三靈合契四海係心延我累聖之業積爾重輝之慶必敬必戒無怠無荒往欽哉可不慎與册忠王為皇太子文維開元二十六年歳次戊寅七月戊寅朔二日己卯皇帝若曰於戲受天命者皇王之業大為國本者儲副之位崇所以上承宗祧下固黎獻咨爾開府儀同三司單于大都䕶河東河北道行軍元帥朔方軍節度大使兼闗内度支營田鹽池押諸藩部落等使上柱國忠王璵㓜而夙成長有宏量佩服仁義周旋禮樂忠孝極於君親友愛聞於兄弟正以率下謙以持盈識洞於㣲知周於物通刑政之大體負文武之殊能果於積德樂於為善凡此數德嘗試皆能然豈矜知子之明諒曰至公之義况復仰稽天道俯察人心立長則順天所助也議才則賢人之望焉是用命爾為皇太子徃欽哉爾其敬膺典䇿無忘戒慎思創業之多難知守器之為重作貞萬國允協重明以揚列祖之耿光永貽多嗣之承式可不慎與册成王為皇太子文維乾元元年歳次戊戌十月庚子朔五日甲辰皇帝若曰於戲自昔聖王咸建儲貳葢將嗣守神器䖍奉宗禋是以禮經著元貞之德易象載重明之義朕纂服鴻緒丕承前烈爰升匕鬯之賢是符當璧之命咨爾太尉成王俶道備文武生資睿哲温文彰於日就孝友禀於天成徃以兇醜亂華干戈集事是能出陪戎駕入奉廟朝克符丹水之師實剪綠林之盜所謂功定社稷義寜君親今萬邦以貞三善斯屬宜膺上嗣之典俾踐少陽之位是用命爾為皇太子以副朕躬爾其思王業之艱難遵聖人之烱戒非尊賢無以成德非廣孝無以承親逺斥便佞詢謀正直兢兢業業庶保於大猷然後無忝於祖宗克寜我邦國往欽哉丕膺景命可不慎與册雍王為皇太子文潘炎維廣徳二年歳次甲辰三月戊辰朔二日己巳皇帝若曰昔者哲王必建元子上以奉宗廟下以係生民固本乃安立長乃順經明者是稱其兩樂善者不止於三資於君父之間運在神明之側稽古承式肆予命汝天下兵馬元師尚書令雍王适智崇天錫德茂日新文實志經武兼講藝性深於孝尤切於問安識藴其明更精於簡牘奉辭伐叛禀命成師積稔逋誅一戎底定業著於内功加於時萬方以貞朕志允定是用命爾為皇太子以踐於儲宫徃欽哉無以不副忘其㳟無以不㑹易其度觀圖書之得失思締搆之艱難夙夜惟寅主兹匕鬯永懷我髙祖太宗之丕命可不慎與册廣陵郡王為皇太子文維貞元二十一年歳次乙酉四月庚午朔六日乙亥皇帝若曰建儲貳者必歸於上嗣固邦本者允屬於元良咨爾元子廣陵郡王某幼挺岐嶷長標洵淑佩詩禮之明訓禀忠孝之𢎞規居常保謙動必循道識達刑政器含温文愛敬奉於君親仁德聞於兆庶神祗龜筮罔不協從是用命爾為皇太子於戲惟我列祖之有天下也功格於上帝祚流於無窮光纘洪緒逮予十葉䖍㳟寅畏日慎一日付爾以承祧之重勵爾以主鬯之勤以貞萬國之心以揚三善之德爾其尊師重傅親賢逺佞非道勿履非禮勿行對越天地之耿光丕承祖宗之休烈可不慎與册鄧王為皇太子文維元和四年歳次己丑十月癸酉朔十八日庚寅皇帝若曰於戲昔禹有聖子克承父業故三王代襲以天下為家我唐受天明命垂二百年欽惟十聖䖍嗣寳厯亦罔敢越子丕知𫝊序相受以及予一人獲奉珪幣事上帝承宗廟夙夜祗懼不敢荒寜永惟負恩思建儲貳湏假五載相時一德允屬於爾元子鄧王寜惟爾兩曜分輝五行總秀體資上哲性被至仁粤在㓜冲挺然岐嶷寛厚之量匪由師訓温文之德禀自生知爰撫藩封式崇盤石河間之泉懿决䇿不窮東海之開明視牘能辨陪享宗祀贊獻郊禋展禮克誠執事惟敬勤供子道左右朕志旋觀表識宜踐青宫訊於蓍龜靈命不二謀及卿士人心協同尚膺匕鬯允事監撫是用命爾為皇太子往欽哉莫尊匪君爾為之臣莫親匪父爾為之子愛敬誠矣忠孝並焉爾其虛受以下賢齋肅以成德無以崇廣處已無以怠忽臨人繼明四方作貞萬國永言配命可不慎與册遂王為皇太子文維元和七年歳次壬辰十月丙戌朔十七日壬寅皇帝若曰於戲建立儲嗣崇嚴國本所以承祧守器所以繼文統業欽若前訓時惟典常越我祖宗克享天祿奄宅九有貽慶億齡肆予一人序承丕構纂武烈祖延洪本支受無疆惟休亦無疆惟恤負荷斯重祗勤若厲永懷嗣訓當副君臨咨爾遂王恒體乾降靈襲聖生德教深藴瑟氣叶吹銅早集大成不屑㓜志温文得於天縱孝友因於自然符采昭融器業英逺爰膺錫祉實寄維城懿河間之不羣慕東平之最樂自頃離明輟曜震位虛宫地德可尊人神攸屬式稽令典載煥徽章是用册爾為皇太子往欽哉有國而家有君而父義兼二極重繫萬邦何好非賢何惡非佞何行非道何敬非刑居上勿驕從諌勿咈懋昭乃德惟懷永圖用陪貳朕躬以對揚休命可不慎與册景王為皇太子文維長慶二年歳次壬寅十月丁亥朔二十日丙午皇帝若曰於戲惟辟奉天必建儲位率命上嗣以立人極所以大一統而貞萬邦也粤我祖宗乃聖乃神繼體垂休奄宅四海洎予寡昧祗荷丕緒夙夜兢勵深惟永圖用稽古命嗣以承無疆之慶咨爾元子景王湛粹哲自天温文在躬夙成厚德勿形㓜志爰謀表社克彰孝㳟敏事居敬日新其度是用命爾為皇太子爾其欽哉主善勿懈由禮勿違勉以入德勤以聚業修志罔怠自誠而明則可以刑於邦家對於上下用光我烈祖之休命可不慎與册魯王為皇太子文維太和七年歳次癸丑八月甲申朔七日庚寅皇帝若曰欽若天道君臨萬方必崇上嗣以固邦本所以尊守器而重承祧也我祖宗受天明命光宅區夏𤣥光被於生靈利澤霈於遐荒逮予寡昧繼纘鴻序䖍畏寅懼不克負荷思崇大典用建元良俾膺主鬯之重式叶奉先之慶咨爾元子魯王永惟哲淑聰明温文粹和風表岐㠜生知孝敬洎茅苴分社磐石啟藩藴東平樂善之心慕河間大雅之操天縱宏量日新令猷人神協志蓍龜獻兆是用命爾為皇太子往惟欽哉修巳有度敬事無違居必思義動必率禮講道勵學親師尚賢則可以正耀於前星配德於重海以承列祖以奉粢盛恢𢎞懿圖無沗丕命可不慎與册德王為皇太子文薛庭珪維乾寧四年歳次丁巳三月癸卯朔十七日巳未皇帝若曰夫立愛惟明建善則固先王盛躅有國丕圖承祧仰鏡於前星守器適當乎長子遐瞻載籍𦕈覿洪荒雖歩驟隨時質文異制逮於𫝊序罔不率循國家髙視百王同符三代平一區宇統和人神垂三百年歴十八葉暨朕寡昧祗荷景靈屬天歩艱難岱宗牢落蒸人未乂舊典爰曠庻尹卿士藩輔元僚思正儲闈式固鴻業咨爾長子德王裕象叶肯構明啟少陽温文在躬睦友成性博聞强識無愧於老成學禮讀書庶資乎師訓廼輯羣議爰咨舊章是用命爾為皇太子嘻毓問承華重輝望苑永貞萬國明照四方入則有師出則有保無怠三善往崇四術務親正人誡近邪僻淑慎爾止峻防所岐勉爾厥猷罔墜丕訓唐大詔令集巻二十八
