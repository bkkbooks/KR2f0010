body:
  text: 唐大詔令集卷七宋宋敏求編帝王尊號冊文上應天神龍皇帝冊文開元神武皇帝冊文開元天寶聖文神武應道皇帝冊文開元天地大寶聖文神武應道皇帝冊文太上皇加光天文武大聖孝感皇帝冊文睿聖文武皇帝冊文元和聖文神武法天應道皇帝冊文尊號冊文上應天神龍皇帝冊文維神龍三年嵗次丁未九月丙申朔五日庚子具官某及文武羣臣等謹昧死再拜稽首奉冊言爰自厥初肇興司牧皇矣撫極蒸哉察道莫不因時適變改物殊徽推五運而陟崇髙步三微而應厯數天地人皇之稱立始别洪荒唐虞夏帝之君尊漸詳文質姬水以椎輪發號烈山以斫耒增祥然後仁被德宣功昭業逺歷訪前古兹為舊式大唐受乾坤之勝命當㝢縣之謳歌奄有黎庶遂光宸象應天皇帝陛下垂旒御宇截海披圖承四業之休光握三靈之寶契虞舜蒸蒸之德永錫羣方周文翼翼之心其凝庶績驅齊人於仁夀致雅俗於醇醲六府咸修五戎不用航海梯山之客奉贄輸琛耕田鑿井之夫擊壤鼓腹中外靜謐表裏雍熙而孽子㴞天亂臣干紀謀同觸瑟禍劇弄兵不虞之災忽生於肘腋無象之鍳獨憤於神祗於時凶豎逼樓聖君憑檻威靈下濟覺封豕之周惶醜逆上瞻見神龍之輔翼寶仗以億千之衛天儀成丈六之容衆瑞共臨羣妖大駭盡迷方而夫據咸奪氣而忘精顧盼而斬馘輿尸指麾而氷消霧釋雖復草為兵甲秦師驚蔣帝之神樹作藩屏釋主屈魔王之衆蛇軀之變媧后蛟影之隨漢髙未足以匹此竒徴方斯偉應自非冥符幽贊睿感通何以承波若之護持享髙明之福助昔者伏牛之主遂號犧皇名鳥之君仍題鳯紀法身用馬鳴成道上士以龍德為仙敢托元符爰資故實謹上尊號曰應天神龍皇帝鴻猷載肇昌厯惟新庶以仰順乾心俯從人欲天長地久更隆四大之尊名玉振金聲恆為百王之稱首盛矣美矣皇哉唐哉臣某等誠歡誠喜頓首死罪死罪再拜以聞開元神武皇帝冊文蘇頲維先天二年嵗次癸丑十一月辛酉朔二十八日戊子攝太尉臣某等六千五百一十四人言臣聞厥初生人首出庶物物不自理惟后所以康乂后不自尊惟人所以歸往古先哲后安人育物表功崇號不可辭也皇矣上帝臨於巨唐降氤氲垂耿光重熙而纍盛至太皇而授聖皇臣等敢稽首而言曰曩者景龍之末長蛇縱禍陛下慮宗社之墜提劔夷之則因親以尊主問者朝有賊臣天罰大憝陛下拯邦家之難援旗剿之則錯枉以舉直戮不及嗣惡惟其身思與王公卿士等下逮元元揚闓澤而布和氣臣又聞之軒夢華胥堯期姑射未有一其道而順太皇之心文王昭事武王纘緒未有一其時而居聖人之位褰裳釋重至公也端扆嚮明至孝也使九族惇叙百工允釐東西南北砥礪聲教彼靈有四招翠黃而可乘我寶有三指珠玉而不御然猶發揮禮樂馳騖典墳論思獻納進善從諌日慎於一日矣上指天意下考人謀卓哉協元符而鑠靈命而已夫開者泰也罔弗亨元者善也罔弗利神者聖也罔弗通武者威也罔弗服臣等不勝大願昧死上尊號曰開元神武皇帝謹上玉冊玉璽臣等誠惶誠恐死罪死罪謹上開元天寶聖文神武應道皇帝冊文維天寶七載嵗次戊子五月庚午朔十三日壬午攝太尉銀青光祿大夫守刑部尚書兼京兆尹上柱國潁川郡開國公臣蕃昊及文武百僚等謹稽首奉開元天寶聖文神武皇帝陛下臣聞惟道至大王者均其名惟天丕應聖人光其德陛下𢎞啓𤣥宗紹開皇運淳化既洽勞謙有恆每滌覽真經䖍心明祀將以答三靈之眷命為萬姓而祈福故得玉芝敷白魚見卿雲降仙𫝊對揚之休必有不可讓者也於是公卿宗子耆艾法流詣闕奏章願增徽號至於再至於三伏奉甲戍詔曰禎祥者所以合天人鴻名者所以彰德業今封章繼至誠請甚勤敬膺神休允答人望臣等不勝大慶謹上加尊號曰開元天寶聖文神武應道皇帝伏惟開闢之功簡易之德與道同運體乾無極開元天地大寶聖文神武應道皇帝冊文維天寶八載嵗次已丑閏六月癸亥朔五日丁卯攝太尉開府儀同三司行尚書左僕射兼右相吏部尚書崇𤣥館大學士集賢院學士修國史上柱國晉國公臣林甫特進行左相兼兵部尚書崇𤣥館大學士太清宫太微宫使上柱國臣希烈及文武百官正議大夫檢校禮部尚書上柱國清河縣開國男賜𬗋金魚袋臣崔翹等謹再拜稽首奉冊開元天寶聖文神武應道皇帝陛下臣聞自昔帝王與道同功者道寶降焉與天合德者天命彰焉陛下功冠九皇德包三古而猶朝乾夕惕朝禮上清復𤣥化之雍熙致蒼生於仁夀故昊穹眷命烈祖垂休玉芝再産於宸居瑶圃懸記於仁洞混成微㫖允屬聖躬陛下推美廣孝克崇祖宗之禮羣臣以公議納忠庶叶承天之意乃有卿雲散彩瑞日重輪對揚大號固不可辭讓者也於是公卿宗子耆艾法流顒然詣闕奉章陳請陛下猶懷謙冲之德至於再至於三伏奉景辰詔曰隂隲既啓公議屢陳惟懷永圖敬依來請臣等不勝大慶謹上加尊號曰開元天寶聖文神武應道皇帝伏惟覆載之功廣大之業丕膺鴻烈寶祚無疆也太上皇加光天文武大聖孝感皇帝冊文維至德三載嵗次已亥正月甲戍朔五日戊寅太上皇若曰古之握乾符建皇極社稷不可無主帝王惟有歸往堯禪舜舜禪禹畏天命也啓嗣禹武嗣文從人望也革命易姓舉至公於國纂戎繼統用不私於親斯美大矣朕承五聖之丕業宅萬國而為君膺時撫運載將四紀夢帝與齡實受多福曷嘗不䖍恭至道亭育羣生早厭黃屋之勤每懷𬗋霄之馭惟父知子我有元良惟君安人久思付託皇帝天縱睿哲日躋孝敬率性之至通於神明財成之道冠於宇宙朕往以蕭牆之難克保宗社故先帝禆豫以主鬯頃者中原之禍期輯邦家我於是命爾以仗鉞當經綸雲雷之際櫛沐風雨之時思契宿心纍有成命而義不奉詔謙不踰尊至於再三明兹懇讓洎即戎致討觀兵朔漠驅馭豪傑用服乃功於明辟天亦集大命於爾躬推之至公終陟元后夫名以制義器以昭德今羣公卿士咸旅於庭明聽朕言敷厥成訓於戲奄有四海克康兆人光天之業也經綸天地勘定禍亂文武之功也雄圖英算大聖也保國安親孝感也今加徽號於皇帝曰光天文武大聖孝感皇帝授𫝊國寶符受命寶符各一上副於天中契於神下叶於人三者朕無愧焉永保纍聖之鴻緒對一人之休命朕將訪道峒山追蹤汾水超然金闕之上終以玉京之逰不其至哉良願畢矣宜令所司擇日即行冊禮睿聖文武皇帝冊文李吉甫維元和三年嵗次戊子正月癸未朔十一日癸巳攝太尉銀青光祿大夫守兵部尚書兼御史大夫上柱國趙郡開國公臣李巽及文武官五千七百九十四人等言臣聞自天𤣥而升地黃其凝皇王之道堯舜首出故典謨述焉自堯及唐厯紀三千致理之君不過十數升平之運不至五百天人之交際不其難歟我唐運之興昌期是膺四海一統十聖丕承以至於皇帝則君十一而年二百矣歷考前代丁於斯時皆王澤已竭君明寖替未若我后之惟新厥命我唐之中興厥祚顧視周漢不其蔑歟伏惟皇帝陛下紹太宗之英武禀德宗順宗之寅畏乾乾翼翼若不滿志故愛於文母順色之孝也睦於兄弟因心之友也崇讜議察邇言去疑謀杜讒說俾王道正直砥為夷塗發前聖之韞匱披人文之光耀而氣有沴者反時為妖若黎崇之不恪苖人之逆命或誕敷文告或震疊武功聖造不疾而速非陛下疇能之然後奉四表之歡心總百神之受職蠲祀於清廟嚴禋於上𤣥天地察而神祗著矣臣聞之君人者謙遜靜慤則天應之以福故休祥出焉慈和愛育則人應之以誠故鼓舞從焉王者因人心稽天意天下俱應而徽號加焉至公之道不可辭也臣等所以勤勤懇懇至於再至於三願奉鴻徽以彰休德陛下猶三揖而五讓之久而罔已始降俞詔於是百辟卿士洎四方侯衛之臣上言曰陛下誕睿聖之姿膺㑹昌之期經天地之謂文禁暴亂之謂武臣等不勝大願謹奉玉冊玉寶上尊號曰睿聖文武皇帝惟陛下懋一德勤萬邦干祿百福垂唐之無疆元和聖文神武法天應道皇帝冊文崔羣維元和十四年嵗次已亥七月丁丑朔十三日巳丑攝太尉金𬗋光祿大夫檢校司空兼太子少保上柱國鄭國公食邑三千户臣綬及文武官五千七百一十八人等言臣聞惟天惠人惟元后作人父母大寶曰位至公者名帝皇尊稱肇自三五其義尚矣堯舜禹湯文武成康垂於典籍為萬代法非名歟殷有天下武丁大其業周有天下宣王嗣其訓在漢七葉亦稱盛强中興之美與我不類皇唐統天二百有二載祖宗崇光四海一家禮文憲章矩矱大備元符昌厯畀付有在洎我后之握圖也齊心於穆清垂意於大寧文昭武烈冠今邁古始負固不若者莫匪顛踣輸忠來附者克保蕃祉天寶之季孽臣干紀靈誅亟掃餘氛未弭兵不得戢六十五年於兹矣元和致理思櫜弓矢睿謀前定所嚮風靡兩河既清泰階砥平戴白之老欣感出涕不其盛歟伏惟睿聖文武皇帝陛下德配天地明並日月嚴薦於宗廟盡敬於郊禋孝通於神祗仁浹於動植內睦於九族外懷於四夷乙夜觀書日昃聽政恤刑懋賞劭農勸學歷選列辟英聲茂實其何以加焉日者淄青不恭告讓罔悛任下推誠出師徂征玉壘金陵之遐阻懸瓠營丘之險域或肆於都市或懸於藁街其餘瑣細蓋不足紀上以攄列聖之憤下以叶千齡之慶然後闢四門貞百度㑹㝢縣之玉帛旅梯航之貢篚咸曰不圖貞觀開元之化復覩於今日矣陛下勞謙祗畏不自暇逸讓德於上天推功於羣臣訪闕政修墜典不以龜龍為瑞以賢俊為瑞不以珠玉為寶以慈儉為寶卓哉煌煌信可假𤣥穹而蟠厚載者巳是宜尊徽名膺顯號以光於典冊以順於人心以答於天意不可辭也臣又聞之居安思危納諌從下逺讒慝旌讜直愛養黎庶敦尚朴素斯皆髙祖太宗順宗之遺訓也而陛下躬行之造次必於是寤寐必於是實萬姓之福無疆之休僉曰功成而禮不崇德廣而名未稱臣子之罪也於是百辟卿士藩衛耆耄稽首上言至於四三陛下深秉謙冲詔諭往復不得已而從之伏以紀年之盛冠於大號厥有舊典書不云乎乃聖乃神乃武乃文𫝊曰惟天為大惟堯則之則法也王者昭事上帝取法於天道德經曰天法道道生一唯上聖至德兼則利物行清净自然之道為能應之臣等不勝大慶謹奉玉冊玉寶上尊號曰元和聖文神武法天應道皇帝伏惟陛下景福是膺如日之升雖休勿休翼翼兢兢對越鴻名丕赫成能萬夀百祥罔不豐登天祚聖唐惟聖丕承臣綬等誠歡誠躍頓首頓首謹上唐大詔令集卷七
