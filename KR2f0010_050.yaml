body:
  text: 唐大詔令集卷六十宋宋敏求編大臣將帥賞功隴右河西節度使哥舒翰西平郡王制郭子儀中書令李光弼侍中制李光弼太尉中書令制滑州節度使令狐彰加御史大夫制褒勞勳臣制李晟司徒兼中書令制渾瑊侍中制髙崇文劍南西川節度使制李訴移鎮加官階爵邑制田𢎞正兼侍中制李光顔特進賜一子官制王智興等加官爵制王元逵同中書門下平章事制貶責薛訥除名為庶人制賞功隴右河西節度使哥舒翰西平郡王制授鉞登壇所以理兵用武益封命職所以褒德酬庸才傑者建希代之功績茂者有非常之賞哲王令典無或踰之開府儀同三司兼鴻臚卿員外置同正員西平郡王判武部事攝御史大夫持節充隴右河西節度度支營田長行轉運九姓等副大使知節度事赤水軍使上柱國凉國公哥舒翰挺生朔陲干城隴外青蛇入笥神發其祥白武銜珠天資我寶美政以公惠益著深略以果斷能成頃者戎大包藏禍盈惡稔南援蠻落東窺塞垣特禀廟謀勵八神於金匱長驅戎境麾三軍於玉堂决水奔雷固無前敵屠城拔壘靡有孑遺收九曲之舊疆開千里之沃壤亭障卧鼓既成禁暴之勳屯田饋軍益以封財之用則議功行賞厚禮酬勞俾吳芮之忠不獨光於漢魏絳之樂無擅美於晉仍兼望苑之榮繫以公田之錫可開府儀同三司太子少保封西平郡王加賜實封二百户通前滿五百户賜音聲小兒十人莊園各一所與一子五品官更與兩子官用旌元帥之勞以益三軍之氣也餘並如故天寶十二年七月郭子儀中書令李光弼侍中制朕聞古之哲王成功立極莫不旁求賢佐用康帝道由是軒登風力所以戡亂保邦漢用蕭曹所以勤王足國固能上扶王室下濟蒼生為社稷之寶臣資帝王之大業丕膺鼎位實屬斯人司徒兼尚書右僕射同中書門下平章事兼靈州大都府長史朔方節度使上柱國代國公子儀道備文武志懷忠亮表𢎞才而應運申茂績而經邦司空兼兵部尚書同中書門下平章事太原尹河東節度使上柱國薊國公李光弼業盛勳賢材優將相藴權謀而制敵勵誠節以匡時往屬凶醜亂常雲雷經始咸能外持戎律內翊皇圗披荆棘而有功歷險艱而無易或分麾東討掃昏祲於兩都或仗節北臨備長城於萬里並以掃清寇孽任切股肱永維締搆之勳久著山河之誓今殘妖佇剪介士猶虞將終九伐之功實藉二南之力是用增其秩序寵以樞衡宜正位於台司俾克宣於嘉績子儀為中書令光弼為侍中乾元元年九月李光弼太尉中書令制上公之位寵極人臣中書之本政先綸綍是知應乾成象用分台鼎之司為國作楨必藉勳賢之業所以漢庭多難絳侯居太尉之尊晉室未安溫嶠掌中書之務至若任兼公相道濟生靈必俟非常之才用膺莫大之寄司空兼侍中幽州大都督府長史河北節度度支營田經略等使副元帥知諸道節度行營上柱國薊國公光弼器格沉正襟靈邃逺感風雲之密契藴縱橫之大才成經綸之功足以靖亂懷忠孝之道故能匡國自逆冦搆禍寰宇未清義勇竭於忠心勳庸著於王室頃者豺狼餘孽尚藉天討蚊蚋相依仍侵河外是用仗其深略為我長城有穰苴之法令亞夫之威略逺能挫羣凶之鋭全百勝之師為廟堂之寶臣成軍國之重任雖吉甫作憲道可經邦而孫吳行兵謀能制敵克壯大業無愧前賢且官惟其人固難虛授爵以存善抑聞舊章况經綸之時義參於締搆艱難之際功茂於始終不有殊奬寧彰厥德是以載酬嘉績俾允具瞻宜進上台之秩仍兼右弼之寵可太尉兼中書令乾元二年十二月滑州節度使令狐彰加御史大夫制使持節滑州諸軍事守滑州刺史攝御史大夫充滑衛相魏德博六州節度使令狐彰義勇無倫忠貞有素艱危效用終始不渝頃陷賊庭忠誠屢達來持漢節壯志彌髙拔城變六月之師破敵振三軍之氣酬庸議賞須越等夷今淇澳未寧河朔猶梗廓清醜類實屬元戎宜列職於中司俾承榮於茂秩登壇受律藉爾良謀獻凱論功佇聞嘉績可銀青光祿大夫守鴻臚卿使持節滑州諸軍事兼滑州刺史御史大夫充滑衛相魏德博等六州節度使上元二年九月褒勞勳臣制常衮敕方伯連帥能修其職則勞之以璽書載之於正典式是羣嶽歸於至公以勤其職頌聲興矣周禮以孟春之月懸法布令採詩觀俗亦褒異理行之時也其有惠訓一方吏之表率朗然明舉固可首之某官某受任藩閫三年有成清節獨立以身率下化在於言前風行於疆外逺清西南之氛齊一華夷之俗而憂國如家上下同體屬關輔連雨去秋非穰以豐財節用之餘資備邉出師之費雖給馬官渡足食成臯勤王助邉何以加此誠堪垣翰之寄奉上無私亦將亷吏清風夙夜相勉也寐期休績至于再三詔書諭懷宣示方鎮李晟司徒兼中書令制陸贄敕雲雷搆屯㝢縣興難非山嶽降神不生良弼非股肱協契不集大勳故髙宗得傅說中興殷邦宣王任吉甫重光周道天寶之季冦階二京時則先臣子儀翼戴肅宗戡定患難再造區宇於今賴之肆豫小子獲纘丕構不克負荷失守宗祧天祚我唐降生忠烈有社稷之臣曰開府儀同三司檢校尚書左僕射同中書門下平章事充神䇿軍節度使鄜坊等州節度觀察處置等使京畿渭南渭北商華等州兵馬副元帥上柱國合川郡王李晟沉肅有勇堅明能斷聞難發憤誓師徂征誠激於衷義形於色自河之南萬里濟師殷然雷奔大盜懾駭屬王家不造戎師誘姦重兹播遷郊甸震蕩而晟蓄鋭養士深壘固軍以謀吞元凶以義糾羣帥躬擐甲胄率先啓行布忠信為軍聲恃禮樂為戰器廓清氛沴寧復皇都宗社載安宇宙斯泰佐豫興運時乃茂功德厚者位崇業盛者報重登以元輔建於上公煕庶績而翼宣九歌阜兆人而敬敷五教疇其井賦貽厥子孫與國咸休永播丕烈可守司徒兼中書令仍賜實封一千户餘並如故朕還京後所司擇日備禮冊命宣示中外以彰大勳渾瑊侍中制敕王者敦德教以經邦國興武事以定禍亂執是二柄毗豫一人得諸全才康濟大難以忠扶王室以義奉天討功崇祚土德盛懋官振揚洪休備舉彝典開府儀同三司檢校尚書左僕射同中書門下平章事兼靈州大都督府長史充靈鹽銀夏等州節度管內度支營田觀察處置押蕃等使朔方邠寧振武奉天永平等軍行營節度副元帥上柱國樓煩郡王渾瑊神降才傑天資忠厚協力興運為國輔臣往以盜起上京駕急出狩羣凶怗亂載犯郊畿時乃奮揚威武董制師律深居籌畫奸慝寢謀當敵指揮士旅增氣危城克固我武用張重以賊臣蔑恩養寇資亂再罹艱阻越播巴梁時乃并轡載馳釋羈從邁有見危致命之節有憂國滅私之誠凛然貞規介若金石縱橫藴夷難之略感激陳復國之謀分總偏師徑出重險秉大節以示羣帥布寬令以宥脅從師次逺郊摧凶靡抗軍臨近甸下邑如歸推成功而不居期盡敵以自效率其全衆揚斾追奔雄威疾馳元惡授首柔德懷服餘黨歸心掃闢氛昏安復陵寢懋乃嘉績其惟格天士燮之讓能耿弇之殄寇總是二美瑊其有焉是以銘勳旗常垂美竹帛宜守台階之列仍酬井邑之賦祗膺時命無替厥庸可侍中仍賜實封八百户兼官本使副元帥開府勳封如故髙崇文劍南西川節度使制慶賞刑威所以為國既用鉞以誅有罪則建侯以報有功懲綱紀於未然勸事君於已著歷考前載斯為大章劍南東川節度副大使知節度事管內度支營田觀察處置靜戎軍等使開府儀同三司檢校兵部尚書使持節梓州諸軍事兼梓州刺史御史大夫上柱國渤海郡王髙崇文為時生材經武成器抱厥沉斷確乎堅剛鷙隼挺凌厲之姿髙秋凝肅殺之氣自築壇受命宜社徂征形義色以即戎瀝忠誠而誓衆康衢以視其重阻怒心如報於私讐令踰風行勢輟電走殄凶邪於未障完危壁於將傾然後總無前之師搏猶鬬之獸仰斷飛鳥髙橫戰鋒掩鬼神以用竒越丘陵以制勝生致逆豎洞開金城引漢將之旗鼓見蜀川之父老貞以紀律弔其傷殘兵無亂行市不改肆上清井絡下靜岷江銘而篆之豈有慚德乃眷庸部其惟奧區畢功以除其禍災圗勞宜享其土地滌蕩汚俗純綏異行觀風勵韓黃之化按節修方召之任爰自六職俾登三司仍疏大封且賜實食不踰次以彰殊伐不踰時以示休利敬服嘉命𢎞宣壯猷殿兹坤維屏我王室可檢校司空兼成都尹御史大夫充劍南西川節度副大使知節度事管內度支營田觀察處置統押近界諸蠻及西山八國兼雲南安撫等使仍改封南平郡王食邑三千户并實封三百户李訴移鎮加官階爵邑制伐叛除凶必俟乎竒略進封超位允答於殊庸况四紀逋誅三州竊據積妖遺育縱逆延災纍年徂征一舉坐致論功既歸於異等議賞豈待於踰時唐隨等州節度觀察處置等使通議大夫檢校左散騎常侍使持節鄧州諸軍事兼鄧州刺史御史大夫賜紫金魚袋李訴宗臣之𦙍王國克生毅男蓄深溫良煦外禮樂戰之器默識其源詩書義之府洞窺其室雖早升朝序而未展將才頃以懸弧滔天宿兵既久方城壓境易帥頗頻永懷韜略之家必有弓矢之嗣乃執金鼓載持干旄果副眷求克揚威令緝夷傷之後振法為雄制密邇之間保危成固推忠孝以感物本信惠而和人一其鬬心制彼死力乘虛徑襲負雪兼行風驅如合於百人雷震若出於九地堅城立潰狡豎生擒遺氓安堵以知歸餘黨釋甲而請命古之良將其孰過焉己申獻捷之儀當舉䇿勳之典爰授名郡俾牧重藩自洛而遙惟襄為大綿亘楚服橫臨漁津總八郡以澄清秉三軍之節制式因加地往繼沉碑特進左揆之尊以崇天秩仍假南臺之長用峻霜威表以勳階錫之茅土户封真實門貴延恩給此寵榮藂於茂烈於戲天鑒非昧不庭者必誅王爵無私有功者是享揚名繼美惟孝著於家聲鐘鼎山河惟忠光於國籍凡曰臣子得無企歟可銀青光祿大夫檢校尚書左僕射使持節襄州諸軍事守襄州刺史御史大夫充山東南道節度管內度支營田襄鄧唐隨復郢均房等州觀察處置等使仍賜上柱國封凉國公食邑三千户賜實封三百户與一子正員五品官元和田𢎞正兼侍中制古之所謂有功諸侯出征不庭入覲王室既展述職之義必加錫命之恩彤弓所以表其威𤣥衮所以榮其服然後勳烈昭灼寵章榮崇臨於一方示彼四國風雅所載不其美歟戎思忠臣是有兹命魏博等州節度觀察處置等使光祿大夫檢校司徒同中書門下平章事兼魏州大都督府長史上柱國沂國公食邑三十户田𢎞正受天地之正性明君臣之大節才貫文武識探古今煕百志以立身堅一心而奉主積誠自久遇事乃彰曉於羣情率以大順遂提六郡之地首革兩河之風及負海阻兵徵師問罪又能長驅義旅直抵虜城一鼓而凶徒禠魄再戰而元惡𫝊首永清夙沴功實倬然自秉圭來朝鳴玉入侍察其器度詢以謀猷每聞匡國之術彌見致君之道而懇誠戀闕不願守藩朕以將相之權中外一體茍意有攸往則誠難遽從况彼邦之人皆願其至師徒久服其訓令黎庶咸思其惠和鎮安之方倚賴攸切是用命爾式遄其歸且兼八舍之營俾仍五教之重又實其井賦益以土田褒賞之典勸忠斯在往蒞乃服厥惟懋哉可檢校司徒兼侍中依前魏州大都督府長史充魏博等州節度觀察處置等使仍賜食實封三百户元和李光顔特進賜一子官制朕聞有天下者道德仁義以為理城郭濠池以為固故曰不教民戰是謂棄之有備無患何以應卒此先王驅攘夷狄保障黎元之大略也五原居宥夏靈慶之中當蛇豕豺狼之突將扼咽喉之要爰命腹心之臣厥有成功宜加茂典邠寧慶等州節度觀察處置等使金紫光祿大夫檢校司空使持節邠州諸軍事邠州刺史兼御史大夫上柱國武威郡開國侯食邑二千户食實封一百户李光顔氣敵三軍心師百行有卞莊之勇守之以仁有日磾之誠濟之以武叱咤則風雲廽合筵晏而樽爼周旋蓋文武之全才直古今之良將是以淮蔡之役百勝功髙青齊之師一面居最朕以蕭關尚警馬嶺猶虞五餌之詐可羞百雉之防爰度先是屬役每難其人惟爾良能果諧豫願程功而不愆於素訖事而不勞於人比命有司褒乃實力僉曰古諸侯勳德優盛則就加特進以寵之我國家封植崇重則朝請一子以異之豫嘉乃勳兼用兩者兹謂上賞爾惟欽哉可特進餘如故仍與一子正員四品常參官元和王智興等加官爵制王者誅暴亂賞勳勞既正紀綱式頒爵位朕以菲德理乖勝殘使釁生海盜刑用戎鉞屬者庭凑倚滄州為輔車以謀專土同捷恃棣州為屏扞遂成阻命實賴英帥共恢壯猷爰議酬庸式奬宣力武寧軍節度徐泗濠等州觀察處置等使充滄州行營招撫使光祿大夫守司徒同中書門下平章事上柱國太原郡開國公食邑二千户王智興可特進仍封代國公食邑三千户餘如故平盧軍節度使淄青登萊棣等州觀察處置兼押新羅渤海兩蕃等使銀青光祿大夫檢校尚書右僕射御史大夫上柱國㑹稽郡開國公食邑一千五百户康志睦可檢校尚書左僕射餘如故太平軍節度鄆曹諸軍事兼鄆州刺史御史大夫賜紫金魚袋崔𢎞禮可檢校尚書右僕射餘如故其棣州城下武寧軍及諸道立功將士除已甄録外委智興條疏聞奏棣州應見在百姓宜復二年其將士有决戰攻壘奮不顧身中刃被創遂成廢疾者並賜衣糧終身勿絶其武寧軍及平盧軍浙西宣歙天平等五處兵馬在棣州城下者並宜放歸本道於戲並命申威分疆剪寇界大河之南北委藩守以廓清立績者既以勞旋圗功者方期盡敵勉𢎞朕策無至老師共輳輯寧副我勤厲元和二年十一月王元逵同中書門下平章事制李德裕門下古之命帥必重其名假三事之崇允萬夫之望故韓信以丞相擊魏樊噲以相國伐燕克成茂勳抑有前典成德軍節度鎮兾深趙等州觀察處置兼充北面招討澤潞等使金紫光祿大夫檢校司徒兼鎮州大都督府長史御史大夫駙馬都尉雲騎尉王元逵生禀忠厚天資誠信竒正得於心機嚴莊表於師律去病之略無假孫吳翁歸之才實備文武屬狡童逆命自固奴巢果能揚義聲以載馳繇直道而先奮鋒逾駭電勢盛疾雷上據層巒削成煙壘下臨平壤盡見秋毫始殄伏莽之戎遽收建瓴之險陳兵原野漸扼堯山摧困獸之鬬心碎螳蜋之怒臂棄身者萬計折首者七人先獻戎俘益彰臣節則令望王師之陳草木為兵聞吾帥之風椒蘭比德顧其殘孽豈復稽誅夫賞不踰時速之為貴雖契敷五教已列三公而禹分兵麾宜佩相印是用命爾升於鼎司於戲昔吳起有大功者三不為魏相竇嬰破藩國者七未踐漢台豈非名器之重曷嘗虛授爾其奮揚威武殱厥渠魁當感激以成功勿遷延而玩冦服兹休命可不敬哉可檢校司徒同中書門下平章事兼鎮州大都督府長史依前充成德軍節度鎮冀深趙等州觀察處置兼充北面招討澤潞等使散官駙馬勳如故主者施行㑹昌貶責薛訥除名為庶人制出師不臧本於喪律責帥歸罪聞於記言薛訥頃者總戎禦邊建議為首暗於料敵輕於接戰張我王師衄之冦境偏禆失節乃斯令之不明中軍靡旗則厥謀之不振况雁門斬級魏尚豈得論功馬邑亡輜王恢必聞議罪進退之咎典刑攸屬且觀其疇昔頗嘗輸罄每欲資忠報主見義忘身儻曹沫不死於辱終能自奮秦赦孟明之敗漢從李廣之贖古嘗有矣朕每懷之特緩嚴科俾期後效宜放其罪所有官爵並除削開元二年七月唐大詔令集卷六十
