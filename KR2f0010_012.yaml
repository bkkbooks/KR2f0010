body:
  text: 唐大詔令集巻十二宋宋敏求編帝王遺詔下文宗遺詔武宗遺詔宣宗遺詔懿宗遺詔僖宗遺詔遺誥睿宗遺誥明皇遺誥順宗遺誥遺詔下文宗遺詔勑朕以寡昧祗承丕業慕貞觀之至化希開元之中興十有五年勤勞宵旰雖俗未臻於仁夀而物或近於乂寧斯乃羣后叶心豈朕獨致自謂勵精未已治平可期誠不感通宿疾重遘藥石無補至於彌留惟懐懿圖宜有顧託是用審訓其聴予言皇太弟瀍睿哲明裕孝友温文忠正寛仁博逹周敏必能紹祖宗之休烈闡皇王之令猷宜於柩前即皇帝位仍以門下侍郎平章事楊嗣復攝冡宰軍國務殷豈可久曠以日易月宜遵舊章皇帝三日而聴政二十七日釋服天下節度觀察防禦等使及監軍諸州刺史職守非輕並不得離任赴哀天下人吏百姓告哀後出臨三日皆釋服無禁婚嫁祠祀飲酒食肉釋服之後無禁舉樂文武官等朝晡臨時皆十五舉音宫中當臨者非時毋得擅哭漢文薄葬朕實慕之奉營山陵務從儉約勿以金銀錦綵縁飾䘮具醫術之徒夙夜勞苦深可矜念不須加罪仙韶樂官放歸本司五坊鷹犬並宜解放嗚呼生死常期今古無異予素知逹何足甚哀咨爾將相卿士内外腹心爪牙之臣其敬保我太弟輯寧邦家成朕素懐克底於道布告遐邇咸使聞知開成五年正月武宗遺詔朕以寡德祗守丕業恭臨萬宇迨兹七年夙夜憂勤聿修大政剗除黠冦通欵堅昆誅稹至闗擒弁并部去摩尼壊法革釋氏邪風免蠧生人式兹正教漸移時俗庶及和平撫育黎元兾成理道行化逾切親政益勤寒暑所侵厥疾斯遘藥石無補以至大漸皇太叔叔父之親賢長之順天資睿哲聖敬日躋光揚祖宗善繼休烈而能内睦九族外臨萬機德可以寧庶邦仁可以安百姓朕之推擇無愧神明付託得人顧復何恨宜令所司具禮柩前即皇帝位仍令太尉平章事德裕攝冡宰軍國事重不可暫闕以日易月抑惟舊章皇帝三日而聴政二十七日而釋服天下節度觀察防禦使監軍諸州刺史職守非輕並不得擅離任赴哀天下人吏百姓告哀後出臨三日皆釋服無禁婚嫁祠祀飲酒食肉釋服之後無禁舉樂文武官朝晡臨時十五舉音宫中當臨者非時無得擅哭漢文薄葬甞所慕之營奉山陵備從儉約勿以金銀錦綵縁飾䘮具醫人陸行周奪章服及官與趙全素任從所適醫官郭𤣥已下三人釋放依前翰林收管五坊鷹犬除留備蒐狩外並解放噫生也有歸人之大數修短定分天理惟常雖古聖賢無能免者在乎守其道而知其終全其義而歸其正節哀順變存者不至於傷生委化觀空逝者無勞於哀痛素逹此理何足興嗟咨爾元老大臣内外庶位敬奉皇帝保寧邦家布告遐邇咸使知悉㑹昌六年三月宣宗遺詔詔曰死生之理修短之期古往今來是其常也爰以宗祧所繫嗣續有歸眷彼臣僚宜申顧託我先朝憲宗昭文彰武大聖孝皇帝承十聖之基構翼翼為心平五道之冦讎孜孜不怠雖長慶促運寳厯生奸文宗揚其耿光武宗付朕鴻業自臨億兆十有四年每思偃武修文庶幾聖德要道賴諸良弼罄乎嘉猷或陳無逸之篇或進勿休之説東后畢覲西旅繼來克復河湟拓疆三千里外告成宗廟雪恥二百年間僅稱太平咸曰丕變顧朕寡昧何以堪之今也天命靡常冥數先定與我之齡雖盡卜世之年甚長趣彼若歸遇天命而非天釋然何慮貽厥孫而有謀皇太子漼羽翼早成春秋已盛既膺主鬯克荷承祧宜於柩前即位仍以門下侍郎平章事令狐綯攝冡宰軍國務殷豈可以久曠以日易月宜遵舊制皇帝三日而聴政二十七日而釋服天下節度觀察防禦等使及監軍諸州刺史職守非輕並不得離任赴哀天下人吏百姓告哀後出臨三日皆釋服無禁婚嫁祠祀飲酒食肉釋服之後無禁舉樂文武官等朝晡臨時皆十五舉音宫中當臨者非時無得擅哭前漢與後魏二文俱從薄葬朕甚慕之營奉山陵稍減常制勿以金銀錦綵縁飾䘮具醫術之徒夙夜勞苦深可矜念不須理問五坊鷹犬並令解放咨爾内外將相爪牙腹心之臣其敬保我令子緝寧我邦家成朕素懐克底於道布告遐邇咸使聞知大中十三年八月懿宗遺詔朕祗事九廟君臨四海夕惕如厲宵分靡寧必求政化之源思建大中之道至於懐柔夷貊偃戢干戈皆以德綏亦自馴致兾清静之為理庶治平之可臻自秋以來忽爾嬰疾坐朝既闕踰旬未瘳六疾斯侵萬幾多曠醫和無騐以至彌留嗚呼數哉有窮聖賢之所必明於斯言是為逹節載申顧命式叶典謨皇太子權勾當軍國事性稟寛和生知忠孝德包􅌖哲聖表徇齊必能揚祖宗之重光荷邦家之丕構宜令所司具禮於柩前即皇帝位以司空門下侍郎平章事韋保衡攝冡宰軍國務殷豈可久曠以日易月之制行之自古皇帝宜三日而聴政二十七日釋服諸道節度觀察防禦團練等使及監軍諸州刺史委寄至重並不得離任赴哀文武常叅官朝晡臨時十五舉音宫中當臨者非時不得擅哭天下人吏百姓告哀後出臨三日皆釋服勿禁食肉飲酒婚姻祭祀釋服之後無禁舉樂薄葬之禮宜遵漢魏之文其山陵制度切在儉約並不得以金銀錦綉文飾䘮具五坊鷹犬等除蒐狩外餘並解放其醫官叚璲趙玘符䖍林馬伋等並釋放咨爾將相卿士中外臣僚竭力盡忠匡予令嗣送往事居無違朕志布告遐邇咸使聞知咸通十四年七月僖宗遺詔門下朕以冲𦕈祗荷鴻基每惟祖宗之締構艱難念中外之始終匡輔常同馭朽豈忘納隍而乃重去廟朝兩違陵寢始則黄巢犯闕後則朱玫敷天險阻道望蒼黄播越唯思罪已但念勞人宗社降靈妖氛尋盪六龍囘轡萬乗還宫方將陳玉帛以充庭㑹蠻夷而向闕寧期殷憂成疹宵旰奪神走羣望而靡徴希勿藥而罔効臣僚愛我攻療無遺曽未小瘳以至大漸嗚呼修短定分古今常期著在格言斯為逹理是用降兹訓誓祗聴朕言皇太弟知軍國事聴政明敏孝友天資聪明神助龍顔表異日角標竒居大麓而風雨不迷輔中興而山河備厯寛𢎞及物清明在躬必能保守宗祧奉承天地内撫百姓外鎮四夷實億兆之念同固威靈而是屬付託無恨予復何憂宜令所司備禮於柩前即皇帝位仍以太保兼侍郎韋昭度攝冡宰軍國事重不可暫闕以日易月抑惟舊章皇帝三日而聴政十三日小祥二十五日大祥二十七日釋服天下莭度觀察防禦䓁使使監軍諸州刺史守職非輕並不得離任赴哀應天下人吏百姓告哀後出臨三日皆釋服無禁婚嫁祠祀飲酒食肉釋服之後無禁舉樂文武官朝晡臨時十五舉音宫中當臨者非時不得擅哭五坊鷹犬除備蒐狩外餘並解放醫官及伎術人等晝夜勞苦知無不為宜各安存勿或加罪噫朕念兵革以來耕農久廢尤傷畿甸莫不流亡豈堪復土之規獨昧吊人之㫖且累朝遺制畢及山陵以漢文薄𦵏之詞為列聖循常之命約錦繡金銀之飾禁奢華雕麗之工皆例作空文而並違先㫖今者流離若是痛毒堪悲仗百姓即百姓一空捐國用則國用無取不可踵從前之計度困此日之生靈俾朕厚顔下見先帝應縁山陵事務宜令中外商量比從來毎事十分各减六七桐棺瓦器朕所慕之况在合晨勿欺大夜咨爾股肱重臣内外文武爪牙之士腹心之徒合志同心輔予令弟布告天下咸使聞知文徳元年三月睿宗遺誥蘇頲誥朕聞古之建皇極承大序者雖創業垂統則至公之器固不可違而居常待終則必定之期固不可易况朕以薄徳累承聖緒常願致虚守靖用遂其真至於崇髙富貴本非所重故三為天下推三以天下讓盖從人之欲方御於萬邦知子既明復𫝊於七廟爰命皇帝寄之司牧觀其體自舜禹以成厥政則朕飄然汾水無負於時何嘗不問寢以侍膳候顔而順色孝已逹於神明愛已兼於君父成朕之志何慶如斯然朕頃感舊疾倏焉大漸聖賢共爾修短其分古無不殁同謂之歸付託得人夫復何恨屬纊之後三日便殯以日易月行之自久厚葬傷生可以深誡其䘮紀及山陵制度一依漢制故事社稷務重皇帝不可諒闇自居小殮之後宜即别處視事軍將及岳牧等所在發哀並不須來赴百辟卿士孝子忠臣送往事居無違厥意主者施行開元四年六月二十日明皇遺誥惟天鑒下享年有期惟人奉天獲没為善予嗣承丕業敬守宗祧中暱憸人幾淪大寳賴皇帝撥亂反正戡難濟時幸以暮年復兹安養常懼有悔以羞先靈今病既於彌留殆將不寤其國務之事非予所圖哀制之間兹審遺訓者皇帝不豫厥疾未瘳禮貴適時或無封執宜令天下吏人令到出臨三日皆釋服無禁婚娶祠祀飲酒音樂其殿中當臨者曉夕各十五舉音禮畢而罷皇帝宜三日而聴政十三日小祥二十五日大祥二十七日而釋服以日易月固有前聞人子之念皆所未忍而艱難之際萬國事殷其葬送之儀尤須儉省特宜裁改無守常規嗚呼萬方勿乖予志上元元年七月順宗遺誥朕聞生死者物之大歸修短者人之常分古先哲王明於至道莫不知其終以存義順其變以節哀故存者不至於傷生逝者不至於甚痛謂之逹理以貫通䘮頃存弱齡即敦清净逮於近嵗又嬰沉痼甞亦親政益倦於勤以皇帝天資仁孝日躋聖敬爰釋重負委之康濟而能内睦於九族外勤於萬幾問寢益嚴視膳無曠推此至德以安庶邦朕之知子無愧天下今厥疾大漸不寤不興付託得人顧復何恨四海兆庶亦奚所哀但聖人大孝存乎善繼樞機之重軍國之殷纉而承之不可暫闕以日易月抑惟舊章皇帝宜三日而聴政十三日小祥二十五日大祥二十七日釋服方鎮岳牧不得離任赴哀天下吏人誥至後出臨三日皆釋服無禁嫁娶祠祀飲酒食肉宫中當臨者朝晡各十五舉音非當臨時禁無得擅哭釋服之後勿禁舉樂他不誥中皆以𩔖從事伏以崇臨仙寢復土纔於甸邑疲人休功未幾今又重勞營奉朕所哀矜况漢魏二文皆著遺令永言景行常志夙心其山陵制度務從儉約並不得金銀錦綵為飾朕寢疾嵗久以至彌留醫藥伎術之人夙夜無懈念其盡瘁頗謂極誠必在優容務令得所百辟卿士宣力盡忠克申送往之哀宜展事居之禮布告天下明知朕懐元和元年正月十九日唐大詔令集巻十二
