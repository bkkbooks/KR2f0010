body:
  text: 唐大詔令集卷五宋宋敏求編帝王改元下改元建中𠡠奉天改興元元年赦改元貞元並招討河中李懷光淮西李希烈赦改元元和赦改元太和赦改元開成赦改元廣明赦改元天復赦改名武宗改名詔改元下改建中元年𠡠𠡠春秋有五色之統蓋王者踰年建號體元居正上以繼業反始下以書事布䇿示不忍有變於中年也朕以不造銜泣在疚而三事大夫迫至公之命喻大孝之道實奪豫哀為衆所戴恐墜祖宗之遺烈不若先帝之前訓如履薄將陷如乘奔失御濡露之感忽焉嵗初罔極之懷瞻天靡及舊物未改常典惟新勉而從之良增感奉其以大厯十五年改為建中元年所司准式庶協履端於始載符皇極之義也奉天改元建中五年為興元元年正月一日赦門下致理興化必在推誠忘已濟人不吝改過朕嗣服丕構君臨萬邦失守宗祧越在草莽不念率德誠莫追於既往永言思咎期有補於將來明徴厥初以示天下惟我烈祖邁德庇人致俗化於和平拯生靈於塗炭重熙積慶垂二百年伊爾卿尹洎億兆人衆代受亭育以迄於今功存於人澤垂於後肆豫小子獲纘鴻業懼德不嗣罔敢怠荒然以長於深宫之中暗於經國之務積習易溺居安忘危不知稼穡之艱難不察戎役之勞苦澤靡下䆒情不上逹事既壅隔人懷疑阻猶昧省已遂致興戎徴師四方轉餉千里賦車籍馬逺近騷然行齎居送衆庶勞止或一日屢交鋒刃或連年不解甲胄典祀乏主家室靡寧死生流離怨氣凝結力役不息田萊多荒暴令峻於誅求疲氓空於杼軸轉死溝壑離去鄉閭邑里丘墟人煙斷絶天譴於上而朕不悟人怨於下而朕不知馴致亂階變興都邑賊臣乘隙肆逆㴞天曽莫愧畏敢行凌逼萬品失序九廟震驚上纍於祖宗下負於黎庶痛心靦面若墜泉谷賴天地降佑人神叶謀將相竭誠爪牙宣力屏逐大盜載張皇維將𢎞丕猷必布新令朕晨興夕惕惟念前非乃者公卿百寮頻抗章表猥以徽號加於朕躬固辭不獲俯遂輿議昨因內省良用瞿然體隂陽不測之謂神與天地合德之謂聖顧惟淺昧非所宜當文者所以化成武者所以定亂今化之不被亂是用興豈可更徇羣情茍膺虛美重豫不德祗益懷慚自今以後中外所上書奏不得更稱神聖文武之號夫人情不常繫於時化大道既隱亂獄兹豐朕既不能𢎞道得人又不能一法齊衆茍設密網以罹非辜為之父母實增愧悼今上元統厯獻嵗發生宜革紀年之號式敷在宥之澤與人更始以答天休可赦天下改建中五年為興元元年自正月一日以前大辟罪巳下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不原者咸赦除之李希烈田恱王武俊李納等有以忠勞任膺將相有以勳舊繼守藩維朕撫馭乖方信誠不著致令疑懼不自保安兵興以來海內騷擾皆由上失其方而下罹其灾朕實不君人則何罪屈已𢎞物余何愛焉庶懷隱匿之誠以洽好生之德李希烈田恱王武俊李納及所管將士官吏等一切並與洗滌各復爵祿待之如初仍即遣使諸道宣諭朱㴞雖與朱泚連坐路逺未必同謀朕方推至誠務欲𢎞貸如能效順亦與維新其河南河北諸軍兵馬並宜各於本道自固封土勿相侵軼朱泚大為不道棄義滅恩反易天常盜竊名器暴犯陵寢所不忍言獲罪祖宗朕不敢赦其應被朱泚脅從將士官吏百姓及諸色人等有遭其煽誘有迫於凶威茍能自新理可矜宥但官軍未到京城以前能去逆效順及散歸本軍本道皆並從赦例原免一切不問天下左降官即與量移近處已經量移者更與量移流入配𨽻及罰藩鎮效力并緣罪犯與諸使驅使官兼别𠡠於州縣安置及得罪人家口未許歸者一切放還應先有痕纍禁錮及反逆緣坐承前恩赦不該者並宜洗雪亡官失爵放歸勿量加收叙未復資者更與進叙諸色降黜配𨽻人中有才能著聞者特加録用勿拘常例將士等或百戰摧敵萬里勤王捍固金城驅除大憝濟危難者其節著復社稷者其業崇我圖爾功特加彛典錫名減賦永永無窮並賜名奉天定難功臣身有過犯遞減罪三等子孫有過犯減罪二等本户有差徭使役一切蠲除其功臣雖已后身老病患不在軍旅當分糧賜並宜全給身亡之后十年內仍回給家口其有實食封者子孫繼代無絶其餘收録及功賞條件待收京日並依去年十月七日十一月四日敕處分諸道諸軍將士等久勤捍禦纍著功勳方鎮克寧惟爾之績應在行營者並超三資與官仍賜勳三轉其纍加勳爵仍許回受周親內外文武三品已上賜爵一級四品已下各加一階仍並賜勳兩轉見危致命先哲攸貴掩骼埋胔禮經所先雖效用之或殊在惻隱而何間諸道將士有死王事者各委所在州縣給遞送赴本管官為葬祭其有因戰陳殺戮及捕獲伏辜暴骨原野者亦委所在逐近便殯葬應緣流貶犯罪未收葬者並許其家口各據本官品以禮收葬自頃軍旅所給賦役繁興吏因為姦人不堪命咨嗟怨苦道路無聊汔可小康與之休息其墊陌及稅間架竹木茶漆𣙜鐵等諸色名目悉宜停罷京畿之內屬此冦戎攻劫燒焚靡有寧室王師仰給人以重勞特宜減放今年夏稅之半朕以凶醜犯闕遽用于征爰度近郊息駕兹邑供儲克辦師旅攸寧式當褒旌以志豫過其奉天宜升為赤縣百姓並給復五年尚德者教化之所先求賢者邦家之大本永言兹道夢想勞懷而澆薄之風趨競不息幽棲之士寂寞無聞蓋誠所未孚故求之不至天下有隱居行義才德髙逺晦迹丘園不求聞逹者委所在長吏具名聞奏朕當備禮邀致諸色人中有賢良方正能直言極諌及博通墳典逹於教化並識洞韜略堪任將帥者委常參官及所在長吏聞薦天下孤老及鰥寡惸獨不能自活者並委州縣長吏量加優恤其有年九十以上者刺史縣令就門存問義夫節婦孝子順孫旌表門閭終身勿事大兵之后內外耗竭貶食省用宜自朕躬朕當節夫乘輿之服御絶宫室之華飾率已師儉為天下先諸道貢獻自非供宗廟軍國之用一切並停應內外官有冗貟及百司不急之費委中書門下即啇量條件停減聞奏布恩行賞抑惟舊章今以餘孽未平帑藏空竭有乖慶賜深愧於懷赦書有所未該者委所司類例條奏敢以赦前事相言告者以其罪罪之亡命山澤挾藏軍器百日不首復罪如初赦書日行五百里告布遐邇咸使聞知貞元元年正月改元并招討河中李懷光淮西李希烈赦門下王者體元立極欽若乎天地纘承統業嚴奉乎祖宗所以敬事修誠務本敦孝尊其上以御其下謹其身而訓於人百神允懷庶兆永賴國之大典莫重於斯朕燭理不明違道招損往遭大難臨陷都國天地宗祧曠而莫主是欽若嚴奉之義缺矣朕甚懼焉洎再復京師遽將告謝有司以人力耗斁禮物廢墮日居月諸嵗聿云暮卜其近日甫在上春齊心永懷坐以待曙而百辟卿士抗表上言咸謂人心未寧不足以盡敬冦盜猶在不可以告功迫於羣情俯抑誠願郊廟孔邇瞻言莫從悼心慚顔胡寧自處重以和平未洽灾沴荐臻去嵗旱蝗兩河為甚人流不息師出靡居加之以徴求因之以荒饉困窮餒殍轉死丘墟而又關輔之間冬無積雪土膏未發宿麥不滋詳思咎徴其失安在豈兵戎之后餘祲尚在將獄犴之中深寃未息且河中淮右逆將阻兵汚脅齊人陷之死地雖欲自雪厥路無由抱義銜寃足傷和氣此皆由朕寡德播灾於人為之父母實用愧恥今𤣥隂已謝春日載陽勾萌畢申幽蟄咸震思與海內同心自新布澤更元用符天意宜改興元二年為貞元元年自正月一日昧爽已前大辟罪已下已發覺未發覺已結正未結正繫囚見徒罪無輕重咸赦除之改元元和赦朕聞明王之以孝理也必先之以莊敬由一人之至德鼓四表之歡心臻於太和以育庶類則下知禁而不犯上措刑而不用斯道不逺𢎞之在豫朕以寡昧嗣守丕業荷纍聖之洪休稟太上之嚴訓夙夜寅畏不敢荒寧承顔而退有萬幾問寢而下臨四海䖍奉惟眷施於兆人皇王以來孰有斯慶端本之化自豫躬行總百行之源刑四方之理推恩以覆育廣敬以昭事王者要道朕亦庶乎則日月之燭臨可以率俾昆蚑之涵養期於不夭是必家至日見而後化洽刑清圖始所難慎終斯勉猶恐下愚之人因循陷辟官司之長教道未明迫於饑寒遂愆禮節詿誤之罔顧失政之多途哀矜之懷雖得情而勿喜思與公卿大夫及士庶勵翼循省以圖將來且因體元之始覃此維新之澤上報於君父下念於蒼生頒慶紀年鴻恩斯洽可大赦天下改永貞二年為元和元年正月二日昧爽已前大辟罪已下常赦所不原者咸赦除之京畿諸縣今年青苗錢及𣙜酒錢並宜放免地稅率每年量放二升淮江荆襄等十州管內水旱所損四十七州減放米六十萬石稅錢六十萬貫內外文武見任致仕官神䇿六軍諸道將士等各賜爵加勳有差武德以來功臣子孫與官及出身文武常參官觀察節度團練經略刺史六軍大將等父母亡殁與封贈官至德以來任宰相與封贈及諡陜州奉天元從功臣普恩外更賜爵中書門下及外使宰相宜與一子官七品東宫官並與改官其撰冊文官等與一子官及勳爵有差天下百姓髙年者賜米帛羊酒國子監祭酒司業及學官並先取朝廷有德望學識者充東都國子監諸管館共置學生百貟應天下州府每年所稅地子數內宜十分取二均充常平倉及義倉仍各逐處當穩便收貯以時糶糴務在救人太和改元赦朕聞古先哲王之為理也修已以安百姓恤刑以矜庶獄端立政以謹始𢎞厚澤以體仁推其心以及於物誠其中而化於外和氣斯洽休徴以臻故兵革不試而四海寧疵癘不作而三靈泰我有唐祖武祖文光宅天下列聖承統遂康區中漸濡丕冒掩軼前載𢎞兹道以騰英聲煥大文以耀中古惟此鴻業屬於冲人荷無疆之丕構託於兆人之上晝惕宵警惄焉如疚抑惟宗社儲休神祗協力克靖內難恢復皇綱思布和以立極爰正風於更始因體元紀號之典舉肆眚覃恩之命昭我恤隱與人維新可大赦天下改寶厯三年為太和元年正月十三日昧爽以前大辟罪已下罪無輕重已發覺未發覺已結正未結正見繫囚徒常赦所不免者並除之惟十惡五逆及故殺人官典犯入已贓不在免限左降官量移近處已經量移者更與量移其合復資者五品已上中書門下速與處分六品已下任從常例選丁憂去任在憂未赴貶所者服滿日亦與量移如故舊在上都任經本司陳狀不必更待州府申請流貶中縱敕不許量移者及言終身勿齒者亦與依例處分亡官失爵各與收叙痕纍禁錮並從洗滌其沿去年十二月十八日坐纍流𨽻者不在此限應沿上陵制度及喪儀禮物宜委中書門下及諸司長官博詢故實務遵禮度必信必誠副朕哀懷所沿山陵造作及橋道致頓所並以內庫錢物充用如不足以度支户部錢充京兆府今年夏稅青苖量放一半太皇太后第二等已上親大行皇帝皇太后第一等親委中書門下量材叙用九廟子孫陪位者各加兩階仍據始封每王後與一人出身委宗正卿檢尋圖譜取一房最沉翳者充數具名聞奏內外文武官及諸色人任上封事極言得失無有隱諱天下諸色人中有賢良方正能直言極諌者及經學優深可為師法詳間吏理逹於教化軍謀宏逺堪任將帥者常參官及州牧郡守各舉所知無人舉者亦聽自舉並限來年正月到上都今年正月上皇太后尊號及撰即位寶冊文承㫖宣制等官各與一子正員七品官江王府官去年十二月已前在任者並與進改其去年十二月九日立功將士普恩之外三品已上更賜爵一級四品已下更加一階其赴難將軍軍使兵馬使都虞候將士等各與改轉名銜聞奏開成改元赦朕以寡昧祗奉昌圖兢業為心不敢自怠庶乎播祖宗之光烈致區宇之康平推誠不疑惟才是用豈謂奸宄背德宗社將危中外叶謀咸加顯戮知人則哲雖在帝以猶難罪已興懷誠為君之不易緬慙上理良用惕然是用因元正御正殿首明罪已乃布鴻恩王守澄纍朝掌任久握禁兵陳力雖多僣誤難掩交通雜類引進姦邪専弄威權蠧害時政鄭注李訓引見竊恩二三舊臣誣陷非罪誠於寡昧抑其有由遂使姦惡搆連禍起前殿王涯賈餗舒元輿李訓宰輔股肱叶謀不軌王璠郭行餘節將在京率兵上殿羅立言李孝本紀綱臺府深入領徒韓約誘金吾衛兵立成向背魏逄驛騎來往鄭注自出成師將相通謀情狀咸具上天降祐氛祲已消討其本因以正刑辟王守澄既已云亡難議深責特進已上官爵及實封並宜削奪釁已終於既往恩宜覃於有截可大赦天下宜改太和十年為開成元年自正月一日昧爽以前大辟罪已下罪無輕重常赦所不免者咸赦除之其左降官量移復資及才用足稱者中書門下處分流貶人中元敕不許量移及終身勿齒者並與量移其去年因沿朋黨連纍并十一月二十一日坐罪流貶者不在此限其身亡伏法者委所在州府量給棺殮任所親收葬制服其户部度支鹽鐵應有諸色缺負太和五年以前者並放免諸道賀正端午誕降賀冬進奉起今權停三年其錢充紐放百姓兩稅所在除藥物口味茶果外不得輒有進獻百司及諸道應宣索製造一物以上並停三年京畿百姓兩稅已降凡一嵗之內徴取者并百官職田並全放一年其京兆府一年所支用錢物斛斗等並勒鹽鐵以開成元年直進綾絹充還同州河中絳州去年旱歉賦稅不登宜放開成元年夏青苖錢同州賜雜榖六萬河中絳州共賜十萬石委度支户部見貯粟麥充賜三省九列御史臺選黜陟使十人視問風俗進賢退不肖興行新制務令通俗天下鎮戎文武帶憲官者解補進退並須奏聞其邊州令置譯語學官常令教習以逹異意內外文武官及諸色人任上封事極言得失有補時政者必加升擢待以不次其有藏器待時終身岩穴竒節特行可激風俗者委常參官及所在長吏各以名聞文武之道合而兼濟勳臣子弟有能修詞務學應進士明經及通諸科者委有司先加奬引河朔節將以州縣歸國者張茂昭田𢎞正程權各與一子官子弟堪任使者委中書門下量加引用應內外文武官進階加爵有差改元廣明詔朕祗膺寶命嗣守丕祧夙夜一心勤勞八載實欲驅黎元於仁夀致華夏以升平而國步猶艱羣生寡遂災迍荐起冦孽仍臻竊弄干戈連攻郡邑雖輸降欵未息狂謀江左淮南瘡痍既甚湖湘荆漢耕織屢空言念疲羸良深軫惻我心未濟天道何如賴近者嚴勑師徒稍聞勝捷皆列聖之潜祐寧菲德以言功屬節變三陽日當嵗首仍御正殿爰命改元况及發生是宜在宥繼業守文之主握圖御宇之君必自正月吉辰發號施令所以垂千載之懿範固百代之洪基莫不由斯道也可改乾符七年為廣明元年改元天復赦門下三階彗孛暫移宸極之尊兩耀暗昏始表忠正之救朕臨御寡德妖孽殊常䝉塵於便殿之中受制於逆臣之手奪璽捩指備肆侵凌挾刃砧胸幾罹酷毒閉關行僞則公卿不在其謀懸榜見誣則黎庶不堪其詐害我骨肉殺我嬪嬙悖惡㴞天古今未有側陋嘗膽幽害下宫皇穹降悔禍之靈將相竭同心之德鳳翔節度使尚書令岐王茂貞鎮於右輔首激剛腸有食失七筯之驚有車及蒲胥之怒關內之沉幾貫日剛納衛兵夷門之忠憤凌雲顯懲邸吏三藩唱義四海協詞咸以密謀咨於正相於是禁軍之內三傑挺生上𤣥假以良時髙廟付其英斷月正元日新正吉辰質明而逆首梟懸中旦而凶渠剖裂共申匡復皆著功庸尋下詔書遞行賞典而茂貞既平國難來覲天庭驅武旅而簞食爭迎駐皇都而秋毫不犯推殊功以薦同志留愛姪而董雄師繼筠能稟規程肅清輦轂人神洽慶華裔偕來亦既十旬暨於初夏朕以脫於幽辱復正宸嚴重守寶圖不改舊物上愧於列聖下慙於兆人思𢎞蕩穢之恩仍革紀年之號庶明有罪皆在朕躬可大赦天下改光化四年為天復元年四月十五日昧爽已前大辟罪已下罪無輕重已發覺未發覺巳結正未結正繫囚見徒常赦所不原者咸赦除之惟十惡五逆屠牛鑄錢合造毒藥故殺人及持杖行劫者官典犯正入巳贓兼以踰濫身名冒優官秩及刑獄之內官吏用情致成寃濫不問有贓無贓並不在原免之限其劉季述王仲先王彥範薛齊握同謀凶逆徒黨支屬追宥未到者不在赦原之例其踈逺親屬素不通連衆知良善一切不問其左降官非與十一月五日交涉者並與量移元𠡠不在量移者亦與量移已經量移者更與量移近處其情非蠧政心不挾邪曽經兩度量移者便與復資委中書門下酌量處分流人及降流者與移近處如巳收叙者量才叙用其左降官與流人巳逹貶所者或至亡殁家口欲還及須歸葬者任從便如孀幼孤窮不能自濟者則委所在州府量與優恤發遣先有官者各還本官上帝降靈將安丕祚中朝多難爰有純臣登好爵以報殊庸尋行令典錫嘉名而溥大慶用表洪勳靜海軍節度使檢校太保平章事李昭嶺南西道節度使檢校司徒平章事李繼誨寧逺軍節度使檢校司徒平章事李彥弼並早參禁衛纍著勳勤生知忠孝之源洞識君臣之義齊心瀝血果成復國之功左袒一呼遂定安劉之業叔姪繼先臣之烈彥弼稟大父之規據其大勳曠古難比宜加美稱以播無窮繼昭繼誨彥弼宜賜號扶傾濟難忠烈功臣各加實封一百户六軍將士並賜號竭忠定難功臣應接前左右神䇿及諸軍并鳳翔興德兩道立仗兵士等各委所司准例各與優賞以報勤勞宰臣司空崔允揮涕入朝含酸􅊩事防切發於超翔之際但勉謀於談誼之間明大直若屈之機見反經合道之旨忠愛我奮不顧家始則裂帛為誓合契禁軍班列之臣忠良景附再安宗社寧愧古賢雖已疇庸未為報德宜賜回天興祚平難功臣并加實封一百户仍圖形凌煙閣功著定傾名髙死難永言風烈詎廢賞延故尚父子儀贈太師晟贈太尉秀實贈太保瑊贈司徒杲卿贈太師真卿張巡許逺南霽雲等家有主祭祀本房子孫中每家各與一子九品正貟官功格一時賞延後嗣既配廟廷之享仍𫝊棨㦸之門所以勵仗節於千秋勸能臣於百代况新誅叛黨尤景英風武德貞觀以來歷朝配享功臣及安金藏等宜委中書門下各搜訪本房主祭子孫第其勳䕃量其人才各與叙用其有進狀叙陳者委所司磨勘不得令有僣濫關畿不守先帝西巡惟我輔臣首圖義計而故收復京城西面行營諸軍都統鄜夏節度使李思恭揚威北鄙决勝東橋佐鄭畋匡復之謀倅岐陽統制之命提戈奮勇運䇿摧凶終成逐雀之功顯就回鑾之計逮豫初位尚洽嘉謀追矚崇勳宜膺廟食其鄭畋已有别𠡠處分其李思恭宜委中書門下特與加賻仍配享僖宗皇帝廟廷故西面行營副都統涇陽原節度使程宗楚故收復京城行營都統行軍司馬前朔方軍節度使唐𢎞夫各持將節來佐台旌爭鋒而深入王城力屈而銜寃冦壘莫覩歸元之貌空留不朽之勳言念竭忠更隆茂典宜委中書門下並與追贈故南面招討使天平軍節度使曺全政頃當强敵克振竒勳彎弧百戰於陳前奪槊橫飛於馬上天時莫救壯氣空存宜從超等之褒用勸百夫之特委中書門下優與嘉贈有客之詩前經具載繼絶之義歷代所先言念於此豈忘舊典介公酅公各與一子九品正貟官其二王三恪後各委有司准舊制修建夫匡國之臣殁身無悔所祈後代雪彼沉寃太和七年故宰相王涯已下二十七家並見陷逆名本䝉密旨遂令忠憤終被寃誣六十餘年幽魂無訴宜加恩霈用慰泉扄宜並與洗雪各復官資如有子孫在人家隱藏者任自詣闕及州府投狀如非虛謬則與量材叙用故鎮海軍節度使李順節頃嵗姦邪亂政慨慷不平偶泄藏謀遂罹橫禍仍遭誣搆被以罪名雖已行昭雪之文未降褒崇之命宜申縟禮以慰忠魂委中書門下優與追贈寢園之內充奉之間夙夜兢憂應有遺闕其諸陵臺令委中書門下切加選用仍令所司給與優料假丁柏子不得别有役使功須陵料以待栽殖其每年奉陵諸縣差配芟刈人夫不少殊不切用徒為勞擾自今以後但每年芟剃之時委京兆府於本縣苖稅錢數內酌量功價及於陵令遣自和崔人夫委拜陵官常加檢㸃其下宫宇舍委宗正卿京兆尹差官縣司同加檢㸃修飾務致尊嚴維城之重本支之良叙敦是先渥恩當厚其宗室子孫自興德行在及光化元年所放出身及合許非時而參選者並委本司准舊例處分施行切令詳實不得致令踰濫仍令吏部切加磨勘修集之人辛勤可閔訪聞旅食動必逾年皆是吏曺及門下省因循致兹留滯始於磨勘逺至進黃自冬涉春不得了絶自今委中書門下切提舉吏部一事已上並須准舊例程限不得致有淹延自兵興以來吏道全削辦已及期者或衆人恤者幾希遂使桑柘日摧荆榛嵗茂將救黎元之命宜求撫字之仁應兩京畿赤縣委中書門下切加選擇務在得人諸州府縣令録宣三道不得輕有注受切須審以才材畿內編人久罹兵革雖連年豐稔而尚困艱貧念彼瘡痍宜加惻隱應光化元年二年三年秋夏稅合輸納屬府州縣及諸州斛斗草錢等所有逋懸並宜放免不得輒令官吏尚有追徴其去年秋所缺即不在此限郊圻之內兵革以來言念凋殘固宜矜憫差徭人役須羅撓人在司局中之人又宜集事其京兆府每月合差赴飛龍掌間雖是輪差諸縣不免長撓疲人宜令府司於苖稅錢內每月據所差人數目每人支錢送付飛龍司仰自和雇人夫充役途路所先通商是切關畿之地橫賦非宜致物價之益髙自商徒之難濟令鹽鐵司及兩神䇿軍先有兩市雜稅並令停罷自今以後畿內軍鎮不得擅於要路及市井漂渡妄置率稅雜物及牛馬猪羊之類其有違犯者有人紏告以枉法贓論之鎮縣節度級及諸津渡訪聞每年興欺百姓廣有邀求致令滯停切念兩軍京兆府差人覺察顯行痛斷都市之內屋宇未多聞浮造之人常須更出地課將期招葺宜有指揮應諸坊於公私地內浮造屋宇每月地課不得更有收徴甸服生靈正當雕瘵太倉輸納務在均平儻容厚斂之姦頗失憂人之意自今後太倉所納斛斗仰司農卿准舊例坐掌校量之際切在奉公不得先任吏人抑屈百姓且朝廷舊制止有榷酒喪亂以來遂行賣麯本自度營利近年兼借兩軍畿甸之人皆言不便所宜徇衆不廢贍軍起今年五月以後京畿內任自制造私麯仰度支京兆府依舊例於酒店量户大小逐月納𣙜沽錢仍酌量隨月依前借軍諸司充諸色支用其兩軍元造麴制下後便勒逐斤減價六月三十日以前貨賣官麯其私不得更貨賣至七月一日以後不得更賣官麴之限爰自亂離殆將二紀關畿之內掠奪頗多遂令黔首之徒或被丹書之辱眷兹寃抑須杜姦宄舊務買賣奴婢皆須南市署出公劵仍經本縣長吏引檢正身謂之過賤及問父母見在處分明立文劵并關牒太府寺兵戈以來條法廢壞良家血屬流落他門既逺家鄉或遭典賣州府曽不尋勘豪猾得恣欺凌自此准京兆府並依往例處分兩市立正印委所司追納毁棄改給朱記行用其𫝊典賣奴婢如勘問本非賤人見有骨肉證驗可據其賣主并牙人等節級科决其被抑壓之人便還於本家委御史臺切加察定其天下州府如有此色亦仰本道觀察防禦刺史各行條制務絶沉寃堯懸諌鼓禹拜昌言在明哲之尚然實古今之所重况乍祛䝉昧希欽和平思蹇諤而若療朝饑雖激訐而亦不加罪諌官舉職須務濟時其文武常參官素懷術業者任上封章極言得失必當召見親問所陳其有才識幽深事禆時政者加職升擢或藏器俟時隱於岩谷者委文武朝官所在州縣以行實聞薦舉衆目者實資於綱領總庶務者必究乎本根將尋沿革之宜諒繫張弛之道其有事不稽古官不易方欲正濫原須遵故實應有諸司法廢制墜多時未復舊規者自今後宜委諸司各檢舉條録聞奏委中書門下詳酌處分漢徴極諌朝董陳理亂之端晉䇿能言詵立貢闕遺之政乃登道廣請舉公平誠在得人以匡不逮應天下諸色人中有賢良方正能直言極諌博通墳典逹於教化軍謀宏逺政術詳明者文武常參官及諸道節度觀察等使具姓名聞奏薦至十一月到京朕當親臨策試擇其可否施行鮐背燕毛禮經所重即驗頌繫漢詔所矜克存尚齒之規免致遺年之誚天下髙年鰥寡八十以上委所在長吏切加安恤其有不幸者量與葬送仍存撫孤裔嗚呼文王羑里克建周邦太甲桐居用興殷道朕不敢忘大甸之辱公侯宜奬成萬代之功進忠賢以啓政途黜邪佞以懲覆轍庶乎上下共保我髙祖太宗之洪基改名武宗改名詔門下王者照臨萬㝢名豈尚於難知敬順五行理宜避於刑剋徴諸前史義實炳然昔大漢之興洛旁去水所都名號猶乃避之况我國家運昌土德豈可常以王氣勝於君名所以憲宗皇帝繼明之初實以捨水必存冥數叶於貞祥漢宣帝柔服北夷恢𢎞祖業功德之盛侔於周宣御厯十年乃復美稱朕逺推漢主之事近稟聖祖之謀爰擇佳名式遵令典庶承天意永保鴻休宜改名為炎仍令所司擇日分命宰臣告天地宗廟其舊名中外表章不得更有廽避布告逺邇咸使聞知主者施行㑹昌六年二月十二日臣聞運行之道實本於維新稱謂之尊必資於前兆此天人相與之明厯數隂隲之祥恭惟烈光布在方䇿伏惟仁聖文武章天成功神德明道皇帝陛下仁深九有道冠三無紹列聖而垂休奄百王而邁德六氣雖序重之以調均五音雖和資之以損益使刑刻自消於聖厯隂陽未遂於洪爐亦猶周樂去金以享大年之兆漢都罷水用洪繼代之光此皆九廟之靈兆人之慶臣等官叨近密職奉絲綸抃躍之誠倍萬常品謹奉制如右請奉制付外施行唐大詔令集卷五
