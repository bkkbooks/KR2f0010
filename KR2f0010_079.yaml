body:
  text: 唐大詔令集卷一百宋宋敏求編政事官制上致仕官在見任官上詔定三品至九品服色詔置三師詔釐革伎術官制擇揀刺史詔令御史録奏內外官職事詔命新除牧守面辭敕誡百官與供奉人交通制誡勵御史制簡京官為都督刺史詔復置十道按察使敕誡勵尚書省官敕洗滌官吏負犯敕誡勵諸州刺史詔刺史令久在任詔京官都督刺史外迭用敕誡勵吏部兵部禮部掌選知舉官敕誡勵兵吏部兩司敕置十道採訪使敕處分縣令敕二道處分選人敕吏部引見縣令敕官制上致仕官在見任官上詔尚齒重舊先王以之垂範還章解組朝臣於是克終釋菜合樂之禮東膠西序之制養老之義遺文可覩朕恭膺大寶憲章故實永言遺事彌切深衷然情存稽古踵世澆季而䇿名就列或乖大體至若筋力將盡桑榆且迫徒竭夙興之勤未悟夜行之罪其有驚心止足行堪激勵謝事公門收骸閭里能以禮讓固可嘉焉內外文武羣官年在致仕抗表去職者朝參之班宜在見任官上貞觀二年九月定三品至九品服色詔車服以庸昔王令典貴賤有節禮經彞訓末代澆浮采章訛雜卿士無髙卑之序兆庶行僭侈之儀遂使金玉珠璣靡隔於工賈錦繡綺縠下通於皂𨽻習俗為常流遁忘反因循已久莫能懲革朕繼踵百王欽承寶運思𢎞典制垂範後昆永鑒前失義存釐改其冠冕制度已載令文至於尋常服飾未為差等今巳詳定具如别敕宜即頒下咸使聞知貞觀四年八月置三師詔朕觀前代明王聖主曷嘗無師傅哉况朕踵百王之末智不周物其無師傅何以匡朕之不逮詩不云乎不愆不忘率由舊章宜依古道置三師之位貞觀六年二月釐革伎術官制量才授職自有條流常秩清班非無差等比來諸色伎術因營得官及其升遷改從餘任遂使器用紕繆職務乖違不合禮經事須改轍自今本色出身解天文者進轉官不得過太史令音樂者不得過大樂鼓吹署令醫術者不得過尚藥奉御隂陽卜筮者不得過司膳寺諸署令神功元年閏十月揀擇刺史制朕聞彰善疸惡有國之常典糾寬濟猛為政之通規朕以薄德謬膺明命瞻言賞罰未適時宜致使億兆未安賢良未進小人未退貪吏未懲亡流者未歸懷寃者未理倉儲府庫未免其空卿士大夫未任其職在豫之責有愧良深然不能致君於堯舜者亦羣公卿士之所耻也今當勵精為政革弊創業卿等將何以規補致使咸亨各以狀聞朕當親覽且共理天下者在良二千石宜令中書門下於外內官內揀擇必取才望兼優公清特著可以宣風導俗者具以名聞但有司承寬共為茍且事多愆咎無復紀綱各令本司長官審善惡有才職不相當限十日進狀景雲元年十一月令御史録奏內外官職事詔寅亮天功弼諧庶績宰臣之任也彰善疸惡激濁揚清御史之職也政之理亂實此由焉朕丕膺鴻緒三年於兹日旰而食夜分而寢萬乘非樂四海為憂思欲小康蒸人允答羣望懲勸之詔嵗月相仍然耳不聞彈劾之聲目未觀剛正之舉豈內外吏咸未徇公耶將有司回避隱不聞耶每念於此惄焉如疚言而不行責在薄德知而不奏誰其過歟御史等不樹紀綱合從屏黜但緣未親處分志在含忍宜許自新以收後效內外文武官有老弱疾患貪暴侵漁不舉職事材職不相當者三日內各録狀進外州刺史上佐多不簡擇內外之職出入須均京官中有才幹堪理人者量與升官有清慎者與京官景雲二年十月命新除牧守面辭敕敕自古帝王莫能獨理爰樹侯伯所以分政則今刺史是已蓋欲亭之毒之納於富夀不夭不札以致和平朕受天眷命作人父母殷鑒逺圖罔知攸濟頃者都督刺史惟良是求而寂寞厥聲孰副虛想豈六條察舉未詢事以考言將三載黜陟不責實而求當遂令進之則易吏煩於送迎退之則難人務於茍且豈所謂安孤老長子孫之意耶漢宣由是興言劉廣為之長歎誠有旨也今事謀伊始邦政維新俾凝庶績思改前弊自今以後都督刺史每欲赴任皆引面辭朕當親與疇咨用觀方略至任之後宜待四考滿隨事褒貶與之改轉諸州上佐五品以上應改轉限亦宜準此夫類其才則適用久其事則有恆致用執恆未聞不至於理也凡爾在位可弗勉哉先天二年七月二十四日誡百官與供奉人交通制敕朕聞事君者必在至公行已者貴於獨立如聞供奉近侍之輩比日因循廣有招携未能周慎爰與朝列頗相闒茸茍非親表不合數至門庭多行請託便涉趨附眷言此弊須革前非宜體朕懷深自戒勵自今以後百官輒不得與入內供奉人往還敕勵御史制敕御史之職邦憲是司先正其身始可行事當須舉直錯枉不避親讎糾慝繩違務從公正如聞愆過隂自鼓動不即彈射自樹恩私曽無忌憚仍有請託將何以寄之鷹隼用屛豺狼如此當官深負所委自今以後不得更然簡京官為都督刺史詔朕聞天為大者孰先於育物最靈者莫甚於愛人故樹之后王以康兆庶朕緬鑒前烈深惟逺圖懼德之不修化之未偃寅畏夙夜如臨泉壑然則疇咨命於四嶽黜陟存乎三載既已百姓為心非以一人獨理今之牧守古稱侯伯賢者任之則循良之迹著不賢者任之則愁苦之聲作每冀精於所擇委之俞往豈時或頽靡茍且尚多吏之殊尤寂寥不嗣靜言政要朕用憮然間嵗水旱周於郡國倉廪不蓄閭閻薦飢加以出攝頗多冗官增弊至於處置皆憑刺舉當於京官內簡宏才通識堪致理興化者量授都督刺史等久在外藩頻有進狀者量授京官使出入常均永為恆式課最超等必議升遷循默守常必加黜免昭昭賞罰可不慎歟昔國僑相鄭以致和平曹參相齊貴於清淨清淨則不擾不擾則和平和平則不爭不爭則知耻愛費而與休息除煩而從簡易自當農者歸畎畝蠶者勤紡績既富而教乃克有成道德齊禮不逺斯復庶幾在位𢎞朕此心焉開元二年正月復置十道按察使制古者聖王協和萬邦疇咨四嶽柔逺能邇明目達聰以變於人也自朴散醇醨割方四直失於德者格之以禮失於禮者助之以刑故懼羅網而畏簡書必振其綱而操其柄庶乎政之要也間嵗天下諸州嶽牧先充本道按察誠以今之刺舉昔之連率蓋欲為吏之黜陟以審人之愁苦中念作姦犯科獲罪相次棄木或尤於拙匠採葑不遺於下體由是申命有司咸多敘用至於按察暫令休罷夫泉有魚矣雖見則不祥林有獸焉而為之不採與其存而勿用孰若狎以玩之俾乂於時復修其銀青光祿大夫政益州大都督府長史姚雋處置兵馬使上柱國兖國公陸先等早藴宏量深甄大體清能勵俗仁以維風必將檢馭權豪昭明淑忒宜興化以樹善佇責成而求當可依前件餘各如故一事以上並準舊例處分本道所隸之州有偏逺不穩便者仍令所司量宜分割永為定額訖奏聞主者施行開元二年閏二月誡勵尚書省官敕尚書禮閣國之政本郎官之選實藉良才如聞諸司郎中員外怠於理煩業維養望凡厥案牘每多停擁容縱典吏仍有貨財欲使四方何以取則事資先令義在能改宜令當司長官殷勤示語并委左右丞勾當其有與奪不當及稽滯稍多者各以狀聞開元二年六月洗滌官吏負犯制黃門朕聞顔回知過不無過也蘧瑗知非不無非也孔子曰過則勿憚改過而能改善莫大焉此則古之賢人所未能免朕祇膺駿命光闡鴻猷思革頺風以清貪吏作程者不要於密貴於必行行令者不要於嚴貴以適中比嵗或使者廉按或憲司繩糾未能發明大體頗亦委曲小疵殊異恢恢之言遂行察察之事一從過誤永點彛倫銓管不許其棄瑕簿書寧容其刷耻懷才則每嵗見斥登用則終身蔑聞靜言思之誠未為得夫學以從政祿以代農不可易業從政不可紊序永鑒前弊當無廢人改而更張朕之志也官人負犯經洗滌赦宥者宜並除痕選用量舊資依選例處分諸使通狀事或有枉斷豈無失承前要須却纍通狀人當始為雪各懼罪及致有寃人其訴枉屈人任申牒刑部事狀似枉者為牒本使勘問盡其道理無本使者追本案為其尋究應雪者本司斷後委左右丞更審詳覆然後牒所由司除痕並牒紫微黃門附簿諸處百姓若被勾徵使人貪功既不納理州縣承敕又不敢放或已輸巳役重被徵收或先死先逃勒出鄰保欲令貧弱何以安存自今以後有隱欺須勾者宜勾當年若事連去年者亦通任勾隔年以去更不在勾限其官典及前官隱贓在腹內者不在此例布告天下咸使聞知開元四年四月四日誡勵諸州刺史詔朕聞御寰瀛者不可以乖化養黎獻者必存於從理故専一方親百姓有愁苦之聲非牧伯之德所以精求臺閣歷選縉紳常舉百寮之要以光出刾之重虛想佳政用成庶績自冬入計者則循名責實詢事考言雖無等差終未有殊異得非嵗時或淺風教未洽耶故一切不遷各再臨所典至於敬耆老恤煢弱止姦盜伏豪強人不忍欺吏不敢犯田疇開墾獄圄空虛徭賦必平逋逃自復門杜請謁庭無滯留若是者乃聞舉職思可以力致至於弭災眚集休祥尚德義崇禮樂儒風大長化道旁流耕夫克讓織婦知節草木不夭昆蟲咸遂扇彼淳源登兹夀域若是者亦𢎞之在我仁逺乎哉豈惟祿秩就加當以公卿入拜其或靡副朝奬不恭朕言陟既有之黜故宜及勉旃俞往各勤我之休命開元五年七月刺史令久在任詔與我共理惟良二千石久於其政然後可化成前代以來頗多僥幸但因入考即有改轉自今以後非灼然應黜陟者更無遷易敦此風俗冀革茍且又舊例别駕皆是諸親頃年以來頗多餘色先授者未能頓已此後自循舊章去冬有因計入朝不可更令却往過事考了並量材敘用開元六年二月京官都督刺史中外迭用敕敕刺史古之通侯公卿國之重任百揆時敘必在得賢萬邦咸寧期於共理郎官出宰抑惟前事方伯登台聞之往躅頃來朝士出牧例非情願緣沙汰之色或受此官縱使超資尚多懷耻亦有朝廷勳舊暫鎮外臺却任京都無辭降屈且希得入衆以為榮為官擇人豈合如此自今以後諸司清望官闕先於牧守內精擇都督刺史却向京官中簡授其臺郎以下除改亦於上佐縣令中通取俾中外迭用賢良靡遺庶績其凝九功惟允即宜銓擇以副朕懷開元八年七月誡勵吏部兵部禮部掌選知舉官敕孫逖敕官邪則敗國賞僭則利淫自昔至言政之明誡朕祗膺大寶豈忘兢惕臨御以來且踰二紀期大道之成化冀天下之為公凡百卿士豈不協力而選舉之司委任尤重若名器失序則勸沮何施近者流外銓曹頗多踰濫有塵清議實紊彞章胥吏之徒雖則微賤仕進之路終為厥初必澄源流無雜涇渭不慎於細其傷則多小既不可不懲大亦不可不誡其吏部兵部禮部掌選知舉官等各宜飭勵當盡至公必須杜邪枉之門塞請託之路何止一變仍圖永清且銓綜九流必仗賢俊取諸賞鑒立斷可知何至淹時致稽團奏開門之後餘甲未終既滯官曹長前罪過舊選未畢新格復修此乃因循實為煩弊自今以後吏部選人三月三十日以前團奏事畢兵部二月內畢其流外銓及武舉專委郎官恐不詳悉共為取捨適表公慿每至留放之時皆就尚書侍郎對定既上下檢察庶在得人而覆車尚存殷鑒非逺法不可廢宜識朕懷誡勵兵吏部兩司敕敕設官分職將以奉法禁非實在上下叶心中外一德共熙庶績用絶姦源如聞百司頗皆寬縱遂令胥吏得以挾私近者兵部令吏因令推鞫或在選曹增減文狀雖小人之過則惟其常永言在司官亦為疏略朕今申之寬宥許以自新庶觀將來冀能效節至如兵吏兩司是掌衡鏡進趨者非一揆姦巧者亦百端推而言之或所未免無謂幽昧朕皆察焉宜各盡心靖恭爾位置十道採訪使敕張九齡敕嵗比不登人或流冗言念菜色朕用疚懷而牧宰是寄惠養猶缺黎元為本賦斂未均當寧思之良所於邑且十道為率六察分條周漢以還事有因革帝王之制義在隨時其天下諸道宜依舊逐要便置使令採訪處置若牧宰無政不能綱理吏人有犯所在侵漁及物土異宜人情不便差科賦稅量事取安朕所責成貴在簡要其餘常務不可橫干其便宜令中書門下即簡擇奏聞朕將親覽開元二十二年二月十九日處分縣令敕二道張九齡敕旨語諸縣令等自古致理其在命官今之所切莫如守宰朕每屬意尤重此官有善者雖逺必升無能者縱近而廢固已維取才實非務官資事亦坦然天下所見而浮競之輩未識朕懷俾其宰邑便為棄地或以煩碎而不専意或以僻逺而不畏法侵染成俗妨奪為恆嗷嗷下人於何寄命朕所以寢興軫念思有以濟之故令吏曹精選才幹卿等各膺推擇用簡朕心若能化績有成聲實相副朕必有超擢終不食言如其謂人不知唯利是視徒速負敗兩喪身名智者所圖應不至是各宜勉勵以副勤屬開元年又敕新除河南府密縣令張稷等令長之任黎庶尤切比嘗選衆未盡得人然而勇進之流乃非其好矯弊之政豈無所革令既各膺奬用當盡良能周月有成聲謡若著所列清要唯待才賢既爾有聞不患無位各宜勉勵以副朕心開元年處分選人敕敕朕憫兹下人不忘鑒寐庶乎富教寄在牧宰所以推擇才能親加考核卿等各膺時用副朕虛求亦既得人佇聞佳政若能精鋭為理聲績有稱即當待以不次信斯言之可復如其政不能舉行且有遺豈獨敗於厥躬必將坐於舉主此亦明訓不得不然各宜勉之以成名節今賜卿少物各宜領取並於朝堂坐食食訖好去開元年吏部引見縣令敕唐虞致理命以子男周漢建官間以令宰朕稽古前哲寤寐全才委之銓衡慎擇銅墨至於上敷朝政下安淳人親其農桑均其力役使惸嫠者視之猶父母俾匱乏者賴之以安全然後八使類能六條舉最擢以含香粉署奬以秋簡霜臺是乃立身效官移忠入仕榮家報國豈不美歟若徇已冒私擾人敗政有懷潤屋無懼害公豈唯刑網貽憂抑亦名節墮替蓋士君子之不取亦名教之罪人鴻漸於盤豈不勉哉今卿等將欲赴官朕之所言提撕之耳所謂聽訟吾猶人也必也使無訟乎况今之人也與古人不殊今之官也與古官無别則榖璧銅印其猶昔榮而卓茂魯恭逈然無繼將奬勸之道不致豈淳朴之風未還撫事君臨載深惕厲今者庶乎卿等能副此心賞既超倫刑必當法各宜自勉敷我皇猷無謂蓋髙四聰必逹並即於朝堂坐食食訖好去天寶十三載五月唐大詔令集卷一百
