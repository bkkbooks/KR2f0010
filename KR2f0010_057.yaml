body:
  text: 唐大詔令集巻六十七宋宋敏求編典禮南郊一貞觀十七年冬至有事南郊詔祭圓丘明堂並以髙祖太宗配詔郊禮唯昊天開元十一年郊天制命宰臣等分祭郊廟社稷勅外壇入廟行事官先去劍佩及履勅天寳元年南郊制每載四孟合祭天地詔天寳五載南郊詔元年建子月祭圓丘詔百官議大禮期日勅罷告謝郊廟勅以旱停南郊勅南郊一貞觀十七年冬至有事南郊詔朕聞上靈之應疾於影響茂祉之興積於年代朕嗣膺寳厯君臨區宇憑宗社之介福賴文武之同心時無風塵之驚野有京坻之積厚地降祉貞石表祥瑩翠色而流光發賁質而成宇前紀厥初之德次演卜年之永復述儲貳之美並名字昭然楷則相次曠代之所未聞故老之所未覩猥以寡德䖍奉成命𬗟惟往載良増兢惕自天之祐豈惟一人無疆之福方覃九土自非大報泰壇稽首上帝則靡伸奉天之志寧副臨下之心今年冬至有事南郊所司率由舊典十月祭圓丘明堂並以髙祖太宗配詔夫受命承天崇至敬於明祀膺圖纂籙昭大孝於嚴配是以薦鰷鱨於清廟集振鷺於西雍宣雅頌於太師明肅恭於考室用能紀配天之盛業嗣積德之鴻基永播英聲長為稱首自周京道䘮秦室政乖禮樂淪亡典經殘滅遂使漢朝博士空説六宗之文晉代鴻儒爭陳七事之議或同昊天於五帝或分感帝於五行自茲以降逓相祖述異論紛紜是非莫定朕以寡薄嗣膺不緒肅承禋祀明發載懷䖍奉宗祧寤寐興感每惟宗廟之重尊配之宜思革舊章以申誠敬禮曰化人之道莫急於禮禮有五經莫重於祭祭者非自外至也自内生於心也是以惟賢者乃能盡祭之義况祖功宗德道冠百王盡聖窮神義髙千古自今以後祭圓丘明堂感帝神州等祠髙祖太武皇帝太宗皇帝崇配仍總祭昊天上帝及五天帝於明堂庶因心致敬獲展䖍誠宗祀配天永光鴻烈乾封二年十二月郊禮唯昊天稱天五帝只稱帝制天無二稱帝是通名承前諸儒樂生同異乃以五方之當亦謂之為天假有經𫝊樂文經是名實未嘗稱號不别尊卑相混自今郊之禮唯昊天上帝稱天自餘五帝皆稱帝永昌元年九月開元十一年郊天制帝王承天必崇告𩔖之典文武尊祖是導嚴訓之義所以克荷成命昭升前烈葢王者之子道乃聖人之神教朕以寡昧猥承丕緒獲主祭祀一紀於茲輔相之宜下不足以被物馨香之德上不足以動天故歳或不祭刑且未恤内省為愧大禮猶鬱星晷聚遷夙夜祗懼今四夷内附諸侯率職羣生和洽萬物阜蕃猶恐教化未孚求之皇極誠有不達觀於國風故親廵岱阿祈榖睢上神歆有答歳物以豐此先聖無疆之休上𤣥啟祐之貺冀因報謁式展誠敬宜以迎日之至允備郊天之禮所司詳擇舊典以聞九月命宰臣等分祭郊廟社稷制孫逖勅時和年豐神所福也精意備物祭之義也朕每為蒼生常祈稔歳徴誠有感丕應乃彰今宗社降靈神祗效祉三時不害百穀用成遂使京坻遍於天下和平之氣既無逺而不通禋祀之典亦有祈而必報宜令兵部尚書兼中書令晉國公李林甫工部尚書同中書門下三品豳國公牛仙客即分祭郊廟社稷尚書左丞相裴耀卿祭中岳禮部尚書杜暹祭東岳御史大夫李適之祭西岳太子賔客王丘祭北岳國子祭酒張説祭南岳其四瀆四海四鎮及諸名山靈跡等各委所由州長官祭仍令所司即擇日奏聞務於蠲潔之禮以致精明之德冀申誠懇如朕預焉道釋二門𤣥通衆妙濟時育物皆有明徴是所依憑豈忘尊奉其天下寺觀並令量修功德用齊三聖之教以叶百靈之心宜嗣虚懷各陳至敬者也開元二十五年十月升壇入廟行事官先去劍佩及履勅勅精意曰禋吉蠲為享茍乖此義何以降神如聞比来祭官及監祭使等雖受齋戒殊乏䖍潔如在之誠豈其然歟又虛心好靜神聽無聲倘致喧煩尤非致敬自今以後升壇入廟行事官並去劍佩及履咸宜勉勵仍逓相糺察如或因循當别有處分天寳元年南郊制神之降休禮無不答永言禋祀必在躬親朕粤自君臨載𢎞道教崇清淨之化暢𤣥元之風庶乎澤及蒼生時臻夀域積以歳月未嘗懈怠豈謂休徴感通烈祖降見乃昭靈命是錫寳符因而求之應言而獲亦既至止果獲殊徴諒惟秘詞不可詳説然邦家大慶何以過焉是知神仙所緘造化同體爰初有待經韞櫝而多時潛應改元若符契之相合景福攸介祗畏良深而羣官宗室抗疏於外元良諸子屢請於中逮夫緇黄兼彼耆耋懇誠不已前後相仍願加天寳之名用益開元之號顧惟菲薄曷以當之然則𤣥貺在乎欽承人心難以稱拒順天從衆議叶至公敬依所請實用多愧斯盖上𤣥厚載爰及百神孚佑効靈通於睿祖幽贊惟新之歴克彰永代之祥宜遵祀典式陳昭報可以来月十五日祔𤣥元皇帝廟十八日享太廟二十日有事於南郊宜令中書門下典禮官等即詳定禮儀具錄奏聞應縁行事及檢校官等各委有司不須别差人執當其北郊宜差公卿擇日祭五嶽四瀆及名山大川各令所在長官備禮陳祭務申誠敬副朕意焉每載四孟合祭天地詔皇天之典聿循於百代郊祭之義允屬於三靈聖人既因時以制宜王者必縁情以革禮朕丕承寳運肅遵明禋曷嘗不克己齋心䖍恭夙夜猶慮舊章或闕誠敬未孚有一於此良深祗畏且尊莫大於天地祀莫大於祖宗嚴配昭升豈宜異數令蒸嘗之獻不著於常式南北之郊未展於時享粢盛且畧對越何申自今以後每載四時孟月先擇吉日祭上帝其皇地祗合祭以次日祭九宫壇皆令宰臣行禮務崇蠲潔稱朕意焉祭神如在傳諸古訓以多為貴著有禮經膟膋之儀盖昔賢之尚質甘㫖之品亦孝思之盡誠既切因心方資爰禮其已後享太廟宜料每室加常食一牙盤仍令所司務盡豐潔發生振蟄雷為其始畫卦陳象威物效靈氣實本於隂陽功乃施於動植今雨師風伯乆列常祀唯此震霆未登羣望其巳後每祀雨師宜雷神同祭朕承宗廟之福為人神之主事有未暢義在得中庶寅畏之誠上達於郊廟祈禳之典載收於闕遺凡在有司各揚所職倍宜恭肅以叶靈心天寳五載南郊詔孝享宗廟所以達思誠也格於神祗所以崇嚴敬也則祈榖上帝春祠先王永惟因心敢忘如在朕承累聖之丕業膺上穹之景祐聿循柴燎䖍奉蒸嘗慮偹物未豐馨香莫達頃以詳諸舊典創以新儀清廟犧牲特加於常餼昊天冬祭重増以時享庶乎展敬之勤克叶殷薦之義况履玆霜露載感惟深瞻彼郊壇有懷昭事今禮崇昭報諒期乎達誠教在率先必貴乎親奠宜以来載正月朕親謁太廟便於南郊合祭仍令中書門下即與禮官詳定儀注擇日奏聞興言拜獻先深祗感凡百有司各供爾職元年建子月祭圓丘詔皇王俯仰應協於靈祗典禮廢興式存於禋告葢重成命以崇祗肅朕獲嗣鴻猷敢忘䖍敬頃以三代正朔所尚不同百王徽號無聞異稱顧玆薄德思創常規爰因行慶之日將務惟新之典而建元立則制命膺符受於天地祖宗申於百辟卿士今既循諸古法讓彼虚名革故之宜以宣於臣下昭報之道未展於郊廟因時備禮擇日陳誠克明恭已之心庶降庇人之福至誠斯感其在兹乎宜取今月二十八日朝獻太清宫二十九日享太廟光獻廟来月一日祭圓丘及太一壇百官議大禮期日勅勅朕自遷越旋於京師將欲請罪祖宗告謝天地所司選日行有期矣議者多以大盜之後人勞靡居懼愆歳功請俟農隙若俯順羣議則私懷不安將祗率舊章又疲甿重擾夙夜憂惕罔知所裁宜令常㕘官集議中書門下詳其折衷聞奏罷告謝郊廟勅朕一經遷越久曠禮儀不唯霜露之感實貽失墜之憂賴先澤在人上帝臨我克平大難載復舊京方欲展禮郊丘請罪宗廟而乃祖宗股肱卿士詢謀異同明孝敬之大端陳古今之正議三省章表深體乃誠以義制心允從衆請予之不德愧歎良深其来年告謝郊廟百寮請俟後期者可之其元日御含元殿准式以旱停南郊勅今年郊畿亢旱自夏訖冬以隂陽之久有錯違懼粢盛之或未豐潔祖宗上帝鑒臨左右德馨未達惕焉在懷改龜薦誠以俟祥歳酌諸典禮亦謂合宜其来年南郊宜停太和年唐大詔令集巻六十七
