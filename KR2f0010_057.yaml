body:
  text: 唐大詔令集卷六十七宋宋敏求編典禮南郊一貞觀十七年冬至有事南郊詔祭圓丘明堂並以髙祖太宗配詔郊禮唯昊天開元十一年郊天制命宰臣等分祭郊廟社稷敕外壇入廟行事官先去劍佩及履敕天寶元年南郊制每載四孟合祭天地詔天寶五載南郊詔元年建子月祭圓丘詔百官議大禮期日敕罷告謝郊廟敕以旱停南郊敕南郊一貞觀十七年冬至有事南郊詔朕聞上靈之應疾於影響茂祉之興積於年代朕嗣膺寶厯君臨區宇憑宗社之介福賴文武之同心時無風塵之驚野有京坻之積厚地降祉貞石表祥瑩翠色而流光發賁質而成宇前紀厥初之德次演卜年之永復述儲二之美並名字昭然楷則相次曠代之所未聞故老之所未覩猥以寡德䖍奉成命𬗟惟往載良增兢惕自天之祐豈惟一人無疆之福方覃九土自非大報泰壇稽首上帝則靡伸奉天之志寧副臨下之心今年冬至有事南郊所司率由舊典十月祭圓丘明堂並以髙祖太宗配詔夫受命承天崇至敬於明祀膺圖纂籙昭大孝於嚴配是以薦鰷鱨於清廟集振鷺於西雍宣雅頌於太師明肅恭於考室用能紀配天之盛業嗣積德之鴻基永播英聲長為稱首自周京道喪秦室政乖禮樂淪亡典經殘滅遂使漢朝博士空說六宗之文晉代鴻儒爭陳七事之議或同昊天於五帝或分感帝於五行自茲以降遞相祖述異論紛紜是非莫定朕以寡薄嗣膺不緒肅承禋祀明發載懷䖍奉宗祧寤寐興感每惟宗廟之重尊配之宜思革舊章以申誠敬禮曰化人之道莫急於禮禮有五經莫重於祭祭者非自外至也自內生於心也是以惟賢者乃能盡祭之義况祖功宗德道冠百王盡聖窮神義髙千古自今以後祭圓丘明堂感帝神州等祠髙祖太武皇帝太宗皇帝崇配仍總祭昊天上帝及五天帝於明堂庶因心致敬獲展䖍誠宗祀配天永光鴻烈乾封二年十二月郊禮唯昊天稱天五帝只稱帝制天無二稱帝是通名承前諸儒樂生同異乃以五方之當亦謂之為天假有經𫝊樂文經是名實未嘗稱號不别尊卑相混自今郊之禮唯昊天上帝稱天自餘五帝皆稱帝永昌元年九月開元十一年郊天制帝王承天必崇告類之典文武尊祖是導嚴訓之義所以克荷成命昭升前烈蓋王者之子道乃聖人之神教朕以寡昧猥承丕緒獲主祭祀一紀於茲輔相之宜下不足以被物馨香之德上不足以動天故歲或不祭刑且未恤內省為愧大禮猶鬱星晷聚遷夙夜祗懼今四夷內附諸侯率職羣生和洽萬物阜蕃猶恐教化未孚求之皇極誠有不達觀於國風故親巡岱阿祈榖睢上神歆有答歲物以豐此先聖無疆之休上𤣥啓祐之貺冀因報謁式展誠敬宜以迎日之至允備郊天之禮所司詳擇舊典以聞九月命宰臣等分祭郊廟社稷制孫逖敕時和年豐神所福也精意備物祭之義也朕每為蒼生常祈稔歲徴誠有感丕應乃彰今宗社降靈神祗效祉三時不害百穀用成遂使京坻遍於天下和平之氣既無逺而不通禋祀之典亦有祈而必報宜令兵部尚書兼中書令晉國公李林甫工部尚書同中書門下三品豳國公牛仙客即分祭郊廟社稷尚書左丞相裴耀卿祭中嶽禮部尚書杜暹祭東嶽御史大夫李適之祭西嶽太子賔客王丘祭北嶽國子祭酒張說祭南嶽其四瀆四海四鎮及諸名山靈跡等各委所由州長官祭仍令所司即擇日奏聞務於蠲潔之禮以致精明之德冀申誠懇如朕預焉道釋二門𤣥通衆妙濟時育物皆有明徴是所依憑豈忘尊奉其天下寺觀並令量修功德用齊三聖之教以叶百靈之心宜嗣虛懷各陳至敬者也開元二十五年十月升壇入廟行事官先去劍佩及履敕敕精意曰禋吉蠲為享茍乖此義何以降神如聞比來祭官及監祭使等雖受齊戒殊乏䖍潔如在之誠豈其然歟又虛心好靜神聽無聲倘致喧煩尤非致敬自今以後升壇入廟行事官並去劍佩及履咸宜勉勵仍遞相糾察如或因循當别有處分天寶元年南郊制神之降休禮無不答永言禋祀必在躬親朕粵自君臨載𢎞道教崇清淨之化暢𤣥元之風庶乎澤及蒼生時臻夀域積以歲月未嘗懈怠豈謂休徴感通烈祖降見乃昭靈命是錫寶符因而求之應言而獲亦既至止果獲殊徴諒惟祕詞不可詳說然邦家大慶何以過焉是知神仙所緘造化同體爰初有待經韞櫝而多時潛應改元若符契之相合景福攸介祗畏良深而羣官宗室抗疏於外元良諸子屢請於中逮夫緇黃兼彼耆耋懇誠不已前後相仍願加天寶之名用益開元之號顧惟菲薄曷以當之然則𤣥貺在乎欽承人心難以稱拒順天從衆議叶至公敬依所請實用多愧斯蓋上𤣥厚載爰及百神孚佑效靈通於睿祖幽贊惟新之歷克彰永代之祥宜遵祀典式陳昭報可以來月十五日祔𤣥元皇帝廟十八日享太廟二十日有事於南郊宜令中書門下典禮官等即詳定禮儀具録奏聞應緣行事及檢校官等各委有司不須别差人執當其北郊宜差公卿擇日祭五嶽四瀆及名山大川各令所在長官備禮陳祭務申誠敬副朕意焉每載四孟合祭天地詔皇天之典聿循於百代郊祭之義允屬於三靈聖人既因時以制宜王者必緣情以革禮朕丕承寶運肅遵明禋曷嘗不克己齊心䖍恭夙夜猶慮舊章或闕誠敬未孚有一於此良深祗畏且尊莫大於天地祀莫大於祖宗嚴配昭升豈宜異數令蒸嘗之獻不著於常式南北之郊未展於時享粢盛且略對越何申自今以後每載四時孟月先擇吉日祭上帝其皇地祗合祭以次日祭九宫壇皆令宰臣行禮務崇蠲潔稱朕意焉祭神如在傳諸古訓以多為貴著有禮經膟膋之儀蓋昔賢之尚質甘㫖之品亦孝思之盡誠既切因心方資爰禮其已後享太廟宜料每室加常食一牙盤仍令所司務盡豐潔發生振蟄雷為其始畫卦陳象威物效靈氣實本於隂陽功乃施於動植今雨師風伯久列常祀唯此震霆未登羣望其巳後每祀雨師宜雷神同祭朕承宗廟之福為人神之主事有未暢義在得中庶寅畏之誠上達於郊廟祈禳之典載收於闕遺凡在有司各揚所職倍宜恭肅以叶靈心天寶五載南郊詔孝享宗廟所以達思誠也格於神祗所以崇嚴敬也則祈榖上帝春祠先王永惟因心敢忘如在朕承纍聖之丕業膺上穹之景祐聿循柴燎䖍奉蒸嘗慮偹物未豐馨香莫達頃以詳諸舊典創以新儀清廟犧牲特加於常餼昊天冬祭重增以時享庶乎展敬之勤克叶殷薦之義况履茲霜露載感惟深瞻彼郊壇有懷昭事今禮崇昭報諒期乎達誠教在率先必貴乎親奠宜以來載正月朕親謁太廟便於南郊合祭仍令中書門下即與禮官詳定儀注擇日奏聞興言拜獻先深祗感凡百有司各供爾職元年建子月祭圓丘詔皇王俯仰應協於靈祗典禮廢興式存於禋告蓋重成命以崇祗肅朕獲嗣鴻猷敢忘䖍敬頃以三代正朔所尚不同百王徽號無聞異稱顧茲薄德思創常規爰因行慶之日將務惟新之典而建元立則制命膺符受於天地祖宗申於百辟卿士今既循諸古法讓彼虛名革故之宜以宣於臣下昭報之道未展於郊廟因時備禮擇日陳誠克明恭已之心庶降庇人之福至誠斯感其在兹乎宜取今月二十八日朝獻太清宫二十九日享太廟光獻廟來月一日祭圓丘及太一壇百官議大禮期日敕敕朕自遷越旋於京師將欲請罪祖宗告謝天地所司選日行有期矣議者多以大盜之後人勞靡居懼愆歲功請俟農隙若俯順羣議則私懷不安將祗率舊章又疲氓重擾夙夜憂惕罔知所裁宜令常參官集議中書門下詳其折衷聞奏罷告謝郊廟敕朕一經遷越久曠禮儀不唯霜露之感實貽失墜之憂賴先澤在人上帝臨我克平大難載復舊京方欲展禮郊丘請罪宗廟而乃祖宗股肱卿士詢謀異同明孝敬之大端陳古今之正議三省章表深體乃誠以義制心允從衆請豫之不德愧歎良深其來年告謝郊廟百寮請俟後期者可之其元日御含元殿准式以旱停南郊敕今年郊畿亢旱自夏訖冬以隂陽之久有錯違懼粢盛之或未豐潔祖宗上帝鑒臨左右德馨未達惕焉在懷改龜薦誠以俟祥歲酌諸典禮亦謂合宜其來年南郊宜停太和年唐大詔令集卷六十七
