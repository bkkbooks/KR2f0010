body:
  text: 唐大詔令集卷四十二宋宋敏求編公主出降公主王妃不許舅姑父母答拜詔詳定公主郡縣主出降儀敕出降册文册興信公主出降文册樂成公主出降文册壽光公主出降文册平昌公主出降文册廣寧公主出降文册晉寧公主出降文册嘉成公主出降文加實封太平公主加實封制長寧安樂公主加實封制宣城公主加實封制鎮國太平公主加實封制常芬公主食實封制和蕃止和蕃公主入朝制缺金城公主降吐蕃制封永樂公主制缺封燕郡公主制封東光公主制封和義公主制封寧國公主制和蕃册文册金城公主文册交河公主文册和回紇公主文册崇徽公主文遣黜郜國大長公主别館安置敕追封追封華陽公主制追封玉虛公主制追封齊國大長公主制贈故同昌公主衛國公制諡議安興公主諡議文出降公主王妃不許舅姑父母答拜詔天地之尊人倫巳極舅姑之敬禮經攸重茍違斯義有斁彞則如聞公主出降王妃作嬪舅姑父母降禮答拜此乃子道攸替婦德不修何以式序家邦儀型列閫自今以後可明加禁斷使一依禮法若更有以貴加於所生者令所司隨事糾聞顯慶二年二月詳定公主郡縣主出降儀敕冠婚之義人倫大經昔唐堯降嬪帝乙歸妹逮於漢氏同姓主之爰自近古禮教陵替公主郡主法度僭差姻族闕齒胄之儀舅姑有拜下之禮自家刑國有愧古人今縣主有行將俟嘉命俾親執棗栗以見舅姑敬遵宗婦之儀降就家人之禮事資變革以抑浮華宜令禮儀使與禮官約古今儀禮詳定公主郡縣主出降覿靣之儀以聞出降册文册興信公主出降文維開元二十九年歲次辛巳閏四月辛巳朔十八日戊戌皇帝若曰於戲先王作則女子有行必開湯沐之封以成雍肅之美咨爾興信公主自幼及長含和尚柔鑒圖史而思齊勤組紃而無斁能遵法度克茂幽間教於公宫既昭雅訓歸於外館宜穆彞章今遣使吏部尚書兼中書持節徐安貞持節禮册爾其益自修飾不忘誡慎俾昭淑問貽永無窮可不慎歟册樂成公主出降文維天寶五載歲次庚戍七月辛亥朔二十三日壬申皇帝若曰於戲三綱以正王化是先二姓之合人倫式敘下嫁之禮厥惟舊章咨爾樂成公主育質柔明稟性間婉幼彰惠問長有令儀教於公宫頗閲於圖史導以內則克勤於纂組瓊筓既襲紺綬斯榮方諧卜鳯之期式叶從人之典今遣特進行尚書右僕射兼左相吏部尚書晉國公林甫持節册命往欽哉爾其祗率外禮虔恭中饋順而不違謙而不滿日新其德以正家人可不慎歟册夀光公主出降文維天寶五載歲次庚戌八月辛巳朔十三日癸巳皇帝若曰於戲家人以正易著乎詞女子有行詩載其義王化之本婦道攸先咨爾夀光公主敏質柔間資性純懿芳襟內穆淑問外宣能遵阿保之訓頗聞詩書之旨習茲彤史既稟教於中闈襲以瓊笄斯待年於外館龜謀允叶鸞節方舒率是舊章式茲典禮今遣使光祿大夫行門下侍郎同中書門下平章事陳希烈副使中大夫給事中王夀持節禮册往欽哉爾其祗勤敬德斧藻令儀履順居中以永終譽可不慎歟册平昌公主出降文維天寶五載歲次庚戌十二月戊申朔九日丙辰皇帝若曰於戲婚姻之序人倫為大家道以正王化乃貞咨爾平昌公主性質間婉襟靈敏悟柔順外徽和惠內融公宫道訓備聞勤儉之則女史針規克慎言容之範頗聞圖象既習紘綖方修中饋之儀式從下嫁之禮罽車遵路卺庋在庭歸爾好仇申旌寵典今遣使特進行尚書左僕射右相吏部尚書晉國公李林甫副使朝散大夫守中書舍人李暐持節禮册往欽哉爾其虔修令德祗服厥訓循於法度宜爾室家可不慎歟册廣寧公主出降文維天寶九載歲次庚寅四月已未朔二十六日甲申皇帝若曰於戲本於王化正乃人倫始於國風成於婦道咨爾廣寧公主柔儀明婉淑性和惠端間外肅敏悟內昭稟訓公宫法度彰於懿範受教女師言容順於閫德頗聞圖史能習組紃方遵下嫁之儀式備親迎之禮三星逮吉百兩于歸申以徽章𢎞茲寵命今遣使特進行左相兼兵部尚書崇玄館大學士集賢院𢎞文館大學士上柱國潁川郡開國公陳希烈副使正議大夫給事中權知刑部侍郎上柱國渭源縣開國男李麟持節禮册往欽哉爾其祗膺典禮勤修內則宜爾家室叶於雍肅可不慎歟册晉寧公主出降文常袞維大厯七年歲次壬子七月庚辰朔十六日乙未皇帝若曰於戲春秋之義下嫁之禮主於同姓送以上卿克明大倫協用彞典咨爾晉寧公主孝敬間婉朗然夙成法度言容資於內訓詞禮是則令淑增華封魯之榮已開湯沐適齊之美史洽肅雍寵爾有行舉茲成命今遣使金紫光祿大夫門下侍郎同中書門下平章兼𢎞文館大學士知館事充太清宫使上柱國齊國公王晉持節禮册爾其奉公宫之教和邦族之姻載揚夙徽永作來範敬承明誡可不慎歟册嘉成公主出降文維貞元二年歲次乙丑六月甲子朔十二日乙亥皇帝若曰王者以義睦宗親以禮敦風化義之深實先於友愛禮之重莫大於婚姻故春秋書築館之儀易象著歸妹之吉豫用是祗考明義率由舊章咨爾嘉成公主特稟生知秉承光訓行必中則意不違仁柔謙孝友惠和純懿嘉乃全德時惟成人疏邑啓封命為公主徽章備物禮實宜之今遣使金紫光祿大夫檢校司徒同中書門下平章事汧國公勉持節册命於戲戒哉下嫁諸侯諒為古制肅雍之德見美詩人和可以克家敬可以行已奉若茲道永孚於休𢡟昭令問無替朕命光膺盛禮可不慎歟加實封太平公主加實封制鸞臺睦親之序誠有節而難踰褒善之方諒無私而可洽太平公主延祥紫極稟慶彤闈月至漸宫下金娥而育照星分漢渚回寶婺以凝姿踐素依仁更緝柔間之範聞詩踐禮還裝婉順之容育悟發於天機聰敏協於神授所以特鍾先愛偏荷聖慈動輒承恩言必中旨故秦臺下鳯禮越於常儀魯館乘龍榮該於美選自蜃軒既路蛩巖閟寢途遙千里時亢九炎攀從莫由荒號孰寄公主親承委屬代申悲苦涉履山川念徒行而彌切奠奉明夕哀獨薦而逾勤宫務畢修闈容胥備中外咸允情理兼極朕以某雖有殊效蓋是恆途而凡典樞機固申奏請豈可以私親之嫌纍夫公道之平分宜增湯沐之榮以表肅雍之譽可加實封長寧安樂公主加實封制門下長寧公主安樂公主等金波育彩寶婺凝輝藴詩禮於心臺暢柔明於性府肅雍成德婉娩居懷非弄玉之能方豈修瑶之是美特荷掌中之愛尤鍾膝下之慈宜錫寵榮再崇湯沐可更加食實封一千戶通前滿二千戶宣城公主加實封制門下敦族睦親事光彞典分形共氣理冠恆倫宣城公主慶聫霄極榮開邸館柔和應圖婉順為範義歸從子榮匪求即國難初平朝奬思及宜加井賦式崇優寵可加實封五百戶鎮國太平公主加實封制門下功定宗社者可以髙邁等夷事超縑簡者故能永昭徽烈鎮國太平公主若華分景穠李疏芳以同氣之親鍾先朝之愛忠孝行巳仁明絶倫才無不周識無不綜頃夷國難爰戴朕躬忠義動天懇誠貫日氛祲巳廓每聽鳴謙之詞井田未優復聞辭貴之請朕方至公被物豈以小節從人宜增土宇更傳帶礪可加實封一千戶常芬公主食實封制常芬公主公宫成訓歸妹有儀錫號疏封雖以洽於前典推恩食邑猶未崇於後命宜書沐賦之榮式昭築館之義可食實封五百戶用今年九月丁巳出降張去盈所司詳備禮物式遵故事開元十九年和蕃金城公主降吐蕃制聖人布化用百姓為心王者秉仁以八荒無外故能光宅遐邇財成品物由是隆周理歷恢柔逺之圖強漢乘時建和親之義斯蓋御宇長䇿理邦茂範朕受命上靈克纂洪業總三才而統極混六合以為家聲教所覃建木棘林之外提封爰亘弱水流沙之表悠然至道髙詠薰風載戢干戈大張禮樂庶幾前烈克致和平眷彼吐蕃僻在西服皇運之始早申朝貢太宗文武聖皇帝德侔覆載情深億兆思偃兵甲遂通姻好數十年間一方清靜自文成公主化往其國因多變革我之邊隅亟興師旅彼之蕃落頗聞雕弊頃者贊普及祖母可敦酋長等屢披誠欵積有歲時思托舊親請崇新好金城公主朕之少女長自宫闈言適逺方豈不鍾念但朕為人父母志恤黎元始允誠祈更敦和好則邉土寧晏兵役休息遂割深恩為國大計宜築外館聿膺嘉禮降彼吐蕃贊普即以今月二十七日朕親自送於郊外景龍四年正月封燕郡公主制漢圖既采蕃國是親公主嫁烏孫之王良家聘氈裘之長欽若前志抑有舊章餘姚縣主長女慕容氏柔懿為德幽間在性蘭儀載美蕙問增芳公宫之教夙成師氏之謀可則今林胡請屬析律無外雖柔逺之仁巳私於上略而由內之德亦質於元女宜光茲寵命睦此蕃服俾遵下嫁之禮以叶大邦之好可封為燕郡公主出降與松漠郡王李鬱于開元十年封東光公主制炎漢盛禮蕃國是和烏孫降公主之親單于聘良家之子永惟前史率由舊章故成安公主女韋氏六行克昭四德聿備漸公宫之訓承內則之誡屬林胡請命扞塞無虞柔逺之恩巳歸於上略采楚之慶載睦於和親宜正湯沐之封式崇下嫁之禮可封為東光公主出降饒樂郡王魯蘇封和義公主制呼韓來享位列侯王烏孫入和義通姻好懷柔之道古今攸同寧逺國奉化王驃騎大將軍阿悉爛達于志慕朝化誓為邉扞漸聲教而有孚勤職貢而無闕誠深內附禮異殊鄰爰錫嘉偶特申殊渥四從弟前河南府考城縣令參第四女質稟幽間性惟純懿承姆師之訓導實宗黨之光儀固可以保合戎庭克諧邦選宜膺逺好以寵名蕃可封和義公主出降寧逺國奉化王封寧國公主制朕聞古之聖王臨御天下功𢡟受賞道無隔於華夷義存有孚信必全於終始故能德被寰宇化延殊俗是以周稱柔逺克著康濟之圖漢結和親式𢎞長久之䇿由來尚矣朕祗若元命永惟稽古內申九命勉膺嗣夏之期外接百蠻庶廣懷荒之澤頃自凶渠作亂宗社阽危回紇特表忠誠載懷奉國所以兵踰絶漠力徇中原亟除青犢之妖實賴烏孫之助而先有情欵固求姻好今兩京底定百度惟貞奉皇輿而載寧纘鴻業而攸重斯言可復厥德難忘爰申降主之禮用答勤王之志且骨肉之愛人情所鍾離逺之懷天屬尤切况將適異域寧忘軫念但上緣社稷下為黎元遂抑深慈為國大計是用築茲外館割自中闈將成萬里之婚冀定四方之業以其誠信所立家國攸寧義以制名式崇寵號宜以幼女封為寧國公主應緣禮會所司準式其降蕃日仍令堂弟銀青光祿大夫殿中監郡王瑀充册命英武威逺毗加可汗使以堂姪正議大夫行右司郎中上柱國上邽縣公賜紫金魚袋選為副特差重臣開府儀同三司行尚書左僕射冀國公裴冕送至界首凡百臣庶宜知朕懷乾元元年六月和蕃册文册金城公主文沈佺期景雲二年歲次辛亥闕月甲辰朔二十日癸亥皇帝若曰咨爾金城公主幼而敏惠性實柔明徽藝日新令容天假先帝承皇祖之寶訓繼文成之舊姻割天性之慈徇安人之業何蒼生不幸紫宸闕代朕勉及丕業兢守大烈永懷同氣注存遺體靖言河湟無忘鑒寐湯沐之數信命之勤追平昔而載深於骨肉而加等於戲禮之降殺大繫於情情之厚薄抑亦在我今猶子屬愛何異所生然叔父繼恩更思敦睦是用命朝散大夫試司賔少卿護軍曺國公甘昭充使試詹事丞攝太子贊善大夫沈皓仙為副持節往册爾為朕長女依舊封金城公主率由嬪則無替爾儀載光本朝俾乂蕃服可不慎歟册交河公主文維開元二十一年歲次庚辰四月丁巳朔十五日辛未皇帝若曰於戲大邦為好蕃服維寧豈獨元夫亦資良偶咨爾十姓可汗開府儀同三司濛池都護阿史那妻涼國夫人李氏柔懿成性幽間表儀能修關睢之德克奉蘋蘩之禮自祗率輔佐肅恭言容載茂彤針允諧內則是以崇寵蕃扞懷柔逺人將適遐荒更榮封邑是用册爾為交河公主爾其叶化蕃邦竭誠婦道膺茲寵命可不慎歟册和回紇公主文維大歷二年歲次丁未五月巳酉朔十三日辛酉皇帝若曰帝乙歸妹表於易象魯侯築館列在春秋咨爾第某女雲漢之姿聫華宸極河洲之德著美公宫整玉笄於錦車題銀榜於毳幕善修嬪則載叶蕃情實資輔佐之功廣我懷柔之道烏孫下嫁巳申飾配之儀紅綬增榮爰寵疏封之命是用册曰某公主敬承徽禮可不慎歟册崇徽公主文常衮維大歷四年歲次巳酉五月戊辰朔二十四日辛卯皇帝若曰於戲魯邦外館有小君之儀漢室和親從閼支之號命公主而疏邑以封煥於徽章抑有前範咨爾第十女稟秀雲漢增華女宗卓爾洵淑逈然昭異肅雍之道能中其和縟麗之功自臻於妙不資姆訓動會禮經甫及初笄之年眷求和鳯之對用開湯沐方戒油軿我有親鄰夙稱雄貴分救災患助平寇虞固可申以婚姻厚其寵渥况有誠請爰從歸配是用封曰崇徽公主出降回紇可汗册曰可敦割愛公宫嬪於絶域爾其式是閫則以成婦順服茲嘉命可不慎歟譴黜郜國大長公主别館安置敕妖妄莫甚於巫蠱罪惡莫逾於姦亂迹涉於此刑其捨諸郜國大長公主藻質天潢不慎其德行違禮法悉匿回邪信妖孽之虛言求厭勝之非福憫其將老之年從我議親之典置於别館勿謂無恩其子蕭位不思諫正手疏祝詞其弟儒偲及異父兄駙馬都尉裴液相與知情陷於不義蜀州别駕蕭鼎商州豐陽令韋惲前彭州司馬李萬等謬居清貫輕紊常倫在其門庭多行穢德忝列衣冠之緒豈宜履舄之交闕宜令京兆府決重杖四十配流賀州裴掖綿州安置蕭佩儒偲等並配房州安置其蕭位等並馳驛發遣貞元三年追封追封華陽公主制周漢之儀湯沐之制車服次於王后容衛榮於戚藩其淑德竟謝於茂年成禮未主於同姓則加其寵榮舉於前典是以東漢追平原之封西晉崇宸獻之命故第五公主天縱柔和性成聰敏爰自辨識秀於人倫仁義切於哀誠怡順適於師訓先意承旨不待名言省醴適饌每加豐潔送迎匪憚於寒暑溫扇無待於傍人甘去繁奢樂聞禮教將有詞情必候溫顔或遇勞神輒形焦色周旋六行諷詠七篇霽威怒以拯危承歡愈而進善常求惠下聚請求賢而髫齔之辰清羸多疾沉綿袵席彌歷紀年針艾嬰身藥餌在口異在殊常之命實有兼愛之慈與之名都假以榮號築館之盛乃從受邑之期方遇優典未彰幼齡已謝追懷既往痛悼滋深方展禮於舊章稍申哀於備物叶豫素志厚爾飾終可追封華陽公主大歷九月四月追封玉虛公主制敕因親之愛存則均慈緣情之禮殁而逾厚故某闕公主敏識沖和韶姿婉秀純孝之性自合於天經柔順之心夙成於閫則動唯中禮言必知徽承夙烈之元風悟道家之真籙方開魯館甫往有行未啓漢封遽幽長往念其早夭倍軫哀情用追湯沐之榮載錫靈仙之號可追封玉虛公主追封齊國大長公主制敕荆南節度使觀察處置等銀青光祿大夫檢校兵部尚書兼江陵尹御史大夫上柱國沂水縣開國子食邑五百戶王潛母贈晉國大長公主於朕祖宗之姑妹也始以肅雍之德下教於公侯淑問怡聲禮無違者撫其愛子有過嚴君不因恩澤以求即每教忠貞以事主使勤富貴戒勵廉能鬱為勳臣實資聖善徽猷盡在典禮宜加尚狹平陽之封式廣營丘之地克宣朕命用慰朕心可贈齊國大長公主贈同昌公主衛國公主制沈畋門下死生有命雖著於格言夭橫難明豈由於定數每念肅雍之德載纒悲愴之懷疏土易名用申彞典故同昌公主生知孝敬天錫聰明桃李凝華芝蘭藴秀克奉公宫之訓寧煩女史之針洎結慶秦樓傳芳魯館蘋蘩潔淨環珮鏗鏘不矜帝子之尊盡執家人之禮謂乎積善享彼修齡驚電逝以霜摧致珠沉而玉折粉田蕪沒金榜凄涼荒沁水之林園寢平陽之簫鼓哀情靡極縟禮宜加啓衛國之山河擇周公之諡號式崇徽教用慰營魂可贈衛國公主兼賜諡曰文懿仍令所司擇日册命主者施行諡議安興公主諡議文沈佺期議曰臣聞表終受名素存考行王姬內範貽教潛流徽問積中知之在下公主降靈宸極畀慶髙禖貞惠日嚴柔明天縱英姿灼乎髫齔夙智形於襁褓孝為德本資色以養親禮即敬輿履謙而軌物生成天族長自華宫珠玉滿堂不忘於浣濯歌鍾成列載玩於圖史恭聞懿風庶覩嬪則未延百兩奄遘重泉皇帝正位瑶圖追榮金榜穠華大秀軫餘悼於生前彤管凝芬追令名於沒後謹按周禮諡法容儀恭美曰昭慈仁短折曰懷請諡曰昭懷公主謹議唐大詔令集卷四十二
