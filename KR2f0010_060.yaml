body:
  text: 唐大詔令集卷七十宋宋敏求編典禮南郊四貞元六年南郊赦貞元九年南郊大赦天下制元和二年南郊赦長慶元年南郊改元赦寶厯元年南郊赦南郊四貞元六年南郊赦禮稱日至而郊詩美豐年之報然則迎日之始時莫大焉順成之應慶莫重焉朕承天眷懷俾作神主朝夕砥礪日月永思惟人安化洽是勤惟歲稔時和是冀上靈降鑒豐祉聿臻展禮郊丘申大報之義祗禋宗廟極追孝之誠四海具瞻百神咸秩古者上有大澤必與天下樂之慶賜遂行無思不備內外文武及仕官諸軍將士等三品以上賜爵一級四品以下加一階宰相及東都留守六軍統軍諸道節度使神䇿威逺金吾六軍都團練防禦觀察使京兆河南尹正員尚書御史臺長官太常卿各與一子官大禮行事官各加一階立仗將士及守營者共賜十八萬端匹故尚父子儀與一子五品正員官如巳五品以上量與改轉贈太尉秀實與一子官張巡許逺南霽雲顔杲卿顔真卿各與一子正員官天下見禁囚徒其罪至流死者各遞减等徒罪以下一切放免左降官經三考流人配𨽻效力之類經三周年者並與量移近州縣官吏專殺立威杖或踰制自今以後有責情决罰致死者宜令本道觀察使具事由聞奏并申報刑部御史臺吐蕃比虧信約自絶通和邉鎮之間事資備禦因其犯境纍獻俘囚既切懷土之心復加幽縶之苦永言覆育何間華戎應所獲吐蕃生口見在者一切放歸本國仍並差人送至界首量事資遣使得自全應諸道自艱難以來戰陳喪沒及荒凶死亡骸骨暴露者長史各令收瘞奠酹守宰之任弊在𢾗更自令刺史縣令以四考為限嗚呼朕獲主圭璧十有二年於兹天明地察罔敢不祗一日萬思罔敢不慎遷己之過庶無吝心致人之安實有明志夫祀之馨香在德天之視聽在人惟命不常聖有謨訓慶感既集於兹日警勵方戒於將來冀勉增修聿懷多福凡百有位所宜同之貞元九年南郊赦陸贄門下朕以薄德忝屬大統皇天眷祐俾主兆人懼不克承夙夜祗畏緬惟前烈致於升平豫心浩然罔知攸濟大小之務曷嘗不勤芻蕘之人亦莫不敬慮每存於致理志恆在於恤人中宵屢興終食纍嘆一事乖常惄焉疚懷一夫罹殃惻若傷體思與海內同臻太和息其戰爭保其生業降心從衆實靡有辭克巳利人誠無所吝然以視聽有極思慮難同况乎長自深宫安於近習損益之理寧免過差幽逺之情固多未逹由是兢兢砥礪悔往終來燭理所患於不明推心庶幾於無負日慎一日於今十有五年矣上靈降鑒多士叶誠五稼屢豐四鄙不擾方鎮輯睦干戈底寧邉壘繕完殊方款附協天地㑹昌之運實宗社無疆之休慶既荷於元功禮有昭於大報矧惟霜露之感永切孝思禋燎之儀每勤精意將申誠敬其在躬親是與公卿大夫䖍奉犧牲恭奠圭璧陳其文物薦其馨香類於泰壇享於清廟率職來助萬邦攸同備物致嚴百禮具舉誠慕獲展神人允諧明發永懷慶感斯集純嘏所錫豈唯朕躬思俾普天均承惠澤可大赦天下自貞元九年十一月十日昧爽以前云云其見於官司辨對者亦並免官人犯贓不可令其却上以後勿以為纍左降官及流人並量移云云竄謫遐裔冀速霑恩比者准制量移所司皆待申牒屢加盤覆纍涉歲年既甚淹遲且不均一宜令吏部刑部審檢勘本流貶及量移敕㫖比類元犯事狀輕重月內處分內外文武從我巡狩涉於艱難録其忠勞宜有優異應從奉天扈從至興元文武官將士等普恩之外三品以上賜爵云云兵興以來垂四十載稅既煩重人多困窮因之以流離加之以凍餒為人父母實深哀傷誠由德化未敷耗斁猶廣每欲蠲復與之小休迫於軍儲有意未就姑爾勤恤減其田租惠貸非多良深憫愧天下百姓貞元十年地租斛斗應合度支收管者宜並三分放一分如當管無屬度支斛斗即减放合送上都十分之一其所放斛斗錢物並委巡院官與觀察經略等使計㑹審勘定數分明榜示百姓仍具申奏去年以來所有貸糧種子並存百姓腹內者一切放免富俗安人在於薄斂必不得巳簡則易從自頃削去煩苛定為兩稅既無他擾頗便於時朕推誠御人所貴存信保此誠法期於不踰凡百有司所宜遵守倘求取無節則因緣起奸獲利失人殊乖朕意諸司使及諸州府除兩稅外别有科配悉宜禁絶近年以來因和市和糴久負百姓錢物並即填還以後官司應有市糴者各須先付價直不得賒取抑配因兹斂怨擾人水旱為災古今不免茍有豐蓄則凶年少間屬此多虞里閭凋耗姑務求於日給不遑慮於歲儲一穀不成人則艱食害至始救其傷巳多俾無餒殍之憂將在備之而巳宜委諸州府長官每年以當管回殘餘羡物穀賤時收糴各隨附近貯納年終具有無多少報中書門下兼申考功以為考課升降如有替代各分明交領准前申報若遇災害不稔則量事給與百姓輒有將充諸色用者以枉准贓罪之其勸課百姓自置義倉仍准貞元元年十一月十一日制處分立人之道惟孝與忠孝莫大於榮親忠必先於竭節唯爾師長卿校洎乎方嶽列藩保乂皇家交修庶績竭節之效既昭乃誠榮親之恩宜洽國典應內外文武清望職事官并節度觀察都防禦團練等使父在未有官量授五品官母在未有邑號者各授邑號云云佐運之臣納忠之輔功既存於社稷慶宜及於子孫故周錫土田漢傳帶礪疇其爵號與國始終固以明報德之恩勸為臣之義其或年代未逺利澤猶存祠宇已變於荒墟𦙍嗣不編於仕籍思其人猶愛其樹况奠享乏主而不加省録者乎興滅國繼絶代所以禮先賢也修宗廟敬祀事所以教追孝也化俗歸厚此其大端應九廟配享功臣及武德以來將相名節特髙有封爵廢絶祀廟無主者宜許子孫一人紹封以時享祀自今以後應有廟家子孫但傳襲爵者並許享祔於廟其有毁賣私廟及買之者各以犯教義論自古聖帝明王忠臣烈士各令長吏以禮致祭書叙明四目達四聰垂拱而理詩稱濟濟多士文王以寧捨巳從人故能通天下之志棄瑕録用故能成天下之才昔在太宗勤求理道納諌如響任賢勿疑致俗於太平垂範於永代朕獲承鴻緒追纂往猷書之座隅恆自敬勵朝夕翹想庶聞嘉言夢寐勞懷思得良士凡厥在位所宜共成諸司百官有陳便宜者各盡所見條疏封進事有寃滯政有闕遺悉當極言無或隱避詔敕不便於時所司執奏以聞天下有藴德懷才隱居不仕委所在觀察使表薦當以禮邀致諸色人中有賢良方正能直言極諌或博通墳典達於教化或詳練故事長於著述或精集律令曉暢法理或該明吏術可委理人或洞識韜略堪任將相委所在州縣長吏及臺省常參官詳録行能舉奏仍牒報吏部其所舉人並限來年七月內到京朕當親試緣大禮職掌行事云云元和二年南郊赦朕聞王者大業孝莫盛於配天國之大事禮莫重於享帝故二儀合祭知天子育物之仁萬國駿奔觀聖人嚴父之道教之所設禮極於斯我國家祖武宗文經天撫運聲名所被車馬必同承祧而御極業光十聖體元而紀號年將二百朕以微眇纘奉昌圖畏此鴻業若臨深谷而大事所屬仙寢繼營凶德相挻兩隅皆阻淮湖奧壤水旱愆期惄然疚懷懼不克濟既而上天降祐烈祖垂休妖氛盡弭逆節咸伏精神有以相蕩善惡有以相資五嶽感誠而效靈四氣應序而咸理物皆滋茂歲亦豐登百姓之心歡然相與是用齊精三日凝謁上𤣥明發不寐祗見烈祖周旋在位陟降是䖍克配之禮既展如在之誠增慕嘉此福祐與物惟新式敷顒若之化俾洽沛然之澤可大赦天下罪無輕重常赦所不免者咸赦除之左降官與量移及資復仍聽纍叙流移配𨽻並放還天下應有逋缺在百姓腹內者及京畿今年夏青苗錢稅並免放官酤酒及雜𣙜率並同禁斷淮南江南去年以來水旱疫癘其稅租節級蠲放天下兩稅貞元四年制書巳及三年一定委有司舉舊敕商量處置諸道年終勾宜停刺史録事參軍並不得擅離其事類已後之制敕速令有司删定江淮大縣每歲據闕委御史三省臺諸司長官節度觀察使各舉堪任縣令不限選數並許赴集臺省官及刺史赤令有闕先於縣令中揀擇如有能否與元舉同賞罰置其員簿以序內外庶官禁郵驛假托乘勢京兆府諸司色役人各令條疏簡省天下官吏應行鞭捶責情致死者切念察訪王府六品以下官及諸州縣有司并省處分諸官諸使要停减者委有司商量廢省天下百姓不得冒為僧尼道士以避徭役其創造寺觀廣興土木者舉前敕處分之內外文武見任及致仕官諸軍將士等以品秩節級賜勳爵文宣王及二王三恪公主諸王與一子官及賜物有差宗子中有才可用者委中書門下量才叙用故尚父子儀太師晟太尉秀實顔真卿張巡許逺南霽雲及配饗功臣與一子官及出身有差至德以來功臣未配享者速令詳定文武常參官及諸節度使觀察使并諸軍使並與父母封及追賜并一子官出身有差諸軍立仗及在本營節度賜物應緣大禮職事官並賜階爵天下諸色人中有賢良方正能直言極諌博通墳典達於教化軍謀宏逺堪任將帥詳明正術可以理人委內外官各舉所知朕親䇿試天下百姓髙年者賜米帛羊酒及板授官封名山大川及古聖帝明王忠臣烈士各令以禮致祭長慶元年正月南郊改元赦朕聞自昔聖王之所以合天地諧神人莫過乎誠敬致其誠展其敬莫重於祭祭之大者莫大於郊廟故必躬行而心奉之然後百靈助慶萬國䝉福此帝王之孝也我國家祖功宗德立號配天日月所照雨露咸被孝思善繼聖教允升郊丘歲奉於嚴禋宗廟時修其明薦朕以冲昧自獲纘承仰荷眷命懼不克享幸天多祐俾歲大穰河朔底寧邉封靖謐及此元日至於上辛式遵典禮有事郊廟當祗見之夕感慕增懷洎大報之辰誠敬彌勵因體元而配號用敷化以覃恩可大赦天下改元和十六年為長慶元年自正月三日昧爽以前大辟罪以下罪無輕重咸赦除之唯故殺人在十惡內者及官典犯贓不在免限左降官量移近處如復資便任選亡官失爵不齒者量加優叙左降官及流人先有官者如巳亡殁各還本官天下百姓今年夏稅每貫放一百五十文州縣應徴科兩稅𣙜酒錢內舊額須納見錢者並任百姓隨所有匹段及斛斗依當處時估送納不得邀索見錢度支鹽鐡戶部應納稅茶兼糴鹽價中須納見錢者亦與時估匹段及斛斗如情願納見錢亦任穩便永為常式其公私便換錢物先巳禁斷宜委京兆府切加覺察應度支鹽鐡戶部三司官吏所由缺負元和十三年以前諸色錢物斛斗委本司盡底勘責如是入巳隱欺即准條處分如緣缺折攤徴元保外無可納者宜並與疏理諸軍使亦准此處分兩稅外不得别有差科刺史如越違觀察使舉奏觀察使事乖格敕刺史不得輒受中使及郎官御史奉使所在並不得與人事物諸道諸州縣宜委中書門下及觀察使刺史量間劇形便可並省者具事宜聞奏河北諸道管內宜委本道團定兩稅務令均濟河北州縣凋殘戶口未復其官各據郡邑大小量公事留置餘並權停應諸道管內百姓或因水旱兵荒流離死絶見在桑産如無近親承佃委本道觀察使於官健中取無莊園有人丁者據多少給付便與公驗任充永業不得令有掌職人妄為請射其官健仍借種糧放三年租稅𣙜酒錢巳有分配百姓處又置酒店官酤并諸色𣙜率切宜禁斷亡官失爵放還流人有莊田不經沒官被人請射本主子孫到並委却還天下諸色人中有能精通一經堪為師法者委國子祭酒訪擇具以名聞其大理寺官宜令精擇有志行詞學詳明法律者注擬其有課績特殊堪在朝奬者臺省官有闕宜先選擇自今郡守恪奉詔條清廉可紀四考與轉諸道或閉糴禁錢自為條約切宜禁斷其內外文武及致仕官三品以上賜爵一級四品以下各加一階陪位白身人賜勳兩轉故尚父汾陽王贈太師晟贈太尉秀實各與一子八品官顔真卿杲卿張巡許逺南霽雲各與一子出身武德以來功臣子孫量加奬用中書門下及節度使帶平章事各與一子八品正員官祖父母父母並與贈官官封父沒母存者與邑號巳贈已封者更與追贈禮儀使大禮使度支鹽鐡使京兆尹各與一子出身文武常參官并致仕官及諸道節度觀察經略等使及神䇿等使諸軍使父見存者量與致仕母存與邑號父母亡殁與贈官及邑號東都留守及諸道節度觀察經略等使神䇿金吾六軍將軍威逺鎮國軍等使各與一子出身陕州奉天興元功臣更賜勳爵有差身沒未經追贈者並與追贈應緣大禮移仗宿衛御樓立仗將士普恩之外贈勳爵有差仍凖舊例賜錢物二十萬四千九百六十端匹貫大禮職掌行事官及留守等更賜贈勳爵及加升階壇殿行事官更特加一階應在城內蕃客等賜物有差常參官及刺史有停替及病假解官及終制未授官者委中書門下量才進擬其情願授致仕官者亦聽天下諸色人中有賢良方正能直言極諌博通墳典達於教化軍謀宏逺堪任將帥政術詳明可以理人者委有司各舉所知限今年十月到上都天下百姓髙年者賜米及綿帛有差寶厯元年正月南郊赦門下朕以眇薄纂承洪構祗見九廟肇祀二儀外飾備物中惟盡志昆蟲草木之實致豐於蠲潔愷樂和愈之感庶交乎神明四海奔走衆祗授職冀下觀而化皆內誠乎心百王之禮樂在陳列聖之聲詩合奏敬極嚴配道備饗親䖍奉成式惕焉惴懼而今後不敢滿假庶無大悔以貽祖考之羞因體元以統厯遂洽恩而大宥可大赦天下改長慶五年為寶厯元年自寶厯元年正月七日昧爽以前大辟以下罪無輕重已發覺未發覺巳結正未結正繫囚見徒常赦所不免者咸赦除之其官典犯贓不在免限左降官自長慶四年三月三日制後未經量移近處巳經量移者更與量移如復資者即任依常調選丁憂去任服闋日亦與量移如有親故在上都任於所司陳狀便與處分不必更待本州申請别敕因責降授資正員官未經改轉者亦與進改亡官失爵放歸不齒者量加收叙縱元敕云終身不齒者亦量與收叙流人未到所在及已到者量移近處如巳收叙者量才録用并僧尼道士移𨽻者亦與移近處得罪人已亡殁家口未許歸者一切放歸如自情願住者亦任諸已得罪人中有先敕云縱逢恩赦不在放限者并别敕安置者亦並宜委中書門下量事狀輕重節級處分左降官及流人先有官者如巳亡殁各還本官流貶人所在身亡任其親收以歸葬仍仰州縣量給棺櫬優賞發遣諸色人中有痕纍禁錮及畔逆緣坐等一切並與洗滌常參官及諸州刺史有先因停替及因病假解官并終制未授官委中書門下量才進擬勿令稽滯致仕官未經改轉者量改官依前致仕諸軍先擒獲吐蕃生口配在諸處者宜委本道資給放還本國勿許因循所在停住國家與吐蕃舅甥之好彼此無虞自今以後邉上不得受納投降人并擒捉生口等天下諸州府縣官吏應行鞭捶本罪不致死者假以責情致令損斃每念於此良增惻然宜委御史臺及出使郎官御史等切加察訪仍具事由聞奏澄清教化莫尚乎太學明治心術必本乎六經天下諸色人中有能精通一經堪為師法者委國子祭酒訪擇具以名聞奏天下州縣各委刺史縣令招延儒學明加訓誘名登科第即免征役刑罰不清不足以言理命官不重不足以招賢間出入之文束上下之手必資慎選庶叶詳平大理寺官屬比來吏部所授多非其才宜令精選有志行詞學兼詳明法律者注擬其有課績特殊堪在朝奬者臺省有闕宜先選擇一夫不獲時豫之辜茍有向隅之悲遂軫納隍之慮如聞去冬吏部三銓選人駮放者衆或文狀舛錯或書判差池主司守文不得不爾既施惠澤亦在霑恩其長名及雜駮選人有未離京城者委吏部今月檢勘畢除涉踰濫者餘並却收以比逺殘闕量才注擬如不情願受地逺官亦不可强之仍速處分不得出選限內比者下令立科彰示大信法既無守人何適從赦命不行因循成俗誕告四方為虛設開施庶政為空文豈吾德之未明為有司之見負永言歎息中夜疚懷朕即位之初巳有赦令至如捐徹服御止絶他獻限喪葬以息淫費禁竒靡以専女工隱實版圖謹守儲備及他徭擅賦閉糴禁錢吏行姦欺人冒依庇僧道踰濫流貶重輕錢弊利害軍士侵占車馬衣服之制度公坐入己之贓私悉令條疏貴欲該備頒宣未幾廢格巳多或職司惰慢而不能將命或詔命才行而下已不守以此求理不亦難乎其元和以來詔書并長慶四年三月三日赦令委廢不行事在朕躬諌臣極言得失無有所隱其在臺閣者左右丞據詔令司額重加分配勿容推倚若因循寢廢無所申明及雖曽宣下不能提舉者具事由聞奏量加沙汰其在百司州郡者委御史臺及分察使出使官郎官御史度支鹽鐡巡院准前後詔敕切加訪察各具犯狀移勘聞奏其本判官及刺史以下必加貶責用懲不恪如察舉之司循默自守事狀他露者亦據他疵量加殿黜仍並委中書門下重有舉明去年三月三日赦令及今年赦文一事以上切加懲責據時限量官吏勤惰具科殿重輕聞奏京西京北邉上諸軍州鎮自今年以後如有中使及郎官御史奉使到所管並不得人事與物應天下典人莊田園店便合祗承戶稅本主贖日不得更引令式云依私契徴理組織貧人虞氏建官必明黜陟漢朝置吏皆長子孫政成簡用或登右職近代遷除過速資給轉繁扇為時風莫有固志親人之職為弊尤深氓俗土宜未及周悉迎新送故已聞代換更閲雖遽資望如初善否不分升降莫辨徒為煩擾無益公私自今以後刺史縣令若無所犯非滿三周不得除替如理行尤異但議就加其有才宜他職灼然要籍者中書門下先具事由及授上年月奏聽進止滿歲遷代無闕敗者即與進改磐石維城義深麟趾穠華下嫁禮次椒塗縉紳文武之良材執事恪居之奉職克參祼獻載叶肅雍亞獻嘉王運終獻循王遹等各賜物一百匹夾侍正衣進圭各賜五十匹亞獻終獻正衣各賜四十匹大長公主嗣王郡主縣主各賜物內外文武官三品以上賜爵一級四品以下加一階合入三品五品缺考未合叙者待考足日聽叙斯文未墜降聖克昌道逾三代之英化立百王之範象賢崇德垂裔作賔教義斯崇憲章無改文宣王二王三恪與一子官其祠廟委所司量加修飾克稱惇叙因述本枝收族是先觀型斯在皇五等以上親三品以上賜爵一級五品以下升一階六品以下及前資常選散官簡選日優與處分未有出身陪位者每家放一人出身應陪位皇五等以上親及太皇太后三等以上親三品以上賜爵一級四品以下加一階諸親四等五等及諸州賀正官并諸色陪位官等五品以上加一階六品以下及白身人並賜勳兩轉其前資及有出身者各减一選締搆興王弼成昌運勳藏册府烈冠史編九原推可作之風百代凛如生之氣載懷丕績何日敢忘武德以來配饗功臣及將相名節尤著長慶四年三月三日制未霑甄叙者委中書門下條疏奏聞量與優奬故尚父汾陽王贈太師子儀贈太尉秀實子孫未曽經甄奬者每家與一人正員官元和以來有因戰伐死於王事其名莭顯著未有優贈者各委本道節度使條録聞奏如勘覆詣實當有處分其有骸骨暴露者宜令所在埋瘞宏教愛之理爰命推恩念追逺之懷用頒徽贈常參官及諸州府長官父母見在未有官封並量與五品致仕官及階并邑號父母亡殁未曽追贈者量與封官及邑號已經追贈者更與改贈如贈官已至一品邑號巳至國夫人者不在此限中書門下及節度使帶平章事者宜與一子正員七品官祖父母父母先殁各與追贈經追贈者更與改贈官巳至一品邑號巳至國夫人者不在此限節度使與一子正員八品官東都留守度支鹽鐡使觀察處置都團練防禦經略招討等使及神䇿金吾六軍將軍大將上將軍統軍威逺鎮國軍等使皇城留守各與一子正員九品官京兆尹特加一階父母先亡殁未經追贈者各與追贈職修祀事禮奉嚴禋既合殊恩宜加異等應郊廟升殿行事官普恩外宜更加一階如合入三品五品者任待考足聽代尚書省三品四品以上中書門下五品以上特加一階便蕃殿省給事郊丘顧以忠勤是宜甄奬內行事者三品以上更賜爵一級四品以下更加一階內侍省及內坊官四品以上各賜勳五轉五品以下各賜勳三轉應從駕至郊廟者普恩外三品以上賜爵一級四品以下各加一階品官白身賜勳兩轉環列師營服勞扞衛申威攸屬敷惠是應神䇿六軍金吾威逺皇城及諸道將士等三品以上賜爵一級四品以下加一階無階者賜勳三轉在城神䇿六軍威逺營左右金吾及皇城將士應大禮移仗宿衛御樓立仗等普恩之外三品以上賜爵一級四品以下加一階仍凖舊賜物有差神䇿將士加一階仍凖舊例賜物有差其神䇿將士應在京畿諸縣者亦各有賜物應緣大禮職掌行事官并修撰儀注及留守副留守守倉庫卿等普恩之外三品以上賜爵一級四品以下各加一階䖍奉職貢載觀郊禋內禆覃賚之恩外廣懷柔之義鴻臚禮賔院應在城內蕃客等各有賜物翰林待詔供奉并諸色直見任及前資并員外試官三品以上賜爵一級四品以下各加一階無官者賜勳兩轉導蕃服之誠承帝庭之命忠勤既著勳賞宜周諸道知上都進奏院官在城者各賜勳兩轉應緣大禮四方進表疏及賀正官各賜勳三轉敬承禋祀贊執豆籩列庶衛以觀光肄多儀而中矩誠在嚴恪理叶褒嘉郊廟行事齊郎减二年勞室長掌座禮生贊者减一年勞無勞可减者便放出身崇𤣥館行事學生及齊郎禮生番考巳滿所司緣大禮却追入行事各减一選國子監生陪位者賜勳一轉中書門下儀注官各特賜一階應緣祗供作官直司長上諸州行網考典兩縣耆壽諸色畨役當上在城并量留十二月畨者各賜勳兩轉飛龍間廄宫苑典引掌扇內園少監栽接少府將作中尚武德軍器內外弓箭庫等諸司諸使下白身人及無品直司定額長上雜匠巧兒黃衣長上監直長雜使三衛七邑引駕細引執扇角手弩手彍騎武士天文觀生厯生漏生典鼓典鐘工人樂人主膳主酪典食胡食手宰手掌間幕士御士醫士獸醫門僕藥童御書手楷書手典書流外行署等各賜勳兩轉尚年貴老所以教孝也聳義嘉節所以貞俗也天下百姓髙年者上縣以上每縣十人中縣五人下縣三人並以縣界年最髙者充數并孝子順孫義夫節婦先經旌表行義不虧者令人各賜米三石絹兩匹仍板授上佐縣君並委令長齎米帛就家賜訖具名本道一時聞奏其米及絹於上供數內申報神配峻極德稱靈長秩既升於王公禮合加於牲幣五嶽四瀆宜委本州府長吏備禮致祭當極豐潔以副如在之誠書稱望秩禮著登封仰堯舜之聰明慕文武於方册遐想忠貞之跡𬗟懷忠烈之風能禦大災咸申祀典名山大川及自古聖帝明王忠臣烈士各令所在致祭亡命山澤挾藏軍器百日不首復罪如初赦書有所不該者所司具作條例聞奏敢以赦前事相言告者以其罪罪之赦書日行五百里布告天下咸使聞知唐大詔令集卷七十
