body:
  text: 唐大詔令集巻三十四宋宋敏求編諸王册文册梁州都督漢王元昌文册徐州都督徐王元禮文册荆州都督荆王元景文册潞州都督韓王元嘉文册遂州都督彭王元則文册雍州牧左武侯大將軍越王泰改封魏王文册洺州刺史郯王惲改封蔣王文册岐州刺史許王元祥改封江王文册揚州都督沛王賢文册殷王旭輪文册翼王輪文册汴王邕文册魯王求文册魏王佾文册凉王侹文册蜀王佶文册景王祕文册輝王祚文册祁王祺文册雅王禎文册瓊王祥文册文册梁州都督漢王元昌文岑文本維貞觀十二年四月已卯皇帝使某副使持節册命曰於戲夫易陳利建道貫三才𫝊稱夹輔業隆百世是以周之魯衛式固維城漢之梁趙克隆磐石惟爾使持節都督梁洋集璧四州諸軍梁州刺史漢王元昌㓜聞教義器識聰敏早開土宇禮數優崇逷矣南郊襟帶西蜀按部之重茂親是寄持民之譽期月有聞是用錫以茅賦備茲典册爰誓山河永作藩屏朕聞曰事君盡禮資於孝敬為政以德始於仁厚故士無貴賤由之者揚名時無古今背之者殄行欽哉爾其執心於忠孝踐行於儉約無好逸豫以犯非禮無縱嗜欲以邇宵人明率舊章永保疆土可不慎歟册徐州都督徐王元禮文於戲惟王建都惟聖垂範安兆民者實敦親戚固鴻業者必樹藩衛惟爾使持節都督徐譙泗三州諸軍事徐州刺史徐王元禮器能明敏業履詳和㓜聞詩禮早膺車服海岱及淮俗兼齊魯胙土按部僉曰爾諧是用斟酌前代率由令典俾屏廼辟𫝊爾後昆朕聞曰友于兄弟施於有政弗學靣牆蒞事維煩𬗟求大訓茲為要道往欽哉爾其執心於忠孝踐行於儉約無好逸豫以犯非禮無縱嗜慾以邇宵人明率舊章以保疆土可不慎歟册荆州都督荆王元景文夫建官之道實資明德列尊之義必俟茂親故晉鄭佐周功宣於寅亮間平輔漢業崇於藩屏惟爾業髙雍肅器懷㳟懿㓜禀庭訓早膺朝寵仁恕聞於封畿㢘平著在方岳荆衡作鎮江漢為紀包括巴漢之域跨躡吳越之郊塞帷爾諧分珪僉屬備茲令典錫以休命奄於楚甸代為唐輔可不慎歟册潞州都督韓王元嘉文岑文本維貞觀十二年於戲肇自黄唐洎乎漢晉莫不敦穆親戚任用能賢咸胙疆土世為藩翰惟爾持節潞沁韓澤四州諸軍事潞州刺史韓王元嘉識量沉厚德業尚修整夙禀趨庭之訓早膺錫珪之寵上黨奥壤地連秦晉開國之典攸歸按部之譽允穆是用率由故實光備典章式固維城𫝊之永世朕聞詩書禮樂仁義之府也孝友忠信人倫之基也是以河間之賢在於修學東平之譽成於為善往欽哉爾其覽載籍之㫖求聖賢之訓戒茲邪僻以仁厚為心儆彼怠荒以重慎為德明乃服命勿替敬典可不慎歟册遂州都督彭王元則文岑文本於戲葢五等肇自帝軒殷周不改其制六條創於有漢魏晉必循其道是知選賢建戚莫先於藩衛經邦致治允資於創舉惟爾使持節遂普果合四州諸軍事遂州刺史彭王元則幼稱岐嶷夙禀義方褰帷汝潁之地聲績可紀建旟巴蜀之境民俗以康是用率由令典錫茲寵命𫝊爾子孫長為唐輔朕聞為臣子者踐行繼於忠孝處富貴者貽戚在於驕奢故能播美當時垂芳後裔往欽哉爾其鑒於經籍詢於蓍龜見善如不及見惡如探湯無違禮以害身無縱欲以敗俗夙夜匪懈罔有後羞可不慎歟册雍州牧左武侯大將軍越王泰改封魏王文維貞觀某年月某日甲子皇帝若曰於戲在昔哲后受命君臨並建茂親以為藩衛然古之列國今之按部循名或異立政則同皆所以共治黎元俱奬王室克隆鼎祚咸必由之惟爾雍州牧左武侯大將軍越王泰生而韶敏幼而好學樂善不倦才藝日新地則維城禮優分器惟彼三魏寔號五都非親勿居夹輔攸屬是用命爾為使持節都督相衛黎魏洺邢貝七州諸軍事相州刺史改封魏王𫝊之子孫長為藩翰古人有言皇天無私惟德是輔民心無常惟恵之懷往欽哉爾其鑒兹無自驕奢無邇邪佞兢兢業業以保爾茅土可不慎歟册洺州刺史郯王惲改封蔣王文於戲朕光膺寳圖欽若前典崇穆親之義固維城之業並錫之以土地授之以刺史爰誓山河永作藩翰惟爾洺州刺史郯王惲幼稱岐嶷蚤聞詩禮式開土宇允備車服惟彼漢湘地兼舊楚作鎮之重僉議攸歸是用命爾為使持節襄州諸軍事襄州刺史改封蔣王𫝊之子孫長為唐輔朕聞立身之基曰忠與孝為政之本曰禮與德行之則成名違之則䘮道詳求大訓莫此為先往欽哉爾其祗承詔命敦悦典經無奢侈以乖節儉無逸豫以虧謹肅聿修厥德垂徽永世可不慎歟册岐州刺史許王元祥改封江王文於戲葢王者受命聖人作則垂法度以經邦選賢戚以布政作屏王室莫先於胙土共治天下寔寄於班條惟爾岐州刺史許王元祥幼禀義方早有志尚地惟邢晉禮優河裴姑蘓奥壤舊吳是宅既作建牧必俟懿親是用命爾使持節蘓州諸軍事蘓州刺史改封江王𫝊之子孫世為唐輔朕聞孝敬忠貞人之美行也禮讓仁恕政之善經也是以奉上者戒於邪僻御下者儆於驕傲然後能保其疆土和其民人往欽哉爾其鑒持身之規求為邦之道尊五美而屏四惡近君子而逺小人祗畏兢兢無替乃訓可不慎歟册揚州都督沛王文維龍朔元年歳次辛酉十月癸亥朔十七日巳夘皇帝若曰於戲夫剪商統歴建侯以崇藩衛纂堯開運分土以光震聞故廼族茂麟趾經國之令圖地利犬牙裁化之明凖惟爾雍州牧幽州都督上柱國潞王賢頴擢𤣥樞軸榮紫極姿儀暎徹占對淹凝機悟韶敏風徽簡令雕鎔信義振英挺於觹年苑囿文辭標秀發於髫日藝優楚沛道駕天人繇蟻層臺舞鶴懸鏡湛清襟於篁沼鼔芳譽於蘋風是用命爾為沛王使持節都督揚和滁潤常宣歙等七州諸軍事揚州刺史左武侯大將軍牧及勲官並如故而徐方奥壤泗水名區榮耀虞珪賞延漢礪加以作牧淮海式道京畿申大雅而釐風資樂善而揚德必宜靖㳟廼位克懋聲猷光被寵重可不祗歟册殷王旭輪文上官儀維龍朔二年歳次壬辰十二月丙戌朔六日辛夘皇帝若曰於戲夫握鏡黄道經邦盛於建侯司契紫宸體國昭於宗翰故迺祚延郟鼎之業歴峻豊社之基惟爾第四子旭輪疏景星躔導源天漢繼重離而接耀承少海而分瀾秀質瑶華芳聲金潤天人之望夙彰髫綺大雅之規遽形襁褓幼智該於𤣥表潛識冠於黄中舟象垂風方慚性與封蟻宣譽終謝生知是用命爾為殷王上柱國往欽哉將用齊衡兩獻比迹二南彫藻珪璋粉澤仁義竹池逾浚棣屏増華受茲茅土可不祗歟册冀王輪文維總章二年歳次乙巳十一月景午朔二十二日丁夘皇帝使銀青光祿大夫守司戎太常伯上騎都府崔餘慶副使中御大監上柱國靈丘縣開國男万俟肅持節册命曰於戲夫天垂景宿上躔帝子之宫地載兼山下列乾男之域是以聖人之登必則大哲王之立遂開階莫不􅪥磐石於周親樹良翰於宗懿故黄神命社降若水以疏封蒼精建侯奄中都而錫壤用能克久寳祚式固鴻基茂緒藹乎龍圖盛業光於麟趾惟爾冀州大都督右金吾衛大將軍上柱國豫王輪層漢毓靈上枝摛景瑶光甫薦允摽墜燕之祥玉牒初聞遽叶占熊之兆中和在已仁義為資洽藝通𤣥驗賁駒之人闕潛幾應物見巨象之浮舟識茂髫辰神清綺歳趨庭承訓孝敬極於觀喬金殿𫝊經敏學踰於括羽擅三雍之雅對韞七歩之閎才足以道架河書聲芬鄴頌暨龍荒北鎮鵷水東臨海食之渠禀稜威而革暴鳴弦之俗感恵化以遷訛製杼垂風舎唐流詠若乃西河之地寔曰奥區就日分郊蒞唐虞之舊國均霜闢野總虞夏之餘盟式圖爾居形勝斯在是用命爾為冀王其餘官勲如故往欽哉爾其勞謙勉志樂善居心膺丹之徽章崇緑車之寵秩受兹中壤用保大藩允廸前修無或僭度維城之寄可不慎歟册汴王邕文蘇頲維景龍四年歳次庚戌五月辛亥朔二十八日戊寅應天神龍皇帝若曰易不云乎義崇於利建書不云乎道尚乎敦睦故知樹藩屏者以奉先王之言强宗室者乃歸諸父之𦙍咨爾光祿大夫行秘書監檢校殿中監知隴右三使仗内諸閑廐上柱國嗣虢王邕爾門膺魯拜地冠虞封本以忠孝仁義之規成乎宣慈惠和之業恩窮占雨沛經不測其精詞髙賦月陳詩莫踰於麗匪惟政修中夏稱於虢叔固以姻連外戚寵則吾姨遂能在位不驕卑謙自牧造次何者寧忘服儒從容謂之最樂為善加以望隆才位聲軼典司動則有常静而能曉載刋三豕厨委於殺青爰捧六龍廐填於伏皁故可以榮絶乎四履位徼乎九就夫陳留者徙梁之邑在浚之郊井邑遂割於鴻溝舳艫逺通於巨壑雖帝堯遺俗國中承重厚之風而王武舊邦天下擅膏腴之地親既賢矣我圖爾居是用命為汴王於戲爾其敏厥行祗厥典思不怠畏不法取則前鑒罔貽後羞作我唐藩以恵於汴土慎之哉其保朕之休命册魯王永文維太和四年歳次庚戌二月景午朔十二日丁巳皇帝若曰咨爾元子其敬聽朕命我國家累葉重光紹休昌運奄有區宇垂二百年良以親親無私建立子弟克固磐石作藩王家洎予踐位敢忘丕訓是用酌於舊典謀及台臣撰兹吉日錫以青社惟爾道扶正性天假令儀已彰岐嶷之名嘉載信厚之器持公之道且不愧於知子舉守藩之命亦將教於事君爰擇樂郊俾王曲阜環以沂水遂荒海邦今用命使兵部尚書平章事牛僧孺副使左㪚騎常侍吳士矩持節册爾為魯王於戲爾宜守正閉邪去奢昭儉害於德者不作逆於耳者必聽無昵宵人無逺端士纂東平之樂善師河間之好古日慎一日行之為難敬爾有國無墜我休命册魏王佾文維咸通三年皇帝若曰夫剪珪分器事著周經裂地疏封道光漢册莫不克隆磐石作固本枝並建親賢以崇藩翰朝有定制朕安得私爰稽盛時俾榮錫社咨爾長男佾通暉日月禀慶霄漢䕃若木之凝華𣲖璿源之積潤天姿岐嶷神質聰明早彰樂善之規夙有辨牘之智卓爾器度藹然徽猷宜荷寵章以開土宇今遣使門下侍即兼吏部尚書平章事杜悰副使左㪚騎常侍趙格等持節册爾為魏王於戲河外名都漳滏奥宅爾其竭奉上之孝敬慎臨下之儀刑守道宜鑒於逺名尊賢無忘於置醴用新魯衛之政以紹間平之德服我休命可不慎歟册凉王侹文皇帝若曰夫維城作扞實隆定鼎之業犬牙列國以盛建瓴之功故廣樹戚藩畢王子弟歴朝茂典列聖宏規舉而行之朕不敢廢咨爾第二男侹分暉紫極挺質丹宫器度沉詳姿容端粹藹有成人之量形乎佩韘之年志玩楚詩情通沛易不勞師傅之訓動形忠孝之規爰嘉令猷俾建侯社今遣使門下侍即兼吏部尚書平章事杜悰副使左㪚騎常侍趙格等持節榮絶乎四履位徼乎九就册爾為凉王爾其奄長洪河大啟西土紹於前烈扶我舊疆敬慎於朱邸之間謹睦於玳筵之上靖㳟其位克廣其心無縱非彞服我休命册蜀王佶文皇帝若曰夫堯序九族周列五等事髙維翰道在睦親况居帝子之尊宜荷封王之典用彰慶羙以固鴻基咨爾第三男佶符彩昭融姿容朗悟騰英日域漸秀星樞已多秤象之能纔是勝衣之歳静不好弄言必成文曽無紈綺之心每服詩禮之訓嘉其幼智錫以大封今遣使門下侍即兼吏部尚書平章事杜悰副使左㪚騎常侍趙格等持節册爾為蜀王爾其宅於坤維建兹赤社疏以江漢鎮以岷嶓列為侯王邇我宫禁以謹恭而接下秉忠孝以律身服是寵光終於戒慎册景王祕文維年月日皇帝若曰周官八統其一親親制皇子為王得使立社於國固本之大哲后皆然咨爾第八男祕當保抱之間有敏惠之性亦既總角遂能勝衣黙識天經潛資日就未嘗玩物可以疏封乃告守龜具聞叶吉来受兹典永為東藩今遣某官某乙持節册爾為景王見不賢而能思賢爾則必賢矣知可逸而能無逸爾則常逸矣是宜廣洪緒永丕休敬而聽之罔失厥度册輝王祚文維年月日皇帝若曰古君子篤於其親者使天下興於仁也故二王五子之封非獨立愛而巳咨爾第九男祚克岐之質見善欲遷禀訓道而必開故戲言而不愛一隅巳逹四衛可陳乃申胙土之章俾奉成人之祀今遣某官某乙持節册爾為輝王於戲為臣為子偕在爾躬有器有名敢私國典錫𩔖則非孝不可逺恥則非㳟不能無替聿脩以光利建白茅金璽昭物具焉爾其夙夜循思用稱休命册祁王祺文維年月日皇帝若曰廟立之重天序可承將茂本枝式遵懸法爰就至公之體諒非各子之心咨爾第十男祺賦性惟和挺材亦秀飭躬罔念於紈素樂善欲忘於鐘鼔析壤之休自天而啟臨軒之命秉禮則安今遣某官某乙持節册爾為祁王於戲保在深宫鮮知正範任之作傅我必擇人茍有如韋至之諷諭安國之輔導者爾當俯聽其言勤行其教使我公家之訓克彰於萬年而固爾建社之寵不其大哉册雅王禎文維年月日皇帝若曰周家之嗣分茅土者十五國漢景之代書簡册者十三王朕以寡昧之資奉神靈之統每顧諸子寔惟天休期訓導之將成諒封建而可享咨爾第十一男禎方當稚齒復在深宫有知憂知懼之心見學禮學詩之性自然而禀最樂不渝遂詔有司往申舊典今遣某官某乙持節册爾為雅王於戲受册之命重屬汝躬列聖在天百辟在位在天必聽在位必觀罔怠交修用承多祜册瓊王祥文維年月日皇帝若曰不廢懿親大封同姓吾嘗觀於經籍矣然而厯代賢君正名用典必擇才行使之光昭其可以子弟之私恩冐先王之成憲朕雖不德必有不為咨爾第十二男祥於兒戲之間多㓜敏之智謂之材也不曰近乎處昆弟之間有推讓之性言其行也不曰𩔖乎是宜疏封且命申誥今遣某官某乙持節册爾為瓊王噫作德日休爾則逸作偽日拙爾則勞擇利而行令名斯至唐大詔令集巻三十四
