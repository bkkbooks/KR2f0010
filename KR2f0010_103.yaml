body:
  text: 唐大詔令集卷一百二十四宋宋敏求編政事平亂中誅李惟嶽後優恤易定等道詔平李懷光詔平李希烈詔破淮西李希烈詔平李乃詔平劉闢詔平李錡德音平吳元濟詔破淄青李師道德音破汴州李㝏敕平亂中誅李惟嶽後優恤易定等道詔李惟嶽蔑棄父業不率王命敢肆狂狡援結頑凶朕初示容貸佇其遷善欲明天討未即加誅故諭之禍福先之誡誥忠良感激義勇爭勸元惡梟戮方底寧定立千載之勳安兆庶之命此朕所以當扆興懷感念成功者也張孝忠亷日知王武俊等勳書竹帛分掌方鎮文武之任寄同心膂既舉加封之典宜𢎞善貸之命其易定深趙恆冀節度觀察管內幕府將士州縣官吏比在迫脅之中制非由已今元惡授首理合惟新以前過犯捨而不問自官軍出征所有誅戮並令州縣瘞埋勿令暴露有家屬者并許收葬管內百姓除本道所用外者給三年平李懷光詔朕聞自古哲王以道化下不竭物以充欲不勞人以樹威億兆之心如戴父母兵革不試四方來同茍昧於德綏務以力勝士旅疲耗蒸黎困窮幸以成功豈亦有補李懷光出自戎伍頗著忠勞拔於等倫授以旄鉞誓師河朔奔難奉天秉心匪彞自底不類怙衆貪亂附姦脅君朕用再遷幾危宗社洎股肱宣力賊泚就誅率土之人咸懷奮激朕獨排羣議未忍加兵命復官封志期全貸昏迷不返悖慢逾彰殘害使臣侵敗王略上帝悔禍元臣叶謀克集茂勳以夷大難蓋以誠信未著撫御失宜至使功臣陷於誅戮謂之尅敵能不愧心然以懷光一家在法無捨念其昔居將相嘗委腹心罪雖挂於刑書功已藏於王府以姦詐之迹固合滅身以赴難之勳所宜有後務從寬宥俾洽幽明宜以懷光男一人為嗣賜莊宅各一所仍還懷光首及尸任其收葬其懷光妻子孫在室女等並迎遞澧州委李臯遂便安置使得存立其出嫁女及諸親戚並宜釋放應先陷河中將士等皆因迫脅無路伸明一切並與洗雪先有官爵實封者亦許仍舊河中府及同州百姓並經陷賊生業廢棄興言軫念良用憫然宜各給復三年河中保寧節度并管內諸軍節度副元帥檢校司徒平章事北平郡王燧惟嶽降生鬱為時傑奉上有匪躬之節謀師懷盡敵之謀嘉謨屢聞能事畢備朔方河中同絳陕虢等州節度及管諸軍行營兵馬副元帥侍中咸寧郡王瑊堅持不奪之心亟陳必勝之略輯睦士旅崇功允集惟乃二帥其誠心奉行天誅同奬王室是加寵命以答殊勳燧可兼侍中仍與一子正員五品官并階餘并如故華州漳關鎮國軍節度檢校尚書右僕射駱元光邠寧慶節度觀察等使檢校尚書左僕射韓遊環鄜坊丹延等州節度觀察使檢校兵部尚書唐朝臣等並節著艱危功成討罰各賜實封二百户仍各與子六品正員官並五品階餘並如故應諸軍同討懷光將士宜封共賜三十萬端匹以充宴賞並放歸本道仍令所屬收敘録即超資與改轉嗚呼自國家多難二紀於兹朕嗣位七年連兵五載追惟往事悔恨盈懷今二孽既誅諸方甫定哀彼淮右獨為匪人其帥畔逆其衆何罪諸道應與淮西連接宜各守封境非彼侵軼不須進討仍委所在長吏明加招諭宣布朕懷李希烈若能歸降待之以不死其餘將士官吏百姓等一切洗滌與之更新斯爾庶邦自求多福無有逺邇咸使聞知平李希烈詔李希烈棄義背恩窮姦極暴謂神器可以力取謂生靈可以詐欺志在凶殘躬行僭竊罪無與比法所難容朕以君德不裕致人於禍究其端本過實在豫不忍使蒸黎重相攻戰屢施詔命務欲懷柔抑羣帥奮發之誠駐諸軍討逆之勢不憚屈已期於息人希烈曽無悛心益逞驕志虐毒滋甚吞噬無歇惡貫既盈自取夷滅開府儀同三司兼御史中丞陳仙竒忠勇有謀沉毅能斷攄闔境受汚之憤導三軍思順之心倡義一呼羣情嚮附廓清氛䘲殱戮渠魁驛書上聞函首入獻方隅既乂戍役其休懸賞之科是宜必信檢校工部尚書蔡州刺史御史大夫淮西節度仍賜實封五百户應淮西管內將士百姓等頃迫凶威遂從脅制既誅元惡俱是平人除希烈一家其餘悉從免宥更無所問將士等悉委仙竒諸色官錢優與宴設其中道首建謀李同斬李希烈等宜並條録奏聞節級褒賞百姓等久經淪陷兼被傷夷想兹凋殘實足哀憫除供當道軍用之外宜給優二年將士之中不樂在軍願歸農業者委節度使刺史量給逃户田宅并借貸種糧優復中身使存濟宜令尚書左丞鄭叔則往淮西宣慰嗟乎自希烈叛命於兹五年上澤不通下情亦阻所宜宣我信命以釋危疑爰敷惠和以禦傷瘵滌清汚俗咸與惟新底綏一方以稱朕意興元年破淮西李希烈敕敕朕纂奉丕業託於人上仁不被物義不勝姦頌聲蔑聞暴亂連起叛臣希烈竊拒淮沂誠彼夫無良亦由朕不得撫御之道失之於始師旅一興綿聨莫解服勞者從役不暇受汚者無路自新通邑化為丘墟遺骸遍於原野每念及此心傷涕流且自昔勞師靡有不悔以虞舜之聖屈於苖人漢武之強弊於戎虜矧乎德猶不逮力或未全我其永懷亦已自驚乃者下哀痛之詔布寬大之恩普天載新殊死畢宥然則尚勞師旅作梗封陲有纍嵗離棄家室有經時不解甲胄忠雖為國咎實在丁君人若斯寧不知愧賴將相士旅一其誠心奮揚武威慎固疆宇逺人思服元惡既誅蒸黎方致於安寧役戍永期於休息𢡟官以旌美賜宴以勞旋賞不逾時式遵彞典都檢校司空同中書門下平章事劉玄佐宜與一子正員五品官節度使檢校尚書右僕射兼御史大夫李澄檢校兵部尚書兼御史大夫典環檢校户部尚書兼御史大夫樊渾等與子孫一人六品正員官防禦使兼工部尚書賈耽都團練使檢校左散騎常侍兼御史大夫盧玄卿御史大夫張建封等並與子孫一人八品正員官檢校司空同中書門下平章事李抱真檢校司空同中書門下平章事李納檢校尚書左僕射同中書門下平章事韓滉檢校户部尚書兼御史大夫田緒等並追將士五千人赴河南行營同討不庭厥有成績抱真納滉緒並與子孫一人六品正員官應與淮西接界州縣本軍鎮守及諸道赴行營將士等宜共賜物三十萬端匹以充賞設度支郎約據界首及行營軍額上配定數目逐便支送仍委本道都統節度都坊禦都團練使即條録具名銜聞奏並與甄收其行營將士仍各放歸本路明加宣諭令悉朕懷貞元二年六月平李乃詔干紀挾邪罪在無捨立忠效節賞不踰時善惡之理明懲勸之義著李芳勞男乃包藏姦險違背君親悖慢朝章扇動軍旅縱其豺狼之性徇其梟獍之心迫脅使臣妄有希覬厭蠱其父謀害其兄名教之所不容臣子之所同棄而又恣為不道虐及無辜伊屢説張伍劉叔向並是忠良橫遭誅戮萬榮卧疾不能制正永言及此深用軫懷李乃稔惡貫盈宜正刑典其伊屢説等委却三人委中書門下則與追贈仍令與一子八品正員官應在汴州將士等志堅金石節厲氷霜叶奉邦家咸懷憤激不受熒惑問疾姦凶執縳軍中傳獻闕下勳庸特茂遐邇所知宜奬忠勞各加優賞並與進秩仍令董晉三日內具名銜聞奏仍共賜錢三十萬貫委董晉逐便取鹽鐵轉運使錢物分給宣武軍節度都虞候兼御史大夫鄧惟恭都押衙兼御史大夫杜皓大將王應鳯曹元侃楊燕竒劉惟清陳文朝陳沛張庭芬薛文翰趙臧周李庭光宇文淡李國信並竭忠效誠績用昭著惟恭可檢校左散騎常侍依前兼御史大夫賜實封百二十户一子七品正員官并賜物四百匹杜皓英幹並可右散騎常侍依前兼御史大夫應鳯已下各加官賜貫庭芬仍同節度副使十將等二百六十五人並優與改官在城將士被李乃脅從邀逼制使者事不由已朕所深知並一切不問宋州刺史兼御史大夫劉逸淮亳州刺史兼御史大夫食封五千户許孝常潁州刺史兼御史大夫髙五立等咸竭為臣之節各懷奉國之心並可檢校右散騎常侍各賜實封一百户其本官並如故仍各賜物二百五十匹其三州將士令别賜錢十萬貫亦並委董晉準前逐便收取鹽鐵轉運使錢物分給仍委董晉速具名聞奏當與甄録平劉闢詔朕聞去天下之害者受天下之利故陳諸原野非為樂戰法彼震曜本乎愛人五材不聞去兵七德必於禁暴皇王之道豈不信歟逆賊劉闢時之妖孽處肖形之內罔識君親同人代之間别為梟獍因元臣之蓄聚恃庸蜀之江山誘誤生靈扇惑桀逆朕荷袓宗之丕業邦國之大經人之亂常法所不捨乘兹懷憤爰我徂征興戈矛於關西發介馬於并郡五營禁旅七萃神兵合貔武之雄投鷹揚之帥守無絶險進靡堅營麾城而壁壘皆空接刃而攙搶盡掃瓦解氷泮渙焉無餘微盧彭濮從兹廣定蕩三蜀之流患除一方之大殘豈豫寡德能致於此斯皆宗社降祐啓無疆之休將帥叶謀成永康之福祗若靈眷嘉乃衆心豫懷惕然若陷氷谷其收復成都諸大將并擒獲劉闢軍將等委崇文與都監軍使俱文軫條流等第聞奏即有甄升其賞物等委崇文等節級分賜務令復原投降將士亦委崇文軫條流聞奏西川諸州鎮刺史大將及參伍官吏將健百姓等復應被彼脅從補署職掌一切不問西川百姓久遭凶逆不免傷殘其兩稅錢等委本道觀察使量事矜減其東川州縣及山南西道當凶徒聞惕之後王師攻取之辰發挽饋軍膳白補缺一日之貴豈止十金三軍所資盡出百姓永言勞弊朕所軫懷其東川元和三年上供錢並放留州留使錢委觀察使量事軫減仍具數奏聞山南西道元和二年上供錢糧放一半官軍陳亡將士等並委崇文監軍審勘具名銜事迹申奏即與褒贈家口等並委本軍優賞五年不停衣糧并委所在州縣速為收葬仍量事致祭陷在賊中官吏百姓等應有節義著明無辜受戮者並委節度使具名迹奏聞當與追贈仍優給其家不分疆設都蓋資共理形或壞制亦在稍均將懲難與銷明在立防而有素故賈生之議以楚益梁宋氏之規割荆易郢酌於前事宜加變通其西川資簡陵榮昌瀘等六州宜割屬東川於戲制理經邦必垂意於未亂而養災畜患固難䇿於已然撲彼燎原至於用鉞永言迷復載軫具聞咨爾多士依豫深志布告天下咸使聞知平李錡德音天地之德佐助者忠良鬼神之靈斃踣者盈貫故有無狀之釁顛越以敗常則有不奪之誠感慨以明節易所謂功業見乎變書所為不善降百殃積惡必至於滅身見幾寧俟於終日應若影響昭然著明李錡受恩三朝受任千里勺水卷石以至髙深潤草塗原豈酬亭毒而棄我厚德稔其姦心滔天以肆其逆謀推法未窮其醜行乃者式舉式斾申嚴國刑將鼓雷霆之威以誅梟獍之罪鎮海軍左廂兵馬使兼御史中丞子良等外𢎞智慮內激精忠擐甲執兵取凶人之柄瀝肝嘗膽懷徑草之風廽戈以掩其羽毛竟夕遂擒其魁首天府無一金之費已靜江流王師無一戰之勞已降人害莫大之節卓然無倫非常之功斯謂不朽髙位重賞豫何愛焉殊加榮寵宜顯旌勸其張子良等超異酬賞並從别敕處分其立功將士等並準平西川仍節度優賞甄敘其廂官健等素聞敕效順亦宜霑賞並從别敕處分王淡趙錡等仗節死義殺身成仁無罪無辜受兹殘酷所宜褒表並勸忠貞即加追贈故仍令州縣致祭收葬其王淡如有子弟服滿日與一子八品正員官如更無辜受戮及脫身效順者亦委元素具事聞奏當有褒贈及加甄録如受戮之中長行官健勿停糧賜優給其家浙西管內官吏及職掌人若被逼脅驅使者但情非同惡一切不問每念疲亡久罹虎政而又迫於逆命驅以饋軍攫斂則準以漏巵傷殘則烈於猛火永言於此如納諸隍宜申蠲貸之恩冀息呻吟之苦其潤州今年秋稅徴納者一切放免其管內諸州縣如李錡作亂之后橫加徴剝委元素審加勘責具色目聞奏其𣙜酒錢亦宜處置聞奏應副伐之師如未出本界者委本道量加賞給如已出界者仰具聞奏朕惟前王之訓欽慎典刑今為惡者就誅而建勳者已録應將櫜弓偃革遂物之生成力穯勸農分致於富壽覆車垂永鑒之轍端扆扇無為之風咨爾萬方宜知朕意平吳元濟詔朕聞天地之於萬方也道深昭育而雷電震曜將時警其不庭帝王之臨九有也德尚撫綏而原野師徒亦必加於有罪是以將伐而捨義在止姦禍召由人孽固難逭朕嗣膺寶歷恭守丕圖自靖亂也庸除妖海浙勘剪羣慝將期理平全保太和非欲生事逆賊元濟審可稔惡慿固阻兵擅釋父喪悖違君命行虧天性義絶人倫厲殘忍之聲豺狼是類忘生成之德梟獍為心大告屢加逆謀轉甚宜用社至出軍猶宜弔伐之方必冀兼討論之命元臣統護授幃幄之深謀上宰専征運廟堂之誠算羣帥畢力萬旅一心戰以力摧襲由竒勝李訴全師直進堅壁洞開元凶就執於城池餘孽奔降於草莾霧銷氷泮淮濆水清斯皆宗社垂休人神協贊仰荷靈眷俯嘉衆誠共協勤勞式副豫志惕然衷懷載益之厲頒爵授賞豫何愛焉其收蔡州擒吳元濟節度及諸大將等宜從别敕處分諸立功將士等委韓𢎞裴度行營諸道節度使速條流等第聞奏即有甄升其賞物等已令節給優厚支遣亦具别敕處分其授降士亦委韓𢎞裴度與諸道節度使計會條流聞奏其中有是親差子弟兵使放歸營農仍具數聞奏其淮西諸州縣官吏將健等雖被脅汚皆非本心除同惡巨蠧者一切不問其淮西百姓等陷此凶逆久罹殘傷莫匪吾人寧忘優恤宜準元敕給復二年仍委州縣長吏設法安撫其淮近賊四州自王師問罪供億實繁頻有優矜放其稅賦尚慮人多困極務俾昭蘇其來年夏稅亦宜放免比來諸州府供行營勞役尤甚宜令放委有司條流聞奏議優恤自經戰伐所有傷痍至於徇國捐軀效忠立節每加憫歎寤寐是懷官軍陳亡將士並委韓𢎞裴度與諸軍審勘具名銜事迹申奏即與褒贈其家口等並委本軍優賞仍五年不停衣糧并所在州縣速為收葬仍量事致祭於其家將士有因戰陳傷損以致殘廢者各委本軍厚致優恤仍給衣糧其陷在賊中官吏將士百姓等應有節義著明無辜受戮者宜令州縣府長吏致祭收葬仍委節度使具名迹聞奏當有褒贈仍優賞其家先以褒贈者委長吏訪其子孫聞奏當與甄録其家亦準例優賞於戲制理垂規每思去殺而亂常作逆多自干誅爰念興師至於殄寇纍年之內徴役靡寧除害雖本於愛人敷化終慙於用鉞宵衣永嘆所良貴焉咨爾萬方宜諒豫志破淄青李師道德音門下朕聞三光下燭懷忠秉義者其節必彰四海奠維作逆崇姦者其禍必大况乎恩有負於覆載禮自悖於君親罪盈而神怒既加惡稔而人謀乃發衆所共棄誅何可逃逆賊李師道包稔逆凶背德蔑義動皆干紀言必欺天固海嶽之山川為蛇豕之池宅忘寵祿於纍代恣殘忍於一方怙亂自至於滅身誅戮難窮於擢髮朕祗臨寶位仰奉丕圖除暴本務於好生用武尚慙於耀德肆命羣帥會兵龜蒙旗鼓相望城壘連下淄青都知兵馬使金紫光祿大夫試殿中監兼監察御史劉悟義勇中激沉謀外通攄三軍嚮順之誠申列郡受汚之憤迥戈首唱萬旅轉從渠魁就殱梟獍同戮載馳馹騎函首上聞氛祲廓清方隅底定功有卓異理當優崇旌善勸能用昭必信其劉悟所酬官賞並從别敕處分其同立功將士等賞物已處分支遣委宣撫使楊於陵與本道計會速條流功效等第聞奏續加甄奬魏博以全軍濟河俯壓賊壘攝推凶狡導致叶良謀作為保授既剪逆豎宜甄茂勳諸道行營咸盡忠力攻於戰取尅捷既聞應緣討伐將還之際合有宴勞賞賜等並從别敕處分委各本道條流有功將士聞奏當議甄録其淄青管內州縣官吏軍鎮將健及諸色職掌人等久罹脅汙自拔無由撫事量情亦可矜恕除同惡巨蠧者其餘一切不問其淄青道百姓等陷此凶逆久被殘傷昨同阻兵尤肆暴虐吾人是念豈忘優矜宜給復一年仍委本道州縣長吏設法撫綏其管內有髙年廢疾并鰥寡􅑏獨貧弱尤甚者委官察到日差官存問並量與粟帛訪問比者賊中有斗斛皆被收納今春農時貧乏者衆恐不辦耕桑失生業者宜令存問如有此色取所舊貯斛斗量事給與令充種食得存濟其賊中雜差點子弟夫役便放還本處其中有不能自存者量事優恤百姓商旅諸色人中有被分外無名賦斂者並當勸停自興討伐言念傷痍扞患捐軀納忠徇國良深隱憫寧捨寤懷其官軍有陳亡將士等委本軍審勘具名銜事迹申奏即與褒贈仍令本軍優賞其家三年不停衣糧并委所在州縣速與收葬量事致祭其將士有因戰陳傷損尤甚以致殘廢者各委本軍厚加優恤仍勿停解其陷在賊中官吏百姓等應有節義著明無辜受戮者宜令州府長吏致祭收葬仍委節度使到日具名迹聞奏當有褒贈仍優賞其淄青封域歷稔氛昏管內名山大川在祀典者宜令宣撫使舉本鎮計會差官備禮致祭其祀廟中應緣陳設器服等物是賊中所置者並宜廢撤特加修援用處致誠於戲朕恭巳嚮明撫御九有推情以恕出令在寬而凶逆反常自貽天討迷於告諭速彼誅鋤轉禍必有其忠臣為亂竟同於覆轍既除逋寇庶洽大和偃戢干戈諒從此始布告遐邇咸使聞知主者施行元和十四年二月二十一日破汴州李㝏敕敕理天下者務於安遐邇致康濟者資於懷兆人朕統馭萬邦式敷王度任藩方以俾乂冀干戈之載戢虔恭惕厲未始暫忘推懷是心布乃中外昨乃夷門逐帥逆將興師蒼黃變生黎庶無告逆賊李㝏驅掠忍害流離毒痛在浚之郊君鼎將爨逼脅我軍盜竊我戈鋋驅馳外坰敢肆蜂蠆朕所以不降明命未行天誅容革其心以示迷復蓋以一方軫念三面開羅將𢎞愛物之私用廣好生之施而梟音資戾醜狼慿凶危巢巳焚禽猶自若光顔韓充曹華智興等感激忠勇揮戈誓師雷霆鼓旗所向風靡逆黨殱殄平原霧清熊羆之師漸及摩壘夫疾風朝來斯徑草方辨熾火將燎而良金益明果聞義烈之臣奮起轅門之內一揮斬首三令無喧嚴城洞開以候來師永言忠效是錫寵章其梟斬逆賊李㝏宣武軍都知兵馬使李質已從别敕處分忠武兖海武寧鄭清滑等軍將士等感主帥之忠誠忘身赴敵視寇仇而忿嫉決命爭登髙簡以睢陽一郡之師當蛇豕奔衝之勢咸能勦其醜類如刈草菅各振軍聲用宣威略其忠武兖海寧鄭滑應付行營及宋州將士等並節給各有賞物以别處分支給委本軍據功勞額烈級散歸還之時仍加宴勞朕念彼無辜墜此塗炭橫為凶狡驅脅傷夷其汴州管內縣州官吏軍將鎮健及諸色職掌人等頃羅脅汙自拔無由事非獲己情亦矜恕除同惡巨蠧者其餘一切不問仍榜示如或妄有恐嚇言告者科其反告之罪干戈暫興里閭必害春言農畝是廢耕桑其汴宋鄭三州罹此凶逆士馬屯集供億殷繁雖事乃徇時而人亦勞止豫懷軫念豈忘優矜其三州管內有兵馬所到縣百姓或被驚擾處且於今年秋稅三分內量放免一分仍委州縣長吏切加綏撫其賊中雜差點子弟夫役放還鄉里俾安生業其中有不能自存者量事優恤應百姓中有被分外無名賦斂者並宜當時勸停義士忠臣見於死節賞功褒美冀及殤魂惠恤其孤庶明報效軍有陳亡等并李㝏為亂已來有潛謀效順誠節可嘉并因此遇害者並委本軍審勘具名銜事迹申奏當與申奬及加褒贈仍令本軍優給其家三年不停衣糧并委所在州縣速為收葬董事致祭其將士有因戰陳傷損尢甚以致殘廢者各委本軍厚加優恤仍勿停解掩骸埋骨國之令典迫於凶醜良可傷嗟念其本亦吾人蓋事非獲己其經戰陳處所有賊中遺骸隨令所在州縣隨在收瘞勿致暴露嗚呼弔伐之道豫遵格言靖寇安人豈忘終日朕載櫜弓矢思保黎首而雨露所均動植所繫一夫竊嘆朕每興懷况兹浚郊都邑之會所以慎擇將帥期於乂安今寇孽巳清封壤寧息師之所處用軫於中將申宥恤之恩庶息瘡痍之痛布告中外咸使聞知長慶二年八月二十五日唐大詔令集卷一百二十四
