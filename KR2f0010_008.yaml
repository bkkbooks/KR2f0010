body:
  text: 唐大詔令集卷八宋宋敏求編帝王尊號册文下文武孝德皇帝册文文武大聖廣孝皇帝册文仁聖文武至神大孝皇帝册文仁聖文武章天成功神德明道大孝皇帝册文應乾聖夀太上皇册文尊號册文下文武孝德皇帝册文維長慶元年嵗次辛丑七月乙未朔十八日壬子金𬗋光祿大夫檢校司空兼太子少保上柱國鄭國公食邑三千户嚴綬文武官六千二百七十七人等言臣聞天以萬物付聖人聖人本天意而保乂之惟犧農先天而貞惟軒轅奉天而行惟堯舜法天而明莫不絪緼粹精昭建鴻名以至於夏殷周漢謙儉服義仁愛忠利亦著稱謂代濟其美當隋之末我髙祖神堯皇帝救拯焚溺應天立極蕩氛昏揚凱澤父教而母育恩德髙肌骨維天寶季嵗賊臣紊常塵起幽陵毒流四方纍聖含𢎞視人如傷餘枿勢滋専土擅強憲宗因天時順人心舉武經明大刑連拔堅險顛踣同惡冥冥沉沉猶恃榛穢干戈不得息者綿六十七祀逮我后之御厯紹太宗之求賢審官舉直錯枉體玄宗之尊師敬道清靜致理法肅宗之循名求實刑賞用中廣德宗之亭毒含容博採虛受而後展嚴於配天夷思於法宫從物無私推誠至公霈矣乎廣受寂然乎感通神武不殺而天下會同昔少康祀夏聿修皇祖之訓周武繼統務廣文王之聲爰洎宣王克服蠻荆勞來安集洎漢光武既平隴蜀聽政忘寐伏惟皇帝陛下以至聖之姿誕啓昌運重明之業紹開中興豈無避違從風恱化而自革豈無氛翳大明升中而自除皇澤暢於九圍文命敷於萬國則向之數王何足稱哉尚復孜孜庶本不遑勞謙日昃講道求賢議獄恤刑去讒進直以利物勤人為政本以檢身戒懼為化先自誠而明日慎一日是以天道惟新於景命玄德亟聞於四方億兆咸曰大哉君心復曰懋哉君功降延禧之主揚仁夀之風恢帝圖廓皇綱崇鴻名顯無疆不然者何以答上靈之眷命乎何以惠庶氓之懇望乎於是垂白之老緇黃之衆與侯甸藩衛之士守闕稽顙日以上請臣等所以勤勤懇懇敢固以言陛下猶堅秉撝揖至於三四不得已而降前詔於是百辟卿士考天人之意稽典禮之義進而言曰陛下崇儒問道恭默致化文之明也保大安乂感懷夷夏武之彰也嚴恭寅畏博愛廣敬孝之大也宣慈惠和忠恕利物德之盛也臣等不勝大願謹上玉册玉寶上尊號曰文武孝德皇帝伏惟陛下敬天之錫昭聖之功髙明有嚴慎德無窮赫赫融融與天比崇臣綬等誠歡誠懼稽首頓首文武大聖廣孝皇帝册文李逢吉維寶厯元年嵗次乙巳四月甲戌朔二十日癸巳攝太尉銀青光祿大夫檢校右僕射兼太子少師上柱國天水郡開國公食邑二千户臣趙宗儒及文武官六千五百四十一人等言臣聞自古王者之御極也必上奉乎天地丕承乎廟祧法天地所以宅八紘嚴宗祧所以垂萬葉非休聲震越不足以齊燾載非尊稱超卓不足以光祖宗則名實之際不可誣也肇自上古質文未具號兼三五事本嬴劉其後正閏相承南北更王僉事因襲而罔圖旌别茍鴻猷既洽徽數莫申貽諸裔昆靡所稱謂抑當時臣子之罪非所謂納君於善者皇唐列聖備有典常髙宗而降代享丕號以至於玄宗之治平肅宗之蕩定德宗之烈文憲宗之戡剪先聖之克荷重熙纍盛震邁古昔未有不由斯者巳伏惟皇帝陛下濬哲自天寬仁在躬聖齡方富睿德咸稱行懋於朱邸聲飛於青宫始踐祚而虞舜之大孝聞焉既郊天而文王之小心著焉竭愛敬於西宫示儀型於四海慎簡名傅優寵直言自嗣位以來百度維新九圍式敘邊烽罔不罷屬國罔不來靈化有肸嚮之助風雨無伏愆之候至玄至賾可勝道哉由是百辟羣司耆儒碩士文武臣庶緇黃幼艾殊形一心異聲同辭隳肝瀝膽奉上徽稱其誠至矣吾皇猶惕然三讓不得已而俞焉斯謙尊而光卑而不可踰者也夫經緯天地曰文則二儀交泰矣克定禍亂曰武則八蠻順軌矣格於上下非聖歟通乎神靈非孝歟臣等恭考庶言強名聖德不勝大願謹奉玉册玉寶上尊號曰文武大聖廣孝皇帝伏惟陛下祗上帝之眷命荷纍聖之儲休外順四夷內從百辟時承昌運昭受鴻名然後躬大易不巳之義思禮經日新之旨鑒拜休之至誠考無過之格言以緝熙庶績重其文以斥去羣邪盛其武以日逹四聰載大其聖以慎守九廟益廣其孝克儉克勤有初有終所踈者佞所近者忠畋逰必省獻替必從無忘我髙祖太宗之丕烈以永家邦臣宗儒等誠歡誠懼頓首頓首謹上仁聖文武至神大孝皇帝册文李德裕維會昌二年嵗次壬戍四月乙丑朔十四日戊寅攝太尉光祿大夫守司空兼門下侍郎同中書門下平章事臣德裕銀青光祿大夫守尚書左僕射兼門下侍郎同中書門下平章事臣夷行金𬗋光祿大夫守尚書右僕射兼中書侍郎同中書臣珙銀青光祿大夫守中書侍郎同中書門下平章事臣紳及文武百官金𬗋光祿大夫檢校司徒兼太子太保臣僧孺等六千五百七十四人等言臣聞羲皇首太古之號成湯顯聖武之稱我髙祖皇王是憲尊名若古詒厥丕訓為子孫之法豈不善始善述哉矧乃巨唐受命繼體天業理運將至大君以興昊穹所以開至聖也曩者明兩未定帝華不協捨允傳聖深惟至公先后所以昭天命也亦猶堯發於唐侯文興于代邸神明之祚不其難乎伏惟皇帝陛下清明博鬯光耿四海玄德莫鄰天休大賚日角見表志氣如神爰初定命正心理物如辰居其極而天下無邪矣由是昭德塞違尊賢逺佞禹不自滿成不敢康罔逰於田不邇於色自閨閫以施王教由家道而刑國風去比周核名實攬權綱擇聖紀修舊典協誠質扢嘉壇欵太一進正臣以端治表禮故老以求讜言逺無蔽獄近無留令祈玄祖而膏雨降祀靈嶽而嘉榖登省刑罰而蓬孛消發倉廩而螽螟息去嵗龍旗承祀大輅親郊捧玉瓉而一獻光靈來格振金石而六變魄寶昭臨然猶古訓是學緝熙於道天文炳煥雲漢其章溫恭敬遜承太任之教和樂愷悌洽戚藩之心德風偃於羣黎威霆動於絶域又以敬養不逮於長樂昭配未升於禰宫每懷嗣徽蒸蒸而慕所以奉若慈訓對越兩儀因心立制永錫其教寬底剭之罪興惻隱之心廽霜收電為之反汗及單于慕義景附朔邊耀德戢兵謙臨是受至於備文物展國容莫不先甲而布甘澤丁辰而廓隂翳和景晏溫卿靄絪緼斯所謂神祗之心應矣天人之際交矣於是服冕之士戴鶡之倫暨藩衛邦伯黃髮台背不謀而進曰陛下玄默天晬輝光日新大矣孝熙四極爰臻誠宜玉版溫潤鏤鴻名之德神寶焜耀薦萬斯之年丕天大典不可辭也陛下猶謙退固拒至於三四羣臣不巳乃曰俞哉夫遍覆包含之謂仁極深研幾之謂聖憲度著明之謂文蠻夷震疊之謂武感而遂通之謂神無思不服之謂孝臣等不勝大願謹奉玉册玉寶上尊號曰仁聖文武至神大孝皇帝伏惟陛下乾健不息謙尊而光樂戒其耽禽戒其荒夀乃侔於殷宗俗乃厚於成康貽燕後昆受福無疆臣德裕等誠歡誠懼頓首頓首謹言仁聖文武章天成功神德明道大孝皇帝册文維會昌五年嵗次乙丑正月巳酉朔一日己酉夫守太尉兼門下平章事臣德裕光祿大夫守尚書右僕射兼門下侍郎同中書平章事臣悰朝議大夫檢校尚書右僕射兼中書侍郎同中書門下平章事臣李讓夷朝議大夫守中書郎中兼户部尚書同中書門下平章事臣崔鉉及文武百官大中大夫守太常卿臣孫簡等六千一百二人等言臣等聞在昔周宣獫狁內侵四牡薄伐以定王國則詩人大其功暨乎漢宣北夷乖亂呼韓慕義郅支逺遁則簡册著其美惟此二代稱為中興間者開成之末星孛如雲螟飛蔽天先帝戚之黎人懼焉乃授至聖遺大投艱迄兹成功厥有冥數伏惟仁聖文武至神大孝皇帝表應龍翼粹含乾剛神全而正氣凝宇定而天光發智燭千里動必察微心鏡萬機物來斯應於是五材用四維張建中和之極綴前聖之綱重樞機修法制刑御家之理無出梱之言銷讒邪逺姦佞斥背公之黨退好徑之人內嚴體貌增堂階之峻外絶締交去輔車之勢古所謂受命於天惟舜獨也已又曰一心定萬物服惟陛下得之曩者北狄矜功耗蠧中國種類盤牙根柢封殖異術胏附縞衣如荼朋邪作蠱浸淫宇內倒懸不解百有餘年既而龍祠湮滅擕國欵塞質帝女蹙漢疆有狼顧平城之心鯨吞盛樂之志爰命梟將搴旗刈旃兵鏖穹廬火烈荆榛揚罽幕碎轒輼六騾遁逃貴主生還剗滅妖迹剿除醜類故名王結髮冠帶入臣堅昆稽首鞮譯來獻而又姦臣放命二紀陸梁據太行之固下窺洛邑通故絳之道旁睨近關樹其遺蘖以竊兵柄議者僉曰精甲十萬積榖十年泉魚不察湯網宜懸陛下雄斷霆聲羣疑氷釋揚清風以掃雲鼓迅雷以破山任馮異則拔天井而震上黨仗吳漢則發突騎而傾邯鄲壺關失嶮山東奪魄屬有戍邊叛將竊發參墟人心搖蕩異議放肆陛下臨朝而言曰二冦獲罪於天豫所不捨未三旬而定晉陽才期年而滅潞子不以金購狶將多降不勞師克粵首馳報非至德感物孰能臻此乎由是台宰百辟藩屏將帥上言曰成伐東夷而肅慎來賀景剪七國而王室乃安莫不始於武功終致刑措將以禋上帝薦祖宗宜受鴻命以答玄貺陛下猶謙而五讓之勤請罔已乃屈已以俞之雲漢為章所以昭法度也神明其德所以成教化也巍乎有功帝堯之則也勤於大道玄祖之訓也臣等不勝大願謹奉玉册玉寶上尊號曰仁聖文武章天成功神德明道大孝皇帝伏惟陛下不有其名以保其成不德其功以成其盈享殷宗之福致周道之平熙我王度玉振金聲臣德裕等誠歡誠躍頓首頓首謹言應乾聖夀太上皇册文張𢎞靖維永貞二年嵗次丙戌正月丙寅朔皇帝臣某稽首再拜奉册言臣聞上聖玄邈超乎希夷強名之極猶存乎言象豈足以表無為之化光不宰之功然稱謂所施簡册攸著涵泳德澤感於精誠願奉鴻徽有以自竭伏惟太上皇陛下道侔玄元業纂皇極膺千載之休厯承九聖之耿光宣昭化元發揚大號政有敦本示儉慶有格天漏泉恩翔春風仁育羣品而成功不處褰裳去之付神器於沖人想汾陽之髙蹈體堯之德與神同符其動也天其靜也地巍巍事表無德而言焉顧兹寡昧屬膺大寶懼忝傳歸之業莫申繼述之志夙夜兢畏惟懷永圖今天下幸安皆睿訓所被而未極徽號孰報君親是以台臣庶官文武之列抗疏於內方伯藩守億兆之衆同詞於外請因夀厯以播鴻名臣不勝大願謹上尊號曰應乾聖夀太上皇當三朝獻夀之辰應五紀啓元之始光膺徽稱允叶神休斯天下之慶也臣稽首再拜唐大詔令集卷八
