body:
  text: 唐大詔令集卷九十九宋宋敏求編政事建易州縣置乾封明堂縣制置鴻宜鼎稷等州縣却置潼關制置營州都督府制改梁州為興元府詔城鹽州詔置宥州敕置行蔡州敕置遂平縣敕置孟州敕分嶺南為東西道敕降徐州為團練敕建徐州為感化軍節度敕升華州為興德府敕修復故事諸衛隊仗緋色幡改赤黃色詔復尚書省故事制釐革匭函進狀敕釐革諸留中不出狀敕建易州縣置乾封明堂縣制鸞臺元天著象於紫微厚地區域於赤縣外崇四嶽伊帝闡其宏規旁别九州玄王劭其丕績所以料兹物土畫野分疆相彼人事觀時濟俗開物成務理則有然髙祖皇帝誕應靈命肇開景業括囊軒頊孕育胥庭太宗文皇帝大聖登期自天縱哲撲崑崙之猛燎拯滄海之飛流巍巍蕩蕩無得而名朕以虛薄夙奉瑶圖承纍德之鴻猷履會昌之嘉運中外禔福逺邇乂安仰薦成功升禋岱巘緬維嚴配祗建合宫感事開元聿光先德俾我黎獻永賴隆平寧濟之方實資寬簡鑒寐凝想思致厥塗以為翼翼上京率土攸仰剪華抗堞貫渭流瀾城闕崇嚴都邑夷敞户口盈積市獄殷繁東西兩縣官曹尚少在於撫字事或難周至於詞訟綜理時闕須分所職各使兼濟其長安縣宜置乾封縣萬年析置明堂縣並於京城內近南安置其户口即於兩縣逐便割𨽻應須官寮并公廨等一事以上並準長安萬年兩縣各令所司處分奏聞庶使憂勤之懷獨映於前古建元之慶長垂於後業總章元年十一月二十日置鴻宜鼎稷等州制鸞臺朕聞先王疆理天下也莫不料其土宇相其地宜分五服以應財成宅三川而適通變辨方樹辟協和之道以隆置郡罷侯經始之圖載逺而區分或異制度罕同連率法於在鎬牧守議於起沛官稀則政毁地狹則人勞義在隨時期於致理我大周席蘿闡化夢梓登期通三授玄扈之濵得一升翠溈之汭維髙設險聳危峯於少室在河稱防導洪波於太史卜兹洛食是曰奧區物産孔殷形勝斯在朕仰膺眷命俯叶樂推即瀍澗之基恢鼎革之運珍符寶貺賁發郊藪佳氣榮光昭煥州澤建明堂而陟配立清廟以嚴禋方闡隆周之業以光卜年之兆况成王定鼎此則餘基永言朝貢實歸中壤是霜露之所均當水陸之交會庶齊勞逸無隔遐邇作制王畿雖憲章於故實緬惟帝邑未折𠂻於新規宜𢎞自我之典式廣來蘇之澤但京兆之地舊號秦中乃眷編氓最為繁殖一州獨治事多壅滯宜令雍州管內析置五州其間以雍州以西安置潼關即宜廢省然以千里之內舊制通畿征賦所出事資廣逺又王侯設險以固其國若無襟帶何以為守雍州并所析州同州太州並通入畿內洛州南面北面各置關庶食采之地自分湯沐之邑棄繻之客更從軒蓋之遊其雍州舊管及同太等州土狹人稠營種辛苦有情願向神都編貫者宜聽仍給復三年百姓無田業者任其所欲即各差清強官押領並許將家口自隨便於水次量給船乘作數次進發至都分付洛州受領支配安置訖申司録奏聞朕聞人惟邦本本固邦寧將以不肅而成既庶而富欲令率土黔黎咸得遂性勞來安堵人不失業其有諸州人或先緣飢歲流宕亡歸或父兄去官因循寄住為籍貫屬恐陷刑名荏苒多時未經首出衛士雜色人等並限百日內首盡任於神都及畿內懷鄭汴許汝等州附貫給復一年復滿便依本畨上下其官人百姓有情願於洛懷等七州附貫者亦聽應須交割及發遣受領並委本貫共新附州分明計會不得因兹隱漏户口虛蠲賦役并新析五州三面及雍州以西置關處所司具為條例務從省便奏聞天授二年七月九日却置潼關制鸞臺山河作固肇自往圖關梁是修仰惟前典朕情存大朴志在無外成臯姬險勿用咽喉函谷秦封解其襟帶欲使雁行靡拾鶉居不擾而氓俗澆弊浮惰者多非所以禁絶末遊作限中外事資權變理貴從宜其潼關便可由舊安置應須修補及官典兵防一事以上所司速準例處分其神都四面應須置關之處宜令檢校文昌虞部郎中王玄圭即往檢行詳擇要害務在省功斟酌古今必令折衷還日具圖樣奏聞聖歷元年五月十九日置營州都督府制朕聞舞干戚者所以懷荒逺固城池者所以欵戎夷我國家頃有營州兹為虜障使北戎不敢窺覘東蕃由其輯睦者久矣自趙􅔘失於鎮靜部蕃因此攜離頗有負塗之暌旋聞改邑之歎髙墉填塹故里為墟言念於此每思開復達奚饒樂郡王李大酺賜婚來朝已納呼韓之拜契丹松漠郡王李失活遣子入侍彌嘉秺侯之節咸申懇請朕所難違宜恢逺圖用光舊業其營州都督宜依舊於栁城安置改梁州為興元府詔敕自昔多虞順時而動古公避狄兆永祚於岐下髙帝徙蜀建雄圖於漢中王迹所興子孫是奉覩遷居之遐阻知致業之艱難矧天下為家不常厥邑王者所至四方會同崇號設都於是乎在朕遭罹寇難播越梁岷蒸庶煩於供億武旅勤於扞衛凡百執事各奉厥司人皆競勸物以豐給嘉乃成績豫懷不忘今大憝巳除京邑甫定將旋法駕展敬園陵眷於是邦復我興運宜其崇大以示將來古者天子省方則問百年恤百姓以頒慶賜以懋勳榮用𢎞布澤之恩式慰來蘇之望宜改梁州為興元府其署置官資望一切並與京兆河南府同南鄭縣升為赤縣諸縣並升為畿縣見在州縣官各令終考秩至考滿日放選依本資處分耆夀與板授五品仍並賜緋先已賜緋者並賜紫典正等各賜勳五轉百姓除先減放稅錢外更給復一年洋州宜升為望州見任州官亦令終考秩並諸縣官等各減兩選無選可減者各加三階應山南西道節度下將士除扈從迎駕已經改官者餘並即與甄敘宣示有衆明知朕懷興元元年六月城鹽州詔設險守國易象垂文有備無患先王令典况修復舊制安固封疆按甲息人必在於此鹽州地當衝要逺介朔陲東逹銀夏西援靈武密邇延慶保捍王畿乃者城池失守制備無據千里亭障𤇺燧不接三隅要害役戍甚勤若非興集師徒繕修壁壘設攻守之具務耕戰之方則封內多虞諸華屢警由中及外皆靡寧居深惟永圖豈忘終食顧以薄德至化未孚既不能復前古之封致四夷之守與其臨事而重擾豈若先備而即安是用思久逺之謀修五原之壘使邉城有守中夏克寧不有暫勞孰能永逸宜令左右神䇿軍及朔方河中綘邠寧慶兵馬副元帥渾瑊朔方靈鹽豐夏綏銀節度都統杜希全邠寧節度使張獻甫左神䇿行營節度使邢君牙夏綏銀節度使韓潭鄜坊丹延節度使王栖曜振武麟勝節度使范希朝各於所部簡擇馬步將士合三萬五千人同赴鹽州左神䇿將軍兼御史中丞張昌宜充右神䇿軍鹽州行營節度使權知鹽州刺史兼御史大夫杜彥光可鹽州刺史兼御史大夫應所板築及緣修城雜役等宜共取六千人充其餘將士皆列營布陳戒嚴設備明加斥堠以警不虞其修城板築功役將士各賜絹布有差其鹽州防秋將士三年滿與代更加給賜仍委杜彥光具名聞奏悉與改轉其防遏將士等畢事便合放歸仍賜布帛有差其諸軍吏士都賜帛七十匹朕情非為已志在靖人咨爾將相之臣忠良之士輸誠奉國陳力忘勞勉茂功勳永安疆埸必集兵事實惟衆心各相率勵以副朕意貞元九年二月置宥州敕敕天寶中宥州寄理於經略軍寶應以後因循遂廢由是昆夷屢擾黨項靡依蕃部之人撫懷莫及朕方宏逺略思復舊規宜於經略軍置宥州仍為上州郭下置延恩縣為上縣屬夏銀綏觀察使元和九年五月置行蔡州敕淮蔡近郊久隔皇化本殱凶虐在拯生靈况今賊黨携離相繼效順思俾阽危之俗盡霑收養之恩勞徠招綏今之所切其新除蔡州刺史楊元卿宜令與李訴商量計會且於唐州東界選擇要便權置行蔡州如百姓官健有歸順者便準敕優恤存撫令知國恩必使全活元和十年三月置遂平縣敕敕文城柵將士百姓等脅汙之中同心效順率此危疑之俗盡為忠義之人言念乃誠思加奬異爰圖改邑之制用表移風之美其蔡州行吳房縣宜改為遂平縣仍於文城柵南新城內置便為上縣權𨽻唐州元和十二年四月置孟州敕敕昔馮異之守孟津已建軍號近光弼之保伊洛先據三城蓋以河有造舟之危山有摧輪之險左右機軸表裏金湯既當形勝之地實為要害之郡今所置制豈限常規積萬庾於敖前尤資地利列二矛於河上須壯軍聲其河隂宜割屬孟州仍改為望縣其河清縣却還河南府收管縣官等並準前敕處分其東都鎮遏兵馬依前屬東都防禦使鄭滑汝州防戍兵各一千令敬昕權揮使平後續有處分會昌三年十月分嶺南為東西道敕敕嶺南分為五管誠巳多年居常之時同資禦捍有事之際要别改張雍州西接南蠻深據黃洞投兩江之獷俗居數道之遊民比以委人太輕軍威不振境連內地不並海南宜分嶺南為東西道節度觀察處置等使以廣州為嶺南東道雍州為嶺南西道别擇良吏付以節旄其所管八州俗無耕桑地極邉逺近罹寇擾尤甚凋殘將盛藩垣宜添州縣宜割桂州管內龔州象州容州管內藤州巖州並𨽻嶺南西道收管咸通三年十月降徐州為團練敕敕徐州本貫支郡先𨽻東平建中初李洧以畏忌歸降遂創徐海使額貞元初張建封以威名寵任特貼濠泗兩州當時緣拒捍淄青犄角光蔡務張形勢廣樹藩垣自寇孽氷銷區域無事武寧一道翻長亂階曽靡悛心殆成逋數須為制置以削凶殘徐州宜改為本州團練使除當州諸縣鎮外别更留兵二千人𨽻屬兖海節度使收管濠州本屬淮南節度收管宿州地居埆口路厄彭門北接睢陽南臨淮甸當漕運之要蓋水陸之衝宜置全師以臨列郡仍置宿泗等州都團練觀察處置等使便以宿州為理所王式且充武寧軍節度使兼徐泗濠宿等州制置使其兵馬除留在徐州外仍令王式與玄質量其多少分配宿州團練使及泗州兵馬留後濠州渦口城使下如人數猶多即分𨽻屬淮南浙西天平兖海淄青等道逐便收管各給本分衣糧其家一任相隨官中接借發遣令其存濟其割配諸道將士緣皆有家屬須令裝束每人各賜絹兩匹以户部物充其徐州諸縣先有鎮堡處亦量要害輕重差配人數守捉武寧軍大將如素有軍功及營官已至中丞大夫以上者各具名薦聞别加委用其餘割送兖宿兩道軍前收管如情願住徐州者亦聽穩便王式玄質一切共為制置待公事分配總畢必知寧帖無事即令王式與崇憲等自領兩道兵馬直到汴州分付仲齊及滑州節將各押領送歸本道王式玄質俟許滑將士歸後既無公事便赴闕廷别加勞奬其衙內銀刀等將官健有逃匿未捉獲者若能束身首所在歸役者便一切不問仍準前敕割配諸道與衣糧并家口任去敕到後一月內不出陳首者即不在此限餘準詔旨處分咸通三年八月建徐州為感化軍節度敕敕徐州地當沛野軍本驍雄實為壯國之都固叶建侯之制况山河素異土俗甚殷豈欲削卑挫其繁盛蓋緣此稔禍或至亂常罪由已招孽非天作桂林叛卒繼有逆謀塗炭生靈首尾兩嵗殺傷黎庶汚染忠良所不忍言尋皆翦滅是以卑其鎮額𨽻彼藩方近屬大兵以來飢年荐至且聞軍人百姓深耻前非願行舊規却希建節朕每懷軫念思致雍熙欲示渥恩特議改易既崇軍府要備供須宣賜宣徽庫內綾絹一十萬匹助其宴犒必獲周豐纍嵗用兵甚費國力特與借助功在節量如初有脅從後成亡命或未還鄉里或逃匿諸州加意招携各歸本業若稱自樂所止亦可循其私情貴衆士獲安恐一物失所用期昭泰必在均平典故具存廢興不昧仍更鎮額盛彼軍威冀覩封疆永保寧謐其徐州都團練使仍改為感化軍莭度徐宿豪等州觀察處置等使咸通十一年十一月升華州為興德府敕敕有虞氏之為君始言省狩周襄王之告難乃曰出居或肆覲於他邦或播遷於近服然則地圖之內車轍所臨備庶官而取象拱辰入九貢而以時述職是云守宇皆可建都昔者德祖省方平戎服國升漢中之列郡同諸府以正名藩翰之光典章實重朕越在關輔屢經嵗時茍寬失馭之憂蓋獲視朝之所鎮國軍節度使韓建始者星馳感憤雪涕奉迎邀天力以來同激人情而共固以兹駐蹕安類覆盂邑無夜犬之驚野有春耕之樂今則元龜告吉六馬將還望山河而信是金湯顧宫室而若無風雨眷言至此我實懷之俾慰衆心爰遵故事宜改為興德府其所署官員資望一切與五府同鄭縣升為次赤諸縣為次畿其將校等並賜華州安駐功臣光化元年八月修復故事諸衛隊仗緋色幡改赤黃色詔三王繼統質文互於相襲五德承運服色遵於必正旗常改制騂翰異宜所以表軍國之容合聲明之度事之大者安可因循而已焉國家應樞軸之期清黃鍾之厯憲章垂範運既屬於惟新旗幟用色義必在於改故頃者俯納羣議式明統緒故得天人致和風雨時若豈朕躬菲德克廣睿圖實纍聖𢎞休允應景運稽古之大既有昭明文物之資理宜詳正其諸衛應隊仗所用緋色幡等改為赤黃色庶克遵於通變諒有叶於從宜其諸節度并營內軍使等亦宜準此天寶七年七月復尚書省故事制唐虞之際內有百揆庶政惟和至於宗周六卿分職以倡九牧書曰龍作納言帝命惟允詩云仲山甫王之喉舌皆尚書之任也雖西漢以二府分理東京以三公總務至於領録天下之綱練核萬事之要邦國善否出納之由莫不處正於會府也令僕以綜詳朝廷丞即以彌綸國典法天地而分四敘配星辰而統五行元元本本於是乎在九卿之職亦中臺之輔助小大之政多所關決自王室多難一紀於兹東征西伐略無寧嵗內外荐費徴求調發皆迫於國計切於軍期率以權便裁之新書從事且救當時之急殊非致理之道今外虞既平罔不率俾天時人事表裏相符宜昭畫一之法大布惟新之令甄陶化源去末歸本魏晉有度支尚書校計軍國之用國朝但以郎官署領辦集有餘時艱之後方立使額參佐既衆簿書轉煩終無𢎞益又失事體其度支使及關內河東山南西道劍南東川西川轉運常平鹽鐵等使宜停儀禮之本職在奉常往年置使因循未改有乖舊制實曠司存委太常卿自舉本職其使宜停漢朝丞相與公卿以下五日一決事帝親斷可否且國之安危不獨注於將相政之理亂固亦在於庶官尚書侍郎左右丞及九卿參領要重朕所親倚固當朝夕進見以之匡益也頃以邉陲未寧日不暇給又省事之務多有所分簡而無事曠而不接今大舉綱目重頒憲章並宜詳校所掌明徴典故一一條具面陳損益如非時須有奏議亦聽詣閣請對當覽其意擇善而從朕受昊天之成命承纍聖之鴻業齋心滌慮夙夜憂營顧以不敏不明薄於德化致使舊章多廢至理未𢎞其心愧耻終食三歎雖詔書屢下以申賑恤而朝典未舉猶深鬱悼思與百辟卿士勵精於理俾國經王道可舉而行各宜承式以恭爾位大歷五年三月釐革匭函進狀詔敕匭函所設貴逹下情近省所投文書頗甚煩碎或論列祖曽功業或進獻自已文章無補國經有紊時政極言不諱豈假匿名今後如知朝廷得失軍國利害實負寃屈有司不為申明者任投匭進狀所由即時引進不得擁滯餘不在投匭之限宜委匭使準此仍留副本開成五年四月釐革請留中不出狀詔近因李延齡告李芳回大逆其狀請留中不出朕親覽之際已得其情及令鞫問果辨欺詐比者朝官論人過失亦請留中且嫉惡除姦人臣明義知其隱慝足得顯陳深務蓋藏必因嫌恨事不由於直道情乃近於讒邪危人者得騁私懷罹謗者何從自辨無禆政理適長寃誣昔漢宣帝時章文必有敢告之字乃下前王令典實可遵行宜起今後應有朝官及上封事人進章表論人罪惡並須證驗明白狀中仍言請付御史臺按問不得更云請留中不出如軍國要務機事密切者不在此例推勘後如得事實必奬奉公茍涉加誣當令返坐如此則人知畏法事免搆虛各示中外令知朕意會昌元年六月唐大詔令集卷九十九
