body:
  text: 唐大詔令集巻三十三宋宋敏求編諸王封建封周王顯制封申王成義等制封郯王嗣直郢王嗣謙制封陕王嗣昇制改封寧王憲制封濟王溢等制廣平王進封楚王制改封雍王适制封睦王建等制封欽王諤等制封鄧王寧等制封沔王恂等制封晉王普制封魯王永制封梁王休履等制封蔣王宗儉制封棣王惴制封鄂王潤制封衛王灌等制封蘄王緝等制封棣王祔等制封景王祕等制封雅王禎等制封建封周王顯制昔周武垂則汾邑啟維城之固漢文承統睢陽樹磐石之基所以作鎮邦家克隆景業第七子顯毓粹雲峯分輝日觀風儀秀舉神識冲和挺玉質而含章振金聲而發彩夙遵教於詩禮方導德於間平既表岐嶷之姿宜申珪社之貺可封周王食邑一萬戸顯慶二年二月封申王等制蘇頲門下古者帝王受命以臨萬國子弟建封用尊五等其所由来尚矣右衛大將軍衡陽郡王成義等敦詩執禮本仁祖義名教之樂自得幾深温良之容發於忠孝晨趨魏闕則望掩軒霞夕賦曹園則思含澄景朕祗奉歴數旁稽載籍克輔王室所謂通邑大都俾為唐藩故能帶河礪嶽分膺往命咨爾眷歟可依前件仍各食實封一千戸唐隆元年六月二十七日封郯王郢王誥誥昔在姬劉分王子弟用能本枝碩茂算祀遐長皇帝元子嗣直嗣謙等若木分暉咸池䟽𣲖孝愛成性佩服天經岐嶷誕靈風儀遐舉奉聞詩之寳訓資樂善之芳規錫命惟崇巳申緑車之寵登庸在運宜開朱邸之蕃嗣直可封為郯王嗣謙可封為郢王先天元年八月封陕王誥誥皇孫之寵禮絶於諸侯帝王之制封殊於列國爰自前代兹義存焉皇帝第三子嗣昇岐嶷夙成聰明天假東海夀街之對昔未云竒瑯琊日逺之談今可連𩔖允宜胙兹茅土光彼磐石永固鴻業式繼維寧可封為陕王先天六年九月改封寧王制爰分寳玉載錫綏章必在親賢致之侯甸開府儀同三司兼涇州刺史上柱國宋王憲儀表碩望忠肅令名藝總經書才推禮樂列上公之位兼大藩之寵瞻彼行圍舊稱茅邑敦如北地今邇西都宜考良日之封用𢎞景命之及可改封寧王食邑三千户餘如故開元七年九月封濟王等制王者之制疇庸展親古之道也廼眷諸子非曰私之第二十三男溢等藉慶昌源致兹繁祉始自内保漸乎外傅四方六甲辨志離經可以識君臣之義可以接朝廷之禮宜建以方社錫之分器肆予有命克慎厥猷其封溢為濟王沔為信王泚為義王漼為陳王澄為豊王潓為恒王淀為京王滔為涇王開元二十一年九月廣平王進封楚王制自㓂戎奸宄王師未振瞻言境邑尚聚犬羊廣平王俶修學好古令德孝㳟志安邦家誓雪讐耻爰鞠其旅克復二京可封楚王食實封二千户寳應元年三月改封雍王制錫瑞剖珪義先藩屏籬疆畫野禮叙推恩必因時以命拜協天性以為輔天下兵馬元帥特進上柱國魯王适識度明敏執心仁恕智侔對日位偶前星頃以俾侯於魯兼掌戎車修禮檢身流謙自牧元良有裕忠孝可嘉且𫝊稱知子之道禮擅内舉之文眷彼龜䝉僻居東夏乃惟洛雍近接西周宜改邑於京闗列維城於上國可改封雍王食邑一萬戸依前充天下兵馬元帥本官勲如故寳應元年八月封睦王等制虞夏之制諸子疏封漢魏以還十連授律是用析珪班瑞磐石開疆信逋邑之紀綱為中都之屏翰然則旄鉞之寄惟擇攸難因親之任各膺其命第四子述第五子逾第六子連韓王逈第八子遘第十三子造第十四子暹第十五子運第十六子遇第十七子遹第十八子通第十九子逹第二十子逸等敏茂純懿禀於衷誠温良孝恭形於進對動皆合義居必有恒可以附衆靖人撫封宣化而總列城之賦擅分閫之謀允勤公家允輔王室今則均茅社之寵盛槐庭之儀授鉞登車副兹朝典維城之固爾其懋哉述可封睦王充嶺南節度支度營田五府經畧觀察處置䓁大使逾可封郴王充渭北鄜坊等州節度大使連可封信王韓王逈可汴宋等州節度觀察處置等大使遘可封鄜王造可封忻王充昭義軍節度觀察處置等大使暹可封韶王運可封嘉王遇可封端王遹可封循王通可封恭王逵可封原王逸可封雅王仍並可開府儀同三司大歴十年二月封欽王等制王者之制子弟畢封所以固藩輔而重社稷古今之通義也第十弟諤等寛簡忠厚生知孝敬行皆由禮志不違仁樂善本於性情好賢宗於師傅朕承天之序稽古展親宜舉徽章俾開土宇第十弟諤封欽王第十一弟誠封珍王男建康郡王渙封郯王改名經洋川郡王沔封均王改名緯臨海郡王洵封溆王改名縱𢎞農郡王浼封莒王改名紵漢東郡王泳封宻王改名綱晋陽郡王湜封郇王改名總髙平郡王淑封邵王改名約雲安郡王滋封宋王改名結宣城郡王淮封集王改名緗德陽郡王濬封冀王改名絿河東郡王浥封和王改名綺第十七男絢封衡王十九男纁封㑹王二十男綰封福王二十二男紘封撫王二十三男緄封岳王二十四男紳封袁王二十五男綸封桂王二十七男綽封翼王貞元二十一年四月封鄧王等制門下昔周室制法備建宗盟漢代垂統畢封子弟其盛也二南教化首在國風其詳也九國土疆載於侯表朕嗣守丕業㳟惟令圖永言磐石之固宜本介人之重男平原郡王寧等孝友忠敬温文惠和禀其樂善之姿强於好古之學君親之教罔敢失墜保傅之言亦惟佩服由是寡悔至於通方庶可膺兹典章列是藩屏疏爵以冠於侯伯分茅以錫其山川用明至公且叶前訓男平原郡王寜可封鄧王同安郡王寛可封涇王延安郡王宥可封遂王彭城郡王察可封深王髙宻郡王寰可封洋王文安王寮可封絳王十男審可封建王宜令所司擇日備禮册命主者施行元和元年八月七日封沔王等制門下朕獲承天序欽若前訓用建藩輔以明親賢斯古先哲王之令典也弟憬等孝友寛厚温文肅敬行有枝葉道無緇磷踐君子之中庸䆒賢人之義理情惟樂古志不近名纂間平之令德希曽閔之至行宜分建茅土衛我邦家叶於展親永固磐石是用舉其成命錫其徽章第十弟恂可封沔王第十一弟懌可封婺王第十二弟愔可封茂王第十三弟怡可封光王第十四弟恊可封淄王第十五弟憺可封衡王第十六弟悦可封澶王長男湛可封鄂王第二男涵可封江王第五男瀍可封潁王宜令有司備禮擇日册命主者施行長慶元年三月封晉王制門下昔周室之興也藩戚並建式資於維城漢氏之興也皇子畢封用固於磐石斯所以載𢎞丕緒惟懐永圖且茂德於本枝遂推恩於後嗣况祗荷眷祜屬當長賢宜承龍章允膺舊典長男普㓜禀異質夙膺嘉祥既表岐嶷之姿日慕恭良之性朕以寡昧䖍奉宗祧庶明父子之親以及君臣之義命以樂國錫其分圭用敷可久之基爰叶至公之道可封晉王宜令有司擇日備儀册命主者施行寳歴元年十一月封魯王制朕㳟承寳位欽若璿衡兢業戒懷懼忝洪搆今皇嗣誕秀既流慶於天枝白茅啟封宜分王於土宇用崇大典式固不圖長男永植性端莊禀靈聰哲神氣挺於岐嶷和粹精於儀形姿範藹然是用嘉慰將奉聞詩之教冀彰樂善之風俾洽寵恩允膺錫命庶表祥於麟趾爰建社於龜䝉敬哉戒哉無沗我烈聖之休德可封魯王仍令有司擇日備禮册命太和四年正月封梁王等制王者胙土畫疆封建子弟所以承衛帝室藩茂本枝祖宗成式朕曷敢廢况天付正性夙奉丕訓尊賢好善體仁由禮是可舉建侯之命膺分社之榮親親賢賢于是乎在敬宗皇帝第二子休復第三子執中第四子言揚第六子成美皆氣藴冲和行推敬慎㳺泳原闕墳素佩服師言宜開土宇之封用申睦族之典休復可封梁王執中可封襄王言揚可封杞王成美可封陳王宜令有司擇日備禮册命開成二年八月封蔣王制周宅土中藩衛並建漢有天下子弟畢封朕承烈聖之鴻搆託於兆人之上順考古道用保乂於皇家第二男宗儉孝友齊莊㳟肅明懿蹈師氏之典訓佩古人之格言動必有程稚不好弄遵道誠資於積習樂善寔本於生知洪量不矜芳猷自穆是宜光分茅社作我藩翰式發麟趾之祥欽若犬牙之制爰舉成命錫其寵章可封蔣王仍命有司備禮册命開成二年八月封棣王制門下朕聞王者建極子弟胙以茅土將以藩昌磐石深固本根周漢之隆率由此道及我列聖每用舊章所以撫安生靈保佑中外朕㳟承天序敢紊前規爰加立愛之恩庶廣推公之義憲宗第十八子惴生則温柔性惟聰逹神邁氣朗聞禮知方藴積中之粹和資奉上之孝敬必能副於友愛始終令圖以耀金枝以輔王室是命俾開朱邸盛建戚藩載啟唐虞之風用崇麟趾之慶於戲惟茲盛典用别親賢必思繼美二南紹休五等佩維城之重思外屏之尊無怠無荒服我丕命可封棣王仍令擇日備禮册命大中六年十一月封鄂王制蔣仰門下周家受命諸子疏封漢氏造邦二等垂訓式崇藩屏思固本根逮於國朝必稽典憲太宗創久長之業乃建親賢列聖遵守成之文廣分土宇朕獲承丕構敢廢舊章非惟永保於皇基葢亦無私於天下第六男潤生而聰敏性則温㳟孝敬夙彰誠明自至能服詩書之教居然禮義之姿雖在幼年勤由義訓周旋知為善之樂謙和無自伐之心是可以膺犬牙之封厚麟趾之慶授以茅社錫其桐圭俾爾戚藩以輔王室亦宜維二南之慶躅習三雍之舊儀敬服斯言用光禮命可封鄂王令所司備禮册命大中五年六月封衛王灌等制門下朕聞先王建萬國親諸侯也周漢封藩樹屏我國家以錫土分茅冲人敢易彞制爰稽典禮式固家邦第三男灌等生則岐嶷幼而狥齊忠厚實見其天資才識若符於神授敦詩聞禮不假其師嚴踐義由仁罔勞於庭訓術通六藝之妙學奥百代之書是宜敷桐葉之䇿舉梓材之誥胙以土宇誓以河山我圖爾居以謹王度無懈其位永孚於休第三男灌可封衛王第四男澭可封廣王宜令有司擇日備禮册命主者施行大中十一年六月二十八日封蘄王等制門下朕祗承祖業獲奉寳圖常欲茂枝葉於千齡壯根本於九族所以建兹茅社分命親賢叅酌令儀用垂嘉稱順宗皇帝第十八子緝憲宗皇帝第二十子情瑶源挺秀朱邸𫝊芳生於宫壼之中雅得詩書之奥加以温㳟成性孝敬日聞不假保傅之嚴已彰間平之德是宜疏封大國屏衛本朝錫介圭於明庭固磐石於清廟於戲謹爾侯度敬我典章無怠無荒往承休命緝可蘄王情可榮王仍令所司擇日備禮册命咸通二年十一月封棣王䖍王沂王遂王制陸扆門下我國家奄宅中區光啟祖業析珪胙土惟賢與親故本根茂而枝葉榮王室尊而藩屏壯逮予眇末罔獲纂承願至道之𤣥慈鍾列聖之餘慶顧茲𦙍嗣實謂蕃昌爰稽典謨用建邦土第三男祤星辰毓粹岳瀆降靈早彰岐嶷之姿克禀狥齊之慶第五男禊龜龍應瑞鵰鶚凌空温㳟自得於天和頴悟實由於神賦第六男禋璆琳挺秀鸑鷟呈祥爰當好弄之年雅號夙成之器第七男緯珠璣耀彩箘簬含貞風神潛茂於端莊質性已彰於敏恵而皆生知孝敬志樂文儒問安靡曠於晨昏禀訓每由於詩禮智有刻舟之妙辨多對日之竒是宜分以白茅錫其朱邸叶犬牙於漢制光麟趾於周詩厭次名邦境連於齊魯南康奥壤土接於荆吳瑯琊敦儒素之風遂寜實阜殷之俗咸稱重地各服徽章於戲器以琢成道由學顯勉禀君親之教敬承友傅之規勿追平樂之歡無好任城之勇懋建厥德無怠無荒祤可棣王禊可䖍王禋可沂王禕可遂王仍令所司擇日備禮册命主者施行乾寧元年十月封景王輝王祁王制門下昔明王臨御之理立德於至道茂緒於惟親朕嗣守丕圖祗若鴻訓未嘗不稽古建於邦家厲精以奉宗祖况洎漢而還封册之重抑有前典煥乎彞章當知子之敢私亦内舉之良媿第八男祕粹和包美謹厚自居踐禮樂之德文佩詩書之義府第九男祚生而向善夙賦好謙克明教導之風蔚有端莊之質第十男祺後星増潤甲觀呈祥妙彰岐嶷之姿雅得聰明之性又並標嘉器皆禀温文慰沃且多寵數宜舉爰擇重地式崇其名於戲㳟乃修持服諸訓順俾盛磐石之固允膺典禮之崇勉樹令徽各欽休命祕可封景王祚可封輝王祺可封祁王乾寧四年十月封雅王瓊王制張元晏門下成周之建藩翰也本以宗盟大漢之分茅社也先諸子弟推強幹弱枝之義遵自家刑國之文用能夹輔公朝尊奬王室朕上承宗廟下撫黎元固安萬邦恵綏羣品事必在於師古理寧繫於徇私爰舉舊章式於令典十一男禎忠肅挺志清明在躬孝敬本於生知端粹資乎神授藴題鞭之妙思纂置醴之前規第十二男祥美秀呈姿温文毓德體寛雅以成性恃愿㳟而立身踵為善之懿圖繼好學之休譽咸在齠齔克守義方必當益茂清徽俱為令器是用各分圭瑞並列封疆申以渥恩委之善地於戲當綺紈之歳膺茅土之榮雁序聨芳犬牙錫壤爾宜簡以位衆儉而在公善友應徐敬師申白交修魯衛之政俾取虞芮之風往惟欽哉服我丕謀禎可封雅王祥可封瓊王仍令所司擇日備禮册命主者施行光化元年十一月唐大詔令集巻三十三
