body:
  text: 唐大詔令集巻一百十七宋宋敏求編政事慰撫下宣慰魏博詔宣慰鎮州詔宣慰幽州詔遣使宣撫諸道詔為將漳王事安撫中外勅令李踐方充西州宣撫使勅遣使宣慰諸道詔命李回宣慰幽鎮等道勅遣使宣慰安南邕管勅遣使宣慰徐宿二州勅安恤天下徳音宣撫東都官吏勅遣使宣慰蘄黄等州勅慰撫下宣慰魏博詔奉君親竭忠孝人倫之大端也賢智所以盡心賞功勞𢡟名節國家之急務也皇王所以致理朕嗣服丕業恭臨萬邦每念政之未孚化有不暨怵惕惟勵載勤於懐常以為宵質禀靈皆思嚮善亦在甄明撫導推示至誠樹績必使其先揚罹患必圖其安緝永言及此終食豈㤀魏博大藩東夏作屏軍戎勇於見義黎庶懐於有仁自中原始兵革之虞河朔為用武之地抱才器者或思忠而盡力申節効者果因事而彰明時將大寧斯獲予志昨者季安薨謝其子幼童姦邪憑依妄肆威福一境危慄懼致覆亡比屋凋傷疲於杼柚田興仗義奮發剪去憸人大安方隅屢獻忠懇達三軍奉上之志激千里望闕之誠誓遵典彞丕變舊俗忠諫指切感於朕心是用特授旌旄俾靖封畧言念將士同徳叶謀守正如金石之堅凌寒挺松柏之操垂令名於不朽示臣節於將来清風載揚丹欵可鑒嘉尚歎息勞於寢興賞不踰時式示旌勸其管内百姓等身勞耕稼力竭征徭念切於懐用當憂憫宜令司封郎中知制誥裴度往魏博宣慰親諭朕意仍賜錢一百五十萬貫以河隂院諸道合進内庫綾絹絁等支送充賞給將士及六州縣百姓差科宜給復一年使之蘇息州縣之中或有殘破偏甚者委田興逐一便宜處分朕以布澤之時務從人欲好生之徳期洽衆心魏博管内宜赦見禁囚徒其與叶心立功大將及判官等委田興具名銜聞奏當有甄昇如有父母在别加優恤當道從前已来官吏將校等或忠義可嘉而刑戮濫及如有此色委田興條録聞奏當加贈如有家口見存宜厚加優卹管内髙年者或天寳遺人夙霑皇化或孤獨廢疾不能自存田興差官存問仍量給粟帛管内有清勤奉職為衆所知者田興具事疏奏聞當加進改如身在丘園行義素著或才兼文武名莭可稱亦委田興具名聞奏贈太尉季安姻戚舊臣嘗任將相飾終之典宜示優崇其𦵏事委田興差官勾當禮物之間務從周厚田懐諫在疚之初政出羣小因致軍府騷然不寧以其幼年不問保善念功惟恐不及䘏人厚下惟恐不豐庶乎大治雍熈遂櫜弓矢為仁由已其道信然樹徳務滋在乎終始凢百多士宜悉朕懐宣慰鎮州詔朕聞帝王之宅定四海子育羣生如天無不覆如日無不燭其發號施令也如風其行慶布惠也如雨故能上符天道下感人心朕自嗣守寳圖將欲恢宏王略常懼化有所未至思有所不周乃睠兾方初喪戎帥念乎三軍之士洎乎四州之人或懐志積誠而思用莫展或災荒兵役而望恤何階今則昌運一開忠誠著效王承元首陳章疏願赴闕庭思父兄之名固君臣之義已加殊奬别委重藩又念成徳軍將士等叶心嚮義丹欵載申方欲効其器能各宜列於爵秩大將史重歸牛元翼等已並超授榮寵令更都加厚普示深恩兼以四州貧下百姓當敷賑贍之惠俾識含育之仁宜令諫議大夫鄭覃往鎮州宣慰親諭朕意仍共賜錢一百萬貫以内庫及户部見在疋段支送充賞給將士兼代四州貧下差科州縣之中有殘破甚者委𢎞正量便宜優䘏務令存濟朕又以王澤所洽大綱方収宥過釋寃與人休泰其管内見禁囚徒罪無輕重並宜赦免其大將等雖巳頒賜官爵或慮有遺並判官等宜委𢎞正具名銜聞奏如或父母在者别具上聞當加優䘏當道從前巳来官吏將校等或忠義可嘉而刑戮濫及如有此色亦條録奏聞當加追贈如子孫見在厚加優䘏仍具奏聞四州之内有髙年惸獨或承平遺老夙覩皇風或孤獨廢疾不能自存者差官就問量給粟帛四州之内有奉職清勤惠及百姓者具事跡聞奏當量加進改如有隠居山谷退在丘園行義素髙名節可尚或才兼文武卓然可奬者具名荐聞朕以武俊之勲勞光於彞鼎士真之恭恪繼被節旄承宗感恩亦克立効永言十代之宥俾錫一門之榮承宗兄弟並巳授官爵如或未盡霑及亦當具聞奏其承宗𦵏事亦差官勾當禮物之間務令周厚鳴呼録其遺忠延乎後嗣旌其衆善被於一方國有羨財不恡於䘏隠朝有好爵無愛於賞功庶使八表大同五兵永戢宣示中外宜體朕懐宣慰幽州詔昔我𤣥宗明皇帝得姚元崇宋璟使之鋪陳大法以和神人而又益之以張説蘇頲嘉貞九齡之徒皆能始終彌縫不失紀律四十年間海内滋殖風俗謹朴君臣和平人無争端卿大夫無以贓罪鞫人於聖代矣况伺察乎由是網漏吞舟視盗不謹冦羯乗釁㝅為氛妖天下持兵垂七十載朕顧𦕈末獲承祖宗分不得見四方無姑息之臣而九有復昇平之境矣上帝念我賚予忠賢盡獻提封恢纉舊服使遼陽八州之衆重覩開元之儀者時予侍中總之力也名藩重位予何愛焉劉總已極上台仍移重鎮兄弟子姪各授官榮大將賔寮亦宜超擢百姓等給復一年宜賜軍士錢一百萬貫以内庫錢充仍令宣慰使給事中薛存慶親諭朝㫖與節度使丞相𢎞靖計㑹大將判官甄奬未及有父母在者並具名列上郡縣中有殘破甚者量便宜優䘏平時舊老始見胡塵重覩朝儀得無悽抃遐想撫其兒稚自此免於兵鋒言念於兹用加優給管内有髙年惸獨或廢疾不能自存者委𢎞靖差官就問量給粟帛管内州縣官吏有奉職清勤惠及百姓委𢎞靖具事聞奏當與量加進改燕趙之間古多奇士隗臺如在代不乏賢如有隠山谷退丘園行義素髙名節可尚或才兼文武卓然可奬者其委𢎞靖具名薦聞於戯古人云安不忘危魏徴對太宗以守成之不易兹朕小子亦又何知而鎮兾克和幽燕復古慄慄夙夜不遑荒寧實惟祖宗之休尚賴股肱之力咨爾輔弼至於方嶽爾當勉於姚宋之功予無㤀於天寳之戒宣示中外宜體朕懐遣使宣撫諸道詔朕纂承寳位司牧黎元夕惕朝乾期於康乂一夫不獲實疚於懐如聞淮南等道歉旱頗甚比頻救接尚未底寧言念流庸豈㤀宵旰又慮災荒之際賦斂以興不有矜寛能無重困故令宣撫俾克慰安令殿中侍御史盧貞往浙東浙西道殿中侍御史李行修往江南宣歙等道安撫其淮南管内減放今年夏税錢二十萬貫文浙西道七萬貫文浙東道二萬貫文宣歙道一十萬貫文並委宣撫使與所在長吏計議量管内諸道州縣災歉重輕於上供及留使州内均減作等級蠲放其應令徴者亦須優容立限與長吏商量度其分具數條奏其四道管内州縣刑獄並令疎理以絶寃滯如有枉濫官吏不能奉法貪冒奇慘令百姓由此不安者察訪以聞仍審以觀察使已下商量據所在事宜利病務於綏葺茍有利於人者便施行訖聞奏又訪聞江淮諸道富商大賈并諸寺觀廣占良田多滯積貯坐求善價莫救貧人致令閭里之間翔貴轉甚夫裒多益寡著在格言周急勸分亦惟善政應旱歉處州縣有富商大賈及諸寺觀貯蓄斛㪷委所在官吏切加曉諭速令減價出糶者如不出糶即令貸借量取利各立文記至秋熟後勒填還其商賈及寺觀亦宜安住不得因兹妄有攪擾所有斛斗縱是鹽商亦令准例出糶所放人户徴科逺定分數書時牓州縣令早知委用安其心為將漳王事安撫中外勅朕以菲徳奉兹丕構雖䖍恭修已不敢暇逸而誠亮格物未能𢎞敷遂使奸兇懐非覬之端藩戚䧟無君之責外詿宰臣傍連禁吏怵惕自咎中宵靡寧親臨鞫訊改寘刑典顧惟大義實愧御家猶慮險狡之徒忿怨相冒遂至誣引或連非辜載懐惕戒宜諭深㫖應縁漳王及宋申錫被論告事除今月六日已前准勅㫖處分并捕捉王師文一人餘並一切不問宣示中外用體朕懐令李踐方充西州宣撫使勅葢天人之際相應如響祥祲之来各惟厥事乃者兵革始罷黎庶甫寧而蜀土載罹震驚方務綏輯今又水潦為沴沉溺實多載省奏章益深軫慮諒以朕澤不逮下誠無感通五事致咎此方何罪夙夜兢愧憫歎良深宜令户部郎中李踐方充西川宣撫使應遭水人户委與本道觀察使計㑹各量税額所漂損多少等第分數蠲放今年夏秋税錢及租子等如上常平義倉有斛斗處亦委徳裕遵古開倉賑恤更量加優當使得生聚禁察苛暴存安老疲以副憂屬稱朕意焉遣使宣慰諸道詔大河而南幅􅊷千里楚澤之北綿亘數州近以水復暴至隄防潰溢既壊廬舍復損田苗言念黎元罹此災沴或生業蕩盡或農収索然困餒凋殘豈能自濟是用憂灼疚於中懐今故遣使臣詳問疾害紓其墊溺之苦申以勞徕之方勉諭師徒安存孤老將我惠澤兾蘇疲人宜令給事中盧𢎞宣往許鄭滑鄆曹濮等道宣慰於戯朕自君臨勵精求理常恐一物失所毎以萬物為心誠無感通時有災害夙夜愧悼不知所以宣示藩方喻兹詔命使寛其徭役禁其侵漁多方葺綏俾速完復布告甿庶知朕意焉命李回宣慰幽鎮魏等道勅勅成徳魏博皆出甲兵俯臨賊境秋氣巳至攻取是時元逵𢎞敬制勝伐謀必有成筭固須命使逺訪嘉猷又回鶻雖巳遁逃尚存餘燼今朔風始勁寒草具腓猶未革梟音敢懐狼顧迫於飢窘侵擾邊城仲武乆欲蕩除俾無噍類成其志業壯彼威聲亦在使臣往諭朕意各宜奮勵早建殊功解甲勞旋免及祁寒之候止戈除患庶臻仁夀之期咨爾帥臣副予委遇宜令刑部侍郎兼御史中丞李回充幽州鎮魏等道宣慰使㑹昌三年遣使宣慰安南邕管勅勅四海九州莫非吾之赤子念兹逺俗尤用軫懐如聞日南自郭細為亂之後溪洞頻有不安郎寧去嵗已来屢為南蠻侵軼逺思裔俗載想疲黎有枉莫伸無辜受戮者多矣想思朝廷之弔問若大旱之望膏澤也是用特詔執事聿求使臣内外通班文武多士爰擇敏達副吾選求銀青光禄大夫檢校太子賔客兼右千牛衛大將軍侍御史上柱國宋涯早列和門夙通軍志公忠有素文武是經信義彰美於禁營政績茂宣於汧隴吾所求者爾其人乎昔司馬相如奉漢廷之命通西南夷路飛檄曉諭不勞師征夜郎牂牁等皆生梗之俗猶能永奉漢法於今稱之而况安南邕管皆吾藩方雖逺朝廷咸遵法理爾其將我憫憐之意深訪疾苦之源貧者撫之富者利之老者安之少者懐之盡爾公亷究兹利病因宜制變臨事合權能安逺方克致寧謐豈無崇秩以奬勤勞俾増石室之榮以盛軺車之貴無憚遐役佇立厥功可守本官兼御史中丞充安南邕管等道宣慰使大中十一年四月遣使宣慰徐宿二州勅勅徐宿二州將士百姓等去嵗徐州戍卒専擅迴戈殺戮都頭剽奪器仗當時逺近言論朝廷便欲誅鋤朕以好生為心懐土可恕不令究詰但任歸還將及本州又自疑阻復興悖亂遽恣猖狂因辱亷使監軍害我小使大將邀求符節専撓城池朕再三招懐丁寧慰諭啟自新之路垂宥過之言奸計逾堅慢辭彌犯塗炭百姓虐毒四封近年已来劇賊無比爰思止殺乃命興戎稽緩靈誅殆將周嵗然則兇黨之外平人甚多皆被脅從遭其駈使每聞勝捷倍所歎傷今既底寧専令宣撫申綏柔之令委使臣除弊利人蠲税節用軍士衣賜俾其計量種麥是時已令給䘏仍遣臨時裁度唯務便安皆負周才以展良術軍人百姓罹此横禍災數致然勉於營生安兹樂土其餘事件並在徳音指揮使臣専臨重此頒述今遣左散騎常侍劉異兵部郎中薛崇宣慰想宜知悉咸通十年十月安恤天下徳音自累年巳来四方多故雖巳寧謐尚切防虞居安不㤀於慮危有備可期於無患况海隅封畧猶集戎兵天下租庸半資軍食而又徐泗戰争之地瘡痍僅平江淮灾沴之鄉流亡未占遂使物力凋耗人情艱危言念蒸黎良深憫惻朕臨寳位十有四年憂勤無一日之安怵惕居兆人之上紹先王之遺訓守列聖之丕圖所以未明求衣分夜方寢静思致理㒺敢怠荒顧臣寮而委以腹心視寰宇而同於掌握管絃娯樂不勞於萬幾稼穯艱難每臨於千畆今又物惟豐茂嵗獲順成宜𢎞覆燾之恩用作生靈之福應諸道州府軍人百姓委所在長吏各承詔㫖切務慰安瘡痛僅平者尤在撫綏流亡未占者倚深招諭物力凋耗之處速致安全人情艱危之時無更侵擾逺年逋欠且緩倂徴近日歸還勿更加税勸農重榖以備饑荒訓卒練兵用防冦盗但躬行儉約政不煩苛省宴樂則務贍軍須絶餉遺則盡資公用漸使疲羸蘇息帑藏充盈減朕之憂勤寛朕之怵惕雖臣子之分必竭其忠誠而君父之心寧忘其誡勵我有爵賞以訓有勞我有憲令以懲不一凡在方鎮岳牧邑宰僚佐各揚爾職克副予懐咸通十四年六月宣撫東都官吏勅勅東都留守王渢河南尹劉充章及分司御史官僚皇城將吏府縣官僧道耆夀百姓等朕端居上京黙念東洛常恐宗廟不得嚴肅宮闕或至蕭條省寺荒涼井鄽凋耗府縣有疲羸之苦郊原貽蝗旱之灾雖鑾輅翠華未期巡幸而臨軒負扆常注憂勤昨者草冦憑凌王師討伐勤勞車甲綿歴星霜巡環於十二郡間塗炭於數千里内方聞剪滅又致猖狂王仙芝等縱脅生靈聫攻縣邑纔収陽翟又破郡城不日復䧟汝州兼擄郡守監軍使兇黨既盛人心易搖尋聞洛邑震驚都城紛擾舊相䕶几筵迴避羣官絜妻子奔逃工商失業以無依黎庶捨家而竟出朕每聞奏報彌切驚憂心如納隍手若馭索便罷重陽内宴以示焦怛之懐而宗社降靈神祗助順尋聞冦盗不敢侵踰吹燎火以南旋却洪波於北注今則官兵漸集王室頓安公卿可以還舊居閭巷足得復生業况聞秋田大稔物價稍低雖蹔履於艱危必終成於康濟今差左諫議大夫揚授工部員外郎李巢専往宣慰凡居長吏官僚等切在條理安存必令減節征徭均平賦税無使虐吏重困疲人諸道師徒多已屯集累勅有司官吏不令供餽闕遺亦委使臣勞諭將卒専俟凱旋之日當行慶賜之恩乾符三年九月遣使宣慰蘄黄等州勅君后惻隠之心必先於濟物朝廷發生之澤本務於弔人納隍雖軫於四維滅燎尚延於數月朕每念愁毒良増震嗟王仙芝尚君長等跡自椎埋結成嘯聚呼澤而豺狼相應掠地而雞犬無遺是以所冦州城便為荆棘黔首盡逃於山谷遺骸欲遍於丘墟皆由時平不務於搆兵嵗乆遂至於忘戰以至望風喪敗迎刃殱夷縣道皆空人靈胥怨嘆兇徒之未服念赤子之無辜葢朕誠信未能感昭慰曉莫能通達須漸資於完復俾稍慰於流離爰命腹心往詢疾苦今故遣國子司業李夷遇將我惠渥䘏彼荒殘拯塗炭之沈淪解瘡痍之呻痛應汝隨申安蘄黄等州凡經王仙芝尚君長所攻刼處悉加撫育遍問存亡其有已歸復人户仰所在州縣各酌量遭罹重輕減放租税其今年並至来年春季内所有差役並宜放免其田苗如經軍馬踐踏兼人户有戰陣死亡者全與放免其有衣冠士族亂兵横罹殺戮者仰於屬省錢内量給衣衾搆櫝速與𦵏送並為設祭慰其營魂衆暴骨遺骸委在城郭郊野無親故収認者宜作大塚以瘞之將校常主牙旗新曽加戰折股斷臂解脛陷胷進不念身誓思報國亡殁者當與褒贈見在者終身不停衣粮仍令本州縣官吏遇難不撓臨危向公枉陷兵鋒合嘉名節仰所在録名奏聞當與追贈其有道路郵館之所𫝊逓警急之時或驛吏驚奔賊徒焚爇仰宣慰使量所在物力重為經營兾備追風免妨乗馹其衣冠將吏軍人百姓遭焚刼甚者委州縣審細檢勘以義倉斛㪷賑救且令粗濟飢危所在府庫囷倉亦有不經刼盗或恐奸吏乾没隠欺切仰勘驗虚實分析申奏其有留州留使錢物皆是十月已秋賦之初須仗循良漸自収斂節其横費酌彼軍須講於耕戰之餘用濟公私之急其須添器械更峻城隍猶防烏合之徒重有鯨衝之勢推我隠憂之意俾觀急病之能况十室之中必有忠信數郡之内漸復人烟所宜牙佩韋弦重張琴瑟全由良吏善撫疲人應有緩急之間便宜所切州縣之利病奏請之未行仰宣慰使與所在刺史縣令細詳事由逐件聞奏兼期知我萬機之重俟黎元而共安九重之深願風俗而同泰委是將命以布朕心乾符四年九月唐大詔令集卷一百十七
