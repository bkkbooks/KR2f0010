body:
  text: 唐大詔令集卷七十一宋宋敏求編典禮南郊五太和三年南郊赦會昌元年南郊赦會昌五年南郊赦南郊太和三年南郊赦王者祗見宗廟情極於孝思肅事郊丘義崇於嚴配諸侯駿奔於助祭百靈肸蠁而降祥感逹神祗斯為茂範朕以沖昧獲嗣丕業兢懷寅畏於今四年屬興伐叛之師未暇燔柴之禮今因南至有事圜丘荐誠敬於二儀申感慕於九廟羣祀來享至誠必通既陳信以告虔宜覃恩而廣澤可大赦天下自太和三年十一月十八日昧爽以前大辟罪以下罪無輕重常赦所不免者咸赦除之惟犯惡逆以上及故殺人官典正犯入己贓不在放限左降官量移近處巳經量移者更與量移縱元敕云終身不齒者亦量與收敘諸色得罪人中如先有敕云縱逢恩赦不在免限并别敕安置者亦並委中書門下量事狀重輕節級處分常參官及諸州刺史有先因停替及以病解免并終制未授官者委中書門下量才進擬其有偽出身人近已從流者與移近處未處分者減等處分未發覺賣官買官人並仰赦書到後一月內於所在納官告陳首得免其罪如不陳首者已後事覺不在免罪限其京兆府來年夏青苗錢宜放一半應度支鹽鐡户部三司所管諸司官吏所由人戶等節級疏理放免天下除兩稅外輒不得科配其擅加雜𣙜率一切宜停仍令御史臺及出使郎官御史并所在巡院嚴加訪察應緣乘輿服御宗廟供須一事以上當從儉約自今以後四方並不得輒以新樣難得非常之物為獻其機杼織麗尤甚若花絲布繚綾之類及幅尺廣狹不中度者並宜禁斷仍仰天下州府敕到後一月日內所有此色機杼一切焚棄犯者以故違敕論諸道先割屬支郡將士如聞衣糧猶繫使司詳其事理頗非簡便宜委本使差官檢元割名額及糧賜等第交案與刺史勘會除續準詔敕抽停外據所合給錢米並以當州合送錢米依實虛拆計割入留州錢米數勘會訖州使各具分數聞奏應緣解補攴給並委本州其使司更不得收管方鎮判史在京除官所須收補隨從人數有即為節限他時替罷仍令隨使停解其方鎮交代之時及知留後官不得輒有補署刺史職在分憂得以專達事有違法觀察使然後舉奏頃年赦令非不丁寧如聞逺地多未遵守州司常務巨細取裁至使官吏移業將士解補占留支用刑獄結斷動須稟奉不得自専雖有政能無所施設選置長吏將何責成宜委御史臺及出使郎官御史嚴加察訪觀察使奏聽進止本判官不得匡正及刺史不守朝章並量加貶降若所管州郡控接蕃夷軍戎之間事資節制須得使司共為條理即不在此限如聞近年以來京城坊中及畿甸百姓等多屬州軍諸使諸軍召補之時都無旨敕差科之際頓異編氓或一丁有名則一户全免宜委本軍本使及京兆府切加提舉準元和二年八月京兆府所奏敕及長慶元年之節文處分諸色出身三衛最濫假冒官廕妄用優勞其三衛宜三二年且不得補人數盡無如更要補委有司條疏嚴為限制每所補注挾名替闕如便可停廢亦詣實聞奏其六宅十宅諸王女縣主宜令每年於選人中擇情願者配尚授官之時量加優賞罷秩之後仍減兩選其初婚者更有賜與使備行李如非士類不在選限武德以來配享功臣及將相名迹尤著節義顯聞而子孫陵替官闕廢墜未經甄録者委中書門下搜訪胤嗣特加優奬故尚父汾陽王贈太師晟贈太尉秀實子孫中未經甄奬者每家與一人正員官亞獻循王遹終獻恭王通等夾侍正衣進圭捧圭各賜物有差內外文武及致仕宗室官諸親太后三等以上親并應緣郊廟大禮行事進階給賞賜各有差會昌元年三月南郊赦門下古之令王肇建皇極莫不嚴禋郊廟統和神人將以承上天之眷命告下土之率服恪有令典留為後法是太陽施光調無私之臨照和風扇物樂有截之吹噓明察為先誠敬攸屬斯道不逺𢎞之在豫朕以寡昧入奉丕搆應三靈之協慶祗一德以咸有夏鞀初懸惟賴元臣忠力虞琴方鼓永冀萬國歡心顧以涉道多闕惕若馭朽凛如蹈氷納隍勤誠勵之懷置器審安危之地茍一物失所時豫之深辜粵以獻歲吉辰禋祀上帝煙燎既達牲幣克修百神受職而恭敬六合承休而霈洽禮成而退慶孰大焉思與公卿大夫內外臣庶道迎喜氣同我休嘉變生人之耳目振大化之綱紀立號垂統自中形外延八表之福敬昭萬象之惟新事天之禮既因髙以荐誠及物之思宜順時以布澤可大赦天下改開成五年為會昌元年會昌五年正月三日南郊赦門下王者事帝必嚴禋祀之容臣下歸功爰極推崇之義既膺顯號式展隆儀因時布和順歲更始前聖垂範逮豫是遵矧以眇身幸逢昌運雖履氷惟懼而涉道未周繫我輔臣洎兹列嶽內盡交修之志外分共理之猷乃者虜衆乖離部落分散收帝子於氊裘之所致名王為冠帶之臣昆夷來朝不逺萬里蠻貊向化克同九州重以上黨狂童竊襲叛迹問罪之師既集元凶之首遂梟廓清亂風洗滌汙俗剪逆辨而故都底定竄摩尼而壞法永除由是退惡進賢化行令舉刑姦贓之吏黜黷貨之家此宗社降靈助成時政豈朕涼德獨擅厥功而中外諸臣文武多士纍陳懇疏再舉鴻名辭不獲從被此虛美是用虔告清廟明禋上玄煙燎所升虛貺如答既享郊廟重申國經宜因行慶之辰誕布惟新之令同我景福永孚於休可大赦天下唐大詔令集卷七十一
