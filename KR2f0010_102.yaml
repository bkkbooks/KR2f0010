body:
  text: 唐大詔令集卷一百二十三宋宋敏求編政事購募募擒王世充爵賞詔購殺武元衡賊敕平亂上平竇建德赦平王世充後赦平輔公祐赦皇太子建成齊王元吉伏誅大赦平內難赦收復西京還京詔收復京師詔至德二年以收復二京大赦平朱泚後車駕還京赦購募募擒王世充爵賞詔世充僭逆茍逼黎元向化之途無由自逹朕惡煩百姓不欲興戎久厭兵威未窮征討然而縱逆彌甚暴虐不悛憫彼方隅又遭塗炭賊既糧盡計竭衆叛親離惡稔貫盈亡徴已見今則分命驍勇步騎齊趨直指洛濵衝其巢穴招降納附拯救阽危務在安人豈求寶利兵馬所到有因事立功擒凶制勝者重頒爵命厚加褒賞其金玉寶藏分賜士卒酬賞之科仍依别格宜明申布咸使聞知武德三年七月購殺武元衡賊敕朕以不德恭臨萬邦不敢自逸每懷兢惕而凶狡竊發殱我股肱是用當寧廢朝通宵忘寐永懷匡輔何痛如之冝亟搜擒以攄憤毒天下之惡天下共誅念兹臣庶固同憤激冝令京城及諸道所在同捕逐有能獲賊者賜錢一萬貫仍與五品官以有官序量加超授如本雖同謀或曽停止但能糾告當捨其罪仍同此科敢有藏匿全家誅戮布告逺近使明知之元和十年六月平亂上平竇建德赦自隋氏失馭致民流離盜賊交侵區宇離析喋喋黔首俱被焚溺之災元元無辜並困豺狼之吻朕受天明命君臨八極克除暴亂大拯氓黎聲教所覃無思不服唯彼趙魏尚隔朝風建德往因喪亂連羣結黨竊州據邑擅置官僚叛換一隅恣行凶虐朕愍彼河朔久遭塗炭納隍軫慮無忘興寢但以凋弊之後惡煩士衆且事含𢎞未先討擊然而遊魂放命數貫稔盈驅率犬羊圖為侵斥與王世充欲相救援輒來舉斧以抗天軍兵威所臨醜􅑫崩潰生擒建德囚致軍門凡厥徒黨皆就虜獲歷稔逋復一舉廓清蕩滌生民與之更始可赦山東諸州為建德詿誤者自武德四年五月八日以前皆赦其罪平王世充復赦詔曰天生蒸民樹之司牧光宅區宇撫字黎庶日月照臨文明於是統極雷雨作解順時所以布化往者隋季道衰刑政廢缺九服雲擾五嶽塵飛率土之民墜於塗炭瞻天踊地控告無所朕愍彼橫流志存拯溺投袂鞠旅肇建義旗伐暴除殘克寧宇縣靈祗叶贊遐邇樂推歸運所集祗膺寶位戡剪多難撫輯遺民溥被萬方情均覆育然而世充方命擾亂周朝建德遊魂虔劉趙魏虐害良善阻絶朝風古念匪民久罹凶毒滿堂之樂猶有向隅納隍之歎無忘旦夕是以出車命將伐罪弔民宗廟威靈卿士效節旌旗所拂醜徒氷泮三凶授首萬方廓清書軌大同氛祲澄蕩邉侵解柝熢燧無虞振旅休兵塗歌里忭既九圍寧謐八表乂安思與吏民厲精更始朕惟寡德政道多違隂陽不調致使亢旱深思惕懼震悼於懷解網崇恩冝流愷澤可大赦天下自武德四年七月十二日昧爽以前大辟罪已下已發露未發露悉從原放自武德二年十二月三十日以前亡官失爵者量聽敘用天下民庶給復一年其陜鼎函虢等六州供轉輸之費幽州管內久隔寇戎給復三年身死王事量加褒贈律令格式且用開皇舊法孝子順孫義夫節婦所在詳列旌表門閭竒才異行隨狀薦舉髙年惸獨量加贍恤平輔公祐赦詔曰自有隋失馭盜賊交侵四海羣飛六合雲擾上天降鑒爰命朕躬戮盡凶災廓清宇縣然而江湖之外水鄉僻逺向化之民未能自逹逆賊輔公祐搆扇凶醜蟻聚蜂屯侵虐黎民搖動城邑憫兹塗炭義在弔撫命彼偏師聊申薄伐沿流而下乘機尅定氛祲清蕩遐邇乂安文軌大同朝野咸慶今朱明戒序時方長育冝順天心播兹大惠可大赦天下自武德七年四月一日昧爽以前大辟罪已下已發露未發露繫囚見徒悉從原免凶惡劫賊官吏枉法受財主守自盜及常赦所不免流配已上者並不在赦例亡命山澤收藏軍器百日不首復罪如初其江州道行軍經塗攸逺非無勞供運轉輸及從軍役者並冝給復二年從軍內有犯罪除解官人立賞勳效者並復官爵仍依本品隨才處分揚越之民新沾大化見在民户給復一年其與賊同心共為逆亂者非被迫脅情狀難原者不在赦限皇太子建成齊王元吉伏誅大赦朕恭膺寶位臨馭萬方綏育黔首於兹九載欲仁惠之政逹於天下德義之方孚於宇宙豈謂莫大之釁近發蕭墻反噬之惡滅於天性皇太子建成戚居嫡長屬當儲二處以少陽冀克負荷光昭逺近狎比羣小聽受邪謀蔑棄君親離阻骨肉密圖彀逆潛為梟獍司徒齊王元吉寄深磐石任惟翰屛寵樹既厚職任非輕背違天經協同元惡助成隱慝遞相驅扇醜心逆迹一旦盡彰惟彼二凶罪窮數稔禍不旋踵自取屠戮念兹醜惡慙恨盈懷今禍難既除氛祲澄蕩國步夷坦政道惟新思與萬民滌除更始可大赦天下自武德九年六月四日申時以前罪無輕重已發露未發露禁囚見徒悉從原免凶逆之事止有二人自餘徒黨其被詿誤一無所問各從洗蕩其僧尼道士女冠冝依舊定國朝之事皆受秦王處分平內難赦大盜移國朝有賊臣見危受命家多義士朕以凶閔觸緒靡清姦豎搆禍傾陷宗社潛圖欲發機兆未萌相王第三子臨淄郡王某糾合同盟忠勇奮怒志除凶黨保護邦家逆賊韋溫馬秦容葉靜能宗楚客紀處納武延秀趙履溫楊均業等密行鴆毒先聖暴崩朕志不圖全枕戈泣血風雲玄感情計隂通太平公主男衛尉卿薛宗暕與前同州朝邑縣劉幽求總監鍾紹京日夜共謀誓誅逆黨凶徒驚恐投竄無所今天衢交泰氛祲廓清冝由靖難之恩以紀升平之化自唐隆元年六月二十一日昧爽以前大辟以下常赦所不原者咸赦除之其逆賊頭首咸以斬決自餘支黨一無所問內外官三品以上賜爵一級四品以下加一階某諱可封平王實封一千户賜帛五千假鍾紹京可銀青光祿大夫守中書侍郎潁川開國公食實封一百户賜物一千假前同川朝邑縣尉劉幽求可朝議大夫守中書舍人仍參知機務中山縣開國男食實封二百户利人府折衝麻嗣宗可雲麾將軍行左金吾衛中郎將賜物一千假收復西京還京詔聖人有作􅓡矢爰興歷代已來征伐靡廢自逆胡已死餘孽猶存所統蕃人多以利合亦有因事從便被脅強從朕誓雪國仇餘無所問中夜痛憤志安蒼生其假息偷生披城自守鼎魚幕燕何以論慈廣平王及各諸將分隊夾攻迎軍破敗橫尸遍野積甲如山二十里可知多少其中逼迫同被殺傷言念於兹良深憫悼今兵馬乘勝便取東京平盧節度兼令契丹五方又收河北天下之事計日可平緣京城初收要安百姓又掃灑空閴奉迎上皇以今月十五日還京一應供頓務須減省事除愆尤官别優賞宣示百姓令知朕懷至德二年十月收復京師詔國家出震乘乾立極開統謳歌厯數啓聖於今文物聲明握圖六合安祿山夷羯賤類頑凶殘孽復以捍邉有功專制方面同人者貌謂報效恩私異人者心乃包藏逆亂以為中原無傋干戈可動而毒深流禍變起倉卒塗炭萬姓興言痛憤朝市之內忽肆凶殘衣冠之中咸被點汚朕作人父母志雪國仇是用中夜奮發提戈問罪自靈武聚一旅之衆至鳯翔合百萬之師親總元戎掃清羣孽出師之日仍下寬令殱厥渠魁餘無所問有能翻然歸順自縳軍門復其官爵仍加優將士等以大軍一舉玉石俱焚元惡就誅凶殘並戮僵尸遍野匹馬不遺今西土罷兵咸以寧輯河洛氛祲一朝剪除廣平王俶受委元帥能振大聲左僕射子儀決勝無前克成大業復有回紇葉護及雲南子弟并緒畨人馬等皆竭誠向化助戰賈勇事同破竹昜若摧枯朕入城之日百姓等咸思戴商復喜覩漢煙雲風景皆是祥光里巷歡呼唯聞相慶朕早承聖訓嘗讀禮經義切奉先恐不負荷今復宗廟於函洛迎上皇於巴蜀𨗳鑾輿而反正朝寢門而問安寰宇載寧朕願畢矣且復人將有生敢當天地之心必興王在德實慿社稷之祐京城百姓諸道耆夀百姓比者時榖翔貴新芻不給困窮之極朕嘗繫心緣初收京城倉庫未積國用稍足豈忘施惠其諸色行人因陳敗沒並坊市百姓及諸色畨胡召募并本是元惡凶黨昨因破賊所在潛藏並仰於府縣及御史臺陳首一切原其罪如有不首被人言告捉獲者並從軍法其京城內外文武官有受賊補署罄其心腹自祖及父皆承國恩就逆背順頑志臣節或有守舊官者請俸料為賊判事者或判事之際中間得替免有攝賊偽官兼知職掌其中有京官外官及前資白身皆受擢用其中有隱迹不出故辭疾病色類既廣人類又多冝令御史臺憲部大理三司據狀勘責條件聞奏其有外官充使及先有職掌并事故及隔絶未赴任在城者亦委三司勘責奏聞又賊中臺府坊市所由人等比與逆賊追捕皆是事端損害忠良仍奪財物為蠧尤甚情不可容冝令崔光逺禁身切推按鞫具狀聞奏勿令漏網其內侍省及左右龍武羽林軍間廄飛龍諸武官應先合從駕人等其中臨行潛避遂受賊驅使各並委本司使括責量情狀輕重奏聞其有隱盜倉庫及偷劫逆賊家錢或受賊寄附與賊貨易與賊請祿料等因此隱沒者並限敕到十日內各於所由陳首其物便凖數送納本處並還不須科罪慮以有破用徴納難辛仍捨分放三分以𢎞寬待其近日逆人及隔絶人莊宅冝即括責一切官收又聞人家子女多被侵逼且非本情一切不須尋問或與逆賊所居住鄰近及作意故往來情非切害一時之事有殊逆黨冝釋放其有受賊偽度人冝令所司括責並勒還俗其僧道各改本色所在寺觀勿許居止今西京無虞三靈通慶可以昭事其事冝在覃恩待上皇到日當更有處分咨爾有衆知朕意焉至德二年收復兩京大赦詔曰軒轅有版泉之戰帝堯有丹水之師湯有葛伯不祀周有獫狁孔棘古之王者奉若天命不敢不治亂常干紀不得不誅日者逆豎猖狂敢行稱亂朕嗣守鴻業欽承睿圖枕戈嘗膽撫劔泣血罔不夙夜若涉春氷賴天地疾感社稷慿怒上皇丕烈萬國允懷因時致討為人請命由是義夫奮發回紇籍兵邦圻關輔之士汧隴河隍之衆沙朔羌戎之騎微盧蠻貊之人萬里雲趨四方霧合既張我伐咸啓乃心蠢兹蜂蠆之餘尚負螳蜋之力自京南合戰洛北追奔百萬摧鋒一戎而定昔夏以有窮之亂克之者四十年漢以新莾之篡復之者六千日從無嵗周未再氛祲廓清風振海而波蕩雪破山而石裂寰區重開日月增輝此皆三靈叶贊纍聖垂祉豈豫小子能集大勳須以先掃宫室奉迎鑾駕紫宸初正黃屋未歸耆老之顒望則深庭闈之依戀猶積所以自天之澤必本於承顔作解之恩尚稽於俟命今六飛屆正萬姓昭蘇義奉君親慶深家國不失舊物與俗惟新冝𢎞肆眚之典共喜以康之福可大赦天下常赦所不免者咸赦除之其逆人能自投降率衆欵附及殺獲逆人具以郡縣軍城降者並加超賞應與安祿山同謀反逆枝黨及李林甫王鉷楊國忠等一家並不在免限開元及蜀郡靈武元從功臣有守土沒死王事者並加優贈各與子孫一人官乘輿幸蜀天步多難人心且搖無復固志太子太師豳國公韋見素開府儀同三司內侍監齊國公髙力士開府儀同三司右龍武大將軍頴川郡公陳玄禮開府儀同三司左龍武大將軍田長開府儀同三司左龍武大將軍張崇俊特進右龍武大將軍杜休祥等勇不顧死危能致命或竭誠羽翼仰北辰而環拱或叶契心膂聚東井以全歸疇兹錫祉之永以誓帶河之義見素加開府儀同三司實封三百户力士加實封三百户玄禮進封秦國公實封三百户長進封雁門郡公崇俊進封南陽郡公休祥進封馮翊郡公各實封二百户朕恭行天罰誓兵朔野幸以一旅之衆遂成九有之師言念經綸豈忘締搆銀青光祿大夫尚書右僕射裴晃識宇沖深體局貞固輸忠佐命肇契興王加開府儀同三司封冀國公食封三百户光祿大夫殿中監同正員判行軍李輔國志除凶惡忠誠濟危加開府儀同三司殿中監依前判行軍事封成國公實封五百户銀青光祿大夫宗正卿兼工部侍郎李遵義功維成勳參定國家加特進封鄭國公實封二百户開府儀同三司兼鴻臚卿同正員中軍都知兵馬副大使管崇嗣能訓戎律以佐兵權進封巨鹿郡公實封三百户中軍都虞使特進兼鴻臚卿同正員李鼎加開府儀同三司進封保定郡公雲麾將軍右衛大將軍右羽林軍宿衛內供奉王兟加特進太原縣侯仍各實封一百户自冦戎姦宄王師未攻瞻言京邑尚聚犬羊廣平王俶修學好古令德孝恭志存邦家誓雪仇恥爰鞠其旅元戎啓行可封為楚王食實封二千户銀青光祿大夫尚書左僕射兼武部尚書同中書門下平章事兼靈武大都督府長史單于安北副大都護持節充朔方節度關內支度營田鹽池押諸畨部落副大使節度事六城水運朔方管內採訪處置使子儀才光三傑功格十臣克焯皇威載昌天葉加司徒兼尚書右僕射進封代國公食實封二千户平章事已下並如故開府儀同三司兼鴻臚卿同正朔方右廂兵馬使同節度副使姑臧縣子僕固懷恩進封豐國公實封三百户開府儀同三司兼右金吾衛大將軍同正仍充四正伊西北庭行軍兵馬使李嗣業履險忘危破敵匡難兼衛尉卿同正封虢國公食實封二百户銀青光祿大夫守司徒兼户部尚書同中書門下平章事進封冀國公鴻臚卿大原尹北京留守河東節度副留使薊國公光弼全德挺生英才間出干城中侮生甲安邉可司空兼兵部尚書同中書門下平章事進封薊國公食實封八百户開府儀同三司御史大夫兼工部尚書持節先招討西京並定武威武興平等軍兼關內節度河西隴右伊西四鎮行軍兵馬使王思禮養鋭先聲蓄竒後殿可開府儀同三司行工部尚書兼御史大夫封霍國公實封五百户光祿大夫太常卿同正兼御史大夫淮南西道節度採訪使頴川太守來瑱可開府儀同三司兼御史大夫封頴國公餘如故特進太僕卿南陽太守兼御史大夫權知襄陽郡事金鄉縣公魯靈藴是韜略副兹節度可開府儀同三司兼御史大夫封祁國公仍各食實封三百户兼京兆尹持節充京畿採訪計會招召宣慰處置使崔光逺毁家成國制命前茅可特進行禮部尚書封鄴國公食實封三百户開府儀同三司李光庭慎固封守克敵殊勳進封范陽郡公食實封二百户賢非后不享后非賢罔乂社稷之任必在良臣左相留晉卿忠不忘君才惟濟代弼成大業保乂王家可特行侍安封韓國公食封五百户憲部尚書同中書門下平章事李麟藴德成務含貞軌物發揮常業潤色皇猷可金紫光祿大夫刑部尚書同中書門下平章事崔圓允釐庶績康濟艱難一匡天下大庇生人可特進行中書令趙國公食封五百户朝散大夫守中書侍郎同中書門下平章事河南節度採訪處置使賜紫金魚袋張鎬謀猷惟允網紀立程總兹戎律懿是謀府封南陽縣公餘如故銀青光祿大夫太子少師房琯嘗以經術輔𨗳朕躬加金紫光祿大夫清河郡公銀青光祿大夫守太子少保嗣虢王匡頃以宗支居守京邑加金紫光祿大夫越國公峘兼總元戎克寧全蜀可賜金紫光祿大夫户部尚書銀青光祿大夫守吏部尚書銀青光祿大夫守禮部尚書李峴饋軍周給開物成務可光祿大夫行御史大夫兼京兆尹封梁國公中大夫文部侍郎賜紫金魚袋蘇震供億蒸徒臨事益辦可銀青光祿大夫行吏部侍郎其赴蜀郡靈武元從官及在路扈從官三品以上與一子官已下與一子出身六品已下量與進改功臣將士勳業髙者當别有處分應見任五品已上當别各與本官階其陳亡人令所在郡縣收骸骨瘞埋具酒食致祭諒與追贈其家給復三載諸郡縣或隔絶賊境則困於凶殘或犒宴官軍則弊於賊斂其來載租庸三分放一分其天下百姓應諸色自徴及欠負官物一切放免冝令中書門下簡使即分道宣慰往郡縣審問百姓間利害有須釐革處置者一一奏聞其園苑內有間地安間廄使總監各據所管地界耕種所收草粟以供軍馬其宫女及狗豹雞雁之類冝即停減屋宇車輿衣服器用並準或珠玉寶劒脫金泥織成刻繡之類亦然學官則精選務令講習簡擇郎官有堪任太守縣令者委京官清資五品已上及郎官御史開薦其郡縣官有灼然清白理行尤異百姓中孝悌力田不求聞逹者宜委採訪使聞奏其文經邦國學究天下博於經史工於詞賦善於著述精於法理軍謀制勝武藝絶倫並任於所在自舉委郡守銓擇奏聞不限人數其律令格式未折𠂻者委中書門下簡擇通明識事官三兩人并法官一切則定近日改百官額及郡名并官名一切依故事頃以上皇在蜀朕亦居岐蜀郡宜改南京鳯翔郡為西京西京為中京蜀郡改為成都府鳯翔郡府尹以下官寮並同三京名號吳山改為吳嶽其祠享官屬並準五嶽故事天柱山老君廟改為洛聖宫京五品以上官上郡太守及見在無官及官卑者並與五品官父祖先亡歿者贈一人官祖母亡歿亦追贈邑號忠臣事君有死無二烈士徇義雖沒猶存其禮憕盧奕顔杲卿袁履謙許逺張巡張分然蔣倩龎堅等即與追贈訪其子孫厚其官爵家口深加優賞其內外文武官有遭逆賊殺害及申赴本朝并逃難山谷其父子兄弟伯叔等與賊捕捉損害及謀翻成人言語泄漏因遭賊戮並勘實奏聞當與追贈天下耆老八十以上版授有差並賜緋魚袋太原遭圍逼給復三年上兵等郡縣堅壁多時力窮方下絶食尚守情亦可矜冝各給復三載其好畤奉先兩縣進退禦寇徴求復多各給復三載蜀郡上皇親幸萬乘久居明年租賦且依常式起後載給復三載良姊張氏脫望氣如歸當能見節可册為淑妃進封南陽郡王傑為朝趙王新成王僅為彭王頴王間為兖王第七男侹封涇王第九男徭封襄王第十男紹封興王第十一男倕封杞王第十三男侗封定王俶已下所司擇日即行册命雖知子之明慙於往哲而伏親之義蓋所隨時特盈尊師及儀王以下各賜全物五百匹諸掌公主各與一子官嗣郡縣主各與一子六品官皇五等已下及九廟子孫及親等人見任者並與轉改內外文武官三品已上賜爵一級四品已下各加一階應紀敘三品五品量加減兩考蜀郡鳯翔扈從官九品已上更賜勳兩轉溥天之下賜酺五日主者施行平朱泚後車駕還京赦門下致理之體先德後刑禮義興行故人知耻格教令明當則俗致和平然後姦匿不萌暴亂不作古先哲后莫不由斯國家受命百七十載八聖儲慶敷佑下人邁種寬大之德纍蠲苛酷之令蓋仁之所積者厚故澤之所流者深茲豫小子獲主重器暗於治亂之理溺於因習之安授任不明賞罰無當立法以齊衆而犯命愈甚興戎以除害而長亂益甚繁賦蓄姦乘釁竊發九廟乏祀兆人靡依猰㺄肆其吞噬豺狼聚於宫闕嵗未云半載罹播遷仰慙穹昊俯愧臣庶致或霣越茍全眇身誠懼益縱寇讎重辱宗社忍耻誓志庶補前愆賴億兆之心不忘先德將帥戮力恭行天罰俾豫寡昧再膺多祜紉乾綱於既紊復天柱於將傾言旋鎬京不改舊物宗祧以序朝享有期責重慶深彌增感歎嗚呼君者所以恤民也君若失位民將安仰朕既不德致寇興禍使生靈無告受制凶威茍全性命急何能擇或虧廢名節或貪冒貨利陷於法網事匪一端究其所由自我而致不能撫之以道乃欲繩之以刑豈所謂恤人罪己之誠含垢而和之義滌清汙俗咸與更新可大赦天下自興元元年七月二十二日昧爽以前大辟罪以下已發覺未發覺已結正未結正繫囚見徒常赦所不原者咸赦除之今年五月二十八日已前左降官即與量移已經量移未復咨者更移近處流人及配𨽻罰鎮效役並即放還亡官失爵放歸不齒量加收敘未復資者更與進改其黜免人等有素著行能傍遭譴纍特加録用勿以為負不有忠者誰復社稷不有勞者誰從巡狩連帥之重所以殿邦禦戎也二千石之任所以分憂共理也方鎮將校勤奉戎役中外寮吏恪居官次國有大慶所冝同之內外文武及致仕官三品以上賜爵一級四品以下賜加一階仍賜勳兩轉司徒兼中書令晟膺時傑立光輔中興再定皇都一匡天下推恩之典貽慶無窮冝與一子正官員京官侍中瑊沉邃忠厚服勞王家保全危城誅殛大憝嘉乃懋績次於寵章冝與一子六品正員京官鎮國軍潼門節度使檢校右僕射駱元光瓌京畿渭南商州節度使檢校右僕射尚可孤邠寧等州節度使檢校左僕射韓遊環奉天行營諸軍節度使檢校右僕射戴休顔等咸秉大節著於艱難同勳叶忠翼我興運各與一子七品正員官諸道節度使及行營都知兵馬使都虞候興元扈從左右金吾大將軍等各與一子八品正員官諸道團練觀察處置等使各與一子九品正員官應諸軍赴上都收復將士俱以純誠奮其勇節連年帶甲百戰摧鋒有忘身以效命有滅親以徇義誓平國難如復私讐竟揚貔武之雄克清梟獍之業䇿勳行賞傳嗣榮親播乃功名與國終始自去年冬以來未經甄敘者即與超八資改轉已經甄敘者更與超三資進改三品以上祖父母父母在先無官封者量授致仕官及邑號亡者並與追贈四品以下父母在先無官封者亦授致仕官及邑號亡者與追贈其賞錢即委所司依元赦支給應扈從將士三品以上賜爵兩級四品以下各加兩階仍並賜勳三轉其祖父母父母官封追贈及支給賞錢並準收京城將士例處分應扈從官普恩之外三品已上更賜爵一級四品以下更加一階若常參官祖父母父母先無官封者量授致仕官及邑號亡者並與追贈諸州刺史普恩外賜爵一級諸道進表官陪位者進加一階其奉天定難及元從功臣宜令本庫軍本使即定名聞奏所司各準元敕優賞其諸道鎮軍及行營將士三品以上賜爵一級四品以下加一階仍準今年正月一日制速與甄敘成德淄青魏博等節度下並諸道運應歸順將士等各藴誠義積著功勞由朕失於撫綏頃歲暫懷疑阻尋能勵節不替舊勳是資宴犒俾洽王澤即約額支計各賜錢賞設仍委本道節度準前後赦速條流甄敘其朔方并諸道應在河中管內并同州將士等自逺赴難解其重圍念兹功勞並未酬報雖遭脅制情有可憐應到行營未經甄敘者並準元赦超五資改轉其賞錢比收京將士例各給一半委本軍兵馬使速條奏聞所司即計給付其食實封者配類令其請受應天下諸道州府將士如有年老及疾患尫弱不任軍旅願歸鄉里者並給終身優復州縣力如存恤勿令侵擾如無家業可歸者給田宅使得全濟見危致命先典所尚况忠衛社稷殺身成功朕於斯人義有加等贈太尉秀實天授貞烈阻兹姦邪蒼黃之中獨藴神斷將紓國難詭收寇兵凶謀既隳吾事果濟忠誠奮發手擊渠魁英風凛然振邁千古冝差官致祭并旌表門閭府縣護其喪事冢葬所要一切官供仍於墓所立官碑以揚徽烈其所賜實封五百户嫡子授正員三品諸子各授正員五品官委中書門下即準元赦處分應諸道諸軍將士有身亡王事委本道本使具名銜聞奏即與褒贈仍以在身官爵授其子孫內外文武官及諸親諸色人等有橫遭殺害者各聽其家及親戚於所司陳牒勘責聞奏亦與追贈如迹著忠烈衆所明知仍訪其子孫量加優恤尚齒養老王風之省三代制理未或遺年朕將遵古典以興化本人心而教孝用優秩賜式慰閭里京兆府耆夀年八十已上並與板授刺史仍賜八十已上及諸州府迎駕耆夀並與板授本縣令仍賜緋天下侍老耆夀等亦各與板授本官如九十已上者州縣長吏嵗時躬親省問貧弱不能自守者重賜粟帛頃屬多難人俗流弊加之以師旅因之以飢饉賦役繁起農桑失時哀我疸人汔可小息然以國計猶歉軍資靡充未盡復除良增愧悼應天下建中四年年終以前所有諸色負欠在百姓腹內者一切放免百司諸軍諸使舉放利錢今年六月以前百姓欠負未納者亦並停徴京兆府百姓普恩之外給復一年其供頓官吏委京兆府類例具名銜聞奏量與優賞古者計户以署吏因時而建職此不乏士亦無冗員令田畝汙萊版籍凋耗齊人編户托庇官曹貪吏點胥誘為囊槖啓姦隳業為害尤甚應京百司色役人及流外等委御史大夫即與諸司諸使長官審商量據見所掌事之間劇定額聞奏仍挾名送中書門下務冝減省副朕憂人以後須署置並定名先奏仍永為恆式今年正月一日赦書節目未行者並舉而行之赦書或有不該即此類條件聞奏敢以赦前事相言告者以其罪罪之亡命山澤挾藏兵器百日不首復罪如初赦書日行五百里布告遐邇咸使聞知興元元年七月二十三日唐大詔令集卷一百二十三
