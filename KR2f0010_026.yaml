body:
  text: 唐大詔令集卷三十六宋宋敏求編諸王除親王官慶王潭凉州都督制慶王琮司徒制榮王琬安北大都護制命三王制停潁王等節度誥越王係天下兵馬元帥制奉節郡王適天下兵馬元帥制普王誼荆襄江西等道兵馬都元帥制䖍王諒申光節度制彭王僅等河西節度大使制嘉王運橫海軍節度制撫王紘河東節度制嘉王運等檢校司空制遂王宥彰信軍節度制濮王澤成德軍節度制昭王汭成德軍節度制撫王紘開府儀同三司守司空制蜀王佶西川節度制建王震魏博節度制除親王官慶王潭凉州都督制朕欽承丕緒司牧黎元訟息刑清逺安邇肅恩誼𢎞備式樹藩維列鎮而考其政聲謀帥而訓其戎旅徴皇漢之故事並建親賢採分陕之遺塵化行江汜爰崇磐石永固宗祧慶王潭等並禀秀玉林分華瓊苑夙彰韶譽久踐義方閲禮敦詩好賢樂善履忠肅而無替遵法度而不愆器藴謀猷才兼文武任兹連帥統彼元戎幹略攸歸能賢是擇分麾作鎮受鉞専征式茂朝章宜恭嘉命以慶王潭為梁州都督兼河西節度大使忠王浚為單于大都護朔方節度大使棣王洽為大原以北軍州節度大使鄂王潤為幽州大都督兼河北諸州節度大使榮王滉為京兆牧兼隴右節度大使光王涺為廣州都督兼嶺南經略大使儀王濰為河南牧潁王澐為安東都護平盧軍節度大使永王澤為荆州大都督夀王清為益州大都督兼劍南節度大使延王涃為安西大都護兼四鎮節度大使盛王沭為揚州大都督開元十五年三月慶王琮司徒制門下汝作司徒以親百姓豫有禦侮爰整六師中外之寄藩維是屬太子太師兼凉州大都督河西諸軍州節度大使度支營田九姓長行轉運使上柱國慶王琮克勤於躬允協厥訓每有志於敦學常不忘於樂善事上之道忠順在焉舉能之義親踈一也固可委以邦教受之廣謀勉圖乃功勿替朕命可守司徒餘如故開元二十四年榮王琬安北大都護制街畫奧壤戎夏所交兵鎮専城藩衛攸重開府儀同三司兼凉州牧單于大都護充持節朔方節度使副大使榮王琬溫仁植聖孝友因心言必備於忠肅動必循於德義爰就師傅學行可觀載錫圭符名器斯允移郛築壘功存禦侮距河臨塞拒切雄邉僉論所歸式遏斯寄宜加外總之命俾授中權之略可兼安北大都護餘並如故天寶八年二月命三王制賈至門下我唐受命百有四十載德澤浸於荒裔聲教被於殊鄰紹三代之統緒綜百王之禮樂我髙祖神堯皇帝奄有大寶應天順人我太宗文武聖皇帝戡難造邦光宅天下髙宗天皇大帝修文偃武惠綏四方我中宗孝惠皇帝聿遵孝德惟新景命我睿宗大聖真皇帝清明在躬𤣥化溥暢朕承纍聖之洪訓荷祖宗之丕緒兢兢業業不敢自寧往歲韋氏作逆宗社將隳是用翼戴先后掃蕩凶徒宸極既貞寰區載晏爾來在位垂五十年中原幸無師旅戎狄嵗月朝貢夙興旰食勤念蒼生庶𢎞至禮以躋仁夀愧無帝堯之聖德而有竒鮌之不明致令賊臣內外為患蔽朕耳目逺朕忠良或竊弄威權或厚斂重賦蟻壤一漏成此㴞天搆逆召戎馳突中夏傾覆我河洛撓亂我崤函使衣冠奔竄於草莽黎庶狼狽於鋒鏑伊朕薄德不能寧謐厥禍海內負茲蒼生是用罪己責躬寤寐焚灼上愧於天地下愧於兆人外愧乎四夷內愧乎九族乾惕若厲思雪大恥夫定禍亂者必仗於羣才理國家者先固其根本太子亨忠肅恭懿閲禮敦詩好勇多謀加之果斷永王璘盛王琦豐王珙皆孝友謹恪樂善好賢雖頃在禁中未習政事察其圖慮可試艱難夫宫相之才師𫝊之望必資賢哲永厲忠貞况四海多虞二京未復今所慎擇實惟其人太子亨宜允天下兵馬元帥仍都統朔方河東河北平盧等節度採訪等都使與諸路及諸副大使等計㑹南收長安洛陽以御史中丞裴冕兼左庶子隴西都司馬劉秩試守右庶子永王璘充山南東道江南西路嶺南黔中等處節度支度採訪等都使江陵大都督如故以少府監竇韶為之副以長沙郡太守李峴為都副大使仍授江陵郡大都督府長史兼御史中丞盛王琦宜充江陵郡大都督尉長史彚為之副以廣陵郡長史李成式為都副大使兼御史中丞豐王珙宜充武威郡都督仍領河西隴右安西北庭等路節度支度採訪等都使以隴西太守鄧景山為之副兼武威郡都督長史御史中丞充副大使應須兵馬甲仗器械糧賜等並於本路自供其諸路本節度採訪防禦等使虢王等並依前充使其署官屬并本路郡縣官並各任自揀五品已上置署訖聞奏六品已下任便授巳後一時聞奏其授京官九品已上並先夾名卷聽進止其武官折衝已下並賞借緋紫任量功使處訖具聞奏具有文武竒才隱處山藪宜加辟命量事奬擢於戲咨爾元子等其敬聽朕命謙恭祗敬以見師傅矜莊簡肅以見衆官慈恤惠愛以養百姓忠恕哀敬以折庶獄色不可犯以臨軍政犯而必恕以納忠規往欽哉無替朕命各須所管咸令知悉天寶十五載七月十五日停頴王等節度誥誥鑿門命將授鉞専征仗以方靣之威執夫賞罰之柄邦家重任固實在兹頴王永王豐王等朕之諸子早承訓誨琢磨詩書之教佩服仁義之方樂善無厭好學不倦頃之委任咸緝方隅今者皇帝即位親統師旅兵權大略宜有統承庶若網在綱惟精惟一頴王以下節度使並停其諸道先有節度等副使便令知事仍並取皇帝處分李峴未到江陸永王且莫離使待交付兵馬了永王豐王並赴皇帝行在至德元年八月二十一日越王係天下兵馬元帥制握兵之要古先為重命帥之道心膂攸憑是知靖難夷冦必資於兵革總戎受律實仗於親賢蓋將乂寧邦家保息黎獻者矣朕以薄德纘承鴻緒往屬元凶圖亂中夏不寧上憑宗社之靈下藉熊羆之力由是志清咸洛拯此生人頃以河朔殘妖尚稽天討蛇豕竊留於城堡塗炭久被於齊􅡦朕以為人父母寧忘憫念雖好生息戰必兾於歸降而餘蘖昧心靡聞於悔過所以軒后親征於獯鬻周文致役於昆夷古之用兵蓋非獲已越王係幼禀異操夙懷韜略負東平之文學藴任城之知勇性惟忠孝持愛敬以立身志尚權謀有經通之逺志知子者父方有屬於維城擇能而授俾克申於戎律且凶徒嘯聚頗厯嵗月惡既貫盈理當撲滅君親有命可不敬乎俾展龍豹之韜永清梟獍之類可充天下兵馬元帥應緣軍署處置所司准式乾元年奉節郡王適天下兵馬元帥制門下國之大事戎寄為先朝有舊章親賢是屬故求諸必當用制於中權存以至公豈慚於內舉特進奉節郡王適天資淳懿夙表岐嶷深謀祕略可謂生知樂善近仁非由外奬檢身以禮率性惟忠將有事於四方且申爾志俾啓行於十乘式佇其能故可敬慎厥猷勤宣乃力克奉君親之命載清冦孽之餘允副僉諧宜從兹授可天下兵馬元帥餘如故寶應元年四月十一日普王誼荆襄江西等道兵馬都元帥制敕君人立極所務於勝殘秉律成師實先於謀帥申明號令總制紀綱𢎞九合之功决百勝之略非慎簡不可以濟事非僉屬不可以臨人集大勳者必振其宏綱體至公者無避於內舉爰擇藩翰俾掌元戎開府儀同三司舒王謨性本忠厚訓知禮樂居常樂善動不違仁察其內恕外溫必能安人和衆體方識敏諒可成功庶乎知子之明授以貞師之律可揚州大都督持節荆襄江西沔鄂等道節度使諸軍行營兵馬都元帥餘如故賜名誼改封普王嗚呼小子誼其敬聽朕命國家之有天下百七十載於兹矣祖宗垂化紹統功德維茂威加殊俗惠洽普天海隅蒼生代受亭育躋之於福夀照之以和平源廣流長慶深祚逺歷數有嗣纘乎朕躬兢兢業業懼不負荷䖍恭寅畏歲五周星循列聖之耿光稽上古之明訓一物失所是用疚心萬方有罪每懷咎已懸法皆考於天則舉事必酌於人謀期合大中罔徇私欲而涉道猶淺燭理未明文闕於化成武乏於定亂刑賞失中授任乖方厚澤未均大信未著致使凶慝熾禍干紀亂常悖逆君親蔑棄天地盜據我郡邑毒痡我士庶驅脅丁壯暴骸於原野攘奪羸老轉死於溝壑忠良殞命義烈銜寃迫以凶威莫能自奮憤深骨髓怨結蒼旻朕所以中宵屢興中食三嘆哀蒼生之無告憫赤子之非辜為人父母寧忘愧悼賴三事大夫竭誠於內羣帥爪牙宣力於外交修不逮日冀康寧江漢上游建瓴制冦亘千里之地連十萬之師保定大功宜有統一允副茲選往哉汝諧無以貴驕人無以善自伐無縱已之欲無拂衆之謀納諫如流改過不吝卑躬降志以奉賔傅絶甘分少以撫軍旅布誠信以歸人心明賞罰以盡士力詰亂誅暴茂昭乃勳敬事恤人無替朕命膺茲重任豈不勉歟建中四年九月二十六日䖍王諒申光節度制門下自昔哲王疆理天下必選時明德樹之宗親參制藩維夾輔王室賢戚並建時惟欽哉長淮之西厥壤千里人靡寧息於茲歷年朕夙夜永懷慘若焚灼思得良帥代豫安人釋其危疑彰以信惠以親而授其在於兹開府儀同三司䖍王諒性本溫恭生知忠孝祗服訓導忠信不渝言皆副誠動必求當端慎可以化俗寬厚可以長人庇綏一方庶無憂厲可申光隨蔡等州節度大使兼充管內觀察使開府封如故彭王僅等河西節度大使制古之哲王宅中御宇莫不內封子弟外建藩維故周稱百代仰聞麟趾之美漢命六王亦樹犬牙之制歷考前載率惟舊章朕以薄德纘承鴻緒屬豺狼未殄金革猶虞賴文武藎臣協心同德庶克清於𤣥祲期永保於皇圖且授鉞分符義已先於用武維城作翰道方𢎞於建親咨爾分閫之崇成余磐石之固彭王僅等銀潢育慶璿蕚分輝忠孝禀於天成文武稱其備用今三秦之地萬國來庭誠宜列皇子以建封崇懿藩而制勝資其固本委以臨戎彭王僅可充河西節度大使兖王僴可充河北庭節度大使涇王侹可充隴右節度大使邵王偲可改封蜀王充邠寧鄜節度大使杞王倕可充陕西節度大使興王紹可充隴右鳳翔節度大使必能輯和戎律慎守封疆外協樽爼之謀中為社稷之衛是以分麾命社革故取新用叶天地之符俾膺家國之任共蕃王室可不慎歟乾元二年閏四月嘉王運橫海軍節度制陸贄門下度土分疆設官蒞事因時立制期在理安必順物宜且從人欲版圖既溢則疏邑以制州統攝或乖則分部而建長沿革之道亦何常哉滄海之隅地饒俗阜隱然此土實曰雄藩鎮撫之宜是資賢戚開府儀同三司嘉王運氣本淳清重承先訓忠肅孝友宣慈惠和勤於服儒樂在為善施於任事必有可觀舉不失親至公斯在欽率厥職永孚於休可橫海軍節度大使滄景觀察處置開府如故撫王紘河東節度制門下肇自周漢至於國朝莫不建立親賢以為藩衛擇茲春哲撫鎮北門舉是彝章式協公議撫王紘志量端平體識沉逺育德早聞於詩禮成器可比於圭璋居然岐嶷之姿雅有信厚之譽是宜奬其令美授以旌旄况全晉雄藩興王故地屏護狄塞統制甲兵撫循繄將領之才居守藉公侯之重一昨師徒擾叛帥令不遵用爾遙臨以綏其衆爾宜持嚴而務恕約法而推誠戒之慎之載揚丕績可開府儀同三司充河東節度觀察處置等使兼太原尹北都留守封如故主者施行嘉王運等檢校司空制書載堯典首稱睦族詩歌周德實美維城朕嗣統百王憲章三代義雖本於叙族道無愧於尊賢式遵舊章爰舉成命嘉王運循王遹恭王通等皆孝敬恭懿敏裕齊莊播蘭茝之清芬炳圭璋之符瑞易凌沛獻詩掩楚元古人素風造次於是昔賢典訓周旋以之固可以超金紫之貴階升台鉉之崇秩䇿勳詔爵以寵分茅並可金紫光祿大夫檢校司空賜上柱國仍依百官例給料錢遂王宥彰信軍節度制國家承周漢之制疏子弟之封雖典册載先而名實或異故有從中統外授鉞臨戎推公則然所寄尤重遂王宥學禮承訓樂善知方能遵六經之文克慕三雍之對有堅明可以蒞衆有惠和可以撫人淮右列藩地綿千里比喪戎帥慎擇能臣禆佐之中勤效可録師徒知義勇之節封部致肅清之安朕嘉其誠懇委以留府尚乃休懿宣於殿邦威重逺資於撫臨絹綏不勞於事任副明德茂親之選膺建侯樹屏之崇爾惟欽哉往踐厥職可開府儀同三司彰信軍節度管內支度營田申光蔡等州觀察處置等使元和五年二月濮王澤成德軍節度制門下錫圭立社疏戚有倫畫野分疆親賢並建所以左右王室保乂邦家乃眷冀方實為雄鎮上垂昴宿下接嶽靈控陘井之要衝當邯鄲之故地用是稽諸古訓考以國章俾崇尚德之規式叶至公之選濮王澤延慶金枝衍流天𣲖資忠孝以植性本仁義以立躬文掇菁英敏有逾於七步學探㫖要對必詳於三雍刻舟志邁於蒼舒占雨識精於沛獻而冲謙自處矜伐不萌所宜作我翰垣副茲毗寄為臣之道爾既克修知子之言豫復何愧築齊壇以命邦杖武節以遙臨爾其𢎞樽爼之嘉謀令折衝之逺略寵膺十乘位列三台勉服新恩慎守厥職可開府儀同三司守潁州大都督充成德軍節度鎮冀深趙等州觀察處置等使封如故大中九年正月二十四日昭王汭成德軍節度制門下近制諸侯薨歿朝廷或命其子弟嗣守爵土且慮職卑望輕未能彈壓軍行乃詔親王為帥以統臨焉蓋尚體行權之㫖也昭王汭貞祥所聚姿質幼茂孝敬天授溫文日宣寧勞保傅之規自識君親之道學禮不倦發言有章式光維城宜假分閫朕以趙地名服常山奧區人多忠朴俗尚義勇少長有禮里閭自康屬帥臣云亡戎府無長中權劇務巳委諸甥上將崇名允歸愛子顧梁固以雄處末漢節以遙臨禍柱舊封某土新命歡不阻於膝下詔榮宣於庭中邦家有光藩屏斯盛九命俾尊於開府一方逺奉於建才實惟至公勉服丕訓可開府儀同三司守鎮州大都督充成德軍節度鎮冀深趙等州觀察處置等使封如故主者施行大中十一年八月二十日撫王紘開府儀同三司守司空制獨孤霖門下尚德尊賢與親親而並建崇階顯位表授受以為庸斯所以憲章堯心損益周家自家刑國甸公絶私率是而行可謝前古撫王紘生知孝悌夙禀惠和茂曹植之春華詞刋枝葉體河間之秋實學洞根元况律度自持韋絃相顧不斯須以忘善不造次以違仁固可以命於典譽光其簡䇿馭貴式登於極品承榮允踐於上公敬而戒之無沗我髙祖太宗之丕訓可開府儀同三司司空依前百官例給俸料兼令所司擇日備禮册命主者施行咸通四年正月蜀王佶西川節度制自古聖帝明王莫不封建子弟錫以茅土寵以圭符俾藩屏王家翰維天邑朕每讀麟趾識詩人之意念犬牙知漢祖之心眷乃坤維實維奧壤甲車雄盛貨殖形繁鈴越雋則南詔憚嚴鍵松維則西戎畏懼是用授親賢而統制命良將以經邦緬彼逺方稱茲公共蜀王佶宇量𢎞廣風神粹和承顔於日域之中禀訓於大庭之內弱不好弄居無愠容語言皆質於詩書造次不離於孝敬蟻封占雨嗣沛獻之明規象艦知斤繼蒼舒之敏智屬者南蠻入寇西蜀纒兵瘡痍生縣道之間荆棘繫師徒之役雖英儒鎮禦火既撲於燎原而權道改張瑟難遵於膠柱由是假爾英略光豫翰垣分玉葉之清隂覆銅梁之重地遙資算畫密受韜鈐必使萬井歡聲三軍懷德致藩夷之稽顙革蠻僰之非心將陟永圖在舉長䇿對揚休命爾其敬之可開府儀同三司兼成都尹劍南西道節度副大使知節度使管內觀察處置統押近界諸畨及西山八國雲南安撫等使咸通十一年七月建王震魏博節度制門下玉斗七星降作帝王之子金枝百代生為列聖之孫冬夏教以詩書春秋訓以禮樂然後封其茅土示以寵光建王震天賦明哲氣禀粹和含日月之華英緼山河之瑞秀心懸夀鏡腹貯學川智燭不炳而自明惠車非駕而引重信逾剪葉名掩刻舟九苞之鳯翔赤霄五色之麟行丹地瑶池仙𣲖非百水之同流銀漢靈原自三天而别注况幼禀師訓生知義方洊雷之象克明元良之名益著四德咸備三善永全喻葛藟之延長表瓜瓞之昌熾仁義道振忠孝聲聞似睹卿雲如觀景宿堪膺寵權可賜爵封列國之榮暫領雄藩宜遵故事可授開府儀同三司守太保充魏博節度管內觀察處置軍使兼魏州大都督府長史仍令所司擇禮册命主者施行中和二年二月唐大詔令集卷三十六
