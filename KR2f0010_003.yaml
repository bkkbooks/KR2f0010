body:
  text: 唐大詔令集卷三宋宋敏求編帝王即位赦下武宗即位赦宣宗即位赦懿宗即位赦改元上改元貞觀詔改元總章詔改元𢎞道詔改元光宅詔即位赦下武宗即位赦朕粵自蕃邸來握乾符銜哀受遺當寧興感永惟我高祖太宗艱難創業其後列聖奕葉重光英睿相繼逮於先帝秉文之德光闡皇猷將洽理平甫臻仁夀顧豫冲昧叨承大統祗命若臨於泉谷思理未詳於政刑空懷濟物之心將纘已成之業所尚者節儉所寶者忠良肆眚法解網之仁厚生敷流澤之惠上慿靈祉下便物情期中外以叶心兾遐邇而咸乂爰遵典訓特霈鴻恩諒表政於惟新敢忘憂於馭朽可大赦天下自開成五年二月八日昧爽已前大辟罪已下罪無輕重咸赦除之惟十惡叛逆故殺人官典犯贓不在此限宣宗即位赦天分四時必始發生之德帝臨九有是先蕩滌之恩故雷雨作而萬物滋榮慶澤行而兆人悅服皇王之典今古所遵朕以眇身獲纂丕業上承宗社之眷祐下繫生靈之安危夙夜祗勤庶臻於理永惟黎元之困賦役之繁干戈未寧輸發尚急流移未復寃滯猶多刑獄未平姦詐斯起進獻無度淫巧競生思思與蠲除俾從開泰將以導迎和氣咸致歡心爰因大慶之晨式舉惟新之令可大赦天下㑹昌六年五月懿宗即位赦門下朕聞龍之騰天漢也則必乘風雲鼓雷電以濡六合君之踐大位也則必敷仁惠煥號令以澤萬方是以地不間於幽遐事罔計於輕重洪聖興而皇渥溥德音振而庶類蘇故僣咎咸除枯沉盡起斯皆前代令典國朝成規委轡諒戒於惠姦凝命始懷於布澤顧豫寡德嗣纘丕圖夙夜乾惕若俯泉谷永惟我高祖太宗之艱難締構又惟我列聖之慈儉統承思所以克紹休明𢎞濟億兆剗末俗之弊清理化之源啓祥導和應天順物致歡心於率土和恭已以臨民爰申在宥之恩因洽維新之慶可大赦天下自大中十三年十月九日昧爽已前大辟罪無輕重已發覺未發覺已結正未結正及繫囚見徒常赦所不免者咸赦除之唯犯十惡叛逆及故殺人官典犯贓及持杖行劫並不在此限其故殺人者已傷未死已死更生意欲殺傷偶得免者並同已殺人法處分又刑獄之內官吏用情推斷不平因成寃獄無問有贓無贓不在原免之限改元上改元貞觀詔詔曰朕遐觀方冊厯選前王大道既隱至公斯革莫不思樹風聲以隆鼎命太皇膺籙受圖功成治定鄙聖人之餘事顧天下而窅然永言俗纍高居物表爰以大寶俯授微躬自肅奉神器亟移灰律屬三正在旦萬國來庭長世之術既𢎞惟新之命方始體元居正今則其時可改武德十年為貞觀元年改元總章赦朕以寡薄忝承丕緒奉二聖之遺訓跨億兆以初臨馭朽兢懷推溝在念而上𤣥垂祐宗社降休嵗稔時和人殷俗阜車書混一文軌大同檢玉泥金升中告禪百蠻執贄萬國來庭朝野歡娛華夷胥悅但為郊㮒嚴配未安太室布政敷化猶闕合宫朕所以日昃忘疲中宵輟寢討論墳籍錯綜羣言採三代之精微探九皇之至賾斟酌前載製造明堂棟宇方圓之規雖兼古制肆筵陳爼之法獨運裁成宣諸內外博考詳求度其短長兾長聞見而鴻生碩儒俱稱盡善宜命有司急及時赴作務從折中稱朕意焉今陽和在辰景風扇物昆蟲草木咸獲康寧朕之百姓尚多勞止恩覃惠澤與其更新可大赦天下改乾封二年為總章元年大辟罪已下皆赦除之改元𢎞道詔朕以寡昧謬膺丕緒未嘗不孜孜訪道戰戰臨人馭朽懷秋駕之危負重積春氷之懼日慎一日三十四載於今矣何則足寒傷心人勞傷國下安即上逸時弊即君憂所以身處九重而情周萬姓建本之懷遽切抑末之念彌深今雖庶績已寧淳源未洽履素歸厚者遂寂寥而靡聞徇華趨利者尚馳騖而不息顧以薄德有謝移風永眷羣方在豫多愧况朕之綿系兆自𤣥元遠叶先規光宣道化變率土於夀域濟含生於福林屬想華胥載勞寤寐所兾內外寮寀各竭乃誠敦惟黎民俱崇簡質舊染薄俗咸與惟新憑大道而開元共普天而更始宜申霈澤廣被八紘可改永淳二年為𢎞道元年大赦天下前後責情流人並放還老人年百嵗已上者版授下州刺史婦人版授郡君九十已上者版授上州司馬婦人版授縣君八十已上者版授縣令并歸莭級量賜粟帛孝子順孫義夫節婦表其門閭終身勿事鰥寡孤獨篤疾不能自存者量加賑給仍天下諸州置道士觀上州三所中州二所下州一所每觀各度七人又比天后事條深有益於為政言近而意遠事少而功多務令崇用式遵無怠見任內外官五品已上經四考及守五品經三考六品已上計滿三考政用清勤狀無私犯者各加一階改元光宅赦鸞臺朕聞上皇建極體元氣以育羣生大聖承天法陽門而陶庶類與時舒卷叶三正而推移隨道汚隆應五幹以通變故能牢籠宇宙埏埴人靈符景運而財成契休期以光宅昔有隋標季率土淪胥豺狼肆吞噬之災億兆被䖍劉之酷高祖神堯皇帝披圖汾水仗鉞參墟靡氛祲而安四維掃攙搶而清六合太宗文武聖皇帝負日月而膺運鼓雷霆之震威蕩海夷山功浹八荒之外救災拯溺仁霑萬域之表樂和禮洽天平地成茂績光於邃初鴻名冠於開闢高宗天皇大帝雲房誕睿虹渚降靈受緑錯之禎符應朱綈之景命飛車乘毳臣軒頊之不臣沒羽浮金服禹湯之未服所以開邉服逺更闡寓於先基冨貴寧人重增輝於前烈撫璇當寧調五氣於明堂考瑞升中朝百神於日觀茫茫衆俗寧觀覆燾之恩蠢蠢庶氓孰辨陶甄之力固已千年啓旦三聖重光厯選前書無聞往載豈謂道隆金鏡運迫鼎湖方延翠渚之祥遽託白雲之駕以社稷之大任屬荒眇之微躬斂奉遺言載深悲懼遂以兹菲德開導嗣王式綜萬幾載宣風化所賴王公卿士各竭乃誠若濟巨川實資舟楫然自恭臨朝序已積炎凉教靡致於移風道尚慚於變俗良以哀迷在疚荼棘纒心陵廟未安匪皇専慮今者鳯京遙踐龍馭上升既因大禮之終宜更中區之始朕居臨赤縣求瘼之志每盈子育蒼生恤隱之懷鎮切惟欲勵精為政克已化人使宗社有北辰之安區㝢致南風之泰以斯酬眷命用此報先恩兾上不負於尊靈下微申於至懇夫五行遞用列代相承欲崇其德先遵所尚故夏以金運乘驪而尚𤣥周以火行貴騂而尚赤將隆母德必欲子扶近者地不藏珍山無祕寶皇家土德勝氣彌彰宜從白賁之象以輔黃中之運自今已後旗幟皆從金色仍飾之以紫畫以雜文其應合改者所司詳依典故供奉帷幕咸用紫色自録府衛所旗並改以皂八品已下舊服青者並改以碧其在京諸司文官職事五品已上清官并六品七品清官並每日入朝之時常服袴褶諸州縣長官在公衙亦准此自餘官朔望朝參皆依舊其色皆依本品又鎮星之在太微已厯年載著土清之美應表坤祚之元符宜同感帝以時薦享又東都改為神都宫名太初宫但列署分司各因時而立號建官置職咸適事以標名而今曺僚之中稱謂多爽宜改尚書省為文昌臺左僕射為文昌左相右僕射為文昌右相吏部尚書為天官尚書户部尚書為地官尚書禮部尚書為春官尚書兵部尚書為夏官尚書刑部尚書為秋官尚書工部尚書為冬官尚書門下省改為鸞臺中書省改為鳯閣侍中改為納言中書令改為內史太常寺改為司禮寺鴻臚寺改為司賔寺宗正寺改為司屬寺光祿寺改為司膳寺太府寺改為司府寺太僕寺改為司僕寺衛尉寺改為司衛寺大理寺改為司刑寺司農寺依舊左右衛亦依舊左右驍衛亦為左右武衛左右武衛為左右鷹揚衛左右威衛為左右豹韜衛左右領軍衛為左右玉鈴衛左右金吾衛依舊其餘曺司及官僚名未改者所司速制名奏聞又司𨽻之官監郡之職所以巡省風俗刺舉愆違今人物殷煩區宇遐曠而所在州縣未能澄肅可置右肅政御史臺一司其職員一准御史臺専知諸州按察其舊御史臺改左肅政御史臺専知在京有司及監諸軍旅并出使其諸州録事參軍宜依舊令在京五品已上清官每日章善顯福等門各一人待詔朕當親訪政道詳求得失又𤣥元帝者皇室之源韞道德而無為冠靈仙而不測業光衆妙仁覃庶品豈使寶允見御宸居先毋竟無尊位可上尊號曰先天太后宜於老君廟所敬立尊像以申誠薦又洛州界內所有帝王之陵及自古清直之臣忠亷之佐並令州縣就其塋域一申祭享又自武德已來元勳佐命或以忠鯁事主或以道德臣君非身在有犯緣子孫絶封者前詔雖已處分或恐仍有闕遺宜降霈澤重申前命又往日先朝聖武蕩定遐方日月照臨咸為郡縣皆荷生成之惠無復遠近之殊朕矜撫之懷豈隔中外每念其殄嗣愍愴良深繼絶興亡實惟本志各宜求其後𦙍立之以承享獻其諸都護漢官及鎮兵等並悉放還其營奉山陵使及鹵簿使等並依别𠡠處分又兩京之所徭賦實繁亦令所司作優量法使勞逸得所靈駕所涉千里斯遙在路黎民莫不哀奉念其勞敝情增感惻其緣供頓及山陵者並免今年課稅又比來諸道軍行叙勳多濫或端居不出以貨買勳真僞相䝉深為巨蠧自今以後所司宜明具條例務令禁斷責成斯在可不勉歟如更有違必越法科處分又比來放出宫女已降詔書然以在內多時咸悉願住但念其各有親屬豈可久致分離宜准前恩即令放出又隆平日久户口滋多物務既煩欺隱斯衆其上州三萬户已上大縣萬户已上各宜析出别置州縣惟雍洛二州不在此限又濟時之道求賢是務其官人及百姓等或器標瑚璉材堪棟幹或在職清慎或抱德幽棲或武藝馳聲或文藻流譽宜令京官九品已上諸州長官各舉一人咸以名薦務取得賢之實無貽濫收之譏又前者有詔具述內外官寮備陳行事以申勸沮但恐百官在職尚有虧違今欲重降深恩更垂寬宥棄瑕録用罔責於前非滌罪論功必期於後善若又不悛已過重掛踈羅當使置以嚴刑倍加其罰思與士庶共此維新可大赦天下改文明元年為光宅元年自九月五日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒皆赦除之流人未逹前所者放還其犯十惡官人枉法受財監臨主守自盜所監臨劫賊殺人故殺人謀殺人反逆緣坐并軍將臨戎挫威喪律鎮遏失所虧損師徒及常赦所不免者並不在赦例亡官失爵量加收叙諸年八十以上各賜粟二石綿帛二段九十以上賜粟三石綿帛三段百嵗已上賜粟五石綿帛五段並依舊例版授孝子順孫義夫節婦咸表門閭鰥寡惸獨篤疾之徒不能自存者並加賑恤亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之布告天下咸使聞知其詔書內事有未盡者仍令所司作條例處分唐大詔令集卷三
