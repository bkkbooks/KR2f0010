body:
  text: 唐大詔令集卷一百十三宋宋敏求編政事道釋禁正月五月九月屠宰詔為殞身戎陳者立寺剎詔道士女冠在僧尼之上詔僧尼不得受父母拜詔釋教在道法之上制條流佛道二教制禁葬舍利骨制僧道齊行並進𠡠令僧尼道士女冠拜父母𠡠斷書經及鑄佛像敕禁斷妖訛等敕誡勵僧尼敕不許私度僧尼及住蘭若敕僧尼拜父母敕禁三元日屠宰敕𤣥元皇帝臨降制停京都檢校僧道威儀敕令天下寺觀修功德敕條貫僧尼敕禁天下寺觀停客制禁僧道卜筮制修亳州太清宫詔條流僧尼敕拆寺制迎鳯翔真身德音道釋禁正月五月九月屠宰詔釋典微妙净業始於慈悲道教沖虛至德去其殘殺四時之禁無伐麛卵三驅之化不取前禽蓋欲敦崇仁惠蕃衍庶物立政經邦咸率兹道朕祗膺靈命撫遂羣生言念亭育無忘鑒寐殷帝去網庶踵前修齊王舍牛實符本志自今以後每年正月五月九月凡關屠宰殺戮網捕畋獵並宜禁止武德二年正月為殞身戎陳者立寺剎詔至人虛已忘彼我於胸懷釋教慈心均異同於平等是知上聖惻隱無隔萬方大悲𢎞濟義猶一子有隋失道九服沸騰朕親總元戎致兹明罰誓牧登陑曽無寧嵗其桀犬愚惑嬰此湯羅銜鬚義憤終身握莭各殉所奉咸有可嘉日往月來逝川斯逺雖復項籍放命封樹紀於丘墳紀信捐生丹書著於圖象猶恐九泉之下尚淪鼎鑊八難之間永纒水火愀然疚懷用忘興寢思所以樹立福田濟其營魄可於建義已來交兵之處為義士凶徒殞身戎陳者立寺剎焉貞觀三年閏十二月道士女冠在僧尼之上詔老君垂範義在於清虛釋迦遺文理存於因果詳其教也汲引之迹殊途永其宗也𢎞益之風齊致然則大道之行肇於遂古源出無名之始事髙有外之形邁兩儀而運行包萬物而亭育故能興邦致泰反朴還淳至如佛法之興基於西域爰自東漢方被中華神變之理多方報應之緣匪一洎乎近世崇信滋深人兾當年之福家懼來生之禍由是滯俗者聞𤣥宗而大笑好異者望真諦而多歸始波湧於閭里終風靡於朝廷遂使殊方之典鬱為衆妙之先諸華之教翻居一乘之後流遁忘反於兹纍代朕夙夜寅畏緬惟至道思革前弊納諸軌物况朕之本系起自柱下鼎祚克昌既憑上德之慶天下大定亦賴無為之功宜有改張闡兹𤣥化自今已後齊供行𤣥法至於稱謂道士女冠可在僧尼之前庶敦本之俗暢於九有尊祖之風貽諸萬葉貞觀十一年二月僧尼不得受父母拜詔釋典沖虛有無兼謝正覺凝寂彼我俱亡豈自尊崇然後為法聖人心主於慈孝父子君臣之際長幼仁義之序與夫周孔之教異軫同歸弃禮悖德朕所不取僧尼之徒自云離欲先自貴髙父母之親人倫已極整容端坐受其禮拜自餘尊屬莫不皆然有傷名教實斁彞典自今已後僧尼不得受父母及尊者禮拜所司明為法制即宜禁斷顯慶二年二月釋教在道法之上制朕先䝉金口之記又承寶偈之文歷教表於當今本願摽於曩劫大雲闡奧明王國之楨符方等發揚顯自在之丕業馭一境而敦化宏五戒以訓人爰開革命之階方啓惟新之運宜叶隨時之義以申自我之規雖實際如如理忘於先後翹心懇懇畏展於勤誠自今已後釋教宜在道法之上緇服處黃冠之前庶得道有識以歸依極羣生於回向布告遐邇知朕意焉天授二年三月條流佛道二教制佛道二教同歸於善無為究竟皆是一宗比有淺識之徒競于物我或因懟怨各出醜言僧既排斥老君道士乃誹謗佛法更相訾毁務在加諸人而無知一至於此且出家之人須崇業行非聖犯義豈是法門自今僧及道士敢毁謗佛道者先決杖即令還俗聖厯元年正月禁葬舍利骨制釋氏垂教本離死生示滅之儀固非正法如聞天中寺僧徒今年七月十五日下舍利骨素服哭泣不達妙理輕徇常情恐學者有疑曽不謗毁宜令所管州縣即加禁斷聖厯三年五月僧道齊行並進制朕聞釋及𤣥宗理均跡異拯人救俗教别功齊豈有於其中間妄生彼我不遵善下之㫖相髙無上之法有殊聖教頗失道源自今每緣法事集㑹僧尼道士女冠等宜齊行並進景雲二年令僧尼道士女冠拜父母敕敕夫孝者天之經地之義人之行故自天子下至庶人資於敬愛以事父母所謂冠五帝之表稱百行之先如或不由其何以訓如聞道士女冠僧尼等有不拜父母之禮朕用思之茫然罔識且道釋之教蓋懲惡而勸善父子之儀豈緣情而易制安有同人代而離怙恃哉哀哀父母生我勞瘁故六親有不和之戒十號有報恩之㫖此又窮源本而啓宗極也今若為子而忘其生傲親而徇於末日背禮而强名教傷於教則不可行行教而不廢禮合於禮則無不遂二親之與二教復何異焉自今已後道士女冠僧尼等並令拜父母喪紀變除亦依月數庶能正此頺弊用明典則罔虧愛敬之風自叶真仙之意開元二年閏二月三日斷書經及鑄佛像敕佛教者在於清净存乎利益今兩京城內寺宇相望凡欲歸依足申化敬下人淺近不悟精微覩葉希金望𦦨思水浸以流蕩頗成蠧弊如聞坊巷之內開鋪書經公然鑄佛口食酒肉手漫羶腥尊敬之道既虧慢神之心遂起百姓等或緣求福因致飢寒言念愚䝉深用嗟悼殊不知佛非在外法本居心近取諸身道則不逺溺於積習實藉申明自今已後州縣坊市等不得輒更鑄佛寫經典須瞻仰尊容者任就寺禮拜須經典讀誦者勤於寺贖取如經本少僧為寫供諸州觀並宜准此開元二年七月禁斷妖訛等敕蘇頲敕釋氏汲引本歸正法仁王護持先去邪道失其宗㫖為般若之罪人成其詭怪豈涅槃之信士不存懲革遂廢津梁眷彼愚䝉將陷坑穽比有白衣長髮假託彌勒下生因為妖訛廣集徒侣稱解禪觀妄說災祥或别作小經詐云佛說或輒畜弟子號為和尚多不婚娶眩惑閭閻觸類實繁蠧政為甚刺史縣令職在親人拙於撫馭是生姦宄自今已後宜嚴加捉搦仍令按察使採訪如州縣不能覺察所由長官並量狀貶降開元三年十一月十七日誡勵僧尼敕釋迦設教出自外方漢主中年漸于東土說兹因果廣樹筌蹄事涉虛𤣥眇同河漢故三皇作乂五帝乘時未䝉方便之門自有雍熙之化朕念彼流俗深迷至真盡軀命以求緣竭資財而作福未來之勝因莫效見在之家業以空事等繁風曽無所悔愚人寡識屢陷刑科近日僧尼此風尤甚因依講說惑煽閭閻溪壑無厭唯財是斂津梁自壞其教安施無益於人有蠧於俗或出入州縣假託威權或巡歷村鄉恣行教化因其聚㑹便有宿宵左道不常異端斯起自今已後僧尼除講律之外一切禁斷六時禮懴須依律儀午夜不行宜守俗制如有犯者先斷還俗仍依法科罪所在州縣不能捉搦并官吏輒與往還各量事科貶開元十九年四月不許私度僧尼及住蘭若勑夫釋氏之教義歸真寂爰置僧徒以奉其法而趨末忘本去實據華假託方便之門以為利養之府徒蠲賦役積有奸訛至使浮俗奔馳左道穿鑿言念淨域浸成道奸非所以叶和至理𢎞振王猷宜有澄清以正風俗朕先知此弊故預塞其源不度人來向二十載訪聞在外有三十已下小僧尼宜令所司及府縣括責處分又惟彼釋道同歸凝寂各有寺觀自合住持或寓跡幽閒或潜行閭里陷於非僻有足傷嗟如聞逺就山林别為蘭若兼亦聚衆公然往來或妄託生緣輒有俗家居止即宜一切禁斷開元十九年七月僧尼拜父母勑道教釋教其歸一體都忘彼我不自貴髙近者道士女冠稱君子之禮僧尼企踵勤誠請之義以為佛初滅度付囑國王猥當負荷願在宣布蓋欲崇其教而先於朕也自今以後僧尼一依道士女冠兼拜其父母宜增修戒行無違僧律興行至道俾在於兹開元二十一年十月禁三元日屠宰勑道家三元誠有科誡朕嘗精意禱亦久矣而物未䝉福念不在兹今月十四日十五日是下元齊日都城內應省屠宰宜令河南尹李適之勾當總與贖取其百司諸厨日有內科亦責數奏來並百姓間是日並停宰殺漁獵等兼斷肉食自今以後兩都及天下諸州每年正月七月十月三元日起十三日至十五日兼宜禁斷開元二十二年十月𤣥元皇帝臨降制大道混成乃先於天地聖人至教用明其宗極故能發揮妙本𢎞濟生靈使秉志者信徴迷方者知復以此救物故無弃人其孰當之莫若我烈祖𤣥元皇帝矣朕纘承寶業重闡𤣥猷自臨御以來罔不夙夜每滌慮凝想齊心服形禮謁於尊容未明而畢事將三十載矣蓋為天下蒼生以祈多福不謂微誠上達睿祖垂鑒頃因假寐忽夢真容既覺之後昭然以觀瞻奉踰時殊相自然與夢相協謂降仙府永鎮人寰告我以無疆之休德音在聽表我以非常之慶靈貺有期乃昊穹幽贊宗社儲祉豈朕虛薄能致兹事若使寢興乃申祗敬宜令所司即寫真容分使送諸道採訪使令當道州轉送開元觀安置所在道士女冠道士等皆具威儀法事迎候像到七日夜設齊行道仍各賜錢用充齊慶之費自今已後常令講習道經以暢微㫖所置道學須倍加敦勸使有成益是知真理深逺𢎞之在人不有激揚何以勵俗諸色人有能明道德經及莊子列子文子者委所由長官訪擇具以名聞朕當親試别加甄奬至如道有三寶兹居一焉欽若至言爰兹宥過天下見禁囚徒其十惡罪者及造僞頭者并謀殺故殺奸訛宿宵人等特宜免死配嶺南官人犯贓據情狀輕重事貶降餘一切免且夫愛人之義長育之務宜存清淨合於簡易至如州縣造籍之年四圍定户皆據資産以為升降其有小葺園廬粗致儲蓄多相糾訐便被加等朕情為敦本義在勸農欲使野絶游人田無曠土安可得也自今已後且三五年間未須定户其中或有家資破散檢覆非虛不可循舊差科須量事與降今者真容應見古所未聞福雖始於邦家慶宜均於士庶其親王公主郡主縣主及內外文武官等並量賜錢至休假之辰宜以酒食用申慶樂諸道莭度及將士等亦宜准此其兩京及諸州父老亦量賜錢同此歡宴其錢以當處官物况伊爾公卿逮乎黎獻宜勉崇𤣥化共復淳源宣布遐邇使知朕意開元二十九年五月停京都檢校僧道威儀勑孫逖敕道釋二教必在護持須置威儀令自整肅徒衆既廣統攝尤難更相是非却成煩弊自今已後京都檢校僧道威儀事宜並停或恐先有猜嫌因此妄相糾訴所由亦不須為理令天下寺觀修功德敕孫逖敕道釋二門𤣥通衆妙濟時育物皆有明徴是所依憑豈忘尊奉其天下寺觀並令修功德用齊三聖之教以答百靈之心宜副虛懷各陳至敬條貫僧尼敕道釋二教用存善誘至於像設必在尊崇如聞州縣公私多借寺觀居止因兹䙝瀆切宜禁斷務令清肅其寺觀除三綱并老病不能支持者餘並俾每日二時行道禮拜如有弛慢並量加科罰又崇敬清净禮避嫌疑其僧尼道士非本師教主及齊㑹禮謁不得妄託事故輒有往來非時聚㑹並委所由長官勾當所有犯者准法處分亦不得因兹攪擾分明告示咸使知悉寶應元年八月禁天下寺觀停客制常衮敕釋教本以助化道家先於理國懲惡勸善以齊死生薰然慈仁美利天下所庇者大所益者深故歷代崇尚而弗易也朕以𤣥元烈祖慶我昌運西方聖人福兹下土常所盡敬敢忘致誠且至真之體尚於精潔流俗所尊不宜䙝慢如聞天下寺觀多被軍士及官吏諸客居止狎而黷之曽不畏忌緇黃屏竄堂居毁撤寢處於象設之門庖厨於廊廡之下緬然遐想愧歎良深自今已後切宜禁斷其軍士委州縣長吏與本將商量移於穩便處安置其官吏諸客等頻有處分自合遵承仰敕到當時發遣應尊像有損壞處俾隨事修補其有諸神所居載在祀典靈跡昭著福及生人者如有毁廢亦宜增葺且王者以清淨統法聖人以神道設教精意所在感而遂通非徼福於朕躬期降祥於黎獻申明詔㫖用悉勞懷禁僧道卜筮制常衮敕左道疑衆王制無捨妖言蠧時國朝尤禁且緇黃之教本以少思寡欲也隂陽者流所以教授人時也而有學非而辨性狎於邪輒窺天道之逺妄驗國家之事仍又託於卜筮假說災祥豈直閭閻之內恣其誑惑兼亦衣冠之家多有厭勝將恐寖成其俗以生禍亂之萌時艱已來禁網疏闊致令此輩尚有矯誣害政之深莫過於此將歸正道必絶姦源宜令所司舉舊條處分修亳州太清宮詔聖人立極教本奉先王者配天義惟尊祖我大聖祖𤣥元皇帝肇開寶運垂祚有唐致六合於大同躋羣生於夀域保兹鴻業實賴貽謀如聞亳州太清宮頻經水潦頗已摧毁永惟誕聖之地敢忘崇本之誠宜令宣武軍莭度使李程兼充亳州太清宮使仍委漸加修葺以時致敬稱朕意焉太和條流僧尼敕朕齊居法宫詳念至理思欲建皇極端化源大蘇生靈漸復古道矧伊耗蠧必在澄清而釋氏一宗來自西國殷周已前何嘗有此唐虞之際寧匪盛時逮至漢明因夢以言徴𫝊毅猝詞而臆對逺承像教從此流行蕩然相𫝊垂七百祀黎庶信若空之說衣冠敬方便之門異同之論雖多俗尚之訛未革遂使風驅成俗雲構滿途丁壯茍避於征徭孤窮實困於誘奪永言斯弊宜峻科條自今已後京兆府委功德使外州府委所在長吏嚴加捉搦不得度人為僧尼纍有明敕切在提舉惟我元元務在長育擅有髠削亦宜禁斷比來京城及諸州府三長齊月置講集衆兼戒懴及七月十五日解夏後巡門家提剝割生人妄稱度脫者並宜禁斷且僧尼本律科戒甚嚴茍有違犯便勒還俗若有自願還俗者官司不須制立如聞兩街功德使近有條約不許僧尼午後行遊雖曰緇徒無非赤子有妨自遂亦軫豫懷從今以後午後任行其僧尼在城委功德使其諸州府委本任長吏試經僧尼並須讀得五百紙文字通流免有舛誤兼數內念得三百紙則為及格京城敕下後諸州府敕到後許三箇月溫習然後試練如不及格便勒還俗其有年過五十以上筋力既衰及年齒未至夙嬰痼疾并瘖聾跛躄不能自存者並不在試經限若有戒律清髙修持堅苦風塵不雜徒衆共知者亦不在試經限天下更不得創造寺院普通蘭若等如因破壞即任修葺於戲理國之本在正風俗故王化首婚姻之道所以序人倫霸圖著胎養之令所以務生聚况一夫不耕人受其飢一女不織人受其寒安有廢中夏之人習外夷無生之法略期疏滌用潔源流俾爾齊氓去末歸本庶富之漸其在斯乎凡厥司存勉率吾教各勤檢馭稱朕意焉太和年拆寺制朕聞三代以前未嘗言佛漢魏之後像教寖興是逢季時𫝊此異俗因緣染習蔓衍滋多以至於蠧耗國風而漸不覺以至於誘惑人意而衆益迷洎於九有山原兩京城闕僧徒日廣佛寺日崇勞人力於土木之功奪人利於金寶之飾移君親於師資之際違配偶於戒律之間壞法害人無逾此道且一夫不田有罹其餒者一婦不織有罹其寒者今天下僧尼不可勝數皆待農而食待蠶而衣寺宇招提莫知紀極皆雲構藻飾僣擬宮居晉宋齊梁物力凋殘風俗澆詐莫不由是而致也况我髙祖太宗以武定禍亂以文理華夏執此二柄足以經邦豈可以區區西方之教與我抗衡哉貞觀開元亦嘗釐革剗除不盡流衍轉滋朕博覽前言旁求輿議弊之可革斷在不疑而中外誠臣叶心正意條疏至當宜在必行懲千古之蠧源成百王之典法濟人利衆豫不讓焉其天下所拆寺四千六百餘所還俗僧尼二十六萬五十人收充兩稅户拆招提蘭若四萬餘所收膏腴上田數千萬項收奴婢為兩稅户十五萬人并隸僧尼屬主客顯明外國之教勒大秦穆護拔二千餘人並令還俗不雜中華之風於戲前古未行似將有待及今盡去豈謂無時驅遊墮不業之徒已踰百萬廢丹雘無用之屋何啻億千自此清淨訓人慕無為之理易簡齊政成一俗之功將使六合黔黎同歸皇化尚以革弊之始日用不知下制明廷宜體豫意宣布中外咸使聞知㑹昌五年八月迎鳯翔真身德音朕以寡德纘承鴻業十有四年矣頃屬蠻冦猖狂王師未息朕憂勤在位愛育生靈遂乃尊崇釋教致敬𤣥門迎請真身蓋為萬姓祈福今者觀覩之衆隘塞路岐載念陛庭寢興在慮嗟我黎人陷於刑辟况漸當暑毒繫於縲絏或身積幽寃有傷和氣或門連追擾有妨農務其京畿及天下州府見禁囚徒除十惡五逆故意殺人官典犯賘令造毒藥放火持仗開發墳墓外其餘罪無輕重莭級遞减一等其京城軍鎮限兩日內疏理訖聞奏天下州府敕到三日內疏理聞奏咸通十三年四月唐大詔令集卷一百十三
