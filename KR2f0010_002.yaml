body:
  text: 唐大詔令集巻二宋宋敏求編帝王即位赦上神堯即位赦太宗即位赦中宗即位赦睿宗即位赦明宗即位赦肅宗即位赦代宗即位赦順宗即位赦穆宗即位赦敬宗即位赦優賜諸軍詔即位赦上神堯即位赦詔曰舜禹殊時禪代存乎揖讓殷周異世革命事乎干戈至於據龍圖握鳯紀統御皇極撫拯黎民奄有四方朝宗萬國垂法作則其揆一焉朕以寡薄屬彼澆季大業末年綱維廢弛三光改耀九服移心既戡定時難緝和庶績一匡海内再造黎元隋氏以天禄永終厯數攸在敬禪厥位授於朕躬顧惟慙徳屬當景運懼甚履氷懍乎御朽上答蒼靈之睠俯順億兆之心寳厯初基普天同慶宜布兹寛恵咸與惟新可大赦天下改隋義寜二年為武徳元年自五月二十日昧爽以前罪無輕重已發露未發露皆赦除之子殺父奴殺主不在赦限百官及庶人賜爵一級義師所行之處給復三年自餘給復一年孝子順孫義夫節婦旌表門閭孝弟力田鰥寡孤獨量加賑恤太宗即位赦詔曰惟天為大七政所以授時惟辟奉天三才所以育物故能彌綸宇宙經緯乾坤大庇生民闡揚鴻烈我大唐誕膺嘉運載協休期丕受龍圖肇開鳯紀太上皇徇齊作聖睿哲欽明奄有八荒光宅四表牢籠軒昊躡跨殷周金鏡俯臨玉燭遐被然而至徳弗宰成功不居髙謝萬邦委茲重器郊禋曠典士民翹矚欽惟宗社義存享獻朕以寡昧實膺統緒辭不獲免式纂洪業靈命既臻是昇寳位居臨兆庶繼軌百王若涉大川罔知攸濟方咨令哲共康至道今紹祚伊始奉答天休思俾恵澤被於黎獻可大赦天下自武徳九年八月九日昧爽已前罪無輕重已發覺未發覺囚徒繫者悉從原免武徳元年以來流配者亦並放還凡厥庶寮進爵一級其五品以上先無爵邑者封開國男六品以下各加一轉闗内及蒲芮虞秦陜鼎六州免二年租調自餘率土普給復一年年八十以上各賜米二石綿帛五段百嵗以上各賜米四石綿帛十段仍加版授以旌尚齒鰥寡孤獨不自存者量事優䘏其有至孝純著達於鄉黨徴諸闕廷厚加褒擢節義之夫貞順之婦州府列上旌表門閭髙年碩學直言正諌所在長官隨狀荐舉亡命山澤挾蔵軍器百日不首復罪如初以赦前事告言者以其罪罪之中宗即位赦門下天地盈虚四時有消息之度皇王興替五運有遷革之期稱號斯殊驪騵亦異受明命者罔不由茲我大唐髙祖神堯皇帝聖期首出天與神器有大功於區夏有大造於生靈太宗文武聖皇道則繼明業推搆極𩔖商湯之起亳若姬發之承周彈壓九皇牢籠萬古髙宗天皇大帝上聖御圖大明司契手調元氣心運洪鑪齊五緯而平太階應三神而登日觀網羅開闢包冠義胥大猷備闡能事斯畢仙駕不追逆臣開釁敬業挺災于淮甸務挺潜應於沙場天柱將揺地維方撓非撥亂之神功不能定人之危矣則天大聖皇帝亶聰成徳濬哲應期用初九之英謨開太一之宏畧振玉鈴而殪封豕授金鉞而斬長鯨受河洛之圖書當昊義之厯數恵育黎獻並登仁夀既而凝懐問道屬想無為以大寳為勞生遂復沗於明辟且有後命俾承先緒光啟大唐之圖用崇興復之基交際在辰情深感慰奉髙祖之宗廟遵太宗之社稷不失舊物實在於茲業既惟新事宜更始可改太周為唐社稷宗廟陵寢郊祀禮樂行運旗幟服色天地等字臺閣官名一事已上並依永淳已前故事其神都依舊為東都北都依舊為并州大都督府永昌來庭兩縣並從廢省其百姓依舊分屬河南洛陽兩縣周朝宗廟陵寢及官宜令所司商量處分朕之逺系出自老君靈佑所資貽慶長久宜依舊上尊號為𤣥元皇帝省司差使冊告天下村落佛堂並令開門洒掃不得因茲聚斂創加修葺庠序之規風教之首京都兩學尚且闕修欲令四方何以取則其京都學館及先聖廟堂所有破壊未營造者逐要修葺速令畢功不得浪有勞擾樂府之設國風所繫豈惟易俗抑且和神至若絲竹繁聲倡優雜伎深乖禮則並宜量事減省國之禮儀已經改撰隨時逐變務在𢎞通宜令禮官重加詳審於行事有不便者即從損益制勅刪定處分已久宜従易簡務速施行設官固須量才稱職比來委任稍亦乖方遂使鞫獄推囚不専法寺撰文修史豈任秘書營造無取於将作句勘罕從於比部多差别使人着判官在於本司便是曠位並須循名責實不得越守侵官皇家親屬籍沒者則天大聖皇帝雖已溥暢鴻恩其先有任五品巳上官枉遭䧟害者並宜加改塟式遵典禮若有後嗣還其資䕃其别勑安置并左貶者亦復其屬籍量還官爵仍遣諸流移人除犯贓賄及畜蠱毒造偽避讐並反逆縁坐勘㑹不免者餘並放還天下軍鎮不要者多轉輸艱辛府庫虚耗事須改弊不可循常宜簡内外官人有材識者分為充使巡邊按覆須留鎮遏及應減一事巳上並委使人共所管詳度還日具利害聞奏其應支兵先取當土及側近人仍隨地配割分州定數年滿差替各出本州永為格例不得踰越五品以上致仕曽伏事先朝者賜爵一級曽任州府幕府及任洛州牧日官人並勘責聞奏經任東宫官僚見任六品官計階應入五品者特宜不拘年限餘依常例三衛細引主帥直司行署畨官七絶等通前各減二年勞考滿日各加勲一轉合得官者稍與處分中書門下官人計階考入五品者優量令史畨官准羽林例處分分直者及外司官典二十二日誅賊之時縁祇承在中書省者各賜勲一轉諸司有品直司宜加一階無品直司賜勲一轉禮官縁即位修執儀注者各賜物二十段正月當畨三衞監門等於武成衙内明福門外南衙及諸門者賜物十段左右羽林及東宫北門厨供膳及匠准例各賜物十段正月量追三衛細引監門細引直長飛騎雜技飛騎各賜物十段東宫北門官及三衛細引監門直長各賜物二十叚仍𩔖例功夫多少奏聞其引玉冊及轝冊讀冊等官人各賜物五十段授冊使人賜物一百段書冊人各賜物十段其轝腰轝官人賜物二十段飛騎各賜物十五段其轝香蹬三衛及轝寳人各賜二十段頃者户口逃亡良田差科繁劇非軍國切要者並量事停減若要和市和雇先依時價付錢自非省支勒索不得輙有進送諸貢物皆須任土當處無者不得别求仍於常數每事量減縁百姓間所有不稳便者並委州府具狀奏聞朕當親覽即為釐革天下百姓並免今年租及地稅自今以後租庸准符配定更不須徴折脚價錢其已前未徴得者亦即免放天下宗姓並准舊式房州百姓宜給復三年其諸司官員并雜色役掌幕士門役之徒兼音聲人及丁匠等非灼然要籍並量事減省所司速為條制廏馬數多皆須秣飼食人之粟日費滋深廣殿中諸閑廏馬量支留以外抽送外州馬坊及本監牧其東宫諸王公主等馬應官供者亦令隨事減省奢淫伎巧實為蠧弊皆因節日宗屬婚親王公妃主競相賀遺或造珍麗妄為進奉錦綵異飾雕鏤竒文假撰樓臺偽裝禽獸諸如此類深是害時宜明勑格嚴加禁斷衣服采章一准令式夫鄒纓齊服尚且變俗移風朕率先百僚必期化成兆庶東都正月當上番兵年至五十五即放出前赦及今制處分有不盡者並令所司𩔖例續奏布告遐邇咸使知聞主者施行神龍元年二月五日睿宗即位赦門下朕聞自古帝王光膺圖籙則尊尊親親之義著於典制朕諒在至公葢非獲已我大唐乘時撫運累聖重光當四海之樂推受三靈之眷命大行皇帝奄弃㝢縣痛結仇讎朕志掃巨逆保寜嗣主今皇帝哀㷀在疚託於朕躬懃懇再三願成茲意朕以不徳猥承丕緒念今追昔載感於懐若渉大川罔知攸濟思荷宗祧之業屬此維新式揚涣汗之恩與之更始可大赦天下明皇即位赦朕承累聖之鴻源荷重光之積慶昔因多難時屬遘屯寳位深墜地之危神器有綴旒之懼事殷家國義感神祗吟嘯風雲恭行雷電致君親於堯舜濟黔首於休和遂以孟秋允昇儲貳旋承内禪繼體宸居拜手之請空勤讓王之誠莫展恭臨億兆二載於茲上稟聖謨下凝庶績八荒同軌瀛海無波不謂姦慝潛謀蕭墻竊發逆賊竇懐貞等並以庸妄擢在朝廷毫髪之效未申丘山之釁仍積共成梟獍將肆姦囘太上皇聖斷宏通英謀獨運命朕率岐王範薛王業等躬事誅鋤齊斧一麾凶渠盡殪太陽朗耀闢氛靄於天衢髙風順時彰肅殺於秋序人靈叶贊夷夏相歡四族之慝既清七百之祚方永爰承後命載闢休期摠軍國之大猷施雲雨之鴻澤承乾之道既光被於無垠作解之恩思式覃於品物當與億兆同此惟新可大赦天下大辟罪已下咸赦除之邠王守禮加實封二千户宋王成器申王成義各加實封一千户岐王範薛王業各加一階内外官人被諸道按察使及御史所通惡狀咸宜洗滌選日依資叙用先天二年七月肅宗即位赦朕聞聖人畏天命帝者奉天時知皇靈眷命不敢違而去之知厯數有歸不獲已而當之在昔帝王靡不由斯而有天下也乃者安賊亂常京闕失守天未悔禍羣兇尚扇聖皇久厭大位思𫝊𦕈身軍興之初已有成命予恐不徳罔敢祗承今羣工卿士僉曰孝莫大於繼徳功莫大於中興朕所以治兵朔陲將殄逆寇務以大者本其孝乎須安兆庶之心敬順羣臣之請乃以七月癸丑朔十二日甲子即皇帝位於靈州敬崇徽號上尊聖皇曰上皇天帝所司擇日昭告於上帝朕以薄徳謬膺重任既荷承天之禮宜覃率土之澤可大赦天下改元曰至徳大辟罪已下常赦所不免者咸赦除之其逆賊李林甫王珙楊國忠近親合累者不在免限百姓官吏能率親屬去逆歸順有官加優奬斬得逆賊父子不問首從當賜爵土别有褒崇其有直言極諌才堪牧宰文詞博逹武藝絶倫孝悌力田沉淪草澤委所在長官聞薦詣闕自陳者亦聴東宫官屬既㑹昌期合承寵命量加改轉諸色勾徴逋租懸調及官錢在百姓腹内並宜放免靈州改為靈武大都督府上縣為望中縣為上官寮等一切便授天下耆夀各賜物五段侍老版授太守縣令有差各賜物五段天下諸道百姓本道採訪使差郡縣官存問四方將士各賜馬一匹六品以下賜物十段天下寺觀各度七人太守並限三考然後轉御史取曽任郡縣理人官者後可薦用所有彈奏一依貞觀故事官吏犯枉法贓終身勿齒自古聖帝明王忠臣烈士五岳四凟名山大川並令所在致祭孝子順孫義夫節婦旌表門閭内外文武官九品以上各加兩階賜勲兩轉三品以上賜爵一級代宗即位赦髙宗嗣興諒隂成受終之禮康王承統翌日奉顧命之書况萬事尚殷蕭墻有釁蒼生佇理社稷謀安教雖達于通喪禮有變於金革順人聴政僶俛從權朕頃侍鑾輿率彼西夏佐成草昧俾掌戎車國歩艱難睿圖廣運再清㝢縣重復宗社稟成命以受律敢貪天以為功聖慈𢎞深冊踐明兩奉若廷訓敢有怠心嗚呼不吊昊天殃咎荐至皇祖之哀未釋窮崩之罰奄鍾攀號罔極若無天地誓終喪紀企及前王百辟抑予俾恭遺訓俯遂衆望嗣膺丕烈欽茲大寳懼不勝任若蹈春氷如集喬木日者先聖哀損朕在問安而䦧牆構災凌長成禍閫闈作孽閽寺滔天職為亂階潛置巫蠱將行竊弄覆我邦家賴良弼匡戴爪牙同徳天道助順神理害盈昭此共工之心終貽管蔡之辱舍彼有罪咸服其辜廢於離宫寘於城潁今天衢雖㤗率土未康式恊公卿之心仰遵易月之命奉時斯在先甲未孚宜允人神覃茲涣汗可大赦天下自寳應元年五月十九日昧爽已前大辟罪已下已發覺未發覺已結正未結正繫囚見徒常赦所不免者罪無輕重咸赦除之自開元已來所有諸色犯累者並宜雪免左降官并諸色流人及罰鎮效配軍團人等一切即放還其中有見任刺史縣令及正員者並依本任其四月十五日已後諸色流貶者與量移近處逆賊史朝義已下有能投降及率衆歸附者當超與封賞天下禁囚不得過五日所有推劾不得分外拷掠亦不得信支證便結罪名諸色文武官應在凌霄門内謁見者并飛龍射生等並宜以寳應功臣為名諸州刺史與一子官刺史縣令入五品减兩考内外文武官三品以上賜爵一級四品以下各加一階諸州刺史父母在無官者與致仕官及父母邑號已亡歿者追贈諸州防禦使並停天下子為父後者各賜勲一轉州縣官自今已後宜令三考一替太官饔饍等特宜减省有渉奢侈一切宜停天下百姓逋租懸調貸粮種子諸色欠負官物一切放免開元乾元等錢並宜凖一文用不須計以虚數益昌郡王邈進封鄭王延慶郡王逈進封韓王故庶人皇后王氏故庶人太子瑛郢王瑶光王琚宜並復封棣王琰永王璘及應安禄山詿誤反狀等並宜昭雪建昌王追封齊王崇恩王追封衞王靈昌王追封鄆王其有明於政理博綜典墳文可經邦謀能制勝及孝悌力田諸州刺史並宜捜揚聞薦投匭者不須勘以停處姓名務招直言以副朕意順宗即位赦朕纂承天序嗣守鴻業以不敏不明託於萬國兆人之上永惟髙祖太宗肇造區夏列聖休徳洽於人心肆惟寡昧膺受多福大懼不克負荷為宗廟羞若涉大川罔知攸濟思與羣公卿士方伯連帥祗若丕訓惟懐永圖内熈庶績外𢎞至化以弼予理臻於大中俾懐生之𩔖各遂其性咸得自新導迎休和蕩滌瑕累可大赦天下自貞元二十一年二月二十四日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正見繫囚徒常赦所不原者咸赦除之左降官量移近處如復資者任依常調選如有親故在上都任於所司陳狀便與處分别勅責受降資正員官者亦與追改亡官失爵放歸不齒者量加収叙流人放還僧尼道士移𨽻者罪人已亡歿家口未許歸者一切放歸如自情願住者勿抑令歸如先有勑云縱逢恩赦不在放還限者及别勑安置者並宜放還其安置人五品已上奏待進止左降官及流人亡殁有官者各還本官今日已前㾗累禁錮及反逆縁坐者一切並與洗滌應縁山陵制度及喪儀禮物博詢可否務遵禮度必誠必信副朕衷懐橋道置頓並以内庫錢充諸有費用先給工價仍以見錢及不折物不得輒令科配天下百姓應欠貞元二十一年二月三十日已前𣙜酒及兩稅錢物諸色逋懸一物已上一切放免京畿諸縣州應今年秋夏青苖錢並宜放免天下諸州府應湏夫役車牛驢馬脚價之𩔖並以兩稅自備不得别有科配仍並以兩稅元勑處分仍永為恒式不得擅有諸色𣙜稅常貢外不得别進錢物金銀器皿竒紋異飾彫文刻鏤之𩔖若已發在路者並納左藏庫清净者理國之本恭儉者修已之端朕臨御萬方方𢎞此道茍可濟物予何愛焉宫掖之中宜先省約其後宫細人子弟音聲人等並宜放歸親族應縁宫市並出正文帖仍依時價買賣不得侵擾百姓所縁諸宫要妳母並取食糧户充稅不得科配寺觀諸軍先擒吐蕃生口配在諸處者宜資給還本國天下官吏應行鞭捶本罪不至死者假以責情致令殞斃每念及此良増惻然宜切加察訪内外文武見任及致仕官并諸道將士等賜爵加堦賜勲有差二王三恪褒聖侯各與一子官大長公主嗣王各與一子官及出身有差宗子中有才用者委宗正卿以名聞量才敘用皇王等已上親賜爵加階有差陪位者年十五已上並放出身武徳以來配饗功臣張巡許逺南霽雲顔杲卿顔真卿等各子孫中與一人正員官故尚父子儀贈太師晟太尉秀實子孫中各與一人正員五品官及諸州府長官及京常叅官父見在未官者並與五品致仕官及階父殁母存者與邑號父母亡殁量與追贈陜州元從寳應功臣興元元從奉天定難功臣賜爵勲有差亡歿者與追贈中書門下節度使東都留守度支鹽鐵等使京兆尹觀察招討等使及神䇿神威金吾六軍將軍大將軍英武威逺鎮國軍使隴右經略軍使節度留後各與一子官有差其神䇿神威六軍英武軍等使並與加官神䇿神威六軍英武威逺營左右金吾及皇城將士及縁御樓立仗將士等賜物及爵階有差應東宫官及侍讀侍書教授在正月二十六日以前者國已闕職掌行事及冊命官受顧命撰制詔及修冊文并寫制詔官等賜爵加階勲進改有差蕃客等共賜物一千八百四十五匹義武軍節度下官健在城立仗共賜物三千八百四十五匹立仗將士等量加改轉内侍省及内坊官正諸道進奏院及奏事官賜爵勲階有差内外五品以上文官及臺省常㕘官宜至四考滿與轉中外逓遷量才敘用其中政績尤異須甄升者不在此限常㕘官及諸州刺史有先得替及假百日經喪去官未授官者並即與進擬百司及在城諸使息利本錢粮徴放多年積成深弊内外官科錢職田等厚薄不均兩稅及諸色榷税錢物重輕須有損益並宜委中書門下與所司商量其利害條件以聞不得擅開糴禁錢務令通濟諸色人中有才識兼茂明於體用者經術精深可為師法者達於吏治可使從政者宜委常㕘官各舉所知其在外者長吏精加訪擇具以名聞仍優禮發遣朕當詢事考言審其才實如無人論薦者即任自詣闕廷内外官及諸色人任上封事極言時政得失才有可觀别當甄奬百姓九十以上版授及賜各有差仍令官吏就家存問順孫孝子義夫節婦旌表門閭重加優恤穆宗即位赦著大明者日也出乎震而見乎離則八紘開朗萬象昭煥渙大號者風也發厚地而鼓羣動則氛䝉盪滌鬱伏舒散王者如日之照臨故聖功作而庶𩔖覩如風之號令故徳音降而兆人從朕以寡薄方兹嗣服荷天地之眷祐承祖祧之祚運夙夜祗勵懼不克周永惟風教之流弊甿俗之疾苦思布濟時之政宜𢎞利物之澤庶有以導迎和氣感兹歡心宜申在宥之恩用啟自新之路可大赦天下自元和十五年二月五日昧爽已前大辟罪已下罪無輕重咸赦除之唯官典犯贓及故殺人者不在免限左降官量移近處已經量移者更與量移如復資者即任依常調選責授降資正員官者亦與追改亡官失爵不齒者量加收敘流人及僧尼道士移𨽻者節級放還及移近處諸色得罪人中如有先勑去縱逢恩赦不在放還限者並與量移若曽任五品已上官者奏待進止左降官及流人先有官者如已亡歿各還本官自今日已前曽有痕累禁錮等一切並與洗滌永懐罔極弓劍不留號奉終天用深哀感應縁山陵制度及䘮儀禮物宜委中書門下及諸司長官等博詢故實務遵禮度必誠必信副朕哀懐所縁山陵造作及橋道置頓所須並以内庫錢充不得輙令科配百姓度支諸州府監院從貞元八年已後至元和十年已前共計欠錢壹百壹萬伍千玖百餘貫鹽鉄使諸監院應欠元和十三年已前錢物除准前制䟽理外共計一百八萬八千六百餘貫石等户部諸州府從建中三年已後至元和十三年已前應欠在州貧窮并遭水旱逃亡百姓腹内兼連接淮西河南賊界并燒刼散失及貸百姓錢物五十萬九百餘貫石等京兆府從元和五年已後至十三年已前應欠諸色物共肆十一萬九千六百餘貫石闕東等州府監院百姓欠負但在官典所由腹内者一切放免諸州府除京兆河南府外應有官庄宅舖店碾磑茶菜園鹽畦車坊等宜割屬所管州府諸道除邊軍營田處其軍粮既出其正税米分給其所管營田自為軍中資用不合取百姓營田并以瘠薄地迴授百姓濃肥地其軍中如要營田任取食粮健兒不得輒妄招召天下百姓等自屬艱難棄其鄉井户部版籍虚繫姓名建中元年已來改革舊制悉歸兩漢税法乆則姦弊濫生自今已後宜准例三年一定兩税非論土著俗居但據資産差率其擇刺史縣令宜委門下中書尚書省御史臺官有所諳知即具聞奏如贓汚殘人當坐舉主榷税之法雖合同遵瘡痍之餘姑欲寛假其河北鹽宜委度支與榷鹽使審細商量具條流聞奏内外百官食料錢一倍至五倍以上節級放免仍每經十年即内外百司各賜錢一萬貫充本各據司額大小公事閒劇及當司貧富作等第給付應屬諸軍諸使諸司人等在村鄉及坊市店舖經紀者宜與百姓一例差科不得妄有影占如有違越所司具所屬司并人名具奏如聞度支鹽鉄鹽院等所在影占富商髙户庇入院司不伏州縣差科疲人偏苦事轉不濟如有此色仰當日勒歸州縣諸道除正勅率稅外不得妄托進奉擅有諸色榷率天下州府除兩稅合送上都錢物及所司常貢外輒不得别進錢物并方鎮得替後至城亦不得輒有進獻掖庭籍沒罪人妻女等宜放歸親族其諸軍先擒獲吐蕃生口配在諸處者並放歸本國願住者亦聴内外文武見任致仕官三品已上賜爵一級四品以下加一堦諸軍將士等普恩之外賜階爵有差二王三恪文宣王及公主縣主嗣王節級賜與一子官及出身宗子有才行者悉以名聞奏仍委中書門下量才敘用皇闕五等已上親皇太后二等已上親並賜階爵武徳已來配饗及第一等功臣并張巡許逺南霽雲顔杲卿顔真卿等尚父子儀贈太師晟贈太尉秀實子孫中與一子官有差其中有才行堪任臺省者量才敘用中書門下并諸道節度使諸州府長官東都留守及京常叅官諸軍使等父母祖父祖母並節級與追贈父母存者與官封已經追贈者更與改贈興元奉天功臣及蔡鄆立功將士普恩之外更賜勲爵亡殁者與追贈中書門下及節度等使東都留守度支鹽鐡使京兆尹諸州刺史等賜一子官有差在城諸軍將士節級賞賜仍加階爵京西京北及振武天徳八道節度及都防禦使下神䇿一十二鎮將士等共一十八萬六千七百餘人都賜物一百八萬一千八百餘匹東宫官及侍讀普恩之外賜爵加階仍並與進改自國哀及行事命職事官普恩之外賜階爵及勲其受顧命撰制詔及冊文并寫制言官等特加一階賜爵一級并賜上柱國優與進改書冊官特加一階尊親之禮既展於徽章廣愛之恩宜申其慶賜皇太后諸親委中書門下量第等節級優賞文武常叅官及外官職事五品已上有母者並加邑號如已至郡太夫人國太夫人者許迴授周親縁皇太后冊禮職事官並節級賜物天下百姓有父母髙年者賜粟皇城内蕃客等並節級賜物今年正月二十八日至閏正月三日宫苑諸門子守捉西内立仗將士等量加改轉應内侍省及内坊宫正等並賜勲爵常叅官及諸州刺史少尹赤令有先得替因病假滿百日解官并終制未授官者及致仕官並與進擬天下諸道州不得擅有閉糴禁錢務令通濟内外文武官及諸色人等任上封事極言時政得失才有可觀别當甄奬應流外色役人等賜勲有差敬宗即位優賜諸軍詔朕以寡昧祗膺寳位載懐悼懼豈所克堪而羽衞𤓰牙禁營司旅晝巡夜警叶力悉心自始銜哀至於踐阼忠勤匪懈誠節用彰將圖錫賚務欲豐厚屬頻年旱歉御府空虚如聞邊上將士至今未給衣賜永言遐慮深切寤寐霑䘏之時所期切濟兩軍宫健各宜賜綵十匹錢十千畿内諸鎮各賜絹十匹錢五千軍吏及城内諸軍賞物節級有等仍於内庫更出綵絹共二百萬匹付度支充邊軍春衣并天下州府賦稅如要蠲放者並委所司約此數均融取濟凡百將士宜悉朕懐長慶四年正月唐大詔令集巻二
