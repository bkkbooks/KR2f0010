body:
  text: 唐大詔令集卷一百一宋宋敏求編政事官制下改太史監為司天臺敕加散騎常侍員品詔升中書門下品秋詔减京畿官貟制停河南淮南等道副元帥制减京兆尹以下俸錢制減刺史縣令録事恭軍詔處分别駕令録敕復先减官員敕賜常參官錢敕置上將軍及增諸衛祿秩詔朝臣薨卒給俸料賻贈詔罷百官正衙奏事敕停河南水陸運使等敕停諸道度支營田使敕停宰臣監搜詔條貫兩省臺官導從詔釐革選人敕文武官參用詔官制下改太史監為司天臺敕建設邦都必資懸象分别曹署皆應物宜靈臺二星主觀察雲物天文正位在太微西南今興慶宫上帝庭也考符之所合置靈臺宜取永寧坊張守圭宅以充司天臺所司量事修理乾元元年二月加散騎常侍員品詔朕欲左右有人朝夕進善發自中禁刑於四方獻替於可否之間論思於密勿之際通天下之志斷天下之疑作而行之道不逺矣與我共此者唯左右常侍乎散騎之班日親帷幄切問近對之地文章侍從之臣賢不厭多才不厭盛實將助益廣以置官重其任者崇其位勸其善者厚其祿中書門下省各加置散騎常侍四員其官並為正三品祿俸之外優給雜料仍委中書門下商量處分必求望實以置周行臣哉鄰哉汝為汝翼慎兹髙選副朕意焉升中書門下品秩詔春秋以九命作上公而謂之宰則宰臣者三公之職漢制中書令出納詔命典樞密侍中上殿稱制參議政事魏晉以還益重其任職有分於公府事不綜於尚書雖出納啓沃之謀未專宰相之稱所以委遇斯大品秩非崇至於國朝實執其政當左輔右弼之寄總代天理物之名典領百寮陶鎔景化豈可具瞻之地命數不加固當進以等威副其位望侍中中書令宜升入正二品門下中書侍郎厯代清貴所掌要重多用此官參於樞務以地則密以階未峻宜升入正三品式存班制永作典常其見任官宜依新升官品减京畿官員制夫計人而置官度事而賦任因時立制損益在焉吏足以理人人足以奉吏則官稱其事祿當其秩然後上下相樂公私不匱昔光武時及魏太和中並减吏員兼郡邑致理之道此其一隅今連嵗戎旅天下凋瘵京師近甸煩酷尤重比屋流散念之惻然人寡吏多困於供貢欲其蘇息不可得也設令亷耻守分以奉科條猶有祿廪之煩役使之弊而况貪猾縱欲動踰典章作威以虐下厚斂以豐已者乎古者惟置縣大夫一人牧養百姓奚必二佐分掌而後理耶且京畿户口减耗大半職員如舊何以堪之豈可以重困之人供不急之吏使人不倦其在變通制事之宜長安萬年各减丞一員尉兩員昭應减縣丞一員主簿一員尉兩員好畤同官美原各减丞一員尉一員其所减官據闕便停如無闕簡擇勒停應得减官委吏部條件處分停河南淮南等道副元帥制常衮敕古者分建戎號以張威武必因事而制亦有時而戢以天下征伐之重方鎮之大宜有總一則以元老撫和之乃者國家平定之後復理之始與其休息則以諸侯訓緝之自河之南至於滄海往屬難故久勞師徒連城之鎮纍百授鉞之將十數主其經略委在台臣號令耳目以之咨禀服柔滅叛罔不肅清今萬里無塵思解戎備况分閫之重各任勳賢悉心憂國所統皆理何必更有所屬適重其煩軍書取决又失要㑹息人罷鎮誠亦便之河南淮南西山南東等道副元帥宜停其兵馬宜充東都留守兵馬張延賞宜權知東都留守事常休明宜充副留守兼東都鎮守兵馬使減京兆尹以下俸錢制常衮敕輦轂之下封畿之內承前户口五千餘萬京兆祿廪不過二百石俸錢不過三十貫降至下吏差次可知自頃艱虞且踰星紀嵗有事邉之役人多盡室之行閭井蕭然百不存一而府縣之俸十倍平時官髙者因其使名數處請受位卑者假以職掌恣加優給致令所典之務移在他曹雖齊等倫頓異豐薄皆是常稅之外重斂而供侵弊則多因循未改减我軍國之用困其疲耗之人豈計人置官之意度農制祿之法也四方取則其若是乎比下詔書務於勤恤將求致理切於澄源遂委中書門下條録奏聞朕躬親括巨細精詳覽其名實之狀深歎過差之極革其既往制在惟新爰據髙卑以之均節使人足以奉職吏足以資家務有不急悉皆除去仍量閒劇權省官員胥徒厮役亦有蠲减費用既少困窮自安唯出正租更無徴率其京兆府官及縣官月俸除正斷外不得輒有增加如判司參軍丞簿尉等有犯科録事參軍及縣令如令長及録事恭軍及少尹有犯坐京尹畫一之令當在必因勸百之義固非末减各警於位無近於刑誡刺史縣令録事參軍詔楊炎敕㫖弛張刑政興化阜俗使吏息貪汚之跡下無愁怨之聲者不惟良二千石亦在郡主簿縣大夫親其教訓舉其綱目條察善惡惠養困窮方伯得以考其殿最故漢置刺史臨課郡國周制官刑糾繩邦理其義明矣朕思舉舊典以清時俗頻詔長吏精擇此官如聞近日猶有奸濫或未習政事素無令聞因依請託尸曠祿位邪枉附法愞弱廢官人弊於下怨歸於上閭井減耗賄政日聞豈所謂建明職守共副憂勤者也又别駕秩位頗崇若郡守廢闕掌同其任舊制補署或匪其才一不稱職則多傷害自今以後别駕縣令録事恭軍有犯贓私及暗弱老耄疾患不稱所職户口流散者並委觀察節度等使與本州刺史計㑹訪察聞奏與替其犯贓私者便禁身推問具狀聞奏其疾患者准式解所職老耄暗弱及無贓私才不稱職者量資考改與員外官餘官准前後敕處分其刺史不能覺察仰觀察節度使具刺史名品聞奏如觀察節度管內不能勾當郎官御史出入訪察聞奏處分别駕令録敕文同上篇復先減官員敕王者建設庶官允釐九有量户口之衆寡定都邑之盛衰制其職員約以名數俾吏足成務而下克奉公其有弛張必在通濟朕頃緣蕃戎棄信深犯封疆興師備邉資用日費而黎人困弊難更徴求遂權減天下州縣官員姑務集事皆由朕不明不德以至於斯近聞新授官人皆已隨牒之任扶老携幼盡室而行俸祿未請歸還無所嗷嗷道路實疚於懷雖蒸庶之間供應有省而衣冠之弊流寓無依茍便於時豈憚沿革凡百君子所當悉知其先減官員並宜仍舊賜常參官錢敕百辟卿士實惟股肱頃屬艱虞損家徇節纍經寇難靡不困窮洎復上京薦遭歉嵗官俸既薄公田不收外虧導從之儀內懷凍餒之戚朝列尚爾蒸人何堪軫於深衷良用愧惻應文武常參官等宜共賜錢七萬貫委度支據班秩職事及所損職田多少量等級從今至明年四月以來隨月支給凡厥多士宜悉朕懷貞元年置上將軍及增諸衛祿秩詔左右金吾及十六衛等將軍故事皆擇勳賢出鎮方隅入居侍衛其左右金吾等衛自天寶艱難以後雖衛兵廢闕而品秩本髙此誠文武勳臣出入遷轉之地宜增祿秩以示優崇並宜加給料錢及隨身幹力糧課等條件處分以優寵功臣令其充給仍舉故事置武班朝參其廊下食等亦宜加給其十六衛各置上將軍一人秩從二品左右金吾上將軍俸料等並同六軍統軍諸衛上將軍次於統軍支給將求致理必藉兼才文武遞遷不令隔限自今內外文武闕官於文武班中才望相當者參叙用仍各依本事於本衛量置衛兵所司即條件聞奏貞元年朝臣薨卒給俸料賻贈詔君臣之際義莫重焉每聞薨殂深用惻悼宜厚哀榮之禮以申終始之恩文武朝臣有薨卒者自今以後其月俸料宜全給仍更准本官一月俸料以為賻贈若諸司三品以上官及尚書省四品官仍令有司舉舊令聞奏弔祭之禮務從優厚用稱朕懷貞元十年正月罷百官正衙奏事敕朕勵精庶政博求嘉言比者百官正衙奏事至有移時者公卿庶寮屬當寒暑為弊亦深在於朕意豈謂優禮自今勿正衙奏事如陳奏者宜詣延英門請對貞元元年停河南水陸運使等敕朕於百執事羣有司方澄源流以責實效轉運重務專委使臣每道有院分督其任今陜洛漕引悉歸中都而尹守職名尚仍舊貫又諸道都團練使足修武備以靖一方而别置軍額因加吏祿亦既虛設頗為浮費思去煩以循本期省事以便人其河南水陸轉運陜府轉運潤州鎮海軍宣州采石軍越州義勝軍洪州南昌軍福州靜海軍等使額並宜停所收使以下俸料一事以上各委本道充代百姓闕額兩稅仍具數聞奏如聞河南府兩處比來所給皆是置本息利不破工錢勒便添充兩處食錢雜給不要徴納庶我愛人之心豈止於惜費立制之意必在於正名元和五年停諸道度攴營田使敕事關軍旅並屬節制務繫州縣悉歸亷察二使所領孰非管轄諸道度支營田承前各别置使自艱虞以後名制因循方鎮除授之時或有兼帶此職遂令綱目所在各殊今者務修舊章思一法度去煩就理衆心為宜唯别敕置營田處置使且令仍舊其忠武鳯翔武寧魏博山南山東橫海邠寧義成河陽等道度支營田使及淮南度支近已停省其餘諸道並准此處分元和十三年七月停宰臣監搜詔元首股肱君象臣類義深同體理在坦懷夫任則不疑疑則不任自魏晉以降參用霸制虛儀搜索因習尚存朕方推表大信置人心腹庶使諸侯方嶽鼓洽化道夷貊飛走暢泳性分况吾台宰又何間焉自今以後紫宸坐朝衆寮既退宰臣復進奏事其監搜宜停太和年條貫兩省臺官導從敕敕憲官之職在指佞觸邪不在行李自大侍臣之職在獻可替否不在道途相髙並列通班合知名分如宜喧競亦已再三既招人言甚損朝體其省臺與供奉官同道聽先後而行遇途任祗揖而過其從人各隨本官之後少相僻避勿信衝突又聞近日以來應合有導從官手力多者街衢之中行李太過自今以後應有合導從官行李𫝊呼前後不得過三百步太和年釐革選人敕朝廷懸爵賞之科設掄材之政言其藻鑒在乎清通况當求理之時方切任賢之日將宣至化實賴平衡宜於取捨之間必叶公忠之論如聞羈棲旅食貧苦選人守數考而方及選期望一官而時希寸祿注唱才畢旋又更移多被逗遛莫遂便穩脂膏之地須因有賄而升遷避之官即是孤寒所受言斯猥弊乃積嵗年縱有條流尋亦隳改况今行在方溥渥恩不欲使嘆惋栖遲吁嗟屈滯歸乎允當倚在有司宜令中書門下切在條流如選人實有考課堪理繁劇者臨時注擬可以甄升繫生民之慘舒在銓衡之慎擇勿令留滯切速指揮仍將朕意宣示百寮及吏部三銓并選人等各令知悉中和四年二月文武官參用詔文武二柄國家大綱東西兩班官職同體咸匡聖運共列朝廷品秩相對於髙卑祿俸皆均於厚薄不論前代只考本朝太宗皇帝以中外臣寮文武參用或自軍衛而居臺省亦由衣冠而秉節旄足明於武列文班不合清濁優劣近代浮薄相尚凌蔑舊章假偃武以修文竟棄本而逐末雖藍衫魚簡當一見而便許升堂縱拖紫腰金若非類而無由接席以是顯揚榮辱公别重輕遽失人心盡隳朝體致其今日實此之由須議改更漸期通濟今文武百官自一品以下逐月所有料錢並須均勻數目多少一般支給兼命使諸道亦依輪次差遣既就公平必臻交泰叶羣情於天下崇故事於國初凡百庶官宜體朕意天祐二年四月唐大詔令集卷一百一
