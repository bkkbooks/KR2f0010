body:
  text: 唐大詔令集巻六宋宋敏求編帝主尊號批荅先天二年不允上尊號依王公等請上尊號制荅朝集使蔣欽緒等荅侍中裴光庭等荅再請表荅三請表肅宗荅右僕射裴冕太上皇荅皇帝上尊號誥太上皇冄荅皇帝上尊號及讓大聖字誥太上皇三荅上尊號並辭大聖字誥太上皇荅上尊號并大聖字誥太上皇允上尊號誥寳應二年上尊號荅詔荅第二表荅第三表荅百寮請復尊號永貞元年荅宰相上尊號元和二年荅宰臣請冊尊號第三表元和十四年荅南百官上尊號荅宰相請冊尊號第三表荅第四表長慶元年荅宰相上尊號荅第二表荅第三表荅第四表寳厯元年荅宰臣上尊號第四表太和六年荅中書門下上尊號㑹昌四年荅宰相上尊號第五表大中元年荅百僚上尊號第三表大中三年荅宰相上尊號咸通十年荅上尊號第四表光啓元年荅上尊號答第三表詔尊號批答先天二年不允上尊號用觀上古之主惟稱帝王一字秦漢以來乃兼皇帝朕以薄徳嗣守寳圗乾乾厲惕懼不克堪豈自崇飾以招譴咎雖迫公卿之請終負平生之心所請加尊號甚無謂也依王公請上尊號制蘇頲門下朕聞天授命者為天所予人歸徳者為人之主故崇髙有莫大之尊司牧有非常之號葢承天敘而立人極也我唐丕業冠開闢之初朕以𦕈身託元元之上紹休聖緒欽若昌圗戢多難而極綴旒蕩羣兇而夷觸柱下安區宇上戴君親朝廷以乂家國以治斯又叶天心而從人願也太上皇釋海内之重負官公私之逺情以朕功宣提劔運膺當璧爰奉睿謀摠親庶政日慎一日問安以慶於三朝為子為臣順色靡遑於五讓䖍共若厲寢興是祗賴遐邇宅心戎夷内面奠敦風於寛大思致俗於仁夀而王公卿士獻書草議陳帝王之籙考天人之符廼以鴻名加於菲德然則徇至公之議難以私拒當至誠之請不可詞奪渉川罔濟當宁興懐敬遂禱祈益増寅畏所請上尊號曰開元神武皇帝者宜依有司可㳙日練辰䖍告郊廟詳諸舊典備禮進冊布告天下咸使聞知主者施行先天二年十一月十五日荅朝集使蔣欽緒等上尊號開元聖神文武禮貴正名法無虚美朕以薄德嗣守丕圖常恐不逮安敢自足今羣岳稱引衆善勞加榮號聞之増惕奚可當仁惟聖與文焉得輕議况太宗睿宗俱稱聖謚予末小子安敢同之宜斷來表開元二十六年荅侍中裴光庭等同前初表卿等思致君堯舜欲加號聖文朕内省虚懐安敢當此又太宗睿祖皆有聖謨纂承祖號安敢同稱幸體朕懐宜斷來表荅再請表聖文之名稱號所極卿等致君堯舜亦宜導以冲撝超駕前王彌増夕惕豈朕好譽之心内致自矜之色外形招此假詞以相虚美静思反照撫事求心詩云我心匪石不可轉也幸悉所守即斷來章荅三請表惟聖與文洪名極稱内省虚缺安敢冐承匪石之心已具前荅方與卿等上調元氣下遂蒼生致削浮華化歸敦樸升崇髙之號去滿假之端勉建皇極以迎天祐悉此至言宜斷來表肅宗荅右僕射裴冕上尊號朕以𦕈身敬承明命兩遭狂徒擾亂宗社不寧稟上皇至聖之謀當仗鉞秉旄之任六師一振殘孽無遺上皇厭彼代紛棄兹人事萬邦之重畀付朕躬𫝊授寳符乃加徽號朕再三固讓實増俛恭膺典䇿感慶良深覧卿等來章倍加祗懼依卿等所請至德二年十二月太上皇荅皇帝上尊號誥昊穹垂祐宗社發祥爾徃在齠年素彰岐嶷洎乎問寢日増孝敬吾久勤庶務常奉至真特好冲虚尋將付託爾以華戎鋭士搆定神州功乃格天徳惟邁古是用援兹國寳加夫大號典章𢎞集喜慰盈懐實惟道企前王何必志在讓禮克承丕業以副至公即斷來表太上皇再荅皇帝上尊號誥三朝問禮五讓丕圖用殷后之師載勘牧野同周王之歩來入鎬京美暎縑緗功侔造化命之守器加以鴻名歸景運而有融當樂推而難拒予棲神道要養志真元邦家乂寧自多愉恱太上皇荅皇帝上尊號并讓大聖字號天地肇啟皇王聿興故三王垂御圖之迹典墳著牧人之要爰立邦家其來尚矣予承百王之遐運繼五聖之丕業亭育區宇寵綏蠻夷罔不率從多歴年祀頃者姦臣煽禍中原搆釁汝睿略懸於兩曜鴻勲格於九天終古莫儔上天是賴故加之大聖建以崇名用膺多福何所與讓予夙逹古妙逺寄真宰凝神澹泊足可自怡至於宗廟陵原常展慶矣郊禋豫動固陳儀焉方期仙於上境已遺榮於中域汝欲歸尊於父實在因心爰及朝臣亦同懇願且無為於冲漠又何取於徽名宜悉此懐用全至道耳矣太上皇再荅上尊號并辭大聖字誥古者華胥大庭神農黄帝淳俗歸於太素正真契於無為雖不累煩纓亦崇其稱號吾久尋𤣥㫖逺襲仙宗既欣襄野之遊更樂瑶池之宴倐然自逸豈在尊名爾親率百寮至於再請則蒸蒸之孝實冠於當今而蕩蕩之德獨慙於上古頻覧章表懇志難違汝寳命維新鴻勲允集用加大聖之號克副昊天之心若承命無渝萬國同歡於翼戴儻固辭不巳吾亦有未膺乎冊典勿為名讓宜恊至公朝野之情固多榮幸也太上皇三答上尊號并辭大聖字誥道髙者必𫝊其迹德著者必享其名汝廓净妖氛載安社稷萬靈式叙豈非大乎兩儀交㤗豈非聖乎吾所以親受寳符自題徽號寧惟對於列辟諒已聞於率土渙汗之出理不可收締言之行事必有在將固撝謙之道是違億兆之情天地神祗未以為當宜膺景命即斷來章太上皇允上尊號詔汝孝以奉親明以御宇上從君父之命下狥黎元之請既𢎞茂實爰副洪名千后攸髙百王是式循環章奏嘉慰可知予思每集虚心恒遺照方契真宗之㫖豈云稱號之榮汝就養無違歸尊有恪再獻從龜之吉復當乙巳之辰已備典章當依來請寳應二年上尊號荅詔朕嗣守洪名欽承丕搆克清多難奄甸萬方聖靈在天𤣥德敷祐南面恭已朕何有焉巨猾削平非予之武言念海内生人至艱兵鋒猶虞暴骨未掩日旰忘食宵分疚懐遽稱成功良謂虚美𤣥宫甫畢豈期即及改元寳位至尊何以更言加號宰相之任職在匡弼進勸之詞深所不取荅第二表詔朕内省德薄在於人上紹髙祖太宗之天下承上皇先聖之丕業惕然南面常懼君難豈因樂推亦自光大况山陵甫爾濡露増懐㝢縣凋殘薫風未暢遽行古制虚受鴻名是用繹思未宜獻可五始之義誠在體元三年之道以其無改所陳徽號亦有舊章若更尊崇得非自聖股肱輔弼惟欲致君空動誠請之詞未副昌言之理荅第三表詔年叶五紀成嵗以授時君臨萬邦向明而聴政體元不潤其色處實不為其賔朕若昔大猷允懐㳟已務於簡易豈曰崇髙常深負荷之憂敢忘祖宗之烈卿等搃括羣議昭升舊章周爰典籍之文鈎校天人之理對揚耿命進勸皇圖請踰年而改元益正位以加號敢廢春秋之義用諧啓沃之心敬允乃誠良多慙德批百寮請復尊號表三省來章彌用兢惕再崇大號何以當之前者示懐盖非冲讓尚勞敦請豈所宜然卿等博學古今列於朝右思𢎞獻替共致太和豈以虚名重予不德再三循省増恧於懐想爾深𠂻勿更陳請貞元六年批荅宰臣請上尊號伏以髙祖太宗接千載之統垂無疆之休太上皇承九聖之烈傳莫大之慶嗣徳纉業允文允武𢎞帝堯之欽明宗𤣥元之清净付朕天下頤神保和至道光於唐虞至仁合於天地卿等䖍述休德祗獻鴻名循省再三允符朕意朕獲守寳位丕承睿訓雖䖍恭寅畏不敢怠遑而澤未洽於羣生理未臻於皇極遽言徽號何以當之雖嘉乃誠難遂來請其上獻太上皇尊號宜依所奏凡百卿士當體至懐批荅宰臣請再冊尊號第三表朕獲承丕緒以撫萬邦照臨無日月之明膏潤無江漢之浸常恐吉蠲雖備未享於天心教道雖勤未諧於人欲諒慙匪德敢議鴻名而宰臣羣公宗后庶尹上引祖宗之丕矩下述黎獻之誠心誡子以處㤗而思勞告予以愛名而務實陳以懇迫至於再三先典不可以固違羣情不可以屢阻與其守讓而繁飾不若納規而徇公遽抑至懐勉從來請顧惟不稱兢惕殊深元和二年十二月二十二日荅南省請上尊號表朕纂嗣洪業託於王公之上常恐渉道猶淺燭理未明夙夜祗畏罔敢寧逸至於法天象以垂制順人心而平亂立刑辟而不峻興禮教而不倦簡黜澆薄延納忠直思濟於道保合太和今寰海削平載弢弓矢皆賴輔弼之臣盡規於朝廟將帥之畧宣力於邦家循省表章請崇徽號武功文德揚美於予用愧於懐何以及此尚以昆夷未服邊鄙猶虞不敢允從宜即斷表元和十四年荅宰臣請冊尊號第三表昔我祖宗每崇徽號皆以道侔天地澤被生靈故請之不疑而受之不愧是謂典禮鴻光赫然朕以寡昧祗承寳位䖍恭惕厲不敢荒寧常懼禮化未敷非以自尊為意若蕩清冦孽修舉政刑此乃中外英賢叶心所致復於前疏亦已言之卿等善則稱君過陳功德表章三至益愧於懐豈大體之必然何懇言之不已沉吟終日未果允從荅第四表建崇名加大號必自盛德而因全功茍非其時難以擬議朕紹十聖之統緒遵百代之憲章冕而事天憂勤不暇乃者忠臣敦化良將䇿勲有冦難而必蕩必平用兵戈而不蝗不旱此乃多士叶力成此小康豈予一人獨運而致卿等四陳章疏每瀝肺肝表士庶之誠心徴朝廷之故實願餙虚美皆為過談諭而復來勢不可止雖重煩典禮殊不自安而深念奏陳亦當從允勉依所請良用愧懐元和十四年六月七日批宰臣請上尊號表朕以菲徳初承大寳嚴恭夙夜修已臨人燭理未明舉政多闕雖克展郊禋之禮或未稱瑞應之符而俗尚凋訛人未康乂所患德之未立不患名之不尊至於北狄求和西戎即叙南越投戈而率化東夷繼踵而來王不候七旬之期自銷積紀之弊此皆祖宗垂祐公卿叶賛之力也朕何有焉遽議虚名深愧未稱卿等志思將順誠切忠君宜體至懐勿徇虚美長慶元年四月批宰臣請上尊號第二表元稹朕聞天職生植聖職教化天職舉則四時行聖職修則萬方理然而天不以行四時而為德故蕩蕩無名聖不以理萬物而為功故謙謙不宰顧朕小子獲承丕圖上賴祖宗之靈下託股肱之力先定鎮冀次來幽燕皆吾日月之所照臨車書之所轍迹失之則有以自愧得之則何足以自多况今四方雖清物力方困六戎雖伏邊備尚勞百吏雖存官守多曠萬目雖設紀律未張有此四者不敢遑寧思與卿等夙夜俾乂卿宜為我提振大法修明政經讋竄戎狄康阜黎庶四者既理名焉用哉朕方以臯夔之務委卿卿宜以堯舜之事教朕驟加徽號深恥近名循省表章難徇來請長慶元年四月批宰臣請上尊號第三表元稹昔齊桓議封禪管仲驟諌其未宜晉武平江東何曽深惟其逺馭彼二臣者居安思危之志明有犯無隠之誠切也况朕寡德謬膺昌期賴先帝削平之威䝉列聖寖漬之澤聿來燕翼克静華夷既無德而有威實以祥而為懼卿所宜朝夕納誨警子荒寧雖休勿休日慎一日而乃過為溢美頻上鴻名諒多丹赤之誠殊非藥石之愛汝為予礪為朕揣摩汝為予舟為朕康濟强我懿號不若致我為有道之君加我虚尊不若致我於無過之地宜罷來請用副乃懐批宰臣請上尊號第四表元稹朕以元月正日祗見於九廟對越於上𤣥千官在前萬乗居後覩聲名文物之盛望城社宫闕之尊尚念髙祖太宗艱難於營制德宗憲宗殷勤於纉復懼不克荷以羞前人寅畏嚴恭或兾無過而燕趙底定戎獯和寧實惟列聖之休安敢自大其德左右輔弼庶尹師長猥以鴻名願加薄德三詔執事抑而未行物議逾堅予𠂻未信四陳章表備列古今且曰告䖍之時寧忘繼志問安之下胡不畏心事有切於顯榮理難從於固執於戯允恭克讓既見奪於羣情克已為仁庶自勤於三省勉依來奏深用愧懐長慶元年五月某日荅宰臣上尊號第四表前上三章皆有報㫖推本帝王之道研究天人之際可謂盡矣能無諒哉朕辭愈堅來奏愈懇考蓍龜之意酌卿士之心義貴從人事難狥志然體未濟之象警慎將然復大畜之文模法往行虞舜勤民以恭巳文王事主而小心自厲則鍳乎殷湯盤銘持盈則戒乎周廟欹器還珠却馬使無愧於前賢菲食罷䑓兾有示於來世率是道也庶無悔乎勉遂羣心祗循祖訓敬允誠請愧惕良深寳厯元年四月三日荅中書門下上尊號朕以菲德纂承睿圖業業乾乾懼不克荷是用發天地無私之道以成化象日月無私之照以燭幽慕唐堯虞舜之為君繼貞觀開元之致理朕以夕惕宵興不遑暇逸兾將昭復聖哲保綏華夷至於鴻名尤不輕議尚未審度豈可屬心卿等台鉉重臣翼宣元化宜匡朕志臻於緝熈今隂雪傷和尚資寛宥乃以文武至德加於朕躬省視奏章難從虚美宜斷來表深諒予懐大和六年正月七日批荅宰臣上尊號第五表前覧四表報皆一詞可謂君臣之義至矣天人之理盡矣朕辭益固卿請益堅誠獻可之不移奈虚美而難處山雖崇而降地易象明言海雖大而下川𤣥元深㫖文王以小心事帝虞舜以恭已臨民盤銘取勵於殷湯欹器戒盈於周廟皆以畏惕而自警不聞滿足而虚尊卿等以塞北平戎山東殄冦韜兵偃武鎛㦸為農郊天之年瑞雪清路冊號之夏嘉雨滅災毁摩足壊法之刑蕩并冦亂常之暴此皆上𤣥厭禍宗社儲休至於刑政克明文武具舉年登適臻其氣順俗阜實自於官修内承宰輔之謀外盡藩侯之力余雖垂拱且有何功况増鴻徽尤非稱德既頻推美何以當之然體貴從人事難狥志祗循前訓允遂羣情殊不自安諒非縱欲勉爾所請深用愧懐㑹昌四年十月七日荅百僚請加尊號第三表朕獲承丕緒奄有萬方憂物之心常懐惕厲荷天之力漸至敉寜此中外元僚文武庶政咸有一德以匡冲人而卿等猥以鴻名加於菲薄拜章瀝懇至於再三伏念自列聖以來何甞無今日之請然率不能讓者上慰宗廟之靈下迫羣臣之願粤予小子豈敢久勞卿士之心哉敬允乃誠良深自愧所乞宜依大中元年十月荅宰臣請御丹鳯樓上尊號勅㫖没陷河隍百有餘嵗中原封界咫尺戎疆累聖含容久勞征戍伏思元和中將攄宿憤常欲經營屬誅鋤叛臣未暇收復今則恭行先志克就前功不逺徴兵不勞財力二州之外兼得七闗又取維州粗成邊業尚以息民解甲未收山外諸州且以肆𤯝申恩所以頒示天下其御樓依所乞大中三年十一月二十五日荅宰臣曺確等請加尊號第四表詔夫功合天者稱皇德合地者稱帝皇帝二者朕已享之况孤寡不榖之名靡遵於𤣥祖明皇孝德之號久慕於冲人業業兢兢惟懼不稱南蠻未讋師旅尤屯東冦雖平瘡痍尚大方將罪已曷敢矜功卿等修德鋭於臯陶恥君不如堯舜鋪陳故事増飾洪名謙恭愈堅表章疊至對揚之際忠懇彌彰弘我以奉先勉我以從衆亦念乙酉之嵗堅請不逾今復固違似矜小讓名實不副朕當不敢荒寧始終相成卿等勤於獻替勉爾來請深用愧懐咸通十年十月十日荅宰臣蕭遘等上尊號朕猥以寡徳丕承耿光宵旰雖勤兵戈繼作困生靈於豺豕委宫闕於榛蕪罪已則深噬臍何及尚賴天地悔禍祖宗降靈内之則公卿大臣外之則方伯元老上憑眷祐下憫蒸黎允叶一心克濟四海廓妖氛於㝢縣剗戎壘於郊圻雖復舊都匪遑髙枕嗚呼大恥才雪羣生未蘇文武典章墜無半在威權法制行亦幾何土疆徒繫於地官征賦罕歸於國帑肅恭常祀尤在正辭昭格上𤣥寧容溢美卿等同匡艱運當識深𠂻加以虚名斯為不急歩驟錙銖之際自有至公照臨顯晦之間寧資外奬當勤納誨宜斷來章光啟元年五月某日荅第三表詔朕以寡昧嗣守丕圖思臻太和不敢寧處干戈載戢稼穡少登禮樂中興聲教遂被是用郊上𤣥以報本解宻網以緩刑豈非九廟降靈羣賢叶力共賛薄德致兹少康永惟𦕈躬實懼虚餙卿等上稽天意下採人謡旁訪典謨俾奉明訓以為天地之道既不讓於强名皇王之心宜屈已而從物累貢殷勤至於再四雖鑿井耕田未及勲華之理而樂推欣服難違億兆之情既狥衆詞終疑溢美勉爾來請深用愧懐唐大詔令集巻六
