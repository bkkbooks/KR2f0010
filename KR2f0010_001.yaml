body:
  text: 唐大詔令集巻一宋宋敏求編帝王即位冊文太宗即位册文肅宗即位冊文徳宗即位冊文順宗即位冊文憲宗即位冊文穆宗即位冊文敬宗即位冊文文宗即位冊文宣宗即位冊文懿宗即位冊文哀宗即位冊文即位冊文太宗即位冊文維武徳九年嵗次丙戌八月丙辰朔九日甲子云云夫天生蒸民樹以司牧三靈輔徳百姓與能粤自夏殷𫝊業胤祚軌物長世罔不由兹朕祗膺靈命肇開寳厯聲教所覃無思不服然而萬幾填委九區輻凑明發不寐考極觀書聴政勞神經謀損慮深思閒曠釋兹重負咨爾聰明神武實天生徳君人之量爰備夙成王業初基雲雷伊始英謀獨斷秘策潛申及拓定闗隴澄清河洛北通𤣥塞東静青丘宏圖遐舉元功克茂氛霧廓清鯨鯢斯静澤霑方外聲暢無垠總統機衡百工以乂敷𢎞徳化四門允穆謳歌所屬宇内宅心象緯告徴靈命斯在朕是用上稽蒼昊俯順黔黎推而弗居永垂顯號今𫝊皇帝位於爾躬命司空魏國公寂尚書左僕射宋國公瑀齎璽綬授爾其纂成洪緒對揚休命式隆寳祚以康四海肅宗即位冊文維天寳十五載嵗次丙申七月癸丑朔十二日甲子皇帝若曰咨爾元子某維天為大惟人君則之順乃徳故舜禹揖讓而履皇極咈乃道故丹朱商均不能保鴻業是以咨有恵迪而夏嗣焉隋有亂紀而唐受焉五聖之御極皆勤儉兢業日慎一日故能享祚長久垂慶無窮洎予六葉沗位四紀厭于勤倦緬慕汾陽當保静怡神思我烈祖𤣥元之道是用命爾元子某當位嗣統於戲爾有忠孝之誠拯於君父爾有友愛之義信于兄弟爾有仁恕之行通于神明爾有戡難之才彰於兆庶予懋乃懿績嘉乃神武天之厯數在爾躬汝惟推誠禍亂將兾爾而能清汝惟從諌社稷將兾爾而復寜佞言為疵直言惟師任賢勿貳去邪勿疑民非后何戴后非賢罔與守邦欽哉慎乃有位無忝我祖宗之丕烈徳宗即位冊文維大厯十四年嵗次已未五月辛丑朔二十三日癸亥皇帝若曰於戲昊天有命皇王受之立嫡以賢春秋之義𫝊之於子漢氏成規宗廟社稷實賴其慶咨爾皇太子适稟天地之仁含日月之耀道光三善孝著十倫頃者國步多艱委以戎律理軍靖難保大定功克復帝圖廓清妖孽既表建侯之䇿俾承守器之重仁孝之徳夙夜惟寅朕天命有終弗興弗寤非至公無以主天下非至徳無以臨四海是用命汝陟於元后嗣守皇業上繼宗祧下安羣望其命門下侍郎同中書門下平章事常衮奉冊即皇帝位於戲宜遵太宗之法度肅宗之儉約任賢勿貳去邪勿疑與衆守邦祇敬予訓順宗即位冊文維貞元二十一年嵗次乙酉正月辛未朔二十三日癸巳皇帝若曰於戲天下之大實惟重器祖宗之業允屬元良咨爾皇太子誦睿哲温恭寛仁慈恵文武之道稟自生知孝友之誠發於天性自膺上嗣毓徳春闈恪慎于厥躬祇勤於大訓必能誕敷至化安勤庶邦朕寢疾彌留弗興弗寤是用命爾繼統俾紹前烈宜陟元后永綏兆人其命中書侍郎同中書門下平章事髙郢奉冊即皇帝位爾惟奉若天道以康四海懋建皇極以熈庶工無忝我髙祖太宗之休烈憲宗即位冊文維永貞元年嵗次乙酉八月丁酉朔九日乙巳太上皇若曰咨爾皇太子純惟皇上帝降休於我家用集大命克綏厥猷惟后祇率大典兹惟艱哉朕承累聖休徳膺守邦之重不蒙天佑降疾在躬上不能昭事郊丘祇見烈祖下不能臨視庻政保綏兆人是用命爾當位嗣統宜陟元后代予憂勤今遣使檢校司徙平章事杜佑副使門下侍郎平章事杜黄裳持節冊命於戲爾有光大之徳敷於萬邦爾有仁孝之誠型于九族慈和寛簡克饗天心𤣥符不可以固違明命不可以不畏爾惟察納忠直子恵困窮咨於正言慎乃儉徳臨庶官以信安庶獄以情允執厥中無忝我祖宗之丕訓穆宗即位冊文維元和十五年嵗次庚子閏正月甲辰朔三日丙午皇帝若曰於戲上天降鑒保佑於我國家十聖丕承光宅四海鴻休大業以逮予一人嚴恭祇畏懼弗克荷賴宗社垂慶生靈乂安今朕寢疾彌留弗興弗寤神器所付屬之元良咨爾皇太子恒孝友聰明温文􅌖哲自主七鬯日新厥徳必能纘予勤志綏靖萬邦是用命爾陟于元后宜令中書門下侍郎平章事令狐楚奉冊即皇帝位懋建皇極無忝我祖宗之休烈敬宗即位冊文維長慶四年嵗次甲辰正月辛亥朔二十六日丙子皇帝若曰惟天輔唐徳我祖宗克答天意邁徳勤道紹休大業洎予一人嗣守四海祇事天地愛育萬𩔖罔或怠惰於兹五年今寢疾彌留不興不寤獲以重器付之元良咨爾皇太子湛列祖儲慶自天生徳孝友慈恵温良敬恭必能輯寧家邦輝光緒業是用命爾陟於元后宜令中書侍郎平章事牛僧孺奉冊即皇帝位爾有廣厚之量可以奉天地爾有孝敬之志可以事神祗和恵可以撫萬邦仁愛可以親九族任賢尚徳逺佞去邪爾惟欽承無忝我祖宗之休烈文宗即位冊文維寳厯二年嵗次丙午十二月甲午朔十二日乙巳太皇太后若曰大行皇帝􅌖哲英靈對天明命方夏底績夷蠻貢庭罔有不端大康有截宜荷九廟之重永享億年之禄豈虞姦妖竊發矯専神器蠱惑中外扇誘羣萌駭動神人釁深梟獍咨爾江王某聰哲孕粹清明敏和智筭機開𤣥謀電發躬率義勇大清兇徒且膺當璧之符爰攄枕戈之憤既殱巨害當享豐福是用命爾陟於元后宜令司空平章事裴度奉冊即皇帝位永惟髙祖太宗之剪定隋亂𤣥宗之寢漬利澤憲宗之竪㧞蠧孽艱難險阻朂乃負荷小心以事上帝儉徳以型家邦懋於令聞持久如始敬之哉宣宗即位冊文維㑹昌六年嵗次丙寅三月壬寅朔二十六日丁邜皇帝若曰惟𤣥穹降祚啟我唐運奕葉重暉赫羲纂承列聖顧瞻敷佑冲昧獲承大寳君臨兆人懼不能任夙夜競厲祇事九廟於今七年實賴宗社之靈台衮之輔忠良畢力内外協心北剪山戎東殱孽䜿不失𫝊付之業方期仁夀之寧屬頤護或虧寒暑致恙禱神餌藥有加無瘳乃親賢而委家國皇太叔權勾當軍國政事温慈􅌖哲孝友端明藴東平為善之心尚河間好學之志必能燾煦天下穆清大中於戲惟敬惟和克敏克寛斥去竒邪親任仁人是用終陟元后宜令某官奉冊即皇帝位欽若天道緝熈帝圖懋哉敬哉懿宗即位冊文維大中十三年嵗次己卯八月甲申朔十三日丙申皇帝若曰眷彼羣生必有司牧纘承丕構允屬元良故命嗣惟賢立賢則長夏禹惟公於聖子漢文終守其成規茲乃萬國攸同百王不易之道也朕以菲薄獲奉宗祧十有四年未臻至理惟天示譴降疚于躬藥石無功彌留斯迫厯數云在天命有歸咨爾皇太子朕之元子㓜有聖質孝敬温文𢎞博慎敏稟天地之仁闕含日月之貞明承訓嚮方秉禮抱義是用命爾陟於元后宜令攝中書令中書侍郎兼禮部尚書平章事蕭朗奉冊即皇帝位邦家以寜統緒以正惟嚴恭祗畏可以事天地惟寛明睿哲可以御臣下惟慈恵欽和可以撫黎庶惟道罔咈惟賢必親實爾生知豈竢訓誨著於典冊無事文詞懋昭耿光紹休前烈於戲敬之於戲戒之哀宗即位冊文維天祐元年嵗次甲子八月壬辰朔十五日丙申皇后若曰髙祖太宗撥亂返正奄有天下垂三百年重熈累聖莫不功光祖業克紹丕圖予遭家不造變起宫奚雖號慟期至於終天而負荷實先於立嗣咨爾皇太子監國事天資岐嶷神授英明孝比東平之蒼學富陳留之植恭謙守政和順稱仁友愛聞於弟兄令譽播於區宇比則隆元帥深暢戎機今乃位儲宫益歸羣望是用爰循舊典上纂鴻基既允集於天下當欽承於宗社宜即皇帝位於戲萬幾不可以久曠四海不可以乏君膺紹寳圖光踐皇阼節儉以勵戎夏文徳以戢干戈無怠無荒克慈克悌永保厥躬用揚祖宗之丕績休命可不敬哉唐大詔令集巻一
