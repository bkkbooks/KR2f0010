body:
  text: 唐大詔令集卷一百四宋宋敏求編政事按察下處分朝集使敕五道遣陸象先等依前按察制遣王志愔等各巡察本管內制置使河南河北道觀察利害詔誡勵京畿縣令敕遣御史大夫王晙等巡按諸道敕遣使黜陟諸道敕席建侯等巡行諸道敕黜陟楊懋等詔察訪刺史縣令詔遣諸道黜陟使敕褒勸甄奬陷賊守節官詔録用鄧州歸順官詔按察下處分朝集使敕五道敕朝集使等𢎞風善俗寄於良吏求瘼恤隱職在親人朕並建藩牧擇其師長欽若古訓俾人用康而教化或未洽黎氓或未寧攘竊者時有犯禁逋亡者罕聞復業豈朕教諭之道尚闕而牧宰之訓未明歟永念於此不忘旰食卿等咸承朝寄分掌外臺共理之道期於康濟至若率身以正馭衆以仁而下不化者未之有也卿等還州宜禁侵漁絶浮惰惸獨鰥寡尤資惠育盜賊妖訛特宜禁斷其征鎮人家每須優賞科斂之事必在均平頃者水災荐及河朔思無不至憂彼元元發倉廪漕江淮以賑之蠲租稅停征役以安之今屬春陽布和農事方起慮有乏絶致防農桑雖已遣使安撫或恐事未周賑如有不支濟者即更量事賑給諸道有損之處亦宜準此朕不欲一物失所衆情不遂納羣生於仁壽躋大化於升平卿等各宜恭守朝章宣布朕意雖萬方有罪莫忘在豫而三載考績須徵行事安人稱職可不勉歟並宜好去開元十六年十二月二十七日又敕朝集使等朕恭已承天守文繼位布一心於兆庶明四目於萬方恆恐道或未周物不遂性傍求俊乂共理黎元於兹羣辟寧不我副方今政要略有四端衣食本於農桑禮義興於學校流亡出於不足爭訟由於無恥先王務其三時將以厚生也修其教化將以惇俗也有國有家同知此義不患不知患在不行耳且長吏敷化政教屢移在官當為國理人各揚其職不當冒榮干進茍利其身澆俗不可不革淳風不可不長近令刺史在任四考方遷實欲始終其情黜陟斯繫必若縣得良宰萬户息肩州有賢牧千里解帶仁政不逺行之則是皆能勵節朕復何憂且如浮逃客户所在安輯征鎮人家每事優賞倉廪惟實役賦惟均鰥寡撫存盜賊禁止郵驛無弊姦訛不生念兹八事朕常屬想嗟爾庶尹可不用心卿等還州遞相勸勉遵此王度恤彼下人敬順天常無違月令夫星列躔次土分區域休咎之徵惟人所感善必知主惡亦有由每至嵗成當加賞罰宜知朕意並即好去開元十二年三月十三日又敕朕臨御天下二十餘載每思至理實仗羣賢何常不敷求循良共底於道隼旟熊式光寵有加甘露鳳凰寂寞無紀豈朕之不德感致所然抑為庶尹所能已極於此是用寤寐增歎殷憂永懷更為後圖或未晚也且羣吏之政繫一人之能泉源既清蓬麻自植為長吏者可不勉之卿等至州遞相慰誨以副共理之意用光分命之委且如河南江左爰及山南嵗小不登人亦菜色皆由好逐朝夕之利而無水旱之儲卒遇凶年莫非艱食此則致乖慮始人無勸分欲免流庸不可得也夫萌者宴也豈能自謀政者正也當矯其弊所由長吏可不勉歟相其物土之宜務以耕桑之本時無妨奪吏不侵漁既富而教奚畏不理至若征鎮役重孤弱命窮特須哀矜以遂仁恕其餘常科所禁自可舉而行之豈煩縷説方振綱領乃者庚子制書已明理要徐思其意勿謂空言若風教未𢎞議能蓋闕競入朝計兾幸遷除勿曰不知將自誣也方牧參佐各宜思之朕所待賢能不惜官秩唯聲實是與唯理治是憑古者刺史入為三公出宰百里豈有恨也何以汲汲不安於理郡哉誠須勵精以俟後命並即好去開元二十一年閏正月一日又敕朕受命子人義兼君父思致可封之地無忘終食之間自有萬邦幾將二紀而刑政或殊風俗尚澆行所望而未至顧本懷而自失雖朕之不德在豫之過有歸而卿等共理患已之誠宜剖至如典州當侯伯之尊宰邑敵子男之寵好進之輩且不務於政成欲速之心獨未思於義取朕所以敷戒敕以見意增祿秩以勸能何嘗有公方清白者不升道理循良者不用若聲績未著黎庶未康牧守來朝而輒遷參佐踰年而競入此獨為人資地耳豈是責成之意耶如故一切還州將矯弊也卿等至彼明諭朕意知不以中外為隔以億兆為憂頃以天下浮逃先有處分所在招附便入差科輒相容隱亦令糾告如聞長吏不甚存心致令流庸更滋前弊未革自昔行法即有姦生逃者租庸類多乾沒長吏明察豈其然乎每年别須申省比類多少以為殿最又獄訟所寄人命是懸近恐妨農特原輕繫俾加閲實仍多幽枉都邑尚爾郡縣可知各已貶官用懲主吏自今以後繫囚非應申覆知證在逺而就中稍重者不得過十日次不得五日其餘輕科量宜決遣不得因此復加楚毒具申外臺省長主之至如禮義不興耕桑不勸孤寡不恤徭役不均不肅吏人不消盜賊不懲侵暴不絶姦訛有一於此是誰之過其遊僧幻道誑誘愚人窮其根萌時須禁絶諸軍征鎮每遣優矜如聞比來未免辛苦時其撫恤使得安存今農鳸戒期耕夫在野事非急切不得追呼卿等至州一一宣示當遣察問勿不用心即宜好去開元二十一年四月一日又敕十道及朝集使等信賞以勸能必罰以懲惡謂之二柄所以一人朕念彼黎元比遭水旱而賦役不等浮惰相仍且無緝寧日用凋弊所以重擇長吏兼命使臣寵數所加亦云不薄智能自效豈未是圖政之殊尤永用虛佇且郡縣所理黎庶是切善為政者防於未萌均其有無省其徭役事事有預早為之所雖遭嵗惡固亦人安況在豐年不能招輯遂使户多虛挂人苦均攤務欲削除更成詭詐若已逃者未必即得則為姦者因此便除一啓其端豈勝其弊向若州有明牧縣有良宰而精心緝理豈若是乎卿等至州縣將朕此意優柔慰勉各令用心招撫流庸綴居本業使免捕逃之費是為救弊之先此不存心更知何理且刺史縣令專任不輕自有非違將何率勵至於親識遊客憑恃威權囑託下寮搖動獄訟或差遣不當致令損失或處置有乖便至煩擾兼有不肅諸吏惟知自謹一身姦豪盜賊無所畏懼是虛荷榮寵徒資祿秩此而可容孰為尸曠並委諸道條察具狀奏聞今甘澤以時耕桑為重不急之務先已勒停宜更申明勿妨春事諸處百姓貧空者多雖有壠畝或無牛力勸率相助令其有秋所繫囚徒速宜決斷無令寃滯致有妨奪鰥寡惸獨征鎮之家倍須存撫勿有科喚朕所懸爵秩惟待賢能若政舉一州惠施一縣使者亷問必以狀聞既能副於朕懷亦當待以不次誠可復也豈食言哉並宜好去開元二十一年遣陸象先等依前按察制黃門古者協和萬邦疇咨四嶽柔逺能邇明目達聰以於變黎人也自朴散醇醨割方曲直失於德者格之以禮失於禮者助之以刑故懼文網而畏簡書必振其綱而又操其柄庶乎政之要也間嵗天下諸州嶽牧先充本道按察誠以今之刺舉昔之連率蓋欲為吏之黜陟審人之愁苦中念作姦犯科獲罪相次棄材或由於拙匠採葑不遺於下體由是申命有司咸多敘用至於按察暫令休罷夫泉有魚矣雖見則不祥林有獸焉而為之不採與其存而勿用孰若狎以玩之俾乂於時復修其政銀青光祿大夫益州大都督府長史姚俊處置兵馬使上柱國兖國公陸象先等早藴宏量深甄大體清能勵俗仁以敦風必將檢御權豪昭明淑慝宜興化以樹善佇責成而求當可依前件餘各如故一事以上並準舊例處分本道所隸之州有偏逺不穩便者仍令所司量宜分割永為定額訖奏聞主者施行開元二年閏二月七日遣王志愔等各巡察本管內制黃門上天降禍大行太上皇厭代升遐俾豫一人煢煢在疚攀號荼毒觸向摧隕百辟卿士等上遵遺詔下徇羣心寰區任殷社稷務重資於聽斷不可暫缺遂力哀迷甫從勸請恭惟顧託之旨思致和平之化雖在荒瘁敢忘負荷是用泣血撫膺執喪視事夫后王者代天理物師長者助朕理人天之所以茂育人之所以蕃庶蓋遂其性而安其業也朕每置旌告善仄席翹賢恐閭閻有愁苦之聲草澤無明􅏡之主吏或慢法官或非才因之致理且未為得其何以亷敗政恤寃刑問惸嫠招茂異寬賦斂節更徭使天下為無為事無事也頃分連率則曰使臣將求人瘼克宣朕命諸道按察使揚州長史王志愔廣州都督宋璟蒲州刺史程行諶汴州刺史倪若水魏州刺史楊茂謙靈州都督強循潤州刺史李濬荆州刺史任昭理秦州都督張嘉貞洪州都督楊虛受梁州都督張守潔並邁迹垂憲偉才通識有其直方無所回避宜令各巡本管內官人有清介獨立可以標映士林或文理兼優可以潤益邦政者百姓中有文儒異等道極專門或武力超倫聲侔敵國者並精訪擇具以名聞其官人有老弱及久病妨於政理并才用劣下全不稱職者上佐以下委使人便停務其官緊要者便簡清勤人權攝其京官及畿內州縣委御史大夫及吏部長官準此詳察録奏諸道僻逺州及嶺南道委使人量差判官分道巡按其天下囚徒慮有寃滯宜令大理及本巡所在理滯流罪以下非犯名教及官典取受并聽減一等收贖即是非理均事可疑者并杖以下罪並宜放免緣山陵所科夫匠等有父母年老家無中男以上者容其侍養不須差遣其河南河北遭蝗蟲州十分損二以上者差科雜役量事矜放百姓間有不穩便事委按察使與本州長官商度隨事處分奏聞布告遐邇令知朕意主者施行開元四年七月六日遣使河北河南道觀察利害詔伊昔明王奉若天道所寶惟穀所使惟賢故能稼穡勸分興利除害朕以薄德纂承洪緒政期克已誠不動天頃嵗河南河北諸州蝗蟲為患雖當道當遣使驅除瘞埋恐今仍生育天戒若此朕甚懼焉罪實在豫殃豈移嵗但牧宰之任朝廷所委苟得良材式敷惠訓古有壽張飛逝中牟不入者斯其效也刺史縣令等當各竭乃心用攘厥患方考休咎大明黜陟惟爾凡百可不勉歟宜令户部郎中蔡秦客往河北道試御史崔希喬往河南道觀察百姓間利害便與州縣等籌度隨事處置還日奏聞開元五年二月誡勵京畿縣令敕諸縣令等親百姓之官莫先於邑宰成一年之事特要於春時卿列在王畿各知人務宜用心處置以副朕懷農功不可奪蠶事須勿擾獄市任簡典政宜肅徭賦須平豪強勿恣凡著賢能必無曠職宜即好去開元八年七月遣御史大夫王晙等巡按諸道制苛慝不作人斯無怨寬猛相濟政是以和故周禮以官刑糾邦理以官敘正羣吏允迪前烈式惟舊章且夫寰宇至大不可以周覽黎氓至殷不可以獨化熙我庶政實惟具寮茍非其才難以稱理是以夙夜不遑晏寧開元之初分道遣使按部糾摘姦犯頗聞懲息以其事久則煩尋亦從其停廢綿以嵗月浸成寬弛今聞在外官寮多違憲法牧守則寄任滋重令長則祿秩且優亟聞侵竊屢有章奏雖賜金為惠未愧張武之心還珠表德罕見孟嘗之政豈敦諭之意未孚於就列將貞高之節有謝於前修永懷於此良用沈歎且政寬而慢法弊則通弛而張之其可致理御史大夫王晙等並識通政要位以才達茂其聲實𢎞此憲章宜分命巡按以時糾察巡內有長吏貪擾獄訟寃抑暗懦尸祿苛虐在官即仰隨事按舉所犯狀並推鞫準格斷覆訖聞奏仍便覆囚夫牧宰之職教道是先録曹之任綱紀斯在其有政理殊尤清直獨立者咸以名薦餘官有清白著稱及諸色不善各别為科目同狀奏聞其尋常平狀並不須通俾夫善取其尤罰無所濫疏而不漏察不為苛必將正其源流𢎞彼綱目不可總此煩碎擾其吏人應是州縣當務事非損益者使人更不干預其百姓有不支濟應須處置有不便於人須釐革者與州縣商量處分訖奏聞宜體虛佇之懷以光澄清之舉開元八年八月遣使黜陟諸道敕三載考績以鑒吏能八使觀風因求人瘼兹事體大致理之由朕受命昊穹臨御寰夏慮一物有所未安遍萬户無勞軫念而宇宙之間官吏至多倘有政失其宜即萬人受弊崔翹等或文學見稱或清白流譽通於理要秉是公心俾爾澄清式當委任至如黜陟之道國之所務茍有不當將何勸人頃年使臣例皆通狀其盡善者以多有請託求選課之資不善者以凡碎見輕貴奏課之數若此銜命豈副虛懷卿等所到之州宜宣朕意其百姓間事或有須釐革者宜與所管商量處置回日聞奏其官吏中貪冒贓私及犯名教或衰老疾病或無政理者刺史以下宜停務奏聞其守職公清為政尤異事堪激勸逺近知者具以名聞其諸道有遭損之人應須賑給先頻有處分猶慮凋弊豈忘矜恤亦宜審與州縣商量務令周濟又聞河堤穿決使有漂流諒由州縣寬疏不時備塞亦便檢行處置勿使更然其天下道學固已有置者并鄉學者等此並切於生人比來未復若為教導各宜敦勸使有成益其征鎮之家或有單貧老弱不自存濟者宜令所司倍加優賞其浮寄逃户等亦頻處分頃來招攜未著長䇿又江淮之間有深居山洞多不屬州縣商量處置一時録奏卿等既當巡按委寄非輕宜勉爾良圖以副朝選無或致有回避不竭公忠朕之責深各宜自效開元二十九年十月席建侯等巡行諸道敕敕黜幽陟明所以察風俗求瘼恤隱所以慰黎蒸不有其人孰可將命禮部尚書席建侯等亮直清節經通大才多識前言備嫻時政或久應任使常參八使之列或夙蘊公忠必副四方之委永懷兆庶用寄澄清建侯巡河北道鎮巡京畿關內及河東道隱之巡東畿及河南道見素巡山南東江南黔中嶺南等道麟巡河西隴西磧西等道翹巡劍南及山南西道光譽巡淮南及江南東道其百姓之間及官吏之輩如事或未該須有釐革者仍委量事處分回日奏聞其嶺南黔中磧西途路遙逺若使臣一一自到慮有稽遲各精擇判官準舊例分往天寶五年正月黜陟楊懋等詔朕憂彼黎元寄之牧宰常慮受任非當撫御乖方所以設舉親之科廣得賢之路爰初詣闕亦既明試以言及乎從政必欲深考其實懸之賞罰要以始終近日分遣使臣因之巡察善惡之驗事足可明懲勸之端言斯可復其楊懋等七人黜陟使並奏請狀宜與改轉其所舉六品以下付所司準此處分五品以上各賜一上下考李連等七人既奏善狀至選日各減三兩選仍稍優與處分所舉主並賜一中上考趙憕等六人俱犯贓私罪法科斷其舉主各量犯者罪狀輕重貶黜仍宣示中外咸使聞知天寶五年十月察訪刺史縣令詔朕聞效官者必量力而受任致理者亦擇才而簡能況風化之源本資於長吏升降之義用明於朝典古之建方國親諸侯蓋以撫綏黎人宣布至化則今之令長古稱子男矜孤恤貧均徭省賦皆是職也朕以薄德忝膺寶位屬殘孽猶聚戎軍未戢雖憂國之計且務於濟時而恤人之心每深於惠物將求厚俗必在審官至於刺史治中皆制命所授辨其才術蓋在朝廷先令中書門下精加訪擇務得其良如非理人之才即並量宜改授且諸縣令員數應多如聞處理之間亷平者少或使司所奏以功見稱或主司所擬循資而授倘乖任使空忝親人或有案牘之間曽未嫻於令式征賦之際或委任於胥徒由是吏轉生姦遂為蠧政人不堪命流而失業興言及此良用憮然夫易柱以調絃聲之和也革弊而從善政之體也漢宣帝云與我共理天下者其惟良二千石乎固知方嶽之任足以委黜陟之權矣況諸道節度皆備職防戎政在理兵豈遑亷問必令郎官御史分命巡察則乘驛暫往難於委寄諒無益於澄清反有增於勞擾其天下縣令各仰本州府長官審加詳擇如有衰髦暗弱或貪財縱暴不嫻時政為害於人並具名録奏即與改替其才職相當者並依舊奏定以後有不稱者所由官量加殿黜庶理人之職無或謬焉又入仕之流本期展用且無事實豈可徒勞今員外之官所在甚衆既不釐務空效驅馳將適鄉閭復拘職守念其旅寓良可優矜應州縣見任員外郎官並任其所適計考秩滿後各與成資仍於本色內減一兩選與留其先緣罪纍貶授者不在此限如員外官中材識幹濟曽經任使州縣所資者亦任量留每上州不得過五人中州不得過四人下州不得過三人上縣以上不得過一人古之任官必寄成政如長吏數易則綱條不恤所以人懷茍進之心俗靡居常之業比者或聞此弊實謂未便於時自今以後刺史縣令更不得數有移改善政聞於上則當議擢遷如道失厥中亦自懲誡黜陟之道固有典章又比來刺史任皆先奏州縣官屬茍有改作敦勉因情自今以後除帶使次判官外一切不得奏改官吏到任之後察有罪纍及不稱職具狀奏聞得請然後令所由與替其刺史非兼節度但有防禦使副使判官委於本州官中推擇亦不得别奏並委中書門下省著為恆法庶使官無失位政有常經宣示天下宜知朕意乾元二年八月一日遣諸道黜陟使敕朕聞唐虞聖主之理三載考績黜陟幽明兩漢施教之君亦命八使澄清天下朕纂承大業思服訓謨雖王公卿士內勤夙夜藩嶽守將外盡公忠而兵革未寧戎馬未靜紀綱未振法令未敷封圻郡縣賦稅不一師旅上下勞逸不均所以終宵積憂監寐增惕爰命羣士往代豫言行乎四方以聽於理舉其百事以歸於正朕之深願可不勤副也建中褒勸甄奬陷賊守節官詔敕沮勸二柄國之大綱奬善懲違固不可廢頃以賊臣搆亂京邑震騷惟兹士人奔竄無所有從其誘脅遂染汙名有守以純誠竟全貞節昨所司奏議但舉刑章奏纍者各已條流守節者並無甄異忠而不報豈朕意焉應在京百司及京兆府長安萬年兩縣去年十月三日見任職事官在城陷於賊中潛藏不受逆命並前資官在城被署官爵頻遭迫脅者始末不出事迹昭著衆所明知並委御史臺訪察磨勘核其事實勿容虛濫仍限今月內具名銜狀聞奏五品以上及常參官已受替者委中書門下即與處分六品以下各減三選不拘考例聽集其未得資被替者非時放選仍稍優與處分已喪亡並與追贈恩加存沒以稱朕懷録用鄧州歸順官詔敕迫以凶威陷於冦境義不受汙忠誠奮感履重險而不回處疾風而愈徑忘軀徇義獻款投誠足以勵彼勤王激其汙俗去順效逆固先典之攸嘉懋德賞功在彞章而不昧咸從序用俾服官常唐大詔令集卷一百四
