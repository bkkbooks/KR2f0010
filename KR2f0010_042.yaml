body:
  text: 唐大詔令集卷五十二宋宋敏求編大臣宰相判使罷判杜佑諸道鹽鐵使等制皇甫鏄罷判度支制王涯諸道𣙜茶使制蔣伸罷判户部制王鐸户部制蕭遘判度支制蕭遘罷判度支制孫渥判户部制孫渥判度支兼諸道鹽鐵使制王摶諸道鹽鐵轉運等使制領鎮姚崇都檢校諸軍大使制張説兼知朔方節度使制李林甫兼河西節度使制李林甫兼朔方節度使制王縉侍郎中兼都統制杜鴻漸東都留守制王縉兼幽州節度使制裴度門下侍郎彰義軍節度宣慰等使制王鐸中書令諸道行營都統權知義成軍節度使制鄭畋門下侍郎平章事依前都統制判使罷判杜佑諸道鹽鐵等使制周制國用委于冢卿漢調軍食資於相府必由中以制外則政一而事行所以阜安兆人平均九賦弼成富庶之教馴致雍熙之化實仗元老佐豫經邦銀青光祿大夫檢校司空同中書門下侍郎平章事充太清宫使上柱國扶風郡開國公食邑三千户杜佑體資易直德合𢎞大事君以道修已以誠寅亮先朝毗贊盛業秉忠直之大節備文武之全才保乂朕躬載申啓沃發揮政本開道化源謨明緝熙三事允理必能綜領經制變而通之權貨幣之宜成軍國之務外均庶土內贍中邦俾豫一人恭已而理𢎞敷五典式協于中可檢校司徒充度支及諸道鹽鐵轉運等使依前同中書門下平章事太清宫使散官如故皇甫鏄罷判度支制門下古者丞相府不按吏蓋以任重體大地親禮崇非征討之時豈仗貨財之事爰俾出納歸諸有司用嚴台庭以輔吾道中大夫守門下侍郎同中書門下平章事判度支皇甫鎛精明絶倫乾健不息藴是器業發為英華頃以守位聚人必資大計因其能事委以重權運用之機所以經天下之務重輕之法所以管天下之財自淮右不虔東平犯順兵車在野饋食連年而乃庖無折刃御有濡轡既授明命升之股肱軒裳所瞻崖岸益峻請謁自絶其風凛然况贍給之餘謀慮畢至平二方之險阻息再戰之干戈庸非坐籌佐朕而致今則百揆攸敘萬邦保和宜全相府之重勿領諸司之劇撫夷夏調隂陽用安元元時乃之職可守門下侍郎依前同中書門下平章事王涯諸道𣙜茶使制門下王者峻其禮秩所以報殊庸崇其職業所以歸碩望其竭股肱以宣力抱誠明而戴君調四氣以統和天人貞百度以鎮安夷夏勤彰於山澤德冠於巖廊不舉寵章曷示褒勸金紫光祿大夫守司空兼門下侍郎同中書門下平章事充𢎞文館大學士太清宫使及諸道鹽鐵轉運等使上柱國代郡開國公食邑二千户王涯誠貫金石行通神明氣含元精識洞蓍蔡窮聖賢旨奧之學擅邦國經緯之文為時而生作豫良弼長才推於精敏雅量得其寬和乃者重升師壇所至必理載踐台席楙昭休勳當險夷之途貞白無染在風雨之晦操尚不衰蒞事秉明哲之心臨難有大臣之節執萬機之政柄統四海之利權處劇而神慮益間在貴而家法愈儉憂國盡瘁罄其訏謨爰自纍年江淮水旱煮海之利日用而不虧佐賦之功嵗抄而後顯均輸之利相繼牢籠之資無遺經費有餘時乃之力况邦計之務總領尤難付之均節克有饒羡朕今以茶法稍弊理須變更凡斯重難悉以資委禮當優異式表至公俾進給於三司仍䇿勳於八命豫皆仰成汝其欽哉往踐厥位可開府儀同三司充諸道鹽鐵轉運𣙜茶等使餘並如故太和九年十月三日蔣伸罷判户部制門下輔弼之任陶鈞為重所以道隂陽而施化相天地以成功寅亮皇猷藻飾王度茍或嬰以他務兼拘利權則異乎代天佐理之道矣通議大夫尚書兵部侍郎同中書門下平章事判户部事護軍賜紫金魚袋蔣伸紫微上才清廟雅器潔如寒玉峻若孤峯既髙絶俗之姿能履中和之道秉吉士之操時然後言學君子之儒仁而且勇洎寵承內旨擢處禁垣嘉言屢沃於朕心密贊深知其忠懇委版籍益彰器能進台階頗洽公望澄源以正本循名而責實豈以司存尚煩丞相爰去劇務俾專緝熙所宜竭爾一心開豫四目惟至公而平庶政也依前兵部侍郎同中書門下平章事散官勳如故大中十二年三月王鐸判户部制敕夫足食足兵古之善政也故趙充國以屯田為上䇿諸葛亮用祁連作竒謀皆前代伐叛之良規兵家聚衆之急務也况乎命我元老平彼羣凶必兼財賦之司方濟軍師之用重兹一舉以保萬全諸道行營都統指揮收復京城兼租庸等使權知義成軍節度使鄭滑等州管內觀察等使開府儀同三司守司徒兼中書令判延資庫使上柱國晉國公食邑三千户王鐸偉望宏材𢎞襟逺慮三登台輔久領樞機蔚為社稷之臣實重巖廊之器近以京都未克寇孽尚存妙算屢陳忠誠奮發思登壇以糾合誓建莭以掃除朕由是暫輟陶鎔俾專統制五侯九伯盡列戎行猛將謀臣皆瞻馬首得不分其國計委以地征收租賦於四方從便宜於萬里軍須無闕天討必行副豫倚注之懷全仗廊廟之力敬承休命佇䇿大勳可兼判户部事餘如故蕭遘判度支制樂朋龜門下經費之權雖繫乎理本燮調之任尤重於國鈞誠不欲參而委之蓋所以仗其能者吾之注意用表推恩况方軫阽危尚屯兵甲託邦籍於魏相佇竭宏規付軍食於酇侯必施良術爰從成命俾洽輿詞特進行中書侍郎兼户部尚書同中書門下平章事監修國史上柱國蕭遘業司代天材承構厦懿績繼傳於王府嘉猷允紹於廟堂衆謂國華雅得韋平之稱時推人瑞諒齊管樂之名洎辭中殊科辟隨重地班行履歷刀尺精英由右史以踐南宫自中戎而升內直久傳密命粲組繡於筆端旋總憲司定準繩於朝右爾後方調國賦俄屬時難盡心於造次之時首奔行在秉節於蒼黃之際足驗嵗寒潔身之道既彰許國之誠可監俾其援力乃爾疇庸遂契風雲尋當鼎鉉可謂佐時之道知無不為奉上之功久而彌著於今者將平逆寇須恤王師方懸飛挽之勞日俟誅夷之計非爾洞達不足以絶姦欺非爾精明不足以希饒羡所宜究其利病計彼盈虛使兵實賦均家給人足自然凋傷漸復饋餉不虧既無艱食之虞並表和羔之用惟期竭力佇見沃心勉副具瞻式彰殊渥可兼判度支餘並如故蕭遘罷判度支制門下夫宰相之任本於佐理隂陽節宣風雨允釐百工康濟萬邦豈可以經費之煩勞弼諧之重比以戎車方駕國用未充將欲定其凖繩遂兼委於衡軸今則立事有制成規可遵既陳堅確之誠益尚執持之節宜加懋寵用爾渥恩特進行中書侍郎兼户部尚書同中書門下平章事監修國史上柱國蕭遘功髙作礪業茂秉鈞韻同戛玉之清應作洪鐘之響九流百氏供筆下之波瀾五色六彰集人間之光彩真為王佐衆號國楨射䇿詞髙曳裾望重優遊華貫黼黻明庭和符律吕之音簉合鸞皇之影譽洽多士聲振天朝負嚴樂之才華既司天語將徐庾之事業尤潤帝謨爰執憲綱縉紳自肅及專邦計饋餉無虧倚注之期朝昏是屬旋以塵侵羽衛寇犯郊畿保於患難之中不改始終之節首奔行在備竭忠謀明知管葛之才足副臯夔之選朕念兹士庶深軫傷痍授以鹽梅拯其塗炭及總機務大庇生靈薦賢之道益光奉上之心尤著籍其繁重稱職綦難果其能窮利病之源去姦欺之弊事皆條貫法以彰明特進退讓之誠益重燮調之任爾宜潛施祕略益進昌言激猛將以弭羣凶布和風而銷戾氣焚巢蕩穴促其獻捷之音定賞䇿勳乃是銘鐘之日則更加峻秩别示寵章宜升黃閣之尊式表納言之貴可門下侍郎兼吏部尚書同中書門下平章事監修國史散官勳如故仍落判度支孫偓判户部制裴庭裕門下在天成象拱帝座者三台在地稱崇鎮方輿者五嶽我有賢輔立乎大朝叶三台照耀之功契五嶽匡扶之力既凝庶績宜峻徽章正議大夫守中書侍郎同中書門下平章事上柱國賜金紫魚袋孫偓壁立孤峯渭清一𣲖早以閨門之行聞於鄉里之間張融髙文聚為玉海孫綽麗賦擲作金聲頗喧驚座之詞華遂整沖天之羽翰羅張上國顔淵首冠于諸科弓招小山穆生道優於置醴厥後簮御史筆講博士書從容纍踐於南宫諫諍俄升於左闥蘭香見忌玉冷多猜比騷人湘浦之行繼賈誼長沙之役朕自知直道召歸掖垣每于敷陳必盡肺腑因朱雲折檻之對識張華王佐之才斷自宸衷爰立作相彌縫不倦匡益居先操心願革於澆浮進善必先於行賞搜決沉滯拔用隱淪致我時風自爾而厚張説當玄宗之代初啓集賢竇參居德宗之朝别分户部一則寵九流之墳籍一則萃四海之賦輿式仗英規遂兼兹領髙見楚子之爵貴升鄭衆之階勉殄寇讎以復廟社可銀青光祿大夫依前中書侍郎同中書門下平章事充集賢殿大學士兼判户部事仍封安樂縣開國子食邑五百户孫偓判度支兼諸道鹽鐵使制門下朕聞天所以運行不息維之者星辰地所以厚載無疆紀之者海嶽故尹説相殷而帝道盛旦奭佐周而王業昌時之替興良由弼輔朕勵精理道夢卜披賢繼叶旁求並膺爰立皆號人傑實為國華銀青光祿大夫守中書侍郎同中書門下平章事充集賢殿大學士判户部事上柱國安樂縣開國子食邑五百户孫偓大昴分輝維嵩孕秀直如金矢潔若氷壺處諫諍之司言無畏忌守駁正之任道不依違當官而行遇事必立自擢居台席兼領地征藴持危扶傾之心負憂國忘家之志卓爾孤邁超然不羣稽於衆多僉曰名相銀青光祿大夫行尚書户部侍郎同中書門下平章事上柱國嘉興縣開國男食邑三百户陸扆清廟升歌朱干象舞內健外順動直靜專早踐清華旁流休問既登禁密潤暢皇猷言有凖繩心無吝悔爰從近侍委以化鈞目無全牛刃有餘地不斯須而離道不造次以違仁考於羣詞咸稱良輔而皆道符夔益業冠蕭曹楷式一時儀刑四海和松磊落允為大厦之材賜璉晶瑩宛是接神之器今朕以運丁難否時未洽平賊臣尚恐其跳梁國計靡臻於豐羡煮海之利多失於舊規量地之征未登於貢式須分重務屬我名臣冀大振於頺綱俾漸昌於衰歷是用遷皇極紫微之位總簡書刋集之司兼以利權盡付全德爾宜振提百度蕩定九圍勉服寵光以綏夷夏偓可門下侍郎同中書門下平章事監修國史判度支兼諸道鹽鐵轉運使扆可中書門下平章事中書侍郎充集賢殿大學士判户部事散官勳封如故王摶諸道鹽鐵轉運等使制鄭璘門下天之四序運造化以成功王者萬幾仗輔弼而興理豈獨安危斯在實以職任是資所以發于三光凝其庶績則可以迭升崇秩兼陟總臨况夫國用殷繁財力未贍允佇開張之術盡繄通變之方屬我名臣遂行寵渥扶危濟國致理功臣光祿大夫守吏部尚書同中書門下平章事上柱國琅琊開國公食邑二千户王摶地華簮紱榮盛台階分秀氣於嵩髙襲殊祥於淮水秉四科之全德抱百行之貞規夷玉在懸能發希聲之妙良金若礪自標大用之能夙振嘉名具揚清貫右掖演如綸之職左户二版籍之司望實既光夢卜斯得見陳平之知任堪調鼎識元禮之範稱委持衡朕以運屬多難羣經欲舉便殿每召前席與言山甫之秉小心見稱風雅陽山之有大體雅重絲綸藹吉上才冠彼前古今以將圗興復克集事功宜付繁難以表優異是用踐黃樞之峻級總青簡之刋修特以貨泉資其良畫於戲蕭何掌挽運之柄在漢為功臣夷吾通輕重之權致齊垂霸業繄展匡時之道佇成富國之謀勉膺寵靈服我丕訓可門下侍郎依前兼吏部尚書同中書門下平章事監修國史充諸道鹽鐵轉運等使功勳如故領鎮姚崇都檢校諸軍大使制蘇頲黃門廟堂之儀不可去兵帷幄之謀在於料敵自非行有餘力坐而決勝則何以威百蠻而破萬里者也兵部尚書兼紫微令監修國史上柱國梁國公姚崇朝廷宿望軍國大才藴平仲之一心舉夷吾於六翮惟此人傑是稱天賚銀青光祿大夫行黃門侍郎昭文館學士上柱國中山郡開國公李乂甫用窮精微體自公直貞規踰于鐵石詞律比于笙簧左曹之美中朝所詠咸能上答寵眷備陳䇿略閲武觀兵暗合孫吳頃雖衆和以德軍全非戰或徵其侍子允詣闕廷或勞我偏禆尚留關塞行役之苦寢興弗忘師臧謂何豫備斯在佇恢遙護之略更屬逺安之算崇可檢校諸軍大使乂甫為副主者施行開元二年正月二十四日張説兼知朔方軍節度使制朔方之地雍州之城密邇關輔是稱河塞頃者邊塞為寇擾其居人王師有征戎事斯大戍役之弊邊氓既勤雖妖醜既清而政理未洽不有經制曷云昭蘇且和衆為武者所以詰姦慝總軍命將者所以訓甲兵匪夫大賢孰允斯任兵部尚書同中書門下平章事三品燕國公張説天與明秀自然才傑光備九德𢎞宣七政爰掌邦理實為國楨謀而必臧言則無隱寅亮之美用熙帝載談笑之餘更陳戎略所謂善行樽爼事立封疆宜以上台之尊遙統中軍之任可持節兼知朔方軍節度大使餘如故李林甫兼河西節度使制孫逖門下天討有罪未可以去兵帝贊良弼是資於決勝金紫光祿大夫兵部尚書兼中書令持節經略支度營田大使知節度事集賢院學士修國史上柱國晉國公李林甫髙操命代特秀生人公忠為百度之貞文武成萬邦之憲自登上相兼委中權克致時和且聞戎捷踰隴之外已恢帷幄之謀涉河而西更是輔車之勢欲懲猾夏必在夾攻宜以三事之謨遙制兩軍之律可兼充河西節度經略支度營田長行轉運九姓等使節度事赤水軍仍判涼州事餘並如故開元二十六年五月李林甫兼朔方節度使制經邦道國允屬於才賢保大定功聿求於長䇿不有兼領孰彰寵賢開府儀同三司行尚書左僕射右相崇玄館大學士集賢院學士太清太微宫使修國史上柱國晉國公李林甫器惟國楨材乃人範文標楷式學究精微啓沃之誠罄嘉猷於造膝清貞之節盡公心於匪躬自澄於三事式是百辟具瞻惟允茂績居多任總廟堂既贊雍煕之化智髙帷幄更資決勝之謀宜因公輔之重兼受元戎之寄可兼安北副大都護持節朔方節度關內支度營田鹽池押諸蕃部落副大使知節度事六城水運節度管內軍郡採訪處置等使並如故開元二十四年十一月王縉侍中兼都統制門下天地之德資隂陽以成功帝王之道任將相而興化聿求左輔命掌元戎必資文武之才用經軍國之務金紫光祿大夫行黃門侍郎同中書門下平章事兼𢎞文館大學士知館事仍充太微太清宫使太原縣開國伯王縉有髙妙之行有𢎞通之識學該古訓文成國風夢帝賚豫濟川用汝百揆時敘四維克張纍陳造膝之言彌著沃心之道濵海之右自河而南王旅攸同戎車殷會監于方伯之制利用建侯之師天將息人豫有禦侮鎮漢沔淮肥之地統齊梁魯鄭之軍總制髙牙綱紀羣力𢎞七伐四征之䇿成一匡九合之勳式遏外虞底綏多難將授銅符之律爰咨璅闥之謀往哉汝諧無替朕命可侍中持節都統河南淮西山南道諸軍節度行營事仍特進封郡公食邑二千户餘並如故主者施行廣德二年八月杜鴻漸兼東都留守制楊炎門下東周以召公相宅西漢以蕭何居守則保釐之寄多屬輔臣今以廟堂碩老坐而敷政和恆居師用乂厥服特進行門下侍郎同中書門下平章事山劍副元帥太清宫使崇玄館大學士上柱國衛國公杜鴻漸誕受天和陶合一氣德言敬直動於神明定義中興光贊大業陳三代之禮樂成一朝之制度雄詞奧學洞究天人以道弼豫于兹五載每有大事乃心忠勤至於危難尤思赴蹈叶和堂上之謨匡濟天下之務出鎮梁益西南晏然人之具瞻朕所毗倚實仗𢎞化兼撫東郊宜以二南之風用增九鼎之重可兼東都留守餘如故主者施行王縉兼幽州節度使制楊炎門下王制以二老分理諸侯則周召之任及乎漢魏以還多亦軍國兼總絳侯所以參掌武事安石所以外綏戎政况華夷甫寧金革方偃實在於文武戮力上下同心則輔弼之臣豈憚勞也金紫光祿大夫門下侍郎同中書門下平章事持節河南副元帥都統河南淮西山南東道諸節度行營使兼東都留守王縉體合元和器藴金璞以才茂邦傑以識通時化叶我期運任當衡石竭股肱之力開耳目之明陟于艱難致君以道統是經術麗兹人羣屬江淮海岱之虞總節鉞旌旄之寄鎮禦方夏撫寧師人含保太和總宣庶績忠而佐命功比安劉勤以施下惠同思杜叶藩雄之志建竹帛之勳朝譽載申啓沃益切二三髦碩同力叶誠俾豫端拱以𢎞至道乃眷北土古之幽都限夷既雄負海稱固思致于理言恤其人爰藉台臣𢎞敷廟算持薊門之麾斾兼遼陽之鉦鼓俾膺戎重式允時望可兼幽州長史持節充幽州節度副大使知節度事餘並如故裴度門下侍郎彰義軍節度宣慰等使制輔弼之臣軍國是賴興化致治則秉鈞以居取威定功則專閫而出所以同君臣之體一中外之任焉屬者問罪汝南致誅淮右蓋欲刷其汚俗弔彼頑人雖挈地求生者實繁有徒而嬰城執迷者未剪其類何獸困而猶鬬豈鳥窮之無歸歟由是遙聽鼓鼙更張琴瑟煩我台席重兹戎旃朝議大夫守中書侍郎同中書門下平章事飛騎尉賜紫金魚袋裴度為時降生協朕夢卜精辨宣力堅明納忠當軸而才謀老成運籌而智略前定司其樞務備知四方之事付以兵要必得萬人之心由是禱于上玄揀此吉日帶丞相之印綬所以尊其名賜諸侯之斧鉞所以重其命爾宜布清問恢壯猷感厲連營蕩平多壘招懷孤疾撫育夷傷况淮西一軍素效忠節過海赴難史册書勳建中初攻破襄陽擒滅崇義比者脅於凶逆歸命無由每念前勞常思安撫所以內輟佐輔為之師帥實欲保全慰諭使各得其宜往欽哉無越我丕訓可門下侍郎同中書門下平章事使持節蔡州諸軍事蔡州刺史彰義軍節度管內度支營田申光蔡州觀察處置使仍充淮西宣慰處置使散官勳賜如故王鐸中書令諸道行營都統權知義成軍節度使制樂朋龜門下廟堂之上教化之源康濟萬方彌綸百揆可謂朕司時之蓍龜不宜斯須暫違顧盼其或屢陳章表備瀝精誠以大憝未平每痛心而疾首以中都未復嘗瀝膽以披肝志在總戎期於弭冦永言許國真是藎臣遂命更陟韓壇重辭恩眷統六師而雷動屯萬旅以風馳併集寵命以堅茂績開府儀同三司守司徒兼太子太保同中書門下平章事充太清宫使𢎞文館大學士兼延資庫使上柱國晉國公食邑三千户王鐸名髙嵩華量等滄溟情田同開心地無滯造次靡忘于忠孝幾微不捨其規繩靜彼波瀾莫分喜愠洎乎升甲乙綴鵷鸞履歷清華從容道德盛推器業必為王佐之才盡伏機權乃是公台之望爾來盤錯果副重難筮短龜長開物成務同叔敖之為楚相比孔光之輔漢朝出於一時膺是三命其為寵重敻無等倫朕克荷丕圗內慚涼德致其郊廟陷於狼狽若墜溝隍如懷水火未嘗一飯之飽一夕之安宥過責躬臨深履薄遂致玄穹下鑒元老請行面陳肺腸忠貫天地振朝廷之武力挫妖孽之殘魂惟其疾風方知徑草况津臨白馬地壓洪河擁東夏之鋭師視中原之沴氣必期破竹自可覆巢昔元凱之著殊勳謝安之膺上賞功銘鼎鼐指誓山河遐想芳塵必符壯志爾宜奪其租賦贍彼甲兵使退無玩寇之虞進有老成之誡訓齊勇士尅彼都城屠梟獍之軀以為京觀戮鯨鯢之首用獻宗祧嗚呼寰海流離生人塗炭眷言繄賴實洞神明是用榮分和嶠之車光佩蕭何之印勉思注意勿怠厥功可司徒兼中書令充諸道行營都統兼指揮兵馬收復京城及租庸等使判延資庫事權知義成軍節度管內觀察處置等使餘如故仍令所司擇日備禮册命軍罷後却赴中書主者施行中和二年正月鄭畋門下侍郎平章事依前都統制門下朕聞天下安注意於相天下危注意於將爾今應吾內外之委任也朕以塵昏宇縣血染生靈乘輿播越於道途巡幸奔馳於巴蜀夙夜思咎寢食不遑期早殄於羣妖兾速清於國步今則重煩台德再秉鈞衡碧幢不離於岐山黃閣暫移於隴邸安危倚望中外具瞻諸軍四面行營都統鳯翔隴等州節度觀察處置等使開府儀同三司檢校司空同中書門下平章事兼鳳翔尹上柱國榮陽郡開國侯食邑三十户鄭畋嶽瀆炳靈星辰煥發雅裁既揚於氷玉沖襟咸契于神明達古今理亂之源識文武經綸之道作時柱石為國棟梁洎周旋寵榮出入將相功業每留於史册懿範允播於縉紳昨鎮于近藩者闕今雖狼心漸革蠆尾將收干戈尚遍于咸秦蛇豕猶侵于宫闕運雖至此天實賚豫况誓掃寇讐志收社稷藴沉幾而愈徑奮獨斷而不回激喻軍行董率義旅行韝必中傳檄無凝指呼而方面悅隨慷慨而懦夫請命風生貔武川湧熊羆期繫頸於逡巡佇舂喉於旦夕朕且念用兵汧隴駐驆坤維指揮而逺在一隅請急而動聞踰月于以舉疇庸之典于以圗必勝之謀在乎盛以軍戎任其陶鑄使統制並遵於麾下訏謨皆在於彀中將候凱還佇其册命於戲簮裾禮樂儼然丞相之風旗幟鼓鼙蔚爾將軍之貴裴度以出征淮蔡敏中以招討羌戎皆仗以節旄付之樞務期樹功業固不同年勉圗大勳同酬殊渥位正台階之重官崇水土之榮敬之哉無忝我重命可守司空兼門下侍郎同中書門下平章事依前充四面行營都統鳳翔隴等州節度觀察處置等使兼鳳翔尹散官勳賜如故仍令所司候收復京後備册命主者施行唐大詔令集卷五十二
