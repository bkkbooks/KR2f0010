body:
  text: 唐大詔令集巻一百十一宋宋敏求編政事田農勸農詔温彦博等檢行諸州苗稼詔置勸農使安撫户口詔聴逃户歸首勑勸天下種桑棗制廢華州屯田制賦斂簡徭役詔禁止迎送營造差科詔罷三十六州造船安撫百姓詔闗内庸調折變粟米勅減徴京畿丁役等制制置諸道兩稅使勑平糴置常平監官詔命諸道平糴勑令御史巡定諸道米價勑田農勸農詔有隋道喪區宇分離百姓凋殘弊於兵革田畆荒廢饑饉荐臻黎元無辜墜於溝壑朕膺圖馭極廓清四海安輯遺民期於寧濟勸農務本蠲其力役然而邊鄙餘㓂尚或未除頃年以來戎車屢出所以農功不至倉廪未登永言念此無忘寤寐今既風雨順節苗稼實繁普天之下咸同盛茂五十年來未嘗有此萬箱之積指日可期時惟溽暑方資耕耨廢而不修嵗功將闕宜從優縱肆力千畆其有公私債負及追徴輸送所至之處宜勿施行尋常營造工匠等事非急要亦宜停止見在繫囚事未决斷傍引支證未須追攝百司常務並宜且停内外官人行署以上量事分番皆盡九月三十日軍機急速及賊盗之事不在停限州縣牧宰明加勸導咸使戮力無或失時務從簡靜以稱朕意武徳六年六月温彦博等檢行諸州苗稼詔蟲霜為害風雨不時政道未康咎徴斯在朕祗奉明命撫育黔黎愛愍之至實切懷抱輕徭薄賦務在勸農必望民殷物阜家給人足而隂陽不和氣候乖舛永言罪已撫心多愧河北燕趙之際山西并潞所管及蒲虞之郊豳延以北或春逢亢旱秋遇霖淫或蟊賊蟲災嚴凝早降有致饑饉慙惕無忘特宜矜恤救其疾苦可令中書侍郎温彦博尚書右丞魏徴治書侍御史孫伏伽檢校中書舍人辛詣等分往諸州馳驛檢行其苗稼不熟之處使知損耗多少户口乏粮之家存問若為支濟必須子細勘當速以奏聞待使人還京量加賑濟貞觀元年九月置勸農使安撫户口詔有國者必以人為本固本者必以食為天先王於是務其一時前聖所以分其五土勸農之道實在於斯朕撫圖御厯殆踰一紀旰食宵衣勤乎兆庶故兢兢翼翼不敢荒寧頃嵗以來雖稍豐稔猶恐地有遺利人多廢業游食之徒未盡歸生榖之疇未均墾以是軫哀念遣使臣恤編户之流亡閱大田之衆寡至如百姓逃散良有所由當天冊神功之時北狄西戎作梗大軍之後必有凶年水旱相仍逋亡滋甚自此成弊至今患之且違親越鄉蓋非獲已蹔因規避旋被兼并既冒刑網復捐産業客且常懼歸又無依積此艱危遂成流轉或依人而止或傭力自資懐土之思空盈返本之途莫遂朕䖍荷丕搆子育萬人立徳非㝠而兹弊未革納隍馭朽實切於心既深在予之責思𢎞自新之令其先是逋逃並容自首如能服勤隴畆肆力耕耘所在閑田勸其開闢任遂土宜收税勿令州縣差科征役租庸一皆蠲放若登時不出或因此更逃習俗或然以為抵法是阻我誠信是紊我大綱爰及所由須加嚴憲至天下風壤多有不同地既異宜俗亦殊播固當因利興事不可違人立法宜令兵部員外郎兼侍御史宇文融兼充勸農事使巡按郡邑安撫户口所在與官寮及百姓商量乃至賦役差科於人非便者並量事處分續狀聞奏務令安輯勿使勞煩當行責罰之科各竭公忠之力所到之處宣示百姓達我勤人之心開元十二年五月聽逃户歸首勑朕臨御天下二十四載何嘗不孜孜問政業業興憂以一徳心與萬人請命故宗廟降福乾坤致和使匈奴成父子之鄉犬戎為姻好之國西南邛筰皆曰内臣東北林胡是稱邊捍何奉天之徳能逺洽於戎夷而安人之政獨不行於諸夏使黎甿失業户口凋零忍棄枌榆轉徙他鄉傭假取給浮窳求生言念於兹良深惻隱豈惟朕徳所未及教有未𢎞歟亦由牧守専城莫能共理令長為邑多或非才俾猾吏侵漁權豪并奪故貧窶日蹙逋逃嵗増若不開恩何從遷善天下逃户所在特聴歸首容至今年十二月三十日内首盡其本貫有産業者一切令還若先無者具户數聞奏當别有處分其有限外不首潛匿亡歸靡懷亭育之恩仍蓄逋亡之計即當分命専使在處捜求散配諸軍以充兵鎮懲其犯命替彼居人仍各委採訪使及刺史縣令明加曉諭使知朕意開元二十四年正月勸天下種桑棗制常衮勑詩有豳風陳王業也八月剥棗以助男功蠶月條桑俾修女事贍人之道必廣於滋殖分地之利非止於耕耘益之以織紝雜之以菓實則寒有所備儉有所資如㫖蓄之禦冬豈無衣以卒嵗頃屬多難艱食必資樹藝以利於人庶俾播種之功用申牧養之化天下百姓宜勸課種桑棗仍每丁毎年種桑三十樹其寄住寄庄官䕃官家毎一頃地准一丁例仍委節度觀察州縣長吏躬親勉率不得擾人務令及時各使知勸一一勉諭訖具數奏聞廢華州屯田制常衮勑間者戎旅未息徴求煩重四郊之賦乃至五稅其一居人蕩析邦廪空虚遂命宰臣大修農政天下郡國散諸屯轉漕入闗以資均濟兼詔中尉左右内史表屬州縣閑田分署農官俾其耕鑿南至於華瀕渭而東林麓洲渚之間榛莽窊邪之處非吾人所占者悉舉籍勸分載芟載柞稼多豐碩畆獲數鍾嵗既少殷軍儲差贍郡縣之稅於是十而減七數從其舊殆復厥常今宿麥頗登秋苗益茂私田加闢公用漸充華州人户土地非廣其屯田並宜給與貧下百姓自頃闗中乏牛力封圻千里半是丘荒置屯田已來皆變良沃惠散其利以及困窮藏之於人孰與不足宣示郡邑宜悉朕懐賦斂簡徭役詔詩不云乎民亦勞止汔可小康爰自夫隋氏失馭刑政板蕩豺狼競起肆行凶虐徴求無度侵奪任已下民困擾各靡聊生喪亂之餘百不存一上天降鑒爰命朕躬廓定凶災乂寧區域念此黎庶凋弊日乆新獲安堵衣食未豐所以每給優復蠲其徭賦不許差科輒有勞擾義存簡靜使務農桑至如大河南北亂離永久師旅荐興加之饑饉百姓勞弊此焉特甚江淮之間爰及嶺外塗路懸阻土曠人稀流寓者多尤宜存恤此等諸處往隔㓂戎自經開泰嵗月未乆猶恐士民積習不改前弊州縣官人未稱所委迎送往來尚致勞費其河南河北江淮以南及荆州大總管内諸州所司宜更班下自今以後非有別勑不得輒差科徭役及迎送供承庶其安逸明加檢約稱朕意焉武徳六年三月禁止迎送營造差科詔隋末喪亂豺狼競逐率土之衆百不一存干戈未靜農桑咸廢凋弊之餘饑寒重切永言念此悼於厥心今㓂賊以平天下無事百姓安堵各務耕織家給人足即事可期所以新附之民特蠲徭賦欲其休息更無煩擾使獲安靜自修産業猶恐所在州縣未稱朕懐道路送迎廨宇營築率意徴求擅相呼召諸如此類悉宜禁斷非有别勑不得差科不遵詔者重加推罰布告天下咸知此意武徳六六四月罷三十六州造船安撫百姓詔朕以寡昧纂承鴻烈肅扆巖廊之上凝襟華裔之表馭奔深於日慎儲祉存於勿休勉已勵精詳求大化往為奉成先志雪恥黎元是以數年之間稱兵遼海雖除凶戡暴義匪儲身疲人竭財役興於下泛滄流而遐濟踐危途而逺襲風濤競駭或取淪亡鋒鏑交揮非無隕仆顧惟菲徳事有乖於七旬在躬延責情致慙於四海湯年罪已鑒寐斯存漢載富人周廻切念日者翹車聮映賁帛相耀庖鼎之前猶潛秀異殿陛之下未盡英奇佇延翰於西雍認殊珍於東序比王師荐發戎務實繁州縣官寮縁兹生過力役無度財賂公行蠧政傷風莫斯為甚前令三十六州造船以備東行者即宜並停訖凡百在位宜極言得失悉心無隱以匡不逮仍分遣按察大使問人疾苦黜陟官吏兼司元太常伯竇徳𤣥往河南道並即持節分往其内外官五品已上各舉巖藪幽素之士廣加詢訪旁求謡俗式企英材允毗闕政必使八紘之内咸得朕心萬㝢之中同夫親覽宜速頒示率土知此意焉龍朔三年八月闗内庸調折變粟米勑勑闗輔庸調所稅非少既寡蠶桑皆資菽粟常賤糶貴買損費逾深又江淮等苦變造之勞河路増轉運之弊毎計其運脚數倍加錢今嵗屬和平庶物穰賤南畆有十千之穫京師同水火之饒均其餘以減逺費順其便使農無傷自今已後闗内諸州庸調資課並宜准時價變粟取米送至京逐要支用其路逺處不可運送者宜所在收貯便充隨近軍粮其河南北有不通水利宜折租造絹以代闗中調課所司仍明為條件稱朕意焉開元二十五年二月減徴京畿丁役等制常衮勑天之所命俾朕乂人豈敢怠遑期於康濟勞精極慮十有四載務從省約以訓天下訪其疾苦屢有蠲除公私之差僅從盍徹宮衛之備仍罷踐更兼捐服御用資軍國大去煩弊以休邦畿游食之人悉歸南畆墾田之數漸復平時神降嘉禾嵗乃大熟震於珍物景福紛委葢上𤣥烈聖之儲祉也豈寡昧之徳而臻此耶夙夜祗惕永懐増懼然以令有緩急物有重輕粟輕而易散錢重而難聚古人所謂糴之至賤與貴其傷一也如聞閭閻未免告病至乃以數斛易錢一緡雜以他徭難於償賣輔用所寶念之惻然深可重惜所宜節省其京兆府諸色番役等訪聞諸司或有徴課比縁時儉資數稍多物估皆賤不可仍舊其掌閑彍騎三衛及橋堰丁匠如有司頃徴資並納錢三千米六斗其青苗地頭天下諸州每畆率錢十五頃以京師煩擾供應頗多茍從權宜遂倍其數自今以後宜准諸州例徴率朕以帝王之教人如父母之訓子所以至纎至㣲必躬必親茍或便之豈憚煩也宣示百姓知朕意焉制置諸道兩税使勑兩税法悉總諸稅初極便人但縁約法之時不定物估粟帛轉賤賦税自加人力不堪國用斯切務須通濟令其便安欲遣使臣巡行國邑郵驛所届豈免煩勞軺車遽馳曽未周悉度支鹽鐵泉貨是司各有分巡置於都㑹爰命帖職周視四方簡而易從庶叶權便政有所弊事有所宜皆得舉聞副我憂寄其鹽鐵使揚州留後宜兼充淮南浙西浙東宣歙福建等道兩税使度支山南西道分巡院官宜兼充劒南東川及山南西道兩使其峽内五監舊屬鹽鐵使宜割屬度支使便委山南西道兩税使兼知參貨各奉所職期於悉心平糴置常平監官詔朕祗膺靈命撫字氓黎方緝隆平躋之仁壽田畆之賦一切蠲除錙銖之律悉皆停斷是以特建農圃用督耕耘思俾濟民既庶且富鍾庾之量冀同水火宜置常平監官以均天下之貨市肆騰踊則減價而出田嗇豐羡則増糴而收觸類長之去其太甚庶使公私俱濟家給人足抑止兼并宣通壅滯武徳九年九月命諸道平糴制常衮勅四海之内方叶大寧西戎無厭獨阻王命不可忘戰尚勞事邊朕頃以兵革之後軍國空耗躬率節儉務勸農桑上𤣥儲休仍嵗大稔益用多愧不知其然雖屬此人和近於家給而邊穀未實戎備猶虚因其天時思致豐積將設平糴以之餽軍然以中都所供内府不足租充常入之數豈濟倍餘之收其在方面藎臣成兹大計共佐公家之急以資塞下之儲應諸道毎嵗皆有防秋兵馬其淮南四千人浙西三千人魏博四千人昭義二千人成徳三千人山南東道三千人荆南二千人湖南三千人山南西道二千人劍南西川三千人劍南東川三千人鄂岳一千五百人宣歙三千人福建一千五百人其嶺南江南浙西浙東等亦各准例恐路逺往來増費各委本道節度觀察都團練等使毎年取當使諸色雜錢及廻易利潤贓贖等錢物每人計二十千文每道各據所配人數都計市輕貨送上都左藏庫貯納充别勅和糴用並不得尅當軍將士衣糧充數仍以秋收送畢大厯九年五月令御史巡定諸道米價勑河東河北諸道頻年水旱重以兵革農耕多廢粒食未豐比令使臣分路賑恤冀其全濟得接秋成今諸道糓價尚未減賤而徐汴管内又遭水潦如聞江淮諸郡所在豐稔困於甚賤不免傷農州縣長吏茍思自便潛設條約不令出界雖無嚴牓以避詔條而商旅不通米價懸異致令水旱之處種食無資昔春秋之時列國異政分災救患猶載冊書况今朝典大行逺近一統禁錢閉糴具在赦文州縣因循多不遵奉宜令御史臺揀御史一人于江南道巡察但毎道毎州界首物價不等米商不行即是潛有約勒不必更待文牓為驗便具事狀及本界刺史縣令觀察判官名銜聞奏如河南通商旅之後淮南諸郡米價漸起展轉運接諸處直至江西湖南荆襄已來並須約勒依此舉勘聞奏仍各令觀察使審詳前後赦條與御史相知切加訪察不得容蔽太和年唐大詔令集巻一百十一
