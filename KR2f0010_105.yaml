body:
  text: 唐大詔令集巻一百二十六宋宋敏求編政事誅戮上劉洎自盡詔楊慎矜自盡詔王鉷自盡詔李林甫除削官秩詔處置受賊偽官陳希烈等𠡠周元幹等死沒制李岵自盡制决李少良等制姜敬初自盡制劉希䢰自盡制誅元載自盡𠡠誅劉晏自盡𠡠誅劉闢𠡠誅李錡并男師囬勅誅殺武元衡賊張宴等勅誅戮上劉洎自盡詔詔曰小人在列為蠧則深巨猾當樞懐奸必大侍中檢校户部尚書清苑縣開國男劉洎出自閭伍言行罕稱於國無涓滴之勞在朕匪枌榆之舊但以駈䇿情乆頗有吏能擢於凡𤨏之間収其鳴吠之用超倫越次使居常伯紆青襲紫攝職文昌冀有葵藿之情知慙雨露之澤朕行履小乖和豫凡百在位忠孝纒心每一引見涕泗交集洎獨容顔自若宻圖他志今行御史進狀奏洎乃與人切議窺窬萬一謀執朝衡自處霍光之地窺弄兵甲擅總伊尹之權猜忌大臣擬皆夷戮朕親加臨問初猶不承傍人執證方始具伏此而可恕孰不可容且皇太子某春秋鼎盛聲溢震方異漢昭之童幼非周成之襁褓鰕生負圖之望是實無君之心論其此罪合從孥戮但以夙經任過不忍梟懸宜免家累賜其自盡貞觀十九年十二月楊慎矜自盡詔左道亂常邦家所禁兇謀逆節天地不容户部侍郎兼御史中丞楊慎矜潛蓄囬邪率由艱險猥承門緒得齒朝行爰自卑㣲謬加超擢寄之帤藏總被均輸不知外矯清亷内懐貪冒起伏百變以此狥身首鼠萬端恣為罔上觸途苛刻歸怨國家還俗僧史敬忠兇慝逆徒狂愚賤品乃妄陳䜟緯别覬異圖宻與交通將期委質仍自以亡國之後克獲攸歸遂妄託災祥窺覦時變用肆惡悖心在不臣惡跡既彰疑駭咸服戴天履地面目何施梟首夷宗未云塞責但以務𢎞大體心在寛刑尚免嚴誅容其自斃其楊慎矜宜賜自盡其兄少府少監慎餘洛陽令慎名等不令隨從並為固惡亦宜令自盡其史敬忠首建逆謀實為臣蠧宜决重杖一百鮮于賁詐稱敬忠當王附㑹凶人宜决重杖六十長流范滔妄説妖言與之昵狎宜决六十長流嶺南臨江郡其上庭耀既為論傭作終不論告决四十配𨽻黔中郡楊慎矜叶生前通事舍人辛景凑别致非𩔖成此禍端宜决四十配流嶺南晉康郡其義陽郡司馬嗣號王臣雖則不渉凶謀而與敬忠相識宜觧却官於南賔郡安置其任太府少卿張瑄素以妄庸專行險詖比縁慎矜薦引驟歴班榮因此結交潛為黨援况犯贓私情逾難恕宜决六十長流嶺南臨封郡其威衛執㦸天馬監副監万俟承暉妄畜圖書與慎矜觧説潛相黨附為蠧實深宜决重杖六十其間廐使殿中監衛衢沗膺重寄宜存公道受慎矜囑請為承暉奏官謟黷愈彰比周斯在宜貶與逺官應配流及安置人等所在即差網驛領送其楊慎矜及兄弟并史敬忠有荘宅等宜並官収其家口男女等並令所司准法即配流嶺南諸郡其張瑄及万俟承暉鮮于賁等男女并一房家口亦准此配流嶺南諸郡凡其内外近親不可尚列班榮及居京轂宜令三司使即括責聞且臣之事君有死無二匹夫徇義或志亡軀豈有六卿任兼三獨父子相續俱承重委兄弟不次皆列通班而更隂圖不軌潛覬異望靜言思此良可歎息除惡務本與衆共之令在惟行葢非獲已中外寮庻咸使聞知王鉷自盡詔𠡠曰人臣無將有必誅之義王制所禁在難捨之刑銀青光禄大夫御史大夫兼京兆尹殿中監聞廐使隴右羣牧監使及天下户口色役利市和糴方作園苑長春宫栽接并京畿及關内採訪等王鉷性本凶愎行惟艱險徒以早膺擢用累踐崇班持憲尹京委重斯大八閑六尚寵寄惟深殊不知外飾公忠干冐非㩀内懷奸詐包藏不測任海川狂愚不逞妖惑無良而乃潛與通情乃希非望及覺彰露使令滅口幸㑹聞此事跡話於私庭遽令追掩殞於縣獄邢縡乆懐逆謀專搆逆黨其弟銲始終結約常與交通託云弟職其實由已今神明所殛凶黨伏辜縱刑且踈欲逃其罰然天地雖廣何所容身宜賜自盡户部郎中王銲蓄積梟獍之心包藏狂悖之計與逆人邢縡乆託深交供其資粮同為凶惡自申欵暱十載於兹所有逆謀咸共謀畫此而不罰其若法何猶寛除死之典俾從杖刑之責宜於朝堂集衆杖殺李林甫除削官秩詔為臣之道二則有辟事君之致將而必誅故左僕射兼右相吏部尚書上柱國晉國公贈太尉廣陵大都督李林甫爰因宗室奬以班序建履清貫尤特矯飾鄙誠患失狡迹多端朕待以勿疑任當殊重恩私踰分崇髙至極乘據樞衡二十餘載豈知外表廣慎内藏兇險籌謀不軌覬覦非望服此庸細譖害惠良悖德反經師心藴慝禍福生於喜怒榮辱由其愛憎使縉紳箝口行路側目滛祀夜禱於神祗厭勝家崇於蠱道遵空養奸實繁有􅑫既畢禬禳旋勦其命阿布斯振降塞上委於綏緝敢行結交輸竭深夜裏嚴室焚香要之誓信指期撤警縱以叛離且肆犬羊之羣侵軼我疆場方申犄角之契圖危我宗社可隠之状所不忍言以親黨薦引咸歸朝班子息蕃多曽無教誨貪叨納賂倚依成奸䦧墻屬聞敗官相次作偽滋乆晚節頗彰含垢在予猶示𢎞厰鬼得銖而溢盡惡布露而難容建從詢鞫事皆昭著殱夷噍𩔖曷足懲愆鞭斵屍棺未云塞責但以常經使任特寛恒典其在身官秩並宜追除則卑同凡庻許其殯掩男前將作監岫率由劣行不承教朂驕恣越度過失彌深且配流嶺南及黔中延德郡前司儲郎中崿配流蒼梧郡前太常少卿嶼配流臨封郡仍並除名即網馳驛領送自餘有官者令所司即勘㑹亦除名各配流嶺南及黔中逆惡羣女在室并男未有官者取其情願任隨兄弟朕念其驅䇿尚懷仁恕既貸生成之恩赦其殞嗣之罰仍每房各乞奴婢三两人並與縁身衣服粮食使其存濟自餘資産一切官収男孫有官者觧却無官者勒隨父並家口並續逓途流所至彼捉搦勿許東西縱㑹恩赦不在量移之限其林甫男女妻等有罪非妄惟其子壻諌議大夫楊齊宣覩其不善尋有薄心跡異同惡頗申誠欵並自餘至親應合累者續有處分噫堯謂逹聰四凶在列周稱盛德三監俶擾知人之羙誠愧格言明罰斯加非無累歎凡任咸自誠焉處置受賊偽官陳希烈等詔人臣之節有死無二為國之體將而必誅况乎委質賊庭宴安逆命耽受寵禄淹延嵗月不顧恩義助其効用此而可宥法將何施逹奚珣等或受任台輔位極人臣累葉姻聨戚里或歴踐臺閣或職道中外夫以犬馬㣲賤之畜猶知戀主龜蛇蠢動之𩔖皆能報恩豈曰人臣曽無感激有靦面目事於㓂讎亂臣賊子何以過也自逆賊作難傾覆邦家凡在黎元皆含怨憤殺身殉國者何可勝數此等黔首猶懷國恩豈有列在崇班荷兹禄位不思君親之分唯與兇逆同心受任於梟獍之間咨謀於豺虺之軰静言思此情何可矜朕志欲含𢎞法務寛貸然凶惡之𩔖自招其咎人神所棄天地不容原其本心皆合殊死就中情状仍有區分逹奚珣等一十八人並宜處斬陳希烈等七人並賜自盡前大理卿張均特宜免死長流合郡周元幹等死沒制𠡠大逆不道抵夷族之誅同惡相濟當棄市之法以懲干紀式按彞章周元幹賊臣之子元惡成性與交階亂厥罪惟均邵賁敢有包藏恣其悖虐怙侈滅義攘敓矯䖍戮及無辜罪浮於師其周元曜薄羅漢尹元經毛崈彬李尚林等共肆醜圖且明反状猶捨斧鑕俾全腰領其劉憲周夀崔勸等同附姦邪俱行扇惑以情斯蠧法當死沒並依前件朕自君臨萬國思措五刑不虞兇殘有此冒犯寘以明憲期於止殺凡百卿士知朕意焉李怙自盡制𠡠恃衆專殺謂之亂常合族倂命謂之不道按以春秋宜加重責况自悖人理實生厲階合從棄市之論尚就議親之减李怙幸以宗屬列於藩任政之不修亂是用長輕侮法令動揺軍州御史姚奭廵到所部其弟參於佐理諸將素有猜嫌故加之罪不可無状遂言使者之来事在不測俾其完聚兵甲變更將守潛䟽其意以搆禍萌而怙親自㸃竄詐云奭之遺隊以此疑衆因而合謀弟兄家黨咸盡淪胥而斃又陷數家勒兵抗威以拒所統人不堪命一方騷然頃發近信審問按理醜圖既露奸状甚明示有小懲以從逺斥詢於羣議頗屈常典朕思以道德在宥天使一代之人登於仁夀之域風化猶薄正教不明致令長吏專此威暴無罪無辜横分身首寃氣慘結有傷元和惕然増懷深自咎責期於止殺不可措刑寛其斧鑕之誅降從盤水之禮宜賜自盡雖不掩義道在無私而禮有縁情實亦多愧王者之法敢忘至公凡百卿士宜悉朕意决李少良等制勑李少良衛從等兇險悖戾反常逆理恣其讒説將搆禍階離間君臣矯誣中外醜圖奸状按驗皆明殿中御史陸班幸任清憲之職仍参儒館之事交結非𩔖包藏不測豈有周行之列容此一兇亦槩同惡法當均罪並宜付京兆府痛决一頓朕每以君子小人只同心異徳必先觀行然後察言豈兹譖讟能廽聼斷夫招賢納諌君之休也獻直盡規臣之節也常亦仄席思理佇聞政道豈謂奸慝紊兹彞倫湏判忠邪以正刑典凡百有位宜悉朕意姜敬初自盡制𠡠不敬之大在於毁犯園陵自擅之重切於矯誣詔令有此亂常之道必貽無赦之責姜敬初自以頑劣得參姻婭録其先効擢在西臺素無行能已速官謗朕永感霜露式瞻松柏以其職司俾徃底事輙於禁域擅鑿連岡當衣冠之出遊臨嵗月之所建既有犯於神御大不利於王室其不可固有所專一昨臨遣再三戒𠡠無君棄命兇蠧尤深書不云乎刑故無小况釋之有陵土之議申屠致廟垣之誅死未塞責不㤀私眷特緩嚴刑宜賜自盡史忠烈王臣子等忝從所職敢有挾邪事既同科法當均罪亦宜賜自盡其家資並収沒其駙馬裴倣雖不知情合當縁坐宜削官爵拘於私第永清公主亦隨在宅仍絶朝参使知警懼朕自君臨每思刑措豈圖戚里干我國章任匪其人有慙所鑒議法難恕撫懷増傷百辟卿士知朕意焉劉希䢰自盡制𠡠合一體者君臣之分持二心者天地同誅搆兹亂階與衆共棄開府儀同三司行太僕卿兼御史中丞充神䇿軍兵馬都虞使淄川郡王劉希䢰幸以㣲謬榮秩典司禁戎作我心膂外雖承命内不盡忠泄漏朕言㡬危吾事念常自任使冀以自新分委戎柄授之經畧而干冒貨賂溪壑無厭恣以苛刻師人積怨輙懷顧望潛蓄異圖假談咎徴上悖天理誘吾忠良之士妄言禍亂之端惡状已彰情在難恕頼重賢竭力沮發奸兇遂命公卿兼之法吏再三訊鞫情欵昭然戮市尸朝未云塞責氂纓盤水尚許歸全特從寛典宜賜自盡朕臨馭萬邦於兹九稔每以外攘夷狄未戢干戈常亦推食觧衣躬撫將校義均休戚期保終始神明所知誠契未負禁網踈闊小過必遺豈虞奸臣有此干紀罪成惡稔以寘嚴科天下之法不可私也刑其無捨良用撫然文武庻寮宜悉朕意誅元載𠡠任賢去邪懸於常典奬善懲惡急於時政和鼎之寄匪易其人中書侍郎同中書門下平章事元載性頗奸囬跡非正直寵待踰分早踐鈞衡亮弼之功未能經邦成務挾邪之志恒以罔上面欺隂託妖巫夜行觧禱遂行圖非望庻逭典章納受賍私貨鬻官秩凶妻忍害暴子侵蛑曽不隄防恣其凌虐行僻詞矯心狠貎恭使沉抑之流無用自逹賞罰差謬罔不由兹頃以君臣之間重於去就冀其遷善掩而不言曽無悔非彌益凶戾年序滋逺釁惡貫盈將肅正於朝猷俾神明於憲納宜賜自盡朕渉道猶淺知人不明理績未彰遺闕斯衆致兹刑辟憫愧良深黽勉行之務申沮勸凡在中外宜悉朕意劉宴賜自盡𠡠亂常干紀罪莫大焉除惡去邪刑其無捨忠州刺史劉宴性本姦囬志惟兇慝頃司邦賦歴踐朝倫割削為功毒痛黎庻按問贓賄不知紀極朕將崇政本不去憸人猶是含垢務全大體俾從降黜尚列藩侯黷亂之辜掩而不問旋乃結聚亡命擅興師徒罔有悛心力行無度違於人神惡跡彰聞受命連率閲實其罪而蒐乗補卒遍於鄉閭執鋭被堅出乎郊境拒捍朝㫖威脅使臣人之無良一至於此孽由自作法所不容正其典刑以懲姦蠧宜賜自盡仍令庾准差官勾當處置聞奏誅劉闢𠡠劉闢生於士族别蓄梟心驅刼蜀人拒捍王命逞其狂逆詿誤一州俾我黎元肝腦塗地賊將崔綱等同惡相扇至死不囬咸宜伏辜以正刑典劉闢男超即豺狼醜𩔖難議生全務盡之刑同𩔖九人並宜處斬誅李錡并男師囬𠡠李錡幸國宗屬早列方隅德宗藉有土之權委之以泉貨順宗重維城之寄授之以旌旄恩深兩朝榮溢當代朕恭承寳祚首命端揆君臣之分益親天地之恩彌渥偽詞三上懇請入朝推以至誠許其重任曽不知居不疑之地懷不測之端有梟獍噬食之心恃牛羊項領之力久蓄亡命敢有亂常謂干戈可得而恃悖言肆口逆状淊天滅身之辜擢髮難數國有大典與衆棄之為人除害非朕敢捨致兹用辟終所愧懷李錡并男師囬准法處斬其餘支黨已從别𠡠處分誅殺武元衡賊張宴等𠡠𠡠張宴李惠嵩李寓嚴清受命孽臣害我良弼兇虐之甚古今所無雖奸源不窮而天網難漏擒捕斯獲兵刃俱存自相證明遂得情實宜從極法以快衆心并康少賁造端合謀不可異等宜並處斬張公佐李少寕徐良李胡弟奴髙志廵田再興楊日暉李進胡袍直劉憲生秦詮及李惠嵩妻何馬等並合從坐况属同情宜付京兆府决痛杖一頓處死蘇表藏畜兵器衒耀軍謀朋遊悉無頼之徒取受多不軌之物屬當捜索爰得其人京輦之下豈容此輩宜决杖八十配流費州其妻阿康奴綠耳等不識隂情難書罪罰趙環等妻何樊阿唐張宴女二初則不知終然同惡悉京兆府各决二十放其鎮州進奏趙環并官健及王承宗行官家人魏昇朝等一十八人並赴京兆府収管待後疏理處分侯倫李莫雖言已歸本道欲於何處逃刑待搜獲日准例處分張宴趙環等七人如更有親族並宜搜檢准今年八月𠡠處分其刀劎器械等並付所由准法處分唐大詔令集巻一百二十六
