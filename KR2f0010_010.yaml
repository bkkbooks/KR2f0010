body:
  text: 唐大詔令集卷十宋宋敏求編帝王冊尊號赦下元和十四年冊尊號赦長慶元年冊尊號赦寶厯元年冊尊號赦㑹昌元年冊尊號赦㑹昌五年冊尊號赦大中二年冊尊號赦乾符四年冊尊號德音痊復太上皇康復詔疾愈德音太和八年疾愈德音咸通八年痊復救恤百姓僧尼勑冊尊號赦下元和十四年冊尊號赦朕聞惟人戴后因事必極於推尊惟辟奉天有善必歸於讓德式敷景化以答𤣥功居有勞謙之思進多滿假之懼緬自逺古何嘗不由是而致理焉朕獲纘睿圖祗膺神器上奉大祭下安羣生恭已臨軒兢懷馭朽志欲周於四海念常切於一夫旰食宵興惟恐失墜運屬休泰時丁小康方隅廓清氛祲銷蕩斯乃上荷乾坤之垂祐宗社之降靈下賴卿士之協心戎臣之宣力端拱嚮道推誠任能豈豫寡昧用集丕績况至化猶鬱勤憂未寧而中外諸臣文武多士纍陳懇疏並進昌言願獻鴻名以增虛美抑衆心而率籲轉切顧眇身而內愧靡安乃撰吉辰爰受典冊禋告於清廟䖍聞於昊天當兹盛儀夕惕增勵於戲朕自御極再加景號在徽章而孔備諒浮實而多慙宜因行慶之辰誕布惟新之澤與物咸遂永孚於休可大赦天下自元和十四年七月十三日昧爽已前大辟罪巳下咸赦除之惟故殺人及官典犯贓不在此限左降官量移近處已經量移者更與量移如復資者即任便赴選集亡官失爵放歸不齒者量力收叙前資見任官因瑕纍未經録用并左降官事情可恕才行足稱者宜簡拔奬用淄青舊管內官吏等將士百姓等縱有跡同惡逆掛涉流言事在往時一切不問京畿今年秋稅青苖及𣙜酒錢每貫量放四百文從元和五年至十年已前諸縣百姓缺負錢物斛斗等委京兆府踈理減放淮南浙江東道宣歙江南西道湖南福建山東南道荆南等九道今年秋稅錢合上供者每貫量與減放度支鹽鐵户部應有逋懸並委本司踈理具可放數聞奏比來州縣並不定户貧富變易遂成不均前後頻有制敕長吏不盡遵守今宜三年一定必使均平內外文武見任及致仕各官三品已上賜爵一級四品已下加一階仍賜勳兩轉神䇿六軍金吾皇城威逺諸道將士經淮西淄青兩度立功者更賜勳兩轉二王三恪及文宣公神䇿六軍金吾皇城威逺等諸軍應在城內蕃客並節級賜物侍中韓𢎞讀冊官崔羣讀寶官皇甫鏄並各加一階已至三品者賜爵二級撰冊文官崔羣與一子正貟官其餘應職掌行事加階賜勳有差故尚父子儀贈太尉秀實及張巡許逺南霽雲顔真卿杲卿子孫各與官及出身寶應興元功臣各賜勳爵天下諸色人有賢良方正能直言極諌博通墳典逹於教化軍謀宏逺堪任將帥詳明政術可以理人者委內外官各舉所知當親自䇿試中書門下選黜陟使分巡天下百姓髙年者頒賜有差長慶元年冊尊號赦元稹我髙祖太宗化隋為唐奄宅區夏包舉四海全付子孫其何事哉彼昏盈而我勞劬也明皇承之能大其業六戎八蠻罔不貢奉由是庶尹弛政庶吏弛刑視人不勤視盜不謹燕冦勃起洞無籓籬六十有七年兵革大試其何事哉據易安而怠漸萌也逮我聖父勤身披攘斬斷誅除天下略定曽是幽冀賜豫懷來荷賴皇靈丕訓不墜環嵗之內二方平寧粵豫何功時帝之力而卿大夫猥以大號加豫眇身讓於四三益甚其請皇太后始聞其事歡然慰心慈㫖丕臨臣誠上迫祗受典禮凛乎豫懷尚念昔者七十二君莫不升中慶成自以為堯舜莫已若也然而不為堯舜之行者來代無𫝊焉朕嘗推是為心不欲名浮于實今卿大夫謂我為文武孝德矣其將何道以匡豫豫其業業兢兢日慎一日慕陶堯虞舜之行以自勉思文武憲章之道以自勤豫茍不思無忘納誨於戲溢美之名既不克讓潤物之澤夫何愛焉可大赦天下自長慶元年七月十八日昧爽已前罪無輕重咸赦除之惟故殺人并官典犯贓不在此限應左降官及流人未經量移者宜與量移近處有左降官流人本因犯贓得罪者宜依今年正月三日制處分京畿諸縣及度支鹽鐵户部負缺各疏理放免有差應經戰陳之處所在州縣收瘞遺骸仍量事與槥櫝兼以禮致祭李師道吳元濟自絶於天並從誅滅念其祖父嘗事先朝墳墓所在並不得令人擅有毁廢愛人本於省賦雖在必輕國用出於地財又安可闕今淮蔡并山東率三十餘州約數千里頒賜或踰於巨萬給復有至於連年應河北等州給復限滿處置宜委所在長吏審詳墾田并桑見定數均輸稅賦兼濟公私每定稅訖具所增加申奏其諸道定户宜委觀察使刺史必加審實務使均平京兆府亦宜准此其百司職田在京畿諸縣者訪聞本地多被所由侵隱抑令貧户佃食蒿荒百姓流亡半在於此宜委京兆府勘㑹均配務使公平其京兆百姓屬諸軍諸使者宜令各具挾名勑下京兆府一户之內除已屬軍使餘父兄子弟據令式年幾合入色役者並令京兆府明立籍簿普同百姓一例差遣頻年已有制勑處分委京兆府舉明舊章條件聞奏刑獄所繫理道最切如聞比來多有稽滯一拘囹圄動變炎涼自今以後宜令御史臺切加訪察每季差御史巡囚事涉情故或斷結不當有失政刑具事由聞奏其天下州縣並委御史臺并出使郎官御史兼諸道巡院切加察訪近邊所置和糴皆給實價如聞頃來積弊頗甚美利盡歸於主掌善價不及于村閭或虛招以奉於强家或廣僦用資於游客若不嚴約弊何可除宜委度支精擇京西京北應供糧軍并和糴院官并營田水陸運使切加訪察仍作條疏檢轄速具奏聞應停諸道年終勾并不許刺史上使并録事參軍不得擅離本州委御史臺切加糾舉內外文武見任并致仕官賜官爵有差神䇿六軍金吾威逺皇城將士普恩之外各賜勳三轉大長公主公主嗣王郡主縣主神䇿六軍金吾威逺皇城等諸軍將士統軍以下兼將士等長行立仗及守本軍本營者各賜物有差鴻臚禮賔院應在城內蕃客等並節級賜物隂山貴女來迓天孫㑹王明庭克觀盛典念吾妹之將逺於禮賔而宜加其回紇公主别有賜物攝侍中讀寶户部侍郎平章事杜元頴中書侍郎平章事崔植各加一階撰冊文官與一子正員官奉冊奉寶綬書玉冊書寶官各加兩階進寶綬進冊中進中嚴外辨禮習儀贊導押冊押寶綬舁寶冊官各加一階其餘應職掌行事官并寫制書官太常修撰儀注禮官并內定行事中使三品已上各賜爵一級四品已下加一階仍並賜勳兩轉鐫造玉冊并填金事造寶裝寶官等各賜五十段尊師重傅有國常經李逢吉韋綬薛倣丁公著等普恩之外各加一階如已至三品四品者賜爵一級天下百姓九十已上者委所在長吏量加存恤孝子順孫義夫節婦先以旌表者亦量加優恤五嶽四瀆名山大川并自古聖帝明王忠臣烈士各令所在以禮致祭寶厯元年冊尊號赦門下朕聞奉天地之大統必酌於人心荷祖宗之誡訓必參於國典顧惟眇身守任重器道未能被物德不足蓄身賴于宗公碩老輔導承弼享祧奉鬯熏燎告𤣥履厯正元敷施大號庶萬方咸若四表穆然皇祖披攘之基列聖焦勞之業恬焉而有泰焉而居晝以度心夜以省已其何德以堪之方將法乾以行健體咸而致和執冲以固髙守約以持滿而文武百辟章奏四上以為人心不可以曲讓國典不可以矯違亦用慰於太皇太后皇太后之意屈而後俞諒非獲已豈不以子非生知欲以徽稱懿號誘掖勸慕之乎將使循名而勉其實力實而應其名乎然則豫方且以為韋絃方且以為針誥懋於皇極庶無尤違是宜與物同利惟新大澤可大赦天下自寶厯元年四月二十二日昧爽已前大辟罪已下已發覺未發覺已結正未結正擊囚見徒罪無輕重咸赦除之惟故殺人及官典犯贓不在此限㑹昌二年冊尊號赦門下昔我髙祖太宗始造區夏闢乾坤以覆載揭日月以照臨盛德耿光格于上下昊天有成命我二后受之列聖丕圗光大其緒文綏武靖奕葉連枝逮豫纘修罔敢失墜誠欲追蹤往昔貽範將來陶末俗於至和返太朴於已散而道不足以居域中之大文不足以成天下之化恭己南面夙興夕思遐想古理歉然豫懷至於嗣嵗豐穰寰海康靜妖沴滅息華夷大同兹實鑒祐自天匡救在下諒非己出安敢自多而三台百辟陳忠瀝懇加我大號其何以堪謂豫守文宜述先志抑而不行者三請確而不拔者羣誠豈貪在己之名姑念從人之欲祗膺典冊良深惕厲於戲顔子匹夫也猶曰舜何人也矧有其位行其教化而不思齊其道也尚念交修俾克用乂今維夏長養之時動植之物莫不自遂思有以導迎和氣生活吾民是用稽犧爻之作解法虞書之肆赦推恩宥過與物同休可大赦天下自㑹昌二年四月二十三日昧爽已前大辟罪已下已發覺未發覺已結正未結正繫囚見徒罪無輕重咸赦除之惟犯十惡叛逆已上故殺人及官典犯贓不在此限㑹昌五年冊尊號赦門下王者事帝必嚴禋祀之容臣下歸功爰極推崇之義既膺顯號式展盛儀因時布和順嵗更始前聖垂範逮豫是遵矧以眇身幸逢昌運雖履冰惟懼而涉道未周繄我輔臣洎兹列嶽內盡交修之志外分共理之憂乃者敵衆乖離部族欵附收帝子於氊裘之所致名王為冠帶之臣堅昆來朝不逺萬里蠻貊向化克同九州重以上黨狂童竊襲叛迹問罪之師既集元凶之首遂梟廓清亂風洗滌汚俗翦逆辨而故都底定竄摩尼而壞法永除由是退惡進賢化行令舉刑奸贓之吏破黷貨之家此皆宗社降靈助成時政豈朕涼德獨擅厥功而中外諸臣文武多士纍陳懇疏再舉鴻名辭不獲從被此虛美是用䖍告清廟明禋上𤣥煙燎所升靈貺如答既展郊禮重申國經宜因行慶之辰誕布維新之令同我景福永孚於休可大赦天下自㑹昌五年正月三日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之大中二年冊尊號赦門下我國家披皇圗以立極執文象以升中睿嗣神宗重熙纍盛逮豫稽古考聖紹復中興洗滌宿氛廓開昌運天命不易賜豫元符荷祖宗之耿光致寰瀛之小泰干戈載戢風雨順時北狄來賔西戎效欵豈豫菲薄汔此肅清皆中外元寮文武多士同心協贊而使之然益用兢慙以戒盈滿而乃纍陳丹懇願上鴻名牢讓不從瀝陳彌切於戲昔賢有云舜何人也我何人也茍或讓之不遂豫亦敢不思齊今百執事謂豫曰聖敬敢忘湯武日躋之詩謂豫曰文思敢忘放勳欽明之典謂豫曰和武敢忘保大之功謂豫曰光孝敢忘繼志之義以是自勉庶無悔焉浮實之名既不獲已乘春之澤當務惟新可大赦天下自大中二年正月三日昧爽已前大辟罪已下已發覺未發覺已結正未結正繫囚見徒罪無輕重咸赦除之惟犯十惡五逆已上故殺人及官典犯贓不在此限乾符四年冊尊號德音天地運無私之道以遂羣生帝王宏在宥之仁是章含垢得不廣沾沛澤昭洽寰區爰施解網之恩用布垂衣之化朕君臨大寶子育含靈前嵗中外臣僚藩方將帥獻我徽號詢於典章雖云前赦不遙既受鴻名咸施慶澤禀列聖之法嗣致兆人之勸康然以赦宥恐頻變通宜審權停舊典再及新春每念貶降遐荒遷流裔土傾心望闕延頸祈哀繫於朕懷常深惻憫宜順陽和之候追行蕩滌之恩自乾符四年正月五日已前京畿及天下州府大辟罪已下見禁囚徒各委長吏遞減二等限五日決遣唯十惡五逆故殺人及官典犯入已贓持刀行劫合造毒藥不在此限於戲朕居億兆之上於今四年兢兢業業如履冰馭朽茍有闕教道可致時雍未嘗不更自勞心尤思致理况允契羣臣之望欽承列聖之規特降鴻恩獲遵彞典今則已覃惠澤俾洽生成復遇陽春同均煦育宣布中外深體朕懷痊復太上皇康復詔書不云乎一人有慶兆民賴之朕䖍奉大安愛敬崇極永言之養祇栗斯在近日聖躬違豫寢膳有虧憂懼在懷不遑寧處博求醫術備盡蠲療祈告明靈具陳懇篤上𤣥降福遂䝉昭祐應時康愈萬福咸宜喜幸之隆實兼家國思班愷樂洽于卿士然而尚齒崇孝德教所先饗餼是加義超常等諸州都督刺史及文武官人老人八十已上并孝子旌表門閭者並宜節級賜物以申饗宴庶使萬國之內同此歡心施於四海皆知朕意貞觀四年七月疾愈德音朕遐思三古旁考百王邁德彰仁在於兢慎故詩稱翼翼易羡乾乾惟此之格言豈忘於終日况天地之仁莫先於利物朕乃者膳飲非適興居不時風霜所侵遘厲瘧疾賴上𤣥降鑒列聖垂休尋克有瘳至於安節深慙慎德重切貽憂爰因康復之初式表兢勤之至况江淮旱歉滑鄆水灾方念恤人寧忘約已應緣御服及器用在淮南浙西宣歙等道各供進者并端午降誕常例進獻等一切權停其諸道每年准㫖條合貢者委度支商量疏理如非切要涉於冗廢者一切停進夫適情恱目肆巧雕文玩好雖充農桑實蠧朕將齊服省用每念黎元應諸道除常貢外不得别進玩好之物近日諸道多奏祥瑞且休徴所感靈跡所昭必驗祥經應𤣥化自今已後除合准式申奏外餘一切不得妄有進獻虛為煩費卑宫菲食常遵大禹之心馳騁畋遊每奉𤣥元之誡朕勞思惜費恭念好生將欲濟人期於尅己每日供御及供宫內食料等一物已上各委本司商量節減仍具所收費用數速分析聞奏當付度支管計以添充經用五坊鷹狗之類量留充備搜狩之外一切盡放其淮南等道當臨遣使臣别有處分於戲天鑒在上敢不嚴恭人視在下敢不兢畏既驗有喜之兆永懷無逸之規凡在中外宜表朕意長慶二年二月大和八年疾愈德音朕祗若天命纘承睿圗正統紀以清庶方序彞倫以貞百度栗栗寅畏於兹九年雖儉已飭躬推誠育物懼有未至不遑安寧屬節氣交時疾恙攖體列聖垂祐涉旬復初既上慶於兩宫宜覃恩於兆姓庶與寰宇同兹福祥自大和八年二月九日昧爽已前天下應犯死罪降徒流已下罪遞減一等唯官典犯贓及諸色人所由破用官物故殺人十惡等罪不在此限左降官流人宜准去年八月十九日敕即與處分為政之要必在去煩厚下之恩莫先已責應度支户部鹽鐵積缺錢物或囚繫多年資産已盡或本身淪沒展轉攤徴簿書之中虛有名數囹圄之下常積滯寃言念于兹所當矜恤其度支户部鹽鐵應有懸缺委本司具可徴放數條流聞奏不得容有奸濫在京諸司使食利錢已納利計五倍已上者本利並放其有攤徴保人納利計兩倍已上者其本利亦放免京邑之內本無榷酤屬貞元用兵之後費用稍廣始定店户等第令其納𣙜况萬方所聚私釀至多禁令既不可施榷利自無所入徒立課額殊非惠人其長安萬年兩縣見徴榷錢一萬五千一貫八百文若先缺者並宜放免其榷酒錢起今亦宜停比者滄冦干紀稽誅數年諸道興師纍獻戎捷時方討叛難議釋縲免死戍邊已有恩貸今滄州一道久被朝章念其懷土之心必有向隅之嘆俾之遂性用洽優恩其諸道所送滄州將健配流及邊鎮營田役使者並委本道據見在人放歸本管如有已效軍職及自有生業不願去者亦任便住董昌齡自雍州纍平溪洞兵威所向首惡皆擒言念蒼生無非赤子况在荒徼尢當撫循其溪洞如有未歸附者向後非因侵擾更不用進討仍加存撫各使懷安所獲黃洞百姓並分配側近州縣令自營生不得沒為奴婢將賞充給如元是奴婢者即任充賞南海蕃舶本以慕化而來固在接以恩仁使其感恱如聞比年長吏多務徴求嗟怨之聲達於殊俗况朕方寶勤儉豈愛遐琛深慮逺人未安率稅猶重思有矜恤以示綏懷其嶺南福建及揚州蕃客宜委節度觀察使除舶腳收市進奉外任其來往自為交易不得重加率稅天下諸州府如有寃滯未申宜委御史臺及出使郎官察訪聞奏朕百靈所祐獲遂痊和䖍奉神休敢忘昭報其五嶽四瀆天下名山大川各委所在長吏致祭仍加豐潔以副精誠朕以寡德上承丕搆宗社流慶𤣥穹叶靈微恙愆和旋就康復渥澤恩及于人瘼敬戒先自於朕躬俾我華夷共歡富夀中外臣庶宜體豫懷咸通八年痊復救恤百姓僧尼敕敕朕俾寒暑致疾綿滯經時今旬朔之間寢膳已復䝉天地保祐宗社寵靈既疾痛之有瘳念被羸之無告為之父母得不憫傷慮赦令之或頻則奸人之得計倘恩惠之逺布兾窮氓之稍蘇應天下百姓僧尼道士女冠等有年七十已上疾病癥痼委頓牀榻者宜各賜絹兩匹在軍旅行陳經敵傷害手足眼目不能營生亦各賜絹兩匹應州縣病坊貧貌多處賜米十石或數少處即七石五石三石其病坊據元敕各有本利錢委所在刺史録事參軍縣令糾勘兼差有道行僧人専勾當三年一替如遇風雪之時病者不能求丐即取本坊利錢市米為粥均給饑乏如疾病可救即與市藥理療其所用絹米等且以户部屬省錢物充速具申奏候如定數即以藩鎮所進賀疾愈物支還所司此敕到仰所在州縣寫録敕榜於州縣門并坊市村閭要路其州縣所給恤絹米恐下吏之所隱欺仍委刺史縣令設法頒布不得令不到本身所在給恤之後一一分析聞奏俾令速濟疾病稱朕意焉咸通八年十一月六日唐大詔令集卷十
