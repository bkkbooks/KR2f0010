body:
  text: 唐大詔令集卷八十四宋宋敏求編政事恩宥二遣使往諸道疏决囚徒敕以春令减降囚徒敕以春令减降囚徒德音原免囚􅑫德音大厯四年大赦大厯五年大赦大赦京師三輔制恩宥二遣使往諸道疏决囚徒敕敕朕𬗟稽古訓思致人和爰發由衷之詔㫖行順時之政令孟夏初吉三農在期禮先决於薄刑義必寬於輕繫既聽其令用軫於懷雖囹圄之間少聞於冒犯澄清之使素盡於忠公尤慮吏有煩苛人或寃滯是爽和平之氣殊乖敬授之心其天下見繫囚徒及事發應推身不禁者即宜差使分往諸道量事疏决及宣布時令除犯贓賄十惡死罪不赦自犯徒以下特宜放免廽日聞奏務在欽恤以稱朕懷開元二十六年四月以春令減降囚徒敕國之用刑兼在於慎恤王者布澤亦在於乘時所以大易陳規必議於獄周官設教遵於中典朕恭臨寶位憂念黎元乾乾之心日慎一日况兵戎未息政役尤煩哀此下人無忘夕惕如聞州縣之內多有纍囚囹圄之間動淹時序每切納隍之慮常懷解網之仁屬陽春和布品彚咸逹宜覃在宥之澤俾叶生成之化其天下見禁囚徒死罪從流流罪以下一切放免其十惡反逆及造僞頭首強盜劫殺官吏犯贓枉法等害政既甚在法難容不在此限其諸供司及作曹非切要外並宜减省京畿諸色和糴一切並停其天下百姓有灼然單貧不存濟者緣租庸先立限長行每鄉量降十丁尤恐編户之中懸磬者衆限數既少或未優矜其實不支濟者宜令每鄉量更矜放待資産稍成任依恆式以天下未寧頻申赦令公私庶務優恤蓋多載覃宥過之恩庶及措刑之美宣示中外知朕意焉乾元二年二月以春令減降囚徒德音乘時布澤有國之彝訓議獄緩刑前王之茂典由是洽其麛卵殷湯宏解網之仁順彼陽和漢后有録囚之詔育物施惠仰惟舊章朕纘服鴻業祗膺寶位日旰忘食中夜求衣慮一物之失所憂四方之未乂雖身居黃屋而志在蒼生今寇孽為虞征輸未息尤恐提戈釋耒未有厚於人時置棘理梧或慮盈於幽繫屬三陽啓泰萬物遂生宜覃在宥之澤庶叶惟新之令其天下見禁囚徒死罪降從流徒以下並宜釋放京城宜令中書門下即分往府縣御史臺大理寺即親自按問决訖具狀聞奏諸州府各委所由長官准此處分諸色流人及左降官等所由類例並與量移仍委中書門下覆奏取處分其先緣安祿山僞署三司有名應在流貶者原情議罪負國誠深朕已捨其殊死竄於荒徼固當與衆共棄長為匪人然皆邦家舊臣常掛纓冕使其終沒裔土永匿慙魂不若貸以殊私俾令效節亦准例處分兼委中書門下量輕重類例奏取處分比緣竊盜之內干戈脅從白創臨頸胡寧忍决所有陷於凶黨茍免者多前後詔書頻已該及其史思明將士及僞署官屬等有束身歸順並率衆來降官爵如初一無所問以城邑等降者仍别加封爵其凶黨之流亦同此例天實臨照朕無食言王者設教務農為首今土工方起農事將興敦本勸人實惟政要宜令天下刺史縣令各於所部親勸農桑百姓中有勤勞稼穡積其菽粟或贍於閭里或能益軍儲委所由長吏具狀奏聞當特與甄賞仍令有司苐髙下量酬五品以下官勳其百司及州縣興工力役不急之務一切並停諸軍兵健應在行營有羸老病疾不任戰陳者各委節度使速揀擇放還路次州縣量加濟恤諸色番役各令所司減省放其營農且寇孽未平軍戎尚備氓庶之內征賦尤煩朕所以親帥公卿躬行節儉而詔書屢下蠲免蓋多至國計軍儲取給而已猶欲纍加損抑以惠黔黎宜令中書門下勾當令度支使與諸供司一切减省應可蠲免每司各條件聞奏當使施行上元二年正月原免囚徒德音元首之義以人為心外有凋傷內懷慘怛罪歸於已情見乎辭伯禹深泣辜之仁漢王下哀痛之詔與理同道惟刑是恤朕志宏覆載運屬艱難思措大刑俾登夀域風以解愠時當發生國有舊章已懸書於象魏恩成在宥宜釋罪於狴牢其天下見禁囚徒罪無輕重一切放免其官典犯贓法雖難恕特從寬典許以自新宜納贓放所犯罪左降官等即與量移近處諸色流人及效力罰鎮人等並即放還其有亡官失爵亦與收叙比來兵革不息米榖未豐百姓流離至於困弊戰士暴露頗聞闕乏或有結聚及有違軍令但能改過自效前事捨而不論艱虞以來多冒刑辟道存善貸屢有德音庶其最靈咸自改勵宣示中外知朕意焉大厯四年大赦敕至理之代先德後刑上歡心以臨下下欣然而奉上禍亂不作法令何施去聖久逺薄於教化簡書填委獄訟繁興苛吏舞文寃人致辟思欲刷恥改行厥路無由豈天地父母慈愛之意也朕主三靈之重託羣后之上夕惕若厲不敢荒寧內訪卿士外咨方嶽日不暇給八年於兹而大道淳風鬱而不振四郊多壘連嵗備邉師旅在外役費尤廣賦與轉輸疲耗吾人困竭無聊窮斯濫矣下愚暗昧不見刑網戎士在軍未習法令犯禁抵罪其徒實繁狴牢之間未詳其事實吏議不决動淹夫時序傷沮和氣屢彰咎徴此皆朕之不明教之未至上失其道而繩下以刑敢不罪已以答災眚且人者君之支體害之則君有所傷刑者教之輔助失之則人無所措慮有寃濫慘然憂傷用明慎罰之典俾宏在宥之澤其天下見禁囚死罪降從流流以下罪釋放其左降官及流人并移𨽻等並與量移仍委本司即勘責送名中書門下奏聽進止如聞州縣官比來率意恣行粗杖不依格令致殞使斃深可哀傷頻有處分仍聞乖越自今以後非灼然蠧害者不得輒加非理仍委觀察節度使嚴加捉搦勿令有犯如違録名聞奏宣示中外宜悉朕懷大厯五年大赦門下惟辟奉天作人父母若天垂戒於上人不安於下則修德勤政以盡至誠恤刑獄之寃抑痛閭閻之疾苦招納諌諍旁求賢良允迪前烈率由兹道朕獲承宗廟之重託於王侯之上夙夜齊栗莫敢荒寧推誠以撫萬邦屈已以安百姓憂勤之至日慎一日服御之給損之又損而涉道猶淺燭理不明國經王度多有廢闕加以寇戎驟犯軍國頻勞賦重人竭因之嵗歉田荒業廢逋散相仍每深怵悼頻有蠲降兼亦簡求良吏以惠矜人去除奸凶用逹幽枉大變風俗更張刑政冀人和之漸洽何天眚之屢彰固以朕德之寡昧化之衰薄其咎不逺在豫一人亦由郡邑之政未盡條理或貪以害物或擾以傷農有凌弱暴寡之寃有不均失中之政人無所措多陷刑辟蓋由教道未至豈忍以文法繩之慘然憂嗟深自引慝雖靡草麥秋之候方斷薄刑而薰風長養之時宜寬庶獄大决疏網與之更新其天下見禁囚徒死罪並降從流流以下並釋放內外文武官及前資官六品以下并草澤中有碩學專門茂才異等智謀經武諷諫主文者仰所在州府觀察牧宰精求表薦如所由搜揚未盡遺免林間者即宜詣闕自舉親當策試量能擢用朕每覽漢文詔書至陽和之時草木羣生之類皆有以自樂而吾百姓或阽於死亡而莫之省緬然遐想感歎增懷哀今之人又甚於昔思有贍恤安其居食觀察節度使及刺史各宜訓勵所部使奉科條變貪官之節激廉吏之行其清白明著政理殊尤者具以名聞必加奬擢若冒於貨賄紊我紀綱糾察勿緩當峻刑憲其官人犯贓經恩免罪者並宜申報中書門下及所司不得容其却上自王室多故積有嵗時皆我文武之臣中外戮力今天下既定崇德報功與之剖符𫝊代不絶至於蒞官述職各宜明慎典刑貽慶子孫永同休戚於戲武德貞觀之間有若魏徴王圭李靖李績房𤣥齡杜如晦等扶翼大運勤勞王家尊主庇人匪躬致命咸有一德格於皇天緬然常懷風烈尤在其後嗣沉翳特加優奬如廟宇荒毁即宜修葺無德不報何日忘之其鰥寡惸獨老幼貧窮不能自存者委州府縣吏取諸色官物量事賑給仰招携户口勸課桑農應所在州府有興功役處非灼然急切者宜並停之五嶽四瀆名山大川神明所居風雨是主宜委中書門下分使致祭以逹精誠孝子順孫義夫節婦事跡著者特加旌表頒示中外知朕意焉大赦京畿三輔制門下古者以春季之月布德行惠恤刑振乏朕親執犧牲玉帛獲奉於上帝神祗九年於兹矣克已思理明不能燭昆夷未叙王略猶虞嵗㑹三秦之師日有千金之費悉索幣賦疲於餽軍候甸之間徴求耗竭百榖翔貴關中小歉窮則斯濫安能懼刑因而成盜多有犯法至於軍戎之士致使廪賜不充因之逃亡或抵邦憲事非獲已情亦可察近以露濡之思明發有懷屬禁火之令節方薦鮪於園寢聖祖敷祐景靈告祥先天後時載荷嘉貺以隂以雨又助發生固宜順曲成之仁布維新之命赦罪育物曠然滌除其京兆府及三輔並京城內諸司諸使見禁犯死罪以下特宜釋放有犯未發覺者罪無輕重一切放免如妄論告者以其罪罪之其官典犯贓不在免限頃者魚朝恩夙著功勳委之戎事而徴求黎庶空竭閭閻加之廣有貿易奪人賄利京城之內擅置刑獄恣行忍虐幽執無辜部領師人乖於撫馭資糧刻薄勞役煩苛惡稔釁盈日嬰沉痼念其勳舊許以優間令罷其兵權遂其養疾而宗社降鑒明神所殛羸瘵不起旋至斃亡既往無追一切不問所管將士等同於王事各效辛勤是朕牙爪自致勳業並宜仍舊勿有憂懼蓋以朕誠未感物明未知人失於授任而臻此也今則虛懷引咎親御禁戎必加優寵以表勞績其資聖寺禁人并追捕勘責等即宜並停然以王畿艱弊矜恤疲人蠲稅罷徭與之休息尚恐流傭罕復貧弱未安益用憂勤諒資約損京兆府百姓承前應缺官物等委所由勘責實百姓腹內者一切放免其在所由腹內者不在免放畿內官人手力資課及府官充職掌名額稍多有所祗供不免煩費并諸縣郵遞路次館驛諸色徴科一物以上並委中書門下與京兆尹即計㑹取責色目一一商量條件處置務令減省以息勞費其諸司使廽易一切並停不急之務亦宜且罷農隙之後然後常式宣示中外知朕意焉唐大詔令集卷八十四
