body:
  text: 唐大詔令集卷十一宋宋敏求編帝王遺詔上神堯遺詔太宗遺詔天帝遺詔肅宗遺詔代宗遺詔德宗遺詔憲宗遺詔穆宗遺詔遺詔上神堯遺詔嗚呼夫受命終畢人之大倫修短之所共同聖賢之所不免朕往逢喪亂思濟黎元櫛風沐雨東征西伐克平宇內從此樂推遂膺景命恭承寶厯但蒙犯矢石羈乘戎旅久厭干戈常思間逸是以拂衣髙謝歸老櫟陽爰委萬機屬之才子所授得人遐邇寧輯四海清宴八表來庭養志怡神於今十載但去秋已來夙疾咸發自爾彌留至於大漸皓首歸全斯何恨矣洮頮慿几略陳素志朕每覽漢文遺詔殷勤嘆焉以為當今之世咸嘉生而惡死厚葬而破業重服以傷生吾甚不取且朕既不德無以佐百姓今崩又使重服久臨以罹寒暑之數以重吾之不德謂天下何吏民令到出臨三日皆釋服無禁嫁娶飲酒食肉此豈非深逹天命哀矜百姓者歟又魏文終制亦有可取朕雖德愧古人豈忘景行屬纊之後三日便殮文武官人三品已下三日朝晡哭臨十五舉音事訖便出四品已上臨於朝堂殿中當臨者非朝夕臨時無得擅哭其方鎮嶽牧在任官人各於治所舉哀三日且今王師四討軍機急速小殮既竟嗣子宜於别所視事軍國大事不得停闕尋常間務任之有司其服輕重悉從漢制以日易月於事為宜其園陵制度務從儉約斟酌漢魏以為規矩百辟卿士孝子忠臣送往事居勿違朕意焉貞觀九年五月六日太宗遺詔夫天命之重緑錯奉其圗書天子之尊赤縣先其司牧而功兼造化橋山之樹已隂業致升平蒼梧之駕方逺至於平冦亂安黎元灑洪災攘大患黃帝之五十三戰商湯之二十七征以此申威曽何足算昔者亂階斯永禍鍾隋季罄宇凝氛曀昏辰象綿區作梗搖蕩江河朕拂衣於舞象之年袖劍於斬蛇之地雖復妖千王莾戮首輗車凶百蚩尤釁尸軍鼓垂文暢於炎野餘勇澄於斗極前王不闢之土悉請衣冠前史不載之鄉並為州縣再維地軸更張乾絡禮義溢於寰瀛菽粟同於水火破舟船於靈沼收干戈於武庫辛李衛霍之將咸分土宇縉紳廊廟之材共垂帶綬至於比屋黎元關河遺老或贏金帛或賚倉儲朕於天下士大夫可謂無負矣朕於天下蒼生可謂安養矣自櫛風沐雨遂成弭沴憂勞庶政更起沉疴况乃漢苦周勤禹偏堯臘以矜百姓之所致也道存物往人理同歸掩乎玄泉夫亦何恨矣皇太子某大孝通神自天生德纍經監撫熟逹機務凡厥百僚羣公卿士送往事居無違朕意屬纊之後七日便殯宗社存焉不可無主皇太子即於柩前即皇帝位依周漢舊制軍國大事不可停闕尋常間務任之有司文武官人三品已上並三日朝晡哭臨十五舉音事畢便出四品已下臨於朝堂其殿中當臨者非朝夕臨無得擅哭諸王為都督刺史任者並來奔喪濮王萊王不在來限其方鎮嶽牧在任官人各於任所舉哀三日其服紀輕重宜依漢制以日易月園陵制度務從儉約昔者霸陵不掘則朕意焉遼東行事並停太原元從人見在者各賜勳官一級諸營作土木之功並宜停斷貞觀二十三年五月天帝遺詔朕聞皇極者天下之至公神器者域中之大寶自非乾坤幽贊厯數在躬則鳯邸不易而臨龍圖難可輒御所以榮河緑錯彰得一之符溫洛丹書著通三之表𬗟稽前古期道同歸朕之聖祖神宗降皇虹而稟樞電乘時撫運逢海沸而屬山鳴濡足橫流極蒼生之已溺援手四嶽救赤縣之將焚重稱九寰止麟鬬而清日月再安八極息龍戰而蕩風波自彼迄今六十六載黎元無𤇺柝之警區宇恣耕鑿之歡育子長孫擊壤鼓腹遐邇交泰誰之力歟朕以眇身嗣膺鴻緒欽若穹昊肅雍清廟顧諟明命載迪彞倫嘉與賢士大夫勵精為政朂已想蛟氷之懼為善慕雞鳴之勤幸戎夏乂安中外禔福亘月竁以覃正朔匝日域而混車書端拱無虞垂衣有截其天意也豈人事乎每導俗匡時既𢎞之以禮讓恤刑薄罰復躋之於仁夀聞九農之或爽則虧膳以共其憂見一物之有違則撤樂以同其戚斯亦備諸耳目非假一二言也憂勤之至庶有感於明靈亭育之懷謂無負於黔庶永言薄德遘疾彌留往屬先聖初崩遂以哀毁染疾久嬰風瘵疚與年侵近者以來忽焉大漸翌日之瘳難冀賜年之福罕再但存亡者人之晦明生死者物之朝夕常情所滯唯聖能通脫屣萬方無足多恨皇太子哲握褒履已敦敏徇齊早著天人之範夙表皇帝之器凡百王公卿佐各竭乃誠敬保元子克隆大業光我七百之基副兹億兆之願既終之後七日便殯天下至大宗社至重執契承祧不可暫曠皇太子可於柩前即皇帝位其服紀輕重宜依漢制以日易月於事為宜園陵制度務從節儉軍國大事有不決者兼取天后進止諸王各封一百户公主加五十户內外文武九品已上各加一階三品已下賜爵一級永徽以來入軍年五十者並放出軍天下百姓年五十者皆免課役廢萬全芳桂等宫𢎞道元年十二月四日肅宗遺詔敕帝王享國天命有常大厯傳歸皇綱無易朕幸以涼德繼承宗祀在常樂問安之日屬元凶開釁之初南奉聖皇北集戎事賴將相同德社稷降靈爰發五原成師一旅丕圖克振華夏乂寧旰昃之心每勤思於兆庶晨昏之禮嘗不匱於庭闈而天禍上延神心未悔正當金革罹此凶災遂遘膏肓惟幾大漸及兹理命獲著誓言庶安國以保人豈嘉生而惡死審以大計屬於公卿皇太子豫仁孝元良聰明齊聖佐成大業能事神祗朕既彌留可守宗社宜令所司當日具禮於柩前即皇帝位應緣朕喪事制度並準聖皇遺詔其諸道節度使都督刺史等並不須赴哀又為兵革未寧郵驛艱弊一切不須専使奉慰朕執喪在疚不食葷羶所設饋奠皆須如在有違本意神亦不歆其祭祀之禮一切不得宰殺且國儲非廣虛費稍多宫掖之間須有釐革所有三宫內人宜量事減省及至德已來籍沒家口非切要者並與放出諸王院內亦宜準此其文武官僚合須褒賞天下百姓宜在優矜每當變易之時皆下惟新之命並委皇帝節級處分嗚呼股肱勳臣敬保元子事居送往諒在於兹宣示萬邦宜從朕意寶應元年四月十八日代宗遺詔朕以眇身祗奉鴻業不能光宣大訓嘉靖萬邦奉祖宗重熙之德答公卿寅亮之勤旰食宵衣痛心疾首嗚呼天地之理死生常數疾既大漸彌留日臻惟懷永圖嗣守丕業皇太子元良繼明睿哲齊聖宜陟元后保守宗祧宜令所司當日具禮於柩前即皇帝位仍以司徒兼中書令汾陽郡王子儀攝冡宰其喪儀及山陵制度務從儉約並不得以金銀錦綵為飾天下節度觀察團練等使刺史等並不須赴哀祭祀之禮亦從節儉其三宫內人宜令量事減省諸王院亦宜準此其天下人吏敕到後出臨三日皆釋服無禁婚娶祠祀酒肉其宫殿中當臨者朝夕各十五舉音禮固從宜喪不可久皇帝宜三日而聽政十三日小祥二十五日大祥二十七日而釋服獲奉宗廟之靈永終天祿所痛不得與佐命勳賢庶尹卿士顧命永訣以託萬方內外腹心之臣文武忠良之士敬保元子以安家邦嗚呼其聽朕命大厯十四年五月德宗遺詔朕承八聖之休德荷上天之眷祐嗣守丕訓不敢荒寧賴宗廟之靈羣后之力戡定大難以康兆人嚴恭寅畏二十有七載今天降疾不興不寤是用審訓宜聽朕言皇太子誦元良繼明睿哲齊聖孝友和惠恭敬溫文必能覲祖宗之耿光紹邦家之大業宜於柩前即皇帝位嗚呼朕常奉聖祖玄元清靜之教勵精至道保合太和每忘已以愛人豈嘉生而惡死咨爾將相卿士方伯連帥其敬保元子永綏萬邦各有叶心同底於道無廢我高祖太宗之休命諸道節度使觀察防禦等使及諸州刺史等膺鎮守之任有軍旅之事所寄尤重不可暫曠不須赴喪以日易月之制宜遵舊典文武官等朝晡哭臨十五舉音朕每覽漢史至孝文薄葬之詔未嘗不嘆息嘉尚緬慕其風園陵制度務從儉約百辟卿士孝子忠臣送往事居無違朕意貞元二十二年正月憲宗遺詔朕以薄德嗣膺寶祚執圭璧以奉九廟垂衣裳以臨萬邦十有六年於兹矣賴天地敷祐宗社降靈內有百辟多士外有州牧方伯文武並用忠賢叶心以弼豫一人以康彼兆庶戡剪羣慝廓清九圍方保和平共登仁夀而萬務所逼六氣咸侵遘疾有加至於大漸用申顧命式合典謨皇太子恆天縱睿哲日躋誠敬惟孝惟友克寬克仁必能承祖宗之丕訓守邦家之鴻業宜令所司具禮於柩前即皇帝位仍以司徒兼中書令𢎞攝冡宰應諸道節度觀察防禦等使及諸州刺史寄任尤切並不須赴哀皇帝易月之制皆依舊典文武官等朝晡哭臨十五舉音其喪儀及山陵制度務從儉約嗚呼始終常禮奚可甚哀漢文至言朕所遵慕咨爾將相洎中外腹心爪牙之臣其敬保元子惟懷永圖以纘我高祖太宗之耿光毋廢朕命元和十五年正月穆宗遺詔敕朕以眇身嗣守丕構雖勤求理道不敢荒寧而保慎或乖遘兹厲疾賴上玄垂祐宗社降靈洎中外庶臣克輔寡德服餌頥養踰於周星而陽氣熇煩宿恙暴作頃刻之際至於彌留伊死生之理必有其分顧託有所豫何恨焉皇太子湛睿哲溫恭孝友明敏自膺儲二休德日新必能嗣於耿光紹我先業宜令所司備禮於柩前即皇帝位咨爾卿士洎方伯連帥敬輔元子永綏萬邦宜叶乃心用底於道宜令門下侍郎平章事李逢吉攝冡宰諸道節度觀察防禦等使及諸州刺史守鎮任重戎旅事殷並不須赴喪易月之制宜遵舊典文武官等朝晡哭臨十五舉音山陵制度務從儉約無禁婚嫁祭祀飲酒食肉其醫官等念其勤瘁亦可矜憐並不須加罪宜便釋放將相卿士中外臣寮送往事居無違朕意長慶四年正月唐大詔令集卷十一
