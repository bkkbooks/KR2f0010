body:
  text: 唐大詔令集卷一百二十宋宋敏求編政事討伐下令百僚議征李師道敕討李師道詔討淄青禁焚燒廬舍敕討鎮州王庭湊德音討王庭湊詔討李同捷詔處分滄州行營敕闕討鳯翔鄭注德音討潞州劉禎制討伐王郢詔討草賊詔討楊師立制削奪李敬瑄官爵制削奪李罕之官爵制討董昌制討伐下令百僚議征李師道敕李師道潛包禍心偽布誠懇緣自淮西用兵已後愆釁屢彰纍有疏陳請捨凶逆當道租稅頻年不送隂通信使數致帛書又逆黨訾嘉珍等蓄聚凶徒謀燒洛邑所圖不軌臨發事彰又使其􅑫燒劫河隂庫倉沮國大計中使李重秀宣諭到本道又縱官健凌暴况又元和十年六月傷害宰相事之端本實啓潛謀凡此罪名皆當不赦朝廷以新平淮寇貴且息人素為含容令其獻效師道自知罪過難掩羣言纍違崔承寵王玄同自將表陳請令長子入侍兼獻沂密海三州林英續來又獻三州圖印并奏其男發日國家務每𢎞貸屈法招綏今忽翻然盡變前意應所陳列無相忘言其師道并軍將健兒表共三道詞頗悖慢宜出示百寮議可征可捨以聞討李師道詔天覆至𢎞為惡者每聞於自絶國章具舉干紀者難逭其常刑玄言至戒於佳兵丹浦本非其樂戰朕纘承鴻業祗奉睿圖居軫納隍動思濟物仗以大信御兹萬邦省躬靡忘於憂勤𢎞道必先於撫諭猶以庶政多乖至誠未孚兢兢之心豈自暇逸近者淮右致討宿兵纍年宗社降靈妖氛克殄方櫜弓而匣刃期阜俗以息人旋議徂征諒非獲已李師道代荷寵榮謬居垣翰功不列於勳籍過難掩於簡書尚復潛包禍心果是偽布誠懇頃屬問罪蔡上徴師合圍助彼寇讎敢為影援隂通信使密致帛書纍抗表章請捨元惡所圖不軌事匪一端遂至伏聚姦凶震驚洛邑焚劫內庫擾動河隂皆欲撓軍旅之深機阻邦國之大計加以擅興甲兵侵軼徐方驅逼戎行凌脅中使惡逾滋蔓志益猖狂乃者盜發京師實啓端本又常賦不入自致愆違凡此罪名皆在不赦朕以新除淮寇務息征師素為含容令其獻效而乃懷其積惡懼彼羣言將佐交馳頻疏疊至疚心首罪請命求哀時降使臣往加宣諭而師道請令長子入侍闕庭願獻三列上歸圖印指期而發飛奏以聞詐為納地之謀翻稔滔天之逆凡所陳列無非怨望露其悖慢之詞備在封章之內明示百辟衆怒一心咸請致誅以懲無上猶為伏念至於旬時乃聞遽越封疆寇掠德棣焚爇村落縱暴挺災大肆鴟張曽無畏忌斯則人神之所共棄天地之所不容罪惡貫盈自當撲滅宜令宣武魏博義成武寧橫海等軍節度兵馬分路並進同力攻討相為犄角其李師道在身所有官爵並宜削奪其淄青將士如能梟斬凶渠者先是六品已下官授三品正員官其先是五品已上官者節級超奬仍與實封五百户莊宅各一區錢二萬貫於戲動衆興師誠有乖於至理養災蓄患恐流毒於生人敷信未化於窮凶格物深慙於菲德甫於寇難遄務討除宵旰在懷良深愧歎庶將去暴永用止戈宣示中外咸令知悉討淄青禁焚燒廬舍敕敕寇孽背恩自取誅剪黎元不幸久陷凶殘王師有征義先拯物茍加殘暴諒匪豫懷况諸軍討伐已畢百姓歸投相繼既足嘉憫尤宜撫存時屬春陽各務農業陶我惠化當令便安其淄青四面諸道兵馬應入賊界收城所至百姓明加曉諭任其營生輒不得妄行傷殺及有拘縶焚燒廬舍掠奪資産開發墳墓等事並宜禁斷詔下之初已有處分今更申敕切在遵行討鎮州王庭湊德音朕嘗讀玄元書至於佳兵者是樂殺人因念自孩提之逮於羈丱不三十年必宜以安人為國本不以窮武為威力顧豫寡昧敢忘遵承為追念以興師已極君臣之分以軫憂而捨罪豈非帝王之道况王庭湊倉卒之際本非始謀接之以恩榮自當展其志義委之以鎮戎必冀效於勳庸禍福無門行之則是弛張在我用亦何常茍推信順便保忠順茍得其衆孰非吾人推而用之式示榮寵宜特捨雪仍授檢校右散騎常侍兼鎮州大都督府長史御史大夫充成德軍節度鎮冀深趙等州觀察處置等使應成德軍將士官吏一切依舊待之如初仍令兵部侍郎韓愈充宣慰使於戲朕於彼三軍惠非不至於彼闔境恩非不周今𢎞寬大之典以應陽和之令使離散者見親愛之樂暴露者歸室家之安各宜感悅以就寧泰布告中外體朕意焉雪王庭湊詔帝王之御大器也上法天意下順人情何嘗不欲舞干羽以致懷來滌舊垢而宏惠貸朕以寡昧獲守昌圗享二百餘年之丕基纂十三列聖之洪業而涉道猶淺燭理不昭德未洽于生靈信未孚于微隱至使河朔殘梗藩臣阻絶既多在豫之責每軫納隍之念頃者滄州拒命將帥専征有國彞章非朕敢赦諒功成于九伐當事止於一方况成德本軍早列勳籍庭湊初意亦獻嘉謀因緣細隙互搆闕聞朝廷闕挂刑書雖欲上陳固難自達及滄德剪定甲兵偃戢拜章辨數納欵鄰封爰闕臺臣俾通王命備聞恭惕延望私恩感激而情動三軍歎呼而聲馳四郡朕猥居兆人之上常懼一物失所雖外示君臣之義實內猶父子之親豈可使覆載之中不沾雨露照臨之下猶隔輝光斷自豫衷靡聽輿議既改之而不闕則待之而如初俾服官榮載膺寄任爵服盡在恩禮用加其王庭湊可依前授金紫光祿大夫檢校司徒兼鎮州大都督府長史御史大夫上柱國太原郡開國公食邑二千户充成德軍節度鎮冀深趙等州觀察處置等使於戲天道之所助者曰順人倫之所重者曰忠為君在于不疑為臣在于不二然後上下交暢以底泰寧當宏令猷勉收來效凡百卿士宜體朕懷洗滌長慶亂臣支黨德音門下皇王之令凶慝必置於嚴誅天地之仁含育亦存乎在宥除惡務絶其根本原情必諒於親疏慮興詿誤之嫌用安反側之舉寬大之典盡滌瑕痕追維長慶之初亂臣賊子之輩人神共憤天地不容頃以論刑是從流竄而東宫親昵之黨亦參帷幄之謀顧愈冒以取恩陷君父於不義必資懲創以蕩姦源議法當然非朕敢赦而曽不知過交搆流言興謗道途扇惑人聽蓋以從前搜捕未盡巢穴猶存再令根尋果獲支黨無非近戚咸伏其辜在臣節而既虧於國章而難逭並已從别敕處分除竄逐遐荒及配諸陵守當外應諸惡黨從祖兄弟子壻妻旅內外親戚門生故吏及比來别居并從疏逺等降德音後一切不問諸司諸使更不用尋勘務徔寬恕俾絶憂疑惟先推鞫得合流者雖已逃竄如獲日準前敕處分頃者屢降明詔以順人心重此究窮蓋非獲已今則更無餘孽永絶猜嫌抒憤之志既申懲惡之刑亦至乘春布澤大與維新明示中外咸知豫意主者施行大中八年正月十一日討王庭湊詔雷霆霜雪天上所以成物明罰敕法聖人垂之易象豈春陽不可以獨化將輔理固在於刑威乎則遏亂禁非法天齊俗諒有為而然也李同捷罪暴寰宇告之則悖寵之益凌亂君臣父子之紀綱棄覆育生成之恩義則綏討之命蓋不得已焉而王庭湊作我藩臣久膺寵命致爵位于擾叛之際齊恩澤于忠義之倫而首扇同捷便自墨縗怙惡之心劇於武兕負法之醜逾于梟獍藩方統帥飛疏互來朝右公卿懇章繼奏皆期鳴鼓問罪奮戈啓行朕道希包荒志在含垢多端曲護大開坦途喻之使致竒功告之將酬重位而傲狠彌甚凶肆不悛形惡言于報章資盜糧于狡寇屢有降卒備驗姦蹤潛軍入援德棣縱燎以焚瀛莫河東易定被毒騷然若尚為包容則孰分逆順其王庭湊在身官爵並宜削奪應諸道與鎮州接界處各宜逐便攻討其鎮州將士如有梟斬庭湊者六品已下便授三品正官先是五品已上官者節級超奬仍賜莊宅一區錢二萬貫如有能率所管兵馬以州來降超三資與官仍便正授刺史錢一萬貫以城鎮來降者超三資與官仍賜錢五千貫如庭湊束身歸朝並與洗雪若執迷安禍罪止其身其於脅汚一切不問於戲原野陳師雖前王亦所難免干戈屢動諒菲德之所興愧咨示輔弼之臣暨於藩守之帥爾尚悉乃忠力匡豫寡昧討李同捷詔王者之御天下也惟其忠誠格以大順臣子之奉君父也效以奔走竭其忠貞故能上下交感家邦用寧其有専上周旋干紀悖戾息棄彞典矯誣當時固人神之所不容古今之未能制者也朕以菲德祗荷鴻業將躋俗於至厚之域致人于無過之地永用勞慮惻然于懷李同捷幸席舊勳不思纘緒斬焉未幾私行墨縗毒殺忠良擾惑將校稽之國憲難逭常刑朕以頃在先朝已稽申旨實遵成命未議改圗庶乎舞階以服有苗因壘而降崇國使臣旁午優詔指明而又越留務之權授之戎帥負海之地置之中華推恩含垢斯亦至矣之惠昭我好生之德若迷而忘復用不自通天網難寬國刑難逭應諸道節度有别鎮行營兵馬比令權受指麾者並依前收管不在抽移之限仍委有司準前調計資糧器械與諸帥類使之豐備勿有闕遺其李祐所統兵馬多至既逼德州自是本道糧餽不乏進取已深宜令依前於當處守禦用圗克捷昔漢破先零營平資糧粟之備晉摧苻寇安石謹上流之師逺猷既恢殊伐斯至且戰期無敵師克在和問罪既彰於有名出征必俟于先勝咨爾列位當體朕懷討鳯翔鄭注德音門下王者之御天下也推至誠以格物委大信以任人故能邦家用寧上下交感所以詔祿爵而不吝待臣下而無疑豈謂變起股肱患生毗倚鑒昧興歎難弭於懷且負德背恩干紀悖戾而古今未有能濟者蓋人神之所不容逆賊鄭注氣本凶狂志懷姦逆害時蠧政卜射張皇行詐而緣術多端黷貨而溪壑難滿情惟點白口可鑠金罔冒包藏為惡滋甚朕九重之內不得備聞擢於妄庸驟列華貫入司喉舌出納爪牙唯務廢忘不思報國棄生成之恩義亂君臣之紀綱妄興妖言前古未有罪同梟獍法在必誅况詔旨既追已離城邑險謀且敗中途遽回又迤邐使人迎接逆賊李憲稽之國憲豈逭常刑其鄭注在身所有官爵並宜削奪將士如有能奮揚義勇執戮渠魁者先是五品以下官者便授三品正員官先是五品已上官者節級超奬仍賜莊宅各一區錢二萬貫如有能率所管兵馬以州郡來降者超三資與官便正授嶽牧仍賜錢帛諸道將士雖各守疆土非為進攻如被侵掩因事立效者亦準前例節級處分賊能從義悔過束身歸朝並與洗雪仍加寵奬幽明可鑒朕不食言欵誠自通即委諸道與奏若不能悛改自取誅夷罪止一身其餘脅汚一切不問其有迫於凶威曽著失節顧存家族事出權時待其平寧並從寬宥將士如有潛謀立功效順被其屠戮者並優加追贈并賜錢帛仍與一子官應州縣百姓陷在暴虎莫保性命誠可哀矜諸軍還境不得妄加殺戮并焚爇廬舍掠奪資産及有拘執以為俘囚如有歸投者諸道據丁壯老弱量加優恤仍給與空間田宅使就生業事平之後願歸本貫者亦聽鳯翔一軍素著忠義每臨霜雪之際實見松筠之心凛然義風簡在朕志其大將軍及軍士並宜坦懷自處勿以為憂兵革既平寵待如故鄭注初到鎮日聞有優賞軍將常例不足為疑州縣百姓亦當復給勉於自效以報令圗於戲佳兵者聖祖之所誡文德者前哲之所崇肆豫寡昧敢忘丕教然以齊庶方者號令立人紀者君臣斯言茍違大倫安設今則絶其奔軼示以申嚴懷柔誠貴於止戈執惡何慙於用武布告中外咸知朕懷大和九年十一月二十四日討潞州劉禎制門下定天下者致風俗於大同安生人者齊法度於畫一雖晉之欒趙家有舊勳漢之黥彭身為佐命至于干亂紀律罔不梟夷禁暴除殘古今大義劉悟頃居海岱嘗列爪牙屬師道阻兵問罪三面開網一境離心乘此危機遂能歸命憲宗嘉其誠欵授以南燕穆宗待以腹心委之上黨招集死士固護一方逮于末年已虧臣節劉從諌生稟戾氣幼習亂風因跋扈之資以専封壤恃紀綱之力以襲兵符暫展圭之儀終上緩之情隙駒為喻魏豹姑務於絶河井蛙自居孫述頗聞於恃險誘受亡命妄作妖言中訶朝廷潛圗左道接壤戎師屢奏隂謀顧苕卵之可矜豈泉魚之是察暨於沉痼曽靡哀鳴猶駐將盡之魂恣行邪僻之志罔感舊恩自樹狡童中使挾醫莫覩其朝服近臣銜命不入於壘門逆節甚明人神共棄其賜官及所授官爵並劉禎在身官爵並宜削奪成德軍節度使何𢎞敬姻連王室任重藩維懇陳一至之誠亟揚九伐之命吳漢任職受詔而初無辦嚴卜式朴忠未戰而義形於內况成德軍嘗以驍騎橫陳百破朱滔戰氣方酣再回魯陽之日鼓音不息三周不注之山魏博軍亦以大斾涉河竟殱師道建十二道之旗鼓以列降人削六十年之厲階盡歸皇化士傳餘勇軍有雄名必能稟酇侯之指縱成葛亮之勛伐咨爾二帥朕所注懷成德軍節度鎮冀深趙等州觀察處置等使金紫光祿大夫檢校司徒兼鎮州大都督府長史御史大夫駙馬都尉雲騎尉元達宜守本官充北面招討澤潞使餘如故魏博等州節度觀察處置等使銀青光祿大夫檢校户部尚書兼鎮州大都督府長史御史大夫上柱國何𢎞敬宜守本官充東面招討澤潞使餘如故潞府曩者烈祖在藩先天啓聖節瑞昭晰績事渙於泗亭鑾輅巡遊金石刻於代邸斯實可封之俗久為仁夀之鄉艱難以來頗著誠節必非固惡咸許自新其昭義軍舊將士及百姓等如保初心並赦而不問昭義舊大將等如能捨逆效順以州郡人衆歸降者必厚加賞如能擒送劉禎者别授土地以報庸其鄉村百姓所在團結歸者亦如爵賞劉悟鄆州舊將及劉從諫近招至將士等喻以善道宜聽朕言凡秉義立名須明大順未有終於所奉上悖君親昔郤至有言受君之祿是以聚黨有黨而爭罪孰大焉田橫能得士心人多致命伏於海島莫敢猖狂及漢髙召之奔走向闕豈嘗違拒漢使止留田橫雄暮殉以成仁不相從而非亂故得其主殁延殊寵光顯令名爾等既有義心宜思改悔如能感喻劉禎束身歸朝必當待之如初特與洗雪爾等舊校亦並甄酬仍委陳夷行劉沔王茂元各進兵同力攻討其諸道進軍並不得焚燒廬舍發掘丘墓擒執百姓以為俘囚桑麻田苗皆許本户為主罪止元惡務安生靈於戲藩維大臣抗疏於外髦雋舊老昌言于朝戒朕以祖宗之法不可私一族刑賞之柄所以正萬邦宜用甲兵陳于原野朕以恩不聽羣臣以義固爭詢日命謀諒非獲已布告中外明體朕懷會昌三年討伐王郢詔王郢江鄉賤卒營伍微才忽撫御之小乖敢憑陵而搆亂迫脅將相恣竊干戈却資財於建鄴之城聚徒黨于狠山之戍尋則浮江泛海掠鎮攻城焚漂三州傷殘萬户又於福建管內毒害生靈陵犯紀綱悖違天地朕為人屈法惡殺好生纍降敕書曲存招諭王郢包藏姦慝誑惑軍師詐示歸降密為抗拒昨者拘留復魯已驗凶狂今聞再犯溫州顯與官軍鬪敵魯實陷在舟楫王師敗於鋒刃兩浙震驚百姓憂擾滔天之罪擢髮難書然以分野興災雖關定數神祗助順必剪羣凶既違雨露之恩寧逭雷霆之殛是以别詮名將更益雄師兼福建之精兵雜畨禺之戰士水陸俱發腹背齊攻須克旬時必破妖孽除先徴諸道五千一百人及福建南海并虔吉衢婺等州兵士外令更抽忠武軍一千五百人感化軍五百人泗州五百人宣州五百人都討一萬五千已上前左武軍大將軍宋皓負關張勇智有韓白英雄纍著戰功再居環衛思豺狼之未滅恥荆棘之猶存誓願長驅速清羣醜今除授檢校左散騎常侍守右龍武大將軍兼御史大夫充江南諸道招討使應新舊行營兵士悉取指揮各宜憤激忠誠淬勵戈戟識機翦撲取勢芟夷速立殊勳迎俟超奬其王郢部下徒黨等或本同謀議或偶被脅從或因窮餓依投或遭俘縲指使所宜捨逆就順去暗趍明勉圗富貴榮華勿受驅除翦戮如生擒及所得王郢頭歸順者當授四品正員官并賞錢一萬貫賜莊宅各一區如能率衆于所在解甲歸降者亦當厚與爵賞明垂信誓必不欺渝凡在忠烈之徒皆宜賈勇增氣乾符三年六月討草賊詔亂常干紀天地所不容伐罪弔人帝王之大典厯觀往代遍數前朝其有怙衆稱兵憑凶構孽或疑迷于郡縣或殘害於生靈初則狐假鴟張自謂驍雄莫敵旋則鳥焚魚爛無非破散而終蓋以逆順相懸幽明共怒近者龎勛拒命王郢挺災結聚至多猖狂頗甚尋則身膏原野喉斃僕姑資財分散于他人親戚誅夷於利刃則有方從叛亂忽悟歸降回吉凶于反掌之間變禍福于立談之際諸葛爽今為刺史朱實見作將軍𢎞霸郎任職于禁營宋再雄䇿名于淮海莫不身名光顯家族乂安近者諸道奏報草賊稍多江西淮南宋亳曹潁或攻劫郡縣抗拒官軍或窘厄商從俘掠進奉出彼入此鳥逝風驅雖云浚利于一時豈不憂危于終日以有限之逆黨敵無數之王師寧論嵗時必自殱滅朕以寬𢎞為理慈愍居心每念蒼生皆同赤子恨不均其衣食各致豐肥寧忍迫于鋒鋩斷其身首是以誕敷文誥且務招携如或不共用兵無悔其王仙芝及諸道首賊頭目等見制敕後各宜洗心悔過解甲投兵諸所在州府投降便令申奏必當超授官爵厚賞資財永作忠臣常居祿位其節級自補職掌等亦于大藩鎮內量材與職額衣糧其拋棄田園脅從隊伍者並當撫綏慰勞各令歸業營農是謂捨暗從明得生逃死依朕命者豈不休哉如或頑傲不悛凶強自恃猶纒兵甲尚困鄉閭使田者不耕蠶者不織則須為人除害非曰黷武佳兵宜令諸道帥臣選練驍勇將卒分兵諸道並力合威必務剪除不得縱玩其主兵大將若全擒戮得一火草賊數至三百人已上者超授將軍仍賞見錢一千貫文如斬首級移兵攻破徒黨收奪資財器械覆驗托實者據其功績髙下授官賞財如逢賊不追臨陳不戰貪黷逗撓敗失師徒宜令本州道勘尋準軍法處分應鄉縣田園之內有材傑敢勇之人若能糾率丁夫捍禦冦賊搴旗斬將破陳成功者委所在長吏速具奏聞亦與官職優賞如鄭溢湯羣之輩皆以分領郡符朝廷必不食言鄉黨所宜助順於戲宿麥將實秋苗正滋漸及蒸燠之時豈是戰爭之日唯願務農偃甲布德行恩遍告州閭各宜知悉乾符四年三月討楊師立制朕以眇身恭臨大寶唯思克相上帝寵綏四方而况于垣翰之中臣僚之內豈不能掩其瑕釁而欲肆之法網乎其或包藏禍心違拒君命罪惡既彰其悖亂誅鋤難逭于彞章迫于羣情蓋非獲已光祿大夫檢校司空兼尚書右僕射上柱國中山縣開國公食邑二千户楊師立本實庸才曽無逺慮幸因薄伎久列禁軍遂委節旄蓋循事例必謂保其富貴勵乃忠貞况自朕出狩巴庸頻加渥澤進水上之劇任兼輔相之殊榮不敢上報國恩而乃敢虧臣節昨因制置防遏不肯發兵遂有替移尋升端揆罔思寵待輒恣凶謀揚潼水之驚波作佐綿之沴氣不遵詔命偷固戎藩動衆興師欲收其郡邑重門守險顯絶于朝廷據綿州奏聞楊師立已于涖城屯兵下寨又差都將郝蠲等占奪綿州帶甲數千去州十里賴有奉國兵士禦敵殺戮大挫鋒鋩城池方遂保全士庶免罹塗炭續據劒州申報楊師立與刺史姚卓文欲領兵士直赴西川兼署姚卓文充指揮應使仍與鎮縣書板反狀具明况聞廣集庸丁教習武藝稅外恣行掊斂支郡無處完全别置親軍用為心膂及令捍寇莫整鼓旗大校阻謀延頸被戮而又致害監軍家纍骨肉洎於叛官元從無不罹殃又殺送官告內使更無噍類深用驚歎此固覆載之所不容人神之所共棄其楊師立在身官爵及先父所贈官兼母所封邑號等並削奪令西川節度使太尉兼中書令陳敬瑄以義制事君擁鋭敏之師徒擅訓齊之政令必能𠞰除逆豎鎮定蜀川已兼三州都指揮等便宜令差兵攻討處分應楊師立叛官及將校官吏等如或不同謀議及衣冠僧道百姓等臨事脅從者宜各審詳情狀切務安存無令誤有殺傷致其寃濫其將校等如有梟擒楊師立歸順者朝廷别議奬酬其立功將校等委敬瑄等第奏聞冀行賞典嗚呼作孽者誠自投于法網矣亦由吾理化之道未信於人焉負扆凝思良深自咎布告天下咸所聞知中和四年二月削奪陳敬瑄官爵制朕以賞罰二柄不可廢也助順誅逆自古行之陳敬瑄出身屠沽驟竊旄鉞包藏姦逆侮慢朝廷敢行専殺之威尤顯不臣之節惡昭圗之直筆溺贍於中流傲狠之心唯思殘害猖狂之志日甚沉迷先皇帝再幸梁洋方當歎否廣張行勢欲脅乘輿全蜀賦租不供天府百城牧守皆出私置近者爰命台臣往持戎律冀因交代亦許罷歸而又結黨連羣以拒王命深溝髙壘輒恣兵威罪既滔天誠宜共棄其陳敬瑄在身官爵並宜削奪兒姪等委中書門下商量處分文德元年十二月削奪李罕之官爵制敕朕聞君天下者先賞而後罰立教化者貴德而賤刑其或道之以爵而不勸是稟匪人之性豈悛不救之謀雖軍旅屢興有慙區宇而干戈勿用何去頑囂邢磁洺等州節度觀察處置等使金紫光祿大夫檢校司徒同中書門下平章事守邢州刺史上柱國隴西郡王食邑三千户李罕之閭閻下品窟穴微生憑厲氣以感時依凶徒而干紀剽劫郡縣攘害蒸黎水絶安流陸無砥道先皇帝捨於斧鎖委以招修唯聞屠伯之人寧有孚人之稱而又擅離河內竊據東郊溪壑貪心涸伊瀍而不潤烏鳶利觜啖刺廓以成空旋逃原野之誅還聚雈蒲之衆時以上京初復羣情未安宥十死之正刑委三城之重地仍加相印俾掌兵權冀懷再造之恩永戢無厭之暴而乃復招逋逸輒留貢輸始則結王友遇而寇攘終則投李克用而侵軼且山北以邢洺為要害爾則引戎馬以屠攻洛京以懷孟為咽喉爾則肆爪牙而搏噬調其當路終可欺天不知祖宗垂休祜豫纘繼中外陳懇成我蕩平専攻之令才行同德之捷已獻度其鼎釡無一安存降以絲綸用彰攻伐其李罕之在身官爵並宜削奪注毁委招討使宰臣張濬駱全雍悉加存恤於戲禍福無門唯人自召爾為將相而不能全身授爾旌旗而翻聞起亂罪在不赦朕安敢私凡百同盟共懲始禍布告中外咸使聞知大順元年五月討董昌制夫雷霆霜雪上天降以成物明罰飭法哲王垂以理人是則陽春不可以獨為嵗功仁恕不可以専為君德威刑之作其在斯乎朕以眇身祗膺大寶奉祖宗之丕訓荷天地之洪休八年於兹一日無怠遜於志者必本於情茍懲誡之不明懼典章之斯廢威勝軍節度使檢校太尉同中書門下平章事隴西郡王董昌出於行伍屬遇艱難權握兵戎位崇將相器方盈而自覆鼎必折而遂傾因憑生祠輒有狂計假陳妖異惑亂邪巫鼓噪危樓偽為建國不思理代徒生犬吠之音欲就叢祠妄舉狐鳴之兆賴浙西節度使錢鏐與諸州等皆忠誠憤激壯志堅髙始以逆順之理飛章諭之而不吝次以攻伐之謀與約脅之而不回至于率兵直以劘壘雖假言誘惑止遏凶邪終為閉壁偷安不使束身歸罪是其隂詐猶欲張皇魚戲鼎而雖亦可哀蜋怒轍而終為不率天討有罪渠魁必誅其董昌在身官爵並宜削奪仍委錢鏐進兵攻討越城之內士庶且多寧無勇敢之徒善以功名自許如有梟戮生擒董昌者授三品正員官賞錢一萬貫如有官者超三資酬奬如是董昌威制曽助妖謀翻然改過圗功轉禍有所自效者罪並不問賞即與之於戲惡殺好生人君令德伏順伐逆武夫令猷鳴鼓而攻既非獲已奮戈而起亦宜憤諸勿發勿焚無誤無失罔俾觀聽者謂我黷武而佳兵也乾寧二年五月唐大詔令集卷一百二十
