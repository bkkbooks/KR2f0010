body:
  text: 唐大詔令集卷七十四宋宋敏求編典禮藉田貞觀三年藉田詔藉田制停藉田雕飾農器詔元和五年罷藉田敕開元二十三年藉田赦書九宫貴神親祭九宫壇敕親祭九宫壇大赦天下敕嶽瀆山川封華嶽神為金天王制册東海神為廣德王文令盧從願等祭嶽瀆敕令嗣鄭王希言分祭五嶽敕令嗣許王瓘祭東嶽敕禁驪山樵採敕雨澤頓降昭報山川敕令關內諸州長官祭名山大川敕遣官祭霍山敕蕭昕等分祭名山大川敕立終南山祠敕雜祀天地宗廟外祭用少牢詔置夀星壇敕升風伯雨師為中祀敕五人帝祝文勿稱朕詔親拜風伯雨師祝板詔條貫祀事敕藉田貞觀三年藉田詔周宣在位巳墜兹禮近代以來彌多所缺朕祗承大寶憲章典故今將履千畝於近郊復三推於舊制宜令有司式遵典禮貞觀三年正月十八日藉田制張九齡門下粢盛所以奉神祗耕籍所以助人力既義率乎下而敬在其中是為先農存乎大典故周宣不復於古而虢公致諌漢文能修其制而班史稱美朕自御極以來動咨故實惟是千畝未展三推匱神困人降災移歲靡不在此良以憮然今星紀既周土膏將動去農祥而卜日考帝藉之以時朕其親耕以實御廪宜令禮官博士詳擇典故有司速即施行停藉田雕飾農器詔古之聖王臨御天下莫不務敦本寶儉為先蓋用勤身率下也屬東耕啓候爰事藉田將欲勸彼蒸人所以執兹耒耜如聞有司所造農器妄加雕飾殊匪典常紺轅縹軌固前王之有制務奢尚靡諒偽教之所託靜言思之良用歎息豈朕法堯舜重茅茨之意耶其所造雕飾者宜停仍令有司依農用常式即别改造庶萬方黎獻知朕意焉乾元二年正月罷藉田敕敕朕以東郊藉田禮之重者爰擇吉亥用祀先嗇上以供粢盛下以勸稼穡式展三推之義敢辭四體之勤亦既草儀方將肅事再思理本旁采衆詞以江淮水旱之餘河朔師旅之後宜寬物力以濟蒸元况當三農休息之時有百司供具之費道途灑掃暴露勤勞惕然在懷是用中止雖前有成命皆已施行而重煩吾民則無固必其來年正月十八日藉田禮宜暫停於戲夫聖人無心以徇百姓朕亦虛已用圖大中茍事未宜則改而求當凡百卿士期悉豫懷元和五年十一月十九日藉田赦書門下昔者受命為君體元立極未有不謹於禮而能見教於人朕其庶乎有慙作者方册存而可舉舊章絶而復尋自古所行無一而廢將以上乞靈於社稷下蒙福於黎元朕兹精誠天實降鑒今嗣嵗初吉農事將起禮有先於耕藉義緣奉於粢盛是所嚴共敢不敬事故躬載耒耜親率公卿以先百姓遂終千畝謂敦本之為爾可布澤之更深宜有順於發生俾無偏於行惠可大赦天下自開元二十三年正月十八日昧爽以前大辟罪以下罪無輕重已發覺未發覺已結正未結正囚繫見徒咸赦除之其犯十惡死罪不在赦限其餘死罪特宜配流嶺南逺惡處官典犯贓本犯至死貶與嶺南逺惡左降官至流者亦量貶與逺官典配諸軍效力計贓至徒仍不得重令却上天下諸州損免處稅地先矜放其非損免處有貧乏未納者並一切放免代糧種子開元二十一年以前並宜放免京兆河南府秦州百姓有諸色勾徴及通懸欠負亦宜放免其在官典及倉督等腹內者不在免限天下色役爰及支用務令節減並諸色貢賦先令中書門下均融減省宜準前敕速即條奏捐免州稅户錢米納并七等以上户租先未處分五色資錢課未納灼然不辦者並放至蠶麥秋收以來贖納捐免州逃兵健兒承前訪捉不獲合取藉人充替自資裝送軍程期逼迫頗亦辛苦並放至蠶麥以後發遣仍令所司預與軍州計會諸州征行人並令州縣存恤其征行人有父母年七十以上者委本道採訪使檢責取實牒報本軍即放還本貫軍司據闕募取健兒充替行人及防丁有身亡者為造棺櫬遞還本鄉諸州應發防丁去本貫一千里以上比來除正課之外給一丁充資多不濟辦宜更量與資助兩京城內今年所有諸雜夫役並宜放免應須使役以諸錢和雇取充農桑是時不得妨奪州縣官長倍加勸課孝子順孫義夫節婦旌表門閭鰥寡􅑏獨不能自存量加優恤天下侍老百歲以上版授上州刺史九十以上中州刺史八十以上上州司馬其七十以上所由仍量給酒肉各令存問亞獻皇太子鴻賜物二千匹終獻慶王潭賜物一千匹邠王守禮等各賜物一千匹忠王浚以下各賜物三百匹夾侍正衣進圭汝陽郡王淳等各賜物二百匹皇太子夾侍正衣等各賜一百匹裴耀卿等自其翊贊誠有忠益頒賞以序等數須優宜各與一子官仍各賜物三百匹二王後各賜物一百匹長公主各與一子官仍各賜二百匹嗣王郡主縣主各賜物一百五十匹在京文武官見任及致仕并諸色陪位官一品賜物八十匹二品七十匹三品六十匹四品五十匹五品四十匹六品三十匹八品九品二十段節度副大使三都留守京兆尹各一百匹四大都督府長史諸道採訪使各八十匹諸賜物應兩給者從一處給其耕官及侍耕官各賜勳兩轉丞相蕭皓與一子官仍賜物二百匹攝九卿諸侯等各與一子出身仍賜物一百五十匹侍耕執牛官各賜物一百二十匹升壇行事官修禮儀官及判官等更賜一階應入三品五品官階相當減四考聽入攝司徒信安郡王禕禮儀官章縚既不敘階禕與一子官賜物二百匹縚與一子出身賜物一百五十匹其升壇及兼禮儀兩兼從一加階應與一子官及出身者若無子聽回與周親供奉及押階不升壇并壇下及助耕執牛官别敕差中書門下差定人數等泛階合入三品五品階至考未足者待考足日聽敘非待考者賜勳兩轉未承别賜者各賜一等知頓使賜物一百匹修壇場長官屯官撰玉册文官各賜物八十匹書玉册官賜物五十匹管藉田縣令賜物六十匹在東京文武官朝集使官充十道採訪使并判官諸道節度使及諸道通表使判官新除五品以上官未赴任都城畿縣令見在陪位者三品以上轉爵一級四品以下加一階皇親諸親及九廟子孫不入等陪位者並外文武官九品以上各賜勳一轉諸蕃入廟及賀正蕃客應陪位者共賜物五十匹節級分付南北衙門行從宿衛齋宫及武官押當有職掌并諸色雜職掌并應耕公卿從官等各賜勳一轉萬騎及飛騎見當上者各賜勳一轉其宿衛齋宫者加賜物三段伏內防侍諸色從人各賜物三段彍騎畨兵角弓手弩手官馬主見當番及留帖人掌間幕士駕士供膳習馭工人樂人見當有上職掌并庶人應耕者各賜物三段齋郎禮生贊者行事者並減兩年勞無勞可減者齋郎放出身禮生贊者選日稍優與處分三衛七色見當番并流外行署及蕃官見上有職掌者各賜勳一轉河南洛陽縣陪位父老各賜物五段近壇百姓各免今年雜差科宗廟致享務存豐潔禮經沿革必本人情籩豆之薦或未能備物服制之紀或有未通宜令禮官學士詳議具奏朕自臨天下二紀於兹不敢荒寧日加兢業而災眚未弭黎人未康若有由而然則在豫之責有能直言極諌者具以狀聞每渴賢良無忘鑒昧頃雖虛佇未副旁求其才有王霸之略學究天人之際知勇堪將帥之選政能當牧宰之舉者五品以上清官及將軍都督刺史各舉孝悌力田鄉閭推挹者本州長官勘責有才堪應務者各以名奏致仕官久厯清資終始著稱年漸衰邁情有可矜量與改職依前致仕宗子中有才行著聞此尚沉屈者委宗正勘責奏聞唐元兩營立功官任折衝並改與郎將郎將改與中郎其亡官失爵量加收敘五嶽四瀆名山大川及自古聖帝明王忠臣良相並宜所在長官以禮致祭赦書有所未該者所司比類聞奏亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之都城內賜酺三日赦書日行五百里布告遐邇咸使聞知九宫貴神親祭九宫壇敕敕惟神之主必恭禋祀率先之訓義在躬親朕欽若昊穹子育黎庶思通明靈之德以洽和平之理是修缺典咸秩無文如在之誠久陳於郊廟懷柔之至亦偏於山川况九宫所主百神之貴上分天極下統坤維隂騭生靈功深亭育故式昭新典肇建眀禋將以為人載祈孚祐宜叶元吉之辰用申大祭之禮可以立春日朕親祭九宫壇仍令中書門下與禮官等即詳定儀注奏聞天寶三年十二月親祭九宫壇大赦天下制孫逖門下九宫之祀百代莫修豈日給之不暇將靈享之有待朕當扆君臨握圖纘業每聽政中昃疇咨讜言觀書考禮以采故實勵精為理三紀於兹上荷宗廟延祥克開厥後下賴股肱叶德以致雍熙而麟鳯龜龍近遊郊藪蠻夷戎狄逺輸賝賮乘時來之休運恢皇建之逺圖是以圓丘方澤之儀升中告類之禮無典不舉靡神不懷恭惟九宫明祀尚缺載深兢惕用建靈壇爰以元辰親執奠獻叶青春發生之慶祈黔黎啓祐之福今至誠式展大禮云備瑞景和風神心如答無疆之福豈獨在豫非常之澤宜覃率土可大赦天下自天寶三年十二月二十五日昧爽以前大辟罪已下罪無輕重咸赦除之其十惡死罪造偽頭首謀殺攻劫及官典犯贓不在免限朕惟善政實在養人作法務從於寬簡任事必量於齒力比者成童之歲即挂輕徭既冠之年便當正役憫其勞苦用軫於懷自今以後天下百姓宜以十八以上為中男二十三以上成丁又任土作貢先標程式或非所有不免貿遷事既非宜理難經久并應徴課稅及支遣諸色物或期程之間遲違非便並委所司與朝集使商議取穩便處置奏聞實録載赦文云每歲傭調八月徴收農功未畢恐難濟辦自今以後延至九月三十日為限而却無任土而下至此諸軍行人逺為邉扞修短之分雖有定期從役而終良深軫念其有臨陳亡殁骸骨未還本貫令節度使給棺櫬遞歸又防邉禦寇實謂難勞貧戶單丁固茲存養便令差遣去住難堪自今以後應差行人家無兼丁不在取限自古聖人皆以孝理五帝之本百行莫先移於國而為忠事於長而為順永言要道實在人𢎞自今以後令天下家藏孝經一本精勤誦習鄉學之中倍增教授郡縣官吏明申勸課百姓間有孝行過人鄉閭欽伏者所由長官具見以名薦其有父母見在别籍異居虧敗名教莫斯為甚特宜禁絶勿使更然并親殁之後亦不得令有分析郡縣切勒令在惟行自今以後如有不友不恭傷財破産者宜配磧西用清風教朕惟熙庶績博訪逸人豈惟振拔滯淹以期於大用亦欲褒崇髙上將敦於薄俗虛佇之懷兼在於此其有髙蹈不仕遁迹丘園逺近知聞未經薦舉者委所在長官以禮徴送又崇德追逺式閭封墓用旌前烈以叶大猷自古聖帝明王名臣烈士陵墓有頺毁者宜令所管量事修葺仍明立標記禁止樵採天下侍老百歲以上賜帛五段粟三石八十以上帛三段粟二石仍令郡縣長官存問給付亞獻太子諱賜物二千匹終獻慶王悰一千匹正衣夾侍各五百匹親王各三百匹新封建郡王及國公各一百匹賢妃三百匹長公主各三百匹公主各二百匹嗣郡王各一百匹中書門下三品竭心翊戴𢎞益實多各與一子官如已授官量與一轉內外文武官三品以上賜爵一級四品以下各加一階一品賜物七十匹三品以下六十匹五品以下賜物四十匹六品以下二十段諸節度使各賜物一百匹三京留守及二王後各八十匹採訪使各六十匹諸蕃客共賜二千匹其唐元功臣締搆之初竭其忠款録功念舊情所不忘普恩之外更加一階其身殁者各賜一子官皇親五等以上及九廟子孫諸親三等以上未有出身者並放出身其前資者選日稍優與處分見任者更賜勳兩轉應天下賜酺三日赦書有所未該者所司類例聞奏宣布中外咸使聞知主者施行嶽瀆山川封華嶽神為金天王制蘇頲門下惟嶽有五太華其一表峻皇居合靈興運朕恭膺大寶肇業神京至誠所祈神契潛感頃者亂常悖道有甲兵而竊發仗順誅逆猶風雨之從助永言幽讚寧忘仰止厥功茂矣報德斯存宜封華嶽神為金天王仍令龍景觀道士鴻臚卿員外置越國公葉法善備禮告祭主者施行先天二年八月二日册東海神為廣德王文維天寶十載歲次辛卯三月甲申朔十七日庚子皇帝若曰於戲四瀛宅日百谷稱王望祀之禮雖申崇名之典猶缺惟東海浴日浮天納來𢎞往善利萬物以宗以都朕嗣守皇圖式存精享神心允穆每叶休徴今五運惟新百靈咸秩思崇封建以展虔誠是用封神為廣德王其光膺典册保乂寰宇永清坤載敷佑邦家可不美歟惟南海蕩滌炎州包括溟漲涵育庶類以成厥德惟西海泛濫疏名清晏表德成兹潤澤奠彼金方惟北海限蠻阻夷實資坎德含竒藴粹實曰天池其禮如東海命盧從願等祭嶽瀆敕敕五嶽視三公之位四瀆當諸侯之秩載於祀典抑為國章方屬農功頗增旱暵虔誠􅑫積神道未孚用申靡愛之勤冀通能潤之感宜令工部尚書盧從願祭東嶽河南尹張敬忠祭中嶽御史中丞兼户部侍郎宇文融祭西嶽及西海河瀆太常少卿張九齡祭南嶽及南海黃門侍郎李皓祭北嶽右庶子何鸞祭東海宗正卿鄭繇祭淮瀆少詹事張晤祭江瀆河南少尹李暈祭北海及濟瀆且潤萬物者莫先乎雨動萬物者莫疾乎風眷彼靈神爰稱師伯雖有常祀今更陳祈宜令光祿卿孟溫祭風伯右庶子吳兢祭雨師各就壇場務加誠敬但羞蘋藻不假牲牢應緣奠祭尤宜精潔開元十四年正月令嗣鄭王希言分祭五嶽敕孫逖敕歲之豐儉固係於常數天之感應實在於精誠頃者按以隂陽求之推步至於今歲不合有年朕乃齋心妙聞懇祈玄德靈徴不逺丕應用彰果獲西成頗為豐熟蓋至道儲祉惠於蒸人亦羣臣叶贊錫以昭假宜令光祿卿嗣鄭王希言祭東嶽太子詹事嗣許王瓘祭北嶽太常卿韋縚祭西嶽衛尉卿嗣吳王祗祭南嶽宗正卿濮陽郡王徹祭北嶽所司即擇日録奏其四瀆及名山大川或逺近不同各委所由郡長官便擇吉日致祭務崇嚴潔以稱朕懷令嗣許王瓘祭東嶽敕敕務農勸穯維用於天道人和歲稔實賴於神休頃者春夏之交稍愆時雨收穫之際復屬秋霖慮害農功每祈孚祐遂得百神降德庶徵不易先朝禮神以明德恭事以嚴禋進其位號崇其典䇿用三代之樂金石必備盡九州之味籩豆有加俾國之大臣每歲頒祀則執事而有恪亦莫不寧也朕纂戎八載外冦未平多廢舊章尚勞戎備巡狩之事有曠於虞書封禪之儀尚慙於漢史雖命方征收以時致祭而事之不親誠有不達所以分遣八使禱於羣望各供於事以服官常宜令某官等分祭名山大川仍敕有司備具禮物敬陳明薦無失正辭羣望效靈既不為災仍多豐熟幽贊之道普洽於生人昭報之儀式遵於典禮宜令太子詹事嗣許王瓘祭東嶽所司郡長官備禮致祭務陳蠲潔以達精誠禁驪山樵採詔敕驪山特秀峯巒俯臨郊甸上分艮位每泄雲而作雨下出蒙泉亦蕩邪而蠲瘵乃靈仙之攸宅惟邦國之所瞻可以列於羣望紀在咸秩自今以後宜禁樵採量為封域稱朕意焉開元四年正月十九日雨澤頻降昭報山川敕爰自首春有愆時雨朕憂勤祀獻精禱靈祗遂蒙九玄垂福百神效祉膏澤頻降嘉生繁育眷彼山川能興雲雨報功享德祀典存焉諸州府所管名山大川宜令當處長官設祭務盡誠敬以昭典禮開元十四年六月令關內諸州長官祭名山大川敕孫逖敕朕為人上未嘗自逸每勤於政思致豐年而去冬以來雨雪微少竊恐春事有害農功是用齋心躬自申禱神歆允答甘澤遂流豈朕之微誠敢當丕應蓋天之鑒佑惠及生人詩不云乎無德不報昭賽之義豈可闕如其關內名山大川及有靈祠宜令所由長官擇日致賽務令豐厚各盡誠潔以副朕懷遣官祭霍山敕三代之初皆有神降鑒其德也天實啓之恭惟王業之初師及霍邑堅城未下大將阻兵連雨經旬糧儲不給白衣父老忽詣軍門稱霍山之神謁大唐皇帝云東南取路八日雨止助帝破敵盡如其言巖巖霍山九州之鎮興雲致雨功已洽於生人親道輔德力更宣於王室朕纘承大寶膺受洪休肸蠁之間誠明可接永言幽贊茲謂有孚惟天命神據我斯意爰宜令禮儀使判官司封員外即薛頎即往霍山致祭正辭以薦稱朕意焉蕭昕等分祭名山大川制常衮敕有天下者祭百神蓋存乎統法也山川出雲而致風雨列在明祀其來久矣春秋傳曰水旱癘疫之不時於是乎禜之致其誠信與其忠敬精意以享可通神明保佑命之不疾而速古之嶽瀆秩視公侯以其所生者繁所濟也廣鎮厚地而不動朝滄海而不泄如是正直長發其祥百王相承五闕立終南山祠敕每聞京師舊説以為終南山興雲即必有雨若常晴霽雖密雲他至竟不沾濡况兹山北靣闕庭日當恩顧修其望祀寵數宜及今聞都無祠宇炭谷湫却在命祀終南山未備禮秩湫為山屬捨大崇細深所謂闕於興雲致雨之祀宜令中書門下且差官設奠宣告恩禮便令擇立廟所回日以聞仍命有司即時建立開成二年雜祀天地宗廟外祭用少牢詔國家草創日不暇給凡厥禮儀鮮能盡備且生人未乂凋弊實多至於畜産思致蕃息祭祀之本皆以為身窮民事神有乖正直殺牛不如禴祭明德即是馨香望古推今祭神一揆其祭圓丘方澤宗廟以外並可止用少牢舊用者宜用特牲時和年豐然後克循常禮武德元年十月置夀星壇敕德莫大於生成福莫先於夀考茍有所主得無祝之今有上封者言仲秋日月會於夀星以為朕生於是月欲以配社而祭於義不倫且夀星角亢也既為列宿之長復有福夀之名豈惟朕躬獨享其應其天下萬姓寧不是懷蓋秦時已有夀星祠亦云舊矣宜令所司特置夀星壇即以千秋節日修其祀典開元二十四年十月升風伯雨師為中祀敕孫逖敕六氣不愆所以成歲百神咸秩必也正名况風伯雨師濟時育物蕃兹動植溥暢生靈厥有茂功當崇於昭報謂之小祀頗紊於彞倫去載諸星以為中祀永言比義固合同升自今以後其風伯雨師並宜升入中祀仍令諸郡各置一壇因春秋祭祀之時同申享祀用刋前典之謬以致蒼生之福五人帝祝文勿稱臣詔郊祀之義本於至誠制禮定名宜從事實五方配帝上古哲王道濟蒸人禮著明祀論善計功則朕德不類統天御極則朕位攸同而祝文稱臣以祭既無益誠敬有黷等威此豈朕禋祀聰明昭格上下之意前京兆府司録事參軍髙佩上疏其理精詳朕重變舊儀訪於卿士申明大義是用釋然宜從改正以敦至禮自今以後五方配帝祝文勿稱臣餘禮如舊親拜風伯雨師祝版敕風伯雨師等升為中祀有列祖成命况在風雨實切蒼生今雖無文朕當屈己再拜以申子育萬姓之意條貫祀事詔王者受天地之明命纘祖宗之鴻業所以祗服大事致誠嚴禋盡其孝敬之心崇其郊祀之禮必在匪懈不忒粢盛豐潔古今丕訓無易於此朕嗣位十載恭臨萬邦務三時以厚生睦九族以修教每勵薄德汔兹小康中宵內懼愧不克稱實天地之眷祐宗社之威靈思欲罄其精誠奉以昭報豈聿懷之敢望實如在而齊心如聞近歲有司因循將事不恪牲牷徒具滌濯無聞鼎俎雖陳禋薦多缺祠官或怠於齋肅胥史有至於喧呶戲禮瀆神莫斯為甚永言重事用惻深𠂻起今以後太廟郊社齋郎先事前一日委監察御史仔細點檢如有替代非正身者當時禁身推問聞奏當重科懲既責躬親須議優奬其齋郎委中書門下商量與減選應緣祠祭官下至齋郎及樂人吏等致齋日有博奕飲酒喧呼爭競者委御史臺紏察聞奏其牲牢準禮循行之際合視肥瘠之宜近日相承臨時取辦既乖誠敬頗失舊章委太僕寺準禮令處分如無本色牛羊速具聞奏至於酒醴醯醢簠簋膳羞各委本司準禮令切加提舉凡有廟壖所宜肅敬縱云隙地豈廢修崇如有耕墾藝植者亦仰御史臺紏察聞奏攝祭公卿雖約官品將朕誠敬必在得人委尚書省差定之時稍加慎選其祭器禮物中如有欠缺及濫惡須填補改張者委太常宗正光祿太僕寺少府監諸司速具條疏聞奏仍委中書門下即與疏理處分於戲禮崇明祀神享至誠上下茍無其心所為必乖於典由是怵惕用致齋莊咨爾庶工各揚厥職式遵禮典稱朕意焉寶厯九年二月唐大詔令集卷七十四
