body:
  text: 唐大詔令集卷一百十宋宋敏求編政事誡諭誡表疏不實詔令內外官相存問詔令有司勸勉庶人婚聘及時詔誡勵氏族婚姻詔誡勵風俗勑四道誡諭天下詔不許羣臣干請詔誡勵官寮制誡朂內外郡官詔令州縣以制勑告示百姓勑誡示諸道制誡勵風俗詔令藩鎮俟詔方得入覲勑告諭宗閔德裕親故更不問罪勑誡諭藩鎮詔休假許百官旬節休假不入朝勑誡諭誡表疏不實詔前政多僻人不聊生怨讟如讎曾無控告黎民易子而食郡縣猶有餘糧遂使聚斂無厭窮兵不已忠良屏跡邪佞當塗以妖怪為禎祥能希㫖為奉法至於亡滅上莫知之靜言其事可為太息者也朕恭膺寶厯救斯兆庶思革前弊念兹在兹起軍以來於今期月軍書羽檄日有百數一言一事靡不覽焉未明求衣中夜不寐恐一物之失所慮一理之或屈但四方州鎮習俗未懲表疏因循尚多虛誕申請盜賊不肯直陳言論疾苦每虧實録妄引哲王深相佞媚矯託符瑞極筆阿諛亂語細書動盈數紙非直乖於體用固亦失於事情千里佇於一言萬幾凑於一日表奏如是稽疑處斷不知此者謂我何哉宜頒告逺近知朕至意武德元年五月令內外官相存問詔立人之道曰仁與義為國之基德歸於厚自隋氏馭宇政刻刑煩上懷猜阻之心下無和暢之志遂使朋友遊好慶弔不通卿士聮官請問斯絶至乃里閈相接致胡越之乖艱棘在身忘救恤之義風頽俗弊一至於此化民以德豈斯之謂朕纂厯膺期思𢎞至道因兆民之所賴洽萬國之歡心凡厥庶僚咸使輯睦君臣之際期於無隱永言前失特宜敦勵自今已後內外官人須相存問勿致疑阻有遇疾疹遞加診候營救醫療知其增損不幸物故及遭憂恤隨事慰省以申情好務從篤實各存周厚朝廷無拘忌之節交遊有久要之歡遵道而行率禮不越斯則上下交泰品物咸亨惠政所加達於四方布告天下咸知朕意武德九年十二月令有司勸勉庶人婚聘及時詔昔周公治定制禮垂裕後昆命媒氏之職以㑹男女每以仲春之月順行時令蕃育之理既𢎞邦家之化斯在及政教陵遲諸侯力爭官失其守人變其風致使謡俗有失時之譏鰥寡無自存之術漢魏作教事非師古道隨世隱義逐時乖重以隋德淪胥數鍾屯剝五都俱覆萬方咸蕩暨參墟奮旅救彼艱危區縣削平總斯圖籍顧瞻禹跡提封尚存乃眷周餘匝地咸盡痛心疾首寤寐無忘惟上𤣥之大德曰生蒸民以最靈為貴一經喪亂多餌豺狼朕夙奉天命為人父母平定甫爾劬勞未康厚生樂業尚多疏簡永言亭育實切於懷若不申之以婚姻明之以顧復便恐中饋之禮斯廢絶嗣之釁方深有懷怨曠之情或致淫奔之辱憲章典故實所以庶幾宜命有司所在勸勉其庶人男女之無室家者並仰州縣官人以禮聘娶皆任同類相求不得抑取男年二十女年十五以上及妻喪達制之後孀居服紀已除並須申以媒媾命其好合若貧窶之徒將迎匱乏者仰於其親近及鄉里富有之家裒多益寡使得資送其鰥夫年六十巳上寡婦年五十已上及婦人雖尚少而有男女及守志貞潔者並任其情願無勞抑以嫁娶刺史縣令巳下官人若能使婚姻及時鰥寡數少量准户口增多以進考第如其勸導乖方失於配偶准户口减少以附殿失貞觀元年正月誡勵氏族婚姻詔氏族之盛實繁於冠冕婚姻之道莫先於仁義自有魏失御齊氏云亡市朝既遷風俗凌替燕趙右姓多失衣冠之緒齊韓舊族或乖德義之風名雖著於州閭身未免於貧賤自號膏粱之胄不取匹敵之儀問名惟存於竊資結褵必歸於富室乃有新官之輩豐財之家暴其祖宗競結婚姻多納貨財有如販鬻或自貶家門受屈於姻婭或矜其舊望無禮於舅姑積習成俗迄今未巳既紊人倫實虧名教朕夙夜兢惕憂勤政道往代蠧害咸已懲革惟此弊風未能盡變自今已後明加告示使識嫁娶之序合典禮稱朕意焉誡勵風俗勑四道敕建立州縣列樹官司所以導俗宣風懲奸息暴頃以承平既久中外晏安人懷弛壞之心官無警覺之意遂使綏宋二州屢奏亂常之黨荆并兩府頻言搆逆之徒發露雖復數州包藏猶慮未絶此等妖釁尋自伏誅旬日之間驚害良善誠由按察寬縱禁止不明或使無辜陷於非命興言及此深用隱惻自今已後所在州縣官僚各宜用心檢校或惰於農作専事末遊或妄說妖訛潛懷聚結或棄其井邑逋竄外州或自術醫占誘惑愚昧諸如此色觸類旁求咸須防糾勿許藏匿又屬當首夏務在田蠶雖則各解趨時亦資官府敦勸若能肅清所部人無犯法田疇墾闢家有餘糧所由官人宜加考第功狀尤異者别加升擢若為政苛濫户口流移盜發罕能自擒逆謀為外境所告輕者年終貶考甚者非時解替御史及臺郎出使審加訪察各以狀聞宜宣示諸州各令所在知悉文明元年四月十三日又門下朕克纘丕業誕膺景命憲章昔典欽若前王克巳勵精緬思至道宵衣旰食勤修庶政夙夜寅畏匪遑底寧若涉泉水罔知攸濟頃屬殷憂啓運多難興邦禮章載復品物咸茂思欲致萬姓於仁壽歸六合於升平永言政途庶幾沿革猶恐學校多闕賢俊罕登牧宰不存政理農桑未加勸導樽俎之儀不習冠婚之禮莫修朕所以當寧興嘆載懷兢惕者矣庠序者風化之本人倫之先仰州縣勸導令知禮節每年貢明經進士不須限數貴在得人先聖廟及州縣學即令修理春秋釋菜使敦講誦之風天下有奇才異行沉伏不能自達及官人百姓有能諫言時政得失者並令本州責狀封進鄉飲禮廢為日巳久尊德尚齒𢎞益極深宜令諸州每年遵行鄉飲之禮今有勸慕王公卿士務存訓奬子弟成立則有冠婚婚禮糟粕或存冠禮久為廢闕自今以後並行冠義責以成人之道使知負荷之難食為人天農為邦本綏撫萌庶勸課農桑牧宰之政莫過乎此刺史縣令有課最尤異委亷察使名聞當别加甄擢縣令字人之本明經為政之先不稍優異無以勸奬縣令考滿考詞使狀有清字無負犯明經及第每至選時量加優賞若屬停選並聽赴集真如設教理歸清淨黃老垂範道在希微僧尼道士女冠之流並令修習真寂嚴持誡行不得假記功德擾亂閭閻令州縣嚴加檢察私度之色即宜禁斷諸州縣官有不因選序别犯贓賄非時除授官等皆依倚形勢恣行侵剝如有此色仰州長官録事參軍速勘責奏聞訖宜停務時進止仍委吏部兵部速勘責處分諸州百姓多有逃亡良由州縣長官撫字失所或住居側近虛作逃在他州橫徴鄰保逃人田宅因被賊賣宜令州縣招携復業其逃人田宅不得輒容賣買其地在依鄉原例納州縣倉不得令租地人代出租課寺觀廣占田地及水碾磑侵損百姓宜令本州長官檢括依令式以外及官人百姓將莊田宅舍布施者在京並令司農即收外州給貧下課户凡此數事或宜區分繫乎風俗義存奬勸刺史縣令等各申明舊章勉思撫輯罷雕弊之務歸淳厚之源訓導黎蒸宣我朝化書不云乎德惟善政政在養人布告天下咸知朕意唐隆元年七月十九又黃門朕聞天為大者孰先於育物物最靈者莫甚於愛人故樹之后王以康兆庶朕緬鑒前烈深惟逺圖懼德之不修化之未偃寅畏夙夜如臨泉壑然則疇咨命於四嶽黜陟存乎三載既以百姓為心明非一人獨理今之牧守古稱侯伯賢者任之則循良之迹著不賢者任之則愁苦之聲作每冀精於所擇委之俞往豈時或頽靡茍且尚多而吏之殊尤寂寥不嗣靜言政要朕用憮然間嵗水旱周於郡國倉廪不畜閭閻荐飢加以出攝頗多冗官增弊至於處置皆憑刺舉當於京官內簡宏才通識堪致理興化者量授都督刺史等久在藩屏有升進狀者量授京官使出入常均永為恆式課最超等必議升遷循默守常必裁貶黜昭昭賞罰不可不慎屬冬朝禮成春事方起朝集使等俾還所蒞欽若朕言官寮間或幹濟清苦或貪濫侵漁稱職及不稱職並委都督刺史審察奏聞罔或阿容自貽悔咎諸道雖遣使存問尚切憂勞牧宰等深體朕懷各宜隱恤交至乏絶者速量事優勞公私債負停徴至秋州縣差科務減常日昔國僑相鄭以至和平曹參相齊貴於清淨清淨則不擾不擾則和平和平則不爭不爭則知恥愛費而與休息除煩而從簡易自當農者歸隴畝蠶者勤紡績既富而教乃克有成道德齊禮不逺斯復庶幾在位𢎞朕此心凡厥遐邇各令委悉主者施行開元二年十月十三日又敕國家祖武宗文重熙纍洽克清寰極大庇生人𤣥德獨化與乾元而資始至道無名含帝先而首出自削平區宇混一車書六合晏然百有餘載則我文武之業有大造於生靈朕嗣守丕運纂我鴻緒恐不能敷𢎞前烈光闡睿圖夙夜祗畏若臨泉谷曷嘗不龔然思道寤寐勤政從人之欲每以百姓為心屈已之勞常矜於一物失所且夫法久而弊法弊則通制國以立法為先教人以地著為事自屬清晏人多偷怠國章或弛氓僞實繁今正朔所及封疆無外雖户口且增租賦不益莫不輕去鄉邑共為浮惰或豪人成其泉藪或奸吏為之囊槖逋亡積嵗流蠧自滋雖朕之薄德罪則在豫亦官無其政吏不守法耳今欲去其末而歸其本間其邪而正其德使法有所立人知向方是用恤窮逸寬逋貸式廣自新之路俾由莫厚之恩誡諭天下制頃屬昊穹降禍雲馭上仙外戚成挾主之謀奸臣起移國之計皇太子基見危而起補天立極朕方息肩朱邸拭目清時幸太平之無事期小山之自逸溫王以推崇叔父固禪萬幾基以克奬帝圖進登儲二此則明有日月幽有鬼神朕不敢執私而廢公違衆而専意也今君臣既定天下已安欽奉鴻業思臻至理推心兆人之上畢至千秋之下猶望始終一德無有二心人其視余天實知我如聞在外尚有浮言睥睨朝廷窺測間隟或云朕意欲脫屣宸居或云東宮乃主器非長嗚呼無識曽莫之思昔唐堯帝摯之弟也升於帝位王季太伯之少也立為太子能明俊德光啓邦家比聞中外屢有流言潛圖廢立止以為中宗之時吾乃一王耳憂危不暇今基靜禍難安社稷天下利之所謂非常之事不可以常禮議之唐隆元年七月不許羣臣干請詔設官分職本期致理惟賢是任匪私親昵若使才勝其任望重於時一月纍遷固未為速如或代工無取考績非明十年不調豈應論屈頃者官失其序僥幸路開人不務德惟速是視在職無幾已希遷陟又每謁見之時多請仗下奏事不聞公議惟乞榮班王爵與能豈由干請朕雖逺慙聖哲多愧大明自臨寰宇斯焉兩載卿士人材皆所知悉不被升擢蓋自取之當務責躬何宜往訴且難進而易退君子格言後已而先人往哲明訓周文多士虞舜舉才克讓滿朝故稱為理今位參臺省階列通班惟務趨競餘何足紀朕方欲大革澆浮俾歸淳俗自今以後謁見之日若更有干冒祈榮者雖地處親勳才稱俊秀皆當格之清議一從屏黜崇亷恥之節洽升平之化景雲二年十二月誡勵官寮制蘇頲門下法之所設本以懲非令之必行期於禁止致理為要何莫由斯至如官典受贓國有常法承前雖有處分在外多未遵奉且不戒視成為暴不令而罰為虐豈含容之自久將訓導之未明歟朕情存劃一過欲不二恐愚人陷罪莫識隄防姦吏狥私自嬰徽纆永言於此明發興懷今日已前既往不咎從今巳後有紀必繩朕不食言爾無荒怠所以勤勤懇懇預戒凡百蓋以罰止罰可不慎哉告示遐邇令知朕意主者施行先天二年九月七日誡朂內外郡官詔國之設法本以間邪茍無所施雖立安用朕以寡昧纂承丕業夙夜怵惕恐不克勝馭朽徒凛未知攸濟是用寤寐永歎常思罪己冕旒不欲見其臧否黈纊不欲聞其是非隱忍含容十載於兹矣不能使令行禁止訟息刑清家知禮讓之教人知亷恥之節此朕之不德也河南府洛陽縣主簿王鈞貪殘其性暴虐其心輕侮我章程割剝我黎獻處事不遵乎法理黷貨不知其紀極此而可恕孰不可容且輦轂之下事猶如此想於逺處人何以堪然而當發生之時屬陽和之月朕情存惡殺不加殊死宜從杖罪以肅朝端可於朝堂集衆決殺自今以後內外官有犯贓賄至解免巳上縱使逢恩獲免並宜勿齒終身御史憲司職當推劾不存糾舉多有顔情綱紀不施誰任其咎又府縣寮寀上下相䝉犯法公無檢勘若知而故縱即是職務不舉各自思審何以當官自今以後所進擬御史皆須歷職清白衆所推者不得虛相引進僥幸祈榮凡厥朝行宜悉朕意開元十年二月令州縣以制勑告示百姓勑敕凡制令宣布皆所以為人如聞州縣承敕多不告示百姓使閭巷間不知㫖意是何道理宜令所由提撕應有制敕處分事等令終始勾當使百姓咸知如施行有違委御史訪察聞奏開元十六年六月誡示諸道制勑王者省方諸侯述職以時受計其來久矣自鑾輿南幸而巴蜀底寧俾豫小子受命討難越自河隴及於朔陲兼北狄兵車億萬同至待收秦中後定河洛狂寇窮窘不日剪滅朕以百姓為心敢忘終食中夏未清慮有驚擾且吏者人之師非吏何以安人良化惠風在於循吏當用兵振旅之際事充政重之時必去煩苛存乎慈惠須嶽牧令長以鎮撫者也且懲惡勸善激濁揚清尋有使車黜陟當備知之朕每命中官使諸山使所至郡縣妄宣口敕徴求賦斂便即奏聞不可容隱朕以軍政孔殷朝會未備禮猶闕於筐篚時且急於甲兵卿昭宣國令以示民庶履新之慶與卿等同之至德二年正月三日誡勵風俗詔昔者卿大夫相與讓於列士庶人相與讓於齒周成王刑措不用漢文帝恥言人過真理古也朕甚慕焉中代以還爭端斯起掩抑其言則専弊誘掖其說則侵誣自乏責實循名不能彰善疸惡故孝宣必有敢告乃下光武不以詭辭遽行語稱訕上之非律有匿名之禁皆所以防三至之毁重兩造之明是以爵人於朝則皆勸刑人於市則皆懼罪有歸而當於事也末代偷巧內荏外剛卿大夫無進思盡忠之誠多退有後言之謗士庶人無切磋琢磨之益多銷鑠浸潤之讒進則諛言諂笑以相求退則羣居州處以相議留中不出之奏蓋發其陰私公論不容之談是生於朋黨擢一官則曰恩皆自我黜一職則曰事出他門比周之跡已彰尚稱獨介由徑之蹤盡露自謂貞方居省寺者不能以勤恪蒞官而曰務從簡易提綱紀者不能以凖繩檢下而多密奏風聞獻章疏者更相是非備顧問者互有憎愛茍非秦鏡照膽堯羊觸邪時君之德安得不惑參斷一謬俗化益訛禍發齒牙言生枝葉率是道也朕甚憫焉我國家貞觀開元同符三代風俗歸厚禮讓偕行兵興以來人散久矣姑欲導之以德不欲驅之以刑然而信而未孚理有未至曽無恥格益用凋刓小則綜核之權見侵於下輩大則樞機之重旁撓於薄徒尚多因而化之亦既去其尤者而宰臣等懼其寢染未克澄清備引祖宗之書願垂誡勵之詔遂申告教頗用殷勤各當自省厥躬與我同底於道凡百多士宜體朕懷長慶元年四月令藩鎮俟詔方得入覲勑方面大臣皆吾股肱心膂思與相見無時暫忘想其戀闕之心願修朝覲之禮其於忠懇悉亦可知但緣兵革未停務先安緝或地鄰戎寇須有防虞或鎮重軍雄切於綏撫臨機處分要合便宜自今以後諸道節度都團練防禦經略等使有請朝覲者但先獻表章候得詔㫖允許即任進發務使行止之際臨時不失事機故此宣示遍使知悉告諭宗閔德裕親故更不問罪勑朕承天之序燭理未明勞虛襟以求賢勵寬德以容衆頃者或臺輔乖弼亮之道而具寮扇朋附之風翕然相從實斁彞憲致使薰蕕共器賢不肖並馳退跡者成後時之夫登門者為迎吠之客繆盩之氣堙鬱未和而望隂陽順時疵癘不作朝廷清肅班列和安自古及今未嘗有也今既再申朝典一變澆風掃清朋比之徒匡飭貞亷之俗凡百卿士惟新令猷如聞周行之中尚蓄疑懼或有委相指目令不自安今斯曠然明喻朕意與宗閔德裕或親故及門生故吏等除今日以前黜逺之外一切不問各安職業勿復為嫌布告中外令其知悉太和九年九月誡諭藩鎮詔我國家天厯自歸君臨無外十七聖滂流𤣥澤積惠生靈三百年保定鴻基方延運祚其間數纒災否禍起凶狂才聞竊命之妖已觸震雷之怒或腹心生變或骨肉相圖近事可明靈誅不漏蓋人祗之共憤乃宗社之儲休亦賴中外重臣匡時薄德大恥復雪小康可期須申告諭之勤用致綏懷之㫖而宗權藩垣所屬倚仗特深雖章表繼來臣誠可驗而兵戈失戢物論猶疑是生交搆之端益惑親鄰之聽况位崇將相爵極王侯圖功則國禍可平快志而家寃已雪勸忠貞於部伍莫若率先鑒成敗於古今當思擇福猶冒屬猷之誡適搖怗亂之機且患難雖繁封疆有制各圖侵軼自掇悔尤髙潯之下澤州將攻僞帥周岌之窺臨汝本利危邦翻為致冦之資蓋昧啓讐之釁得土地為他人所有得貨財亦他人所資勢敵則相傾力均則相忌害莫深於歸怨利莫厚於圖安况井邑皆空耕桑盡廢歎瘡痍而未復軫哀痛而難忘且洛邑通都非列藩之所併河陽要地亦諸夏之必爭若不制自本朝豈可公然竊據節旄寵授須候王人賦稅均輸合資國用至於封疆鄰接續可商議指撝但將還舊京尤藉近鎮繼聞蒲陜已被攻圍河外既事於支吾闕中自妨於完輯回車或阻奉圖逾虧今者先在息兵各令守境爵位幸非愛惜君臣足保初終尚或執迷方知誤計若法制不行於一處即征計須狥於衆情人亦有言理難為黨雖萬方之罪當責朕躬而九重之威更憑天力縱以黃巢頃盜宮闕曽㑹師徒既戮元凶須遵後命所以寢興念慮詔示殷勤猶期逺保宿心不欲便乘衆怒山河著誓當明指日之心聖哲好生必用舞干之德佇披深志勉蹈良圖中和四年十二月休假許百官旬節休假不見朝詔百工允釐彰乎奉職十日休浣義在優門方貴無為之風以𢎞多暇之政朕欽崇至道思致和平今寰宇克寧朝廷無事將欲叶於淳古豈惟臻於小康當與羣寮暢兹娛樂頃旬遊宴賞已於入朝節假常參未敷後命公私叶慶千載一時上下同歡自中及外自今以後每至旬節休假中書門下及百官並不須入朝外官等其日亦不須衙集天寶五年五月唐大詔令集卷一百十
