body:
  text: 唐大詔令集巻五十一宋宋敏求編大臣宰相館職張説等監修國史勅宋璟蘇頲修國史勅蕭嵩集賢院學士修國史勅裴光庭𢎞文館大學士制陳希烈監秘書省圗書制齊抗修國史制李藩𢎞文館大學士制牛僧孺集賢院大學士監修國史制李固言崇文館大學士等制魏謩監修國史等制令狐綯𢎞文館大學士制鄭朗監修國史等制崔慎由監修國史等制蕭業監修國史等制夏侯孜集賢殿大學士制白敏中𢎞文館大學士制王鐸𢎞文館大學士等制蕭遘監修國史等制館職張説等監修國史勅蘇頲勅古之王者代有史臣以日繫月屬詞比事舉而則書用存有法事而不法是謂空言蓋褒貶之重慎也自非經術文雅進德修業出忠入孝匡俗佐時為朕寳臣有邦良輔者孰可綜覈班紀發揮蒼籀銀青光禄大夫守中書令上柱國燕國公張説銀青光禄大夫守兵部尚書同中書門下平章事三品上柱國梁郡開國公姚元之等並可監修國史餘各如故先天二年十一月二十二日宋璟蘇頲修國史勅古之良臣實難其人掌邦國之事明勸懲之道是以淑駿𢎞簡茂先博物爰自重臣式膺兼領銀青光禄大夫吏部尚書兼黄門監上柱國廣平郡開國公宋璟明允篤誠有犯無隠銀青光禄大夫行紫微侍郎黄門平章上柱國許國公蘇頲忠肅恭懿察微知彰並光我國楨熙我帝載在公聞山甫之頌抗直有史魚之節王言斯典曽是獻替君舉必書亦惟褒貶宜崇鼎鉉之任更述盤盂之篇並可修國史餘如故蕭嵩集賢院學士修國史勅明乎國史所以𢎞闡大猷觀乎人文所以化成天下自非鈎深學海嚢括詞林盛周公之典謨懸仲尼之日月何以纂叙鴻業允諧僉能兵部尚書兼中書令蕭嵩自天生德惟國之楨孝友温仁禀於性與明宻忠謹自然道合禮樂資其黼藻風雅由其發揮足以掌書殿之秘文紬史䇿之徽烈論道而講學司論而記言俾垂作範之規用成不刋之典可兼集賢殿學士知院事兼修國史裴光庭𢎞文館大學士制政理鴻業𢎞之者大賢文儒盛美典之者茂德自非䕫龍間出周孔挺生則無以翊贊經綸發揮圗史者矣侍中兼吏部尚書裴光庭忠公性與禮樂天資為社稷之臣總喉舌之任儀刑百辟則庶績其凝藻鏡九流則具瞻惟允進規獻替明謨每竭絶編囊簡成誦不忘固可以論道之餘闡尊儒之義緯經廟堂之略論思秘館之文僉曰爾諧期於予理往膺寵命克昭丕績可充𢎞文館大學士餘如故陳希烈監秘書省圗書制國之載籍政之本源故藏於蓬山緘以芸閣者以為義府之成謨三五以還皆率兹道也故每加求購冀補遺逸四部名目悉索而采七略條流兼該頗盡豈若羽陵之蠧簡汲冢之殘編如聞頃者以來不存勾當或詮次失序或鈎深渉踈或擅取借人或潜将入已因循斯甚散失遂多思革前弊允資盛徳宜令左相兼武部尚書陳希烈充監秘書省圗書爰假丹青之餘以著鉛黄之美則金革侍讀足繼寵於班伯石渠司籍方嗣徽於劉向至公之選可不務乎齊抗修國史制勅天工人代緝熙庶績所以達四方之志遂萬物之情王猷以穆在乎宰執君舉必書𢎞厥史職典領著作允資藎臣中散大夫守中書侍郎同中書門下平章事上柱國賜紫金魚袋齊抗文合大雅行歸中庸𢎞道而致逺含章而樹業稽三王之法志酌千古之獻言積純粹而外發德輝自明誠而居為國器擢登宻勿每竭訏謨察其忠諒多所𢎞益以序王道之端辨人事之紀勸懲教化在於春秋錯綜裁成必歸良直以中樞之餘力得東觀之全才山甫補闕已彰於匪懈臧文立言佇聞於不朽修明簡䇿惟爾之休可兼修國史餘並如故李藩𢎞文館大學士制勅朕思欲恢𢎞大化登乎治平翔聲教於鬼區煥日月於黄道士網開而萬㝢垂澤泰階峻而百神受職叶於夢卜天其賚予朝議大夫守門下侍郎同中書門下平章事上柱國賜金紫魚袋李藩徳宇凝粹神襟超曠量寛而不入塵滓理當而不留枝葉治古人之道為君子之儒温然玉容流競斯逺絜矩以居正開誠以納忠起草野之廢滯通天下之和惠内則褒美良能塞邪枉之路外則銷鑠災患寧黔首之艱廣予聰明𢎞益良厚言念報禮發乎深衷爰加書圃之職用飾賢人之榮寵靈斯重汝其敬之可兼𢎞文館大學士餘如故元和四年三月二十八日牛僧孺集賢館大學士監修國史制門下寅亮天工弼諧庶務𢎞我一德撫綏萬邦佐予冲人以厎于理時推恩于天下必首自於輔臣是用極其褒崇増其命數訓正圗書之府裁成義例之條銀青之階光於七命兹所以賞勞而馭貴也正議大夫守中書侍郎同中書門下平章事上柱國竒章縣開國子食邑三百户賜紫金魚袋牛僧孺大玉不琢喬松挺姿文探典謨學貫流略自綸閣掌誥㑹府貳卿聲聞實彰仁德歸厚先朝因嘉其器業爰命奮庸秉事君之小心藴難奪之大節往以聖體違豫潜心保和乃能畫一時平守而不失朕自膺寳厯深仗股肱每申勇退之榮用廣進賢之路損而招益謙乃彌光實簡朕心克諧僉矚刋魚魯於往籍垂褒貶於國書勉承新恩無替舊服可除銀青光禄大夫守中書侍郎同中書門下平章事兼集賢殿大學士監修國史李固言崇文館大學士等制闡至業敷大化實賴於忠賢逐奸慝去黨比必資於正直非學推間代道茂經邦則安能秉是鈞衡贊予鴻業朝散大夫守門下侍郎同中書門下平章事上柱國賜紫金魚袋李固言剛毅自任端嚴不回常懐疾惡之心每負佐時之業頃者奸雄蔽過黨比相連非爾固言執諌孰開予意面陳至懇章䟽繼來辨虞卿宗閔之傾邪明蕭澣李漢之朋附爰付大任益彰器能勵乃公忠副予委遇朝議大夫守中書侍郎同中書門下平章事上柱國姑臧縣開國男食邑三百户賜紫金魚袋賈餗抱忠與義秉直端誠文包經濟之方學達古今之奥自付以樞柄咨其謀猷瀝懇盡規夙夜匡補竭傅説之啟沃致山甫之将明而又舉善推賢孜孜匪懈茍利於國知無不為惟岳降神邦家永賴於戲貞觀之初共推房杜之德開元之際又稱姚宋之賢思得其人常勞寤寐但使固言讜直除四凶以肅清餗推至公披八元以輔弼進之邦家庶叶斯美是宜榮加書府之職寵兼文館之任其監綜史氏以潤色大猷仍進崇階用奨忠孝勉服新命無替前勞固言可銀青光禄大夫崇文館大學士兼修國史餗可銀青光禄大夫充集賢殿大學士監修國史餘如故魏謩監修國史等制門下大官之崇嚴史閣之要重書殿之清秘近代以來率命相臣總統其務寵擢遷轉允諧舊規金紫光禄大夫門下侍郎兼兵部尚書門下平章事監修國史上柱國彭陽縣開國男食邑三百户令狐綯上才經邦正徳宰物瑚璉重器宜升清廟之中銀青光禄大夫守中書侍郎兼禮部尚書同中書門下平章事集賢殿大學士上柱國魏謩直道事主宏國佐時珪璋瑞姿早登太壇之上金紫光禄大夫中書侍郎兼户部尚書同中書門下平章事上柱國河東縣開國子食邑五百户裴休忠力許國清規立朝鸞鳳異儀髙舉重霄之外並富有天爵深於人文早懐匡濟之姿素藴生靈之望洎處台位畢陳廟謨能肩一心以暢萬務識我憂勤之旨罄其弼亮之誠邊疆寖寧風雨咸若念此丕績懷于深𠂻今則各新寵章迭領重職所宜闡清静𤣥黙之化正褒貶予奪之業因此嘉命啟吾規詞夫獻忠言則君受益秉公心則人無怨除吏當則衆職舉下令一則百度美是乃吾三后前所施為也余尚憂屬重事切磨終始不虧乃曰良相綯可守本官充太清宫使謩可守本官監修國史休可守本官充集賢殿大學士散官勲封各如故主者施行大中九年七月七日令狐綯𢎞文館大學士制門下夫茂育羣生動資良弼緝熙庶績表正萬邦非竭力戴君推誠憂國則何以光膺鼎鉉髙歩瀛洲十載於兹四方無事昭文偹德屬自台臣金紫光禄大夫門下侍郎兼兵部尚書中書門下平章事充太清宫使上柱國彭陽縣開國男食邑三百户令狐綯保合太和從容中道左右王化清夷國風輔相盡天地之宜啓沃見忠貞之節直氣能斷嘉猷自新納誨之心義形於色於戯發號出令表率寰區妙運樞機式𢎞敷錫山甫補衮夷吾佐時勉極殊勲書於太室朕以虚懐委遇於道始終佩服斯言敬承嘉命可充𢎞文館大學士餘並如故主者施行大中九年九月三十日鄭朗監修國史等制門下二相股肱與我同體致夷率化致俗清刑致戢干戈致調風雨垂衣無事良有愧焉安得不資刋削之能佇討論之妙振揚史職開啟儒風予非敢私並膺此命通議大夫守中書侍郎兼吏部尚書同中書門下平章事充集賢殿大學士上柱國賜紫金魚袋鄭朗道苞時傑性藴天和得中庸之隠微合大雅之明哲大中大夫守工部侍郎同中書門下平章事上柱國賜紫金魚袋崔慎由器禀人秀材為國楨達智者之變通有良臣之規矩皆學窮閫奥文擅精華辨理必造於事機吐詞同歸於根本松筠挺色莫畏嚴霜鵰鶚凌空自有俊氣况協贊大政允釐萬方沃心克聞舉直無隠圖是諮効彰其茂功斯用迭升俾洽嘉命主張懲勸摠領典墳必使書法彌精動契春秋之旨化成為重豈惟魚魯之文勉𢎞大猷罔替朕命朗可監修國史慎由可充集賢殿大學士餘各如故主者施行大中十一年三月九日崔慎由監修國史等制門下惟政之艱非賢勿乂用熙庶績實仗羣材頃所以旰食宵衣勤求機衡之寄咸得時哲副予虚懐大中大夫守工部尚書同中書門下平章事集賢殿大學士上柱國賜紫金魚袋崔慎由器識淹通風鑑明秀黄香之祗勤爾功壺遂之深衷足稱朝散大夫守尚書兵部侍郎同中書門下平章事判度支上柱國彭城縣開國男食邑三百户賜紫金魚袋蕭鄴操履清方詞調凝逺孔光之慎宻早著山甫之将明可嘉而並𢎞典墳博通理奥亟更顯重雅有風教允副僉諧當兹鈞軸延謀時務稽參政途盡心力以經邦𢎞禮樂而緯俗羣善必舉庶官乃和可以勒美太常書忠甲令者矣今則三秋式稔四境無虞乃眷股肱厥有成績至於總史官之微婉備帷幄之講求繼美臯䕫比良遷董顧兹茂典式示褒優敬爾在公服我休命慎由可監修國史鄴可充集賢殿學士餘如故主者施行大中十一年十月十七日蕭鄴監修國史等制門下康濟生靈必在陶甄之化稽參政事允歸王佐之才况乎元首股肱義均一體叶心同徳予懐所嘉式兼刋綜之榮用舉褒隆之典朝散大夫守工部尚書同中書門下平章事充集賢殿大學士上柱國彭城縣開國男食邑三百户賜紫金魚袋蕭鄴襟神清肅器鑒精通敷贊大猷孫𢎞有慎厚之行朝議大夫尚書户部侍郎同中書門下平章事判度支上柱國賜紫金魚袋劉琢業履清方風標峻整彌綸庶務安國乃任職之臣而皆詞煥丹青道潤金璧匡衡貢禹經術該明孔光師丹議論寛博或頃司邦計茂底慎之規或嘗擁節旄著繕完之績洎膺樞近益暢謨猷毎見沃心實諧注意俾厥后為堯舜納百姓於休和即竭乃誠期於予理子長子駿之職石渠天禄之書稽合異同成我褒貶儒雅之任迭處攸宜式表茂勲用榮兼領永綏寵渥往孚于休鄴可監修國史琢可兼充集賢殿大學士餘各如故主者施行大中十二年二月十八日夏侯孜集賢殿大學士制門下朕居兆人之上當萬㡬之廣戎夷式叙隂陽克調實賴宗社降靈輔弼宣力臻彼富庶至于洽平既彰大明益佇化成之妙載頌台席用盛儒林之選朝請大夫守尚書兵部侍郎同中書門下平章事充諸道鹽鐵轉運使上柱國賜紫金魚袋夏侯孜材協國楨道稱王佐以孝友為家行以禮樂為身文黄陂納寛澗松挺節雄詞擅雅奥學洞微利刃發硎而肯綮無滯代天宰物而埏埴有餘薫然至和霈若潜潤况精列圗籍煥開禁垣髙列俊髦翔集近署雅歸清重方在總樞廣暢事功顯揚懿美是宜更一乃志愈專乃衷吐辭雖酌於當今學正必思於稽古俾宻勿之際啓沃之間無忘我以三墳五典更光丕績永孚于休可充集賢殿大學士餘並如故主者施行大中十三年八月白敏中𢎞文館大學士等制門下朕初承天序方崇政源屬在輔臣兼領重職况仙宫至嚴專總尤切儒林之盛分列掖垣良史之能必歸懲勸将欲比肩上古耀美一時克副旁求允膺茂典特進守司徒兼門下侍郎同中書門下平章事上柱國太原郡開國公食邑三千户白敏中氣禀岳靈道洽王佐致君之志發於深誠銀青光禄大夫守中書侍郎兼刑部尚書同中書門下平章事充集賢殿大學士上柱國譙縣開國男食邑三百户夏侯孜材為國楨望貫人表濟物之用彰於顯仕金紫光禄大夫守中書侍郎兼工部尚書同中書門下平章事上䕶軍樂安縣開國男食邑三百户蒋伸識藴生知衆推邦傑狥公之操本乎進忠並詞峰峭拔髙踰列岫學海深奥逺含百川處彼巖廊付以衡軸動有𢎞益居然矩儀叶心而和平造膝而啓沃式諧僉議能弼予違乃知其功信無與讓是用思闡𤣥化冀揚清静之規彌在立言更佇刋削之妙資其討論必以化成為先副我虚襟感佩嘉命敏中可兼充太清宫使𢎞文館大學士餘各如故主者施行大中十四年正月十六日王鐸𢎞文館大學士等制門下韋絃互佩則情性和文武兼修則事功濟况岩廊重德柱石賢臣方當弭㓂之時正委運籌之畧各覃恩渥用奨勲勞開府儀同三司守門下侍郎兼司徒同中書門下平章事上柱國晉國公食邑三千户王鐸太極儲精華池禀潤文能師古業擅經邦光顯數朝偃仰三事挺許國忘家之節藴經天緯地之才金紫光禄大夫守中書侍郎兼禮部尚書同中書門下平章事上柱國裴徹玉海澄瀾金莖擢秀泉停襟抱岳立標儀道則有常材惟不器松竹見後彫之操輪輗彰致逺之功銀青光禄大夫守尚書工部侍郎同中書門下平章事上柱國蕭遘維嶽降神昴星應瑞琳瑯瑩茂雲日孤髙業著代天澤惟周物偉望而汪洋自逺清規而峻拔難偕並智比蓍龜祥同麟鳳備彰器業遍踐清華雲霄次第以登臨䑓閣從容而履歴或欎為國老或宛是台臣人無間言朕所注意自妖兇搆逆巡幸西來皆能問道以潜奔竟致臨軒而再㑹益堅臣節仍罄廟謨杜南征注傳彰閑謝安石圍碁决勝毎聞盡瘁尤切圗功更宜講貫安危錯磨理本用蕭曹之秘畧繼房杜之髙蹤佇見中興實資良術再踐大貂之位三居文館之權首鎮元台備兼衆務或官當喉舌職重陽秋或位正中樞榮兼秘殿大儀峻秩馭貴崇階式示優恩更申奨勵早清巨孽俾振皇綱使雲龍魚水之歡永光於竹帛鐸可司徒兼侍中充太清宫使𢎞文館大學士兼延資庫使散官勲封如故徹可特進行門下侍郎兼兵部侍郎同中書門下平章事監修國史勲封如故遘可光禄大夫行中書侍郎兼禮部尚書同中書門下平章事充集賢殿大學士勲封如故主者施行蕭遘監修國史等制門下宰相之任調元氣以作輔持大柄以匡君况狂㓂未平戎車尚駕顧我勤勞之意在兹籌畫之功雖循舊規式加新寵光禄大夫行中書侍郎兼禮部尚書同中書門下平章事充集賢殿大學士上柱國蕭遘琮璜重器韶濩正音灑落襟靈品流多士有山甫補衮之功抱子房借箸之謀銀青光禄大夫行兵部侍郎同中書門下平章事上柱國韋昭度山岳藴靈星辰耀彩澄澹不撓端荘自持懇懇常務於爕諧孜孜不忘於贊理而皆便蕃顯貫履歴清華為宗廟之棟梁作邦家之柱石言成損益知合蓍龜彌彰及霤之誠盡著匪躬之節毎聽爾嘉話寛我殷憂所宜縱堂上之竒兵彌兹㓂孽啓胸中之利器剪彼妖狂佇見中興之期須兹輔臣之力安危是注倚仗彌深地官既示其加恩大儀式彰其峻秩掌東觀陽秋之重總石渠刋校之權茂勲増榮崇階示貴乆處黄閣宜正紫垣庻其廣運籌謀速見平蕩佇丹青垂美鼎鼐勲髙永兹魚水之歡用契雲龍之㑹承我茂寵爾其勉之遘特進行中書侍郎兼户部尚書同中書門下平章事監修國史勲如故昭度可光禄大夫行中書侍郎兼禮部尚書同中書門下平章事充集賢殿大學士上柱國主者施行唐大詔令集巻五十一
