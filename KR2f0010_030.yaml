body:
  text: 唐大詔令集巻四十宋宋敏求編諸王册妃册虢王劉妃文册齊王韋妃文册桂陽郡王楊妃文册夀王楊妃文册榮王鄭妃文册頴王獨孤妃文册永王侯莫陳妃文册榮王薛妃文册濟王崔妃文册信王盧妃文册陳王韋妃文册夀王韋妃文册盛王武妃文缺册廣平王崔妃文册凉王張妃文册蜀王田妃文册杞王竇妃文王妃入道度夀王妃為女道士勅收葬王妃收葬遇害王妃詔睦親族宗姓官在同列之上詔魏王泰上括地志賜帛詔令宗屬姑叔不得拜子姪制勉勵宗親詔選宗子授臺省官及法官京縣官詔天下三等以上親赴上都制甄叙皇屬勅誡勵責齊王祐詔誡諸王任刺史别駕文册妃册虢王劉妃文維貞觀年月日皇帝遣使持節册命曰於戲惟爾刑部尚書彭城縣開國公劉威德第二女地胄清華志懷婉順訓彰圖史譽聞邦國式遵典禮作儷大藩是用命爾為虢王妃往欽哉其光膺徽命可不慎歟册齊王韋妃文維貞觀年月日於戲惟爾兼大常卿扶風郡開國男韋挺長女地胄髙華質性柔順訓彰禮教譽表幽閑作儷藩闈實惟朝典是用命爾為齊王妃往欽哉册桂陽郡王楊妃文景雲二年歳次辛亥十月庚寅皇帝若曰於戲咨爾故桂陽王妻楊氏誕承華緒光襲懿風性識柔明言容婉嫕觀詩著範蹈禮成規往應髙禖作嬪英邸謹環珮之節珊有其章勵蘩藻之誠恭而式叙遣使某持節册命爾為桂陽郡王妃爾其克保彝訓率由茂則以正於家無替厥命往欽哉册夀王楊妃文維開元二十三年歳次乙亥十二月壬子朔二十四日已亥皇帝若曰於戲樹屏崇化必正閫闈紀德協規允兹懿哲爾河南府士曹參軍楊𤣥璬長女公輔之門清白流慶誕鍾粹美含章秀出固能徽範夙成柔明自逺脩明内湛淑問外昭是以選極名家儷兹藩國式光典册俾叶龜謀今遣使户部尚書同中書門下李林甫副使黄門侍即陳希烈持節册爾為夀王妃爾其敬宣婦道無忘姆訓率由孝敬永固家邦可不慎歟册榮王鄭妃文維開元二十三年歳次乙亥十二月壬子朔二十七日戊寅皇帝若曰於戲作配藩維以正風訓莫不明慎聘納聿求儀範咨爾前相州鄴縣令鄭博古第二女素聞淑哲自禀幽閑習玩不華圖史成則宜其發祥茂族髙選當代俾因邦媛之求式叙閫闈之化今遣使侍中裴耀卿副使吏部侍即席豫持節册爾為榮王妃爾其勉兹孝敬誡彼滿盈祗率大猷永膺寵數可不慎歟册頴王獨孤妃文孫逖維開元二十五年歳次丁丑七月辛巳朔十日辛夘皇帝若曰於戲樹之外屏義在於展親修其内則禮先於擇配咨爾故右驍衛即將獨孤禮第十二女軒冕之族通姻自久賢明之行淑問攸歸早習組紃之功備詳圖史之學實資女士以儷藩維今遣使工部尚書同中書門下三品牛仙客副使行黄門侍郎陳希烈持節册爾為頴王妃爾其克慎威儀無忘孝敬欽承國命永茂嬪風可不慎歟册永王侯莫陳妃文維開元二十六年歳次戊寅正月庚午朔十八日丁亥皇帝若曰於戲燕翼之樹實屬於維城婚姻之禮必求於宜室咨爾右羽林軍長侯莫陳超第五女天資清懿性與賢明衣冠之緒克禀於閫德環珮之容詳備於閨訓是賴尚柔之質以𢎞樂善之心宜配藩維用膺典册今遣使金紫光祿大夫兵部尚書兼中書令集賢院學士脩國史上柱國晉國公李林甫副使中大夫中書侍郎集賢院學士上柱國徐安貞持節册爾為永王妃爾其䖍恭所職淑慎其儀惟德是脩以承休命可不慎歟册榮王薛妃文維開元二十九年歳次辛巳三月壬午朔十八日巳亥皇帝若曰於戲古人大猷諒在婚禮必資令淑以儷藩維咨爾京兆府新豊縣令薛巘長女地承華族門𫝊雅範本幽閑之性為禮教所成循圖覽史蹈和履順固可歸於邦第穆彼嬪風是用命爾為榮王妃今遣兵部尚書兼侍中牛仙客副使黄門侍郎陳希烈持節禮册爾其敬佩前規克勤内則式瞻清懿垂美無窮可不慎歟册濟王崔妃文維開元二十九年歳次辛巳五月庚戌朔十四日癸亥皇帝若曰於戲乃媵藩王既開邸第必求士女以昭閫則咨爾故絳州司士參軍崔承寵長女家承茂族代襲清和自㓜及長素有柔和之性監循國史復𢡟幽閑之德徽猷益著淑問可嘉是以膺兹寵章主彼中饋是用命爾為濟王妃今遣使兵部尚書兼侍中牛仙客副使黄門侍郎陳希烈持節禮册爾其敬佩箴訓克慎威儀輔我維城永崇磐石可不慎歟册信王盧妃文維天寳三年歳次癸未七月戊戌朔二十一日戊午皇帝若曰於戲建邦為屏必先於閫教嘉耦曰妃是賴於嬪則咨爾前殿中省尚書輦局直長盧季融第三女淑德賢明令儀柔順含和自整備詳環珮之容禀訓有方更出衣冠之族實資女範作配藩維是用命爾為信王妃今遣使尚書右僕射兼右相晉國公李林甫副使銀青光祿大夫行中書侍郎徐安貞持節禮册爾其肅穆閨闈䖍㳟禮度克終婦道以正國風可不慎歟册陳王韋妃文維天寳四載歳次乙酉三月巳未朔十九日丁丑皇帝若曰於戲咨爾京兆府新豐縣尉韋釡第八女慶承華族禮冠女師欽若保訓踐脩德範遵圖鑒史操尚幽閑内則嬪儀道彰柔順隂教之美國風攸屬允資邦媛作配藩闈是用命爾為陳王妃今遣使尚書左僕射兼右相吏部尚書集英院學士脩國史晉國公李林甫副使中書舍人兼判刑部侍郎孫逖持節禮册爾其率循懿行𢡟昭令德祗膺典册可不慎歟册夀王韋妃文維天寳四載歳次乙酉七月丁巳朔二十六日壬辰皇帝若曰於戲古之建封式崇垣翰永言配德必擇幽閑咨爾左衛勲二府右郎將韋昭訓第三女毓慶高門禀柔中閫動修法度居玩琴瑟夙聞師氏之學素習公宮之禮聿求貞懿作儷藩維爰兹輔佐之徳以成樂善之美是用命爾為夀王妃今遣使光禄大夫行左相兼兵部尚書𢎞文館學士李適之副使金紫光禄大夫行門下侍郎集賢院學士兼崇𤣥館大學士陳希烈持節禮册爾其欽承寵數率由令則恭敬婦道可不慎歟册廣平王崔妃文維天寳五載歳次庚戌四月癸未朔十八日戊戌皇帝若曰於戲朱邸𫝊封爰求嘉耦瓊笄作合必擇華宗咨爾太子宫門郎崔珣長女胄自軒冕訓承圖記柔閑内正淑問外宣既連榮於姻戚且襲吉於龜筮是用命爾為廣平郡王妃今遣使光禄大夫行門下侍郎陳希烈持節禮册爾其䖍奉儀則祇膺典禮克昌祚𦙍永固宗祧可不慎歟册凉王張妃文維天寳九載嵗次庚寅四月已未朔十七日乙亥皇帝若曰於戲内則之禮用穆人倫中饋之義以正家道咨爾左衛率府親府左郎將羅國公張安仁第二女門承軒冕族著清華蕙性柔明蘭儀婉茂早習組紃之藝克聞圖史之規儀範聿脩四德斯備䖍㳟蘋藻之訓式昭珩璜之容作儷英藩允資令淑今遣開府儀同三司行尚書左僕射兼右相吏部尚書崇文館大學士監脩國史上柱國晉國公林甫副使中大夫行中書舎人權知禮部侍郎事上柱國成紀縣開國男李暐持節册爾為凉王妃爾其祗膺典禮永綏寵命可不慎歟册蜀王田妃文維建中二年十一月某日皇帝若曰於戲夫茂建親戚以惇族固本明慎聘納以厚别蕃嗣實人倫之始王教之端也朕奉若謨訓詳求淑哲賢必有象鍾慶於今門姻不失親載光於戚里故某官駙馬都尉田擇交第若干女生禀柔惠習知禮則容德純備孝睦洽聞可以叶美好逑輔成樂善之用遣使某持節册命為蜀王妃於戲敬之哉備禮以崇其好合起家而居其爵佐非義信不固非温柔不親克㳟匪懈則罔攸悔朕言必復可不慎歟册杞王竇妃文陸贄維建中二年十一月某日甲子皇帝使某官某持節册命故某官竇某第若干女為杞王妃曰於戲禮大婚姻崇繼嗣本人倫之教詩嘉淑女配君子繫王化之綱葢率人成風由内及外得不採嘉耦以固磐石本宗室而御家邦詳求唯難歴選滋久時乃擇之得兹舊姻柔懿本乎天和禮樂成於家法明章婦順䖍奉母儀克成鵲巢之功叶宣麟趾之美祗膺嘉禮欽率内教淑慎厥止無替有終於戲可不慎歟王妃入道度夀王妃為女道士勅勅聖人用心方悟真宰淑女勤道自昔罕聞夀王瑁妃楊氏素以端懿作嬪藩國雖居榮貴每在精脩屬太后忌辰永懷追福以兹求度雅志難違用敦宏道之風特遂由𠂻之請宜度為女道士收葬王妃收葬遇害王妃詔禍福之源天不可問報應之道理或難憑遂使積善深仁併罹荼毒元惡大憝得恣凶殘自古以来未免斯咎日者祿山作逆竊據兩都塗炭我生靈傷夷我骨肉於禮院門遇害王妃及男子等或閨闈令德婦道柔閑或藩邸象賢幼年聰慧蒼黄之際䧟沒賊中嗟其無辜並遭非命興言及此痛悼良深宜令所司即擇日收葬一事已上並令官供其失骸骨者亦令招魂神而有感庶從改卜之安魂兮来歸將就新塋之吉元年建丑月睦親族宗姓官在同列之上詔朕受終揖讓君臨四海普天之下同加惠澤宗緒之情義越常品宜有旌揚以明等級諸宗姓官宜在同列之上未有職任者不在徭役之限每州置宗師一人以相管攝别為團伍所司明立條式武德二年正月魏王泰上括地志賜物詔地記之設由来尚矣區外具於山海經内陳於夏載職方王制纔舉華夷漢志晉圖各有所紀自茲以後著述實繁或學非博通尚多遺闕或地分南北域有長短求其折中無聞盡善左武侯大將軍雍州牧相州都督魏王泰體業貞固風鑒凝邈學綜䇿府文冠詞林樂善表於夙夜好士彰於吐握討論輿地詳延儒雅博採方志得之於舊聞旁求故老考之於𫝊言内殫九服外極八荒憲章是程規條有序兼包戎夏今古無遺簡而能周博而尤要是以度越前載垂之不朽宜加褒錫以申奨勸可賜物一萬匹其書付秘閣貞觀十六年正月令宗屬姑叔不得拜子姪制君臣朝序貴賤之禮斯殊兄弟天倫先後之儀亦異聖哲之制率由斯道朕臨兹寳極位在崇髙負扆向陽雖受宗枝之敬退朝私謁仍用家人之禮近代以来罕遵軌度王及公主曲致私情姑叔之尊拜於子姪違法背禮情用惻然自今巳後宜從革弊安國相王及太平公主更不得輒拜衛王重俊兄弟等及長寧公主姊妹等先告宗屬知朕意焉神龍元年三月勉勵宗親誥誥朕奉天明命䖍受睿圖而皇室子弟未能稱職堂姪餘慶永煦紹宗行淹祚洽冄從弟燧至謙等不能謹身奉法而乃輕侮國章擯斥邉隅未為塞責朕憫其愚昧屈法伸恩並追赴京令於國子監安置讀書如悔過自新克復先訓所司條奏當議其官皇宗親更有左貶嶺南及邉逺州非惡逆縁坐等色亦宜准此其有見任别駕年齒尚幼未堪理百姓者宜委中書門下及新興郡王晉李思訓等簡擇追赴京其祿俸一事已上並要本州勾當每季附送入京交付其餘慶等本州祿俸亦准此宗親中有才行灼然為衆推挹者按察使其以名聞朕當擢以不次自今已後有犯贓私違悖禮經者准法科處刑兹無捨庶敦睦之情必聞於九族自家刑國允洽於羣心宜各勉勵以識朕意先天二年二月選宗子授臺省官及法官京縣官詔至公之用本無偏黨唯善所在豈隔親踈四從叔知政等咸有才名見推公族秉惟清之操兼致逺之資朕每慮同盟不勤於德嘗懸右職以勸其餘先委宗卿精於内舉量能考行歴載踰時名數則多列聞葢寡光膺是選諒在得人固可擢以清要遷於臺閣將觀志於七子異齊名於八人宜各悉行得聞成績書不云乎九族既睦平章百姓冀由内而理外必自近而及逺凡今懿戚可不慎歟違道慢常無私於王法脩身效節豈薄於他人期於率先勵我風俗深宜自勉以副明言開元三年五月天下三等巳上親赴上都制常衮勅堯之敦叙以協萬邦周之宗盟必先同姓莫逺具邇懷德惟寧俾强幹於京師思同奬於王室所以洽雍和之道明補察之義也惟我近屬聨華本枝以文昭武穆之宗有錫土建侯之嗣往以艱難之際流寓頗多或僻在江山載經時序或雜居州里亦既淹留等威不分無以自給儉將逼下卑或踰尊將恐合族展禮之文缺燕毛叙齒之儀廢言念及此良深耿仄其三等已上親除州縣官及帶職掌應在外者委本道節度觀察量事給逓發遣赴上都仍先録名聞奏甄叙皇屬勅勅五代則遷以尊祖禰三族之别以辨親踈故禮曰祖遷於上宗易於下六代而親屬竭矣先王所以叙昭穆明等夷不可得而變革也應追赴山陵及先在城於西宫陪位同五等親宗子等系自本枝分於天𣲖繫之以姓而無别約之以禮而有差朕天禍所鍾哀纒罔極嗟我公族儼然来斯逺倍七月之期俯就三年之制降殺以等存乎典彞名位不同禮亦異數有司定儀將從藉屬之條天下為家用廣孝慈之道惇睦九族其在兹乎應追到及在城同五等親宗子等五品以上各加一階六品巳下前資常選并㪚官至簡日稍優與處分未出身者量才授文武㪚官其中有才行學藝為衆所推者及嗣羣王嘗經任使灼然著聲績者宜委宗正卿琬漢中郡王瑀光祿卿涵録其名實具狀聞薦自天寳以来闕造宗籍宜令宗正等重申舊制昭辨等序即宜勘造圖籍宣示中外知朕意焉誡勵責齊王祐詔吾嘗誡汝勿近小人正為此也内乖成德外感非言自延伊禍以取覆滅痛哉何愚之甚也為梟為獍忘孝忘忠擾亂齊郊誅夷無罪去維城之固就積薪之危壞磐石之基為尋戈之釁背禮違義天地所不容棄父無君神人所共怒往是吾子今為國讐萬紀存為忠烈死不妨義汝則生為賊臣死為逆鬼彼則嘉聲不隕而爾惡跡無窮吾聞鄭叔漢戾並為猖獗豈期生子乃自為之吾所以上慙皇天下愧后土惋歎之甚知復何云貞觀十七年二月誡諸王任刺史别駕勅朕聞司牧兆人有國彞訓敦叙九族前王令典念此宗枝久遭沉翳近從班命庶展才能或授外藩或屬内職留念訪察屬想風兹罕立嘉聲或聞蠧政當官不存於職務處事多䧟於偏私禽荒酒德者葢多樂善敬賢者全少將性之昏昧違此義方豈朕之不明成爾薄德當從戒慎勉遂悛改如迷而不復自速愆尤已實為之悔之無及宜即逓相告示以副朕懷景雲元年十二月唐大詔令集巻四十
