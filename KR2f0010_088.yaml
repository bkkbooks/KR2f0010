body:
  text: 唐大詔令集卷一百九宋宋敏求編政事禁約下禁斷錦繡珠玉敕禁斷臘月乞寒敕禁别宅婦人詔禁止街坊輕浮言語敕禁殺害馬牛驢肉敕禁斷寒食雞子相餉遺詔條貫立戟敕禁天文圗讖詔禁大花綾錦等敕禁車服第宅踰侈敕申禁公私車服踰侈敕禁嶺南貨賣男女敕禁約下禁斷錦繡珠玉敕蘇頲敕朕聞召公曰弗作無益害有益孔子曰奢則不遜儉則固斯乃聖賢之至言矣叔代遷訛僻王驕縱頗榮於玉杯象箸不務於捐金抵璧好之者君也習之者人也即用匹帛服長纓之類歟朕爰在幼沖每期質朴手未曽持珠玉目未嘗觀錦繡願言其志造次不忘寅奉休圖勉康政道常想漢文衣綈之德晉武焚裘之事竟未能令行禁止敦本棄末朕甚懼之今王侯勳戚下洎厮養所得者重於逺所求者貴於異至於雕文刻鏤衣紈履絲習俗相夸殊塗競爽有妨於政無補於時豈朕言之不明教之未篤也且一夫一女不耕不織則天下有受其飢寒者今四方晏如而百姓不足豈不以尚於珠玉珍於錦繡墾田疇而奪其務出布帛而害其功歟珠玉錦繡等自今已後切令禁斷如更循舊弊並歸罪長官仍令御史金吾嚴加捉搦州牧縣宰勸督農桑待至秋收課其貯積使人知禮節俗登仁壽有司仍為條例稱朕意焉開元二年七月三日禁斷臘月乞寒敕蘇頲敕臘月乞寒外蕃所出漸漬成俗因循已久至使乘肥衣輕競矜胡服闐城溢陌深點華風朕思革頺弊返於淳朴書不云乎不作無益害有益功乃成不貴異物賤用物人乃足況妨於政要取紊禮經習而行之將何以訓自今已後即宜禁斷開元二年十二月七日禁别宅婦人詔别宅安婦先弛禁令往年括獲特已寬容何得不悛尚多此事國有常憲宜置於理方畫一於後刑故三令以先德俾從輕罰以愧其心今所括獲者見任官徵納四季祿前資準見任自餘諸色並準九品官祿數納粟婦女並放出掖庭即令京兆尹李朝隱求匹配嫁之行京都作戒天下敢更犯者一依常格開元五年七月禁斷止街坊輕浮言語詔堯屋可封孔門無倨此由淳風被洽德教𢎞之在人職歸所屬如聞輦轂之下閭閻之內口無擇言行不近禮則失長幼之序豈止儀刑之缺宜令府縣長官左右金吾明知訓導捉搦若有犯者隨事科繩開元五年十一月禁殺害馬牛驢肉敕敕自古見其生不食其肉資其力必報其功馬牛驢皆能任重致逺濟人使用先有處分不令宰殺如聞比來尚未全斷羣牧之內此弊尤多自今已後非祠祭所須更不得進獻馬牛驢肉其王公以下及今天下諸州并諸軍宴設及監牧皆不得輒有殺害仍令州縣及監牧諸軍長官切加禁斷兼委御史隨事糾彈開元十一年十一月禁斷寒食雞子相餉遺敕敕天地之德莫大於生成陽和之時先禁於卵殰比來流俗間每至寒食自皆以雞鵝鴨子更相餉遺既行時令固不合然自今已後永宜禁止朕每思儉朴深惡浮華諸色雕鏤等已令變革其公私宴會比者多假果及樓園之類虛為損耗競務矜誇亦宜禁絶有違者準今月八日敕條貫立戟敕敕立戟官中大夫守京兆尹上柱國臨淄縣開國男賜紫金魚袋元義方朝議大夫守尚書户部侍郎判度支護軍賜紫金魚袋盧坦立戟雖令式所著似有闕文而臺閣相承久為定制盧坦元義方如有所見即令上聞造次而行殊乖審慎宜各罰一月俸料其戟仍令所司收納左司郎中陸則勾檢之任發付不精禮部員外郎崔備工部員外郎元右等或以禮許人或守官假器比於申請其過尤甚各罰一季俸料緣兵興已來勳賞超越其所立戟須有明文宜令所司準舊制待官階勳至三品然後申請仍編於格令永為常式元和六年十二月禁天文圗讖詔敕天文著象職在於疇人讖緯不經蠧深於疑衆蓋有國之禁非私家所藏雖禆竈明徵子産尚推之人事王彤必驗景略猶置以典刑況動皆訛謬率是矯誣者乎故聖人以經籍之義資理化之本側言曲學實紊大猷去左道之亂政俾彞倫而攸敘四方多故一紀於兹或有妄庸輒陳休咎假造符命私習星厯共肆窮鄉之辨相傳委巷之談作偽多端順非而澤熒惑州縣詿誤閭閻壞紀挾邪莫逾於此其玄象器局天文圖書讖書七曜厯太乙雷公式等私家並不合輒有自今已後宜令天下諸州府切加禁斷各委本道觀察節度使與刺史縣令同為捉搦仍令分明榜示鄉村要路并勒鄰伍遞相為保如先有藏蓄者限敕到十日內齎送官司委本州刺史等對衆焚毁如限外隱藏有人糾告者其藏隱人先決杖一百仍禁身聞奏其糾告人先有官及無官者每告得一人超資授正員官其不願仕者官給賞錢五百貫文仍取當處諸色官錢三日內分付訖具狀聞奏告得兩人以上纍酬官賞其州府長史縣令本判官等不得捉搦委本道使具名彈聞奏當重科貶兩京委御史臺切加訪察聞奏準前處分咨示方面勳臣洎十連庶尹罔不誠亮王室簡于朕心無近宵人慎乃有位端本靜末其誡之哉大厯三年正月禁大花綾錦等敕敕王制命市納賈以觀人之好惡布帛精粗不中數廣狹不中量不鬻於市漢詔亦云纂組文繡害女工也朕思以恭儉尅已淳朴化人每尚素玄之服庶齊金土之價而風俗不一踰侈相高浸弊於時其來已久耗日用之本貪錦繡之奢異彩竒文資其誇競今師旅未戢黎元不康豈使淫巧之功更虧恆制在外所織造大張軟錦透背文及􅰃錦竭鑿六破以上錦獨窠文四尺幅及獨窠吳綾獨窠司馬綾等並宜禁斷其長行髙麗白綾雜色錦及常行小文字綾錦等任依舊例造其綾錦花文所織盤龍對鳳麒麟獅子天馬辟邪孔雀仙鶴芝草萬字雙勝及諸織造差樣文字等亦宜禁斷兩都委御史臺諸州府委本道節度觀察使切加覺察如違犯具狀聞奏大厯六年四月禁車服第宅踰侈敕蓋聞儉以足用令出唯行著在前志實為理本朕自臨四海憫元元之大困日昃忘食宵興疚懷躬絶文繡之飾尚愧茅茨之儉亦喻卿士形於詔條如聞積習流弊餘風未革車服第室相髙以華靡之利資用寶貨固啓於貪冒之源有司不禁侈俗滋扇是朕之教導未敷使兆庶昧於趨尚也其何以足用行令令臻於郅理歟永念慙歎逮兹申敕自今內外列職位之士其各務素朴𢎞兹國風有僣差尤甚御史列上主者宣示知朕意焉申禁公私車服踰侈敕理道所關制度最切近者風俗踰侈嵗月滋甚人隳本業用多費財爰命有司撮舉彞制務從簡朴度可久行將使尊卑有備刑罰少息其喪葬婚嫁吉凶凡物皆有著定尤聞僣差雖不在條件之物亦委所司準令或勾當仍切加捉搦不得輒有容縱軍國異容古今通理禁軍仗衛雜飾及諸道節度等使應緣軍裝服即不在此限或有留令慢法委御史臺彈奏當坐長吏用清頺風禁嶺南貨賣男女敕敕朕自臨御已來常恐一物失所以傷隂陽之和致災傷之變而重困吾民故推教化之源務率先之道減服御絶玩好茍利於民者無不行阻撓於政者無不改而郡縣災疫相繼屢奏流亡慘怛之懷疚於寤寐將何以臻於富庶哉茍害生民豈憚釐革如聞嶺外諸州居人與夷獠同俗火耕水耨晝乏暮飢迫於征稅則貨賣男女姦人乘之倍討其利以齒之幼壯定估之髙下窘急求售號哭踰時為吏者謂南方之俗夙習為常適然不怪因亦自利遂使居人男女與犀象雜物俱為貨財故四方鰥寡髙年無以養活豈理之所安法之所許乎縱有令式廢而不舉為長吏者何以副吾志哉自今已後無問公私土客一切禁斷敕諸州刺史各於界內設法鈐制不得容姦依前為市如敢更有假託事由以販賣為業或虜劫溪洞或典買平民潛出劵書暗過州縣所在搜獲據贓狀依強盜論縱逢恩赦不在原宥之限仍仰所在切加把捉如違節級科斷其方鎮及監軍使命並州府寮吏等自當謹守詔條率身奉法儻有踰犯當重科繩其白身除準敕常數進送亦準此處分其百姓兩稅定額各據土地所出方圓收納不得堅立色目妄配亂徵致令艱愁莫相保守如有貧窮不能存濟者欲以男女庸雇與人貴分口食任於行止當立年限為約不得將出外界還同交關各委本道長吏專加糾察仍先具條流聞奏其餘州縣更有積弊深害百姓而因循未革者亦具分析聞奏當酌量處分粗安黎庶稱朕意焉大中九年閏四月唐大詔令集卷一百九
