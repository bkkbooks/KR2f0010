body:
  text: 唐大詔令集卷六十六宋宋敏求編典禮封禪答請封禪詔貞觀十五年封泰山詔停封泰山詔貞觀二十年允羣臣請封禪詔封禪詔停封禪詔封禪器用從文詔永淳二年停封中嶽詔開元二十三年封泰山詔斷屠及漁獵採捕詔處分行事官乾封玉牒文開元玉牒文開元十三年東封赦書后土幸汾隂祠后土勑祠后土賞賜行事官等制后土赦書封禪答請封禪詔自有隋失道四海橫流百王之弊於斯為甚朕提劔鞠旅首啓戎行翼建興運克成鴻業遂荷慈眷躬承大寶每日昃思治不敢康寧競懷夕惕用忘寢興履薄御朽不足以喻賴三靈顯命百辟同心海外無塵逺方慕義但流遁永久凋殘未復田疇多曠倉廪猶虗家給人足尚懷多愧豈可遽追前代取譏虛美所望恂恂濟濟叶力盡誠匡其不逮致之至道如得雅頌形於金石菽粟同於水火反朴還淳當如來議貞觀五年正月貞觀十五年封泰山詔肇有蒸庶樹之司牧載籍所紀風烈猶存至於道洽品物功成宇縣天眷彰於符瑞人事表於隆平莫不增封岱宗廣禪梁甫榮鏡六合對越三神前聖所以垂其尊名後王所以仰其休烈蓋由此也自火德既衰三光分裂金行失御九鼎沉淪諸華競逐彞倫大壞雖周室削平趙魏隋氏混一文軌而金革之事未戢於封疆雅頌之音弗聞於朝廟遂使至教闕如淳風莫反齊郊絶類帝之禮日觀缺升中之儀其已久矣朕丕膺景命嗣修鴻基承大亂之餘當率土之責負扆興惕納隍在慮上憑宗社之靈下資士庶之力草昧伊始援干戈以靖亂區夏既平𢎞禮樂以緯俗尉侯無警菑畬有年比屋咸保其歡含氣不違其性殊方異域盡地界而來廷應圖合牒殫天符而表瑞緬懷載籍詳求諸已豈伊寡德能致此乎固乃上𤣥之所叶贊也而羣公卿士百辟庶寮固陳人祇之意請遵封禪之典推而不居至乎數四文武之情彌切內外之議日聞請誠繁頻淹厯年載朕繼迹百王因心萬物上奉蒼昊義在薦功下撫黎元方祈厚福既迫茲理敢不祗從猥以眇身齊美上代永言夙志凛乎增惕可以來年二月有事泰山所司宜與公卿并諸儒士并朝臣有學業者詳定其儀博考聖賢之㫖以允古今之中務盡誠敬稱朕意焉貞觀十五年四月停封泰山詔自古聖王受天之命建顯號於封禪揚洪名於竹帛者莫不功濟夷夏道叶人祇然後登泰山之髙刋梁甫之石未有七德靡紀九部寂寥而欲齊聲於聖哲並美於篆籕者也朕承宗廟之重當區宇之責寅畏三靈憂勤百姓雖戡剪禍亂定克遐荒而至教猶鬱刑典未措勝殘之化未洽於率土和平之風多慙於往烈是以覽經籍而自失想壇場而增懼亟寢縉紳之奏屢拒公卿之請逡巡大典荏苒數載近者百寮庶尹頻繁抗表殷勤固陳咸以為兩儀交泰四夷賔服禮讓興行年豐榖稔蒼昊呈符於上靈符不可以久替黎獻協心於下衆欲不可以固拒朕迫茲羣議敢不敬從欲薦功上𤣥大報后土升中之儀已具省方之期有日今太史奏有彗星出於西方撫躬自省深以戰栗良由功業之被六合猶有未著德化之覃八表尚多所闕遂使神祗垂祐警戒昭然朕畏天之威寢興靡措且曠代盛典禮數非一行途之間勞費不少東夏雕弊多未克復將送儀仗轉運糧儲雖存節省之儀終煩黎庶之力非惟上虧天意亦恐下失人心解而更張抑有故實前以來年二月有事泰山宜停庶夙夜自修遂其罪已之志勤恤匪懈申以納隍之情儻䝉靈祗廽眷宗社錫福朝廷同於大道風俗歸於朴素告成之美更思其宜仍命所司泰山有前代帝王因封禪立碑及石函之檢類遭離亂被賊毁廢並修立瘞藏之貞觀十五年六月允羣臣請封禪詔朕遐觀哲王煥在方册功既成矣咸修禮以升中道既行焉必奉符而告禪所以發揮天命昭告上靈其有建顯號以創鴻徽施尊名而騰茂烈者莫不揚輝於鏤玉絢景於塗金昭昭然麗三辰而並運㴞㴞焉播四溟而不極朕誠寡德良深景慕曩昔氓俗雕弊國步甫安勉致隆平日不暇給槐卿守闕請繼美於云亭嶽牧叩閽祈踵武於梁岱自惟菲薄至道未凝抗禮昊穹實惟疑懼緬尋幼齒運終交喪忘其家以狥天下委其體以濟寰區翊戴先皇削平諸夏出於萬死首導五橫之源不顧一身光錫兆人之命自越爐炭獲反營魂拔於鬼籙並登仁壽切惟天地之大德存於施生朕以徑寸之小心襲於造育降斯休泰諒或由茲不然者何能致於此也遂得池隍象浦苑囿龍沙置一候於鷁林同一文於鯨水並資天眷賁以咸寧豈朕之微而能及此今茲列辟卿士洪生碩儒各述靈徴纍陳丹欵既迫羣議當事敬從貞觀二十年十二月封禪詔許景宗門下朕聞天大地大首播黎元媧皇地皇肇恭𤣥籙是知施生為德處崇髙而不言亭毒攸資委欽明以司契洎乎三正迭建五運相遷休烈存乎墳典至道流乎雅頌厯茲千代咸宅九州逖聽風聲抑可知矣其有仰齊七政俯㑹百神祭靈眷於祥符報𤣥功於昭告莫不罄情梁甫繼踵云亭對越兩儀盡先聖之能事揚歷三統垂曩哲之尊名懸鏡天衢罔不由於此也自中陽絶紐堙赤檢於窮泉官孽紹興阻黃星於天塹永嘉東徙化金馬以為牛道武南徂飛蒼鵝以登闕祚周含嶽𦙍建三業以巢傾隋拜舜後及二世而舟覆莫不以凶易亂譬畏迹而橫奔以暴代昏同抱薪而止燎咸資攸斁之道兾及淳化之深各懷巨壑之心規享上靈之佑却行求進其可得乎由是寂寥千祀無懷之風不嗣泯棄七經子長之言殆絶遂致成山日觀久闕升中之儀汶上明堂疇聞類帝之義顧瞻禮樂深有可嗟朕初踐危機愍斯窮運上同附翼下靡息肩化感天狼䖍劉帝㝢鴻波蕩嶽溺橫流而罔訴大浸稽天墊重昏而莫拯惴惴黔夏各垂餌于鯨鯢籍籍僵尸並縻肌于偰窳上靈慈惻爰啓朕心景命潜通禀其仁育之性隂符煥發導以戡剪之功於是負荷休徴援旗鞠旅肅恭儲祉吟雲躍鱗順朱烏以行誅騫丹鳯而反舉射九鳥而懸日月區品物以昭陽和煉五石以造乾坤濟崩角以全眉壽於是上尊先帝凝旒於廟堂躬履兵鋒憂勤於燮輔既而仰逼威命俯順樂推越自唐侯言膺下武深推幽贊之重自朂若厲之懷遂至靈貺無涯剪旄頭而降錫逰魂削狂盡窮髮以開疆東苑蟠桃西池昧谷咸覃正朔並充和氣校凝旒於往代窮今古而罕聞考光宅於前皇罄紬緗而莫覩方今六合之表擊壤𫝊聲四海之隅菑畬嵗稔含氣者靡乖其性禀命者相賀其生豈朕眇身勤勞所逮諒由髙明垂鍳祚此隆平今茲三事大夫百寮庶尹各述天人之貺請躡封禪之蹤顧惟寡薄推而不有杜絶羣言至于數四中外之情尤切企佇之望逾深朕又詳思荷財成於穹昊自古賢哲並歸功於大帝迫斯至理弗獲固辭展禮上𤣥實增慙懼可以貞觀二十有二載仲春之月式遵故實有事於泰山諸內外臣僚嶽牧卿士既相敦喻將事告成各罄乃心無虧政道恪居所職務協時雍所司宜與縉紳先生載筆圓冠之士詳求典禮裁其折中深加嚴敬稱朕意焉其今年朝集使宜集洛陽宫應朝集依十五年三月八日敕諸王並聽來朝其北藩日磧以南大首領赴㑹仍令天下諸州搜揚側陋其有學藝優洽文材蔚贍政術甄明才膺國器者並宜申送限以來年二月一日揔集泰山庶令作賦擲金不韞天庭之掞被褐懷玉無溺屠釣之間務得英竒當加不次主者施行貞觀二十一年正月停封禪詔門下朕聞探𤣥賾者先實而後賔體至公者本仁而末禮名歸於已往哲存而弗務德利於人前聖狥而為急是用範圍天地權輕重以㑹時宜取則隂陽適變通以從衆欲由是古之封禪無奪事機所謂奉天咸資務隙朕仰窺前志厯選哲王無懷有巢緬逾繩契之表龜文鳯紀越在爼豆之先叩寂寞以𫝊疑故可略而言也至如三元立統百物正名步驟之軌非遙損益之原可挹雖則堯心廣運局壃域於流沙禹迹遐宣限要荒於碣石猶且先𢎞即叙次展玉帛之儀首創賔門方備云亭之典告成之義罔弗由茲况朕奄有方輿悃誠該於千古仰承靈眷降福走於百王巨海所環莫非臣妾長河攸括並入封疆日者夷夏同文禎符狎至謂可鳴鑾日觀勒牒仙閭許以來春親行告禪而今延陀一姓流竄西垂控絃千許初歸正朔亡其砂塞之地逰魂戴斗之鄉一物之微猶警心於夕惕九夷乃陋敢忘懷於施生新就縶維理須安置又以朕蚤嵗躬勤拯溺至於炎月㳂北不安公卿庶僚各勤諄請遂有翠微之役非無板築之勞既而山谷阻深朝宗有礙重披丹懇請建玉華朕以寸心經綸億兆冒茲隆熱貽朝野之深憂既鑒乃誠副率土之僉望遂復頻有造興恐致煩勞兼聞河北數州頗傷淹潦既為民父母思濟黎元順動升中理無兼遂其介丘大禮宜且權停前追諸王及四方嶽牧并蠻夷酋長令以明年二月㑹泰山者令並宜停其集便及選舉人等前令詣洛陽官可依常年集限並赴京師請為封禪事舉人營造轉營等事以上亦宜並詔停其玉華宫所立制度前已下詔務從菲薄今乃庶事减省更令卑陋示免風雨稱朕意焉可分道馳驛散頒天下主者施行貞觀二十一年八月封禪器用從文詔古今典制文質不同至於制度皆隨代革惟祭天地獨不改章斯乃自處以厚奉天以薄今又封禪之禮即用玉牒金繩器物之間復有瓦樽秸席一時行禮文質頓乖駁而不備深為未當其封祀降禪壇所設上帝后土位先設槀秸瓦瓶飄杯等並宜改用茵褥罍爵每事從文其郊祀亦宜凖此也麟德二年十月停封中嶽詔朕聞仁者德之本叶亭育之至途禮者道之末乃帝王之餘事厯選往初詳觀曩躅惻隱以孚其志變通以㑹其神朕以虛薄祗膺寶位旰食宵衣懼忝於宗社如傷如厲佇濟於黎元每以皇基肇開範圍覆載遺思所覃昭格區宇䖍荷靈命常慮下虧鴻業遍刋群嶽不足上報𤣥功已升聞於日觀思欵謁於天臺志在告成諒非為已屬今茲豐稔方有事於嵩丘崇纍聖之丕績祈兆人之嘉佑頃者分使出巡存問風俗河南河北尚有十餘州旱潦加以朔方寇盜時復侵邉關內流民未能復業一物失所猶甚納隍數郡不寧豈宜備禮前欲以來年正月封中嶽者且停之永淳二年十一月封泰山詔自古受命而王者曷嘗不封泰山禪梁父答厚德告成功三代之前率由斯義越自魏晋以降迄至周隋帝典闕而大道隱王綱弛而舊章缺千載寂寥封崇莫嗣物極而復天祚我唐武文二后應籙受圖洎于髙宗重光纍盛承至理登介丘懷百神震六合紹殷周之統接虞夏之風中宗𢎞懿鑠之休睿宗穆清粹之道巍巍蕩蕩無得而稱者也朕昔勘多難禀略先朝䖍奉慈㫖嗣膺丕業是用創九廟以申孝敬禮二郊以展嚴禋寶菽粟於水火捐珠玉於山谷兢兢業業非敢追美前王日愼一日實以奉遵先訓至於巡狩大禮封禪鴻名顧惟寡薄未遑時邁十四載于茲矣今五材無眚百穀有年刑罰不用禮義興行和氣氤氲淳風泊淡蠻夷戎狄殊方異類重譯而至者日月於闕庭竒獸神禽甘露佳醴窮祥極瑞者朝夕於林籞王公卿士罄乃誠於中鴻生碩儒獻其書於外莫不以神祗合契億兆同心斯皆列祖聖考垂裕餘慶故朕得荷皇天之景祐祖廟之介福敢以眇身而顓其讓是以敬承羣議𢎞此大猷以光我髙祖之丕圖以紹我太宗之鴻業永言陟配祗感載深可以開元十三年十一月十日式遵故實有事泰山所司與公卿諸儒詳擇典禮預為偹具勿廣勞人務存節約以稱朕意所沿封禪儀注兵馬陪集並皆條奏布告遐邇開元十二年十二月斷屠及漁獵採捕敕敕自古明王仁及萬物今助天孶育方欲告成其緣祭祀及在路供頓犧牲餼牢禮不可闕除此外天下諸州令並斷屠及漁獵採捕駕回至京任依常式處分行事官敕封祀告成為萬姓祈福必資清潔以副朕心其行事官及齊郎應致祭者宜令御史行牒齊坊勿容踈忽十一月乾封玉牒文嗣天子治敢告于昊天上帝有隋運極屯危數窮否塞生靈塗炭鼎祚淪亡髙祖仗黃鉞而救黎元錫元龜而拯沉溺太宗功宏鍊石定區宇於再麾業壯斷鼇飲滄溟而一息臣忝承餘緒繆延積慶遂得崑山寢燎炎海韜波雖業茂宗祧實降靈穹旻今謹告成東嶽歸功上𤣥俾大寶克隆鴻基永固凝薰萬姓陶化八紘開元玉牒文有唐天子臣隆基敢昭告于昊天上帝天啓李氏運興土德髙祖太宗受命立極髙宗升中六合殷盛中宗紹復繼體不定上帝眷佑錫臣忠武底綏內難推戴聖父恭承大寶十有三年敬若天意四海晏然封祀大嶽謝成于天子孫百祿蒼生受福東封赦書門下朕聞天監惟后后克奉天既合德以受命亦推功而復始厥初作者七十二君道德洽著時至符出皆用事於介丘升中於上帝人情之所望果有以塞之皇王之叙固可得而言也朕接統千載承光五葉惟祖宗之德在人惟天地之靈作主往有內難幽贊而集大勳間無外虞守成而纘舊服未嘗不乾乾終日思與公卿大夫上下叶心聿求至理以𢎞我列聖其庶幾乎馨香今九有大寧羣黎樂業時必敬授而不奪物亦順成而無夭懋建皇極幸致太和洎乃幽遐率皆感被戎狄不至惟文告而來庭麟鳯已臻將覺悟而在藪以故凡百執事極言大封顧惟不德初欲勿議伏以先聖儲祉與天同功荷𫝊慶以在今敢侑神而無報大節斯在朕何讓焉遂奉遵髙祖太宗之業憲章乾封之典時邁東土柴告岱嶽精意上達肸蠁來應宿信行事雲物呈祥登降之禮斯畢嚴配之儀獲展百神羣望莫不懷柔四方諸侯莫不來慶斯事天道之介福也邦家之耿光也無窮之休祉豈獨在豫非常之惠澤宜其逮下可大赦天下自開元十三年十一月十三日昧爽以前大辟罪以下罪無輕重已發覺未發覺已結正未結正囚繫見徒咸赦除之惟十惡死罪不在此例流人未達前所放還其有挾藏軍器亡命山澤百日不首復罪如初敢以赦前事言首者以其罪罪之內外文武官三品以上賜爵一級四品以下一階邠王守禮寧王憲岐王範薛王業各與一子三品官公主嗣主縣主郡主各與一子官其應文武行從官加階之外並賜勳兩轉三衛引駕細引黃衣長上飛騎彍騎先有武散官加兩階未給武散官各賜勳兩轉衛士馬主軍戎主幕士掌間供膳太常及仗內聲音人行署及蕃官七色并别敕雜色定名行從人亦賜勳兩轉緣大禮登山供奉侍從行事輿腳等官三品以上特賜一階仍與一子官四品以下特賜一階仍賜勳兩轉量與進改其四軍别抽登山宿衛及諸司上山執當官三品以上賜爵一等與一子出身四品以下加一階賜勳兩轉亦量進改其白身人及行署蕃官放蕃選其山下升壇行事官三品以上加爵一等賜勳一轉四品以下加一階賜勳一轉選日稍擾諸獻官及宿衛齊宫將軍率中郎并郎將并兩京留守諸軍節度使并升壇例諸有職掌押當非升壇例諸有職人加一階選日優量其加階應入三品五品人非特賜者並依十一年三月二十八日敕節限齊郎禮生見任官前資官以上人並依資量材與處分未出身者放出身皇親别敕承恩陪位官者亦准此諸州嶽牧四府長史朝覲陪位者泛階之外各賜勳一轉諸方使人及諸州父老宗姓并從家子孫至嶽不得陪位者並賜勳一轉物五段諸州及兖州道僧至嶽見大禮者並賜五段孔子後褒聖侯量才與處分天下致仕官各依本品賜一季祿并束帛其陪位者仍賜勳一轉諸蕃侯王酋長來會禮者各賜加一官至都節級賜其入朝留在邊軍人亦准此其蕃中祇候衙官刺史縣令並與賜物及袍帶突厥可汗小殺等諸國王守護塞垣歲月朝貢並賜物付使將往侍老年百歲以上者板授下州刺史婦人板授郡君年九十以上板授上州司馬婦人板授縣君年八十以上者板授縣令並婦人並級量賜束帛其預見大禮侍老各别加侍丁一人孝子順孫義夫節婦旌表門閭終身勿事行人之家及鰥寡惸獨并疾病不能自存者委州縣長官倍加存恤諸軍行有文武散官者加一階白身者賜爵一轉負缺官物逋懸租調並宜放免其行過州縣供頓劬勞并帖頓百姓有雜差科並車馬夫役者并免一年租稅兖州免二年租稅當頓官人始末不絶者與中上考仍賜勳一轉朕永為王業繄賴舊勳元首股肱其猶一體自武德以來功臣宰輔或名存王室遺嗣沈淪或身無大故銜屈泉壤直令所司放擇申理唐元元年六月初十日立功官人往屬艱難能盡忠義今成大禮何日忘之宜各與一子出身無子者任回與周親之人有司試䇿三道等第收奬朕躬陟天門宿齊日觀時屬嚴冬雪後初變風寒露立祈恩誓欲代人當咎俯仰之際頓息霜颷奠獻之辰變同韶景誠荷上天垂佑亦賴靈山吐祥詩云無德不報宜封泰山神為天齊王禮秩加三公一等宜令所管崇飾廟祠環山千里宜禁其樵採給近山二十户復以奉祠神率土之內賜酺七日任於村坊內宴樂不得率斂煩勞其節文有未霑及者有司比類奏聞其封祠有數處行事者從一處叙赦赦書日行五百里主者施行后土幸汾隂祠后土敕敕王者承事天地以為主郊饗泰尊以通神蓋燔柴太壇定天位也瘞埋太折就隂位也將以昭告靈祀克崇嚴配爰逮秦漢稽諸祀典甘泉於雍畤后土於汾隂既遺廟之巍然亦靈光而可燭朕觀風唐晉望秩山川肅恭神明思致禋敬為人祈福以輔升平合此神祗應於嘉德宜以來年正月北巡狩行幸至汾隂以二月祀后土所司宜准式開元十年二月祀后土賞賜行軍官等制自古受天之命作神之主崇德祀地盡孝配親存乎禮經不可闕也朕承纍聖之緒仗卿士之力方隅清謐宇宙乂安北巡并都南轅汾土覽漢武故事修后土舊祠時為仲春地氣萌動將先政本為民祈穀齊戒惟寅粢盛惟潔仲尼曰吾不與祭如不祭豈非躬盡孝敬以致神祗乎而經始遺壇寶鼎出地奠兹幣玉榮光塞河將何以幽答神心上應靈貺朕又懼焉今大禮克舉休允祥洽自天之佑豈豫一人思與百辟同兹嘉慶亞獻邠王守禮終獻寧王憲各賜七百匹申王撝岐王範薛王業各賜帛五百匹餘上壇官三品以上賜爵一級四品以下各加一階應入三品四品見任四品官以上先授正四品以上階經三十考者六品以上官授正六品以上階經十六考者令所司勘責奏聽進止諸㳂大禮有職掌者官賜勳兩轉餘陪位官賜勳一轉中書門下三品六曹尚書御史大夫食實封三品以上功臣各與一子官其立功萬騎身亡歿者雖預創業不見盛時念功思舊情有感惻並令所司檢勘亦各與一子官改汾隂為寶鼎縣官同升壇官例賜一階管壇一鄉復給一年其駕行幸處百姓㳂供頓應須供當者仰置頓使商量奏聞及制文不該者所司亦比條件聞奏開元十一年二月后土赦書張九齡門下昔者巡狩所至柴瘞所在蓋取誠享以遵告類朕躬承祖宗之烈獲主神祗之祀夙夜祗畏不敢荒寧故勤兵朔陲先展義於枌社回旌睢上遂有事於郊壇王者父事天母事地則漢氏祈榖未始正名周禮降神乃為徼福而已朕以天命為重子道為先惟兹精誠在乎教孝庶䝉福於四海期永康於兆人是以率由舊章恭敬明祀嚴配之誠既展奠獻之禮又終且春秋之義大事在祀齊祭之福庶品維祺豈獨在豫而有斯慶可大赦天下自開元二十年十一月二十一日昧爽以前大辟罪以下罪無輕重已發覺未發覺已結正未結正咸赦除之官人犯贓及有事被推者本罪雖原不得更令却上仍别與處分自奉先以來有雜犯流移人并配𨽻人各量移近處左降官未經量移未復本資者奏聽進止天下遭損免州應損户减一分以上者及供頓州無出今年地稅如巳徴納聽折來年地稅逋租懸調貸糧種子缺負官物在百姓腹內者亦宜准此其不損免州自開元十七年以前所貸糧種子缺負官物在百姓腹內者亦宜准此諸州緣供頓差帖助夫亦放其家今年地稅孝子順孫義夫節婦旌表門閭終身勿事諸州侍老百歲以上賜粟七石九十以上賜粟五石八十以上賜粟三石所由速付勿淹旬日太原潞府侍老等先已加恩不在此例亞獻皇太子鴻賜物二千匹終獻慶王潭賜一千匹邠王守禮寧王憲薛王業各賜物一千匹忠王浚以下各賜物三百匹夾侍正衣進圭捧圭汝陽郡王淳等各賜物三百匹皇太子夾侍正衣各賜物一百五十匹裴光庭蕭嵩弼亮朕躬𢎞益斯逺不有優異何殊等倫加階賜爵之外各與一子官無子者任與周親仍各賜物三百匹二王後各賜物二百匹長公主各賜物三百匹嗣王郡主縣主各賜二百匹行從文武官三品以上賜物八十匹四品五品賜物六十匹六品七品賜物四十匹八品九品賜物二十段升壇官三品以上特賜一階四品以上各加一階應入三品五品官階相當不限考數聽得入知頓使及判官修禮儀官撰玉册官知頓御史等加一級修壇揚州刺史及修壇官各賜物一百匹其已有升壇職長從一頭處分緣大禮有職掌官賜勳三轉行從官首末不絶及陪位官各賜勳兩轉內外文武官三品以上賜爵一等四品以下各加一階致仕官三品以上賜物七十匹四品五品各五十匹從蕃客鴻臚安置陪官見大禮者宜賜物五十匹節級分付南北衙應宿衛齊宫官及左右廂知兵馬虞侯總管以上及判司别奏兼孔目等官更加勳一轉前資官選日稍優與處分白身人有資勞者簡選之日優與處分無資䕃者賜勳兩轉仍各賜物五段兩營弓手六蕃併行宜各賜勳兩轉物五段仍量折蕃役諸位彍騎及兵角弓手官馬主掌間幕士駕供膳主膳習馭工人樂人雜尹官户白身有職掌人合行從人等各賜勳一轉物三段其齊郎既是現任官准壇上壇下有執掌官吏處分執彈三衛及禮生贊者各减二年勞無勞可减者簡選日稍優與處分流外行署從者各賜勳一轉有職掌者各兩轉供頓州刺史同陪位官例始末轉支頓官各與上下中考蒲州刺史寶鼎縣官同升壇官處分管壇一鄉百姓給復二年蒲州侍老等准太原潞府例降一等武德初功臣每有大慶必存追逺業參運始義合賞延其子孫沈翳無在朝者宜令勘責即與一子官唐元初立功臣等艱難之際誠效亦深言念其初豈忘終始其三品以上各賜紫金魚袋有亡歿者優贈一官仍與一子官已得官者量加優與兩京留守京兆河南尹四大都督府長史諸軍節度副大使准行從官例處分諸方通表疏使人預見大禮准陪位官處分諸道陳亡人家仰州縣存恤不周濟者量事賑給諸道健兒别敕行人各賜勳一轉仍令所司勘會團官奏寫告身送付諸道行人或有身死逋逃猶徴課役纍及親鄰即宜審勘為其除削皇親中有文武才用堪任使者委宗正以其名上當與奬擢五嶽四瀆名山大川自古聖帝明王忠臣輔相各令致祭務其誠潔赦書有所未該者所司比類奏聞亡命山澤挾藏軍器百日不首罪復如初敢以赦前事相告者以其罪罪之率土之內賜酺三日赦書日行五百里布告遐邇咸使聞知主者施行唐大詔令集卷六十六
