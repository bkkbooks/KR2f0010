body:
  text: 唐大詔令集卷一百三宋宋敏求編政事舉薦下詔天下搜賢俊制訪至孝友悌詔處分舉薦人詔令常參官舉人詔搜訪天下賢能敕搜訪兵術賢才詔按察上遣使巡行天下詔遣十使巡察風俗制處分朝集使敕八道舉薦下詔天下搜賢俊制賈至朕聞惟理亂在庶官是以先王旁求俊彥思皇多士以倡九牧阜成兆人頃者姦臣執權專利冒寵惟正直是醜惟邪佞是能此壅塞賢路罔蔽天聽使忠臣不得進其謀才士不得展其用廢三載之黜陟寢九德之推擇多有老於郎署滯於丘園吏稱無人才不給位朕以薄質嗣守大寶寇戎未殄王業維艱兢兢乾乾日慎一日緬惟堯舜求賢之意周公吐握之義思欲廣進髦乂輔寧邦家實賴公卿大夫𢎞我視聽易曰方以類聚語曰舉爾所知凡宰相王臣宜加搜擇其常參官及郡縣長吏上佐等皆從歷試而踐通榮如各知其密行異能博學深識才堪濟代術可利人名不彰聞位不充量湮淪屠釣流落風波者一善可録便宜公舉逺則封表附驛近則進狀奏聞勿避親讎無限儕伍其有獨負竒才未逢知巳即仰投匭并所在陳狀自論長官登時與奏夫兹薦士非止一舉永為恆典有即登聞昔荀桓子立翟之功士伯受瓜衍之邑栁下惠賢而不舉臧文仲被竊位之名春秋書之千載不朽凡百在位可不勉歟宜宣示中外令知朕意至德二年四月八日訪至孝友悌詔至和育物大孝安親古之哲王必由斯道朕往在春宫嘗事先后問安靡闕侍膳無忘及同氣天倫聨華棣萼居嘗共被食必分甘今皇帝奉而行之未嘗失墜每有銜命而來戒途將發必肅恭拜跪涕泗交連左右侍臣罔不感動間者旭日抱戴瑞亦自天白狼之瑞接武薦臻此皆皇帝聖敬之符孝友之感也故能誕敷德教𢎞乎四海信可以光宅寰宇永綏黎元者矣其天下有至孝友悌行著鄉閭堪旌表者命縣長官採聽聞奏孝子順孫樂於玄化也至德二年正月處分舉薦人詔推薦之道必務於至公賞罰之間亦資於不濫其諸色舉人等須有處分令薦所知實佇才能用施政理自宜慎擇以副虗懷古者效官三嵗考績善惡既著褒貶斯存舉之得人必受旌能之賞舉之失選亦加懲過之罰賞罰之典期於勉行凡百具寮宜知朕意寶應元年七月令常參官舉人詔敕知人則哲堯舜猶難類能而舉古今常式自頃中原多故汔求小康州縣屢空守宰多闕攝官承乏者頗無舉職之能懷才抱器者或有後時之歎朕所以宵衣不寐側席未遑思𢎞致理之規冀及大中之道而庶尹卿士備列朝廷豈無叶贊之心以助旁求之義其內外文武官如有堪任刺史縣令及出身前資人中堪任判司丞尉者宜令京常參官各慎擇所知具狀奏聞及諸州刺史縣令既藉寮屬宜亦準此古者得人受賞速不踰時增秩賜金有國通典其或任非稱職舉不當事顧多附下之心亦無不適之罰其所舉人受官後如政事尤異清白著聞三兩考後仰本道觀察使聞奏其舉主及所舉人並量加進改如懦弱不舉及暴政處置乖宜并冒犯贓私等罪論刑當亦連坐宣示中外知朕意焉寶歷元年九月搜訪天下賢能敕濟國安民兼先得士懷才抱器所切逢時茍獲賢能何難任使自從近嵗頗乏豐年百姓凋殘四方空竭雍交防戍卭蜀征行租賦罄於東南衣糧耗於西北欲全國力須整邉防所恨利於國者或迷之而未行害於人者或遣之而未去天下有洞諳邉事深會兵謀或決勝於干戈或運籌於帷幄及有苦心吏術深逹政經曽觀已試之能可致必成之理各仰自見所在長吏先共討論有可取者發遣赴京量事資送或安貞守道隱遁山林或勤學知書博通今古並仰所在長吏搜訪聞奏冀有才者得伸有能者得用凡思報國無若薦賢如得非常之材必加不次之賞布告天下知朕意焉搜訪兵術賢才詔朕每念艱難之本切思拯救之圖治少亂多古猶今也蓋搜揚之未至非爵賞之不行况自鄉里沽虛物情賈怨朝市有爭先之黨山林多獨往之人彼豈自窮驅而莫返其有文包經緯道貫儒玄貞遁自肥浮名不染豈無加等之爵以待非常之流今委使臣逺近徴訪必行備禮以聳羣方且機貴研深用惟體要運當無事固垂拱而可待時屬多虞非援竒而不振或有材優將略業洞兵鈐辨勝負於風雲計短長於主客妙得神傳之訣耻成兒戲之名不俟臨機方期制變或銷聲於屠釣或屈志於風塵勿愧自媒當期致用至乃旁窺國病動適時宜深探貨殖之源備得富強之術排於浮議鬱彼良圖又有志擅縱橫久潛緇褐材推超異見辱儕流茍全一藝之工不必萬夫之敵亦有推研歷象校步星辰言必效於機先術豈疑於億中是資竒器孰曰異端亦在勤求佇加殊賞噫功名可慕少壯幾何在君親則忠孝相資於國家則安危同切勿甘流落猶徇晏安並委使臣勝示訪求長吏津置發遣同心體國無使淹延懸賞俟能必期升擢朕雖踵艱否亦謂憂勤髙祖太宗之在天固當垂祐社稷生靈之有主夫豈乏賢逹我敷求咨爾將命勿虛翹矚茍自因循其間儒學優遊軍謨𢎞逺密陳時務願就制科者已從别敕處分跅弛遺才沉淪末位不礙文武並須升聞布告天下咸使知悉光啓五年五月按察上遣使巡行天下詔昔者明王之御天下也內列公卿允釐庶績外建侯伯司牧黎元唯其淳化未敷名教或替故有巡狩之典黜陟幽明存省方俗遐邇遂性情偽無遺時雍之宜率由此道朕祗膺寶命臨御帝圖稟過庭之義方荷上玄之嘉祉四荒八表無思不服而夙興夕惕勤躬約巳日慎一日雖休勿休欲萬國歡心兆民有賴推誠待物近取諸身實謂羣官受拜咸能自勵乃聞連帥刺舉或乖共治之寄縣司主吏尚多黷貨之罪有一於此責在朕躬是用中夜憮然昃景輟食宜遣大使分行四方申諭朕心延問疾苦觀風俗之得失察政刑之苛弊耆年舊齒孝悌力田義夫節婦之家疾廢惸嫠之室須有旌賢賑贍聽以倉庫物賜之若有鴻材異等留滯末班哲人竒士隱淪屠釣宜精加搜訪進以殊禮務盡使乎之旨俾若朕親覿焉貞觀八年正月遣十使巡察風俗制古之御天下者以大寶為公器以崇髙為外物仰則乾符順性命之理俯思坤載成厚博之德將以治成至道保邦靜人用清三徴以齊七政能臻夫此者豈一人之力哉實賴羣方共康庶績自季葉淪替偭棄公道官匪其人教無所習懷才修潔者則依違以自容通方宏偉者則放蕩以求利由是淳化日削澆風嵗長典章訛弊氓俗凋殘逶迤陵頺莫能振理朕以薄德丕承寶命夙夜惟寅憂勞無怠昧旦端冕心被寰瀛日晏罷朝念周黎庶頃者勵精推擇傍求牧宰冀聞善政惠康乃人虛已勵勤美化猶怠貪官傲吏屢黷於爰書失職流亡幾淪於版籍豈刑賞之柄不叶其中將宵旰之誠未孚於下永言國本良深軫悼古者天子巡狩省方觀俗而錫鑾備駕或以為煩故分命輶軒博採謡誦以彰善疸惡激濁揚清散皇明以燭幽揚仁風以被物實資令德允屬通才惟懷永圖式鑒成憲宜於左右臺及內外五品以上官識理通明立性堅白無所詘撓志在澄清者二十人分為十道巡察使二周年一替以亷按州部俾其董正羣吏觀撫兆人議獄緩刑扶危拯滯若能抗詞直筆不憚權豪仁恕為懷黜陟咸當别加奬擢優以名器如脂韋茍全籧篨戚施髙下在心顧望依附者將遷削屛棄肅以憲章咸竭乃心以副朕意神龍二年二月處分朝集使敕八道蘇頲敕朝集使等朕自臨萬邦倐已三載何嘗不兢兢業業勵精政道思欲棄末敦本阜俗安人寰瀛之間日月以冀所以急於務農不奪人時富而教之庶乎可致夫苛政甚於猛虎貪人比之強賊頃雖臨遣使臣未能澄正此弊或刻以害物或擾以妨農或背公向私或全身養望至使錢榖不入杼軸其空捐瘠相仍流庸莫返且四方事廣非一人獨化共理之寄非卿而誰卿等至州遞相朂勵勤恤孤弱勸率耕桑各效清勤無或墮怠開元三年二月十五日又敕朝集使等朕聞御寰瀛者不可以獨化養黎獻者必存於共理故専一方親百姓能致循良之術必無愁苦之聲非牧伯之賢疇能於此所以精求臺閣歷選縉紳當舉百寮之要以先六刺之重虛想準政用成庶績自去冬入計者則循名責實詢事考言雖不無等差終未有殊異得非嵗時或淺風教未洽耶故一切不除各再臨所典至於敬耆老恤煢弱止姦盜挫豪強人不忍欺吏不敢犯田疇墾闢獄圄空虛徭賦必平逋逃自復門杜請謁庭無滯留若是者乃關乎職思可以力致至於弭災眚集休祥尚德義崇禮樂儒風大長道化滂流耕夫克讓織婦知節草木不夭昆蟲咸遂扇彼淳源登兹夀域若是者亦𢎞之在我仁逺乎哉豈惟祿秩就加以公卿入拜其或靡副朝奬不恭朕言陟既有之黜故宜及勉旃俞往各勤我班瑞之分命開元六年二月六日又敕朝集使朕聞天生蒸人溥於四海天有成命孚於萬邦必內立公卿外建侯伯后非賢罔使賢非后罔事借耳以廣聽假目以遐覽則諭上旨通下情庶政諧而羣萌樂矣由是三考黜陟百官會同古昔之訓炳然共守朕以薄德祇膺寶位受乾坤之顧荷宗廟之靈懍乎若涉春氷如馭朽索責在司牧所賴分憂曷嘗不想望賢才馨香至化七年於兹矣咨爾羣嶽實邦之良服勤政途深佇嘉績豈為吏罕久與人未信何殊尤異絶寂寥厥聲恭惟永圖當副虛屬孔子曰茍有用我者三年有成漢宣曰庶人安田里無愁恨之聲者政平訟理也以為太守數易則下不安誠哉是論矣今之牧守古之諸侯寵數特加情寄尤切故躬饗廷內則飲食晏樂幣帛筐篚入至朕前則敷祍以陳命席而對所冀仁且不逺言之必行以朕憂勞之心託卿勤恤之助卿等宜慎厥始成厥終往欽哉祗守爾典操一州之統分六條之察念兹在兹用光我班瑞之命有賞有罰朕無戲言並即好去開元七年三月十一日又敕朕自君臨區域子育黎庶嵗年是慎夙夜惟寅而誠或不孚政猶未洽所在旱潦屢覩章表因飢饉而為理竭憂勞以養人非夫二千石孰應斯委下户給之髙户貸之所須賑恤並先處分至於常賦則著恆典檢據成損蠲減有條又近日以來中外少事差科調發殆至於無處馭通融當免於弊不知卿等從州來日百姓間得以安穩否其閭閻未便敕令有闕具以陳聞副我深寄時寒涉路並平安好其三兩日尋親識後取曹司進止開元七年十月二日又敕朕聞諸禮曰刑禁暴爵舉賢則政均矣好惡著則賢不肖别矣其道然耶朕以虛薄祗膺景命荷宗社之靈當億兆之責曷嘗不昃朝晏坐畏天愛人思欲保其和樂躋於仁夀則與我共理者其惟良二千石乎每計吏還州與之陛見示其賞罰餞以筐篚亦云命而已矣而朝集使豫州刺史裴綱分典荆豫為政煩苛頃嵗不登公議蠲復部人有訴便致科繩縣長為言仍遭留繫御史推按遽以實聞虐政弊人一至於此朕夙夜乾惕匪遑寧居尋遣使存問其諸道有損處已量加賑恤水旱不時實朕之過惠養失所分刺之由是用黜綱於嶺裔警彼羣嶽朕於蒼生若保赤子為之均田邑制廬井必欲其時和年登逺安邇肅託於牧宰代以躬親故歷難其官誠經國致理之意也夫德惟善政政在養人故土煩則草木不長水煩則魚鱉不大必也寬恕貴乎清靜諸刺史都督宜問疾苦拯貧窮杜侵漁察寃獄至於賦役務從減省深刻為事人何以堪私惠茍行法或將墜理須折衷用存令式其百姓有穩便者隨事條奏將親覽焉欽爾有官各勤為政如風化允穆課績殊尤當擢之不次旌乃厥美凡百庶邦敬聽朕命開元八年二月十九日又敕朝集使古者覲羣后比萬國黜幽陟明循政思理罔或廢也朕以虛薄屬當期運受命穹昊司牧黎元何嘗不中夜求衣分晝忘食欲其日月所燭霜露所墜不獨親其親不獨子其子五榖豐殖萬物阜安百姓無事與能共化於兹八年矣而淳流未還至道猶鬱豈朕之不德邪將吏之不賢耶徭賦或繁耶綱維或紊耶故延入階陛躬問得失悉如卿所對則朕無憂矣書曰非知之難行之惟難語曰仁逺乎哉我欲仁斯仁至矣卿等宜祗典厥職克正其身修於國章允兹朝寄因乎風俗示之訓誘必也道德齊禮以公滅私田里絶愁歎之聲邦家聞寬厚之化乃及優賞如或依勢作威倚法以削流亡未至教令不行加以常罰自餘宜依别敕處分勤恤人隱以副朕懷並仰好去開元八年三月十一日又敕朝集使等朕承天丕命子育萬方樹之師長俾敷景化將以固兹邦本致諸升平而大道緬然淳風未暢租賦頗減户口猶虛水旱相仍耕桑莫贍蓋朕之不德而吏之無方永言於兹良增歎息往嵗河南失稔時屬薦飢州將貪名不為檢覆致今貧弱萍流外境責在致理有從貶黜因兹以來率多妄破或式外奏免或捐中加數至如密州去秋奏潦管户二萬八千八百不損者兩户而已無田商賈之流雷同入數自餘州不損户即丁少得損户即丁多天災流行豈應偏併皆是不度國用取媚下人曩之刻薄也如彼今之踰濫也如此不副朕意一至於斯踈怠之愆雖已會赦尸曠之迹豈不多慙當令所司比類澄汰卿等與朕共理實惟分憂各勉思政途以匡不逮其百姓間事物去冬赦書已處分訖若人有疾苦鄉有姦豪不勤農桑不崇學校並宜敦勸以正風俗逃亡之户必藉招携差科之間務令停減如臺省處事有不穩便於時者具利害聞奏勿復依隨以損百姓卿等至州之日宜一留意綏我庶人並即好去開元十年正月十一日又敕朝集使等朕臨宇內子育黎元何嘗不簡易愛人勤恤庶政天下至廣不能獨任故樹之方牧資其共理而淳化未敷至道猶鬱庸賦未減户口且虛水旱相仍倉儲莫贍無聞慈惠之政未息凋弊之流豈朕之不明而吏之無術言念於此用惻於懷卿等是行勉思厥政百姓間有鰥寡􅑏獨不能存濟者務令優養遊業浮惰不勤稼穡者特令懲肅敦以學校勸以農桑差科之間務使平允逃亡之户兼藉招携令其下人使得蘇息諸州遭潦之處多是政理無方或堤堰不修或溝渠未泄頻已處分竟無承稟當被租庸是何檢校至州之日各宜勸勉應合修塞開導宜預施功若不暫勞何以獲利今令御史分知訖宜勵所職勿犯常科今考績深者已有除改資歷淺者更佇良能應還州人已令所司各與賜物待駕發後三五日别親識並即好去開元十年二月二十七日唐大詔令集卷一百三
