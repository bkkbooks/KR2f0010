body:
  text: 唐大詔令集卷一百二十二宋宋敏求編政事捨雪下重原宥淮西將士等詔放淮西生口歸本貫詔釋放妖妄人李廣𢎞支屬敕闕雪王承宗詔宥淄青大將詔赦鎮州德音雪王庭湊詔洗滌長慶亂臣支黨德音復陳敬瑄官爵制捨雪下重原宥淮西將士等詔陸贄勑乃者希烈亂常阻兵竊號汚脅士衆殘虐蒸黎朕志在好生誠深罪已為人受恥不忍加兵惟兹一軍代著忠節果殱元惡不替舊勳詢於衆情就邦興戎人亦勞止期於小康旋乖恤下之方重致喪身之禍由朕薄德俾人不寧撫臨萬邦且愧且悼賴將校士旅秉其誠心邦人不驚軍部撫撓以兹節效良有可嘉所宜慰安俾洽寬釋應士吏人承前所有諸色過犯罪無輕重一切釋放曠然昭洗咸與更新其先請受莊宅財物者各以見管為主將士衣賜節料并家口衣糧等一切並準舊例以時給付不得停減先合優與賞設亦準元敕處分務令豐厚以稱朕懷仍加曉諭各使知悉放淮西生口歸本貫詔陸贄敕遷徙家鄉分離骨肉有生之酷莫甚於兹朕撫育兆人庶臻理道懲過不可以不罰原情不可以不矜將推內恕之心用廣自新之路應從李希烈作亂以來諸道所擒獲淮西生口配𨽻嶺南黔中等道宜一切釋免放歸本貫其投降人等權於諸州縣安置者亦任各從所適雪王承宗詔帝者承天子人下臨萬邦觀乾坤覆育之施常務其曲全用德刑撫御之方每先其𢎞貸叛則必罰服而捨之稽於典謨亦尚斯道朕祗符前訓纘嗣丕圖底寧方隅蕩滌氛祲上以攄祖宗之宿憤下以致黎庶之阜康思厚者生務去者殺至於包荒掩慝屈法伸恩茍衷誠之可矜則宥過而無大王承宗頃居喪紀常見賣於鄰封後領藩垣或受疑於朝野國恩維厚時憲未容戚實自貽寵非我絶百辟卿士昌言在庭四方諸侯飛奏盈篋競請致討爭先出車尚復廣示招懷務存容納至於動衆事豈願然闔境憫羅其殺傷退舍為休其士伍取陷救溺能無慘嗟以其先祖武俊有勞王室書在甲令銘於景鐘雖再駕之師每從人欲而十代之宥常切朕懷近以三代私慶八表流澤廣此鴻霈開其自新而承宗果能翻然改圖披露忠懇逺遣二子進陳表章緘圖印以上聞獻德棣之名部發囷奉粟并竈貢煙地願復於職方物請歸於司會且天子所臨莫非王略析兹舊服將表爾誠諒申效順之心悉見納忠之志抑而不撫何以示懷朕念此方其猶赤子一物失所寢興靡寧忍驅樂土之人令就陳原之戮既克剪暴常思止戈豫之此心天地昭鑒况常山師旅舊有功勞將改往以修來誓酬恩而遷善鑒精誠之俱切俾渙汗之載敷曠滌乃愆斷在朕志復此殊渥當懷永圖其王承宗所有瑕釁特宜洗雪依前守銀青光祿大夫檢討吏部尚書兼鎮州大都督府長史御史大夫上柱國充成德軍管內支度營田鎮冀深趙等州觀察處置等使應成德軍將士官爵實封等一切仍舊待之如初其管內四州百姓委承宗厚加安慰令守生業官吏已下各守舊職於戲禍福無門善敗由已所鑒既因於克念易轍因獲其就安行之維艱守在勿失凡百庶士宜知朕懷宥淄青大將敕敕魏博及義成軍節度送到擒獲逆賊李師道下都知兵馬使夏侯澄兵馬使朱澄等共四十七人附麗凶黨拒抗王師國有常刑悉合誅戮朕以其人居汚俗皆被脅從况討伐已來時日未幾縱懷轉禍之計未有效欵之由情似可矜朕不忍殺况王軍百姓孰匪居人詔令頒行罪止師道方欲拯於塗炭是用活其性命誠為屈法庶使知恩並宜從寬釋放仍令郵遞送至魏博及義成軍各委節度收管驅使如緣父母血屬猶在賊中或羸老疾病情切歸還者仍量事優賞放去務相全貸何所疑留赦鎮州德音門下仲尼有言詩云執轡如組審此言可以為天下也蓋為聖人組修其身而成文於被故伯益贊禹則曰滿招損謙受益所以報有苖夏后啓亦云吾德未至教未善故能尅有扈茍齊俗以禮化人以躬而可感於神明柔於蠻貊纍聖遺教升平舊風堅金在鎔為人之所鑄猛獸在柙由人之所馴因而撫之敢忘前訓朕以菲德纘承鴻緒屬先皇掃刷中宇康濟兆人八表晏然五兵咸息常兢懷於繼述思致理於和平豈以樂戰為心佳兵在念而鎮州以承宗云亡自歸誠欵幽州以劉總懇志願釋兵符相繼來同無思不服非服勤於逺略力以致之亦能綏柔咸加霈澤不愛金帛以惠於戎士不吝爵賞以寵其偏禆復以一二台臣嘗推謹願庶將朕志以靖方隅而佚於既安莫能思患曽未纍月旋聞叛離朕亦欲因其人心命將興師顧念𢎞正盡忠先朝身嬰殘害家受屠戮為之元首能不痛心是用下制先申告諭求其凶惡冀釋幽寃仍令四面節度各守封境不欲遽加誅討所望自效忠誠而將士等懼罪以相保王庭湊為衆之所迫固其封壤捍以兵鋒每聞戰爭永言黎庶為之君父又可忍乎是用輟食忘寢書夜萬慮恭惟烈祖之訓必用兼愛之心務以安人為國本不以窮武為威力顧豫寡昧敢忘遵承為追念而興師已極君臣之分為軫憂而捨罪豈非帝王之道况王庭湊倉卒之際固非始謀接之以恩榮自當展其志義委之以戎鎮必冀效於勳庸禍福無門行之則是弛張在我用亦何常茍推信誠便保忠順茍得其衆孰非吾人擢而任之式示光寵宜特舍雪仍授檢校右散騎常侍兼鎮州大都督府長史御史大夫克成德軍節度鎮冀深趙等州觀察處置等使應成德軍將士官爵一切依舊待之如初仍令兵部侍郎韓愈充宣慰使於戲朕於彼三軍惠非不至於彼闔境恩非不周今𢎞寬大之典以應陽和之令使離散者見親愛之樂暴露者歸室家之安各宜感悅以就寧泰布告中外體朕意焉主者施行雪王庭湊詔帝王之御大器也上法天意下順人情何嘗不欲舞干羽之報以致懷來滌塵垢而𢎞惠貸朕以寡昧獲守昌圖享二百餘年之丕基纂十三列聖之洪業而涉道猶淺燭理不昭德未洽於生靈信未孚於微隱至使河朔殘梗藩臣阻絶既多在豫之責每軫納隍之念頃者滄州拒命將帥專征有國彞章非朕敢赦諒功成九伐當事止於一方况成德本軍早列勳籍庭湊初意亦獻嘉謀因緣細微互搆瑕釁且聞朝廷已挂刑書雖欲上陳固難自逹及滄德翦定甲兵偃戢拜章辨數納疑鄰封爰懇台臣俾通王命備聞恭惕延望私恩感激而情動三軍歡呼而聲馳四郡朕猥居兆人之上常懼一物失所雖外示君臣之義實內猶父子之親豈可使覆載之中不沾雨露照臨之下獨隔輝光斷自豫衷靡聼輿議既改之而不吝則得之而如初俾服官榮載膺寄任爵服盡在恩禮用加其王庭湊可依前授金紫光祿大夫檢校司徒兼鎮州大都督府長史御史大夫上柱國太原郡開國公食邑二千户充成德軍節度鎮冀深趙等州觀察處置等使於戲天道之所助者曰順人倫之所重者曰忠為君在於不疑為臣在於不二然後上下交暢以底泰寧當𢎞令猷勉收來效凡百卿士宜體朕懷洗滌長慶亂臣支黨德音門下皇王之令凶慝必置於嚴誅天地之仁含育亦存乎在宥除惡務絶其根本原情必諒於親踈慮興詿誤之嫌用安反側之舉寬𢎞之典盡滌瑕䀶追惟長慶之初亂臣賊子之輩人神共憤覆幬不容頃以論刑是從流竄而東宫親昵之黨亦參帷幄之謀顧偷冒以取恩陷君父於不義必資懲創以蕩姦源議法當然非朕敢赦而曽不知過交搆流言興謗道途扇惑人聼蓋以從前搜捕未盡巢穴猶存再令根尋果獲支黨無非近戚咸伏其辜於臣節而既虧於國章而難逭外廷徴兵欲戍邉塞此皆狂詐扇動人心况今邊上甲兵足以備禦欲令知委故重宣明仍委所在節級將以此告諭昔者堯舜之俗比屋可封虞芮之人讓畔可感仁義則水火可蹈忠信則蠻貊可行由是言之亦在化之而已逮我長理何其逺哉豈朕之滿假荒寧自聖而不可教也將朝之魁梧骨鯾自持而莫我念邪二者之來皆朕不敏內省終夕其心浩然於呼封域之中干戈作矣廊廟樽爼無忘弭寧布告朕懷以須良善主者施行長慶元年八月十四日復陳敬瑄官爵詔大海所以長百川者下流必納大地所以載萬物者有質皆容哲后體之事無常世弔人拯溺則龔發王師録舊棄瑕則大開法網斷自朕志又何愧焉陳敬瑄發迹禁軍遂各居大鎮因緣遭遇窮極寵榮先皇帝頃屬艱難遂至巡狩敬瑄當鎮都會頗罄忠誠大則有天下赴難之師皆求宿衛次則有官司奔走之吏重創朝廷玉帛波輸梯航露集實竭勇智備極經營庭支日費而未省告勞供饋星繁而竟無橫斂全由盡節果叶中興朕初奉宗祧未熟政理遽忘前績俄至興師責楚子之包茅爾雖曠職望公孫之豆粥豫亦無恩致我勞臣冀明素志近者視朝無事乙夜觀書則盧綰之在四夷尚堅夙衛周勃之居一縣足表厚誣前史具存殷鑒何逺矧朕沖眇敢忘勳勞相印兵符髙爵顯位既從昭雪寵加如初勉思禍福之門重契君臣之分抑人情而遵天道既已無疑思福善而誡禍盈使當自省王建顧彥朗等久屯師旅頗罄忠勤盡懷頗伏之謀俱奉及瓜之戍眷言勳效常所歎嘉今則大布寬仁永安誣誤在稟垂櫜之令勿辜偃革之恩便令部領師徒各歸所任其廽戈將士等仰彥朗王建以奉本道上供錢物量事優賞訖奏兼聞楊晟等深知逆順首率歸投陳徑草之心備宸輿之禮書之信史永播忠規敬瑄重作藩侯列牧復為州將勉斯如叶以保初終無搆厲階重貽伊戚敬瑄可開府儀同三司太師兼中書令成都尹上柱國潁川郡王食邑四千户食實封八百户充劔南西川節度副大使知節度事管內觀察處置統押近界諸蠻及西山八國雲南安撫制置營田供軍糧料等使於戲刻舟求劔取笑古人膠柱調絃故難忘理以兹通變冀息干戈茍有利於蒼生又何辭於改作布告遐邇咸使聞知大順二年三月唐大詔令集卷一百二十二
