body:
  text: 唐大詔令集卷六十九宋宋敏求編典禮南郊三乾元元年南郊赦元年建卯月南郊赦廣德二年南郊赦貞元元年南郊大赦天下制南郊三乾元元年南郊赦門下朕聞皇天有命皇王受之命之為君孝理為本莫不欽崇前烈聿修禘享之儀對越上玄式展禋郊之禮故美其盛德商頌有奏鼓之音告厥成功夏書有錫圭之慶國之大事實在於斯間者逆冦亂常暴殄天物致使圗書禮樂或阻於干戈宗廟神祗有虧於享祀朕誕受明命恭行大罰羣凶克殄討鯨鯢以示威王室既寧奉鑾輿而載復太上聖皇大帝功格天地道邁胥庭思凝神於姑射將釋責於宸扆豫小子纘承大統夙夜祗懼俯盡臣子之心親親尊尊庶極於此是用追崇先后建立中宫永言孝感思徽音於文母使行婦道想釐降於虞嬪情理於是獲申人倫以之攸敘然後執瓚清廟歌五聖之重光燔柴圓丘覩百神之受職復修祭禮再備樂章尊祖配天不失舊物今大禮斯舉玄符允答行慶施惠尚薦於陽和出繫挺囚必當於時令思與天下更布惟新宜覃肆眚之恩以洽雍煕之化可大赦天下除反逆支黨緣坐十惡謀殺劫盜臨監主守自餘一切原免其與逆賊元謀及脅從今但歸投並原其罪仍與官資其成都府元從聖皇功臣及靈武元從功臣并收兩京將士三京留守諸道節度採訪使普恩外三品以上賜爵一級四品以下加一階行人賜勳三轉自寇賊以來官吏百姓有申勞未經酬賞者委所在長官具狀聞奏當與甄録天下百姓除正租庸外一切不得别役如緣軍務所要自今和市兵士尫弱羸老並揀釋放其長安萬年兩縣各借一萬貫每月收利以充和雇其别敕索物及供諸司並蕃客等左藏雖給價直奏請每引時月宜先給兩縣各五千貫貯於兩市差官專知旋還價直其州縣門夫勳官並於舊額數減一半其庸丁殘疾人等不須更差其州縣官新上物件並以公廨及官人料錢依時價和雇造買不得分配典正其年支口味宜減一半諸使應進鷹鶻狗豹豽等一切並停應緣南郊百司張設有損百姓苗稼者委京兆尹隨損多少陪酬所損錢物即便聞奏百姓中有能行仁義分濟貧窮免填溝壑賴救恤者具名聞奏當寵以官秩鰥寡惸獨篤疾不能自存及陳亡人家并損免户州縣隨事優恤賑給百姓中有事親不孝别籍異財點汚風俗虧敗名教先決六十配𨽻磧西有官品者禁身奏聞京官九品以上許封事極言時政得失朕將親鑒用佇嘉謀才有可觀時當敘録草澤及卑位之間有不求聞達未經推薦者有一藝以上恐遺俊乂令兵部吏部作徴召條目奏聞其録事參軍職司糾舉自今以後宜升判司一政以彰委任國子監學生明經明法帖䇿口試各藝並能通四以上進士通三典及第鄉貢明經準常式州縣學士放歸營農待賊平之後任依常式二王三恪各與一子官內外文武三品以上賜一級四品以上加一階四月十四日元年建卯月南郊赦門下惟天為大事之在明惟聖能享承之在德朕託於人上獲守丕圖思大道之行去鴻名之飾文武徽號存而不稱開統履端建元叶紀美皆有讓言必可陳虔告玄元致齋清廟恭行舊典展禮南郊百神允懷上帝臨我升聞之際其亦何言昭事而誠實應多福髙而不逺復見其心乃候發生之時用行嚮勸之道暘谷出日登大明於域中泰山起雲遍膏澤於天下君人臨照德澤周給布其寬大豈止於兹宜𢎞肆眚之恩益廣萬邦之慶可大赦天下自元年建卯月一日昧爽以前大辟罪以下罪無輕重已發覺未發覺巳結正未結正見禁囚徒常赦所不免者咸赦除之其反逆造偽頭首者謀殺故殺并十惡死罪官吏及典正犯贓為蠧既深在法難容並不在赦限其史朝義下脅從將士及受偽官等棄逆歸順因事立功封賞之外餘無所問其諸色流人及左降官等前後頻有處分並與量移所由稽遲動歷年序宜令有司申明前後制敕節文速勘責類例聞奏其中有行業夙著情狀可矜久踐朝班曽經任用者委在朝五品以上清望官及郎官御史於流貶人中素相諳委為衆所推者各以名薦須當才實其內外文武官三品以上賜爵一級四品以上各加一階成都靈武元從功臣三品以上更賜爵一級四品以下各加一階朕敬授人時慎徽月令庶無否極以獲休徴自今以後每至四孟月迎氣之日與百辟卿士舉而行之建辰月應畨彍騎宜三分量留一分其餘放歸營農至建巳月任依常式諸州刺史縣令及有司參軍令設法勸課令其耕種不得失時貧不攴濟户仍方圓處置量事借貸務令成立歲終巡按量其功效便申賞罰諸道貢獻除馬畜供軍之外其餘鷹鷂狗豹竒禽異獸並不得輒進五都之號其來自久宜以京兆府為上都河南府為東都鳯翔府為西都江陵府為南都太原府為北都孝本天經禮崇國典橫於四海漏及三泉其京清資正員文官五品以上并兩省供奉官御史諸州刺史諸道節度使三品以上父亡母殁未曽追贈者量與追贈文武不墜道𢎞於人務在搜揚俾其展效其諸道人中有詞學髙深兼通政理軍謀制勝明習韜鈐者委所在刺史揀擇聞薦京官四品以上正員文武官任各舉一人孝子順孫義夫節婦旌表門閭終身勿事廣德二年南郊赦惟我髙祖太宗之有邦罔不昭事於上帝嚴恭寅畏與神合符七聖在天眷命永固朕嗣守鴻業敢忘奉先尚質貴誠聿修盛典頃以四方多難責在朕躬建侯行師日不暇給東擒羯胡之首西禦犬戎之患元元告病社稷阽危內定外攘不遑展禮雖髙明未逹而精意惟勤克通至誠以錫純嘏蕃夷即敘弓矢載櫜虔奉泰壇鑒昧接神祗之顧永懷宗祏歲時結霜露之思近又百辟在庭儼然而進奉請元子以居少陽册命乃行匕鬯攸主按風雨之清道乘星火之仲春朝於玄元格於藝祖躬執圭奠祗見南郊天何言哉神所勞矣敷兆人之戩穀廣四達之聰明式重燔柴之經益申解網之惠可大赦天下自廣德二年二月二十一日昧爽以前大辟罪以下罪無輕重巳發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之左降官即與量移近處亡官失爵放歸不齒之類并已復資未得本階者各量與收敘諸色流人及量移人并罰鎮效力配𨽻等一切放還自凶孽亂常王室多故干戈不息今已十年軍國務繁關輔尤劇念兹疲耗久困征科其京城諸司使應配彍騎官散官諸色丁匠幕士供膳音聲人執祭齋即閣事掌間魚師并諸司門僕京兆府驛丁屯丁諸色納資人每月總八萬四千五十八人數內宜每月共支二千九百四十四人仍令河東關內諸州府配不得偏出京兆府餘八萬一千一百一十四人並停所須衛役使宜撙節定數官給資錢不得干擾百姓其寶應元年十二月三十日以前諸色人逋欠在百姓腹內者并宜放免天下戶口宜委刺史縣令據見在實户量貧富作等第差科不得依舊籍帳據其虛額攤及鄰保其天下諸州府長官及縣令有清白著聞善政稱最能招緝逃亡編附復業户口增多者具狀聞奏朕當差人按覆與所舉狀同者超資進改天下所有諸色結聚及羌渾黨項等能悔過自陳各歸正業一切並捨其罪其中有能率衆先來者仍特加官賞征人不息勤戍斯久丁壯疲弊老弱困窮光武有言頭髮為白故戢藏鋒刃牧養元元凡方靣重臣宜悉朕意應諸州團練將士等委本道節度使及都防禦使等審與州府商量如地非要害無所防虞其團練人等放營農休息寇戎以來積有年歲征求數廣凋弊轉深自今以後除正租稅及正闕并度支符外餘一切不在征科限內文武官三品以上賜爵一級四品以下各賜加一階仍賜勳兩轉武德唐元功臣勳業特崇子孫沉翳所司勘責各與一人官成都靈武元從普恩之外三品以上更賜一級四品以下更加一階寶應功臣普恩之外三品以上各與一子六品官賜爵一級四品以下各加兩階更賜勳兩轉五品以上官子為父後者賜勳兩轉副元帥光弼子儀各與一子五品官並階諸道節度使各與一子五品官并階都防禦使經略等使各與一子六品官並階去歲行幸陕州六軍英武威逺武寶應射生左右步軍等并內外文武百官扈從到行在者三品以上與一子官四品以上各加兩階自陕州至上都以來置頓使及州府官普恩外各與一子出身置頓使判官已緣路縣令及專知頓官各加一階其六軍神䇿寶應射生衙前在生及左右步軍英武威逺威武等諸左右金吾將士緣大禮扈從及在城留後者共賜錢五萬貫鴻臚蕃客共賜錢一千貫文儀王及彭王以下諸王男未有官者並準舊例與官其已封為郡王國公者永穆長樂以下長公主及諸縣郡王并嗣王郡王各與一子官皇親五等以上諸親三等以上各與一子出身二王之後各與一子官臺省之官事資履厯刺史縣令任在親人職務所更是為理本其左右丞侍郎御史中丞等取曽任刺史者郎官亦取曽任縣令者并所選御史亦宜於録事參軍縣令中簡揀仍須資厯稍深者其有官非纍厯才行特堪任用者自布衣以上任所聞薦委中書門下尚書省考試堪任者不在此限尚書省理政所繫左右丞綱轄攸歸比來百司職事皆廢宜令明徴式令各舉所職百司有論時政得失並任指陳事實具狀進封必宜切直無諱有司白身人亦宜準此任匭使進表朕將親覽必加擇用朕每思素儉敦以淳風必約嚴章以齊侈俗其珠玉器珍寶細雜繡等一切禁斷諸道攝官頻有處分一切盡停尚聞因循其弊未革即宜申明舊敕勒停三年之喪謂之逹禮自非金革不可從權其文官自今以後並許終制一切不得輒有奏請緣大理應升壇殿行事者普恩外更與一子官應在太清宫郊廟諸色職掌者及封皇太子行事官撰册并書册文及檢校造册官普恩之外三品以上賜爵一級四品以上加一階仍賜勳一轉天下侍老九十以上板授刺史七十以上板授上佐縣令孝子順孫義夫節婦旌表門閭終身勿事五嶽四瀆名山大川自古聖帝明王忠臣義士宜令所管致祭貞元元年南郊大赦天下制陸贄門下君天下者受命於天地繼業於祖宗致其誠心惟敬與孝失敬莫大於廢杞虧孝莫大於黷神朕以眇身屬承大統縱欲敗度浸生厲階兵連禍深變起都邑六師播蕩九服震驚郊廟園陵陷於凶逆神人之主將逮周星列聖之業幾墜於地遺敬虧孝罪由朕躬撫臨萬邦甚用自愧側身思咎庶補將來股肱元臣比義叶德爪牙衆士戮力同心誅大憝而京邑廓清剪逋寇而關河底定兹朕再與王公卿尹洎億兆之人備其盛容條具物禮薦誠清廟展敬圓丘陳謝罪愆告情雪耻感慕慚惕若無所容上帝顧懷再新景命豈伊匪德獨被鴻休思與普天誕膺多福可大赦天下自本年十一月十一日昧爽以前云云李希烈背逆不道情所難容朕憫念蒼生務思征討頻有詔命許其自新若能歸降依前待之以不死淮西管內將士官吏百姓等一切原宥與之如故官封亦皆復舊如能特建功效者當别抽擢若家口親屬在諸道者長吏撫綏各使安集其歸順百姓仍委節度觀察刺史給空間地任便安居優復終身矜全濟大事平已聽歸本貫云云自頃凶渠倡亂逆將附姦保據國都憑陵甸服出次郊邑再遷巴梁險阻艱難靡不經厯暴亂之後乃彰烈士之功憂危之中方見直臣之節進善録勳其可弭忘應奉天興元元年元從立功并收京城將士食封者各隨文武與一子官餘並加兩階仍賜勳兩轉其文武百官應扈從到興元府者五品以上賜爵一級六品以下加一階自建中四年以來殁身王事義烈著明未經褒贈者本道即具名銜事迹聞奏諸道有辭退官健州府長吏切務安存仍量以空間田地給付免其差役任自營生社稷之勳以輔興王業統帥之任以總制戎麾職弼諧者其德崇授旌節者其功大方鎮乃國之垣翰禁衛實豫之爪牙尹京實賴於肅清主計尤資於辦集所頒慶澤宜越常倫司徒兼中書令晟宜與一子五品正員官并四品階諸道副元帥各與一子五品正員官都統與一子六品正員官中書門下平章事充節度使各與一子七品正員官節度使及神䇿兵馬使六軍統軍金吾六軍大將軍判度支侍郎各與一子八品正員官都團練都防禦使京兆河北尹金吾大將軍殿前兵馬使各與一子九品正員官多難以來三十餘載克平禍亂屬在戎臣或節著艱難勳髙戰伐受任雖專於將帥成功亦賴於羣材𢡟賞推恩宜加胤嗣諸道大將功業崇髙者各與一子官本使即詳定録名奏副元帥都統兼節度使下每道共三十人節度使下每二十人都團練都防禦使下各十人如大將軍子孫之中有藝業優長性行純確者本道使具狀聞薦仍量事資給令赴上都朕獲隨材授官以充侍衛庶使功臣之後與國無窮故尚父子儀先朝元勳再復京邑贈大尉秀實以死為國節冠古今宜與子孫一人五品正員官自至德以後節度大將忠烈功績著明其後淪翳者所司即條録聞奏與子孫一人正員官諸色人中應在賊中潛奉神主頃已甄賞宜賜優崇云云江淮運使檢校左僕射同中書門下平章事韓滉勵精勤節夙夜在公漕挽資儲千里相繼事無愆素人不告勞拯於凶災厥有成績可進封晉國公關畿之內連歲興戎荐屬天災稼穡不稔榖糴翔貴蒸黎困窮倉廪空虛莫之賑贍每一興念憫然痛心宜支度取江西湖南見運到襄州米十五萬石設法般赴上都以救百姓荒饉如山路險阻運挽難通仍召貧人令其般運以米充腳價務令全活流庸庶事優饒副朕勤恤立國之道始於親親所以厚骨肉之恩明教化之本况荐經難故宗族漂淪敦睦之情有加常日大長公主長公主公主各與一子七品官嗣主郡主縣主各與一子官出身如宗子中有德行才能宗正卿具以名聞當别奬任致理之本在乎審官審官之由資乎選士將務選士之道必精養士之方魏晉以還澆風未革國庠鄉校唯尚浮華選部禮闈不精實行學非為已官必徇人法且非精弊將安救宜令百寮詳思所宜各修議狀送中書門下恭校得失擇善而行有虞建官三載考績在漢為吏或長子孫蓋吏久於官則人情無茍官久於事則理化有成日者制度廢隳考課乖舛淹速靡準升降無名欲令庶僚何所懲勸自今以後刺史縣令未經三考不得改易自餘非在職績效殊尤亦不得越次遷轉刺史停替須待魚書內外五品以上及常參官在任年老考已深者即量其才效與改中外迭處以觀其能夫明目達聰務廣聞見或處懷才抱器輸忠納諌之倫處地幽遐無由自達永言於此夢想不忘應諸色人有長䇿濟時忠規匡主任具陳所見詣所居之州委刺史略與討論觀其旨趣但有禆理道不涉私情便與附驛遞進朕當親覽自立兩稅經今六年初定之時已有偏併或户口減耗舊額猶存輕重由不均流亡轉甚委度支即折衷條理以恤困窮古者雖有水旱人無菜色皆猶儲畜不匱勸道有方前代所置義倉國初亦循其制備災救乏甚便於人宜即準貞元故事天下所墾見田上自王公下及百姓每豐稔之歲秋夏兩時州縣長官以理勸課據頃畝多少隨所種粟豆稻麥遂便貯納以為義倉如年榖不成即量取賑給官司但為其法勸課不得收作用度管各委本道遂宜處置聞奏敦本厚生必資播殖當今所切莫甚於斯自今百姓有墾闢田疇於常歲者所加之地不得輒歲徴租其刺史令長考課亦以本界墾田多少為殿最令蝗蟲損甚州府開春之後量給子種以便農功天下應荒間田有肥沃堪置屯田處委當管審細檢行以諸色人及百姓情願者使之營田如部署精當收獲數多本道刺史特加褒升逃户田地本主復業即却給還輦榖之下四方會同共應既多難為凖定急賦煩役人何以堪宜令京兆尹與度支計會長安萬年兩縣每縣委與貯備錢五千貫文縣庫收納定清幹官專如應緣卒須别索及雜供擬并工匠等縣令與專知官先給付價錢季冬之後申度支勘會所市和雇並須先給價錢兩稅一物以上不得科配百姓御史臺朝廷綱紀尚書省理化根本百度得失繫乎其人自頃制敕施行所司多不遵守王臣奉職豈所宜然御史臺左右丞切紏稽違無壅朕命唐大詔令集卷六十九
