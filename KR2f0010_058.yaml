body:
  text: 唐大詔令集卷六十八宋宋敏求編典禮南郊二貞觀十七年南郊德音景龍三年南郊赦開元十一年南郊赦天寶六載南郊赦闕天寶十載南郊赦南郊二貞觀十七年南郊德音朕嗣宗祧夙夜寅畏憂勤在於政道撫育遍於含生十七載於兹矣上𤣥儲祉貞石表瑞朕式修禋燎躬謝蒼昊逮於儲兩亦申䖍奉朔風既切飛雪載零及登泰壇六合開朗神祗介福豈獨在豫和樂之慶宜備率土可賜三日酺自漢魏以來或賜牛酒牛之為用耕稼所資多以宰殺深乖惻隱其男子七十以上量給酒米麵梁州管內大辟罪以下見禁囚皇太子慮過諸州並遣使人分往唯十惡不在慮限餘皆量情降宥焉景龍三年南郊赦朕聞禘神配祖昊穹著其成命就隂即陽墳典明其大節故豺獺有祭下不隔於微品犧牲必陳上以光於嚴配軒皇用事則雍旁五祠漢帝潔齊則城南七里固能使敬而不黷求而不匱我髙祖神堯皇帝開階立極配永循機太宗文武聖皇帝仗金䇿而清四方運璇璣而齊七政髙祖天皇大帝與乾坤合其德與日月合其明則天大聖皇后建補天立極之功受河圖洛書之統五精歸運四葉重光朕䖍順樂推欽承眷命紹宏基於纍聖日慎斯兢執大象於羣生夙興如厲逺人殊俗占風而集蠻邸美瑞休符繫日而輝史筆故得三邊靜柝五兵銷刃寰宇大寧人神式序而德慚被物誠謝格天水旱尚臻政刑猶舛永以憂惕無忘鑒昧然則事天事地莫盛乎禋祀弗躬弗親孰申乎誠敬朕自臨四海於今六年幸承祧社之靈未展郊丘之謁方今朔風候律南晷登辰乘上日而恭饗奉髙禋而肅事備殷薦之文行昭報之禮豈唯光靈所燭俱驗其徴方兾後先不違實受其福至若五刑之屬十惡為重自頃恩赦罕聞該及朕以眇身膺乎大寶下人不足每切如子之傷上帝所臨敢逃在豫之責閒居三月未弭厥愆靜念終朝載增寅畏侑神伊始與物惟新思崇曠蕩之恩以答髙明之貺可大赦天下繫囚見徒及十惡咸赦除之雜犯流人並放還京文武官及應禁考使别敕陪位官邉州都督刺史諸軍大使副使三品以上賜爵一等四品以上加一級入三品者三品减四考五品减三考聽入外文武有官賜勳一轉關內諸州無出今年地稅令內五品以上各舉堪任州刺史縣令者天下大酺三日景龍三年十一月二十二日開元十一年南郊赦門下朕獲主三靈於今一紀聽政中昃每不敢康觀書乙夜將求諸道頻年巳來每思至理或逺人不率或嗣歲不登淳朴未還惕厲斯在為人上而慚德奉天明以畏威故祝史正辭必期於陳信郊丘備禮將俟於升平今宗廟降靈克開厥後乾坤交泰保合太和麟鳯龜龍𤣥符黃瑞之祉蠻夷戎狄梯山航海之琛莫不日月以聞道路相屬顧惟不德承茲休運欽若昭報疇咨故實所以今年獻春恭祀后土季秋吉日追崇九廟採先後於魯經稽肆類於虞典爰因長至欽謁上𤣥告受命之元符昭嚴配之成績大典云備至誠克展諸侯駿奔來於穆之相百神受職率咸秩之文六變巳陳三獻斯畢蓋春秋大用莫先乎祀王者盛禮莫重於郊柴燎克終感慶罔極豈豫一人之福亦爾萬邦之賴宜因咸和之際俾承厚下之澤可大赦天下自開元十一年十一月十六日昧爽以前罪無輕重巳發覺未發覺巳結正未結正繫囚見徒大辟罪以下咸赦除之其十惡死罪造僞頭首劫賊殺財主不在赦例就中仍慮有寃濫者所司具狀送中書門下盡理詳覆奏聞朕將親覽其有亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之升壇行事官及供奉官三品以上賜爵一級四品以下加一階諸獻官並准升壇例內外文武官及致仕并前資陪位者賜勳一轉緣大禮有職掌押當者更加一階齊郎並與出身皇親諸親倍位未出身者並放選已出身者賜勳一轉親王公主各與一子官三衛監門黃衣長上飛騎萬騎并仗內雜色人在齊宫宿衛及諸色有資勞人緣大禮有職掌并流外行署預見大禮者亦賜勳一轉其充香爐執扇及禮生祝史贊者賜勳外簡選日優與處分兵士宿衛齊宫并諸色無資勞緣大禮有職掌及京兆府百姓緣南郊祗應者各免其家一年雜科差南北衛將軍率中郎將宿衛齊宫者並同升壇例其諸軍節度大使及三都留守雖不陪位委寄既重特宜同升壇官例百歲老人賜綿帛五段粟五石縣令至其家存問給付孝子順孫義夫節婦旌表門閭終身勿事諸州百姓或因逢水旱流寓未安者宜令所司與朝集使即作賑恤安輯法奏聞其單貧衛士畨鎮久次令州府長官簡擇灼然者放免畨役征行人家州縣檢校勿使侵欺磧西鎮人途路懸逺者特宜賜勳一轉鰥寡惸獨亦令州縣矜恤使得存濟元置義倉救人不足承前貸百姓糧及種子未納者並放免不得却徴自古聖帝明王忠臣烈士名山大川並令所管致祭其已得替官人並轉纍未得處分非老弱疾病猶堪處事者量加收録使免失職其左貶官非逆人五服內親及犯贓賄名教者所司勘實奏聞量移近處其官人有清白政術堪任刺史縣令及抱器懷才不求聞逹者州長具以名薦宗室中有孝悌才術為衆所知仍在俾任者委宗正具以名奏君臣一體休戚共焉朕今承天命恭𫝊大寶蓋憑纍祖餘業得一之符亦由羣公舊勳不二之力永言繄賴其敢忘之自武德以來實封功臣知政宰輔有身無大故而亡官失封子孫淪屈所由勘實具以狀聞存者可籌其官榮逝者當録其𦙍嗣使幽明同慶知有令辰亞獻邠王守禮終獻官寧王憲各賜物一千段捧俎申王撝夾侍岐王範薛王業各賜物七百匹侍中源乾曜中書令張說兵部尚書同中書門下三品王晙各賜物五百匹正衣附馬都尉王守一王繇溫曦宗正少卿崔澄各賜物三百匹二王後賜物一百五十匹壇場使京兆尹孟溫禮賜物二百匹修造羽儀使賜物一百匹修撰儀注官五品以上賜物百匹六品以上賜七十段自餘陪位預宴官一品賜物一百匹二品三品八十匹四品五品六十匹七品四十匹八品九品三十匹鴻臚諸蕃等使與見大禮及在本蕃王侯大酋長同宴會例給賜郡主縣主各賜物八十匹緣大禮數處有職長者任於一頭從髙叙天下州府賜酺三日京城五日前任所在百姓村坊宴樂不得科率聚斂其有處分未該者令所司及本使比類奏聞赦書曰行五百里主者施行天寶十載南郊赦皇天眷命必順於五行哲后馭時實遵於三統考古之道何莫由斯朕欽若上𤣥嗣守丕業察璿衡以齊政念稼穯以勸人日慎一日四十載於茲矣何嘗不夙夜祗畏憂勞在懷思康黎元臻夫至理幸以刑理俗阜天成地平萬方底寧羣物咸遂雖慙大化且謂小康皆至道儲祉宗社敷佑豈豫菲薄而克致焉然則上稽歷象旁採輿議爰以土位承漢火行是憑大易之辭用紹前王之烈禎祥纍應正閏攸分不改舊章惟新景運屬歲初吉乘時布和是命展祀崇禋竭誠昭報庶叶發生之序載覃雨露之澤可大赦天下自天寶十載正月十日昧爽以前大辟罪以下罪無輕重已發覺未發覺巳結正未結正繫囚見徒常赦所不免者咸赦除之其左降官及流移配𨽻安置罰鎮效力之類並稍量移近處其官已復資至叙用之日不須為纍其流人配𨽻并一房家口者所犯人情非切害身巳亡沒家口放還流人及左降官考滿載滿丁憂服滿者亦准例稍與量移其亡官失爵放還不齒及諸色放停解考免與替人等非犯贓唐大詔令集卷六十八
