body:
  text: 唐大詔令集卷四十七宋宋敏求編大臣宰相命相四李逢吉平章事制王涯平章事制崔羣平章事制李鄘平章事制李夷簡平章事制皇甫鎛平章事制程异平章事制令狐楚平章事制韓𢎞中書令制蕭俛中書令制段文昌平章事制崔植平章事制杜元頴平章事制王播平章事制元稹平章事制裴度平章事制李逢吉平章事制命相四李逢吉平章事制門下朕觀古先哲王興化致理未嘗不選建良弼熙寜庶工俾之敷陳大猷左右乃辟者也朝議郎守中書舎人權知禮部貢舉輕車都尉賜緋魚袋李逢吉疏通而守於經制質厚而輔以文章貞恒自居和易待物體賢人之志業茂端士之風規履歴班行發揮事任厥心匪懈所至有聲自彌綸粉闈駮正𤨏闥且司言於西掖嘗納訓於東儲誠明一貫聞望旁洽俾司貢士彌著嘉聞方今外興不得巳之師内有不獲安之俗恒忘食於將旰毎求衣於未明冀清原野之誅用止干戈之役登爾匡輔代予憂勤爾宜宣至化於吾人告嘉猷於厥后銷弭氛祲導迎和平事有不舉于中政或未孚於下爾惟啓沃無乃靣從可朝議大夫守門下侍郎平章事賜紫金魚袋元和十一年二月王涯平章事制門下上宰叅職所以登三台之耀中樞議政在乎遂萬邦之宜朕獲承鴻休思建皇極冀沃心而納誨恒注意於求賢通議大夫尚書工部侍郎知制誥翰林學士上柱國清源縣開國男食邑三百户賜紫金魚袋王涯動直静専踐方居易挺歳寒之勁質抱夙夜之端誠言惟守中慮每經逺屬者禁垣揮翰五字日宣選部持衡九流風動荐居肘腋之地歴試股肱之才進嘗伏於青蒲出不洩其温樹牟融得大臣之節毛玠有古人之風詢廟筭於生知論兵鈐而暗合方今戎車尚駕郊壘猶多必俟清明以清氛祲是用付以機宻陟於崇髙爾其發號令以端其四方陳便宜以寛於百姓行臺閣之故事𢎞朝廷之大體秉德以立徇公不回俾予一人垂拱而理敬聽朕命懋哉可守中書侍郎平章事元和十一年十二月崔羣平章事制門下成萬方之化通天下之志緝熙帝載昭暢𤣥猷在於股肱之臣共凝理本旁求時彦以叙彞倫朝㪚大夫尚書户部侍郎上柱國賜紫金魚袋崔羣精宻由道端莊保和本清明之上才體博厚之重德學貫通儒之業詞含大雅之風居敬有恒循性能斷自承我宻命職叅内廷髙文煥發於綸言敏識詳達於國典伏奏無撓直躬不回勤勞八年始終一致春闈取士必後其浮華地官理財制能於輕重儉以約已忠惟事君才適而用深望積而實著風猷巳洽於人聽倚屬方注於朕心乃膺審像之試以副具瞻之望况奸兇叛逆尚駕戎車未明求衣思戢干戈爾宜酌古今之要舉刑政之中艱厥位以代天工陳其謩以明皇極敬玆重命徃踐台階可守中書侍郎同中書門下平章事㪚官勲賜如故元和十二年七月李鄘平章事制弼成庶政必屬於長才經制四方是資於碩望况叅酌理本燮和化源茍非傑賢孰允斯任爰立爾德將諧具瞻淮南節度副大使知節度事管内度支營田觀察處置等使銀青光祿大夫檢校尚書左僕射兼揚州大都督長史御史大夫上柱國江夏縣開國侯食邑一千户李鄘性惟直方器本𢎞固冲敏可以成務通明可以質疑懷匡主之忠規藴經邦之逺畧歴居雄鎮累服大僚臺閣藩方動留成式資為重望綽有餘才必能翼宣鴻猷導迎和祉是用徴拜陟於黄樞竭爾訏謨司我號令法期畫一俗俾康寧寅亮庶工屬在良輔爾其勤思至道以洽太和戒之敬之徃踐厥職可守門下侍郎同中書門下平章事㪚官勲封如故元和十二年十月李夷簡平章事制門下致理之道王者由其盡心弼教之功輔臣所以宣力皇極是建蒼生乃安敷求實難倚任斯重將付大政必惟僉諧正議大夫守御史大夫上柱國成紀縣開國侯食邑一千户賜紫金魚袋李夷簡才稱通明性本嚴重守以正直傅之文華羽儀朝端冠耀宗籍早司邦憲爰總地征糺逖無聞於避强經費克均其定制中立不撓孤標出倫聳善激貪法行令肅自鎮漢上洎臨蜀川儉德載彰清規一貫山岳比厚風雷有常勵貞峻以理心竭忠勞而奉上人望汲黯卬歸趙堯俾之持綱萬目斯舉固可以總叅庶務允釐百工燮和隂陽宣發號令是用申命陟於台階於戲説積爾躬夢協朕志虚已將求其𢎞濟鯁言罔懼於咈違道必兼舉位無茍曠膺此寵權敬哉戒哉可守門下侍郎同中書門下平章事元和十三年三月皇甫鎛平章事制六符成像所以平泰階九賦克均所以阜羣物爰資宰臣𢎞贊謀猷逹其富庶之源以致雍熙之化用輔台德其允具瞻朝請大夫守尚書户部侍郎兼御史大夫判度支上䕶軍賜紫金魚袋皇甫鎛行惟孤貞性本堅直秉仁履義守正之方才適變通辭去枝葉藴冲用於靈府表公器於上林夙懷經濟之謀早在賢良之選累踐華貫服於大僚端肅有常發揮事任自總邦計貳領地官屬以徴戎車討平淮㓂發軵調食制外自中法無過差動有成績山甫彰勤恪之効志在奉公夷吾職輕重之權誠宜佐國是用命爾俾昇台司望以沃心勞乎注意尚興師旅方殄妖氛翼亮是叅經費仍屬爾其悉乃心力副於簡求物有未遂其宜望有未洽於道罔或安位必思匪躬酌下土之盛虚中樞之政令光昭厥辟時乃之休可守尚書户部侍郎同中書門下平章事依前判度支元和十年九月程异平章事制門下昔漢宣帝𢎞祖宗之業正刑德之本簡求輔相以致中興朕祗荷丕圖思揚聖緒每懷舟楫以渉巨川俾人不迷用底於道今獲良弼式允僉諧朝㪚大夫守衛尉卿御史大夫充諸道鹽鐡轉運等使賜紫金魚袋程异厚德外嚴沉機内朗抱精微以致逺本誠明以格物盡瘁事國誠明在公常探化源雅尚學術揚歴斯久公望藹然自位列大僚總兹劇務達𣙜酤之利適財賦之方瞻出納於邦家中績効於官業頃以淮夷未殄師旅在郊有漕輓之勞兼供億之費言念多事恐傷吾人而异法能變通道益明著言無伐善動必由𠂻藴夷難致君之心見懷道佐時之畧况屬饋軍之事尚倚良能載閲前功宜當大用乃服休命俾叅中樞爰表秩於冬官仍兼綜於舊職膺兹重任用表全才爾宜左右朕躬朝夕啟沃干戈未戢尤佇廟謀敬聽斯言副我明奬可尚書工部侍郎同中書門下平章事依前充諸道鹽鐡轉運使元和十三年九月令狐楚平章事制門下贊天工而成光濟叶帝力以致昇平非中和禀氣不能符燮調之道非誠明在躬何以膺弼亮之位况今積妖巳殄而邉鄙猶虞大化方行而里閈未泰將欲舉百度甄羣材外經四夷内輯諸夏納之夀域被以仁風代予之勤其孰克任眷求斯得是用命之河陽三城懷州節度使朝議郎使持節懷州諸軍事守懷州刺史兼御史大夫賜紫金魚袋令狐楚根於粹厚著以端明表山立之莊容洞泉渟之精識文髙雄富學茂該通自頃揮翰掖垣持囊禁署常延造膝屢竭沃心發言必誠臨事無惑藹是公望居然國楨及剖符近郊兼暢救人之術仗節分閫尤深馭衆之方可謂器適中外効宣文武宜展舟楫之用式登鼎鉉之司管於中樞持我大柄於戲輔翼之任人臣極崇未至而衆議有歸既處而其名罕副萬務攸託朕何賴焉爾其敬聽此言深思其道行致君之忠終始勿渝以報國為期夙夜益勵無俾厥后有慚知臣可朝議大夫守中書侍郎同中書門下平章事元和十四年七月韓𢎞中書令制門下納大忠樹嘉績為臣所以明極節錫殊寵進髙秩有國所以待元臣况乎邦教誕敷王言總㑹百辟攸憲四方式瞻永念於懷久虛其位載揚成命僉曰休哉宣武軍節度使知節度事汴亳潁等州觀察處置等使開府儀同三司守司徒兼侍中使持節汴州諸軍事汴州刺史上柱國許國公食邑三千户韓𢎞降神挺材積厚成器中藴深閎之量外標嚴重之姿有匡國濟時之心推誠不耀有夷兇禁暴之畧仗義益彰自作鎮浚郊二十餘載師徒禀訓而咸肅吏士奉法而愈明俗臻和平人用庶富威聲之重隐若山崇屬者淮濆濯征命統羣帥克殄殘孽惟乃有指蹤之功及齊境興妖分師進討遂梟元惡惟乃有畧地之効既聞旋旅俄請執圭深陳魏闕之誠逺繼韓侯之志朝天有慶湛露方濃又抗表章固辭戎旅三加敦諭所守彌堅于藩于宣諒切於注意我弼我輔難違其哀懇式遂良願載兼上司論道之崇因之以齊七政中樞之長昇之以贊萬務𤣥袞赤舄備乎龍光不有其人孰膺斯任於戲出總兵柄入叅廟謨家國之慶盈門君臣之道交泰為我柱石古今曷儔服而温㳟以佐乃辟可依前守司徒兼中書令㪚官勲封如故主者施行元和十四年八月三日蕭俛平章事制廊廟之任萬邦所瞻調一氣之和序五材之用出納王命發揮帝猷簡求賢能𢎞我邦本朝議郎守御史中丞飛騎尉襲徐國公賜緋魚袋蕭俛識通化源道契休運有戴君峻節之志秉見義匪躬之誠代襲公卿族髙軒冕學貫古今之要詞探雅誥之宗嘗事先朝職居宥宻奏議無撓忠勞益彰洎執憲南臺肅清朝序休望彌洽直聲日聞朕方臨萬邦思致於理若渉大水浩無津涯將務簡以安人欲息兵而論道審象而授其代予勤爾其端志絶私去末學本叙禮樂於邦國施政教於人倫舉其鈞衡明示天下無俾一德専美於殷爾其敬之奉我成命可朝㪚大夫守中書侍郎同中書門下平章事仍賜紫金魚袋元和十五年閏正月段文昌平章事制眷於良弼期在濟時必惟才臣乃克成務况端潔剛毅可以肅具寮敏裕周通可以熙庶績外無飾虛之禮中有効實之誠簡於朕心乃命以位朝㪚大夫中書舎人翰林學士武騎尉賜紫金魚袋段文昌門襲忠勲器包才傑廣而不雜峻而能温脩詞每掇其菁華所尚者風格發言必探於指要所貴者變通識古今理亂之原知遐邇利病之本自掌文翰苑列籍金門出入五年㳟勤一致屬朕初承寳命屢進嘉猷諒我憂惕之懷竭其公忠之志昨因召見更有咨詢造膝之言注意斯得必能奉將明之大任申獻替於虛襟爰昇鼎鉉之司冀展舟楫之用於戲萬務之始九有所瞻將致治平可不兢勵爾其夙夜惟慮以匡朕躬使四夷咸賔百度惟理阜俗必蘇其疲瘵審官無鬱其賢能理當詳於機深道當固於久大自推誠可以化物惟先已可以律人勉哉戒哉無忝我首命之重可守中書門下平章事元和十五年閏正月崔植平章事制夫宰相者上調元化以亮天工下熙庶績以輔君德未有心不直而能叶於道跡不正而能致其君必求斯人乃命以位朝議郎守御史中丞武騎尉賜紫金魚袋崔植氣志凝逺風標粹精率性而行潔已以進周歴臺閣藹然聲猷頃者奸臣未除利權方擅情推刻下其事將行而植獨能横抗申以駮議朕每嘉望不忘於懷自膺寳圖俾掌邦憲又能悉心秉執造膝敷陳歸於無私多所𢎞益爰擢作相冀能弼予於戲爾先太傅當德宗始初清明首居相位克固直道於今稱之爾其嗣守家法無廢朕命可朝㪚大夫守中書侍即同中書門下平章事元和十五年八月杜元頴平章事制門下王者昭宣令德臨視百官必在台臣總其方畧况先朝正奸佞之罪型海内之心既成大勲付朕鴻業思欲述事繼志偃武興文揚其耿光屬在髦哲朝㪚大夫尚書戸部侍郎知制誥翰林學士上柱國建平縣開國男食邑三百戸賜紫金魚袋杜元頴識禀人秀才為國華器縝宻以含章言清明而體要㢘方不雜峻直無徒洞朗鑒而心運陽秋鼓雄詞而氣幹山岳爰以精粹列於内庭通賈生理亂之言達管氏政刑之本未至髙位蔚為名臣間者妖孽相延紛亂南北朝夕機命迅如風霆而翰動若飛神無滯用思職必盡其心力避榮克保其謙光䖍奉綴衣導揚訓命雅就忠貞之志實有安定之功本於忘身受我以德感激無隠切劘盡規既納誨於三篇亦陳戒於六事朕常委以大政詢其逺猷研機必精應變當理布舊章於河朔推大信於昆夷動無不諧實由宻贊全器煇燿淑聲流聞昇於台階允是瞻望於戲昔爾先祖為唐宰衡惟爾傳臧孫有後之慶秉召公是似之德纂承舊服協於至公思貽厥之謀率攸行之道握制羣動衡平衆邪俾人不迷時乃之績可守戸部侍郎平章事長慶元年二月王播平章事制元稹門下昔蕭何用新造之漢而能調發子弟完補敗亡使闗東糧餽不絶者以其盡得秦之圖籍而周知其衆寡也我國家乗十一聖之區宇提億兆姓之生齒而日不能足食足兵朕甚懵焉得非調隂陽撫夷夏者不欲侵泉貨之任而主㑹計校盈虛者不得叅邦國之重乎予將兼之允在能者諸道鹽鐡轉運等使大中大夫守刑部侍郎騎都尉太原縣開國男賜紫金魚袋王播在德宗時以對詔入仕踐歴臺閣由御史大夫大京兆尹掌縣官鹽鐡為春曺尚書乃長邑髳以控蠻蜒盡稱厥職達於予聞洎詔徴還便殿與語得所未得聞所未聞昭然發矇幾至前席重委操剸鋩刃益精國有羡財而人不加賦東師在野物力蕭然不有主張孰能戡濟是用命爾作相仍以舊務嬰之爾其西備戎羌東定燕冀内實九府外豊萬人百度羣倫罔不在爾於戲典謨訓誥行之具存邪正是非知之孔易予惟以不敏不明兹故用爾為股肱耳目又安能一二戒誨垂之空言爾其勵於爾心無令人觀聽者論爾於鄉校可守中書侍郎同中書門下平章事依前充鹽鐡轉運等使㪚官勲封如故長慶元年十月元稹平章事制門下御大器者登俊賢以為輔弼宣大化者擢公忠以施政教故能成天下之務達天下之情俾三光宣明百度維貞正我之倚注方得其人天實賚予允副僉望中㪚大夫守尚書工部侍郎上柱國賜紫金魚袋元稹珪璋茂器鸞鳯貞姿文涵六義之㣲學探百氏之奥剛而有斷忠不近名勁氣常勵於風霜敏識頗知於今古自恪居朝序休問再揚不自飾以取容不茍安以廻慮直躬以處在危若夷卓然見陶鑄之心豁爾見江湖之量間者司文禁署主朕樞機每因事以立言累披誠而獻計心惟體國義乃忘身深陳濟物之方雅見經邦之志朕思𢎞理本用洽生靈式資康濟之材以暢和平之化於戲爾率於正則不正者知懼爾進於善則不善者必悛惟直道可以事君惟至公可以格物秉是數德毗予一人永孚於休以底於道可守尚書工部侍即同中書門下平章事㪚官勲封如故裴度平章事制渉大川者操巨艦不畏於洪波搆廣厦者掲宏材乃安於棟宇朕祗奉神器尊臨萬邦思弼諧輔相之臣致易簡雍熙之業爰得耆舊委之衡樞冀𢎞嘉猷以闡𤣥化淮南節度大使知節度事管内營田觀察處置等使光祿大夫守司空同中書門下平章事兼揚州大都督府長史上柱國晉國公食邑三千戸裴度氣禀宏朗材優康濟達識髙議兼明不渝型儀可以光巖廊度量有以方海岳操握政柄弛張化權彞倫典謨合若符契昔我先聖以武畧深計中樞宻勿委之廟堂四海咸理朕側席虛心勞懷宵旰禮命元老聞斯格言𠂻懷洞然雲霧皆豁是用輟撫淮海舉之台袞換其戎律列自黄扉秩崇上公望積師長寄爾以周召待爾以蕭曹任爾以埏埴授爾以鈞衡於戲袵席樽爼之内堂室牖戸之間無俟窺臨可以觀察不違宴息其爾折衝庶乎隂陽叶和品物昭泰惟言是納爾舉必從使益稷臯陶爾無慚德垂衣南靣我獲任賢無易由言式遵明命可守司空兼門下侍郎同平章事㪚官勲封如故長慶三年三月李逢吉平章事制朕聞天地洪罏鼓之者槖籥帝王大業成之者股肱堯舜垂衣禹湯恭己𢎞道任德為予輔臣則八表清寧萬邦咸理故伊尹之舉臯陶之升庶績其凝不仁自逺正議大夫兵部尚書輕車都尉李逢吉大方比量中正持心真玉無瑕堅金在礪峻節而髙山是仰惟誠而止水可觀剛柔所持吐茹無易往以青宫齒學導我典墳儀刑式孚蘭􅉅馨茂洎昇台席翊奉先朝訏謨審聞獻替潜達外順招德中深至言温恭聿修終始一貫朕嗣守丕業思得賢良將俟和羮期於舊老易之襄漢居以南宫每詢嘉言啟沃惟允今授之相印委以樞衡代天之工爾在専任於戲發號施令選賢與能申於百辟之上行於四海之内朝無黨比人絶澆浮黒白粲然淄澠不溷使巖廊重位揚我清風𢎞宣大猷以暢王度可守門下侍郎同中書門下平章事㪚官勲如故唐大詔令集巻四十七
