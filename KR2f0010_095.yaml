body:
  text: 唐大詔令集卷一百十六宋宋敏求編政事慰撫中李涵河北宣慰制李涵再使河北制劉晏宣慰河南淮南制喻安西北庭諸將制宣慰湖南百姓制宣慰嶺南制奉天遣使宣慰諸道制收復京師遣使宣慰制安撫淮西歸順將士制處分淮西赦建中四年伐兩河叛帥慰勞本道百姓敕貞元元年慰撫平盧軍先陷在淮西將士敕遣使安撫水灾諸州詔令潘孟陽宣慰江淮詔慰撫中李涵河北宣撫制常衮門下河朔一隅地方千里外捍夷狄內輔成周撫勤王之師修任土之貢顧其方鎮可謂崇重眷我侯伯是有勳勞將相國之股肱兆庶君之支體事同休戚寧忘鑒寐思撫巡而未獲念征鎮而永懷爰命宗臣往申㫖諭銀青光祿大夫行尚書左丞襄武縣開國公李涵朕之茂親腹心攸寄純固所以致命文質所以經邦溫恭禮讓信誠易直勵匪躬之節秉憂國之心美其公才嘗所委任再令宣撫皆合事經既合謙誠之辭兼陳理化之迹慰我憂心意甚嘉之今秋冬在候徭戍未寧將校有介胄之勞黎元有賦稅之役代豫親問咨爾使臣仍兼副相之榮式重登車之務可兼御史大夫充河北宣慰使本官勳封並如故李涵再使河北制敕書有施命以告四方禮有誦志以巡邦國明王所以垂拱而天下理者非家至而日見之也實賴腹心耳目之臣審訓念於中外俾德澤教化敷於四海情有所達事適其宜上下交暢則天地和應矣喻我朝㫖寄於宗英銀青光祿大夫行尚書兵部侍郎襄武縣開國公李涵志以足言學於古訓安和孝敬慎靜尚寬服居大僚常所親信每受重寄必揚休聲往以幽薊渤碣之間戎府方州之大俾付正命以親諸侯至於再三秉此純一盡人臣之節罔或辭難徇國家之利豈憚勤逺信以協忠惠以交福周爰咨度不遑啓處邊陲寧晏敬賴親賢今以侯伯之勳勞師人之戍守顧其功效宜有撫巡髙選中朝尤承兹僉議加以丞相之副增其原隰之華時惟𢡟哉無替厥服可兼御史大夫充河北宣慰使餘如故劉晏宣慰河南淮南制敕書曰元后作人父母又曰一夫不獲則日時豫之辜政或不平訟或不理則人受其弊氣生其灾噢咻連聲愁苦無告州縣長吏莫之省憂念兹疚懷中夜三歎朕以否德託於人上永言理道敢不勵精自兵亂一紀事殷四方耕夫困於軍旅蠶婦疲於餉饋欲求無事豈可得乎致令户口減耗十無一二而河南淮南又甚諸道得非搜乘補卒之數急賦橫稅之煩致使憂駭匪寧流庸不復兼亦親人之職少有政術稱者放富役貧多患不均靡室靡家皆籍其榖無衣無褐亦調其庸雖節制亷察務令調理而貪官暴法未絶姦原誅求無厭鰥寡重困永歎遐想過實在豫巡撫之寄資於碩德某官某相政府之舊道在安人自河之南天下之半底慎財賦衣食京師久於倚任多所𢎞濟因其旋南將命攸屬所至之處宣示詔書撫將校之勤勞問黎元之疾苦事有未便法或不行委之釐革歸於允當或假其征徭私有聚斂或託其貢獻公然乾沒厚取於人歸怨於上虧損時化朕甚懼焉宜委某官與節度觀察切加疏理勿令寃濫以副憂勞其官吏有犯便禁身推問具狀聞奏當峻刑典以息貪殘喻安西北庭諸將制常衮敕天下既定萬里寧一豈王者獨運而臻此耶實賴文武將守腹心之臣宣力强任捍禦於外也往以蕃戎並暴縱毒邊表乘釁伺隙連兵纍年城門晝閉王師遐阻遮殺漢使盜取節印恣睢甚橫厲逆天理而國朝未暇襲逺置於度外實五京二庭存亡危急之秋也河西節度使周鼎安西北庭都護曹令忠爾朱某等義烈相感貫於神明各受方任同奬王室率辛李之將用甘陳之謀與羌騎校尉王侯君長以下自金河玉關至於南北戊午跨流沙至西海蒲類破白山戰事致命出於萬死賴天之靈以戰則尅不動中國不勞濟師橫制數千里有輔車首尾之應以威以懷張我右掖稜振於絶域烈切於昔賢微三臣之力則度隍踰隴不復漢有矣每有使至說令忠等憂國勤王誠徹骨髓朝廷聞之莫不酸鼻流淚而况於朕心哉遐想盛烈感嘆何已或恐凶醜狡譎反復離間妄說國難搖動人心今所以疏其事實一以相報近有流落蕃中十數年者至闕庭知犬戎惡稔上疑下阻日就殘滅加之疾疫灾及羊馬山谷填委天亡之時及囚奴自速其禍諸蕃連衡以功進取力屈氣衰已逃於苦寒之地西北邊患蕩然以清至於九夷南盡百越玉帛來朝於魏闕苞茅入貢於王祭党項內附回中大寧天下郡國一其教理王畿征調漸復平時子儀移鎮於邠郊抱玉進攻於天水士馬百萬當令悉西方垣翰之寄所宜協心戮力抗厲威武同赴戎㑹也勉卒志業以時康功慶流子孫永久無替髙映勳典豈不休哉每念戰守之士十年不得解甲白首戎陳忠勞未報心之惻怛不忘終食要當候大師所指窮荒蕩定懸爵位以相待傾府庫之所有以答西川賢士大夫忘身報國之誠遣詔諭意非一二所能盡也宣慰湖南百姓制常衮敕震澤之南數州之地頃以水潦暴至沱潜潰溢既泛城郭復瀦原田連嵗大歉元元重困餒殍相望流庸莫返加之以師旅煩之以賦稅哀我矜人何以堪命朕君臨之道方鬱牧養之政未𢎞咎之所降諒在於此雖天灾流行厥有恆數而夕惕昃厲豈忘責躬夫振人育物大易之明文也自漢魏以來外軍之處必遣人巡問以安集之國朝因其制亦命近臣撫慰俾諭求瘼之意宜令中散大夫給事中賀若察往湖南宣慰處置其百姓遭損不能自存者應須振急蠲宜與本道觀察使啇量處置了聞奏仍賫詔書躬自問恤宣示郡邑令知朕心宣慰嶺南制敕理天下者先務於安逺本人情者必令其上達或刑罰不中德施未孚則生怨咨是以申喻朕以服嶺之表方隅之大南盡百越専制萬里擇將置守常亦難之至於臨遣屢有明誡俾施惠政以恤疲人而長吏議法不平作威以逞因其猜阻陷我忠良馮季康何如瑛等南方右族纍代純臣協其義烈之心積有艱危之效惑於所譛虐用其刑無狀致辟遂生邉患朕比託人上每勞日昃天地之生成父母之慈愛聞此濫罰惕然疚懷尋亦辨明特令昭宣如聞溪洞尚有紛擾哀我士庶勞於甲兵豈不求安良有以也所以更謀良帥先用舊德兼御史大夫徐浩歷典中外長於撫綏素所親信𤣥冬之首當至彼方必能大布風化永清麾管仍令尚書比部員外郎莫藏用往嶺南宣慰問以疾苦恤其死喪其季康等遇害之家躬自存撫切加贍恤務令得所以慰孤遺其軍州有所給聚申明中㫖已懸示大信但歸附即同平人豈惟復業安居當亦隨才命職兼至桂州宣慰應水旱所損或須蠲免宜與觀察使啇量勉膺朝寄以稱朕懷奉天遣使宣慰諸道詔古者天子有巡守之義以考國典以觀人風在時多虞或所未暇乃命卿士使於四方問人疾苦亷吏善惡茍因所任則如親臨在安平之時得資勤恤當禍亂之際得無省憂朕不敏不明肆於人上撫御失道誠信未孚冦盜煩興阻兵拒命哀我臣庶陷於匪人顧兹田疇鞠為茂草不念柔服遂事徂征徴發甲士萬里必至暴露營壘連年不息冒於鋒刃繼以死傷㷀嫠無依父母廢養存者積思家之怨殁者倍異鄉之痛又以軍資滋大公儲不充厚取於人罔率厥典科條雖設誅斂無常農工廢弃於生業商賈咨嗟於道路軍儲日益閭閻日空凋瘵日窮徭賦日甚以財力之有限供求取之無涯暴吏肆威鞭笞督責罄彼黔首控告何依怨氣上騰咎徴斯應疫癘荐至水旱相承罪非朕躬誰任其責朕自嗣位逮及六年連兵不解以逾四稔雖本非獲已義在濟人而事有重勞敢忘咎已皆以朕躬寡昧居安忘危致冦之由實始於此豫則不德人亦何辜愧恨積哀痛心疾首昨者改元施令悔往布新將使反側獲安則干戈自弭賦役差減則衆庶就康還定流亡與之休息猶懼思慮不周於庶務誠感未達於遐方一理失中一夫不獲則何以謝天譴致人和俾代豫言其在良弼宜令門下侍郎同中書門下平章事蕭復充山南東西荆南湖南鄂嶽江南江西淮南浙西東嶺南福建等道宣慰安撫使嗚呼往率厥職敬此朕命慰勉征戍勞徠困窮訪其所要察其所弊淹滯必達凶闕勿憚幽逺而不被無略細微而不恤洎於編氓比屋咸若朕之躬親股肱惟良則豫有賴其諸道將士並准今年正月一日制嚴備疆界勿使侵擾仍各令本將速具名銜等第上奏悉與甄叙其有殊功徑莭越超常倫别條事迹當與優奬百姓每年兩稅定額外自餘徴率一切並停課勉農桑各令安業冦難既定漸率干戈朕當躬先簡約庶務莭省兩稅之外亦更減除其諸事緣急切交須處分者即所在節度觀察商議裁度處分務合便宜其餘利害還日上奏朕當詳省以求厥中宣布逺邇咸知此意收復京師遣使宣慰制朕獲承先顧付以大器懼德不類貽列聖羞䖍躬惕勵罔敢暇逸將欲立法一致和平小信未孚羣心遂阻理化乖當百度失中君臣之間鬱堙不達致冦雖深於罪已興戎猶昧於省躬期靜亂以濟人反勞師而黷武行者被傷殺之苦居者重齎送之勤四海騷然靡有寧處京輦之下杼柚亦空環列之中遣戍殆盡略內而勤逺安居而忘危賊臣誘姦乘間竊發豺狼穢於宫闕士庶陷於塗炭作威以毒仇視我人萬姓嗸嗸呼天無告有殞踣以抗節有脅從以俟命且一夫不獲辜實在豫豫以君臨萬邦作人父母既才謝克復育非仁義從而咎之其心愧悚一食三嘆退含內訟介於梁岷庶乎有瘳以答譴戒皇天悔禍宗社降靈腹心爪牙奮謨宣力元惡稔慝脫身遁逃餘黨歸誠率衆來附斂沴氛而闢閶闔剪鯨鯢以清郊原函夏再寧室家相慶非將相夾輔王室卿士交修豫違軍旅叶心畢命盡敵豈伊寡昧克復興運戡定大難載感豫懷宜令吏部侍郎班宏充上都宣慰使勞問將士撫綏蒸黎招集流亡安慰反側朕續當整駕㨂日還京告謝於祖宗請罪於天地䇿勳行賞以報忠良明宣所懷咸使知悉安撫淮西歸順將士敕敕李希烈首亂淮瀆又侵滎汴凶威之所及罔不脅從百姓既罹於網羅將士兼質其家口哀我衆庶厄寃莫伸雖欲歸降何由自達朕為人父母不克保安遂使忠良橫遭脅汙興言及此憫悼載深自餘脅從一切不問如能去逆效順因事建功明設科條以示褒勸其有以一州降者便授刺史封異姓王實封五百户以一縣降者便授縣令封郡公賜實封二百户以萬人以上降者授刺史封國公賜食邑三百邑其餘各以功效節級甄升列爵建官以俟能者朗然明信朕不食言宣示逺人各令知悉處分淮西赦敕乃者希烈亂常阻兵竊號汙脅士衆殘虐蒸黎朕志在好生誠深罪已為人忍恥不忍加兵惟兹一軍代著忠節果殱元惡不替舊勳詢於衆情請拜戎帥人亦勞止期於小康屢乖恤下之方重致喪身之禍由朕薄德俾人不寧撫此萬邦且愧且悼猶賴將校士旅秉其誠心邦人不驚軍部無撓以此節效良有可嘉所宜慰安俾洽寬澤應將士吏人承前所有罪犯無輕重一切釋放曠然昭洗咸與更新其先受莊宅財物等各以見管為主將士衣糧并家口糧等一例并准舊例以時給付不得停減先令優與賞叙亦准元敕處分務令豐厚以稱朕懷仍如曉諭各令知悉建中四年伐兩河叛帥勞慰本道百姓敕敕朕嗣守大業於今五年承祖宗之威烈受明靈之耿命何嘗不損已求瘼視人如傷思省徭賦以康邦俗納羣生於夀域躋大化於升平而德固虛薄志不昭感叛人未附戎馬方殷在豫之責鑒寐多懼自兩河背叛凶逆相因殺害無辜竊盜城邑搖蕩我邊鄙薦食我黎元勞我師徒費我征賦纍更時嵗未克底寧朕子育萬人務康暴亂弃其細故待以初誠申之以大信示之以好惡將兾迷乃知復困則能通亦欲先德後刑有征無戰不勞師旅以致和平而包藏乎禍心自相搆釁侮慢朝㫖偷恤甲兵去順效逆曽無悛志謂天可罔謂責可逃緩之則為患益深逼之則違命不順挾藏詐匿詭毒萬端陷此忠良申雪無路朕為人父母實所痛心豈可忍此姦回為之覆燾是以大整師旅肅爾天誅載清㝢縣以息黎庶事不得已而至於斯頃以軍興飛挽相次軍供之費餽運之勤屢擾農商或擅其利州縣征賦重及疲人朕心在止戈日兾蠲復先志未就後慮繼之徴責既加名目猶廣百姓私養無以自贍惟是夙夜不遑晏寧豈不知耕織之艱難轉輸之勞苦每一念至載深憂旰儻上𤣥垂祐烈祖降靈憑將帥之謀股肱之力俾我一戎永清四海則頒賦名目悉停兩稅定數亦各減放以便萬姓咸與昭蘇各委節度觀察刺史縣令所在郡邑明加曉諭使知豫意朕鬱於大道逺邇未臻必假人力以清多難宣布中外咸使聞知貞元元年八月慰撫平盧軍先陷在淮西將士敕敕淮寧軍將士等頃自平盧來越赴國難涉溟海不測之險滅凶賊作亂之徒其後分鎮淮西防秋壠上奉我王事久著勳勞或耆老見存或子弟相繼舉其誠效並是勳臣頃被李希烈脅從無路申雪永言勳舊實可憫傷邇者已敕諸軍不加征伐兾能相率歸保功名副我念舊之心成其自新之節其陷在淮西將士應有親族在節度觀察使及刺史縣令等切使安存使皆得所如有在宅店鋪奴婢六畜産業等各任如舊不得輒有侵擾如全家沒在淮西更無親族為主者即官為檢校待當主復即時檢付仍分明布告咸使知之遣使宣撫水灾州軍朕以薄德托於人上勵精庶政思致雍熙而誠不動天政或多失隂氣作沴暴雨洊臻自江淮而及荆襄歷宋亳而施河朔其間郡邑遞有水灾城郭多傷公私為害壞損田舍次及田苖或親戚之漂淪或資産之沉溺為之父母所不忍聞興言疚懷良深惻憫夙夜祗畏悼於厥心是用寢不獲安食而忘味時宜賑恤庶洽幽明宜令中書舍人奚陟往江陵襄郢隨鄂申光蔡等州左庶子姚濟梧往陳許宋亳徐泗等州祕書少監雷成往恆兾德棣深趙等州京兆少尹韋武往揚楚廬夀徐潤蘇常湖等州百姓因水不能自存者悉宣慰使以賑給死者各隨物故所在官為收斂埋瘞其田苗所損委宣撫使與所在長吏具奏於戲一夫不獲一物失所刑罰不中賦斂不均皆可以失隂陽之和致水旱之沴其繫囚及獄訟久未决者所在長吏即與决之務從寬簡俾無寃滯貪官暴吏倚法害公特加懲肅用明典憲災傷之後切在撫綏咨爾方鎮之臣洎豫守宰宜悉乃心力以恤凶災宣布中外咸使知之令潘孟陽宣慰江淮詔理天下者先修其國國命之重寄在方鎮共理宜人列城為政繫乎屬縣然則匹夫之耕匹婦之織積微成著以供國用永念蒸庶厥惟艱哉頃年以江淮租賦爰及𣙜稅委在藩服使其平均太上皇君臨之初務從省便遂令使府歸在中朝或恐巡院既多職因交替新制未立舊目已紊况汴河而東瀕海之右多名都奧壤疆理接連如或征賦不均徴輸難濟物輕貨重法弊人勞又聞江淮數道比愆時雨深憂黎庶之不足軍國之闕供政有所不宜事有所未便宰政有課績官吏有否臧爰選使臣申我休命宜令度支及諸道鹽鐡轉運副使户部侍郎兼御史大夫潘孟陽専往宣慰諭安疲氓詢訪便宜蠲除疾苦安人利國稱朕意焉唐大詔令集卷一百十六
