body:
  text: 唐大詔令集巻一百二十七宋宋敏求編政事誅戮下誅吳元濟𠡠處置李㝏𠡠誅王涯等𠡠處置楊弁𠡠劉從諫剖棺暴尸𠡠誅郭誼𠡠誅張谷等告示中外𠡠楊收自盡𠡠嚴譔自盡𠡠誅黔州刺史秦匡謀𠡠處置蕭遘等𠡠誅江譲能宣示天下等詔崔昭緯自盡𠡠王摶自盡𠡠栁璨自盡𠡠誅戮下誅吳元濟𠡠𠡠吳元濟豺狼醜𩔖敢悖天常不知覆育之恩輙肆猖狂之計拒捍成命焚刼鄰封詿誤我平人殘傷我赤子縣邑黎庻號呼屢聞朕為人父母得不興愧亦常告諭曾靡悛心稔匿挺災日滋月甚所以命豼貅之旅致原野之謀雷霆所當巢穴盡覆獲此凶䜿正其刑書與衆棄之斯為國典宜准法處斬其餘攴黨别從𠡠處分處置李㝏𠡠汴州逆賊李㝏竊據城池坐邀符節率其兇黨敢拒王命令槩梟首於闕下宜令所司准式其男道原道樞道倫道安等叛逆之子固不可原理湏正刑集衆處斬誅王涯等𠡠𠡠王涯等身為宰臣委任至重與其從黨恣其兇惡潛搆姦謀鄭注草萊卑末寵遇殊常而乃切發殿庭同為之扶𥪡邪險之状古今所未聞頼宗社之降靈重以叶力斯湏銷滅京師晏寧天下之人所同歡快謀惡之罪國有常刑其王涯賈餗舒元輿王播郭行輿李孝本羅立言宜令左右神䇿軍差兵馬防援准舊例領赴郊廟及两市令衆訖於獨栁樹下並令准法處分處置楊弁𠡠𠡠楊弁起於卒伍獲在偏禆方屬徂征敢為桀逆廹逐師旅嘯聚叛徒朕姑務茍安未加顯戮捨置悖亂令赴行營遂駐南轅之盛已盗北門之管戰備符璽并而竊之咨石㑹之重關潛輸逆鎮釋賈羣之縲紲俾逺奸謀成榆社之義心召漢水之同惡蠆毒近發於懷袖蟻壌㡬𩔖於江河康政等被汾邑之遺風習莘墟之有禮遽忘臣節仍助兇惡抗弦登陴曽不興感以卵投石自取滅亡雖禁暴除殘國之大典然致陷辟終用愧懷劉從諫剖棺暴尸𠡠𠡠前代張角王陵伏罪之後皆以身死並加追戮抑有舊章劉從諫疾困之時置劉稹兵權潛謀繼襲雖先以削奪合正刑書宜令剖棺暴尸就潞州市號令三日夜便隨事埋瘞㑹昌四年八月誅郭誼等𠡠𠡠理髖髀者不可以嬰芒刃圖草蔓者必在乎絶本根故代甲兵以正其刑鐘鼔以聲其罪爰用重典以清亂邦逆賊郭誼等狐鼠之妖依兵穴而自固牛羊之力得水草而逾兇乆從叛臣皆負逆氣頃者劉從諫皆得扳義掩賊藏姦積怙其亂母非親吏計劉公直安全慶各慿地險屢抗王師每肆悖言罔懷革面吳㓂將賊周尚務於陸梁隴向平王健稱其力死况郭誼王協開邢沼歸疑懼義旅復巢賣孽童以圖全據堅城而請命擐甲以祈於撫納要君以葢其前愆天地神祗所難容捨昔伍被詣吏不免就誅延岑出降終亦夷族致之大辟無用愧懷郭誼王協劉公直安全慶李道德李佐堯劉武悳宗可武並宜處斬其餘支黨並宜别𠡠處分誅張谷等告示中外𠡠𠡠頃者劉從諫與李訓鄭注結刎頸之交以濟其奸謀以圖不軌張皇兵勢脅制朝廷自擅一方以為三窟張谷陳揚庭等凶愚無行狡詐多端皆在京師人皆嫌惡自知險薄無所庇身投迹戎藩寄命從諌多懷怨望得肆隂謀或妄設妖言成其逆志或為草表章餙其悖辭無孝於君親曽不愧天地自朕君臨方宇姑務含容而怙亂益堅包藏未息誘受亡命招聚異圖志猶恃於金湯心不利於王室近又敢為狂計扶取孽童汚我忠義之軍叶其豺狼之黨天之所棄神得而誅逆賊劉稹弟植曹九滿郎五娘君郎肆娘堂兄漢卿匡周堂弟㑹卿匡堯穗逆賊張谷并男涯觧愁何大偃即孫男小告兄台男小曽門竒牽郎修文千駒陳庭楊并男巢郎宣力男醜奴張㳂并男歡郎三實門客甄伎術人鄭諗蔣黨逆賊李訓兄仲景郭行餘男台王涯姪孫羽韓約男茂章茂實王播男掘並就昭義梟斬訖夫為善者天報之以福為不善天報以殃今沴氣既消逆節咸服方布和於四海息庻於五岳宣示中外各令知悉楊收賜自盡𠡠𠡠驩州流人楊收謬承奬擢任以台衡意每肆其貪吸迹頗彰於黷貨欺天罔上罪不可貸毋俾生全宜令内養郭全穆所在賜自盡咸通十年二月嚴譔自盡𠡠𠡠前鎮南軍節度使檢校尚書嚴譔器本𤨏㣲志惟兇險廣用賄貨結交奸邪致楊收不顧刑章恣為威福以桂林江西之重舉爾為名納陳珍竒寳之私切我良守所令按復不欲追窮頃聞海隅多難徴發為備變㓂未息供饋方繁或擅納衣粮或廣補戍卒剋剥求取知無不為罔地欺天何嘗自愧而又因推使罔奏闕庭欲以資財用為排抑楊收既嘗極典嚴誅將令肅振朝綱貴免紊亂邦憲中外臣庻當體予懐宜所在賜自盡咸通十年誅黔州刺史秦匡謀𠡠𠡠黔南舊制兵數不少者葢沿天逺地連昆夷外有溪夷内可固守以數百兵置於要害則千萬衆不能奪衝秦匡謀守土四年曽無少備但聞侵擾溪洞貪冒資財人有離心兵多虚額致羣蠻如風火而至使闔郡灰燼之餘莫顧黎元惟為酷毒自携金帛抛棄城池報奏之間謬妄非一况統衆失律負國深恩天地不容人神共怒禍將福滅惡滿貫盈雖償棄市之誅未塞亂常之罪膏於鉄鉞顯示華夷欲使將來知我用法宜奪在身官爵委京南節度使集衆處斬其家口資財並籍沒仍令御史臺及諸道長吏檢查并以其親屬令當連坐者委御史臺及諸道提獲具名聞奏如待奏到指揮處分處置蕭遘等𠡠𠡠逆賊偽宰相蕭遘鄭昌圖裴徹皆代荷國恩身極人爵或兩府鈞衡之任或驟握兵賦之權所宜罄竭丹誠祗膺茂寵而遽違臣節輙肆逆謀挾扶千萬之人遂成篡奪駈脅端良之士大恣猖狂惑藩方馳書檄妄徴故事欲動人情並居偽廷同於相位事主之道何以為心頼逺近輸誠祖宗垂祜忠臣發憤妖孽就誅今則興復有期廟朝重正顧惟凉德益所兢慙然則刑賞之科所以示天下而申懲勸也其於用舎朕不敢私撫事論辜難逃極典宜令所在集衆斬訖聞奏天下宜體朕懐光啟三年三月誅杜譲能宣示天下夫賞有功而刑有罪治國明規去邪心而任無私君人大節其有顯犯典憲謀危宗祧難貸大刑式謝四海崖州流人李周鐘驩州流人叚詡儋州流人西門重遂雷州司户參軍杜譲能等結為奸黨請發禁軍假言防託山南心及攻伐近鎮傾危宗社讒搆忠良包藏禍心附㑹狂計昊穹降鑒宗廟炳靈大臣繼有封章列藩瀝懇論奏朕親鞫問罪状顯然湏行憲章諒非獲已於戲朕以𦕈身嗣膺丕圖任用之間固無疑事而譲能一居台鼎八換星霜必謂能罄忠誠不辜所任殊不知手探國柄身作亂階政以賄行化由財進舉枉錯直愛憎繫於一時鬻爵賣官聚歛逾於巨萬仍復舉倍息之利恣兼備之心市肆貨財田歸私第隣伍店宅旋入所居政事决於胥吏奢華縱於婦女丘某一家杖殺曽不奏聞湖外二年兵戈曽由敗易或以葢藏或以誤枉交通匪人朕以乆務含𢎞未能决謫一旦彰露萬口咨嗟重遂等人始終同謀表裏相濟約貨則更相問遺謀人即放還至於烟塵四郊迭起紛被九陌擁兵而固請廵幸差人而縱冦宫中頃刻之間警蹕無禁綴流壘卵未足為危四罪既誅天下乃服國法斯在朕何敢私尚慮道途𫝊聞逺近誤謬四海之内未委事端故降命書明示天下凡在臣庻宜體朕懐景福元年六月崔昭緯自盡𠡠勅朕猥以𦕈身恭臨大寳修前王之法度奉列聖之紀綱未嘗以喜怒之心行其賞罰惟務以誠信之道示於寰區有功有勞既不吝其爵禄負恩負法寧可貸其誅夷是謂至公庶臻理道左降官崔昭緯頃居内署粗著㣲勞擢於侍從之司委以燮調之任而不能忠貞報國端慎處身潛交結於奸臣致漏洩於機事星霜累換匡輔蔑聞其罪一也而又快其私忿輙恣隂謀托崔鋌之嶮巇連行瑜之計䇿遂令引兵向闕怙衆脅君故宰臣韋昭度李磎並被無辜殺戮㡬危宗社顯辱君親其罪二也及行瑜敗國甫安而乃自懼欺誣别營附托又於藩閫潛請薦論不惟茍免罪愆兼亦再希任用貪榮冒禄僭濫無厭敗俗傷風賢愚共鄙其罪三也又將厚賂欲結諸王輕侮我之憲章玷凟朕之骨肉貨財之數文字具存賴諸王作朕腹心嫉其僭竊盡將昭緯情欵兼其親吏姓名直具奏聞拒其求托昭緯曽居宰輔備歴清崇但欲逞其囬邪都不顧其事體觀其成見實駭聽聞其罪四也自奸邪既露情狀難容尚示寛恩未行極典投於荒裔冀其自新不能退省罪尤恭承制命速赴貶所用守常規而敢猶務宴安尋聞所在留駐攪擾藩閫侮慢朝章曽無凛畏之心可騐包藏之計罔知僭咎誹謗朝廷其罪五也朕以恩澤者帝王之雨露刑法者邦國之雷霆無雨露則庶物不榮無雷霆則萬方不肅朕體天道以化育遵王度以澄清罪既昭彰理難含垢凡百多士宜體予懐其崔昭緯宜差所在賜自盡中書門下准此處分乾德三年五月王摶自盡勅王摶村𩔖蕭韋器劣瓶筲乘鈞無數于時情畜志常多於奸計結朋糾黨蠧物害公包聚貨財肥濃家室綰領官職贍濟一門雖行降黜之寛恩未塞衆心之忿怒湏歸極典方正朝綱宜令内養似先知贊於其所在賜以自盡光化三年六月栁璨自盡勅宻州司户栁璨交通悖逆脅負明恩毎念禍於偷安欲危人而自固罔知畏惮惟肆奸惡既兇罪以貫盈實朝野而共怒况復聚貪爵秩恣逞威權據其狡猾之端湏降誅鋤之命宜除名配崖州充長流百姓委御史臺差人所在賜自盡天祐二年十二月唐大詔令集巻一百二十七
