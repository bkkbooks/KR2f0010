body:
  text: 唐大詔令集卷四十一宋宋敏求編公主封號封長寧公主等制封常芬公主等制封唐昌公主等制封髙都公主等制封永寧公主制封臨晉公主制封平昌公主制封髙陽公主制封太華公主制封夀光公主制封廣寧公主制封大長公主制封永陽長公主制封真寧公主等制封永昌公主制封七女公主制封十二妹等四人長公主制封太和長公主制封定安大長公主制封延慶公主等制封萬夀公主等制封盛唐公主制册文册信成公主文册昌樂公主文册髙都公主文册建平公主文册永寧公主文册臨晉公主文册真陽公主文册華陽公主文册益昌公主文封號封長寧公主等制門下紫宿揚輝爰稱婺女絳河分彩是曰天孫柔德所資乃生淑媛長寧公主等孕靈圓魄禀粹方儀載極幽間用光婉順皇基再造景命惟新凡在懿親咸申禮命肅雍之地未展徽章宜正此銀宫署兹金榜並開湯沐廣宣朝慶可依前件封長芬公主等制黃門諸女皆封先王之制第二女等慶聨霄漢體自穠華常閲禮於后庭必聞詩於師氏朕撫臨億兆憲章古昔俾裂山河之賦用酬湯沐之恩可依前件主者施行開元三年十二月封唐昌公主等制邦女下嫁義著周經帝子建封制存漢𫝊朕訓導諸子舊有女師因其婉娩之性進成肅雍之德能鑒圖史頗知法度今選婚華族待禮筓年宜加璽綬之典俾開湯沐之賦第四女可封唐昌公主第六女可封常山公主第八女可封寧親公主各食實封五百戶唐昌公主出降張垍俱用八月十九日所司詳備禮物式遵故事開元十六年封髙都公主等制門下肅雍之範以成女德湯沐之賜爰著國章第十一女等生於公宫訓以師氏溫惠之性頗有天姿圖史之學仍聞日就初筓甫及外館將歸宜因待禮之期式備疏封之典可依前件仍各食實封一千户主者施行封永寧公主制門下自昔帝女必建封邑典章不易等數攸存第十七女幼而間和長實徽懿引圖史以自鑒用肅雍而成德將擇近日言遵下嫁宜承湯沐之賜以備車服之庸可封永寧公主食實封一千户主者施行開元二十一年封臨晉公主制門下湯沐建封古今通典豈獨貴於寵數亦兼崇於美名第二女性與柔和生知法度率以師氏之訓成其天然之質有行之禮將及於筓年備物之恩俾開於井賦可封臨晉公主食實封一千户開元二十五年十二月封平昌公主制門下詩美肅雍逺著於風雅禮有封建久存於簡䇿第十九女尚柔成德克順由𠂻禀於天然自有間和之性訓以師氏備詳圖史之學宜開湯沐俾叶典章可封平昌公主食邑一千户主者施行封髙陽公主制用嘉成德將及推恩疏封錫號禮典攸在第二十女資身淑慎禀訓柔明克備肅雍之儀允彰圖史之德而方營魯館宜啓沁園俾承寵於中闈復增榮於列賦仍食實封一千户開元二十九年封太華公主制肅雍禀德邦化所崇湯沐疏封古訓斯在第二十一女踐修閫則素承阿保之嚴砥礪嬪儀率由圖史之範璁珩既佩柔願無違蕙問充昭常華自著肇施綵級將具禮於輜軿載錫粉田俾申榮於井賦可封太華公主食實封一千户天寶四載封夀光公主制肅雍之德教始閨闈湯沐之封榮分爵土第二十二女二十三女誕膺闕發令姿頗闕沐宫公之訓遵師氏之則顧史瞻圖日將月就華宗叶慶方從下嫁之儀盛典申榮式備開封之制二十二女可封夀光公主二十三女可封樂成公主仍各食實封一千户天寶五載封廣寧公主制睦親之序必備恩榮加命之貴是存優寵順成公主誕姿中掖習訓公宫惠心有孚淑問斯著夙藴柔間之操克彰婉娩之規式間湯沐雖巳申於築館爰擇井田俾有光於改邑可封廣寧公主依前實封一千戶天寶八年封大長公主制門下周室展親繫車服之等漢氏右戚崇湯沐之封永惟加恩必遵舊典第九妹碧渚開祥絳河疏彩成齊莊之惠問有明婉之芳徽訓自九重備兹四戒雖肅雍之詠彤管既彰而穠李之賜粉田猶闕空承金屋之慶式昭銀榜之寵可封大長公主封永陽長公主制皇第十妹可永陽長公主第十一妹可晉寧長公主第十三妹可文安長公主皇女懷陽郡主可漢陽公主咸寧郡主可晉安公主信安郡主可東陽公主清源郡主可陽安公主武陵郡主可西河公主晉康郡主可襄陽公主第十八女可潯陽公主第二十一女可臨汝公主第二十二女可思平公主第二十三女可卲陽公主門下慶陽之澤允洽於家邦肅雍之德宜正其封邑第十六女等皆夙禀柔明幼聞懿範𫝊圖史之訓行表中闈奉蘋蘩之則義昭外館朕嗣膺丕業爰賁寵章宜申湯沐之封以彰車服之等丕承懿號允副恩榮可依前件貞元二年封真寧公主等制門下第二女等皆以柔懿備聞夙訓知中闈內則之義禀傅姆女史之規禮有待年恩從廣愛徴於舊典俾洽疏封式分湯沐之榮庶成肅雍之德𢎞我慶澤被於家邦可依前件元和元年八月五日封永昌公主制門下普寧公主天泉滋德崇蘭發彩纂組之華每工於經目保阿之訓深得於稚年容禮必叶言行無間從容珩璜之韻婉娩柔嘉之儀而封疏舊邦禮宜改避是擇美邑再用申恩可封永昌公主主者施行封七女公主制門下長女等抱子弄孫之榮貴賤之大情也朕以四海奉皇太后于南宫問安之時諸女侍側螽斯之慶上慰慈顔鳲鳩之仁內懷均養雖穠華可尚出閣未期而湯沐先施分封有據宜加美號以表令儀封十二妹等四人長公主制白居易敕古者帝子下嫁必使王公主焉近代或有未筓年而賜湯沐者亦加公主之號以寵重之第十二妹等先帝之子也比朕之子宜加等焉故當幼年各封善地咸命為長公主未及釐降先開邑封所以慰太后慈念之心表先帝肅雍之訓亦欲使吾孝理之道敦睦之風自骨肉間以及天下可依前件封太和長公主制敕公主之封號也或以善地或以嘉名立愛展親兹惟舊典第四妹端明成性和順禀教靜無違禮故組紃有常訓動必中節故環珮有常聲嵗茂穠華日新淑問乃眷肅雍之德俾開湯沐之封可依前件長慶元年三月封定安大長公主制門下我國家制取戎夷推崇恩義示之以大信重之以和親所以殫聲教於殊鄰割骨肉之深愛纍聖𢎞略載於國章太和公主擢秀天潢聨華宸極智惟周物識可洞微乃者回鶻輸誠願求相好穆宗皇帝義難違拒且務懷柔以鳯樓和淑之姿降龍庭桀驁之俗一朝辭闕二紀於兹常興去國之悲已絶還鄉之望今可汗自竊名號來依塞垣朕以渥澤久濡飄零可憫齎以粟帛喻之旋歸曾無感激之心益肆貪婪之性遂得忠義同力將帥協謀未揚金鼓之音已潰犬羊之衆遽收貴主出彼穹廬上以慰太后之深慈下以攄兆人之積憤將修慶覲坐雪幽寃名節自全歎尚何極笳簫凄悲休傳朔漠之聲環珮鏗鏘再齒平陽之列是用易其舊邑錫以嘉名增沁園湯沐之封釋邉地風沙之思舉兹典禮用表忠勤祗服寵榮永光簡冊可封定安大長公主㑹昌三年二月二十五日封延慶公主等制門下車服之制載美周詩湯沐闕等並禀慶絳河流芳彤管穠華懿淑雅志靜專柔順之心叶於禮度肅雍之道慶於言容宜錫粉田之榮用昭銀榜之貴可依前件㑹昌二年十月十日封萬夀公主制長女可封萬夀公主第二女可封永福公主第三女可封西華公主第四女可封廣德公主第五女可封和義公主第六女可封饒安公主門下諸女之封始資漢制疏邑之典今為國章長女等坤道禀柔條風育德莊敬柔順受粹氣於靈源言容法度昭穆徽於內則祥降北渚教襲南薰克成天和更承姆訓雖年方齠齓而體備肅雍用洽私寵俾開井賦可依前件㑹昌六年五月二十三日封盛唐公主制門下展親外館則必待年廣愛中闈宜光啓邑第六女祥開銀漢秀發金枝孝敬生知柔間夙禀克奉姆師之訓每遵詩禮之文法度自持穠華益茂爰申彞典載錫嘉名俾承湯沐之封式示邦家之慶可封盛唐公主備禮册命册文册信成公主文維開元二十五年嵗次丁丑八月癸卯朔十五日丁巳皇帝若曰於戲易著于歸詩稱下嫁所以正風化厚人倫也咨爾信成公主淑慎由衷柔明形外訓以師氏頗詳環珮之儀修其婦功更習紘綖之藝日徴先近年及有行宜錫徽章俾膺茂典今遣使金紫光祿大夫兵部尚書兼中書令集賢院學士修國史上柱國晉國公李林甫副使中大夫守中書侍郎集賢院學士徐安貞持節禮册爾其光昭閫德𢎞長國風無怠厥心永綏介福可不慎歟册昌樂公主文維開元二十五年嵗次丁丑八月癸卯朔二十九日辛未皇帝若曰於戲好合之禮以正人倫肅雍之德用成婦道咨爾昌樂公主生知法度性與和柔亟聞彤管之言頗識采蘋之事素以為絢既間於內則梅有其實式遵於下嫁宜膺册書之命以備車服之榮今遣銀青光祿大夫工部尚書牛仙客副使黃門侍郎陳希烈持節禮册爾其欽崇四教承順六姻式是大邦受兹明命可不慎歟册髙都公主文維開元二十五年嵗次丁丑九月十一日皇帝若曰於戲古之聖人垂訓作則必正內外之位以明婚姻之禮咨爾髙都公主生於公宫自禀幽閒之性教以師氏更有徽柔之則能循法度克慎言容魯館于歸沁園將啓宜膺册命俾叶典章今遣使工部尚書牛仙客副使黃門侍郎陳希烈持節禮册爾其自下於心增修厥德式瞻清懿永固恩榮可不慎歟册建平公主文維開元二十五年嵗次丁丑九月十一日皇帝若曰於戲修五禮者必本於天秩合二姓者將厚於人倫咨爾建平公主秉質尚柔因心克順默識閫帷之教明徴圖史之言黼藻四德笙簧六行河洲在詠將叶於好逑湯沐疏封式昭於備禮今遣使兵部尚書李林甫副使中書侍郎徐安貞持節禮册爾其受兹光寵慎乃威儀永保無疆之休且為將來之範可不慎歟册永寧公主文維開元二十六年嵗次戊寅八月丁酉朔二十二日戊午皇帝若曰於戲人倫式教以正國風女子有行將成婦道咨爾永寧公主自幼及長終溫且惠引圖書為鏡鑒用柔和為粉澤許嫁而筓既遵於典禮備物之册宜承於寵命今遣使金紫光祿大夫兵部尚書兼中書令集賢院學士修國史上柱國晉國公李林甫副使中大夫守中書侍郎集賢院學士上柱國徐安貞持節禮册爾其謙恭自下淑慎為先無忝公宫之教永貽邦媛之則可不慎歟册臨晉公主文維開元二十六年嵗次戊寅閏八月丁卯朔十六日壬午皇帝若曰於戲古之帝子下嫁諸侯所以正婚姻之懿綱昭肅雍之令德咨爾臨晉公主蹈和成性體順為心頗協生知之敏更承師氏之訓柔明並著淑慎攸彰兼四教而不違勤六行而無斁近日云吉嘉禮有期宜穆彞章載光䇿命今遣侍中豳國公牛仙客副使黃門侍郎陳希烈持節禮册爾其克遵法度用廣徽猷發明閫德垂範於後可不慎歟册真陽公主文維開元二十八年嵗次庚辰二月戊子朔八日乙未皇帝若曰於戲肅雍之德崇婦道也河洲之訓厚人倫也咨爾真陽公主柔順因心幽閒表質雅著閨闈之則能曕圖史之誠徽章載茂淑範無違禮將及於有行寵宜循於賦邑今遣使兵部尚書兼侍中牛仙客副使黃門侍郎陳希烈持節禮册爾其敬慎威儀無致失墜用膺寵命克保宜家可不慎歟册華陽公主文維大厯四年嵗次乙酉三月壬申朔五日丙子皇帝若曰漢家舊制諸女皆封儀服比於藩王膏腴封其井賦咨爾第某女承徽自逺誕秀增華仁孝才明夙有天資之慶言容法度成於壼教之慈敏逹知微周旋中節肅雍是憲婉靜流芳雖僅在齠年禮未王於同姓而載揚淑問德已冠於成人宜錫典章用疏國邑是用册曰某公主欽承天命可不慎歟册益昌公主文薛廷圭維乾寧元年嵗次甲寅十月庚寅朔十四日癸卯皇帝若曰昔漢頒魯國魏賜常山由鍾愛以分封亦旌賢而别壤前王茂典厯代成規朕今嗣守不敢失墜咨爾第七女蘭茝芳猷肅雍懿範坤順之性體於自然天俔之資禀於隂教不明爾德孰慰我心爰稽舊章俾率彞訓乃疏湯邑仍錫粉田所以示鳴鳩均養之仁樂螽斯宜爾之慶夙興夜寐無忘女史之針下氣怡聲勉習家人之禮女儀婦道可不慎歟唐大詔令集卷四十一
