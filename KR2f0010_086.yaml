body:
  text: 唐大詔令集卷一百七宋宋敏求編政事備禦閲武詔置十二軍詔修緣邊障塞詔寬繕治器械功程詔驪山講武賞慰將士詔鎮兵以四年為限詔誡勵諸軍州牧將詔遣使選擇邊兵詔遣榮王琬往隴右巡檢處置敕禁諸道將士逃入諸軍制禁諸道將校逃亡制命郭子儀出師制停河中節度并耀德軍詔發兵屯守諸鎮詔優奬西北庭將士詔還馬燧賞軍士家財詔遣胡證巡邊詔嶺南用兵德音偹禦閲武詔安人靜俗文教為先禁暴懲凶武略斯重比以喪亂日久黎庶凋殘是用務本勸分兾在豐贍而人蠧未盡冦盜尚繁欲暢兵威須加練習今農收已畢煞氣方嚴宜順天時申曜威武可依别敕大集諸軍朕將躬自巡撫親臨校閲武德九年十月置十二軍詔天生五材司物資其器用武有七德撥亂所以定功故黃帝垂衣尚有阪泉之戰放勳光宅猶興丹浦之師禁暴安人率由兹道創業垂統莫此為先以是周置六軍每習搜狩漢增八校畢選驍勇故能化行九有威震百蠻姦宄不萌䖍劉息志季葉凌替軍政湮亡行列不修旌旗舛雜部伍符籍空有調發之名逗撓怯弱竟無討襲之用遂使夷狄放命盜賊交侵戰爭多虞黔黎彌喪朕受天命撫育萬方爰自我師克成帝業至如超乘之士莫匪百金彀騎之材豈唯七萃今雖關塞寧謐荒裔肅清伊洛猶蕪江湖尚梗役車未息戎馬載馳武備之方尤宜精練近以各因部校序其統屬改授鉦鼓創造徽章取象天官定其位號庶使前茅後徑類别區分玉帳綘宫刑德允備蹈兹湯火譬彼椒蘭大定戎衣止戈斯在武德二年七月修緣邊障塞詔城彼朔方周朝盛典繕治河上漢室宏規所以作固京畿設險邊塞式遏冦虐隔礙華戎自隋氏季年中夏喪亂黔黎凋盡州城空虛突厥因之侵犯疆場乘間幸釁深入長驅侵暴滋甚莫能禦制皇運已來東西征伐兵車屢出未遑北討遂令胡馬再入至于涇渭蹂踐禾稼駭懼居民喪失既多虧廢生業朕分命師旅挫其鋒鋭頻獲名王每夷渠帥然而凶狡不息驅侵未已御以長算利在修邊其北道諸州所置城寨粗已周遍未能備悉今約以和通雖云疲寢然蕃情難測更事修葺僉曰宜之朕以板築之功方資力役畚鍤之用興發且多念彼劬勞用深怵惕加以普給優復詔書始下旋即科召有若食言百姓將疑謂豫不信但民惟邦本本固邦寧醜虜憑凌實為民患其城寨鎮城須有修補審量逺近詳計功力所在軍民且共營辦所司具為條式務使成功宣示閭里明知此意武德元年九月寬繕治器械功程詔周氏設官分掌邦事漢家創制先定章程故百工咸理五材畢舉雖㳂革有時而此途莫爽但欽明之后役自子來昏亂之朝形盡民力或祁寒隆暑未獲小康或俾夜作明繼之以燭淫費不已凋喪為期朕祇奉明命撫臨億兆愛育之心發於寤寐每咨謀卿士詢訪芻蕘何嘗不以節儉為德憂矜在慮自非田疇獲軍國資須未曽别使一人輒求一物每有丁匠之所但申戒作之司令其寬立功程務從間逸少府僚屬莫不聞知而營造牟鎧催督非理竭人之力以求已功朝夕左右尚乖期約逺方勞役何以克堪雖四海之內無餘經始然繕治器械修葺城隍及隄防浸決橋梁毁壞既不獲已必藉人功皆須慰彼民心緩其日用宜頒告天下以知朕意貞觀元年七月驪山講武賞慰將士詔蘇頲門下傳不云乎兵之設久矣所以威不軌而昭文德聖人以興亂人以廢皆兵之由也故文事必有武偹耀德在於觀兵所以外清蠻貊內輯華夏其經濟之致歟自有隋失道三靈改卜我唐受命百姓與能四罪而天下服一戎而天下定航海梯山何不率俾休牛歸馬示不復用化資羣物刑清百年而制軍為旅先王分職在祀與戎前史垂訓則未學也孰可棄之往以韋氏搆逆近又凶魁作禍則我之宗社危如綴旒故斬長蛇截封豨戮梟獍掃欃槍使武之不修人何克乂朕以薄德昔奉聖謨濟邦家之多難畏君父之嚴㫖撫兹億兆若臨泉谷雖重譯雲歸和親日至遂五兵之不教慮七德之未康今孟冬戒時農事爰隟驪山之下鴻門在望橫層阜以南屬耿長川而北流嚴霜初霣疾風始至以時而命羣帥得地而臨武臣料其勝負詳其進退以振國威用搜軍實故披堅執鋭干戈有容練卒陳師金鼓以節上應於天也下順於人也三光之靈可接五行之德斯用將孫吳不達頗牧同時非熊所期怒蛙知勸布三令詢九章且閲宣埸之儀若觀莘墟之禮情兼慰賞義𢎞寵錫惟此畿甸比經水旱總集士馬頗有煩勞曲念元元更資勤恤其講武使各賜物一百段將軍各八十段中郎將各六十段郎將及左右軍長史各四十段折衝果毅各三十段押官六品以下各二十段新豐百姓宜免來年地繇置頓使賜物一百段緣頓踏踐麥苗給米酬直主者施行先天二年缺月十三日鎮兵以四年為限詔王者制五服綏四方申畫郊畿慎固封守是乃選徒興役禦備邊疆欽若前載率由兹道朕以薄德紹膺丕運奉天明命為人父母永隔綏養鑒寐以之每念征戍良可矜者其有涉河渡磧冒險乘危多歷年所逺辭親愛壯齡應募華首未歸眷言勞止期於折衷但磧西諸鎮道阻且長數有替易難於煩擾其鎮兵宜以四年為限散支州縣務取富户丁多差遣後量免户內雜科稅其諸軍鎮兵近日遞加年限者各依舊以三年一年為限仍並不得延留其情願留鎮者即稍加賜物征人願往聽復令行惟貴勞逸且均公私咸適宣布遐邇識朕意焉開元五年正月誡勵諸軍州牧將詔分命督將保寧封疆且變無知之俗長為不叛之臣必也仁明在乎備整若脂膏不潤毫髮無私開懷納戎張袖延狄彼當愛官吏猶父母安國家如天地欲其亡散庸可得乎若其心不至公所視惟利放縱部曲阿容子弟此乃求鷹鸇以馴乳使豺狼以掌牧欲其輯寧庸可得也往年翽在榮府綏通乖方近日張知運在單于徵調失所遂令東胡擾亂北虜披猖爰遘征伐之勤頗煩瘡痍之誥言念於此可為深戒今諸番歸降色類非一在番者則漢官押領入附者或邊陲安置風俗未通言語不達至於畜養實務綏懷宜令所在軍州牧將等倍加撫恤申其寃盡其理同疾苦知饑寒公私不得相侵巨細必令無擾儻處馭多僻威恩不孚龜玉之毁典刑斯及御史出日仍詔察以聞開元五年八月遣使選擇邊兵敕為國之道莫不欲家給人足令行禁止而旅談者苦疆場之戍役偶語者傷户口之凋殘且夫懷土重遷人之常性離邦去里孰無其情或委非其才或政非其要致令父不保子兄不寧弟井邑有流離之怨道路有吁嗟之聲靜言思之良可嘆息是以晝昃不食夜分不寢庶息彼弊政就此淳風故發使車以巡郡縣其承前處置不利於人即宜當處商量隨事釐革其緣邉兵士等或逺辭鄉壤久事戎旃饑寒而衣食不充疾病而醫藥不拯邊烽忽警將何以堪宜令使人各視勞苦其有年齒衰暮或抱疾羸弱即與軍司選擇給糧放還行人之家開元十二年九月遣榮王琬往隴右巡按處置敕孫逖敕遏冦防邊在於有備興師訓卒用戒不虞隴右諸軍地當戎虜尤資振旅以壯邊威宜令隴右節度經略支度營田大使開府儀同三司兼京兆牧上柱國榮王琬自往隴右巡案處置庶𢎞廟略因達誠懷宜於關內及河東納資飛騎并諸人中間召取健兒三五萬人赴隴右防捍至秋末無事放還仍於當道軍將內銓擇一人與所由簡召應給糧賜所司速作條例處分禁諸道將士逃入諸軍制敕頃以冦難未平師徒尚聚嗟我有衆勤王積勞各𨽻戎麾安於所屬恩信素給久而益懷親同父子之軍戰有手足之扞上下相得死生以之爵祿相先慰薦亦厚或有見利而動不顧所從棄軍畔官改事新將且㩦阻而至雖納而見疑將欲僥求必乖始望至於任用之際賞勸之間必以同勞苦之人又服習於事既親又信委任及之當不使後居其上親廢其舊也況二於統部撓我師律棄恩不義犯教不忠何名節之頓虧亦功勞之可惜今未息邊患猶張威武實賴干城致命之臣叶心戮力勤悴於外忠衛王室也所以解衣推食恤其暴露念東山之不歸歌采薇以勤息未嘗一日而忘於懷休戚必同終始宜保豈輕於去就而自取纍哉如聞諸節度及團練使下官健多有逃入諸軍亡而不追浸以成弊議於軍令事則非經念以戎勳恕其既往自今已後切宜禁絶應有此色諸軍不得輒容差人遞還各付所統其額內官健有逃死者不須更填宣示軍州各知朝㫖禁諸道將校逃亡制常衮敕軍興以來十有四載未息戎備尚勞師徒各以名數𨽻於麾管朕念三軍之勤役率萬姓以供饋躬自節儉而贍濟之定尺籍伍符厚其資糧扉履掖庭織室俾給戎衣鈎盾弄田亦調軍食推誠惠養靡不至焉雖感激忠義勇於赴難而差次官賞固不遺勞誠宜戮力以永所事如聞諸節度及團練使下官健多有逃入諸軍去其所從犯我明禁在於國令固合懲姦眷其戎勳尚容改過自今已後切宜禁止應有此色諸軍不得輒容差人遞還各付所統其額內官健有逃死者不須更填宣示軍州令知朕意命郭子儀等出師制自古聖帝明王之臨御也莫不法乾坤之覆載體山川之受納立德於太上還淳於至道清靜無事保合太和濟於羣生洽於四海豈垂意兵革勞心戰爭也蓋有德化之所不綏招懷之所未諭不式王命毒流生人故有除暴禁淫之師安人止戈之武則神農黃帝堯舜禹湯之所不免也朕君臨萬邦十有三載薄德內愧中夜以興至如易簡寬仁恭默恬淡素懷所慕終食豈忘然自承統以來屬當多難伊川有盜國之孽朔野有叛君之將江湖海島伏戎數輩其在右武安能解嚴所以請於宗廟親授經略誅詰姦宄摧殄暴强三年之間方內底定此皆皇天祐我烈祖羣后戴豫一人是用集大勳於國家保萬姓於區夏豈伊寡薄能及此耶每思偃兵姑務柔逺將息馬以論道期舞干而修德而西戎負約間嵗犯邊朕常棄細過庶𢎞大體疆臣兵吏亟請長驅屢有誡敕不令掩襲兼約游騎不許擒生或誤得之亦使還遣固以亭育之義豈隔華夷綏撫之恩寧疏逺邇故布文告以訓之敘舅甥以睦之彼亦嘗遣聘臣來修舊好玉帛之禮才至於上國烽燧之候已及於近郊長其無厭昧於事大去冬踰我關隴入我邠岐驅人之馬牛掠人之士女朕許其通好本在人安乘此不虞翻貽我詐每一興念悼於厥心豈朕不叶於親鄰豈朕有負於恩信猶期懲艾未忍討除今大閲甲兵以增扞禦且崇不戰之道用舉邊備之常所以然者念其載勤欵疏求繼嘉姻事或由衷義從割愛因之寧逺豈復顧私當罷四方之師永全二國之好倘更侵冒必示威刑宜令子儀以上郡北地四塞五原義渠稽胡鮮卑雜種步馬五萬嚴㑹徇邑充北舊軍抱玉以晉之髙都韓之上黨河隍義徒汧隴年少凡三萬衆橫絶髙壘斜界連營馬璘以西城前庭車師後部兼廣武之戍下蔡之徭凡三萬衆據於朝郍遏當路之塞忠臣以盧龍栁城洎右北平漢東諸鎮江黃申息之師凡三萬衆屯於回申張大軍援忠誠以武落别校右地竒鋒凡二萬衆出岐陽而北㑹希讓以三輔太常之徒六郡良家之子自渭而合汴宋淄青河陽幽薊總四萬衆分别前後魏博成德昭義永平總六萬衆大舒左右朕內整禁旅親誓諸將資以千金之費錫以六牧之馬其戎裝戰器軍用邊儲各有司存素皆精辦咨爾將相文武宣力之臣夫師克在和善戰不陳各宜保據經界屯據要衝斥堠惟明首尾相應若能悔過何必勞人如或不恭自當伐罪然後眷求純一以制諸軍進取之宜俟於後命各敬爾事無黷武經賞罰之科國有明典宣示中外知朕意焉大厯九年四月停河中節度并耀德軍詔自中原有事海內不康殱厥渠魁人自為戰其死亡者不可勝紀若非其父兄即其子弟責罰由朕禍非自天念兹胸胸痛入骨髓明神厭亂元惡就誅四胡既平罔不相賀遂欲衣裳為㑹天下偃兵備七德之武同五星之色成朕之志實惟良臣關內河東副元帥朔方河東節度使司徒兼中書令汾陽郡王子儀邁德濟時盡忠憂國篤勤王之義急偃伯之期思拯生人免其湯火善陳利害屢進封章以艱阻匪寧務於清淨地非要害不可猶開幕府事無防遏不可更置轅門請停河中節度并耀德軍宜依罷兹凶器姑欲息人離散可安瘡痍可復率是道也仁遠乎哉朕心所嘉期於至理宣示中外明政體焉廣德二年六月發兵屯守諸鎮詔在昔聖王之御㝢也常修文德以勝武威故能協和神人撫寧方夏蓋有國之令圖也朕自君臨萬邦於兹三載明發求理中夜靡遑常懼祖宗之威靈顧惟黎元之未洽是用君臣之際推人腹心賞罰之道俾無僣濫每發一詔施一令罔不本之以德義後之以威刑期戢五兵思𢎞七教庶乎勝殘去殺之理有恥且格之道而眇身薄德肺腑未親四方諸侯義信猶阻近聞曹濮數州加兵籍馬採聽飛語容納奸謀交質往來邀結外援雖各在封略言備冦攘而汴郡士庶頗聞驚擾閭井奔散如避冦讐逮兹春中首理未入朕為人君父不能以誠明感達股肱之佐不能以慈惠覆育黔黎之類使其骨肉相出情義不通終宵咎責心用震悼亦以社稷之計億兆之命防微慮逺不得不然至於君臣之道進退之理雖造次顛沛所未嘗忘也是以分命節制及諸禁軍於汴宋懷鄭之間使其屯守發令之日嘗言誠非有侵不令議戰但田里復業農桑及時下無愁怨外絶師旅偃旗卧鼓朕願斯畢於戲惟天地日月實鑒我心山川鬼神尚弼豫志布告中外咸令知悉建中元年優奬西北庭將士詔二庭四鎮統任西夏五十七蕃十姓部落國朝已來相奉率職自關隴失守東西阻絶忠義之徒泣血相守慎固封略奉遵禮教皆侯伯守將交修共理之所致也其將士敘官可超七資建中年還馬燧賞軍士家財詔忠臣之事君也願隳家以奉國良將之養士也或均財以周惠爰自古昔其儔蓋鮮故竇嬰陳金於廊廡趙奢分財於部曲皆受之天府不取私門猶能垂名史冊遺勞千載而況執上將之旗鼓率先登之士卒將行命賞罄乃家財上以彰憂國之誠下以竭奉公之效不有褒美孰旌忠賢河東節度使馬燧誠美夙著宏略載宣克揚經武之規實重安人之寄屬河朔干紀磁邢當冦而能忠義奮發奉辭問罪出師之際宣布明誠誓將資産分給戰士故得三軍之衆相與感激百勝之績於兹競勸朕當遂其懇誠以成厥美殊常之跡古人所難舉而行之用明信賞仍班王府之貨式表忠臣之節宜令度支出錢充給將士馬燧家資並却還仍宣付史館建中年遣胡證巡邊詔周禮政官之屬掌道王志以巡天下邦國況六郡分統二庭綿邈居必申警動當攝懷自頃東夏有虞近郊多壘沙朔之外剪為冦戎亭鄣烽櫓之嚴遐張塞下使譯道途之要逺屬湟中今妖氛可息思欲肅關隴之右地制昆吾於盛秋而慮師無見糧卒有虛藉乏守禦之全備積愁歎之餘音臨軒永懷宜俾宣導非夫忠良陳達文武兼資信厚足以得人心恪恭足以奉王事則何以膺兹選任布我憂勞至於問戍役之勤詳山澤之要稽軍實之名數計餽餉之盈虛宿弊有未除衆情有未達兵機虜態一以上聞兾在此行所至循拊宜令左金吾衛大將軍兼御史大夫胡證充京西京北巡邊使所經過州鎮與節度防禦使刺史審度商量利害具事實聞奏嶺南用兵德音朕以寡昧獲承髙祖太宗之丕構六載於兹矣罔畋遊是娛罔聲色是縱罔刑戮是濫罔邪佞是惑夙夜怵惕以憂以勤庶幾乎八表用康兆人以泰而西戎款附北狄懷柔獨唯南蠻奸宄不率侵陷交趾突犯郎寧爰及巂州亦用攘冦勞我士卒興吾甲兵騷動黎元疲力飛挽每一軫念憫然疚懷顧惟生人罹此愁苦宜布自天之澤俾垂及物之仁如聞湖南桂州是嶺路係口諸道兵馬綱運無不經過頓遞供承動多差配凋傷轉甚宜有特恩潭桂兩道各賜錢三萬貫文以助軍錢充以館驛息利本錢其江陵江西鄂州三道比於潭桂徭配稍簡宜令本道觀察使詳其間劇准此例與置本錢雍州以西黎舊界內昨因蠻冦平有殺傷宜令本道收拾埋瘞量設祭酹徐州土風雄徑甲士精强比以制馭乖方頻致騷擾近者再置使額却領四州勞逸既均人心甚泰但聞比因罷節之日或有避罪奔逃雖朝廷頻下詔書並令一切不問猶恐尚還疑懼未委招㩦結聚山林終成詿誤況邊方未靜深藉人才宜令徐泗團練使選授召募官健三千人赴雍管防城待嶺外事寧之後即與替代歸還仍令召滿五百人即差軍將押送其糧料賞給所司准例處分淮南兩浙海運虜隔舟船訪聞商徒失業頗甚所用縱捨為弊實深亦有般運貨財委於水次無人看守多至散亡嗟怨之聲盈於道路宜令三道據米石數牒報所在鹽鐵巡院令和雇入海􅔓船分付所司通計載米數石外輒不得更有隔奪妄稱貯備其小可短至江口使司自船有不在更取商人舟船之限如官吏妄行威福必議痛刑於戲萬方靡安寧忘於罪已百姓不足敢怠於責躬用伸欽恤之懷式表憂勤之㫖咸通五年五月唐大詔令集卷一百七
