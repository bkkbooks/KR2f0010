body:
  text: 唐大詔令集巻三十二宋宋敏求編皇太子追贈邵王贈皇太子制申王贈恵莊太子制岐王贈恵文太子制慶王贈靖德太子制興王贈㳟懿太子制齊王贈懷懿太子制晉王贈悼懷太子制册贈節愍太子諡册文恵莊太子册文恵文太子册文㳟懿太子册文哀册文懿德太子哀册文節愍太子哀册文恵莊太子哀册文恵文太子哀册文恵宣太子哀册文㳟懿太子哀册文昭靖太子哀册文莊恪太子哀册文罷祭停官祭贈太子勅追贈邵王贈皇太子制門下悼往興哀事極於理義餙終追逺禮著於經國故邵王重潤漸履雲霄分輝日月體謙㳟之質藴忠順之誠愛敬盡於宫闈仁孝聞於區㝢地居長嫡允膺崇樹天不憗留奄隨運往朕丕膺寳命廼眷承祧瞰朱邸而無從傃青方而結欷宜加贈典正位元儲可贈皇太子所司備禮改𦵏主者施行神龍元年二月九日申王贈恵莊太子制德盛者必享休名道髙者必膺殊典况人倫之重義切因心天屬之深情殷追逺故司徒申王撝叡哲聰明本乎天性温㳟孝友挺自生知樂善好書清猷邁於兩獻深仁厚義美化侔於二南可謂具瞻百寮儀型列辟朕將永康兆庶方自友于天不憗遺奄從薨逝氷惟仁範哀慟纒綿用表非常之榮少寄天倫之戚可追贈恵莊太子宜令所司備禮就加册命陪𦵏橋陵開元十二年十一月岐王贈恵文太子制褒崇名器所以尊德也光昭典禮所以餙終也况天倫之愛親親之至乎故太子太𫝊上柱國岐王範特禀聰明率由孝友好書不倦樂善無忘固已作則列藩儀型百辟方憑魯衛之政率流雍睦之風豈圖輔德愆期殱良奄及想同氣而莫遂望驂駕而何追言念平生情深震慟宜加殊禮之命用寄孔懷之哀可追贈恵文太子所司備禮就加册命開元十四年四月慶王贈靖德太子制追終悼徃久著於國章考行易名匪私於天屬故司徒兼太原持節充河東道諸軍節度大使度支營田等使上柱國慶王保地居長嫡道茂中和爰在㓜冲克光撝挹既著讓賢之美愈聞禮樂之風加之雕琢文藝周旋禮樂固力行以近仁亦因心而為孝自析珪祚土藩翰式崇授鉞分符權畧斯逺年方在壯未虞夭䘮疾瘵不救憫惜良深宜循加贈之典式寵元儲之位可贈靖德太子應縁䘮𦵏一事已上宜並官供仍令太子少師韋縚充監護使京兆尹裴士淹充副天寳十一年五月興王贈㳟懿太子制門下厚禮所以餙終易名所以表行况情鍾天屬寵及褒封載疇加等之美式備元儲之贈永懷軫念有惻彞章第十二子故興王佋毓慶璿源分華若木天資仁孝神假聰明河間聚書㓜聞樂善之㫖延陵聽樂早得知音之妙頃以暫嬰沉瘵殆積旬時而資敬益彰頴悟逾爽愛親之戀言不間於斯須苦訣之辭事先符於夢寐顧惟至性實切深衷将祚土析珪載崇藩翰聞詩對易爰就琢磨方冀成立豈期天䘮瑶英始茂遽摧落於當春隙駟俄遷忽沉淪於厚夜興言痛悼憫惜良深宜寵賁於青宫俾哀榮於窀穸可贈太子諡曰㳟懿應縁䘮𦵏所司准式仍令兼京兆尹劉晏充監䕶使少尹陶鋭為副主者施行貞元元年八月齊王贈懷懿太子制夫褒善餙終王者常典况我友于之愛手足之親永言痛悼之懷用錫元良之命故齊王湊孕靈天宇擢秀本枝孝敬知於孩提恵懷洽於親愛將固磐石遂分茅社學探蟻術之精智有象舟之妙好書樂善造次不失其清規置醴尊師風雨不忘其至敬方期鮐耉以保怡怡天胡不仁殱我同氣念周宣好愛之分長痛莫追覽魏文榮樂之言軫懷無巳繇是稽諸前典式展追榮特峻徽章表恩泉壤雖禮命之儀則爾而天倫之恨何攄遐想幽魂宜膺寵數可贈懷懿太子仍命有司擇日備禮追册開成三年正月晉王贈悼懷太子制王者重統紀尊儲副所以上嚴國本祗叶禮經睦人倫以正邦典崇丕基而昭彞式其或德契元良思當追命道雖間於存歿義有表於哀榮仰惟舊章用攄憫志故開府儀同三司晉王普先帝冢𦙍間氣夙鍾孝敬發於岐嶷溫仁形於襁褓翦珪分社光祝䇿於參墟錫土啟藩假威尊於上黨朕頃戡内難謬屬與能以王齒在提嬰事絶推讓方期就傅謂致修齡既因猶子之義俾膺主鬯之選天不憗遺殱我本枝泣悼永往空餘典禮嗟樂善而莫報顧十起而何追衘悲長慟此誠無極是用稽諸前訓申我宿愛布曩懷於兹日告如在於幽靈式愴虚儀曷瘳深痛可贈悼懷太子仍令有司擇日備禮追册大和三年六月册贈節愍太子諡册文維景雲元年歳次庚戌十月戊寅朔二十九日丙申皇帝若曰咨爾故皇太子重俊業隆繼體才膺守器故辨日髙視晉儲防年遐吞漢兩撫軍監國皇基攸固齒胄問安聖圖惟永頃以讒邪浸潤恩禮踈薄外廹伊戾之謀中啟驪姬之譖彼則兇計斯甚揺動元良爾乃誠心宻運掃除悖德興晉陽之甲以罪荀寅擁漢闕之兵而誅趙虜嗚呼逆首雖殄餘黨未靖屬投杼生疑亂兵旋及朕代天理物推亡固存近勦四㐫𬗟懷三善言徴備禮以慰㝠魂銀牓山門畫堂泉室三年遂逺上賔之馭不留千載猶生全節之名長在存著徽烈歿有餘裕志業若此痛悼良深宜加寵號用旌不朽今册諡爾曰節愍太子魂而有靈嘉兹茂典嗚呼哀哉惠莊太子册文維開元十二年十一月甲申皇帝若曰於戲夫縟禮所以飾情崇名所以表德義存追逺愛洽因親故司徒申王撝闕極禀靈邦家維翰體孝友以成性用淳和而合道沛獻受易率以鳴謙河間聚書時其好學加以出為方伯𢎞宣六條入登司徒大敷五教天則不憗奄薨於行留邸無期同輿遂逺興言哀痛震動於厥心夫先王演親親之恩春秋著加等之義上嗣之位餙終斯在今遣攝太尉侍中源乾曜持節册贈王為恵莊太子宜率茂典以永徽猷魂而有靈式昭哀贈嗚呼哀哉恵文太子册文維開元十四年四月二十二日皇帝若曰於戲帝室之斡曷降年不永天倫之戚而因心有加餙以徽章孔懷之義也咨爾太子太傅上柱國岐王範孝友至性聰逹多才樂善為詞言行俱敏好學流譽經傳悉通德既訓於東宫化且行於南國而輔仁或爽倚福無稽奄忽遷殂震悼何及夫禮以情為體欲増追逺之數行以名而尊是圖褒德之軌故擇兹茂典崇以上嗣言念逝者用申友于今遣工部尚書攝太尉盧從愿持節册王為恵文太子魂而有靈昭是哀贈㳟懿太子册文維上元元年歳次庚子冬十月戊午朔四日辛酉皇帝若曰於戲夫睦親加等有國之彛訓悼亡申恩中心之所切是以増其縟禮漢藩追鸞輅之榮備以徽章魏屏飾龍旗之贈興言故典感惻良深第十二子故興王佋慶襲紫庭憑華丹極温良質其性本孝友禀於天成加以神假聰哲身周藝美故方變樂𦕈音以洞㣲百家之書經月而成誦年雖在於髫齔學巳該於典墳自位列三珪祚班五土緑車爰錫亟承䟽邸之榮青社云封實屬維城之望豈謂藏舟易徃過隙難留顧蘭坂而如昨痛梧宫之遂掩况㓜有至性實由生知心惟愛親歿不忘孝幽夢克申於告訣至懇能貫於存亡言念淪䘮尤深憫惜是用叶茲純德贈以元儲夫㳟者行之先懿者文之美易名表稱俾永徽猷今遣銀青光祿大夫行中書侍即同中書門下平章事集賢殿崇文館大學士修國史上柱國姑臧縣開國伯李揆持節册命為㳟懿太子申予至感賁爾寵光雖倚門之懷永衘酸於碣館而告柩之禮庶延渥於泉扃魂而有靈昭此哀贈嗚呼哀哉哀册文懿德太子哀册文李嶠維神龍二年歳次景午夏四月甲戌朔二十三日景申懿德太子粹宫啟自洛邑將陪窆於乾陵禮也廞衣夕陳俎奠朝設蜃輅俄軫龍旗按節皇帝嗟蟻庭之寢籥惜鳳渚之韜簧撫萬乗而懐國本綏六姻而悼乾將情無輟哀禮有加數刻純懿於金版播芳聲於玉牒其詞曰靈命將興元符是膺皇基茂立帝武丕承祥集畫堂慶流朱邸棘天延貺桐圭備禮實惟天族載挺人英川寳岳秀虹暉霓精舞象得𤣥佩觹聞道刻舟敏遽牽衣慧早幾神闇體理識宣資心韜鍾律情含蔡蓍曰仁曰孝非訓非師寛恵深博温良肅祗苞舉六文網羅羣籍詩接楚彦賦延梁客淮國𫝊騷雲臺對易樂善超羣多才掩昔乃崇匡衛實屏實藩乃列朝請為鴻為鵷揚聲北路振彩西園儀表姬戚光輝舜門㳟事閫闈歡迎黨族怡色玉潤温詞蘭馥中外克諧親踈允睦常德有裕間言無讟榮深出幸寵茂留中婉孌羣辟調繆二宫陪輿澤厚錫馬恩隆西蜀欽義南山向風禮縟天孫望髙元嗣重海闕象前星虛位方輟須㝷行膺主器奄䘮門軸俄摧隙駟嗚呼哀哉鳯下朝陽龍収瞑光瓊田滅彩桂苑淪芳國軫傾翰朝悲壊梁惟靈徴之寂寂怨天道之茫茫嗚呼哀哉𤣥聖登期恩榮下賁爰命典䇿式昭名諡匕鬯雖崇粢盛不莅闔壤同戚具寮増欷嗚呼哀哉築恩臺兮竟不旋還作室兮復何年訪来人兮傷對日瞻雲鶴兮感昇天惜明離之虛繇悵鳯樂之徒懸懟銀牓之留月泣銅樓之送煙嗚呼哀哉司兆獻占掌圖辨域挽鐸初警帷幌既飭引文衛之邐迤度繁笳之悽惻纒永慕於青府結餘酸於紫極嗚呼哀哉辭交風之近甸出避雨之層巒望八水而遥集懷三川而顧難菱枯兮夏旱花落兮春殘林野晦而天無色烟雲愁而景欲寒嗚呼哀哉稅駕昭塗即宫下土執斧供事揚麾按部藏日兮山門埋燈於地户痛平生兮㝠漠哀倐忽兮今古視不見兮聽不聞天無曉兮夜無分同變化兮光隂盡配陽秋兮蘭菊芬嗚呼哀哉節愍太子哀册文維景雲元年十月朔日子節愍太子梓宫自鄠杜粤某日將陪窆於定陵禮也蜃衛初引鳯仙將逺閲少海而不流赴窮泉而莫返皇帝懷副君之大義降猶子之深慈餙忠烈於逝者備哀榮以送之漢幄虚侍周牆肅事思臺空築幽埏永閟金相兮玉裕揆行兮旌能峻節兮無冺芳聲兮有恒其詞曰景雲流祉白水貞祥祀及百代威加萬方勃焉家國赫矣皇王帝子攸降乾男以將邁德誕靈懷文抱質漢臺占雨秦京近日敏對不羣能言罕匹藝該百變詞含六律朝霞自舉夜月常逰醴薦推穆書成重鄒典戎仙衛作牧神州是謂元子光膺孟侯少陽正位太學知道春誦夏絃尊師敬老榮承圭玉寵殷瑜珮三善不忘四章旋逮過闕則下入廟斯趨曰仁與孝終始不渝聖敬日躋溫文歳廣望髙周副才優魏兩用事有倫出言無黨政成中外聲溢天壤邪臣作蠱匹夫知惋不顧身逰將夷國難忠義期仗猷謀是斷獲戾宫朝歸魂霄漢白駒過隙蒼蠅止藩水逝西沼霜凋北園鶴闕誰馭鳩里徒寃瞑目於此傷心詎論嗚呼哀哉重日淪輝前星墜彩形神溘謝德音如在物是人非年移運改聖明延鑒徽章有待有待伊何慶逢開闢延鑒伊何恩隆典册即鳴鳯之岡嶺啟占鳥之隧宅人辭中壘之桑鳥思平陵之柏地如伊水山連紀市嗟委化於仙期欲問安於神里五營成列萬國衘酸挽鐸朝喝旌麾曉寒指牽牛以南渡乘飲龍而北傃顧青舎兮非春掩𤣥扉兮大暮昔之来兮銀牓銅樓今之徃矣曠野荒丘冉冉兮辰促蒼蒼兮道悠惟聲華與純懿比金石而恒留嗚呼哀哉惠莊太子哀册文張九齡維開元十二年歳次甲子十一月丁巳朔二十四日庚辰司徒申王薨於行在所册諡恵莊太子旋殯於寢粤閏二月二十七日壬午將陪𦵏於橋陵之栢城禮也黼幕宵布羽纛宿設西序啟攢南省成列皇帝深天倫之蹙崇后儲之禮擬容衛於青宫申孔懐於朱邸爰命史氏於稽令則無俾直言不彰遺德其詞曰昊天有命先后受之分王子弟藩衛京師克荷成憲罔不肅祗懿哉明哲誕惟純粹宣慈日聞孝友天至道則脗合跡無自異性則生知學兼時習易㣲書逺詩興禮立德必有隣善如不及貴而能損重固難挹方伯出鎮召南取斯司徒入掌鄭武其宜義之所在政務克施物留遺愛事著成規西夏心人東征叶卜韡韡同輦皇圖改服疾遘中路凶傳左轂寜不慗遺奄鍾斯酷嗚呼哀哉昔在冲妙具惟兄弟四國並封五王均體逰必連騎居則同邸各承命於含飴俱受經於置醴既荏苒而云邁屬殷憂於將啟實定禍於蕭牆遂繼明於雲陛雖隔深宫之衛常洽家人之體曷徂謝以痛心感平生而流涕嗚呼哀哉爰擇茂典將崇上嗣表先聖之元良申友于之褒異紛鹵簿以徒設儼文物而空備彼神儀之如在乃羣悲之所萃周禮從祔漢塋是陪先逺日而撰吉㑹同盟以送哀夜漏盡兮暗室啟庭燎殘兮曉輓催既三接而徐進將一去而不迴嗚呼哀哉背朱門兮遲遲馳白驥兮騤騤野蒼茫而助惨風蕭飋而増悲離離兮素葢寂寂兮畫帷遵舊途而何有覽陳迹以如疑靣都邑於不入侍陵寢兮有期惟光儀之永閟與昭代而長辭嗚呼哀哉潛清輝於幽穸昭鴻名於美跡將在皇儲之史豈伊諸侯之册播遺芬於蘭桂𫝊不朽於金石諒紀言之在茲庶德音之無斁嗚呼哀哉恵文太子哀册文蘇頲維開元十四年太歳景寅四月乙酉朔十九日癸卯太傅岐王薨於洛册諡恵文太子殯正寢之西階仲夏景申將祔於橋陵禮也曉隂北清魄月西照列鐸挽以嚴鼓出軒除而減燎皇帝戚深天倫寵異天人追遣奠於將逺動哀懷其若新震以貞位文以光諡爰召司存廼甄遺懿其詞曰重𤣥之門唐系居尊五色之土岐封效古瑶圖正位兄一弟二寳蕚承庇帝三王四甞急難兮特詢以事竟扶翼兮能竭其志其志伊何程才則多武以之靖文以之和勇超東牟思奪東阿是曰其爾曷云其他覃訏守成忠肅鍾美克順克比為臣為子河書聚學沛易窮理毫使露濡賦令雲起出咨岳牧入慎邦紀魯衛則侔武桓斯擬𫝊於元嗣欽若端士往錫朱旂来朝紫㣲家人輯穆藩后增輝甘㫖不同而不膳珍華不供而不衣楚謀或隠梁藉寜遣屬巡岱以封還待升天而慶歸猗那兮揚名於後於鑠兮循業可久富貴兮於何不有闇忽兮曽莫之壽嗚呼哀哉宵半分漏革𫝊於奏天初辨時慮切乎思駿馬連􅘠而交使近臣駢命而挟醫望君王兮何遲遲俯􅎉檻兮猶若期至不至兮欵長辭莫悲兮惟此悲外皆罷輟兮内獨漣洏豈吾季之在哉崇后儲以諡之孝依喬岳仁本京師莊洎文兮疇能忍兹靈輴稍發清道徐按整承華之鹵簿憺德陽之宫觀樹隂隂於國門橋耿耿於天漢盈舊悲以迴復蓄新哀以聚㪚㷀然嗣王若不勝䘮惨天地之何心怨闗心之巳長夫儉之為德謙固其則存殁是膺恵文是徴存也髙臺深池之不競歿也備物重器之不矜嗚呼哀哉典册之有憑恵文之有稱故奉先皇之松栢成太子之園陵嗚呼哀哉恵宣太子哀册文韓休維開元二十二年歳次甲戍七月庚申朔十日己巳故司徒薛王薨於洛册諡恵宣太子翌日殯於正寢之西階粤八月二日庚寅將陪𦵏於橋陵禮也凉隂戒秋白露凝夜𫝊哀挽於郊道儼虛容於池榭皇帝痛棣華之既凋覩蘭坂而増欷撫徹奠以無及恨潛泉之永閟光於典册昇彼儲嗣爰命史臣颺言其懿其詞曰於昭帝系濬發𤣥裔建堯升唐自薛而王粤有成德遂荒東國大啟土宇聿崇典則夫其秉靈在初廸哲惟濬惇敏秀鑠淳龎淑慎謀謩以成蹈道而順文英獨越武烈惟振百辟式曕五帝以訓惟茲大賢克懋天秩為藩為屏是輔是弼保釐我邦家左右我王室沛獻演易楚元説詩藝無不綜學罔有遺分以寳玉建其旌旗出𢎞聲政入贊雍熈咨爾公族是惟敦睦主曰介弟寵其車服俾侯於京怡怡弟兄穆以家人之禮崇其藩后之榮曷常不樂彼同輿却東平之歸奏詢其異政欽北海之能名將以天倫之愛可以昭於載籍友于之誼可以貫於神明宜其善有其慶禍無其胎享此眉壽祜其多才胡勿藥以為疾逮彌旬而成災躬為禱兮靡不至誠以精兮無不備走羣祀以累祈徴上醫而畢洎蒼黄而晦明未隔門忽而古今斯異嗚呼哀哉神理無昧人寰巳非想河洛其猶在望淮仙而不歸悲由中而自切情限禮而相違悵丙舎之去逺餙承華以増輝嗚呼哀哉靈龜肇吉服馬先路悼津門之永違遵河橋以直度笳哀洛陽之道旐靡咸京之樹換憂歡於今昔變風景於新故嗚呼哀哉夫行以諡尊恩由禮盛申備物以増餙𬗟貞徽而獨映俾重為善之名以彰有後之慶嗚呼哀哉庭樹槭以驚秋川波咽而不流歴神臯兮望國寢背華宇兮歸山丘流塵滿兮虛榭暗緑苔生兮行徑幽惟盛德與鴻烈亦天長而地悠嗚呼哀哉㳟懿太子哀册文維上元元年太歳庚子六月己未朔二十六日甲申皇第十二子持節鳳翔等四州節度觀察大使興王佋薨於中京之内邸殯於正寢之西階粤八月丁亥册贈皇太子廟號㳟懿冬十有一月庚寅詔𦵏於長安之髙陽原禮也鷰隧開封龍輼進轍陳祖載而就位嚴塗芻而成列皇帝哀玉林之閟景憫璿蕚而罹霜曕蜃綍而増恩懷㕍池而永傷考諡惟古褒崇有式爰詔史臣恭宣懿徳其詞曰維天祚唐累葉重光中興景運再紐乾綱本枝建國磐石疏疆克開聖𦙍實曰賢王驪源孕彩日幹騰芳深仁廣孝藴藝含章秀發童年惠彰髫齒蹈禮知方尊賢叶㫖對日流辨占風繼美魯衛後塵間平絶軌冦孽初搆王師未班爰從襁褓載厯難艱愛備中掖名崇懿藩居常禀訓動不違顔禮及佩觿朝加分器胙土延渥登壇受帥璇室金箱文經武緯樂善為寳崇儒是貴濬哲外朗温文内深閱書成誦觀樂表音五經在口六律諧心才優藝洽絶古超今蛇豕猶梗寰區未又總慮其真焚香演偈食去葷血心依定慧庶福邦家俾清凶穢霜露嬰疾聰明害神沉疴始遘彌曠盈旬正慮無擾發言有倫在膏方亟問膳愈勤雲物告徴星辰變象楚藥無救秦醫莫仗靈儀杳而上賔徽音邈其長往違舊邸於青社即幽陵於黄壤鳴呼哀哉魂氣奪兮去何之精靈在兮孝有思痛君親之永隔託夢寐而來辭延桂宫而震悼貫椒壼而纒悲旌遺芳於碣館賁新命於儲闈嗚呼哀哉先逺戒候占龜獻吉指鶉野而西臨背鳯城而右出天慘慘而若霧山蒼蒼而翳日揚薤挽之哀悽盼松埏之蕭瑟羅烏伏以禮峻掩黄腸而室宻望馳道而長辭赴幽途而永畢嗚呼哀哉生為寵王兮宸愛所鍾歿追上嗣兮朝典斯崇昇玉笙於洞府閲銀棨於泉宫金石惟固兮人生有終簡冊攸記兮徳音無窮敢陳詞以篆美庶永代而承風嗚呼哀哉昭靖太子哀冊文蕭昕維大厯八年歳次癸丑正月乙亥朔十七日辛夘開府儀同三司元帥鄭王薨旋殯於内侍省二十七日甲午冊諡曰昭靖太子洎十年歳在乙夘十二月庚申朔二十六日乙酉遷窆於萬年縣細栁之北原乃詔京兆尹黎幹監䕶喪事展餙終之儀禮也嗚呼哀哉窮隂肅烈煞景凝沍蜃輅方巾龍驂在御設庭燎以終夕啟攅途而即路皇帝悼賢王之不淑念愛子之云亡齊彭殤以理遣顧形影而神傷録舊勲於藩邸議新諡於太常睠承家於匕鬯追嗣位於元良爰命侍臣式纂遺芳其詞曰維昔啟土膺兹册命錫爵為王建封於鄭梁國寵異魯邦禮盛明哲在躬温良成性國歩艱難遘茲師旅克生才藝允是文武乃拜元戎俾殱醜虜職思靖亂功期禦侮守師律以殿邦振威聲而先舉問安内豎視膳寢門隨肩明兩順色晨昏光輝棣蕚友愛鴒原率禮不違人無間言招賢南楚愛客西園宗子維城王室以藩樂善未終沉疴斯起羣望並走衆毉咸理有加無瘳蘭銷玉毁馳光度隙逝川閲水軫皇慈之恒化嗟國人之罷市嗚呼哀哉疇庸未紀度德則優崇以徽號闡其謀猷善則可旌禮無不酬吉㐫同域神理難求列前星之儲位招甲觀之靈斿撰日月以有時備塗芻之將命卜竁從吉辨方居正堇原霜若從阡雪映起寢廟之崇嚴制園陵之尊盛嗚呼哀哉輼車發軔緹騎前旌祖載奠撤嘯笳哀鳴挽出離宫路廻直城羽儀以列徒馭不驚越素滻以東指背東山而北征聨岡走以廻抱逺樹靡而低傾對驪宫以立表依細栁以開營閟重扄於穸壤悲執紼於桓楹川杳杳以暝色野稍稍以寒聲仰清芬之不冺實昭晰於鴻名嗚呼哀哉莊恪太子哀册文維大唐開成三年歳次戊午十月乙酉朔十六日庚子皇子起薨於少陽苑十七日辛丑遷座於大吉殿十一月乙夘朔二十四日戊寅命册使太子太師兼右僕射門下侍即國子祭酒平章事鄭覃副使中書侍即平章事楊嗣復持節册諡曰莊恪十二月乙酉朔十二日景申葬於驪山之北原莊恪陵禮也玉琯歳窮金壺漏盡祖奠告撤哀笳將引庭滅燎而月寒路揺旍而風𦂳皇帝念主鬯之缺位悼佩觹之夭年銅樓巳閉銀牓徒懸方追思於對日遽冥寞而賔天典册具舉文物咸備爰詔侍臣顯揚上嗣其詞曰皇矣帝緒肇基綿古種德尊道宗文祖武上聖開成天下和平儲祉發祥是先元良覃訏之初岐嶷用彰藴才游藝玉裕金相既免孩提是加封殖伊維城於東魯錫介珪於上國辭榮朱邸正位青宫尊師重保養德含聰畏馳道而不絶問寢門而益㳟招賢警戒齒胄謙冲冀日躋於三善奉天慈於九重漢明好學既顯於外魏丕能文方循於内美不二於顔過嘉得三於鯉退焜煇甲觀鏗鏘瑜珮方積善於為山何反真而游岱嗚呼哀哉憂兢損夀沉疴始遘羣望並走百靈宜祐吳客之問徒為越人之醫靡救占前星之掩燿知東朝之降咎天垂象而則然人由巳而何有嗚乎哀哉税駕承華兮即宫夜臺鳯笙長絶兮蜃輅徐来啟青門而東出歴元霸而左廻度凋林兮魂斷入曠野兮心摧水助挽而幽咽雲帶翣而排徊悲佳城之已掩見新廟之方開嗚呼哀哉授經兮曷期執紼兮増欷九原作兮何嗟及七日還兮安可希有少海之波逝無西園之葢飛商山之羽翼已㪚望苑之賔客咸歸瑟彼玉簡閟於泉扉用𫝊信於文字願不冺於音徽嗚呼哀哉罷祭停官祭太子勅勅諸贈太子頃年官為立廟并致享祀雖禮欲歸厚而情且未安蒸嘗之時子孫不預若専令官祭是以踈間親遂此為常豈云敬孝其諸贈太子有後者但官為置廟各令子孫自主祭其祭署及官悉停若無後者宜依舊開元二十二年七月唐大詔令集巻三十二
