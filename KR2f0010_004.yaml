body:
  text: 唐大詔令集卷四宋宋敏求編帝王改元中改元載初赦改元開元赦改元天寶赦改天寶三年為載制改元上元赦去上元年號赦改元永泰赦改元大厯赦改元中改元載初赦朕聞元皇纂厯則天地以裁規大聖握圖法隂陽以施化故能牢籠品類陶鑄生靈敷景運於休期闡宏基於光宅有隋失馭率土分崩赤縣為禾黍之場蒼生遇塗炭之酷我高祖神堯皇帝龍興汾晉鳯起寰區除梟獍而安八荒剪鯨鯢而清四海太宗文武聖皇帝膺昊穹之厯數鼓雷電之雄威服逺冠巢燧之前開邉越羲農之際鴻名邁於三五茂績隆於往初髙宗天皇大帝稟雷澤之禎符降天縱之神器湛恩所被匝乾坤覆載之鄉至化所覃盡舟車所通之境撫璇丹極輯瑞蒼巖天平地成淳風啓千年之運樂和禮備寶祚隆三聖之基逖聽王猷馨聞帝載朕以虛薄虔奉睿圖夙懷兢業不遑寢食幸穹昊貽佑宗社延祥河薦合天之符洛出永昌之籙時和嵗稔逺肅邇安斯皆先德所延屢彰嘉貺自恭臨億兆已積炎涼尚想希風未臻於至道顧循菲德愧切於深衷思𢎞顧托之恩再闡混元之始夫以玄穹列象三辰所以麗天厚載含章五行於焉紀地易曰三五以變錯綜其數通其變遂成天下之文極其數遂定天下之象火水相變其卦為革彖曰天地革而四時成言五德更相生變革萬物故帝者改政施教明受之於天下定之於人者也仲尼曰其或繼周者雖百代可知蓋以文質相因法度相改故矣是以伏羲髙陽有周皆以建子之月為正神農少昊陶唐有殷皆以建丑之月為正軒轅髙辛夏后漢氏皆以建寅之月為正後雖百代皆可知者以此雖遭遇不同步驟殊致未有不表明軌物以章靈命之符者也我國家創業有意乎改正朔矣所未改者蓋有由焉髙祖草創百度因循隋氏太宗緯地經天日不暇給髙宗嗣位將𢎞丕訓改作之事屢發聖謨言猶在耳永懷無及自五帝纘統三王馭宇或父子相承同體異德或金木迭改應天順人故納麓登庸粵受終於文祖干戈革命必理厯於明時然則開元配永肇自陽來之旦統厯履端基於朔易之首孳萌發內氣律由中品物任而昭蘇生類蕩而敷革是知夏之人統不逮殷之地正殷之地正有殊周之天統元命所苞實在兹矣周公稽古制禮於成王之日漢髙握德改元於武皇之代則知文物大備未遑於上業損益之道諒屬於中平朕所以式遵禮經奉成先志今推三統之次國家得天統當以建子月為正考之羣藝厥義明矣宜以永昌元年十有一月為載初元年正月十有二月改臘月來年正月改為一月自載初元年正月一日子時已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒皆赦除之其叛逆緣及子孫殺祖父母父母部曲容女奴婢殺主不在赦限其與敬業虺沖并諸虺友或有往還其魁首已伏誅其支黨事未發者並特從原免不得更相告言內外見任文武九品以上職事官並賜右爵之級天下百嵗以上老人版授下州刺史米粟五石帛十段九十以上版授上州司馬米粟四石帛七段八十以上版授縣令逋租懸調并丁夫雜匠衛士及有畨地等達畨及逃走應陪畨及徴課調者並特宜免放其欠負官物及盜詐三庫物並不在赦限鰥寡孤獨篤疾等不能存立者量加賑恤孝子順孫義夫節婦旌表門閭終身勿事天下百姓年二十一身為户頭者各賜右爵之級女子百户賜以牛酒明堂役工人未被恩者付司郎類例定等級奏聞十五日內使了緣供明堂致死人其有未霑勳賜者亦宜準例酬給今年麥不熟處及遭霜潦之處並量放庸課州縣好加檢校勿使飢饉新年宣差科百姓稍有辛苦亦宜量加優恤蠲其徭役所司類例處分供象州軍百姓艱辛處未得復者宜給復一年洛州軍榖徭役繁多代朔并欣等州行軍及諸州供明堂木及銅處所司各類例節級給復皇親諸陪位未出身者量材處分已出身者賜勳一轉富啇大賈衣服過制喪葬奢侈損廢生業州縣相知捉搦兩京兼委金吾檢校天下百姓皆須嫁娶以時勿使外有曠夫內有寡女戰亡人格外贈勳兩轉回授期親其子孤惸者州縣給糧安養征鎮人家口州縣存恤勸課殷有之家助其營種勿使外人侵欺仍令所司刋定正禮樂刪定律令格式不便於時者內外官五品已上各舉所知九經文字集學士詳正革其訛舛亡官失爵量加敘録長流人移别敕流人移貫人降授官人反役緣逆人用當及造罪過特處分者雖未至前所並不在赦限西府功臣及晉府子孫屈滯者量加收敘所司奏聞亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之率土之內賜酺三日赦書日行五百里朕又聞之人必有名者所以吐情自紀尊事天人是故以甲以乙成湯為子孫之制有類有象申繻明德義之由朕今懷柔百神對揚上帝三靈眷祐萬國來庭宜膺正名之典式敷行政之躅宜朕以瞾為名自卦演龍圖文開鳥迹萬人以察百工以乂所以𢎞敷政道宣明禮樂指事會意改易異塗轉注像形屈伸殊制周宣博雅史籀興古篆之文尼父溫良丘明述春秋之傳自諸侯力爭姬室寖微離為二周分成七國法律異令田疇異畝言語異聲衣冠異制秦兼天下剗滅古文𨽻卒屢興兵車嵗動官獄繁鶩爰創𨽻書自著秦文肇興八體刻符兼於大篆摹印逮於殳書兩漢因之九千餘字張敞杜鄴講學於前楊雄甄豐校理於後魏晉以降代乏名儒穿鑿多門形聲轉繆結造新字附會其情古今訛舛稍益繁布書畫無端平之體魚鳥增奔放之容轉相倣效日滋月甚遂使後生學徒罔知所據先王載籍從此湮沉言念澆漓情深憫悼思返上皇之化佇移季葉之風但習俗多時良難頓改特創制一十二字率先百辟上有依於古體下有改於新文庶保可久之基方表還淳之意昔在包犧開木德之運軒轅應土行之序循環終始布在方册莫不績著帝猷功宣皇道方列三微之統乃膺五行之厯雖則盛比共工強踰嬴政齊桓晉文之業大彭豕韋之美才為霸者豈登帝籙自炎精蕩覆王風哀思漢氏蒙塵中原離析當塗逆取但肆兵威典午専權無聞德化故三國鼎峙五胡幅裂或道乖嗣德或業匪孫謀良由取之不以樂推失之在乎虐用者也及齊梁竊據僻在江淮周魏勃興奄宅咸洛雖變夷從夏號令惟行於境內而智小謀大聲教不通於天下隋之御極陳氏猶存開皇之中才聞混一嗣主失道俄至分崩七八年間生人泯絶秦項之酷猶未之半開闢已來蓋未之有我國家祖宗積德文武重光仁風被於四表英猷冠於三代易不云乎天地之道恆久而不易者也仲尼曰善人為邦百年可以勝殘去殺則知聖王久於其道而天下化成矣自魏至隋年將四百稱皇僭帝數十餘家莫不廢王道而立私權先詐力而後仁義勳未踰於列國德不漸於霸圖雖復時合諸侯一匡區域而晉武踐祚茂烈多慚於水官隋帝乘時雄圖不逮於秦氏惟彼二君閏位况區區者豈宜當三統之數者乎朕逖聽皇綱幽求帝典定王伯之真偽洗生人之耳目庶叶三推之美光宣五帝之次况當布政景化維新太初開厯上元伊始宜以發揮大寶申明厯數恢皇家正土之符繼炎劉真火之序摛之罔極垂之無窮以周漢之後為二王仍封舜禹成湯之裔為三恪有司求其苖裔即加封建其周隋宜同列國其嗣使祭焉布告遐邇咸知朕意主者施行改元開元元年大赦天下制蘇頲黃門聖人無心同於吹萬上皇有道契於明一居天下之尊者莫大體其大以照臨成天下之務者至公順其公以康濟故能稽昌厯考元符通於神祗格於上下鴻名不可以深拒盛典不可以固違斯豈在豫而徇於物也朕以菲德丕承聖訓掃除欃槍保衛宗稷內問安以承志外聽理以推誠始自朝廷納之以軌物加於蠻貊洎之聲教欲令跂行啄飲含齒戴髮去其夭札蠲其疵厲每兢兢於紫座寧自貴於黃屋而凡我羣辟顧斯兆庶以為人謀協從天意欽若王者人所歸也帝者天之號也歸之者以德號之者以功然號以功成則功不可以不表歸以德厚則德不可以不勵朕猥屬與能之運遂忘沖讓之私將逮建寅之嵗首甫釋建子之天統是用發揮景命受兹禮册夫循名者責實謀始者慮終勉而全之非敢自滿所以克已思政惟懷永圖懼弗勝荷用多慙惕赦令所作其來尚矣是則姦人之幸嘗思奔馬之喻朕但欲令其畏惡化之為善庶比屋可封豈開羅為惠朕之此志每用形言自昨冬序頗愆農澤洎簡辰㨂日有司備禮則上天同雲北風雨雪意者將乘廣慶必得湛恩宜慿宥過之典以叶隨時之義可大赦天下改先天二年為開元元年自開元元年十二月一日昧爽以前大辟罪已下已發覺未發覺已結正未結正繫囚見徒咸赦除之云云禮尚於儉書戒於奢朕方歸敦朴以存勸沮至於乘輿服御及土木之功蠲除樽節貴從簡省王公已下宜識此心將欲先自朕躬兾能化行海內薛伯陽以凶魁之子合置嚴刑緣尚主之恩特令遠貶旋念從夫之禮深矜自我之出宜復舊婚再承新命可唐州别駕員外置同正員郭元振往立大功保護於朕頃因閲武頗失軍容責情放逐將收後效可饒州司馬員外置同正員朕聞罪不相及先王之制叔向豈坐於凶弟展禽見稱於哲兄劉􅘙不以劉偉獲辜王導不以王敦廢職崔滌為其兄湜搆禍每進欵誠事朕有年心則無隱忠邪既判賞罰宜均俾踐儲卿式彰臣節可太子僕員外置同正員國初以來宰相及實封功臣子孫一房沈翳未承恩者令所司訪擇有才用者量加擢用周朝酷吏來俊臣周興之徒殘害宗枝毒害良善永言及此深所嘆恨其酷吏有身在及酷吏子孫亦令所司勘會甄别處分諸軍將士有年嵗深久所由要籍或不得選集及未敘勞效咸委軍將據實奏聞仍令所司早勘處分及諸軍將佐總管以上自今已後冬正束帛一準京官例給亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之赦書日行五百里布告遐邇咸使知聞主者施行改元天寶赦古先哲王之致理也皆上順天心下稽人事時令贊發生之德靈符叶紀年之稱考彼前載斯為大猷恭惟烈祖玄元皇帝天寶錫慶象帝之先垂裕後人重光五聖自朕嗣守丕業洎三十年實賴宗社降靈昊穹孚祐萬方無事六府惟修寰宇晏如庶臻於理然則乾元在上仁覆為首皇王臨下惠化攸先恩𢎞善貸用廣滋育尊道寶而建元暢玄風於不宰况屬陽和布氣獻嵗發生宜覃在宥之恩式降惟新之澤可大赦天下改開元三十年為天寶元年自天寶元年正月一日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不原者咸赦除之諸色左降官并其流人未經量移者亦與量移禁麛卵以遂生成自今已後每年春天下宜禁弋獵採捕如聞百姓之內或有户髙丁多茍為規避父母見在乃别籍異居宜令州縣勘會其一家之中有十丁以上者放兩丁征行賦役五丁已上者放一丁即令同籍共居以敦風教天下侍老八十已上者宜委州縣官每加存問仍量賜粟帛侍丁者令其養老孝假者矜其在喪此王政優容俾申情禮而官吏不依令式多雜役使自今後不得復然國之急務莫若求才頃者雖屢搜揚士庶尚慮遺逸更宜精訪以副虛懷其前資及白身人中有儒學博通及文詞秀逸或有軍謀越衆或武藝絶倫者委所在長官具以名薦若乃𢎞我風化實惟方嶽必佇其人以膺共理其京文武官五品以上清資并郎官據資厯人才堪為刺史者各任封狀自舉但文宣垂訓事必正名而黃鉞古來以金為飾金者應五行之數有肅殺之威去金稱黃理或未當其黃鉞宜改為金鉞副威武之義焉內外文武九品已上各賜勳兩階前王重典在乎祭祀况屬惟新事宜昭告五嶽四瀆名山大川諸靈迹及自古帝王忠臣義士並令所司由本州縣致祭改天寶三年為載制履端正名義取垂範體元設教在乎變通雖俗革從宜罔不稽古朕纘復興運恭守睿圖常恐至化猶微淳風尚薄未臻華胥之俗莫登可封之人故未明求衣日昃忘食勵精為理思致雍和厯觀載籍詳求前制而唐虞之際煥乎可述是用欽若舊典以叶維新可改天寶三年為三載今春事將興陽和布澤發號施令之日革故履新之時宜𢎞在宥之恩以助生成之化其天下見禁囚徒應雜犯死罪者宜各降一等自餘一切放免其十惡及造偽妖妄頭首官吏犯贓并姦盜等􅊣政既深情難容恕不在免限凡諸郡縣仍令太守縣令勸課農桑先處分太守縣令在任有增減户口成分者所由司量為殿最自今已後太守縣令兼能勾當租庸每載加數分成者特賜以中上考如三載之內皆有成分所司録奏超資與處分其丁户仍須按實不得取虛挂之名使親鄰代納受其姦弊凡在黎獻實資存恤一失生業則流庸不歸每軫於懷深可憐憫諸色當畨人應送資課者宜當郡縣具申尚書省勾覆如身至上處勿更抑令納資致使往來辛苦從閏二月至六月已來其當上人中有單貧老弱者委郡縣長官與所由計會便放營農諸軍征鎮及防人有尫羸疾病者委節度㨂擇放歸中外庶寮勉修其職各副朕意宣布遐邇咸使聞知正月一日改元上元赦自古哲王恭承景命莫不執象以御宇歷時以建元必當上稽乾符下立人極者也朕承纍聖之鴻緒紹大中之寶位屬蠢孽干紀王師尚勞乾乾之心豈忘鑒昧一物失所每軫納隍之憂萬邦未寧深懷馭朽之懼賴上玄垂福宗廟降靈百辟卿士同心戮力方兾干戈載戢區宇乂安常勵躬於帝圖恆取則於天道屬天人叶紀景象垂文爰遵革故之典將契維新之命義存更始庶有應於天心澤被無私宜載覃於率土可大赦天下改乾元三年為上元元年自上元元年閏四月十九日昧爽已前大辟罪已下已發覺未發覺已結正未結正繫囚見徒罪無輕重常赦所不免者咸赦除之其與逆賊元謀及脅從受驅使懼罪而來降并潛藏不出者已頻處分但能歸順捨罪除元惡之外一無所問其史思明心能改圖束手來欵亦當洗其瑕釁議以勳封內外文武官賜爵各有差其六軍及飛龍間廄加賜物其成都靈武元從扈從遞加有差在外諸軍各録賞物陳亡將士優加褒贈行人家口所在賑給定禍亂者必先於武德拯生靈者諒在於師貞周武創業克寧區夏惟師尚父實佐興王况德有可師義當禁暴稽諸古昔爰崇典禮其太公望可追封武成王有司依文宣王置廟仍委中書門下擇古今名將同文宣王置亞聖及十哲等享祭之典自古帝王欽慎刑法蓋以法者人之命刑者國之權茍或失其科條固難措其手足頃或姦臣擅命中興不修造次便行哀矜何在自今已後其有犯極刑者宜命本司依舊三復庶平反之際人謂不寃幽明之間理皆無濫又書稱羣望咸秩詩曰祀事孔明爰自遐代尤崇祭祀朕深維古義必在至誠茍德之不修神亦無據故知精誠有感黍稷非馨而况宋璟發言固三從而可驗漢文深誡為千載之明徴事可遵行理當變革有司所立祕祝之法或移於嵗或移於人君人之心寧所忍也自今已後削去此法其中祀并雜祭祀事一切並停其諸應合祭祀列於恆典所用祭科一依古制務從減省以副朕心又車服以庸有虞盛典威儀以等周禮舊章往屬承平多厯年所下至于公卿列位中外在官多以奢僣為心流弊成俗宜命所司定王公以下車服産業各詳古制及令式作節限聞奏自頃戎車未息殘孽猶虞軍吏獻功務陳首級且四海之內孰非王人豈以茍從昏迷陷在夷戮一朝授首懸彼藁街朕志存好生憫其驅脅其諸軍所獲首級除元惡之外一切不須傳送又設官分理本在安人遞遷之政務於利物今寰瀛之內兵革未清加以時或不登物皆湧貴軍儲是急廪稍靡供冗官之流固甚勞弊其京間司官等材堪釐務者宜命守中書門下即類例量資出授外官王者設教擇賢以理廣徴巖穴用副薪槱宜令中外五品已上文武正員官各舉賢良方正直言極諫一人武藝文才俱堪濟理者亦任狀舉其或文乏詞䇿武非騎射但權謀可以集事才力可以臨戎方圎可取亦任通舉並限制到一月內奏畢自古明王聖帝名山大川並委州縣長吏擇日致祭義夫節婦孝子順孫旌表門閭終身勿事去上元年號大赦為人上者與衆守邦自古哲王懼其滿假聰明睿哲罔不在躬文武聖神乃以為號顧豫菲薄運屬經綸一旅成師復其舊物聖皇納人夀域遊意道源神器之重傳歸於朕獲守丕業若履春氷敢忘謙沖日益招損欲垂範而自我亦去華而就實其乾元大聖光天文武孝感等尊崇之稱何德以當之以欽若昊天定時成嵗春秋五始義在體元惟以紀年更無潤色至於漢武飾以浮華非王者之茂典豈永代而為則三代受命正朔皆殊周宗之王實得天統陽生元氣之本律首黃鐘之尊制度可行叶用斯在自今已後朕號惟稱皇帝其年但號元年去上元之號其以今年十一月為天正嵗首使建丑建寅每月以所建為數承天陟稽古臨人必由革故之源方合大中之道風行宇縣澤被無涯欽上帝之心錫蒼生之慶可大赦天下自二年九月二十一日昧爽已前大辟罪無輕重已發覺未發覺已結正未結正見繫囚徒常赦所不免者咸赦除之其十惡五逆及偽造頭首官典犯贓法實難容刑故無小並不在免限其史朝義若能翻然改圖背逆歸順罪無所問加以勳封自乾元元年已前開元已來應反逆連纍赦慮度限所未該及者並宜釋放有官者降資與官無官者依本色例收敘內外官三品已上賜爵一級四品五品各加一階六品已下賜勳兩轉成都府及靈武元從普恩之外三品已上更賜爵一級四品五品各加一階六品以下更賜勳一轉眷及勤勞俾其卓敘每以田功在謹農事惟勤不有司存何成重穀諸州等各置司田參軍一人令主農事每縣各置田正二人於當縣揀明間田種者充務令勸課國之大事郊祀為先貴其至誠不美多品黍稷雖設猶或非馨牲牢空多未謂能享今以元玄孚祐至道為心將臻太和不欲多殺禮樂殊制孝敬同歸圓丘方澤任依恆享宗廟諸祠但臨時獻熟用懷明德之馨庶合西鄰之祭唐虞之代肇有九州王者所都文無異制其京兆府河南府太原府三京之號宜停其鳯翔先為西京亦宜凖此所設諫曺欲聞諷議允副從繩之望須成削藁之書其諫官令每月一上封事指陳時政得失若不舉職事當别有處分其諸州别駕可依舊却置每除京官五品已上正員清望官及郎官御史諸州刺史皆令推薦一兩人以自代仍具録行能聞奏觀其所舉以行殿最京文武官等賜物各有差自今已後有隱欺須勾剝者宜勾當年若事連去年亦在通勾其隔年者不在勾限官典隱贓在腹內不在此例其氏姓雖得之久逺有與格諱及隱疾同聲者宜改與本族望所出大姓自逐穩便名山大川明王聖帝所在廟祠各委州縣長官虔誠致祭其天下侍老先版授者更改與版授未版授者與版授鰥寡惸獨不能存立者委刺史縣令量加賑恤義夫節婦孝子順孫旌表門閭終身勿事赦書有所未及者各令有司速勘會類例條件聞奏改元永泰赦叶五紀者建號以體元授四時者布和而順氣天心可見人欲是從爰立大中之道式授維新之命朕嗣膺下武獲主多方顧以薄德承兹艱運戎師問罪今已十年飲至䇿勳雖凶渠之授首勞師黷武豈人主之用心况乃軍役屢興干戈靡定茫茫士庶斃於鋒鏑噫皇穹以朕為子蒼生以朕為父至德不能以被物精誠不能以動天俾我生靈擠於溝壑非朕之咎誰之過歟朕所以馭朽縣旌坐而待曙勞懷罪已之念延想安人之䇿亦惟羣公卿士百辟庶寮咸聽朕命叶宣乃力履清白之道還淳素之風率是黎元歸於仁夀君臣一德何以尚兹乃者刑政不修惠化未洽既盡財力良多抵犯靜惟哀敬實軫於懷今將大振綱維益明懲勸肇舉改元之典𢎞敷在宥之澤可大赦天下改廣德三年為永泰元年自永泰元年正月一日昧爽以前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之僕固懷恩戰伐有功訏謨任重不終臣節輒肆姦凶妄誘異畨同為不軌朕惟責己情重舊勳如能翻然來歸必從寬宥其下偏禆等因被驅馳不獲己者及所在山谷草竊反側未安者如能束身而來一切並無所問自廣德元年已前天下百姓所欠負官物一切放免在官典腹內者不在免限其百姓除正租庸外不得更别有科率刺史縣令與朕分憂凋瘵之人切須撫字一夫不獲情甚納隍有能招輯逃亡平均賦稅增多户口廣濶田疇清節有聞課效尤著者宜委所在節度觀察具名聞奏即令按覆超資擢授其有理無能政迹涉贓私必當重加貶奪永為殿纍農政本也食人天也方春之首重於農作除軍興至急餘一切並停令百姓得専營農事其逃户復業及浮客情願編附者仰州縣長吏親就存撫特矜賦役全不濟者量貸種子務令安集孝悌力田懷才抱器遺逸未經薦逹者各委州府聞奏親當䇿試量能敘用應見立仗諸軍將士等宜共賜錢五萬貫書稱咸秩詩美懷柔仰惟衆靈念兹多祐其五嶽四瀆名山大川宜令所管牧宰精誠致祭中外寮吏各揚其職無或曠官克副朕意改元大厯赦王者欽若昊天誕受丕命莫不叶五紀而乘運稽三微以體元上齊璿璣下立人極乃頒厯於惟嵗更覃恩於率土朕嗣守洪業恭臨寶位頃時當冦難運屬干戈誓衆興師為人除害實賴宗社降福寰宇小康用興淳朴之風庶洽雍熙之化乾坤敷祐大庇生靈文武叶心用力王室非朕薄德而臻於此乃者金革所聚綿歷嵗時征賦頗繁人猶凋瘵是用疚心疾首當寧興懷罪以在豫馭朽而貽懼每思𢎞濟之道用拯黎元之敝月纒星昴律中黃鍾合天正之符承日至之永祥雲在矚既當伯趙之司惠澤布和宜順一陽之氣建元發號革故惟新俾及履長之節用深行慶之典可大赦天下其永泰二年宜改為大厯元年自大厯元年十二月十二日昧爽已前大辟罪已下已發覺未發覺已結正未結正繫囚見徒罪無輕重常赦所不免者咸赦除之長吏犯贓不在免限夫從簡之道大易至言薄賦之規前王令範朕志遵儉約務欲息人徴斂無期誠為勞弊天下百姓除正租庸及諸軍器用須外不承正敕一切不得輒有科率國以人為本人以農為業頃因師旅征稅殷煩編户流離田疇荒廢永言牧宰政切親人其刺史縣令宜以招輯户口墾田多少用為殿最每年終本道觀察節度等使按覆聞奏如課績尤異當加超擢或政理無聞必置科貶逃亡失業萍泛無依特加招綏使安鄉井其逃户復業者宜給復三年如百姓先貨賣田宅盡者宜委州縣取逃死户田宅量丁口充給仍仰縣令親至鄉村安存措置務從樂業以贍資糧王畿之間賦斂尤重百役供億當甚艱辛哀哉疲人良深憫念盍徹之稅著自周經未便於人何必行古其什一稅宜停周徵俊造漢辟賢良垂之典籍永代作則天下有安貧樂道孝悌力田未經薦用者委所在長官具以名聞朕當親自䇿試量才敘用其立仗將士等宜賜物五萬匹五嶽四瀆名山大川祀典攸存神理昭著宜以禮致祭唐大詔令集卷四
