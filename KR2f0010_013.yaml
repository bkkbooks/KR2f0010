body:
  text: 唐大詔令集卷十三宋宋敏求編帝王諡議上髙宗天皇大帝諡議德宗神武孝文皇帝諡議順宗至德大聖大安孝皇帝諡議憲宗聖神章武孝皇帝諡議穆宗睿聖文惠孝皇帝諡議敬宗睿武昭愍孝皇帝諡議諡議上髙宗天皇大帝諡議竊聞星迥回日薄懸象著明之謂天龍躍鳳翔握鏡乘時之謂聖天以不言為德非言無以暢其神聖以無名會道佇名然後筌其用營窟橧巢之代猶昧典章如雲類海之君方崇號諡所以闡揚功美榮鏡古今伏惟大行皇帝稟樞電以降靈膺星虹而延睿以大聖而乘聖克昌寶厯之基由至德而纂德載廣金圖之運對日之嵗窮象外之微言弄田之辰盡天下之能事逮入膺儲副養德春闈恆侍禁中問安之道斯極長居膝下候色之誠逾勵因心隆於愛敬率性感於神明此先聖之孝德也洎乎正位旒扆光宅區縣孚俗軫如傷之念負重懷若勵之心求瘼恤隱寒扇渴漿追夏禹之焚甲襲殷湯之解網一物有違則滿堂興慮一夫非獲則推溝置懷此先聖之仁德也無幽不察觀六合於目前無逺不招視八紘於掌內循機授政則旁燭於九圍命將出師則坐知其萬里此先聖之明德也寅畏上玄肅雍清廟以義制事以禮制心提衡均馭朽之危履石同蹈氷之懼雖處泰而弗泰固乘休而弗休此先聖之恭德也卑宫菲食土簋茅簷身好弋綈之衣手無金玉之玩翬裘必燼牂袂可安撤士星而莫施却超影而勿馭此先聖之廣德也榮河緑錯朗宸鑑而生知溫洛丹青澡璇襟於性奧汾水秋風之唱仰天翰而扶輪媯汭叢雲之歌欽睿詞而擁篲此先聖之文德也缺無逺而不懷以我伐戎有征而必伏提封所亘招地位於鄒瀛正朔所通闢境踰於亥步此先聖之威德也為於無事動於自然鳴鑾訪道闕拜小童之言修德就間載感大庭之夢此先聖之玄德也體至道而調一氣舒卷隂陽運沖和而契兩儀發揮風雨將百靈以交際亦萬物而通誠珍瑞普彰休徴畢應此先聖之神德也以兹九德上則九玄顧連陸於後塵掩胥燧而髙視若乃子育羣方之惠財受貺於玄符封嶽沒金之勳復推功於文帝巍巍蕩蕩無得而名方兾千祥翊聖萬瑞讃德長居北極之尊永契南山之夀豈謂十枝墜景遽淪懸晷之輝八柱傾天奄落闓陽之構雲輿在御仙路方遙攀號無再奉之期摧殞深百年之痛鼎湖弓劔逾增日逺之悲璇寢衣冠空愴月逰之感顧以虛菲夙承乾蔭既忝彰明之地常懷輔佐之誠薦螢燭以助光引鶴露而添海而聖德虛受無來不應每聽覽餘暇侍奉誥言論道德則洞啓玄樞語忠孝則廣通心極敘軒頊之淳化積若神交述堯禹之清風宛成晤對在位三十五載功超七十二君圖象所莫傳開闢所不覩罄楚越之竹書善未窮極泉雲之才頌德難盡自賢猷厭俗緹律亟移禍變相仍荒梗彌切正惟慿几之夕爰及啓欽之際神情湛正顧託殷勤痛道貌之既逺懼先旨之無述所以偷延荒息強終彞倫望霄漢以興摧曕扆筵而永慕今者龜謀既襲蛩隧將臨敬上尊號之儀燕叶大名之典謹按自然覆育曰天明一合道曰皇無所不包曰大謹狀上議曰天皇大帝廟稱髙宗德宗神武孝文皇帝諡議皇莫大於羲軒帝莫加於唐虞姒氏商鎬亦續憲度咸紀名諡以揚昭光徴儒臣之議所以本至公也號全德之尊所以節一惠也發揮茂曜如揭日月伏惟大行皇帝文思睿哲天縱神授大明繼聖大孝尊親服道稽古洗心藏密巍巍易簡赫赫功造嚴祖宗而上下昭假仁億兆而飛躍表靈始者薊冦殘魂戎旌未偃方由雍邸出總虞師刷讎恥而戴君父超維城而位少海元良有問厯數誕膺同商宗而心在諒隂泣漢制而禮從權令然後諏咨對越端拱而理時丁祲沴益起泚烈宸算獨復雲雷駿奔浹旬底定鯨燎殱洗反已哀痛大猷彌尊阪泉威武止殺吊人之志也邊方朔陲獫狁昆夷趦趄獷悍不敢不率丹穴南裔扶桑東極自古未化占風而至鏡照廣及無思不服之德也大本逹道是為中和鼓而舞之名我至樂變革繁淫以貞神人奉順聖元侯甸繼獻九成八佾聖作明述垂衣脫劍欣合猗那之奏也觀文化成匠物研精四始六義勤諧風雅洪音麗制焜耀皎繹立言垂訓丹青玄鳥之作也缺保全夀夭之門方疏傳賜日之廣利機瘥不聞長養推仁施濟天地如保赤子之誠也教由德禮人乃恥格古作訓夏我針政刑載𢎞哀敬用息刀鋸利見大循本愧心之旨也躬信厚而偷薄以革體清明而貪叨以懲納匪躬之直無毁校防川之謨推輔弼之功有輻輳並進之歎泥金方革仙鼎忽成汗漫無從希夷永閲哀同軌之將會仰鴻名之可易鋪衍至賾錫乎無窮謹按經義參諸諡法曰應物無方之謂神保大定功之謂武尊仁安義之謂孝經天緯地之謂文大行皇帝變化無窮樞衡在握神莫過焉整旅善師豺狼擾馴武莫威焉承休繼志永錫不匱孝莫大焉輝焯玉度煥乎黼藻文莫逾焉考墳史而徴德實請上尊諡曰神武孝文皇帝廟號曰德宗順宗至德大聖大安孝皇帝諡議臣上稽太古皇帝之建尊諡也咸揭盛德以旌至公備禮於郊即天成命大易名之典也故堯不稱巍巍成功而以傳聖為盛德禹不稱乃錫玄載而以成功為盛德此則五帝三王統天作諡之大範也伏惟大行太上皇天作睿哲生知太和揚九聖之耿光開萬紀之休運雲行雨施不俟終日廣愛博教克成浹辰澤萬物德大乎羲軒公天下道髙乎堯舜原夫君人之表教於岐嶷造物之用先乎蓍龜在物播為善之樂主器流作貞之慶視膳有法文之孝撫軍有戡羿之庸育全德於春闈積大望於覆育垂三十載矣三善方齊乎聖敬六氣遽嬰乎沉痼德宗皇帝慮繼明之重深唯疾之憂積其不懌至於大漸天崩地坼當暝昡之辰流沙漸海有震動之懼而大行太上皇明德動天神化無朕上虔九廟下恤兆人深兾翌日之瘳大慶即端之作於是建冡嫡以發大號赦天下以壯皇猷聖作明述周流灌注若乃奄巖穴以搜賢才能官則哲之道也黜進獻以藝貢賦籍田任土之利也滌疵瑕而復放竄解網泣辜之仁也蠲逋責而惠困窮寬大易簡之義也用能垂拱而神人交泰玄默而動植究安巍巍蕩蕩聖德如風烈雷迅不崇朝而益乎八紘矣猶以為黎獻之富教未洽陵寢之制度未成深圖甘害於恬頥力政不憚於增劇既而同軌畢至萬邦咸寧奉先之孝克終傳聖之義斯舉釋負寶位栖神玉清追姑射之髙蹤樂華胥之妙道大矣哉與天地合其德則不為而成與變化合其神則不疾而速聖造盤薄玄風汪洋所謂天授非人力也方陋唐虞之異族樂文武於同時振耀重光永清四海孰謂初陽變候素疾彌留徴祕術而俞扁必臻走羣望而圭璧斯罄何翠華之不駐乘白雲而上仙攀號刀劔哀震寰區皇帝悼極憂以致養痛大數之不延外遵易月之命內茹終天之酷詞不朽於禮諡旌罔極於受恩敢敡聖德垂鴻惇史謹按易曰天地之大德曰生聖人之大寶曰位諡法曰寬裕和平曰安敬慎所安曰孝大行太上皇乘運統天端拱造物可謂至德感神翊運光明正位可謂大聖氷圖丕構傳聖保和可謂大安九族安之兆人賴之可謂大孝下採華夷之望上合神祗之心請上尊諡曰至德大聖大安孝皇帝廟曰順宗謹議元和元年六月憲宗聖神章武孝皇帝諡議王者崇髙以配天廣大以法地章明以象日月誠信以合四時謂之令王諡以全德所以名盛烈昭至公堯舜禹湯文武成康是也伏惟大行皇帝由疏封以繼明自前星而受命以四海為養以萬乘問安稽古法天自家刑國穆穆俊德煌煌大明煥乎人神塞乎天地國家天寶之季宿兵中原強侯専地往往而有號令不一朝廷包羞元和燀威霆擊篲掃戡夏剪蜀擒潞殄吳夷蔡取齊朝滄納定光千載之期運平六葉之梗俗動也用軒轅之干戈靜也戢武王之弓矢聖神之道其至矣乎以無方之能行不宰之用濟天下之務施天下之仁夷狄之情偽遐裔之虛實揣其變化權其後先屈指前算若合符契多士濟濟任其器略文武俊傑畢力致用綱目張而萬化具斟酌明而百事宜委庶務於廟堂之上夀百姓於循良之府開直言之路庶無蔽聽施廣大之恩物無違性宥恕刑獄哀惠困窮省薄徭役尊禮老耆約巳恭儉推心平明公卿大夫任德終始近狎貴寵畏忌守法採納羣正聽斷精慎忠直樹立讒邪不行巍巍成功赫赫在上春秋左氏傳曰武有七德禁暴戢兵保大定功安人和衆豐財之謂也殱夷姦宄災害訖息禁暴也淮河底定大赦疵人戢兵也歸馬於汝南漢南散卒於齊梁淮楚保大也封有勞爵有德定功也寬天下之蠶絲舉域中之方正安人也赦生致之冦虜爵拒命之戎將和衆也乘輿服御儉而有制賜與供給惠而中節豐財也神武不殺之德其若是焉不登羲軒年不享堯舜夀百姓思慕如喪考妣同軌畢至相庭有時敢奉官常尊名稱德謹按諡法兵禁殘暴曰聖應變無方曰神洪度大明曰章為人除害曰武慈惠愛親曰孝戮鯨鯢而清四海不曰聖乎裁造作而刑一德不曰神乎洞明哲而貞百度不曰章乎推仁義而服萬物不曰武乎載尊親而諧五典不曰孝乎書曰惟天聰明惟聖時憲法也敏也謹酌之諡法質諸大經謹上尊諡曰聖神章武孝皇帝廟號憲宗謹議穆宗睿聖文惠孝皇帝諡議臣祐議曰臣聞紹天人之盛美庖犧建其極含昊穹之正氣金天侔其稱仁聖或異號諡則殊至於兼包二體昭宣一德有自來矣我今因之爰徴克類以騰茂實伏惟大行皇帝睿鑒通微神智周物平由藩邸式踐儲闈誕膺眷命用建皇極纘承丕緒克紹洪勳允釐帝載光被王度以易簡凝庶績以仁和夀蒸人明遂事而虛受進昌言而不咈清廟嚴薦中壼問安彰愛以誠因心則著永言恭默思致雍熙敷祐庶氓宗承古訓徴特牲之盛禮藴祈榖之至誠親率公卿祗奉郊祀爰畀大輅俯及端門休祥告應非煙在上輪囷五色迥回復半空六轡時按百辟稱賀逮圓丘展敬天感樂和柴燎告終人神胥恱於是雷雨作解惠及萬方布乘春之煦育行惟新之頒賜詳延莊彥敷納正辭納哀敬之書用寬大之典鮐背是恤繆獄斯平優賚困窮矜蠲逋賦三光增耀羣物昭蘇葳㽔汪濊之澤不可得而名也東冦猖狂在浚為畔有征之日殱厥渠魁此所謂王者之師不戰而尅也昆夷恃衆崆洞騁武亟為邊患時漸睿謨煩戊己之戍勞癸庚之修自我新命咸歸舊封欵塞旁午求成修好俯從坎血之懇猥加築館之榮弓矢載櫜亭障罷警倚成輔弼清一區宇無私之覆既均不宰之功遽化矧乃優逰乎文史之內精窮乎草𨽻之源崇杖席而選文儒設官司而尊侍從所謂勤求為務聽納居多遵三代之盛猷垂億載之休烈雖疾留聖體而慮發宸𠂻每求衣夙興太陽但出沒金是請方事撝謙慿玉俄聞奄承末命年兾踰於堯舜時忽從於軒鼎六龍飛蓋以上升萬姓號天而靡及今因山既卜同軌將臻爰究德威式循典禮周書曰睿作聖文前儒闕睿聖也謹按諡法曰敬禮祀享施為於人皆曰聖大行皇帝虔恭郊廟軫志黎元教尚不嚴化行無朕不為聖歟又慈惠愛人道德博聞皆曰文赦三就之刑採百氏之奧仁恕育物寬明致理不為文歟又慈仁好與柔質虛受皆曰惠博錫貧寠哀及鰥寡開延納之路容讜直之言不為惠歟又曰秉德不回慈惠愛親皆曰孝文以繼明聖資統御服勤不替就養無方不為孝歟考古諡而符德教請上尊諡曰睿聖文惠孝皇帝廟號曰穆宗謹議敬宗睿武昭愍孝皇帝諡議定尊號考聖烈終古之重事有司宜用大者逺者上貝百王之明例下開千載之成法參天人之意極臣下之誠約而舉之以正大諡故稱天以誄大莫加焉微臣得議公莫至焉所謂大者遠者蓋揔夫一朝之治化四海之惠澤夷夏之率職元元之受賜皇明所臨之逺近睿斷所繫之巨小何如耳其他茍不足以升降盛德者固可略而不論伏惟大行皇帝以英睿之姿紹膺丕厯啓皇輝於磐石浴聖德於少海欽承册命天下感恱既即尊位孝惠逾顯列聖之道率履無違禮行乎郊禋敬逹乎宗廟富四海以致養榮西宫以問安推恩廣愛纍霈鴻渥發號施惠洽於百靈而又天姿嚴正睿德沉毅時海內承憲宗穆宗威靈德澤之後朝野無事生人休息初臨大寶委政宰庭雖當春秋至富而遠蓄剛辨既閲庶務四聰益逹英斷自已任賢不疑故卒能光啓承明載安天下橫議或熾聖衷逾堅忠勳內外叶贊雄略於是舉兵食之大計示經營乎四方而不康之藩首自夷獮勵忠奮節待帥於朝祗承風化遐邇聳動夫不怒而威不戰而勝王者之武也推是大指引而伸之則未形之用可見矣惜乎道未光乎天地澤未浸乎四海而變生非慮遐邇號天於戲生靈之憤其可既乎七月將至同軌既集臣謹上稽國典傍考物情約以經義合諸諡法表功節惠庶叶大中書曰睿作聖夫以睿哲之材經聖明之業而祖宗成式修舉罔墜禮百神而親九族尊儒術而容諫諍鋪鴻闡號德用章明非睿而何諡法威強睿德曰武制勝朝堂之上而稜威逺馭不俟車甲非武而何昔漢昭帝之所以為昭知臣而已諡法亦曰明德有功曰昭大行皇帝雖謙讓然終任其剛斷以顯明德非昭而何夫愍者臣下迫恱惋之誠所深切者也諡法在國逢難曰愍聖朝既討讎戡亂明告四方有司所宜率億兆之心極君親之義薦誠旌感非愍而何諡法慈惠愛親叶時肇享皆曰孝孚愛敬於率土刑家邦之孝理躬親嚴配之典奔走職來之助廣慈至德非孝而何傳曰臨之以莊則敬又記曰莊敬則嚴威擬盛烈之形容參歷古之訓典謹上尊諡曰睿武昭愍孝皇帝廟號敬宗唐大詔令集卷十三
