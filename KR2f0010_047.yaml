body:
  text: 唐大詔令集卷五十七宋宋敏求編大臣宰相休致盧懷慎去官養疾敕杜佑太保致仕制貶降上張嘉貞幽州刺史制杜暹荆州長史李元紘曹州刺史制宇文融汝州刺史制第五琦忠州長史制第五琦長流夷州制李揆袁州長史制王縉括州刺史制楊炎崖州司馬制鄭餘慶柳州司馬制韋執誼崖州司馬制于頔恩王傅絶朝謁制皇甫鎛崖州司户參軍制令狐楚衡州刺史制宋申錫開州司馬制李德裕袁州長史制李宗閔處州刺史制再貶李宗閔處州長史制三貶李宗閔潮州司户制休致盧懷慎去官養疾敕敕留侯多病漢皇許其頤養吕䝉未瘳吳王因而􅉃戚此則古之義也銀青光祿大夫檢校黃門監上柱國漁陽郡開國伯盧懷慎大才宏識資忠履信學窮墳典文緯邦國朕之倚賴人實具瞻頃者忘身狥公積勞為癘竭誠抗表固辭在職方欲省其謀慮專於導引且憑針艾之術副朕鹽梅之期宜聽去官許其養病杜佑太保致仕制宣力濟時為臣之懿躅辭榮告老行已之髙風况乎任重公台義深翼贊秉冲讓之志堅金石之誠敦諭既勤堅執彌固則當遂其忠懇進以崇名尚齒優賢斯王化之本也金紫光祿大夫守司徒同中書門下平章事兼崇文館大學士充太清宫使上柱國岐國公食邑三千户杜佑巖廊上材邦國茂器藴經通之識體溫厚之姿寬裕本乎性情謨猷彰乎事業博聞强學知厯代沿革之宜為政惠人審羣黎利病之要由是再司邦用纍歷藩方出總戎麾入和鼎實聿膺重寄歷事先朝左右朕躬夙夜不懈命以詔冊登之上台肅恭在廷華髮承辨兹可謂國之元老人之具瞻者也朕纘承丕業思𢎞景化選勞求舊期致時雍方申引翼之儀遽抗懸車之請而又固辭年病乞就休閒已而復來星琯屢變有不可抑良用耿然永惟古先哲王君臣之際臣有耆艾以求其退君有優賜以狥其情乃輟鄧禹敷教之功仍增王祥輔導之秩俾養浩然之氣安於敬止之鄉庶頤神保和永綏福履仍加階級以厚寵章其惟敬哉兹謂全致光祿大夫守太保致仕宜朝朔望貶降上張嘉貞幽州刺史制中書令張嘉貞備位宰官夙承恩命不能勵其公節以訓私門其弟嘉祐頃緣奬愛遷在清秩憑寵自肆黷貨有彰豈可仍踐台階儀刑百辟貶居藩守俾肅朝倫可幽州刺史杜暹荆州長史李元紘曹州刺史制出納王言發揮綸翰宰臣之任選衆推賢檢校黃門侍郎同中書門下平章杜暹同中書門下平章事李元紘等咸勵忠勤用登樞揆雖清以自牧而道則未宏不能同心戮力以祇帝載而乃肆懷相短以玷朝綸朕緣事醜股肱情惟隱蔽掩其纍而不率遂其過而彌彰將何以緝敘三光儀刑官辟宜回中禁俾列專城暹可荆州長史元紘可曹州刺史宇文融汝州刺史制事君之節在於匪躬為臣則忠期於無隱黃門侍郎同中書門下平章事宇文融幸借藝能俾承推薦往以封輯田户漕運邉儲用其籌謀頗有𢎞益三遷憲府再入禮闈仍仗以訏謨委其密勿雖十旬入拜一日九遷方此超騰彼未為速庶違爾弼久則佇於昌言謀而不臧近頗彰於公論交游非謹舉薦或虧將何以論道三台具瞻百辟宜輟中樞之位居外藩之寄可汝州刺史第五琦忠州長史制台庭之位陶甄是屬在和羮而或爽當折足而貽憂由是舜舉二臣叶心者俾乂漢閎三相無能者同免茍虧公議抑有彝章正議大夫行尚書户部侍郎同中書門下平章事權知門下省事上柱國扶風縣男賜紫金魚袋第五琦夙表材幹纍遷要途久專司於國賦常有利於公家往自艱難備經任使以奬其效拔在鈞衡比事每涉私政非近體率情變法且違行古之方封已怙權稍闕在公之義簿國靡費聚斂尤繁既罔上而取容亦害下而恣怨凡所進拔悉收瑕釁又與賀蘭進明並居權要潜結往來嘗夜㑹於私第歸必淹於永漏殊乖憲典足表異端頗招黨比之嫌甚失弼諧之望稽諸故事合議刑章但以任在股肱理無按問遂抑情於含匿斯以禮而始終豈可更踐台階尚塵樞禁宜申逺謫之命俾肅懲違之典可忠州長史員外置同正員外官勳封如故乾元二年十一月第五琦長流夷州制君之使臣期叶心以輔政臣之事主當盡忠以明職茍或冒官罔上黷利崇姦靡懲折鼎之凶載履覆車之轍自貽厚責難捨刑章正議大夫行忠州長史員外置同正員外上柱國扶風縣男第五琦素以幹能早膺任使自艱難之際帑藏是司久彰嵗月之勞頗申强濟之用所以收其課績擢在台階而行閲由衷任性過量務容身之計虧許國之誠變法多紊於常經率情每違於直道交惟黨比用非忠良頗乖秉鈞之體諒乏致君之志頃者遂從貶削爰示典章是以輿議日聞僣違益露引承福於肘腋殖貨於中處朱敏於膏腴竊資於外懷金暗室曽不慚於四知納賄私家動有踰於萬計比令按問咸伏其辜且國賦邦徭軍儲嵗備朕以戎車屢駕氓俗未康常有戒敕令其節省豈謂隂圗聚斂擅出科條上延謗於公家下益疲於人業狥私封已歸怨稱君忝曰人臣胡寧忍此况又深尤隱慝纍干刑書朕亦含垢匿瑕為之掩惡議以明刑合從秋令顧君臣之義大庶始終而禮全夫除惡務本國家之彝訓申恩念舊王者之深仁屬陽和在辰品物咸遂由是抑從寬典特屈嚴誅宜寬殊死之命俾就投荒之謫可除名長流夷州馳驛發遣朕差綱領送至彼所勿許東西於戲朕臨御以來每更輔弼皆宥以過失存其祿位今者琦之所犯負國誠深義不可以茍容法不可以頻貸申兹憲令用警庶寮凡百卿士宜知朕意乾元三年二月李揆袁州長史制持衡當軸體備股肱若鼎餗之不知慮鼓妖之有釁台司稍紊王度則乖宜峻彝章以懲不道銀青光祿大夫行中書侍郎同中書門下平章事集賢殿崇文館大學士兼修國史上柱國姑臧縣開國伯本以藝文纍階資序周旋近密參掌絲綸庶其翼亮之勤列在訏謨之地任惟過力誠匪奉公無聞憂國之心不懼曠官之責具瞻何取進退求容隂懷罔上之謀更漏省中之語端居相府潜搆禍胎動河南之八州昧廟堂之三寶將圖不軌振擾方隅考驗甚明發姦斯在私乘馹傳自越章程式按秋官合從徽纆但以任叨宰輔久侍階墀特寬丹筆之書猶左朱幡之職俾從逺黜以肅朝倫可袁州長史員外置同正員仍即馳驛赴任王縉括州刺史制門下侍郎中書門下平章事王縉附㑹姦邪阿炎讒諂據兹犯狀罪至難捨矜以耄及未忍加誅俾申屈法之恩貸以嶽牧之秩可使持節括州諸軍事括州刺史宜即赴任於戲朕恭已南面推誠股肱敷求哲人將弼豫理昧於任使過在朕躬無曠厥官各慎爾職楊炎崖州司馬制尚書左僕射楊炎託以文藝纍登清貫雖謫居荒服而虛稱猶在朕初臨萬邦思𢎞大化務擢非次招納時髦拔自郡佐登於台鼎獨委心膂信任無疑而乃不思竭誠敢為姦蠧進邪醜正既僞且妄黨援因依動涉情故隳法敗度罔上行私茍利其身不顧於國加以內無訓誡外有交通縱恣詐欺以成贓賄詢其事跡本末乖謬蔑恩棄德負我何深考秋議刑罪在難宥但以朕於將相義切始終顧全大體特有宏貸俾從逺謫以肅具寮可崖州司馬員外置同正員仍即馳驛發遣鄭餘慶郴州司馬制輔弼之臣百辟是憲茍二其行則黷大猷守中書門下平章事鄭餘慶頃謂忠貞擢居台輔仍乖正直有涉比周棄法㺯情公行黨比茍狥邪志頗紊彜倫謫佐遐藩以懲不恪朕擢於不次誠冀效忠乃自速辜亦所難逭凡百君子宜悉朕懷可彬州司馬置同正員韋執誼崖州司馬制為臣之道必在盡忠其有朋黨比周挾邪敗度事資懲戒必正典刑正議大夫中書侍郎同中書門下平章事崇文館大學士修國史賜紫金魚袋韋執誼幸以藝文久從任使早居禁署謬列鼎台直諒無聞姦回有素負恩棄德毁信廢忠言必矯誣動皆䝉蔽官由黨進政以賄成朕初臨萬邦務於𢎞大每存容恕冀有悛心而乃不顧憲章敢行欺罔宜投荒服以警無良以曽事先朝嘗參近職尚寬極法俾佐遐藩可崖州司馬員外置同正員仍即馳驛發遣于頔恩王傅絶朝謁制君之使臣也有以極崇寵之恩臣之事君也是宜懷感勵之志然後上下交應始終可觀道德齊禮之風行遷善逺罪之功著㝢縣之內歡然太和其或誘勸無施僻違自縱干我邦紀黷於彝倫羣情所非物聽增駭雖欲覆護厥路何由尚復裁於朕心特示宏貸俯從屈法用表曲全非豫敢私誠謂逺體金紫光祿大夫守司空同中書門下平章事充太微宫使上柱國燕國公于頔軒裳之族頗習藝文纍踐臺郎亟分符守特稱器幹遂領藩方爰自先朝持節襄漢率情肆暴敗法作威蔑易典章公違詔㫖事皆顯白僉論不容朕以臨御之初務修德化政豈尚於至察道姑務於包荒由是大推衷誠排絶衆議賜以聨恩之寵增其相位之榮禮命所加焜耀當代洎秉圭來覲和調台鼎任兼論道之司位冠群臣之列閨門子弟紆章紱於周行命秩車輿極紛華於里巷雖勳藏盟府行滿縉紳德澤優深曽未階比而罔戒盈覆猶務希求廣出貨財潜信卜射且又縱其勇敏専殺私庭害及平人慘深支解京轂之下凶毒若兹聞之震驚增用悼痛慮其曖昧按驗皆明家道則然搜慝斯在自罹禁網宜峻刑書猶以嘗厚恩親未忍置之嚴憲遂申寬宥俾傅王門服於靜專庶能循省可行恩王傅散官勳封如故仍絶朝謁於戲朕惟漢宣之理在於信賞必罰而伯宗有言亦責匿瑕含垢豈化之未至將善或難躋孤我初心良增愧歉凡百多士宜悉朕懷皇甫鎛崖州司户參軍制朕顧眇身初膺大寶思有以上諧天意下悅人心將澄理化之源必分邪正之路言念輔弼方俟忠賢其或挾姦容身斂怨歸國罪已暴於天下法宜行於事初不速去之曷明豫志中大夫守門下侍郎同中書門下平章事上柱國賜紫金魚袋皇甫鎛器本凡近性惟險狹行靡所顧文無可觀雖早踐朝倫而素乖公望自掌邦計屬當軍興以剝下為狥公既鼓衆怒以矯跡為孤立用塞人言洎塵台司益蠧時政不知經國之大體不慮安邉之逺圗三軍多凍餒之憂百姓深凋瘵之弊事皆罔蔽言悉虛誣逺近咸知朝野同怨而又廣稱方事上惑先朝潜通姦人罪在難捨合加竄殛以正刑章俾黜遐荒尚存寬典凡百在位宜悉朕懷令狐楚衡州刺史制元稹忠臣之節莫大於送往事居君子之方寧忘於養亷逺耻况位隆輔相職奉園陵䝉蔽之過屢聞誠敬之心盡廢朕雖含垢人亦有言深念君臣之恩難厭公卿之論宣歙等州都團練觀察處置等使大中大夫使持節宣州諸軍事守宣州刺史兼御史大夫上柱國輕車都尉賜紫金魚袋令孤楚早以文藝得踐班資憲宗念才擢居榮近異端斯害獨見不明密隳討伐之謀潜附竒邪之黨因緣得地進取多門遂參台階實妨賢路朕以道遵無改事貴有終再命黃扉之榮專奉𤣥宫之禮而不能率下罔念匡君致于隳政牧之職掩韋術李鄞之舉成朕不敏職汝之由前命秉軺尚期改節人心大惑物議沸然雖欲特容難排衆怒俾從謫守猶奉詔條豫豈無恩爾且自省可使持節衡州諸軍事守衡州刺史散官勳賜如故仍馳驛發遣宋申錫開州司馬制敕正議大夫新授太子右庶子上柱國賜紫金魚袋宋申錫頃由藝文擢居近密謂能潔已可以佐時遂越常資超升大任自參樞務驟易寒暄嘉謀蔑聞醜迹斯露致兹獄訴實駭朝聽俾窮根本亦對嗣稱以左驗之間有所漏網正刑之際始示寬恩於戲朕自君臨推誠宰輔常務仁恕以保和平豈意魚水之期翻貽吳越之慮撫事興歎中宵耿然是用重難親臨鞫問及諸耆德遍於名卿庶其盡忠頗為審克屈兹彝憲俾佐遐藩凡百具寮宜知朕意李德裕袁州長史制有國之典本於明罰為君之道必在去邪皇王大政諒無易此姦宄與偕誠敬盡虧無君之心因事輒見豈可尚居崇秩猶列東朝銀青光祿大夫守太子賔客分司東都上柱國贊皇縣開國伯食邑七百户李德裕性本隂狡才則脆弱因緣薄藝頡頏清途既忝藩鎮旋處鈞軸靡懷愧畏肆意欺誣廢撓舊章汨亂彞序賢良盡逐當白晝而重關詭詐是謀逮中宵而萬變朕嘗以寒暑得疾初甚驚人凡百臣子奔走道路而德裕私室宴然全無憂戚王涯駐車道左絡繹追呼滿朝傾駭竟以不至又在西蜀之日徴逋縣錢僅三十萬貫使疲羸老弱徙轉溝壑交結異類任用憸人賄賂流行朱紫無辨是宜處之重典以正刑書猶以夙經委使載深寬宥俾佐遐服用示寬恩可守袁州長史馳驛發遣李宗閔明州刺史制夫輔宰之任緝煕庶工茍或政紊彝倫跡涉黨比則何以執是邦柄毗豫一人銀青光祿大夫守中書侍郎同中書門下平章事上柱國襄武縣開國侯食邑一千户李宗閔頃以詞藝列於班行乃藉宗枝驟升顯貫朕嗣􅈾大寶夢想勤勞謂其忠厚小心再委樞務每必造膝而問虛已以求將欲俾人不迷致我垂衣而理付之鈞軸斷然不疑而乃事每懷私言非納誨近者别登俊彥與之同列忌賢不悅物論喧譁翼贊之效蔑聞怨嫌之聲屢作前後叨位中外同辭惟進奔競之徒莫修恭慎之道蔽我卑聽擅我化權不思急召之恩都忘再擢之寵况且志無報主舉非正人顧其操心乃是速戾則何以式是百辟以維四方尚從屈法之典俾守遐藩之牧所謂全體良愧知臣可明州刺史仍馳驛赴任再貶李宗閔處州長史制明州刺史李宗閔股肱之臣付以大政所宜竭節以答殊榮事或負豫法所難貸雖欲終始其可得乎且細大之罪既暴前詔而交通匪類蹤跡又彰豈可尚領方州牧我黎庶宜謫遐佐以肅朝倫可處州長史馳驛發遣三貶李宗閔潮州司户制交結凶邪叨取榮顯姦險隂慝因事盡彰頃為吏部侍郎令沈􅔲於內人宋若憲處密求宰相及事蹤敗露文字猶在閲視之際良深歎駭既專樞柄益附私黨附下罔上廢義滅公言多矯誣動挾欺詐傷風敗政負我何深按之刑章法在無赦尚以早經任使賜以全生投之裔夷實我恩貸嗚呼知人則哲朕方自咎為臣茍進當鑒於斯百爾君子宜體豫意唐大詔令集卷五十七
