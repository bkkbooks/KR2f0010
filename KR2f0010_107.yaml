body:
  text: 唐大詔令集巻一百二十八宋宋敏求編蕃夷綏附撫鎮夷狄詔令蕃客國子監觀禮教詔賜入朝新降蕃酋詔放諸蕃質子各還本國𠡠遣牛仙客徃闗内諸州安輯六州胡𠡠放不從亂吐蕃使人四人歸國𠡠放吐蕃使歸國𠡠命官葛邏禄葉護開府儀同三司制囬紇葉護司空封忠義王制温沒斯懷化郡王制温沒斯歸義軍使制封立薛延陀真珠毗伽可汗詔突厥李斯摩為可汗制封突厥夫人李氏孫氏等制黠戞斯為可汗制議立囬鶻可汗制遣使册囬鶻可汗制綏撫撫鎮夷狄詔晝野分疆山川限其内外遐荒絶域刑政殊於函夏是以昔王御世懐柔逺人義在覊縻無取臣屬渠搜即叙表夏后之成功越裳重譯羡周邦之長等有隋季世陸續耀兵萬乘疲於河源三年伐於遼外搆怨連禍力屈貲殫朕祗膺寳圖鎮撫四極悦近来逺追革前弊要方蕃服宜與和親其吐蕃渾已修職貢髙句麗送逺誠欵契丹靺鞨咸求内附因而鎮撫允合機宜分命行人就申好睦静亂息民於是乎在布告天下明知朕意武德二年二月令蕃客國子監觀禮教𠡠𠡠夫國學者立教之本故觀文可以知道敷文可以成化庠序爰作皆分澤於神靈車書是同乃範圍於天下是戎狄納欵日夕歸朝慕我華風敦先儒禮由是執於干羽常不討而来賔事於爼豆庻既知而徃學彼蓬麻之自植在桑葚之懷音則仁豈逺哉習相近也自今已後蕃客入朝並引向國子監令觀禮教開元三年十二月二十二日賜入朝新降蕃酋𠡠𠡠闗内河東河西入朝新降蕃酋等曰嘉爾蕃酋慕我朝化相率歸附載變炎凉而忠懇不渝誠勤則勵深宜輯乃成洛捍彼方隅使𤇺火無驚障塞咸謐則厚賞崇班當取富貴朕因此加貸爾實安堵猶衣服盡未充災患且未息永言於此良用憮然其人春不入朝都督衙官并箭頭將軍在蕃者已令王晙張説楊敬述等取軍中庫物各量以賜爾等衣副都落中有疾苦便量給藥物無令田隴廢業含養失所逓相勉諭以悉朕意開元八年三月放諸蕃質子各還本國𠡠𠡠我國家統一寰宇歴年滋多九夷同文四隩来暨夫其襲冠帯奉正朔顒顒然向風而慕化列於天朝編於屬國者葢亦衆矣我則潤之以時雨煦之以春陽淳德以柔之中孚以信之𤣥風既同祥物玆遂莫不自天壌窮海域蹶角以請吏執贄而来庭唐皇之德於此為盛今外蕃侍子久在京師雖威惠之感自逺畢歸而覉旅之意重遷斯在宜命所司勘㑹諸蕃充質宿衛子弟等量放還國契丹及奚近通質子並即停追前令還蕃省領等幽州且住交替者即放去朕欲鳥獸咸若華夷共安来則納其朝謁之心去則遂其生育之意含𢎞之施德莫厚焉遣牛仙客徃闗内諸州安輯六州胡𠡠勑古之降虜皆置邊郡將遂畜牧之性以示柔懷之德河曲之北先有六州羣胡編列積百年序往縁康時賔等輙搆兇黨自取誅夷詿誤蕃落損害良善因兹多𨽻令其失業永言戀本寧不懷歸朕每念及昆虫猶慮失所况於此軰豈忘安輯如聞已有逃在闗内諸州及先招携在靈慶州界者宜委並侍中牛仙客於監夏等州界内選土地良沃之處都置一州酋量户多少置縣其有先所𨽻州未来者亦放歸各另據簿籍勘㑹勿容虚假處置訖聞奏放不從亂吐蕃四人歸國𠡠劉闢招誘外蕃用資叛亂西蕃顧盟竟無助逆維使在其間而義無所失其吐蕃並分敬則送赴本界以其寒冱渉逺各給衣物粮食發遣元和年放吐蕃使歸國𠡠朕臨御萬邦推布誠信西戎納欵積有嵗時中或虧違亦常包貸我有殊德寧不是思重譯貢珍道途相繼申恩示禮曽無闕焉昨日蕃使奉章又至京輦將君長之命陳和好之誠臨軒召見館餼加厚復以信幣諭之簡書亦既言旋才及郊甸遽聞蟻聚来犯封陲河曲之間頗為暴擾背惠棄約斯謂無名公議物情咸請誅絶朕深惟德化之未被豈慮夷俗之不賔其國失信其使何罪釋其維縶以遂性示之𢎞覆以忘懷予衷茍孚庻使知感其使論矩立藏等并後般来使並宜放歸本國仍委鳳翔節度使以此意曉諭元和十四年正月命官葛邏禄葉䕶開府儀同三司制葛邏禄葉䕶特進頓毗特禀英姿擅雄荒服威信馭衆知終超闕以立節竭至誠而向順逆虜布思丘山積釁天地匪容未就闕遂能率引弓之旅佐轉戰之師生縳兇渠咸𩔖雖不長元惡顧神理之必誅而與我同仇乃忠勇之斯羙疇其民績寵以殊榮可開府儀同三司金山丕依舊充業䕶禄俸於北庭給其葉䕶妻及母並封為國夫人天寳十二年九月囬紇葉䕶司空封忠惠王功濟艱難志存邦國萬里絶域一德同心求之古今所未聞也囬紇葉䕶特禀英姿挺生竒畧言必忠信行表温良才為萬人之敵位列諸酋之長屬凶醜亂常中原未靖以可汗有兄弟之約與國家興父子之軍奮其智謀討彼凶逆一鼔作氣百萬摧鋒三旬之間兩軍克定力㧞山岳精貫風雲䝉犯曽不辭其勞急難無以喻其分固可懸之日月𫝊之子孫豈惟裂土之封誓河之賞夫位之崇者司空第一名之大者封王最髙可司空仍封忠義王每嵗送絹二萬疋至朔方軍宜差使受領至德六年十二月温沒斯懐化郡王制昔秋訾獻籌歸忠於大國日逐避禍納欵於眀廷宣帝加其一心寵之優禮或存故王之印綬或賜歸德之羙名爰舉舊章式從新命囬紇温沒斯特倜儻慕義沉雄有謀駃騠之生勢超千里鷙鳥之擊氣厲九秋屢獻欵誠布於邊將尋執反虜不遺君親戢其餓殍之􅑫曽靡秋毫之犯旋觀所履大節甚明朕與囬紇代結親姻乆敦隣好念其狂亂義在固存莫若撫其酋豪顯其大順使諸蕃知我招携之禮更逾徃昔之恩仍加帯礪之封俾度爪牙之寄服玆休寵可不敬哉可特進左金吾衛大將軍員外置同正員仍封懷化郡王㑹昌二年五月温沒斯歸義軍使制囬鶻代雄絶漢名鎮北畨而乃厭金革之強慕朝廷之禮願襲冠帯思覩漢儀蟬蜕自改於潔清豹變獨慰其文彩不有英傑孰啓壮圖温斯禀氣隂崧降精斗極生知忠孝神付莊矜自強之心隠如敵國鋭上之器森若戈矛果能因亂布誠覩機立節深叶懷柔之志不因告諭之辭昔者取士殊隣秦能致覇將賢異國晉實用材是宜優以寵光處之權貴崇褒納忠之効顯錫歸羙之名俾建斾於新軍示絶席於諸將勉修以節服我官常可檢校工部尚書兼左金吾衛大將軍同正充入歸軍使懐化郡王㑹昌二年六月封立薛延陀真珠毗伽可汗詔天地之德平分於四時帝王之道無偏於萬國故能亭育黎庻覆燾區夏聲教咸洎於逺方爵命不遺於殊俗薛延陀真珠毗伽可汗器宇沉毅識具允明夙時見機早禀正朔忠誠峻節克著於塞外貢獻琛賮不絶於王府加以訓朂子嗣輯寧種落俱率蕃職咸慕朝風其子沙躭彌葉䕶㧞酌逹度莫賀咄沒頡利苾並志懷敦確氣幹強果或心竭忠欵乃心闕庭或逺經朝覲拜首軒陛言念丹誠良以佳尚宜錫徽號用申褒寵㧞酌可錫葉䕶可汗仍賜狼頭纛四鼓四頡利苾可汗逹度莫賀咄葉䕶賜狼頭纛一鼓二仍令左領將軍梁方師持節備册命貞觀十二年九月突厥李思摩為可汗制天地大德覆載極於八荒日月貞明煦照普於萬物是以哲王撫運聖人垂法經邦立正之道取則於萬化興亡繼絶之義靡隔於華夷唯彼北戎代居荒塞養畜牧於天山之外擅勇敢於澣海之濵逮其本葉狂愚嗣位侵盗之釁禍結於諸華殘暴之風毒被於大漢酋豪異心部衆離阻革面若相望於道路請命皆慎委於闕庭朕情切納忠志存懷逺乃命上將拯其將溺元戎才動倒戈相繼而屠耆歸命單于反接分地之長觧結而來王引弓之民天落而内附龍城既附狼塞遂空朕愍其破亡恕其輟釁觧縳焚襯賜以再生收雷囬霜宥以寛政於是選内外之職分珪組以授之擇肥饒之地設州縣以處之開倉府以䘏其飢寒馳輶軒以問其疾苦恩同中夏禮均舊臣十載於兹矣受命三靈殫思百姓爰初薄伐非求闢土之功洎于克定實𢎞安民之道久存其亡國反其遺萌尚恐瘡痍未瘳衣食不足今嵗以積年榖屢登種衆増多畜牧蕃息繒絮無乏咸棄其氈裘菽粟有餘靡資於狡兎使得復其舊庭繼其統緒歸三祠於沮澤旋十角於盧山使復命闕林彌其依風之思重渉安水遂其向日之歡然而左方既建右地以設必俟其君長享王自非攣鞮責種醘落忠誠何以宣布朝化輯寧畨服右武侯大將軍化州都督懷化郡王李思摩器懷沉深識用詳眀早慕皇風肅生丹欵爰寵以賜姓榮以髙爵内典循徼之重外受連帥之任譽光朝右職簡朕心宜錫以藩號紹其宗祀可乙彌泥孰俟利苾可汗并賜之鼔纛仍令就其部備禮册命突厥及胡諸州安置者並令渡河還其舊部俾夫世作藩屛同之帯礪長保邊塞𫝊諸後昆貞觀十二年七月封突厥可汗夫人吕氏孫氏等制門下突厥可汗夫人吕氏孫氏等毳幙来賔錦車將命單于侍子榮已列於漢庭閼氏貴人寵宜加於蠻邸吕氏可封澣海夫人孫氏可封納歛夫人主者施行先天二年八月二日黠戛斯為可汗制𠡠我國家光宅四海君臨八荒聲教所覃册命咸被况乎族稱宗姓地接封疆爰申建立之恩用廣懐來之道有加常典得不敬之㸃戛斯國生窮陬之卿禀𤣥朔之氣少卿之後胄裔且異於蕃夷大漢之中英傑自雄於種落日者居於絶徼隔以強隣止馳向化之心莫通事大之體旋能奮其武勇清彼朔陲萬里歸誠重譯而至時既富於無外人更在於固存是用時降徽章載明深懇加其美號錫以丹書貽厥后昆遂荒有北舉兹盛典章示逺方戒服寵光永孚恩化可册為宗英雄武明誠可汗命右散騎常侍兼御史中丞季拭持節充册立使所司擇日備禮册命㑹昌五年五月議立囬鶻可汗詔朕聞王者立德必本於念功天下歸仁莫先於興滅囬鶻久為與國嘗建民勲累申式配之儀兼展稱蕃之禮天寳末興兵之際國歩未夷憤彼兇妖率其忠勇控弦而至革車之㑹増威止戈而歸犀毗之賜甚寵殊庸盛禮煥烈縑緗是為親隣成其邉衛牧馬逺迹於朔野𤇺火罷照於甘泉雖去華夷歡若親戚㑹昌中虜廷喪亂可汗淪亡狼顧既困於嵗牧鼠竊或行於邉州是時奸臣作軸邉將操戈因樂禍以乘危遂興戎而生事不念救灾之義盡為助順之攻駈彼離窟為徒𨽻情懷土自北南㓂之悲跡則亂竄北風之思舊國空瞻其茂草名王猶困於族人想彼窮荒寧無慨歎朕君臨萬方子育兆人雨露之所霑濡日月之所照燭欲令自遂必念好還乃眷朔易之雄况當勲力之後每思報德實用疚懷所以頓遣詔書俾勤尋訪穹廬莫覩甌脱已平萬騎豈無其忠臣六角冀存其貴種頗勞寤寐屢閲嵗時沙漠既空井遥猶在近有囬鶻来欵朔方帥臣得之送至闕下又有囬鶻隨黠戛斯李兼至朝廷各令象骨徴其要領音塵可訪詞㫖必同願復本邦仍懷化育皆云龎今為可汗尚寓安西衆悦所附颺宰相以忠事上誓復龍庭雜虜等以義向風頗側消釋至契素願慰悦甚多俟其歸還衙帳當議特舉册命今且遺使臣且徃慰論况情深振撫道既切於還来而切濟艱難義豈忘於繼絶至如待呼韓以殊禮約冐頓以和親止予嘉其来朝亦或慮其為患今則因此離散追彼功勲立國於狼居稍聚義於烏合再尋舊好宜舉良圖報告天下咸知朕意大中十年二月遣使册囬鶻可汗詔夫興滅繼絶有國之懿圖推亡固存先王之令典在春秋時齊秦列國之諸侯也秦穆尚存於晉嗣齊桓猶繼於莒土况我國家超邁皇王并包宇宙昔者囬鶻可汗在武德之初始畢効力於太宗在天寳時葉䕶有功於京洛乾元至德之際與子儀叶心大破西虜自爾以降聯為舅甥嵗有通和情無詭詐㑹昌中其國實遇天災莫能地着盡皆散徙遂至滅亡朕自纂承丕圖常多軫惻爰命使者將逺撫之訊厥存亡俾求嗣立軺車不至於靈武蕃使已及於塞垣迨至闕庭深陳血懇可汗已立諸部賔歸實資神祗之衛乃薄忠勲之力能果克紹叶纂舊圖頗協人願深契朕志尚恐未為諸蕃所信猶疑新造之邦是用特命使用遵行册禮於戲布德茂功柔逺祗邇前代之所以稱禮也使若教民之元后何以勸善湏布中外咸使聞知表朕中懷不問夷夏可册為温禄登里羅汨沒宻於合俱録毗伽懷建可汗命檢校秘書監兼御史中丞王端章持節册使仍令所司擇日備禮册命大中十年十二月唐大詔令集巻一百二十八
