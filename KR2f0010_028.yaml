body:
  text: 唐大詔令集巻三十八宋宋敏求編諸王加實封潞王周王上柱國别食實封制加相王封制加邠王守禮實封制慶王等食實封制遜佐温王遜位制封郡王降親王為郡王制封某王男某郡王制封懷寜郡王制嗣江王禕封郡王制加樂安郡王實封制封廣平郡王等制封皇太子男寜平原郡王等制封諸王男為郡王制册郡王册趙王孝恭改封河間郡王文册隴西郡王博又特進司宗卿文册漢中王瑀文除郡王官淮安王神通等開府儀同三司制夀春郡王成器左贊善大夫制信安郡王禕滑州刺史制褒信郡王璆宗正卿制濮陽郡王澈宗正卿制廣武郡王承宏光祿卿制信安王禕太子太師制封嗣王加嗣陳王實封制封嗣濮王制封嗣蔣王制封嗣荆王制嗣江王食實封制封嗣宻王制封嗣曹王制封嗣信王制册嗣王册嗣澤王文除嗣王官嗣澤王珣國子司業制嗣虢王邕同知内外閑廐勅嗣鄭王希言右衛大將軍制嗣吳王祗右衛將軍制嗣許王瓘太子詹事制嗣道王鍊雲安等五郡節度等使制嗣虢王巨西京留守制嗣吳王祗太子賔客制嗣虢王溥太僕少卿制嗣鄭王遜大理卿制諸王男諸王男等加封邑制加實封潞王周王上柱國别食實封制門下維城道峻理恢於邑壤分社寄隆義先於榮秩雍州牧潞王賢潞州牧周王顯瑶極披禎璇源發彩令聞彰於詩禮英徽表於岐嶷戎章之寵宜允於具瞻膏腴之恩式遵於故事並可上柱國各加别食實封一千戸餘如故加相王封制鸞臺尊王子弟分裂山河式優征賦永固藩屏并州牧左衛大將軍太子左千牛衛率兼安北大都䕶相王地惟茂親躬此明德性安卑薄誠切冲讓頃以所食相州願入天府章表懇到至於再三朕難違固請曲成美志然以王國所費觸𩔖宏多漢晉巳来寵錫彌盛或食邑五萬户或連城數十里豈可遂其覽分之情忘其推恩之典宜於相州加實封一萬户主者施行加邠王守禮實封制門下酬庸𢡟賞允屬親賢利建疏封式固藩屏光祿勲兼左金吾衛大將軍邠王守禮器資文武節藴忠貞容範霞軒孝友天至豈如服儒歸美諒以樂善稱仁載叶推恩増其井賦伴夫作輸誓以山河可加闕慶王等食實封制門下先王之制建封有等諸侯所食征賦以歸河西軍經畧節度等大使凉州都督慶王潭河東道諸軍州節度大使太原牧棣王洽河北道諸軍州經畧節度大使幽州大都督鄂王潤等性皆中和行無外餙教以詩書能漸義方雖已裂於封圻竟未疇於井賦頃以孝友之性且在深宫服用之間亦從御府既申開國之典宜崇書社之數可各食邑實封二千户主者施行遜温王遜佐制自古帝王必有符命兄弟相及存諸典禮朕以孤藐遭家多難顧兹䝉識未曉政術茫茫四海將何所屬累聖不業若墜於地王室多故宜擇長君思與羣公推崇明聖叔父相王髙宗之子昔以天下讓於先帝孝友寛裕彰信兆人神龍之初巳有明㫖將立太弟以為副君為王懇辭未行册命所以東宫曠位於今歴年綴衣在辰禍變倉卒後掖稱制計主冲人欽奉前懷式遵理命上申先帝之意下遂黔黎之心俯稽圖緯之文仰跂祖宗之烈起今日請叔父相王即皇帝位朕退守舊藩歸於外邸凡百卿士敬承朕言克贊我天人之休期以光我有唐之鴻業布告遐邇咸使聞知唐隆元年封郡王降親王為郡王制鸞臺樹之藩屏所以固本枝也裁其親踈所以明秩叙也緬惟上古欽若至公君不徒授臣不虛受乗列星而挹爵祿候風景而行慶賞則固以義形㢘讓道叶變通者焉某周公之𦙍地侔曲阜楚王之孫業盛平陸負戴忠孝踐履温恭每以車服數隆井賦秩廣清問之際陳乞情實顧存優禮且期後命今者頻詣闕庭累申華表志不可奪誠難固違宜旌謙損以鎮浮競可封某郡王食邑五千戸實封六百戸封某王男某郡王制鸞臺睦親之規既隆於敦叙建侯之典或綿於恩澤某王弟若干男某璿蕚疏翹珠泉演𣲖金相玉質形於載誕之初芝秀蘭芳表於克岐之日淳深發其天性韶令觀其月將可以内茂本枝外光維翰緑車承貺載延宗戚之輝朱紱斯皇宜啟山河之賦可封某郡王封懷寜郡王制建侯樹藩命賢列土以敦戚屬乃率典常司徒兼綘州刺史上柱國申王撝玉林分彩銀河䟽液靡保慶靈未繁𦙍緒宋王憲男嗣英魯庭學禮楚館聞詩德輝日盛忠槩時立宜其擇猶子之序居承嫡之位盧江大都形勝攸屬用圖爾居莫如茲地是錫分珪之寳俾成磐石之宗可封懷寜郡王食邑三千戸開元七年正月嗣江王禕封郡王制國之宗盟樹以藩屏用親九族以制萬邦朕恭黙思道𢡟勤庶政將欲克復古訓貽範方来頃以王國絶紀旁宗入繼事非允正奚妨命停而立愛自親推恩由近雖禮云異情所未忘况其嗣侯已積年歳永言主祭因心怵惕宜䧏殊常之澤俾申敦睦之道再從兄将作大匠嗣江王禕為信安郡王蜀王䄖為廣漢郡王再從叔太子員外率更令嗣宻王徹為濮陽郡王再從兄太子員外家令嗣越王闕為中山郡王開元十二年四月加樂安郡王實封制門下兄弟之子於近屬而特深恩禮之情在諸孤而更切故惠宣太子男守鴻臚卿樂安郡王瓊等咸自砥礪克修名檢纘承先緒休有令聞能榮曲阜之封不忝髙陽之族念往之恨巳無追於百身撫存之恩宜受賜於千室可共食實封一千户主者施行開元二十五年七月封廣平郡王等制分命本枝列於庶佐博考方册斯為大猷皇太子之子俶等觀其器識日以通敏仁智之性自然忠孝之誠克備率由禮度能禀義方業既著於崇儒材可使於從政爰茲拜職宜從紫綬之榮勉爾脩身式副緑車之寵可封俶為廣平郡王僖為南陽郡王倓為建寜郡王佖為西平郡王僅為新城郡王僴為潁川郡王封慶王之子儼為新平郡王仲為平原郡王棣王之子僎為汝南郡王僑為宜都郡王榮王之子俌為濟陽郡王偕為北平郡王儀王之子侁為豫章郡王健為闕陵郡王頴王之子仲為滎陽郡王永王之子偒為襄城郡王夀王之子伾為河間郡王延王之子倬為彭城郡王濟王之子傃為永嘉郡王開元二十八年九月封皇太子男寜平原郡王等制王者嗣統必上尊祖廟中立人紀下及孫謀所以光贊鴻猷發揮大典者也皇太子大男寜等温敏茂淑依仁游藝齔齠之歳自䧏其心詩禮之訓夙聞於耳朕初建儲兩永固宗祧既當知子之明彌稱抱孫之慰是用依方辨色藉土疏疆俾奉邦家式崇藩屏本攴百代㑹協於周詩子弟畢封更隆於漢室於戲承紫極之慶禀青宫之訓惟師友是敬惟忠孝是憑以善為心好賢為德古有成範爾其欽哉正元二十一年四月封諸王男為郡王制王者子弟畢封藩戚並建所以式固磐石克茂本枝故澧王大男漢可封東陽郡王第二男源可封安陸郡王第三男潢可封臨川郡王故深王大男可封河内郡王第二男淑可封吳興郡王故絳王大男沫可封新安郡王第二男渏可封髙平郡王故洋王大男沛可封潁川郡王淄王男澣可封許昌郡王沔王大男瀛可封晉陵郡王祁王大男溥可封平陽郡王仍並賜光祿大夫宜令所司擇日册命太和八年八月册郡王册趙王孝恭改封河間郡王文岑文本維貞觀某年月日甲子皇帝若曰於戲肇有君長司牧黎元雖步驟殊時損益異術至於建親勲而作屏陳龜鼎於無窮其揆一也惟爾光祿大夫行晉州刺史趙郡王孝恭器識𢎞通風畧宏贍親猶凡蔣佐比燕荆皇運權輿寰區未乂擁節西騖靖巴漢之妖氛受鉞南伐戮荆吳之虵豕誠著經綸功宣方靣及入參禮閣出總藩麾令望先於縉紳惠化洽於謡俗析珪之重允屬勲庸按部之榮義存帶礪是用命爾為使持節觀州諸軍事觀州刺史改封河間郡王𫝊之子孫永為唐輔往欽哉爾其勉兹忠孝鑒於典禮勤恤民隠無棄朕命可不慎歟册隴西郡王博乂特進司宗卿文維龍朔三年歳次癸亥十二月庚辰朔二十四日癸夘皇帝若曰於戲睦親之訓理鏡於遥圖章戚之規道光於絶簡若乃年耆德𢡟屬重望隆釋釐綜之勞遂優閑之禮惟爾光祿大夫司禮太常伯隴西郡王博乂發慶秩宗䟽翹靈𣲖資忠峻業襲義揚風懷匪磷之貞心凌後凋之勁節榮兼中外效宣文武至乃彯組文昌外贊清覽頻致由𠂻之請累申降階之謁雖鎮兹雅俗載佇於芳猷而爰静澆馳重違於撝尚是用命爾為特進行司宗正卿封如故往欽哉秩亞青槐朝請之恩斯切禮華丹棘序録之任攸歸恩邁前徽齊蹤徃哲光膺寵命可不慎歟册漢中王瑀文賈至維天寳十五載歳次景申七月戊子朔日皇帝若曰咨爾漢中王瑀臮御史中丞魏仲犀王室多難㐫逆未誅是用建爾子姓以為藩屏命爾忠良以攝傅相安危繫是舉可不慎歟夫王侯之體則以任能從諫為本親賢仗信為則以好問樂善為心安仁容衆為節然後能建其功業夹輔王室是以漢之宗王多委政守相故能享祚長久令聞不已朕聞汝瑀能寛大儉約樂善好賢敦説詩書動必由正而久於髙簡未習政途又聞仲犀才幹振舉憂勤庶績必能固爾磐石匡補闕漏軍旅之事必委其専獄訟之煩必與其决簡賢任能必使其舉懲惡勸善必任其斷惟協惟睦其政乃成同德合義何往不濟於戲瑀其鎮撫黎人莊肅守位仲犀其悉心戮力贊我維城則瑀有任賢之名犀有忠勤之績匡復社稷戡定寇讎在此行也勗哉其無替朕命除郡王官淮安王神通等開府儀同三司制褒崇賢戚有國彞典厚秩清階式隆朝望左武衛大將軍上柱國淮安王神通宗室之長德器優宏締構之功早樹勲績右武衛大將軍上柱國燕郡王藝夙著嘉庸志懷寖强久司戎禁見稱貞確宜加榮寵式允具瞻並可開府儀同三司夀春郡王成器左贊善大夫制鸞臺相王旦男夀春郡王成器毓彩桂山承規椒掖韶容霞舉美志月將望苑翹英瑶山佇俊宜參多士之選俾從政乂之列可依前件信安郡王禕􅉸州刺史制門下訓俗安人是資良牧棄瑕録用茲為令典使持節衛州刺史信安郡王禕器能之美宗室所推才堪應務久當於任委防缺周身因從於降黜惟推念舊義在睦親宜廻𫝊於方外俾分符於近服可滑州刺史褒信郡王璆宗正卿制孫逖門下公族之任得之則難舉親而官選舊惟允銀青光祿大夫殿中監上柱國褒信郡王璆雅性恭友虛懷敏逹近屬藩翰中朝羽儀無競維人不矜於富貴克勤於位每效於忠公敦叙是司疇咨所屬宜廻六尚之職以副九宗之委可宗正卿濮陽郡王澈宗正卿制孫逖門下宗卿設位邦族是司必擇親賢以光名器金紫光祿大夫行太僕卿員外置同正員上柱國濮陽郡王澈清貞履道淑慎持身行無越思動不踰矩以才從政於歴官而則深以地推恩在同姓而為近敦叙之任疇咨所難宜受寄於本枝更遷榮於列棘可行宗正卿㪚官勲如故廣武郡王承宏光祿卿制孫逖門下銀青光祿大夫行房州别駕員外置同正員廣武郡王承宏地在維城慶延分土頃乖周慎因從降黜捨其小犯用申猶子之恩復其舊資俾踐列卿之秩可光祿大夫光祿卿員外置同正員信安王禕太子太師制門下傅導元子師長庶寮必在正人無非舊德太子太師上柱國信安王禕宗室良翰朝廷碩老踐忠公而立節體明肅而成用頃膺大任頻摠中權掌夏司春允為六官之長戢兵禁暴何止萬人之敵睦親尚齒念舊録功宜優天秩之榮俾極宫臣之位可光祿大夫守太子太師勲封如故封嗣王加嗣陳王實封制鸞臺睦親之道推恩之義家國所同古今無異雲麾將軍行太子左鶴禁率嗣陳王延暉地承枝葉戚在葭莩㓜聞詩禮躬踐名教賞勸未酬井邑猶虛宜申優典用光近族延暉兄弟可别令實封一百五十户封嗣濮王制門下姬運睦親曲阜祚周公之嗣漢廷繼緒荆舒紹元王之封所以宗子維城本支百世也故嗣濮王餘慶構北極天分源帶地通五演之餘潤承九秀之曽暉禀訓梁園冠池筠而振彩承規淮岫掩巖桂而揚芬往屬艱虞苴茅中絶今逢開泰枝庶畢侯宜承井賦之榮以永山河之誓可封嗣濮王仍食實封四百户封嗣蔣王制門下魯𦙍曹裔並為建國文昭武穆克紹明禮所以諸侯夹輔宗子維城帶礪山河藩屏社稷自大運中圯天步多艱磐石之基剪焉落構今皇圖再纘鼎祚維新興廢繼絶尚遺凡蔣格於藝祖震悼良深故蔣王惲宗室羽儀國朝賢懿享祭無主觀守丘荒非所以敦叙九族盛隆百代之義也嗣王煒第三子銑男左千牛衛長史紹宗雖以沉淪之間未光天秩而瓌姿傑氣惟曰象賢可封嗣蔣王以食舊德賜食實封四百户封嗣荆王制門下敦族睦親疇咨前代脩廢繼絶率由舊典故荆王元景嫡孫沈黎縣開國侯長沙男逖再從叔祖故梁郡開國公孝逸第五男璪等慶協家邦緒聨戚屬預聞禮訓夙踐義方夙藉桐珪之業合循茅土之制頃以維城中圮宗室多艱賜命弛廢宅居播越今皇基重建國歩永康思樹本枝載昌綿秩是用分封子弟大誓山河俾夫作扞京師為我藩屏宜以逖嗣封荆王仍賜實封四百戸璪可襲封梁郡開國公食邑二千户嗣江王食實封制門下列爵王侯是歸於藩屏推恩子弟用隆於井賦尚乗奉御有闕先授嗣鄧康王伯潛太子僕兼徐州别駕嗣江王禕等文昭武穆夙延殊奬沛易河詩嘗聞雅訓忠讜㳟懿明敏博通逸思泉奔冲情霞舉中山謝其文藻北海慚其經術永言興繼載擇親賢析珪受璽惟允分封之命保國乂人宜光實食之典可食實封册嗣宻王制興滅國繼絶代天下歸心焉况乃仁不遺親德必在祀光復土宇率由教義者哉徐州刺史宻王元曉望重天人地居藩屏家邦依賴休戚是均乃者王室多難睿圖中缺凡我宗子咸從殛竄神龍初歳寳運紹興爰命近屬以為後嗣而𦙍緒凋翳是非紛雜曇子乗隙妄尸茅土神其不歆非𩔖人亦奚祀非族奠享無主永懷惻然其封元曉姪孫銀青光祿大夫行太僕少卿員外置同正員東筦郡開國公徹為嗣宻王以奉其祀開元五年五月封嗣曹王制朕因暇日嘗幸戚藩引見諸王爰加錫宴而故信王孫林行列之間皤然白首問其年齒則七十而有七詢其昭穆則𤣥宗之雲孫朕仰思開元之時盛明之理繼體承訓迨於朕躬惕然動懷當食興嘆况尊祖之義立愛自親尚齒之文由家刑國觀其威儀甚整視聽不衰載懷愍矜所宜敬異永惟烈祖之德用錫孝孫之慶旌其祚𦙍特舉徽章遽外開府之秩寵以分茅之貴俾從異等式示殊恩可嗣信王仍賜開府儀同三司開成元年八月册嗣王册嗣澤王文蘓頲維景龍四年歳次庚戌五月辛亥朔二十八日戊寅應天神皇帝若曰夫親先之義始自家國嫡後之封終𫝊土宇咨爾故澤王男義瑾授桐貽緒訓梓垂芳性與宜於禮樂行盡成其忠孝是知周之曲阜元子建侯漢之平臺共王襲父推其繼美俾爾宜乎是用命爾為嗣澤王於戲率由軌訓祗服彞典故可以不驕不矜廼惠廼順北暨於上黨南臨於太行偉其井邑光我藩屏往欽哉除嗣王官嗣澤王珣國子司業制門下嗣澤王珣承派咸池分輝扶景錫珪前寵纂周典之親賢磐石今隆髙漢朝之子弟機彩明悟神情峻㧞雅景夙成宏才早著儒庠教胄資適於下帷蕃郡理人允求於别乗衣冠就秩宜班列位之榮井賦開疆仍茂承家之業可國子司業嗣虢王邕同知内外閑廐勅蘓頲勅騏駿伏皁軍國為容茍非懿親莫允斯寄秘書監檢校殿中監嗣虢王邕地隆藩屏才藴忠賢以河間之碩儒膺舞陽之茂寵學窮四徹巳綜圖書任司六尚式光軒冕必能駟馬舉䇲兩驂執轡用聞玉臺之歌入侍瑶池之賞宜與張渉同知内外閑廐餘如故景龍三年十二月十二日嗣鄭王希言右衛大將軍制蘓頲門下銀青光祿大夫太僕卿員外置同正員上柱國嗣鄭王希言才推近屬行禀中和用沉晦以為謀體直方而成器頻外列棘之位嘗踐執金之秩歴官斯久更事逾深必在親賢用膺心膂宜領右軍之寄仍直大將之任可雲麾將軍守右衛大將軍勲如故嗣吳王祗右衛將軍等制孫逖門下左衛將軍吳王祗等國之近屬朝之多士或班聨警衛有避於天倫或列位周已行淹於歳序各移官命用廣朝恩可依前件嗣許王瓘太子詹事制孫逖門下宫僚之首必擇正人邦圻之内實資良牧銀青光祿大夫秘書監上柱國許王瓘文儒致位所謂宗英銀青光祿大夫守太子詹事上柱國太原郡開國公暐言行立誠是稱親懿常以善而為樂每執謙而忘倦從政已多議能惟允弼違是屬宜肅事於東宫理劇允難俾安人於左輔瓘可太子詹事暐可使持節同州諸軍事守同州刺史㪚官勲如故嗣道王鍊雲安等五郡節度等使制賈至勅衛尉少卿嗣道王鍊簡約忠諒既直而温鎮守南服黎人用乂且三峡艱阻四方多虞按撫緝熈宜分權總俾爾攬轡固茲磐石可充雲安夷陵南浦南平巴東等五郡節度採訪處置防禦等使至德二載正月五日嗣虢王巨西京留守制賈至勅京師初復宫室始清可擇宗臣俾之居守銀青光祿大夫守太子少保嗣虢王巨惠和忠諒貞幹含𢎞嘗處節制之權更居師傅之任嘉猷允塞茂績居多可以固我維城殿兹邦國可權充西京留守餘如故至德二年九月二十九日嗣吳王祗太子賔客制常衮勅古者選孝弟閎博有道術者輔翼太子今以宗室之老處師賔之位亦親親而教敬也光祿大夫檢校工部尚書兼宗正卿上柱國嗣吳王祗文昭之慶蔚於公族楚元之後繼有忠賢逹道虛懷寛厚㢘謹藩翰舊德人倫憲行更於内外職事頗修年在華皓未嘗衰堕㕘㑹府而百工時叙掌宗卿而九族益親每託肺腑深加優禮宜以冬官之重仍在春儲之列可兼太子賔客其檢校工部尚書及㪚官勲封如故嗣虢王溥太僕少卿制元稹勅正議大夫行宗正丞嗣虢王溥守隨州司馬員外置同正員李逢等昔我憲宗章武皇帝法堯睦族深惟本枝乃詔執事曰伯父叔季幼子童孫在官各率乃誠無替厥職溥可權知太僕少卿逢可守袁王府長史餘如故宗正卿嗣鄭王遜大理等制錢珝勅九卿問重而顯者大宗正與廷尉實次奉常焉易官而處惟典之章具官遜等皆吾屬之楨幹也而又荷出相容㦸之門遜繼分郡符必聞其政久歴庶位咸稱有材克助承忠孝之家踐脩罔墜多所該練揚於縉紳今載葺京師敬先宗廟資乎集事速以成功而方備法官是宜改秩往趨獄務更在勵精伏念旬時獄可知也我有其律遜其盡心可依前件諸王男諸王男等加封邑制鸞臺昔子弟咸建姬祚以隆支體畢侯漢國斯永某王男某等普谷分彩天池演派金相比暎玉樹聨芳垂髫欽愛敬之風總角聞詩禮之訓三雍肇建萬品維新褒德叙勞式遵行慶之典疏藩樹屏允叶推恩之令可封襄陽縣開國男唐大詔令集巻三十八
