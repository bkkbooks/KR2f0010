body:
  text: 唐大詔令集卷三十七宋宋敏求編諸王册親王官册秦王天䇿上將文册許王孝秦州都督文册趙王福青州刺史文册鄧王元裕襄州刺史文册虢王鳯宋州刺史文册紀王慎澤州刺史文册杞王金鄜州刺史文册曹王明梁州都督文册郇王素節申州刺史文册紀王慎荆州都督文册周王顯并州都督文册虢王鳯青州刺史文册曹王明虢州刺史文册江王元祥鄜州刺史文册殷王旭輪單于大都護文册紀王慎邢州刺史文册曹王明豫州刺史文册趙王福梁州都督文册周王顯左衛大將軍文大歷五年册親王出將文大歷六年册親王出將文册親王官册秦王天䇿上將文維武德四年歲次辛巳十一月甲申朔二日乙酉皇帝若曰於戲咨爾太尉尚書令左右武侯大將軍陕東道行臺尚書令涼州總管秦王某夙標器望早樹風猷業創經綸功髙運始重以廓清秦隴剪伐鯨鯢掃蕩河汾芟夷凶逆周韓大盜趙魏逋誅二寇弗賔用阻朝化嚴兵鞏洛總率戎麾內運竒謀外申威略凶渠懾竄假命危城河朔蟻徒來相赴援一鼓誓衆以擒建德回戈旋指遂獲王充二方克定師不再舉節武既宣朝風遐暢宏規懿績獨冠卿尹宜錫寵章式加殊號光備禮物特超恆典是用命爾為天䇿上將位王公上領司徒陕東道大行臺尚書令增邑二萬戶通前三萬户餘如故加賜金輅一乘衮冕之服玉璧一雙黃金六千斤前後二部鼓吹及九部之樂班劍四十人欽哉恭承寵命可不慎歟册許王孝秦州都督文維顯慶元年歲次景辰十二月辛卯朔二十八日巳未皇帝若曰於戲先王創業垂統分玉展親所以作固鴻業克隆景祚惟爾并州都督兼同州刺史上柱國許王孝性履明裕神志清逺資孝敬以立身體溫恭以成性舊許是宅藩屏之寄以深全晉剖符維城之任愈切秦隴形要跨躡羌戎撫寧夷夏親賢攸屬是用命爾為使持節都督秦成武渭四州諸軍事秦州都督勳官封如故爾其祗承典訓審慎刑獄懷逺以德招擕以禮無邇宵人無怠庶政對揚休命可不慎歟册趙王福青州刺史文維顯慶二年歲次丁巳正月庚申朔二十一日庚辰皇帝若曰於戲夫姬周創制任隆方伯炎漢垂範寄重維城所以任固邦基以藩王室惟爾右衛大將軍使持節鄜州諸軍事鄜州刺史趙王福識度夷雅器業沉秀建鳥旟以作牧錫虹圭以命祚蘭錡上將既屬宗英海岱剖符允鍾懿戚是用命爾為使持節青州刺史其大將軍及封並如故爾其愛人理物慎獄恤刑率由王道以康庶績祗服寵命可不慎歟册鄧王元裕襄州刺史文維顯慶三年歲次戊午正月甲申朔二十八日辛亥皇帝若曰於戲自九州命職百部分官爰布懿德以宣風固親攴而總務歷觀前載罔踰斯道夀州刺史上柱國鄧王元裕志業純深基宇崇隩標情文雅之地植操忠賢之軌夀春作牧風教有成襄陽按部仁明允屬是用命爾為使持節襄州諸軍事襄州刺史王及勳官如故往欽哉其勉思政本式康萌俗沔漢舊邦控帶為重變其輕剽之黨旌其冠冕之望孤􅑏者咸恤正直者必親威惠並宣刑禮兼闡光膺典册可不慎歟册虢王鳳宋州刺史文維顯慶三年歲次戊午正月甲申朔二十九日壬子皇帝若曰於戲永固鴻基義屬於藩衛載孚王化職隆於制舉歷選前修茲道無替豫州刺史上柱國虢王鳯襟神秀發理識淹逺夙標懿範早茂清徽寬恕以表其情恭遜以成其美荆河之地巳洽於仁聲梁宋之郊佇聞於善政是用命王為使持節宋州諸軍事宋州刺史王及勳官並如故往欽哉其克膺禋命式遵彞典崇孝義以訓下踐忠貞而奉上布廉平之化垂惠愛之風居敬而行簡恤隱而求瘼惟良之丕寄可不慎歟册紀王慎澤州刺史文維顯慶三年歲次戊午正月甲申朔三十日癸丑皇帝若曰於戲析壤分圭寄隆於宗子罷侯置守任切於惟良自古明王率由茲典左衛大將軍徐州刺史上柱國紀王慎稟慶璇源分華紫極崇詩書而軌物敦教義而明道入典鉤陳恭肅表於清禁出膺刺舉寬簡洽於名藩髙平形勝太行重阻地邇王畿親賢是屬是用命王為使持節澤州諸軍事澤州刺史王及大將軍勳官如故朕聞之諸侯之孝在上不驕善人為邦期月而可往欽哉其祗膺顯命率循典禮慎刑罰而設學校尊五美而屏四惡造次於仁夙夜無怠勉追風於往哲以垂裕於後昆可不慎哉册杞王金鄜州刺史文維顯慶四年歲次已未七月庚子朔四日癸卯皇帝若曰於戲昔堯分五典漢總六條所以光闡帝猷式調萌俗者也爰自近古尤為重任襟帶之地非親不居形勝之藩惟賢是處咨爾益州都督上柱國杞王金岐嶷幼彰英徽早茂仁慈表性愛敬因心磐石之固攸歸分符之寄斯在是用命爾為使持節鄜州諸軍事鄜州刺史餘如故夫道德齊禮為政之良規踐義基忠立身之要道必恭謙而下士無驕矜以傲法勉務農之教勤恤隱之方往欽哉其祗朕命緝諧令績可不慎哉册曺王明梁州都督文維顯慶四年歲次已未九月乙亥朔二十九日癸邜皇帝若曰於戲漢川紀奠梁山表鎮南通庸蜀北逹褒斜地實要衝人資剛鋭式遏之寄親賢攸屬惟爾上柱國曹王明志業沖逺襟神爽濟仁惠之風彌著慈和之美日聞析壤分圭既隆於藩屏褰帷按部允期於政績是用命爾為使持節都督梁洋璧集等四州諸軍事梁州刺史王及勳官並如故往欽哉恤隱之任昔人尤重班除之職往哲稱難宜盡公平之心用崇寬恕之道聿遵前典勉修厥德惟良是屬可不慎歟册郇王素節申州刺史文維顯慶四年歲次已未九月乙亥朔二十九日癸卯皇帝若曰於戲經邦之術寄宗子而維城御下之方資懿親而調俗𬗟尋遐載率修斯道咨爾上柱國郇王素節端嶷幼彰清徽早茂夙聞詩禮之訓式光車服之寵邑連鐘武壤接平春合九寨之遙途控三門之險路形勝之地馬牧在斯是用命爾為使持節申州諸軍事申州刺史王及勳官並如故往欽哉夫政化之要禮義為先臣子之規忠孝為本爾其慎修刺舉祗服炯戒仰鳴謙以自牧無侈縱而違道荷兹隆委可不慎歟册紀王慎荆州都督文維顯慶五年歲次庚申九月癸亥朔二十五日丁卯皇帝若曰於戲南紀之津上躔翼軫西浮之路旁帶巴巫信形勝之大澤實英靈之奧府恤隱之寄懿親攸屬班條之美良翰爰歸左衛大將軍澤州刺史上柱國紀王慎漸天漢而含潤資日觀以摛華藝重三雍道優二陕梁地挺彥燕館趨賢位表銜珠入光蘭錡職華分竹出美棠隂簡惠以孚聲績斯邵是用命爾為使持節都督荆岐嶽朗等四州諸軍事荆州刺史大將軍上柱國王並如故往欽哉夫道德齊禮布政之化踐孝依仁立身之本必宜周旋勿墜雅譽彌髙勉修乃職對揚休命可不慎歟册周王顯并州都督文維龍朔元年歲次辛酉十月癸亥朔十七日已卯皇帝若曰夫騰華星苑榮名區於藩維憑暉日御峻寵章於侯服故本枝增蔚鴻緒滋繁而汾陽奧區鎮龍山而控逺冀方沃壤接雁塞而疏疆連率之寄親賢攸屬咨爾洛州牧上柱國周王顯風則開秀器彩虛明識表魏舟之象詞掩漢臺之駕西園孤月委心鏡而齊明小山叢桂偃情田而並烈溫恭夙劭業尚日新棣蕚交芬圭璋具美是用命爾為使持節都督并汾箕嵐等四州諸軍事并州刺史牧又勳封並如故爾其克修天爵聿苞地義方資化敷大夏惠漸京陵必宜缺祍鳴撝蹇帷廣聰懋宣聲績長綏福履光膺顯命可不慎歟册虢王鳯青州刺史文維麟德元年歲次甲子正月已酉朔二十一日已巳皇帝若曰於戲剪商胙邑寵秩盛於隆周懲秦啓社徽名崇於有漢况乎爵窮五等榮總六條乃茂德之攸升因非賢而靡擇泌州刺史上柱國虢王鳯履局端嚴襟神秀整道光懿戚望重宗維恭慎之心符小言而緝譽虛凝之度包大雅而揚聲體被剛柔藝殫文武騰芳桂巘動貞韻而鏘金寫照荷池嚮清文而振玉若乃淄源逈跨岱趾斜臨人被萊風俗兼齊舊布中和之化申簡惠之方觀政所先建親斯在是用命王為使持節青州諸軍事青州刺史勳封如故往欽哉王其克邁十倫稽往賢之峻躅動宣九德蹈前哲之英規絶浮競之津廣貞淳之路光昭淑問可不慎歟册曹王明虢州刺史文維麟德元年歲次甲子正月已酉朔二十二日庚午皇帝若曰於戲金楨璿蕚分器先於茂親丹帷皂蓋按部盛於良牧藩條之寄載宣河潤之資斯逺固以聲芳偃桂德秀坐棠惟爾涼州都督上柱國曹王明幼範趨庭風識韶悟姿儀挺立豪眷靈而馳賞絃秋竹而舒襟詞彩星稠對梁珠而混色情源氷徹帶趙璧而交輝韜兩獻而選驤籠二武而孤峙是用命爾為使持節虢州諸軍事虢州刺史勳封並如故往欽哉爾其履謙居巽念損辭豐置醴以挹儒津賜田以登文囿敬光橋梓貞返修筠當率由舊章永保疆宇可不慎歟册江王元祥鄜州刺史文維麟德元年歲次甲子正月巳酉朔二十二日庚午皇帝若曰於戲列爵開基資連屬而敷化班條馭富藉藩衛而裁風是知光闡帝猷發揮人極固宗屬而兼列必親賢而並建鄧州刺史上柱國江王元祥識尚間偉體局貞凝履順而自居沖撝而待物梁臺既啓背淮之裾爰萃燕宫載闢發洧之駕相趨甄綜掩於河書精通符於沛易神遺糾察政叶寬平包吐茹之竒遞弦韋之用乃地鄰京翊俗裕於五方壤密寰封潤沾於九里是用命王為使持節鄜州諸軍事鄜州刺史勳封並如故往欽哉𢡟德惟忠持盈在約思勤躬而景問無弛度以虧名崇簡正之規邁安恆之節祗膺寵命可不慎歟册殷王旭輪單于大都護文維麟德九年歲次甲子二月巳卯朔九日丁亥皇帝若曰於戲帝子之星憑紫潯而啓耀天孫之嶽峙青甸而摛光故慶表裁梧德成觀梓皇跗睿屏聲孚地軸之西儲秀英藩飈偃宸街之北冀州大都督上柱國殷王旭輪金禎挺秀玉頴曽敷姿表淹凝器彩間潤淮南之鏡混沖照於髫辰睢陽之藻齊洪輝於綺日緑車就駕朱邸洞開榜道招英賜田期彥蕙列清風宣芳於大雅蓋承流月澄華於髙義固以聨崇躅於河楚茂疊軌於鄷郇是用命爾為單于大都護大都督兼勳封並如故往欽哉其緘訓趨庭兢業履薄方資威橫雁塞惠漸龍沙光膺朝奬可不祗慎册紀王慎邢州刺史文維總章二年歲次巳巳闕月庚寅朔十二日辛丑皇帝若曰於戲昔封唐御極分嶽以鎮寰區宅鎬乘時建侯以隆藩衛用能發輝鼎祚翊贊昌圖制犬牙以廓地基茂麟趾而光天緒懿親啓翰其理則然惟爾使持節澤州諸軍事澤州刺史上柱國紀王慎稟慶星躔分華帝圃器表沖邈軌鑒端凝業藴圭璋藝包文武振英詞於五際陵桂巘而含芳抗送議於三雍警蘋風而鼓譽仁孝為立身之本貞恕存應物之方及疏社上東建旟南服化流江漢道被歌謡中壘訓兵自穆銜珠之序長淮平俗式崇露冕之規冠雅政於羣邦標粹範於賢牧夷儀勝壤地乃邢遷跨令趙之郊畿總常山之襟要維城之寄僉曰爾諧是用命爾為使持節邢州諸軍事邢州刺史上柱國王如故往欽哉爾其光闡六條敷崇四誡考間平之令則酌魯衛之嘉猷無以傲從康無以縱敗禮迪於正典聿遵王度祗歷茂寵可不朂歟册曹王明豫州刺史文維總章二年歲次乙巳三月已卯朔十三日辛卯皇帝若曰於戲夫鄷京統歷疏青社以建侯炎漢握圖錫丹書而分國固以剪桐作屏實寄於周親剖竹開藩允屬於良牧眷言遐載諒乃通規惟爾使持節虢州諸軍事虢州刺史上柱國曹王明濯秀銀潢摛華璇極端潔成性自叶於遊蘭孝敬為心有踰於訓梓馳精祕象驗封蟻之登辭披翰小山見騰塵之入頌業隆燕館道謁梁闈纍播循風薦敷簡政飛蝗感化不犯漢中之田猛獸懷仁述避𢎞農之境若乃荆河奧壤井賦萬家周楚舊郊屬城千里形勝之地非親勿居是用命爾為使持節豫州諸軍事豫州刺史上柱國王如故往欽哉爾其班條述職務盡於勤誠求瘼庇人事歸於平恕祗服炯戒勉修厥德維城之重可不慎歟册趙王福梁州都督文維總章三年歲次庚申二月甲辰朔九日壬子皇帝若曰於戲夫姬祚斯永分瑞玉以建侯漢歷載融剖銅符而作鎮然則道光宗懿方膺錫社之榮迹著循良實允班條之寄惟爾隰州刺史上柱國趙王福摛祥丹極育慶玄樞邁德為資體仁成性趨庭演訓先承喻梓之恩樹屏凝規夙奉裁梧之命樂善無倦率禮無愆從蓋臨藩振英風於桂嶼褰帷按部流惠化於棠隂固以埒美鄷郇均聲河楚若乃華陽舊壤山抗西傾導漾名區地分南鄭眷言形勝諒在親賢是用命爾為使持節都督梁璧洋集四州諸軍事梁州刺史上柱國王如故往欽哉爾其靖共乃位聿遵前典朂貞恪之心務廉平之政茂對休寵可不慎歟册周王顯左衛大將軍文維儀鳯二年歲次丁丑二月甲午朔十二日乙巳天皇若曰於戲上圗圓極星躔分帝子之象下奠方典列野宅天孫之鎮𬗟徽千古尚想百王法靈臺以啓封俾親賢而作輔是以軒丘御歷爰錫蒼林之祚豳室建侯載疏曲阜之邑用能崇寶統贊昌期盛業茂於本枝鴻基峻於磐石惟爾洛州牧益州大都督兼太子左衛率使持節洮河道行軍元帥蔡州鎮撫上柱國周王顯髙禖薦祉甫應瑶筐仙域啓禎載分金榜迪中和之粹質藴上德之良規風識俊邁機神爽徹純襟洽地義之方弟性睦天倫之重發揮沛易隱括河書多材之美載光樂善之風逾振洎乎遙臨西蜀控玉宇之全邦近牧東周闢銅衢之奧壤少城故地不變歌廉之俗太室餘萌載陶分陕之化總戎未舉威巳讋於三羌作鎮方崇聲逺馳於萬里若乃左軍望重前馳任隆司鶡辨於宸階統熊渠於禁衛實惟心膂之要斯謂爪牙之職乃眷鷹揚寄於麟趾追蹤漢屏外列驃騎之班繼美晉藩初極領軍之選是用命爾為左衛大將軍餘官勳封如故惟天遵物厥命弗常惟人立躬在心則應性之所賦邪正由乎積習事之所通感召同於影響祗畏之道賢哲同歸欽哉往敷乃訓率由前則竭愛敬之情砥溫恭之行在泰思損據寵思危無耽樂是從非禮義勿踐永保朕命以蕃王室誕綏福祉可不慎歟册親王出將文維大厯五年歲次庚戌三月丁巳朔十六日壬申皇帝使某官乙持節册命曰於戲昔武德貞觀之際親賢兼敘中外大寧多以藩王委之方靣玄宗震耀威武外攘夷狄亦選建明德時惟鷹揚豫之茅土並賜旄鉞祗奉前訓敢忘夙夜爰命小子統兹元戎某英茂有才寬簡彰信豈孝恭之外至亦禮讓而中發能辨雅樂尤精善書言表於微獨有所得事迫於悔未嘗復行時因講藝之餘兼逹理戎之要固可總以文武屏於家邦屬河外名都方缺上將難於大任歷選中朝雖慚知子之明不忝安邉之寄錫以戎輅分以兵符撫其四封式是羣帥仍求素望俾副新軍爾其保靖疆土惠安氓俗服我明訓永孚於休册親王出將文維大厯六年歲次辛亥五月壬辰朔十六日丁未皇帝使某官某乙持節册命曰於戲周之藩翰選用宗盟則懷德惟寧大邦惟屏也漢之郡國分建子弟則燕代邉遼齊趙慚悔巳莫不賦兼千乘土過數圻賜鈇鉞以専征參卿士而夾輔拜之於廟命之於庭俾其外合羣后同奬王室是用師古率由至公某王幼奉君親之訓兼承保傅之戒罔敢失墜勤而行之忠肅孝恭資其令德溫良聰逹輔以多才辨正五經之儒采述三雍之樂不自矜尚過於謙沖周旋體仁恆久其道懿此休問流於四方朕往統藩麾嘗親戎略諸子侍從或有所聞時與之言頗詳其旨必能當我朝寄叶於師貞仍選輔車委任留府錫以彤弓之寵稱其緑車之尊爾其祗承大訓以率諸夏敬兹厥服無廢朕命唐大詔令集卷三十七
