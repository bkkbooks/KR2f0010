body:
  text: 唐大詔令集卷八十宋宋敏求編典禮朝賀冬至取次日朝賀敕五月一日御宣政殿敕淮西用兵罷元會敕貢獻停貢獻詔罷正至進奉詔宴集定州賜宗姓老人宴會賜百官錢令逐勝宴集敕宴朔方將士敕宴幽州老人敕平淮西後宴賞諸軍將士放歸本道詔以水災罷九日宴會敕養老賜孝義髙年粟帛詔老人賜杖几鳩杖敕記節停諸節進獻詔以二月一日為中和節敕令誕日外命婦賀皇太后敕許慶成節宴會陳脯醢敕弋獵放圑兵敕酬賞鳯泉湯知頓官及百姓敕禁弋獵敕喪制聽衛士終制三年敕不許臨喪嫁娶及上墓作樂詔戒厚葬詔禁喪葬踰禮制誡厚葬敕條流葬祭敕朝賀冬至取次日朝賀敕王者父事天母事地所以昭孝敬之道彰神祗之德朕虔奉明命遍稽大猷實在緣情不惟相襲伏以昊天上帝義在尊嚴恭惟祀典每用冬至既於是日有事圜丘更受朝賀實深兢惕自今以後冬至宜可取以次日受朝仍永為恆式天寶三年十一月五月一日御宣政殿敕仲夏之時陽德方茂隂事始承聖賢因天地交會之時為父子咸覿之禮既行親戚豈隔君臣自我為初申恩卿士起今年五月朔御宣政殿召見文武百官九品以上外官因朝奏在京咸聽就列仍編入式以為恆典貞元十年四月淮西用兵罷元會敕敕淮蔡未賔師人暴露而三朝之會萬國來庭舉觴稱慶有懷愧惕其來年正月朝賀宜權停諸軍優賜並準例處分元和十年十二月貢獻停貢獻詔逸遊損德昔賢貽訓玩物喪志前典格言西旅獻獒召公於是作誡東齊餽樂尼父所以離心隋末道喪肆極奢靡內騁倡優之樂外崇耳目之娛冠蓋相望徴求不息公私擾據徭費無窮朕受命君臨志在儉約日旰忘食昧爽求衣纂組珠璣皆云屛退雕琢綺麗久從抑止其侏儒短節小馬庳牛異獸竒禽皆非實用諸有此獻悉宜停斷宣布遐邇咸使聞知武德元年十月罷正至進奉敕敕伐叛興師久勞於外饋軍給費因以為煩獻賀之儀諒非朕志務從簡約式業永表憂勤其今年冬至及來年元日諸司諸道進奉宜停元和十二年宴集定州賜宗姓老人宴會敕皇太子愛敬所覃格於四海仁孝所感周於百姓自春監國既處定州首創風規在乎兹境所以事親敬養之道有隱無改之情爰自中山流乎率土地居宣化之本人稟純孝之深有足可嘉特須優異其定州管內孝行著聞者宜與宗姓老人同賜宴會貞觀十九年十一月賜百官錢令逐勝宴集敕百靈降福庶尹叶心隂陽調而生植以滋政理孚而黎獻咸若由庚知萬物之樂華黍洽三農之慶信可以率禮輔仁式歌且舞者矣况生成式序氤氲致和卉物發榮池籞含麗思順時令以申憲澤咸宜邀歡芳月繼賞前春夙夜在公既同咸一之理休沐式宴俾共升平之樂中書門下及供奉官嗣王郡王左右丞相少傳賔客諸司三品以上長官侍郎少卿少匠司業少尹兩縣令都水使朝集使上佐以上并新除未赴任者及東宫諸司長官中舍中允少詹事諭德中郎率府蕃官三品以上至春末以來每至假日宜準去年正月二十九日敕賜錢造食任逐勝賞開元十九年二月宴朔方將士敕敕朔方軍節度大使兵部尚書信安郡王褘平戎朔陲經略萬里賦車籍馬精卒鋭兵自其有虞莫不素練而醜虜背誕偏師致誅謀若有神取如俯拾雖廟略之云逺亦將士之力焉威武載揚頑凶且懾狂寇覆巢以奔北羣帥掉鞅而來歸因其凱旋聊加宴樂各宜坐食相與盡歡其軍將以下官賞别有處分信安郡王褘與一子官宴幽州老人敕敕幽州老人師知禮等比者林胡翻覆薦嵗不寧戎馬之鄉良甚艱苦而賊虜自叛天實誘之主將致誅略無遺噍實除邉患且減征徭卿等忠義因心逺來陳賀深所嘉尚並宜坐食各有賜物食訖領取平淮西後宴賞諸軍將士放歸本道詔敕朕纂奉丕業託於人上仁不破物義不勝姦頌聲蔑聞暴亂連起叛臣希烈竊據淮沂誠哉彼夫無良亦由朕之不德撫馭之道失之於初師旅一興綿聨莫解服勞者從役不暇受汙者無路自新旱蝗相乘榖糴翔貴兵氓餒死十室九空通邑化為丘墟遺骸遍於原野每念於此心傷涕流且自昔勞師靡有不悔以虞舜之聖屈於苖人以漢武之強弊於戎虜矧乎德猶不逮力或未全我其永懷亦已自警乃者下哀痛之詔布寬大之恩普天載新殊死畢宥然尚勞師旅作扞封陲有纍嵗棄離室家有經時不解甲胄忠雖為國咎實在豫軍人若斯寧不知愧賴節將士旅咸奮揚武力慎固疆宇逺人思服元惡就誅蒸黎方致於安寧役戍永期於休息懋官以旌美錫宴以勞旋賞不踰時式遵彞典都統檢校司空同平章事劉玄佐宜與子孫一人五品正員官節度使檢校右僕射李澄檢校兵部尚書曲環檢校户部尚書李臯兼御史大夫樊澤等並與子孫一人七品正員官都防禦使工部尚書賈耽都團練使檢校左散騎常侍盧玄卿兼御史大夫張建封等並與子孫一人八品正員官檢校司空平章事李抱真檢校司空平章事李納檢校左僕射平章事韓滉檢校工部尚書田緒咸遣士旅逺赴行營同討不庭厥有成績抱真納滉與子孫一人八品正員官應與淮西接界州縣本軍鎮守及諸道赴行營將士等宜共賜三十萬端匹以充賞設度支即約據界首及行營軍額分配定數支送仍委本道條録功第名銜聞奏並與甄敘其行營將士仍各放歸本道明加宣諭令悉朕懷以水災罷九日宴會敕屬者春秋令節朝野多歡乃與公族庶僚同茲宴賞今兩河吳楚連被水災悼于厥心實未寧息尚軫憂念豈遑愈樂其九日宴會宜罷正元八月八月養老賜孝義髙年粟帛詔百行之本要道維先一言終身恕而已矣春生夏長寬裕之令行焉齊禮道德恥格之義斯在朕爰自幼年夙稟庭訓豈徒學聞詩禮因令匡定家國是以提三尺之劍起一旅之師殱鯨鯢於原野救蒸人於塗炭雲雷締搆備嘗夷險仁發於心義形於色大敵必勇匪為身謀大憝必誅志安天下太上皇留情姑射尚想軒轅駐蹕大安使朕正居紫極顧惟虛薄辭不獲免祗奉制誥負扆當朝乃眷宫宇載懷氷谷未明求衣乙夜忘寢思齊七政言念九功何以答上玄之心稱嚴君之志庶欲勤恤典刑舉直措枉允釐臣工任賢用能拯濟困窮抑損澆偽開直言之路廣不諱之門聞所未聞日慎一日望人皆見德變於至道若一物失所一人有惡則朕躬之責訓道不篤朕聞書曰至諴動神况於兆庶乎比聞逺近黔黎恥為盜賊州縣囹圄多並空虛豈由德教至此自是人知厭亂因其遷善可以化之朕往因征伐行天下多矣每見村落丘墟未嘗不撫膺歎息自登九五不許橫役一人惟冀遐邇休息得相存養長幼有序敬讓興行其孝義之家賜粟五石髙年八十以上賜粟二石九十以上三石百嵗加絹二匹婦人正月以來生男粟一石鰥寡惸獨不能自存逃户初還郊無糧貯州縣長官量加賑恤諸州官吏或正直亷平刑清訟息或貪婪貨賄害政損人宜令都督刺史以名封進白屋之內閭閻之人但有文武材能灼然可取或言行忠謹堪理時務或在昏亂而肆情遇太平而克已亦録名狀與官人同申泣辜慎罰前王所重枉繫一日直等三秋州縣法司特宜存恤布告天下知朕意焉貞觀三年四月老人賜几杖鳩杖敕古之為政先於尚老居則致養禮傳三代行則就見制問百年蓋皇王之勸人教黎庶之為子朕寅奉休歷祗膺聖訓因秋歸而嵗成屬星見而郊祀念其將智尤重乞言俾申恩於几杖其布惠於鄉國九十以上宜賜几杖八十以上宜賜鳩杖所司準式天下諸州侍老宜令州縣逐穩便設酒食一準京城賜几杖其婦人則送几杖於其家紀節停諸節進獻詔朕撫育黎庶思求政道欲儉以訓俗禮以移風菲食卑宫幾庶前軌比至五月五日及寒食等諸節日并有歡慶事諸王妃主及諸親等營造衣物雕鏤雞子競作竒巧以將進獻巧麗過度靡費極多皆由不識朕心遂至於此又貞觀年中已有約束自今以去並宜停斷所司明加禁察隨事糾正顯慶二年四月二月一日為中和節敕四序嘉辰歷代增置漢崇上已晉紀重陽咸説禳除雖因舊俗與衆共樂誠洽當時朕以春方發生候及仲月勾萌畢逹天地和同俾其昭蘇宜助暢茂自今宜以二月一日為中和節以代正月晦日備三令節之數內外官司休假一日貞元五年正月令誕日外命婦賀皇太后敕昔者聖王之以孝理天下也廣愛敬之心推於四海盡奉養之志示於兆人然後自誠之化有情斯感朕以眇身祗荷鴻業皇太后就安長樂朝夕承顔慈訓所加慶感兼極伏以今月六日是載誕之辰奉迎皇太后宫中上夀朕獲申歡慰亦欲公卿大夫同之宜以今月六日平明於光順門集百寮及命婦進名賀皇太后御光順門內殿與百寮相見永為常式貞元十五年七月許慶成節宴會陳脯醢敕慶成節朕之生辰天下錫宴庶同歡泰不欲屠宰用表好生非是信尚空門將希無妄之福恐中外臣庶不諭朕懷廣置齋筵大集僧衆非獨凋耗物力兼恐致惑生靈自今宴會蔬食任陳脯醢永為常例咸使聞知開成二年八月弋獵放圍兵敕昔周有岐陽之搜漢有扶風之命講師習武夸勝耀威故王者狩必以時招虞人以禮時則逺矣朕自祇膺圖籙於兹四年每巡狩郊畿不出百里且愛力而節用非盤遊而好樂今者四方無事百榖有成因孟冬之月臨右輔之地戒兹五校爰備三驅謂獲多庶存除害一昨長圍卩合大綏未舉而夜聞朔風天降微雪狐裘且御未免祁寒鶉衣不充寧堪凍露朕更截狡獸要輕禽以此遊娛孰云矜恤况為之父母育彼黎元中宵耿然明發增惕其圍兵並宜放散各賜布一端綿一屯開元三年十月酬賞鳯泉湯知頓官及百姓敕敕清人賦田以備搜狩之儀王者順時式崇豫遊之禮頃者築場初畢清道來巡經上林之苑囿指扶風之藪澤雖獵將提鼓虞人植旗仍憫祁寒之節不行肅殺之令豈唯虞舜之典咸秩山川所冀周文之風及於鳥獸由是罷還士卒非重盤遊眷彼吏民致有煩擾所謂行者幸也後來其蘇宜申恩惠用符古昔其所經州縣供頓官及百姓并造鳯泉湯屋宇使及夫匠并置營幕橋道使宜令所司勘會奏聞其緣御路及頓場麥苖有損者亦令勘責量事酬補開元三年十月二十六日禁弋獵敕春夏之交稼穡方茂永念東作其勤如傷况時屬陽和令禁麛卵所以保兹懷生下遂物性如聞京畿之內及關輔近地或有豪家時務弋獵放縱鷹犬頗傷田苖宜令長吏常切禁察有敢違令者捕繫以聞太和四年三月喪制聽衛士終制三年敕通喪下逹聖哲貽訓緯俗經邦咸率至道至於嬰蓼莪之巨痛懷顧復之深慈得自天經含生罔極者也爰自周衰七雄交爭逮乎漢末三方競峙金革亟動鉦鼓日聞先王典章掃地將盡遂令三邉武猛墨絰而扈戎麾七萃驍雄素冠而事巡警亦有內無繼體傍闕同氣几筵安寄奠酬不親乃眷於斯再深驚歎膺兹景業君臨九野中區富教化俗承規宜有解張兹勵風俗衛士掌間幕士等遭喪合期年上者宜聽終制三年永徽元年五月不許臨喪嫁娶及上墓歡樂詔如聞父母初亡臨喪嫁娶積習日久遂以為恆亦有送葬之時共為燕飲遞相酬勸酣醉始歸或寒食上墓復為歡樂坐對松檟曽無戚容既點風猷並宜禁斷仍令州縣捉搦勿使更然龍朔二年三月戒厚葬詔朕聞死者終也欲物之反於真也葬者藏也欲人之不得見也上古垂風未聞於封樹後聖貽範始備於棺槨譏僭侈者非愛其厚費美儉薄者實貴於無危是以唐堯聖帝也谷林有通樹之説秦穆明君也槖泉無丘壠之處仲尼孝子也防墓不墳延陵慈父也嬴博可隱洎乎闔閭違禮珠玉為鳬雁始皇無度水銀作江海因多藏以速禍由有利以招辱朕居四海之尊承百王之弊未明求衣中宵載惕雖送往之典詳諸議制失禮之禁著在刑書而勳戚之家多流遁於習俗閭閻之內或侈靡而傷風以厚葬為奉終髙墳為行孝遂使衣衾棺槨極雕刻之華芻靈明器窮金玉之費富者越法度以相髙貧者破資産以不逮徒傷教義無益泉壤為害既深宜有懲革其公卿以下爰及黎庶送終之具有乖令式者明加檢察隨狀科罪在京五品以上及勳戚之家録狀聞奏貞觀十七年三月禁喪踰禮制喪葬禮義蓋惟恆式如致乖越深蠧公私乃有富族豪家競相踰濫窮奢極侈不遵典法至於送終之具著在條令明器之徒皆有色數遂敢妄施隊伍假設幡矟兼復創造園宅雕剪花樹或桐𨵦木馬功用尤多或告舉凶綵飾殊貴諸如此類不可勝言貴賤既無等差資産為其損耗既失芻靈之義殊乖朴素之儀此等犯違先已禁斷州牧縣宰不能存心御史金吾曽無糾察積習成俗頗紊彞章即宜各令所司重更申明處分自今以後勿使更然證聖元年三月誡厚葬敕自古帝王皆以厚葬為戒以其無益於亡者有損於生業故也近代以來共行奢靡迭相效倣浸成風俗罄竭家産多至凋弊然則魂魄歸天明精識之已逺卜宅於地蓋思慕之所存古者不封未為非達且墓為真宅自有便房今乃别造田園名為下帳又明器等物皆競驕侈失禮違令殊非所宜戮尸暴骸實由於此承前雖有約束所司曽不申明喪葬之家無所依準宜令所司據品命髙下明為節制明器等物仍定色數長短大小園宅衣帳並宜禁絶墳墓營域務遵簡儉凡諸送終之具並不得以金銀為飾如有違犯者先決杖一百州縣長官不能舉察並貶授逺官開元二年八月條疏葬祭敕葬祭之儀古有彞範頃來或踰法度侈費尤多自今以後宜儉約悉依令不得於街衢致祭及假造花果禽獸并金銀平脫寶鈿等物並宜禁斷大歷七年三月唐大詔令集卷八十
