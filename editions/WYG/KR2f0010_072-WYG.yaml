body:
  text: 唐大詔令集巻八十二宋宋敏求編政事刑法頒新律令詔糺劾違律行事詔頒行新律詔法司及别勅推事並依律文詔恤刑詔頒行新令制申理寃屈制頒行律令格式制減大理丞廢秋官獄勅申寃制訴事人先經州縣勅減抵罪人决杖法詔令宰臣與法官詳死刑勅寛徒刑配諸軍効力勅頒行新定律令格式勅罪至死者勿决先杖勅刪定制勅禁罪人鞭背勅頒厯頒行麟德厯詔更改閏月制刑法頒新律令詔古不云乎萬邦之君有典有則辨方正位體國經野故九疇之叙興於夏世两觀之法大備隆周所以禁暴懲奸宏風闡化安民立政莫此為先自戰國紛擾恃詐任力苛制煩刑因兹競起秦并天下隳滅禮教恣行酷烈害虐蒸民宇内騷然遂以顛覆漢氏撥亂思易前軌雖務從約法蠲削嚴科尚行葅醢之誅猶設錙銖之禁字民之道寔有未宏刑措之風以兹莫致爰及魏晉流弊相沿寛猛乖方綱維失序下􅇒上替政散民凋皆由法令混訛條章錯謬自斯以後宇縣𤓰分戎馬交馳未遑典制有隋之世雖云釐革然而損益不定踈舛尚多品式章程罕能甄備加以㣲文曲致覽者惑其深淺異例同科用者殊其輕重遂使奸吏巧詆任情與奪愚民妄觸動䧟羅網屢聞釐革卒以無成朕膺期受籙寧濟區宇永言至治興寐為勞補千年之墜典拯百王之餘弊思所以正本澄源式清流末永垂憲則貽範後昆爰命羣才修定科律但今古異務文質不同喪亂之後事殊曩代因機適變救弊斯在是以斟酌繁省取合時宜矯正差遺務從體要迄兹歴稔撰次始畢宜下四方即令頒行庶使分曹簡肅無取懸石之多奏讞平允靡競錐刀之末勝殘去殺此為非逺其修撰之人宜加官賞武德七年四月糾劾違律行事詔朕恭膺寳命撫臨率土永鑒前王憲章典故雖文質逓變沿革不同而發號施令殊塗一揆皆所以成當世之典謨開生民之耳目納之軌度令行禁止自律令班下積有嵗時内外羣官多不尋究所行之事動乖文㫖此乃臣有所隠民不見德與不令而誅何以異也斯豈守道履正狥公奉法者乎自今以後官人行事與律乖違者仰所司糾劾具以名聞貞觀元年八月頒行新律詔象服畫冠化隆上乗道德齊禮刑清中代暨乎大道既隠淳風已衰桁楊所以實煩手足為之無措自斯以降禁網愈宻太宗文皇帝撥亂反正恤獄慎刑杜澆弊之大源削煩苛之峻法道臻刑措二十三年玉几遺訓皇令刋改朕仰遵先㫖旁求故實乃制太尉楊州都督無忌開府儀同三司勣尚書左僕射行成光禄大夫侍中髙季輔右丞段寳𤣥太常少卿令狐德棻吏部侍郎髙敬言刑部郎中賈名行等爰逮朝賢詳定法律酌前王之令典考列辟之舊章適其輕重之宜採其寛猛之要使夫畫一之制簡而易從約法之章疎而不漏再移期月方始勒成宜頒下普天垂之来葉設而不犯均被上皇凡在羣臣逮於列岳其務在審慎稱朕意焉永徽二年九月法司及别勅推事並依律文詔朕聞大小之情義重前誥哀矜勿喜道光遐册朕恭膺寳業嗣臨億兆留心聽斷劬勞日積一物乖方納隍軫慮今既科格咸備憲制乆行訊鞫之法律條具載深文之吏猶乖遵奉肆行慘虐曽靡仁心在含氣之倫稟柔脆之質乃有懸枷著樹經日不脱身被五木連宵忍凍動轉有碍食飲乖節殘酷之事非復一途楚痛切心何求不得念及於此深以矜懐又投匿名書國有常禁凡厥寮庶咸應具悉近遂有人向朝堂之側投書於地隠其姓名誣人之罪朕察其所陳皆極虚妄此風若扇為蠧方深自今以後内外法司及别勅推事並依律文勿更别為酷法其匿名書並宜准律處分庶使泣辜之事逺覃於四海䘏刑之㫖長垂於萬年永徽六年十一月恤刑詔哀矜折獄義光吕訓明慎用刑事昭姬彖朕以寡昧嗣登宸極思闡大猷式隆景運蹈氷彌懼屬想於寰中馭朽彌競馳襟於裕下虚已待物每從寛政如聞率土州縣留獄尚繁困於囚繫致於病死一嵗之中數盈二百葢由上乏亭育之化下乖堯舜之心深責在躬興言多愧抑又聞之共成我理天下者其惟良二千石今之所任或虧政道未詳欽恤之㫖茍狥苛刻之情幽縶困滯証逮遐廣寒暑相襲風露交侵淹乎年嵗成其疾苦加以杖笞失度桎梏違方巧詆深文生全安在獄市之寄何其爽與自兹以後宜革前弊罪無大小不得稽留其囚疾患及輕罪並笞杖等雖法有恒規恐典吏妄生威福官人不存檢校或顔靣囑請觸𩔖以之若仍舊不悛當加重罪布告天下知朕意焉龍朔二年八月頒行新令制門下葢大帝臨下覆幬之德彰焉聖人在上財成之跡著焉然則統天理運㣲政令不能通其道經國訓人非渙汗無以宣其化故羲爻演繇后以施命誥四方虞典記言帝乃敷文被九域豈惟遒人振鐸理存乎闡教象闕懸書義在於垂法雖時分歩驟必循先甲之規代變驪騵無革違名之軌既而淳源已徃澆風漸扇奸宄於是萌生譎詐以之飈起相彼羣俗頗乖於信義顧兹庶尹罕嗣於忠勤尺一交馳徒有書亭之弊五條間出猶招挂壁之譏非所謂光闡帝圖作為人極者也由此緑綈爰降尤慎於繁冗黄素所施彌崇於喻曉皇家創業抑揚前古粤在貞觀大啟憲章浃聲教於幽潛燭文明於區宇鴻池衍誥統理詳宻螭鈕騰文規模宏逺固以貽厥將来懸諸日月朕祗肅鴻業恭臨寳位握千載之禎符承百王之末緒凝神閒館託軒夢以憂人採誦康衢用堯心而拯物然以萬機事廣恐聽覽之或遺四海務殷慮緝采之多厭南宫故事綜覆已殚内史舊章捜羅殆盡自御宸扆每懐氷谷身雖處於岩廊情寔係於億兆比者在外州府敷陳表疏示下諸司亦多奏請朕以為帝命多緒範圍之㫖宏王言如絲彌綸之道洽前後處分因事立文嵗序既淹條流遂積覽之者滋惑行之者愈怠但政貴有恒詞務體要道廣則難備事簡則易從故自永徽以来詔勅俱令沙汰詳稽得失甄别異同原始要終捐華摭實其有在俗非便事縱省而悉除於時適宜文雖繁而必録援義删定以𩔖區分上稟先規下齊庶政導生靈之耳目闢風化之聲牖俾夫施之萬祀周知訓夏之方布之八埏共識司南之路仍令所司編次具為巻帙施行此外並停自今以後諸有表奏事非要切並准勅令各申所司可頒示普天使知朕意儀鳯元年十二月五日申理寃屈制門下大帝降覽無幽不燭下人上訴在屈必申將使處岩廊者户牖絶千里之遥御億兆者閽庭無九重之隔故堯推心以撫俗業濟天下湯克已以察寃惠孚海内朕祗膺厯嗣寅奉璇圖常居安以戒危每在得而思失慮一夫之弗獲憂萬方之罪已為承平既久區㝢至廣州邑相望衆庻殷阜事繁則詐起法弊則奸生念兹寃滯載懐悱惻是以頻發詔書庻㡬息訟比命申理未副朕懐百姓雖事披論官司不能正斷及於三司陳訴不為究尋向省告言又却付州縣至財物相侵婚田交争或為判官受囑有理者不申或以按主取錢合得者被奪或積嫌累載横誣非罪或肆忿一朝枉加殺害或頻經行陣竟無優賞或不當矢石便獲勲庸改換文簿更相替奪或於所部慿情織作少付絲麻多収絹布或營造器物耕事田疇即役履功雇無半直又境内市買無所畏憚虚立賤價抑取貴物寔食貪利以侵人乃據詳估以放罪或進退丁户等色多有請託或解補省佐之流專納賄賂或徴科賦差㸃兵防無錢則貧弱先充行貨則富强獲免亦有鄉邑豪族容其造請或酒食交徃或妻子去還假託威恩公行侵暴凡如此事固非一緒經歴臺省徃来州縣動淹年嵗曽無與奪欲使元元何所控告見在京師訟人宜令朝散大夫守御史中丞崔謐朝散大夫守給事中劉景先朝請郎守中書舎人裴敬彞等於南衙門下外省共理寃屈所有訴訟隨状為勘其當理者速即奏聞無理者示語發遣其有虚相搆架浪擾官司若經處分諠訴不絶者宜即科决使知懲勸仍限今年十二月内使了其在外州縣所有訴説寃滯文案見未斷絶者並令當處速為盡理勘斷務使甘伏勿使淹滯若處斷不平所司糺察得寔者所由官人隨即紏付可布告遐邇使知朕意儀鳯二年十一月十三日頒律令格式制門下朕聞唐虞膺籙畫象而人知禁夏商御圖設刑而罪不息周秦以降沿革罕同漢魏而還條流浸廣雖或輕或重一弛一張義在於訓人事期於肅物然則刑辟勿用見稱於昔典法令滋章貽譏於前哲朕情在愛育志切哀矜踈網恢恢寔素懐之所尚苛政察察良夙心之所鄙方冀化致無為業先刑措近見所司進律令格式一一自觀至於經邦成務之規訓俗懲違之範萬目咸舉一事無遺但能奉以周旋守而勿失自可懸諸日月播之黎庶何事不理何化不成先聖憂勤萬務遺念庶績或慮湏有弛張所以泛令刪定今既綱維􅊀舉法制宏通理在不刋義歸無改豈可更有異同别加撰削必年月久逺於時用不便當廣延羣議與公卿等謀之今未有疑無容措筆其先定律令格式之本宜早宣布凡厥在職務湏遵奉輙造異端妄踰軌躅者咸禁除之庶用刑符於畫一守法在於無二内外寮宷知朕意焉文明元年四月二十六日减大理丞廢秋官獄勅鸞臺崇德簡刑列辟之彞範并官省事有國之良圖聖人執契以乘時道苞乾大善政改絃而馭俗義叶鼎新朕處荷先基恭臨下土運一心之淺慮憂四海之羣生馭朽載兢踐氷惟惕幸賴九𤣥垂祐七廟宣靈天地以清風雨咸若菽粟登稔疆徼無虞茂祉日繁休禎嵗集答昊穹之睠命順億兆之識知蒼璧靈壇展嚴禋於上帝黄金秘牒追顯號於前王大典聿申鴻符允暢斯寔祖宗之遐慶函夏之多福豈朕虛薄能臻此乎但萬嵗初元肇開昌歴九章恒憲甫釋嚴科逺近無縲絏之冤老幼有歌謠之樂人皆遷善政在惟新丹筆刑官已絶理梧之聽黄沙獄户將為鞠草之場而法禁之曹宷寮斯衆司刑一局便有八丞既罕囚徒静無推案豈煩多士虚習夏書宜減二員俾從他職文昌國府建禮天闈庶政是歸具寮攸仰諒青縑之美地非頳服之攸居雖復時有申讞頗湏聽斷兩造之文必具五詞之理易窮詎假狴牢方甄枉直仙臺置獄甚為非宜今欲總撤踈羅寧可别施囹圄其秋官獄即宜除毁朕既深居秘宇不能遍覽綿區唯仗時賢共康天下州牧縣宰寄重親人僚守勾曹任惟綱紀百姓或有所犯必湏盡理推尋審知罪状分明方可禁身科斷不得才聞小過遽縶圜扉髙下其心同叔魚之鬻獄輕重其手爽定國之平刑黠吏崇奸恣其乾沒要囚多滯積以炎凉有一於兹當加貶譴幸悉心而慎罰同底績以勝殘佇宏勿辟之規用闡無為之化將使三千之罪永絶於當年豈惟數百之刑僅寛於昔代布告天下識朕意焉登封元年十月十一日申寃制門下九重深􅃉非訪問之可聞萬邦遐曠因表䟽而方逹朕尊居黄屋心念蒼生㣲物不安每切納隍之慮一人失業更縈宵旰之懐思欲下情上通無令擁隔所以明四聰者也其官人百姓等有寃滯未申或獄訟失職或賢才不舉或進獻謀猷如此之流任其投匭凡百士庶宜識朕懐神龍元年二月二十七日訴事人先經州縣勅六卿分設諸郡咸理在於人下合免寃滯如聞越局侵務背公向私其傷則多為政必紊宜令天下州縣百司寮宷俱守乃曹各勤所職或有身名尚屈刑罰不平賦役未均徴差無次爰及侵奪亦兼違負凡人所訴大畧如斯若縣不為申州必湏舉州不能理省必為裁上下相持寃訟可息自今以後訴事人等先經縣及府州并尚書省被理由延滯不為斷决委御史採訪奏聞長官以下節級量貶開元十年閏三月減抵罪人决杖法詔勅大德曰生至重曰命􅃡觀前典惟刑是恤比来犯盗先决一百雖非死刑大半殞斃言念於此良用惻然自今以後抵罪人合决勅杖者並宜寛决杖六十一房家口移𨽻磧西其嶺南人移𨽻安南江淮人移𨽻廣府劍南人移𨽻姚嶲州其磧西姚嶲安南人客各依常式開元十二年四月令宰臣與法官詳死刑勅朕猥集休運多謝􅈒王然而哀矜之情大小必慎自臨寰宇子育黎蒸未嘗行極刑大獄上𤣥降鑒應以祥和思叶平邦之典致之仁夀之域自今有犯死刑十惡宜令中書門下與法官詳所犯輕重具状奏聞寛徒刑配諸軍効力勅孫逖勅刑之所設將以閑邪法不在嚴貴於知禁朕自臨萬國向踰三紀思宏至道之化寔務好生之德比者應犯極法皆令免死配流所以市無刑人獄無寃繫哀矜勿喜冀洽於生靈小大以情寧忘於鑒寐至於徒罪雖非重刑力役之外不免拘縶載罹寒暑誠可矜量自今以後其犯罪應合徒者並配諸軍効力庶感激之士因以成功寛大之恩叶於在宥且本置杖罪是代肉刑將以矜人非惟重法今官吏决罰或有生情因兹致死深可哀憫其犯杖罪情非巨蠧者亦令効力宜令所司作載限立條例處分天寳四年七月頒行新定律令格式勅孫逖勅簡而易從疎而不漏二者之義良有㫖哉朕思正國綱舉為大化至於律令格式政之隄防豈非㳂襲亦致増損條流既廣繁冗遂多或輕重不倫或交互相背侮法之吏因以情坐得罪之人何妨悞入觸𩔖而長頗乖折中永言於此是用興懐先令中書門下及明法人等商量刋定兼亦採諸羣議徧示具寮洎乎畢功巳淹嵗序近者親覽又歴旬時如此再三事亦詳慎不刋之典故亦庶乎適時之方斯其宜矣可頒告天下罪至死者勿决先杖勅比者所司斷罪拘守科條或至死刑猶决先杖處之極法重此傷殘非惻隠也自今罪至死者勿决先杖貞元八年十一月刪定制勅元和長慶之中皆因用兵且欲濟事所下制條或是權宜今四方少寧庶政湏理毎有司檢舉行下則諸道援引申論所執不同遂成舛駮若不刋定則無准慿宜令尚書省諸行郎官各取本司元和以来勅叅詳定訖送都省令左右丞重與尚書侍郎覆視更加裁度送中書門下議定奏聞太和元年六月禁罪人鞭背勅朕比屬暇日周覽國史伏覩太宗因閲明堂見五臟之系或附於背乃下制决罪人不得鞭背且人之有生繫於臟腑針灸失所尚致夭傷鞭朴茍施能無枉横况五刑之内笞最為輕豈可以至輕之刑傷至重之命朕恭承丕業思奉貽謀言念於兹載懐惻隠其天下州府應犯輕重罪人除奸情巨蠧法所難原其他過誤罪愆及尋常公事違犯並准貞觀四年十一月十七日制處分不得鞭背今年以後每至夏至後立秋以前犯罪人就州府常條之中亦宜量與矜減速為踈理不得令久禁繫委御史臺切加糾察永為常式太和四年四月頒厯頒行麟德厯詔夫氣象初分乾坤之位斯定剛柔逓運寒暑之節攸施而晦朔相循炎凉載革歸乎推歩方紀嵗時顓頊應期重黎司天地之職放勲承統羲和掌日月之官履端之道無暌舉正之典斯在洎乎末代漸致踈闊鄧平之術既已多乖朱浮之言罕能遵用九章五紀莫究精微日次月躔寧循晷度朕御天撫厯君臨萬方眷言兹道將恐淪缺欽若垂化曷所慿焉爰命所司研窮詳正仰稽七曜傍綜五家去其繁衍裁以要密古所未通今則備載隂陽之數可測盈縮之理無愆改元履初占考此厯嵗唯甲子得於天正合朔之後應以嘉祥五緯歩連珠二曜若合璧雖上𤣥至遐寔深祗愧而推測所詳固已精悉氣序恒順分餘弗舛以受農祥升平可致昔洛下閎造漢厯云後八百嵗當有聖人定之自火德洎我年將八百事合當仁朕亦何譲宜即宣布永為昭範可名曰麟德厯起来年行用之麟德二年九月辛夘更改閏月制項所司造厯以臈月為閏稽考史籍便紊舊章遂令去嵗之中晦仍見月但恐寒暑未節有爽天經用敷欽若之懐式陳敬授之典重更尋討果差一日履端舉正屬在於兹宜改厯惟新革非於既徃可以十月為閏十月一日甲子朔旦冬至神功元年七月唐大詔令集巻八十二
