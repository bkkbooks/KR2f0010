body:
  text: 唐大詔令集巻二十七宋宋敏求編皇太子立太子立秦王為皇太子詔立中山王為皇太子詔立晉王為皇太子詔立代王為皇太子詔立平王為皇太子詔立郢王為皇太子詔立忠王為皇太子詔立宣王為皇太子詔立廣陵郡王為皇太子詔立鄧王為皇太子詔立遂王為皇太子詔立景王為皇太子詔立魯王為皇太子詔立陳王為皇太子詔立德王為皇太子詔立太子立秦王為皇太子詔儲貳之重式固宗祧一人元良以貞萬國天册上將太尉尚書令陕東道大行臺尚書令益州道行臺尚書令雍州牧蒲州都督領十二衛大將軍中書令上柱國秦王某氣質冲逺風猷韶茂宏圖昔著美業日隆孝惟德本周於百行仁惟任重以安萬物王迹初基經營締搆戡剪多難征討不庭嘉謀獨舉長筭必尅敷政大邦宣風區奥功髙四履道邁二南任總機衡庶績惟允職兼内外彛倫載穆遐邇屬意朝野具瞻冝承鼎業允膺守器可立為皇太子所司具禮以時册命武德九年六月立中山王為皇太子詔尚書奏議以為少陽作貳元良治本䖍奉宗祧式固邦家中山王承乾地居嫡長天姿岐嶷仁孝純深業履韶茂早聞叡哲㓜觀詩禮允兹守器育養春宫朕欽承景業嗣膺寳圖憲則前王思隆正緒宜依衆議以答僉望可立承乾為皇太子武德九年十月立晉王為皇太子詔昔者哲王受圖上聖垂範建儲貳以奉宗廟總監撫以寜邦國既議在於至公亦事兼於權道以賢而立則王季興周以貴而升則明帝定漢詳諸方册豈不然乎并州都督右武侯大將軍晉王治地居茂親才惟明德至性仁孝淑質和惠夙著夢日之祥早流樂善之譽好禮無倦强學不怠今承華虛位率土繫心疇咨文武咸所推戴古人云知子莫若父知臣莫若君朕謂此子實允衆望可以則天作貳可以守器承祧永固百世以貞萬國可立為皇太子所司備禮册命貞觀十七年四月立代王為皇太子詔洊雷揚祉承祧之道爰著重離闡曜守器之方斯存故能撫寜軍國永保邦家詳覽瑶圖􅃡瞻遐册繼業垂統咸率兹典代王𢎞道居嫡𦙍天縱英姿器質冲華神鑒昭逺㳟謙表志仁孝居心夙彰睿哲之風早通詩書之業朕以虛薄方啟無疆之祚永𫝊不朽之基取則前王思隆正緒宜升上嗣養德東宫可立為皇太子仍令所司擇日備禮册命永徽七年正月立平王為皇太子詔舜去四凶而功格天地武有七德而戡定黎元故知有大勲者受神明之福仗髙義者為匕鬯之主朕㳟臨寳位亭育寰區以萬物之心為心以兆人之命為命惟承繼之道咸以冢嫡居尊而無私之懷必推功業為首然後可保安社稷永奉宗祧第三子平王隆基孝而克忠義而能勇比以朕居藩邸䖍守國彞貴戚中人都無引接羣邪害正兇黨實繁利口巧言讒説罔極韋溫延秀朋黨競起晉卿楚客交搆其間潛結回邪排擠端善潛貯兵甲將害朕躬隆基宻聞其期先難奮發挺身鞠旅衆應如歸呼吸之間兇渠殄滅安七廟於幾墜濟羣生於將隕方舜之功過四比武之德逾七靈祗望在昆弟樂推一人元良萬邦以定為君副者非此而誰立為皇太子有司擇日備儀注册命唐隆元年六月立郢王為皇太子詔樹之后王所以輯寜黎獻承之儲副所以安固宗祧故能崇四術之科為萬國之本長㓜君臣之序齒胄知歸温文㳟敬之風羣生攸屬古之制也其在兹乎郢王嗣讓聰睿夙成端莊特秀三雍禮樂必也生知五官詞藻居然暗合體道為器非假於學問資靈受德自符於神解夏絃春誦地義天經立人之道既彰為子之誠益著今升平在運中外咸寜將有事於元良固不踰於三善宜光近日之敏俾冠前星之耀宜以来年正月四日備禮册為皇太子所司准此開元二年十二月十七日立忠王為皇太子詔孫逖門下大寳曰位實在乎丕承萬邦以貞必建於明兩朕嗣守鴻業祗嚴永圖㳟惟匕鬯之主豈捨人神之望開府儀同三司兼單于大都䕶河北河東行軍元帥朔方節度使兼闗内度支營田鹽池押諸藩部落等大使上柱國忠王璵天假聰明生知仁孝君親一致孝悌三成温文之德合於古訓敬爱之風聞於天下嘗亦視其所以察其所安考言有章詢事皆中知子者父允叶於元良以長則順且符於舊典宜膺擇嗣之舉俾受升儲之命可立為皇太子仍取来月内擇日册命所司准此開元四年十月十四日立宣王為皇太子詔主器者莫若長子繼明者必建儲貳既巳𫝊重亦以崇本則君親之大義帝王之𢎞範無先於此矣朕以眇身纘承丕緒夕惕祗畏惟懷永圖承八葉之耿光居四海而稱大則匕鬯之主粢盛之重樹元貴嫡有邦之先宣王誦生知古訓既賢且長聰敏明博孝順㳟友不自滿假率由憲章慶發髙禖兆由甲觀為子之道惟父能知審觀其志宜承大統固能總戎監撫載乎鼎實不絶馳道謙敬益崇問安必自於因心立學因知其讓齒昇兹上嗣庶貞萬國可立為皇太子宜令所司擇日備禮册命建中元年正月立廣陵郡王為皇太子詔鄭絪萬國之本屬在元良主器之重歸於長子所以固社稷正邦統古之制也廣陵郡王淳孝友莊敬慈仁忠恕博厚以容物寛明而愛人祗服訓辭文皆合雅講求典禮學必承師居有令聞動無違德朕獲纘丕緒祗若大猷惟懷永圖用建儲貳以承宗廟以奉粢盛爰舉舊章仍俾茂典宜册為皇太子改名純仍令有司擇日備禮册命貞元二十一年二月立鄧王為皇太子詔門下朕聞君天下者纘承統業何嘗不樹儲建貳安固邦家况長子有主器之義元良貞立國之本上以嚴宗社之重下以順恒久之宜歴考前載率由斯道鄧王寜性與忠敬生知孝友秉寛洪之度體慈愛之心學師訓謩詞尚經雅動皆中禮慮不違仁稽以舊章允膺上嗣朕獲纘丕緒夙夜䖍㳟常懼神明未歆政理多闕曠兹茂典亟渉嵗時今属方内甫寜品物咸遂覽皇王之制詢卿士之謀時瞻大猷莫此為甚是用授之匕鬯位以青宫欽為永圖俾奉休命宜册為皇太子令有司擇日備禮册命主者施行元和四年四月立遂王為皇太子詔門下承廟祧之尊固邦國之本重其緒業貞以元良斯今古之通制也乃者春宫曠位巳渉歳時祼獻闕主鬯之儀膠庠虛齒學之道其何以懐寜方夏彰示教源稽諸往册用舉彞典遂王宥孝敬忠肅寛明惠和遵保傅之言佩經訓之㫖友于兄弟睦于宗親博愛而恕巳以誠慎行而飭躬以禮載觀所履克慎厥謀宜升儲闈以對休命朕祗若成憲惟懐永圖法三王垂統之規紹十聖重光之烈致嚴禋配俾奉粢盛式昭上嗣之榮庶叶明離之吉宜册為皇太子改名恒仍令有司擇日備禮册命主者施行元和七年十月立景王為皇太子詔門下朕聞王者敬承廟祧欽若天命必建元子用寜邦家所以光叶繼明嚴當主鬯朕纂承聖緒寅奉丕圖惟懷國本之安爰在皇儲之重而青宫久曠望苑未開則何以表式元良昭宣鴻業稽於往册用舉彞章長男景王湛孝愛㳟和忠敬誠懿慈恵特禀寛仁夙彰言通典謨動合儀矩睦友宗屬遵承𫝊道克修令聞日茂佳猷宜踐儲闈以承休命君尊父嚴毎推乾道聞詩學禮用首人倫嘉翼翼於誠心覩蒸蒸於孝敬古稱知子無讓前修俾奉粢盛式昭元嗣宜册為皇太子有司擇日備禮册命主者施行長慶二年十二月七日立魯王為皇太子詔禮重承祧義承繼體思崇守器必務建儲王者所以固大本而貞萬國也魯王允温仁寛明聰敏孝愛動若至性居無放心樂善承顔曠度容衆㳟勤詩書之教率由忠厚之風懿兹猷徽光我𦙍嗣朕纂承寳位丕寜永圖欽若典章用建儲貳爰俾主鬯以率問安統正龍樓之榮昭宣甲觀之兆宜膺荗典允屬元良宜册為皇太子宜令所司擇日備禮册命太和七年八月立陳王為皇太子詔門下古昔哲王之有天下也何嘗不正國本而承天序建儲貳而主重器朕以寡昧祗荷丕圖䖍㳟寅畏思固洪業慎擇令懿曠於旬時而卿士獻謀龜筮告吉以為少陽虚位願舉盛儀列聖垂休俾合予志選賢而立式表無私敬宗皇帝第六男陳王成美天假忠孝日新道德温文合雅謙敬保和裕端明之體度尚詩書之訓辭言皆中禮行不違仁是以順考舊章欽若成命授之匕鬯以奉粢盛宜回朱邸之榮俾踐青宫之重可立為皇太子宜令所司擇日備禮册命開成四年十月十四日立德王為皇太子詔我國家尚法夏殷逺遵漢魏爰設儲貳式固宗祧既明兩而作離在立嫡而惟長矧兹冲𦕈獲嗣丕基將𢎞永圖宜舉令典德王佑朕之元子孝敬日躋早茂温文克將岐嶷屬者朝廷多故兵革尚興懷柔方務於舞干典禮未行於主器而羣臣獻議百辟上言請建元良至於三四以奉祖宗之教必在前星係億兆之心宜崇嗣體由是考彼史册詢於蓍龜厥惟舊章乃建嘉命爾其嚴奉師傅敬慎威儀必使流慶萬邦垂芳三善禀教諭之道作圖牒之祥勿怠令猷克光帝載服我明訓永孚於休可册為皇太子仍改名裕令所司擇日備禮册命乾寜四年正月唐大詔令集巻二十七
