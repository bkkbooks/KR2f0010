body:
  text: 唐大詔令集巻一百二宋宋敏求編政事舉薦上京官及總管刺史舉人詔採訪孝悌儒術等詔求訪賢良限来年二月集泰山詔薦舉賢良詔搜訪才能詔河南河北江淮採訪才傑詔採訪武勇詔訪習天文厯算勅訪孝悌德行詔京文武三品每年各舉所知詔求猛士詔訪天下竒才異行制博採通經史書學兵法詔文武官及朝集使舉堪將帥詔諸州舉寔才詔捜揚懐才隠逸等勅求訪武士詔舉薦上京官及總管刺史舉人詔擇善任能救民之要術推賢進士奉上之良規自古􅈒王𢎞風闡化設官分職唯才是與然而巖穴幽居草莱僻陋被褐懐珠無因自逹寔資選衆之舉固藉左右之容義在捜揚理歸精確是以貢士有適爰致加錫之隆無益於時必貽貶黜之咎末葉澆偽名寔相乖舉非其人濫居班秩流品所以未穆庶職於是隳廢朕膺圖馭宇寧濟兆民思得賢能用清治本招選之道宜革前弊懲勸之方式加恒典茍有才藝所貴適時潔己登朝無嫌自進宜令京官五品以上及諸州總管刺史各舉一人其有志行可録才用未申亦聽自舉其陳藝能當加顯擢授以不次賞罰之科並依别格所司頒下詳加援引務在奬納稱朕意焉武德五年三月採訪孝悌儒術等詔朕以寡薄嗣守鴻基寔資多士共康庶政虚已側席為日已久投竿捨築罕值其人自親廵東夏觀省方俗興言至治夕惕兢懐然則齊趙魏魯禮義自出江淮吳㑹英髦斯在山川所感古今寧殊載佇風猷寔勞夢想宜令河北淮南諸州長官所部之内精加採訪其有孝弟淳篤兼嫺時務儒術該通可為師範文詞秀美才堪著述明識治體可委字民并志行修立為鄉閭所推者舉送洛陽官給𫝊乘優禮發遣當随其器能擢以不次若有老病不堪入朝者具以名聞庶巖穴靡遺俊乂可致務盡捜揚之道稱朕意焉貞觀十一年四月求訪賢良限来年二月集泰山詔朕遐觀前載歴選列辟莫不貴此得人崇兹多士猶股肱之佐元首譬舟楫之濟巨川若夫搆大厦者採衆材於山岳善為國者求異人於筦庫是以陶唐有虞揖譲之聖帝也非元凱不能成茂功商湯姬發革命之明王也非伊呂無以定禍亂况乎齊桓中人之才器非濬􅈒漢武嗣業之主志在驕奢猶頼管仲隰朋之用平津博陸之輔既為五覇之長亦稱萬代之宗是知得士則昌失人則亂朕冕旒夙夜虚心政道雖天地効社宗社降靈區宇晏如俊乂咸事尚恐山林藪澤藏荆隋之寳卜築屠釣韞蕭張之竒是以躬撫黎庶親觀風俗臨河渭而佇英傑眺箕潁而懐隠淪亟移日月空勞夢寐而驪龍莫兆商歌寂寥豈混跡駑駘未逢良樂之顧將毓德巖穴不追禽向之遊望雲増想其可歎息可令天下諸州捜揚所部士庶之内或識逹公方學綜今古亷㓗正直可以經國佐時或孝悌淳篤節義昭顯始終不移可以敦風勵俗或儒術通明學堪師範或文章秀異才足著述並宜薦舉具以名聞限来年二月總集泰山庶獨徃之夫不遺於板築藏器之士方升於廊廟務得竒偉稱朕意焉貞觀十五年六月薦舉賢能詔朕遐想千載旁覽九流詳求布政之方莫若薦賢之典是以元凱就列仄㣲可以立帝功管隰為臣中人可以成覇業朕緬懐曩烈虚已英竒斷斷之士必升於廊廟九九之術不棄於閭閻猶恐在隂弗和獨善難奪永言髦傑無忘鑒寐是以去夏之中爰動翰墨披霧丹腑疇咨海内尺木既樹思覩游露之羣雲羅宏舉佇降翔庭之翼而諸州所舉十有一人朕載懐仄席引入内殿借以温顔宻訪政道莫能對揚相顧結舌朕仍以其未覩闕庭能無戰悚令於内省更以墨對雖搆思彌日終不逹問㫖理既乖違詞亦庸陋豈可飾丹漆於朽質假風雲於决起者哉宜並放還各從本色其舉主以舉非其人罪論仍加一等然則今之天下猶古之天下也寧容仲舒伯起之流偏鍾美於徃代彦和廣基之侣獨絶響於今辰故其見知也則平津與樂安並進其不用也則敬通與亭伯同悲淮隂所以興言子長所以貽歎因斯論之良由俊造難進或固栖遲之節牧宰循常未盡捜揚之道撫事長息彌増憮然今州縣依前薦舉皆集今冬竒偉必収浮華勿採無使巴人之調濫吹於簫韶魏邦之珍沉光於漢水務盡報國之義以副欽賢之懐貞觀十年二月捜訪才能詔髙明之天資星辰以麗象博厚之地藉川岳而成形况帝王體元立極臨馭萬物字養生靈者乎所以致理之君逺讒佞近忠良屈已以申人故能成其化為亂之主親不肖踈賢臣虐下以恣情用能成其亂明君遵彼而興國暗主行此以亡身是以御朽臨氷銘心自戒宵興旰食側席思賢庶欲博訪丘園採捜英俊弼我王道臻於大化焉可令天下諸州明揚側陋所部之内不限吏人其有服道栖仁澄心礪操出片言而標物範備百行以綜人師質髙視於琳瑯人不間於曽閔㓗志於丘園揚名於里閭或甄明政術曉逹公方禀木鐸於孔門受金科於鄭相竒謀間發明畧可以佐時識鑒精通緯才堪於幹國或含章傑出命世挺生麗藻遒文馳楚澤而方駕鈎深覩奥振梁苑以先鳴業擅專門詞成載筆或辯調春囿談瑩秋天發研㡬於一言起飛電於三寸蓄斯奔箭未遂揚庭並宜推擇咸同舉薦以禮將送具表狀聞限以今冬並與考使同赴庶擬焚林之舉咸矯翼於巖廊尺木之階方振鱗於遊霧翹心俊乂稱朕意焉貞觀二十一年六月河南河北江淮採訪才傑詔朕受命上𤣥嗣膺下武每肅㳟旒冕延想英竒俯振鷺而企貞臣仰飛鴻而慕良輔雲臺仄席玉管屢移宣室整衣金壺亟改寂寥靡覿鑒寐興懐比年雖常進舉遂無英俊猶恐栖巖穴以韜竒樂丘園而晦影宜令河南河北江淮以南州縣或緯俗之英聲馳管樂或濟時之器價逸蕭張學宰帝師材堪諫輔者必當位之不次可明加採訪務盡才傑州縣以禮發遣顯慶元年十月採訪武勇詔濟時興國寔佇九功御敵威邉亦資七德朕端拱宣室思𢎞景化將欲分憂俊乂共逸巖廊而比貢英竒舉非勇傑豈稱居安慮危之志處存思亂之心如不旌賁逺近則爪牙何寄宜令京官五品以上及諸州牧守各舉所知或勇冠三軍翹闗㧞山之力智籌百勝緯地經天之才藴竒䇿於良平馳功績於衛霍蹤二起於吳白軌雙李於牧守賞􅊏善而萬衆悦罰片惡而一軍懼如有此色可精加採訪各以奏聞顯慶二年六月訪習天文厯筭詔南正北正司天地之職羲氏和氏統日月之官葢所以幽贊神明發揮厯象經百王而不易渉千古而無替慎竈疊跡於前甘石比蹤於後莫不仰稽次舎俯察禨祥克窮盈縮之端備極隂陽之際朕臨御區㝢多歴嵗年睠彼清臺罕聞其妙豈人不逮昔將求之未盡雖天道難知固以不言示教而時君取戒寧可遐棄厥司宜令諸州及諸司訪觧占天文及厯筭等人務取有景行審宻者並以禮發遣速送所司勿容隠漏貞元三年二月訪孝悌德行詔山東江左人物甚衆雖每充賔薦而未盡英髦或孝悌通神遐邇推敬或德行光裕邦邑崇仰或學綜九流垂帷覩奥或文髙六義下筆成章或備曉八音洞該七曜或射能穿札力可翹闗或丘園秀異志存栖隠或将帥子孫素稱勇烈委廵撫大使咸加採訪佇申褒奬亦有婆娑鄉曲負材傲俗為譏議所斥陷於跅弛之流者各宜選擇具以名聞京文武三品每年各舉所知詔京文武職事三品以上官每年各舉所知或材藴廊廟器均瑚璉體王佐之嘉猷資公輔之宏量或竒謀異筭决勝千里或投石㧞距力冠三軍或蹇諤忠亮志存匡弼或繩違糾慝不避權豪或威惠仁明堪居牧守之重或公正亷直足膺令長之任咸宜捜訪具録封進朕當詳覽量加奬擢儀鳳二年十二月求猛士詔朕君臨宇宙司牧黎元普天之下罔不率服蕞爾吐蕃僻居遐裔吐谷渾是其隣國遂乃奪其土宇徃者暫遣偏裨欲復渾王故地義存拯救事匪稱兵輙肆昏迷潛相掩襲既無備豫頗喪師徒因兹鴟張每思狼顧除兇伐叛王者所急前嵗將發六軍問其罪戾復以小㓂無勞大舉按甲息兵庶其改過不思惠養更起回邪敢縱狂惑專為㓂盜或攻圍鎮戍或驅抄羊馬烽燧頻舉烟塵不息候隟乘間倐来忽徃比者止令鎮遏未能即事剪除莫懐寛大之恩遂長包藏之計惡盈禍稔當自覆滅今欲分命將帥窮其巢穴克清荒服心寄英竒但秦雍之郊俗稱勁勇汾晉之壌人擅驍雄宜令闗西河東諸州廣求猛士在京者令中書門下於廟堂選試外州委使人與州縣相知揀有膂力雄果弓馬灼然者咸宜甄採即以猛士為名儀鳯二年十二月訪天下竒才異行制朕克纉丕業肇膺景命憲章昔典欽若前王永言政途庶㡬沿革猶恐學校多闕賢俊罕登庠序者風化之本人倫之先宜令州縣勸導令知禮讓天下有竒才異行者沉伏不能自逹及官人有能極言時政得失並令本州具狀封進鄉飲之禮廢日已久宜令諸州每年遵行鄉飲之禮唐隆元年七月博採通經史書學兵法詔才生於代必以經邦官得其人故能理物朕㳟膺大寳慎擇庶寮延佇時英無忘終食思欲蕭艾咸採葑菲不遺而商山幽僻渭濵寂寞夫以貴耳賤目殊通方之論捨近謀逺非應務之術今四方選集羣才輻凑藻斧伐柯求之不逺其有能明三經通大義者能綜一史知本末者通三教宗㫖究精微者善六書文字辨聲象者博雅度曲和六律五音者韜畧孫吳識天時人事者暢於詞氣聰於受領善敷奏吐納者咸令所司博採明試朕親擇焉景雲元年十二月文武官及朝集使舉堪將帥詔將帥之任軍國斯重禦侮扞城良才是急頃者武臣多闕戎政莫修聆鼙鼓以載懐筮熊羆而未遇古今一也何代無人南仲方叔之儔亦在用人而已宜令文武官及朝集使五品以上各舉堪將帥者一人明􅏡幽仄無限年位務求寔用以副予懐先天元年十二月諸州舉實才勅致化之道必於求賢得人之要在於徴實頃雖屢存賁帛無輟翹車而駿骨空珍真龍罕覯豈才之難遇將舉或未精且人匪易知取不求備瑰𤦺失於俗譽韜晦嗟於後時宜其博詢州里明􅏡幽仄使筦庫無遺邁軸咸舉其諸州有抱器懐才不求聞逹者命所在長官訪名奏聞武勇者具言謀畧文學者指陳藝業務求實用以副予懐先天二年六月捜揚懐才隠逸等勅勅立政之本惟賢是切朕祗膺天歴殷監逺圖揚於王庭生此王國朕之所望久矣豈徴辟為事未極於岩藪而髙尚絶塵見遺於草澤將何以舉逸而勸賁然来思且才之或偏猶器不求備故非臧文之智則尚其言収曲逆之竒則捐其行過而能改仁逺乎哉天下諸州有懐才隠逸跅弛不調及失職寃人等事並令諸道檢察使博訪具以名聞副朕飢渇之懐庶廣捜揚之義先天二年十一月四日求訪武士詔武設五兵所以安人禁暴臣稱三傑所以戰勝攻取蜀乃一方之主尚得孔明齊為九合之君斯由管仲况宇宙至廣人物至多豈乏英賢無聞韜畧葢用與不用知與不知今邊境未清統遏須將頃林胡蹔擾栁城非捷北虜忽驚西軍莫振罪由失律過在無謀曹劌不言寧知登軾之効淮隂非薦孰膺推轂之勲長想古今是思擢用恐雖霑簮紱猶晦迹於下流或藴智謀尚沉名於大澤不加精訪何以甄収其兩京中都及天下諸州官人百姓有智合孫吳可以運籌决勝有勇齊賁育可以斬將搴旗或坐鎮行軍足擬萬人之敵或臨戎却㓂堪為一隊之雄各聽自舉務通其寔仍令州府具以名進所司速立限期随表赴集朕當親試不次用之其有身見在諸軍統押者但録所能奏聞未須赴集開元九年九月唐大詔令集巻一百二
