body:
  text: 唐大詔令集巻三十五宋宋敏求編諸王除親王官上秦王大尉陕東行臺制秦王兼凉州總管制秦王益州道行臺制秦王天䇿上將制秦王領左右十二衛大將軍制秦王兼中書令制齊王元吉司徒制荆王元景等子孫世襲刺史制鄶王元裕等除官制安州都督吳王恪等除官制相州都督魏王泰雍州牧制鄧王元裕等刺史制相王并州牧制相王雍州牧制相王太子左衛率制宋王成器太子太師制宋王成器太尉等制岐王範華州刺史等制邠王守禮等兼襄州刺史等制郯王嗣直安北大都䕶等制岐王範太子少師等制邠王守禮等兼晉州刺史制除親王官秦王大尉陕東行臺制論道經邦任惟勲德分陕作伯實寄親賢尚書令雍州牧右武侯大將軍上柱國秦王某器宇冲深智謀英果義師云舉首贊竒謀親率熊羆搴旗斬將廓清函夏忠效克彰狡㓂逋誅䖍劉四上總戎薄伐戡剪無遺䇿尚雄逺謀猷沉宻宜在鼎司肅清槐路今區宇方緝鞏洛猶蕪鎮俗治戎允資望實可大尉使持節陕東行臺其蒲州河北諸道總管及東討諸府兵並授節度餘官悉如故武德元年十二月秦王兼凉州總管制京室殷阜鈎陳嚴秘肅遏警巡職務尤重然而玉門遐阻控禦八荒金城衝要尉侯攸屬宣風作牧親賢是寄太尉尚書令雍州牧陕東道行臺左武侯大將軍上柱國秦王某地實藩枝任惟心膂職參三事功著二南識度優閑性理匡濟元戎敷化聲績備舉宜攝九門總司八校撫蒞河右允兼望實可左武侯大將軍使持節凉甘𤓰鄯肅㑹蘭河廓九州諸軍事凉州總管其太尉中書令雍州牧陕東道行臺右武侯大將軍上柱國王如故武德二年五月册秦王益州道行臺制蜀郡沃野田惟井絡控馭卭笮臨制已渝求瘼宣風朝寄尤重總司岳牧是屬懿親太尉尚書令陕東道行臺雍州牧左武侯大將軍使持節凉州總管上柱國秦王某器宇冲深體識明允専征閫外茂績克宣敷政京畿嘉聲巳著鎮撫岷漢僉論攸宜可益州道行臺尚書令武德三年四月秦王天䇿上將制德􅅷􅅷官功􅅷􅅷賞經邦盛則哲王彞訓是以華衮寵章允洽希世之勲玉戚朱干實表宗臣之貴太尉尚書令雍州牧左武侯大將軍陕州道行臺尚書令凉州總管上柱國秦王某締構之始元功夙著職兼内外文教聿宣薛舉盗㓂秦隴武周擾亂河汾受朕専征屢决妖醜然而世充僭擅伊洛未清建德憑陵趙衛猶梗總戎致討問罪三川馭以長筭兇黨窘蹙既而漳濵蟻聚来渡河津同惡相求志圖抗拒三軍爰整一舉克定戎威逺暢九圍静謐鴻勲盛績朝野具瞻申錫寵章實允僉議宜崇徽命位髙羣品文物所加特超恒數建官命職因事紀功肇錫嘉名用標茂實可授天䇿上將位在王公上領司徒陕東道大行臺尚書令増邑一萬户通前三萬戸餘官並如故加賜金輅一衮冕之服玉璧一雙黄金六千斤前後鼔吹九部之樂班劍四十人武德四年九月秦王領左右十二衛大將軍制禦侮折衝朝寄尤切任惟勲德實佇親賢天䇿上將太尉領司徒尚書令陕東道大行臺益州道行臺尚書令雍州牧凉州總管左右武侯大將軍上柱國秦王某宇量凝邈志識明卲爰始締構功叅鼎業廓清秦隴茂績以彰戡定周韓成威遐暢河朔餘㓂取若拾遺濟代逋誅克同振朽宣風都輦綜務朝端政術有聞綱目斯舉宜加褒寵式兼常秩總攝戎機望寔惟允可領左右十二衛大將軍餘並如故武德五年十月秦王等兼中書令制絲綸樞秘寄任帷扆納獻職惟顯要望實兼隆親賢斯屬天䇿上將太尉兼司徒尚書令陕東道大行臺尚書令雍州牧十二衛大將軍秦王某宇量冲深風神爽悟任兼文武聲績著聞司徒并州大將軍稷州刺史左領軍大都督右武侯大將軍上柱國齊王元吉器懷淹宻業紹英茂内外政務克舉加珥蟬餌朝典攸宜某可中書令元吉可侍中餘如故武德八年十一月齊王元吉司徒制三台望重仰恊辰曜五教任隆俯安邦國實資懿德式寄親賢侍中并州大都督左衞大將軍上柱國齊王元吉宇量凝邈風神爽邁徽猷夙著嘉譽早隆出蒞方岳政績兼懋入侍帷扆獻替斯允推轂閫外備展勲庸職司禁旅戎章巳緝爕理之任朝典尤宜可司徒餘如故武德九年二月荆王元景等子孫世襲刺史制門下皇帝受命歩驟之迹已殊經籍所紀質文之道匪一雖治亂不同損益或異至於設官司以制海内建藩屏以輔王室莫不明其典章義存於致治崇其賢戚志在於無疆者也朕以寡昧丕承洪緒寅畏三靈憂勤萬姓考往哲之餘論求經邦之長䇿帝業之重獨任難以成務天下之廣因人易以獲安然則侯伯肇於自昔州郡始於中代聖賢異術沿革隨時復古則義難頓從循今則事不盡中遂規模周漢斟酌曹馬採按部之嘉名參建侯之舊制共治之職重矣分土之實存焉已有詔書陳至理繼世垂範貽厥後昆維城作固同符前烈荆州刺史荆王元景等或地居旦奭夙聞詩禮或望及間平早稱才藝並爵隆土宇寵兼車服誠孝之心無忘於造次風政之譽克著於期月宜冠常典胙以休命其所任刺史咸令子孫世世承襲有司仍准前詔詳為條制奏聞俾克本枝之盛隨天地而長久刺舉之榮鞏山河而無絶貞觀十一年六月授鄶王元裕等官制門下膏腴之地允屬茂親藩屏之重寄深磐石鄶王元裕譙王元名並器懐韶令業尚明敏望兼梁趙譽冠鄷郇並建之議可歸按部之職斯重加兹寵命仰惟國章元裕可使持節鄧州諸軍事鄧州刺史改封鄧王元名可持節夀州刺史改封舒王食邑並如故貞觀十一年正月授安州都督吳王恪等官制門下體國經邦資懿親而作屏設官分職俟方岳以宣風用能式固本枝克隆磐石前安州都督吳王恪等並識量明允體業貞固禮髙彞器望重維城學藝之譽日新忠孝之風早茂分命有典僉議攸歸可依前件相州都督魏王泰雍州牧制門下牧伯之重莫先畿甸周衛之職任切巡警詳求今古必俟賢戚相州都督魏王泰器業凝逺文藻夙成好學見稱樂善不倦入作卿士抑有前規重司文武允膺僉議可雍州牧授鄧王元裕等刺史制門下維翰之寄允屬茂親藩屏之重必資令望鄧州刺史鄧王元裕襟神韶令理識清明夀州刺史舒王元名體業夷雅志尚淹和並夙膺朝寵早蒞藩任政績著於謠俗嘉譽洽於縉紳宜加榮命允兹朝典元裕可梁州刺史元名可許州刺史封並如故相王并州牧制鸞臺神畿緝化咨牧所難天府屯兵命將為重惟賢是辟非親勿居太子左千牛衛率安北都䕶相王旦黄道承暉紫庭趨訓儀表瓌傑識量虛明資忠孝以立身仗經書而致德勇髙衛霍詞優楊史必能外振威聲内清戎政宜膺夾輔之寄兼司羽翼之重可并州牧餘如故長安二年五月相王雍州牧制鸞臺京輔才難神畿化首四方取則萬邦承流自非明德懿親何以宣風翊政并州牧太子左千牛衛率相王旦紫庭趨訓青社疏封雅度冲深瓌資秀傑忠孝天假禮樂日宣闕聲髙卧䕶懷共理之幹有兼辨之能宜紆朝綍用清都輦可雍州牧長安二年七月相王太子右衛率制鸞臺宫寮之任朝選所難相王旦地在懿親躬此明德持沛獻之法度河間之儒雅元良肇建博望初開徽章既陳禁旅増肅宜紆金璽之重式掌銅樓之衛可依前件宋王成器太子太師制門下孟侯之禮雖歸於冢𦙍太伯之風實尚於髙莭左衛大將軍宋王成器幼而聰敏長而温仁禮樂同歸質文相半孝以為政毎用因親忠以立誠所期尊主故能樂於為善好在儒服占蟻穴以探㣲登雀臺而成賦自奄有梁宋作藩邦家其儀孔臧其德可大朕之元子當踐嗣君以隆基有大功神祗僉屬由是朕前懇讓言在必行天下至公誠不可奪奚有立季之典庶協從人之願况别為九州必資於牧伯貞夫萬國允佇於師傅式副僉諧之求仍光不拜之寵可太子太師雍州牧揚州大都督别加實封二千戸賜物五千段紬馬二千疋奴婢十房金銀器皿二百事甲第一區良田三十頃餘如故主者施行唐隆元年六月二十五日宋王成器太尉等制門下古有知通於道情辨於物可以調隂陽節風雨者委之三事以康萬人鼎鼐之謂也司空兼揚州大都督上柱國宋王成器益州大都督兼右衛大將軍申王成義單于大都䕶兼右金吾衛大將軍邠王守禮等並明德茂親崇儒樂善為國翰屏當朝羽儀豈其朱茀之詩美則緇衣之咏寜止愛均花蕚禮錫苴茅而巳哉必能論道經邦佐朕為政俾允升台之望宜膺補衮之闕成器可太尉兼揚州大都督成義可司徒兼并州大都督守禮可司空勲如故主者施行先天二年八月九日岐王範華州刺史等制黄門周以魯衛之親夾輔王室漢以間平之親来朝京師旁稽舊章允廸前訓太常卿兼左衛率并州大都督岐王範荆州大都督兼秘書監薛王業等朕之同氣邦之偉才周旋禮樂佩服儒雅爰職奉常則墜典咸秩是司外史則羣言罔遺光我謩猷敷於事典日同問安之慶時歸受制之連出入重於楚元終始欽於沛獻家人撫愛雖屬於從梁國史垂聲必期於分陕廼眷畿輔不逺闉闍漆沮既從河華作鎮削桐所寄磐石攸宜遂其至公之請佇聽牧人之術範可使持節華州諸軍事兼華州刺史大常卿勲封如故業可使持節同州諸軍事兼同州刺史秘書監勲封如故至州日須稍優游不可煩以細務自非大事及奏事餘並令上佐知主者施行開元二年十月二十九日邠王守禮等兼襄州刺史等制黄門樹於藩屏莫非親屬居以形勝必任親賢司空兼隴州刺史邠王守禮德比間平賢於魯衛動不忘於仁恕言必備於忠肅入聨花蕚擁駟来朝出割竹符憑熊往鎮睠茲樊鄧是稱漢沔惟城池之枕倚乃川陸之雄要故鳴騶戒路建隼為邦副朕陜東之美更聞峴南之政可使持節襄州諸軍事兼襄州刺史司空勲如故至州日須稍優游不可煩以細務自非大事及奏事餘並令上佐知主者施行開元三年十二月九日郯王嗣直安北大都䕶等制黄門虞放三苖允歸於敷德周稱二陕用切於聞政頃以驕子天亡匃奴運盡願為臣妾者望塞欵門編我􅡦黎者雲屬波委北窮大漠西被流沙撫而柔之僉曰分命郯王嗣直陜王嗣升聰察天假英明日新忠肅恭懿寛仁孝友探沛易之彖象自詣精㣲讀楚詩之比興能𫝊麗則故可揚威懷之㫖宣鎮静之風畀以藩翰俾清疆場嗣直可安北大都䕶仍充安撫河東門内隴右諸蕃部落大使嗣升可安西大都䕶仍充河西道四鎮諸蕃部落大使右衛大將軍兼安北大都䕶上柱國長平郡開國公張知運右羽林大將軍兼安西大都䕶四鎮經畧大使上柱國潞國公郭䖍瓘等國之老臣朝之宿將長䇿子房所以運籌安邉逺圖充國所以言事必能寛則得衆恵以養人各綏一方兼委佐貳知運可安北大都䕶仍兼郯王府長史及安撫諸蕃副大使䖍瓘可安西副大都䕶仍兼陕王府長史安撫諸蕃副大使餘如故主者施行開元四年正月二十一日岐王範太子太師等制黄門贊翼皇儲允歸師保崇敬叔父諒屬親賢虢州刺史岐王範秘書監兼幽州刺史薛王業等明允篤誠温良恭儉忠孝光於令典儒雅偉於成業自為我藩翰擁其干旌雅門卲伯之詩尤羡魯公之政雖頒條是務而道理兼資因入拜於承明佇来儀於博望範可太子太師兼虢州刺史業可太子少保兼幽州刺史勲封等各如故主者施行開元四年六月七日邠王守禮等兼晉州刺史制禮著睦親書稱分命鎮彼黎獻莫如兄弟司空兼滑州刺史上柱國邠王守禮開府儀同三司兼潭州刺史上柱國宋王憲司徒兼虢州刺史上柱國申王撝太子少師兼鄭州刺史上柱國岐王範太子少保兼衛州刺史薛王業等朕之花蕚人之珪璋文儒在躬孝友成性入踐朝列望優植武出綜藩條聲均魯衛鳬在涇水鸑鳴岐山新田擬於晉汾舊陕鄰於虢國眷兹翰屏宻邇京都宜扇百城之風佇延九野之潤守禮可使持節晉州諸軍事兼晉州刺史範可持節涇州諸軍事兼涇州刺史撝可使持節絳州諸軍事兼絳州刺史範可使持節岐州諸軍事兼岐州刺史業可使持節虢州諸軍事兼虢州刺史餘各如故務非灼然要重者各令上佐知開元元年十二月唐大詔令集巻三十五
