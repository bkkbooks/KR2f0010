body:
  text: 唐大詔令集巻一百十四宋宋敏求編政事祥瑞諸符瑞申所司詔不許奏祥瑞詔令諸道不得奏祥瑞詔醫方疾病附諸州置醫學博士勅牓示廣濟方勅頒廣利方勅三衛彍騎疾病給食料勅收􅄟收􅄟隋末喪亂骸骨詔掩暴露骸骨詔􅄟突厥骸骨詔剗削京觀詔收𦵏隋朝征遼軍士骸骨詔埋􅄟暴露骸骨勅收𦵏陣亡將士及慰問其家口勅收􅄟京城骸骨詔禁錮禁錮隋朝弑逆子孫勅楊素子孫不得任京官制雜録隋代公卿不預義軍者田宅並勿追収詔不許言中興勅改丹水為懐水勅江王下教祥瑞諸符瑞申所司詔自昔帝王受天明命其有二儀感徳百靈錫祉莫不君臣動色歌頌相趨朕恭承大寳情深夕惕每見表奏符瑞慙恧増懐且安危在乎人事吉凶繫於政術若時主昏虐靈貺未能成其美如治道休明咎徴不能致其惡以此而言未可為恃今後麟鳯龜龍大瑞之類依舊表奏自外諸瑞宜申所司奏者唯顯瑞物色目及出見處更不得茍乗虚飾徒致浮詞貞觀二年九月不許奏祥瑞詔朕以寡昧纉承丕業永思至理所寳惟賢至如嘉禾神芝奇禽異獸葢輔化之虚美也所以光武形於詔令春秋不書祥瑞朕誠薄徳思及前人自今已後所有祥瑞但令依式申報有司不須聞獻其珍禽奇獸亦宜停進宣示天下知朕意焉令諸道不得奏祥瑞詔朕以菲徳祗膺大寳深求理本將致時雍以慈惠恭儉為休徴以人和年豐為上瑞夙夜思省無以過之至於嘉頴連理之祥飛禽走獸之異出自邦國来獻闕庭虚推功徳非予所尚嵗晏奏陳於清廟元正列薦於上朝探討古今亦無明據恭惟靈聖豈候薦聞事匪經常允當釐正庶使溥天之下知予務實之心其諸道應有三等祥瑞並不得更有聞奏亦不要申牒所司其臘饗太廟薦獻太清宫并元日受朝奏祥瑞儀注宜停醫方疾病附諸州置醫學博士勅勅神農嘗草以療人疾岐伯品藥以輔人命朕銓覽古方永念黎庶或榮衛内擁或寒暑外攻因而不救良可歎息今逺路僻州醫術全少下人疾苦將何恃賴宜令天下諸州各置職事醫學博士一員階品同於録事每州冩本草及百一集驗方經史同貯其諸州於録事各省一員中下州先有一員者省訖仰州補勲散官開元十一年七月牓示廣濟方勅朕頃者所撰廣濟方救人疾患愛民育物惠彼黎元特念僻逺之家未能繕冩閭閻之内或有不知儻醫療失時因至天横性命之際寧忘惻隠宜命郡縣長官就廣濟方中逐要者於大板上件録當村坊要路牓示仍委採訪使勾當無令脱錯天寳五年八月頒廣利方勅勅立國之道莫重於愛民育物之心期臻於夀域故安其性命順其莭宜使六氣不差百疾不作斯亦救人之要也朕以聴政之暇思及黎元母慮温濕不時壅欝為癘或僻逺之俗難備於醫方或貧匱之家有虧於藥石失於救療遂至傷生言念於兹載深憂軫屬春陽在候寒暑方交閭里之間頗聞疾患每因服餌尤感予𠂻遂閲方書求其簡要並以曽經試用累驗其功及取單方務於速効當使疾無不差藥必易求不假逺召醫工可以立救人命因加纂集以便討尋類例相從勒成五巻名曰貞元集要廣利方宜付所司即頒下州府閭閻之内咸使聞知三衛彍騎疾病給食料勅育物者所貴於從宜養人者必資於遂性况加疾苦豈忘哀矜内外廊三衛彍騎等如聞因當上染患者番滿之後既不勝致還鄉又不容在職掌思彼進退無據何所依投溝壑是憂豈謀朝夕永言及此深軫於懐自今已後如有此色宜移就三衛厨給食料將養各委左右金吾將軍存意檢校所須藥物仍與太常計㑹量事供擬並差醫人救療其諸門及街鋪職掌人等各委將軍以當衛諸色殘官等且量事支給其醫藥宜准内外廊例自餘色當畨人等有疢疾者並准此處分其有身死者各委所由隨事埋瘞當日牒報本貫令家人親族運致還鄉天寳三年八月收􅄟收􅄟隋末喪亂骸骨詔自隋室不綱政刑荒廢戍役煩重師旅荐興元元無辜墮於塗炭轉死溝壑暴骨中原室黨淪亡邑居散逸墳隴靡託營魂無歸朕受命君臨為民父母率土之内情均亭毒一物失宜寢興軫慮念兹道殣義先弔恤雖復令已頒下普遣𦵏埋猶恐吏不存心收􅄟未盡宜令州縣官司所在奉行掩骼埋胔必令周悉使郵亭之次先復逰魂窀穸之下各安所厝姬文惠化恩及枯骸庶踵於前此焉非類武徳年掩暴露骸骨詔隋運將盡羣凶鼎沸干戈不息饑饉相仍流血成川暴骸滿野朕往因軍旅周覽川原每所臨視用傷心慮自祗膺寳命義切哀矜雖道謝姬文而情深掩骼諸色骸骨暴露者宜令所在官司收斂埋瘞稱朕意焉貞觀二年四月􅄟突厥骸骨詔突厥種落往逢災癘疾疫饑饉殞喪者多暴骸中野前後相屬幽魂靡託醪奠無所本官矜悼有懐惻隠宜令所司於大業長城以南分道巡行但有骸骨之所酒酺致祭速為埋􅄟務令周悉以稱朕意貞觀四年九月剗削京觀詔甲兵之設事不獲已義在止戈期於去殺季葉馳競恃力肆威鋒刃之下恣情剪馘血流漂杵方稱厥意屍若亂麻自以為武露骸封土多崇京觀徒見安忍之心未𢎞掩骼之禮静言念此憫歎良深但是諸州有京觀無問新舊宜悉剗削加土為墳掩蔽枯朽勿令暴露仍以酒酺致奠焉貞觀五年二月収𦵏隋朝征遼軍士骸骨勅詔自隋師渡遼時非天賛從軍士卒骸骨相望遍於原野良可哀歎掩骸之義仰惟先典其令並収𦵏之貞觀十九年四月埋􅄟暴露骸骨勅移風易俗主化之大猷掩骼埋胔時令之通典如聞江左百姓之間或家遭疾疫因此致死皆棄之中野無復安𦵏情禮都闕一至於斯習以為常乃成其弊自今已後宜委郡縣長官嚴加誡約俾其知禁勿使更然其先未𦵏者即勒本家収𦵏如或無親族及行客身亡者仰所在鄰封相共埋瘞無令暴露庶叶禮經諸道有此同者亦宜准此天寳元年三月収𦵏陣亡將士及慰問其家口勅賈至勅自冦戎猾夏干戈不戢涉三載矣而忠臣義士死王事者何可勝言兹朕痛悼於厥心若挾瘡痏是用枕戈寢胄親總六師恃神祗之祐凴宗廟之靈亦兾尅清載造京邑近者諸軍告捷屢摧賊衆天意人事若將叶符而戰士陣亡多委溝壑已令収瘞猶慮或遺撫存哀殁朕之所切宜令莭度使與郡縣長官計㑹悉収骸骨埋𦵏致祭仍勘責姓名續行奏聞將褒贈其官爵優恤其妻子仍伸本道使者郡縣勿差科其家庶乎幽明慰懐知王師之不得已也至徳二年収𦵏京城骸骨詔凢在生靈合登仁夀自逢艱阻多致傷殘或冦盗為灾斃於鋒鏑或嵗時不稔道殣相望枯骨轉屍多未埋瘞朕為人父母良深憫惻將何以示掩骼之禮希塟骨之仁永念前修豈􅁯言訓其京城内外應有舊骸骨宜令京兆府即勾當収拾埋􅄟仍令中使與所申計㑹致祭寳應年禁錮禁錮隋朝弑逆子孫詔宇文化及弟智及司馬徳戡裴䖍通孟景元禮楊覽唐奉義牛方裕元敏薛良馬舉元武達李孝本李孝質張愷許𢎞仁令狐行達席徳方李覆等大業季年咸居列職或恩結累世任重一時乃包藏凶慝罔思忠義爰在江都遂行弑逆罪百閻趙釁深梟獍雖事是前代嵗月已乆而天下之惡古今同棄宜從重典以勵臣莭其子及孫並宜禁錮勿令齒叙化及既為魁首僣竊名號一門之内凶惡尤甚但其弟士及不預逆謀雖云昆季僅免誅戮委賛皇朝勲庸克著彰善癉惡伸有舊章士及一房不在此例布告天下咸使聞知貞觀七年正月楊素子孫不得任京官勅隋尚書令楊素昔任前朝早荷殊遇稟凶邪之徳懐諂佞之才惑亂君上離間骨肉搖動冢嫡寧唯掘蠱之禍誘扇後主卒成請蹯之釁隋室喪亡葢唯多僻究其萌兆職此之由生為不忠之人死為不義之鬼身雖幸免子竟族誅斯則奸逆之謀是其庭訓險薄之行遂成門風刑戮雖加枝𦙍仍在豈可復隨近侍齒列朝行朕接統百王恭臨四海上嘉賢佐下惡賊臣常欲從容於萬機之餘褒貶於千載之外况年代未逺耳目所存者乎其楊素及兄弟子孫已下不得令任京官及侍衛聖厯三年五月雜録隋代公卿不預義軍者田宅並勿追収詔隋政不綱行止無度東西馳騁靡嵗獲寧遂使父子乖離室家分拆親老絶晨昏之養嬰孫無撫育之恩人懐戀本之心家有望鄉之歎朕上膺靈命下字黔黎一物失宜情深軫悼思俾惠澤逮於鰥寡其隋代公卿以下爰及民庶身往江都家口在此不預義軍者所有田宅並勿追収若困窮粮食交絶具録名簿速加賑贍武徳元年七月不許言中興勅勅朕承天宰物光宅中區嗣祖宗之丕基承聖善之洪業嚮明冕扆實奉成規往自永淳至於天授姦臣稱亂鼎運不安則天大聖皇后思顧託之隆審變通之數忘已濟物從權御宇四海由其率順萬姓所以咸寧唐周之號暫殊社稷之祚斯永天寳實固所由於兹朕所以撫璇璣握金鏡事惟繼體義即纉戎豈若文叔之起舂陵少康之因陶正中興之號理異於兹宜革前非以歸事實自今已後更不得言中興其天下大唐中興寺觀宜改為龍興寺觀諸如此例並即令改神龍三年二月改丹水為懐水勅勅不息惡木􅃘渴盗泉行道之人避惡名也朕嘗覽上古記稱秦坑趙卒血流丹峪名其水為丹水者方經此路懐古惻然邑號獲嘉地稱修武前王故事將有所憑宜改丹水為懐水改丹水府為懐仁府其鄉里名號亦仰州長官隨事改易開元十三年三月江王下教大行皇帝聴斷英明臨下以法將期致理以靖區宇而奸兇搆禍矯宣遺言不詢羣臣専斷神器寡人義重君臣毒甚手足乃親率左右䕶軍中尉心腹近臣及諸職事官等并左右神策六軍使兼諸軍使及將士并飛龍將士等捜擿伏慝大擒諸賊或血刃當辜或赴井而斃其頭首劉克明田務澄王嘉憲石定寛等二十八人並正刑書罔有漏逸此皆宗社威靈文武協力豈伊菲薄敢貪天功凡百多士中外藩岳致兹刷憤哀慶當同大行皇帝正柩於太極殿前率依光陵故事有司條上務盡誠敬其冢宰司空平章事裴度當攝立功將士莭級各有優賞布告遐邇咸使聞知寳歴年唐大詔令集巻一百十四
