body:
  text: 唐大詔令集巻七十三宋宋敏求編典禮東郊親祀東郊德音北郊太極元年北郊赦明堂詳議明堂制度詔頒明堂制度詔親享明堂制明堂災告廟制親祀明堂赦社稷親祀太社詔昇社稷及日月五星為大祀勅東郊親祀東郊德音皇王之化載籍所陳將奉天而育物必順時而行教雖禮文則著而親祠葢闕朕自膺寳歴且踰二紀承宗社之蕃祉因公卿之叶心萬物阜成庶務簡易思以黎獻臻夫仁壽是用敦本復古將必稽於月令謀始作則先有事於春郊宜因展禮之辰式布維新之澤其天下見禁囚應死罪者特宜免死配流嶺南以下罪並放免朕每念黎甿敝於征戍親戚多别離之怨闗山有徃復之勤何嘗不惻隠於懷寤寐増歎所以别遣召募以實邉軍錫其厚賞使令長往今諸軍所召人數尚足在於中夏自能罷兵既亡金革之事足保農桑之業自今以後諸軍兵健並宜停遣其現鎮兵並一切放還京圻之内雜役殷繁言念劬勞豈忘優恤頃者擽陽等縣地多鹹鹵人力不及便至荒廢近者開决皆生稲苖亦既成功豈專其利京兆府界内應新備田並宜㪚給貧下及逃還百姓以為永業書不云乎不作無益害有益語不云乎奢則不遜儉則固緬惟前古常切在心將斵雕以為樸期上行而下效自今以後王公並不得以珍物進獻所司應縁宫室修造務從節儉但蔽風雨勿尚華飾至如金玉器物諸色雕鏤朕縁蕃客所要將充晏賞今流俗之間逓相倣效既捐財於無窮仍作巧以相矜敗俗傷農莫斯為甚並一切禁斷以絶浮華古者鄉有序黨有塾將以𢎞長儒教誘進學徒化人成俗率由於是斯道久廢朕用憫焉宜令天下州縣每一鄉之内皆别置各學仍擇師資令其教授其諸州鄉貢進士毎年引見訖並令就國子監謁先師所司設食學官等為之開講質問疑義且公侯之𦙍皆禀義方學禮聞詩不應失墜容其徼幸是長慢遊如聞近来𢎞文館學士縁是貴冑子孫多有不専􅀴業便與及第深謂不然自今以後宜一依式令考試朕之爵位惟待賢能雖選士命官則有常條而安卑遁跡尚慮遺才其内外八品以上官及草澤官有學業精博蔚為儒首文詞雅麗通於政術為衆所推者各委本州本司長官精加搜擇具以聞奏發生之月實在於行仁利物之心莫先於作善先斷捕獵令式有文所由州縣宜嚴加禁止其每年千秋節日仍不得輙有屠宰道釋二門皆為聖教義歸𢎞濟理在專崇其天下觀寺有絶無女道士僧尼者宜量觀寺大小度六七人間擇灼然有經業戒行為鄉閭所推仍先取年髙者凡百卿士朕之同德宜勉修所職以合時令禮有施惠義兼行賞實為其時固不可缺亞獻忠王璵宜賜物一千疋終獻頴王璬賜物五百疋邠王守禮寧王憲各五百疋慶王悰以下及長公主郡縣主二王後京文武官賜帛各有差天下諸州侍老宜令所由長官量賜酒肉務在優養今朝廷無事天下太和美景良辰百官等任追勝為樂宜即布中外咸使聞知開元二十六年正月北郊太極元年北郊赦門下朕聞大事在祀禮極乎郊丘大道日生道存乎赦宥故至誠斯感允接神明之休盛典聿修必敷雷雨之施古先帝代躬祀后土所以崇兼載之功配博臨之義有虞氏之合禘徧於山川成周氏之從祀逮於林澤西漢汾隂之睢東洛翠媯之禪雖制未備而道極可觀曹馬以還數百餘載葢設儀而不復或誠信而未孚有廢祀莫能得舉我國家受命也承百王之季啟三統之元髙祖神堯皇帝膺籙受圖繼天立極太宗文皇帝弔人伐罪南征北怨是用拯生靈於塗炭登物𩔖於休和髙宗天皇大皇帝惟睿作聖垂衣而理大聖天后受託從權當宁而化中宗孝和皇帝允㳟克譲守文御武能致刑措於變時雍朕以渺身恭荷丕構常恐政理乖中風雨愆期惕厲周於萬户疚懷切於一物幸乾坤交泰宗社降靈氣無疵癘之災物遂生成之性呼韓慕化侍子来庭月支請職名王入貢大荒同軌瀛海無波俯循凉德載懷寅畏故以歳首肅事禋宗爰撰令辰親祀方澤採黄圖之舊制定黒畤之前基心謀取則於禮經宥宻同規於詩頌三祖登配羣望畢從咸池之舞在列合鍾之管斯應祥風入候當乎八變之殷瑞日揚暉屬乎三獻之始臣工助而胥悦兆庶觀以相趨誠敬克申感慶交集頃縁郊籍巳肆眚災貸宥之道未應累降但精享云缺既曠代而方循福釐所被思寰宇之同沐宜因大典式暢洪恩可大赦天下改太極元年為延和元年五月十三日昧爽以前大辟罪以下咸赦除之其十惡及劉誠之胡太宰徒侣官人受贓並不在赦限文武官預大禮各賜勲一轉桓彦範敬暉崔𤣥袁恕張柬之等特還其子孫實封二百户大酺五日明堂詳議明堂制度詔朕聞合宫靈府創鴻規於上代太室總章標茂軌於中葉雖復質文殊制奢儉異時然其立大中作人極布政施教歸之一揆朕嗣膺下武丕承上烈思所以答眷上靈事遵孝養而法宫曠祀明堂寢構永言大禮朕甚懼焉宜命所司與禮官學士等考覈故事詳議得失務依典禮造立明堂庶曠代闕文獲申於兹日因心展敬永垂於後昆其明堂制度宜令諸曹尚書及左右丞詳議頒明堂制度詔首出萬物實顯崇髙之模徳普八方乃睹昇平之盛合宫聽朔闡黄軒之茂範靈符通神敷帝勛之景化殷人陽館青珪備禮姬氏𤣥堂彤璋合獻雖運殊麗翰時變質文至於立大中建皇極軌物施教其歸一揆洎乎西京創厯駮政逾繁東漢開基舊章猶闕考圖汶上僅存公玉之儀度室圭躔纔紀中元之製三方鼎據祚傾於金馬五胡塵擾道䘮於蒼鵝自此相仍時經板蕩遂使陟配之典久淪於縣載端扆之化允屬於隆平朕恭膺寳命肅奉瑶圖昧旦求衣昃影忘食賴上𤣥垂祐宗社降靈幽明宅心中外禔福封金岱嶺昭累聖之鴻勲勒石九都成文考之先志功標偃革時㑹委裘固可以作化明堂顯榮太室修機之厯既表於嘉明布政之宫式崇於美制是用求中景日取則隂陽考廣袤於裁圭定髙卑於置􅈏傍羅八柱周建四墉架宇儀天疏基象地忩闥齊布應路並興導璧水以環階應璇衡而結極重阿複道用循測管之模上圓下方仍准分蓍之數木工不琢土事無文豐約折􅇆經始勿亟勾芒候序入春圃而司儀蓐収届時下秋園而奉職事符神道鉤繩之用畢陳儀叶子来釁落之期非逺将以肅清禋祀展殷薦於皇靈施號法宫揚休聲於大帝百神受贄咸尊孝享之風萬國来庭共覩太平之政闕文斯備大禮聿修制作之規可依别勅宜頒示天下永垂来葉親享明堂制昔軒黄御厯朝萬國於合宫丹陵握符咨四岳於衢室有虞輯瑞總章之號既存大禹錫圭重室之名攸建殷人受命置陽館以辨方周室凝圖立明堂以經野用能範圍三極幽贊五神展尊祖之懷申宗祀之典爰從漢魏迨及周隋經始之制雖興修廣之規未備朕以庸昧䖍膺厚託受寄於綴衣之夕荷顧於仍几之前伏以髙宗往年巳屬意於陽館故宗輔之縣預紀明堂之名改元之期先著總章之號朕於乾封之際已奉表上陳簡在宸心未遑營構今以鼎郊勝壤圭邑名區處天地之中順隂陽之序舟車是輳貢賦攸均爰藉子来之功式遵奉先之㫖夫明堂者天子宗祀之所朝諸侯之位也開乾坤之奥䇿法氣象之運行故能使災害不生禍亂不作眷言是烈豈不美歟比者鴻儒禮官所執各異咸以為明堂者置三里之外七里之内在國陽明之地今既俯邇宫掖恐黷靈祗誠乃布政之居未為宗祀之所朕以景已之地去宫遥逺每月所居因時享祭常備文物動有煩勞在於朕懷殊非所謂今故裁基紫掖闢宇彤闈經始肇興成之匪日但敬事天地神明之德乃彰尊祀祖宗嚴恭之志方展若使惟云布政負扆臨人則茅宇土階取適而已豈必勞百姓之力制九筵而御哉誠以獲執蘋蘩䖍奉宗廟故也時既沿革莫或相遵自我作古用適於事今以上堂為嚴配之所下室為布政之居光敷禮訓式展誠敬来年正月一日可於明堂宗祀三聖以配上帝宜令禮官博士内外明禮者詳定儀注務從典要速以奏聞者垂拱四年十二月明堂災告廟制朕君臨紫極撫育蒼生普該有識之流為啟無疆之福神宫之後式建尊容頃縁内作工徒􅀫火誤燒麻主遂渉明堂然朕昧旦憂勤不遑寢食慮虧至道未副天心内省厥躬伏増寅畏槐棘署衆僚庶尹宜竭廼誠各揚其職内作工匠可即放還刺史縣令風化之首宜矜恤鰥寡敦勸農桑均平賦役省察姦盗里閈妖訛尤加嚴禁逺近寃訟令早决斷見禁囚徒速為處分老病之色征鎮之家亦令州縣加意撫存諸作非要切者量事宜停所司供進之物並宜節減其長才廣度沉跡下僚據德依仁韜聲幽閉懷王佐之器乏知巳之容宜令京官職事五品以下及刺史上佐縣縣令等各准狀薦舉仍遣内外文武百官九品以上各上封事極言正議無有所隠親祀明堂赦朕聞惟天為大所以上序三宗惟帝為尊於是宏開七廟故知肇興衢室爰申宗祀之規乃建明堂式廣嚴禋之禮莫不八窗四闥分景氣於炎凉複廟重簷定尊卑於昭穆實為國之洪訓乃經邦之茂典我國家聖祖神宗重光累業道軼羲農之上功侔造化之初冠今昔而居尊掩寰區而作大朕承天撫運纘聖開元披鳯厯而乗時握龍圖而建極春秋變易每増霜露之心日月推移倍切蒸嘗之思然而城臨丹鳯清廟久安水控𤣥龜神基未立金輿往幸空展望於遥祠玉輦来廵實幸親於碣石三川帝里八水皇州豈皇邑之相誇乃都畿而有謝所以交風奥壤還開候厯之庭揆日名區更置馴龍之室嵬嵬紫座無虧薦鮪之途奕奕丹宫遂得獻羔之所加以總章霧闢重屋煙披懸曉日於海梁挂晴虹於柱棟是以用斯圭璧奠彼牲牢鳴孤竹之簫管奏空桑之琴瑟爰於附享之日乃至禋宗之晨景色殊長煙雲冠古或凱風南至扇喜氣而分輝或驟兩東来引祥雲而合嚮固可以作樂崇德殷荐上帝而碧海遥澄覺三邉之霧巻丹霄上廓看九野之塵清祖宗之靈貺昭然宇宙之神心可見䖍奉既展盛禮斯𢎞宜覃作解之恩以廣奉先之德但赦者小利而大害始泰而終否著小人之幸非君子之幸今歳以来頻敷渥命徒長僥倖逾犯憲章非所以𢎞奬風猷發揮名教深慮無知者因兹獲罪有識者縁此致譏遐思管仲之編􅃡想吳漢之説恐負丕構慨然長想昔孔明相蜀王猛佐秦咸以數赦為言俱稱肆眚非便朕惟新闡政方事澄源期望古而裁規且修今而布澤伏以禮申崇祔情展恭禋式流曠蕩之恩兼明懲勸之道可大赦洛州境内天下諸州見禁囚徒應至死者特宜免死配流者入􅑫餘並原宥在京文武三品以上賜爵一級四品以上各加一階内外文武九品以上賜勲一轉皇親嗣王郡王仍特許佩金魚袋内外職事官三品以上及四品清官并中書門下五品父已亡者並量加追贈如聞天下諸觀皆畫化人之變諸寺亦畫老君之形一種尊容兩俱不可限制到後十日並除却有故留者即科違勅罪其化胡經先有明勅禁斷如聞在外仍頗流行自今諸部化胡經事及諸凡説化胡事處並宜除削在外百姓之家百兩未行二親俄殞殁停哀之際便即成婚遂輟苴絰之容敢申花􅈟之禮寜戚之容安寄罔極之志缺如敗俗傷風莫過於此自今後宜令懲革自𢎞道以前繼任相三年已上及秦府晉府僚佐四品以上并食實封功臣雖經罪責不致破家子孫無任京官者特宜優與一官英府周府舊僚五品以上官子孫亦宜准此天下百姓為父後者各賜古爵一級大酺三日又制内外文武四品以上官并縣令京司清官九品以上各舉孝弟廉讓一人神龍元年九月社稷親祀太社詔厚地載物社主其祭嘉穀養民稷惟元祀列聖垂範昔王通規建邦正位莫此為先爰既旦都邑建於州里率土之濵咸極莊敬所以勸農務本修始報功敦叙教義整齊風俗末代澆浮祀典虧替時逢䘮亂仁惠施薄壇壝缺昭備之禮鄉里無紀合之訓朕握圖受厯菲食卑宫奉圭璧於尊嚴潔粢盛而禋燎尚想躬稼勵精治本永言復禮深存往紀是以吉日惟戊親祀太社率從百寮以禮九穀今既南畆俶載東作方興州縣置禮宜盡祇肅四方之民咸勤植藝隨其生𩔖命為宗社京邑庶士臺邑羣臣里閈相從共遵社法以時供祀各申祈報兼存宴醑之義用洽鄉黨之歡具立節文明為典制進退俯仰登降折旋明加誨勵逓相勸奬齊之以禮有耻且格布告天下即宜遵用武德九年正月昇社稷及日月五星為大祀勅孫逖勅祭之為典以陳至敬名或不正是相奪倫况社稷孚佑百代䝉其福日月臨照五星叶其紀兆人允殖下土式曕既超言象之外須極尊嚴之禮列為中祀頗紊大猷永言允當必在刋革自今以後社稷日月五星並昇為大祀仍以四時致祭諸星升為中祀庶昭報之誠格於上下欽崇之稱合於典則唐大詔令集巻七十三
