body:
  text: 唐大詔令集巻二十五宋宋敏求編妃嬪册楊㳟道女為媫妤文册崔𢎞道女為才人文册蕭鏗女為美人文册蕭鑠女為美人文起復上官氏媫妤制皇帝良姊董氏等貴妃誥睿宗皇妃豆盧氏等食實封制趙國夫人一品制册元妃某氏弟為貴妃文良姊楊氏等為貴妃詔册獨孤頴女為貴妃文許氏等才人制鄭氏才人制贈妳婆元氏潁川郡太夫人制媫妤王氏為淑妃劉氏為賢妃制吳氏等昭儀制王氏才人制册楊㳟道女為媫妤文維貞觀某年月日皇帝遣使某官某持節册命曰於戲惟爾前魏王府諮議叅軍楊㳟道第三女門襲鍾鼎訓彰禮則幽閑表質柔順為心備職後庭實為通典是用命爾為媫妤徃欽哉其光膺徽命可不慎與册崔𢎞道女為才人文維貞觀某年月日皇帝使某官某副使某官某持節册命曰於戲惟爾兼徐州都督府司馬崔𢎞道長女門稱著姓訓有義方婉順為質柔明表行宜升後庭備兹内職是用命爾為才人徃欽哉其光膺徽命可不慎與册蕭鏗女為美人文維貞觀年月日云云於戲惟蕭鏗第二女幼習禮訓夙表幽閑曺出鼎族譽聞華閫宜遵舊章授以内職是用命爾為美人徃欽哉其光膺徽命可不慎與册蕭鑠女為美人文維貞觀年月日云云於戲惟蕭鑠第二女禀訓冠族著美家聲習禮流譽鏡圖有則宜升後庭允兹令典是用命爾為美人徃欽哉其光膺徽命可不慎與起復上官氏為媫妤制門下易著鳴謙禮稱辭貴所以崇讓而退滿推心自得其道彌光前昭容上官氏相門積善儒宗雅訓文學冠時柔嘉順則内守恬淡外防奢侈發於少長持以周旋樂無靡嫚衣必澣濯珠璣不珍墳籍為寳故能誠切一室功宣兩朝讜議日聞屢援楚筆忠規歳納方輕漢輦惟此邦媛鬱為宫師遂能德綜十倫孝髙百行頃罹創巨爰命權奪秩茂左嬪思被光寵志齊班女懇陳撝挹而賢明之業經濟之才素風逾邁清輝益逺不成厥美將蔽斯言今依表奏以憲圖史可起復媫妤主者施行景龍二年十一月二十九日皇帝良娣董氏等貴妃誥闗睢之化始於國風貫魚之序著於大易用能輔助王道叶宣隂教皇帝良娣董氏良姊楊氏良媛武氏等門襲鍾鼎訓彰禮則器識柔順質性幽閑美譽光於六宫令範成於四教宜升徽號穆兹朝典董氏可貴妃楊氏可淑妃武氏可賢妃延和元年十月睿宗貴妃豆盧氏等食實封制有德者位崇有功者秩厚事本闗於國體理無隔於邦媛故周母有亂臣之名漢嬪有比侯之爵睿宗貴妃豆盧氏賢妃王氏性質隂禮實毗内政訓行九御譽滿六宫歳祀雖淹徽音未昧宜啟非常之命特賜湯沐之邑可各食實封二百戸趙國夫人一品制門下問君以禮乃受齊封免主於厄方延漢渥賢妃啟邑薦古闕時趙國夫人義範端肅操履堅正四德聿修六宫攸仰承恩蘭掖累變葭灰送徃事居備盡忠勤之節利人益國每陳匡贊之規頃屬二䜿搆兇九重起亂將危宗社謀害聖躬屬申逐烏之誠克勵鷹鸇之志方効節於松竹宜寵錫於苴茅可一品册元妃某氏弟為貴妃文維年月日皇帝若曰易著六位正天下者先齊於家詩本二南厚人倫者理成於國垂芒耀於帝極符紀粲乎河圖蠲潔莊齊祗奉織紝膺是典册宜歸淑明咨爾元妃某氏濬源洪宗靈𣲖茂緒植性懿哲禀姿端柔竭奉兩宫總理衆御𢎞古以行已逮下以率入循師傅之嚴躬勤儉之訓色不恃貴言無矜驕和以能容遜以自牧致兹蘭馥洽於椒房是宜守四星以居元冠三妃以推應今遣使某官某副使某持節册命為貴妃爾惟公乃視聽底於聰明聽靡有偏視靡有惑言違而志必觀其誠匡順而心必觀其佞婦順之化資汝而彰隂教之端資汝而正敬之戒之無替成命可不慎與良姊楊氏等為貴妃詔詔曰六位時成方祗所以載物四始爰著樛木於焉逮下故能風化聿定肅雍昭被皇后䖍㳟粢盛儀刑邦國詠螽斯而闡業閲闗睢而蹈禮邁樊姬而進善踰鄧后之推賢去嵗及兹累陳表疏以為内職未備有虧前代之禮朕祗奉天命君臨庶邦居紫宸之重若馭朽以秋駕處黄屋之尊猶履氷於春旭志崇簡約性靡徴求絶良家之選曠後庭之例寧惟矯正百王亦將垂鏡千祀皇后所陳甚切理在難辭式順徽音敬依来請良姊楊氏良姊于氏並家承鍾鼎心標婉淑夙侍儲闈從升天禁久淹歳月先著㳟勤咸擬職上台分榮中壼楊可貴妃于可淑妃于可德妃良媛陳為昭儀良媛閻為充儀良媛陸為充容崔氏為修儀册獨孤頴長女為貴妃文維大歴三年歳次戊申月日皇帝遣使某官某册命曰於戲位亞長秋坐論婦道聽天下之内治序人倫之大端御于家邦式是風化惟爾贈禮部尚書獨孤頴長女祥㑹鼎族行髙邦媛體仁則厚履禮惟純有冲敏之識不資姆訓有淑慎之行自成嬪則藴此貞懿灼其芳華選躬之初奉承先命肅恭之儀克稱尊㫖鑾輿北幸侍從勤誠祗事夀宫備申哀敬能盡其節實同我心久奉椒塗載揚恵問勤於道藝每鑒圖書動有箴規必脱簪珥進賢才以輔佐知臣下之勤勞謙讓益勤記功惟最聲流彤管道洽紫庭克副宫教載修壼職眷求賢淑用峻等威百辟抗辭六宫歸美宜崇禮册俾舉彞章是用册曰貴妃徃欽哉無或居上而驕無或處貴而逸降情以逮下誠事以防㣲潔其粢盛服其澣濯敬循禮節以率嬪御膺兹嘉命可不慎與許氏等為美人制勅許氏尹氏段氏等素稱柔順式禀恵和頗嫻閨壼之儀早備組紃之訓服勤有素寵秩宜優是嘉内範之良並命中宫之職許氏可美人尹氏段氏可才人鄭氏為才人制勅古者天子設六宫以詔内理是以闗睢樂得淑女憂在進賢將聽雞鳴之詩豈惟魚貫之序鄭氏山東令族海内良家每師班女之文嘗慕樊姬之德桃姿焜燿蘭行馨香爰用擇才冀無傷善勉當選進之重無忘平和之心可才人贈妳婆元氏潁川郡太夫人制古者緣情立禮著慈母之制葢聖人示德無不報之義而漢宣帝亦追錄掖庭羣侍嘗有阿保之勤以功深淺並授封賞記於前典歴代是之故妳婆元氏朕在襁褓頼其撫育推燥就濕慈愛特深可謂仁人厚恵茂德者矣可贈潁川郡太夫人大歴八年六月媫妤王氏等為淑妃制門下禮重内朝國有彞制德既備於宫壼位宜峻其等威媫妤王氏劉氏並體坤順之德循姆師之訓齊莊之禮淑慎有儀揚懿軌於中闈表柔明於内則恵流宸禁芳靄椒塗慕辭輦之智𢎞逮下之德宜極寵數以彰徽猷必能重正閫儀助修隂教無愧於女史之誡國風之詩王氏可淑妃劉氏可賢妃仍並令所司擇日備禮册命主者施行開成五年二月二十一日吳氏等封昭儀制吳氏可封昭儀張氏可封媫妤晁氏梁氏並可封美人羅氏史氏並可封才人錢氏可封長城郡夫人曹氏可封武威郡夫人勅位亞長秋毗於内理必資懿範方被寵章吳氏等佩服禮經周旋法度有柔婉之行既表於天資有㳟儉之儀可施於嬪則慕班氏之辭輦偉馮媛之當熊思在進賢義髙前史是用列於紫殿冠彼後宫俾洽彤管之榮式俟金環之慶可依前件㑹昌六年五月二十三日王氏為才人制勅王氏性禀恵和行推柔順自備宫闈之選頗彰令淑之才組紃獻繭館之功圖史服椒庭之訓既嘉懿範爰錫寵章宜修九御之教以正三星之位可才人唐大詔令集巻二十五
