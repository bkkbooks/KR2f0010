body:
  text: 唐大詔令集巻九宋宋敏求編帝王冊尊號赦上開元二十七年冊尊號赦天寳七載冊尊號赦天寳八載冊尊號赦天寳十三載冊尊號赦乾元元年冊太上皇尊號赦廣德元年冊尊號赦冊尊號赦上開元二十七年冊尊號赦勑古之執大象建皇極者必籍彞訓而受鴻名所以應乎天而順乎人也朕嗣守丕業二十七年受命之初既膺明號尚多祗懼已謂崇髙公卿宗子緇黄耆艾披誠瀝懇詣闕上言僉以為乃聖乃文祖宗大業恭惟纉服必在欽承顧以休名施於薄德抑而不許凡已十年爰迨於今又陳八請上迫奉先之義下稽從衆之言將存至公不可固拒以今日敬依大號曰開元聖文神武皇帝勉從典冊良増感懼維新之號既不私於朕躬非常之澤宜普覃於率土可大赦天下自開元二十七年二月七日牓牒昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之自開元以來諸色逋負痕累人等咸從洗滌令許自新所司更不須以此為累其有别勅停官及亡失爵者放歸不齒之𩔖量加叙恤左遷官及諸色流人並稍量移近處朕每念黎甿常恐失所求其困乏必在及時比來諸州或有損處所在賑給例逼春農比及奏報又淹時月既無救於懸絶亦何成於恵養自今以後每年至秋收後即宜遣使分道宣慰仍與採訪使及州縣相知廵檢百姓間或有乏絶不自支濟者應須蠲放及賑給便量事處置訖奏聞天下百姓宜放今年地稅古者三載考績黜陟幽明允叶大猷以勸天下比來諸道所通善狀但優仕進之軰與為調選之資責實循名或乖古義自今以後諸道使更不須通善狀每至三年朕當自擇使臣觀察風俗有清白政理著聞者當别擢用宗廟致敬必先於如在神人所依無取於非族深惟至理用切因心其應縁太廟五享宜於宗子及嗣郡王中揀有德望者令攝三公行事其異姓官吏不須令攝其草澤間有殊才異行文堪經國為衆所推如不求聞逹者所由州長官以禮徴送皇太子璵男宜並封授官邠王守禮寧王憲各與一子三品官其内外文武三品以上賜爵一級四品以下各加一階長公主及嗣郡王各與一子官郡主縣主各放一子出身二王後及諸方蕃客宜各賜物諸致仕官量與進改依前致仕天下耆老百嵗已下版授下州刺史婦人版授郡君賜粟五石綿帛五叚九十已上版授上州司馬婦人版授縣君賜粟三石綿帛三叚八十以上版授縣令婦人版授郷君賜粟兩石綿帛兩叚京城父老等宜共賜物三千叚僧道等賜物一萬匹天下觀寺每六齋日宜轉讀經典懲惡勸善以闡大教率土之内賜酺三日天寳七載冊尊號赦惟天法道惟后奉天既合德以降符必執象以明本則上𤣥眷命有以丕承大寳鴻名斯為公義朕纉宗社之重揚文武之烈克勤匪懈服道齊心允廸兹猷聿求至理日慎一日三紀於兹屬區夏太寧靈祗集貺而公卿宗子耆艾法流僉曰玉芝白魚神日瑞景天之應也敦信興禮務本崇儒人之應也化洽而風俗休寧氣和而疵厲不作天啟道運不可讓也上荅元符願増徽號披誠詣闕累上封章至請逾勤懇詞難奪以今日敬膺典冊曰開元天寳聖文神武應道皇帝式副人神感懼交集宜廣恩於善貸俾叶度於維新可大赦天下自天寳七載五月十三日昧爽已前大辟罪巳下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之其左降官及流移配𨽻安置罰鎮効力之𩔖並稍與量移亡官失爵放歸不齒及諸色被停與替非衰老疾病者宜所司量加收叙人和年登休運斯屬輕徭省賦恵政攸先將洽小康必𢎞厚貸其天下百姓來載租庸並宜放免及諸色勾徴等亦一切放免自古帝王建邦受命必敬先代以修舊章周備禮文既存三恪之位漢從損益惟立二王之後自兹已降且復因循將廣繼絶之恩式𢎞復古之道宜於後魏子孫中簡擇諸屬灼然相承者一人委所司勘實淮酅公介公例定為三恪陵廟所奉典職維崇事雖更於有司任豈循於恒秩其宗正卿與太常卿同品其少卿及丞亦宜准此又上古之君存諸號氏雖事先書契而道著皇王緬懐厥初寧忘咸秩其三皇以前帝王宜於京城共置一廟仍與三皇五帝廟相近以時致祭自古受統之主創業之君皆經濟艱難戡定禍亂雖道謝於往古乃功施於生人用率典章亦崇禋祀其厯代帝王發跡之處未有祠宇者宜令所由郡縣置一廟以時享祭仍取當時將相德業可稱者二人配祭仍並以圖畫立像如先有祠宇未霑享祭者亦宜准此式閭表墓追賢紀善事有勸於當時義無隔於異代其忠臣義士孝婦烈女史籍所載德行彌髙者所在亦置一祠宇量事致祭古者郷有塾黨有序所以明尊卑之儀正長㓜之序風化之道義在於兹先置郷學務令敦勸如聞郡縣之間不時訓誘閭巷之内多虧禮節致使言詞鄙䙝少長相凌有㸃清猷何成雅俗自今以後宜令郡縣長官申明條式切加訓導如有禮儀興行及綱紀不立者委採訪使明為褒貶具狀聞奏道教之設風俗之源必在𢎞門以敦風俗須列四經之科冠九流之首雖及門求道頗有其人而覩奥窮㣲罕聞逹者豈専精難就為勸奬未𢎞天下諸色人中有通明道德經及南華等四經任於所在自舉各委長官考試申送其崇𤣥生出身自今以後每至選日宜減於常例一選以為留放朕每以道元有屬思竭精誠經教所存豈忘崇奉且從其道者師其人行其教者尊其禮晉瑯琊王公府舍人楊真人䕶軍長史許真人丹陽上計掾許真人皆道著妙門感通𤣥闕降髙真之跡為上清之宗後漢張天師教達元和徳宗太一正一之道幽賛生靈梁中散大夫貞白陶先生髙尚塵表博逹𤣥㣲綜緝真經𫝊禆後學並令有司審定子孫將有封植以隆真嗣天師冊為太師貞白冊贈太保其天下有洞宫山各置天壇祠宇每處度道士五人并取近山三十户蠲免租稅差科永供灑掃諸郡有自古得道昇仙之處雖令醮祭猶慮未周宜每處度道士三人其靈迹殊尤功應逺大者度三人永修香火其茅山􅂵陽觀取側近百姓二百户太平崇元二觀各一百户並蠲免租稅差科長充修葺洒掃應天下靈山仙迹並宜禁斷樵採弋獵如聞山林學道之士每被搜尋且法之防邪本有所以至於宿宵妖訛亡命聚衆誘陷愚人故令禁斷郡縣遂一槩迫逐至學道者不得安居自今以後審知清潔更不得恐動以廢修行其五岳四凟名山大川各令本郡長官致祭朕刻意真經䖍誠至道兾憑𤣥佑永錫黔黎每朝禮三清則宵衣忘寢或齋戒一室則蔬食屬厭不以勤躬為倦務以徇物為心况於宰殺尤加惻隠自今以後天下每月十齋日不得輙有宰殺聞閭閻之間例有私社皆殺生命以資宴集仁者之心有所不忍亦宜禁斷且因親設教式本於人倫自葉流根必逮於榮養内外文武職事官有五品已上其父祖見在而無官者各授一官仍聴致仕其祖母見在准母例處分京官五品已上正貟官如父母已殁未有官者亦宜追贈所司勘㑹即與處分睦親之義因心不忘前開府儀同三司竇􅞓頃以容納㣲人頗虧典憲永懐舅氏追感渭陽宜申國恩再復榮秩可開府儀同三司仍放優閑不須朝㑹王澤無私豈殊於中外天瑞有慶頻屬於京輦寛大之典則已􅄎覃恵施之恩特申曲被其京城父老宜各賜物十叚七十以上仍授本縣令其妻版授縣君六十已上版授本縣丞天下侍老百嵗已上版授上郡太守婦人版授郡君九十巳上版授上郡司馬婦人版授縣君八十已上版授縣令婦人版授郷君仍並量賜酒麺内外見任文武官九品已上宜各賜勲兩轉其京文武官見在京及致仕並陪位官諸方通表使及月畨官等一品賜物一百匹二品三品並八十匹四品五品五十匹六品七品三十匹八品九品二十叚兩京留守各八十匹其節度使採訪使并諸官稱充使未廽並同在京例賜物貴妃楊氏禀性柔和因心忠孝克恭克慎蹈禮循詩加以勤志𤣥宗叶成嚴奉率勵宫掖以廸闗睢宜賜物三千匹嬪御等賜物有差太真觀雖先度人住持尚少宜更度道士七人太子璵賜物二千匹慶王琮已下各有差率土之内賜酺三日天寳八載冊尊號赦自昔皇王受祚必降於元符天人恊心乃章於大號朕纉承𤣥緒䖍奉睿圖何甞不精意真宗勵心庶政幸以邊隅底定風雨時若人和嵗稔且洽於雍熈極瑞殊祥荐臻於昭應故得玉芝再産秘牒𤣥通斯皆至道降休先聖儲祉菲德曷以克當是用祗薦崇名永揚鴻烈而羣公百辟援義比事誠請不巳固辭不獲以今日敬膺典冊曰開元天地大寳聖文神武應道皇帝徽章載茂寅畏増深宜因稽古之典式布維新之澤可大赦天下自天寳八載閏六月五日昧爽已前大辟罪已下罪無輕重巳發覺未發覺巳結正未結正繫囚見徒常赦所不免者咸赦除之朕永惟風俗之本漸兾返樸至於𢎞貸之名亦思復古天下百姓丈夫為户頭者宜各賜爵一級征鎮之役其來自久雖存素備諒在變通頃者用兵盖非獲巳今西戎摧殄北敵歸降南蠻東夷咸皆稽顙亦可謂四海無事萬里廓清減戍息人思𢎞善貸其諸軍鎮兵非切要可均減者宜令本道節度與所司商量處置聞奏其百姓有頻經征鎮者已後差㸃之次不在取限髙年給侍本屬存養因時定式務廣仁恩其天下百姓丈夫七十五巳上婦人七十巳上宜各給中男一人充侍仍任自簡擇至八十已上依常式處分唐虞省刑畫冠不犯秦漢制法密網唯煩理亂之間得失斯在朕長想逺古務崇敦樸刑期不濫政叶無為豈惟守於平邦庶有臻於大道頃者詳諸條目巳從簡易至於結斷尚慮深刻所貴從寛示其知禁宜令中書門下與刑部大理法官審更詳定法律之間有所非便者具條目奏禘祫之禮以存序位質文之變盖取隨時國家系本仙宗業承聖祖重熈累盛既錫無疆之休合享祭神宜𢎞不易之典自今毎遇禘祫並於太清宫聖祖前設位序正上以明陟配之禮欽若𤣥宗下以盡䖍恭之誠無違至道比來每縁禘祫時享則停事雖通於從宜禮或虧於必備自今已後每縁禘祫其時享無廢又奉先追逺禮惟昭德崇福展敬義在因心自今已後獻祖宣皇帝宣莊皇后忌日宜令京城一日設齋太祖景皇帝景烈皇后代祖元皇帝元貞皇后忌日京城三日行道𤣥宗妙本實備徽言垂範𫝊學時宏至化朕所以發求道之使逺令搜訪因聴政之餘親加尋閲既刋譌謬爰正簡編必在闡揚以敦風教今内出一切道經宜令崇𤣥舘即繕寫分送諸道採訪使令管内諸郡轉寫其官本便留採訪郡太一觀持讀聖人垂訓盖先乎道學者崇本必有其師丈宣王與聖祖同時俱為教首雖考言比德理在難明而問經序禮跡彰親授思廣在三之義用崇得一之尊宜於太清太㣲宫聖祖前更立文宣王像與四真人列侍左右且道降真符天有成命蔵之於密則取固名山彰之以𩔖則發祥星洞况靈仙所集宜表殊休太白山可封為神應公所由四時祭祀其金星洞改為嘉祥洞所管華陽縣改為真符縣仍於洞所置一祠宇仙人䑓下置一觀兩京并十道於一大郡亦宜各置一觀仍並以真符玉芝為名每觀度道士七人修持香火户部侍郎兼御史中丞王珙以才受委以忠奉上頃命精求𤣥論克叶神心宜旌廼誠俾正章綬特與三品其李渾等四人既親𫝊真誥因獲元符當有甄明用旌福應宜令中書門下量其所能具狀聞奏當别處分夫九州之鎮實著禮經三代之典必崇望秩事既屬於報功義有𢎞於錫命其九州鎮山除入諸岳外宜並封公仍各置祠宇如先有祠宇者量更増修以時致祭其五岳四瀆雖載常祀儲慶發祥當申昭報宜令所在長官各陳祭禮名山大川亦量事致祭天下侍老並量賜酒麺内外見任文武官職事官三品已上賜爵一級四品已下各加一階其京文武官見在居京諸色陪位官通表使等賜帛有差率土之内賜酺三日天寳十三載冊尊號赦王者事天明事地察修身慎行孝德彰矣故風化天下和睦興焉致敬宗廟祖考來格是則禮莫大於嚴享孝莫大於揚名有以通於神明有以光於四海朕承真之道纉聖之業欽若先訓惟懐永圖寳儉寳慈無為而理自南自北有截來威五教聿興家服仁孝四靈感應物必純誠百郡公卿萬方夷夏僉奉𤣥貺徴長發於真源屢薦鴻名願昭彰於至德封章守闕至于再三加以聖祖錫符𤣥中啓廸天心垂裕榮光降臨敢不丕承固執冲讓乃展因心之義以𢎞推尊之典䖍上冊禮齋肅思誠入室僾然敢忘於目出户而聴庶幾有聞揚美諡於無疆展永懐於罔極典從拜後禮既尊先式副羣心允成古義以今日敬膺典冊曰開元天地大寳聖文神武證道孝德皇帝大號載崇祗若増懼宜因布和之時式𢎞在宥之澤可大赦天下自天寳十三載二月九日昧爽已前大辟罪巳下罪無輕重巳發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之官人犯入已贓不可更令却上後不須為累其左降官並稍量移近處其反逆縁坐流配諸色宜與量移其王珙李林甫柴崇耀阿布思等並寄任非輕包蔵特甚原情議法深所難容况日月未淹罪坐尤重即從寛宥何以懲肅應縁親累流配者並不在該及之限左降官承前遭憂皆不得離任孝行之道所未𢎞通情禮之間深可哀恤如有此𩔖宜並放歸仍申省計至服滿之日准法處分自今以後編入常式其中有非反逆縁坐及情理切害有父母老年不任相隨無昆弟養者許停官歸侍及有身已衰老先罹譴責情願停官者委本道採訪簡擇具名牒中書門下然後放還鰥寡惸獨乏絶者量加賑給三載黜陟百王令典殿最之迹廉問攸歸欲更别遣使臣慮有煩擾今嵗宜委本道採訪使具官人善惡奏聞以申勸沮自臨御以來四十餘年棫樸延想寤寐求賢林藪無遺旌招不絶猶慮昇平巳久學業増多至於徴求或遺僻陋其博通墳典洞曉𤣥經清白著聞詞藻宏麗軍謀出衆武藝絶倫者任於所在自舉仍委郡縣長官精加詮擇必取才實相副者奏聞朕崇尊先謚霜露増感於以孝思無忘錫𩔖其内外見任官階俱是三品已上父未有五品官及無官已亡殁者宜各贈五品及母無邑號者亦與追贈其見任四品五品清官官階是五品已上者亡父母先無官號者亦准此追贈且厚其風俗五教之㫖聿興賁於丘園十翼之風斯在其士庶間有衆推孝悌累代義居髙尚確然隠遁巖穴者委採訪使博聞訪薦其孝義之人已經旌表雍睦無易純至有終著美郷閭深可嘉尚各賜勲兩轉以彰德行天下侍老百嵗已上版授本郡太守婦人版授郡夫人各賜綿帛五叚粟三石八十已上版授縣令婦人版授縣君令各賜帛兩叚粟兩石太清宫闕聖賢仙居頻降休徴屢貽啟廸不有優異豈表殊常其本宫道士宜各賜物三十叚道門威儀王虚貞賜物五十叚陪位大德各賜物二十叚因心推崇増上美謚惟官統職必在正名今以太常尊事宗廟安可列署為名禮不逼尊情期逹敬五陵署改為䑓其獻陵䑓等五令及丞並昇一階以彰崇奉五岳四凟及名山大川并靈迹之處先賢祠廟各委郡縣長官致祭其有陵墓祠宇頽毁者量事修葺亞獻皇太子賜物一千叚終獻榮王琬賜物五百叚其餘各賜階爵有差其郡守縣令職在親人必務公勤用康黎庶凡所推擇皆竭乃誠寵錫之間須甄異等普恩之外太守等並賜爵一級縣令賜勲兩轉庶期勉勵以表朕心其京文武官一品賜物一百匹二品八十匹三品七十匹四品五品五十匹六品七品各三十匹八品九品各二十匹東京北京留守節度採訪使並京官准𠡠出使未囬者所賜物並同見在例左相陳希烈純粹之道載穆朝廷文儒之風式瞻師表且叶和時令翊賛昇平柔嘉其德克壯元老與一子五品官賜物五百匹攝太尉奠瓉上冊書寳冊讀冊右相楊國忠當朝正色百寮紀綱勵節遺身三階柱石况發揮孝理潤色鴻猷金玉王度典禮増緝不有殊等何用為勸宜與一子三品仍與一子五品官更賜物五百叚左僕射安禄山以貞一之心搃文武之任出清北落入賛南宫既押登歌又揮寳冊與一子官賜物四百匹攝太尉張均太清宫祠及修儀注等使普恩之外又賜物一百匹武德功臣貞觀初宰輔等緬想忠義感㑹風雲用集大勲肇興王業其有子孫零落冠冕陵夷無任官者宜令所司勘責依資與一人京官唐初功臣績叅締構録勞念舊每寘於懐普恩之外宜放一子出身如已出身所司依資與一官率土之内賜酺三日乾元元年冊太上皇尊號赦古者父有天下𫝊歸於子子有天下尊歸於父有國所以繼統立身莫若揚親其義逺矣我太上至道聖皇天帝惟皇降𠂻敷佑於上允文允武乃聖乃神道合乎乾坤德明乎日月粤若増崇九廟廵謁五陵天子之孝也嚴禋二郊升中東嶽聖人之表也制禮作樂闡學明刑帝皇之業也勘定多難懐柔百蠻覇王之功也於是乎為而不宰成而勿居神超象外之光心契合漠之境釋負于小子俾承於丕構討伐叛逆綏懐四方豈朕之能皆聖皇之訓也頃者親授寳符載錫美稱顧朕不德何以克荷君父之命若登於天祖宗之緒恐墜於地一昨與羣公百僚庶尹衆士圖惟帝載欽若聖謩自古以來百王垂統文明濬哲孝友寛仁豈有如我開元之盛也乃稽大典上徽號曰太上至道聖皇天帝累日陳請不䝉許納至於數四今兹俯從允膺天休克副人望朕迫嚴􅈲曲被殊私迎春之初承奉嘉命聖皇所賜曰光天文武大聖廣孝皇帝名以制義亦為實賔卑不踰尊是昭物則恭惟聖造何敢當仁初以洪業載昌有虧公議復以大聖二字深僣皇猷讓非飾詞言必形泣承順顔色而宸睠不囬祗膺寵光乃夕惕増勵今惟新景命禮洽於尊親誕受徽章敬在於順上發生萬物行慶其時孚佑兆人緩刑斯在宜𢎞沛澤以布陽和可大赦天下改至德三載為乾元元年自二月五日已前大辟已下罪無輕重常赦所不免者咸赦除之其兩京文武官應三司先推勘者本罪中逓減一等處分其合放者三司具條件奏聞自開元以來將相大臣非反逆及犯名教枉法贓罪者流死許其家人以禮收𦵏其䧟在賊境為其殺戮未經追贈者據本官追贈公主及嗣王郡王郡主縣主等已上親被逆賊殺害者各與子孫一人官使􅄟蔵失骸骨者令招魂葬身殁王事者三品已上各與追贈仍各與一子官五品已上一子出身六品已下量事追贈其元從聖皇天帝至成都府之武官五品已上宜與一子官六品以下超資進改聖皇至成都府後到官及靈州寧州首末扈從三品已上與一子官五品已上放一子出身情願廽授周親及近親者亦聴六品已下量與轉改鳯翔府已歸順前者普恩外加一階車駕出城後任官􅅗蔵不仕逆賊即與處分開元功臣普恩外賜爵一級身亡殁者與子孫一人加一階其諸道節度下將士三品已上與一子官六品已上放一子出身六品已下量與轉改勲業髙者各委本使奏聞諸道留後將士普恩外賜勲三轉自開元以來宰輔之家不為逆賊所汚者與子一人官自賊䧟兩京文武常叅官及諸州刺史有絶脰仰藥不事叛人為衆所知者量加優贈有脱身賊庭妻子被屠戮者委所在勘㑹聞奏其天下孝義門各與一子官委採訪使具名聞奏量文武處分其左降官非反逆縁坐及犯惡逆名教枉法强盜贓如有親年八十已上及疾患在床枕者不堪扶持更無兄弟者許其停官終養其流人亦准此自今以後應以毉術入仕者同明法例處分其天下百姓今年租庸並放免其百司及府縣諸色雜供各宜減半其雜役非切要者一切並停其天下州縣有遭逆賊攻擊堅守不下竟以獲全其官人百姓中有誠効灼然為衆所知者宜令本道使按驗奏聞據狀迹酬其官賞身亡殁者重加褒贈有父母存者仍與一官及邑號無父母者與一子官有一家丁壯盡被屠害者其父母妻子仍令州縣以官物賑恤并量造屋宇使得安存其州因城䧟被殺戮者殘毁者委本道使勘責取實各量免其三二年租賦自冦逆以來有匹夫匹婦節義可稱者並旌表其閭墓其流亡户復業者委本道使與刺史勾當賑給並與種子犂牛仍免三年租賦内外文武官三品以上各賜爵一級四品以上及四方通表使各加一階五品已下有父殁者各賜勲兩轉其刺史上佐録事叅軍縣令委中書門下速於諸色人中精加訪擇補擬判司丞已下宜令所由先於兩京有潛蔵不事逆賊及故託疾病官中簡擇資考深才堪者詮注續發遣皇五等已上親及九廟子孫有才學政理委宗正等簡擇聞薦其有任偽官及掌兵馬軍將能即來還各還本官仍别優賞其左降官諸色流移配𨽻安置罰鎮効力之𩔖亡官失爵解退後放歸田里及安禄山支黨縁坐不在免限李林甫王鉷楊國忠等一房去年十二月十五日制後所犯並准前制處分廣德元年冊尊號赦惟髙祖太宗敷大德於天下覆載之内湛恩茂育累聖同道康乂兆人寳位重光深其德澤被服漸漬洽於生靈者百五十年之間兵不作而刑將措矣自冦虐横厲山東不開釁起渠魁毒流區宇三軍七萃之士豪傑忠良之徒制在風波遭其驅刼由是干戈不息狂賊實煩哀我人斯並罹灾患憫兹有犯無罪萬方朕上戴皇天下臨黔首奉先聖之成命集一切之大勲元惡既除羣生思乂是欲鏡清六合綱决八紘庶齊大道之時克復太平之理至化猶欝兵嚴初解百辟卿士中外重臣並進昌言請上徽號曰寳應元聖文武孝皇帝朕渉道日寡慙德良多恐阻樂推之心自増神器之重俯膺典冊敬受鴻名便欲謁報昊天展事郊廟又以孟秋多稼垂及西成王畿之間人實勞止輟兹大禮式候𤣥冬切為踰年改元之制纉承鴻業敢廢舊章博採羣公之議乃貞協用之紀其寳應二年改為廣德元年爰屬履端乃𢎞肆𤯝救兹湯火俾雲行而雨施滌其瑕穢將玉振而金聲宜廣更始之恩用明嚮勸之福可大赦天下自廣德元年七月十一日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正見繫囚徒常赦所不免者咸赦除之左降官即量移近處亡官失爵各與收叙諸色流人罰鎮効力安置配𨽻等一切放還其安禄山史朝義親族應在諸道一切原免並無所問天下所有諸色結聚羌渾党項等但能悔過自陳各歸生業一切並捨其罪其中有頭首能勸率並束手來者並加官賞仍令本道防禦使本管刺史縣令分明曉諭所有到者各録奏諸道百姓逋租懸調及一切欠負官物等自寳應元年十二月三十日已前並放免一户之中有三丁放一丁庸調地稅依舊每畆稅二升天下男子宜二十五成丁五十五入老應徴租稅刺史縣令等據見在户徴科其逃亡死絶者不得虚擲隣保河北百姓復三年應是囬紇行營經厯處免今年租稅内外文武三品已上賜爵一級四品已下加一階各賜勲兩轉天下兵馬元帥雍王智謀夙成忠孝純至恭行討伐親總元戎撫外藩以仁訓羣帥以義班師獻㨗勲茂武成宜兼尚書令加實封二千户廽紇可汗冊為頡咄登宻施舍俱縁英義建功毗伽可汗可敦冊為娑墨光親麗華毗伽可敦可汗可敦及左右殺内外宰相已下共加實封二萬户令御史大夫王翊持節就衙帳禮冊左右殺胡禄都督並封為王諸部督並封國公河北副元帥懐恩宜兼太保仍與一子二品官一子四品官并階更加實封五百户河南副元帥光弼與一子三品官并階加實封三百户幽州節度懐仙與一子三品官并階加實封二百户李抱玉郭英乂辛雲京侯希逸田神功孫志直白孝德令狐彰並各與一子三品官并階加實封二百户李寳臣薛嵩田承嗣張獻誠等各與一子五品官并階加實封二百户魚朝恩寄崇師律程元振勲髙佐命各加實封二百户仍與一子五品官并階僕固瑒髙彦崇渾日進李建義李光逸楊崇先李懐光張如岳白元光温如雅拓䟦澄泌髙暉盧欽友成惟良曺楚玉等各與一子五品官加實封一百户仍各賜鉄劵以名蔵太廟畫像於凌煙之閣并冦難已來將相勲業髙者其名籍圖畫亦准此子儀與一子三品官并階加實封二百户苖晉卿劉晏裴遵慶元載各與一子四品官并階加實封一百户儀王及彭王已下男未有官者並准舊例與官及封永穆并長樂已下長公主及郡縣主嗣王等各與一子官皇親五品已上諸親三等已上各與一子出身二王後各與一子官諸道節度使及立功將士其父見在無官者依子文武與官已殁者追贈陣亡將士襲父官爵河南河北有懐材抱器安貞守節素在丘園不仕為衆所知委所在長官具名聞薦應援偽官等昭洗矜才宥過宜有甄㧞委所由勘㑹本官名銜資厯聞奏量才處分文武正貟常叅官并諸州刺史父母無官邑號者宜與致仕官及邑號贈者更與改贈刺史縣令已後改轉刺史三年為限縣令四年為限貟外及攝試官一切不得釐務諌官每月一上封事無所廽避河北偽度僧尼道士女冠並與改正度天下刑獄須大理正卿斷刑部詳覆不得中書門下便即處分諸色人中有孝悌力田經術通博文詞雅麗政理優長本州各以名薦唐大詔令集巻九
