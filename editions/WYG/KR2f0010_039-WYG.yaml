body:
  text: 唐大詔令集巻四十九宋宋敏求編大臣宰相命相六舒元輿李訓平章事制鄭覃平章事制李石平章事制李固言平章事制陳夷行平章事制楊嗣復平章事制裴度中書令制崔鄲平章事制崔珙平章事制杜悰平章事制李回平章事制崔鉉魏扶平章事制崔龜從平章事制魏謩平章事制裴休平章事制命相六舒元輿李訓平章事制出納王命流品衆職覃理化於區夏謹法度於巖廊是有文可經邦才惟濟代列於百辟之上俾輝三台之光今我夢勞果獲惟肖爰舉並命以寵非常朝議郎守御史中丞兼刑部侍郎上柱國賜紫金魚袋舒元輿杞梓長材金玉正性道懷丙魏詞贍菁英居然不器之能雅蹈中庸之美自擢領綱紀肅清朝廷碩望允歸於同朝讜言莫匪乎體國守兵部郎中知制誥充翰林學士賜緋魚袋李訓軒纓鼎族河嶽間賢徳茂臯夔文含雅誥窮易超象繫之表吐論成邦國之經洎叅職内庭發揮王度盛業見乎造膝明識藹於伏蒲並冲敏執中端粹不倚咸藴莫磷之志克𢎞作礪之規珪璋有聲鸞鳯有采朕常法言髙視所寳惟賢方清化源遂得時傑於戲君執象以端扆臣推公以秉鈞夙夜一心小大同體則和天地序隂陽臻乎治平吾所寢寤爾宜率匡國之道明理人之方俾其致君無愧往哲咸陟樞柄佇𢎞大猷秋官禮闈莫非寵任祗厥成命往惟欽哉往者朕䆒大易皆訓之義也尚未終巻政事之暇宜三兩日一度入翰林元輿可守尚書刑部侍郎同中書門下平章事訓可守尚書禮部侍郎同中書門下平章事仍賜紫金魚袋太和九年九月鄭覃平章事制歸融朕嗣守丕圖務𢎞至理憂勤是切宵旰靡遑所以庻政萬幾委諸丞相乃者失扵任使妖沴遽生方思正人叅我大柄銀青光禄大夫守尚書右僕射上柱國榮陽郡開國男食邑二千户鄭覃天資直氣岳降上才性惟端莊道本孤峻文含風雅學洞儒𤣥通古今理亂之源逹教化損益之要歴踐華貫周旋大僚休聞彰於搢紳政事滿於臺閣載居講席宻勿内庭胷襟洞開肝鬲無隠嘗奏讜論發言有先見之明每勵貞規勇退守獨立之節洎擢膺揆務總領庶官堅操不回墜典皆舉盡瘁憂國竭忠戴君必能毗予一人康濟四海邪正之路既判清濁之流自分於戲秉茲鈞衡委乃髦碩爾其使萬事得其序百官得其人用賢罔不精立法罔不慎弼亮刑政燮和隂陽其聽朕言往踐厥位克紹先德巖廊有光可守本官同中書門下平章事㪚官勲封如故太和九年十一月李石平章事制朕嗣立君位精求至道日慎一日於今十年所期輔佐之臣為我致理中立匪懈知無不為今得其人果副僉屬朝議郎尚書户部侍郎判度支上柱國賜紫金魚袋李石操履堅貞志業𢎞茂性合道要識通化源累佐藩方備聞勲績用司夕拜之任旋加尹正之榮爰委財征備宣成効是宜擢膺輔弼俾勵政經爾當勤成務之規率致君之道内貞百度外靖四方叅毗宏規課程庶績盡匪躬之節竭宣力之能大振朝綱兼司國計致億兆之庶富成方夏之乂安副予知臣勉茂休烈可朝議大夫守本官同中書門下平章事仍依前判度支勲賜如故太和九年十一月李固言平章事制自昔皇王之有天下也君非臣罔以濟其理臣遇君然後顯其才以調隂陽以承法度雖堯舜不能自聖雖臯夔不能自賢君臣相須今古同體余之夢卜實有慕焉檢校兵部尚書兼興元尹御史大夫山南西道節度管内觀察處置等使李固言禀河洛之上靈孕乾坤之間氣孤退獨立公忠自持擅菁英之雄文洞㫖要之奥學仁歸信厚動合典謨巖廊正人中外全德官寮夙望殷乎華夷歴居大僚咸稱厥職乃者擢自輔相委之樞衡不依違以徇人每精恪以憂國植躬而謇諤彌勵純和而節操不渝洎仗鉞漢中頒我條詔端嚴以訓齊師律寛恵以綏撫蒸黎遂用徴還俾副公議召至宣室前席與言聽其誠詞皆臻理化是宜再叅大柄正位黄樞為朝廷之股肱聳搢紳之耳目康濟四海毗予一人是非罔及於愛憎任用必分其清濁有犯無隠進思弼違勿忝我知更光爾道可守門下侍郎同中書門下平章事開成元年四月陳夷行平章事制王者任賢能所以緝熙庶績舉正直期乎獻可弼違茍非懋兹大任何以光乎四海翰林學士將仕郎守尚書工部侍郎知制誥兼太子侍讀上騎都尉賜紫金魚袋陳夷行元精降靈厚載儲祉聚蓄英粹作時休祥懷道清貞執德謙茂行髙嵩華𢎞包容之雅量明洞水鏡韜妍虽於黙識貞已滋潔遇物能寛雖墻岸孤峻襟抱夷曠孝友為修巳之具文學誠潤色之餘衆推全才時號端士頃在郎署雅有名稱是用擢居禁宻俾輔導元良論辨見賢人之業教諭得名臣之體星琯屢改才術彌彰古稱旁求於夢卜曷若選之於言行是用付以政柄登於台階任茲鈞衡之重處以臯夔之秩人所注意予將仰成勉陳啟沃之術以副具瞻之望可守本官同中書門下平章事㪚官勲賜如故開元二年四月楊嗣復李珏平章事制運行帝載翊贊天工必俟輔臣以宣至化將益秉鈞之重是資並命之求諸道鹽鐡轉運等使正議大夫守戸部尚書上柱國𢎞農郡開國伯食邑七百户賜紫金魚袋楊嗣復動必居正言惟在公峻若孤山清猶止水從政禀詩書之教承家達禮樂之源朝議郎守户部侍郎判户部事上柱國賜紫金魚袋李珏質本温明才惟俊茂智能周物𢎞本容非守和有君子之儒可大見賢人之業咸挺為國傑秀禀元精生必為時寳稱希代便蕃清秩操履有常調黄鐘而協諧和朱絃而踈越或總戎重鎮敷惠寧人卒乗有輯睦之功惸嫠著昭蘓之詠洎入司邦賦爰掌版圖事未展長公望猶鬰是可以宰領樞務用弼予違叙彞倫而建大中罄訏謨而調元氣乂寧華夏保合神人宜申補袞之規致我垂衣之理於戲孔明匡鼎峙之國尚聞魚水之詞夷吾輔霸業之君猶致鴻翼之論矧予祗荷丕搆雖未克前修造次之間而不忘遵道宵衣旰食一紀於兹災殄尚生於旱蝗黎元屢困於衣食中夜静慮若渉大川將求津涯俟爾而濟爾謂是靡以拂吾心而不行爾謂非靡以徇吾志而茍用開物成務俾人於得時求賢審官寧我以多士則魚水鴻翼夫何足言勉副簡求無忝我休命嗣復可守本官同中書門下平章事依前充諸道鹽鐡使珏可守本官同中書門下平章事依前判户部事嗣復勲賜如故珏㪚官勲賜如故開成三年正月裴度中書令制緝熙政柄亮采皇猷𢎞道德以輔昌圖調隂陽而平經緯我惟求舊人亦與能正位台階實資元老河東節度觀察處置等使開府儀同三司守司徒兼中書令太原尹北都留守上柱國晉國公食邑三千户實封三百户裴度星辰禀秀山岳炳靈文蔚采章量苞江海負經邦之逺畧懷許國之明誠研幾而識洞蓍龜運籌而道光竹帛風雨一致儀型四朝萬邦所瞻百辟為憲洎揚兵雁塞建斾龍山謹管籥而戎索烟清壯襟帶而軍牙氣肅冦絶南牧聲雄北門懿茲殊庸朕所嘉歎是用專授衡軸俾清化源統和神人茂育區夏夫宰相之任作予股肱外可以懷柔四夷内可以親附百姓大可以贊亭毒阜生成小可以激貪㢘正雅俗爾有休躅予不重言至於玉立巖廊風行號令端若植表為時司南開予胸襟端我視聽實賴人傑代茲天工爰罷麾幢再操舟楫展乞言之禮豈惟論道之尊佇竭訏謨無虛毗倚可守司徒兼中書令㪚官勲封如故開成三年十二月崔鄲平章事制朕丕承寳圖思臻古理小大之政皆倚輔臣選衆攸難得人而授中大夫守太常卿上柱國賜紫金魚袋崔鄲天資正性岳降瓌材慎楊震之四知髙臯陶之九德抱負直質秀發英華動必蹈中和言皆體要聚學每探於精賾馳騁九流摛文若奏乎笙簧抑揚三代鴻量難挹懿聲自髙乃者入典訓詞出司俊髦能用周宻靡混妍媸銓總以明允為先㢘察以澄清為重踐其職任顯有休功秩宗之選方登公台之論彌欝由是酌其望實付以鈞衡恢予之規摹廣予之耳目於戲宰相之任弼諧是資予欲使六氣均調惟爾贊予欲使萬方平乂惟爾成予欲使臣工得職惟爾諧予欲使斜正不亂惟爾翼言罔慮於咈耳進無忘於沃心貞觀開元之法度具存房魏姚宋之規猷盡在咨爾丞相舉而行之可守本官同中書門下平章事㪚官勲封如故開成四年七月崔珙平章事制一日萬幾熙帝載者輔相予違爾弼成台德者股肱天將瑞時必有人傑况當出震之日實藉濟川之才諸道鹽鐡轉運等使銀青光祿大夫守刑部尚書上柱國崔珙應期而生希代之寳量涵海岳明並日月懷倜儻之竒姿抱英邁之正氣挺質而珪璋比德彯纓而冠葢盈門立言每見於經邦行巳諒先於及物早持旄節再踐郊壇柔獷悍為忠義之心變封疆為禮樂之俗信入人腹令行軍牙及尹正神州儀刑郡國剛能嫉惡明可照奸三輔𢎞取則之風四方禀承流之化泉司筦𣙜益茂器能精若鑑金利逾淬刃歳以饒羡國用富强懿乃成功允諧選衆是宜亮采皇極陟降台階調隂陽於至和濟生靈於將泰四維咸舉百度以貞俾時式庸佐朕為理夫周以冢宰制國用漢以丞相調兵食猶怙牢盆之務往居鈞軸之尊后德惟臣良臣惟聖汝其納誨予亦踐言勉符魚水之資永贊文明之化服茲休命敬之敬之可守本官同中書門下平章事依前充諸道鹽鐡轉運等使開成五年五月杜悰平章事制朕顧惟眇身纘承大構思有以允釐百事表率萬邦進髦傑於台階庶緝熙於帝載布誠聽問側席眷求爰於岳牧之中載恊蓍龜之兆乃舉成命以副具瞻淮南節度副大使知節度事充諸道鹽鐡轉運等使光祿大夫檢校尚書右僕射杜悰器宇恢𢎞襟度夷曠學通九經之要道符百代之源寒松不凋貞玉無玷忠信勵事君之節勤慎得成務之才任歴殷繁志惟匡益洎臨淮海兼掌貨泉開張多濟物之功饒羡指助軍之獻既而積粟應輓儲幣待供師徒無歉食之虞餽給有贏財之備克就戎事在我元臣是以付以國鈞俾司邦計仍征筦𣙜之重務藉輸經濟之良能師長百寮亦從舊貫往踐大位爾其欽哉於戲惟理亂在庶官矧乎輔翼之臣寅亮代天之化必在叅修政本振起皇綱興禮樂以厚人倫竭謀猷以清氛祲期於啟沃以弼予違無金玉爾音將孤於虚佇也可檢校尚書右僕射同中書門下平章事充度支兼諸道鹽鐡轉運等使㑹昌四年閏七月甲辰李回平章事制我唐之盛實曰貞觀開元則有若房杜姚宋彌綸大業雖二祖之克聖亦良弼之是賴朕自膺寳祚於茲六年未嘗一日不念貞觀開元之至理其命相也敢容易哉是用藎臣冀臻於道户部侍郎判户部事李回風雲𤣥感山岳降神蔚為人寳好道天爵心無適莫惟直是從事不留滯應機輙發靈府可以調元氣宏材可以濟巨川有君子欲訥之言有賢人可大之業掌綸西掖克潤王猷簡任南臺是稱邦直每揚清以激濁嘗持正以照邪凡有敷揚皆稱朕意况副予愛子功機和戎掌彼版圖時維舉職歴試皆可實獲我心是宜叅務中樞啟揚庶績式光帝載且寵正人敬往欽哉無替休命可中書侍郎同中書門下平章事充集賢殿大學士依前判户部事㑹昌五年五月乙丑崔鉉魏扶平章事制潤色王業允俟於良臣丹青帝圖必資於宰輔朕嗣膺大寳思闡鴻猷永惟化源實屬髦傑所期調六氣以遂物總萬機而富人夢帝賚予爰立作相正議大夫守御史大夫崔鉉山河秀氣經緯長才金聲含正始之和玉立在風塵之表正議大夫行尚書兵部侍郎判户部事魏扶天與全德性惟中庸有致逺之宏謀負佐王之盛業並操身特立抱氣挺生髙標旁映於羣倫明議動符於大雅早登華顯備閲休嘉穆然清明鬱有素望居易求已秉仁立誠每懷憂國之心益竭徇公之志或早以精慮升於鼎司深陳造膝之言宻勵匪躬之節或嘗以敏用服於大寮智可洞於機權才復推於練達爰委綱憲仗名節而立朝亦總地官嘗㑹計而經國紀綱式叙征賦益饒陟其休庸付以大柄朕欲宣明號令𢎞濟生靈致寰海之乂安復河隍之土宇爾宜從容奏議朝夕揣摩副華夏之具瞻展舟航之大用敬服明訓式揚茂勲鉉可中書侍郎同中書門下平章事扶可守本官同中書門下平章事太和三年四月崔龜從平章事制丹青神化寅亮天工將寄陶鈞必歸才望故漢中大業魏邴克贊其謨謀開元盛時姚宋同匡其治理嘗覽前載􅃡懷斯人寤寐以求夢卜終協適當舉衆不讓知賢户部尚書判度支崔龜從道峻嵩華志凌霄漢氣包元精識邁前哲巖廊符瑞禮樂英華𢎞通多鑑物之明堅正抱佐時之術而學窮源委詞涌濤波吐論素勵於公忠理躬不踰於信厚烈焰方熾珪璋更寒飛霜巳嚴竹栢猶翠自出入劇職廻翔清途經歴五年恭勤一貫粉署潔賜衣之操掖垣髙白鳯之文澄清宣威節制持重暨位延舊德再掌地圖任切良材柄耑國用閭閻不困帑藏有餘邦賦程均節之能軍食表供須之効我有好爵本邀茂勲况乎國楨宜在人傑是用命汝同心弼予升於鼎司執此政柄吉甫德全於文武彦回望著於台衡既諧具瞻實允元輔當酌古訓以恢今猷帖人部喉舌之雄免計曺經費之務期爾鎮撫式彰顯榮於戲惟木從䋲載懷藥石之戒惟風偃草冀流霖雨之功與其順美以昭忠不若盡規而輔德與其嚴刑而就理不若齊禮以安人佇聞嘉言共底交泰無令伊傅獨美典墳可户部尚書同中書門下平章事大中四年六月魏謩平章事制天不能獨運任寒暑而成歳功君所以稱尊仗股肱而熙帝載髙拱巖廊之上卒成天地之宜故風后登庸軒圖以穆文終佐理漢業遂昌何莫由斯夫豈相逺爰感風雲之㑹果符夢卜之求屬在休期俾升良弼户部侍郎判户部事魏謩膺賢運之間氣蓄王佐之洪材山岳孤髙珪璋特達道德忠信資以修身文章政事乃其餘力自騰芳詞苑振跡諫垣文宗知臣深加寵遇檢校甚峻守道不回未至達官蔚為國器星霜屢變流落幾途秀木摧風燎原見玉汲黯心存乎廊廟望之志在於本朝朕獲奉寳圖勵精治本盡伸人隠思變時雍佇聞宣室之言是有夕扉之拜偉其風望委以憲綱正色立朝不仁自逺貳於卿秩掌我地征吏不敢欺身無伐善彌見精强之用頗聞流衍之能朕嘗咨以謨猷觀其識畧動中理㑹慮必輸忠切劘每賴於沃心慷慨不忘於造膝是宜樹為明表載之休聲俾増輝於三台允僉諧於四岳於戲調鹽梅之元鼎濟舟楫之巨川上維四方之安危下繫羣生之舒慘居是任者不其重歟夫激濁揚清衆自聳善存誠去偽人斯歸厚爾其開張教化之具導迎隂陽之和使萬物各遂其宜百官得任其體昔爾先祖為唐輔臣人鏡之名阿衡比德爾尚纂承義訓克嗣清風勉思貽厥之謀以闡將明之業勿畏嫌而避事無執謙以自疑永孚於休用觀乃績可守本官同中書門下平章事大中五年十月裴休平章事制我國家之稱至理其惟貞觀開元乎雖盛德成於祖宗而致君存乎輔弼委是丕構付於冲人實資獻臣共荷洪業俾登玉鉉用振金聲正議大夫守禮部尚書充諸道鹽鐡轉運等使裴休明堂梁棟清廟瑚璉道崇五美學綜九流持去邪與善之心藴尊主濟時之術早升甲乙首冠賢良諫垣馳讜正之名史氏動直言之筆羽儀著定律吕縉紳仙闈道播於彌綸右掖詞推於潤色三臨藩郡皆垂良吏之能四貳卿曺益見大臣之體洎乎司貨泉之重筦山澤之財用適變通法均寛猛大計如富强之業常規多饒羡之功人無告勞刃有餘地是可以載光袞職爰陟台階式贊雍熙宜膺夢卜爾其允釐庶績盛起訏謨渉大川而示吾津涯馭六馬而遺吾銜䇿俾臻皇極克嗣前修於戲人代天工予違汝弼悉乃心力作吾股肱無使阿衡専美於殷家山甫獨稱於周室勉𢎞懿德勿忝虛懷可守本官同中書門下平章事依前充諸道鹽鐡轉運等使大中六年八月唐大詔令集巻四十九
