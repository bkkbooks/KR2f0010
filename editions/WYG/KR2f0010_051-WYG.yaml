body:
  text: 唐大詔令集巻六十一宋宋敏求編大臣尊禮大臣魏公寂已下奏事侍立並升殿詔郭子儀號尚父制杜祐每月三兩度入朝商議軍國大事制裴度平章軍國重事三五日一入中書制異姓王封五王制冊張柬之漢陽郡王文冊崔𤣥瑋愽陵郡王文封魏伯玉陽成郡王制封辛果京晉昌郡王制封王景崇常山郡王制異姓妃冊崔𤣥瑋妻為博陵郡王妃冊三公冊無忌司空文冊郭子儀尚父文冊李晟司徒文冊李晟太尉文冊馬燧司徒文冊裴度司空文冊李徳裕太尉文殘冊杜譲能太尉文闕尊禮大臣魏公寂已下奏事侍立並升殿詔貴爵尚齒歴代通規進秩優賢有國彝訓尚書左僕射魏國公寂太子少保新昌縣公網左武侯大将軍陳公抗太常卿沛國公元璹納言漢東郡公叔達内史令宋國公瑀兵部尚書蒋國公通民部尚書榮陽郡公善果右武侯大将軍羅候御史大夫滑國公無逸等或歴任前代職位隆顯或耆年夙望徳邁老成翊戴經綸功績茂重或夷險契濶情兼惟舊並職司近侍任兼心膂恩禮所加義従隆渥特宜褒異俾越常倫寂已下奏事及侍立並令升殿武徳二年二月郭子儀號尚父制軒皇致治必資力牧虞舜為政實賴臯陶茍無師臣豈登仁夀故吕望輔已成之業指揮致維師之名伊尹出空桑之中翼贊負阿衡之號司徒兼中書令河中尹靈州大都督單于鎮北大都䕶充關内河東副元帥朔方節度關内度支鹽池陸地水運大使押諸畨部落兼管勾河陽道觀察等使上柱國汾陽郡王山陵使食實封一千九百户子儀氣膺台輔道佐經綸當乾坤交泰之時正君臣定位之禮我肅宗皇帝龍飛靈武剪滅鯨鯢公則揚斾宣威佐清六合我大行皇帝撫軍鞏洛収復都邑公則摧殄􅇯㓂滌穢兩河而又獫狁犬戎共侵經略公則挺身鋒刃獨立戰塲叱退窮醜威雄七萃塞垣無警社稷永康朕遭閔凶爰在諒闇公又外釐百揆内舉四維委監山陵克修制度萬樞倚辦庶績其凝凡所詢謀必竭寅亮敬加典禮則率土歡心寄以緝熙則彝倫式序𢎞宣五教訓洽生靈光照七德威肅禍亂豈周武有尊師之道朕無崇徳之名宵衣永歎夕惕増懐雖年耆益明轅門待鎮然復上寄重留藉毗倚可加號尚父兼太尉中書令山陵使勲封如故仍加實封通前滿二千户每月給一千五百人粮料並給二百疋馬草料有司備禮以時而冊命杜佑每月兩三度入朝商議軍國大事制卿量包乆大器茂冲和事君推一徳之誠與物全四時之信登于䑓閣則萬事問於胡公守在方隅則四方宗於申伯舉其實行是可專徽頃者殷憂在辰總敘攸重金甌作鎮羣情穆然玉鉉是司庶官咸事朕渉理猶淺惟賢是圗遽陳請老之章将輟弼諧之道一一省覽良用憮然用舍之間慎重斯在謂雅節之難奪豈予衷之可移是用徵上徳之前經酌優賢之故實去繁就簡勉以職業之勤置几乗車優其筋力之禮卿宜起今已後毎月之内常三兩度入朝使至中書商量國事亦異延於内殿沃朕虚心如此則居多暇辰退可以吐納頤志入參大政進可以偃息藩君靈夀将置於上庠桑梓豈違於下社卿仍以朕此意宣示百寮庶乎君臣作合之期乾坤交泰之儀無愧前烈永貽後昆致政之詞即宜斷表裴度平章軍國重事三五日一入中書制昔漢以孔光降置傅之詔晉以鄭冲申奉冊之命雖優隆耆徳顯重元臣而異政不及於咨詢用禮獨在於安逸朕勤求至理所寳惟賢顧諟舊勞敢不加敬由是委宰執於大政釋參决於煩務時因聽斷誠望弼諧遷秩上公式是殊寵特進守司徒兼門下侍郎同中書門下平章事充集英殿大學士上柱國晉國公食邑三千户食實封三百户裴度禀河岳之英靈受乾坤之間氣珪璋特達城府洞開外茂九功内色一徳器為社稷之鎮才為邦國之楨故能祗事累朝宣融景化在憲宗時掃滌區宇爾則有出車殄㓂之勲在穆宗時混同文軌爾則有參戎入輔之績在敬宗時阜康兆庶爾則有治國庇人之勲洎弼朕躬總齊方夏爾則有弔伐底寜之功皆不遺廟筭布在簡編功利及人固不可悉數而朝論益重我心實知方用咎繇之謨適值留侯之疾瀝懇牢請備列奏章塞詔上言動形顔色果聞勿藥之喜更候調鼎之功而體力未和音容尚阻不有優崇之命孰彰寵待之恩宜其首贊樞機𢎞敷教典論道而儀型卿士宣徳而鎮撫華夷嗇養精神保綏福履為國元老毗予一人可司徒平章軍國重事待疾損日毎三日五日一度入朝中書散官勲封如故仍令所司擇日備禮冊命異姓王封五王制門下建侯之典豈獨於懿親茅土之榮必覃於茂績侍中上柱國開國公敬暉侍中上柱國譙郡開國公桓彦範銀青光祿大夫守中書令兼修國史上柱國漢陽郡開國公張柬之銀青光祿大夫中書令博陵郡開國公崔𤣥暐中書令兼檢校安國相王府長史上柱國南陽郡開國公袁恕已等早竭忠讜夙罄腹心在身喻於股肱在物均於舟楫除兇而殄逆更安社稷之基榮命而褒崇爰申建侯之寵敬暉可封為平陽郡王彦範可封為扶陽郡王仍賜姓韋柬之可封為漢陽郡王兼特進勲及食實封各如故𤣥暐可封為博陵郡王恕已可封為南陽郡王仍令准例朔望朝參便即不須推譲主者施行神龍元年五月十日冊張柬之漢陽郡王文維神龍元年嵗次乙己五月闕朔十五日闕皇帝若曰咨古者之命官也有德尊以爵有功尊以祿用能百揆時敘庶績其凝詳其建利之跡也異姓則鬻熊封之於楚宗子則召奭宅之於燕惟皇作極率由前典咨爾銀青光禄大夫中書令監修國史漢陽郡公張柬之効祉星辰資靈川岳負佐時之畧有經邦之材以忠孝為已任以仁義為事業頃者巨猾未殄常思克清一朝奮臂二兇行翦竟燃臍於東市終掛膽於西州遂得聖祚中興皇運光啟乾坤再闢日月重明刑白馬而書功未足云答指青山之比礪曽何足酧是用命爾為特進漢陽郡王爾其靖㳟乃職咸允具瞻使厚秩尊官永全於長代春蘭秋菊無絶於終香徃欽哉可不勉歟可不慎歟冊崔𤣥暐博陵郡王文維神龍元年嵗次乙己六月乙酉朔六日甲寅皇帝若曰咨徳茂之官功茂之賞萬古常行之則千載不刋之典故三十一之啓漢二十一之中興或舉河朔如拾遺或取秦隴猶偃草結丹青之誓蒞白馬之盟祚土包茅與洪河而永固分珪錫社共天壌以長隆緬考舊章率由此道爾中書令上柱國博陵郡公崔𤣥暐夙負雄圗早懐英毅藴公輔之量有王佐之才頃者元兇搆姦圗危社稷遂能懐忠抱義奮不顧身重道輕名意全王室艱難既濟家國永清勤亦至矣功亦大矣昔賞及於鬻熊聿封於楚功尊於臧綰乃建於燕異姓分王抑惟前典憲章故事疇庶載功是用命爾為博陵郡王用旌誠効宣其忠節松竹無渝往欽哉汝諧可不慎歟封魏伯玉陽成郡王制門下建爾茅社所以親諸侯加以金紫所以封異姓盖章敘之舊制必選功而茂賞開府儀同三司檢校工部尚書兼江陵尹御史大夫充荆南節度觀察處置等使上柱國芮國公魏伯玉性與𢎞毅識資冲逺公直不撓智謀尤深忠厚可移文武是憲幼讀墳典素已知名於國庠晚藉韜鈐因効䇿於戎幕累膺将帥之重積有艱鉅之勲殫力事邊乃誠王室伏波料敵毎合我心司馬理軍差强人意自荆門作鎮式是南邦九江孔殷三楚之㑹澄清節制實得專征而講求政理開示恩信既愛人而省刑将息馬以論道寛而有制令協於師貞簡則易從風行於刺舉疆事寧宴厥功茂焉二等之榮允兹馭貴宜錫褒封之命俾光優異之禮可封陽城郡王食邑三千户餘並如故封辛果京晉昌郡王制門下關内河東副元帥左廂兵馬使同朔方節度副使開府儀同三司試太常卿兼御史中丞上柱國蕭國公果京文武成器公忠立節副旌麾於戎府戒士馬於轅門縱横有謀沉毅多勇守能重固戰必先登𢎞變通以以制用崇取勝之嘉績勤王憂國歴險不渝奉職在公始終無替封建之制率由舊章以功詔爵議賞從重宜分茅於二等俾有國於千乘可封晉昌郡王食邑三千户冊王景崇常山郡王文維乾符五年嵗次戊戍十二月壬戌朔三日甲子皇帝若曰朕聞尚徳尊賢九命有專征之典論功錫爵四封標列國之榮睠惟碩臣統兹巨屏茂勲克樹殊寵未升爰増䟽土之恩式表𩔖能之重成徳軍節度使鎮兾深趙等州觀察處置等使開府儀同三司檢校太尉兼中書令鎮州大都督府長史上柱國趙國公食邑三千户食實封二百户襲實封一百户王景崇徳星垂耀嵩嶽降神抱匡君濟俗之宏才藴武庫文房之重器智逾炙輠利比决雲運協祥符懐茂先之博識道髙時傑同季野之陽春臨戎克布其恩威命代榮彰乎經濟惟乃祖禰名光簡書正氣冲霄忠誠貫日永言勲績著美華夷承家得馭衆之方共理契無為之化成吾心膂藉乃棟梁加以政洽兵農恵分黎庶俾貔貅之衆敬若神明襏襫之徒愛如父母况位升台鼎績著翰垣華賢復異於陳蕃顯秩尤光於朱寵更舉封齊之典冀同繼越之尊於戯啟金縢於周公剪桐圭於康叔皆昭彰前史蔚著殊庸况今榮耀八紘富居千乘式兹優異尚此渥恩往惟欽哉敬服厥命今遣使給事中栁韜副使吏部郎中趙秘持節冊爾為常山郡王異姓王妃冊崔𤣥暐妻為博陵郡王妃文維神龍元年嵗次已巳六月乙酉朔六日庚寅皇帝若曰咨夫母以子貴妻以夫榮聞諸通古列在方䇿惟爾博陵郡王崔𤣥暐妻盧氏筮惟福𦙍歸乃慶餘備嫻詩禮夙擅言辭斷織捐金通母師之雅訓採蘋銘菊遵女史之明規向時王室艱難逆臣搆禍敬暉等忘家狥國剪暴誅凶二曜重朗萬姓相歡爰命酬庸聿予茂賞大名隆器已錫於所天徽號寵章宜覃於齊體今遣銀青光禄大夫行尚書右丞上柱國蘇瓌副使通議大夫守太常少卿韋叔夏持節賫冊於是命爾為博陵郡王妃爾其無違藩守務於和理而使家可長乆聖人重之可不美歟敬之哉冊三公冊齊國公無忌為司空文維貞觀某年月日甲子皇帝若曰於戯開府儀同三司齊國公無忌設官分職允代天工致治興邦實資台輔永覽前哲咸在得人故能成寅亮之功𢎞燮理之業惟爾識宇冲邈風範光昭才稱棟幹器惟瑚璉協賛皇基克隆鼎業譬彼舟楫同兹魚水任重禮闈則機衡以穆位班職衮則風雨不愆固以同軌前烈齊聲往彦褒徳美功有國常典經邦論道僉曰爾諧是用命爾為司空往欽哉其光膺寵命可不慎歟冊郭子儀尚父文維大歴十有四年五月甲午皇帝使金紫光禄大夫尚書左僕射彭城郡開國公攝太尉劉某持節冊命曰惟爾太尉兼中書令汾陽郡王某其聽命於戯上天孚佑下民若保赤子弗俾罹於毒螫伊昔殷辛秦季萬姓愁苦時則有太公望留侯良毗武翼髙為之請命若顛覆而躋執熱斯濯其在天寳至徳之際二叛稱兵犬戎孔亟則公投袂電赴捍我於艱方其憂亂化為安靖然後燮和徐進清廣安和繄公之勲蓋於張吕矣憫予小子哀㷀在疚公又熙帝之采納於軌度小大謀猷罔不率服朕實賴公羽翼為師為保豈齷齪常典擬於春秋之褒今故特冊公尚父之號欽哉公左右三朝年與徳耆尚迪古訓匡予不及節順風雨參知鼎實天人之任将以仰成公其念哉惟公克享黄髪優㳺廣堂頤神導和克綏予任朂哉尚父敬聽話言用成其明徳欽哉光膺寵命可不慎歟冊李晟司徒文維年月日甲子皇帝若曰粤惟上天眷佑我唐賚予元輔戡夷逆亂宣振忠貞光昭永圗奮揚丕烈今敬從典禮彰信於朝咨爾開府儀同三司檢校尚書左僕射同中書門下平章事合川郡王李晟希代特生乘時間出髙明禀忠厚之楨故得擁是旄幢狥於封畧旋師中冀討孽上京一鼔而兇魁電竄皇居乃正清廣重安大效展於邦家大恵孚於黎庶武昭七徳文洽九歌俾予一人潜復丕業抑聞功茂茂賞義在酬庸徳茂茂官理在翊善爾既憂勤戮力端明一心申之以武功重之以文徳是用稽之舊制冊命爾為司徒宜亮采台庭光融相府敘彞倫於九牧凝庶績於百工祗率典章阜成邦教膺兹景命可不慎與冊李晟太尉文維貞元元年嵗次丁夘四月乙夘朔二十四日戊寅皇帝若曰在天成象三辰耀其景在地成形五嶽峻其位古先哲后罔不憲章故則天之明因地之利建官自輔論道經邦配六符於太階運七政於皇極無其才則禮闕有其徳則榮升爰自唐虞率由斯道故乆虚上台之坐以俟其人載懐勲賢聿歸元老咨爾奉天定難功臣司徒兼中書令上柱國西平郡王食實封一千五百户李晟天授明徳為時棟梁應期挺生佐理戡難作我英宰保大定功渾忠義以居心等夷險以為體魏郊伐叛申肅殺之威漢苑摧兇樹廓清之效宫城遂復廟社攸安三輔釋塗炭之憂萬國允朝宗之願及夫藩鎮政下黎獻昭蘇綽稜威於接境阜農耕於裔壌欽若朝政槖戢干戈弼予一人永清四裔聿懐丕茂之績式崇光大之勲是用命爾為太尉惟其敬之哉且徳盛故禮殊功髙故賞茂爵極九命華貫三台持華歆養徳之規保荀覬清純之道具瞻斯在可不慎之冊馬燧司徒文維年月日甲子皇帝若曰昔有虞之帝天下也契作司徒誕敷邦教五常以遜百姓斯親其在鄭友翊亮於周鄧禹宣猷於漢亦皆以徳當國以勲持令天贊我唐允生忠輔出則擁旄定亂重其望以成功入則調鼎登庸資其實而論道再新兹典榮命攸宜咨爾檢校司徒兼侍中北平郡王馬燧岐山粹靈楨我王國明謀炳於蓍蔡雄略極乎韜鈐文武在躬剛柔備體欽崇一徳期協阿衡故能受命專征作我心膂揚旌仗鉞外鎮雄都正師律以寜邊宣國風而撫俗華夷式叙朔塞無虞崇其大勲謙徳彌著懿兹茂範實簡予衷昔貞觀初戡定羣雄拯寜庶𩔖有若趙國公無忌外運夷凶之功内申翼善之謀陟居中台欎為時棟今予亦命爾光贊大猷是用冊爾為正司徒宜祗厥位九功不敘咨爾緝熙五品不昭咨爾寅亮予違汝弼無或面從式宣勵翼之誠允副寵光之命具瞻斯在可不慎歟冊裴度司空文維年月日甲子皇帝若曰三台羅列以承斗極皇王取象以建三公時以調隂陽乂萬國論道興化與天地參故職官物采不足以昭章物數於是有明庭冊拜清廟謁見之禮以尊異之咨爾金紫光禄大夫守中書侍郎同中書門下平章事兼淮南節度副大使知節度事晉國公裴度有文理有武功有直聲有忠節𢎞深如大浸峭拔如喬岳愛人如慈母宰物如權衡師儒術於素王授兵符於黄石百行九徳疊於其躬先皇以上聖之資唘中興之運咸有一徳時惟汝諧召雲唱吕受翕施𢎞翊助神筭底綏四方大斾東揺淮夷蕩定長䇿獨運全齊以平解紛消慝無小無大去權樹善或顯或晦非可以造次詳非可以一二計肆予小子昔當守器休功令問充溢聽聞逮此纉承委重藩鎮達經國之大體有事君之小心知無不為功多不伐可謂社稷之元老經濟之宏材者也予嘉乃勲懿乃德庸建爾於上公爾惟省厥初念厥終任天下之安危為夷夏之表式俾先帝之鴻業休徳不墜於地俾予一人實受其福於戯敬哉冊李徳裕太尉文皇帝若曰惟天育生物必極其毒而後臻於和惟君保天禄必登厥徳而後底於道我國家達皇圗焯鴻業二百三十祀祖宗儲休俾予嗣厥位祗若天地紹古之訓惟賢時念乃有冢臣光禄大夫守司徒兼門下侍郎同中書門下平章事充𢎞文館大學士太清宫使衛國公李徳裕佐予一人撫四夷親萬國文以和政武以寜亂嗚呼爾有􅌃義却金之撡不渝於險易爾有移忠匪石之志可薦於宗社故剪吾欲以康務沃朕心而成徳日者狐星耀芒朔漢之人若墜沸鼎惟爾總合智力撲其氛焰盜萌蠧本牙角滅息孽䜿扇禍搆釁閉險聨鋒趙魏淮潞五州之人是莫不有其生於旦夕惟爾協予一人經是七徳决自樽爼發如雷電風后之握機成陣宻比軒皇羊祜之沉謀制勝𤣥同晉帝修徳刑為戰器閲禮樂為身文雖其功不以下原闕唐大詔令集巻六十一
