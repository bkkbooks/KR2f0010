body:
  text: 唐大詔令集巻五十五宋宋敏求編大臣宰相罷免上長孫無忌開府儀同三司制李靖特進制魏徵特進制王方慶麟䑓監修國史制姚元之相王府長史制張説停中書令制源乾曜停侍中制裴耀卿張九齡尚書左右丞相制陳希烈太子太師制吕諲太子賔客制闕姜公輔太子左庶子制闕李勉太子太師制盧翰太子賔客制崔造太子右庶子制盧邁太子賔客制趙宗儒太子右庶子制鄭珣瑜吏部尚書髙郢刑部尚書制鄭餘慶太子賔客制鄭絪太子賔客制李藩太子詹事制權德輿禮部尚書制韋貫之吏部侍郎制李絳禮部尚書制罷免上長孫無忌開府儀同三司制昔東漢功臣莫任機揆西京戚里或存退讓故能長守富貴不懼危殆尚書右僕射齊國公無忌神識清舉風彩凝映賢戚之望朝野所推比軒禁不虞釁生慮表倉卒之間厥功以茂自居樞要聲實彌逺然以椒掖之親處權衡之地深知止足有戒滿盈収袵之請言辭懇切宜遂其心以勵貪競可解尚書右僕射仍進散位開府儀同三司貞觀二年正月李靖特進制髙秩厚禮允屬茂勲貴德崇譲用光彝典尚書右僕射代國公靖器識恢𢎞風度宏邈早申期遇夙投忠欵宣力運始効績邉隅南定荆揚北清沙塞皇威逺暢功業有成及參聞政本職重端副綢繆翌贊勤勞宴績知無不為嵗寒彌厲既懐冲挹以疾固辭表疏懇至情理難奪煩以吏職有乖養賢宜加優寵申其雅志可特進勲封如故并賜物一千段尚乘馬兩匹禄賜國官府住及親事帳内防閣等並依舊給患若少瘳每三兩日至門下中書平章事患若未除任在第攝養貞觀八年十二月魏徵特進制留侯名相濟北之志巳髙䟽傅人師東都之迹彌逺後進仰其遺烈前䇿以為美談諒可以砥節勵行化俗𢎞風者也左光禄大夫侍中鄭國公魏徵器識沉敏軌儀詳整文史優贍學業該通自參贊機衡綢繆帷幄知無不為心力備盡格言弗隠正議日聞一德載宣四聰斯達實賴嘉猷用襄治道而深執謙遜志懐冲逺詞誠懇切良用憮然杼柚于懐屢移氣序而固陳丹欵義在難違今便申其雅志以成厥美可特進封如故仍知門下事朝章國典參議得失自徒流以上罪詳事奏聞其禄賜及國官防閣等並同執事貞觀十六年冊王方慶麟䑓監修國史制鸞臺芸閣秘文蓬山奥府是為國重尤切帝艱銀青光禄大夫行鳳閣侍郎同鸞臺平章事上柱國石泉縣開國子王方慶鐘鼎髙門簮纓舊徳學富今古才優舒向自參機宻亟改寒暄蹇諤之風不忘於獻替謙挹之美屢陳於衰疾西垣掌事雖藉謨猷東觀屬詞更資通博宜掇鳳凰之省俾緝麒麟之署可麟䑓監仍監修國史勲賜如故主者施行聖歴元年八月姚元之相王府長史制忠為令徳孝乃天經義著君親道存敬愛其或兼者可不美歟銀青光禄大夫行鳳閣侍郎兼檢校相王府長史同鳳閣鸞臺三品姚元之自掖垣趨走廊廟謀猷竭忠盡誠讜言正議始終無替𢎞益以多近以母氏衰老情兼喜懼在休沐之期闕晨昏之禮乞解所職以就閑養外奏内請志剴詞勤宜遂懇請用敦孝道睠彼藩邸髙選經佐俾従梁苑之遊以致潘園之樂可行相王府長史一事巳上並同三品長安四年六月張説停中書令制門下特進行尚書右丞兼中書令燕國公張説往屬艱難輸誠於履險及兹輔相潤色於告成而不肅細微之人頗乖周慎之旨朕畧小任大念舊録功且法不欲屈宜罷中樞之務義亦有在更全端右之榮宜停中書令仍修國史於宅修撰主者施行源乾曜停侍中制尚書右丞相兼侍中源乾曜十載持衡一心自牧台鼎斯重管綜維繁雖勤力在公而暮年微疾俾司端揆罷劇中樞宜停侍中其尚書右丞相如故開元十七年六月裴耀卿張九齡尚書左右丞相制門下爕和隂陽儀刑端揆自非人傑孰副僉諧金紫光禄大夫侍中𢎞文館學士上柱國稷山縣開國男裴耀卿才實國楨望為人範懷匪躬之節竭奉上之心金紫光禄大夫中書令集賢院學士修國史上柱國始興縣開國子張九齡器識宏逺文詞博達負經濟之量有謀猷之能自翼贊台階彝倫有敘直道之心彌固蹇諤之操逾堅並可以儀型百寮緝熈庶績宜廽掖垣之任俾列宫師之表耀卿可守尚書右丞相九齡可尚書左丞相散官勲封如故主者施行開元十四年十一月陳希烈太子太師制門下輔道元良發明純德朝寄之重莫此為先特進行左相兼武部尚書集賢殿𢎞文館學士崇𤣥館大學士太清諫曹以下原闕李勉太子太師制陸贄勅立國之本所繫於元良𢎞教之方必由於端士非識精前典德重當時恭敬温文其将安倣吾是以輟台階之老選宗望之賢輔翼春闈是資教諭光禄大夫檢校司徒平章事􅊈國公李勉忠信孝友直方簡儉達君臣父子之際知禮樂教化之端虚襟保和清明簡欲求舊則德茂序親則屬尊師範國儲無易其選可依前檢校司徒兼太子太師貞元二年正月十一日盧翰太子賔客制陸贄勅求賢審官以康庶績就閑優秩以處舊臣蓋欲敦始終之道全進退之禮金紫光禄大夫門下侍郎同中書門下平章事范陽郡公盧翰頃因多難從我于征以其年乃老成任推先進方将求舊擢處公衡荏苒迄今再淹星嵗勤勞既著衰疾有加宜徙職於春闈用優賢於暮齒可太子賔客散官勲封如故貞元二年正月崔造太子右庶子制陸贄勅宰相之職允釐百工時惟仰成不可廢闕中散大夫行給事中同平章事上柱國平安縣開國男賜紫金魚袋崔造頃在掖垣參掌樞務摠領煩重精勤彌深亦既優賢賜之長告嵗聿云暮有加無瘳披誠自陳辭疏三上知止之道守之甚堅處於休閑遂其頥養可太子右庶子散官封如故貞元二年十二月盧邁太子賔客制任重謨猷道存忠諒辭疾之情既懇優賢之義斯崇中書侍郎平章事盧邁朝序公才操履端敏弼諧庶政夙夜惟寅恭恪之心毎思獻納而支體未適固請優閑累表陳情懇誠彌切将遂其志予衷耿然爰舉朝章式加命秩可太子賔客貞元十三年九月趙宗儒太子右庶子制任人之道必先無私求賢之宜所期適用給事中平章事趙宗儒早以文學累更職任自居樞近頗歴嵗時雖夙夜勤勞而政理猶欎式移秩序以叶朝經可太子右庶子貞元十四年七月鄭珣瑜吏部尚書髙郢刑部尚書制朕承天眷命獲主兆人思致雍熙用康區夏布和緝化屬在輔臣所任適宜實謂通典銀青光禄大夫守吏部尚書平章事上柱國鄭珣瑜銀青光禄大夫守刑部尚書平章事上柱國髙郢等咸以忠清累更朝列秉彜亷慎操履貞恒自參輔中樞皆能勵節祗勤庶務夙夜惟寅嵗月滋深纓纒疾恙衮職有闕無以彌縫况錯綜為選士之本刑法乃生人之命俾從專掌以盡至公宜輟台司副予所委珣瑜可吏部尚書郢可刑部尚書永貞元年二月鄭餘慶太子賔客制御大器者本於至公服大寮者歸於衆望故上無虚授下允具瞻茍異於斯則曠邦理朝請大夫守尚書左丞同中書門下平章事輕車都尉賜紫金魚袋鄭餘慶常以懿文累更近侍亦以讜議出佐遐藩恭承宣室之召再處廟堂之任丞相所請朕無不從勞予虚襟亦既周月寂寥厥位不聞直聲昔魏相持綱樞機周宻左雄匡政朝廷肅然摠録之司輕重攸繫茍云不稱亦在量能俾從調䕶之班猶示優崇之寵可守太子賔客散官勲如故元和元年十二月鄭絪太子賔客制門下王者重輔弼之任明進退之宜見可即升知否則捨兹朕所以推誠不惑與物無私者也銀青光禄大夫守門下侍郎同中書門下平章事兼𢎞文館大學士上柱國賜陽武縣開國侯鄭絪早以令聞入參禁署永推勤績出授台司期爾有終匡予不逮嵗月滋久謀猷寖微罔清浄以慎身每因循而保位既乖素履且欎皇猷宜副羣情罷樞務朕以其久居内職累事先朝恩厚君臣貴令終始俾就優閑之秩用申寛大之恩可太子賔客散官勲封如故主者施行元和四年二月李藩太子詹事制爰立輔臣以熙庶績聿膺其任亦屬難能至於明用舍之宜全始終之道兹惟大體寧忘予懷中散大夫守門下侍郎同中書門下平章事兼𢎞文館大學士上柱國賜紫金魚袋李藩早以學行聞於縉紳洎升朝端克慎素履頃者拔於非次列在鈞衡是宜有道以佐時匪躬而納誨用副明奨越於常倫而授任以來再踰年序夙夜之勤雖著弼諧之效未孚将何以允至公之求成天下之務宜輟黄樞之重尚居卿尹之榮爾其勉之式欽優禮可守太子詹事散官勲賜如故元和六年二月權德輿禮部尚書制文昌六官宗伯掌禮選授之重自昔攸難非夫台衮之臣分全於終始縉紳之議素洽於羣倫則無以允是優崇膺兹名秩正議大夫守禮部尚書同中書門下平章事上柱國扶風郡開國公權德輿奥學雄詞冲襟曠度禀中和之氣𢎞信厚之規夙彰厥猷厯踐清貫乃者逥翔省閣祗服大僚咸推鎮俗之風遂致濟川之望朕永惟理本宵旰在懐常期獻納之功深屬輔弼之任爰徵僉論俾列鼎司勤勞亟渉於嵗時謙挹毎形于造次是用委春卿之職輟樞務之殷任事程能庶光㑹府帥屬而理汝往欽哉可禮部尚書元和八年正月韋貫之吏部侍郎制朕恭己臨人勵精思理二三執政猶吾股肱念終始之罔虧於進退而尤重茍或将命失中輔導不專依違於懷尚慎斯舉君臣之義豈不𢎞乎中大夫守中書侍郎同中書門下平章事上騎都尉賜紫金魚袋韋貫之早著淑聲夙經顯貫潤以文藻懿其風猷爰膺選衆之舉式竚弼予之美而自當鈞軸屢變星霜虛襟以聽未聞至論非啟沃之道有所不行何燮諧之功蔑爾無效欲抑浮華之路在捐朋黨之私人亦具瞻事将爰副用解樞機之務俾居衡鏡之職克允斯任宜和厥心可守尚書吏部侍郎散官勲賜如故李絳禮部尚書制門下輔相之任所貴於納忠進退之宜實重於由禮其有以勞奉國以疾固辭予懐謙讓之風是舉優崇之典朝議大夫守中書侍郎同中書門下平章事上柱國髙邑縣開國男食邑三百户賜紫金魚袋李絳端荘秉彜亮直循道抱凌寒之勁節標肅物之貞規嘗以懿文參於内署亦以公望貳於地卿竭其智能茂著官業洎擢居衮職左右朕躬逺慮必陳讜言無隠懐致君之志𢎞濟俗之方確然貞操欎有休問而歩履嬰疾趨侍為難披誠上聞稽首求免乃眷毗倚乆之未從星霜屢遷忠懇彌激宗伯秩禮時惟大寮宜從喉舌之班用輟鹽梅之寄庶因清簡俾遂頤真膺兹寵章敬服爾命可守禮部尚書散官勲賜如故元和九年二月唐大詔令集巻五十五
