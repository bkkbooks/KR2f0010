body:
  text: 唐大詔令集巻一百十八宋宋敏求編政事招諭遣裵敦復往江東招討海賊勅諭西京逆官勅招諭僕固懐恩詔招諭金商鄧州界逃亡官徤制諭涇州將士詔諭梁崇義詔招諭朱滔詔招諭河中李懐光詔詔諭河中勅招諭淮西將吏詔授王武俊司徒李抱真司空制討李希烈不許諸軍侵抄詔招諭討劉闢詔招諭劍南諸州詔招諭蔡州詔討王承宗招諭勅討鎮州禁侵掠詔招諭王庭凑詔令鎮州行營兵馬各守疆界詔招諭遣裵敦復往江東招討海賊勅勅近聞江東少有冦盜多因詿誤或被脅從輒聚雈蒲遂為草竊固當自斃豈足在懐猶慮郡縣遐逺江山阻濶百姓之間妄有驚擾河南尹裵敦復頻更委任夙著髙名必能慰諭甿俗肅清姦宄安人禁暴實佇良圖宜攝御史大夫仍持節即往江南東道宣撫百姓并招諭海賊仍便處置迴日奏聞喻西京逆官勅賈至勅西京應被逆賊安禄山脅從官張通儒田乾真鄧李陽安神威及諸官吏等咸聴朕命我國家統天立極􅍕有四海百四十載於兹矣緝唐虞之舊政恢周漢之鴻業蠻夷戎狄㒺不敬從山川鬼神㒺不祗肅鳥獸魚鱉㒺不寧阜五聖之徳洽於人心上皇戡内難為昇中推精誠以御下和平致理垂五十載而禄山賤䜿大逆負恩以羶臊犬羊之士受節制熊羆之寄潜圖悖亂誘誑奚羯盜我府庫竊我朱紫偷我甲兵假我威力而錫與我將士駈役我邊人脅惑三軍舉兵向闕載籍已来惡逆􅇯悖未有如禄山之甚也夫國家屯厄自古有焉夏有夷羿之灾而少康克復周有大戎之難而宣王中興漢有猾莽之釁而光武底定葢厄運數時也亦天將稔兇族之惡延國祚之意哉朕今親摠六師次於岐下使郭子儀領朔方精騎三萬歩卒五千並回紇兵二萬人使王思禮領安西北庭河隴馬步五萬合其勢東収長安馮翊平陽河東絳郡一麾已拔不勞血刃又令劉正臣領平盧精兵連奚契丹南収范陽又令李光弼程千里領馬歩七萬出太行収河洛人百其勇華夷一心指期克日掃蕩區宇卿等或累葉崇勲或清時良吏乃祖乃父忠貞本朝一朝蒼黄遇脅狂冦想皆被詿誤應非本心退為兵刃所臨遁有妻孥之累俛受死逼迫畏威權從賊命遂失臣節便復惶恐歸順無由朕深察之可以言恕且為不善於昭明之中者人得而誅之為不善於幽暗之中者鬼得而誅之天道固然神不可㒺自昔作亂首禍孰有不誅夷滅戮者哉卿等宜審鑒是非自圖成敗翻然改過轉禍為福或率徒侣歸順或以一身来投官軍皆捨其罪如能轉殺逆黨兼以兵降當加厚錫非止免戾爾無反側朕不食言今故使人持詔往諭去就之計即宜報来無殺使臣以厚爾過若須逹表疏亦别遣行人朕必全之却令報去春秋有反經之義吉凶之勢在於斯須至徳二年招諭僕固懐恩詔佐命之臣自天所授納於將相委以腹心休戚實同始終無易太保兼中書令靈州大都督府長史單于鎮北副大都䕶充朔方節度闗内支度營田鹽池押諸藩部落副大使知節度事六城水運使兼河中副元帥上柱國大寧郡王懐恩朕之元輔上帝賚予道備五才能包三傑長䇿制敵精誠感神夙奉先朝志平多難授旗朔野扈蹕岐山前駈啟行所指皆尅収闗河之襟帶復都邑之衣冠以義斷恩毁家殉國躬擐甲胃駈馳十年遇戰則酣逢堅必脆摠統戎旅通和夷狄決䇿東向殱厥渠魁掃清袄氛芟薙道梗海隅萬里一舉蕩平遂欲息馬投戈坐而論道當朝大政並以咨之聴載賡之歌為千古之式移軍汾上方欲凱旋疑隟之端搆於羣小浮言初起且以强大自嫌邪説又生或謂功髙不賞以兹淹恤因有沈猜撫之若驚喻之未解朕以白日旌信明神鑒心若有負功臣是大欺天下為人君者豈有此乎尋聞聚族而謀知欲垂櫜入覲其子瑒猶懐反仄更有遷延少年輕佻操履非正私庭跋扈違背君親朔方義師心如父子怒其懐貳遂共梟懸凶子既誅大軍方擾蒼黄奔竄逺在邊州察其深􅇆本無他志葢縁憂懼漸及於斯眷念之心無㤀鑒寐况勲書盟府像列雲臺録功念勞豈以小而累大君臣之義情實如初厚禄榮班固宜仍舊但以河北諸將自竭義誠朔方三軍巳有管屬不可更置統領復為莭制其先任靈州大都督府長史單于鎮北副大都䕶及河北副元帥朔方莭度使宜並停其太保兼中書令上柱國大寧郡王並如故但當詣闕更亦不疑再三言提庶早牽復欲令方寸懸示萬邦爾無我虞朕言不爽乆勞於外必無成功収之桑榆殊未為晚甘言之誘王者不為危而悔之何嗟及矣切令宣示逺副朕懐招諭金商鄧州界逃亡官健制勅軍興十年征戍未息禦侮之士服勞干戈各著戎勲豈忘臣節或統隸之處失於撫循致令離遏軍麾播遷山谷言念於此憮然傷懐金商及鄧州界逃亡官健等往以數州之間道路氛梗哀我將校屬當冦虞戰守之功始終可録誠宜自愛共保令名豈賞罰所加或非適中而資粮不給由此無聊遽至流亡因相結聚竄身重險求活草中迫以困窮焉能自固既非義取又懼刑章豈不懐歸良有以也且君示人以信必有推誠臣事上以忠莫如遷善儻翻然相率斂袵而来自合弃瑕况其無過朕當捨而不問咸與惟新智者見於未萌古人重其改往逓相朂勉早決良圖仍委刺史縣令自齎詔書親至山谷分明諭㫖一一招携所有懐附切加慰納問其所欲各使便安若願歸田農當恤生業如請入軍伍亦聴食粮務令悦從以洽朝化宣示將士知朕意焉諭涇州將士詔楊炎告涇州將士等朕自臨㝢縣體道未𢎞施政未洽頃以原州在西郊内地宻邇王畿而夷狄往来於焉畜牧戎心既啟邊事益勞所以議築其城將為乆計不能逺徴夫役遂使近借軍人故命賫四十日粮擬令事畢即放朕卒然改易軍使不及與將校商量而狂謬之流扇動生變遂令爾一州士衆狼狽失圖在予闕詢謀之義俾爾陷反側之黨而事不得已至於用兵既有攻圍頗有傷殺哀我將士忽為冦讎静言思之孰甚兹痛是以夙夜軫念思宥其辜况爾等服勞王家積有年嵗肅宗因爾以正天下代宗因爾以安封域備歴艱險莫非誠効朕方倚爾為股肱之衛視爾如父子之軍豈謂事起蒼黄變善成惡今重圍已令諸道悉㑹欲引涇水以灌州城念爾一城之人亾命相守城陷就戮豈可求生朕是用隠然疚心益加憫悼况吐蕃和使見在闕下回紇可汗来受冊命積年外患今既底寧伊爾小失理宜容貸今既遣命官特赦爾罪自聞喜之下一無所問爾欲求之戎狄予不汝違欲散入諸軍亦惟爾志衣粮之不備者並令資給道路之不達者亦令導送亡者勿得追捕来者厚加禮接朕方責巳悔往示大信於天下終不㒺爾將士而為誘詐予言不信天實棄予嗚呼朕子育黎元因其得所而令爾一州士衆進不獲盡忠於國退不獲自保其家圍守之中敗亡是懼將何昭宣大號撫柔夷夏朕之自咎天監於𠂻爾尚聴予之言無惑兹訓建中元年諭梁崇義詔楊炎勅朕聞君臣之分義固金石將相之職任同安危在昔哲王㒺不注意體合股肱則付之以大位道暌終始則載之以丹書所以保親諸侯𢎞樹一徳者也朕自纂統於兹三載兢兢業業日慎一日任夫難任安夫難安實賴公侯藩輔作鎮於外將帥戎士盡瘁勤王兾忠賢之同徳躋億兆於仁夀思達寤寐動推至誠大開胷懐彰示天下雖奸邪不逞搆造異端離間往来反白作黒下動危疑之勢上陳似是之言焚其表章前後數四未嘗不寘以極法竄於窮荒庶夫讒諛杜口謠妄巻跡中外上下俱臻太和豈止同體之不疑萬方之知我而已金紫光禄大夫檢校刑部尚書㐮州刺史山南東道莭度使梁崇義往以邦家不寧襄漢未静奮自諸將累建戎勲忠謀僉一保大安衆授鉞南紀表正江山勤輯士人克謹侯度惠化周洽俗阜風移踰二十年績用光備内修貢職首課方州朕夙茂勲徳用崇爵命而忠規益勵亟請来朝期啟乃心以成吾事尋以郭昔鄭茂勲鄭和叔等奸謀參㑹庸狡妄作朕雖聴斷無惑寘以嚴科猶聞疑貳不安外求援助是何顛沛以舉謂我齷齪而今憮然懐想深用歎惜夫禹湯前古之聖后也一夫不獲有納隍之懼齊桓霸者之中人也舉讎棄怨致九合之功朕上而為君子有萬國涉道日淺誠明未敷使心腹耳目之臣負義懐忠之士坐相猜阻交質往来搆此異端頓􅃜大節頃亦頻遣將命諭達至情近得章奏猶云隔在恩外言之有犯豈為是乎終用咎悔永思更始今予命爾檢校户部尚書同中書門下平章事餘並如故兼賜以鐡劵􅍢其勲庸期於永終與國無極是表至公之舉用昭勿貳之懐嗚呼其敬之哉無再聴邪説無外蓄私心唯臣道是固惟圖章是守天命可畏敬順予言其管内諸將三軍官健乆勤征鎮咸著忠勞數年巳来未更叙録比類諸道實合甄収其大將委中書門下即條件進擬自餘委本使一月内具名聞奏仍令殿中侍御史張著與使孟逰仙同往宣諭布告軍府令悉朕懐招諭朱滔詔朱滔受任薊門累著誠績委遇既重禄秩亦崇臣節中虧自貽伊阻洎賊泚搆亂僣竊上京弟兄之親在法無舍朕以罪不相及情有可原待以如初之誠廣其自新之路執迷不復固敗是求蹙喪而歸既困方悟累獻欵疏深陳懇誠省之惻然良用憫歎雖將相嫉惡之志固所難容以君上懐柔之情未忍拒絶且善莫大於改過徳莫盛於好生宜令武俊抱真開示大信深加曉諭若誠心益固善跡先彰朕當掩釁録勲與之昭雪宣告衆庶咸使知聞招諭河中李懐光詔李懐光往因職任頗著幹能朕嗣位之初首加拔擢託為心膂授以旌旄頃嵗河朔不寧令往征討任兼將相恩極寵荣及朱泚狂猖誘奸作亂擾動京邑逼迫奉天懐光率領全軍奔赴國難兇逆逃遁宗社再寧保安朕躬實有所賴委元帥河中之權兼太尉中書令之秩廣増實封賞及宗親人臣之盛莫與為比豈朕報懐光不崇京邑未収嫌釁已搆被朱泚潜使奸人説誘又受張佋等惑亂之紿曽不覺知自生疑阻遂與元惡通和往来朕志在推誠事皆掩覆禮遇轉厚委任益隆都不悛心稔惡日甚勅書慰問將士懐光並不令宣三軍咸欲収城懐光並不令出自云已共朱泚定約並不能更事國家兼朱泚所遣来人見宣慰勅使公言迫脅無復君臣朕以眇身獲承鴻業務全大計遷幸山南蒼黄之間猶歴危險賴朔方等將士保守忠義恥陷惡名不謀同辭誓守臣節懐光知將士之意不可改移徑往河中偷安朝夕據其罪跡情實難原然以奉天解圍嘗著勲烈昨又遣男璀等謝罪懇請束身歸朝朕憫其改過之誠念其赴難之効以功贖罪務在優容令給事中兼御史大夫孔巢父齎先授懐光太子太保勅牒往河中宣慰訖三日内便與懐光同赴上都所在保䕶不得邀截驚動違者按以軍令仍許懐光將百人已下隨身防援如欲便令家口同行亦聴懐光若到闕庭必保全終始厚加恩寵待之如初仍賜實封五百户子孫承襲代代無絶信如皦日朕不食言朔方軍素推忠義國家每有危難未嘗不立大功子儀再収京城皆是此軍之力昨又逺從河北来赴奉天逆賊畏威望風奔遁眷言殊績朕豈暫㤀其軍將士人竭忠至誠叶心戮力横遭迫脅無路自申每一念之痛心自咎昔者君臣阻隔只為懐光一人今懐光自請入朝猶捨其罪况諸將並是功臣各宜坦然更勿憂慮所有官爵實封并賜名定難功臣一切如故仍准元勅超五資與改轉招諭河中勅勅朔方及諸軍應在河中絳州朝邑將士等並以義烈繼代勲業冠時艱虞巳来常濟國難肅宗代宗再復京邑皆是朔方將士之功去嵗朕在奉天兇黨攻逼解圍赴急亦賴此軍故嘗深念爪牙情均骨肉濟朕危厄感之豈㤀頃以懐光背恩自生猜阻熒惑將士汙脅忠良朕頻降詔深惻於􅇆今王師四臨即至尅捷將士百姓欵附甚多或弃其鄉園或損其家族脱身効節良有可嘉時宜撫綏以奬誠効應令淮西及界内及鄭汴等州將士歸順者委所在節度防禦等使収管切加存恤優給資粮仍具名銜奏聞當與甄叙并給遣衣賜其百姓從賊界歸者亦委所在觀察使刺史量以本道本州錢物賑給令得存濟如情願便住者即配死户田産使營生業若欲赴諸州縣者隨其所之當時給文牒發遣止遏所至之處准備優當率土之濵莫非王臣雖陥冦中諒非獲已効順即是平人務於招綏副朕所恤招諭淮西將吏勅勅朕臨御已来連兵不息自經播越方歴險難耳聞鼙鼓之聲目覩殺傷之苦由是覺悟悔於興師既省已以知非欲人之遷此下有闕文即據界首及行营軍額分配定數逐便支送仍委本道統節度防禦都團練使即條録功第名銜聞奏並與甄叙其行营將士仍各放歸本道明加宣諭令悉朕懐授王武俊司徒李抱真司空制勅三公之職論道經邦序五行之和任百事之理歴代崇重不常厥官天祚皇家茂生才傑比義齊烈同寅恊恭以徳允台階之望以勲當井賦之錫聿膺並命式副具瞻開府儀同三司檢校司空同中書門下平章事使持節恒州諸軍事守恒州刺史成徳恒兾深趙等州節度觀察處置等使琅琊郡王王武俊秉心沈宻臨事果斷忠而能力勇且有仁奮發之初渠魁即戮危疑之際大節克彰開府儀同三司檢校尚書左僕射同中書門下平章事潞州大都督府長史充昭武軍澤潞磁邢等州節度觀察處置度支營田使上柱國符陽郡王李抱真質重氣和内精外朗智窮變化守必以恒克著明誠動有攸利經猷屢告規益𢎞多皆戮力盡瘁志匡王室陳師鞠旅同討不庭仗大義而萬衆叶心體至公而千里同契合軍於呼吸之頃決䇿於指麾之間並轡載馳執俘親鼓兇徒殄殪河右廓清國家無北顧之虞姦慝沮南侵之計時乃厥功茂焉敷五教以阜人均九土以居衆俾爾更踐徧受洪休仍加真食以貽後嗣武俊可檢校司徒同中書門下平章事實封五百户餘並如故抱真可檢校司空同中書門下平章事賜實封五百户餘並如故嗚呼古人有言唯治亂在庶官矧惟輔臣與國同體明聴朕命爾其欽承朕嗣位不明經費尚力可以静暴慢謂刑可以懲姦邪徳之不修亂是用長士馬疲耗蒸黎流離罪在朕躬誰任其咎自去嵗遭變再經播遷厯山川之險難知軍旅之勞苦惟省前過悔憤盈懐追往事而不及庶後圖之可補以九廟為重屈身以百姓為心而不専私欲茍可以保安社稷休息甲兵宏濟蒼生蠲省徭賦含垢忍恥予無難焉而不憚再三曉諭皆被懐光隠匿兼亦妄有加減朕之誠懐竟未宣布夙夜自愧寢食不安今時屬嚴凝例頒衣賜豈以懐光一人拒命遂令將士並不霑恩朕於功臣義存終始其朔方及諸軍應行營河中絳州朝邑將士等令眷冬衣賜並准三月二十一日制緣赴奉天解圍功等第給賞錢物等宜令所司並許科别收貯待道通流即當時支遣其歸順者給其將士等先賜實封一切准元勅並配州給牒馬燧渾瑊逐分送付令其差人赴彼領受仍明加宣諭招撫務令忠義之士各悉朕意討李希烈不許諸軍侵抄詔陸贄勅李希烈阻兵淮右虐害蒸人朕哀憫無辜横遭脅制若興師行討即玉石俱焚所以頻下詔書再三開諭曽無悛革但益凴凌忠勇之徒皆思奮擊朕悔於征伐務在含容豈以一夫無良遂令萬姓罹禍安人忍恥是朕素懐今東作方興麥秋在近儻行侵掠深害農功一方之人實足矜愍應與淮西接界州縣各委本道都督節度防禦團練等使申明前勅嚴設隄防務使農人遂其耕穫賊若不先侵軼但自保守封疆勿令越境暴犯田苗及其侵抄務宣朝化以洽逺人仍於所在界首明加招諭咸令知悉招諭討劉闢詔劒南西川疆界素定藩鎮守備各有區分頃因元臣薨謝隣境不睦劉闢乃因虚搆隙以忿報讎遂勞三軍兼害百姓朕志在含垢道務安人遣使宣諭委以旄鉞如聞道路壅塞未息干戈輕肆攻圍擬圖吞併為臣之體義在勝殘命將興師葢非獲己宜令山南西道節度使嚴礪領當道士馬與劒南東川節度使李康犄角應接仍令神䇿行營節度使髙崇文領馬步五千人為左軍左右神䇿京西行營兵馬使李元奕領馬步二千人為攻軍並相續繼發仍仰髙崇文等各差人先與嚴礪計㑹齊進朕以三蜀之人本無過犯征鎮將士各著勲勞迫於威制不能自拔各宜分明曉諭令悉朕懐如劉闢稟奉朝經抽兵却歸本鎮朕務存誠信必當委待如初其効順之誠臨陣歸欵髙位重賞當不食言如尚執迷自貽覆滅法既無赦令在必行宜一乃心恭守所職其置頓粮料等仍委度支使差官勾當無令缺失招諭劔南諸州詔朕聞皇祖𤣥元之誡曰兵者凶器也不得已而用之恭惟聖謨常所祗服故雖文告有所不至誠信有所未孚姑務安人必能忍恥朕之此志亦可明徴近者德宗皇帝舉柔服之規授宰衡之任𢎞我廟勝遂康巴庸故得南詔入貢西戎寢患成績始究元臣喪亡劉闢乗此變故坐邀符節朕以枉成命者雖乖於理體從權便者所兾於輯寧竟違卿士之謨遂允僥求之志朕之於闢恩亦𢎞矣曽不知負牛羊之力飽則逾凶畜梟獍之心馴之益悖誑惑士伍圍迫梓州誘陷戎臣塞絶劒路師徒所至燒掠無遺干紀之辜擢髮難數朕為人司牧宥彼黎元如闢之罪非朕敢捨是用叶羣率之謀除百姓之害永清妖孽底定一方伐罪弔人於是乎在其逆賊劉闢在身官爵宜並削除今王師鼓行尋濟天險梓潼城守巳解攻圍壓卵注螢坐㸔撲滅其西川將士如有乗此聲勢翻然改圖梟斬兇魁以效誠節必當特加爵秩髙位重賞朕無愛焉其餘將吏等俾能去逆効順以所領歸降者超三資授官以一身降者亦與改轉長行官健歸順者並與叙録仍加賞給其西川管内刺史等當其阻亂孰克静柯雖章表未通而哀誠可見今能歸欵亦仍舊職如或乘機立効因事建功並特加酬賞務極優厚夫皇王之道弔伐所加義在除殘情非樂戰故脅從㒺理必誡於徂征焚溺是哀俾興於傒怨禁暴止亂其在兹乎况有跡䧟兇徒心非黨惡歸我無路遂至淪胥言念斯流尤深軫惻所以明喻將帥罪止渠魁其餘染汙一切勿問布告遐邇宜悉朕懐招諭蔡州詔勅朕嗣膺寳位於兹十年每推至誠以御方夏庶以仁化臻於太和宵衣旰食意屬於此今淮西一道未達朝經擅自繼襲肆行冦掠將士等迫於受制非是本心遂令此軍若墜淵谷朕每念此為之興懐思去三面之羅庶遵兩限之義故擇慈惠之長授之鄰封俾申朝㫖敷我大信山南東道節度管内支度營田觀察處置等使金紫光禄大夫檢校司空使持節襄州諸軍事兼襄州刺史御史大夫上柱國鄭國公食邑三千户嚴綬信能及物寛以服人道融謙光志尚柔克一登揆務三命齊壇戎機吏術靡不更練必能招懐不類敷我國恩宜授兼申光蔡等州招撫使仍與鄰道將帥等即同糺率共申曉諭其淮西將士官吏等如有歸國仰量其髙下便授職任仍具聞奏即起授官爵縱舊有罪犯一無所問呉元濟如束身歸朝亦當棄瑕録用其百姓有歸投者任便給粮食仍與田宅務加存䘏使其安堵待事平之後淮西將士宜共賜錢二百萬貫百姓給復三年詔書所不該者委嚴綬量其所宜條件聞奏庶盡綏懐之義以申生育之恩若尚敢執迷不能遷善至於問罪自有常刑宜以誠懐使其知悉討王承宗招諭勅勅自古哲王之有天下也懲其暴亂則法所宜加察其情衷則罪有不及故太尉兼中書令武俊忠扶邦國節著艱難覽視冊書想見風槩而承宗毁弃門户違悖君親遽肆姦兇自貽討伐欒盈干紀寧㤀武子之勲蕭延紹封無廢鄼侯之嗣矧忠而見節禮以議賢宜降深恩庶行中典載明樵採之禁兼茂歸降之制好生之徳俾洽人心止殺之源用孚朕志其王士率士則並宜各守舊官其武俊實封仍特賜士則承襲鎮州大將並著荗勲言念其勞每用増歎其有食封者並且依舊不須停給如領兵軍將以所領歸降者超三資與官賜實封三百户仍賞錢一萬貫文其武俊士真松楸墳墓行營諸軍並不得輒有毁伐除暴勝殘事非獲已布徳施澤仁豈逺乎用彰弔伐之師式示皇王之道宣布内外宜悉􅇆懐元和四年十月十七日討鎮州禁侵掠勅勅鎮兾管内諸州百姓等莫匪王人皆同赤子葢戀生業遂迫兇威暴賦急征既嗟於無告冒􅄡觸刃又慮其俱焚言念於兹良深憫惻其應討鎮州諸軍所到之處宜先存撫百姓使安其業勿令虜掠傷害以副朕心招諭王庭凑詔朕初撫天下實在便安故委同捷節旄處以華壤顧彼童孽豈克當之然蔑弃君親不宜容覆忠臣義士咸同忿嫉非朕主事致於興戎廷凑承累朝恩榮據四郡士衆將謂率先問罪以圖䇿勲而乃影援逆冦干犯王旅諸道使命繫為纍囚内兵滄州抗戰四境交支郡之管籥弃鄰好之姻親無恩於家㤀義於國而猶特降中使許其轉環詞㫖堅執曽無少悛近者又令宰臣遺書許以効順王誥一去寂爾無聞朕以成徳一軍代建勲力聆風拭目待之實殊豈為庭凑一人致使傷及百姓今迫藩臣懇請連章繼至宣示羣公卿士參詳可否以觀衆情義不容殊列狀斯在今亦酌其簡便以適事機亦以嘗在先朝曽効忠欵寵奬逾等驟至三公開其自新以全臣節朕之恩義亦不負矣其諸道與鎮州隣接處宜並絶其進奉嚴加警備其有突犯及隨指揮並宜依詔㫖處分諸道須有移軍出界並不得焚廬舍横加殘害歸授者撫之拒命者禦之如有忠臣義士以一州或城鎮降者並依討滄州例處分其上都進奏院宜令御史臺京兆府切加守捉禁其出入待後處分如庭凑翻然改悔乞効忠勲上表陳誠須有聞奏亦委隣界當時轉與進止不得停留於戯朕示以帝王至仁以安兆庶以黄老清净用寧寰宇文告屢放而不從兵革在郊而未戢徳不能洽誠有未孚致費訓詞良多愧嘆太和二年八月令鎮州行營兵馬各守疆界詔聖人之教先徳後刑王者之師有征無戰朕以寡昩嗣守丕業威不能禁暴叛戢干戈徳不能濟生靈完物力以至於起師戎之役陳原野之刑然謂有功固巳多愧始者逆賊李同捷統戎專地弄兵恃寵不受文告不服朝廷本貴清静唯務含宏常欲安其反側匿其瑕穢曽不悔禍是用徂征頼天地降靈中外叶力兇渠就戮滄海甫安我本興師事止於此言念士衆以及里閭並遭脅從乆陥塗炭殺傷之外殘瘵可哀巳各有奬錄及令賑䘏王庭凑因緣同捷遂此沈迷及交鋒刃益縱豺豕今滄徳既巳平殄庭凑猶未悛懲合乘兵威使圖攻討然欲更令思省未忍重有傷殘又行營諸軍乆勞於外憫其暴露且議放歸其鎮州四靣行營兵馬並宜各歸本界且自休息使耕農不廢儲峙有常見在者茍獲阜安未来者亦將焉往其幽州河東易定齊徳昭義魏博等但要保境勿相往来唯庭凑以四郡之地三軍之衆率誠歸闕翻然効順則不獨弃其舊惡兼亦别議新恩唯此一事與達表章餘並勿聴信於戯我理天下但恐道化未至不慮冦孽不平若以宗社之靈風教所及四夷八蠻猶當梯山航海慕化而来豈四郡獨能拒命夫退修教而降崇不戮人而克敵予之所尚今也其時凡在中外庶僚羣帥宜悉力竭忠尚弼予理太和年唐大詔令集巻一百十八
