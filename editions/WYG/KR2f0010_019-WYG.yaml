body:
  text: 唐大詔令集巻二十九宋宋敏求編皇太子册太子赦景雲元年册皇太子赦開元三年册皇太子赦開元二十六年册皇太子赦立成王為皇太子德音貞元二十一年册皇太子赦元和四年册皇太子赦元和七年册皇太子赦長慶二年册皇太子德音太和七年册皇太子德音加冠皇太子加元服制皇太子加元服宴百官詔改名皇太子諸王改名勅齒胄皇太子國子監釋奠詔皇太子詣太學詔册太子赦景雲元年册皇太子赦天下公器非上聖無以運其機域中大業非元良無以固其本朕欽若靈命寅奉神宗屈己順人用安四海承祧主鬯實貞萬國頃者象臻大憫在疚為憂獍滿朝豺狼塞路武職戎政必任兇徒國要時權咸畀逆黨社稷之守望絶苞桑忠義之懷誰其艾棘階禍稔惡伺隙乗間煩言碎辭所不稱述皇太子諱正氣凝姿端命毓德自家刑國英徽日湛移孝為忠雄謀電發北軍馳入掃攙搶於紫衢南宫反正開日月於黄道平亂寜夏翼戴朕躬一旅不勞功逾復禹百神咸舉事邈興周聲應吹銅望歸當璧今遣司空讀册命侍中授璽實由立義豈曰尚親承華肇開元嗣以建宜申洊雷之澤仍紀景雲之瑞可大赦天下改唐隆元年為景雲元年内外官子為父後者賜勲一轉公卿各舉孝友忠正堪任東宫官一人開元三年册皇太子赦黄門朕聞王者神器天之大業震百里而崇孟侯昭四方而建元子其所由来尚矣我國家參天貳地濟以豊功祖武宗文承於宻命顧循菲德寅畏鴻名太上皇帝服以位卿大夫輔朕之闕僉率先自述稽古為新國本不可以不立故宵衣當宁聞義是將朝服升階擇賢而舉皇太子嗣謙生知禮樂性成仁孝子孫之愛則敬不絶馳問䜿之安則恭而至寢觀其言精視牘思敏題鞭固以覆東序之討論契南山之調䕶今少陽踐位獻歳發春草樹自樂乾坤交泰副君之牓巳别其宫太史之書更藏於府帝圖斯永人望所歸庶符知子之明豈獨在予之慶用施寛詔光於政理今望苑初開端僚是切天下有髙才懋德碩學純儒比跡春卿齊名夏啟具以徴辟正月開元二十六年册皇太子赦制曰自昔聖人恭有神器必立儲兩崇其繼明所以尊宗廟而重社稷也朕獲纘休運丕承寳厯五聖之業敢不克勤萬邦之本期諸永固是以式尊彞訓乃擇元辰太子璵植性温㳟因心孝友文武之道既著君親之義以𢎞有命之初咸聞慶躍興言士庶能叶朕心是用擇以吉辰申之册命思惠率土以暢休期可大赦天下自開元二十六年七月二日昧爽以前大辟罪已下罪無輕重巳發覺未發覺巳結正未結正繫囚見徒常赦所不免者咸赦除之比年以来十道採訪使道官人惡狀以其㣲瑕為終身之累豈得永無甄叙許以自新宜令御史臺及刑部大理寺參詳所犯輕重𩔖例條奏内外文武職事官九品以上各賜勲一轉五品以上子為父後者亦賜勲一轉其忠王府官及侍讀侍文侍書除賜之外二品以上賜爵一級四品以下各加一階仍並即與改轉縁册命行禮官各賜物有差今月畨見上飛騎萬騎監門直長三衢引駕細仗執扇黄衣長上等各賜勲一轉彍騎畨兵各放免一畨天下耆老八十以上各賜粟三石帛三段百歳以上賜粟五石帛五段並加板命至如磧西行人途路遥逺往復勞敝頗異諸軍其中願長往者巳别有處分訖年鎮向滿應合放還未到之間稍宜優假其家内諸色差料並宜放免如有營農不自辦者州縣量事借助各使存濟京畿近輔百役所出雖庶務簡省終異於諸州其百姓等應單貧下户者特放今年半租率土之内賜酺三日立成王為皇太子德音守器為重擇賢而立萬國由其永貞百王以之垂範葢以重社稷而奉粢盛也朕纘承鴻緒惟懷永圖丕膺皇極既符域中之大茂建元儲用崇天下之本皇太子俶植性恭懿因心孝友文武之德克聞於日躋君親之誠實表於天性時屬艱阻義扶宗社故能外清氛祲内復皇圖由是肇啟承華懋昭嘉緒今撰辰斯及册命攸行宜承繼明之慶俾廣洊雷之澤可大赦天下頃者頻興大典累洽殊私率土之間屢經蕩滌猶慮近有抵犯或滯狴牢其天下見禁囚徒以上罪一切放免内外文武官三品以上賜爵一級四品以下各賜加一階五品以上官子為父後者賜勲兩轉頃縁國用不足頒賜未周今所鑄新錢數盈於萬其京官文武五品以上及常參官六軍將士東北京留守及諸道節度將士等各賜有差其唐元功臣成都元從及朕元從功臣等普恩之外更賜一爵四品以下更加兩階其在靈州及寜州至鳯翔者仰所司𩔖例更逓加一等皇親及諸色陪位人各賜勲兩轉其鴻臚番客共賜絹一千疋天下義夫節婦孝子順孫旌表門閭終身不事京官五品以上各舉忠正孝友文儒周慎堪任東宫官者務取實才不得濫薦今餘㓂未殄有脅在賊中未歸順者一切不以為罪其有受賊節制能以兵降者酬其封爵且為政之要求賢是急比令中外薦舉多非實才所以詢事考言登科葢寡猶慮巖穴之内尚有沉淪宜令所在州縣更加搜擇其懷才抱器隠遁丘園並以禮徴送如或不赴具以名聞凡與前詔科目相當一切委内外文武五品以上有所知者不限人數任各薦聞如自舉者亦聽於所在投狀有堪任用不限常資其行人家及羸老單貧鰥寡惸獨已頻有處分宜令州縣長官倍加優䘏應縁册禮職掌要重者及撰册書舁寳官禮官等普恩之外賜勲兩轉其禮儀使特賜一階副使普恩之外賜爵一級勅文有不該者所司𩔖例奏聞乾元元年十月貞元二十一年册皇太子赦鄭絪門下惟先哲王光有天下必正邦本以立人極必建儲貳以承宗祧所以啟廸大猷安固鴻業斯前代之令典也皇太子純繼體秉哲恭敬温文德協元良禮當上嗣朕奉丕訓憲章成式永惟社稷之重載考春秋之義授之匕鬯以奉粢盛爰以令辰俾膺茂典今册禮云畢慶感交懐思與萬方同其恵澤可大赦天下貞元二十一年二月二十四日巳後至四月九日昧爽巳前天下應犯死罪特降從流流巳下逓减一等文武常參官并州縣府官子為父後者賜勲兩轉古之所以教太子必茂選師傅以翼輔之俾法於訓辭而行其典禮左右前後罔非正人是以教諭而成德也給事中陸贄中書舎人崔樞積學懿文守經據古夙夜講習庶叶於中可充皇太子侍讀天下孝子順孫先旌表門閭者委所管州縣各加存恤五嶽四瀆名山大川委所在長吏量加祭祀元和四年册皇太子赦朕丕承寳圖撫有方夏夙夜寅畏不敢荒寜永惟祖宗之鴻業歴考前王之令典思所以垂統立極事神保人推明至公安固大本尊廟祧而主匕鬯嚴社稷而奉粢盛俾開春闈乃命元子斯古今之通誼也皇太子寧清明體仁莊敬好禮服典謨之誼一君親之誠允諧詢謀用建儲貳爰以吉日册於明庭鼔鐘載和文物大備盛禮云畢慶感良深是宜布澤申恩自中達外厥有前躅舉而行之自元和四年十月十八日昧爽以前天下應犯死罪非殺人者降從流流罪已下逓減一等左降官未經量移者與量移文武常參及諸州府長官子為父後者賜勲兩轉應縁册禮行事官賜階及勲爵有差鄧王府官量與進改夫輔翼元良教諭成徳使目睹正事耳聞正言形於施為漸於心術非齋莊忠慤之士不在兹選工部侍郎歸登給事中吕元膺並踐履端正行義修潔通於經訓而得其要達於教化而蹈其中侍講承華師範磐石訪乃公議副予精求並可充皇太子諸王侍讀登宜加一階元膺宜賜紫金魚袋天下孝子順孫先旌表門閭者委所管州縣各加存恤五嶽四瀆名山大川委所在長吏量加祭祀元和七年冊皇太子赦崔羣王者司牧黎元紹膺統緒必建儲貳以貞家邦故春秋垂冢祀之文易象著震方之位朕屬承景運嗣守丕圗稽前王之令模奉列聖之懿訓上以嚴宗祧之顧下以繋億兆之心無疆之休用崇主鬯祗荷成憲敢怠於懷皇太子恒忠孝温文率義由禮寛粹莊重自誠而明慶靈所積姿器夙茂能辨南陽之牘允符東海之貴承華載啟命以居之選吉展儀神人允洽舉是典冊授之軒墀百辟在庭四方來賀以言承序所感則深永惟固本為慶滋大宜𢎞欽恤之令以覃命賜之恩與衆共之無思不被自元和七年七月十七者昩爽以前天下應犯死罪非殺人者逓減一等左降官流人並與量移如因流貶所亡沒及得罪之人並任歸𦵏文武常㕘官及諸州府長官子為父後者賜勲兩轉應縁冊皇太子行事官加階賜勲爵有差文武常㕘官及陪位官并宗主諸親賜勲一轉遂王府量與進官春闈毓徳肇錫嘉名磐石聨華義深敦序澧王寛宜改名惲深王察宜改名悰洋王寰宜改名忻絳王寮改名悟建王宻改名恪夫習近遷性聖賢所慎詳觀古昔輔正元良必惟其人朝夕講訓然後明君臣父子之道通禮樂教化之情自非學究宗源行可師範則無以應兹茂選式是儀型其皇太子及諸王侍讀宜委中書門下精擇以二人具名奏聞天下孝子順孫先旌表門閭者及髙年廢疾者委所在州縣各加存䘏五岳四瀆名山大川委所在長吏量加祭祀布告遐邇咸使聞知長慶二年冊皇太子徳音朕上奉廟祧下寧邦國承列祖垂鴻之慶當累聖奕葉之尊祗膺寶圗敬守丕業體明離立象之重表青宫建嗣之崇元良以貞國本斯固皇太子諱恭孝温文生知夙禀日者春闈尚曠東序未興朕常訓以義方舉明嚴敬匪資調䕶已達詩書克保承休爰當主鬯膺兹異禮慶感良深夫踐位少陽允孚明命用𢎞恵澤庶洽兆人自長慶二年十二月二十日昩爽已前天下應罪合死犯除贜降從流流罪以下逓減一等左降官及流人並與量移亡殁者任歸𦵏文武常㕘官及諸州府長官子為父後者賜勲兩轉縁冊太子攝大尉稱賀侍中承㫖宣制進中嚴外辨攝中書令讀冊授冊各賜爵一級其行事職掌官及書寶舁舉冊寶禮儀使禮官等三品已上賜爵一級四品以下加一階撰冊文官特加一階仍並賜物有差導引官各加一階鐫造冊寶及禮生等賜勲有差文武常㕘官及陪位并宗子諸親賜勲一轉景王府官量與進改夫師嚴友善庶發清明習近性遷必資𢎞道所以慎簡師傅用保元良其太子侍讀宜委中書門下精擇二人具名聞奏太和七年冊皇太子徳音門下帝者承天地貞邦國法明離之象固鴻業之本必命元子以備儲闈斯皇王之令謨古今之丕典朕祗受眷祐䖍恭寶圗欽若彞章光修聖緒皇太子永㓜禀仁智生知孝愛體温文以立徳資敏哲以保躬寛裕有常貞慎無怠爰膺盛禮俾奉青宫嚴宗廟主鬯之儀遵朝夕視膳之節冊命云畢感悦良深問安既慶於寢門布澤宜覃於天下自太和七年八月七日昩爽以前天下應犯死罪從流流以下罪逓減一等惟官典犯贜及故殺人刼獄奪囚持杖强盜者不在此限左降官流人並與量移如因貶及諸色得罪人所在亡殁並任歸𦵏宗周之盛實在於維城二漢之隆亦由於磐石自開元以後累聖子孫皆長於深宫罔知稼穡曽不得習詩書以修禮樂交氣𩔖以敘人倫雖有間平之才莫施魯衛之政永言淪廢深疚朕懷諸王等宜以今年已後相次出閣具授𦂳望已上州刺史上佐觀其才能續有序用人倫所先婚禮為重笄年許嫁别有明文其十六宅諸縣主亦宜選擇良偶以時出適仍委吏部於諸色選人中取情願者㨂擇具名聞奏亦當别加優奬令其就禮漢代用人皆由儒術故能風俗深厚教化興行近日茍尚浮華莫修經藝先聖之道堙欝不𫝊况進士之科尤要釐革雖鄉舉里選不可復行然務實抑華必有良術既當甚弊思有改張今寰宇乂寧干戈已戢皇太子方從師傅授六經一二年之後當令齒胄國庠以興墜典宜令國子監於諸道捜訪名儒置五經博士各一人其公卿世族子弟明年已後不先入國學習業不在應明經進士之限其進士學宜先試帖經并略問大義取經義精通者次試議論各一首文理髙者便與及第其所試詩賦並停其試帖經官便以國志監學官充禮部不得别更奏請𢎞文兩館生齋郎並依令式試經畢仍差都省郎中二人覆試須責保任不得輒許替代茍涉情故必加罪責卿大夫者羣下之所視逺方之所傚若非恭儉克已亷貞化人而望其服從固不可得况朕不寶珠玉不御纎華逮於六宫皆務儉薄卿大夫得不叶朕此志率先兆民比年所頒制度皆約國家令式去其甚者稍謂得中而士大夫茍自便安身於習俗因循未革以至於今百官士族起今年十月服冬裘以後其衣服輿馬並宜準太和六年六月十七日勅處分如故違制度九品以上量加黜責其布衣五年不得舉選百姓軍人各委州府長吏漸施教化使自遵行不要便為禁制令其驚擾恵養疲民本於亷吏阜其生植在絶貪求其諸道方鎮刺史等有聚歛貨財潛行饋遺者委御史臺糾察以聞仍委度支鹽鐵分巡院同為訪察不得容蔽親民之官切在守長久於其道政乃有成方鎮刺史三考已下不得輒議替換如理有異等委中書門下訪察就加寵奬如的然可録者别與甄昇其或政理有乖害及百姓者即不在滿三考限易譏豊屋𫝊美卑宫雕刻磨礱先賢有戒近者官纔昇於郎署位始置于郡符莫不髙其閈閎廣以池榭非唯僭侈踰制實亦耗蠧傷財其百官第宅已造成者並許仍舊今日以後如更有創立新宅及屋宇髙大者並委御史臺彈糾必嚴加黜責御史臺所置六察分糾百司比來因循糾繩舉職起今以後諸司如有身名偽濫盜官錢及違法等事他時發覺者本察御史各並當貶斥考課之法前王所重葢以綜覈吏理勵精政途名實茍違將何勸激宜準故事署内外知考使兼令中書舍人給事中各一人監考百姓困窮弊由姦吏政茍不擾民皆自安其司農寺供宫内及諸司厨冬藏菜並委本寺自供其菜價仍委京兆府納每年時價支付更不得配京兆府和市其諸陵守當夫宜委京兆府以價直送陵司令自顧召並不得差配百姓寒食杏仁雞子月進土蘇白麥樹栽選場棘針修橋梁木便於本户稅錢内尅折不得更令和市天下諸州縣應納義倉及諸色斛㪷除準式每斗二合耗外切宜禁斷仍委度支鹽鐵分巡院及出使郎官御史切加訪察如聞今嵗所在豐稔其義倉斛㪷先有借用處委户部勾當並須及時填足文武常㕘官及諸州府長官子為父後者賜勲兩轉縁冊太子攝太尉稱賀攝侍中承㫖宣制進中嚴外辨攝中書令讀冊授冊各賜爵一級其行事職掌官及書寶舁舉冊寶禮儀使禮官等三品以上賜爵一級四品以下加一階撰冊文官特加一階仍並賜物有差導引官各加一階造冊寶金字裝寶人賜勲兩轉行事流外及禮生等各賜勲一轉文武常㕘官及陪位官并宗子諸親各賜勲一轉魯王府官未經進改者量與進改其皇太子侍讀宜委中書門下精擇二人具名聞奏天下孝子順孫先旌其門閭者及年髙廢疾者委所管州縣各加存䘏五岳四瀆名山大川委所在長吏等量加祭祀布告遐邇咸使聞知加冠皇太子加元服制元良所以主匕鬯奉社稷貞于萬國祝以三加皇太子居長徳之地務親仁之道爰就師保克修志業寢門問安而資敬太學齒胄而徴善大猷且酌元服宜申史稱周誦之年𫝊記魯襄之禮粤若敬始謂之成人逮乎建正式展嘉事可以來年正月加元服所司擇日奏聞禮官博士詳考故實允符令典開元七年十二月皇太子加元服宴百官詔皇太子以守器之重有成人之業屬陽和肇嵗甲子惟日加元服乃循于舊章慶因雷洊歡洎雲上王公卿士中外宷寮布以慈恵廣兹匪頒應在㑹官一品一百疋二品九十疋三品八十疋四品六十疋五品五十疋六品五十疋七品四十疋八品二十疋九品二十疋諸州都䕶都督刺史上佐諸軍及副使亦同在㑹例宜以當處物給開元八年正月改名皇太子諸王改名勅勅古之名子必有象𩔖人道之大可無慎乎皇太子鴻及慶王潭以下往所製名或亦未協今以徳命悉宜更之太子鴻為瑛慶王潭為琮忠王浚為璵棣王洽為琰鄂王涓為瑶榮王渙為琬光王涺為琚儀王濰為璲潁王澐為璬永王澤為璘夀王清為瑁延王洞為𤦺濟王溢為環信王沔為理義王泚為玭陳王漼為珪豊王澄為珙坦王潓為瑱涼王淀為璿汴王滔為璥及恵寧王文太子恵宣太子之子皆改從王開元二十三年二月齒胄皇太子國子監釋奠詔庠序之興教自元子禮經之最奠始先師中古迄今斯道無替皇太子隆基天資聖敬日就文明弦誦之業已髙元良之徳斯茂自外儲博望主器承華執經之問雖勤用幣之儀未展今仲丁獻告有事兩塾備禮三尊宜遵舊章俾緝徽典景雲二年八月皇太子詣太學詔儒道有百王之政元良乃萬國之貞屬太學舉賢賔庭貢士當其謁講故行齒奠所以𢎞風闡教尚徳尊賢宜有頒錫以成光寵陪位官一品宜賜五十疋二品三品四十疋五品三十疋六品七品二十疋八品九品十五疋縁行禮及别職掌者各逓加一等六品以下五疋為等三品以下十疋為等座主加二等學生賜物三疋得舉者及諸方貢人各賜五疋開元七年十二月唐大詔令集巻二十九
