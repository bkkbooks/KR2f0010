body:
  text: 唐大詔令集巻七十八宋宋敏求編典禮追尊祖先追尊𤣥元皇帝制追尊先天太皇德明興聖皇帝等制上聖祖大道𤣥元皇帝號并五聖加諡制加諡祖宗諡議順宗加諡至德𢎞道大聖太安孝皇帝議憲宗加諡昭文章武大聖至神孝皇帝議文聖祖大道𤣥元皇帝加號册髙祖神堯大聖皇帝加諡册太宗文武大聖皇帝加諡册髙宗天皇大聖皇帝加諡册中宗孝和大聖皇帝加諡册睿宗𤣥真大聖皇帝加諡册赦加祖宗諡號赦國忌國忌在近進􅂼菜詔増忌辰設齋人數勅廢國忌日行香勅追尊祖先追尊𤣥元皇帝制東臺大道混成先二儀以立稱至仁虛已妙萬物以為言粤若老君朕之本系爰自伏羲之始洎乎姬周之末靈應無像變化多方遊元氣以上昇感星精而下降或從容宇宙吐納風雲或師友帝王丹青神化譬隂陽之不測與日月而俱懸屬交在辰晦迹柱下大𢎞雅訓垂訓將来雖心齋於太虚而理歸於真宰若夫絶聖棄智安排寡欲寂寞窅㝠之際希夷視聽之表澹爾無為翛然自得酌之不竭用之不盈執大象而還淳滌𤣥覽而遣累邈乾坤而長久跨陶鈞以亭育至矣哉故無得而稱也况大道所宣克昌寳祚上德所履允屬休期朕嗣膺靈命撫臨億兆總三光之明而宿宵夤畏居四大之重而寢興祗惕盡孝敬於宗祧罄懐柔於幽顯行清静之化成太平之業登介丘而展采坐明廷而受記非烟結慶重輪降祥鶴應九歌山稱萬嵗越振古而㑹休徵冠帝先而為稱首大禮云畢廻輿上京駕駐瀨鄉躬奠椒糈仰瑞光而延佇挹神泉而永嘆如在之思既深敬始之情彌切宜昭元本之號以章𤣥聖之功可追上尊號曰太上𤣥元皇帝祠堂廟宇並令修創廟制令丞以供薦饗仍改谷陽縣為真源縣宗姓特給復一年冀崇追逺之懐用申尊祖之義主者施行乾封元年二月二十日追尊先天太皇德明興聖皇帝等制門下庇人生者必崇於大道受成命者實賴於前烈恭惟大聖祖𤣥元皇帝道光太極首出渾元𢎞敷妙門廣化真理雖乘時御氣已昭昇於上清而儲祉發祥每敷祐於来裔祚我寳運格於皇天爰自創業迨於兹嵗頻彰景貺屢覩真容使夫天清地寧物阜民庶六氣時若四夷来王聖感之祖也至道之應也成功不宰豈假於強名降福無疆敢忘於昭報是用薦徽號増禮册蠲㓗以盡敬躬親以致誠亦既昭格良深感慶交至宜因展事更廣揚名夫聖人之生乃先天地應變無體其猶龍馬雖窅冥之物不知誰何而誕靈之後示必有先聖祖父母著在圖籍母益夀氏已崇徽號曰先天太后父周上御史大夫敬追尊為先天太皇仍於譙郡置廟自餘一事以上准先天太后例昔契敷五教殷以為祖稷播百榖周以配天况咎繇邁種黎人懐德我之本系千載彌光敬追尊為德明皇帝凉武昭王朕十一代祖也積德石地炳靈中葉奄有萬國兆先帝功敬追尊為興聖皇帝其靈側近仍並禁樵牧春秋二時偹禮致祭且聖人所理本在諸天將欲降靈固欲取象况為帝號豈可名宫其𤣥元宫西京宜改為太清宫東京改為太極宫天下諸郡改為􅂵極宫兩京宫内道士宜先抽有道行者一十人自餘於新度人中簡擇取添滿三十人為定額仍各賜近城莊田册禮宜令所司即詳定儀注聞奏上聖祖大道𤣥元皇帝號并五聖加諡制握乾圖者必禀於元命宗道本者允屬於强名是知物通昭感之德報功尊祖貴叶崇之義朕祗荷丕業恭臨大寳何嘗不宵衣滌慮菲食齋心奉𤣥聖之範為蒼生以祈福自頃昊穹眷命天道降休玉芝再産真容累見嘉應荐来罔知攸荅豈謂𤣥記隂隲秘謀混成懸想造化之源宻紀景靈之度慶崇真籙昭錫朕躬初騐神傳竟彰天授幽深累跡既殊於人代朴畧竒象固絶於名言􅃡覿皇圖欽承道寳有寅畏増深思申嚴敬之誠以崇廣大之業謹上𤣥元皇帝仍以来月五日朕親奉册禮國家文祖神宗重熈累洽無為之訓垂祐清静之德在人慎寧後昆累承大業是用欽𤣥符之景命歸清廣之延祥禀慶真源光昭聖烈謹上髙祖神堯皇帝尊諡曰髙祖神堯大聖皇帝太穆皇后竇氏尊諡曰太穆順聖皇后太宗文武聖皇帝尊諡曰太宗文武大聖皇帝文德聖皇后長孫氏尊諡曰文德順聖皇后髙宗天皇大帝尊諡曰髙宗天皇天聖皇帝大聖則天皇后武氏尊諡曰則天順聖皇后中宗孝和皇帝諡曰中宗孝和大聖皇帝和思皇后趙氏尊諡曰和思順聖皇后睿宗大聖真皇帝尊諡曰睿宗𤣥真大聖皇帝昭成皇后竇氏尊諡曰昭成順皇后肅明皇后劉氏尊諡曰肅明順聖皇后庻彰祈精之感降貽厥之元符聿修誡敬逹孝思於罔極更以来月五日於太清宫前恭禮寧王憲薛王業各賜物八百疋忠王浚棣王洽鄂王滉光王涺等各賜物七百疋中書門下賜物五百疋開府王毛重賜物三百疋皇親五等以上諸親三等以下及文武百寮各賜有差自古明王因心以待人由已以施物故休戚共而憂樂同也中書門下丞相尚書開府王少大將軍父賜三品官九品三監十二衛監軍羽林軍五省官三府户大都督府長史父各贈四品官以上清官父各賜五品官凡所贈官宜兼贈母邑號俾夫羣臣受䇿上延父母先帝遺澤下及幽明興言及此良多感嘆羣臣一體榮辱是同龍虵之歌古今作式其唐隆元年兩營立功官三品以上與一子官其四品以下選日優與進改京兆府供頓免今年地税諸道戰亡人家仰州縣存恤不支濟者量事賑給諸軍徤児别勅行人各賜勲兩轉加諡祖宗諡議順宗加諡至德𢎞道大聖大安孝皇帝議臣融議曰王者則髙明以茂育法博厚而含𢎞象日月以照臨如雨露而膏澤諡以令德昭於至公即軒轅顓頊文王武王是也其有褒旌未副則宜増美尊名伏惟順宗至德大聖大安孝皇帝道合二儀明齊兩曜恩沾萬物信若四時始位踐重光名髙少海寢興有度視聽必端昔德宗駐蹕奉天禮行廵狩掃除兇㓂實賴春闈每誓衆之初而吐言激切及撫軍之際皆感動師人洎車馬還都歡娯宫禁朝夕視膳晨昏問安是居承華毓德望苑日彰孝愛三十七齡三善益表於元良六氣忽嬰於沉痼德宗以龍樓重嗣惟疾之憂醫藥躬勞至於大漸順宗昭事德宗之節也詢古無對德宗鍾念順宗之至也前史莫倫父子之親君臣之義垂榮萬國流慶千年及厯數自天統承丕構不敢牢譲方遵永圖師唐虞之仁以覆幬天下纂禹湯之化以煦育黎元薄賦蠲逋宥刑恤隠深仁降感沛澤旁敷减去宫人斥絶竒貢臨軒廣愛焚鴆毒於通衢凭檻興仁放猛鷙於維繋歸功臣之甲第而中外謳歌黜殘酷之劇吏而逺近欣服䖍恭九廟睠佑萬邦宵旰勤劬詎思頤衛於是託付冡嫡壮乎皇猷以明繼明以聖傳聖孝德垂名於不朽睿謨貽慶於無疆是生聖明収復河隴刷百載失地之恥滌八聖强鄰之羞陛下不有其功美歸祖考追加尊諡用重鴻名易曰天地之大德曰生聖人之大寳曰位經曰德者同於德道者同於道諡法曰寛裕和平曰安克慎所安曰孝伏惟順聖皇帝端拱造物秉運統天可謂至德也感神翊運光明正位可謂大聖也永圖丕搆𫝊聖和保可謂大孝也臣融定加諡號謹上尊諡曰至德𢎞道大聖大安皇帝謹議憲宗加諡昭文章武大聖至神孝皇帝議臣融議曰皇莫尊乎義軒帝莫大於堯舜咸有上諡光昭厥猷光德嵬嵬徽美未稱則必追加大號式重鴻名伏惟憲宗神章武孝皇帝神授英明天假文武德惟孝養仁著君臨功格𤣥穹道孚皇極詞懸日月學奥乾坤揚十聖之耿光冠百王之丕績伏以天寳之末大歴之中郡國有倔强之臣朝廷行姑息之令所以李錡拒命自於宗枝劉闢稱兵起於儒吏伏惟憲宗皇帝上遵太宗之法次覽軒后之書親近正人委任輔相修明綱紀震動雷霆剪㓕渠魁征討叛亂無職不舉無賢不庸將靖萬方用清四海號令必一視聽無私故得夏臺伏鑕於沙陲上黨受擒於城鎮西蜀獻俘而玉京正法東呉納㓂而金陵廓開郾城纔下而申蔡削平鄆帥就誅而齊魯盡復皇威逺振神筭無遺時也滄景屛息以朝天易定束身而納地海内無事天下一家萬國来賔百蠻向化方興謀於戎狄深注意於河湟伏以疆土開拓而有時腥膻冠帶而有日逐覩赫奕休烈留付中外實主有明聖乘以英運睿謀心課越古超今陛下不有其功歸於先志掲兹上善既譲於天能光祖宗繼述前聖昨者丞相卿士請加鴻名陛下固秉冲謙再三不允今追尊祖考榮冠禹湯伏惟憲宗神聖章武孝皇帝乃聖乃神乃武乃文盛德大業經天緯地記曰武王周公其逹孝矣乎詩曰文王受命有此武功臣融定加諡號謹上尊諡曰昭文章武大聖至神孝皇帝謹議閏十一月十七日宰臣於延英殿面奉聖㫖収復河湟繼述先志將欲尊順宗皇帝憲宗皇帝右兵部尚書歸融奉閏十一月二十三日勅牒差臣定諡號者學慙淺薄文愧空虛先聖尊號謬膺論譔不敢不罄竭愚悃上副天心今諡號曰已成謹輙進順宗皇帝諡號一巻憲宗皇帝諡號一巻並各封進無任云云謹具如前勅㫖敬依典禮不任摧感宜付所司册文聖祖大道𤣥元皇帝加號册維天寳八載歳次巳丑閏六月癸亥朔四日景寅曽孫嗣皇帝臣隆基奉册大聖髙祖𤣥元皇帝臣聞有萬物者本乎大道稱謂所極乃强名焉通三才者存乎大寳敬教所底唯崇號焉伏惟象帝啟元猶龍表聖應代降跡立言垂範冲用之功覆幬於天地普救之德亭毒於生靈委裕邦家克保丕業顧以𦕈躬纘承𤣥緒永惟敷祐以致太和頃者玉芝再産𤣥記隂隲是用恭膺景命肅事鴻名既刻元辰薦彰嘉貺則有卿雲散彩瑞日重輪欽承降鑒載深兢愓謹上加尊號曰聖祖大道𤣥元皇帝伏惟昭膺盛典永貽休烈髙祖神堯大聖皇帝加諡册維天寳八載嵗次已丑閏六月癸亥朔四日景寅孝曽孫嗣皇帝臣隆基敢昭告於髙祖神堯皇帝伏惟乾坤合德歴數在躬俯順人心肇興王業濟生靈於塗炭𢎞至理於馨香四海樂推百蠻稽服故得應圖協緯開國造邦顧以𦕈德纘承丕緒永惟孚祐以致太和頃者玉芝再産𤣥記隂隲欽承景命肅事鴻名既刻元辰薦彰嘉應則有卿雲散彩瑞日重輪恭惟降鑒載深兢􅅥謹上加尊諡曰髙祖神堯大聖皇帝伏惟俯鑒䖍誠昭升盛烈祗奉典册伏増感慰太宗文武大聖皇帝加諡册維天寳八載嵗次已丑閏六月癸亥朔四日景寅孝曽孫嗣皇帝臣隆基敢昭告於太宗文武大聖皇帝伏惟英喆自天應期撥亂翼戴元聖大拯横流九服載安百蠻俾乂功冠開闢德被生靈故干戈之動叶於湯武文章之盛縣於日月克昌大業永建皇圖顧以𦕈身祗膺寳命恭惟孚佑以至和平頃者玉芝再産𤣥記隂隲是用欽承丕祉肅事鴻名既刻元辰薦彰嘉應則有慶雲散彩瑞日重輪永惟降鑒載深兢􅅥謹上加尊諡曰太宗文武大聖皇帝伏惟俯睠䖍誠昭升盛烈祗奉典册伏増感慰髙宗天皇大聖皇帝加諡册維天寳八載嵗次已丑閏六月癸亥朔四日景寅孝孫嗣皇帝臣隆基敢昭告於髙宗天皇大帝伏惟繼文纘聖嗣武居尊保合太和緝熈庶績萬邦作乂百度惟貞興弔伐之師展對崇之禮無有逺邇罔不率從仁風汪洋德澤滂沛聖謨超於䆳古休聲貫於列辟顧以𦕈德纘承丕緒永惟敷佑以致太平頃者玉芝再産𤣥記隂隲欽承景命肅事鴻名既刻元辰薦彰嘉應則有慶雲散彩瑞日重輪恭惟降鑒載深兢愓謹上加尊諡曰髙宗天皇大聖皇帝伏惟鑒睠䖍誠昭升盛烈祗奉典册伏増感慰中宗孝和大聖皇帝加諡册維天寳八載嵗次已丑閏六月癸亥􅃋四日景寅孝姪嗣皇帝臣隆基敢昭告於中宗孝和皇帝伏惟睿聖日躋文思天縱重昌大業光啟中興允昭嗣夏之功克荷纘堯之緒武以靖亂文以經邦流愷悌之風布寛和之政故得三靈叶贊百姓與能庶績咸康彞倫有穆顧以𦕈德纘承丕緒永惟敷佑以至太和頃者玉芝再産𤣥記隂隲欽承景命肅事鴻名既刻元辰薦彰嘉應則有慶雲散彩瑞日重輪恭惟降鑒載深兢愓謹上加尊諡曰中宗孝和大聖皇帝伏惟俯鑒䖍誠昭升盛烈祗奉典册伏深感慰睿宗𤣥真大聖皇帝加諡册維天寳八載嵗次已丑閏六月癸亥朔四日景寅孝子嗣皇帝臣隆基敢昭告於睿宗大聖𤣥真皇帝伏惟濬􅈒齊聖文思光澤炳兹龍德潛躍應期靖難安人克昌休運臻於至道惟懐永圖顧以𦕈身嗣膺寳命恭惟敷佑以至太和頃者玉芝再産𤣥記隂隲是用欽承丕緒肅事鴻名既刻元辰薦彰嘉應則有慶雲散彩瑞日重輪恭惟降鑒載深兢􅅥謹上加尊諡曰睿宗𤣥真大聖皇帝伏惟俯睠䖍誠昭應盛烈祗奉典册伏増感慰赦加祖宗諡號赦王者之御天下也莫不懋建皇極惟懐永圖先德禮以導人用政刑以佐理順四時而並施其化育萬物而各遂其宜然後闢土開邉逺柔邇悦衆享美利斯為大寧我國家以仁義有乾坤以道德撫夷夏其髙祖太宗經綸之列聖繼體守持之重光累洽延洪景鑠及於憲考文明武英剗稂莠於甫田振威靈於殊俗肅清澄廓庻績其凝實推中興歴十五載今予小子大構是承祗奉宗祧敬若天命遐慕唐堯恭譲之德常勵漢文菲薄之躬懍乎憂勤懼忝負荷每念河湟之壌陷為戎寇之疆百有餘年一失莫復元和中將雪前憤嘗振睿思方除孽臣未就成業永懐遺訓明發疚心近者祖禰降靈中外協志不煩攻伐不費財賦六郡連收七闗盡復削衽解辮樹領乞降犬羊竄亡億兆鼔舞厥庸有功繼志克成仰襲丕休聊用無愧臣下欲歸虚羙强我鴻名斯實先聖神功因願追尊加諡牢譲乃遂孝思獲申頒告寰區同兹徽慶且慮蒸黎之困猶疑獄犴之寃爰因獻嵗之辰乃行在宥之典可大赦天下自大中四年正月一日昧爽以前大辟罪以下已發覺未發覺已結正未結正繋囚見􅑫罪無輕重咸赦除之唯犯十惡官典犯入已賘不在赦限國忌國忌在近進􅂼菜詔朕聞大孝塞乎天地色養著乎人倫自古迄今乃生民之本也朕之不幸徃逄㷀疚未明之間屡所哀感舉目歔欷永懐罔極追慕之痛鍾此􅅋賔不樂之辰繼乎旬朔宜令外厨斷牲鱗唯進蔬菜増忌辰設齋人數勅忌辰設齋雖出近制斟酌損益貴於得中况在不遷之宗允資異數之禮五月六日二十六日兩忌設齋人數宜各加至二十人太穆文德皇后忌日亦各加倍數其寺觀仍舊十二月八日忌宜於五所寺觀共設四十人宜令所司准式太和年廢國忌日行香勅朕以郊廟之禮嚴奉祖宗備物盡誠庻㡬昭格恭惟忌日之感所謂終身之憂而近代以来歸依釋老徴二教以設食㑹百辟以行香將以仰助聖靈而㝠資福祐有異皇王之術頗乖教義之宗時因崔蠡奏論遂遣討尋本末禮文令式曽不該明習俗因循雅當釐革京城及天下州府國忌日於寺觀設齋行香起今以後並宜停廢開成四年年十月唐大詔令集巻七十八
