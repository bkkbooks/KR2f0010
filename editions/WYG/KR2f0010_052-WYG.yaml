body:
  text: 唐大詔令集巻六十二宋宋敏求編大臣冊國公冊髙士亷改封申國公文冊李勣改封英國公文冊程知節改封盧國公文冊侯君集改封陳國公文冊段志𤣥改封褒國公文冊羣臣冊張允恭鄯州都督文冊唐臨吏部尚書文冊段寳𤣥越州都督文冊喬師望凉州刺史文冊閻立本工部尚書文冊李寛太子詹事文冊李義府司列太常伯文冊劉伯英左監門衛大将軍文冊竇元德司元太常伯文冊許圉師左相文冊薛孤吳仁右金吾衛大將軍文冊許敬宗太子太師文冊張延師左衞大将軍文冊國公册髙士㢘改封申國公文維貞觀某年月日甲子皇帝若曰於戯昔周建五等漢班六條經邦之制既𢎞載祀之祚惟永是以樊侯申伯功成藩翰喬卿叔節績宣制舉惟爾特進吏部尚書許國公髙士亷識宇𢎞正風鑑秀澈地惟姻戚才稱棟幹雲雷在三運霸圗於艱難龜鼎有歸奉王猷於獻替廊廟推重縉紳佇徳總方牧之寄勝殘播美綜銓衡之職得人流詠固以聲髙多士功書太常桐柏作鎮長淮設險形勝之地允屬勲賢是用命爾為使持節申州諸軍事申州刺史改封申國公傳之子孫世為唐輔往欽哉率循典禮勉固誠節垂裕來葉以保黎庶可不慎歟冊李勣改封英國公文維貞觀某年月日甲子皇帝使某官持節冊命曰於戯列爵者必俟茂勲設官者咸資懿徳所以翼贊王室𢎞宣帝載惟爾光禄大夫行并州大都督府長史太子左衛率曹國公李勣識量恢𢎞風略𢎞逺忠以奉上信以立身獻欵西歸􅆁􅅠風美分麾東略虢鄭景従預艱難於藩邸展經綸而方面南定維揚北清大漠威振殊俗勲書丹府及入司禁旅出帥藩鎮勞勤表於夙夜績用成於期月蘄黄之地濵帶江淮鎮捍之重允屬功烈是用命爾為使持節靳州諸軍事蘄州刺史改封英國公任重六條地優五等為朕藩屏傳爾子孫往欽哉其祗膺朝命克固臣節勤恤黎元垂裕後世可不慎歟冊程知節改封盧國公文維貞觀某年月日甲子皇帝使某官某副使某官某持節冊命曰於戯蓋宣條作牧祚土建侯共治長寄藩翰斯在惟爾左領軍大将軍檢校都督宿國公程知節志懐鋭穎氣幹强果業預艱難効宣行陣入帥禁衛勤誠著於軒陛出鎮方隅惠化洽於黎俗酬庸有典式隆寵命是用命爾為使持節朗州諸軍事朗州刺史改封盧國公傳之子孫長是藩屏往欽哉爾其戎典謨之訓固臣子之節勤修政道以貽爾後可不慎歟冊侯君集改封陳國公文維貞觀某年月日甲子皇帝若曰於戯夫經邦之道必資長䇿利建之義式固無窮是以周之列國祚世藩屏漢之功臣永垂帶礪惟爾兵部尚書潞國公侯君集體業貞固識量恢凱任切腹心寄深文武草昧惟始奉一匡於藩朝光華在運典九伐於禮樂入陪禁中出臨閫外贊嘉謀於樽爼掃逋㓂於遐荒誠量嵗寒勲勒庸器宛丘之地實惟舊鎮胙土作牧允屬朝望是用命爾為使持節陳州諸軍事陳州刺史改封陳國公傳之子孫世為唐輔往欽哉爾其克固臣節思朂王度夙夜匪懈無替典則可不慎歟冊段志𤣥改封褒國公文維貞觀某年月日甲子皇帝若曰於戱夫計功裂土量能分職所以光贊王室康乂黎元惟爾左驍衛大将軍樊國公段志𤣥理懐沉毅氣幹强雄蜀漢委質早効忠欵潁州從戎備盡心力預艱難於藩朝陪戎征於閫外勤宣階陛功表旌旗方城之地襟帶巴蜀藩翰之重實俟勲庸是用命爾為使持節荆州諸軍事荆州刺史改封褒國公傳之子孫世為藩輔往欽哉爾其勉固一心朂兹六行克勤政術無替彝典可不慎之乎冊羣臣冊張允恭鄯州都督文維顯慶元年嵗次丙辰十二月辛夘朔八日戊戌皇帝若曰夫安邊訓俗有國之先務簡賢任能為政之常典惟爾蘭州都督安陸縣開國公張允恭器宇詳整識用通逺夙著勤誠早延恩遇朔方違夐𦍑戎薦居降節監撫綏懐攸屬是用命爾為使持節都督鄯蘭河儒廓深濠七州諸軍事鄯州刺史封如故爾其鎮静幽荒式清姦宄憺威稜以肅逺明賞罰以垂信無怠庶政率由舊章光膺寵命可不慎歟冊唐臨吏部尚書文維顯慶二年嵗次丁巳十月丁亥朔十九日乙巳皇帝若曰昔虞舜分司元凱膺機揆之任當塗受命盧毓處銓綜之重故能翊宣景化協贊時雍惟爾度支尚書唐臨器識沉敏􅋵履貞潔譽滿同行效彰官次損益機務爰著循聲藻鑑流品是資清識是用命爾為吏部尚書爾其懸衡處物虚心待士求賢審官循名責實祗承朝寵可不慎歟冊段寳𤣥越州都督文維顯慶三年嵗次戊午七月辛己朔十九日己亥皇帝若曰於戯夫成俗康邦寄深於岳牧宣風闡化任重於循良惟爾銀青光禄大夫行洛州長史段寳𤣥體量凝整理懐貞贍總務仙䑓能官著於紀綱分司棘署令德表於平昃三川之野允敷聲績九江之地爰資鎮撫是用命爾為使持節都督越台括婺泉建六州諸軍事越州刺史爾其勤加恤隠勉思為政審之以刑獄馭之以公平革剽悍之風歸淳質之軌欽兹寵命可不慎與冊喬師望凉州刺史文維顯慶三年嵗次戊午十月庚辰朔十一日庚寅皇帝若曰於戯夫恤隠求瘼義重於循良撫衆懐邉允資於才幹惟爾正議大夫凉州都督駙馬都尉喬師望風情敏濟志略明逺夙承寵榮早預驅馳仗節秋方功勤克展分符朔野政利伊肅玉門逺控金城遐阻人兼北狄地雜西戎刺舉為難式遏斯重是用命爾為使持節八州諸軍事凉州刺史駙馬都尉如故往欽哉祗膺典冊勉修爾令徳思効爾忠規垂清白之風布平廣之化絶姦宄於亭障徵訟獄於閭里嗣其和氣之美革彼貪婪之化光我王度可不慎與冊閻立本工部尚書文維顯慶四年嵗次己未三月戊寅朔十七日甲午皇帝若曰職管納官任専機事上非徳而不受下非才而不處咨爾将作大匠上䕶軍閻立本識局周敏理懐通悟體忠勤而表性資仁恕以立身而思協多能藝兼衆美委質運始䇿名朝列知効光於果職聲猷布於歴紀爰緝水土之官實諧縉紳之論是用命爾為兼工部尚書勲官如故往欽哉其敬承休命獻善之規攸屬持平之務斯在克恭惟允可不慎與冊李寛太子詹事文維顯慶四年嵗次己未三月戊寅朔二十五日壬寅皇帝若曰於戯弼諧儲副必俟才英總務宫端允資忠量故漢朝選徳受禮峻於竇卿晉代遴賢升榮歸於謝琰咨爾金紫光禄大夫懐州刺史上原縣開國侯李寛識局沉謹理懐詳正勤誠表於内外智効張於文武聲猷載闡齒秩兼優博望斷裁之規與能僉屬承華弹肅之寄任賢在斯是用命爾為太子詹事封如故往欽哉其祗膺茂典勉修乃職景前哲之髙踪垂後昆之令譽對揚休寵可不慎與冊李義府司列太常伯文上官儀皇帝若曰於戯山祗誕况協申甫於昌期河靈屬符埒蕭張於景運故乃訏謨帝載葳㽔鼎業宣猷華於樽爼爕政藻於丹青望重九霄道光五政咨爾兼吏部李義府逺資門徳獨秀人靈照赤野而合輝映青田而寫韻孝睦為本錫𩔖之範彌彰清白為基畏知之迹愈劭金嬴仞彩辨終豹於書林珠握分光騁鄒龍於筆海柏䑓摛公晏之藻蓬閣開良直之謨勝望挺於何車竒謀表於韓劍彝倫寄其元穆品鏡任其清通矯翮培風拂雲霓而髙邁聳鱗遊霧排閶闔而上馳行孚朋親聲流簪組是用命爾為司徒太常伯勲封如故同東西䑓三品往欽哉爾其卑以待物持盈之理斯存慎以節躬數服之情為重道申規獻義先啟沃祗膺茂躅可不慎與龍朔二年二月五日冊劉伯英左監門衛大将軍文皇帝若曰閶闔任隆周盧禁切旣忠賢之允著實韜略之兼優惟爾冠軍大将軍行左驍衛将軍山陽郡開國公劉伯英志力沉濟襟情爽烈早標竒正之術彌光廵警之功偃沙巨海闕功宣六豹氣壓三韓折衝之效有聞爪牙之任攸屬式疇徽烈擢衛宸闈是用命爾為左監門衛大將軍封如故往欽哉爾其職司無荒朕命不虞之寄可不慎與龍朔二年冊竇元徳司元太常伯文上官儀皇帝若曰於戯總務文昌司㑹之名尤重升榮建禮内史之職彌隆自非才氣兼洽聲譽充盛何自式管榮辱對揚綸綍惟爾大司憲䕶軍竇𤣥徳門列克章地華合緒踐中和而立性資乂徳以含章禮固騰芳儒彌擅寳寵謀動於簮紱令範光於廊廟攝官憲府勵俗而挺嘉猷受委王京匪躬而輸懿績効宣朝任誠著周行申其寛直之規三攝損益之任是用命爾為兼司元太常伯勲官如故往欽哉爾其供奉彝倫式昭王度勉爾忠正之誠無忝恪恭之表納吉之寄可不慎與龍朔二年十月十一日冊許圉師左相文皇帝若曰於戯王宫用人弼化佇於丹青宅揆代工成物資於薪槱軼紀龍而遐翥闕奉王劍於副車儼金璫於重席使繁斯在聞望攸歸咨爾左常侍檢校左廂兼行太子右中䕶柱國平息縣開國公許圉師箕峰搆極横渚𣲖源幹業峻其家風象賢益其門慶神機獨照靈府洞開識宗云箧敏該違珮列榦雲敷升漢䑓而協彩禪亮波偃懸魏帳而均輝習武經文綢繆於丹扆履忠蹈義周旋於𤣥墀石室蘭坊彯筆纓而振迹邇闈綸閣飛若綬而盱衡揚歴郡能執鈞伊寄是用命爾為左相勲封如故往欽哉爾其爕諧帝載克固之躅恢融王道式茂如仁之規削茶止奨可椒茹茅其於上賞纂先烈而騰懿裕後昆而垂則祗膺朝奨可不慎與龍朔二年十月七日冊薛孤吳仁右金吾大将軍文上官儀皇帝若曰於戯望重韜鈐藉董戎之戒志齊金石膺禦武之求用深聞鼙之慮式著銜珠之象惟爾右金吾将軍朔方郡開國公薛孤呉仁志局開爽貞規乆濟日契絳官之術宜符玉帳之機賈勇三軍著折闗之實効誠輸八陣標斬將之竒功樹績方隅書勲王府出茂於分閫入隆於文戰騰此師訓既穆朝經錫以徽章聿酧僉議是用命爾為右金吾衛大将軍封如故往欽哉其勵乃忠貞恭兹奨飾祗承寵命可不慎與冊許敬宗太子太師文皇帝若曰於戯鳳紀龍名茂績光於銘槧礪金鈎玉嘉庸絢於緹油葢以協贊帝圗弼成鼎命矧乃望髙咸一超庶尹而馳風道鬰半千冠羣后而宣譽咨爾光禄大夫行右相許敬宗藉敬生徳基賢誕秀謀猷經制識度英逺培風逸幹業峻於巨臣㓕景宏才器隆於王佐詞源清泌濯色於彫鞏藝苑冲深抽華於繡牒揮汗淚於丹液矯豐餌於雞栖翊𢎞詞於青闈彯長纓於鶴籥訪温樹之緘對譽宵燭而題明盛列輝於西豪茂表功於東第寵翠泉軒聖掩丹雲固知其可以作訓元儲聳揺山之囬搆喻水善二激伊水之長瀾是用命爾為太子太師監修國史等並如故同東西䑓三品仍知西䑓事往欽哉爾其肫而乘謙思克已而蹈禮恒晨謁金墀事切於忠謇夜隨銀啓義先於調䕶靖恭朝列可不慎乎冊張延師左衛大将軍文皇帝若曰於戯姬厯初冲是資方郡之列漢圗攸永往隆南北之軍故鏤鼎垂勲銘常紀効坐樹之名為重聞鼙之慮實深惟爾左衛大将軍檢校羽林軍上柱國張延師志局淹凝識度閑雅當風雲之㑹遇經綸之日執覊霸府盡忠肅之勤誠聳劍元戎罄旌旄之茂績有六竒之秘術藴三畧之宏規邁遐烈於孫呉掩芳聲於羊杜酬報之迹紀運頻周光華之典賢才攸屬是用命爾為鎮軍大将軍行左衛大将軍餘如故往欽哉其敬揚爾績勉膺朝奨勉爾幹慎之規宣明竒正之法連徽往彦可不慎與唐大詔令集巻六十二
