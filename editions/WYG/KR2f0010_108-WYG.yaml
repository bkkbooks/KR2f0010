body:
  text: 唐大詔令集巻一百二十九宋宋敏求編蕃夷册文册突厥李思摩為可汗文册踈勒國王文册莫賀咄吐屯為順義王文册突厥苾伽骨吐禄為可汗文册骨吐禄三姓毗方伽利發文册突騎施黒姓可汗文册囬紇為英武威逺可汗文册新羅王金乾運文册新羅王太妃文册新囬鶻可汗文册囬鶻可汗加號文册囬鶻彰信可汗文大中十一年册囬鶻可汗文盟文扶餘與新羅盟文與吐蕃㑹清水盟文賑䘏遣使賑䘏撫囬鶻制捨雪原吐谷渾制宥吐谷渾詔洗雪平夏党項德音册文册突厥李思摩為可汗文於戲突厥部衆代居沙漠尤戒纔舉龍城克定三部種𩔖十角酋渠咸襲冠帯俱為臣妾朕光宅六合亭育萬品爰降大造存其亡國既復故庭乃樹君長惟爾右武侯大將軍化州都督懷化郡王李思摩器量眀逺識用𢎞通地稱貴種望髙賜姓忠孝之節簡於朕心眀智之材重於蕃落朕是用命爾為乙彌泥孰侯利苾可汗𫝊之子孫為唐蕃屏上鑒自古下親近代守誠節者咸保其國人為凶惡者必及於覆敗徃欽哉爾其鑒兹徃事祗聼朕言奉國以丹赤為先御下以信義為本勉正爾身勤䘏爾衆無昵邪佞無逺忠良無自驕奢無逞貪暴兢兢業業以綏爾疆土可不慎歟貞觀十三年七月册踈勒國王文維開元十六年歳次戊辰正月戊辰朔十四日辛亥皇帝若曰萬邦述職無隔華夷五等疏封式固藩屏咨爾疏勒阿摩支知王事左武衛將軍員外置裴安定誕靈蒲海禀秀蔥山緼義以立名蹈仁而成德雖日月所照莫非王土而􅇏燧時驚猶曰虜庭遂能捍彼邉陲歸我聲教載闡疇庸之義俾𢎞利建之風今遣大理正攝鴻臚少卿裔夢松册爾為疏勒王於戲允廸由庚勿替敬典綏厥戎落永為漢藩徃欽哉册莫賀咄屯為順義王文維開元二十八年嵗次庚辰三月丁亥朔一十二日戊申皇帝若曰於戲茂秩攸升疏封有命寵榮斯及必在英賢咨爾石國王莫賀咄吐屯代襲誠節器標果斷盡忠淳化作捍藩陲頃以蘓禄殘妖尚為邉梗乃能因其隣國授以良圖候彼疆場相為表裏致令克清邉徼逺輯殊方實頼心膂載宣勲力静言褒異非爾而誰是用册爾為順義王爾其敬慎王猷撫寕部衆永保藩輔可不慎歟册突厥苾伽骨吐禄為可汗文維開元二十八年嵗次庚辰三月丁亥朔二十六日壬子皇帝若曰於戲乃瞻隂方代有君長至於膺我盛禮榮彼殊隣必擇其人謀無虚授咨爾突厥苾伽骨咄禄可汗氣禀崆峒材雄朔漠見事無惑執心不渝先代以來結好中國自纘承舊業克維前修逺遣使臣来朝闕下義之所感情實加焉不有褒稱孰彰忠順是用册爾為可汗今遣從弟左金吾衛將軍質持節札册徃欽哉可汗其丕承徽章益勵名節永保多福以昭后昆可不慎歟册骨吐祿三姓毗方伽頡利發文維天寳十二載嵗次癸巳九月已亥朔六日甲辰皇帝若曰咨爾骨咄禄伊難如三姓毗方伽頡利發夫崇德報功帝王之事講信修睦人臣之禮卿久佐藩部備吏戎落知薦居不可以茍安早賔朝化蕃俗不能自理逺仗皇威深悟正變之通克知成敗之理豈惟欵塞之懇常有捍邉之心言志披誠有増嘉歎今授卿左羽林軍大將軍員外置同正員兼賜册書鉄劵永執蕃禮無替華風克終令名常保禄位可不慎歟册突騎施黒姓可汗文維天寳十二年嵗次癸巳九月已亥朔六日甲辰皇帝若曰咨爾骨咄禄毗伽突騎施黒姓可汗特進登里伊羅宻施立國推姓表賢在忠既効信以推誠亦旌忠而懋賞卿才略備舉知勇兼資強足抗敵威能率下故得甲兵孚訓族𩔖懷仁既嚮順以移風亦事大而知禮是用載加顯秩式崇錫命今授卿特進為突騎施可汗卿敬勉良圖光昭盛典保我疆場惡我㓂讎俾業固山河福綏種落永私恩寵可不慎歟册囬紇為英武威逺可汗文賈至維至德二年嵗次丁酉十一月某日皇帝若曰夫定禍亂者曰武建功名者曰義惟武與義是謂明德囬紇毗伽可汗生而英姿邁越前古代濟威赫主祀北天與唐唇齒累葉姻好安禄山竊弄邉兵暴亂中夏誘脅戎卒毒蠧黎人而可汗感激義動天地爰命葉䕶統率鋭師叶贊官軍駈除兇逆或掎其足或角其首一旬之内雍洛掃清振古已來義莫斯大朕是用式遵典禮封崇徽號敬册可汗為英武威逺可汗每載賞絹五萬疋於戲隂陽和而天地㤗四時和而萬物阜北土未靖有唐封而固之中原多難可汗義而助之惠好和洽與日月永子孫百代克享鴻休欽哉其無替朕命册新羅王金乾運文常衮維大厯三年嵗次戊申正月朔二十八日皇帝遣其官某乙持節册命曰於戲建萬國者不獨於中夏嗣一姓者必求於令德咨爾新羅王金憲英男乾運爰自祖宗撫有東表克生明懿載茂勲伐采章文物乆治華風忠敬孝恭率由純性用藩君子之國能執外臣之禮夫繼代之重擇賢而立是用建爾冢社祚于青丘敬其所守纂其舊服忠以奉上惠以撫下永修東蕃之職無替先君之命肅膺典禮可不慎歟册新羅王太妃文維大歴三年嵗在戊申二月景子朔十日皇帝使某官某乙持節册命於戲于承家嗣作藩輔之臣每加尊稱葢春秋之義咨爾新羅王金乾運母素推勲族雅有華風其德可尚其儀可則鑒於圖史式是禮容儷東方君子之國處中壼貴人之位事上以敬接下以仁睦我親隣亦資内助有教子之明訓膺繼代之新命固可以崇峻徽章光昭盛德是用册曰新羅王太妃脩乃慈範撫其嗣君永懐前人無改其道欽承典册可不慎歟册新囬鶻可汗文白居易維長慶元年嵗次辛丑四月丙寅朔二十一日丙戍皇帝若曰唐有天下垂一百載列聖垂拱八荒即叙舟車之所及日月之所照威綏仁量罔不向化惟此之氣積厚而靈靈發象生生象豪傑義信武烈代為名王南西東方亦有君長其雄圖闘智莫之與京國朝已来䆮清風澤或効功伐或申昏媾同和協比以訖於今今朕不德繼嗣大統推義布信以初為常矧乎柔逺申恩睦隣典禮兹惟舊典垂自祖宗䖍奉恭行安敢失墜咨爾九姓囬鶻君登里羅羽録沒宻施句主録毗伽可汗地生竒特天賜勇智英姿所蒞雄畧所加諸戎雜虜愛畏率服風靡山立清寧一方宜人有土受天百禄時惟代嗣實来告予曰予一人實降册命是用遣使朝議大夫檢校左散騎常侍兼少府監御史大夫雲騎尉賜紫金魚袋裴通副使朝議大夫守少府少監兼御史中丞襲衛國公食邑三千户賜紫金魚袋賈璘等持節備物册為登里羅羽録沒宻施句主録毗伽可汗於戲善必有隣德無不答此崇恩禮則彼竭信誠克保大義永藩中夏昭昭天地實聞斯言册囬鶻可汗加號文維長慶元年嵗次辛丑某月朔某日皇帝若曰北方之強代有君長作殿𤣥朔賔於皇唐粤我祖宗錫乃婚媾五聖六紀二邦一家此無北伐之師彼無南牧之馬兵匣鋒刃使長子孫叶德保和以至今日咨爾囬鶻君登里羅羽録沒宻施句主録毗伽可汗義智忠肅武力勇健天之所授時而後生故東漸海夷西亘山狄惠寧威制鱗帖草偃聲有聞於天下氣無敵於荒外而能事大圖逺納忠進賢請仍舊姻誓嗣前好朕惟睦鄰是務柔逺為心既降和親之命遂申納配之禮禮物大備寵章有加喜動隂山光増􅄧宿夫以囬鶻雄桀如彼慶榮若此雖自貴曰天驕子未稱其盛雖自號曰天可汗未稱其美宜賜加號以大誇將来今遣使某官副使某官某等持節加信義勇智雄重貴夀天親可汗於戲釐降展親大德也進册加號大名也宜思大德稱大名懋哉始終欽若唐之休命册囬鶻彰信可汗文維太和七年嵗次癸丑某月日皇帝若曰王者運神功以清九有敷至德以柔四夷雖萬國建邦皆有君長而一時縟禮特厚親隣用昭絶漢之榮式示徽章之貴克膺盛典允屬雄材咨爾九姓囬鶻愛登里羅汨沒宻施合句録毗伽彰信可汗代濟公忠時推英毅剛明有守信實不渝總北方勁悍之師慕中華清净之化克紹前訓實懐逺圖慶叶承家願申永好彼無侵軼此務綏安兩國咸歡六姻彌重事大之義而志合春秋相向之誠而皎如日月信使旁午贄幣交馳詞意綢繆禮自恭恪是嘉誠信宜賜寵光必飾虔受新恩纂乃舊服今遣使寧逺將軍兼御史大夫上柱國紫金魚袋嗣唐王𢎞實副使大夫將作少監兼御史中丞賜紫金魚袋嗣澤王容等持節備禮為九姓囬鶻愛登里羅汨沒宻施合句録毗伽彰信可汗於戲海内四域惟唐舊封天下一家與我同軌今兹典布於神明爾其慎固封疆祗守名器罔墜先烈載揚今猷欽承禮文以作来範大中十一年册囬鶻可汗文皇帝若曰我國家誕膺天命光澤中土君臨九有包舉八荒聲教所加册命咸及而况囬鶻北方之強代濟之烈惠行鄰境俗慕華風立國以来嘗效臣節代為甥舅每嵗通和推誠不疑為我與國當㑹昌之際自屬天灾人罕粒食上下離散牙帳為靈地多種落所侵國甚委離之難自登寳祚每軫素懐爰發使臣訪其後嗣軺車既出蕃使員来咨爾囬鶻可汗挺此雄材生於貴族能收既絶之燼常懐再振之心願嗣天驕載歸地着發使請命誠辭可哀夫親仁善隣國家之寳興滅繼絶王者之宜况朕布德滂仁施於海外爾乃堅誠勵節行乎域中所以公侯子孫道在必復華夏屛衛理宜長存既將還定舊封式承墜緒克紹崇媾用迓鴻休今遣使臣朝議郎檢校秘書監兼衛尉少卿御史中丞上柱國賜紫金魚袋王端章副使臣朝議郎檢校尚書工部郎中兼國子禮記博士御史賜緋魚李潯持節備禮册命為九姓囬鶻温禄登里羅汨沒宻施合俱録毗伽懐建可汗爾其服我恩榮膺兹位號勉修前好恢復故疆宜克已於蹛林長歸心於魏闕無怠爾志永孚於休大中十年十二月盟文扶餘與新羅盟文徃者百濟先王迷於逆順不敦隣好不睦親姻結托髙麗交通倭國共為殘暴侵削新羅剽邑屠城畧無寧嵗天子憫一物之失所憐百姓之無辜頻命行人遣其和好負險恃逺侮慢天經皇赫斯怒共行弔伐旌旗所指一戎大定固可瀦宫汚宅作誡来裔塞源抜本垂訓後昆然懷柔伐叛前王之令典興亡繼絶徃哲之通規事必師古𫝊諸曩册故立前百濟太子司稼正卿扶餘隆為熊津都督守其祭祀保其桑梓依倚新羅長為與國各除宿憾結好和親恪承詔命永為藩服仍遣使人右威衞將軍魯城縣公劉仁願親臨勸諭具宣成㫖約之以婚姻申之以盟誓刑牲㰱血共敦終始分灾䘏患恩若弟兄祗奉綸言不敢失墜既盟之後共保嵗寒若有背叛不恒二三其德興兵動衆侵犯邉陲明神鑒之百殃是降子孫不育社稷無守禋祀磨滅罔有遺餘故作金書鉄劵藏之宗廟子孫萬代無敢或犯神之聼之是饗是福麟德二年八月與吐蕃㑹清水盟文唐有天下恢奄禹跡舟車所至莫不率俾以累聖重光歴年惟永彰王者之丕業被四海以聲教與吐蕃贊普代為婚姻固結隣好安危同體甥舅之國將二百年其間或因小忿棄惠為讎封疆騷然靡有寧嵗皇帝踐祚愍兹黎元俾釋俘囚以歸蕃落蕃國展禮同兹叶和行人徃復累布成命是必詐謀不起兵革不用矣彼猶以兩國之要求之永久古有結盟今請用之國家務息邉人外其故地棄利蹈善堅盟從約今國家所守界涇州西至彈筝峽西口隴州西至清水縣鳯州西至同谷縣暨劍南西山大渡水東為漢界著國守鎮在蘭渭原㑹西使臨洮東至成州抵劔南西界磨些諸蠻大渡水西南為蕃界其兵馬鎮守之處州縣見有居人彼此兩邉見屬漢諸蠻以今所分見住處依前為定其黄河以北從故新泉軍直北至大磧直南至賀蘭山駱駝領為界中間悉為閑田盟文所不載者蕃有兵馬處蕃守漢有兵馬處漢守並依見守不得侵越其先未有兵馬處不得新置并築城堡耕種今二國將相受辭而㑹齋戒將事告天地山川之神惟神照臨無得愆墜其盟文藏於宗廟副在有司二國之成其永保之建中四年正月賑䘏遣使賑撫囬鶻制自古令王撫寧荒服忠於國者則有繫絶之恩順於道者則有固存之義所以原其鄉化優以報功囬鶻累代姻親人修臣禮服我聲教保玆信誠嘗以國難識其忠良嚴霜見其貞松疾風知其勁草永言勲力豈忘予懐如聞訖扢斯攻兵折衆叛畜産大耗國又薦饑流離轉徙逺逾沙漠近因大和公主遣使入朝已知新立可汗寓居塞下告窮請命未有所歸每念艱危載深憫惻今欲救恤窮困撫慰傷痍使四方知朕不忘舊勲報其大順昔匃奴乖亂呼韓近塞漢宣帝轉粟賑救權而施宜故得三代稱藩北邉罷警前王令典可不務乎宜令左金吾衞大将軍兼御史大夫王㑹持節充安撫大使宗正少卿兼御史中丞李師偃充副使專往慰問仍賑米粟二萬石俾其安輯離散漸就漢南再復舊疆永保恩好宣示中外宜體朕懐㑹昌元年十二月捨雪原吐谷渾制伐罪弔人前王髙義興亡繼絶有國令典吐谷渾擅相君長竊據疆場䖍劉黎庶積惡既稔天亡有徴朕君臨四海含育萬𩔖一物失所深責在余所以爰命六軍申兹九伐義存活國情非黷武其子大寧王慕容順隋氏之甥志懷明悟長自中土早慕華風爰見時機深識逆順以其父愎諫違衆獨陥迷途遂誅邪臣存兹大計翻然改轍代父歸罪忠孝之羙深有可嘉子能立功足以補過既往之釁特宜原免然其建國西鄙已歴年代即從廢絶情所未忍繼其宗祀允歸命𦙍可封順西平郡王食邑四千戸仍授趉胡吕烏甘豆可汗所司量遣使人備禮册命貞觀九年五月宥吐谷渾制文德懷逺列聖之𢎞規興亡繼絶至仁之通訓吐谷渾發迹東胡竄居西域負險自固擅立君長爰在前代通使中原或為叛臣不恒厥德近者纂歩薩體為主老而智昏迷而忘反志懷首鼠䖍劉疆場朕頻命行人殷勤誘諭不納忠信之言唯行蜂蠆之毒及六軍問罪尚令申諭遂無懷革以至滅亡其子順困蹙事窮措身無所委命下吏輿櫬轅門故命觧網釋俘維其宗祀乃懷一志遵彼覆車曾未浹旬自貽屠戮子燕王諾曷鉢弱不好弄㓜稱通理統纂舊業即逄内難故遣旌節逺申安撫遂能率其種𩔖同竭欵誠盡落頃巢趨謁使者屈膝頓顔遵奉朝化請頒正朔願入提封丹誠内發深可嘉尚宜隆寵章懋兹賞典可封河源郡王食邑四千戸仍授烏地也㧞勒顔可汗即遣使人備禮册命貞觀十年三月洗雪平夏党項德音平夏南山雖云有異源流風俗本貫不殊我國家累聖以來許居内地乆奉聲教亦立功勞朝廷撫綏常存恩信近者邉陲之歸制御乖方遂有兇悍之徒不率父兄之教或侵暴州鎮或攻掠道途告諭㒺悛猖狂頗甚朕君臨區宇深念黎元凡曰含生皆同赤子但欲為民除害固非黷武佳兵再覩殺傷深多憫惻是以去年特雪平夏駈除南山及聞窮困無歸復有懷來之意遂令敏中李安業分統諸軍先示招携仍加訓練但知非則赦免不得已則誅鋤王者之師義實在此近得敏中狀申南山盡願歸降瀝懇輸誠唯思展効請般運糧料乞保䕶封閲其奏章深惬朕意昔者或有剽刼必推南山南山或有㓂攘亦指平夏既相非斥互説短長終難辨明祗益仇怨今則並從洗雪咸許自新但能各務安全逓相勸勉保其生業絶彼侵踰從前所有僭違自此一切不問准鹽州深居沙塞土乏農桑軍士衣粮湏通商旅沿路堡栅事湏修營令委李安業依朝廷制置差兵建築防守猶恐部落忘懐疑慮仍令李安業駐軍塞門朕之屈法從人斯為極矣若執迷不返干犯國章後悔難追唐大詔令集巻一百二十九
