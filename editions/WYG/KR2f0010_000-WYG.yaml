body:
  text: 唐大詔令集詔令奏議𩔖一詔令之屬提要臣等謹案唐大詔令集一百三十巻宋宋敏求編敏求字次道趙州平棘人參知政事綬之子進士及第官至史館修撰龍圖閣直學士事蹟具宋史本𫝊敏求嘗預修唐書又私撰唐武宗以下實録一百四十八巻於唐代史事最熟此集則本其父綬手輯之本重加訂正為三十類熙寧三年自為之序稱繕寫成編㑹忤權解職顧翰墨無所事第取唐詔令目其集而弆藏之云云葢其以封還李定詞頭由知制誥罷奉朝請時也其書世無刋本轉輾抄傳訛誤頗甚中闕巻第十四至二十四八十七至九十八凡二十三巻參校諸本皆同其脱佚葢已久矣唐有天下三百年號令文章燦然明備敏求父子復為裒輯編類使一代高文典冊眉列掌示洵足為考据之資其中不盡可解者如裴度門下侍郎彰義軍節度使宣慰等使制據舊唐書其文乃令狐楚所草制出後度請改制内剪其類為革其志改更張琴瑟為近輟樞衡改煩我台席為授以成算憲宗從之楚亦因此罷内職是當時宣布者即度奏改之辭今此集所載尚仍楚原文不依改本未詳何故又寶厯元年冊尊號赦據敬宗本紀時李紳貶官李逢吉等不欲紳量移乃於赦書節文内但言左降官已經量移者量移近處不言未量移者宜與量移翰林學士上疏論列帝命追赦書添改之今此集所載祇及赦罪一條而無左降官量移之文疑亦有所逸脫又舊唐書所載詔㫖最多今取以相校其大半已入此集而亦有遺落未載者如紀號則改元天祐詔除授則尹思貞御史大夫李光弼兵馬副元帥諸制追贈則張說贈太師楊綰顔真卿李絳贈司徒郭曖贈太傅鄭朗贈司空田布贈僕射諸詔優禮則杜佑蕭俛致仕諸詔奬勸則勞解琬奬李朝隠褒美令狐彰奬伊西北庭二鎮諸詔謫降則王毛仲韓臯吕渭張又新李續之熊望貶官諸詔誅竄則決殺長孫昕流裴景仙裴茙諸勅皆關朝廷舉措之大者而此集並闕而不登以敏求博洽不應疎於蒐採或即在散佚之中亦未可定䆒不免於放失不完之憾然唐朝實錄今既無存其詔誥命令之得以考見者實藉有是書亦可稱典故之淵海矣乾隆四十四年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀唐大詔令集原序唐大詔令集者先君宣獻公景祐中書第三闕所纂也先公以文章名世更内外制之選而朝廷典册多以屬之及入陪宰政仁宗數面命撰述於是有中宫册文三后不遷及條列兵農置睦親宅朝集院等詔機務之隙因裒唐之徳音號令非常所出者彚之未次甲乙未為標識而昊天不弔梁木遽壞小子不肖大懼失墜秘其書於家楹者盖有年矣僕射王文安公累以為問謂當垂世不朽乃緒正舊藁十三𩔖總一百三十巻文安見許序而名之未果而公薨治平二年先皇帝簡拔孤陋寘在西掖固欲澡雪䝉滯而鑚仰衆製方繕寫成編㑹忤權解職顧翰墨無所事第取唐大詔令目其集而弆藏之云熈寧三年九月晦右諫議大夫宋敏求謹序
