body:
  text: 唐大詔令集巻七十二宋宋敏求編典禮南郊大中元年南郊赦乾符二年南郊赦南郊大中元年南郊赦正月十七日門下執大象者導隂陽之和帝率土者茂生植之化粤自軒昊暨於唐虞側身皇階虛已大寳握金鏡之明耀致玉燭之融明恵中國以綏四方欽上𤣥而育兆庶所謂至德勞深企懷朕荷先帝之眷求奉祖宗之成憲獲撫萬國統和三靈兢嚴丕搆惕勵神器實賴昊穹嘉享神祗降休蠻夷戎狄之聿来鳥獸草木之咸若真宰潛運𤣥功啟光麥禾豐登兵革偃息物不疵癘人無夭昏發揚氤氲數佑寡昧夙夜祗戴訏謨紀經尚懼德教之未宣黎元之未泰暴虐之害政朋邪之敗風常軫念困窮思臻富庶每興赤子之嘆不知黄屋之尊爰因首政克舉彞典告受命之纂緒展嚴配之盛儀柴燎升聞馨香殷薦羣禮昭答百神来享精誠既達感慶良深是用肆𤯝恤刑改元建號利時者不廢便人者必行俾覃在宥之恩以順發生之氣與之更始咸使惟新可大赦天下改㑹昌七年為大中元年乾符二年正月七日南郊赦元化序時日月啟貞明之照神功宰物乾坤垂覆幬之仁萬物仰而遂生百王體以為用朕䖍膺睠命恭守丕圖懼忝所承慮違厥道每馭朽以思戒若渉川而靡寧自臨御以来夙宵増勵幸而文修政簡歳稔人安賞罰惟公忠厚成俗道漸臻於清浄理將致於雍熈由是禮上帝用答天休御端門以崇皇極是彰報本式叶元休尚念蠧於政事者未除害於時俗者未革盡施條制以絶根源更表申恩仍行肆𤯝昔殷湯觧網實謂至仁漢文措刑永稱聖理在宥乃為君之德好生實有國之規今復承以陽春之時布其渙汗之典上符天意旁契人心大禮備陳彞章克舉謀猷廣備聲教遐宣期昭泰於寰區亦涵濡於動植溥天率土既樂𤣥風四海九州宜覃慶澤可大赦天下自乾符二年正月七日昧爽以前大辟罪以下罪無輕重已發覺未發覺巳結正未結正繫囚見徒常赦所不原者咸赦除之惟犯十惡叛逆以上及故殺人官典犯入已贓兼情渉巨蠧及持杖行刼并故殺人者雖巳傷未死更生意欲殺傷偶時死者並同巳殺人法處分買賣毒藥開刼墳墓及刑獄之内官吏用情推勘不平因成寃濫無問有贓並不在原免之限敦本睦親古今典制永惟負荷常切憂兢應宗室有材行可昇淪落在外並委宗正卿專加察訪旋申尚書門下量材處分惠安皇太后凡有緦麻以上親各委所在搜訪聞奏仰酬顧復何擇親疎爰念播遷重命牽復至於殂謝亦使惠綏用表深仁以彰𤣥化左降官量移近處已經移者更與量移如官至刺史准刺史月限例處分諸色官未復資者有司别條疏聞奏如合復資者五品以上中書門下便與處分六品以下任依常例選集丁憂去任及在憂制受貶者服闋日亦與量移縁責除降資正員官及縁累停免未經引用者並量與進改流人及降死從流者移近地如已収叙者量材錄用并僧尼道士移隸者亦放還勸善懲違朝廷大典茍或隳紊何以聳人其流貶人其中或有情狀巨蠧物議不容者不在該恩者流貶人如巳亡歿家口欲還及須歸葬者聽随所便如縁𦵏事㓜弱飢寒不能自濟者委所在長吏量給棺櫬優恤發遣左降官及流人等有官者如已殁各還本官亡官失爵㾗累禁錮者並從洗滌諸色流貶人元勅内云雖逢恩赦不在量移之限有自前年十月十二日赦書後已量移者五千里更與量移一千里三千里外與量移五百里情狀難容者不在此限天德五城流人負罪素重元勅未經十載不得放還今屬洪恩須令沾及宜减三年如年限以来滿便放還從九月四日降郊禮勅後流貶及引决妄稱寃人等并重推覆囚徒並不在此限近日奸險之徒多造無名文狀或張懸文榜或譔造童謡此為弊源合處極法應捉獲此色者准持杖刼人合造毒樂例經赦不原其所得文狀准律文於所在焚毁不得徴逋贓以利疲人是叶政經期為理本京兆府去年夏青苗錢每貫量放三百文所放錢如是有司占留色目委戸部准舊例據數支填其咸通十一年以前百姓積欠兩税斛斗及青苗𣙜酒錢并私草職田糠麥趙棘棘等徴収不得空繁簿書者前年十一月十二日赦令巳令蠲放至今尚未了絶宜令所司速具放免錢物數目分析奏聞如在官典所由腹内者不在此限從咸通十三年夏以前京兆府所欠諸陵園及諸軍諸使錢草斛斗并諸雜物一物以上宜並放免其諸縣所欠府司錢草斛斗一物以上亦並放免從咸通十三年夏以前京兆府所欠諸陵掌閒彍騎丁資三衛昔資錢亦並放免甸内逃亡人户尚徴税物切要條疏以安疲瘵委京兆府差官逐縣勘覆其逃亡人戸産業田地未有人承佃者其隨田地苗税除栢𣙜酒錢及斛斗等並權放三年勒常切招召人戸三年後再差官勘覆據歸復續却収税從咸通十三年以前甸内所欠延資庫户部度支𣙜酒除栢天和糴賑貸錢物斛斗一物以上並宜放免内庄宅使巡官及人户等應欠大中十四年以前至咸通八年以前諸色錢六萬二千三百八十貫三百文斛一十萬三千七十四石九十絲二十二萬七千五百八兩麻二千四百七十斤草二十六萬五千八百五十五束念其累歳不稔人戸貧窮徒有鞭笞終難徴納並宜放免三司所錢物巳遣不徴必慮依近遣尚猶追擾度支户部鹽鐡三司應収管在城及諸州府諸塲監院所欠咸通十年以前諸色錢物斛斗等前年十月十二日赦文並令放免所司不得更生節目妄有進徴如聞所司官吏縁循至今尚有盤勘都非公但務生情歳月轉深奸弊頗甚各委本司差定官一人専勾當但據見在文帳檢勘除官典所由請領官錢和糴和市及在場官供官招商所由帳内正身見在外其身已亡歿曽經檢責及其身見在貧窮家業蕩盡無可徴納者并逃竄捕役未獲囚繫妻男攤徴保人等仰便據年額請免除去簿書不得更行文牒妄有盤問赦書下後限一箇月内具放免錢物單數分析聞奏如更稽遲本勾當郎官當議貶黜典吏等痛加懲斷停觧天下州縣官銓司注擬便有選自朝廷多故三司監院官索州縣承迎云是制院恐嚇州縣影占富豪從今後有監院處亦仰州縣常加聽察如監院官有不公不進各申本州行牒本司便如狀事稍重仰専差使送申狀本司事大則任聞奏兼申中書門下御史臺以憑推勘所冀逓相檢察不敢侵凌諸司更換素有定規近日茍且縁循漸至虚折商徒則獲利倍於徃日所司則侵損轉難任持若不條疏積成蠧弊其三司更換宜令准咸通十五年閏四月二十一日度支所奏處分如尚踵前必舉朝典制置新歳酒錢其戸貧破者州縣不令破戸或賣柴傭力以納税令所由司條疏聞奏其河南府界蒿荒地委河南尹於税錢三分之量與免二分勿令使無路營生聚為草賊其天下州縣除已准元勅徴収兩税𣙜酒錢茶鹽利㫖支米價等分外餘額外如徴别配及販柴炭之人納税等元無勅文縁本道奏請降勅並仰勅内便皆停罷仍限勅到後二十日内外分析聞奏並不罪今日已前之事如又不巳必舉明刑曽經水旱巳放徴科或慮縁循須更提舉諸道州府或有遭水旱甚處去年夏税合納苗税等錢委本州府長吏酌量蠲放其咸通十年以前所欠負兩税錢米等在百姓腹内徴収不上者前年十一月十二日赦書巳放免仍委州府速檢勘蠲放分析奏聞所在州縣除前資寄住實是衣冠之外便各將攝官文牒及軍職賂遺全免科差多是豪富之家致苦貧下准㑹昌中勅家有進士及第方免差役其餘只庇一身就中江南富人多一武官使庇一户致使貧者轉更流亡從今後並依百姓一例差遣仍委方鎮各下諸州准此檢㸃江淮運米本實闗中只縁徐州用軍發遣全無次第運脚價妄被占射本色米空存簿書遂使倉廪漸虛支備有闕縁循弛慢全自職司宜令轉運使速具條疏分析聞奏纔及春緩便須差清強官吏節級催驅嚴立科條須及舊額茍或踵前容易必舉朝章郵傳供頓逓馬數目素有定制合守前規河南館驛錢物至多本来别庫収貯近日被府司奏請衮同支用遂使逓馬欠缺料糧不充憲司又但務縁循都不提舉宜令東臺館驛使述具條疏分析聞奏東都留守所管兵數不少無非市肆之人緩急抽差全不堪用防衛官闕尤非所宜頃有條疏以革前弊宜令速分析見在闕額并老弱人數聞奏應縁州府經費悉有舊規近者不務在公惟思潤已或聨遇豐稔亦不貢羡餘若小有水旱即競有論請致令朝廷事力轉困全在臣下誠敬無乖自今以後如輙將上供一錢物支用並當加譴責不在原貸之限如本道實有災荒積嵗為衆所知者不在限例朝廷徴發兵士固非獲巳道途􅉐逓費勞至多又聞節級須得人事禆補每縣不下五千文盡配疲人深可哀憫自今後但供備無缺輙不得踵前率配如或違犯縣令本曹官重加貶降吏人决杖配流其都知兵馬使以下並以枉法贓論立法之始當在必行諸處本置作坊只合制造戈兵甲及進獻供須昨徐方用軍諸道多無兵器内庫般送填塞道途如聞作坊惟使雜伎弓甲之匠十無一人打築即惟務精新器甲則多妄修整自節察至刺史皆為信臣不能委曲條疏各宜自知改革諸道兵士非惟缺額不堪兼又軍將數多一員敵官健數分又占官健當直遣納課錢其弊數重深要除蕩仰諸道各自檢㸃如或本自書題又無功効非軍中子弟空請職名者並皆疎理其軍將等各遣納課錢者並准入己贓結罪科斷東畿之内留守影占最多稍富者不揀城外村中盡有一虚明文牒亦犯罪者亦稱此名府縣若追但行牒却取自小則推勘了牒送事重者則與勒停委留切不得遮奪免致閉傷其在京諸司亦仰各依此例如被抑屈但具奏聞且徴兩税自在有常期茍或先自准驅必致齊人凋弊葢縁機織未畢特踐未終便須令賣縑繒賤糶斛斗致使豪首迫蹙富户吞侵須更申明俾其通濟諸州府如有不依㫖限先期徴税者長吏聽奏進止縣令錄事叅軍並停現任書下考不在務恕之限闗要之外聲教至遥每念疲人尤多横役訪聞五嶺諸郡修補􅇬舎城池材石人工並配百姓至於糧用皆自賫持既不折税錢又全無優恤永言凋瘵實可憫傷自此委節度觀察使接借本錢并刺史百計收拾運轉别立修造案名額遣幹濟官主持常令急遂修營勿遣大段摧毁永放百姓額外差科已債卹人斯為盛美遐荒賤吏尤可哀矜先於咸通五年梧州糴十萬石米停貯數載之後方令盤送邕交如聞卑濕損傷雀鼠耗折計其所言六萬石餘累載以来亦頗校料徴納主持軍將十餘軰攤保累數百家或科决不輕或資財蕩盡典男鬻女力竭計窮盡虚掛簿書徒為覊縶宜從寛宥用釋殷憂其所欠米委度支一時放免邕南交趾屯駐兵士全無運糧俾其足食湖南江西管内諸郡出米至多豐熟之時價亦極賤網官若得錢收糴每斗必有盈餘道途既可經營輸納庶無敗闕縁於官倉領米刮鐡平量既潤資陪便致吞侵耗折所以經年累月舳艫相交江路多有沉淪軍食常憂久缺自今仰所在長吏切須饒潤網官并令交付脚錢仍與善價糴買嚴示刑賞不使稽遲邕州安南晏州見屯諸道行營兵士合食米錢等三處兵數近四方日食錢米費用極多全在諸道州使廵院饋運相繼免失支持近日以南中為警急抽差皆務循將相同常事葢縁地逺差網無利皆託以鹽鐡戸部指擇未得分明申報逗遛圖延界分或有未有本色皆云額望收錢及網官進發之時欠脚錢途路侵盗錢米所至稽停每發一網便逾星歳致令供軍使頻申三處月限不相接續所司前後申奏行牒督責非不丁寧葢縁只有科貶之名曽無必行之令遂致全無凛懼但務縁循若不嚴立科條必恐轉成敗失其諸道州使廵塲監院所合搬送南中供軍錢米各委所在長吏併發網船以濟軍用仍委逐道節度觀察防禦經畧刺史差最大判官一人專判校科其廵塲監院官塲官自專催促各令設法勾當克濟軍須如依前逗遛不早送申遂使邉軍糧儲久闕供奉不得相續便據所欠錢米處勘遂重加貶責如州使官吏塲監院官能罄誠節慎選行網支遣及至舟船繼至即重議酬奬河東向管延資庫斛斗五十萬石毎歳出陳入新之際勞擾州縣百姓至多未有用時積為深弊宜令本道節度使㸃檢除道路與邉鎮接近緩急堪般充軍糧者即且准前其餘深僻州縣並速條疏分析聞奏義倉斛斗本防災年所貯積歳多翻成侵害又差重丁大户充倉督子弟主管凡節察及監軍使刺史縣令到任仍須二毫量差役鄉夫數重勞擾每一量復欠折轉多主掌之人貼家竭産生靈塗炭州縣困窮從今後宜五年一度變換便糶貨収錢入冬却糴仍委本道監使常加訪察如有上下䝉蔽欺隠破除聞奏但不要初上之日須重覆量每擾度人朝廷大弊在於令不行只如經水旱州三降勅命不許將逃亡規攤見在人户遭災水旱處有於見在戸内陪徴或至三陪又近年以来節度觀察使或初到任或欲除移是正二月百姓飢餓之時分遣二日條先抽徴見錢每一千文令納三四百此時無不兩陪三陪生生舉債至有賣男女以充納官行彼貪心殘我赤子從今後有如此者必舉極法以謝生靈諸道事例差使結懽法信出於官中答弊歸於私室駐留供備迎送優豐進獻不副常程結好却為公事惟奏欠缺不思本源且鄰境結懽何必事須厚幣来者若為私物去者何必官錢道慕空門名為釋子若非精進何以住持應城及諸州府僧尼元勅人數外不得轉令私度如有死亡等闕即任據人數堪填補年終聞奏待五年限滿持每收補皆須選擇有戒行事業者勿令濫雜之軰於此容身天下刑獄申到法寺及刑部有經數年不得了絶省寺人吏競邀賂出入律文大理寺及刑部官僚不親公事致死一案之内半死獄中從今後委中書門下每日㸃檢如停滯者大則貶降小則停勒其刑部郎中員外切須選擇亦不得輙其奉使以望賄財有文案則併送對㕔行貨財則獨収私第准咸通十一年條疏諸州刺史三千里外限三十箇月二千里外限二十七箇月近者勒刺史到郡交代則可以計到郡月滿便且除移如新除者則須待月限滿除替其餘内外諸官並依咸通十一年條疏如有限未滿錯替者任經中書門下過狀便與追勅有過失須替則不在此限兩省官本令先任四赤令貴欲知人疾苦近者纔三五月則替何殊罔生空陪優人從今後宜以十五月為限兩畿令府判司從前吏部注擬頃年或除三人兩人近者乃至除望縣令及部尉等中書自不存體百司何以仰瞻其進焉十年本限五年方滿近者旋替年深致使入仕多門三銓無缺從今後如或用年深缺補人兵部郎官必議貶降詞科出身士林所重本貴踐歴漸至顯榮近者惟扇澆風皆務躁進麻衣纔脱結綬王畿是能十年宦途今来半歳遷授頗為訛弊須舉重明自今以後進士及第並須滿二周年後諸道藩鎮及户部度支鹽鐡及在京諸司方得奏請如未及奏官限内有攝職處一任隨牒攝其𢎞文館集賢院奏請直館校理並依此日限如出身後諸道奏已請初衘未得而考者輙便奏畿内尉充在職兩考方得依資除官改轉其授使下官先自有月限資序一一須守舊規不得超越比擬准咸通十四年十月九日勅文處分闗節取受本身值財素来貧無亦多舉債祗縁從来赦文未甚分明賞罰若行必當止絶自今以後如有人用錢買官納銀求職敗露之後言告之初取與同罪卜射無捨其錢物等並令没官送御史臺以贓罰収管如是波斯番人錢亦准此處分其櫃坊人戸明知事情不来陳告所有物業並不納官嚴加懲斷决流邉逺庶絶此𩔖用其清平樂官乞託本自人情既越舊規過於債負雖累有明勅尚不遵行兩廵不切追擒教塲又不鈐轄從来上於方鎮近日方鎮與樂官人事轉多别有遷除例皆乞覔喧呼門户擁塞階庭以此得官人不願除授自今以後除方鎮外兩巡使及諸司外巡切加擒捉如有此色具送本司枷禁勘責痛加懲斷以絶此弊近年以来風俗奢侈本營根本各務誇張及第登科傾資竭産屋境踰於制度䘮葬越於禮儀為册使弔贈之臣或争財貨乞賜章服之類不畏慚羞致使兒童或輕朝列念兹靡費常行歎嗟委中書門下次第條疏稍加改革輸其常賦尚慮不充更或加徴其何以濟近年百姓流㪚税錢已多如聞自朝廷用軍有於百姓正税外每貫紐四十五十文已是數年至今不矜放黎甿寃抑腿脊瘡疾所徴錢財將充諸色支分所添兵則逐月銷减每思此事深可嘆傷其天下縁用軍奏加紐貫之錢更有敢徴一文其長吏及判官録事叅軍並准入已贓仍不在以官贖之限其鄭州庚道尉在任日加徴税錢如或却徴亦依此例衡鏡之司去留雖切念其覊寓須與商量支部選人如聞累年駮放至多或文狀舛錯或書判差遲有司守文不得不爾况選人例迫飢寒方自逺来調集頻年被駮情實可矜既遇鴻恩合與優假委吏部檢勘去冬選人若有此色除身非名踰濫及欠選欠考外並以比逺殘缺取其情願者特與却収注擬諸道奏官奏者縁要缺舊人不理從今後并須分明具不理罪􅄽先加懲責有罪空替則是惠姦其奏前資及見任多有虚􅆆頭衘用錢計㑹從今以後有官更奏者便仰兼逓告至進奏院以憑㸃檢如告身不到不在奏行其虛衘所奏只與九品初任仍奏狀内須是三代官諱及鄉貫戸頭年幾餘各依資奏請河北三道不在此限守土長人切資士族品流混雜必害生靈刺史縣令如是本州百姓及商人等准元勅不令任當處官不繫髙下葢以事體不可兼又十室九親多有憎愛一切阻碍公事難行近年此色至多各仰本道逓相檢察當日勒停百姓商人亦不合為本縣鎮將若有違越必舉典刑禆補除任實在奬勞奏請繁多則為過濫咸通七年赦書條疏諸州府奏軍將官不許除上佐如有功須奬即於本管内除授仍不得占優原處近日諸道不守條章或分兩三度奏来所貴前後不相見但行計㑹貴得人多後從自後諸道軍將官並限七月表到京令之初行宜武臣之叙進據所合奏人數一表令如有别勞効者即待明年七月不得兩度貴行欺隠忠臣社稷誓著山河或盟府書勲或閟宫配食宜舉賞延之典用彰義烈之名故尚父汾陽王贈太師子儀贈太尉秀實贈太師晟贈司徒顔杲卿太師真卿許逺張巡南霽雲子孫中未甄奬者每家與一人正員官安金藏操行中節實異等倫合為酬庸以勸義士如有子孫與一人正員官武德以来配享功臣名迹尤著節義顯聞子孫凌替官閥廢墜未經甄錄者委中書門下搜訪嗣𦙍量加優奬慶連宗室義重維城洎文武羣僚恪恭事務用酬勞績宜降恩私亞獻撫王紘榮王情等各賜物一百疋夾侍正衣進珪捧珪各賜物五十疋亞獻終獻正衣各賜物四十疋大長公主嗣王郡主縣主各賜物内外文武見任及致仕官三品以上賜爵一級四品以下加一階合入三品五品欠者未合叙考者待考足日聽封叙孔聖之後未加虞賔之恩或表崇儒以明繼絶文宣王之後及二王三恪各與一子官其祠廟委所司量加修飭義在奉親道惟睦族將申孝敬合示恩榮皇五等以上親三品以上賜爵一級五品以上加一階六品以下及前資常選㪚官簡選日優與處分未有出身備位者准㑹昌五年正月三日赦書處分應陪位皇五等以上親三品以上賜爵一級四品以下加一階親四等並諸色陪位者五品以上加一階六品以下各白衣並賜勲兩轉其前資及後出身各减一選皆懷追養之願盡有榮終之心授任封崇式光存殁常叅官及諸州府長官父母見在未有官封者並量與五品致仕及階并邑號如有官者量與進改如官已至五品以上者即與五品階父母亡殁未經追贈者量與追贈及邑號任榮輔相寄重藩方洎於親軍咸秉忠節俾令追贈以顯榮中書門下及節度使帶平章事者各與一子八品正員官祖父母父母亡殁各與追贈已經追贈者更與追贈節度使與一子正員九品官東都留守度支鹽鐡使觀察處置都團練防禦經畧招討使皇城留守各與一子出身先亡殁未追贈者各與追贈䖍奉典章肅供祀事宜覃渥澤以奬勞能禮儀使大禮使京兆府尹各與一子正員九品官應郊廟升壇行事官溥恩外中書門下尚書省御史臺三品以上特加一階四品以下各加一階如入三品者量减三考入四考者量减三考入五品者量减兩考仍待考足日聽叙其合選人與减一選内行事者官三品以上賜爵一級四品以下更加一階内侍省及内坊官四品以上各賜勲五轉五品以下各賜勲三轉應從駕至郊廟者溥恩之外三品以上賜爵一級四品以下各加一階白衣賜勲兩轉位列牙爪職掌警衛念其宣力宜加醻勞唐大詔令集巻七十二
