body:
  text: 唐大詔令集巻一百六宋宋敏求編政事制舉處分舉人勅處分制舉人勅孝悌力田舉人不令考試詞䇿勅建中元年試制舉人䇿問貞元元年賢良方正科䇿問又博通墳典科䇿問又試洞韜畧科䇿問放制科舉人詔貞元四年賢良方正䇿問元和元年尚書省試制科舉人勅才識兼茂科䇿問放制舉人勅元和三年試制舉人長慶二年試制科舉人勅䇿問放制舉人詔除制舉人官勅寶厯元年試制舉人勅䇿問放制舉人詔太和二年親試制舉人勅䇿問放制舉人勅貢舉條流明經進士詔令貢舉人勉學詔令禮部掌貢舉勅處分高道不仕舉人勅親試四子舉人勅條流習禮經人勅釐革新及第進士宴㑹勅制舉處分舉人勅勅求賢濟理詢事考言務取由衷以觀深識頃年䇿試頗成弊風所問既不切於時宜所對亦何闗於政事徒徵隠僻莫見才明以此擇賢良未得所卿等各膺推薦副朕虚求宜其悉心各盡所見勿復仍舊空載游詞各宜就食訖就試開元年處分制舉人勅勅君子之道所以正其志全貞吉也逸人之舉所以勵天下激浮躁也朕欽崇先訓以道化人思致栖真之士用光咸在之列是以頻降旌帛兾空巖藪虚懐式佇明發不忘卿等來膺辟命逺至城闕周文多士既叶於旁求虞舜疇咨亦在於僉議爰命臺省詢於道業或善行無跡名實難窺或大器晚成春秋尚杪津涯未測掄别何施事且隔於行藏道遂分於出處其馬尚曽常廣心賀蘭迪等三人宜待後處分崔從一王元瞻韓宣胡賁趙𤣥奬等五人年鬢既高稍宜優異各賜緑衣一副物二十段餘並賜物十段不奪隠淪之志以成高尚之美並宜坐食食訖好去依前給公乗還都孝悌力田舉人不令考試詞䇿勅勅孝悌力田風化之本茍有其實未必求名比來將此同舉人考試詞䇿便與及第以為常科是開僥倖之門殊乖敦勸之意自今以後不得更然其有孝悌聞於郡邑力田推於鄰里兩事兼著狀跡殊尤者委所由長官特以名薦朕當别有處分更不須隨考試例申送建中元年試制舉人䇿問問朕聞古之善為國者未嘗不旁求正士博採直言勤而行之輔成敎化者也朕臨御日淺政理多闕毎期忠義切投藥石子大夫戢翼藏器思奮俟時今啟心以沃予當有犯而無隠朕不自滿假企慕前王上法羲軒下遵堯舜返已散之淳朴振將頽之紀綱使禮讓興行刑罰不用而人猶輕犯吏尚徇私為盜者未奔不仁者未逺豈臣非稷契而致是乎抑君謝禹湯使之然也設何謀而可以西戎即叙施何化而可以外户不扄五諫安從三仁孰最周昌比漢高於桀紂劉毅方晉武於桓靈但見含容兩無猜忌故君不失聖臣不失忠子既其儔應詳往行四賢優劣佇辨深疑在於朕躬所有不逮條問之外悉書之必無面從以重不徳二月十五日貞元元年賢良方正直言極諫科䇿問試官鮑防獨孤愐皇帝若曰葢聞上古至道之君垂拱無為以臨海内不理而人化不勞而事成星辰軌道風雨時若邈乎其不可繼何施而臻此歟三代以來制作滋廣異文質之變明利害之鄉威之以刑道之以禮敦其俗而彌薄防其人而益偷豈澆醇必繫於時耶何聖賢間生而莫之振也朕祇膺累聖之業猥居兆人之上䖍恭克厲如恐失墜憂濟庶務夕惕晨興永惟前王之典謀是憲則師大禹以崇儉法高宗以求賢興夏啟之征作周文之罰旌孝弟舉直言養高年敦本業平均徭税黜陟幽明勵精孜孜勤亦至矣然而浮靡不革理化不行暴亂不懲奸犯不息五敎猶鬱七臣未臻鄉黨廢上齒之儀蒸庶無安土之志賦入日減而私室愈貧亷察日増而吏道愈濫意者朕不明歟何古今之事同而得失之效異也思欲剗革前弊創立新規施之於事而易從考之於文而有據備陳本末將舉而行無或憚煩畧於條對自頃隂陽舛候祲沴荐興仍嵗旱蝗稼穡不稔上天作孽必有由然屢降凶災其咎安在傳曰時之不乂厥罰恒𤾉又曰堯湯水旱數之常也二者乖反其誰云從今人靡葢藏國無廪蓄朕屢延卿士詢訪謀猷至乃減冗食之徒罷不急之務既聞嘉話亦已遵行而停廢之餘所費猶廣候轉輸於江徼則逺不及期將搜粟於闗中則擾而無獲節軍食則功臣懐怨省吏員則多士靡歸中心浩然㒺知攸濟子大夫蘊蓄材器通明古今副我虚求森然就列匡朕之寡昧拯時之艱危畢志直書無有所隠九月二十五日博通墳典達於敎化科䇿問問皇帝若曰朕承祖宗之鴻休獲主神器任大守重懼不克堪思與士大夫共康理道虚襟以佇側席以求而羣議紛然所見異指或率古義而不變或趨時㑹而不經七年於兹矣國制多缺朕甚惡焉今子大夫博習典墳深明敎化褎然充舉咸造於庭其極思研精思以諭朕之未寤仲尼敘禮樂刪詩書修春秋廣易道六經之義所尚各殊豈學者修行理當區别將聖人立意本異宗源施之於時孰為先後考之於道何者深淺差次等倫指明歸趣執其本乃能通於變學於古所以行於今用之敎人則異於是工祝陳樂之器而不知其情生徒誦禮之文而不究其事欲人無惑其可得耶將革前非固有良術堯舜率天下以義比屋可封桀紂率天下以暴比屋可戮然則上之化下㒺或不從而三仁四凶較然同異有敎無𩔖豈虚言耶作樂移風聞諸昔典夫至味必淡至音必希文侯列國之賢君猶曰則唯恐寢矧彼流俗其能化乎將使天地同和災沴不作黎人丕變奸慝不萌何施何為以至於此王者制禮必同其時故忠敬質文更變迭救三代之際㒺不由之自秦剗古法漢雜霸道紛綸干紀王敎不興國家接周隋之餘俗未淳一處都邑者利巧而無恥躬田畝者朴野而近愚尚文則彌長其澆風復質則莫救其鄙俗立敎之本將安所從自古哲王唯此三正互用後之術士乃言五運相生以漢應火行則周為木徳禮猶尚赤義則頗乖永言於變莫識厥理九流得失之論歴代興亡之由王鄭言禮之異同公穀傳經之優劣必精必究用沃虚懐識洞韜畧堪任將帥科䇿問皇帝若曰朕遐覽典謨詳求至理三代之制粲然可徵未嘗不文武並興農戰兼務故能居則足食動則足兵兵足則暴亂息食足則敎化行興國之本實在於此秦漢以降王制不修選士廢射御之儀敎人無蒐狩之禮即戎者不知其稼穡力本者罕習於干戈於是異文武之人分農戰之道守則乏食征則鮮兵歴兹千年竟莫能復抑知之者葢寡將行之者惟艱朕念之甚勤思繼前躅良以軍旅之事役戍靡寧勲庸既多爵秩咸貴俾服田畝慮興怨咨仰於縣官不可勝計由是版圖頻蹙阡陌日荒水旱小􅄽廪餉咸竭欲使軍人悦歸於耒耜儒者兼達於韜鈐田萊盡耕攻取必勝誘人甚易其術安施王者之師本於立徳兵家之法方務出奇徳以信成奇以詐勝理有違反將何適從宋襄成列而敗軍見嘉魯冊韓信決囊以摧敵取貴漢朝然則喪國亡家豈霸王之道冒危乗險非仁義之心所宜討論以定褒貶夫衆寡不敵尅必以謀樂生下齊孫子破楚魏武之勝袁紹宋高之滅姚泓成敗之由備陳本末古有言曰誅伐不可偃於天下又曰善為國者不師二端異焉其有深㫖子房敘次兵法任宏論撰軍書指明異同詳錄名氏所聞高畧擇善而行貞元元年放制科舉人詔朕祇膺祖宗之業猥臨億兆之上任大守重不敢康寧永懐萬事之統懼有所闕夕惕若厲中夜以興求賢審官期於致理而政化猶鬱太平未臻思得海内忠良竭陳匡諫洎經術之士才畧之臣以明敎化以立武事惟兹三者政之大經慮巖穴之間尚多遺逸故科列條目廣延異能賢良方正能直言極諫韋執誼等達於理道甚用嘉之位以旌能宜其秩叙其第三等人委中書門下即超資與處分第四等人即優處分第五等人即與處分嗟乎強學以待問進徳以及時昔之孫𢎞猶聞十上失之正鵠必反諸身凡為多士宜各自勉貞元四年賢良方正䇿問皇帝若曰朕聞王者統御寰宇司牧黎元一人之聰不足以周聴一人之目不足以徧觀敷求賢良用輔聞見朕以寡徳纂承丕緒託於人上十載於兹雖多難僅寧而昇平未復永惟前古之理布在方冊憲章典禮可得而詳考之則易遵行之則難至中夜忘寢莫知所以然子大夫學覽該通待問斯久歛襟應召朕甚嘉焉各啟爾心以祛予惑成王致理刑措不用孝文勵精斷獄四百太宗皇帝蕭勺羣慝削平八隅囹圄空虚又踰前代一嵗所決二十九人今者官署尚存法令明具封域之内可謂小康而黔首上僚尚資科禁循源究本其故何哉豈朕敎之不明將或人之多僻佇敷㫖要當酌其宜文王建邦經制斯備周公立政禮樂増修然而朝命六卿揆分百度鄉閭有長林澤有官計以職員動以萬數農夫不充於緝伍編籍不給於虞衡以是制人義或安在永言師効良用為疑唐虞設規九載三考俾安其位將盡其能列授羣司寄之衆務一官不理事有所隳一吏非人官有所廢罰寧俟於終日賞不待於踰時若官廢而後求人事廢而後變法政將滯澆其道如何今欲濟天下於太和致羣生於仁壽勸農務本何術為先敦學崇儒何禮為切何方可以順風雨何典可以序神祗成湯遇災何七年而後禱髙祖伐叛何歴載而不賔辨於古者通於今鑒於事者明於理備陳終始朕親覽焉正月元和元年尚書省試制科舉人勅朕以寡薄獲奉睿圖嚴恭寅畏不敢暇逸永惟萬邦之廣庶務之殷而燭理未明體道未至思欲復三代之盛烈覲十聖之耿光是用詳求正言思繼先志子大夫等藏器斯久賁然而來白駒就維洪鐘待扣膺兹獻納朕甚嘉之言觀國光宜有廷試本將詢事豈㤀臨軒園邑有期營奉是切永言誠感未暇躬親爰命公相洎於卿士親諭朕意延訪嘉謀至於興化之源才識攸重練達吏理詳明儒術當是三道副朕旁求意或開予靡有所隠條列所問畢志盡規當酌古而參今使文約而意備朕將親覽擇善而行並宜坐食訖就試才識兼茂明於體用科策問皇帝若曰朕觀古者君人受命兢兢業業敬天順地靡不思賢能以濟其理求讜直以聞其過故禹拜昌言而嘉謨㒺伏漢徵極諫而文學稍進匡時濟俗㒺不率繇厥後相循有名無實而又設以科條増求茂異捨斥已之至諫尚無用之虚文指切著明罕稱於代兹朕所以歎息鬱悼思索其真是用發懇惻之誠咨體用之要庶乎言之可行行之不倦上獲其益下輸其情君臣之間驩然相與子大夫得不勉思朕言而茂明之我國家光宅四海年將二百十聖𢎞化萬邦懐仁三王之禮靡不講六代之樂㒺不舉寖澤於下升中於天周漢以還莫斯為盛自禍階漏壊兵宿中原生人困竭耗其大半農戰非古衣食罕儲兹念疲甿遂乖富庶督耕植之業而人無戀本之心峻𣙜酤之科而人有重斂之困舉何方而可以復其盛用何道而可以濟其難既往之咎何者宜懲將來之虞何者當戒昔者主父懲患於晁錯而用推恩夷吾致霸於齊桓而行寓令精求古人之意用啟迪哲之懐睿兹洽聞固所詳究又執契之道垂衣之言委之於下則人用其私專之於上則下無其効元帝優游於儒學盛業竟衰光武責課於公卿峻政非美二途取舍未獲所由余心浩然益所疑惑子大夫熟究其㫖属之於篇興自朕躬無悼後害四月二十八日放制舉人勅構大厦者必總於羣材成大川者亦資於百谷故思理之主求賢㒺遺所以昭宣令圖廣大前緒觀文緝化其在兹乎朕以寡昧獲奉丕業虚已問政實始於兹考言求益敢不祇若故命左右輔弼洎有位之臣㑹於中臺必究其論緘宻以獻省自朕躬果獲賢能副予饑渴才識兼茂明於體用科人第三次等元稹韋惇第四等獨孤郁白居易曹景伯韋慶復第四次等崔韶羅讓元修薛存慶韋珩第五上等蕭俛李蟠沈傳師柴宿達於吏理可使從政科第五上等陳岵咸以待問之美觀光而來詢以三道之要復於九變之選得失之間粲然可觀宜膺徳懋之典或叶言揚之舉其第三次等人委中書門下優與處分第四等第五上等中書門下即與處分元和三年試制舉人策問考官楊於陵鄭敬李益韋貫之皇帝若曰葢聞古之令王體上聖之姿御大寧之時猶懼理之未至也求賢以致用猶懼動之不中也諮諫以聞道矧惟寡昧膺受多福思負荷之重警風浪之虞求賢諮諫是敢怠忽至若窮神知化以盛其徳經緯文武以大其業考古㑹極通敎化之源明目達聰周眎聴之表實亦夙夜之所志也子大夫將何道逮而致之乎自三代已還求理繼作皆意其砥礪而効難彰明莫不欲還朴厚而澆風常扇莫不欲遵儉約而侈物常貴莫不欲逺小人而巧諛常進莫不欲近莊士而忠直常疎莫不欲勉人於義而亷媿常不修莫不欲禁人為非而抵冒常不息其所繆盭豈無根源爰自近嵗仍敷大澤霜露所墜沾濡必同滌瑕穢以道人心省徭役以豐物力蠲田租以厚農室葺國學以振儒風督廢職以補維綱備衆官以序賢俊庶繼先志臻乎治平而改行者未聞輸勞者未艾務農者無以免艱食學者無以通微言立事之績未紀於庶工乏才之歎未輟於終食蠧於法者無不去而法未修明切於政者無不行而政未光大豈不變其俗道廣而難濟乎豈不得其門事繁而愈失乎佇聞嘉猷言無或隠周之受田有經制漢之力田有恒數今疆畛相接半為豪家流傭無依率是編户本於交易焉得貪富以卑貧相欲因循是以損多而益寡酌於中道其術何如取人以行不必文采命官以性不必資考然則行非造次而備察才非錯綜而遍知不必文采為輕重而事可進退不必資考為程準而吏有條貫適變矯枉渴於良規何方可以序六氣來百祥何施可以壽羣生仁衆姓由於前訓而可據設於當代而易從勿猥勿并以稱朕意三月二十三日長慶二年試制科舉人勅李徳裕勅古人有言常引一代之人以理一代之務雖雋賢茂彦不乏於時然亦在敷納以言精核其實若決川瀆以導其氣叩金石以求其音使抱忠義者必盡其誠知古今者必宣其慮朕纂承鴻業以撫兆人嘗欲憲三代之理修列祖之法猶念和氣之未洽休祥之未臻百姓之未安五兵之未戢故詳延修潔之士庶得聞乎未聞將以達天地之心究俗化之變研安危之慮探理亂之源子大夫殫思於六經馳騖於百代得不講求至論以沃朕心方直者舉朕之闕政術者體時之要慕古逺者卑其論贍文詞者抑其華言經者折衷於聖人以明教化論將者先之以仁義無効縱横於戲子大夫當朕之時必冀思自達且古之翼其君者尚委輅納説荷擔吐奇由壺闗以上言自南昌而諷刺況文陛之下負扆親臨若藏器不耀結囊而去顧朕深志復何望焉當體予衷無懼後害宜坐食訖就試十月二十三日䇿問考官白居易陳岵賈餗皇帝若曰葢聞舜禹之有天下也起於側微積徳累勤多歴年所夫經盛聖之慮豈有遺哉然猶好問察言勤求賢士葢以承天之任重憂人之志深也況朕長於深宫涉道日淺奉列聖之洪緒撫萬㝢之黎人夙夜嚴恭不敢懈怠實懼燭理未究省躬未明所以詳求讜言以輔不逮子大夫是宜發所蘊蓄沃予虚懐當極意正詞勿有隠諱昔王政之興必臻於康泰霸道所立猶致於富强我國家提封溢於三代酌憲兼乎百王無堯湯之災積祖宗之化而人未蕃庶俗尚凋訛家無葢藏公闕儲㣥卒乗之數貨幣之資綂而校之莫繼前代豈率土生植變於古歟將阜時政令失於今歟因以揣摩必窮利病明徵末失之漸具陳興復之謨且文武兼學以成身士農迭居以豐業故家給人足可以戀土本末周備可以應時近古各徇一端不相資用致令從事異心難以成課民佚無守輕為惰游指明共貫之方訢合二途之利永言化理期酌厥中施為或差得失斯遠將修睦勸義則在下難知將任數馭情則人心盡偽思聞㫖要得合誠明旌别比周之情敷詳忠厚之道知人則哲從古攸慎九懲恐泥五事難精或望可服人而才非周物或言皆詣理而行有乖方宜陳取舍之端用彰真偽之辨至於朝廷之闕四方之弊詳延而至可得直陳退有後言朕所不取子大夫其勉之放制舉人詔朕自郊上𤣥御端門發大號與天下更始思得標明四科命羣公卿士暨守土之臣詳延下位周於草澤成列待問副予虚求昧爽臨軒俾究其論正辭良術精義宏謀繹之旬時深見忠益言刈其楚列而第之賢良方正能直言極諫第三等人龎嚴第三次等人吕術第四等人韋署姚中立李經第四次等人崔崔龜從任畹第五上等人韋正貫崔知白陳在錫博通墳典達於敎化第四等人李思立詳明政術可以理人第四次等人崔郢軍謀宏達堪任將帥第三等人吳思第五等人李商卿咸以懿學茂識揚於明庭況當短晷之晨頗盡論思之美璨然高論深沃朕心永言藏罟之規豈忘縶駒之美寵之命秩允答嘉猷其第三等人第四次等人委中書門下優與處分其第四等人第四次等人第五上等人中書門下即與處分長慶二年十二月除制舉人官勅昔仲尼之門以四科品第諸生所得十哲今吾徵四海九州之士而登名者十有五人搜羅簡拔非不勤至以今況古可謂才難是用詔爵以嘉奬其忠超擢以光明其道俾岩石之下人思自奮晁董之盛逺以為鄰延登諫垣式佇匡益儲書結綬皆曰顯途循其袂次亦視科等服我新命朂哉逺猷可依前件寳厯元年試制舉人詔朕聞心術順道天下可一言而興聰明自壅堂上有千里之逺故唐虞而降則考試觀俗漢魏之際則詔策求賢朕纉紹丕圖撫臨方夏實懼誠有所偏信鑒有所求周乃前歳詔六官九卿方岳尹正有位之士逮於庶僚高懸四科博存羣産將訪衆政之闕酌至論之中子大夫庭列儼然各應其品是用宵興前殿永日渴求條列坦明咸本經意固子大夫之所講摩矣當竭誠盡慮無有蘊藏宜坐食訖就試二月二十八日䇿問考官鄭函崔琯李虞仲皇帝若曰朕恭守憲祖中興之運穆宗紹寧之業寅畏兢翼亦免荒墜諸侯忠上而奉職卿士循法而恪官四夷内向兆人休息至於屬綂垂文程示後代終有致乂之意未有理人之術古人云希顔之徒亦顔之流也又曰舜何人也予何人也予竊不讓欲追蹤乎三代俯視乎兩漢陶今俗於至道濟亂人於太和子大夫皆蘊器應薦憤憤悱悱思所以奮者於日久矣當極其慮開予鬱滯夫禮樂刑政理之具也禮樂非謂威儀升降鏗鏘拊擊也將務乎阜天時節地財和神人齊風俗也刑政非謂科條章令繁文申約也將務乎愧心格恥設防銷微也必有其論何方致之四人混處遷於異物歴代以降皆所苦患士本於儒而有詭道之行農尚篤固而多損本之心工繕用物而作雕靡之器商通有無而齎難得之貨思矯其弊必有其術漢高之基稱蕭曹孝宣之興稱邴魏朕觀其書粲然盡在我國家之盛其紀年則曰貞觀開元其輔相則曰房杜姚宋朕觀其書則拔羣絶類者不能相逺然兩朝之盛四子之能不可誣也將與元化合徳謨謀而無際歟為史官詞志不能久其事業歟口食至多而墾闢者墮供億至衆而財官是空官無闕員而家食者告困徳澤仍臻而鰥弱者未贍必有其㫖何以辨之無泛無略無游説無隠情以副虚求朕將親覽放制舉人詔朕深居法宫高處宸極常慮天下多務壅於上聞朝廷大猷闕於中興至於伏陛叩顙造膝犯顔皆驟遷顯榮寵以優錫猶思物不得茂遂道有所鬱堙是用虚中訪賢側席前殿緘宻以獻閲自朕躬切磨予違無所回忌第於上下揚於正朝吾之不宏亦可謂信於海内矣賢良方正能直言極諫科舉人第三等唐伸韋端符舒元褒第四等蕭敞楊曽士楊儉來擇趙祝裴憚第四次等王繇李昌實嚴荆田必崔璜第五上等李滻蕭夷忠馮球元晦詳閑吏理達於敎化科第五上等韋正貫軍謀宏逺材任邊將科第三等裴儔第四次等侯雲章咸以讜言正詞兵符敎本應問如響不窮於衆著之於篇爛然盡在宜膺中鵠之選用叶靡爵之經其第三等人委中書門下優與處分第四等第四次等第五上等中書門下即與處分太和二年親試制舉人勅士志於道葢道以致君為先代實生才葢才以濟理為務不索何以獲其實不言何以知其志故帝堯垂詢衆之訓殷宗首沃心之術其傳曰嘉言㒺攸伏又曰俊乂用彰漢魏以還詔䇿時作暨於我唐遵為故事由是善政惟乂魁能間出朕祇荷大寳勤恤兆人明不燭於幽昧惠未流於鰥寡御朽兢慮求賢永圖是以詔命有司㑹羣材列稽疑延問闕政子大夫達學通識儼然來思操觚濡翰條誨宿滯慰我虚佇必𢎞嘉猷故臨軒命書䇿以審訪繼燭俟奏其悉乃誠辭各宜坐食食畢就試三月二十九日䇿問問朕聞古先哲王之治也𤣥黙無為端拱司契陶甿心以居正凝日用於不宰立本以厚下推誠而建中繇是天人通隂陽和俗躋仁壽物無疵厲噫盛徳之所臻敻乎其莫可及已三代令王質文遞尚而巧偽滋熾流失寖多自漢魏以降足徵葢寡朕昧理道祇荷丕構奉若謨訓不敢荒寧任賢惕厲宵衣旰食詎追三五之遐軌庶紹祖宗之鴻休而心有所未達信有所未孚由中及外闕政斯廣是以人不率化氣或堙戹災旱竟嵗播植愆時國廪罕蓄乏九年之儲吏道多端微三載之績京師諸夏之本也將以觀理而豪猾時踰檢太學明敎化之源也期於宣化而生徒多墮業列郡在於頒條而科禁或未絶百工在於按度而淫巧或未衰俗墮風靡積訛成蠧其擇官濟理也聴人以言則枝葉難辨御奸以法則恥格不形其阜財發號也生之寡而食之衆煩於令而鮮於理思欲救此繆盭致之治平兹心浩然若涉泉水故前詔有司博徵羣彦佇啟宿懵兾増時雍子大夫皆識達古今明於康濟造庭待問副朕虚懐必當箴主之闕辨政之疵明綱條之所紊稽庶富之所急何施斯革於前弊何澤斯惠於下土何修而理古可近何道而和氣克充推之本源著於條對至若夷吾輕重之權孰輔於理嚴尤底定之䇿孰叶於時元凱之考課何先叔子之克平何務惟此龜鏡擇乎中庸期在洽聞朕將親覽放制舉人勅王者謹天戒酌人言叶時凝資賛理斯為令典也朕以菲徳祇膺大綂嵗屬凶旱人思底寧庶察弊以勤理因舉能而詢衆科别條問臨軒致誠載搜尤魁果副虚佇賢良方正能直言極諫科舉人第三等裴表第三次等李郃第四等南卓李甘杜牧馬植鄭亞崔璵第四次等崔讜王式羅郡京崔渠慎田苗惜韋昶崔博第五上等崔換王賔詳閑吏理達於敎化科舉人第四次等宋昆軍謀宏逺堪任将帥科舉人第四等鄭冠李栻等皆直躬遵道博古知微敷其逺猷志在𢎞益實能攻朕闕政究天人交際之理極皇王通變之義指切精洽粲然可觀既効才於明世宜旌能於受祿其第三等第三次等人委中書門下優與處分第四等第四次等第五上等人中書門下即與處分貢舉條流明經進士詔學者立身之本文者經國之資豈可假以虚名必須徵其實效如聞明經射䇿不讀正經抄撮義條才有所解進士不尋史傳惟讀舊䇿共相模擬本無實才所司考試之日曽不揀練因循舊例以分數為限至於不辨章句未涉文詞者以人數未充皆聴及第其中亦有明經學業該深者唯許通六經進士文理華贍者意無甲科銓綜藝能遂無優劣試官又加顔面或容假手更相屬請莫憚糺繩由是僥倖路開文儒漸廢興亷舉孝因此失人簡能任賢無方可致自今以後考功試人明經每經摘試簏十帖得六以上者進士試雜文兩首合文律者然後並令試䇿日仍嚴加捉搦必才藝灼然合昇高第者並即依令其明法并書筭貢舉人亦量准此例即為恒式永隆二年八月令貢舉人勉學詔古之學者始入小學見小節大學見大節知父子長幼之序君臣上下之位然後師逸功倍化人成俗莫不由之子不云乎逺而有光者飾也近而愈明者學也故道行於上祿在其中所貴於有成不惟於遲達自頃州里所荐公卿之緒門人衆矣孰嗣子音國胄顒然未臻吾道至使鑚仰之地寂寥厥化貴於責實務於求士將去聖滋逺尚治澆薄為敦儒未𢎞不行勸沮朕承百王之末居四海之尊惟懐永圖思革前弊何以發後生之智慮垂先王之法則朕甚懼之敢忘於是天下有業擅專門學優重席堪師授者所在具以名聞自今以後貢舉人等宜加勗勉須獲實才如有義疏未詳習讀未遍輒充舉送以希僥倖所由官亦寘彞憲有司申明條例稱朕意焉開元二年五月令禮部掌貢舉勅張九齡勅每嵗舉人求士之本專典其事寧不重歟頃年以來惟考功郎中所職位輕事重名實不倫故盡委良吏長官乂銓猥積且六官之職例體是同況宗伯掌禮宜主賔荐自今以後毎諸色舉人及齋郎等簡試並於禮部集既衆務煩雜仍委侍郎專知開元年處分髙蹈不仕舉人勅孫逖勅古之賢君貴重真隠者將以勵激浮躁敦厚風俗傳不云乎舉逸人天下之人歸心焉葢謂此者朕緬稽古訓思𢎞致理以為道之為體先崇於静退政之所急實仗於賢才是用求諸岩藪假以軺傳虚佇之懐亦云久矣卿等各因旌賁來赴闕庭誠合盡收以光是舉然孔門荷蓧惟數七人商山採芝空傳四老今之應辟其數頗多朕頃縁幸湯粗令探賾或全誠抗跡固辭避於呈試或含光隠器不耀頴於文詞未測津涯難於處置語默之際用捨遂殊其弟子春等並别有處分自餘人等宜各賜物十段用成難進之美以全至高之節宜皆坐食食訖好去仍依前給公乗還貫其華隂郡李崗等十六人雖所舉有名或稱疾不到宜令本部取諸色官物各賜二十段以充藥物之資親試四子舉人勅朕聴政之暇常讀道徳經文列莊子等書文約而義精詞髙而㫖逺可以理國可以保身朕敦崇其敎以左右人也子大夫能從事於此甚用嘉之夫古今異宜文質相變若在宥而不理外物而不為行䆳古之化非御今之道適時之術陳其所宜又禮樂刑政所以經邦圖聖智仁義所以序人倫使之廢絶未知其㫖道徳經曰絶學無憂則乖進徳修業之敎列子力命曰汝奚切於物又遺懲惡勸善之文二㫖孰非何優何劣文子曰金積折亷壁襲且申其義莊子曰恬與知交相養相徵其言使一理混同二敎兼舉成不易之則副虚佇之懐開元二十九年九月條流習禮經人勅王者設敎勸學攸先生徒肄業執禮為本故孔子曰不學禮無以立又曰安上理人莫善於禮然則禮者葢務學之本立身之端居身之大猷致理之要道屬辭比事而不裁之以禮則亂疏通知逺而不節之以禮則誣實百行之本源為五經之户牖雖聖人設敎㒺不㑹通而學者遵行冝有先後自頃有司定議計功記習不量敎化淺深義理難易遂使博學者例從冬集習禮經者獨授散官敦本勸人頗乖指要始務𢎞奬以廣儒風自今以後明經習禮記及第者亦宜冬集如中經兼習周易若儀禮者量減一選應諸色人中習三禮者前資及出身人依科目例白身人依貢舉例毎經問大義三十條試䇿三道仍主司於朝官學官中簡擇精通經術三五人聞奏主司與同試問質定通否義䇿全通為上等轉加超奬大義每經通十五條以上䇿通兩道以上為次等依資與官如先是員外試官者聴依正員例其習開元禮人問大義一百條試䇿三道全通者為上等大義通八十條以上䇿通兩道以上為次等餘一切並准習三禮例處分其諸館學士願習三禮及開元禮者並聴仍永為恒式釐革新及第進士宴㑹勅勅進士䇿名向來所重由此從官第一出身誠宜行止端莊宴遊儉約事務率醵動合兢修保他日之令名成在此之慎静豈宜縱逸惟切追歡近年以來澆風大扇一春所費萬餘貫錢況在麻衣從何而出力足者樂於書罰家貧者苦於成名將革弊訛實在中道宜令禮部切加誡約每年有名宴㑹一春罰錢及舖地等相許毎人不得一百千其勾當分手不得過五十人其開試開宴並須在四月内稍有違越必舉朝章仍委御史臺當加糺察乾符二年正月唐大詔令集巻一百六
