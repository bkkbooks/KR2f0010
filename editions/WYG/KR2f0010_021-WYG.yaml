body:
  text: 唐大詔令集巻三十一宋宋敏求編皇太子納妃納蘇亶女為皇太子妃詔開元十九年皇太子納妃制開元二十一年皇太子納妃勅令兩京選皇太子妃勅册妃嬪册皇太子蘇妃文册皇太子韋妃文册章懐太子張良姊文退讓降太子忠為梁王詔廢退廢皇太子承乾為庶人詔廢皇太子瑛為庶人制追復息隠王追復皇太子詔贈廢太子承乾恒山愍王制贈重俊皇太子制納妃納蘇亶女為皇太子妃詔配德元良必俟邦媛作儷儲貳允歸冠族秘書丞蘓亶長女門襲軒冕家𫝊義方柔順表質幽閑成性訓彰圖史譽流邦國正位儲闈實惟朝典可皇太子妃所司備禮册命主者施行貞觀年皇太子納妃制龍樓内範輔成元良之德鳯邸中闈克諧樂善之美自非門地兼茂容則聿脩何以式副好逑允兹華選薛縚第六女竇希瑊第四女戚里承休渭陽傳慶婉順成性柔閑有容言必圖史之規動遵珩珮之節恵問蘭郁心清玉映足以儷青宫之寵伉朱邸之義式昭閫訓用光嬪則縚女可皇太子妃瑊女可慶王妃仍令所司備禮至都册命開元十九年十月皇太子納妃勅張九齡勅禮有謹於初義亦重其本凡是姻媾且猶正於人倫况在元良更將承於宗祀皇太子鴻儲副是屬仁孝自然爰從吉辰式備嘉禮上事下繼君子重之言告言歸朕豈無慰非獨在予之慶宜申與衆之澤天下囚徒死罪特宜免死配流嶺南逺處流罪降至徒徒以下罪並宜釋放其造偽頭首勾合知情受偽人等罪雖徒流仍便𨽻為百姓至彼勿許東西諸道征行人家及鰥寡孤獨委州縣長官檢校矜放差科使安其業中間有不支濟者量事賑給仍量助其營種長安萬年兩縣百姓及今月當上彍騎衛士雜匠掌閑幕士駕士工人樂人供膳官馬主食弓䓁並免其家今年地税三衛細引飛騎監上門長及禮生有職掌者各减一年勞在京文武官九品已上見在外官因公使及當上在京新除五品巳上外官未辭并致仕官朝朔望者各賜勲一轉東宫官九品巳上及諸有司縁禮㑹祗供官等更加勲一轉五禮使兵部尚書兼中書令蕭嵩特封徐國公禮㑹使黄門侍即同中書門下平章事韓休特與三品階禮㑹使少府監馮紹正賜紫金魚袋諸副使及判官更加勲一轉禮官儐者夹侍官及孔目官使典主旌節等擇日優與處分仗内馬家内侍省級使教坊音聲人縁太子禮㑹祗供者各賜勲一轉皇太子舅尚輦奉御趙逈遵特與三品仍改與三品官前右威衛騎曹趙逈進特與五品仍改與五品宫皇太子侍讀侍書等各加一階其太子諭德潘肅特與五品太子妃兄通事舎人薛愿特與五品仍改與五品官兄吏部常選怤與五品仍與五品官今日應預㑹官等各節級賜物即宜領取晏慰者所以宣其情願錫者所以將其意公卿百辟庶知朕心開元二十一年五月二十一日令兩京選皇太子妃勅冢嗣其良家國之慶人倫之始宜娶元妃雖吉事尚須待年而嘉耦宜深善教志於先定冀及義方屬在德門遂成好合在東京委裴度西京委宰臣及申㫖諭令本宗家長舉言十歳巳来嫡女及妹姪孫女兩月内送中書門下務令宜稱無有不盡開成元年八月册妃嬪册皇太子蘇妃文維貞觀年月日云云於戲惟爾秘書丞蘇亶長女族茂冠冕慶成禮訓貞順自然言容有則作合春宫兾協正善曰嬪守器式隆萬葉備兹令典抑惟國章是用命爾為皇太子妃往欽哉册皇太子韋妃文維開元二十六年歳次戊寅七月戊辰朔十二日乙卯皇帝若曰於戲天下之本實在於元良人倫之瑞是先於内則咨爾忠王妃韋氏門承鼎盛質禀賢和勲中環珮之節言成圖史之訓克明女憲無假於師氏能勤婦道自合於國風固可以齊體儲位正位妃壼佇聞六行之美以引三善之德是用册爾為皇太子妃往欽哉爾其祗服寵章光膺茂典協和以逮下㳟儉以率先式昭徽猷永保祚𦙍可不慎與册章懐太子張良姊文沈佺期維景雲二年歳次辛亥十月壬寅朔十日辛亥皇帝若曰於戲咨爾故章懷太子良姊張氏家承閥閲世襲徽猷法度有章言容克備始應良選入奉元儲柔規緝於上下淑問揚於中閫恩絶賔帝七日無歸義申從子百齡先謝言念窀穸憫悼良深追崇徽號典故斯在是用命某官某乙册爾為章懷太子良姊魂而有靈膺兹寵數退讓降太子忠為梁王詔詔曰昔泰伯髙讓載昌姬宗東海之藩克隆漢祚故能業𫝊端委作錫龜䝉飛茂實於前英播清虛於逺葉皇太子忠分景扶木禀慶大津早加寵樹禮絶羣后比因朝見屢陳撝挹論嫡庶之分守貴賤之禮以貴則皇后有子以賢則不敢當仁前後數四辭情懇惻義髙曠古道邁前修宜遂雅懷以成厥美可封梁王食邑二萬户持節都督梁洋集璧四州諸軍事梁州刺史仍别食二千戸賜物二萬段甲第一區梁州仍置都督府顯慶元年正月廢黜廢皇太子承乾為庶人詔詔曰肇有皇王司牧黎庶咸立上嗣以守宗祧固本忘其私愛繼世存乎公道故𫝊季歴而樹姬發隆周享七百之期黜臨江而罪戾園炎漢定兩京之業是知儲副之寄社稷繄以安危廢立之規鼎命申其輕重詳觀歴代安可非其人哉皇太子承乾地惟長嫡位居明兩訓以詩書教以禮樂庶𢎞日新之德以永無疆之祚而邪僻是蹈仁義蔑聞踈逺正人親昵羣小善無為而不背惡無大而不及酒色極於沉荒土木備於奢侈倡優之技晝夜不息狗馬之娛盤遊無度金帛㪚於姦慝捶楚遍於僕妾前後愆過日月滋甚朕永鑒前載無忘正嫡恕其瑕釁倍加訓誘選名德以為師保擇端士以任宫僚猶冀中人之性可以上下蟠木之質可以為容愚心不悛凶德彌著自以久嬰沉痼心憂廢黜納邪説而違朕命懷異端而疑諸弟恩寵雖厚猜懼愈深引姦回以為腹心聚臺𨽻而同遊晏鄭聲淫樂好之不離左右兵凶戰危習之以為戲樂既懷殘忍遂行殺害然其所愛小人往者已從顯戮謂能因兹改悔翻乃更有悲傷行哭承華制服博望立遺刑於髙殿日有祭祀營窀穸於禁苑將加改𦵏贈官以表愚情勒碑以紀凶跡既傷敗於典禮亦驚駭於視聽桀跖不足比其惡行竹帛不能載其罪名豈可守器纂統承七廟之重入監出撫當四海之寄承乾宜廢為庶人朕受上命為帝作人父母凡在蒼生皆存撫育况乎冡嗣寜不鍾心一旦至此深増慙歎貞觀十七年四月廢皇太子瑛為庶人制朕㳟承天命嗣守先業不敢失墜將裕後昆所以擇元良䇿守器為國之本豈不謂然太子瑛㓜而鍾愛爰加訓誘親師之範所望日新年既長成與之婚冠而妃之昆弟潛搆異端頃在東都頗聞疑議所以妃兄薛愿流謫海隅導之誨之謂其遷善駙馬都尉薛繡亦妃之兄也今又煽惑謀䧟弟兄朕形之言愧於天下教之不改其如之何葢不獲已歸諸大義瑛可廢為庶人鄂王瑶光王琚等自㓜及長爰加撫育為擇師資欲其㳟順而不率訓典潛起異端及與太子瑛搆彼凶人同惡相濟亦既彰露咸引其咎孽由巳作義在滅親並降為庶人駙馬都尉薛繡離間骨肉惑亂君親潛通宫禁引進朋黨䧟元良於不友誤二子於不義險薄之行遂成門風皆惡跡自彰凶慝昭露據其所犯合寘嚴誅言念𤨏姻用申寛典捨其兩觀之罰俾就三危之竄可長流瀼州百姓開元二十五年七月追復息隠王追復皇太子詔詔曰昔戾園敗德西都表其諡號楚英干紀東漢錫其湯沐斯皆屈邦國之禁申骨肉之恩故也息隠王地乃居長守器運初自貽伊戚䧟於禍難日月逾邁松檟成行朕嗣守鴻基􅃡㝷遺烈何嘗不陟彼岡而靡覿瞻同體而疚懐恩備哀榮式加禮命可追復皇太子諡仍依前諡曰隠置陵令以下官并加户守衛貞觀十六年六月贈廢太子承乾恒山愍王制孫逖門下理天下者必𢎞於在宥厚仁德者莫尚於追逺故廢太子承乾昔在先朝嘗䧟深過因是殛竄至於淪沒雖臣子之罪義則不私而骨肉之親情則無絶况年代浸逺典廢宜追言念往時已申公葬將崇後命是錫王章式遵仍舊之封更表易名之諡可贈恒山愍王開元二十四年贈重俊皇太子制蘓頲門下朕聞曽氏之孝也慈親惑於疑聽趙虜之族也明主哀而望思歴考前聞率由舊典重俊大行之子元良守器往罹搆間困於讒嫉莫顧鈇鉞輕盜甲兵有此誅夷無不悲惋今四凶咸服十起何追方伸赤暈之寃以紓其黄泉之痛可贈皇太子主者施行唐隆元年六月二十五日唐大詔令集巻三十一
