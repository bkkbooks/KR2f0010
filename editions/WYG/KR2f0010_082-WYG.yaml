body:
  text: 唐大詔令集巻一百三宋宋敏求編政事舉薦下詔天下搜賢俊制訪至孝友悌詔處分舉薦人詔令常叅官舉人詔捜訪天下賢能勅捜訪兵術賢才詔按察上遣使巡行天下詔遣十使廵察風俗制處分朝集使勅八道舉薦下詔天下搜賢俊制賈至朕聞惟理亂在庶官是以先王旁求俊彦思皇多士以倡九牧阜成兆人頃者奸臣執權專利冒寵惟正直是醜惟邪佞是能此壅塞賢路罔蔽天聽使忠臣不得進其謀才士不得展其用廢三載之黜陟寢九德之推擇多有老於郎署滯於丘園吏稱無人才不給位朕以薄質嗣守大寳㓂戎未殄王業維艱兢兢乾乾日慎一日緬惟堯舜求賢之意周公吐握之義思欲廣進髦乂輔寧邦家寔頼公卿大夫𢎞我視聽易曰方以𩔖聚語曰舉爾所知凡宰相王臣宜加捜擇其常叅官及郡縣長吏上佐等皆從歴試而踐通榮如各知其宻行異能博學深識才堪濟代術可利人名不彰聞位不充量湮淪屠釣流落風波者一善可録便宜公舉逺則封表附驛近則進狀奏聞勿避親讎無限儕伍其有獨負竒才未逢知巳即仰投匭并所在陳狀自論長官登時與奏夫兹薦士非止一舉永為恒典有即登聞昔荀桓子立翟之功士伯受𤓰衍之邑栁下惠賢而不舉臧文仲被竊位之名春秋書之千載不朽凡百在位可不勉歟宜宣示中外令知朕意至德二年四月八日訪至孝友悌詔至和育物大孝安親古之􅈒王必由斯道朕徃在春宫嘗事先后問安靡闕侍膳無忘及同氣天倫聨華棣萼居嘗共被食必分甘今皇帝奉而行之未嘗失墜每有銜命而来戒途將發必肅恭拜跪涕泗交連左右侍臣罔不感動間者旭日抱戴瑞亦自天白狼之瑞接武薦臻此皆皇帝聖敬之符孝友之感也故能誕敷德教𢎞乎四海信可以光宅寰宇永綏黎元者矣其天下有至孝友悌行著鄉閭堪旌表者命縣長官採聽聞奏孝子順孫樂於𤣥化也至德二年正月處分舉薦人詔推薦之道必務於至公賞罰之間亦資於不濫其諸色舉人等須有處分令薦所知寔佇才能用施政理自宜慎擇以副虗懐古者効官三嵗考績善惡既著褒貶斯存舉之得人必受旌能之賞舉之失選亦加懲過之罰賞罰之典期於勉行凡百具寮宜知朕意寳應元年七月令常叅官舉人詔勅知人則􅈒堯舜猶難𩔖能而舉古今常式自頃中原多故汔求小康州縣屢空守宰多闕攝官承乏者頗無舉職之能懐才抱器者或有後時之歎朕所以宵衣不寐側席未遑思𢎞致理之規冀及大中之道而庶尹卿士備列朝廷豈無叶賛之心以助旁求之義其内外文武官如有堪任刺史縣令及出身前資人中堪任判司丞尉者宜令京常叅官各慎擇所知具狀奏聞及諸州刺史縣令既藉寮屬宜亦准此古者得人受賞速不踰時増秩賜金有國通典其或任非稱職舉不當事顧多附下之心亦無不適之罰其所舉人受官後如政事尤異清白著聞三兩考後仰本道觀察使聞奏其舉主及所舉人並量加進改如懦弱不舉及暴政處置乖宜并冒犯贓私等罪論刑當亦連坐宣示中外知朕意焉寳歴元年九月捜訪天下賢能勅濟國安民兼先得士懐才抱器所切逢時茍獲賢能何難任使自從近嵗頗乏豐年百姓凋殘四方空竭邕交防戍卭蜀征行租賦罄於東南衣粮耗於西北欲全國力須整邉防所恨利於國者或迷之而未行害於人者或遣之而未去天下有洞諳邉事深㑹兵謀或决勝於干戈或運籌於帷幄及有苦心吏術深逹政經曽觀已試之能可致必成之理各仰自見所在長吏先共討論有可取者發遣赴京量事資送或安貞守道隠遁山林或勤學知書博通今古並仰所在長吏捜訪聞奏冀有才者得伸有能者得用凡思報國無若薦賢如得非常之材必加不次之賞布告天下知朕意焉捜訪兵術賢才詔朕每念艱難之本切思拯救之圖治少亂多古猶今也葢捜揚之未至非爵賞之不行况自鄉里沽虚物情賈怨朝市有争先之黨山林多獨徃之人彼豈自窮驅而莫返其有文包經緯道貫儒𤣥貞遁自肥浮名不染豈無加等之爵以待非常之流今委使臣逺近徴訪必行備禮以聳羣方且機貴研深用惟體要運當無事固垂拱而可待時屬多虞非援竒而不振或有材優將畧業洞兵鈐辨勝負於風雲計短長於主客妙得神𫝊之訣耻成兒戲之名不俟臨機方期制變或銷聲於屠釣或屈志於風塵勿媿自媒當期致用至乃旁窺國病動適時宜深探貨殖之源備得富强之術排於浮議欝彼良圖又有志擅縱横久潛緇褐材推超異見辱儕流茍全一藝之工不必萬夫之敵亦有推研歴象校歩星辰言必効於機先術豈疑於億中是資竒器孰曰異端亦在勤求佇加殊賞噫功名可慕少壯㡬何在君親則忠孝相資於國家則安危同切勿甘流落猶狥晏安並委使臣勝示訪求長吏津置發遣同心體國無使淹延懸賞俟能必期升擢朕雖踵艱否亦謂憂勤髙祖太宗之在天固當垂祐社稷生靈之有主夫豈乏賢逹我敷求咨爾將命勿虚翹矚茍自因循其間儒學優游軍謨𢎞逺宻陳時務願就制科者已從别勅處分跅弛遺才沉淪末位不礙文武並須升聞布告天下咸使知悉光啟五年五月按察上遣使廵行天下詔昔者明王之御天下也内列公卿允釐庶績外建侯伯司牧黎元唯其淳化未敷名教或替故有廵狩之典黜陟幽明存省方俗遐邇遂性情偽無遺時雍之宜率由此道朕祗膺寳命臨御帝圖禀過庭之義方荷上𤣥之嘉祉四荒八表無思不服而夙興夕惕勤躬約巳日慎一日雖休勿休欲萬國歡心兆民有賴推誠待物近取諸身實謂羣官受拜咸能自勵乃聞連帥刺舉或乖共治之寄縣司主吏尚多黷貨之罪有一於此責在朕躬是用中夜憮然昃景輟食宜遣大使分行四方申諭朕心延問疾苦觀風俗之得失察政刑之苛弊耆年舊齒孝悌力田義夫節婦之家疾廢惸嫠之室須有旌賢賑贍聽以倉庫物賜之若有鴻材異等留滯末班哲人竒士隠淪屠釣宜精加捜訪進以殊禮務盡使乎之㫖俾若朕親覿焉貞觀八年正月遣十使廵察風俗制古之御天下者以大寳為公器以崇髙為外物仰則乾符順性命之理俛思坤載成厚博之德將以治成至道保邦静人用清三徴以齊七政能臻夫此者豈一人之力哉寔頼羣方共康庶績自季葉淪替偭棄公道官匪其人教無所習懐才修㓗者則依違以自容通方宏偉者則放蕩以求利由是淳化日削澆風嵗長典章訛弊甿俗凋殘逶迤陵頺莫能振理朕以薄德丕承寳命夙夜惟寅憂勞無怠昧旦端冕心被寰瀛日晏罷朝念周黎庶頃者勵精推擇傍求牧宰冀聞善政惠康乃人虚已勵勤美化猶怠貪官傲吏屢黷於爰書失職流亡㡬淪於版籍豈刑賞之柄不叶其中將宵旰之誠未孚於下永言國本良深軫悼古者天子廵狩省方觀俗而錫鑾備駕或以為煩故分命輶軒博採謡誦以彰善癉惡激濁揚清散皇明以燭幽揚仁風以被物寔資令德允屬通才惟懐永圖式鑒成憲宜於左右臺及内外五品以上官識理通明立性堅白無所詘撓志在澄清者二十人分為十道廵察使二周年一替以亷按州部俾其董正羣吏觀撫兆人議獄緩刑扶危拯滯若能抗詞直筆不憚權豪仁恕為懐黜陟咸當别加奬擢優以名器如脂韋茍全籧篨戚施髙下在心顧望依附者將遷削屛棄肅以憲章咸竭廼心以副朕意神龍二年二月處分朝集使勅八道蘇頲勅朝集使等朕自臨萬邦倐已三載何嘗不兢兢業業勵精政道思欲棄末敦本阜俗安人寰瀛之間日月以冀所以急於務農不奪人時富而教之庶乎可致夫苛政甚於猛虎貪人比之强賊頃雖臨遣使臣未能澄正此弊或刻以害物或擾以妨農或背公向私或全身養望至使錢榖不入杼軸其空捐􅇤相仍流庸莫返且四方事廣非一人獨化共理之寄非卿而誰卿等至州逓相朂勵勤恤孤弱勸率耕桑各効清勤無或􅈥怠開元三年二月十五日又勅朝集使等朕聞御寰瀛者不可以獨化養黎獻者必存於共理故専一方親百姓能致循良之術必無愁苦之聲非牧伯之賢疇能於此所以精求臺閣歴選縉紳當舉百寮之要以先六刺之重虚想准政用成庶績自去冬入計者則循名責寔詢事考言雖不無等差終未有殊異得非嵗時或淺風教未洽耶故一切不除各再臨所典至於敬耆老恤㷀弱止姦盜挫豪强人不忍欺吏不敢犯田疇墾闢獄圄空虚徭賦必平逋逃自復門杜請謁庭無滯留若是者迺闗乎職思可以力致至於弭災眚集休祥尚德義崇禮樂儒風大長道化滂流耕夫克譲織婦知節草木不夭昆虫咸遂扇彼淳源登兹夀域若是者亦𢎞之在我仁逺乎哉豈惟禄秩就加以公卿入拜其或靡副朝奬不恭朕言陟既有之黜故宜及勉旃俞徃各勤我班瑞之分命開元六年二月六日又勅朝集使朕聞天生蒸人溥於四海天有成命孚於萬邦必内立公卿外建侯伯后非賢罔使賢非后罔事借耳以廣聽假目以遐覽則諭上㫖通下情庶政諧而羣萌樂矣由是三考黜陟百官㑹同古昔之訓炳然共守朕以薄德祇膺寳位受乾坤之顧荷宗廟之靈懍乎若渉春氷如馭朽索責在司牧所頼分憂曷嘗不想望賢才馨香至化七年於兹矣咨爾羣岳寔邦之良服勤政途深佇嘉績豈為吏罕乆與人未信何殊尤異絶寂寥厥聲恭惟永圖當副虚屬孔子曰茍有用我者三年有成漢宣曰庶人安田里無愁恨之聲者政平訟理也以為太守數易則下不安誠哉是論矣今之牧守古之諸侯寵數特加情寄尤切故躬饗廷内則飲食晏樂幣帛筐篚入至朕前則敷祍以陳命席而對所冀仁且不逺言之必行以朕憂勞之心託卿勤䘏之助卿等宜慎厥始成厥終徃欽哉祗守爾典操一州之統分六條之察念兹在兹用光我班瑞之命有賞有罰朕無戲言並即好去開元七年三月十一日又勅朕自君臨區域子育黎庶嵗年是慎夙夜惟寅而誠或不孚政猶未洽所在旱澇屢覩章表因饑饉而為理竭憂勞以養人非夫二千石孰應斯委下户給之髙户貸之所須賑恤並先處分至於常賦則著恒典檢據成損蠲減有條又近日以来中外少事差科調發殆至於無處馭通融當免於弊不知卿等從州来日百姓間得以安穏否其閭閻未便勅令有闕具以陳聞副我深寄時寒渉路並平安好其三両日尋親識後取曹司進止開元七年十月二日又勅朕聞諸禮曰刑禁暴爵舉賢則政均矣好惡著則賢不肖别矣其道然耶朕以虚薄祗膺景命荷宗社之靈當億兆之責曷嘗不昃朝晏坐畏天愛人思欲保其和樂躋於仁夀則與我共理者其惟良二千石乎每計吏還州與之陛見示其賞罰餞以筐篚亦云命而已矣而朝集使豫州刺史裴綱分典荆豫為政煩苛頃嵗不登公議蠲復部人有訴便致科繩縣長為言仍遭留繫御史推按遽以寔聞虐政弊人一至於此朕夙夜乾惕匪遑寧居尋遣使存問其諸道有損處已量加賑恤水旱不時寔朕之過惠養失所分刺之由是用黜綱於嶺裔儆彼羣岳朕於蒼生若保赤子為之均田邑制廬井必欲其時和年登逺安邇肅託於牧宰代以躬親故歴難其官誠經國致理之意也夫德惟善政政在養人故土煩則草木不長水煩則魚鱉不大必也寛恕貴乎清静諸刺史都督宜問疾苦拯貧窮杜侵漁察寃獄至於賦役務從减省深刻為事人何以堪私惠茍行法或將墜理須折衷用存令式其百姓有穏便者随事條奏將親覽焉欽爾有官各勤為政如風化允穆課績殊尤當擢之不次旌乃厥美凡百庶邦敬聽朕命開元八年二月十九日又勅朝集使古者覲羣后比萬國黜幽陟明循政思理罔或廢也朕以虚薄屬當期運受命穹昊司牧黎元何嘗不中夜求衣分晝忘食欲其日月所燭霜露所墜不獨親其親不獨子其子五榖豐殖萬物阜安百姓無事與能共化於兹八年矣而淳流未還至道猶欝豈朕之不德邪將吏之不賢耶徭賦或繁耶綱維或紊耶故延入階陛躬問得失悉如卿所對則朕無憂矣書曰非知之難行之惟難語曰仁逺乎哉我欲仁斯仁至矣卿等宜祗典厥職克正其身修於國章允兹朝寄因乎風俗示之訓誘必也道德齊禮以公滅私田里絶愁歎之聲邦家聞寛厚之化乃及優賞如或依勢作威倚法以削流亡未至教令不行加以常罰自餘宜依别勅處分勤恤人隠以副朕懐並仰好去開元八年三月十一日又勅朝集使等朕承天丕命子育萬方樹之師長俾敷景化將以固兹邦本致諸昇平而大道􅛻然淳風未暢租賦頗减户口猶虚水旱相仍耕桑莫贍葢朕之不德而吏之無方永言於兹良増歎息徃嵗河南失稔時屬薦饑州將貪名不為檢覆致今貧弱萍流外境責在致理有從貶黜因兹以来率多妄破或式外奏免或捐中加數至如宻州去秋奏澇管户二萬八千八百不損者兩户而已無田商賈之流雷同入數自餘州不損户即丁少得損户即丁多天災流行豈應偏併皆是不度國用取媚下人曩之刻薄也如彼今之踰濫也如此不副朕意一至於斯踈怠之愆雖已㑹赦尸曠之跡豈不多慙當令所司比類澄汰卿等與朕共理寔惟分憂各勉思政途以匡不逮其百姓間事物去冬赦書已處分訖若人有疾苦鄉有姦豪不勤農桑不崇學校並宜敦勸以正風俗逃亡之户必藉招携差科之間務令停减如臺省處事有不穏便於時者具利害聞奏勿復依随以損百姓卿等至州之日宜一留意綏我庶人並即好去開元十年正月十一日又勅朝集使等朕臨㝢内子育黎元何嘗不簡易愛人勤䘏庶政天下至廣不能獨任故樹之方牧資其共理而淳化未敷至道猶欝庸賦未減户口且虚水旱相仍倉儲莫贍無聞慈惠之政未息凋弊之流豈朕之不明而吏之無術言念於此用惻於懐卿等是行勉思厥政百姓間有鰥寡􅑏獨不能存濟者務令優養游業浮惰不勤稼穡者特令懲肅敦以學校勸以農桑差科之間務使平允逃亡之户兼藉招携令其下人使得蘇息諸州遭澇之處多是政理無方或堤堰不修或溝渠未洩頻已處分竟無承禀當被租庸是何檢校至州之日各宜勸勉應合修塞開導宜預施功若不蹔勞何以獲利今令御史分知訖宜勵所職勿犯常科今考績深者已有除改資歴淺者更佇良能應還州人已令所司各與賜物待駕發後三五日别親識並即好去開元十年二月二十七日唐大詔令集巻一百三
