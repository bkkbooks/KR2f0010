body:
  text: 唐大詔令集巻十一宋宋敏求編帝王遺詔上神堯遺詔太宗遺詔天帝遺詔肅宗遺詔代宗遺詔徳宗遺詔憲宗遺詔穆宗遺詔遺詔上神堯遺詔嗚呼夫受命終畢人之大倫修短之所共同聖賢之所不免朕徃逢喪亂思濟黎元櫛風沐雨東征西伐克平宇内從此樂推遂膺景命恭承寳厯但䝉犯矢石覊乗戎旅久厭干戈常思閑逸是以拂衣髙謝歸老櫟陽爰委萬機屬之才子所授得人遐邇寧輯四海清宴八表來庭養志怡神於今十載但去秋已來夙疾咸發自爾彌留至於大漸皓首歸全斯何恨矣洮頮慿几略陳素志朕毎覽漢文遺詔慇懃嘆焉以為當今之世咸嘉生而惡死厚𦵏而破業重服以傷生吾甚不取且朕既不徳無以佐百姓今崩又使重服久臨以罹寒暑之數以重吾之不徳謂天下何吏民令到出臨三日皆釋服無禁嫁娶飲酒食肉此豈非深逹天命哀矜百姓者歟又魏文終制亦有可取朕雖徳愧古人豈忘景行屬纊之後三日便殮文武官人三品已下三日朝晡哭臨十五舉音事訖便出四品已上臨於朝堂殿中當臨者非朝夕臨時無得擅哭其方鎮岳牧在任官人各於治所舉哀三日且今王師四討軍機急速小殮既竟嗣子宜於别所視事軍國大事不得停闕尋常閒務任之有司其服輕重悉從漢制以日易月於事為宜其園陵制度務從儉約斟酌漢魏以為規矩百辟卿士孝子忠臣送徃事居勿違朕意焉貞觀九年五月六日太宗遺詔夫天命之重緑錯奉其圗書天子之尊赤縣先其司牧而功兼造化橋山之樹已隂業致昇平蒼梧之駕方逺至於平冦亂安黎元灑洪災攘大患黄帝之五十三戰商湯之二十七征以此申威曽何足筭昔者亂階斯永禍鍾隋季罄宇凝氛曀昏辰象綿區作梗揺蕩江河朕拂衣於舞象之年袖劍於斬蛇之地雖復妖千王莾戮首輗車兇百蚩尤釁尸軍鼔垂文暢於炎野餘勇澄於斗極前王不闢之土悉請衣冠前史不載之鄉並為州縣再維地軸更張乾絡禮義溢於寰瀛菽粟同於水火破舟船於靈沼收干戈於武庫辛李衛霍之將咸分土宇縉紳廊廟之材共垂帶綬至於比屋黎元闗河遺老或贏金帛或賚倉儲朕於天下士大夫可謂無負矣朕於天下蒼生可謂安養矣自櫛風沐雨遂成弭沴憂勞庶政更起沉疴况乃漢苦周勤禹偏堯腊以矜百姓之所致也道存物徃人理同歸掩乎𤣥泉夫亦何恨矣皇太子某大孝通神自天生徳累經監撫熟逹機務凡厥百僚羣公卿士送徃事居無違朕意属纊之後七日便殯宗社存焉不可無主皇太子即於柩前即皇帝位依周漢舊制軍國大事不可停闕尋常閑務任之有司文武官人三品已上並三日朝晡哭臨十五舉音事畢便出四品已下臨於朝堂其殿中當臨者非朝夕臨無得擅哭諸王為都督刺史任者並來奔喪濮王萊王不在來限其方鎮岳牧在任官人各於任所舉哀三日其服紀輕重宜依漢制以日易月園陵制度務從儉約昔者霸陵不掘則朕意焉遼東行事並停太原元從人見在者各賜勲官一級諸營作土木之功並宜停斷貞觀二十三年五月天帝遺詔朕聞皇極者天下之至公神器者域中之大寳自非乾坤幽贊厯数在躬則鳯邸不易而臨龍圖難可輙御所以榮河緑錯彰得一之符温洛丹書著通三之表􅃡稽前古期道同歸朕之聖祖神宗降皇虹而稟樞電乗時撫運逢海沸而屬山鳴濡足横流極蒼生之已溺援手四岳救赤縣之將焚重稱九寰止麟鬬而清日月再安八極息龍戰而蕩風波自彼迄今六十六載黎元無􅇏柝之警區㝢恣耕鑿之歡育子長孫擊壤鼓腹遐邇交㤗誰之力歟朕以𦕈身嗣膺鴻緒欽若穹昊肅雍清廟顧諟明命載廸彞倫嘉與賢士大夫勵精為政朂已想蛟氷之懼為善慕雞鳴之懃幸戎夏乂安中外禔福亘月竁以覃正朔匝日域而混車書端拱無虞垂衣有截其天意也豈人事乎毎導俗匡時既𢎞之以禮讓恤刑薄罰復躋之於仁夀聞九農之或爽則虧膳以共其憂見一物之有違則撤樂以同其慼斯亦備諸耳目非假一二言也憂勤之至庶有感於明靈亭育之懐謂無負於黔庶永言薄徳遘疾彌留徃屬先聖初崩遂以哀毁染疾久嬰風瘵疚與年侵近者以來忽焉大漸翌日之瘳難冀賜年之福罕再但存亡者人之晦明生死者物之朝夕常情所滯唯聖能通脱屣萬方無足多恨皇太子哲握褒履已敦敏徇齊早著天人之範夙表皇帝之噐凡百王公卿佐各竭乃誠敬保元子克隆大業光我七百之基副兹億兆之願既終之後七日便殯天下至大宗社至重執契承祧不可暫曠皇太子可於柩前即皇帝位其服紀輕重宜依漢制以日易月於事為宜園陵制度務從節儉軍國大事有不决者兼取天后進止諸王各封一百户公主加五十户内外文武九品已上各加一階三品已下賜爵一級永徽以來入軍年五十者並放出軍天下百姓年五十者皆免課役廢萬全芳桂等宫𢎞道元年十二月四日肅宗遺詔𠡠帝王享國天命有常大厯𫝊歸皇綱無易朕幸以凉徳繼承宗祀在常樂問安之日屬元兇開釁之初南奉聖皇北集戎事賴將相同徳社稷降靈爰發五原成師一旅丕圖克振華夏乂寧旰昃之心每勤思於兆庶晨昏之禮嘗不匱於庭闈而天禍上延神心未悔正當金革罹此凶災遂遘膏肓惟幾大漸及兹理命獲著誓言庶安國以保人豈嘉生而惡死審以大計屬於公卿皇太子豫仁孝元良聪明齊聖佐成大業能事神祗朕既彌留可守宗社宜令所司當日具禮於柩前即皇帝位應縁朕喪事制度並准聖皇遺詔其諸道節度使都督刺史等並不湏赴哀又為兵革未寧郵驛艱弊一切不湏専使奉慰朕執喪在疚不食葷羶所設饋奠皆湏如在有違本意神亦不歆其祭祀之禮一切不得宰殺且國儲非廣虛費稍多宫掖之間湏有釐革所有三宫内人宜量事减省及至徳已來籍没家口非切要者並與放出諸王院内亦宜准此其文武官僚合湏褒賞天下百姓宜在優矜毎當變易之時皆下惟新之命並委皇帝節級處分嗚呼股肱勲臣敬保元子事居送徃諒在於兹宣示萬邦宜從朕意寳應元年四月十八日代宗遺詔朕以𦕈身祗奉鴻業不能光宣大訓嘉靖萬邦奉祖宗重熈之徳答公卿寅亮之勤旰食宵衣痛心疾首嗚呼天地之理死生常數疾既大漸彌留日臻惟懐永圖嗣守丕業皇太子元良繼明睿哲齊聖宜陟元后保守宗祧宜令所司當日具禮於柩前即皇帝位仍以司徒兼中書令汾陽郡王子儀攝冡宰其喪儀及山陵制度務從儉約並不得以金銀錦綵為飾天下節度觀察團練等使刺史等並不湏赴哀祭祀之禮亦從節儉其三宫内人宜令量事减省諸王院亦宜准此其天下人吏勅到後出臨三日皆釋服無禁婚娶祠祀酒肉其宫殿中當臨者朝夕各十五舉音禮固從宜喪不可久皇帝宜三日而聴政十三日小祥二十五日大祥二十七日而釋服獲奉宗廟之靈永終天禄所痛不得與佐命勲賢庶尹卿士顧命永訣以託萬方内外腹心之臣文武忠良之士敬保元子以安家邦嗚呼其聴朕命大厯十四年五月徳宗遺詔朕承八聖之休徳荷上天之眷祐嗣守丕訓不敢荒寧賴宗廟之靈羣后之力戡定大難以康兆人嚴恭寅畏二十有七載今天降疾不興不寤是用審訓宜聴朕言皇太子誦元良繼明睿哲齊聖孝友和惠恭敬温文必能覲祖宗之耿光紹邦家之大業宜於柩前即皇帝位嗚呼朕常奉聖祖𤣥元清静之教勵精至道保合太和毎忘已以愛人豈嘉生而惡死咨爾將相卿士方伯連帥其敬保元子永綏萬邦各有叶心同底於道無廢我高祖太宗之休命諸道節度使觀察防禦等使及諸州刺史等膺鎮守之任有軍旅之事所寄尤重不可暫曠不湏赴喪以日易月之制宜遵舊典文武官等朝晡哭臨十五舉音朕毎覽漢史至孝文薄葬之詔未嘗不嘆息嘉尚緬慕其風園陵制度務從儉約百辟卿士孝子忠臣送徃事居無違朕意貞元二十二年正月憲宗遺詔朕以薄徳嗣膺寳祚執珪璧以奉九廟垂衣裳以臨萬邦十有六年於兹矣賴天地敷祐宗社降靈内有百辟多士外有州牧方伯文武並用忠賢叶心以弼予一人以康彼兆庶戡剪羣慝廓清九圍方保和平共登仁夀而萬務所逼六氣咸侵遘疾有加至於大漸用申顧命式合典謨皇太子恒天縱睿哲日躋誠敬惟孝惟友克寛克仁必能承祖宗之丕訓守邦家之鴻業宜令所司具禮於柩前即皇帝位仍以司徒兼中書令𢎞攝冡宰應諸道節度觀察防禦等使及諸州刺史寄任尤切並不湏赴哀皇帝易月之制皆依舊典文武官等朝晡哭臨十五舉音其喪儀及山陵制度務從儉約嗚呼始終常禮奚可甚哀漢文至言朕所遵慕咨爾將相洎中外腹心爪牙之臣其敬保元子惟懐永圖以纉我高祖太宗之耿光毋廢朕命元和十五年正月穆宗遺詔𠡠朕以𦕈身嗣守丕構雖勤求理道不敢荒寧而保慎或乖遘兹厲疾賴上𤣥垂祐宗社降靈洎中外庶臣克輔寡徳服餌頥養踰於周星而陽氣熇煩宿恙暴作頃刻之際至於彌留伊死生之理必有其分顧託有所予何恨焉皇太子湛睿哲温恭孝友明敏自膺儲貳休徳日新必能嗣於耿光紹我先業宜令所司備禮於柩前即皇帝位咨爾卿士洎方伯連帥敬輔元子永綏萬邦宜叶乃心用底於道宜令門下侍郎平章事李逢吉攝冡宰諸道節度觀察防禦等使及諸州刺史守鎮任重戎旅事殷並不湏赴喪易月之制宜遵舊典文武官等朝晡哭臨十五舉音山陵制度務從儉約無禁婚嫁祭祀飲酒食肉其醫官等念其勤瘁亦可矜憐並不湏加罪宜便釋放將相卿士中外臣寮送徃事居無違朕意長慶四年正月唐大詔令集巻十一
