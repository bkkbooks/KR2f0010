body:
  text: 唐大詔令集巻三十九宋宋敏求編諸王降黜降魏王泰東莱郡王詔黜梁王忠庶人詔降永王璘庶人詔嗣岐王珍免為庶人詔漳王湊降封巢縣公制追復成王千里還舊官制收𦵏譙王重福三品禮葬詔收葬綘王詔聽越王歸葬詔追贈皇第三子𤣥霸追封衛王等制海陵郡王元吉追封巢王制諡汴哀王璥制贈恒山愍王承乾荆州大都督制贈河東郡王瑾太子少師制榮王故男贈文安郡王制太子第二男追封縉雲郡王賜名諲制册贈册贈渤海王文降黜降魏王泰東莱郡王制詔曰朕聞生育品物莫大於天地愛敬罔極莫重於君親是故為臣貴乎盡忠虧之者有罰為子在於行孝違之者必誅大則肆之市朝小則終貽戮辱雍州牧相州都督左武侯大將軍魏王泰朕之愛子寔所鍾心幼而聰令頗好文學恩遇極於隆重爵位逾於寵章不思聖哲之戒自構驕僭之咎惑讒諛之言信離間之説以承乾雖居長嫡久躔疴恙潛有代宗之望靡遵義方之則承乾懼其陵奪泰亦日増猜阻爭結朝士競引㐫人遂使文武之官各有託附親戚之内分立朋黨朕志存公道義在無偏彰厥巨釁兩從廢黜非惟作則四海亦乃貽範百代可解雍州牧相州都督左武侯大將軍并削爵土降為東莱郡王㝷改封順陽王於均州為封邑制宅以處之黜梁王忠庶人詔上官儀東臺朕儲祉上𤣥嗣膺景祚獵先聖之經踐至公之道底罰行賞御物同歸房州刺史梁王忠居庶孽之地在髫丱之辰栁奭遂良交結無忌頻繁進説勸立東朝朕以副宫之位宜遵周道茍非其人不可虛立正以宗臣之寄仰在諸公旦夕勤懇難違其意及正嫡升儲退居列屏樂善之事紊於賔僚窺怨之詞日盈牀第婦女阿劉逺有陳告迹其罪狀葢非一途乃偽作過所入闗云欲出家逃隠又令急使數詣京師覘候兩宫潛問消息自説妖夢戴通天冠喜形於色以邀非望毎召經師祀龍祈福畫千菩薩願升本位每於晨夕著婦人衣妄有猜疑云防細作又嗟嘆栁奭稱其為我悼傷韓瑗情發於詞朕初見此言疑生怨謗故遣御史大夫理及中書官屬相監推鞫證見非虛然其地則人臣親則人子懷姦匿怨一至於斯擢髪論罪良非所喻考之大義應從極罰皇后情在哀矜興言垂涕再三陳請特希全宥朕戚屬之中頻虧國典緬維前載匪徒兹子屬懷於此猶深愧嘆特宜屈法降為庶人主者施行降永王璘庶人詔詔曰臣子之節君親是奉或志懷干紀當義在滅私葢前王所以持法割恩垂涕行戮言念及此歎息彌深頃以兇孽亂常闗畿暫阻朕乗輿南幸遵古公避狄之仁皇帝受命北征興少康復夏之績猶以藩翰所寄非親莫可永王璘謂能堪事令鎮江陵庶其克保維城有俾王室而乃棄分符之任専用鉞之威擅越淮海公行暴亂違君父之命既自貽殃走蠻貊之邦欲何逃罪據其兇悖理合誅夷尚以骨肉之間有所未忍皇帝誠深孝友表請哀矜雖綰綬全體禮可行於曩制而削土勿王事亦著於前史昔廣州有罪因廢為人常山免誅爰將徙地是用矜其萬死屈於九刑宜寛伏鑕之命俾黜析珪之典可悉除爵土降為庶人仍於房陵郡安置所由郡縣勿許東西朕存訓誘勗之忠孝不虞孱懦遂至昏迷申此典章彌増媿歎嗣岐王珍免為庶人制經國之制貳則有辟為臣之道將則必誅况親則宗秩義兼家國敢懷逆節自桎嚴刑銀青光祿大夫宗正卿員外置同正員嗣岐王珍志在傾邪行惟險薄頃以冦迹未殄軍國多虞因集不逞之徒潛為亂常之計乃欲逺通叛虜構此兇謀以有上封備聞其狀猶以親屬初亦致疑遂令推按具自承伏且王者立法百代所遵稽彼常科罪當殊死以其可諱不忍加刑俾從放黜以申寛典宜免為庶人仍於溱州安置至彼捉搦勿許東西其同謀左武衛將軍竇如玢試都水使者崔昌右羽林軍使劉從諫蔚州長塞鎮將朱融右衛將軍胡列直司天臺通𤣥院髙抱素右衛率魏兆内侍省内謁者監王道成等九人特宜斬决試太子洗馬兼知司天臺冬官正趙非熊陳王府長史陳閑楚州司馬張昻左武衛兵曹叅軍焦自榮前鳯翔府郡縣主簿李岊國子監館進士張奐等六人特宜决殺駙馬都尉薛履謙同逆謀宜賜自盡上元二年四月漳王湊降封巢縣公制王者教先立愛義不遺親豈於同氣之中可致異詞之間如或慎修不至詿誤有聞搆為厲階犯我邦紀未加殛竄尚屈彞章漳王湊手足之親磐石是崇位居寵秩列在戚藩頃多克順之心亦有尚賢之志而滿盈生患敗覆是圖姦兇㑹同謀議滋及汚我皇化彰於中外初駭予𠂻載驚羣聽尚以未具獄詞猶資審克建侯之命姑務從寛於戲朕嗣守宗祧敷𢎞至教自家之訓未立掩義之私敢忘是用降封有醜朝典凡百多士宜諒朕懷追復成王千里還舊官制地有二南載懷敦睦罪非七國奄隔休明故左金吾衛大將軍兼益州都督上柱國成王千里懿親賢德髙才重器強力幹事獨冠等倫保國乂人克成忠義願除凶醜翻䧟誅夷永言淪沒良深痛悼俾復舊班用加新寵可還舊官收葬譙王重福三品禮𦵏詔集州刺史譙王重福幼則兇頑長而險詖幸託體於先聖嘗通交於巨逆子而不子自絶於天有國有家莫容於代往者頗不含忍長令幽縶自大行晏駕韋氏臨朝將肆屠滅尤切防衛洎天有成命集於朕躬永懷猶子之情庶叶先親之義所宜開置寮屬任隆刺舉冀其悛改以怙恩榮而詿誤有徒狂狡未息便即私出均州詐乗驛騎至於都下遂逞其謀先犯屯兵次燒左掖計窮力屈投河而斃雖人所共棄而邦有常刑我非不慈爾自招咎且聞其故有惻於懷昔劉長既沒楚英遂殞以禮収葬抑惟舊章屈法申恩宜仍舊寵可以三品禮葬收葬絳王詔叔父絳王為逆賊等援立切窺天位無討賊之意遂使忠義銜寃及王師擒賊義旅問罪前驅勇氣以致殱殂朕伏以太皇太后慈仁思以慰解宜令有司量事収葬申恩討賊刑禮之中示乎四方以明朕意寳歴二年十二月聽越王歸葬詔越王事迹國史著明枉䧟非辜尋巳洗雪其子珍他事配流數代漂零不還京國𤣥真弱女孝節卓然啟䕶四䘮綿歴萬里况是近族必可加恩行路猶或嗟稱朝廷固須䘏助屢委宗正等京兆府與訪越王墳墓報知如不是陪陵任附塋卜葬其葬事仍令京兆府接借必使備禮葬畢𤣥真如願住京城便配咸宜觀安置開成四年六月追贈皇第三子𤣥霸等追封衛王制餙終定諡往代通規追逺贈榮前王令典第三子𤣥霸幼挺岐嶷早茂珪璋楚哀王智雲結髪仁明勝衣敏惠冀其成立訓以義方未被趨庭遽同􅂈隙興言夭枉震悼於懷今王業初隆慶賞伊始既式遵於利建宜稽古於哀榮𤣥霸可追封衛王諡曰懷智雲可追封楚王諡曰哀武德七年七月故海陵郡王元吉追封巢王制詔曰有虞受終𢎞肆赦之典隆周革命篤親親之恩海陵郡王元吉地惟藩翰夙承朝寵䧟於不軌得罪君親朕嗣膺靈命無忘敦睦同生之重既切於本支在原之悼實纒於歳月興言泉壤思備寵章可追封巢王諡仍依舊貞觀十六年六月諡汴哀王璥制門下縁情制禮聖賢所不忘以諡易名古今之同貫故右千牛衛大將軍上柱國汴王璥雖在齠齔頗標嶷岐率以訓典期於老成裂地而封是崇藩屏享年不永俄從夭折秀而不實有以傷嗟宜遵考行之義以備餙終之典可諡曰哀贈恒山愍王承乾荆州大都督等制門下聖人立言因親以立愛王者垂範追逺以崇德故伯祖恒山愍王承乾堂伯贈越州都督象再從兄玭等慶藉大宗連華近屬既稱叔父之國亦云兄弟之政短長曰命久從於淪没哀榮有典未洽於褒崇宜贈徽章以𢎞寵敷承乾可贈荆州大都督象可贈郇國公玭可懷州刺史贈河東郡王瑾太子少師制門下親親以相及先王之道也追逺以歸厚聖人之教也故金紫光祿大夫太僕卿員外置同正員河東郡王瑾克嗣克訓是為懿方茂枝葉式崇垣翰推恩有寄禀命不融興言遊從良深軫悼宜贈師保之位以備哀榮之典可贈太子少師賻物三百叚米麥三百石榮王故男贈文安郡王制禮以餙情恩以悼往詢於前訓則有舊章榮王故男像粤在幼冲是稱岐嶷習詩書而日就資友悌於自然方冀成立克開土宇而龜䝉未錫麟族先凋奄爾淪逝良増傷憫宜加贈於苴茅且兼榮於符竹可贈文安郡王使持節督武威郡諸軍事應縁䘮葬一事已上宜官供令京兆少尹程若水充使檢校太子第二男追封縉雲郡王賜名諲制親親之義於禮斯重傷悼之戚縁情則深太子故第二男性與聰達體資韶令早服龍樓之訓有光麟趾之風年始勝衣已彰孝愛方洽弄孫之慶遽悲殤子之魂追以九命封之二等仍加美稱賁爾徽命可贈揚州大都督封縉雲郡王食邑三千戸賜名諲大歴三年七月册贈册贈渤海王文上官儀維龍朔二年歳次壬戌五月十五日皇帝使大司成彭陽郡開國侯令狐德棻副使正議大夫行司宰少卿薛敏恭持節册命曰咨夫存著嘉猷歿膺褒顯所以甄明景行昭紀勲烈况地居懿戚業茂惟貞用式暢情之禮實光追寵之義惟爾故金紫光祿大夫原州都督渤海郡王奉慈器範閑裕風裁淹逺德優時彦望重宗英析瑞名區早荷推恩之澤分符奥壤累藉宣條之任清白聞於朝野威惠暴於甿謳固以功著旂常譽光圖史者矣而夀仁時爽貞徽淹謝永言親懿震悼良深是用贈王為都督荆陕岳朗四州諸軍事荆州刺史右衛大將軍餘如故魂而不昧嘉兹榮寵嗚呼哀哉唐大詔令集巻三十九
