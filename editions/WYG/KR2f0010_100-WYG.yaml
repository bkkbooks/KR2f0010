body:
  text: 唐大詔令集巻一百二十一宋宋敏求編政事捨雪上原劉武周宋金剛等詿誤詔宥劉武周餘黨詔赦河南諸州為王世充詿誤詔寛宥逆人親黨𠡠矜放縁坐𠡠原免兩京被賊逼授偽官詔受賊偽官令均平改擬詔宥田承嗣詔復田承嗣官爵制宥李忠臣詔宥李懐光示諭河中將士詔誅李懐光後原宥河中將吏並招諭淮西詔放李希烈將士還本道詔誅李希烈原宥淮西將吏詔捨雪上原劉武周宋金剛等詿誤詔朕發跡太原陳師汾澮底定京室廓清函夏惟彼晉魏事等豐宛近者妖祲慿陵侵斥郊境害虐良善擁遏吏民大軍東討義存拯難芟夷醜􅁼實在弔民凡厥渠魁已就殱殄脅從之輩情有可原宜許自新義申蕩滌其晋州潞州隰州并州等四總管内自武德三年四月二十一日以前被劉武周宋金剛等所詿誤者罪無輕重皆赦除之各令復業一皆不問州縣城堡有固守忠節抗禦凶徒者具録聞奏别加褒賞宥劉武周餘黨詔祝網泣辜彰乎舊典赦過宥罪著自前經往者劉武周竊據邉陲擁逼良善石嶺以北咸罹其弊雖武周逋竄寄命蕃夷而殘黨餘氛尚懐旅拒致使朔漠猶警關塞未寜屢動干戈久違聲教代州總管定㐮王大思勤績克著安輯邊境討撃未賓率其從化朕君臨天下義存撫育念彼凋弊若納諸隍但朔代黎元逆命日久今雖歸附仍懐反側其代州總管府内石嶺以北自武德四年二月二十九日以前所有愆犯罪無輕重悉從原宥可並令安居復業勿使驚擾赦河南諸州為王世充詿誤詔朕初膺靈命撫育萬邦一物失宜憂責在己是以昧旦丕顯昃食忘勞思流恩惠被於率土日者世充作梗僭擅一方侵虐士民阻絶聲教鞏洛之地比邑連城受制凶威莫能自免翹足引領乞師請命朕愍彼黎庶獨為匪民命將出軍用申撫字兵威所震醜徒慴服元惡頓顙而縳軍門殄滅氛䘲混同文軌拯彼遺民出乎塗炭宜從蕩滌與之更始可赦河南諸州舊為世充所詿誤者自武德四年六月四日以前皆除其罪若有率其部衆保全城邑因事立功以歸朝化者量其効績就加職任竒才異行隨事旌擢鰥寡孤獨以時恤理亡命山澤詔書到後三十日不来歸首者復罪如初寛宥逆人親黨𠡠蘇頲𠡠朕聞古先哲王臨御天下以刑止殺罪疑惟輕懲惡勸善義不相及管仲實讎自為良佐嵇康既戮子為忠臣昔人羙談前事非逺間者元惡大憝實繁有徒仗順行誅法在撫捨朕惟薄德獲承丕運敬記羣公之上固以百姓為心且逆䜿支黨及其親婭頃屬多難念彼仳離與之洗滌用狥於寛惠多令遷貶孰安於反側故一切勿論欲明本體而有司所奏尚未該詳縁累黜削或乖平反豈朕受天明命作人父母之意歟將朕之誠心且未能諒將義者多緒不釐其失思之憮然甚非所謂其親累人貶拘者所司宜更詳審務令折𠂻重申朕意咸使坦懐俾爾周行以凝庻績唐隆元年七月六日矜放縁坐𠡠蘇頲勑朕聞古先帝王受天之命承天之序萬方罪已百姓為心者葢司牧於至公豈崇髙於大寳朕猥守丕緒克恭嚴訓答神祗之睠資敬愛之道二祀於斯矣頃逆賊竇懐貞等首謀逆亂敢肆兇悖交羽林而竊發指王堂而睥睨雖觸瑟之兆禍積於猖狂而援旗以問變生於倉卒太上皇震威電激睿畧天斷命朕龔行應時戡翦衆所共棄人其乂安已而承姑射之期奉華胥之志爰釋重負鍾於薄德顧如臨而益懼思若濟而罔知將何以承四聖之休成一人之教伏以太上皇比親庻績念於朕躬逸於承歡未知為政而内有聲樂外有畋漁從魏文河曲之遊追漢宣杜城之好因時命賞㡬忘在予之貴他日為言非專代天之理令退而自省殷鑒前弊損之為戒仁豈逺乎朕其再思當不二也俾爾卿士下洎元元體朕至誠勉遵大化欲使陽和時雨之惠利有攸徃肅殺嚴霜之威紓而不作故事非獲已期在無刑憫然永懐將布寛典書不云乎罰不及嗣古之制也其逆人親縁坐合死者特令放免配為城奴仍差使領送自餘支黨徃還一無所問與更始者令安反側與再生者特垂哀憫屈彼尋常之法矜其至重之命庻有光武焚書之事成湯觧網之恩凡厥逺近咸遣知悉先天二年七月十三日原免兩京被賊逼授偽官詔朕聞古先哲王慎罰以恤人命脅從罔理罪疑惟輕成湯有觧網之仁光武有焚書之令葢惠彼至理寛其刑章是以法不濫加罰所以措也間者時遭祲逆患在干戈衣冠之流逼迫者衆事不獲已情稍矜焉頃者委在三司窮其五聼議重者累申刑典稍輕者猶被勾留况時乆淹延人皆窘乏衣食且猶不給家屬又悉乖離艱難之憂無甚於此豈朕泣辜宥罪作人父母之意耶况德澤頻加科條逓减原其事状稍近平人豈可稍議遷貶増其反側萬方有責罪實在予一物失所憂將若厲永言憫念用惻於懐其兩京官應被賊逼授偽官三司所推問未了者一切放免其賊中守本官至各方選曽受駈馳既寛刑典免其貶降並至来冬放選合得官時仍委所司量事輕重注擬其已貶官續有處分乾元元年六月受賊偽官令均平改擬詔刑政之本皇王大要政事或失厥中帝道則有乖於御下王者所以持平慎恤葢在於斯朕纘服鴻緒躬臨庻政何嘗不内軫泣辜之念外覃觧網之恩詔書所下期於必當徃以衣冠之任受職賊廷量其輕重俾申貶黜比聞三司處置未甚均平或同科之中升降有異或謫任之所風議不一頗招情故殊匪至公是以縉紳之間不無竊議有司奉公其若是耶又流降量移乆申詔令省司􅁼例事尚稽遲遂使嶺嶂踰時積流荒之歎雨露凝澤壅如絲之㫖逖聼遐邇頗聞咨嗟斯乃主者殆官甚無謂也宜令中書門下類例三司先所貶官各據科目均平改擬仍審勘前後制𠡠應合霑恩並速處分准制合量移人亦令吏部速比類聞奏又縁頃經逆亂中夏不寜士子之流多投江外或扶老携㓜乆寓他鄉或失職無儲難歸京邑眷言憫念實惻予懐宜令中書門下牒本道責取其應五品已上官並即與進改六品已下官合序用名品可收者亦量材叙用仍據中外員闕均融授官其授京官者仰本道勾當装束即合赴京授外官者各令之外任餘不合授官是士流者所在州縣一切安存無害公私勿令干擾乾元二年八月宥田承嗣詔臣子之義違而必懲春秋之辭服而先捨故武威以制其不恪文德以懐其自新田承嗣悞惑姦邪輙干紀律朝有彞憲當舉典刑猶示含容薄令降黜冀其遷悔全彼平人而不赴所貶之官再任造端之將避廻師旅綿引旬時朕猶憫脅從悞兹倂命其人何罪顧悼増懐深思改過之期以救無辜之禍而承嗣果能尅責頻獻誠詞泥首束身請歸庭闕輸心瀝懇備在封章而正已地邇藩陲具昭誠欵遂屢有陳奏逹其深哀故以悔非之誠全其改枉之志翻然効順頗用嘉之即宜與子姪家口等同赴上都當待以殊恩永守終吉豈不羙歟其魏博所管官吏將士僧道耆老百姓等初因迫脅曽受駈馳或乆拒官軍辭不獲已或徴科郡邑出入門庭皆懼於不全葢素非元惡既徃之咎並與惟新一無所問或先在昭義軍管内諸州軍者並宜却還本貫各安舊業昭義所管官吏將士截耳軍健身及家口先在魏博等州者妄有駈逼各被質留原其初心本非舊惡既因詿誤先合蠲除仰即歸本州亦一切莫問各守所務無相奪倫王典無私信存賞罰脅從罔理前聖嘉謀歸命者必全知過者皆宥今既納承嗣之懇請亦以虚懐捨脅從之前非悉令原免如其譎詭時日猶事逗遛國有常刑法難屢屈過期不至獲罪如初諸道兵馬即宜同力協心大軍克期不可追悔轉禍為福唯在此時至於再三非不深切想及官吏將士已下奉而行之知朕懐也復田承嗣官爵制昔在虞舜舞干羽於兩階而苖人服洎漢髙帝遣陸賈而赦南越光武亦下璽書招附竇融然則太上以德撫人其次因其制事或有阻兵便地未縱紀律將畏刑以紓禍俟文告而斯懐則明恕之道宥過為大其来乆矣永州刺史前魏博等七州節度觀察處置管内支度營田等使開府儀同三司太尉檢校尚書左僕射同中書門下平章事兼魏州大都督府長史上柱國鴈門郡王食邑實封一千户田承嗣頃封壤之外或牧郡邑以下尺一之詔徴縣道之師貶刺零陵式彰典憲而國家十連將帥千里旌旗軍騎襁屬於山河樓船鎻結於淮海而承嗣轅門宿將方面舊臣授鉞持衡素經委遇乃繕甲陳備越河應敵然未離魏郡嬰壘自固頻遣章奏聞欵申誠至祈革心永用遷善又聞聚族興歎恒思更新廢食遺寢沉憂成疾夫為君上者承天於人兼育廣覆一夫不獲則曰時予之辜今河南河北之人皆朕之人也豈可不念隠恤求逞其心令其父兄乘城子弟攻取矢石之下骨肉相殘邑里之間敵讎交斃而兵連禍結廪餼取資異賦急征井閭殚竭男釋耒耜女廢蠶桑流離凍餒擠於溝壑而欲勞師黷武必舉彞章終夕惟慮誠所未忍且使蒼生罹此塗炭皆由朕司牧無方朕實不德誰之過也今將損膳撤懸内省歸咎以寛承嗣本身官爵仍委在彼勾當軍州事不湏入朝弟庭琳及子姪等凡所連坐貶降者一切釋放並還本官仍依舊職掌駈使其魏縣將吏百姓及宋汴過河將袁奉珪祀舜并將士等並從原宥一無所問於戲以欲使人必求諸道澤渚時禁仁有被於泉魚麛卵不傷德可懐於鳥獸今則偃干戈之務全億兆之人庻兹明誠上合天睠公卿百辟悉朕意焉宥李忠臣詔納忠引過人臣之大節録用念功帝王之彞典雖藩鎮之守秉律或虧而股肱之良懋勲斯在不忘求舊特用優賢淮西節度觀察處置使開府儀同三司檢校司空同中書門下平章事汴州刺史上柱國西平郡王李忠臣紀性直方深􅇆厚實自然文武之器雅有將帥之才勇則本仁謀常制勝頃者王室多故戎事方殷奮不顧私義形於色逺自遼海首投全軍擁義勇之師狥邦家之急出入百戰勤勞兩河委以旌麾寄在淮右不俟駕而赴命每先期而即戎俾鎮大梁實參元輔倚頼之重中外式瞻戎部之間政刑或撓雖在危急能布公忠戀闕勤誠再馳道路降服請罪至於再三言念勞臣良深憫歎酌於軍志失政有懲舉以朝經議勲可恕罷其方面之務省内臺閣之煩論道之司仍處三公之列分土之爵尚居五等之封用亦優崇服我嘉命可檢校司空同中書門下平章事散官勲封如故朕與功臣本同休戚其於任遇豈易始終庶將𫝊慶子孫寜止保其禄秩凡百卿士宜悉朕懐宥李懐光示諭河中將士詔間者變興京邑朕播越奉天李懐光仗義帥師自逺赴難逆黨奔潰危城觧圍録其茂勲嘉其明節所以任崇元帥位極上台而禄位滿盈思慮迴惑信受間諜自生疑貳昔以匡服大計籍其成功曉諭將相禮代殊厚而野心不革徃顧逾甚欺誘羣帥襲奪衆軍誣陷信臣拒違詔命與朱泚結固通使徃反放肆兇威彰示狂逆務為刼脅迅發醜言萬情失圖諸將咸憤所以重兹巡狩越次梁岷違奉宗祧淪汙士庶撫心自咎良増愧歎實由朕格物之誠不至知臣之鑒不精永惟此軍功著王室安禄山之作亂肅宗以朔方之衆復區夏僕固懐恩之縱逆代宗用朔方之師静關塞洎朕渉此多難露處奉天内則擐甲登埤外則歴險赴艱寒不挾纊夜不釋戈邦固不傾㓂讎斯屏竭誠致命萬衆一心朕方期収復皇都䇿勲命賞永固休戚大報功勞豈謂餘孽未平叛臣連禍臨制將士莫由自申憤激於􅇆誓不同惡每一念此惻然疚心猶以懐光舊勲務於容貸其副元帥太尉中書令河中尹朔方等諸道節度觀察等使宜並罷免改授太子太保其所管兵馬委本軍自舉一人功髙望重者便宜統領速具奏聞當授旌旄以從人欲應朔方及諸軍在行營并奉天兵士春衣等時方暄熱並未支給每想暴露豈遑安居今江淮轉運輕貨般次即至續當支遣朕知朔方將士忠順惜朔方將士功名所以殷勤再三視逺如邇斯言必信無自棄焉誅李懐光後原宥河中將吏并招諭淮西詔朕聞自昔哲王以道化下不竭物以充欲不勞人以樹威億兆之心如戴父母兵革不試四方来同茍昧於德綏務以力勝士旅疲耗蒸黎困窮幸以成功豈云有補李懐光久從兇逆淹厯嵗時被服干戈畧無寜息頼兹勤効是有成功宜共賜物三十萬端疋以充宴賞仰度支即般次歸本道仍令所司叙録即超資與轉改其中大將及功効殊尤者委本使速具名衘聞奏先與處分其先在河中將士亦宜賜錢宴設如本是奉天定難功臣准𠡠合給賞者度支排比支付嗚呼自國家多難二紀於兹朕嗣位七年連兵五載追惟徃事悔恨盈懐今二孽繼誅諸方甫定哀彼淮右獨為匪人其帥不龔其衆何罪朕晨慮夕􅅥念之於懐數窮戰争則流禍及於天下利病之勢較然相懸俾人罹殃寜我忍恥今勲賢列鎮疆理有經縱未偃戈是以保境况天地之大無所不容豈令是邦永隔朝化因兹大慶使洽鴻恩諸道應與淮西接連宜各守封境非彼侵軼不湏進討仍委所在長吏明加招諭宣布朕懐李希烈若能歸降待之不死其餘將士官吏百姓等一切洗滌與之更新先有官封亦皆仍舊如能去逆効順因事建功理當甄升加以褒勸其所優賞科條並准前来處分朕思與海内去危圖安有過自新雖大必宥朗然明信彰示兆人期爾庶邦自求多福無有逺邇咸使聞知放李希烈將士還本道詔李希烈負恩作亂刼脅平人朕念生靈無辜務欲息兵捨罪累行赦令皆許自新言必再三事出誠素此朕含垢忍恥屈法為人之心天下所明知也希烈固執兇圖駈脅將士違我詔令犯我甲兵今月三日遣偽署申隨唐鄧四州都知兵馬使杜文朝率馬歩五千人入襄州北界山南東道節度使樊澤勒兵馬與戰大破其徒斬級生擒蕩除畧盡又於陣上生擒杜文朝及大將馬坦然等此皆朕德不昭感殺未敢行致使平人脅從逆命首帥有罪其人何辜朕所以有哀悼心感事増歎猶冀改過尚可息兵再明屈已之心式洽好生之義其陣上生擒將士馬坦然等七百九十人宜令樊澤給衣粮食並令放還并冩前後赦文勅命宣示朕懐將士等有能向化者准赦令一切不問官爵如初其有傷痍壞支體者並委毉療令其得所其陣上所殺人宜差由官於側近埋􅄟兼立碑記無使暴露欎吾春和其杜文朝身領全軍事得由己不得歸順力屈就擒得當日有處分誅李希烈原宥淮西將吏詔陸贄𠡠反易天常悖逆人紀衆之所棄罔或逃誅李希烈蔑德背恩窮奸極暴謂神器可以力取謂生靈可以詐欺志在兇殘躬行僭竊罪無所比法所難容朕以君德不修致人於禍究其端本過實在予不忍蒸黎重相攻戰屢施詔命務欲懐柔抑羣帥奮發之誠駐諸軍討逐之勢不憚罪已期於息人希烈曽無悛心益逞驕志虐毒滋甚吞噬無厭惡貫既盈自底夷㓕開府御史中丞臨郡王陳仙竒忠勇有謀沉毅能斷攄闔境受汚之憤𨗳三軍思順之心唱義一呼羣情響附廓清氛祲殱戮渠魁驛書上聞函首入獻方隅既乂戎役其休懸賞之科是宜必信其以仙竒為檢校工部尚書兼蔡州刺史御史大夫充淮西節度使仍賜實封五百户應淮西管内將士官吏百姓等頃廹兇威遂從脅制既誅元惡俱是平人除李希烈一家其餘並准前後赦𠡠原免更無所問其將士等或本屬平盧或乆鎮淮右素推忠義累著勲庸果能協志同謀輸誠奉順以兹節効良有可嘉委仙竒即以諸邑官錢優與宴勞其中首建謀議同斬希烈人等宜並條録聞奏節級褒賞比年以来有潛圖効順仗節著明計或未行為賊屠害者亦宜審加訪察具事跡以聞如有子孫仍録名聞奏百姓等久經淪陷兼被傷痍想兹凋殘實足矜憫除供當道用軍之外宜復二年應被希烈差㸃兵馬及團練子弟並放㪚其本額將士之中有不樂在軍願歸農業者委刺史量給逃死戸田宅并借貸種糧優復終身使之存濟宜令尚書左丞鄭叔則充淮西宣尉使嗚呼往欽哉自希烈叛命於今五年王澤不通下情亦阻所宜宣我信令以釋危疑敷我恵慈以慰疲瘵滌清汚俗咸與惟新底綏一方以稱朕意唐大詔令集巻一百二十一
