body:
  text: 唐大詔令集巻六十三宋宋敏求編大臣冊贈冊贈豆盧欽望司空并州大都督文冊贈楊再思并州大都督文冊贈髙崇文司徒文冊贈呉少誠司徒文冊贈劉總太尉文冊贈李班司空文冊贈李茂荘太師文冊贈韓遵太尉文冊贈劉崇望司空文陪陵賜功臣陪陵地詔功臣陪陵詔贈郭子儀太師陪葬建陵制配享桓彦範等配享中宗廟庭詔蘇瓌劉幽求配享睿宗廟庭詔裴冕李晟段秀實配享肅宗德宗廟庭詔渾瑊配享徳宗廟庭詔實封加王琚食實封制加張暐食實封制加劉幽求食實封制加郭䖍瓘食實封制賜李光弼實封一子官制不許李光弼辭討詔加田承嗣實封制賜張自勉實封制加田神功實封制加馬燐實封制分郭子儀實封賜諸子詔馬燧李臯賜實封制冊贈冊贈豆盧欽望司空并州大都督文維景龍四年嵗次庚戍二月闕朔二十二日應天神龍皇帝若曰咨爾故開府儀同三司知軍國重事上柱國芮國公致仕豆盧欽望朕聞古之哲王必有賢佐其存也俾乂謂之奮庸其歿也不朽謂之立徳可不然與爾十紀羽儀三朝冠冕專直為􅍾非法不言温謙在容非禮勿履故能揆路斯穆台階以平而韋賢罷歸疏廣辭退致虚守静方宻道樞居常待終竟歸㝠録是用輟朝増歔撫事愴懐榮以建旗正其服衮今贈司空并州大都督持節備禮冊命則二儀式奉九原可作兾爾魂魄嘉夫寵數嗚呼哀哉冊贈楊再思并州大都督文維景龍三年嵗次已酉九月甲寅朔二十三日丙子應天神龍皇帝若曰昔孔子云歿魯哀由其作誄晏嬰既往齊景為之行哭且謂陪臣義猶存此甫懐良相情則過之咨爾故尚書右僕射同中書門下三品監修國史上柱國鄭國公楊再思河岳粹靈廟堂神器率由百行能具九徳自弼諧庶績師長羣寮清白所以樹風丹青所以成化有若巫咸之保乂傅説之欽承故能宣慈惠和邁迹垂憲而運同過隙悲深撫几興言軫悼載想謨猷發金縢之舊銘詢葬亳之前訓俾加印綬秩齊於子真式奉園陵志畢於元凱是用増寵命於端揆茂徽章於連帥今贈爾并州大都督遣太府少卿韋璿持節備禮冊命方使五公門閥二臣丘壠魂而有靈懿兹榮贈嗚呼哀哉贈髙崇文司徒文維元和四年嵗次已丑十月癸丑朔十三日乙丑皇帝若曰自我有國大諸侯之勲勞者必勒功圗形播於鐘鼎藏於故府歿則極異等之禮以嘉魂魄使奮乎百代之上百代之下為臣者莫不興起也咨爾故邠寜慶等州節度度支營田觀察處置等使充京畿諸軍都統開府儀同三司檢校司空同中書門下平章事持節邠州諸軍事兼邠州刺史上柱國南平郡王食邑三千户髙崇文英姿絶羣雄略神授上通星辰之氣克扶期運之數少事塞門保寜朔漠千秋之勇常冠軍鋒呉芮之忠早書竹素頃以并給之下盗臣流毒獸心狼顧誘脅我人遂拜於齊壇授以蕭斧束馬蓐食先命戒途曽無再籍之役不用一卒之死生致首惡戮屍天街西南晏清安堵如故禮加九命秩尊三事貴列東第壌踰徹侯動盪夷夏煇灼編簡進律還師兼制舊疆扉卧鼓翳解甲休卒期以無征迨乎三紀暗忽生災夀量中輟維屏之嘆怛然疚懐故命國子祭酒劉宗經副使司勲郎中李直方持節冊贈爾為司徒賻禭命數率禮加等式表無盡之功用申不檢之賞将我痛悼告於幽神冊贈吳少誠司徒文維元和四年嵗次己丑十二月壬申朔二十七日戊戍皇帝若曰歿加榮號所以勸人示其爵列之差用彰禮命之數咨爾故彰義軍節度度支營田申光蔡等州觀察處置等使光禄大夫檢校司空同中書門下平章事使持節蔡州諸軍事兼蔡州刺史上柱國濮陽郡王吳少誠嘗賈拳勇習知戰陣服上将之號令為中書之首出及鑿門建牙授以封域稜威以行法制峻文以輯賦輿當先聖之委遇極寵禄之休顯序位列公台之盛茅土有侯王之尊謂終享遐紀䇿勲功令夀量斯盡軫於予衷今遣使權知宗正卿李詞副使起居舍人裴度持節冊贈爾為司徒於戯守屏之臣注意斯重昭我寵渥藏於後昆冊贈劉總太尉文維長慶元年四月某日皇帝若曰朕聞古有履忠仗順生而大有為者又有功成身退歿而永不朽者非正氣令徳間生挺出則髙名大節孰兼之哉天平軍節度使檢校司徒兼侍中楚國公劉總降自天和立為人傑得君於先帝協運於昌時纂戎弓裘守土燕薊迨此一紀北方晏然有開必先納欵於我沉斷大事奮揚竒謀奉幽都四封之圗挈盧龍三軍之籍盡獻闕下髙謝人間感動君臣驚激忠義顧妻子若脱屣等富貴如浮雲惟道是從奉身以退仲連事成而􅌃滄海子房名遂而追赤松賢明所歸古今一致朕方改授兵柄移鎮鄆郊命作司徒倚為左相期奮乃志将沃朕心而天不憗遺邦失柱石夫臣戴君如元首則君視臣如股肱股肱或虧何痛如是兹朕所以輟朝軫念備禮殊恩庸建爾於上公蓋褒贈之崇重者也嗚呼爾總尚知之乎今遣使某官某持節冊贈爾為太尉冊贈李珏司空文杜牧維大中六年嵗次壬申五月丁夘朔十六日壬午皇帝若曰國有元老道可咨禀天命不助倐然去我宜加褒命以慰重泉咨爾故淮南節度副大使知節度事管内營田觀察處置等使金紫光禄大夫檢校尚書右僕射兼揚州大都督府長史御史大夫上柱國贊皇縣開國公食邑一千五百户李珏立徳行道繼長増髙貴而彌篤在文宗朝徧歴清近内備顧問嘗摧姦兇外領事權善提故典爰付魁柄實肖象求鎮撫四夷莫不誠信訓導百吏皆有程品左官荒服衆疑非罪事君以道知我其天李固之確論無私周公之金縢終啓自朕統御尊敬舊老分委戎輅作鎮孟津訓兵令行活人化洽飽聞聲價渇見風采以大冢宰徵歸朝廷讜直忠貞骨鯁魁礨凡所陳啟無非理法遂乃裂授東夏表率諸侯能救飢艱克為康泰初陳微恙請捐重寄馹騎奔問侍醫臨理旋聞大病却食流涕命也奈何痛悼不及今遣使某官某副使某官某持節冊贈爾為司空魂而有知鑑兹誠意嗚呼哀哉冊贈李茂荘太師文錢珝維年月日某甲子皇帝若曰忠信之於人也若酒醴之有麹蘖也智者厚而愚者薄能者寡而知者衆麹蘖厚而遺味深忠信厚而遺美大存誠所至享福必全生死既分是非乃定咨爾故山南節度使開府儀同三司檢校太傅典侍中興元尹李茂荘懐忠信之實以圖其身行之不迷用則不匱得之善始守之克終故金蝉左貂為爾之冕昭其官也彤弓玈矢為爾之器昭其錫也而又帶綬係印曰公曰相位列元帥政在中權馮翊分三輔之豪成紀接右界之險俾爾出號令爾惟有威俾爾施教條爾惟有恵威則鮮犯恵則鮮違吾復以漢中控諸蜀塞耀爾昆弟聨彼封疆易武節以授之擇善地以固之勸夫忠信是亦庶㡬爾尚其當職必修許盟必㑹更資共奨且勵率循無使我擇臣心得以示信萬國之川流靡息一朝之山立遽頺嗟復魂以安歸悼降年之非永戎昭所賴天奪良多言念舊臣亦不半在兹以悽惻何必鼓鼙昔人能立武者則太公為師慰爾之行用示追顯是為有卒無為不瞑今遣某官某等持節冊贈爾為太師嗚呼爾其聞吾兹命冊贈韓遵太尉文維年月日某甲子皇帝若曰爵以充其量禄以報其功君命之始也贈以昭其數誥以申其悲君命之終也視朝乃廢厥悼可知咨爾故靈武節度使韓遵緒承三傑勇抗萬夫用材既適於輪轅赴節有同於金鼓寡言而信匪怒而剛握善陣之沉機裕撻伐之秘䇿使之奉祀亦克象賢提封以寜在政無改絶編户之子役撫諸戎之允懐牧馬雖多罔侵吾土射鵰自逺空墮塞垣攬留黎而安敢渝盟候甌脱而何嘗得氣惟茲宣力是謂良哉而中權未㐮内㓂難遏朔風方勁朝露已晞孰為不永之年貽我或虧之痛嗚呼富則侯矣貴髙相矣揣時立則節遂終身有涯之生息焉奚恨舉秦官之顯秩表漢将之殊庸以極朕心庶𢎞君道今遣某官某等持節冊爾為太尉雖冠劍之禮且飾丘封俾篆刻之文永光㝠漠游魂在地期爾尚知冊贈劉崇望司空文維年月日某甲子皇帝若曰生不能用死而誄之為上者且愧於心古君子亦云非禮其或嘗居夹輔兼授中權生也無不用之悲歿也有可追之命展兹異數示彼諸孤我念大臣庶㡬得禮咨爾故特進兵部尚書劉崇望氣聚之禀直枉自分先哲王於是而觀賢不肖於焉乃定所以樹為吉徳彰在令終論若所為信如斯語始於家事勵以躬行處昆弟之歡耻聞優劣視僕𨽻之役常務寛容避名無取乎白眉掩過毎言及爛手周愛䟽屬恵徧故人位髙而惟恐驕矜權至而未嘗擊斷剛亦不茹怨乃用希是以誠存則安族大能保天非有私於若惟若有順於天昔者太史秉書冲人嗣訓時乃之任首冠侍臣罔漏代言以光誕告機平旬嵗免應旁求佐理甚勤念功如在比從蜀道入補夏卿方持嘉謨共熙庶績一旦奪我心膂病爾膏肓夢兩楹而遽罹明徴偃巨室而猶疑假􅄰永言辨色遂絶履聲且臨将葬之期彌積或虧之痛自朝受䇿以洎登車往慰逝川俾光坏土今遣使左諫議大夫憲王博副使倉部郎中温緒持節冊爾為司空嗚呼吾所申命何若於魯侯之誄屬辭於若尚知之哉陪陵賜功臣陪陵地詔乾坤合徳爰著易簡之功君臣同體克成中和之治逺取之物若舟楫之濟巨川近取諸身若股肱之戴元首同心協契存歿以之故諸侯列葬周文創陳其禮大臣陪陵魏武重申其制去病佐漢還奉茂陵之塋夷吾相齊終托牛山之墓斯蓋往聖垂範前賢遺則録曩昔之宿心篤始終之大義者也皇運之初時逢交泰掃除多難光啟鴻業謀臣武将競進轅門之前明徳異材爭趨魏闕之下或雷雲伊始功參締搆或光華在旦績著弼諧及宻戚懿親舊勲宿徳委質先朝特䝉顧遇者自今以後身薨之日所司宜賜以基地并給東園秘器事從優厚庶敦追逺之典以申罔極之懐貞觀十一年十月功臣陪陵詔周室姬公陪於畢陌漢庭蕭相附彼髙陵寵錫墳塋聞諸上代從窆陵邑信有舊章蓋以懿戚宗臣𩔖同本之枝榦元功上宰猶在身之股肱哀榮之契實隆終始之義斯允今宜聿遵故實取譬拱辰庶在鳥耘之地無虧魚水之道宜令所司於昭陵南左右相封境取地仍即標誌疆域擬為葬所以賜功臣其父祖陪陵子孫欲來從葬者亦宜聽許貞觀二十年八月贈郭子儀太師陪葬建陵制天地以四時成物元首以股肱作輔公台之任鼎足相承上以調三光下以象五嶽允釐庶績鎮撫四夷體元和之氣根貞一之徳功至大而不伐身處髙而更安尚父比吕望之名維師贈周公之位盛業可乆沒而彌光故太尉兼中書令上柱國汾陽郡王尚父子儀天降人傑生知王佐訓師如子料敵如神昔天寳多難逆羯作禍咸秦失險河洛為戎公能翼扶肅宗再造區夏國有患勞其勘定邉有㓂藉其驅除安社稷必在於絳侯定羗戎無踰於充國絳䑓綏四散之衆涇陽降十萬之虜勲髙古今名讋夷狄而勞乎征鎮二紀於兹頃以春秋既髙疆塲無事罷彼旌鉞寵在台衡以公柱石四朝藩翰萬里忠貞懸於日月寵遇冠於人臣尊其元老加以崇號期夀考之永飬勲賢之徳膏肓生疾藥石靡攻人之云亡梁木斯壊雖賻禮加等輟朝増日悼心流涕曷可弭忘更議追崇名位斯極尊為尚父官協太師雖爵秩則同而體望尤重歛以衮冕旌我元臣聖祖園陵所宜陪葬式墓重文侯之禮象山追去病之勲千載如存九原可作冊命之禮有司備焉可贈太師陪葬建陵仍令所司備禮冊命賻絹三千疋布千端米麥三千石配享桓彦範等配享中宗廟庭詔皇輿肇建必有輔佐之人天歩艱難爰仗經綸之業故侍中譙國公桓彦範故中書令兼吏部尚書漢陽郡公張柬之特進博陵文貞公崔𤣥暐故中書令南陽郡公袁恕已等並徳惟神降材與運生道協台岳名書䜟緯寅亮帝載勤勞王家參復禹之嘉謨奉昇唐之景命雖徂謝既乆而勲烈益彰撫彝鼎以念功想旂常而増感緬遵故實用表徽懿俾列在清廟登於明堂克申從祀之儀式茂酬庸之典並可配享中宗孝和皇帝廟庭蘇瓌劉幽求配享睿宗廟庭詔凡有功者銘書於王之太常祭於大蒸司勲詔之允所謂酬庸紀勞頒賞旌善藏於天府饗於廟庭臣哉鄰哉其道光也故尚書左僕射太子少傅贈司空荆州大都督府長史許文貞公瓌閑邪存誠乆迪厥徳故尚書右丞相太子少保彬州刺史徐國公幽求聞義盡節克茂乃勲並儀型羣工左右厥辟直道罔缺危言愈彰景雲末年邦國多難愷悌君子服勞王家或親受顧托以安劉氏或潜圗翼贊願奉唐侯纉乃舊服協於先契交濟弼亮厥功茂焉俾台小子嗣守文武之業獲奉宗廟之靈實資元輔是􅆒末命兹予大享于先王爾其從祀以配我有唐之休烈並可配享睿宗大聖真皇帝廟庭裴冕李晟段秀實配享肅宗徳宗廟庭詔朕聞昔之佐制物者咸有大功是惟五官以配五帝自時厥後有國家者莫不以輔弼之寄社稷之勲登名大烝陪享清廟茍非茂徳孰允盛儀贈太師冕望重巖廊時為楨幹靈武艱阻首讚經綸宣力股肱平心鼎飪佐戡定之成業推翼戴之嘉猷贈太師晟識精韜鈐神假雄武建中㓂孽躬踐憂虞垂餌虎狼致威樽爼刷宫廟之塵穢囬日月之光輝贈太尉段秀實氣全剛方節固金石兇渠悖逆替蹶根萌矯命還師衷刃死决紓阽危於怵迫挫狂狡之姦謀並材為時生用當運否感雲龍而應變炳辰象以降靈光復寰區振揚風槩勲庸藏于盟府寵飾備於前朝光隂不追盛烈如在朕頃因郊祀爰舉典常俾著茂勲以配殷祭惟咸有一徳允屬乎三臣庶昭示於将来式崇㤙於既往冕宜配享肅宗廟庭晟秀實宜配享徳宗廟庭渾瑊配享徳宗廟庭詔旌勸相先乆協念功之義薦羞爰舉聿追配享之儀贈太師瑊鍾秀誕靈逢時翼聖銘鏤金石帶礪山河績既著於先朝業宜光於後代俾之從祀用表遺勲宜配享徳宗廟庭實封加王琚等食實封制蘇頲門下古之書甲令銘太常若不撫翼青雲馳光白日未有君則議賞速為善而知勸臣亦避榮保流謙而益受莫非君臣之際感通之理然也新除銀青光禄大夫守户部尚書崇文館學士趙國公王琚體融純粹鑒激精微謨猷濟時詞學辨政新除銀青光禄大夫守工部尚書楚國公姜皎宏才倜儻勝氣清明含章掞發臨事條解新除銀青光禄大夫殿中監宋國公李令問居惟宻静胄實勲華率禮而和立言以信或受釐則問或捨講相得非直蕭曹不逺自我之舊故能管樂咸起致我在斯頃掃羣兇翳賴其力爰升茂寵同辭厥位誠非易奪義所難違俾増秩於掖垣更囬班於殿省仍加井邑以答元勲琚可行中書侍郎俸禄防閣品子課等一事以上同三品給加食實封二百户通前滿五百户皎可殿中監仍充内外閑廐使加實封二百户通前滿七百户令問可行殿中少監兼知尚食加實封二百户通前滿五百户散官封學士各如故主者施行天寳二年七月十八日加張暐食實封制門下䟽爵列土是稱王制大功盛徳必建侯封銀青光禄大夫大理卿張暐守道恭懿飭躬哲誠寅亮邦國實繁於華爱同君親忠出於孝比者潜申翊戴屢挫兇慝故以議存謀始防在慮先披荆之效不渝採葛之䜛遂起粤自荒裔升於王朝追朱佑之前言深啟於天命指蕭何之舊事獨髙於人傑思𢎞賞典用載盟書惟鄧樂郡陪京奥壌宜賜於茅社永旌采地可封鄧國公賜實封三百户餘如故主者施行先天二年七月十九日加劉幽求食實封制門下忠而獲戾時所歎息賞以念勤邦之彝典金紫光禄大夫守尚書左僕射知軍國重事監修國史上柱國徐國公劉幽求長才偉度博聞强學周百慮以匡社稷竭一心而在廊廟故能見大義臨大節智可以不俟終日誠可以格於皇天曩者恭參誅吕疑深從代𢎞宣王化保乂朕躬政方議於調鉉謗遂興於胠箧良相非罪空弔長沙故人有言寧忘曲突自剪元惡旋居左揆利更稱於狐偃勲莫逮於蕭何兼而有之義固應爾宜加土宇永傳帶礪可加賜食實封二百户餘如故主者施行先天二年八月十五日加郭䖍瓘食實封制蘇頲黄門聞鼓鼙之聲者則思於將帥裂茅土之賜者則念彼勲庸右羽林軍大將軍兼安西大都䕶四鎮經畧大使上柱國太原郡開國公郭䖍瓘忠壮超倫智謀絶等决勝千里懐孺子之兵符道通四夷有老臣之戎律往者鎮于荒裔獨守孤城煮弩而其人益堅引弓而彼衆不敵故得愛子染鍔名王息戈穹廬掃地而沙漠因以歸附功則茂矣朕實休之宜誓河山開其井邑可進封潞國公食邑三千户仍賜實封二百户餘並如故主者施行開元三年十一月十八日賜李光弼實封一子官制功崇望重加以服章徳厚流光延其茂賞爰益苴茅之典並明幹蠱之才副元帥太尉兼侍中都督河南淮南淮西山南東諸道節度行營事上柱國臨淮郡王光弼元勲濟代公輔推賢宣大化之神明總專征之師律自征移鎮負海距河連帥百城旌旗千里東郊誓衆雅繼魯侯之功北伐擁旄首稱漢將之畧髙牙罷設重鼎新調尤知武庫之深實在雲䑓之右疇其真食美以保家僉議允諧舊章斯舉敬哉有土更載丹書之盟鯉也趨庭宜升紫綬之寵可加實封二百户仍與一子官階三品餘並如故不許李光弼辭封詔爵土之封以彰勲徳故授之者適當其分使賞在必行而得之者不譲其餘使人有可繼國之彝憲在乎至公往者冦逆亂常京師失守太尉兼侍中河南副都元帥知河南淮西山南東道諸節度行營事上柱國臨淮郡王光弼首奉師律光佐先朝克弭氛祲底寜宗社自朕纘承丕績又置大功扶顛履危勤恤于外可謂忠存王室道濟生人則食邑所加繄惟常典爾因疾故遽有懇辭不伐茂勲請歸實封覽其章奏用増咽然且福夀之理期於勿藥井賦之錫傳于無窮豈爾暫以微瘵便思謙退将使其下者何顔受封用阻深誠盖存大體然撝謙有素忠義可嘉足以激礪名節光逺退譲宜示中外咸使知聞加田承嗣實封制常衮勅懋榮勲之賞則啟封邑賜真食之命方入田租故采地以處其子孫書社以尊其侯伯開府儀同三司檢校尚書左僕射兼魏州大都督府長史御史大夫兼魏博等州節度觀察處置及管内度支營田等使上柱國鴈門郡王食實封二百户田承嗣出自河朔挺兹才器公忠有素文武是經行惟髙簡言必誠信委之腹心實所親重内列端揆外當藩幹拒河作鎮瀕海撫封貞一以奉上明恕以臨下謀出韜鈐之外功成戰伐之前專精牧人盡瘁事國政刑必中都鄙有章訓以農耕之業課其蠶織之事家給而禮譲攸興氣和而札瘥不作舊章咸舉厥貢惟殷來東人之職勞首循吏之行理嘉命休績允兹褒勸食其井賦用協典常可加實封二百户餘並如故賜張自勉實封詔頃者逆䜿靈耀阻兵大梁淮西都虞候賜太常卿贈揚州大都督張自勉往觀壘焉奉議正詞無所屈撓賊臣肆忿斃於鈇鑕朕用憫焉雖錫命之恩已旌窀穸而賞延之典宜及子孫可追賜實封五十户大歴十二年七月加田神功實封制常衮勅土宇昄章以叙其徳田租帖食以答元勲故冦鄧兼四縣之封張陳加萬户之數開府儀同三司檢校尚書左僕射使持節汴州諸軍事兼汴州刺史御史大夫充汴宋等州節度觀察處置等使上柱國信都郡王食實封五百户田神功間生河朔性與忠厚嘗秉大節服勞王家凡所委遇必當要重竭其公私益用親信入居百揆之右出作四方之屏自河而南戎鎮斯大總兵車之所㑹賜斧鉞以專征考禮正刑豐財禁暴敬事節用老安少懐懋乃丕績肆于時夏服我休命敬兹分土可加實封一百户餘並如故加馬璘實封制勅大将在外勤勞有功或未進秩必當加賦更書侯社益茂朝章四鎮北庭行軍兼涇原等州節度使開府儀同三司檢校工部尚書兼御史大夫上柱國扶風郡王馬璘以牧人御衆之才膺方叔召父之任理事誥禁以屏西郊撫和其人爰得衆力智謀濬發忠義偘然武能用典師在制命紀逖伐畔服柔示懐懲宻人之不共執戎子以數罪務於徳禮以濟威刑關右寜謐賴其鎮定社稷之衛予嘉乃勲厚其田租式寵戎閫可加實封二百户餘如故分郭子儀實封賜諸子詔故尚父太尉兼中書令汾陽郡王食實封二千户贈太師子儀功格上𤣥道光下土積其善慶垂裕無窮雖嫡長云殂而支宗斯盛汾陽舊邑蓋有丕承其男前左散騎常侍駙馬都尉食實封五十户曖夙禀義方居忠履孝儷崇銀榜攄美金章繼撫先封允宜聽復曖兄檢校工部尚書兼太子賔客趙國公晞並弟右金吾将軍祁國公食實封一百五十户曙太子左諭徳映並有令名保其先業宜允推恩之典以明延嗣之誠其實封二千户宜准式減半餘以分襲曖可襲代國公仍通前襲三百户晞可襲二百五十户曙可襲二百五十户通前三百七十五户暎可襲二百五十户貞元馬燧李臯賜實封制勅列位以旌徳胙土以報功國有彝章是存褒勸朕以不徳間逢多虞蒲坂有叛亂之臣淮沂有僣逆之帥萬姓罹害四方靡寜河東保義奉誠軍節度兵馬副元帥檢校司徒兼侍中馬燧大厯初忠誠奮激躬率士卒討兹不庭畧地如歸功成必克晉絳慈隰靡然向風元兇勢窮竟就殱滅清我甸服時惟茂勲荆南節度觀察處置使檢校户部尚書嗣曹王臯親率全軍抗於强虜晝夜不息迨於三年謀成必臧師出皆㨗復蘄黄之地拔安陸之城隠其威名保乂江漢並節著於國功存于人効跡炳然僉議攸屬雖懋官已至而食賦未加疇庸之科無乃有間宜有寵錫以答殊勲燧可賜實封五百户臯可賜實封三百户唐大詔令集巻六十三
