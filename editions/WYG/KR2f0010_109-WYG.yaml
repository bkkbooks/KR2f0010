body:
  text: 唐大詔令集巻一百三十宋宋敏求編蕃夷討伐命皇太子討稽胡詔討吐谷渾詔討髙昌王麴文㤗詔討髙䴡詔親征髙䴡詔髙䴡班師詔命吕休璟北伐制命薛納與九姓伐黙啜制命姚崇北伐制討囬鶻制平亂破髙䴡詔降髙䴡頒示天下詔破髙䴡賜酺詔收復河湟德音平党項德音告廟破薛延陀告廟詔平戎告廟𠡠討伐命皇太子討稽胡詔稽胡部𩔖居近北邉習惡之徒未悉從化潛竄山谷竊懐首鼠㓂掠居民侵擾亭候可令皇太子建成總統諸軍以時致討分命驍勇方軌齊駈跨彌山谷窮其巢穴元惡大憝即就誅夷駈掠之民復其本業行軍節度期㑹進止皆委建成處分武德四年九月討吐谷渾詔近以吐谷渾恃其遐阻屢擾疆場肆行兇虐種𩔖乖離爰命將士申兹弔伐有征無戰所向摧殄渠魁竄迹自貽滅亡朝威逺暢邉亭静謐朕君臨寰宇志在含𢎞不欲因彼危亂絶其宗祀乃立伏允之子大寧王慕容順撫招餘燼守其舊業而順曽不感恩遽懷貳志種落之内人蓄怨憤遂創文義即加剿絶雖復權立其子所部又致攪亂竟動干戈各行所欲朕憂勞兆庻無隔夷夏乃睠西顧良用矜惕若不星言拯救便恐塗勞未已兵部尚書潞國公侯君集等咸才兼文武寄深内外嘉謀著於廟堂茂績書於王府必能宣風閫外克定遐夷量其事機綏撫經畧分遣使人明加曉諭如有不遵朝㫖致興異圖即合精鋭隨便剪撲盡威懐之道稱朕意焉討髙昌王麴文泰詔明罰𠡠法聖人垂懲惡之道命將出車王者成定亂之德故三苖負固虞帝所以興師鬼方不恭殷宗所以薄伐朕嗣膺景命君臨區夏𢎞大道於四方推至誠於萬𩔖慿宗社之靈藉股肱之力億兆獲乂封疆無虞建木踈林山經靡記之域幽都大夏王㑹不書之君莫不革靣内欵屈膝請吏襲冠帶於魏闕均貢賦於華壤而髙昌麴文泰猶為不軌敢興異圖事上無忠欵之節御下逞殘忍之志徃經朝謁備加恩禮溪壑難滿曽無報効禽獸為心遽懐兇狡詔命之嚴禀承之誠既闕王人之重祗敬之禮亦虧自隋季道消淪䘮衣冠之族疆場之人或寄命諸戎或見拘㓂手及中州既定皇風逺肅人懐首丘途經彼境皆被困繫加之重役忍苦遐外控告無所又伊吾之右波斯以東職貢不絶商旅相繼探書遭其㓂攘道路由其擁塞又西蕃突厥戰争已乆朕愍其亂離志在安戢乃立頡利姪可汗兄弟庻令克復舊基文㤗反道敗德世安好禍間譁酋豪交亂種落遂使氊裘之長亟動干戈引弓之人重罹塗炭又焉耆之地與之隣接文泰疾其盡節輕肆凶威城池有危亡之憂士女嬰刼掠之酷加以虐用其衆毒被所部官罰無章内外嗟怨善造宫室勞役日興修營輿輦僭侈無度法令深刻賦歛繁重舉手動足咸觸網羅畜牧園果悉有征税衆力既盡人財已竭饑寒總至憤歎盈途比室運甍不勝苛政故老悲愁思霑王澤朕受命上𤣥為人父母禁暴之道無隔内外納隍之慮切於興寢録其舊勲仍懐愍憐所以頻遣使人具申朝㫖朂以為善之規示以自新之路庻知感悟無煩師旅而昏迷遂性荒怠不悛貫盈之釁既稔滅亡之期已及况復文武具僚戎狄君長請事君長者相屬懐逐雀者比肩宜順夷夏之心以申弔伐之典討凶渠之多罪拯無辜之倒懸今遣交河道行軍大總管吏部尚書侯君集副總管兼右屯衞將軍薛萬鈞副總管左屯衞將軍薛孤吳兒行軍總管武衞將軍牛進逹董率衆軍𢎞宣廟畧乘驛進路同㑹虜庭莫不氣奪風雲精貫日月援枹懐憤㧞距争先良將奮建瓴之威鋭卒効如貔之勇冀馬燕犀猶迅雷之震擊雲梯地道若至神之變化以此制敵事等摧枯以此屠城易於反掌然朕矜憫之心有懐去殺勝殘之道無忘好生文㤗面縳軍門泥首請罪特𢎞焚櫬之澤全其將盡之命自餘臣庻棄惡歸誠並加撫慰各令安堵以明逆順之理布兹寛大之德如其同惡相濟敢拒王師俟盡大兵之勢以致上天之罰明加曉諭稱朕意焉貞觀十三年十二月討髙䴡詔行師用兵古之常道取亂侮亡先􅈒所貴髙䴡莫離支葢蘓文殺逆其主酷害其臣竊據邉隅肆其蜂蠆朕以君臣之義何忍若不剪誅遐穢何以懲肅中華今欲廵幸幽薊問罪遼碣行止之宜務存儉節所過營頓無勞精飾食惟充饑不湏嘉饍水可渉度者無假造橋路通行者不勞修理御營非近州縣學生父老等無煩迎謁隋室淪亡其源可覩良由志畧乖於逺圖兵士疲於屢戰政令失度上下離心德澤不加於匹夫刻薄彌窮於百姓當此之時也髙䴡之主仁愛其民故百姓仰之如父母煬帝殘暴其下故衆庻視之如仇讎以思亂之軍擊安樂之卒務其功也不亦難乎何異入水而惡其濡踐雪而求無跡朕緬懐前載撫躬内省昔受鉞專征提戈撥亂師有經年之舉食無盈月之儲至於賞罰之信尚非自决然猶所向風靡前無横陣蕩氛霧於五岳剪豺狼於九野定海内安蒼生然則行軍用兵皆億兆所見豈虚言哉及端拱巖廊定䇿帷扆身處九重之内謀决萬里之外北殄匃奴種落有若摧枯西滅吐谷渾髙昌易於拾芥包絶漢而為苑跨流沙以為池黄帝不服之人唐堯不臣之域並皆委質奉貢歸風順轍崇威啟化之道此亦天下所共聞也况今豐稔多年家給人足餘粮栖畆積粟紅倉雖足以為兵儲猶恐勞於轉運故多駈牛羊以充食人無褁粮之費衆有隨身之廪如斯之事豈不優於曩日加以躬先七卒親决竒謀使攻無所守戰無拒畧言必勝之道葢有五焉一曰以我大擊其小二曰我順而討其逆三曰我安而乘其亂四曰以我逸而敵其勞五曰以我悦而當其怨何憂不克何憂不摧布告元元勿為疑懼耳貞觀十八年十月親征髙䴡詔觀乎天道鼔雷霆以肅萬物求諸人事陳余革以威四方雖歩驟殊時質文異制其倡攻殺禁暴虐戮干紀討未賔莫不仗義而申九伐文德昭於率土因時而董三令武功成於止戈朕祗膺寳厯居臨宇縣憑宗社之靈藉卿士之力神祗儲祉夷夏宅心故上柱國遼東郡髙麗王髙建武夙效丹欵早奉朝化忠義之節克著於嵎夷職貢之典不愆於王㑹而其以莫離支葢蘓文包藏凶慝招集不逞潛與計謀奄行弑逆寃酷纒於穢貊痛悼徹於諸華纂彼藩服權其國政法令無章賞罰失所下凌上替逺怨邇嗟加以好亂滋甚窮兵不息率其羣兇之徒屢侵新羅之地新羅䘮土憂危日深逺請救援行李相屬朕愍其倒懸之急爰命輶軒之使備陳至理喻以休兵曽不知改莫遵朝命窺窬亭障首鼠窟穴完聚更切賦歛尤繁丁壮盡於鋒鏑羸老弊於坂築乆廢耕桑咸罹饑饉生肉表異顯其亡徴雨血為妖彰其數盡比室愁苦闔境哀惶華髮青衿不勝苛政延頸企踵思霑王澤昔有苖弗率勞大禹之駕葛伯仇餉動成湯之師况亂常巨㓂紊三綱而肆逆㴞天元惡窮五刑而莫大者哉朕所以宵分興慮日時忘食討罪之懐既深於投袂救人之義彌軫於納隍𩔖上帝而戒途詔夏官而鞠旅可先遣使持節遼東道大行軍總管英國公勣副總管江夏王道宗士馬如雲長駈遼左奪夷岳之威屠虵豕於險瀆成建瓴之勢斬鯨鯢於鏤方行軍總管執夫思力行軍總管契苾何力等率其種落隨機進討契丹藩長于句榆溪藩長蘓支燕州刺史李𤣥正等各率其衆絶其走伏使持節行軍大總管張亮副總管常何副總管左難當等舟檝相繼直指平壤新羅王金善德傾其城邑竭其府藏荷不貲之澤復累業之讎出樂浪而衞腹心臨沃泹而蕩巢穴百濟王扶餘義慈早著丹赤深識時機棄歴稔之私交執順動之公義嬴粮蓄積惟命是從凡此諸軍方里齊舉頓天羅於浦缺横地絡於遼陽朕然後經塗白狼之右親廵𤣥菟之城執金鼓而戒六軍載太常而麾八陣使流湯者魚爛掘炭者氷消誅渠魁於惡稔弔黎庶於崩角其或擁衆立功或間行自㧞宜𢎞寛大各復農土有勞者當加其賞懐能者不滯其才如其長惡莫悟迷途遂徃斧鉞既下必嬰䘮元之悲玉石一焚徒致噬臍之歎宜宣朕㫖咸使聞知貞觀十八年十二月髙麗班師詔朕聞之聖人慎罰觀兵於再駕明王舉事制勝於三年合諸侯以討逆既擒而且縱總海内以除殘臨刑而止殺其故何哉信由上天之德曰生王者之師曰義是以網開三面干舞七旬豈有恣欲凌威取鯨鯢而竭澤覆巢探穴罄麛卵以塗原者乎憬彼夷島僻居鯨壑晉皇淹駕纔克一城隋帝頻師淪兵百萬朕光承寳厯司牧普天陶化紫宸法兩儀而導俗推心黔首狥方㝢以勞神纎介不安終宵輟寢蠻陬未乂日旰忘飡是以逺渉天涯比焦原而未險長驅若木譬平圃以非遥憤角遼陽躬親節度摐金海表震曜靈威尅其𤣥菟横山葢牟磨迷遼東日巖沙卑陵谷銀山后黄等合一十城凡獲户六萬口十有八萬覆其新城駐驛建安三大陣前後斬首四萬餘級降其大將二大禆將及官人酋帥子弟三千五百人兵士十萬人並給陳粮放還本土又獲馬牛各五萬館榖十旬不假運粮之費徒兵累萬咸發兼乘之歌自夏渉秋係虜相次由燕及雍負戴不絶緬惟湯文取亂常懐偃伯之心虞夏勝殘實𢎞光被之羙有懐戢武再造何忘但以賊帥莫離支猶不授首本圖未果志無旋斾忽屬徼外霜嚴海濵寒沍念兹兆衆便命班師朕所向必摧上靈之祜也所攻無敵勇夫之力也方且仰酧𤣥澤展大禮於郊禋念此勤勞録摧鋒於將士有勲者别頒勞命無勲者並加優卹諸渡遼海人應加賞命及優復者所司宜明條例具狀奏聞朕將親為詳覧以申後命貞觀十九年十月命吕休璟等北伐制蘓頲門下朕聞守在四夷葢安人以和衆加於百姓豈窮兵而黷武然則日之所出弗俾於化故知天之所討必龔其罰自黙啜䖍劉肆暴桀驁反常獨為匪人假命驕子者有嵗時矣雖奉書就邸或遵於聲朔而控弦犯塞已毒於疆場朕惟務懐柔每在含忍遂使庻邦憤積稽其六月之師逋㓂禍盈窮此百年之運金山道前軍大使特進賀臘毗伽欽化可汗突騎施守忠名寵外藩志勤中國兼遣弟古監衛將軍守節長駈沙漠直指金㣲黙啜舉其種𩔖来相抗拒殪於鋒鏑之下巳若亂麻逺慿於廟堂之上將同破竹堅昆在右犄角而東並累獻封章請屠巢穴朕又聞不得已而用者孰若兵機不可得而違者廼符人事永言取亂宜戒征徂右領軍衛將軍兼檢校北庭都䕶卒宋鎮守使安撫十姓吕休璟心堅鉄石氣横風雷始則知戎之𩔖利得晉卿終而遂虜之功永邀漢將為金山道行軍大總管北庭副都護郭䖍瓘安處􅈒等懐才抱器蓄鋭俟時慣習軍容備知邉要並可為副大總管領瀚海北庭碎葉等漢兵及驍勇健兒五萬騎金山道前軍大使特進賀臘毗伽欽化可汗突騎施守忠領諸蕃部落兵健児二十五萬騎相知計㑹遂便赴金山道行軍大總管右武衞大將軍攝右臺大夫同中書門下三品上柱國韓公張仁亶文武將相莫之與京心腹爪牙是所繫頼當分閫之任受昇壇之律嘗願親先士卒不令賊遺君父與大總管右兼門衞大將軍魯受信等將蕃漢兵募健児或用絶羣飛騎城傍等十五萬騎赤水軍大使凉州都督司馬逸客外寛内明正辭直道標慷慨之節曽不顧身藴經營之志期於盡敵右武衞將軍陳家丘右金吾衛翊府中郎將李𤣥道副使左驍衛鹿陵府折衝能昌仁左衛神山府陳義忠等領當軍及當界蕃漢兵馬募健児七萬騎豐安軍大使靈州都督甄蔡副使張趙壁常元寂等領蕃漢兵六萬騎防禦郡牧大使臨洮軍使甄亶領當軍莫門積石等軍馬募及秦蘭渭城等州大家子弟總二十萬騎建康軍使甘州刺史李守徴玉門軍使肅州刺史湯嘉惠墨離軍使𤓰州都督李思明伊吾軍使伊州刺史李􅆃交等各領當軍兵馬與突騎施守忠吕休璟等計㑹共為表裏莫不運其長䇿悉心而効六竒接以短兵指掌而論七縱使天陣齊舉雲罝偹設賈勇於飲酌之夫一以當萬揚威於汗血之騎左縈右拂威繫黿斬蛟曵牛佩豕必能力􅉫窮海聲壓大荒刈谷蠡之庭㧞權渠之壘不遑渭橋之拜巳覩隂山之哭然則持旌節金鼔者所以問不賔誅首惡而比夫不誡復迷則凶俾存開網之仁預軫焚岡之歎休璟所湏兵馬甲杖一事已上仍依别𠡠處分主者施行景龍四年五月十五日命姚崇等北伐制黄門朕聞上古聖王之致理則教之以戰陣之以兵葢威不恭而服不順也故始於禁暴終於偃戈廹斯不得巳而用之朕以寡昧誕膺鴻業思欲率於動静歸之教化豈要荒之外棄為匪人而亭育之中視則如子罔不遵我文軌終其貢賦歲時相望道路抵屬而黙啜素稱裂驁鳴鏑於狼居頃自懐柔獻書於象魏朝廷所以許其通好議以和親使臣累齎賚繒帛侍子今襲冠帯庻中國無事長城罷守戢於干戈而銷劍㦸者朕之意焉豈謂我盟不渝爾約斯背伊庭之際遂敢侵軼西北偏隅尚聞嘯聚雖摧其精鋭而困於圍廹此不虞之失朕嘗憐之犬羊無親不可恃信而輕敵熊貔有勇咸能宣威而制勝朕由是詢卿士之奏攬英雄之心謀元帥而得佐軍恢逺圖而舉長䇿隨時之義其在豫乎兵部尚書兼紫㣲令監脩國史上柱國梁國公姚崇天假其才日新厥德禮義為質居有四科謨猷是光坐知千里以仲山甫之操管夷吾之能智湧泉而不窮精貫日而逾厲信廟堂之柱石鼎鼐之鹽梅必能奮爾六竒光我三傑可持節靈武道行軍大總管内諸軍咸受節度右領軍衛大將軍兼檢校單于大都䕶鎮守軍使張知運寛厚沈毅外方内直威而勇决自攝單于之臺惠則撫循咸仰將軍之樹可中軍副大總管權檢校原州都督李欽憲家承將相器兼文武求古人之節臨事不回讀前聖之言好謀而斷可左軍副大總管檢校左威衛將軍靈州都督吕休璟慣知邉要久探戎律誠期報國去病安用家為奮不顧身伯昭不使遺賊可副大總管左騎衞將軍論弓仁古金吾衛大將軍勿部珣左領軍衞郎將攝本衛將軍張真楷單于副都䕶臧懐亮右領軍衛中郎將王海賔前朔州刺史劉元楷右武衞郎將楊楚客并州定清武果毅元蕭然等頗牧為用闗張其敵懐才倜儻嘗邀百勝之功立志經營備習九章之訓弓仁及珣並可前鋒總管真楷可左虞侯總管懐亮可右虞侯總管海賔元楷楚客蕭然等並可行軍總管太僕少卿田崇壁鄜州刺史韓思復等强力從政精心在公知無不為利有攸徃入敷事典省閣稱其閑練出綜條察吏人畏其嚴明崇壁可兼行軍長史思復可兼行軍司馬兵部郎中李休光司勲郎中張敬中兵部員外郎楊欽明江州别駕李邕等或特逹珪璋所謂登壇之寳或翩翻書記曽聞及霤之詞可以光贊出車𢎞宣入幕並可行軍判官靈武軍兵加滿十分人舊馬既少宜於内外閑廐抽添馬添滿六萬疋原夏等州要害處亦量加馬其後軍兵六萬人馬二萬疋先來㸃定宜令衞尉卿李延昌左羽林將軍楊敬述等至冬檢閲且當處團結待後進止其有先鋒破賊斬䤋摧堅功效灼然者並委軍將使定功賞不湏定以常格總管以下有損失兵馬不能力戰棄軍逃命者便斬其有棄軍入賊不能死節者妻子依叛縁坐法凡此和衆誓於師兵統燕犀冀之雄屯斬蛟擊龜之勇金鼔沸野旌旗彗雲豈式遏於河塞方震驚於沙漠於是乎單醪以信之芳餌以賞之戮楊干之僕必行其令持穣苴之兵不枉其法堅壁清野投石而有餘追奔逐北則掃塵而無𩔖俾權宜於閫外仍布告於天下蹔勞永逸在此行焉主者施行開元二年二月二十八日命薛訥等與九姓共伐黙啜制黄門朕聞天所與者奉天命而不違人所棄者順人心而致伐由是古先帝王光宅區縣實仗威武用清荒戍時義逺矣黙啜以叛亡餓𨽻凶刃遺孽敢迷聲朔獨匪君人禍皆所居妖不自作舉其巢穴盡其離心瞻我闕庭相望南面猶竄身於寒苦且寄命於旬時當冦運之已窮在軒兵而可逐九姓部落等忠誠貫日義烈聞風數其擢髮之僭成於屈指之計請除驕子累遣使臣摧鋒而願先駈蓄鋭而期後命右羽林軍大將軍朔方道大總管薛納左衞大將軍安北副大都䕶郯王府長史平郡公張知運右羽林軍將軍兼京都督赤水大使楊敬術右驍衞將軍大武軍大使干仁誓右武衞將軍大使杜賔客豐州都督西受降城吕休琳東受降城使邵宏左金吾衞大將軍囬紇伏帝匍左衞大將軍渾元忠佐武衞大將軍以和舒右武將軍兼賀蘭州都督契苾承祖等或出將入相有經濟之才或敦詩説禮有韜鈐之算或嫖姚仕漢有遮虜之勲或由余入秦有伐戎之䇿謀彼元帥擇於左軍可以授旗遂行推轂而進訥可中道大總管賔客宏休琳等為副知運可東道大總管弓仁仁誓等為副敬述可西道大總管伏帝匐元忠和舒承祖等為副各領馬歩五萬人馬九姓計㑹三軍既整百道齊入吳鈎楚練照曜隂山之峯冀馬燕犀張皇窮漢之地况彼冦惡積我師義動知存亡者觀其兆摧枯朽者鮮其力庻使疆場罷侯從此息人邉鄙不虞因而盡敵布告天下咸遣知聞主者施行開元四年正月二日討囬鶻制天之所廢難施繼絶之恩人之所棄當用侮亡之道朕每思前訓豈忘格言囬鶻比者自恃强梁久為桀驁凌虐諸部結怨近鄰紇扢斯潛師彗窮居瓦觧種族盡膏於原野區落遂至於荆榛今可汗逃走失國竊號自立速踰沙漠寄命邉隍朕深念傷殘尋加賑䘏每陳表章多詐諛之詞接我使臣如全盛之日無傷禽哀鳴之意有困獸猶鬭之心去嵗潛入朔州大掠牛馬今春掩襲逼近城池可汗皆自率兵首為㓂盗不耻破敗莫顧姻親河東節度使劉沔料敵伐謀乘機制勝發胡貉之騎以為前鋒搴翎侯之旗弋彼在穴短兵鏖於帳下元惡軼於彀中况乘非六嬴衆纔一旅儲備已竭計日可擒大和公主居處不同情義久絶懐土多思亟聞黄鵠之歌失位自傷寧免緑衣之嘆念其覊苦常軫朕心今朕巳於豺狼再見宫闕上以攄宗廟之宿憤以慰太皇太后之深慈永言歸寕之樂良用欣感其囬鶻既以破滅義在剪除宜令諸道兵馬使司進討河東立功將士已下優厚賞給續條流處分應在京外宅及東都修功德囬鶻並勒冠帯各配諸道收管其囬鶻及摩尼寺莊宅錢物並委功德以御史臺及京兆府各差官㸃檢不得容諸色人影占犯者並處法錢物納官摩尼寺僧委中書門下條流奏聞於戲昔漢宣帝值匃奴乖亂推亡固存呼韓單于携國歸命入朝保塞漢后所以有擁䕶之恩郅支單于背叛禮義傷毁威重漢史所以明可誅之罪二虜禍福皆自致焉四夷百蠻當以為鑒布告中外深體朕懷㑹昌三年正月平亂破髙麗詔五兵爰始軒皇戰於阪泉七徳攸基唐帝尅於丹浦莫不降兇剪暴道濟生靈斥土開疆威加四海朕欽承寳厯削平天下六合之内咸以為家三光所臨義無不照是環埤之表咸淼淼以航琛垓㝢之中盡顒顒而輦賮而島夷陪𨽻虐殺其君毒被朝鮮災罹穢貊幼孤者不可苛暴忠槩者仰我來蘓朕言念匪人深懷夕愓親御戎軒躬執金鼔意在以殺止殺仁被於羣生用刑清刑義戡於不惠廓滔天而調雨露禽猾夏以正封疆用此佳兵事非獲已仰申天罰遂乃龔行先命行軍大總管英國公勣行軍總管張儉等率領驍鋭元戎啓行北狄西戎之君咸為將帥奚靈契丹之旅北充甲卒如貔億計躍馬千羣總管萃遼東之城攻其南面副大總管江夏郡王道宗第一軍總管號國公張士貴等率五陵之勁卒董六郡之良家分麾引道攻其西面申命前軍大將軍夔國公𢎞基等分絶猛士填其濠塹賊城臨地險激梁水以環流聳堞陵雲壓頺山而靡懼於是雲羅四合地道九攻危城倐以復隍湯池俄而失險猶且柝骸窮壘壁巢幕以偷安轉骨深溝坐積薪而待燎愍其塗炭申其再造頻加誨誘固執迷途由是猛士衝冠壮夫挺劍咸頓首於馬前請因機而電掃難違衆議爰詔許之乃分命諸軍四面雲合朕登髙逺矚授其節度又命檢校太常卿鄂國公敬德領黄門之軍樂奏𤣥雲之雅歌將帥聞之増憤士卒由其作氣凍雨初晴驚風漸急聊命縱火數處潛燃焚其樓雉並為煨燼合城男子面縳軍門取彼渠魁屬于司敗千載逋㓂一朝清蕩斯並宗廟降靈上𤣥幽贊忠臣猛將盡節陳謀勁卒勇夫輕身効命叶同心力成此大功豈朕一人獨能致此今兹克捷普天同慶宜令頒下咸使聞知貞觀十九年四月降髙麗頒示天下詔上天之道先德而後刑王者之師有征而無戰是以炎農剪暴夙沙自縳其君𤣥乙興師有苖不固其險朕勞神濟物以百姓而為心則天𢎞化環四海而開宇義非獲已由是舉兵每蓄哀矜深存宥罪自濟遼水先令告喻而葢牟不革其面遼東猶抗其斧既觸天網遂縱兵鋒未展鷹揚已皆魚爛朕乃鼓行乘勝師次日巖凶徒相率登陴拒守因山搆壘仰切浮雲縈澗沉隍下臨無地妖氛蝟聚如慿劍閣之深同惡䲭張若負洞庭之險乃命行軍大總管英國公勣等統阻堒冠雞之將率擊鼉斬蛟之士發石甚於星隕樓毁同於山壞朕憫彼同焚情深惻隠親御八駿責効三軍賊既倒懸方思轉禍積甲齊於熊耳獲庚方於海陵建十州之旗各復於桑梓反三韓之士不易於農肆焚櫬錫爵駈馳遼海之間鑿井耕田編列下辰之野古人有言曰全國為上葢斯之謂焉又燕碣土風素多霖霑軒皇遭召霧之師晉后苦涌水之失自朕出師上靈幽贊旭日澄靄霱雲輟隂所指未有堅城所向乃無完陣天道人事義等合符窮穴傾巢庻將非逺宜以大慶頒示普天貞觀十九年三月破髙麗賜酺詔上帝明威鼓雷霆而震曜先王仗順用甲兵而弔伐故能經綸九野清滌八荒二十七征𤣥王創其鴻業五十二載黄運垂其大名騰有國之英猷光列代之通典朕荷搆乾象大庇羣生池濛汜而扶桑紐入紘而疆日域蠢兹皮服敢亂天常但折彼螽肱何俟五丁之力射其雀目無假萬努之機然以先聖救焚成言如在自惟巳任是用躬親故知矢石交前非勝巖廊之道介胄為飾不建旒冕之容若命將以授戈愧奉身而役物親征而沭雨務形勞以安衆一儀宜鑒所向弗違自渉遼陽受降之城累築曽未期月獻凱之歌日奏𫝊􅇏告捷異徃昔之照甘泉資敵為糧矯向時之挽紅粟復以今日中攻其安巾城重圍四布勢同三版之危縣命短辰哀其守陴之哭髙麗偽主掃其境内罄兹驍鋭咸登徒軍爰自平壌長馭影渡有徒十五萬連旗三十里烟火稽天若黄虵之吐霧彀騎横野邁赤蟻之為羣朕心計利其地形屈指籌其破日分命衆將各禀新書臨事設竒因機制變行軍大總管李勣率總管國公張士貴等馬歩軍十四總管當其西南面又命馬歩軍趙國公無忌率馬歩軍二十六總管馳自東谷合其来道抵背扼喉塞其歸路朕乃潛師偃斾登於北山候彼交鋒於兹聳轡若處中天之樹俯周官於目前如登大岳之岑觀魯邦於掌内出其不意凶徒遂擾初為一陣四拒勣軍及此三分因而大潰流血川溢滄波為之暫丹斬級彌山髏骨以之成岳葢由鏑鋒交下玉石同湮雖則可哀理無兼濟其兵將大耨薩延夀惠真率其餘衆一時輸欵但髙麗國政本二人今總委偽軍隻輪不返大慶允集益深祗懼可歸羙清廟昭告懋功頒示萬邦賜酺三日貞觀十九年六月收復河湟德音自昔皇王之有國也何嘗不文以守成武以謀事参謀諸二柄歸乎太寧朕猥荷丕圖思𢎞景業憂勤戒惕四載於兹每念河湟土疆綿亘遐闊天寳中犬戎乗我多難無力御奸遂縱腥羶不逺京邑事更十葉時近百年進士試能靡不竭其長䇿朝廷下議皆亦宜其直詞盡以不生邉事為本圖宜守舊地為明理荏苒於是收復無由今者天地儲祥祖宗垂祐左袵輸欵邉壘之降劚耻逹功所謀乂尅實頼樞衡妙算將帥椎稜副𤣥元不争之文絶漢武逺征之悔甌脱頓空於内地斥堠全據於新封莫大之休指期而就况將士等櫛沭風雨暴露郊原披荆榛而刁斗夜嚴逐豺狼而穹廬曉破動皆如意古無與京兆此誠樸宜加寵賞涇源宜賜絹六萬疋靈武宜賜絹五萬疋鳳翔邠寧宜各賜絹四萬疋並以户部産業物充仍待李榮叔明李玭君緒各囬戈鎮度支差脚支送四道立功將士具名銜聞奏當議恩酬其秦威原三州送七闗側近訪聞田土肥沃水草豐羙如百姓能耕墾種蒔五年内不加税賦五年后已量定户籍使任為永業其京城有犯事合流役囚徒自今已後一切配各處收管温池鹽利可贍邉陲委度支制置聞奏鳳翔邠寧靈武涇原四道長吏能各於鎮守處遣官健耕墾營田即度支給賜牛粮於毎年量得斛㪷多少便充軍粮亦不限納足數二州七闗鎮守官健每人給衣粮兩分一分依常年例支給一分度支給仍二年一替換其家口委長吏切加委存官健有莊田户籍者仰州縣放免差役秦州至隴州已來道路要置堡栅與秦州應接李玭與劉臯即便度計聞奏如商旅徃來興販貨物任澤利潤一切聼從闗鎮不得邀詰其官健父兄子弟通𫝊家信開司並亦不得邀詰阻滯如要墾闢種田依百姓例處分三州七闗如少器械長吏量與據所在申奏除刺史開使後三五月内差人廵檢如有修築部署課績久深并訓練有序者其刺史開鎮使雖新除官爵亦更與超昇其官健節級更與優賞山南西道劍南山川邉界有沒蕃州縣量力收復其兵士委本道差遣如要錢物接借亦具聞奏三州七闗創置成九十且要務静如有邊冦羌戎潛来博易輙不得容納委刺史切深禁斷或有投降吐蕃到邉上收取本道令長奏取進止嗚呼七閑要害三郡膏腴候舘之殘址可尋唐人之遺風尚在追懐徃事良用興嗟夫取不在廣貴保其金湯得必有時詎計於遲速今則便務修築不進干戈必使足食足兵有備無患載洽亭育之道永致生靈之安中外臣寮宜體朕意平党項德音冐法干紀豈限於華夷伐罪弔民固資於典訓朕端拱御宇六年於兹兢兢業業不敢怠忽常恐一物失所羣心靡寧旰食宵衣思底於道屬者以党羗恣為侵叛尤苦農桑朕為民父母豈無憫惻雖傷財害物非朕躬之願而禁暴定功實武經之要是以爰興師旅恭行天討而兇渠稔惡稽曠嵗時師宿既勤物力將屈頼宗社儲祉中外叶心大搜妖巢盪定關隴誠殚財而凋力亦暫費而永寧今則軍功以成制置將就息民觧甲固在及時捨罪緩刑所宜布澤南山党項為惡多年化諭不悛頗為邉患既興兵士經嵗討除拒官軍者悉就誅擒懼法令者皆復逃竄大開湯網已施去殺之仁逺並堯時寧限可封之屋今聞殘㓂無所依歸皆是王民豈忘惻憫其南山党項已出山者或聞廹於饑乏猶行刼奪平夏不容無處居住今委李福丑先遣蕃官安存招誘令就夏銀界内指一空閑白地居住所有從前掛渉惡跡者令一切不問惟再犯疆界刼入山林或不從指揮即召募平夏党項討逐議不容捨如能革心向化願同平夏即輸誠獻欵跡効分明撫馭之間便同赤子如有屈事即任於本鎮投告論理仍各令本界遣了事軍將安存平夏党項素聞為善自旬月已来發使安撫尤見忠順一如指揮更不猖狂各守生業自兹必令永載恩信長被華風或聞從前師在多懐貪尅部落好惡悉被誅求無故殺傷致令怨恨從今已後必當精選清亷將帥撫馭羗戎明下詔條漸令知悉靈鹽夏州邠寧鄜坊四道官吏自用兵已来責辦公事亦甚辛勤軍將皆已得官文吏未酬勞績宜令每道揀選公勤有勞効官吏具名銜聞奏有官差者與依資轉遷無官差攝者當與正官仍具差攝年月申奏直湏公當不得轉授囑托如是將帥親情亦湏具言四道百姓徴歛不時差役至多疲瘵亦甚或屋宇被賊焚燒至於桑麻亦遭所伐生業既失湏加安存宜各給復三年其無屋可居無牛可耕者委長吏量事接借一一奏聞仍湏早設法招擕速令歸復勿令豪富便占産業為主自用兵已来諸道應徴發之處所有將健或亡鋒刃或存被瘡痍雖經褒贈及曽優䘏委本道更加存撫或因廢疾不任在公者終身不停衣粮如情願廽於與子孫兄弟甥姪者便與補替應討伐党項諸道在行營將士已頒賞賜使邉上制置司叙績節級放還仍委本道叙録其名聞奏當議甄奬自用兵已来京畿與鄜坊邠寧兩道接界及當路諸縣差役繁併物力凋殘若無優矜必難存立其今冬季夏税錢及青苖錢每貫量放三百文其斛㪷量放一半仍委京兆尹差官仔細磨勘其或雖在鄉村不曽經供應者不在准例放限仍一一條件等第聞奏如是分路處就中更校偽倂者重加優䘏必使均平其所放錢及斛㪷委户部以實錢支填仍令京兆府各下諸縣散牓鄉村要路曉示百姓務令知悉用兵已来城鎮曽遭陷沒官健百姓應被殺傷親戚既無遺骸在野委所在長吏差人為収檢如法埋瘞仍量事致祭應有増修城鎮添置堡戍委所在將帥擇其要害絶彼窺覦坊務堅完令可固守邉上不以兵器作部落博易從前累有制勅約勒非不丁寜近年因循都不遵守自今已後委所在開律鎮舖切加捉搦不得輙有透漏其有犯者推勘得實所在便處極法其所經過州縣闗津鎮舖節級痛加懲責議無容貸其間或情渉隠欺准所犯人處分党項本是邉甿只合州縣撫馭致令一朝侵叛由於處理乖方既徃不可加刑從今必欲行法自此後邉上逐界皆已有制置把捉如或更有羗㓂侵盗即是將帥依前貪求當先加罪於本界邉將然後剪逐㓂賊通商之法自古明規但使處流行自然不煩饋運委邉鎮宜切招引商旅盡使如歸除禁斷兵器外任以他物於部落徃来博易應縁徴兵處士馬皆効勤勞亦已各有賞賜其本道將帥當續議量加酬奬京畿及鄜坊靈鹽邠寧夏州等并涇州鳯翔振武天德等道自用兵已来人頻勞苦今頒德澤湏及曲恩應見禁囚徒據罪逓减一等唯官典犯枉法􅂍及賊中持杖刼人雖頒德澤不禁曲恩而若輩無故殺人等不在此限如有積年逋賦必加徴督不得者長吏條流聞奏准格律大功已上親父女壻外甥不許連任自用兵已来諸道郎將及長吏權宜差親表主持公事兵罷之後理當不然三族内親並不得令主兵權及充要職如是元本軍先充職長者亦湏具名聞奏自用兵已来科配百姓事取濟辦多出權宜今既罷兵諸道節度防禦刺史及旗鎮使等不得更依前妄有科配仍令各具本管侵害百姓事湏釐革者作條件聞奏自党項擾亂巳来所在多被攻刼白刃之下必有孝子順孫義夫節婦事跡有可稱者委所在長吏察訪優䘏其家仍具名聞奏將加旌異於戲蠻夷華夏雖有其常規撫馭乖方致煩於薄伐傷夷生靈朕甚愧之是用覃恩以慰勞瘁布告中外咸使聞知大厯五年二月告廟破薛延陀告廟詔朕勞形育物盡敬承天蠢動不安櫛風而罔倦荒隅未静救焚而靡息獨運方寸貫徹上𤣥凝想冕旒化行夷狄是知惟天為大合其德者弗違謂地葢厚體其仁者光被故能彌綸八極函葢兩儀大帝福謙斯其效矣彼匃奴者與開闢以具生奄有龍庭共上帝而並列僭稱驕子分天街於紫宸仰應旄頭抗大禮於皇極流殃搆禍乃於初運凌障犯塞連年壓境射鵰馳騎亟飲渭川如豕騰氛頻驚洛汭貽先皇之動色被黎庻之塗原社稷為虞軫情何似自朕御天下二紀於兹曩者聊命偏師遂擒頡利今兹始𢎞廟算已滅延陁雖則麾駕出征未踰郊甸前駈所纔掩塞垣長䇿風行已振金徽之表揚威電發逺讋沙塲之外遂使㕍山之北無復單于龍燭之南大開封域其契苾車苾侯斥及鉄勒諸部落囬紇胡禄俟利發等總統百餘萬户㪚處北溟逺遣使人委身内屬請同編列並為郡縣引領翹足暴十月而仰油雲延首求哀沉九泉而請營魄朕當暫幸靈州親撫歸附𢎞兹肆赦加以施生頒惠天隅懼威雲朔収其瀚海盡入提封觧其辮髮並垂冠帯混元以降殊未前聞無疆之業永貽来轍古人所不能致今既吞之前王所不能屈今咸滅之斯實書契未有古今之壮觀豈朕一人獨能宣力葢由上靈儲祉錫以太康宗廟威靈成兹大定即宜備禮告於清廟仍以大慶頒示普天俾與黎元同兹有頼貞觀二年八月平戎告廟𠡠𠡠邉境為患莫甚於林胡朝廷是虞㡬煩於將帥車徒屢出芻粟載勞使燕趙黎民畧無寧嵗而山戎種落常為匪人近有野心窮而歸我曽是懐附每所綏柔而不變梟聲輙為獸搏幽州節度副大使張守珪等乗間電發表裏奮討積年逋誅一朝剪滅則東北之侵便以廓清河朔之人差寛征戍皆上慿九廟之畧下仗羣帥之功今其凱旋敢不以獻宜擇吉日告九廟所司准式開元元年唐大詔令集巻一百三十
