body:
  text: 唐大詔令集巻六十八宋宋敏求編典禮南郊二貞觀十七年南郊德音景龍三年南郊赦開元十一年南郊赦天寳六載南郊赦闕天寳十載南郊赦南郊二貞觀十七年南郊德音朕嗣宗祧夙夜寅畏憂勤在於政道撫育遍於含生十七載於兹矣上𤣥儲祉貞石表瑞朕式修禋燎躬謝蒼昊逮於儲兩亦申䖍奉朔風既切飛雪載零及登泰壇六合開朗神祗介福豈獨在予和樂之慶宜備率土可賜三日酺自漢魏以来或賜牛酒牛之為用耕稼所資多以宰殺深乖惻隐其男子七十以上量給酒米􅋗梁州管内大辟罪以下見禁囚皇太子慮過諸州並遣使人分往唯十惡不在慮限餘皆量情降宥焉景龍三年南郊赦朕聞禘神配祖昊穹著其成命就隂即陽墳典明其大節故豺獺有祭下不隔於㣲品犧牲必陳上以光於嚴配軒皇用事則雍旁五祠漢帝潔齋則城南七里固能使敬而不黷求而不匱我髙祖神堯皇帝開階立極配永循機太宗文武聖皇帝仗金䇿而清四方運璇璣而齊七政髙祖天皇大帝與乾坤合其德與日月合其明則天大聖皇后建補天立極之功受河圖洛書之統五精歸運四葉重光朕䖍順樂推欽承睠命紹宏基於累聖日慎斯兢執大象於羣生夙興如厲逺人殊俗占風而集蠻邸美瑞休符繫日而輝史筆故得三邊靜柝五兵銷刃寰宇大寧人神式序而德慚被物誠謝格天水旱尚臻政刑猶舛永以憂惕無忘鑒昧然則事天事地莫盛乎禋祀弗躬弗親孰申乎誠敬朕自臨四海於今六年幸承祧社之靈未展郊丘之謁方今朔風候律南晷登辰乗上日而恭饗奉髙禋而肅事備殷薦之文行昭報之禮豈唯光靈所燭俱驗其徴方兾後先不違實受其福至若五刑之屬十惡為重自頃恩赦罕聞該及朕以𦕈身膺乎大寳下人不足每切如子之傷上帝所臨敢逃在予之責閒居三月未弭厥􅄽静念終朝載増寅畏侑神伊始與物惟新思崇曠蕩之恩以答髙明之貺可大赦天下繫囚見徒及十惡咸赦除之雜犯流人並放還京文武官及應禁考使别勅陪位官邉州都督刺史諸軍大使副使三品以上賜爵一等四品以上加一級入三品者三品减四考五品减三考聽入外文武有官賜勲一轉闗内諸州無出今年地税令内五品以上各舉堪任州刺史縣令者天下大酺三日景龍三年十一月二十二日開元十一年南郊赦門下朕獲主三靈於今一紀聽政中昃每不敢康觀書乙夜將求諸道頻年巳來毎思至理或逺人不率或嗣歳不登淳朴未還惕厲斯在為人上而慚德奉天明以畏威故祝史正辭必期於陳信郊丘備禮將俟於昇平今宗廟降靈克開厥後乾坤交泰保合太和麟鳯龜龍𤣥符黄瑞之祉蠻夷戎狄梯山航海之琛莫不日月以聞道路相屬顧惟不德承茲休運欽若昭報疇咨故實所以今年獻春恭祀后土季秋吉日追崇九廟採先後於魯經稽肆𩔖於虞典爰因長至欽謁上𤣥告受命之元符昭嚴配之成績大典云備至誠克展諸侯駿奔来於穆之相百神受職率咸秩之文六變巳陳三獻斯畢葢春秋大用莫先乎祀王者盛禮莫重於郊柴燎克終感慶罔極豈予一人之福亦爾萬邦之賴宜因咸和之際俾承厚下之澤可大赦天下自開元十一年十一月十六日昧爽以前罪無輕重巳發覺未發覺巳結正未結正繫囚見徒大辟罪以下咸赦除之其十惡死罪造偽頭首刼賊殺財主不在赦例就中仍慮有寃濫者所司具狀送中書門下盡理詳覆奏聞朕將親覽其有亡命山澤挟藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之昇壇行事官及供奉官三品以上賜爵一級四品以下加一階諸獻官並准昇壇例内外文武官及致仕并前資陪位者賜勲一轉縁大禮有職掌押當者更加一階齋郎並與出身皇親諸親倍位未出身者並放選已出身者賜勲一轉親王公主各與一子官三衛監門黄衣長上飛騎萬騎并仗内雜色人在齋宫􅀫衛及諸色有資勞人縁大禮有職掌并流外行署預見大禮者亦賜勲一轉其充香爐執扇及禮生祝史贊者賜勲外簡選日優與處分兵士􅀫衞齋宫并諸色無資勞縁大禮有職掌及京兆府百姓縁南郊祗應者各免其家一年雜科差南北衛將軍率中郎將􅀫衛齋宫者並同昇壇例其諸軍節度大使及三都留守雖不陪位委寄既重特宜同昇壇官例百歳老人賜綿帛五段粟五石縣令至其家存問給付孝子順孫義夫節婦旌表門閭終身勿事諸州百姓或因逢水旱流寓未安者宜令所司與朝集使即作賑恤安輯法奏聞其單貧衞士畨鎮乆次令州府長官簡擇灼然者放免畨役征行人家州縣檢校勿使侵欺磧西鎮人途路懸逺者特宜賜勲一轉鰥寡惸獨亦令州縣矜恤使得存濟元置義倉救人不足承前貸百姓糧及種子未納者並放免不得却徴自古聖帝明王忠臣烈士名山大川並令所管致祭其已得替官人並轉累未得處分非老弱疾病猶堪處事者量加収録使免失職其左貶官非逆人五服内親及犯贓賄名教者所司勘實奏聞量移近處其官人有清白政術堪任刺史縣令及抱器懷才不求聞逹者州長具以名薦宗室中有孝悌才術為衆所知仍在俾任者委宗正具以名奏君臣一體休戚共焉朕今承天命恭𫝊大寳葢憑累祖餘業得一之符亦由羣公舊勲不二之力永言繄頼其敢忘之自武徳以來實封功臣知政宰輔有身無大故而亡官失封子孫淪屈所由勘實具以狀聞存者可籌其官榮逝者當録其𦙍嗣使幽明同慶知有令辰亞獻邠王守禮終獻官寧王憲各賜物一千段捧俎申王撝夹侍岐王範薛王業各賜物七百疋侍中源乾曜中書令張説兵部尚書同中書門下三品王晙各賜物五百疋正衣附馬都尉王守一王繇温曦宗正少卿崔澄各賜物三百疋二王後賜物一百五十疋壇塲使京兆尹孟温禮賜物二百疋修造羽儀使賜物一百疋修撰儀注官五品以上賜物百疋六品以上賜七十段自餘陪位預宴官一品賜物一百疋二品三品八十疋四品五品六十疋七品四十疋八品九品三十疋鴻臚諸蕃等使與見大禮及在本蕃王侯大酋長同宴會例給賜郡主縣主各賜物八十疋縁大禮數處有職長者任於一頭從髙叙天下州府賜酺三日京城五日前任所在百姓村坊宴樂不得科率聚斂其有處分未該者令所司及本使比𩔖奏聞赦書曰行五百里主者施行天寳十載南郊赦皇天眷命必順於五行哲后馭時實遵於三統考古之道何莫由斯朕欽若上𤣥嗣守丕業察璿衡以齊政念稼穯以勸人日慎一日四十載於茲矣何嘗不夙夜祗畏憂勞在懷思康黎元臻夫至理幸以刑理俗阜天成地平萬方底寧羣物咸遂雖慙大化且謂小康皆至道儲祉宗社敷佑豈予菲薄而克致焉然則上稽歴象旁採輿議爰以土位承漢火行是憑大易之辭用紹前王之烈禎祥累應正閏攸分不改舊章惟新景運屬歳初吉乗時布和是命展祀崇禋竭誠昭報庶叶發生之序載覃雨露之澤可大赦天下自天寳十載正月十日昧爽以前大辟罪以下罪無輕重已發覺未發覺巳結正未結正繫囚見徒常赦所不免者咸赦除之其左降官及流移配𨽻安置罰鎮効力之𩔖並稍量移近處其官已復資至叙用之日不須為累其流人配𨽻并一房家口者所犯人情非切害身巳亡沒家口放還流人及左降官考滿載滿丁憂服滿者亦准例稍與量移其亡官失爵放還不齒及諸色放停解考免與替人等非犯贓唐大詔令集巻六十八
