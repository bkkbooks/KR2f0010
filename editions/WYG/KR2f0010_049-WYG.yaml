body:
  text: 唐大詔令集巻五十九宋宋敏求編大臣將帥命将解琬朔方道後軍大總管制王晙朔方道行軍總管制薛訥白衣攝左羽林将軍擊吐蕃制薛訥朔方道大總管制郭子儀兵馬副元帥制郭子儀東京畿山東河南諸道元帥制李光弼副知行營事制王思禮北京留守制闕郭子儀兼邠寧鄜坊兩道節度使制闕郭子儀都統諸道兵馬收范陽制殘李鼎隴右節度使制李若幽朔方節度使賜名國貞制郭子儀汾陽郡王知朔方行營制僕固懐恩朔方節度使制李抱玉河西道副元帥制馬燧渾瑊副元帥同招討河中制李晟鳳翔隴右節度使兼涇原副元帥制劉洽宋亳兵馬都統制范希朝京西行營節度使制裴度鎮幽兩道招撫使制裴度鎮州四面招討使制命將解琬朔方道後軍大總管制蘇頲門下鼓旗中軍是推元帥熊羆後勁亦屬武臣金紫光祿大夫行左散騎常侍上柱國濟南郡開國公解琬學窮經史才藴韜略握兵之要克壮其猷右領軍衛大将軍兼檢校單于大都䕶鎮守大使上柱國長平郡開國公張知運久鎮邉庭備詳敵勢奪劔之勇隠如敵國並師旅是習獯戎所憚隂陽勝負成誦在心山川向背若指之掌寒膠已折秋草具腓宜屯細栁之營俾作蘭臯之氣琬可充朔方道後軍大總管知運可充朔方道後軍副大總管並准例發遣主者施行先天二年九月二十日王晙朔方道行軍總管制黄門古者獫狁孔熾匈奴寖驕則設以三策雖屬備戎之典方於五材未聞去兵之義不有行者誰能捍之正議大夫行鴻臚少卿上柱國朔方軍副大總管王晙倜儻多智堅剛竭節毎讀前史思齊古人辭家而志滅獯戎報國而躬先将校頃虞南牧城彼朔方蕭關洞開沙漠無事既獲全軍之利則惟保塞之勞嘉其善謀必有成績昔北逐狄者任專而决亦西䕶𦍑者功遂而調用明分閫之重式副齊壇之期朝實僉諧爾其懋往可持節充朔方道行軍大總管仍兼安北大都䕶豐安定逺三城等軍及側近州軍宜依舊列並受晙節制其安北都䕶府依於中受降城安置兵須足食理籍加屯今正農時務及耕種并縁邉兵募亦委量事通融茍非切便即停减總處置訖奏聞即馳驛准例發遣主者施行開元二年二月初五日薛訥白衣攝左羽林將軍擊吐蕃制勅棄瑕録用有國通典捨罪責功先王舊式薛訥藴韜鈐之畧嘗文武之任委以分閫冀静邉塵遽聞喪律實負朝寄准其所犯合置嚴刑言念老臣寛其小衂既赦孟明之罪佇收馮異之功可隴右道防禦大使開元二年八月薛訥朔方道大總管制蘇頲黄門古之合将帥訓甲兵所以宣威武而制邉疆也自非欒卻之裔孫吳之才何以總中軍而絶大漠矣右羽林軍大将軍上柱國河東郡開國公凉州鎮軍大總管薛訥家代名將國朝元老知湧泉原氣横風厲廟堂之上則寛而有謀旗鼔之間則勇而無撓頃者單于地隔驕子天亡衆已離心魁未懸首弔伐大義既憑推轂逋逃殘孽将待覆巢鎮於朔陲屬我南仲宜持節朔方行軍大總管太僕少卿上柱國吕延祚謀慮經逺才明决斷右威衛将軍兼靈州刺史豐安軍使上柱國杜賔客三軍之雄萬人之敵以之入幕孰不師臧曾謂出軍肅兹王命宜並充副大總管節度主者施行開元三年十月十四日郭子儀兵馬副元帥制制昔伊尹與湯合傅説與髙宗合尚父與周合故哲后良臣莫不至合非賢不乂有開必先久大之業也公上畧雄才博信明誼受我旄鉞輯寧區夏典器銘彝髙視前古實邦家之傑豈獨為予社稷之衛可獨弼予節制咨謀安危斯屬懼朕之不稱也往惟欽哉司空子儀可兵馬副元帥主者施行至德二年四月十日郭子儀東京畿山東河南諸道元帥制時屬艱難用勤師旅元帥之任必藉廟謀茍非人傑孰久朝寄兼司徒中書令朔方節度副大使郭子儀風雲有感星象降生秉文武之姿懐經濟之器自兇狂搆禍區宇未寧藴忠貞以立身資義勇而成務加其識度𢎞逺謀慮冲深張飛乃萬人之敵卻縠是三軍之帥故能掃清强㓂收復二京建兹大勲成我王業雖少康嗣位夏靡贊其功光武中興鄧禹集其事以今觀古未足多之但以氛祲未清軍戎是急爰求碩德仗以貞師宜承重委克濟多難可充東京畿及山東道并河南諸道元帥仍權知東京留守乾元二年三日李光弼副知行營事制元帥之任實屬於師貞左軍之選諒資於邦傑自非道申啟沃學貫韜鈐則何以翊分閫而專征膺鑿門而受律求諸將相允得其人司空兼侍中薊國公光弼器識𢎞逺志懐沉毅藴孫呉之畧有文武之才往屬艱難備彰智勇協雲雷而經始保宗社之阽危由是出備長城入扶大厦茂功懸於日月嘉績被於巖廊屬殘㓂猶虞摠戎有命用擇惟賢之佐式𢎞建親之典必能輯寧邦家協贊天人誓余丹浦之師勦彼緑林之盗載申朝奬爰藉舊勲宜副出車之命仍踐分麾之寵仍與天下兵馬元帥趙王係副知節度行營事乾元二年七月原闕郭子儀都統諸道兵馬收范陽制勅朕聞昆夷作患周王授鉞於方叔大宛不庭漢主委兵於廣利則知昏迷之黨舞干不足以懷柔聖哲之謀伐叛必資于用武事將禁暴蓋非獲已司徒兼中書令朔方鄜坊邠寧等節度使代國公子儀慶鍾五百運符魚水挺文武之宏才藴韜鈐之逺畧積蒼生之重望有命代之元勲負鼎和􅅅已申於啓沃登壇制勝實佇於謀猷萬里長城倚賴攸屬今殘妖未殄戎事猶殷爰資一舉之功以靖四方之難宜令子儀都統諸道兵馬使管崇嗣充副使取邠州慶朔方路通往收大同横野清夷便收范陽及河北仍遣射生衙衛前六軍英武長興寧國左右威逺驍騎等左廂一萬人馬軍三千步軍七千人以開府李光進充都知兵馬使特進鄔崇福充都虞候右廂一萬人馬軍三千人步軍七千人以開府儀同三司李鼎充都知兵馬使特進王兟充都虞候渭北官健一萬人馬軍三千人步軍八千人以開府辛京杲充使朔方留後蕃漢官健八千人馬軍八百步軍七千二百人以兼御史中丞任敷渾釋之同充使蕃漢部落一萬人馬軍五千步軍五千人以御史中丞慕容兆與新投降首領奴賴同統押充使鄜坊等州官健一萬人馬軍一千步軍九千人以攝御史中丞杜冕充使寧州官健一萬人馬軍一千步軍九千人以攝御史中丞桑如珪充使涇原防禦官健二千人馬軍五百人歩軍一千五百人以大將軍閻英竒充使蒐乘練卒籍馬賦軍合四方以齊心率九夷而同力金鼔作氣鐵騎争雄欱野噴山殷天動地以仗順之師旅討從逆之兇徒人事天時指期可定今將畧髙闕以出雲中驅蚊蚋於幽燕掃􅍴搶於鞏洛削平天下混一車書然後獻凱清廟䇿勲盟府尅寧區夏豈不盛與兵馬既衆恐路次難為供應仍備六十日程糧十䭾遣發馬畜草料所在量事支供不得妄有煩擾百姓仍委子儀即遣人先於諸道計㑹分數次進發仍與囬紇兵馬椅角相應逐便討除所開軍務應須處置並委子儀續具状奏聞上元元年九月李鼎隴西節度使制勅勇而多謀是資兼領明則益辨實仗宏才開府儀同三司行鳳翔尹兼御史大夫充本府及秦隴興鳳成等州節度觀察使保定郡開國公李鼎成用通明智略深逺攻守之志不憚勤勞報効之誠無忘夙夜頃以岐陽近甸王業大都爰藉政能委之鎮緝下車未㡬克樹竒功冦盗底寜聲謡載洽眷兹隴外戎馬要衝時屬艱虞尤資式遏制勝千里諒在伊人必當振我師徒展兹籌畫兼弱攻昧在此行焉可持節都督鄯州諸軍事鄯州刺史隴右節度營田等使餘並如故上元二年六月李若幽朔方節度使賜名國貞制保大定功事資於𢎞量坐籌决勝政總於中軍令在必行冦不可玩欲清小醜須委大臣中大夫守殿中監賜紫金魚袋李若幽宗室英髦士林楨幹出忠入孝抱質懐文包果斷之深謀藴韜鈐之秘畧累登清貫克振休聲名正西京姦豪屏息紀綱三蜀卭僰乂安庶黎賴其强明縉紳推其利用今河洛之境未殄餘氛晉魏之郊比仍多壘山河襟帶關輔要衝東盡太行南隣魏汭擁旄亘野精騎成羣必俟元戎以清妖孽静言其選允謂當仁地官髙歩於六卿亞相作程於百辟綜斯劇務朝選攸歸宜兼領䕶之權以副師貞之吉可户部尚書兼御史大夫持節充朔方鎮西北庭興平陳鄭等州節度行營兵馬及河東節度都統處置使鎮于絳仍賜名國貞上元元年八月郭子儀汾陽郡王知朔方行營制命将之選當仁實難非夫文可經邦未能安人和衆武可禁暴罔以克敵成功允藉宏才爰申錫命司徒兼中書令靈州大都督府長史單于鎮北副大都䕶持節充朔方節度闗内營田度支營田鹽池押諸蕃部落副大使知節度六城水運使兼邠寜鄜坊等道節度副大使上柱國代國公子儀河嶽間氣巖廊重寳器量深識寛而有謀術應通方用而無滯自經險阻實擁旌旄遂能克復二京折衝千里厥戎将殄時乃之功久勤啓沃載竭忠讜人所望也天實賚予今殘㓂未寜興師頗廣雖鎮守經制已有區分而籌畫指麾必資專制将軍辭第無以家為丞相憂邉思平國難固以訏謨之命申總統之威其将戡定外虞澄清列郡光膺藩屏之寄式崇社稷之勲對揚休命以永終譽可封汾陽郡王知朔方河中北庭潞儀沁等州節度行營兼興平定國等兵馬副元帥仍充本管内觀察處置使餘如故僕固懐恩朔方節度使制工部尚書兼御史大夫隴右觀察處置等使大寜郡王僕固懐恩經武大才濟時良具今以冦窮河洛思用討除宜輟務於西陲俾廓清於東夏可充朔方行營節度使餘如故李抱玉河西等道副元帥制常衮勅周以元老監方伯漢以丞相撫四夷則軍國之務中外一體自華陽而西至於隴坂渉河之右兼控五原總三將之師專萬里之寄詰禁經武宜有統制憂邉謀帥深仗輔臣開府儀同三司行兵部尚書同中書門下平章事潞州大都督府長史知鳳翔府事充懐鄭澤潞觀察處置等使仍充南道通和蕃秦隴臨洮已來觀察處置等使上柱國凉國公李抱玉文以經邦徳以鎮俗孝友忠信人倫模表禮樂政刑朝之訓式以道匡朕允升大猷參聽斷之可否載清静以寜一兼委戎旅屏於方夏智謀變化潜合神明将校悦從親如父子事出韜鈐之外功成戰伐之前勤勞王家以衛社稷有致君庇人之績冠旂常彝鼎之銘故以國之憑倚久任憂患兵車之半悉以與之當不憚煩以時鎮定也可兼充山南西道觀察處置度支營田等使判凉州事隴右懐鄭潞澤等州使如故充西南西道河西隴右等道副元帥馬燧渾瑊副元帥同招討河中制陸贄勅天地殊位君臣異制茍不率道兹為亂常退而増修於是有舞干之義諭以遷善於是有文告之辭若猶不悛乃用致討興戎動衆豈得已哉李懐光擢自軍旅委之節制亟有勞績累加寵榮總衆駿奔自逺赴難解圍逐宼朕甚徳之位極上台寄崇統帥親之若同體信之無間言朕於斯人亦已厚矣而器小任重固貽顛覆有功自棄無過自疑崇信䜛邪却逐将帥養冦資亂蓄姦幸災朕素所推誠尚謂非實優容任過坦然如初㓙徳既盈醜跡彌露謀危社稷通結渠魁公相往來無復避忌窮極凶悖何所不忍朕播遷巴梁逺違陵寝大懼失墜為列聖羞賴先澤在人兆庶知感朔方將校忠節不渝懐光既阻姦謀詭稱効順累陳欵疏請詣闕庭朕深惟舊勲務欲全貸授以師傅之任疇其井賦之食璽書勞問誓以終始懐光遂殺辱使臣完聚守備将以悖慢之罪加於忠義之軍因兹脅從有異同惡謂衆可罔謂天可欺覆載所不容人神所共棄討除大憝招輯非辜爰資輔臣以董戎寄銀青光禄大夫檢校司空平章事兼太原尹北京留守充河中保寜軍節度觀察處置度支營田等使北平郡王馬燧操業端亮氣宇𢎞逺秉難奪之節負不羈之才恒持至公深識大體感激而三軍有勇彌綸而庶績克諧威聲所臨郡邑皆服殿於北土隠若長城元從奉天定難功臣開府儀同三司守侍中兼靈州大都督府長史充靈鹽豐夏等州節度管内度支營田觀察處置押蕃部落等使仍充朔方軍邠寜振武奉天永平等軍行營節度兵馬副元帥上柱國樓煩郡王渾瑊純粹積中仁厚成性藴寛大以容衆存誠信以撫人事必沉詳臨危益辦節惟貞固在險逾彰𢎞濟艱難懋昭勤伐出納朕命光膺具瞻並文武全才安危注意副我憂矚時惟二臣比徳協謀往清多難燧可兼充奉誠軍及晉絳慈隰等州節度并管内諸軍行營兵馬副元帥餘並如故瑊可兼河州尹充河中絳州節度觀察處置等使仍充河中同絳陕虢等州節度支管内諸軍行營副元帥功臣開府本官勲封並如故嗚呼朕之不明不敏失於君道連禍未息勞師靡居中心自咎鬰若焚灼又以朔土之衆大著忠勞横遭汙脅深所憫惜爾其敬敷朕命明諭朕懐務於招綏非黷威武惟輸誠歸順罔有不赦惟執迷拒順罰止元㓙寜失不經無濫非罪列爵懸賞用俟勲賢布告逺邇咸令知悉李晟鳳翔隴右節度使兼涇原副元帥制勅周之元老以分陕為重漢之丞相以憂邉見稱故方岳克寜疆塲不聳安人保泰致理之端今所以重煩上台作鎮西土奉天定難功臣司徒兼中書令充神䇿軍節度京畿渭南渭北商華等州兵馬副元帥京畿渭南鄜坊丹延等州節度觀察處置等使上柱國合川郡王李晟厲精剛之操秉博厚之德識時變通而大節不奪虚受廣納而獨斷自明奉法持身論功先下衆無犯命人用樂從懐德畏威令行禁止誓羣帥於危疑之際駐孤軍於板蕩之中氣凌風雲誠動天地一鼔而兇徒懾北再駕而京邑廓清師皆如歸人不知戰載安社稷功格皇天而明識秉彝清風激俗雅尚恬曠撝謙有光朕以􅊈隴近郊扶風右地川阜連亘抵於囬中限界諸戎屏藩王室所屬誠重允付元臣兼二將之甲兵崇十連之統帥宣威耀德罷警息人俾予仰成時乃之勲可兼鳳翔尹充鳳翔隴右涇原節度兼管内及四鎮北庭行營兵馬副元帥改封西平郡王功臣本官兼官勲如故興元元年八月四日劉洽宋亳兵馬都統制勅論道經邦允歸碩望建牙統衆必藉雄才中外具瞻安危注意今以二柄付之元臣開府儀同三司檢校尚書左僕射同中書門下平章事使持節宋州諸軍事兼宋州刺史充宣武軍節度支度營田宋亳潁等州觀察處置等使仍權知汴滑宋亳等道都統兵馬事上柱國懐徳郡王劉洽秉志端亮飭躬簡儉博厚足以容衆和易足以長人純孝榮親盡忠事國分我閫寄殿於大邦扼制淮夷保鄣楚甸戎㨗繼至軍聲載揚殪羣凶於宛丘殛大憝於梁野控引漕輓委輸京師予嘉乃異勲懋乃貞節用錫丕命俾揚洪休燮贊三台紀綱羣帥式是大任爾惟欽哉可檢校司空同中書門下平章事依前充宣武軍節度度支營田宋亳潁管内兵馬都統散官勲封如故范希朝京西行營節度使制古之命将帥修封疆在於整軍非以耀武故繕理亭障訓齊車徒以申國威以固王畧非誠節茂著無以分統六師非勲績彰明無以并䕶諸將副兹重任實在忠賢特進檢校右僕射兼右金吾衛大將軍充右街使成紀男范希朝有貞臣之節有良将之風識達武經學綜兵要臨事能斷好謀而成嘗領元戎鎮於朔野控河上之塞驅漠南之庭修其政刑諭以威徳士吏向慕裔夷綏懐入覲京師䇿勲王府洎司儆衛禁旅増嚴直道彌彰嘉庸茂著固可以總統北路節制西陲成魏絳和戎之勲振晁錯備邉之策俾異俗率化穡人成功師乘以和烽堠無警懋昭丕績時乃之休可開府儀同三司檢校左僕射兼右神䇿京西諸城鎮行營兵馬節度使封如故貞元裴度幽鎮兩道招撫使制門下夫以區區秦伯而猶念晉國曰其君是惡其人何罪况朕均養億兆為之君親燕人冀人皆吾乳哺而育之者安忍以豺狼驅脅之故絶其飛走盡納網羅止行犯命之誅是用開其一面河東節度觀察處置等使金紫光禄大夫守司空兼門下平章事太原尹北京留守上柱國晉國公裴度昔者區域之中蜂蟻巢聚蔡有逆孽齊有狡童厥初圖征疑議滿野不懼不惑挺然披攘茍無司南允罔能濟佑我憲考為唐神宗實賴股肱運用心力肆予小子䝉受景靈冀服於前燕平於後而撫馭失理盤牙復生求思弭寜中夕有得國老尚在夫何患焉是用亟宣懇惻之誠就加撫招之命於戯頃者師道元濟乘累代襲授之資藉山東結連之勢以丞相布畫於千里之外使諸将持重於四封之中而猶劉悟裂虵豕之軀李祐潰鯨鯤之腹蓋逆順之情異而忠孝之道明也况彼幽鎮無名狂暴以丞相近觀其宜以諸將齊奮其力斧鑕之刑坐迫椒蘭之氣外薫誰不自愛其生焉能與亂同死度宜開懐緩帶以待其歸可依前守司空兼門下侍郎平章事河東節度使充幽鎮兩道招撫使餘如故裴度鎮州四面招討使制元稹門下𫝊云死者不可復生刑者不可復屬是以先王斬一支指殺一犬彘莫不伏念隠悼至於由時决而行之盖不得已也予於鎮人亦既伏念俟其悛革詎止旬時乃命相臣招懐撫諭矜其詿誤示以生門期於盡脱網羅豈可驅之陷穽而豺狼當道荆棘牽衣雖欲歸於有仁厥路無由而至况王師壓境義勇争先朕每抑其鋒鋩未忍覆其巢穴是猶愛稂莠而傷稼穡養癰疽以潰肌膚獨懐兒女之仁慮失祖宗之典今上台居鎮筭畫無遺操晉陽之利兵驅渥產之良馬舉河東義武之衆合滄景澤路之師當元兾受命之初乘田布雪寃之憤舉毛拾芥其易可知兼用威恩尚存招致宜令河東節度使裴度充鎮州四面招討使於戯以一城之卒敵天下之師狥猖狂之徒抗君父之命我哀爾軰死實無名茍能自新亦冀容汝主者施行唐大詔令集巻五十九
