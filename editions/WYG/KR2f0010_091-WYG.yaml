body:
  text: 唐大詔令集巻一百十二宋宋敏求編政事財利用舊錢詔禁鑄造銅器詔議放私鑄錢詔禁京城沽酒勑行乾元重寳錢勑行重輪錢勑令百官議罷新錢詔重稜錢减價行用勑放邕府金坑勑放天下𣙜酒勑減塩價勅條貫江淮銅鈆勑條貫錢貨及禁採銀勑停淄青等道糶鹽勑財利用舊錢詔泉布之興其来自乆實古今之要重為公私之寳用年月既深偽濫斯起所以採乾封之號改鑄新錢静而思之將為未可髙祖掇亂反正爰創軌模太宗立極承天無所改作今廢舊造新恐乖先㫖其開元泉貨冝依舊施行為萬代之法乾封新鑄之錢令所司貯納更不須鑄仍令天下置鑪之處並鑄開元通寳錢乾封二年五月禁鑄造銅器詔古者作錢以通有無之鄉以平小大之價以全服用之物以濟單貧之資錢之所由急也然絲布財穀四者為大若本賤末貴則人弃本而務賤故有盗鑄者冒嚴刑而不悔藏鏹者非倍息而不出今天下泉貨益少布幣頗輕欲使流通焉可得也且銅者餒不可食寒不可衣也既不堪於器用又不同於寳物唯以鑄錢使其流布宜令所在布知鑄錢委按察使申明格文禁斷私賣銅錫仍禁造銅器所有採銅錫鈆官為市取勿抑其價務利於人開元十七年九月議放私鑄錢勅張九齡勅布帛不可以尺寸為交易菽粟不可以抄勺貿有無故古之為錢以通貨幣葢人所作非天實生頃者耕織為資乃稍賤而傷本磨鑄之物却以少而致貴頃雖官鑄所入無幾約工計本勞費又多公私之間給用不贍永言其弊豈無變通往者漢文之時已有放錢之令雖見非於賈誼亦無廢於賢君况古往今来時異事變反經之義安有定耶終然自拘必無足用且欲不禁私鑄其理如何公卿百寮詳議可否朕將親覽擇善而從開元年禁京城沽酒勅為政之本期於節用今農功在務廩食未優如聞京城之中酒價尤貴但以麴蘖之費有損國儲㳺惰之徒益資廢業其京城内沽酒即宜禁斷麥熟之後任依常式乾元元年二月行乾元重寳錢勅錢貨之興其来巳乆葢代有㳂革時為重輕周興九府實啟流泉之利漢造五銖亦𢎞改鑄之法必令小大兼適母子相權事有益於公私理宜循於通變但以兵戈未息帑藏猶虚卜式獻助軍之誠𢎞羊興富國之筭静言立法諒在便人御史中丞第五琦奏請改錢以一當十别為新鑄不廢舊者兾實三官之資用収十倍之利所謂於人不優從古有經宜聴於諸監别鑄一當十錢其文曰乾元重寳其開元通寳著亦依舊行用所請採鑄捉搦處置即條件奏聞乾元二年七月行重輪錢勑九府陳規百王不易或輕為重葢取適時以重為輕用為救弊則有形分龍馬勢冩刀龜子母相㳂變通斯在今國步猶阻帑藏未充重斂乃人困不堪薄征則軍賦未足是以頃令改鑄務於濟時自開元行用以來頗亦公私𢎞益今可於絳州諸鑪加様起鑄更増新郭不變舊文每以一錢用當五十利豐費約實允事宜其錢以二十斤成貫自餘錢監並聴依舊享兹厚利足以富國人安俗阜朕復何憂仍令鑄錢使即勾當起鑄新錢或有奸濫所由奉法何至寛容仰州縣明示錢様切須捉搦勿使違越在京官寮比無俸料桂玉之費將何以堪宜取絳州新錢給冬季俸料即仰所由申請計㑹支給且艱難之際家國當同頃者急在軍戎所以乆虧禄俸眷言優恤恒愧於懐今俯及授衣略為賙給庶資時要宜悉朕懐乾元二年八月令百官議罷新錢詔泉府之設其来尚矣或因時改作則制有重輕往以金革是殷邦儲稍闕屬權臣掌賦變法非良遂使貨物相㳂穀帛騰踊求之輿誦弊實由斯夫易柱調絃政之要者今欲仍從舊貫漸罷新錢又慮權行轉資艱急如或猶循所務未塞其源實恐物價虚騰黎人失業静言體要用藉良圖且兩漢舊規典章沿革必朝廷㑹議共體至公葢明君不獨専法當從衆議庶遵行古之道俾廣無私之論宜令文武百官九品以上並於尚書省議訖委中書門下詳擇奏聞乾元三年三月重稜錢減價行用勑因時立制頃議新錢且欲從權知非經乆如聞官鑪之外私鑄頗多吞併小錢踰濫成弊抵罪雖衆禁奸未絶况物價益起人心不安事藉變通期於折􅇆其重稜五十價錢宜减作三十文行用其開元舊錢宜與乾元錢並行用仍令京中及畿縣内依此處分諸州待後進止上元元年九月放邕府金坑勅𠡠朕聞致理之君克勤於徳不貴逺物所寳惟賢故堯設茅茨禹卑宫室光武捨去寳劒順帝封還大珠朕以𦕈身獲守丕業仰止前王之徳思齊太素之風未嘗縁情於服翫措手於珠玉庶乎捐金抵璧返朴還淳邕州所奉金坑誠為潤國語人於利非朕素懐方以不貪為寳惟徳其物豈尚兹難得之貨生其可欲之心耶其金坑宜委康澤差擇清强官専勾當任貧下百姓採斸不得令酋豪及官吏影占侵擾聞奏當重科貶俾夫俗臻富夀人識亷隅副朕意也大厯十四年七月放天下𣙜酒勅勅朕聞孟子曰國不以利為利以義為利欽若前訓賢哉是言故務徳崇賢理之先也趨本弃末政之興也禹貢以財賦周禮入其貨賄皆贍國用無奪人業漢接秦弊時匱費殷置筭緍之科下𣙜酤之令郡國發奸於下公卿言利於朝賈誼所以云天下之大殘也朕獲奉宗廟之祀永惟淳風猶聞江淮之間頃縁兵食未足𣙜酒収利權以救時雖廣儲畜之資實隳商賈之業方敦禮莭漸致和平豈財悖而入與百姓争利者耶其轉運使下先諸道𣙜酒宜停俾利歸於人化臻知恥仍宣示中外知朕意焉减鹽價勅三代立制山澤不禁天地財利與人共之王道寢微强霸迭興於是設祈望之守興𣙜筦之法以佐兵賦以寛地征公私之間猶謂兼濟歴代遵用遂為典常自頃冦難荐興巳三十載服干櫓者農桑其盡居閭里者杼柚其空革車方殷軍食屢調人多轉死田卒汙莱乃専煑海之利以為贍國之術度其所入嵗倍田租近者軍費日増𣙜價日貴至有以穀數斗易鹽一升本末相踰科條益峻念彼貧匱何能自資五味失和百疾生害以兹夭斃實用痛傷嗚呼朕丕承列聖之緒遐覽前王之典既不克静事以息用又不獲弛禁以便人征利滋深疲甿重困予則不恤其誰省憂應准并峡州𣙜鹽宜令中書門下及度支商量裁减估價兼釐革利害速具條件聞奏削去繁刻杜塞姦訛務於利人以稱朕意條貫江淮銅鈆勅錢貴物賤傷農害工權其輕重須有通變比者銅鈆無禁鼓鑄有妨其江淮諸州府収市銅鈆等先已令諸道知院官勾當縁令􅀄下未盡頒行宜委諸道觀察等使與知院官切共勾當事畢日仍委鹽鉄使據所得數勘㑹聞奏元和年條貫錢貨及禁採銀𠡠𠡠泉貨之法義在通流若錢有所壅貨當益賤故藏錢者得乘人之急居貨者必損已之資趨利之徒豈知國計斯弊未革人將不堪今欲著錢令以出滯藏加鼓鑄以資流布使商旅知禁農桑獲安義切救人情非欲利然革之無漸物或相驚已日之孚在乎消息天下商賈先畜錢者宜委所在長吏分明曉諭令其収市貨物官中不得輒立程限逼迫商人任其貨易以求便利計周嵗之後此法遍行朕當别立新規設蓄錢之禁所以先有告示許其方圓意在他時行法不貸朕志乆定固無二言又有銀之山必有銅鑛銅者可資於鼓鑄銀者無益於貧人適開翫好之端豈救饑寒之患况欲加鑄理須併功得不權其重輕使務専一其天下自五嶺以北見採銀坑並宜禁斷恐所在坑户不免失業委本州府長吏勸課令其採銅助官中鑄作仍委鹽鉄使即作法優賞條流聞奏於戯人之求利厥路固殊斯道炳然言之不惑凡百有位明悉朕懐停淄青等道糶鹽勅兵革初寧方資𣙜筦閭閻重困斯可蠲除如聞淄青鄆三道往年糶鹽價錢近収七十萬貫資費優贍有餘自鹽鉄使収管巳来軍府頓絶其利遂使經行陣者有停粮之怨服隴畆者興加税之嗟犯鹽禁者困鞭撻之刑理生業者乏鹽醬之具雖縣官受利而郡府益空俾人獲安寧我莭用其鹽鉄先於淄青兖鄆等道管内置小鋪糶鹽巡院納𣙜起今年五月一日已後一切並停仍各委本道約校比年莭度使自収管充軍府逐急用度及均减管内貧下百姓兩税錢數至年終各具糶鹽所得錢并均减兩税聞奏元和年唐大詔令集巻一百十二
