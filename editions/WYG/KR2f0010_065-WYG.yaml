  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0010_WYG_065-1a, image: WYG0426/WYG0426-0567a.png}
body:
  text: 唐大詔令集巻七十五宋宋敏求編典禮太清宫太清宫行禮官改用朝服并停祝版勅太清宫改為朝獻薦獻制廟制令所司與禮官議宗廟制令公卿議太原建寢廟詔増置太廟九室詔常薦宗廟薦享别奠樽爵詔太廟五享令宗子攝事詔令兩京各日享廟詔享太廟料外别置牙盤食詔禘祫不廢常享詔祧遷遷獻懿二祖詔親享令皇帝親謁太廟誥明皇即位謁太廟赦親謁太廟錫賜宗支庶官制親享九廟制太清宫太清宫行禮改用朝服并停祝版勅勅尊祖奉先必在於崇敬辨儀正禮所貴於縁情伏以大聖𤣥元皇帝御氣昇天長生久視體重𤣥而不測與元化而無窮真容屢見寳符仍集恭惟𤣥祐實表常存比者太清宫行事官皆具冕服爰及奏樂未易舊名并告獻之時仍陳䇲祝既非事生之禮皆是降神之儀但真俗殊倫幽明異數理有非便亦在從宜自今以後每於太清等宫行禮官宜改用朝服兼停祝版其告獻辦及所奏樂章朕當别自修撰仍令所司具儀注聞奏太清宫改為朝獻薦獻制春秋致享用存昭敬祝史陳信必在正辭茍名謂之或乖於上下而非便經稱崇事易載顒若所以展祗肅明等威朕欽崇道本嗣守丕業每懷如在之誠敢忘奉先之㫖禮或未達情實匪寜承前有事宗廟皆稱告享兹乃臨下之辭頗虧尊上之義靜言斯稱殊為未允自今以後每親告獻太清宫太㣲宫改為朝獻有司行事為薦獻親告享宗廟為朝享有司行事為薦享親廵陵為朝拜有司行事為陵拜應縁諸事告宗廟者改為奏其郊天后土及祝云敢昭告者並為敢昭薦於戲式崇轉禮庶表因心宣示中外令知朕意天寳九年十一月宗廟廟制令所司與禮官議宗廟制朕以不造㷀㷀在疚日月如流皇靈浸逺霜露所感觸目殞絶宗廟之制有國大典皇運之始且事因循今山陵有日遷祔非逺宜允舊章永世作則可令所司與禮官等詳議奏聞貞觀九年九月令公卿議太原建寢廟詔昔周監二代崇文武之典禮漢紹三王尊髙光之功烈斯固有國之彞訓不刋之令範髙祖太武皇帝聰明神武叡聖徇齊應天順民撥亂反正德侔造化道濟區夏靖率土之沸騰拯黔首之塗炭一戎大定四海宅心制治定之禮作功成之樂天地交泰品物咸亨聲教遐播休徴雜㳫蠻夷戎狄之長輻輳藁街麟鳯龜龍之祥光映圖史然猶日慎一日推而弗居邁遂古之鴻名踰前王之至治朕以寡昧丕承景業􅃡惟永往攀慕終天思𢎞尊親之道庶展罔極之志切惟太原之地肇基王迹事均豐沛義等宛譙理宜别建寢廟以彰聖德詳觀漢典抑有成規但先皇遺㫖務在儉約䖍奉訓誡無忘唘處宜令禮官與公卿等詳議以聞貞觀九年十二月増置太廟九室詔朕聞王者乗時以設教因事以制禮沿革以從宜為本取舍以適㑹為先損益之道有殊質文之用甚異且夫至德之謂孝所以通於神明大事之謂祀所以䖍於宗廟國家握紀命歴重光累盛四方由其繼明七代可以觀德朕嗣守丕業祗奉睿圖聿懷昭事罔不䘏祀嘗覽古典爰詢廟制逺則殷周事異近則漢晉道殊雖禮文之不一固敬嚴之無二朕以為立愛自親始教人睦立敬自長始教人順是知政以道存禮從時變將因宜以創制豈沿古而限今况恩以降殺而踈廟以遷毁而廢雖式瞻古訓禮則不違而永言孝思情所未足享嘗則止豈愛崇而禮備有禱而祭非德盛而流永其祧室宜列為正室將使親而不盡逺而不祧廟以貎在宗由尊立俾四時式薦不間於毁主百代靡遷匪惟於始廟所謂變以合禮動而得中嚴禋之典克崇肅雍之美兹在又兄弟繼及古有明文今中宗神主猶居别處詳求故實當宁不安移就正廟用彰大典仍創置九室宜令所司擇日啟告移造開元十年六月常薦宗廟薦享别奠樽爵詔朕以寡德嗣守宗祧雖明發載懐肅恭禋祀踐霜露而興感奉洗腆以増哀每惟宗廟至敬䖍誠祼享而二尊一奠情有未安思革舊章用崇嚴配管子曰禮者因人之情縁理而為之節也故三王五帝禮制不同損益隨時期於通變况罔極之思既展於兹辰終身之慕情深於是日豈可以因循禮經乖違誠敬自今以後宗廟享爵及簠簋豋鈃各宜别奠其餘列饌並依常典乾封元年六月太廟五享令宗子攝事詔宗廟致敬必先於如在神人所依無取於非𩔖深惟至理用切因心其應縁太廟五享於宗子及嗣王中揀擇有德望者令攝三公行事異姓官吏不須令攝開元二十七年二月令兩京各日享廟詔朕肅承宗祀不敢怠遑誠有未安夙夜祗惕頃四時有事太廟兩京同日告享雖䖍卜吉辰但遵上日而義深如在祀或有乖自今以後宜各别擇吉日告享天寳三年四月享太廟料外置牙盤食詔勅祭神如在傳諸古訓以多為貴著自禮經膟膋之儀盖昔賢之尚質甘㫖之義亦孝子之盡誠既切因心方資變禮其自今以後享太廟宜料外每室加常式一牙盤仍令所司務盡豐潔天寳五年四月十六日禘祫不廢常享詔禘祫之禮以存序位質文之變葢取隨時國家系本仙宗業承聖祚重熙累盛既錫無疆之休合享豋神恩𢎞不易之典自今以後每神並於太清宫聖祖前設位序正上以明陟降之禮欽若𤣥宫下以盡䖍㳟之誠無違正道比来每縁禘祫時享則停事雖適於從宜而禮或虧於必備以後每縁禘祫其常享無廢又奉先追逺禮惟昭徳崇福展敬義在因心自今以後獻祖宣皇帝宣荘皇后懿祖光皇帝光懿皇后忌日宜令京城寺觀一日設齋太祖景皇帝景烈皇后代祖元皇帝元貞皇后忌日京城三日行道祧遷遷獻懿二祖詔國之大事式在於明禋王者孝享莫重於殷祭所以尊祖而正昭穆也朕承列聖之休徳荷上天之眷命䖍奉牲帛二十有五年永惟宗廟之位禘嘗之序夙夜祗慄不敢自專是用延訪公卿稽叅典禮博考羣議至於再三敬以令辰奉遷獻祖皇帝神主懿祖皇帝神主祔於德明興聖皇帝廟太祖景皇帝正東向之位宜令所司備禮務極嚴重祗肅祀典載深感惕咨爾中外宜悉朕懷貞元十九年親享令皇帝謁太廟誥誥昔重華嗣德格於文祖髙宻陟后至於神宗葢所以敬履端之元申孝享之道皇帝初嗣大寳允膺休命歡洽人靈慶溢宗社宜躬祗祀典用展肅雍可以今月四日謁享大廟所司准此先天元年十月明皇即位謁太廟赦門下繼明嗣德王者所以承天尊祖奉先聖人所以崇孝故上日之禮著乎重華月朔之祠襲乎受命猗歟作頌發流濬哲之祥清廟昇歌思表配天之業歴選前載可得而言我國家首出開元繼文膺統七代觀德至道洽於生人三后在天世裕光於後嗣太上皇帝道超繫表功軼帝先名言不測於乾行仁智不知於日用累讓神器非以黄屋為尊俯膺太室葢以蒼生屈志黎人於變淳化期登載懷脱屣疇咨菲薄竭讓德之至天睠弗回陳拜首之誠沖襟逾邈遂以寡昧祗踐宸居循顧紹庭載深寅畏爰撰初吉躬展肅雍䖍肆獻之儀申大號之典神保之享斯洽介福之道攸宜億兆同歡人祗同慶恭承聖訓申兹沛澤可大赦天下親謁太廟錫賜宗支庶官制朕聞理莫大於孝所以通神明事莫大於祀所以謁宗廟顧此薄德獲承丕緒恭䖍夙夜弗敢遑寜去歳爰命有司増營太室尋以匠者功就饗禮斯舉雖是效是則率由舊章而不躬不親曷盡誠敬粤自河洛旋於京師聿修齋祭致用蠲潔屬羣方駿奔庶位咸旅祼奠式受感懷載殷聖靈在天若享精意伊爾王公卿士下逮黎蒸道存念兹惠乃錫𩔖七廟元皇帝以上三祖枝孫恐有失官序者宜各與五品京官皇祖妣諸家有子孫今在選序者量加甄録擇内外官三品以上有廟者各賜絹三十疋以修祭服俎豆縁謁廟亞獻邠王守禮終獻宋王憲各賜三百疋夹侍岐王範薛王業各賜絹二百五十疋自餘行禮及供奉三品以上賜一百六十疋四品一百四十疋五品一百二十疋六品一百疋七品八十疋八品六十疋九品四十疋鹵簿六引官各减一等押仗官又减一等攝官依本官給有兼充諸使者加一等兩京文武官并朝集使諸方道表一品七十疋三品六十疋四品五十疋六品七品四十段九品三十段從者加一等皇親諸親准品等禮儀置頓營幕使各賜物一百段副使八十段判官及修定儀注官减三分之二行所州縣刺史上佐縣令等各准行從官與賜其給賜人應兩處以上者從一多給唯有廟官之賜聽兼給謁廟有所修造專當官及當頓官始末不絶者各賜一半上考知頓州各免一年租及地税傍州縁頓供承者亦准此行事齋郎及權補充者各賜物十段升階者各賜物十五段三衛飛騎萬騎并仗内無品人等賜五段十月正蕃衛士等各賜三段縁道路及置營幕損百姓麥苖者宜令州縣檢量優還價直餘應得而制書缺載者所司𩔖例以聞開元六年十二月親享九廟制崇建宗廟禮之大者聿追孝享德莫至焉今宗以立尊親無遷序永惟嚴配致用蠲潔棟宇式崇祼奠斯授顧兹薄德獲承禋祀不躬不親曷展誠敬宜用八月十九日祗見九室開元十一年五月唐大詔令集巻七十五
