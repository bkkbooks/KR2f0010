body:
  text: 唐大詔令集巻五十宋宋敏求編大臣宰相命相七鄭朗平章事制崔慎由平章事制蕭鄴平章事制劉琢平章事制夏侯孜平章事制杜審權平章事制夏侯孜平章事制楊収平章事制于琮平章事制王鐸蕭遘平章事制鄭畋平章事制韋昭度平章事制陸扆平章事制朱朴平章事制崔𦙍崔逺平章事制王摶平章事制張文蔚平章事制楊渉平章事制命相七鄭朗平章事制雲因龍興龍非雲無以施膏澤臣由君用君非臣無以播皇猷信乎際㑹相須以康天下永言良弼常切寤思詳求國楨乃獲時傑通議大夫上柱國賜紫金魚袋鄭朗間代應期禀靈作瑞王室髦彦士林菁英温華凝珪玉之姿磊落負棟梁之任諫垣蘭省常推讜正之風㢘俗登壇克𢡟撫循之績洎領劇務益見藎忠杜邪徑而啟公途懲奸吏而絶私託饋軍無闕贍國有經委以憲綱尤彰直道是宜毗贊大業翊宣景化朕以區區齊晉取霸諸侯率由三賢協心五臣同德况今四海為宅百辟盈廷未能㓂靖塞陲人歸夀域豈無長䇿俾及昇平惕然疚懷莫知攸措肆予命汝往踐台堦勉𢎞濟代之功罔致曠官之誚善調兵食以備我邉虞慎舉典章以貞我庶品敬戒於位惟其有終可工部尚書同中書門下平章事大中十年正月丁巳崔慎由平章事制朕恭守睿圖勵精理道祗勤萬務靡不經心𬗟思垂拱以化成莫若得賢而共濟載勞夢卜果獲貞良大中大夫守尚書户部侍郎判户部事上柱國賜紫金魚袋崔慎由山岳降靈和粹毓德儀標鸞鳯識洞蓍龜文為華國行冠人表朱絃含清越之奏白玉凝縝宻之姿播英聲於士林彰美望於公器洎擢叅内署潤色王猷忠讜盡規誠明納誨既而㢘問南服宣暢皇風盪㓂消災人安政集康一方之疲俗復二職於中臺議論必本於古今趣尚自歸其雅正淛河之右仍歳艱荒一自鎮臨載聞恵化俾司征賦益覩公忠固可以升於台階秉我大柄爰授相印用叅樞務於戲天地之道成歳功者隂陽帝王之基保鴻業者輔相念茲匡贊之大宜竭啟沃之道必使貞百度以振國經凝庶績以𢎞理本茂育區夏統和神人允資魚水之諧克致休明之運永綏厥位無忝諸臣可守工部侍即同中書門下平章事大中十年十二月蕭鄴平章事制輔相之任也調隂陽而撫夷夏貞百度而康兆人代天工為持國之柄殷夢周卜竭誠待賢伊何人哉予獨不可寘於精懇果得髦傑朝㪚大夫守尚書兵部侍郎判度支上柱國彭城縣開國男食邑三百户賜紫金魚袋蕭鄴天實佑朕生此令人星辰降祥珪玉含瑞藴通明經逺之識抱宰制利用之才載居禁垣重參宥宻資委既至忠讜愈聞爰付地征仍司邦計善為均節益茂事功道惟剛明人無侵撓風望彌峻遐邇具瞻思致昌期必資俊德是以簡自朕心叶於僉諧擢登中樞持平庶政爾其體太和而順元氣推至心以序彞倫短長之才罔有所廢細大之務一以居心扶皇極而作國楨庇蒼生而遂物性雖堯舜比聖朕豈敢言而夔龍致君爾無多讓周以冢宰致國用漢任丞相調兵食斯舊典也爾其𢡟建嘉庸對此崇寵可守本官同中書門下平章事仍判度支大中十一年七月劉琢平章事制闡大化以建皇極敷至德以乂黔首百度惟允八荒用寧倚於輔臣付以邦柄求之夢獵協於蓍龜克諧明謨允屬僉議稽能必思於廟畧疇德佇煥其國經朝議大夫守尚書户部侍郎判度支上柱國賜紫金魚袋劉琢岳彩舒輝鸞姿降靈馭煙霄而六轡齊昇布雲和而九成合奏行居人表文著國華潤色詞林早叅宥宻彩筆既符於夢卜温樹不漏於私言再秉絲綸貳於刑讞振藻益茂聽詞無寃洎尹正洛師擁旄梁苑咸能變風俗而求人瘼和號令以肅軍威重委北門輯茲王業既聞報政果叶予懷是用付以煩難慎司邦計彌月探執繫時功成已洽咎夔之風宜膺台階之命爾其平章百姓揚敷五教使羣職必舉四夷率賔杜回邪之迹開讜正之門大道必寘其沃心忠信無懼於逆耳於戲小大之政既巳咨之成務且輟於司存均節尚煩於廟筭佩我明訓服茲休嘉可中書門下平章事依前判度支大中十二年正月夏侯孜平章事制自古有天下得列聖帝哲王之科者必由良臣以就景化故君非輔弼無以啟昌期時未清平不得稱賢相契合交感相須而成茍非其人豈副斯舉朝請大夫尚書兵部侍郎充諸道鹽鐡轉運使上柱國賜紫金魚袋夏侯孜禮樂重德簪裾上流才兼神器智可周物藴範時之行義富經國之文章誠探奥㣲器抱冲粹早彰清烈克著令名用當七月匡諫無隠冄歴三獨禮䋲不回㢘風俗而政清提紀綱而望振旋領版籍亦司牢盆推公秉持息力完緝法得其倫要吏憚其威稜國財可豊官事具舉是用陟此邦傑付之廟謨既諧朕心且洽僉論於戲宰輔之臣羣倫共瞻政乖其宜則四海罹弊事叶其序則萬人以蘓副吾㧞擢之恩勵爾爕諧之道朝廷聳望爾其戒之可中書門下平章事轉運使大中十二年四月杜審權平章事制天設四序運寒暑而成歳功國有三台仰弼諧以助君道安危是繫選任攸難况朕渉道未明纂圖方始詳求英彦思付洪鈞至誠感通果獲良輔翰林學士承㫖通議大夫守尚書兵部侍郎知制誥上柱國賜紫金魚袋杜審權喬岳望崇澄波量度禀五行之秀氣挺百仞之貞材虹玉潛輝龍泉藴利文窮騷雅學洞𤣥儒毛价有古人之風邴吉得大臣之體自便蕃華貫揚歴清途南宫擅視草之工西掖茂掌綸之業洎司文柄俾以掄才全任至公號為得士甘棠㢘問衆著謳謡秋卿恤刑事無枉撓先皇帝因藉其令譽擢處禁林振藻屬詞發揮神化道一貫於終始器兼適於圓方逮余建統屢承宻㫖每多𢎞益彌見慎修既彰巳試之能宜𢡟殊常之寵是用委茲大政列在中樞為朝廷之表儀實人臣之極地爾尚竭乃心力作吾股肱借箸必罄其嘉謨推局罔遺於善筞用無黨之道行惟一之心使爵位功名並光竹帛垂於不朽副茲寵榮徃欽哉可守本官同中書門下平章事大中十二年十二月夏侯孜平章事制篙楫克修航艦以之濟海羽翮可厲鵾鴻於是摩天朕恭已寰瀛勞誠夢獵將以篙楫賢輔羽翮寳臣踵三代至理之英濟羣生普洽之欲載仗舊德期獲我心劍南西川節度副大使知節度事管内觀察處置統押近界諸蠻及西川八國雲南安撫等使光祿大夫檢校尚書右僕射同中書門下平章事兼成都尹上柱國譙郡開國公食邑二千户夏侯孜大昴分精維嵩挺秀擅四海之賢俊作中朝之表儀禮樂詩書資其懿範温恭孝愛輔以多才服道而致身含章而底力經國之用貫百川而不改其清應物之明體萬象而莫窮其照周踐華列多識舊章郎署諫垣休聲夙振東陽故絳惠愛洽聞洎甘棠政成天府徴命兼領臺轄之任再居邦憲之尊正色無私當官必舉總征賦以贍國幹山澤而富人美利無遺嘉猷益覩積是朝德昇於台司内竭謨明外𢎞體理馳咎夔之極摰陋周漢之遐蹤克彰為輔之聲允協有開之契屬者以西南重鎮邉徼多虞爰賴専征以隆外閫福星時雨既惠巴庸景化元和須歸鼎鉉是用召於馹騎待以天工重開集鳯之池再仰問牛之化弼諧萬務師長庶寮亟付機衡俾康區夏於戲刀非礪不割魚非水不行為君誠難得時甚易决疑定計吾以爾為神龜肥國救人吾以爾為上藥盡布四體𢡟堅一心勉哉勿疑對揚休命可尚書左僕射同中書門下平章事咸通三年七月楊收平章事制古先聖哲之御天下也莫不勞於擇賢逸於恭己是以巖求匪易殷代稱宗畋獲甚難周王膺命肆朕在位天授正人於言語侍從之間得亮采惠疇之美固亦髙邁前烈垂休當朝敬遵用汝之言爰舉弼予之典雅符不讓斷自無私翰林承㫖朝議大夫尚書兵部侍郎知制誥上柱國賜紫金魚袋楊收器茂渾金寳欽大玉瑩清氷於溽暑挺緑桂於嚴霜行過曽顔道兼夷惠文冠一時而若非游藝學窮千古而似不能言自鴻飛名塲鷺振班列憲署毎聞其守法曲臺咸著於推公所蒞有聲歴試皆可用彰簡要巳洽譽於含香業擅精㣲遂騰輝於視草戒慎攸至初終不渝常懷造膝之忠備見沃心之㫖謝安體識王儉才能動為僉論所諧居溢具瞻之望由是擢於禁苑升以台階俾申匡輔之勤用畀燮和之重爾其慕伊周之治𢎞臯益之謨九流既分百辟斯正嘉猷可舒於前席妙畧尚在於止戈式序三才允歸一德𢡟乃致主副予知臣無使載筆之休獨稱於姚宋也可守本官同中書門下平章事咸通三年三月于琮平章事制在天垂象常星既列於三台惟國建官庶政攸賴於四輔朕每思至理益慕無為茍非正人莫付大柄爰得非熊之兆乃遵審像之求契予知臣命爾作相銀青光祿大夫尚書兵部侍郎充諸道鹽鐡轉運使駙馬都尉上柱國于琮識洞蓍蔡文窮典謨居然國華蔚為人瑞自䇿名筮仕淑問益髙伏蒲彰正直之名起草著經綸之績由是道光獨立業擅自强勇退無儔謙光有裕朕早聞博雅堪備論思擢於南宫置之内署果能恪慎副相端貞益實多繄賴洎出貳司冦亟居版圖見君子之盡心表才之果醝府任重爰専之積弊潛聞其日除嘉庸顯彰於歳計咨爾全美為予誠臣歴試如斯僉諧所至是宜升於輔相付以燮和惟賢式契於周官𢡟德雅叶於殷誥且有成計爾其聽焉夫舉直則百度可貞推公則彞倫攸叙進善孤寒不棄用才滯屈自伸克勉斯言是為良弼敬承休命往其欽哉可守尚書兵部侍郎中書門下平章事駙馬都尉咸通八年七月王鐸蕭遘平章事制門下五帝垂衣本資乎輔弼三王御宇必藉其謀猷誠聖哲之規章實邦家之軌範然則得其人則天下致理輕其任則海内多虞興廢之端古今斯在開府儀同三司行太子少師上柱國晉國公食邑三千户王鐸台階降瑞昇位呈祥峻極承天清暉助日保道德而立性因文章而飾身良玉重貞精金百煉道惟經濟自西號以安人術本匡時辭東山而為國洎歴揚中外出入班行栖息鸞臺優游鳯沼榮膺三事冠絶羣寮致君之業彌深及物之功益著朝㪚大夫守尚書兵部侍郎判度支上柱國賜紫金魚袋蕭遘紫庭鍾律𤣥圃琳瑯韻協金莖光昭袞蔽自精通藝行履歴清崇逸翰摩雲髙踪絶地近者臺稱綢職嵗計成功霜威已戢其奸邪日用無虧於饋輓昨以東隅㓂盗嘯聚為羣俶擾闗防奔衝畿甸朕廵遊梁冀將復京都欲救生靈必資賢相乃朝廷碩德社稷誠臣載君之力無窮許國之心益勵是使重敷五教爰總萬機勿弃前修無忘厚奬乃孤標特立潔白不渝利可剸犀清能鑒髦輔成乾道兼領冬曹各副憂勤可安宵旰鐸可門下侍郎兼司徒同中書門下平章事㪚官勲賜如故仍令所司擇日備禮册命遘可銀青光祿大夫守工部侍郎門下平章事仍落下判度支事主者施行中和元年正月鄭畋平章事制門下任賢勿貳有國之令圖惟帝念功昔人之善訓朕遐觀往代每慎厥終其有道濟邦家任巳崇於屏翰忠存宗社義可貫於神明宜徴帷幄之謀重委廟堂之筭冀清大難以啟中興開府儀同三司守太子少傅分司東都上柱國滎陽縣開國侯食邑二千户鄭畋八柱比崇三階垂輝繁露演先儒之學髙風追大雅之文外標威鳯之儀内貯函牛之量煥如綸之㫖共許才髙被貝錦之詞彌彰道直體茲全德歴試崇資燮贊中樞極致君之事業鎮臨輔甸標坐樹之威名洎虜犯封畿塵飛象魏避狄之謀既决㣲管之賴誠深而能竭預慮之機用安君父舉從權之計以悞奸兇當代之勲格天比盛此際咸思義舉盡藴忠謀且聞盟主臧洪登壇有誓將軍祖逖擊楫忘身致蕃漢之齊驅由懷柔之有術今則不從人望内斷予衷罷列岳而登三公自金壇而昇玉鉉魚水之懽盡在君臣之契可知於戲寰宇未清予則仗綏懷之毗園陵失守予則佇収尅之功次則揚恵化以拯窮人𢎞無私而叙羣品山河有誓金石豈渝更候殊庸以膺極寵可守司空兼門下侍郎同中書門下平章事充太清宫使𢎞文館大學士餘如故仍命所司擇日備禮册命主者施行中和二年二月韋昭度平章事制門下朕聞先王之命相者調爕隂陽則四時順其序均和品𩔖則萬物適其宜然後扶危持顛易亂成理俾生植咸遂邦家充寧故周卜帝師得諸渭水殷夢賢佐求之傅巖我擇股肱爰獲侍從翰林學士承㫖銀青光祿大夫行尚書兵部侍郎知制誥上柱國韋昭度誠貫金石行通神明氣含元精識同蓍蔡窮文武施張之道作棟梁舟楫之資為時間生作我良輔洎昇名俊造歴官清華鴻翥九霄驥逸千里旋參宥宻備著聲猷使我語言進三代之風使我典則符百王之法當風雨之如晦勵節敬恭念艱難之在途夙勤晨夜臨難得近臣之體効忠彰明哲之心是用總以萬機納於百揆作邦之楨秉國之鈞若魚水之相歡諒雲龍之合應君臣之道今古攸同於戲竊逆㴞天兵戈㪚地宫朝未復宗社靡寧爾宜動察安危居圖匡濟設六竒之秘䇿發三畧之沉機定元兇於一戎振頺綱於四裔紹貞觀太平之業啟開元中興之期光贊一人永阜羣庶勉集盛烈克勤公家往欽哉敬服休命可守本官同中書門下平章事勲賜如故主者施行中和元年七月陸扆平章事制門下昔在太宗時則有房杜持國鈞在𤣥宗時則有姚宋司政柄降於列聖代濟君臣是知股肱元首之間未有不相資以成者也况我薦逢難運方計叛臣宜搜間代之英冀適濟時之用其有懷材已試亮節孔彰俾膺霖雨之求斯正彞倫之叙式舉茂典吾無所試翰林學士承㫖銀青光祿大夫守尚書左丞知制誥上柱國嘉興縣開國男食邑三百戸陸扆簡節正音温光瑞玉咸濩抱降神之韻珪璋挺華國之容包倚相之典墳紹平原之詞藻爰自髙材赴召丹地代言絲綸必本於典謨獻納巳觀其事業仍歳扈和鑾之狩六年専詔誥之勤讜正自持門望彌峻况爾伯祖贄昔以才行嘗居禁林當德宗避敵之秋實廼祖納言之日積其偉節昇於鼎司書命諌章流在人口是用選自宻勿陟之台衡昭於前光期以後効執我大柄貳茲地官既表殊恩且有丕訓於戲奸兇尚熾干戈未平生靈流離宗社榛莾爾其舉墜典正頺綱進賢良逺奸慝勿依違而避事無拱黙以樹恩庶乎艱難有望康濟往踐乃位敬而戒之可尚書兵部侍郎同中書門下平章事乾寜三年七月朱朴平章事制韓儀門下夢傅巖而得真相則殷道中興獵渭濵而載獻臣則周朝致理是知顯諸仁而藏諸用君子但守其沉機懷其寳而迷其邦大器曷虚其顯位朕自逢多難渇佇英賢暗禱鬼神明祈日月果得其哲輔契予勤求朝㪚大夫守國子毛詩博士上柱國賜紫金魚袋朱朴學業優深識用精敏久回翔而不振彌貞吉以自多朕知其才遂召與語理亂立分於言下聞所未聞兵農皆在於彀中得所未得不覺前席為之改容須委化權用襄昌運是乃振於庠序陟彼鈞衡自我㧞竒寧拘品秩於戲時風甚薄國歩方難兵戈未息於近郊經制日隳於故事宫闕焚蕩邑里凋虛外則未殄元兇内則未凝庶績整我綱紀成我雍熙百度羣倫俟爾康濟勉思敬戒以服寵章可朝㪚大夫中書門下平章事上柱國賜紫金魚袋乾寜二年八月崔𦙍崔逺平章事制門下擇股肱良臣為社稷大計斯實安危之本必資經濟之才應星象以調三台平隂陽而調六氣成彼非熊之兆叶茲審象之求既偶通賢爰申並命扶危匡國致理功臣新授武定軍節度湖南管内觀察處置等使金紫光祿大夫檢校禮部尚書同中書門下平章事持節都督潭州諸軍事兼潭州刺史上柱國清河郡開國侯食邑一千户崔𦙍公台貴冑禮樂名門秉直道以匡時挺貞觀以華國玉山孤峭逈出千峯氷鏡澄明能涵萬象翰林學士承㫖銀青光祿大夫行尚書兵部侍郎知制誥上柱國博陵縣開國男食邑三百戸崔逺珪璋藴德鸞鶴呈姿持偉望以標竒藴神鋒而匿耀朱弦逸韻既可禮天寳劍雄鋩宜乎折滯或繼應倚注屢執鈞衡或亟處深嚴嘗司詔誥燮理茂績敏嘿嘉名昭布朝倫洋溢休稱而體國勵志問牛之美早𫝊戴君盡誠吐鳯之名夙著宜陟重任詳觀厥能升諸喉舌之司寵以鑪錘之用專秘殿之圖籍度㑹府之財征俾操化鈞仍綰邦職當此艱難之運爰繄輔弼之功噫未復神州尚茲多壘仍歳有征廵之役兆人懷蘇息之期予心浩然罔知克濟咨爾良弼共成懿圖勉膺三事之榮恪奉一時之寵𦙍可守中書侍郎兼户部尚書同中書門下平章事集賢殿大學士判度支逺可守本官同中書門下平章事判户部㪚官勲封並如故乾寜三年九月王摶平章事制韓儀門下朕聞軒轅得力牧而為五帝首夏禹任臯陶而為三王祖雖不言而化自契於𤣥功而端拱仰成實咨於哲輔况有嘗持大柄久竭訏謨振寅亮於巖廊立惠廸之軌躅俾仍舊貫再委平衡斷自朕懷用符僉屬扶危匡國致理功臣新授武勝軍節度浙江東道管内觀察處置宣撫等使金紫光祿大夫檢校尚書右僕射同中書門下平章事使持節越州諸軍事越州刺史上柱國開國公食邑三千户王摶道潔秋霜文含春彩動不渝矩立必正方行中孚絶𩔖之貞保大有匪躬之節訥於言而敏於行深耻名浮竭其力而致其身惟將道勝頃歳朕察其才智可委鈞衡㧞自貳卿升之四輔果能推誠匡國罄慮憂時敷沃心之嘉猷進苦口之良藥洎汧岐叛渙京師戒嚴罔懼觸鱗屢陳逆耳且摶以明君待我故每敢極言我以忠臣任摶亦當加奬納深知盡瘁永用寘懷自鑾輅省方艱危扈蹕澄心無撓臨事應機為時而生信非虚語昨以初清鏡水新蕩稽山慎擇周材以康疲俗是用掇於台鼎俾踐師壇念卿前後奏陳有犯無隠吾雖不敏深諒至忠静復斯言皆合朕意讜正之言乆而彌芳雖浙右之瘡痍誠思惠養顧岐陽之妖逆尤藉機籌宜歸班瑞之符却秉代天之筆爾宜内凝庶績外殄元兇勉精醫國之謀報我知臣之德天官重位光祿崇階兼以命之用旌寵數服茲休命可不慎歟可光祿大夫吏部尚書同中書門下平章事功臣勲封並如故乾寧三年十月張文蔚平章事制門下古者明王居億兆之上慮弗用乂兢兢業業卜選夢徴思得全才俾謀共理付之台鉉仰以和平既諧作礪之求允繼非熊之兆銀青光禄大夫行尚書禮部侍郎上柱國張文蔚宇量冲穆襟靈坦平而又凌轢清華騫翔顯重久居内署備著芳猷論事而髙議昇平扈從而志堅尊奬視草著博通之業寡言彰慎宻之規朕乃掇自翰垣委之大柄克盡搜揚之道頗開公正之門是用列在鼎司咨之袞職爾其研求理道精錬事機盡當朝贍國之謀究前代銷兵之術書載伊尹實惟阿衡今倚任之亦惟若是敬乃於位思其有終可同中書門下平章事餘並如故天祐二年三月楊渉平章事制門下持鈞軸以燮隂陽是資至德掌地征而富邦國必仗通才難虛作礪之求式叶為霖之望金紫光祿大夫守尚書吏部侍郎上柱國𢎞農縣開國伯食邑七百戸楊渉代襲軒裳業通墳典踐履華胄周旋大僚陳太丘雅尚清貧葛稚川不貪榮祿綽有休問喧在羣言往典貢闈則文行兼採近司銓管則清濁咸分至必可稱動皆垂範朕嗣丕祚䖍思小康是用授以鈞衡委之征賦爾其克申藴蓄用副旁求使干戈速偃於四郊玉帛斷歸於内帑仍司仙殿更重化源勉輔冲人臻於理道可尚書吏部侍即同中書門下平章事充集賢殿大學士判户部事㪚官勲封並如故天祐二年二月唐大詔令集卷五十
