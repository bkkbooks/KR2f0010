body:
  text: 唐大詔令集卷八十六宋宋敏求編政事恩宥四曲赦京畿德音大中十三年正月赦咸通七年大赦咸通八年五月德音咸通十二年五月疏理刑獄敕光啓三年七月德音時令令史官條奏每月應所行事詔嵗初處分德音開元二十四年嵗初處分制闕恩宥四曲赦京畿德音王者愛人如身推己及物恤其寒燠之苦適其舒慘之宜俾叶太和用臻至理恭默思道憂勤在懷時屬嚴沴念深徽纆當霜雪之候滯囹圄之中饋餉為勞逮捕斯擾沍寒所迫愁嘆必多惻然疚心思有矜憐宜布在寬之令使無留獄之嗟應京百司及畿內諸縣見禁囚徒應犯死罪特降從流流以下者遞減一等如欠負官錢情非巨蠧責保填納不要禁繫唯故殺人者及官典犯贓不在此限仍委京兆尹及諸司官長制下當日速決聞奏朕司牧黎元存誠康濟封甸殷廣京師浩穰憫觸法以罹辜式加恩而宥罪庶止無告寧失不經宣示中外令知朕意大和八年十二月大中十三年正月赦天將發生萬物也則必假以暄妍潤以風雨王者之在宥四海也期必滌其瑕穢施以渥恩固頻啓於幸門豈無彰於皇澤朕以菲德獲纘丕圖常慕唐堯之無為漢文之恭儉宵旰不暇乙夜觀書萬務靡有不親一夫尤慮失所兢兢業業不敢荒寧十有四年至於兹矣每懼風俗之未厚賦役之尚繁政令之未明刑獄之多濫思用克濟浩無津涯上荷昊穹垂休宗社深祐下賴股肱翊化嶽牧懋功五稼屢登四夷內附懷仁庶同於行葦納諫無愧於從繩俾疵癘不生飛翔遂性日月所燭庶為小康顧豫寡昧何以臻此近者藩方之任撫理或乖泯棼日聞俶擾相次雖興師殄寇本於為人而殘殺戕生良多愍納而又緣河數郡暴水成災念其蕩飄深自憂軫乘此三元之慶宜宏肆眚之恩可大赦天下自大中十三年正月一日昧爽以前大辟罪以下罪無輕重咸赦除之唯十惡叛逆故殺人官典犯贓不在此限咸通七年大赦我國家膺天明命光宅萬方二百有五十載矣梯航所及昭顯於夏殷文軌攸同敻逾於漢晉朕承十六聖之業居億兆人之上猥惟眇身祗荷丕構逺奉貞觀開元之至理近宗憲祖宣考之宏規常慕雖休勿休豈敢自暇自逸然而仁不遂於百姓德不參於二儀莫致感通更延災沴近者兵革未弭蟲蝗相仍方懷徴發之勞又獲已飢之歎雖頻加錫賚纍有蠲除尚慮澤未遍通信未旁及是用連宵假寐每食忘餐思所以拯我黎元臻其夀考或多方以革弊盡慮以鼎新庶或上下咸從人欲况善為國者以好生為首行王道者惟憫物是先茍可勝殘去殺亦冀止戈為武於戲誠明之旨既悉於斯渙汗之恩夫何所愛可大赦天下自咸通七年十一月十日昧爽以前大辟罪以下已發覺未發覺已結正未結正繫囚見徒罪無輕重咸赦除之唯犯十惡叛逆以上故殺人官典犯贓不在此限持杖打劫必欲害人茍遇支敵必行殺戮拒敵追捕肆意姦凶并故殺人者雖已傷未死已死更生意欲殺傷偶得免者並同殺人法處分其賣毒藥開劫墳墓及别獄之內官吏推斷不平因成寃濫無問有贓無贓不在原宥之限朕君臨四海子有兆人常恐萬類之中一物失所况雲南素推誠節久慕華風顧帥臣撫御乖失不諭朝旨遂令侵擾邉隅初陷交邑旋侵越嶲積移星嵗彌縱干戈靡思量力之言曽無事大之禮軼我疆理勞我隄防爰用徴兵諒非獲已鋒創之下必有殺傷每念於懷良深慚悼寧屈已以徇衆不窮兵以害人斷自豫懷更宏招諭應南安雍州西川等道諸軍兵士各守疆界不用進師乃委劉潼審詳事機明加曉諭如能重修和好信使如初朕當虛懷一切不問雲南先差專使昨已有詔旨處分其先配𨽻習讀質子各本道供給續當指揮安南雍管西川三道將士皆踰山越海擐甲荷戈志切勤王誠深報國固內侵之封域收已失之城池盡欲捐軀咸思賈勇深明厯數終始一心言念忠勤誠用嘉歎今南蠻已加撫招冀就弭寧日下但嚴守封疆且備要害雖未用更圖攻討亦未可便絶訓齊其將士等義感風雲志諧金石屯營既久立效已多大功將成懇節無奪候其歸欵别有指揮仍委劉潼髙駢李耽等具此慰勞以副豫懷其三道軍糧地界懸逺致其盡力當有充腸如諸道戎兵未免飢餒因之殞命尤用傷懷宜令常宙劉潼嚴加條疏丁寧期限無缺供饋或致失時其赴府三道行營兵有親老及妻子在家者各委本道切加存恤勿使凍餒悽惶俾無回顧之憂以勵當鋒之志其諸將士勇敢用命當鋒歿身義節可嘉孤弱是念並委本道節度使據所申報各須安存如血屬單弱不能自存者即厚加給恤遺骸在野深可憫嗟今春已降德音盡令優給收葬尚慮暴露未契幽隂今更舉明用慰泉壤宜令所在長吏訪尋收斂如法瘞藏仍以酒醪殷勤奠酬應三道兵士經過纍路州縣供應頓遞徴配閭里水程船夫陸路車役勞弊斯甚疲瘵可哀其嶽州湖南桂管雍容管內沿路州縣今年二月二日德音已蠲放今年夏秋兩稅各一半尚恐鄉村未泰更要加恩宜於今年夏稅正錢每貫量放三百文沿路州縣亦甚凋傷先未霑恩今須優假宜於來年夏稅正錢量放一半仍各委本處長吏親自點檢明閲薄書勿使恩不布於疲羸幸或生於桀黠副豫深意必及逺人誠信之道蠻貊可行茍或未孚其肯懷惠應安南雍州容州黔南西川諸溪洞酋長首領務加優恤諭以恩信若須節級頒賜官秩賞給者委當管速具分析聞奏京畿之內蝗旱為災稼穡不收凋殘可憫其京兆府今年青苖地頭及秋稅錢悉從放免仍並出內庫錢二十四萬五千三百六十餘貫賜官府司充填諸色費用河南及同華陜虢等州遭蝗蟲食損田苖奏報最甚除合放免本色苖子外仍於本户稅錢上每貫量放三百文如今年秋稅已納即放來年夏稅其諸道有蝗蟲甚處並具奏聞亦議蠲減其河南府水災之後仍嵗飛蝗想彼蒸黎尤多凋瘵宜别賜鹽鐵河隂人運米三萬石委崔璙充諸色用其諸道州縣應有逋懸兩稅斛斗青苖地頭𣙜酒等錢既存書簿不免徴剝咸通三年以前者並一時放免從四年至七年其中有準敕蠲者亦不得因此重徴京畿之內供億事繁色役差科曽無虛日黎人困苦深可憫傷更有逋懸日久徴迫無由收斂徒繫簿書應京兆府諸縣從大中八年後至咸通六年應欠諸司稅草斛斗糖棘番匠知食使玉蘇及府司欠延資并度支户部錢物及賑貸折糴粟并諸縣欠填省修堰埭等錢匹莊宅監察使拆寺并佛堂材木樹等價及欠左右神䇿軍捉賊賞錢及諸縣應欠咸通三年至六年合送府夏秋稅錢物斛斗并趙越莊田地租及諸縣咸通三年至五年賑貸粟并長安縣大中八年先借太倉粟充賑貸除已納外餘欠斛斗等並從放免兼簿書一時毁序從今年以後别立帳內庫一年支放費用雖廣有司積久追呼固多虛繫簿書頗為煩弊朕方宏儉約深軫凋殘特示優矜用蠲逋責應度支積欠大盈庫年支匹假絲錢從太和八年以後至咸通元年以前並宜放免及欠瓊林庫年支金銀錫器銀稜器皿雜物等自開成五年以後至咸通元年以前並宜放免左降官量移近處已經量移者更與量移如後資者任取本官選所數集丁憂放還者服闋日各與量移并别敕因責降除正員官所司亦與處分其左降官及流人先有官者如已亡歿各還本官失爵痕纍禁錮者並從洗滌左降官并流人元敕令終身勿齒及長流逺惡并云縱逄恩赦不任量移者並與量移如已亡歿者並許歸葬如緣葬事困窮不能自濟者委所在官吏量給棺櫬優恤發遣中外前資見任官中其有頃因瑕纍未階録用者并左降官如事情可恕才行足稱者委中書門下量加簡拔隨能録用戎狄欵塞邉陲無虞或使臣因備制弛慢切在搜訪利病濟便兵農勿以久安遽忘逺慮所宜常加備境每切訓戎將宏綏撫之功須為經久之計其邉上方鎮本軍兵數節度使皆位崇元帥誓立殊功必能閲軍實以靜邉撫單寒以和衆素有定額固非空文然亦慮或過犯逃匿死亡停解不便招募缺額遂多並須檢勘分明仍委御史三司院並加察訪即時聞奏江淮諸州百姓只合輸本分苖稅不合分外差科多為所在長吏權立條流臨時差配或強名和市都不給直自今除納本分苖稅外一切禁斷牧守之任慈惠為先欲安逺人須求亷吏如聞雍容桂廣等道管內刺史每州皆管三縣人户不少其間選用尤要得人訪聞本道觀察使所奏監州官多是本土富豪百姓兼雜色人例皆署為本道軍職或作試銜便奏司馬權知軍州事既不諳熟文法又皆縱恣侵欺多取良家以為奴婢遂使豪酋搆怨溪洞不安若不條流生人轉困其雍容桂廣等道管內自今以後刺史必須精選賢良久歷官途不越資序者然後許奏請其軍職試銜並不在奏署限藩條之例刺舉是資郡政之方邑宰是選斯紀綱具設次第相臨茍皆推公必無敗政如聞近者亷車殊無刺舉牧守率務并容邑宰非才疲人罹弊必在懲革以惠惸婺自今以後委觀察使專刺舉之職如郡守不理或臨財不亷酬飲是營獄訟靡息以時奏劾按罪定刑如藩方不謹察亷或致下人上訴推覆得實觀察使别候敕旨本判官逺加譴罰其郡守亦仰察訪縣令如或有過不舉停任後别有處分録事參軍重加削罰如刺史縣令有異政灼然可舉者仰其録奏必議超升人命至重在慎典刑國章茍隳必多枉撓近日執法之吏罕得其人或制敕不行曽無提舉或姦巧為患莫能辨明遂使可死者生可生者死而又縲絏繁擁斷決淹延乃致怨嗟或成災沴豫懷憯怛寢食靡寧宜委御史臺刑部大理寺慎擇官吏皆須素能折獄俾務盡心則人必無寃法當盡理天下州縣官等皆罕習律令莫知重輕唯任胥徒因多枉濫委本道觀察使覺察聞奏又刺史縣令多務遊宴不思官常決遣既妨囹圄自滿永言寃滯豈不由斯委觀察使表率條流以懲深弊度支鹽鐵户部三司欠負錢物頻有赦令據年額節級矜蠲如聞所司尚有徴迫妄行可徴可放多因姦吏恣情遂使恩不及夫窮危事無補於經費其諸色人户所由等應欠三司錢物自大中十二年以前並宜放免縣道之間郵亭具列行李供億格敕著明如聞節度觀察刺史等所經過不遵品式公劵之外私費至多或在道途有六百七百人行李所在地主務求交歡别差吏人號為置頓必皆率配弊及疲人自今以後所在長吏切加遵守格文不得違越赦令所在欲蘇疲瘵如聞逺處州縣告示不得分明今要條流永為定制赦書到後各委本道全寫録於縣門榜示但緣事理煩細紙數煩多減放矜蠲頭項埋沒鄉村百姓無因得知宜令所在長吏細詳各據本處百姓合得免科假一一竪項作小榜於要路曉諭令百姓知悉宗室子孫不合凌替班列之內人數至稀宜令宗正寺搜擇宗子有行義文學吏事堪有清實者具名聞奏委中書門下量才敘用如在郡縣年已蹉跎士行可弊困於寒餒宜委所在長吏隨分驅策優假如聞編户之中素非宗室因緣識故寫録諸書投入宗枝妄認房籍恃慿攪擾侵害鄉村近日此徒敗露非一雖已行法未絶根源從今以後委所在長吏切加收獲如涉疑妄即收録聞奏當痛懲治用安里閭前代為賔崇德理合頒恩二王三恪及文宣公各賜物五十匹衡雕拱衛執玉會同俾申懷逺之恩用展酬勞之錫神䇿六軍威逺營金吾及皇城應緣御樓立仗將士等各賜物有差鴻臚禮賔院應在城內蕃客等並節級賜物功播一時名流千古念其後裔觀以將來故尚父子儀贈太師晟贈太尉秀實各與子孫中二人八品官顔杲卿張巡許逺南霽雲子孫中各與一子出身中書門下儀制官及內侍省內教並特加一階勳著燮和道彰鎮撫牧守宣力卿士叶心永言盡瘁之誠宜給追榮之典中書門下及節度使帶平章者祖父母父母並與贈官封已經追贈者更與改贈京文武常恭官東都留守度支鹽鐵等使諸道節度觀察都防禦經略等使及神䇿金吾六軍將軍大將軍威逺營鎮國軍等使父母已歿未經追贈者量與贈官已追贈者亦與改贈父歿母存未封邑號者父見存未有官者量與致仕官其贈任常參官出為刺史縣令分司等官今已得替兼前資郎官以上官其父母並準有見任常參官例與追贈挂冕相先懸車自遂紀綱之僕軒陛攸陳宜升階級之榮式進勳封之寵內外文武及見任及致仕官三品以上贈賜爵一級四品以下加一階神䇿六軍金吾威逺營皇城等將士普恩之外各賜勳兩轉天下百姓年九十以上各贈米五石絹二匹綿一屯羊酒有差仍令本縣令就家存問今州府方員多不給付所用無幾係體則深宜令以上供餘錢物充給訖各具分析聞奏咸通八年五月德音朕聞唯天為大唯堯則之施及文王昭事上帝朕退思古訓順考前聞仰止於皇王之間規範於堯文之際始如徒涉而望超溟渤中若䇿蹇而求躡雲霄思逮於三希之則至由是力於恭已説以濟人九載於兹一致不怠然而德未甚腆信未甚孚雖懷汔可之詩敢企康哉之咏尚賴社稷降祉祖宗垂休兵革向寧朝野斯乂自頃誕施渥澤冀獲雱流猶慮莫及昭蘇逾多困乏今則夏田豐稔倍於常時不足之憂暫免興慮又以西成未保蟲蝗是虞永惟惠恤之宜庶叶銷禳之要茍能利於百姓賴於四方可使稼穡有年邉疆無事則唯恐不及豈憚於必行是用更理闕遺載新提舉一陽斯始爰開蕩滌之恩晏隂將成式經矜蠲之令副我誠切在爾司存應京畿天下見禁囚徒暑毒之時要令疏理牢獄之內慮有滯寃宜令臺府及該軍司并所在州縣長吏據見禁囚徒德音到後七日內親詳罪名疏理訖聞奏不得更延引時日除非巨蠧有礙去年赦條外餘並節級遞減一等從輕處分左降官及諸色流人雖纍有赦令皆已霑恩欲其悔過自新豈吝頻施沛澤經去年赦條已得量移者更與量移合復資者準前例處分其去年十一月十日後至今年五月以前續有左降官及流人亦便與量移如令放還者所司速與處分內人久在宫者常膺使令不唯勤勞可憫固亦親愛是思宜令揀選五百人放出各歸其家屬俾無離怨用叶推恩見在宫人尚令揀放諸節進奉宜有指揮應諸親及公主等每年端午及延慶并妃嬪生日所進女口自今以後宜並停進鷹鷂之設本為畋遊朕端居穆清不好馳騁所宜解放以遂物情左右神䇿軍各放二十聨五坊放三十九聨飛龍放一十一聨其左右神䇿軍每年進鷹鷂於數內停減春秋二社兩進九月十五日各停進鷹一聨共停一十四聨應租莊宅使司産業莊磑店鋪所欠租斛斗草及舍課地頭等錢所由人户貧窮無可徴納年嵗既逺虛繫簿書緣咸通七年赦條不該入宜從大中三年以後至大中十三年以前並宜放免京兆府奏雲陽等一十二縣百姓論去年宿種麥苖下子之後旋被蝗蟲食損今年盡不滋生雖京畿之間去冬蠲放不少但以疲人懇訴須務哀矜已令府司差官巡檢如有損處特與減放今府司具合放數詣實聞奏戍役辛苦道途綿歷將還鄉土在贍供須安南雍州已奏放回北軍其於頓遞過本州縣界須如法先自備辦摐排比切不得臨時差配百姓及借索擾人仍録前後德音赦條於鄉村分明榜示不得違越仍委所在長吏嚴立條制專加覺察枷禁所施在防姦蠧舉便欠負未涉重條如聞府縣禁人或緣私債及有錮身監逐無計營生須有條流俾其存濟自今日以前應百姓舉欠人債如無物産抵當及身無職任請俸所住州縣及諸軍司須寬行期限切不得禁錮校料令其失業不許利上生利及廽利作本重加徴收如有違越勘實奏聞去年德音赦令條流事件極多貴其普及生靈惠沾寰宇聞所在未盡施行今重舉明俾無留滯宜令天下長吏差清強判官專事勾當切更分明檢校一一據節施行訖奏聞如更因循必行朝典所差判官速具名銜分析聞奏好生之德宜及禽魚卵育之時須加條制舊敕每年起三月一日至五月末不許採捕蜚禽走獸雖有敕禁尚恐因循宜令臺府及諸軍司及時禁之月嚴更提撕勿使違犯儉德之修聖賢所重近日俗多澆靡時尚矜誇朕慕素風思遵儉制去嵗赦文之內已曽明有指揮所宜克副朕心用革奢僭東川每年進蜜浸荔枝道路遙逺勞費至多自今已後宜令停進布告中外稱朕意焉咸通十三年五月疏理刑獄敕敕慎恤刑獄大易格言語曰如得其情則哀矜而勿喜而獄吏苛刻務在侮文守臣因循罕聞親事以此械繫之輩溢於狴牢追捕之徒煩於簡牘實傷和氣因致沴氛况時屬熇蒸化先茂育並赦罪戻式順生成應天下所禁繫罪人十惡忤逆及故意殺人合造毒藥持杖行劫開發墳墓外餘並宜疏理釋放如或信任人吏多有生情繫留續察訪得知本道觀察使判官州府本曹官必加懲譴以誡慢易敕到後十日內疏理分析聞奏光啓三年七月德音朕聞天以陽居大夏地以隂居玄冬是明任德而不任刑也在帝舜則舉兩階之干羽在成湯則開三面之網羅是眀君好生而不好殺也朕以眇身嗣膺大寶垂三百年之宗社奉十七聖之威靈夕惕乾乾不忘寤寐豈謂釁生於地謫見於天煙塵暴起於兩京蛇豕交橫於四野宗廟之饗干戈莫尋蓋獲戾於上玄俾流災於下土前嵗才歸大國又及播遷信由倚任之非良有愧精誠之下至貶衣損食庶塞乎愆違履薄臨深每增於戰懼方修郊廟且復京畿而駐蹕才安還宫可候虔誠罔通於穹昊兵革又起於藩維蓋以朕不敏不眀君臨兆民仁不能叶生成之旨義不能符斷割之幾智無周物之明信寡應時之用陷蒸黎於塗炭致王室之艱難綿歷嵗時於兹八稔顧兹頺紊職朕之由且朕深宫九重跬步千里目雖視而不見耳雖聽而不聞罪在朕躬痛入骨髓但仰天而投泣恨無地以容身撫几興言何嗟及矣今則素服避殿減膳撤懸食無海陸之珍耳絶管絃之樂唯加惕勵冀遂感通將宏及物之恩在布惟新之令應天下見禁囚徒除十惡忤逆官典犯贓持杖劫殺合造毒藥開發墳墓其餘罪輕重遞減一等左降官各與詳所犯量移如已經兩度量移者宜並放還仍仰所在州府限德音到日準敕處分訖分析聞奏左降官及流人身有死者並許歸葬其鳯翔府所管吏軍百姓等切令招葺務令歸安縱與李昌符關連情非巨蠧及父兄在隴州城內事出脅從者一切不問其隴州城內軍吏百姓不得輒令損傷戴禮之文務先掩骼應有未葬骸骨及橫尸在路委所在長吏速與收斂藏瘞其自兵荒以來殺傷之處委所在州縣以孟冬行賞死事之日於北郭除地用雞豚設祭所貴以導和氣且慰幽魂前年冬未出京之時如聞文武朝臣愴惶奔竄或因凍餒或遭鋒創遂致斃踣深可憫傷自纍年來朝臣有因謫官遂致殞身或制使遽聞枉橫宜令中書門下尋訪各與贈官孝弟承家忠貞奉國既顯揚名之道宜加布澤之榮應內外文武臣及諸道節度觀察防禦使隨駕諸軍頭亡父母並準舊例各與追贈追封如有母親見存者各與進封左右神䇿及隨駕諸部兵士等荷戈負羽侍衛勤勞既效節以輸誠實竭忠而排難永言勳績宜有甄酬其隨駕諸部宜各與勳爵未有功臣名號其將士次第填補不得虛被衣賜有紊典章如覆視不實節度使奏取進止本判官重加貶責其邉地沃壤極多嵗收可望如聞耕牛素少戍卒茍安唯長蒿菜俱乏衣食委節度使良田之處更議添人均配膏腴令其耕種制置利便須令酌中其南山及平下黨項盡是百姓須令保安長吏若能撫綏蕃人自然寧息切不得妄有侵擾致其怨嗟常須使商旅往來部落不得阻塞致理必先於尚儉傷風莫甚於窮奢朕苑囿不修珠玉不寶所思敦朴每務去華如聞卿大夫士庶近者競崇侈靡莫辨等威服玩車輿皆越制度蠧於教化朕甚憫焉卿大夫當助我紀綱為人表則宜修儉約以變澆風其京師應有奢僭違令式者聞之當行朝典應諸道申奏有草賊州縣本皆齊人迫於餒凍竊聚徒侶遂肆猖狂並仰所在長吏明加曉諭有能自新有罪一切不問如稔惡不悛事狀難恕委所在長吏設法擒捕不得漏網上京諸司及天下州府負犯逃走罪人今春已降德音除本罪合至死者從咸平五年以前並停追捕歸還故土其數至多慮被姦人遞相恐動悉委所在告諭令其樂業無致驚惶如歸復者惡迹貫盈不能改過更有違犯尋勘不虛便仰併舉前愆一時痛斷不得容隱侵害良善江淮商賈業在舟船如聞近日官中攄借甚苦或傾奪以充運米或題關以備載軍非理滯留散失財貨州縣雖云和雇商人焉敢請錢本求錐刀畨成損折縱有寃屈豈能申論道路怨嗟莫甚於此自今以後委所在長吏切加禁斷其所合供過軍等舟船唯許容載航船便給見錢雇召如見裝貨物者切不得強令騰倒其州縣所合雇船腳多無本色錢物皆是率配疲人起今以後並仰以上供錢充給如有茶鹽舟船關繫三司𣙜課者任準元敕處分自蠻寇侵擾連嵗用兵耗蠧生靈海運為甚驅我赤子深入滄波覩駭浪而魂飛泛洪濤而必死繼有覆溺多不上聞仍遣陪填急於風火哀其已死之衆不可復追念兹將斃之徒用延餘息應江淮四道運糧所有沉覆損米損船綱官所由船尸及元發州縣合陪填者並從放免更不得校料追徴應闕海運留係勘者並一時釋放唯造船官吏須有勘覆者不在此限近日蟲蝗米榖翔貴所在州府須使通流况閉糴之條著在格令近聞州府通舟船處不得約勒商人固違敕旨等候江淮錢物到各宜優賞以身許國致命捐軀攄兹盡瘁之誠宜飾始終之典應自兵興以來所在都頭大將身歿王事未曽經贈官者仰本道各與分析聞奏量功勞優與贈官如有子孫仰本道各與補職務令存濟行營將士如身歿王事者其衣糧並仰給與兄弟男姪如有父母無給養者切在安存勿令凍餒雖纍有處分可一切施行或有義士忠臣圖功立事身當國難身歿賊鋒者宜委中書門下優與贈官兼訪子孫俾沾祿任用伸激勸冀洽恩榮扈從之勞辛勤不忘若無升進何以奬酬其到興元文武官等宜令優與遷改如已經奬擢者特與量加階爵自貞觀之後建中元年以來翊戴皇家扶持宗社勳績已銘於鼎鼐謀猷實在於册書如聞子孫或多凌替贈太師汾陽王子儀臨淮王光弼西平王晟咸寧王渾瑊贈太尉秀實顔真卿顔杲卿以下子孫宜各與一子九品正員官其子孫有才術可稱委中書門下量才敘用以勸勳賢律有驅率之科是宜原宥人無險詖之路固可矜寬其陷偽庭官寮多因迫脅旋宜敘用勿使棲遲左右神䇿軍及沿邉諸鎮將士或隄防藩冦或控扼封陲戴甲荷戈眠沙卧磧無抱子弄孫之樂有離鄉去里之嗟自亂離以來衣糧多缺顧兹疲弊深軫朕懷蓋緣諸道賦稅未來致使如此宜委度支户部及鹽鐵使各委官吏催促江淮及三川上供錢物充給兩軍及邉鎮將士衣賜如催勘有序其官吏各與優奬如全無次第必議懲責於戲朕以寡昧託億兆之上不能克相上帝寵綏四方履地戴天痛心疾首實在股肱叶力藩翰同心保列聖之洪基佐沖人之薄德共成興運以副殷憂為政之方實資共理且一邑之政由乎令長一郡之政由乎牧守一方之政由乎藩翰之臣夫政修於上則化行於下可以安人治國可以阜俗康時此古今之通理也自乾符以後廣明之前節制亷問之臣州牧縣宰之吏或掄擬不當或詮擇非良鎮藩翰者則惠養撫綏之術蔑聞居牧宰者則貪婪苛虐之風益甚或淫刑濫殺或剝衣及膚業亡家破父南子北多使飢者不得食寒者不得衣奔竄道途跧藏山谷耕桑甚廢旱沴相仍結為仇讎聚為盜賊寃憤之氣上逹於九天激怒之威橫行於千里虔劉郡邑屠戮生靈懷逆節者得以逞其凶桀恣為暴擾藴忠誠者雖欲平其禍亂益費機謀既往難追將來可保切在遞加激諭漸致和平倘或刺史知惠養之方縣令有撫綏之術公清克已亷慎當官績效彰聞當與遷擢如或貪殘不理害我疲人委中書門下重加懲殿仍令諸道長吏觀察判官切加察訪每嵗具善惡奏聞自屬兵戈全妨耕稼遂令壠畝盡變汙萊蓋以殺傷之餘流亡益甚宜加招撫漸復農桑如有刺史縣令招收戶口開墾荒田置買耕牛修置農具者委所在觀察使精加點勘具數聞奏當據課效髙低優加升奬朕端拱穆清思𢎞理道用憂勤而補過守慈儉以律身上展孝思下康庶務其於祀事尤在精崇常憂多難以來有乖敬恪至於牲幣之數醯醢之宜必盡吉蠲免或簡易宜委所司切切鈐轄不得因循夫儉者德之恭侈者惡之大唐堯土階三尺夏禹菲食卑宫先聖遺風後王軌範其有司合進常膳三分宜減一分六宫嬪御見在者人數不多此外不令更有添置或有因緣寇盜流落外方宜委所在長吏便與嫁遣任自營生不用送到駕前冀免虛有勞費自此諸道更不用進聲樂及女弟子歌舞衣服紋繒組繡雕鏤珠璣頗害女工實妨農事竒技淫巧往哲所譏况遇艱難尤宜儉素其諸道不得進奉紋繡宫錦雕鏤輕靡彩章之物五坊鷹犬以備時搜方當勤恤之時寧有畋遊之樂其鷹犬並今解放不用更置諸道亦不須進送艱難已久增修未知展端披圖良多內愧且以為白烏丹鵲不如子孝臣忠甘露醴泉未若風調雨順自今以後諸道所有祥瑞並不要圖畫進獻補成教化實在賢良用副旁求必資博採宜令文武常參官舉刺史縣令有異政殊績者淪滯山林有竒文異行者所期表異無或面欺孝子順孫義夫節婦各加旌表以示鄉閭父老有年九十以上者賜帛二匹粟五石仍令所在以上供物支付瘖聾跛躄鰥寡孤獨者委所在切加存恤無所恓惶名山大川興雲致雨冀保順成之嵗宜申望祀之儀太清宫及驪山華嶽南山廣惠宫炭谷湫鳯翔啓聖宫邠州要册湫宜各差官禱謝其諸道應有祠廟標於祀典及先聖靈迹各委長吏差官精誠啓告凡關百姓安危利病俾其蘇息切在撫綏訛弊既多固難遍舉仰所在長吏審詳利害一一條奏所冀凋殘漸成完緝勿辜委遇副我憂勤於戲朕為人君父纍屬夫亂離一發言未嘗不兢憂一舉足未嘗不愧悼徒思罪已安敢尤人中外臣寮宜悉朕意時令令史官條奏每月應所行事詔王者欽若天道率由時令考六官之化修五紀之法故得災害不生休徴洊委朕紹膺洪業於兹六年每惇政理思致和平而隂陽未調蝗水仍集天之垂誡朕甚懼焉夫正月東郊祈春賞事孟冬北陸迎寒恤孤參四序之運行稽五材之動用弗協所尚或罹於咎且事必師古禮重執文將命有司允迪厥訓自今以後每入月史官條奏應所行事當斟酌古典用孚於休宣布朝廷使知朕意開元五年十月嵗初處分德音敕天地以大德生羣有聖人以大寶守萬物古者受命之君謂之承天之序明有所代夫豈徒然若道無欽崇命不永保帝實臨汝人曷戴君朕所以每期庶乎合於仁覆之意也夫伏羲神農黃帝堯舜或誅而不怒或教而不誅彼亦何為獨臻於此朕自有天下二紀及兹雖未能畫衣以禁亦未嘗刑人於市而政猶踳駮俗尚澆醨當是為理之心未返於本耳凡人豈不仁於父母兄弟不欲於飲食衣服乎而卒被無孝友之名不溫飽之困其故何哉蓋未聞義方不識善道或任小智而為詐或見小利而茍得致逺則窮繼之以暴已而身受戮辱家不相保愚妄之徒類多自陷獄訟之弊恆由此作吁可悲乎亦在教之不明也蓋刑罰者不得已而用之天下黔黎皆朕赤子以誠告示或知所歸何必用威然後致理先務仁恕寧不懷之且五常循行豈須深識六親和睦何待丁寧自宜勉之以副所望刑措不用道在於兹今獻嵗之吉迎氣伊始敬順天常無違月令所由長吏可舉舊章諸有嫗伏孕育之物蠢動生靈之類慎無殺伐致令夭傷九土異宜三農在候聚衆興役妨時害功特宜禁止以助春事至若家有征鎮人或孤惸物向陽和此獨憂悴良可憫也亦宜所由隨事優恤蓋不體仁無以為長人不知道無以為用心故道者衆妙之門而心者萬事之統得其要會義可以兼濟於人失其指歸生不能自全於已故我玄元皇帝著道德經五千文明乎真宗致於妙用而有位者未之講習不務清靜欲令所為之政何從而至於太和也百辟卿士各須詳讀勉存進道之誠更圖前席之議至如計校小利綜緝煩文邀名直行去道彌逺違天和氣生人怨心朕甚厭之所不取也各勵精一共興玄化俾蒼生登於仁夀天下還於淳朴豈逺乎哉行之可至其老子宜令士庶家藏一本仍勸習讀使知指要每年貢舉人量減尚書論語一兩道䇿準數加老子䇿俾敦崇道本附益化源朕推誠與人有此教誡必驗行事豈垂空言今之此敕亦宜家置一本每須三省以識朕懷開元二十一年正月一日唐大詔令集卷八十六
