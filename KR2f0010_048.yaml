body:
  text: 唐大詔令集卷五十八宋宋敏求編大臣宰相貶降下李德裕潮州司馬制李德裕崖州司户制李回太子賔客分司東都制李回賀州刺史制楊收端州司馬制楊收長流歡州制孔緯荆州節度使制張濬鄂嶽觀察使制杜讓能梧州刺史制孫偓南州司馬制朱朴彬州司户制王摶工部侍郎制王摶溪州刺史制王摶崖州司户制崔胤工部尚書制裴樞登州刺史崔逺萊州刺史制陸扆濮州司户王摶淄州司户制裴贄青州司户制柳璨密州司户制貶降下李德裕潮州司馬制敕録其自效則付以國權懲彼保姦則舉兹朝憲此王者所以本人情而張法理也特進行太子少保分司東都上柱國衛國公食邑三千户李德裕憑藉鎡基纍承台衮不能盡心奉國竭節匡君事必徇情政多任已愛憎頗乖於公道升黜或在於私門遂使寃塞之徒日聞騰口積嫌之下得以恣心豈可尚居保傅之榮猶列清崇之地宜加竄斥以戒僻違嗚呼朕臨御萬方推誠庶物顧彼纎瑣皆欲保安豈於將相舊臣獨遺恩顧而羣議不息謗書盈篋爰舉典章事非獲已凡百寮庶宜體朕懷可潮州司馬員外置同正員仍所在馳驛李德裕崖州司户制敕朕祗荷丕業思平泰階將分邪正之流冀使華夷胥悅其有嘗登元輔久奉武宗深包禍心盜㺯國柄雖行譴斥之典未塞億兆之言是用再舉朝章式遵彜憲守潮州司馬員外置同正員李德裕早藉門地叨踐清華纍膺將相之榮惟以姦傾為業當會昌之際極公台之榮騁諛佞而得君情遂專恣而持國政怙權生事妬賢害忠動多詭異之謀潛懷僣越之志秉直者必棄嚮善者盡排誣貞良造朋黨之名肆讒搆生加誅之釁姦有踰於指鹿罪實見於欺天頃者方處鈞衡曽無嫌避委國史於愛壻之手寵祕文於弱子之身洎參命書亦引親昵恭惟元和實録乃不刋之書擅敢改張罔有畏忌奪他人之懿績為私門之令猷又附會李紳之曲情斷成吳湘之寃獄凡彼簮纓之士遏其進取之途驕倨自誇狡猾無對擢爾之髮數罪未窮再窺罔上之由益驗無君之意使天下之士重足而迹皆懾懼奉爾而慢易在公為臣至此於法何逭於戲朕務全物體久為含宏雖黜降其官榮尚蓋藏其醜狀而睥睨未已兢惕無聞積惡既彰公議難抑是宜移投荒服以謝萬方中外臣寮當鑒豫旨可崖州司户參軍員外置同正員仍仰所在馳驛發遣縱逢恩赦不在量移之限大中二年九月李回太子賔客分司東都制敕王者懸賞罰以示萬方况乎臣子若奮其良術則宜擢處重任或挾彼邪謀固合稍加懲沮惟此二柄我何敢私湖南都團練觀察處置等使光祿大夫行潭州刺史兼御史大夫上柱國隴西郡開國公食邑二千户李回早以藝學科名纍登華貫謂爾奉公約已旋升大寮因緣奬遷遂陟台輔而不能竭誠以盡忠益枉道而求庇交通財賄導達姦邪昨因推鞫凶徒皆得發明事迹朕務𢎞體裁特免研窮論既喧騰理須移奪况又聞頃司政柄每欲除授咸取決於德裕不自行其至公物議所興以斯為重豈可猶委澄清之任復領湘潭是宜輟從調護之班俾分洛邑爾其勉蒞寵秩幸豫寬恩可行太子賔客分司東都大中二年九月李回賀州刺史制敕為臣竭公忠之誠朝尊爵賞事君乖毗倚之望國有典章惟此二道理所不廢湖南都團練觀察處置等使光祿大夫行潭州刺史兼御史大夫上柱國隴西郡開國公食邑二千户李回始以才術升於台階作豫股肱亦援星律寄長兼於授鉞道甚異於匪躬亦既左遷俾居亷問而迹乖檢慎事露端倪秉鈞之勢已移枉道之蹤乃見負我非淺叨榮故深况又聞頃司政柄應欲授除咸取決於德裕不自行其至公人亦有言孽亦何逭朕匿瑕含垢思全進退之宜爾則同力協心且易樞機之任合歸嚴譴猶示寬恩故前制命爾為太子賔客給事中封還我敕且曰責坐之詞至重降移之秩太輕物論喧然以為未當爾實自搆豫何敢私是用移謫臨賀冀厭羣議勉於三省勿謂無恩可持節賀州諸軍事賀州刺史仍所在馳驛赴任大中二年九月楊收端州司馬制敕人臣之節莫重於忠良氏族所修無外於清順二者不立何以正身况乎居常伯之崇應藩侯之寄雖顧初終之體當明懲勸之端宣歙觀察使檢校工部尚書宣州刺史兼御史大夫楊收始以文章選在宥密才歷二嵗擢升台衡謂其發自寒門必有操寄行孤貞之道報國用恭儉之禮化時夙夜勵精以酬恩遇而乃貪黷為業溝壑難盈逞其私懷盜我名器以官常為貨利之徑持僣侈為暴橫之資田産遍於四海臺榭擬於中禁而又結連姦黨聽任憸人險詐千端回邪萬狀欺罔彌甚顧慮蔑聞謂日月之照臨或所隱漏意天地之姦慝可以包容殊不知心既不悛孽無以逭去嵗驗其事迹未忍揭揚委以察亷僣咎時聞縉紳之內物議喧然班列之中怨念未息朕以寬恕馭下仁閔為心中外臣寮悉明此志負我既甚其法何如竄於遐陬式示嚴憲爾惟自棄毋或尤人可守端州司馬員外置同正員仍馳驛發遣咸通八年八月楊收長流歡州制敕端州司馬楊收起自孤寒猥承委任罔思報效惟恣姦欺心每挾邪言常近利江西置節制之額務在虛兵浙右創造船之名便其盜用兩地推覆按驗分明豈可尚佐專城猶居仕籍俾投荒裔用塞愆尤中外臣寮各體朕意宜除名配歡州充長流百姓縱逢恩赦不在量移之限仍錮身所在防押遞送至彼具到日申聞仍路次縣給遞驢一頭并熟食咸通十年二月孔緯荆南節度使制朕垂衣嚮明負扆成化內則委輔翼之任外則寄藩屏之臣比用股肱是為心膂况荆衡巨屏禹貢右封南制百蠻西控三蜀或膺統臨之命爰崇迭處之榮持危啓運保乂功臣開府儀同三司守太保兼門下侍郎同中書門下平章事國子祭酒充太清宫使𢎞文館大學士延資庫使諸道鹽鐵轉運等使上柱國魯國公食邑四千户食實封五百户孔緯闕里傳宗儒林植操出入纍更於華貫超升遂陟於鼎司宜成我無為歌我有截豈可但崇朋助罕究否藏昨者張濬首請興師親求伐叛且陳計畫纍贊征行決言旬朔之間兄著殊常之效延英互奏幾疑朕言文字繼來固違朕志以至干戈一舉星紀將周并汾之寇孽未除蒲晉之生靈已盡搆兹紛擾職爾披陳罔思惑亂之由堅執比周之計詢於輿論曷副旁求今則正罷中樞俾安外閫尚顧始終之念用成進退之宜勉服明恩往祗休命可檢校太保兼御史大夫充江陵尹荆南節度觀察等使大順二年正月張濬鄂嶽觀察使制昔漢武因恭儉富庶之後建置朔方孫𢎞沮之十不得一良史以𢎞有宰相之體誠以愛人治國為先拓境開邉為末及孝宣帝值雄才削平之餘將議北伐魏相爭之五將尋罷果致中興號為賢輔况朕承天厭干戈之際人思休息之時敢望臯夔共成堯日庶幾孫魏粗及漢年茍異於斯如何倚注光祿大夫守尚書右僕射兼中書侍郎同中書門下平章事集賢殿大學士判度支兼京畿諸道營田修國太廟使充河東諸道行營兵馬招討指揮制置等使河東節度觀察處置等使上柱國河間郡開國公食邑三千户食實封二百户張濬早以盛名稱為竒士由是再加召用委以鈞衡謂其必致小康克勝大任而乃罔思守道但欲邀功是不詢之計謀起無名之兵甲自云一舉止在旬時堅請抗論勢莫能奪輕葛亮渭濵之役小裴度淮右之行而經歷寒暄縻費百萬虛誕張於朝野詐詭布於華夷橫草蔑聞燎原愈急俾擁旄乘馹之使囚於虜庭致勤王奉國之師懷歸本土忘廊廟之威重結藩屏之寇讐是使海內生靈竭於貢賦豈獨河中郡邑蕩為丘墟生此厲階欲誰歸咎嗚呼徵朝錯之故事仍王恢之舊章國有明文爾當何逭尚以愛人以禮治體宜然亷鎮劇權武昌善地宜罷軸樞之任仍停度支之司勉自深惟以逃後命可檢校尚書右僕射充鄂嶽等州都團練觀察等使大順二年正月杜讓能梧州刺史制輔弼之事安危所屬大則調隂陽以期昭泰次則撫夷夏以務洽平俾比屋之可封致乃后於無事兆人允賴百辟具瞻茍異於斯則將安用扶危啓運保乂功臣開府儀同三司守太尉兼門下侍郎同中書門下平章事太清宫使𢎞文館大學士延資庫使兼諸道鹽鐵轉運等使上柱國晉國公杜讓能軒裳貴胄禮樂清門蹈姬孔之康莊邁韋平之閥閲夙推重望早歷華資洎陟台司亟更年籥方謂偉儒克承大任而乃首居帷幄輕議干戈棄卿士之臧謀搆藩垣之深釁啓詢之際證執彌堅果致兵集甸畿人散都邑尚賴祖宗垂祐賢智叶謀啓悟朕心别施制命詢彼輿人之論咸推上相之尤須示典章用息騰沸尚居列郡式重大臣可貶梧州刺史景福二年九月孫偓南州司馬制敕金紫光祿大夫守禮部尚書安樂郡開國侯食邑一千户孫偓夙通朝籍纍踐華資竊顧多岐遽隳直道秉弼諧之大政附伎術之小人罔畏公言自為良策處嫌疑而不愧謂寵利之可安而屬我艱危匪能匡救頃因丕變亦貸彝章雖罷萬機尚分六職是惟循省俾息沸騰觀諫臣所上之言陳取戾不已之狀則正卿之位非爾宜居將警後來遂投荒服行當咎已無或尤人可貶南州司馬員外置同正員仍令所在馳驛發遣乾寧四年八月朱朴郴州司馬制敕夔州司馬員外置同正員朱朴本在寒微偶升科第復塵簮組且列膠庠不為自審之謀但務夤緣之計實因姦幸潛致顯榮亦謂術可弭兵學能治國叨半嵗容身之貴無一朝輔政之功惟辱中台頗興輿論斥於散外未絶他腸越法制以有圗信愆尤之自作封章所指竄逐尚輕掾彼方州亦云寬典非我好黜惟爾深思可貶郴州司户參軍乾寧四年八月王摶工部侍郎制天地之數寒暑有推遷輔弼之臣任用有進退蓋以其宣力斯久克修是虧俾夫退列二卿式示朝典以禮之道其在兹乎扶危匡國致理功臣開府儀同三司守司空兼門下侍郎同中書門下平章事監修國史判度支上柱國魯國公食邑三千户食實封一百户王摶始以菲才擢升重位亟移主律蔑效公忠惟務回邪罔思致正紊朝廷之綱紀致經費之空虛而又朋附近臣隳張大體豈可尚持政柄所宜降處周行猶念含𢎞勉為循省可特進尚書工部侍郎光化二年六月王摶溪州刺史制敕工部侍郎王摶久司邦計復掌國鈞致帑藏之不豐則材謀而安在曽無讜正但務回邪盡非燮理之心惟是貪婪之志今則罷其大柄復列二卿雖優𢎞之制已行在問俗之司俾任可謫授溪州刺史所在馳驛發遣光化三年六月王摶崖州司户制敕溪州刺史王摶久居重位罔著嘉猷掌邦計而罕致豐盈顧私室而惟多貪積雖示朝黜未塞羣情俾從竹使之權許履掾曹之職可貶崖州司户參軍員外置同正員光化三年六月崔胤工部尚書制食君之祿合務於盡忠秉國之鈞宜思於致理其有疊膺異渥經執重權遂萌狂悖之心忽搆傾危之計人知不可天固難容扶危定亂致理功臣開府儀同三司守司空兼門下侍郎平章事充太清宫使𢎞文館大學士延資庫使諸道鹽鐵轉運等使判度支上柱國魏國公食邑五千户崔胤奕葉公台蟬聨圭組冠嵗多升於甲乙壯年位列於公卿趨向有聞行藏可尚朕採於羣議詢彼輿情冀有小康遂登大任殊不知漏巵難滿器小易盈曽無報國之心但作危邦之計四居極位一無可稱豈有都城合聚兵甲暗養死士將亂國經聚貔虎以保其一方致刁斗逺連於右輔始則將京兆府官錢委元規召卒後則用度支權利令陳班聚兵士去公朝權歸私室百辟休戚在其顧盼之間四方是非繫彼指呼之際令狐渙姦纎有素操守無堪用作腹心共張聲勢遂令濫居深密日在禁闈罔惑朕躬偽行書詔致兹播越職爾之由豈有權重位崇恩深奬厚曽無惕厲轉恣睢盱顯搆外兵將圗不軌朕以士庶流散兵革繁多遂命宰臣與之商議五降內使一貢表章堅卧不來拒詔如此况又拘留庶吏廢闕晨趨人既奔驚朕須巡幸果見兵纒輦轂火照宫闈煙塵漲天干戈匝野致朕奔迫及於岐陽翠輦未安鐵騎旋至圍逼行在焚燒屋廬觀此阽危咎將誰執近省全忠表章兼遣幕吏敷陳言宰臣繼飛密緘促其兵士西上靜詳搆扇孰測包藏無功及人為國生事於戲君人之道委之宰衡庶務殷繁豈能親理盡將機務付爾主張負我何多搆亂致此仍存大體不謂無恩可謫授朝散大夫守工部尚書天復二年十一月裴樞登州刺史崔逺萊州刺史制敕朕謬將眇質叨荷丕圗常懷馭朽之心每軫泣辜之念諒於黜陟豈易施行左僕射裴樞右僕射崔逺雖罷機衡尚居揆路既處優崇之任未傷進退之規不能屏志安家但恣流言謗國頗興物論難抑朝章須離八座之榮尚付六條之政勉思咎已無志尤人樞可責授朝散大夫登州刺史逺可責授朝散大夫萊州刺史並委御史臺催促出京所在馳驛發遣天祐二年五月陸扆濮州司户王溥淄州司户制敕朕以涼德獲嗣丕圗將𢎞至公以凝庶績憲章不濫賞罰惟宜俾恢理政之風用振紀綱之典其有嘗居宰輔但協姦邪茍玉石之未分則稂莠而將茂須行黜責用致澄清吏部尚書陸扆早以文儒亟揚華顯自先皇帝議征峻隴而扆確有救論果犯雷霆旋經遷貶其後託茂貞之勢援憑閹監之梯媒尋復舊官再升髙位惟知周比寧務燮和邇來多難罔不由此工部尚書王溥亦茂貞奧主崔胤門人驟歷禁闈俄塵衮職但恣詭隨之志曾無匪懈之稱崔胤既置嚴誅而溥獨居清列况朕恭承大寶思拯彞倫非為洗垢求瑕但冀懲惡勸善兼宜斥於外掾不容在夫中臺尚謂寬恩勉當省過扆可濮州司户參軍溥可淄州司户參軍天祐二年五月裴贄青州司户制敕朕聞君臣之間進退以禮矧於耆舊欲保初終茍自掇於悔尤亦須行於黜責特進守司空致政裴贄早以公望嘗踐台司靡聞竭力以匡時每務養恬而避事洎從請老不謂無恩合慎樞機動循規矩雖云男退乃有後言自為徒薄之魁頗失大臣之體謫居郡掾用立朝綱尚謂過輕所宜自咎可貶青州司户參軍天祐二年六月栁璨密州司户制敕明罰飭法固有彜章懲惡除邪用攄衆怒責授官登州刺史栁璨素矜憸巧每務回邪幸以庸才驟持重柄曽無微效顯負明恩詭譎多端包藏莫測但結連於凶險獨傾陷於賢良罪既貫盈理須竄殛尚處一麾之獨任虧三尺之常刑將塞羣言須行重典自貽顛覆無乃怨尤可貶密州司户參軍天祐二年十二月唐大詔令集卷五十八
