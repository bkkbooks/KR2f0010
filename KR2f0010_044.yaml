body:
  text: 唐大詔令集卷五十四宋宋敏求編大臣宰相出鎮下裴休宣武軍節度平章事制魏謨西川節度平章事制崔慎由東川節度制蕭鄴荆南節度平章事制杜審權鎮海軍節度平章事制劉瞻荆南節度平章事制鄭從讜河南節度平章事制王鐸義成軍節度兼中書令制崔胤武安軍節度平章事制王摶威勝軍節度平章事制獨孤損靜海軍節度平章事制出鎮下裴休宣武軍節度平章事制將相大臣中外迭任入奉股肱之寄出為藩翰之雄無爽具瞻式章注意金紫光祿大夫中書侍郎兼户部尚書同中書門下平章事集賢殿大學士上柱國河東縣開國子食邑五百户裴休氣稟嶽靈夢叶巖瑞威鳳孤翔於玉圃仙鶴獨步於芝田學精典墳文緯邦國自彤庭發䇿鵷列升班粉署擅二卿之榮綸扉闡五字之妙逮司饋運整葺牢籠䇿畫每得於親聞功庸必見其顯效章程軌物歷試無差是用付以權衡宜承任委咨之逺略炳然大猷四后協心萬邦繫爾今百度有截庶績其凝前時屢以疾辭猶煩卧理豈無優賢之道因遂由衷之意乃眷梁苑實為重藩荒大東於周疆接小沛於貢壤富庶將及悍勇無譁仁化已洽於一方清風漸扇於全境開關自固懸瞂不鳴可仗台臣置之靜理爾其踐厥位暢厥庸侯服既增相印不解輔弼莫繫於逺邇聲容暫間於朝昏敬哉戒哉毋替重命可檢校户部尚書同中書門下平章事使持節汴州諸軍事充汴州刺史充宣武軍節度使知節度事汴宋亳等州觀察處置兼亳州太清宫使大中十年六月魏謨西川節度平章事制股肱之臣與君上而合體心腹之寄雖中外而同途入則付之鈞衡出則委其藩翰茍非望隆碩德道備全才則何以克副具瞻久膺重寄銀青光祿大夫門下侍郎兼户部尚書同中書門下平章事監修國史上柱國魏謨天生賢傑嶽降英靈深沉莫究其澄陂和裕可羣於愛景自踐揚華貫備著徽猷故事播於三臺讜論留於兩掖而式資重用任以地征簡於朕心爰立作相惟爾列祖佐佑太宗輔弼之光號為人鏡代濟其美厥生令孫藴致君匡國之謨見奉上竭忠之志勤勞匪懈夙夜在公動關典彝言成啓沃闡化由其赤誠星霜七年風雨一貫朕以九折巨屏山川奧區控臨百城統馭羣虜眷兹慎擇不其才難爾宜往踐將壇仍持相印舉武侯之籌䇿底定逺戎繼叔度之謳歌載康遐俗勉服休命恭惟有初可檢校户部尚書同中書門下平章事兼成都尹充劍南西川節度副大使知節度事管內觀察處置統押近界諸蠻及西山八國雲南安撫等使大中十一年二月崔慎由東川節度制夫尊任輔相之道也入則秉鈞衡以臨羣辟出則賜弓矢以長諸侯寵光不渝寄屬咸重將求良輔乃命台臣大中大夫守中書侍郎兼禮部尚書同中書門下平章事監修國史上柱國賜紫金魚袋崔慎由繼美德門承家貴位縉紳偉望禮樂上流挺松筠之貞姿服蘭蓀之懿行自居名器纍歷清華禁林才擅於多能綸閣詞推於巨麗物情愈茂廷譽甚髙再列二卿之崇亟闡六條之化爰加奬任益付重難屢啓嘉謨俄參大柄而周涉寒暑備見器能道巳著于始終恩豈殊于中外眷茲東蜀實曰奧區俾授旌旄以彰優重昔叔子望髙於峴首次公聲振於潁川孰有後先率是為理勉𢎞風教期懋厥庸可檢校禮部尚書使持節梓州諸軍事兼梓州刺史御史大夫充劍南東川節度副大使知節度事管內觀察處置等使大中十二年二月蕭鄴荆南節度平章事制入調鼎鼐作我股肱出鎮藩垣為豫心膂分命雖殊于中外倚才皆屬於安危將相迭居文武兼用允兹遇者厥維艱哉况地控南荆土連全蜀振五嶺之通道當七澤之要津統馭所難撫理為重顧兹渥命爰輟重臣銀青光祿大夫守門下侍郎兼工部尚書同中書門下平章事監修國史上柱國彭城縣開國男食邑三百户蕭鄴昴宿垂芒山庭表異膺誕明德佐理生賢開濟洞達其泉源進退率由於律度端亮秉志寬和待人而纍踐華資克流芳問儼卿雲之詞藻煥發皇猷邁管樂之智謀掌司邦賦臺閣備詳其政事朝野咸推其上才由是道觀明誠夢叶先帝爰立作相陟於台階果能經緯岩廊鎮安夷夏罄乃一心凝其庶績逮豫纂承亟獲匡輔疇庸任舊宜乎加恩是用擇其匡藩委之碩德尚執中樞之柄仍加右揆之崇相閣良規豈忘蕭曹之業戎垣寵寄更隆羊杜之功勉服殊榮佇𢎞懿烈可檢校右僕射同中書門下平章事兼江陵尹充荆南節度管內觀察處置等使大中十三年十一月杜審權鎮海軍節度平章事制朕垂衣嚮明負扆成化內則委輔弼之重論道於岩廊外則寄垣翰之崇分憂於撫馭是以入掌鈞軸出擁麾幢必仗兼才乃膺迭任况軍稱鎮海地亘長江建置既殊寵劇斯在駕戎車而佩相印持廟算以統全軍非我誠臣豈行茂典特進行門下侍郎兼吏部尚書同中書門下平章事兼修國史上柱國建平縣開國男食邑三百户杜審權獨鶴依松孤鸞上漢聳三峰之峭壁澄萬頃之清瀾早以重名洽於時輩擅讜言於諫署留正範於南宫史筆弛而更張憲綱紊而復正由是如綸不紀刈楚無遺紹蔽芾於謳謡盡侀成於法理先皇帝知其可用召入內庭果能新耳目之見聞備肺腑之待遇朕初登寶位素抱嘉猷遽行制書首列台席故能彞倫攸敘庶政惟和舉去無差於激揚流品並分於涇渭出入五載初終一途每念鴻勳布在青簡近者固辭機務動啓懇誠雖懷好德之言難抑撝謙之雅是用輟鹽梅於調鼎賜斧鉞於專征金陵大藩正張新幄式兼啓事載踐中樞不移注意之榮無替沃心之道勉服休命厥惟懋哉可檢校吏部尚書同中書門下平章事使持節潤州諸軍事兼潤州刺史充鎮海軍節度使浙江西道觀察處置等使咸通四年五月劉瞻荆南節度平章事制門下將相二柄倚注攸難委鈞衡則望庶績昭明授斧鉞則冀一方寧謐中外迭處列朝舊規是用輟於岩廊付以藩翰正議大夫中書侍郎兼刑部尚書同中書門下平章事判集賢院彭城縣開國公食邑一千户賜紫金魚袋劉瞻早以文學疉中殊科俄嬰艱阻久滯雲路朕擢授華級遄躋禁林羽翼未安風霜旋迫洎并汾解印輦轂還鑣熟聞赤心再陟丹地而應對多敏詔書立成風稜甚髙恭慎無玷承受密旨敷陳大猷洽於具瞻乃降明命果能竭忠心力申行典章啓宗社之密圗惜朝廷之故事振拔沉滯柬録忠良思繼美於咎夔顯致君於堯舜將明啓沃無慚良史之書正直公忠備得賢人之業而又癖於亷慎不尚榮華安敏之居仍非己有四方之賂惟畏人知雖自樂於清貧當勉成於富貴乃眷荆渚實惟奧區紀江漢之洪流振黔吳之要路舟車所會財賦咸殷况台鼎舊臣拜章辭務爰思重屏當委全才授任無疑寵章斯備兵符在手相印懸腰吞雲於胸襟運籌於掌握當年得志報國圗功大夫之榮何以加此勉膺殊渥勿替令猷可檢校刑部尚書荆南節度使勳封如故咸通十一年九月鄭從讜河南節度平章事制古者公卿在朝則輔主致理有事則統衆出征是以卻縠行師爰求説禮祭遵推轂不廢雅歌今者羌寇未寧烽煙尚警慎擇鎮安之略尤資柱石之功若非文武兼才將相全業夙藴峻望為吾鼎臣豈傾丹赤之懷以授股肱之任開府儀同三司門下侍郎兼兵部尚書同中書門下平章事充太清宫使𢎞文館大學士延資庫使上柱國榮陽郡開國公食邑二千户鄭從讜秀稟嶽靈操含氷潔趙衰冬日樂廣青天端操而峭壁寧偕曠度而澄波未測周密得大臣之體誠明𢎞君子之儒許月品題人倫自警膺門步武明彥知歸奮飛早踐於修途育德逾髙於輿論仗節三光於侯府題劍纍陟於崇班洎擢處鈞衡若來麟鳳才惟應物動必研幾屹若嵩巒炳符台曜嵇松磊落長標構厦之姿和璧溫良克表如虹之氣朕以北門重鎮興王故都披全晉之山河有陶唐之風俗以爾曽施惠化尚有去思方當用武之時暫輟調元之氣爾其厚撫戰士謹備糧儲必使黠冦革心征師賈勇善守訓齊之令以圗台鼎之勳位以上公式先元輔副我憂厲往惟欽哉可檢校司徒同中書門下平章事行太原尹充北都留守河東節度管內觀察處置兼行營討等使廣明元年二月王鐸義成軍節度兼中書令制門下朕以煙塵犯闕士庶貽災思九廟以懷慚顧萬邦而是愧危同馭朽誡甚履氷遂乃虔祝上玄冀平積憤勞乎宵旰實貫神明其有捨元輔之崇副大朝之切拜章􅅹懇面奏請行者得不超兹爵秩盛以統臨今則釐斾經時駐軍未進宜更戎號以煥寵光諸道行營都統指揮諸軍兵馬收復京城租庸等使兼判延資庫户部事權知義成軍節度鄭滑潁州觀察處置等使兼開府儀同三司守司徒兼中書令上柱國晉國公食邑三千户王鐸碩德名門清風直道為一時之圭表作百行之源流騏驥絶塵方知逸勢松篁犯雪更耀寒光洎中第從軍升朝擅價掌綸業茂選士功髙進必流芳勞惟可則專銅鹽之任副舟楫之權雅有令名不誣信史爾後再持鈞軸重領藩維智識愈精始終無替旋屬省方之際犯難而來首冒鋒鋩忠貫天地由是將我大柄答爾明誠當其艱危之時實有整持之計沉機纍獻祕畫頻聞漸理綱條儼豫班序致使簮裾復盛禮樂重興克念爾勞諒洽人聽而又忿兹國難期以身先懇望統師力求專伐既佇平於狡穴貴獨耀於將星宸命登壇俾之仗鉞及乘白馬疊降紫泥雖嘉將就之勳尚滯進軍之䇿而諸軍觀望相顧遷延將謀蕩定之期因有改更之制在吾優賢之道求舊之心俾循和嶠之榮敷其五教更假卻縠之用惠此一方爾宜振彼宏圗聳於東夏式資論道共贊中興體我深懷敬承休命可檢校司徒守中書令使持節滑州諸軍事守滑州刺史充義成軍節度使滑潁等州觀察處置等使散官勳封如故主者施行崔胤武安軍節度平章事制陸扆門下入居巖朝施明略以匡時出陟齋壇運沉幾而鎮俗茍非材推命代望重當朝則何以宣我武威易其風俗朕志先定僉謀允成持危匡聖致理功臣金紫光祿大夫守禮部尚書兼中書侍郎同中書門下平章事兼集賢殿大學士判户部事上柱國清河郡開國侯食邑一千户崔胤文星垂耀神嶽標竒襲禮樂之清風冠簮纓之貴胄佩觿之際濳韜經濟之才筮仕以來尋積公輔之望洎更華胄益振令圗居論思而獻替盡忠提綱紀而回邪斂迹旋自繁劇俾司燮調茍利於君無所不至洎寵蒲坂再秉洪鈞明謀時合於蓍龜雅操不渝於風雨作礪之業為時而生乃眷重湖實維奧壤荐臻多難屢易元戎哀彼征人昌我皇度間爾嘗隨重幣往曵長裾迄今授卿臺階尚播詩詠是用拯彼塗炭宣豫惠和假其問喘之仁慰彼來蘇之望仍持相印式寵名臣暫追羊杜之政能未凂臯夔之事業往踐厥位爾惟欽哉可檢校禮部尚書同中書門下平章事功臣散官勳如故充義安軍節度湖南管內觀察處置觀察等使使持節澶州諸軍事守澶州刺史乾寧三年七月王摶威勝軍節度平章事制楊巨門下朕聞有國家者內則立四輔以貞百度外則建羣臣以寧八區持吾重權惟此二事其有弼諧之道已溢于簡編是期訓撫之規更滿於方嶽中外迭處古今所榮扶危匡國致理功臣金紫光祿大夫門下侍郎兼户部尚書同中書門下平章事監修國史判度支諸道轉運鹽鐵等使上柱國琅琊郡開國公食邑二千户王摶長淮衍慶維嶽降神抱文行忠信以飾身範圭璧琮璜而為器動多偉節言必匪躬自踐歷清華汪洋令望左垣蹇諤之稱凛然古風右掖絲綸之功垂作雅誥嗣後恤刑著效作賦推能陟于梅霖掌我金穀果罄致君之道無慚出相之門忠謀必成茂績仍舉朕念於越久罹凶災狂童既平疲俗未泰是思被我寬政進之皇風厚其澆漓滌彼汙染再造其任求才惟艱輟于三台先以十乘不改岩廊之任用資垣翰之光於戲阻於重江負于滄海號稱殷厚屬為剽輕雖兵革乍銷而閭井猶弊撫循之理可不慎諸副吾任賢俟爾報政可檢校户部尚書同中書門下平章事散官勳如故充威勝軍節度浙江東道管內觀察處置宣撫等使使持節越州諸軍事守處州刺史乾寧三年八月獨孤損靜海軍節度平章事制門下凝庶績而釐百工峻列藩而屏中夏中外迭處朝廷舊規乃眷交州是為奧壤我輟良輔時謂當仁銀青光祿大夫户部尚書兼門下侍郎同中書門下平章事監修國史判度支上柱國河南郡開國侯食邑一千户獨孤損德參瑞玉貞配兼金欎為君子之儒雅得大臣之體先皇帝爰徴有舊委以鈞樞燮調而四序無差獻納而萬邦取則昨者大禮雖期於七月豐財未貢於九州但抱焦勞莫克負荷而爾適當重任頗竭宏才因山之制俄然執紼之儀必備事君罄節來工收功所宜行酬賞之恩罷繁難之任登於揆路陟以師壇用示奬酬勉𢎞化理服我休命往惟欽哉可檢校尚書右僕射同中書門下平章事兼安南都護充靜海軍節度使安南管內觀察處置等使散官勳封並如故天祐二年三月唐大詔令集卷五十四
