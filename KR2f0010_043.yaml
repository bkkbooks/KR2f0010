body:
  text: 唐大詔令集卷五十三宋宋敏求編大臣宰相出鎮上陸象先益州大都督府長史制杜黃裳河中節度平章事制武元衡西川節度平章事制李夷簡淮南節度平章事制裴度河東節度平章事制韓𢎞河中節度兼中書令制李逢吉東川節度使制牛僧孺武昌節度平章事制李石荆南節度平章事制李德裕荆南節度平章事制白敏中邠寧節度平章事制崔鉉淮南節度平章事制出鎮上陸象先益州大都督府長史制入而弼政雖佇忠賢出則分憂更資循理中書侍郎同中書門下平章事三品兖國公陸象先體含清雅識備貞慤早修學行實允謨明三蜀稱殷一都之會邦寄為重朝難其選朕光宅四海惠康兆人乃眷所先必自于逺故端揆載舉藎臣攸屬可益州大都督長史劍南按察使開元元年十月杜黃裳河中節度同平章事制昔周之周召出為二伯是以宗公而領方任也鄭之桓武入作三事是以諸侯而宰邦政也然則荷中外之寵享崇髙之名不有盛德孰膺寵命金紫光祿大夫門下侍郎中書門下平章事兼𢎞文館大學士充太微宫使上柱國南陽郡開國公杜黃裳道惟無方材則不器陋齷齪之亷謹本誠敬而坦夷澄陂納寬瑞玉凝素夙簡衆望處于達官論議必通於大經損益咸酌於中制代所凖的朝之羽儀爰授樞衡俾居左右所緝者墜典所陳者格言色無面從志不推撓𢎞兹冒逺之化展彼夷凶之征將明則然忠利斯在惟股肱之郡有節制之師兵威外振於太原地形內錯於左輔是用謀帥僉歸碩人藉台庭之素風執戎鉞以蒞衆示以嚴重廣其封疆罷平陽之十連復元侯之四履超列鼎足仍參廟謀增二象之光輝霈一方之膏雨大邦雄屏群侯所瞻爾其敬哉無替舊績可檢校司空依前同中書門下平章事兼河中尹充河中晉絳慈隰等州節度支度營田觀察處置等使散官勳封如故元和二年正月武元衡西川節度同平章事制地有西蜀國之奧區百濮羣蠻外匝於封域雙流重阻內固於襟帶形勝所屬統綏惟艱近者剪其凶魁鎮以勳力實有威惠至于和寧而匪遑寧居纍布丹懇激戀闕之深志將執圭而展儀誰其尸之允在能者乃聽僉議輟兹台臣大中大夫守門下侍郎同中書門下平章事𢎞文館大學士太微宫使兼户部事上柱國蕭縣開國伯賜紫金魚袋武元衡器惟𢎞深行必端敬圭玉不琢雷風有威夙彰嘉聞亟歷清貫乃司邦憲有遂物之誠乃踐地官有阜財之績益振公望克諧朕心擢于鼎司授以大柄謀由外而不伐慎由衷而自彰展代工之勤𢎞冒物之化以道則直以心則和丙吉雅通於國體山甫誠補於衮職朝夕有恪毗豫一人眷兹西南憂寄方切非寬大無以蒞衆非慈惠無以厚生非誠信無以撫蠻夷非忠賢無以殿邦國故我心膂膺兹重任外分兵符以副於重往中佩相印不離於具瞻峻秩爰首於六官崇階遽登於七命且示加等仍疏大封勉承寵光無替朕命可銀青光祿大夫檢校吏部尚書兼門下侍郎同中書門下平章事成都尹充劍南西川節度使營田觀察處置統近界諸蠻及西山八國雲南等使進封臨淮郡開國公食邑二千户元和二年十月李夷簡淮南節度同平章事制柱石之臣台庭之老積碩望具瞻之德有弼諧寅亮之功授以土田流邦家之愷悌增其冕服表國器之形容此朕與將佐大僚示中外之一體也况兵戎重事東南實繁輟於廟堂以示其大正議大夫守門下侍郎同中書門下平章事上柱國成紀縣開國侯食邑一千户賜紫金魚袋李夷簡出身蒞政篤志守道素風彰於操履嚴氣峻於風雷自朕續承丕圗搜拔下位得文華於宗室升器幹於朝廷而所重者準繩所憂者財賦資倜儻以振起委強通而演成江漢之仁風載揚岷峨之美化斯盛既執大憲俄登公台輔豫一人凝是庶績忠讜有遭逢之勇姦邪無侵敗之機謂之股肱實無所忝言念淮海斯為奧壤走商賈之化財引舟車之艚挽凡所經理事非一隅控制之難於今尤切是用錫命俾為藩宣式加師長之名不改平章之務萬邦表率丞相正之可銀青光祿大夫檢校尚書右僕射同中書門下平章事兼揚州大都督府長史充淮南節度副大使知節度使事管內營田觀察處置押新羅渤海兩蕃等使元和十二年七月裴度河東節度同平章事制忠利於國者效積而事彰器周於物者志逺而任重况入調鼎鼐出鎮藩垣荷中外之寵榮膺文武之重寄將允僉望命兹輔臣金紫光祿大夫門下侍郎同中書門下平章事兼𢎞文館大學士上柱國晉國公食邑三千户裴度量惟𢎞深道在匡濟大玉藴連城之價長材負搆厦之姿言必公忠義本正直薦居鈞軸叶贊機謀匪躬以務其將明憂國不忘於造次當夷凶淮蔡仗節於師旅之間及殄寇青齊運籌於帷幄之內勤勞靡替𢎞益居多績用是嘉撝沖愈懇東夏雄屏實惟晉陽控大鹵之山川司北門之管籥橫制獯虜逺清疆陲是以輟獻納於沃心撫方隅於注意倚屬攸切勳庸可宣舟楫常賴其弼豫鈇鉞載觀其蒞衆勵山甫之恪德成方叔之壯猷式副具瞻勉揚休聞務既兼於左揆秩仍踐於中台爾其戒哉以服嘉命可檢校尚書左僕射兼門下侍郎同中書門下平章事太原尹北都留守充河東節度觀察處置等使韓𢎞河中節度兼中書令制門下王者統馭萬宇緝熙庶績必有文武全器柱石之臣出壯藩嶽入和台鼎使其效彰中外聲播華夷所居而人心自寧所蒞而軍令自肅允是任者其惟至公開府儀同三司守司徒兼中書令上柱國許國公食邑三千户韓𢎞受天地凝粹之氣得山川崇深之靈厚其體而壯其容靈其心而宏其量早洞戎韜之學允膺節制之權隱然大梁克有成績及功宣蕩寇志展匡王懇申戀闕之誠竟遂來朝之禮位髙百辟榮冠一時恩極而愈恭名光而益勵朕方欲樹以垣翰仗乎忠賢乃眷關河之守實惟股肱之郡自昔重寄無非元勳是用命以上公復兹雄鎮於戲頃居東夏父子借分閫之榮今處近郊伯仲並登壇之貴道茍積於忠實顧何愛於寵章往惟欽哉副我明命可司徒兼中書令河中尹充河中晉絳慈隰判節度觀察處置等使散官勳封如故主者施行李逢吉東川節度使制蜀門南次梁部東分地東江山境綿賨濮非志懷端重不可委以察亷非識度𢎞深不可畀以節制聿求公望爰自輔臣朝議大夫守門下侍郎同中書門下平章事輕車都尉賜紫金魚袋李逢吉文以發華行惟居厚忠懇每形於造膝直方斯見於匪躬自處台席再移星琯溫然德器休有素風觀其動本於仁足以敷王澤考其守歸於正足以奉師貞乃眷梓潼兹惟奧壤用去將相之任俾專藩宣之功豫欲頒政典於一隅故兼以夏卿之位豫欲布憲章於列郡故假以副使之權爾其節儉以訓俗澄清以檢吏因土風之剛悍使勇且知方就物産之殷充則既富而教茍能積實期有遐聞於戲朕與大臣進退示全其恩禮爾之報國始終宜竭其肺肝身雖逺于山川心豈忘于夙夜服兹休命汝往戒哉可檢校兵部尚書使持節梓州諸軍事兼梓州刺史御史大夫充劍南東道節度副大使知節度事管內度支營田觀察處置靜武軍等使散官勳如故元和十二年九月牛僧孺武昌軍節度同平章事制門下朕恭承大統屬官平寧方委心輔臣釐齊法度垂茂績於當代建休風於一時有深畏滿盈雅懷止足體隂陽迭敘之旨全進退居正之心詞抗不回秉忠難奪得不處之安郡益以榮名是用建新軍以統武昌佩相印而專節鉞文武二柄付于全才金紫光祿大夫中書舍人同中書門下平章事兼集賢殿大學士監修國史牛僧孺貞方而和俗慎密而坦夷秀乎文華篤於行實以直䇿悟憲宗以忠啓奉先朝積有信臣擢于廊廟法無越制官無及私門無託賔道無偏倚逮兹旬嵗亟聞昌言朕常惕然虛己以聽既終園寢之重克修郊廟之儀前志彌堅陳懇益固吾方涉學𢎞濟斯人耒耜戈矛仁夀鄙夭簡豫懷者非爾而誰是用輟中樞圗史之間開夏口油幢之府典型八座亷問七州往惟欽哉無替厥服可檢校禮部尚書同中書門下平章事鄂州刺史武昌軍節度使寶厯七年七月李石荆南節度同平章事制翼亮之臣寄畀攸重九功未敘則宜立於廟堂百度既貞則兼制於方嶽中外祖送式寵賢才銀青光祿大夫守中書侍郎同中書門下平章事充集賢殿大學士上柱國李石元精降祥河嶽鍾秀文含大雅學茂全經贍智通理亂之源達識究古今之變望欎人傑居為國楨頃者嘉其多能俾調鼎實動必循道知無不為每竭慮於謀猷思致豫於堯舜嘗司轉漕仍總征財盤錯之難鋩刃不滯增台耀之光彩揚鳳池之波瀾墜典咸修逺方畢服夙夜匪懈光我知臣近者情在進賢願辭衮職誠不易奪朕所難違乃眷荆門東南巨鎮江山重險舟車要衝此罷節符是遵權便台臣往蒞宜復前規俾登大將之壇仍持上相之印尹正望府亷規雄藩增榮峻階無忝我命可金紫光祿大夫中書侍郎同中書門下平章事兼江陵尹充荆南節度管內觀察處置等使勳如故開成三年正月李德裕荆南節度平章事制將相之任中外攸屬入則揚緝熙以正百度出則布威令以靖一方良以才難委寄咸重爰設齊壇之禮仍合台席之榮式示酬勞允諧僉望特進守太尉兼門下侍郎同中書門下平章事充𢎞文館大學士太清宫使上柱國衛國公食邑三百户李德裕嶽瀆間氣鐘磬正音葆粹孕和本仁叶義道藴賢人之業正謂王者之師詞鋒莫當學海難測自入膺大社克搆崇墉王猷國經契合彝矩丙吉罄安邉之術戎寇彌夷張華興伐叛之謀壺關洞契克荷先朝之旨弼成耆定之功布在册書輝映前古而能處劇不懈久次彌勤朕以嗣位之初懋勤在念宜先碩望以表優恩荆部雄藩地惟四楚總五都之要會包七澤之奧區兵賦殷煩居俗甚衆必藉舊德作鎮尹臨載崇五教之名俾賦十連之貢勉𢎞化理以續前勞可檢校司徒同中書門下平章事兼江陵尹充荆南節度觀察處置等使會昌六年四月白敏中邠寧節度使平章事制昔孫𢎞以儒學修身寵兼裂土鄧禹以勳庸著效儀比三司是內外共規古今所重再揚新命允屬元臣特進守司徒兼門下侍郎同中書門下平章事充招討山南平夏黨項兵馬都統制置使并南北兩路供軍使兼邠寧節度使白敏中才智足以贊玄功誠明可以匡大務事君惟恐不盡守道惟恐不孤而能以無心為待物之心以無用為當官之用朕君臨之嵗首付台衡六更星霜徑節如一自羌戎犯塞師旅屯邉招懷莫來征伐無狀爰用命爾往其鎮之果能潛移梟獍之心坐絡豺狼之首始自夏半及于秦正大建功勞克寧烽馹終此誠意非卿而誰今封部既清是用休爾之討伐馬牛皆散是用罷爾之統臨不移論道之榮更怙持衡之貴纂乃舊事對豫勤懷可守司空同中書門下平章事邠寧等州節度觀察使大中五年十月崔鉉淮南節度平章事制周用周召為楨幹之臣以正天下故入調鼎鼐則弼亮之道尊出撫方國則蕃宣之功著我有上相天實間生文武之用髙並於昔賢中外之寄允資於碩德爰舉旌鉞仗于股肱光祿大夫守尚書左僕射兼門下侍郎同中書門下平章事兼𢎞文館大學士充太清宫使上柱國魏郡開國公食邑二千户崔鉉瑞玉凝姿春林發秀貞諒植德謙虛葆光沖用既臻于化源達實每𢎞於理本擅松柏後凋之色徑節自髙含金石希代之音正聲特異洎發揚令聞輝靄公朝道無緇磷言符體要繼相如之麗藻夙侍禁林嗣傅説之旁求早膺台席日者歷居亷鎮常總朝綱令肅方隅風行憲署及膺我寵擢復司化權每正惟公持平不撓暢緝煕之茂典𢎞經濟之明謀功勒旗常道光夷貉勵山甫匡周之操竭子房佐漢之忠終始一心周旋七年富人斯久偉績彌勤是宜載圗爾庸優爾恩寵乃眷淮海號為通都控扼實據其咽喉封部適罹其災患豫所注意爾其往哉於戲居則秉鴻鈞紹阿衡之業動則駕長轂圗方叔之勳茍非全才孰付重任若撫封之長術阜俗之嘉謀一部之慘舒三軍之政令我屬良弼則又何規勉登將壇敬佩相印副是寵寄其惟戒哉可檢校尚書左僕射同中書門下平章事兼揚州刺史大都督長史充淮南節度副大使知節度事管內營田觀察處置等使大中九年八月唐大詔令集卷五十三
