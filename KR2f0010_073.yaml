body:
  text: 唐大詔令集卷八十三宋宋敏求編政事恩宥曲赦凉甘等九州制武德二年十月赦益州夔州管內疏理囚徒制貞觀四年二月大赦開元三年正月德音貞觀九年三月大赦原減囚徒敕宥京城罪人敕孟夏疏决天下囚徒敕以春令減降天下囚徒敕恩宥曲赦凉甘等九州制朕恭膺寶命綏靜氓黎思俾宇內躋於仁夀而河湟之表比罹寇賊拘逼凶醜擁隔朝風元元之民匪遑寧晏夙興厪慮旰食忘疲重勞師旅不令討擊馭以遐算且事招懷而慕化之徒乘機立效兵不血創費無遺鏃今凶狡即夷西陲克定逺人悅附政道惟新宜播惠澤與之更始可曲赦凉甘瓜鄯肅㑹蘭河廓九州自武德二年五月十六日以前罪無輕重已發覺繫囚見徒並從原免桀犬吠堯非無前喻棄瑕蕩穢列聖有規惡言不順及邪謀惑計者並從洗滌一無所問武德二年二月武德二年十月赦朕祗膺靈命君臨區宇承凋弊之餘拯橫流之難雖復蠲除徭賦督課耕農安集黎元與之休息然而鯨鯢未剪四海多虞師旅薦興事不獲已及其士卒浮惰茍求逸樂憚於征役離其營伍因此逃竄潛匿﨑嶇竊為生資規免朝夕良由勸勵不明部署失所踈慢之責在於朕躬琴瑟不調已云變革多墜刑網兼堪痛悼宜從寬宥許以自新其義士募力有背軍逃亡者自武德二年十月二十日以前罪無輕重皆赦除之饑寒困敝不能自存所在官司隨事賑給士非素屬難以應敵設法垂憲期於不犯自今以後有背軍鎮征役者隨即科處必無容貸宜明宣告咸使聞知益州夔州管內疏理囚徒制緩刑議獄哲王彞訓解網泣辜前賢茂軌朕君臨海內撫育黎元一物乖所納隍興慮其益州道行臺及夔州總管府衆務臻集統攝遐長囚徒禁繫其數不少或控告未申多有寃屈或注引肆意濫及貞良致使文案稽延訟獄繁擁念彼枉滯情深愍惻其益州管內諸州委御史大夫無逸檢校夔州管內委趙郡公孝恭檢校所有囚徒悉令覆察務使寬簡小大以情但有負罪逃亡離業鄉邑無問輕重悉令歸首明加勸導務修墾植庶使家給人足稱朕意焉武德四年四月貞觀四年二月大赦天生蒸民樹之司牧莫不仰膺靈命克嗣寶圖用能永享鴻名常為稱首朕君臨八表於今四載夙興夜寐無忘晷刻履薄馭朽思濟黔黎惟此至誠庶幾王道上荷蒼旻之眷下藉股肱之力宇內休平遐邇寧泰率此區域致之仁夀憬彼犬戎為患自昔軒昊以來常為冦暴是以隆周致涇水之師强漢受白登之辱武夫盡力於關塞謀士極慮於廟堂征伐和親無聞上策有隋災亂慿陵轉甚疆場之前曽無寧嵗朕韜戈㦸務其存養自去嵗迄今降款相繼不勞衛霍之將無待賈朝之略單于稽首交臂藁街名王靣縳歸身夷邸襁負而至前後不絶被髮左袵之鄉狼望龍堆之境蕭條萬里無復王庭唯頡利挺身逃竄林穴天網雲布走伏何所大同之世諒在兹日斯皆上𤣥降佑清廟威靈豈朕虛薄所能致此方欲至仁化物宜存寬惠思與萬邦同享斯福可大赦天下自貞觀四年二月十八日以前罪無輕重自大辟以下見繫囚徒皆赦除之逋負官物三分免一分謀反大逆妖言惑衆及殺期親以上尊長奴婢部曲及主官人枉法受財不在赦例鰥寡孤獨不能自存者州縣量加賑恤賜天下大酺五日敢以赦前事告官者以其罪罪之貞觀九年三月大赦天地播氣垂生育之德皇王御厯宏覆幬之仁故能財成萬類光宅八表朕祗奉慈訓嗣守鴻業承百王之季末屬四海之凋殘晨興夕惕無忘兆庶尅已勤躬思隆政道欲使隂陽順序干戈載戢庶幾前烈致兹刑措而山東之地頻年不稔水雨為災饑饉相屬蠢爾西戎屢擾邉境事不獲已遂勞兵車良由誠未動天德不被物興言念此撫已多慚加以澆僞尚繁刑典仍用雖復留心聽斷明慎庶獄常恐縲絏之中負寃靡訴憲綱所及弗辜致罪一物有怨責深在余今嵗惟暮春時屬生長助天布澤與物更新可大赦天下自貞觀九年三月十六日昧爽以前大辟罪以下皆赦除之其常赦不免者不在赦例鰥寡孤獨不能自存者所在官司量加賑恤開元三年正月德音青春式序陽和布氣萬物熙熙莫不遂其性而嘉其生也申念愚人干我王度日陷坑穽置之網羅朕代天理物為人父母眷言囚獄良增隱惻豈憲章之尚密將教導之不明欲順時令抑惟恆典兩京及天下見禁囚除犯惡逆并造僞以前宜决一百配流嶺南及磧西諸州其餘一切放免原減囚徒敕蘇頲敕惟刑恤哉古之道也朕撫臨四海茂育萬邦思致淳風登之夀域期畫冠而不犯故開羅而在宥念兹下愚自抵常法時屬盛夏天其養長在物最靈惟人為貴朕處臺榭猶有鬱蒸之毒彼居囹圄能無炎熱之憂故令紫微黃門備加按省覽其所奏用憫於懷爰矜可恕之罪必務惟輕之義將布寬惠宜從原減依前件開元三年五月十六日宥京城罪人敕五刑之用以禁奸慝三宥之設以矜愚耄朕永康四海憂在兆人俾臻大化爰措庶獄而愚妄之氓抵犯或聞向隅可哀當寧興軫今天地既肅戒嚴在命時分具令非罪無留載念幽犴思布生德宜崇减死之恩式明宥過之典其京城內犯罪等人昨令按覆其中造僞頭首及謀殺人斷死者杖一百配嶺南惡處雜斷罪死者决一頓免死配流逺處雜犯流移者各減一年杖罪以下並免開元八年九月孟夏疏决天下囚徒敕法以間邪刑以助化因時而制蓋非獲已朕自臨御天下憂勞庶務以至誠感物道冀有孚以至理致和仁或由已豈欲以刑制政期於以化清刑故不用殊絶之誅每施寬大之令而遷善者衆犯法者寡斷獄十數聞諸有司然猶一夫不獲在豫多愧寰宇殷廣京都浩攘繫於徽纆或未聽理逮捕斯擾糧饋為勞生業或虧何以卒嵗言念於此深用憫然况今長嬴在辰耘耨斯切順時立政在乎恤人思宏在寬之典庶無留獄之弊其天下囚徒即令疏决其妖訛盜賊造僞頭首既深蠧時政須量加懲罰刋名至死者各决重杖一百長流嶺南自餘枝黨被其詿誤矜其至愚量事責罰使示懲創流以下罪並節級處分令中書門下就大理及府州縣詳理開元十九年四月二十日以春令减降天下囚徒敕行慶施惠所以奉天緩刑恤獄所以愛人今陽和布序草樹自榮而或入於罪𨽻嬰於舂藁同被亭育之恩未暢生成之施言念於此深用憫然思宏時令以哀庶獄天下囚徒罪至死者特寬宥配𨽻嶺南逺惡處其犯十惡及僞造頭首量决一百長流逺惡處流罪罰鎮三年其徒以下罪並宜釋放其有官吏犯贓推問未了者仍准取實狀定名訖然後准降處分計贓一匹及與百姓灼然有仇者並不須令却上其上都委中書門下疏理京城委留守天下諸州委長官並當日處分其責保停務之類並宜准此開元二十年二月唐大詔令集卷八十三
