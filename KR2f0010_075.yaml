body:
  text: 唐大詔令集卷八十五宋宋敏求編政事恩宥三大厯七年大赦大厯八年大赦大厯九年大赦宥京城禁囚敕赦京城囚徒制元和十三年大赦長慶四年正月一日德音恩宥三大厯七年大赦門下濟於道者化醇而刑措善於理者綱舉而網踈朕涉道未宏燭理多昧常亦遐想太古髙挹玄風保合太和在宥天下蓋德薄而未臻也是用因時以設教便俗以立功務盡平恕用申哀恤又教淺而多犯也加以邉虞未戢井賦猶繁荒瘵之餘寇攘斯起遂令圜土嘉石之下積有纍囚危章互簡之中困於法吏屬盛陽之候大暑方蒸永念狴牢何堪鬱灼所以沮傷和氣感致咎徴天道人事豈相逺也如聞天下諸州自春以來或愆時雨首種不入宿麥未登哀我矜人何恃不恐皆由朕過益用懼焉惕然憂嗟深自咎責所以悉減常膳别居齋宫禱於明神冀獲嘉應仲夏之月靜事無刑以助宴隂以宏長養斷薄決小已過於麥秋繼長增髙宜順乎天意可大赦天下其大歷七年五月十五日昧爽以前已發覺未發覺已結正未結正應天下見禁囚徒罪無輕重一切並宜放免所由不須類例聞奏宜令諸道節度觀察及州牧縣宰等於當官內所有名山靈迹各精誠致祭祈降甘澤冀獲豐稔永思流弊庶振風猷其巴南諸州仍嵗水旱迫於凍餒或至流離因有剽求茍全性命懼刑網之所及始嘯聚以相依抑有由焉蓋非獲已永言其弊用軫於懷如能相率來歸各安生業並無所問咸許自新敢以赦前事相告者以其罪罪之亡命山澤挾藏軍器百日不首復罪如初赦書日行五百里宣示中外咸使聞知大厯八年大赦自古帝王順時行令當此時之炎燠應南風之長嬴必事無刑解網申惠敘麥秋之氣而代天理物矣朕獲奉圭璧虔恭郊廟二紀有餘承纍聖之鴻業為兆人之父母戰戰兢兢恐懼不濟而天地幽贊隂陽化育關輔之內農祥薦臻嘉榖豐衍宿麥滋植閭閻之間倉廪皆實百貨低賤實曰小康此皆上帝報貺列祖儲祉卿士存誠元元盡力之效思與萬方百辟咸共樂之而未能也况或抵常憲纍然就拘辨對官曹置閉獄户永惟械繫之慘追犯冒之由皆自王化未醇風教有闕俾人忘恥格俗虧禮讓陷在刑典久於狴牢當順陽助生之時積寃蔽感傷之氣百姓有過在豫一人顧諟欽恤誠切傷痛用申在宥之旨庶洽惟新之令其大歷八年五月二十九日昧爽以前天下見禁囚徒及已發覺未發覺已結正未結正死罪並降從流流以下並宜放免敢以赦前事相告者以其罪罪之亡命山澤挾藏軍器百日不首復罪如初夫人君承天之序則三時有成自中刑外則四海蒙福嗟爾庶士諒悉豫懷大歷九年大赦朕誕膺天命以撫方夏夙夜兢惕保祐惟人懼庶獄之未孚俾一夫之不獲思用哀恤與之和寧頃屬夷夏多虞干戈是務徴賦頗重黎元不康內迫艱窮外乘師旅因行盜竊自陷典刑纍然圜土之下停勦視蔭之命永念愚惑惻焉疚心而寰區之間舉類斯衆今火中惟夏長嬴及時鬱然沉繫致傷和氣萬方有罪在豫一人將洽至淳之化更布維新之理其大歷九年四月二十四日昧爽以前大辟罪以下已發覺未發覺已結正未結正罪無輕重一切並宜放免敢以赦前事相言告者以其罪罪之其在軍將士有刀箭所傷久嬰沉疾者戮力疆場身當鋒創各委所由量給藥物厚加優賞其陳亡將士亦仰本使隨事優恤妻子各申錫賚其百姓鰥寡孤獨不能存濟者困窮無主誠可哀傷所在府州縣長官每年以諸色官物量加贍恤令其得所亡命山澤挾藏軍器百日不首復罪如初在宥之典既周動植純嘏之錫庶延子孫凡在品彚各宜遷善宣示中外令悉朕懷宥京城禁囚敕頃屬煩暑差候愆陽積旬處於髙明之中猶有鬱蒸之歎而况幽閉獄户辨對官曹甫臨秋期將正時憲重循欽恤之道載宏全宥之仁其京城內外禁囚犯流以下罪並宜釋放赦京城囚徒制常袞朕以寡薄獲守丕圖恭默思道克謹天戒常恐至誠不逹景化未敷寅畏之誠寢興在慮自純陽用事霖雨愆旬麥雖有秋禾未長畝有阻三農之候將貽萬姓之責是用齊心滌思禱於上下神祗雲從自郊月未離畢膏澤不降憂勤益深雖水旱成災隂陽恆數而政刑失中或致愆伏豈簡孚有爽𠂻敬未誠歟嗟我矜人陷於刑辟當炎蒸之序在縲絏之中久積幽寃有傷和氣所以引成湯之六事過實在豫寬大禹之九刑誠存育物期於作解以救如焚其京城見禁囚徒死罪以下降從流流以下罪一切釋放仍委中書門下即速與處分訖聞奏雖罪疑從輕或謂之長惡宥過無小寧失於不經庶空夏臺用緩秋典宣示中外令知朕意元和十三年大赦朕聞王者法天作則與衆守邦奉天無私居兆人上當恭已嚮方之際切臨深馭朽之懷憂勤靡遑今古何逺所重者兵革不試軌度自貞熙仁育和以至大道朕顧惟菲德祗奉睿圖承昊天之眷命纘列聖之丕緒昃食以求至理虛心而俟昌言兢兢業業常懼失墜逮今十有四年矣道且希於廣運意嘗在於包荒推誠則深感物未至頃嵗蜀川浙右怙亂阻兵人神共誅剪滅相次姑務偃革期於措刑方簫勺以懲姦庶干羽以成化淮蔡寇孽稔禍挻災問罪興師蓋非獲巳念征行之暴露軫饋給之煩勞中宵惕然載益祗厲妖凶既珍黎庶有康斯皆宗社垂休中外協力將勤施於下土冀昭答於上玄朕兹思所以與羣公卿士勵精於庶政也屬獻嵗發春授時惟敬勾萌盡逹幽蟄咸蘇徽纆可矜鰥寡存念俾疏網之是決與慶澤而惟新可大赦天下元和十三年正月一日昧爽以前大辟罪以下咸赦除之長慶四年正月一日德音朕以寡昧獲守重器兢厲畏惕於兹五年皇天之事罔不修備而大典有闕舉而行之粵以元正御示正殿百辟咸序萬方來庭思欲推至仁以布和奉天時而施令况上玄貽慶列聖垂休默輔豫躬以至寧復爰思士庶同被慶靈並兹囚𨽻亦合流澤自今年正月一日以前犯死罪者並降從流流罪以下遞減一等其故殺官典犯贓十惡者並不在降免之列降官未經量移者與量移近處流人各據本年限與減一年如本限止一年放還朝賀之禮國之盛事肅恭班位敷讚威儀俾升慶賀以示宏普其應元日緣朝賀行事官三品以下賜爵一級四品以下加一階文武常參官六品以下及宗子應加陪位者并諸賀正使各賜勳一轉諸番陪位各賜有差今兵革甫寧典常粗舉雖慙至理可謂小康唯水旱猶虞蒸黎重困公私蕃積頗有未豐宜令諸道觀察使刺史各具當處利害其有弊事可革有益於人者何術可以漸致富庶附驛以聞亦不用專使詣闕以省煩費其封畿之內百姓利病以委京兆河南尹具以條奏束帶立朝必資忠讜濟時利物式佇謨猷其文武百寮所上封事極言得失無有所隱事可施行者便委中書門下量加奬用朕以執契收馭時賢在典化教明至道期致太和凡在臣寮宜知此意唐大詔令集卷八十五
