body:
  text: 唐大詔令集巻一百十五宋宋敏求編政事慰撫上淮安王神通山東道安撫大使詔皇太子等巡京城諸縣詔鄼國公軌等益州道安撫大使詔張鎮州淮南道安撫詔存問并州父老詔遣畢構等慰撫諸道詔遣楊虚受江東道安撫詔遣盧絢等諸道宣慰賑給勅宣慰西京逆官勅宣慰京城僧道父老勅安緝京城百姓勅慰諭朔方將士勅遣使安撫制遣鄭叔清江淮宣慰制遣劉晏宣慰諸道勅慰撫淮安王神通山東道安撫大使詔隋徳下衰政荒民散九州輻裂四海𤓰分元元無辜困豺狼之吻悚悚黔首罹兵革之災朕祗膺寳圖救其危墜一物失所情深納隍今趙魏之人頃承大化海岱之境思稟朝章然而尚迫冦戎受拘兇暴經途遐阻末由自達宣風布教必佇循良柔服招携事資明庶右翊衛上將軍淮安王神通地惟近屬功參運始杖莭建旟乆當重寄可山東道安撫大使其山東諸道軍事並受節度下武徳元年十月皇太子等巡京城諸縣詔隋末道消運屬陽九盗賊蠭起饑饉薦臻四海之民墜於塗炭是以上天降鑒爰命朕躬綏静黎元克定元醜府庫倉廪所在開發流冗之民隨加賑撫言念亭育鍳寐匪忘然年穀不登民多困乏一物失所有甚納隍宜加存問救其疾苦可令皇太子建成巡京城側近諸縣秦王巡京城以東左僕射裵寂巡京城以西詣彼閭閻見其耆老親省風俗亷察吏民乏絶人量加賑恤有如寃滯並為申理髙年疾病就致束帛武徳二年閏二月鄼國公軌等益州道安撫大使詔朕受天明命撫育萬方康俗齊民無忘鑒寐西蜀僻逺控馭巴夷厥土沃饒山川遐荒往者隋末喪亂冦盗交侵流寓之民遂相雜撓逰手墮業其類實繁冦攘矯䖍因此而作王業伊邇務從草創牧宰庶僚隨事遷易州縣分併權宜廢置然而王道未洽民瘼猶存静言思之夙夜軫念澄原正本義在更張可令秦州揔管鄼國公軌御史大夫滑國公無逸為益州道安撫大使宣揚朝典進擢亷平貶黜苛暴申理寃滯忠孝貞莭表其門閭鰥寡孤惸量加贍恤事有便宜並委處分張鎮州淮南道安撫詔三楚之地江山遐阻五嶺之表經途遼夐自有隋失馭盗賊交侵聲教莫邇方隅乆絶朕受圖膺運君臨寰宇率土之濵情均撫字方今函夏肅乂文軌一同尉侯無虞要荒率職然而江蠡之𣲖或阻冦戎閩禺之鄉未聞正朔左武侯將軍黄國公張鎮州大將軍合浦縣公陳知略二方首族早從歴任思展誠効緝寧州里鎮州可淮南道行軍揔管知略可嶺南道行軍摠管以安撫之武徳四年八月存問并州父老詔昔隋末喪亂百姓凋殘酷法滛刑役煩賦重農夫釋耒工女下機徴召百端冦盗蜂起人懐忿怨各不聊生水火之切未足為喻先朝不忍塗炭思濟黎元朕纂承神筭奮劒南起與彼境英雄同心叶力不顧軀命以救蒼生爰自晉陽起兵唱義推鋒接刃櫛風沐雨除凶去暴以徳行仁天下乂安戎車止息九夷八狄莫不来庭以至於今二十餘載豈予一人所能致此實賴天地之仁宗廟之福賢人君子為朕股肱文士盡其才智武夫宣其勇力朕端拱無為庶幾王道然漢髙悲歌常思豐沛晉皇吟詠惟在温原此人之情也况並部之地創業之基與諸父老首立大事引領北望感慕兼深思與父老一日叙舊懐之在心所不忘也但海内殷曠萬幾事多省巡四方未遑圖息父老宜約勒鄉黨教導後生親疎子弟務從忠孝必使風俗敦厚異於他方副朕此心光示逺近使旌表門閭榮耀鄉里書名竹帛豈不美歟夏序甚熱想各平安善自怡養動静聞奏故有此勅想見朕心貞觀十五年六月遣畢搆等慰撫諸道制昔者明王之治天下也内有公卿允釐庶績外有侯伯司牧羣黎猶懼至道不孚淳風或替故有巡狩之典黜陟幽明行人之官省方察俗用能遐邇清寧情偽無作於變時雍率其道也朕祗膺嗣徳恭守帝圖上禀過庭之謀下憑庶士之力竭精思理兩載於兹兾逮小康漸及至化而區宇遐逺風教未同負扆長懐責深在已近者姦回究切釁起蕭牆宗社降靈應時殱殄今又恭承聖訓摠統大猷率彼百官齊兹七政恐倉廪不實禮節未興吏靡息於貧賤人或及於幽枉永言於此明發疚心今卜征未習逺邁非宜分命輶軒慰撫黎庶畢構等操履公清識具明允茂績彰於歴試嘉譽滿於周行宜膺行李載光原隰所至之處申諭朕心並合屏絶浮華敦崇仁厚務修孝弟勤事農桑耆老鰥惸媍人家口不自存者咸加恤問舉以言揚唯賢是急若有良材異等藏器下僚哲人奇士隠淪屠釣審知才行灼然者各以名聞凡百牧宰洎乎吏人咸知朕心各敬乃事勤則不匱仁逺乎哉勉以朂之以副朕意先天二年七月遣楊虚受江東道安撫勅蘇頲勅淮海是稱谿險山川重複水陸殷溱去嵗田収稍乖豐稔念兹人庶頗致饑乏朕為人父母深用惕然近聞雨澤應莭秔稻有望目前之困糊口猶切思從蠲省用救荒弊宜令給事中楊虚受往江東道安撫存問不急之務一切除减觀察疾苦量宜處置刑獄寃滯委使詳理百姓間有偉識異才潜藏鱗羽隠淪屠釣棲遲閭閻官人内有貪致茍得背公徇私循默自守養望充位者還日各以名聞所至之州具令宣布求瘼恤隠稱朕意焉應須判官及典凖例馳驛即發遣開元二年四月十一日遣盧絢等諸道宣慰賑給詔言念蒼生心必遍於天下自牧多福澤偏潤於京師所以歴選列城聿求連率豈徒判察將委緝寧朝散大夫檢校御史中丞闗内宣慰賑給使上柱國盧絢等任寄已深聲實兼茂咸貫通於理道益純固於公心或華髪不衰或白圭無玷可以軌儀郡國康濟黎元間嵗以来數州失稔頗致流冗能勿殷懐而吏或不畏不仁或不安不便誠須矯過必仗賢能凡此使車不無殷監比事掣肘務欲摠權小有舉於毫髪大莫振於綱領本令調察却致煩苛永言所期豈云自弊今既各膺重寄允謂通才以蠲疾苦之原當叶大中之義若令行一道利及萬人朕所設官以俟来者朝之優秩必歸令譽言可復也宜副朕懐開元二十二年二月宣慰西京逆官勅賈至勅西京官吏等逆㓂搆禍暴犯京邑我國家圖必勝之勞取萬全之功是以避狄而西外飭師旅遂使卿等奔竄無所力屈狂冦既閑之以師旅又臨之以兵戈或强逼駈馳或偽置官爵事不獲已皆是脅從朕深悉焉無懐反側今天既悔禍宗廟垂靈王師東征雷擊電掃逆徒勦絶闗輔載清卿等代承國恩家𫝊禄位乃祖乃父為我純臣雖䧟賊中固深憂憤是用惻隠矜憫于懐宜各自安更勿惶懼朕與人更始豈求録微瑕哉旬日之間與卿等相見至徳三年宣慰京城僧道父老勅勅西京緇黄耆夀百姓頃者逆兵暴至侵逼長安王事西巡修集兵馬遂使卿等䧟於賊首不得奔逃或骨肉之間枉罹屠害女子之輩多遭虜掠朕每念此流涕痛心又比来米鹽匱竭人多餓死道殣相望或賊徒逼脅駈使事窮力屈盡是脅從朕甚閔焉今已京城再復賊冦殱滅豈獨宗廟之福社稷之靈京師等兆民懇誠感達天地之所致也方與卿等雪恥辱布維新大棄疵瑕𢎞宥罪戾恐未達意或惶恐焉各宜寧居勿懐反側各令宣諭與卿等不乆相見至徳二年安緝京城百姓詔勅京城之人乆䧟凶醜亦既平定莫非王臣比屋可封唐之人闔境皆戴商之舊復以宗廟之器府庫之資散在閭閻紊煩綱紀主守者闕以供事竊取者冒其常用所以遣其檢括必使當實如聞小臣失所遂使流言冦攘資財驚擾士庶官吏不修其法豪强横有縱暴或得一官物即破人家産或捕一姦吏則傍累親隣仍有不逞之徒因兹恐嚇大為侵暴百姓寃苦永言哀念良深嘆息委京兆尹兼御史大夫李峴勾當諸使檢括一切宜停妄有欺奪宜即推捕奏聞仍牓坊市務令安緝副朕之意焉至徳三年正月慰諭朔方將士勅賈至勅朔方將士等自冦逆亂常殆涉三載卿等被堅執鋭暴露原野東征西伐未嘗暫寧雪霜風雨之間白刃鳴鏑之下衆勤至矣朕甚憫焉頃者出并陘収趙地還破同羅逋虜復入河東故郡累有功績王室賴之昨者清渠之戰師徒不利亦聞卿等傷夷甚多兵者危事一挫何損但當勉勵以為後圖神祗助善天地厭禍仗順招逆無憂不平知卿等所在集兵更加訓練便於再舉思滅殘徒此忠臣義士感激之深也已令江淮轉運布帛到日議賞非遙今闗中麥秋見將収穫六軍粮備實資於此逓須相朂勿犯田苗甲杖刀槍已令支送誠宜磨勵大雪前恥事平之日卿等並封侯金帛珪璋無所愛惜故令宣慰知朕意焉至徳元年遣使安撫制勅厄運者天之時也理亂者人之政也是以軒轅不能止蚩尤之患帝舜不能無有苖之征葢在於人君修刑徳以除之也頃者羯賊凶害當争戰之地則肌骨多斃於鋒鏑在遐僻之方則杼柚其空於征賦離鄉去邑棄業亡家契濶凍餒飄颻是逼朕毎永念心折涕零是用嚴奉睿謨㳟行天罰躬被甲胄大率戎夷掃清中原誅斬蛇豕豈朕薄徳皆建功業葢人心竭莭于本朝而戮力于冦難也所以給其優復减其賦税省其聚歛息其征徭賑其匱乏宥其罪戾空其倉廩捨其逋懸養其傷痍䘏其死事將使百姓永登仁夀猶慮撫字有闕尚疾苦之未除於是分遣使臣親訪閭里夫人君髙居天位非可以目遍四海耳周八極必仗賢能以廣視聼頃之使臣咸未稱職多俯仰經略未盡至公遂令逺人寃不上逹弊不下去今擇朝端忠貞仁恵之士飲氷乘馹廵撫四方其有政教煩苛勅令不便妨於耕稼害於𧖟桑徴損於人無論小大咨爾兆庶必聞原委又有官吏科虐豪猾侵漁擾於黎甿冒於貨賄上無隠也當悉懲之朕方以百姓為心蒼生為夀非欲自賢自聖而為理舍暴恵奸而随人率土之濵宜悉朕意至徳二十年二月遣鄭叔清往江淮宣慰制賈至勅逆旅未平師旅淹嵗軍用匱竭常賦莫充所以税畆於荆吳校練於淮海從權救弊葢非獲己夫法明則吏不欺歛均則人不怨輯事無擾繫乎使臣度支員外郎叔清貞固幹事用莭愛人考志視成可厯斯任宜以本官兼御史充江淮東西道宣撫使至徳二年七月十二日遣劉晏宣慰諸道勅嵗之不易征伐繁興河洛蕭然江外尤劇供上都之國用給諸道之軍須庶務徴求未遑少息火耕水耨夏葛冬裘充饋運而屢空壹戎衣而不足農人少而轉困編户流而卒歸自北之化未淳大東之詞方切君為心也朕甚痛焉今區宇漸寧凋殘已甚惕然躬已姑務息人懼惸婺之無告思省方以親問時邁未可日昃増勞載懐鴻雁之詩用解吾人之愠必資循行以周爰咨諏皇皇者華以申喻朕志宜令太子賔客兼御史大夫劉晏往諸道宣慰應百姓有徴科煩重人户逃亡及水旱所損不能支濟者並與本道莭度使計㑹蠲削安在遂便處置訖具狀上奏官吏之政在邦必聞知無不為公道斯在其租庸使刺史縣令錄事參軍有精於政理賦均役平州縣之間稱為良吏者具名以奏别有甄異如或殘忍慢法貪汚賍官有害於人不應時務者具狀以聞仍與本道節度觀察使計㑹舉按四海至廣九重至深思使下情上通常令上㫖下逹務於審慎朕之意焉唐大詔令集巻一百十五
