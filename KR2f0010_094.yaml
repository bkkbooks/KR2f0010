body:
  text: 唐大詔令集卷一百十五宋宋敏求編政事慰撫上淮安王神通山東道安撫大使詔皇太子等巡京城諸縣詔鄼國公軌等益州道安撫大使詔張鎮州淮南道安撫詔存問并州父老詔遣畢構等慰撫諸道詔遣楊虛受江東道安撫詔遣盧絢等諸道宣慰賑給敕宣慰西京逆官敕宣慰京城僧道父老敕安緝京城百姓敕慰諭朔方將士敕遣使安撫制遣鄭叔清江淮宣慰制遣劉晏宣慰諸道敕慰撫淮安王神通山東道安撫大使詔隋德下衰政荒民散九州輻裂四海瓜分元元無辜困豺狼之吻悚悚黔首罹兵革之災朕祗膺寶圖救其危墜一物失所情深納隍今趙魏之人頃承大化海岱之境思稟朝章然而尚迫冦戎受拘凶暴經途遐阻末由自達宣風布教必佇循良柔服招携事資明庶右翊衛上將軍淮安王神通地惟近屬功參運始杖莭建旟久當重寄可山東道安撫大使其山東諸道軍事並受節度下武德元年十月皇太子等巡京城諸縣詔隋末道消運屬陽九盜賊蜂起飢饉薦臻四海之民墜於塗炭是以上天降鑒爰命朕躬綏靜黎元克定元醜府庫倉廪所在開發流冗之民隨加賑撫言念亭育鑒寐匪忘然年穀不登民多困乏一物失所有甚納隍宜加存問救其疾苦可令皇太子建成巡京城側近諸縣秦王巡京城以東左僕射裴寂巡京城以西詣彼閭閻見其耆老親省風俗亷察吏民乏絶人量加賑恤有如寃滯並為申理髙年疾病就致束帛武德二年閏二月鄼國公軌等益州道安撫大使詔朕受天明命撫育萬方康俗齊民無忘鑒寐西蜀僻逺控馭巴夷厥土沃饒山川遐荒往者隋末喪亂冦盜交侵流寓之民遂相雜撓逰手墮業其類實繁冦攘矯虔因此而作王業伊邇務從草創牧宰庶僚隨事遷易州縣分併權宜廢置然而王道未洽民瘼猶存靜言思之夙夜軫念澄原正本義在更張可令秦州揔管鄼國公軌御史大夫滑國公無逸為益州道安撫大使宣揚朝典進擢亷平貶黜苛暴申理寃滯忠孝貞莭表其門閭鰥寡孤惸量加贍恤事有便宜並委處分張鎮州淮南道安撫詔三楚之地江山遐阻五嶺之表經途遼敻自有隋失馭盜賊交侵聲教莫邇方隅久絶朕受圖膺運君臨寰宇率土之濵情均撫字方今函夏肅乂文軌一同尉侯無虞要荒率職然而江蠡之𣲖或阻冦戎閩禺之鄉未聞正朔左武侯將軍黃國公張鎮州大將軍合浦縣公陳知略二方首族早從歷任思展誠效緝寧州里鎮州可淮南道行軍揔管知略可嶺南道行軍總管以安撫之武德四年八月存問并州父老詔昔隋末喪亂百姓凋殘酷法淫刑役煩賦重農夫釋耒工女下機徴召百端冦盜蜂起人懷忿怨各不聊生水火之切未足為喻先朝不忍塗炭思濟黎元朕纂承神算奮劒南起與彼境英雄同心叶力不顧軀命以救蒼生爰自晉陽起兵唱義推鋒接刃櫛風沐雨除凶去暴以德行仁天下乂安戎車止息九夷八狄莫不來庭以至於今二十餘載豈豫一人所能致此實賴天地之仁宗廟之福賢人君子為朕股肱文士盡其才智武夫宣其勇力朕端拱無為庶幾王道然漢髙悲歌常思豐沛晉皇吟詠惟在溫原此人之情也况並部之地創業之基與諸父老首立大事引領北望感慕兼深思與父老一日敘舊懷之在心所不忘也但海內殷曠萬幾事多省巡四方未遑圖息父老宜約勒鄉黨教導後生親疏子弟務從忠孝必使風俗敦厚異於他方副朕此心光示逺近使旌表門閭榮耀鄉里書名竹帛豈不美歟夏序甚熱想各平安善自怡養動靜聞奏故有此敕想見朕心貞觀十五年六月遣畢搆等慰撫諸道制昔者明王之治天下也內有公卿允釐庶績外有侯伯司牧羣黎猶懼至道不孚淳風或替故有巡狩之典黜陟幽明行人之官省方察俗用能遐邇清寧情偽無作於變時雍率其道也朕祗膺嗣德恭守帝圖上稟過庭之謀下憑庶士之力竭精思理兩載於兹兾逮小康漸及至化而區宇遐逺風教未同負扆長懷責深在已近者姦回究切釁起蕭牆宗社降靈應時殱殄今又恭承聖訓總統大猷率彼百官齊兹七政恐倉廪不實禮節未興吏靡息於貧賤人或及於幽枉永言於此明發疚心今卜征未習逺邁非宜分命輶軒慰撫黎庶畢構等操履公清識具明允茂績彰於歷試嘉譽滿於周行宜膺行李載光原隰所至之處申諭朕心並合屏絶浮華敦崇仁厚務修孝弟勤事農桑耆老鰥惸婦人家口不自存者咸加恤問舉以言揚唯賢是急若有良材異等藏器下僚哲人奇士隱淪屠釣審知才行灼然者各以名聞凡百牧宰洎乎吏人咸知朕心各敬乃事勤則不匱仁逺乎哉勉以朂之以副朕意先天二年七月遣楊虛受江東道安撫敕蘇頲敕淮海是稱溪險山川重復水陸殷溱去嵗田收稍乖豐稔念兹人庶頗致飢乏朕為人父母深用惕然近聞雨澤應莭粳稻有望目前之困糊口猶切思從蠲省用救荒弊宜令給事中楊虛受往江東道安撫存問不急之務一切除減觀察疾苦量宜處置刑獄寃滯委使詳理百姓間有偉識異才潛藏鱗羽隱淪屠釣棲遲閭閻官人內有貪致茍得背公徇私循默自守養望充位者還日各以名聞所至之州具令宣布求瘼恤隱稱朕意焉應須判官及典凖例馳驛即發遣開元二年四月十一日遣盧絢等諸道宣慰賑給詔言念蒼生心必遍於天下自牧多福澤偏潤於京師所以歷選列城聿求連率豈徒判察將委緝寧朝散大夫檢校御史中丞關內宣慰賑給使上柱國盧絢等任寄已深聲實兼茂咸貫通於理道益純固於公心或華髮不衰或白圭無玷可以軌儀郡國康濟黎元間嵗以來數州失稔頗致流冗能勿殷懷而吏或不畏不仁或不安不便誠須矯過必仗賢能凡此使車不無殷監比事掣肘務欲總權小有舉於毫髮大莫振於綱領本令調察却致煩苛永言所期豈云自弊今既各膺重寄允謂通才以蠲疾苦之原當叶大中之義若令行一道利及萬人朕所設官以俟來者朝之優秩必歸令譽言可復也宜副朕懷開元二十二年二月宣慰西京逆官敕賈至敕西京官吏等逆寇搆禍暴犯京邑我國家圖必勝之勞取萬全之功是以避狄而西外飭師旅遂使卿等奔竄無所力屈狂冦既間之以師旅又臨之以兵戈或強逼驅馳或偽置官爵事不獲已皆是脅從朕深悉焉無懷反側今天既悔禍宗廟垂靈王師東征雷擊電掃逆徒勦絶關輔載清卿等代承國恩家傳祿位乃祖乃父為我純臣雖陷賊中固深憂憤是用惻隱矜憫于懷宜各自安更勿惶懼朕與人更始豈求録微瑕哉旬日之間與卿等相見至德三年宣慰京城僧道父老敕敕西京緇黃耆夀百姓頃者逆兵暴至侵逼長安王事西巡修集兵馬遂使卿等陷於賊首不得奔逃或骨肉之間枉罹屠害女子之輩多遭虜掠朕每念此流涕痛心又比來米鹽匱竭人多餓死道殣相望或賊徒逼脅驅使事窮力屈盡是脅從朕甚閔焉今已京城再復賊冦殱滅豈獨宗廟之福社稷之靈京師等兆民懇誠感達天地之所致也方與卿等雪恥辱布維新大棄疵瑕𢎞宥罪戾恐未達意或惶恐焉各宜寧居勿懷反側各令宣諭與卿等不久相見至德二年安緝京城百姓詔敕京城之人久陷凶醜亦既平定莫非王臣比屋可封唐之人闔境皆戴商之舊復以宗廟之器府庫之資散在閭閻紊煩綱紀主守者闕以供事竊取者冒其常用所以遣其檢括必使當實如聞小臣失所遂使流言冦攘資財驚擾士庶官吏不修其法豪強橫有縱暴或得一官物即破人家産或捕一姦吏則傍纍親鄰仍有不逞之徒因兹恐嚇大為侵暴百姓寃苦永言哀念良深嘆息委京兆尹兼御史大夫李峴勾當諸使檢括一切宜停妄有欺奪宜即推捕奏聞仍榜坊市務令安緝副朕之意焉至德三年正月慰諭朔方將士敕賈至敕朔方將士等自冦逆亂常殆涉三載卿等被堅執鋭暴露原野東征西伐未嘗暫寧雪霜風雨之間白刃鳴鏑之下衆勤至矣朕甚憫焉頃者出并陘收趙地還破同羅逋虜復入河東故郡纍有功績王室賴之昨者清渠之戰師徒不利亦聞卿等傷夷甚多兵者危事一挫何損但當勉勵以為後圖神祗助善天地厭禍仗順招逆無憂不平知卿等所在集兵更加訓練便於再舉思滅殘徒此忠臣義士感激之深也已令江淮轉運布帛到日議賞非遙今關中麥秋見將收穫六軍糧備實資於此遞須相朂勿犯田苗甲杖刀槍已令支送誠宜磨勵大雪前恥事平之日卿等並封侯金帛圭璋無所愛惜故令宣慰知朕意焉至德元年遣使安撫制敕厄運者天之時也理亂者人之政也是以軒轅不能止蚩尤之患帝舜不能無有苖之征蓋在於人君修刑德以除之也頃者羯賊凶害當爭戰之地則肌骨多斃於鋒鏑在遐僻之方則杼柚其空於征賦離鄉去邑棄業亡家契濶凍餒飄颻是逼朕每永念心折涕零是用嚴奉睿謨恭行天罰躬被甲胄大率戎夷掃清中原誅斬蛇豕豈朕薄德皆建功業蓋人心竭莭于本朝而戮力于冦難也所以給其優復減其賦稅省其聚斂息其征徭賑其匱乏宥其罪戾空其倉廩捨其逋懸養其傷痍恤其死事將使百姓永登仁夀猶慮撫字有闕尚疾苦之未除於是分遣使臣親訪閭里夫人君髙居天位非可以目遍四海耳周八極必仗賢能以廣視聼頃之使臣咸未稱職多俯仰經略未盡至公遂令逺人寃不上逹弊不下去今擇朝端忠貞仁惠之士飲氷乘馹巡撫四方其有政教煩苛敕令不便妨於耕稼害於𧖟桑徴損於人無論小大咨爾兆庶必聞原委又有官吏科虐豪猾侵漁擾於黎氓冒於貨賄上無隱也當悉懲之朕方以百姓為心蒼生為夀非欲自賢自聖而為理舍暴惠姦而隨人率土之濵宜悉朕意至德二十年二月遣鄭叔清往江淮宣慰制賈至敕逆旅未平師旅淹嵗軍用匱竭常賦莫充所以稅畝於荆吳校練於淮海從權救弊蓋非獲己夫法明則吏不欺斂均則人不怨輯事無擾繫乎使臣度支員外郎叔清貞固幹事用莭愛人考志視成可厯斯任宜以本官兼御史充江淮東西道宣撫使至德二年七月十二日遣劉晏宣慰諸道敕嵗之不易征伐繁興河洛蕭然江外尤劇供上都之國用給諸道之軍須庶務徴求未遑少息火耕水耨夏葛冬裘充饋運而屢空一戎衣而不足農人少而轉困編户流而卒歸自北之化未淳大東之詞方切君為心也朕甚痛焉今區宇漸寧凋殘已甚惕然躬已姑務息人懼惸婺之無告思省方以親問時邁未可日昃增勞載懷鴻雁之詩用解吾人之愠必資循行以周爰咨諏皇皇者華以申喻朕志宜令太子賔客兼御史大夫劉晏往諸道宣慰應百姓有徴科煩重人户逃亡及水旱所損不能支濟者並與本道莭度使計會蠲削安在遂便處置訖具狀上奏官吏之政在邦必聞知無不為公道斯在其租庸使刺史縣令録事參軍有精於政理賦均役平州縣之間稱為良吏者具名以奏别有甄異如或殘忍慢法貪汚贓官有害於人不應時務者具狀以聞仍與本道節度觀察使計會舉按四海至廣九重至深思使下情上通常令上旨下逹務於審慎朕之意焉唐大詔令集卷一百十五
