body:
  text: 唐大詔令集卷七十九宋宋敏求編典禮巡幸幸故宅改為通議宫曲赦京城繫囚制巡幸岐隴二州曲赦巡幸并州曲赦破契丹幸靈州詔赦行幸諸縣及岐州制幸東都詔睿宗令皇帝巡邉詔行幸東都詔幸新豐及同州敕幸東都制至都大赦天下制巡幸東都賜賚扈從赦天下制幸長安制幸東都詔將離東都減降囚徒敕北巡狩制幸太原府赦境內制北路幸長安制南路幸長安制巡幸東都賜賚從官敕南路幸西京敕鑾駕到蜀大赦制史思明再陷洛陽巡幸東京詔巡幸幸故宅改為通議宫曲赦京城繫囚制朕恭膺大寶克隆景祚永言孝思聿追罔極肇惟自昔胥宇舊居王道所基積慶攸在桑梓之敬每懷踐歷日不暇給以迄於茲今既氛祲廓清區夏寧謐時和嵗稔民休俗泰爰擇良辰言遵邑里體同過沛事等歸譙故老咸臻族姻相會肅恭薦享感慶兼集思俾歡心逮於衆庶愍兹幽滯有懷寬釋都輦之地宗祊所居作固萬邦義越等常惟時孟夏方申長育宜順天心宣兹惠澤可曲赦京城內繫禁囚見徒及被推問應集之人死罪以下並放免其內有於政切害情理難原者宜降死從流武德六年四月巡幸岐隴二州曲赦朕恭膺寶命握圖馭厯屬喪亂之後承凋弊之餘宏宣德化勵精治道遐邇肅清要荒來服聊因暇務省視民風遵彼岐梁言臻汧渭百年之老俱稱鼓腹五尺之童咸欣擊壤眷懷曩昔亟遊此地嵗月踰邁以迄於兹周覽原隰愴然懷舊延問鄉黨僚吏猶存事異宛譙情均豐沛民和俗阜上下歡洽宜宣愷澤俾同慶幸可特赦岐隴二州管內自貞觀四年十月一日昧爽以前大辟以下悉從原宥放免二州户民無出一年租賦八十以上鰥寡篤疾及舊任二州雜職佐吏以上賜物各有差百嵗以上就加優恤行經咸陽始平武功二縣見囚禁徒罪以上各降一等杖罪以下並宜釋放年八十以上及鰥寡篤疾并武功縣舊主軍師亦加賜物凡此界內名山大川望秩之禮備加牲幣孝子順孫義夫節婦隨事褒顯旌表門閭其賜物之有差宜依别敕務從周厚以稱朕意巡幸并州曲赦太原之地興運所階全晉之人義深惟舊自朕恭膺寶厯二紀於兹何嘗不御扆長懷想崤陵之風雨臨軒逺感念大麓之雲雷當於此時乃忘身而拯溺實賴同德並贏糧而樂推役不踰年遂清區域諒由成都之衆謳訟闡虞帝之功戰牧之􅑫歌舞興周王之業仗兹叶力竟致升平懷彼勤勞何忘晷刻既因垂拱之暇再省創業之方周歷郊原宛如疇昔訪其父兄已多長謝不見所識魏后遂以興嗟恤彼故里漢皇因而式宴前王是日哀樂交懷在朕深衷義符於此是用具陳廣樂共申髙宴取譬還譙之賞同彼幸代之情仍曲赦并州管內大辟罪以下繫囚見徒並赦除之常赦所不免者不在赦例貞觀二十年正月破契丹幸靈州詔朕形勞育物盡敬承天蠢動不安櫛風而罔倦荒隅未靜救焚而靡息獨運方寸貫徹上玄凝想冕旒布化中外是知惟天為大合其德者弗違謂地蓋厚體其仁者光被故能彌綸八極權輿二儀大帝福謙斯其效矣彼胸奴者與開闢以俱生奄有龍庭共老上而並列僭稱驕子分天街於𬗋宸仰應旄頭抗大禮於皇極流殃搆禍數嵗稱兵慿陵障塞連年壓境射雕馳騎亟飲灞川如豕騰氛頻驚渭汭貽先皇之動衆致黎庶之塗原社稷為虛軫情何已朕御天下二紀於兹曩者聊命偏師遂禽頡利今兹始𢎞廟略已滅延陀麾駕出征未踰郊甸前驅所轥才掩塞垣長䇿風行已震金微之表揚威電發逺踰沙場之外遂使雁山之北無侵單于龍庭之南大開封域其契苾車心俟斤及鐵勒諸姓回紇朝祿俟利發等總統百餘萬户散處北溟逺使人委身內屬請同編列並為郡縣引領翹足暴十日而佇油雲延首求哀沉九泉而請營魄朕當暫幸靈州撫輯歸附𢎞兹肆赦加以施行頒惠天隅耀威雲朔收其瀚海盡入提封解其紛爭並垂冠帶混元以降殊未前聞無疆之業永貽來世古人所不能致今既吞之前王所不能屈今咸滅之斯實書契所未有古今之壯觀豈朕一人獨能宣力蓋由上靈儲祉錫以太康宗廟威靈成兹大定即宜宣禮告於清廟仍以大慶頒示普天俾與黎元同兹有賴貞觀二十年八月赦行幸諸縣及岐州詔朕恭膺寶命嗣奉瑤圖居萬乘之尊當四海之貴遐觀往烈詳求前古每希蹤於哲后常勞心於庶物兢懼弗寧憂勤若厲屬天下無事區宇有截仰髙風於汾射暫清暑於林泉朕昔在震宫侍遊兹壤山川依舊嵗月不追今既俗阜年和華夷胥悅𬗟懷徽範情兼感慰宜遵省方之義且順陽和之序曲申惠澤式彰寬宥行幸所經諸縣及岐州囚徒人犯罪者流降從徒以下並免之永徽五年二月幸東都詔咸京天府地狹人繁百役所歸五方胥萃雖獲登秋之積猶虧洊嵗之資眷言於此思蠲徭賦夫以交風奧壤測景神州職貢所均水陸輻湊今兹豐熟特倍尋常事貴從宜實惟權道即以來年正月幸東都關內百姓宜免一年庸調及租并地丁稅草其當道諸縣特免一年劍南隴右諸州每年供進物一二年且停儀鳳二年十月睿宗令皇帝巡邉詔先王省方所以觀風設教聖人順動所以刑清氓服故叶時同律虞典之常道喬嶽翕河周家之盛德自王風不競兹禮遂闕兩漢之朝有時于邁三國以降日不暇給我皇家開元首出卜代重光寰宇大寧車書無外文祖神宗之德洽於兆人考祥展義之規昭於國典朕祇若丕構寅奉慶靈夙懷箕嶺之心久遂汾陽之志皇帝天錫英武神與聰明純孝極於安親大功深於濟代自陟元后實總朕師時政益明彛倫攸敘而將靖邉氓藩阻悠遐夷夏殊化或幽隱未申或勞苦未恤將副來蘇之懷實允卜征之義加以頃年邉將授任或乖師律以虧軍威不振皇帝宜順時巡狩親幸邉陲掌圖修考事之儀典樂具陳詩之禮西洎河塞東踰燕朔望秩名山肆覲羣后休農問老誓師訓卒其有牧州典郡功施於人仗節擁旄隱若敵國者當崇進律之賞加以分麾之命若邦政不舉軍令莫修裒斂細人侵削戰士者明兹典憲肅以天誅然後七萃騰裝六軍按節合符釡山之曲覽軒轅之遺風勒銘單于之臺踐漢皇之故事使隂山罷祲大漠無塵其供帳所資儲擬之費皆令有司支備州縣不得勞百姓先天元年十月行幸東都詔咸洛京師建都惟舊乃眷時邁卜征在斯朕承天纂歷恭已臨人鼎爼雖甘念疲氓之不足宫室信美傷浮户之未安事內攢於千慮心外周於萬方則知帝業初啓崤函乃金湯之地天下大定河洛為會同之府周公測景是曰土中為六氣之所交均萬方之來貢引魚鹽於淮海通粳紵於吳越瞻彼洛汭長無阻飢自中宗入關於今八載省方之地久而莫修遂使水漕陸挽方春不息勞人奪農卒嵗何望關東嗟怨朕實聞焉思欲寧人而休轉運館榖而就敖庾加以暑雨作害災拂秦川嵗星有福祥歸豫野朕情深救弊身豈懷安夷考衆心審聽輿誦上奉天以為孝下利人以為忠順時而動從衆之願宜以今年十一月行幸東都凡厥有司式遵乃事至於行從兵馬供頓貯積務在樽節勿使煩勞考使選人咸令都集東都宫殿應須修理量加整葺不得煩人朕本為人而行非擬勞人自奉所過州縣無費黎元亦不得輒有差科傍求進獻宣布遐邇知朕意焉先天二年七月幸新豐及同州敕敕虞之四朝且遍區宇漢之三輔本同京師善於古者考於今發乎近者應乎逺若順豫之事缺則紊於王制巡遊之典備則慮於人勞朕受命膺期勵精設教幸乾坤幽贊風雨咸若百姓既阜三農已登同頴獻於宗廟穭穗生於郡國我無大桀實欣於嵗取人有小康未果於時邁但左翊之地近入黃圖新豐之邑甫鄰青綺山川宫館咫尺相望方欲過灞亭而涉經沙阜而臨渭見彼耆耋問其疾苦察長吏之政恤黎氓之寃蓋所以展義陳詩觀風問俗始自畿甸化於天下宜以今月二十五日幸長春宫停五日緣頓所須並令所司支備一事以上不得擾州縣發日唯量將飛騎行更不須别遣兵馬及妄有科喚朕此行之處不得進奉在路有稱寃苦州縣不能疏決者委御史金吾收狀為進各勉所職副朕意焉開元二年九月十一日幸東都制黃門朕聞遂物之宜上則聽其和樂違人之欲下則生於怨思一物安可不遂萬人安可固違且先王卜征觀乎風俗大易順動應乎天地由是巡以五載尚遍於人寰設為兩京况稱於帝宅東幸西顧乃其常也然以行必清道不為無事至而供帳是則有勞故恤人之隱憂人不足於今四年矣遂使東土耆老傾心而傒豫中朝公卿屢言以沃朕咸謂國之中洛王者上地均諸侯之賦當天下之樞陸行漕引方舟繫軑費省萬計利踰十倍更知夫便於物者非自奉以懷安嗟於人者豈不識而阻願於是乎見品彚之阜因京坻之餘則無奪農矣陳太師之言獻史臣之頌則無缺政矣信可以備法駕乘陽春歸於成周布我時令宜以來年正月五日行幸東都仍取北路所司準式主者施行開元四年十二月三日至東都大赦天下制黃門周宅中土秦里上田皆王者之都也時邁觀風載巡展義皆王者之政也朕嗣守宸極頓移年所冕旒而視心每周於萬邦車轍所屆迹不出於三輔豈懷安以憚勞若省費而體力然以設京師者不偏于西據奉宗廟者亦俟於東征安可阻從人之心增傒豫之怨是用闓陽發嵗練日簡辰順和氣以應物御惠風以行令永言告至載叶伻來顧兹菲躬畏此鴻業下輦而有宫室即舊不加登臺而有山川覽今猶昔森言在目用軫於懷思𢎞逺圖俾作寬典不忘師古之義特布惟新之渥可更大赦天下自開元五年二月三日昧爽以前大辟以下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不原者咸赦除之謀反大逆不在赦限云云夫政欲清靜詞尚省要間者思致於義未臻其道文書盈几閣而吏益欺詔命下閭里而人莫諭得非失於抵牾弊在頓蕪耶簡而易從禁則難犯令式格敕有不便者先令尚書省集議刑律刋定宜詳閲厥衷合於大體亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告者以其罪罪之赦書日行五百里布告天下稱朕意焉主者施行巡幸東都賜賚扈從赦天下制朕自臨天下未至於洛雖二京出遊蓋惟常典五載來巡肇於即事念兹扈從特有加恩南北衙應從官三品以上各賜物四十假四品三十假五品二十假六品七品十五假八品九品十假從飛騎萬騎各賜物五假馬家小兒賜物三假三衛檢校監門直長引駕等發京宿衛執當不闕者簡日優量其置頓營幕橋道等使並制官各賜物遞加從官一等仍與中上考緣路刺史上佐縣令奉承頃事并專知官各準從官例與賜亦與中上考衛士掌間幕士等各賜物兩假大赦天下惟謀反大逆不在赦限餘並宥之河南府百姓給復一年河北遭潦及蝗蟲處無出今年租武德貞觀以來勳臣子孫無名在位更詳求其後奏聞有嘉遁幽棲養髙不仕者州牧各以名薦開元五年五月幸長安制門下觀俗省方所以愛人治國宗尊廟貌所以事神享親欽若昔典此惟大義朕祗膺鴻業積念咸秦去嵗欲幸洛京已發成命屬重營天室因將中止誠以其繩則板功且未即展鈴效駕信弗可違終肆覲於東方恆載馳於西土流晷不駐通喪永畢象居始成如在增慕朕之前志日夜匪遑故可以詩陳肅雍禮極禋祀神明之隩時惟雍州禾稼有年莫若關輔王假用吉后來其蘇實獲我心俾從人欲可以今年十月取北路幸長安所司準式務在節省無得勞費主者施行開元六年七月六日幸東都詔王者觀俗以賦政考祥以省方必將叶於人和而奉若天意朕祗守鴻緒用康黎庶思振德以惠物豈勞人以尊已頃年關輔之地轉輸實繁重以河塞之役兵戎屢動千金有費九載未儲懷此勞辛以增旰昃且夫茍利於物可隨事而變通將適於人故因時以巡幸卜洛萬方之隩維嵩五嶽之中風雨之所交舟車之所會溝通江漢之漕控引河淇之運利俗阜財於是乎在今欲省其費務以實關中即彼敖倉少濟河邑乘嵗陽之吉展遊順之儀豈惟龜筮不違固已詢謀定是叶修五禮更問百年車輿動而不勞玉帛會而胥悅所謂先天以𢎞道因人以為利也宜以明年正月十五日幸東都開元九年九月九日將離東都減降囚徒敕獻嵗肇春陽和感氣且是發生之日實惟布德之辰朕將幸秦京言離洛邑既省方以觀俗思𢎞恩以濟人載念狴牢又惻襟抱宜敷寬大之恩用敦祝泣之意其都城內見禁囚徒除身犯十惡及偽造頭首餘雜犯死流等各減一等徒以下並放河南府遭水百姓前令量事賑濟如聞未能存活春作方興恐乏糧用宜令王怡檢問不支濟者更量賑給務使安存開元十一年正月北巡狩制朕爰自京洛有事省方乘兹發生之和因務豫動之慶將欲恤鰥獨問耆老陳詩展禮陟幽黜明使滯伏必申微物咸遂其行幸所至處宜令刺史縣令存問百年老病鰥寡惸獨及行人家如有單貧不濟不能存活者量加賑給其侍老仍各賜物三假見禁囚徒除十惡及身犯反逆并偽造頭首以外自餘雜犯流死等罪各減一等徒以下並放免百姓有賢良官人有清白並令中書門下採訪名聞其貪濁之吏委御史覺察彈奏開元十一年正月幸太原府赦境內制朕恭承寶位十有餘年荷纍聖之昌圖膺三靈之眷命日慎一日雖休勿休今問俗觀風肆覲羣后陳詩納貢親問百年雖念勞人事資展禮太原舊國王業所興乃眷成周西巡豐鎬曰惟嗣漢東至沛鄉皆會彼舊都眷兹枌社况興王始封之地鴻圖創業之初含育生靈大造區宇永惟丕搆顧慙貽厥且地稱用武戎役是殷爰錫懷舊之恩以順發生之澤其太原府境內見禁囚徒除十惡及偽造頭首餘並赦免預宴官共賜物二千匹父老及人吏等共賜一萬匹百姓宜給復一年九等户給復三年元從家給復五年其家籍見丁終身免征役侍老八十以上賜物五假版授上縣令仍賜緋婦人版授上縣君九十以上賜物七假版授上州長吏仍賜緋婦人版授郡君百嵗以上賜物十假版授上州刺史仍賜紫婦人授郡夫人孝子順孫義夫節婦旌表門閭終身勿事其有流淪草澤抱德栖遲及武德功臣并舊戚子孫才堪文武未有官者并委府縣搜揚具以名薦開元十一年正月北路幸長安制朕粵自鄷鎬省方瀍洛屬九服寧謐四時順成殊徴龎殷景福紛委遂荷靈眷登於介丘居厥成功允答休祐蓋敬天之命不敢以寧也我來於東嵗亦數稔而西土耆老傒豫多怨况關輔之地比則有年宜叶卜征之祥式展時巡之義可以今年閏九月十日取北路幸長安所司準式緣頓支供一事以上並用當處官物不須科斂百姓其遞運及行從官寮等務從減降所在公私不得輒有進獻宣布遐邇知朕意焉開元十五年六月南路幸長安制朕君臨區宇子育黎獻每思勤恤不欲勞煩而鎬京之地陵寢所在自展義河洛已歷嵗年所以式遵卜征有事時邁抑惟恆典寧敢憚勞將欲西巡元取北路今同州有暴水浸於邑居載懷憂惕無忘監寐且從南路幸長安所司準式開元十五年八月巡幸東都賜賚從官敕出震奮豫本乎觀風省方展義期於利物朕志惟忘已情期順人爰採謠歌式事巡幸自轉蹕西鎬即宫東周景暖風恬無凛冽之慘煙和氣淑嘉晏溫之色得夫軍衛衆護靡有郊塞之虞豈非龜筮允臧堪獻卜征之吉天人叶應傒豫王城感是休和良以有慰思𢎞慶澤從行在所親王賜物八十匹嗣郡王六十匹一品五十匹三品四十匹四品三十匹六品二十五匹七品二十匹八品九品十假三衛引駕細引飛騎各四假彍弩手幕士主膳供膳及諸色白身人等各三假知頓使知營幕使各六十匹知頓御史三十匹知驛御史及知頓判官知營幕官賜各加一等入仗突厥吐蕃使共賜物五百匹令鴻臚據蕃望髙下節給分付供頓州百姓所據緣頓差科及充夫匠雜役供應等人宜放今年地稅自餘户等免今年地稅之半應定名供頓縣官各與一中上考開元十九年十一月南路幸西京敕敕朕所時邁皆順物情頃屬關輔無年遽爾東幸固非為已將以息人今百榖既成庶務皆省而五陵所奉誠在京師安可更留周南有闕時薦宜以來年正月七日取南路幸西京所司準式應緣行幸所須務從減省所由明為條例勿使勞煩開元二十三年十月鑾駕到蜀大赦朕以薄德嗣守神器何嘗不乾乾惕厲勤念蒼生至於水旱或乖則禱祠請罪邉鄙微擾則齋戒思過聿來四紀人亦小康蓋祖宗之靈卿大夫之助也是以推心將相不疑於物而姦臣凶黨負信背恩割剝我黎元暴亂我函夏皆朕不明之過豈復尤人哉楊國忠厚斂害時巳肆諸原野安祿山亂常搆禍尚逋其斧鉞朕用巡巴蜀訓厲師徒命元子北略朔方諸王分守重鎮合其兵勢以定中原將蕩滌煩苛大革前弊思與億兆約法惟新上以安宗廟神祗下以寧華夷動植可大赦天下其天寶十五載八月一日昧爽以前大辟罪以下常赦所不免者咸赦除之自中興以來有破家者一切與雪流人一切放還左降官各還舊資內外文武官節級賜階爵安祿山脅從官有能改過自新背逆歸順並原其罪優與官賞史思明再陷洛陽巡幸東京詔昔昆夷作患周宣興薄伐之役陳豨稱亂漢祖發親征之師蓋所以禁暴除凶取威靖難上以保宗社下以拯黎元古帝先王兹道無替頃者祿山搆逆背義負恩惡既貫盈尋已殄滅而思明殘寇尚敢延妖聚其蜂蠆之餘邀我雷霆之伐朕以干戈屢動黎庶未安由是按兵延誅冀其來格而乃竊兵干紀自取滅亡副元帥光弼糾率鋭徒恭行天罰爰啓絳宫之略克推青犢之師曽未浹辰大破凶黨此皆穹昊垂祐宗社降靈是以戎律用貞禍淫斯在如聞蓬艾之下蚊蚋猶虞固當乘破竹以追奔同燎原而撲滅朕為人父母深念塗炭是用大整戈矛方申弔伐撫綏河洛以致和平即以今月十七日幸東京率六軍取路進發乾元二年九月唐大詔令集卷七十九
