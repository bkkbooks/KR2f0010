body:
  text: 唐大詔令集巻七十九宋宋敏求編典禮巡幸幸故宅改為通議宫曲赦京城繫囚制巡幸岐隴二州曲赦巡幸并州曲赦破契丹幸靈州詔赦行幸諸縣及岐州制幸東都詔睿宗令皇帝巡邉詔行幸東都詔幸新豐及同州勅幸東都制至都大赦天下制巡幸東都賜賚扈從赦天下制幸長安制幸東都詔將離東都減降囚徒勅北巡狩制幸太原府赦境内制北路幸長安制南路幸長安制巡幸東都賜賚從官勅南路幸西京勅鑾駕到蜀大赦制史思明再陷洛陽巡幸東京詔巡幸幸故宅改為通議宫曲赦京城繫囚制朕㳟膺大寳克隆景祚永言孝思聿追罔極肇惟自昔胥宇舊居王道所基積慶攸在桑梓之敬每懐踐歴日不暇給以迄於玆今既氛祲廓清區夏寧謐時和嵗稔民休俗泰爰擇良辰言遵邑里體同過沛事等歸譙故老咸臻族姻相㑹肅恭薦享感慶兼集思俾歡心逮於衆庻愍兹幽滯有懐寛釋都輦之地宗祊所居作固萬邦義越等常惟時孟夏方申長育宜順天心宣兹恵澤可曲赦京城内繫禁囚見徒及被推問應集之人死罪以下並放免其内有於政切害情理難原者宜降死從流武德六年四月巡幸岐隴二州曲赦朕恭膺寳命握圖馭厯屬喪亂之後承凋弊之餘宏宣德化勵精治道遐邇肅清要荒来服聊因暇務省視民風遵彼岐梁言臻汧渭百年之老俱稱鼔腹五尺之童咸欣擊壌睠懐曩昔亟遊此地嵗月踰邁以迄於兹周覽原隰愴然懐舊延問鄉黨僚吏猶存事異宛譙情均豐沛民和俗阜上下歡洽宜宣愷澤俾同慶幸可特赦岐隴二州管内自貞觀四年十月一日昧爽以前大辟以下悉從原宥放免二州户民無出一年租賦八十以上鰥寡篤疾及舊任二州雜職佐吏以上賜物各有差百嵗以上就加優恤行經咸陽始平武功二縣見囚禁徒罪以上各降一等杖罪以下並宜釋放年八十以上及鰥寡篤疾并武功縣舊主軍師亦加賜物凡此界内名山大川望秩之禮備加牲幣孝子順孫義夫節婦隨事褒顯旌表門閭其賜物之有差宜依别勅務從周厚以稱朕意巡幸并州曲赦太原之地興運所階全晉之人義深惟舊自朕㳟膺寳厯二紀於兹何嘗不御扆長懐想崤陵之風雨臨軒逺感念大麓之雲雷當於此時乃忘身而拯溺實賴同德並贏粮而樂推役不踰年遂清區域諒由成都之衆謳訟闡虞帝之功戰牧之􅑫歌舞興周王之業仗兹叶力竟致升平懐彼勤勞何忘晷刻既因垂拱之暇再省創業之方周歴郊原宛如疇昔訪其父兄已多長謝不見所識魏后遂以興嗟䘏彼故里漢皇因而式宴前王是日哀樂交懐在朕深衷義符於此是用具陳廣樂共申髙宴取譬還譙之賞同彼幸代之情仍曲赦并州管内大辟罪以下繋囚見徒並赦除之常赦所不免者不在赦例貞觀二十年正月破契丹幸靈州詔朕形勞育物盡敬承天蠢動不安櫛風而罔倦荒隅未静救焚而靡息獨運方寸貫徹上𤣥凝想冕旒布化中外是知惟天為大合其德者弗違謂地葢厚體其仁者光被故能彌綸八極權輿二儀大帝福謙斯其效矣彼匈奴者與開闢以俱生奄有龍庭共老上而並列僭稱驕子分天街於𬗋宸仰應旄頭抗大禮於皇極流殃搆禍數嵗稱兵慿陵障塞連年壓境射雕馳騎亟飲㶚川如豕騰氛頻驚渭汭貽先皇之動衆致黎庶之塗原社稷為虛軫情何已朕御天下二紀於兹曩者聊命偏師遂禽頡利今兹始𢎞廟略已㓕延陀麾駕出征未踰郊甸前駈所轥才掩塞垣長䇿風行已震金㣲之表揚威電發逺踰沙場之外遂使雁山之北無侵單于龍庭之南大開封域其契苾車心俟斤及鉄勒諸姓迴紇朝禄俟利發等總統百餘萬户散處北溟逺使人委身内屬請同編列並為郡縣引領翹足暴十日而佇油雲延首求哀沉九泉而請營魄朕當暫幸靈州撫輯歸附𢎞兹肆赦加以施行頒惠天隅耀威雲朔收其瀚海盡入提封觧其紛爭並垂冠帶混元以降殊未前聞無疆之業永貽来世古人所不能致今既吞之前王所不能屈今咸滅之斯寔書契所未有古今之壯觀豈朕一人獨能宣力葢由上靈儲祉錫以太康宗廟威靈成兹大定即宜宣禮告於清廟仍以大慶頒示普天俾與黎元同兹有賴貞觀二十年八月赦行幸諸縣及岐州詔朕恭膺寳命嗣奉瑤圖居萬乘之尊當四海之貴遐觀徃烈詳求前古每希蹤於哲后常勞心於庶物兢懼弗寧憂勤若厲屬天下無事區宇有截仰髙風於汾射暫清暑於林泉朕昔在震宫侍遊兹壌山川依舊嵗月不追今既俗阜年和華夷胥悦𬗟懐徽範情兼感慰宜遵省方之義且順陽和之序曲申惠澤式彰寛宥行幸所經諸縣及岐州囚徒人犯罪者流降從徒以下並免之永徽五年二月幸東都詔咸京天府地狹人繁百役所歸五方胥萃雖獲登秋之積猶虧洊嵗之資睠言於此思蠲徭賦夫以交風奥壌測景神州職貢所均水陸輻凑今兹豐熟特倍尋常事貴從宜實惟權道即以来年正月幸東都闗内百姓宜免一年庸調及租并地丁税草其當道諸縣特免一年劍南隴右諸州毎年供進物一二年且停儀鳳二年十月睿宗令皇帝巡邉詔先王省方所以觀風設教聖人順動所以刑清甿服故叶時同律虞典之常道喬岳翕河周家之盛德自王風不競兹禮遂闕兩漢之朝有時于邁三國以降日不暇給我皇家開元首出卜代重光寰宇大寧車書無外文祖神宗之徳洽於兆人考祥展義之規昭於國典朕祇若丕構寅奉慶靈夙懐箕嶺之心久遂汾陽之志皇帝天錫英武神與聰明純孝極於安親大功深於濟代自陟元后實總朕師時政益明彛倫攸叙而將靖邉甿藩阻悠遐夷夏殊化或幽隠未申或勞苦未䘏將副來蘇之懐實允卜征之義加以頃年邉將授任或乖師律以虧軍威不振皇帝宜順時巡狩親幸邉陲掌圖修考事之儀典樂具陳詩之禮西洎河塞東踰燕朔望秩名山肆覲羣后休農問老誓師訓卒其有牧州典郡功施於人仗節擁旄隠若敵國者當崇進律之賞加以分麾之命若邦政不舉軍令莫修裒歛細人侵削戰士者明兹典憲肅以天誅然後七萃騰装六軍按節合符釡山之曲覽軒轅之遺風勒銘單于之臺踐漢皇之故事使隂山罷祲大漠無塵其供帳所資儲擬之費皆令有司支備州縣不得勞百姓先天元年十月行幸東都詔咸洛京師建都惟舊乃睠時邁卜征在斯朕承天纂歴恭已臨人鼎爼雖甘念疲甿之不足宫室信美傷浮户之未安事内攅於千慮心外周於萬方則知帝業初啟崤函乃金湯之地天下大定河洛為㑹同之府周公測景是曰土中為六氣之所交均萬方之来貢引魚鹽於淮海通秔紵於吳越瞻彼洛汭長無阻饑自中宗入闗於今八載省方之地久而莫修遂使水漕陸輓方春不息勞人奪農卒嵗何望闗東嗟怨朕實聞焉思欲寧人而休轉運舘榖而就敖庾加以暑雨作害災拂秦川嵗星有福祥歸豫野朕情深救弊身豈懐安夷考衆心審聽輿誦上奉天以為孝下利人以為忠順時而動從衆之願宜以今年十一月行幸東都凡厥有司式遵乃事至於行從兵馬供頓貯積務在樽節勿使煩勞考使選人咸令都集東都宫殿應湏修理量加整葺不得煩人朕本為人而行非擬勞人自奉所過州縣無費黎元亦不得輙有差科傍求進獻宣布遐邇知朕意焉先天二年七月幸新豐及同州勅勅虞之四朝且徧區㝢漢之三輔本同京師善於古者考於今發乎近者應乎逺若順豫之事缺則紊於王制巡遊之典備則慮於人勞朕受命膺期勵精設教幸乾坤幽贊風雨咸若百姓既阜三農已登同頴獻於宗廟穭穗生於郡國我無大桀寔欣於嵗取人有小康未果於時邁但左翊之地近入黄圖新豐之邑甫鄰青綺山川宫舘咫尺相望方欲過㶚亭而渉經沙阜而臨渭見彼耆耋問其疾苦察長吏之政恤黎甿之寃葢所以展義陳詩觀風問俗始自畿甸化於天下宜以今月二十五日幸長春宫停五日縁頓所湏並令所司支備一事以上不得擾州縣發日唯量將飛騎行更不湏别遣兵馬及妄有科喚朕此行之處不得進奉在路有稱寃苦州縣不能疏决者委御史金吾収狀為進各勉所職副朕意焉開元二年九月十一日幸東都制黄門朕聞遂物之宜上則聽其和樂違人之欲下則生於怨思一物安可不遂萬人安可固違且先王卜征觀乎風俗大易順動應乎天地由是巡以五載尚徧於人寰設為兩京况稱於帝宅東幸西顧乃其常也然以行必清道不為無事至而供帳是則有勞故恤人之隠憂人不足於今四年矣遂使東土耆老傾心而傒予中朝公卿屢言以沃朕咸謂國之中洛王者上地均諸侯之賦當天下之樞陸行漕引方舟繫軑費省萬計利踰十倍更知夫便於物者非自奉以懐安嗟於人者豈不識而阻願於是乎見品彚之阜因京坻之餘則無奪農矣陳太師之言獻史臣之頌則無缺政矣信可以備法駕乘陽春歸於成周布我時令宜以来年正月五日行幸東都仍取北路所司准式主者施行開元四年十二月三日至東都大赦天下制黄門周宅中土秦里上田皆王者之都也時邁觀風載巡展義皆王者之政也朕嗣守宸極頓移年所冕旒而視心毎周於萬邦車轍所届迹不出於三輔豈懐安以憚勞若省費而體力然以設京師者不偏于西據奉宗廟者亦俟於東征安可阻從人之心増傒予之怨是用闓陽發嵗練日簡辰順和氣以應物御惠風以行令永言告至載叶伻来顧兹菲躬畏此鴻業下輦而有宫室即舊不加登臺而有山川覽今猶昔森言在目用軫於懐思𢎞逺圖俾作寛典不忘師古之義特布惟新之渥可更大赦天下自開元五年二月三日昧爽以前大辟以下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不原者咸赦除之謀反大逆不在赦限云云夫政欲清静詞尚省要間者思致於義未臻其道文書盈几閣而吏益欺詔命下閭里而人莫諭得非失於牴牾弊在頓蕪耶簡而易從禁則難犯令式格勅有不便者先令尚書省集議刑律刋定宜詳閲厥衷合於大體亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告者以其罪罪之赦書日行五百里布告天下稱朕意焉主者施行巡幸東都賜賚扈從赦天下制朕自臨天下未至於洛雖二京出遊葢惟常典五載来巡肇於即事念兹扈從特有加恩南北衙應從官三品以上各賜物四十叚四品三十叚五品二十叚六品七品十五叚八品九品十叚從飛騎萬騎各賜物五叚馬家小児賜物三叚三衛檢校監門直長引駕等發京宿衛執當不闕者簡日優量其置頓營幕橋道等使並制官各賜物逓加從官一等仍與中上考緣路刺史上佐縣令奉承頃事并專知官各准從官例與賜亦與中上考衛士掌閑幕士等各賜物兩叚大赦天下惟謀反大逆不在赦限餘並宥之河南府百姓給復一年河北遭澇及蝗蟲處無出今年租武德貞觀以来勲臣子孫無名在位更詳求其後奏聞有嘉遁幽棲養髙不仕者州牧各以名薦開元五年五月幸長安制門下觀俗省方所以愛人治國宗尊廟貎所以事神享親欽若昔典此惟大義朕祗膺鴻業積念咸秦去嵗欲幸洛京已發成命屬重營天室因將中止誠以其繩則板功且未即展鈴効駕信弗可違終肆覲於東方恒載馳於西土流晷不駐通喪永畢象居始成如在増慕朕之前志日夜匪遑故可以詩陳肅雝禮極禋祀神明之隩時惟雍州禾稼有年莫若闗輔王假用吉后来其蘇寔獲我心俾從人欲可以今年十月取北路幸長安所司准式務在節省無得勞費主者施行開元六年七月六日幸東都詔王者觀俗以賦政考祥以省方必將叶於人和而奉若天意朕祗守鴻緒用康黎庶思振德以惠物豈勞人以尊已頃年闗輔之地轉輸寔繁重以河塞之役兵戎屢動千金有費九載未儲懐此勞辛以増旰昃且夫茍利於物可隨事而變通將適於人故因時以巡幸卜洛萬方之隩維嵩五岳之中風雨之所交舟車之所㑹溝通江漢之漕控引河淇之運利俗阜財於是乎在今欲省其費務以寔闗中即彼敖倉少濟河邑乘嵗陽之吉展遊順之儀豈惟龜筮不違固已詢謀定是叶修五禮更問百年車輿動而不勞玉帛㑹而胥悦所謂先天以𢎞道因人以為利也宜以明年正月十五日幸東都開元九年九月九日將離東都减降囚徒勅獻嵗肇春陽和感氣且是發生之日寔惟布德之辰朕將幸秦京言離洛邑既省方以觀俗思𢎞恩以濟人載念狴牢又惻襟抱宜敷寛大之恩用敦祝泣之意其都城内見禁囚徒除身犯十惡及偽造頭首餘雜犯死流等各减一等徒以下並放河南府遭水百姓前令量事賑濟如聞未能存活春作方興恐乏粮用宜令王怡檢問不支濟者更量賑給務使安存開元十一年正月北巡狩制朕爰自京洛有事省方乘兹發生之和因務豫動之慶將欲恤鰥獨問耆老陳詩展禮陟幽黜明使滯伏必申㣲物咸遂其行幸所至處宜令刺史縣令存問百年老病鰥寡惸獨及行人家如有单貧不濟不能存活者量加賑給其侍老仍各賜物三叚見禁囚徒除十惡及身犯反逆并偽造頭首以外自餘雜犯流死等罪各減一等徒以下並放免百姓有賢良官人有清白並令中書門下採訪名聞其貪濁之吏委御史覺察弹奏開元十一年正月幸太原府赦境内制朕恭承寳位十有餘年荷累聖之昌圖膺三靈之睠命日慎一日雖休勿休今問俗觀風肆覲羣后陳詩納貢親問百年雖念勞人事資展禮太原舊國王業所興乃睠成周西巡豐鎬曰惟嗣漢東至沛鄉皆㑹彼舊都睠兹枌社况興王始封之地鴻圖創業之初含育生靈大造區宇永惟丕搆顧慙貽厥且地稱用武戎役是殷爰錫懐舊之恩以順發生之澤其太原府境内見禁囚徒除十惡及偽造頭首餘並赦免預宴官共賜物二千疋父老及人吏等共賜一萬疋百姓宜給復一年九等户給復三年元從家給復五年其家籍見丁終身免征役侍老八十以上賜物五叚版授上縣令仍賜緋婦人版授上縣君九十以上賜物七叚版授上州長吏仍賜緋婦人版授郡君百嵗以上賜物十叚版授上州刺史仍賜紫婦人授郡夫人孝子順孫義夫節婦旌表門閭終身勿事其有流淪草澤抱德栖遲及武德功臣并舊戚子孫才堪文武未有官者并委府縣搜揚具以名薦開元十一年正月北路幸長安制朕粤自鄷鎬省方瀍洛屬九服寧謐四時順成殊徴龎殷景福紛委遂荷靈睠登於介丘居厥成功允荅休祐葢敬天之命不敢以寧也我来於東嵗亦數稔而西土耆老傒予多怨况闗輔之地比則有年宜叶卜征之祥式展時巡之義可以今年閏九月十日取北路幸長安所司准式縁頓支供一事以上並用當處官物不湏科歛百姓其逓運及行從官寮等務從减降所在公私不得輙有進獻宣布遐邇知朕意焉開元十五年六月南路幸長安制朕君臨區㝢子育黎獻每思勤恤不欲勞煩而鎬京之地陵寢所在自展義河洛已歴嵗年所以式遵卜征有事時邁抑惟恒典寕敢憚勞將欲西巡元取北路今同州有暴水浸於邑居載懐憂惕無忘監寐且從南路幸長安所司准式開元十五年八月巡幸東都賜賚從官勅出震奮豫本乎觀風省方展義期於利物朕志惟忘已情期順人爰採謠歌式事廵幸自轉蹕西鎬即宫東周景暖風恬無凛冽之惨烟和氣淑嘉晏温之色得夫軍衛衆䕶靡有郊塞之虞豈非龜筮允臧堪獻卜征之吉天人叶應傒予王城感是休和良以有慰思𢎞慶澤従行在所親王賜物八十疋嗣郡王六十疋一品五十疋三品四十疋四品三十疋六品二十五疋七品二十疋八品九品十叚三衛引駕細引飛騎各四叚彍弩手幕士主膳供膳及諸色白身人等各三叚知頓使知營幕使各六十疋知頓御史三十疋知驛御史及知頓判官知營幕官賜各加一等入仗突厥吐蕃使共賜物五百疋令鴻臚據蕃望髙下節給分付供頓州百姓所據緣頓差科及充夫匠雜役供應等人宜放今年地税自餘户等免今年地税之半應定名供頓縣官各與一中上考開元十九年十一月南路幸西京勅勅朕所時邁皆順物情頃屬關輔無年遽爾東幸固非為已將以息人今百榖既成庶務皆省而五陵所奉誠在京師安可更留周南有闕時薦宜以来年正月七日取南路幸西京所司准式應緣行幸所湏務從減省所由明為條例勿使勞煩開元二十三年十月鑾駕到蜀大赦朕以薄德嗣守神器何嘗不乾乾惕厲勤念蒼生至於水旱或乖則禱祠請罪邉鄙㣲擾則齋戒思過聿来四紀人亦小康葢祖宗之靈卿大夫之助也是以推心將相不疑於物而奸臣兇黨負信背恩割剥我黎元暴亂我函夏皆朕不明之過豈復尤人哉楊國忠厚歛害時巳肆諸原野安禄山亂常搆禍尚逋其斧鉞朕用巡巴蜀訓厲師徒命元子北畧朔方諸王分守重鎮合其兵勢以定中原將蕩滌煩苛大革前弊思與億兆約法惟新上以安宗廟神祗下以寧華夷動植可大赦天下其天寳十五載八月一日昧爽以前大辟罪以下常赦所不免者咸赦除之自中興以来有破家者一切與雪流人一切放還左降官各還舊資内外文武官節級賜階爵安禄山脅從官有能改過自新背逆歸順並原其罪優與官賞史思明再䧟洛陽巡幸東京詔昔昆夷作患周宣興薄伐之役陳豨稱亂漢祖發親征之師葢所以禁暴除兇取威靖難上以保宗社下以拯黎元古帝先王兹道無替頃者禄山搆逆背義負恩惡既貫盈尋已殄滅而思明殘㓂尚敢延妖聚其蜂蠆之餘邀我雷霆之伐朕以干戈屢動黎庶未安由是按兵延誅冀其来格而乃竊兵干紀自取滅亡副元帥光弼糺率鋭徒恭行天罰爰啟絳宫之畧克推青犢之師曽未浹辰大破兇黨此皆穹昊垂祐宗社降靈是以戎律用貞禍滛斯在如聞蓬艾之下蚊蚋猶虞固當乘破竹以追奔同燎原而撲滅朕為人父母深念塗炭是用大整戈矛方申弔伐撫綏河洛以致和平即以今月十七日幸東京率六軍取路進發乾元二年九月唐大詔令集巻七十九
