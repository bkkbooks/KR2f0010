body:
  text: 唐大詔令集卷一百八宋宋敏求編政事營繕建玉華宫於宜君縣鳳皇谷詔玉華宫成曲赦宜君縣制停修金仙玉真兩觀詔停修大明宫詔大明宫成放免囚徒制改明堂為乾元殿詔興慶宫成御朝德音禁約上關內諸州斷屠酤詔關內諸州斷屠殺詔廢潼關以東緣河諸關不禁金銀綾綺詔寫書御名不闕點畫詔官人百姓衣服不得逾令式詔禁斷大酺廣費敕焚珠玉錦繡敕禁奢侈服用敕營繕建玉華宫於宜君縣鳳皇谷詔朕聞上代無為簷茅而砌土中季革用戺玉而臺瓊燥濕之致雖同奢儉之情則異朕承皇王之緒執造化之綱包萬類於心端圖八紘於目際夷夏一軌區宇大同雖則德有劣於難名道方參於至有若乃制衣服裳之后環井羈馬之君強弧制矢之竒運車浮舟之智濟時為美功亦大焉至若浩浩九齡炎炎七載融山坼地滔天襄陵生人之艱勞亦極矣彼數德者功莫高乎吞狄此兩災者勞又甚乎裁宫今雖菲食卑居有慙於曩哲安人濟難不恧於前賢然而人皆輕見重聞貴耳賤目德雖微也以其古而為著功雖巨也以其今而成小不以謬哉每流鑒於前經常披懷而自朂思所以收驕間逸卷欲除華而頻年已來憂勞煩結暨於兹嵗風疾彌時嗟乎濟世之心患攢躬而靡制摩天之力痛沈已而難移重以景熾流金風湯溽暑邅回几席旭暮增煩俯仰巖廊寢興深弊唯兾廊景延涼蕩兹虛惙近因羣下之志南勞翠微本絶丹青之工才假林泉之勢峰居隘乎蚊腳山徑嶮乎焦原雖一已之可娛念百僚之有倦所以載懷爽塏爰制玉華故遵意於淳朴本無情於壯麗尺版尺築皆悉折庸寸作寸功故非虛役猶恐遐邇乖聽方興怨咨非其樂勞人而竭力好峻宇而雕牆但以養性全生不獨存私存已怡神祈壽良以為國為人比者屢有征行非無疲頓前嵗問罪遼左去秋巡幸靈州皆以剪害除凶懷柔服叛豈欲矜轍迹騁遊盤而已哉今復土木頓興營繕屢動永言及此深念人勞一則以為慙一則以無愧何則胸奴為患自古弊之十月防河人血丹於水脈千里轉戰漢骨浩於塞垣當此之疲人不堪命尚興未央之役猶起甘泉之功今毳幕穹廬聚為郡縣天山浣海分為苑池去既往之長勞成將來之永逸避回一年之力役創此新宫想志士哲人不以為言也布告黎庶明此意焉貞觀二十一年七月玉華宫成曲赦宜君縣制昔周武應天尅瑤臺而靡處漢高作極獲負陽而不居散服桃林革命先於卜洛既遷枌社創制肇於疏龍朕御九成有乖斯義以兹撫事尤須改作何者大營仁壽槩日凌雲煬起乾陽銜珠帶璧比阿房而競爽猶且有加擬傾宫而騁麗全為具體隋德云謝其徵在兹朕悼於懷為日既久故違其侈義顯然令辰加以心懷濟育事切於肌膚亟犯風霜疾纒於腠理每至隆曦屆候大火摛芒雖對寒泉如升頭痛之坂或居珍簟若涉炎火之林由是嶽牧憂惶公卿駭懼因纍陳丹款請建山宫歷載深惟切愛百金之費詳思至理宜順萬姓之心朕往冒兵凶為黔首而忘已今兹清暑豈勞人而取安但以上奉宗祧下寧兆庶身非已有不可自輕敬思休攝之方兼履古先之道發明二指創此一宫即澗疏隍憑岩搆宇土無文繢木不雕鎪矯鋪首以荆扉變綺窗而甕牖負扆協幽貞之賞垂纊體嘉遁之情振此沖規方垂帝範今既成之不日賴洽普天宜順發生𢎞兹霈澤可曲赦宜君縣官及百姓并督作官人丁匠等大辟罪以下常赦不免者不在赦例其營造監當官人量加品秩及衛士已上並節級賜物先在宫苑內住移出外者給復三年貞觀二十二年二月停修金仙玉真兩觀詔營建創造必有所因豈欲勞人蓋不獲已朕頃居諒暗煢疚於懷奉為則天皇后東都建荷澤寺西京建荷恩寺及金仙玉真公主出家京中造觀報先慈也豈願廣事營構虛殫力役朕每卑宫菲食夕惕宵衣惟木從繩虛心啓沃所欲修營兩觀外議不識朕心書奏頻繁將為公主所置其造兩觀並停其地便充金仙玉真公主邑司令竇懷貞檢校所有錢物瓦木一事以付公主邑司收掌諸處供兩觀用作調度限日送納邑司朕當别處創造終不勞煩百姓此度修葺公私無損若有干忤當置於刑景雲三年三月停修大明宫詔卑宫致美愛人之力靈臺罷營重費之廣景彼前烈吾無間然頃以所居殿院素非𢎞敞時方暑雨頗有鬱蒸上稟聖慈式遵時令將修别寢順彼高居雖復工徒所須止於蕃匠補葺所擬無煩外力然以麥秋爰及農務方勤維夏在辰執役為弊營之則衆物有勞而一已逸罷之則我躬未泰而萌庶安夫生人樹君將利之也勞人自奉豫所不為其修大明宫宜即停待至間月方使畢功宣示百寮使知豫意所有先役工匠即優還價直勿令懸欠仍即放散先天二年正月大明宫成放免囚徒等制黃門朕聞養人者謂之司牧非逸於人上事天者謂之帝王蓋御於天下故作為棟宇以避燥濕居於臺榭以順髙明斯乃奉時而行政也朕以不德祇膺睿圖寶什家之産愛兆人之力未嘗興功於土木役思於池籞兾之休艾以致雍熙自律應長嬴時方大暑溽雲屢起溫風且至伏以太上皇晏居頤衛滌慮清間迹不往於甘泉心每期於汾水朕侍於左右以奉晨夕助玄默之化則虧於聽理當炎蒸之序又黷以囂煩惕焉載懷敢忘順色然文明創兆先聖所營即舊不加因時而往千門萬户外雖謂於别宫一日三朝中自連於復道下所以寧問安之􅈤上所以資習靜之娛實獲我心俾康政理古有服珍裘者則念人之寒居夏屋者則念人之熱況比嵗阻飢甫田不稔或愚人陷罪圜土稱寃凡厥庶寮將何以恤兩京及諸州宜令長官親理寃獄除犯名教及官典犯贓並緣妖偽以外餘罪徒以下咸宜放免其有茂才異等拔衆超羣緣無紹介久不聞達者咸令自舉朕當親問其應宣撫使名聞舉人試第四等宜準舊例别加優奬見任人各量與改轉前資常選人至各依選例與處分其未出身者並授散官先天以來軍將押官等在臨陳戰亡者令本軍勘績奏聞其妄説災祥誑惑閭里並令州縣長官等嚴加捉搦仍令御史金吾訪察繩紏有能直言極諫補朕之闕者各封狀進朕將親覽如有可採當加奬擢其皇親諸親其東宫氶值任員外撿試等官近停今至冬處分者有家道貧迫情願外任者亦令所司勘績闕量才注擬其緣坐流人處置有輕重不類者令所司勘會奏聞主者施行開元二年六月八日改明堂為乾元殿詔古之操皇綱執大象者何嘗不上稽天道下順人極或變通以隨時爰損益以成務且衢室創制度堂以筵因之以禮神是光孝享用之以布政蓋稱視明先王所以厚人倫感天地者也少陽有位上帝斯歆此則神貴於不黷禮殷於至敬今之明堂俯鄰宫掖此之嚴祀有異肅恭茍非憲章將何軌物由是禮官博士卿大夫廣參羣議欽若前古宜存路寢之式用罷辟雍之號可改為乾元殿每臨御宜依正殿禮開元五年八月興慶宫成御朝德音朕昔在藩國此維邸第乾坤未泰隂陽尚蒙則有神物效靈祥符肇配飛佳氣於在田之際湧瑞池於或躍之日惟此舊居式加新宇周牆僅板於百堵卑宫不階於五尺棟梁之用毁撤所餘聊以紀天地之休徵貽子孫之儉約耳屬春令爰始時惟發生萬方來朝千官入賀既稱觴以獻壽宜施惠以布德況農祥在候稼穡正興或幽彼囹圄獨隔陽和之澤或迫於征徭不遂農桑之務言及於此軫歎良深其徒以下罪且令責保并應當番兵丁匠等灼然單貧者所由勘會並各營農所在訴訟長官隨事疏理勿使寃滯非軍國所要餘不急之務一切並停仍加勸課循植農穡其河北水損户既屬春事慮有乏絶不支濟者宜委使與知縣相知量加賑恤諸處行人之家及鰥寡惸獨不能自存者州縣長官親加優撫使得存濟應有差科量事矜放且宣風布化職在令長有司銓藻之次特宜審擇其才惟德與刑為政之要頃無關於風化多取威於檟楚理人之道其若是乎愚昧之流或輕抵犯宜加曉諭使識章程其含生之類不得輒有屠殺天下捕獵亦宜禁斷仍嚴加捉搦百司各遵時令務𢎞寬大之典使政理無失稱朕意焉開元十六年正月禁約上關內諸州斷屠酤詔酒醪之用表節制於歡娛芻豢之滋致甘旨於豐衍然而沈湎之輩絶業亡資惰窳之氓騁嗜奔欲方今烽燧尚警兵革未寧年穀不登市肆騰踊趨末者衆浮冗尚多肴羞麴蘖重增其費去弊之術要在權宜令關內諸州官且斷屠酤武德二年二月關內諸州斷屠殺詔有隋失馭喪亂𢎞多民物凋殘俗化踰侈耽嗜之娛競逐旨甘屠宰之家恣行刳殺芻豢之畜靡供肴核之資胎卵之羣莫逐蕃滋之性傷財墮業職此之由攘敓穿窬因兹未息禮曰君無故不殺牛大夫無故不殺犬豕庶民無故不食珍非惟務在仁愛蓋亦示之儉約方域未寧凡須節制凋弊之後宜先長育豈得恣彼貪暴殘殄庶類之生茍徇目前不為經久之慮導民之理有未足乎其關內諸州宜斷屠殺庶六畜滋多而兆民殷贍詳思厥衷更為條式武德三年四月廢潼關以東緣河諸關不禁金銀綾綺詔逺至邇安昔王令典通財鬻貨生民恆業關梁之設襟帶要衝義止懲姦無取苛暴近代掊刻禁禦滋彰因山川之重阻聚珍竒而不出遂使商旅寖廢行李稽留上失博厚之恩下畜無聊之怨非所以綏安百姓懷輯萬邦化洽升平克備至治朕君臨區宇情深覆育率土之內靡隔幽遐欲使公私往來道路無壅貨寶交易中外匪殊思改前弊以清民俗其潼關以東緣河諸關悉宜停廢其金銀綾綺等雜物依格不得出關者並不須禁武德九年八月寫書御名不闕點畫敕孔宣設教正名為首戴聖貽範嫌名不諱比見鈔寫古典至於朕名或剩其點畫或隨便改換恐六籍雅言會意多爽九流通義指事全違誠非立書之本意也自今已後繕寫舊典文字並宜使成不許隨義改易顯慶五年正月官人百姓衣服不得逾令式敕敕采章服飾本朝貴賤升降有殊用崇勸奬如聞在外官人百姓有不依式令遂於袍衫之內著朱紫青緑等色短衫襖子或於閭野公然露服貴賤莫辨有蠧彞倫自今已後衣服上下各依品秩上得通下下不得僣上仍令所司嚴切禁斷勿使更然咸亨五年四月禁斷大酺廣費敕敕禮存率儉書戒無益酌費嗇財為國之本至如賜酺合宴正欲與人同歡廣為聚斂故非取樂之意況自徇於奢是不誡也心勞於偽是不經也殷鑒於此良用憮然自今已後兩京及天下酺宴所作山車旱船結綵樓閣寶車等無用之物並宜禁斷先天二年八月焚珠玉錦繡敕敕朕聞珠玉者飢不可食寒不可衣故漢文云雕文刻鏤傷農事錦繡纂組害女工農事傷則飢之本女工害則寒之源又賈生有言曰夫人一日不再食則飢終嵗不製衣則寒飢寒切體慈母不能保其子君焉得以有其人哉朕以眇身託於王公之上曷嘗不日旰忘食未明求衣思使反朴還淳家給人足而倉廪未實飢饉相仍水旱或愆糟粳不厭靜思厥故皆朕之咎致有漿酒藿肉玉食錦衣互相夸尚浸成風俗夫令之所施惟行不惟反人之化上從好不從言是以古先哲王以身率下如風之靡何俗不易此事近有處分當以施行朕若躬服珠玉自玩錦繡而欲公卿節儉黎庶敦朴是使揚湯止沸涉海無濡不可得也是知文質之風自上而始朕欲捐金抵玉正本澄源所有服御金銀器物令付有司令鑄為鋌仍别貯掌以供軍國珠玉之貨無益於並即焚於殿前用絶爭競至誠所感期於動天況於凡百有違朕命其宫掖之內后妃以下咸服浣濯之衣永除珠翠之飾當使金土同價風俗大行日用不知克臻至道布告天下知朕意焉開元二年七月禁奢侈服用敕敕雕文刻鏤衣紈履絲習俗相夸殊塗競爽致傷風俗為弊良深珠玉錦繡既令禁斷準式三品已上飾以玉四品已上飾以金五品已上飾以銀宜於腰帶及馬銜鐙酒杯杓依式自外悉鑄為鋌婦人衣服各隨夫子其已有錦繡衣服聽染為皂成段者官為市取天下更不得採取珠玉刻鏤器玩造作錦繡珠繩織成帖絹二色綺綾羅作龍鳳禽獸等異文字及堅欄錦文者違者決一百受雇工匠降一等科之兩京及諸州舊有官織錦坊悉停開元二年七月唐大詔令集卷一百八
