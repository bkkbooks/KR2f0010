body:
  text: 唐大詔令集卷八十一宋宋敏求編政事禮樂太常樂人蠲除一同民例詔頒行唐禮及郊廟新樂詔用慶善曲破陳樂詔詔習禮樂詔禁斷女樂敕內出雲韶舞敕雅樂名大唐樂制經史命蕭瑀等修六代史詔修晉史詔簡擇史官詔令諸儒質定古文孝經尚書詔行何鄭所注書敕改尚書洪範無頗為陂敕録開元以來名臣事迹付史館敕條貫起居注敕禮樂太常樂人蠲除一同民例詔太常樂人今因罪謫入營署習藝伶官前代以來轉相承襲或有衣冠徹諸公卿子孫一沾此色後世不改婚姻絶於士類名籍異於編氓大恥深疵良可哀愍朕君臨區宇思從寬惠永言淪滯義存刷蕩其大樂鼓吹諸舊人年月已久世代遷易宜得蠲除一同民例但音律之伎積學所成傳授之人不可頓闕仍依舊本司上下若已仕官見入班流勿更追呼各從品秩自武德元年以來配充樂户者不在此例武德二年八月頒行唐禮及郊廟新樂詔先王之辨方正位體國經野象天地以制法通神明以施化樂由內作禮自外成可以安上治民可以移風易俗揖讓而天下治者其惟禮樂乎固以同和無體非飾玉帛之容豈崇鐘鼓之奏日來月往朴散淳漓淫慝迭興流而忘本魯昭所習唯在折旋魏文所重止於鄭衛秦氏縱暴載籍咸亡漢朝修緝典章不備時更戰國多所未遑雅道淪喪歷兹永久朕恭承明命嗣膺玉厯懼深馭朽情切納隍慿宗廟之靈資股肱之力上下交泰遐邇乂安率土阽危既拯之於塗炭羣生遂性復納之於軌物興言政本載惕於懷蓋知禮樂之情者能作識禮樂之文者能述作者之謂聖述者之謂明朕雖德謝前王而情深好古傷大道之既隱懼斯文之將墜故廣命賢才旁求遺逸探六經之奧旨採三代之英華古典之廢於今者咸擇善而修復鄭聲之亂於雅者並隨違而矯正莫不本乎人心稽之物理正情性而節事宜窮髙深而歸簡易用之邦國彞倫以之攸敘施之律吕金石於是克諧今修撰既畢可頒行天下俾富教之方洵符先聖人倫之化貽厥後昆貞觀十一年四月用慶善曲破陳樂詔國家平定天下革命創制紀功旌德久被樂章今郊祀四懸猶用干戚之舞先朝作樂韞而未申其郊廟享宴等宫懸文舞宜用功成慶善之樂皆著履執拂依舊服袴褶童子冠其武舞宜用神功破陳之樂皆被甲持戟其執纛之人亦著金甲仍量加簫笛歌鼓等於懸南列坐與宫懸合奏麟德二年十月詔習禮樂詔禮樂之用其來尚矣朕誕膺明命克光丕歷思隆頌聲以康至道而曲臺闡訓猶乖揖讓之容大樂登歌徒紀鏗鏘之韻良以教虧綿蕞學闕瞽宗興言盛業寤歎曷已然則幽誠所著縱九臯而必聞忠信且存在十室而無棄但慮習俎之彥隱迹於閭閻辦鐸之英韜聲於林藪夫良玉無趾求之斯來真龍難覩好之而至其四方士庶及丘園栖隱有能明習禮經詳究音律於行無違在藝可録者並宜州縣搜揚博訪具以名聞禁斷女樂敕朕聞樂者起於心心者動於物物不正不可為樂樂不正則不能理人况天生黎蒸區别男女外則不能導之以禮中則不能由之以樂茍或不臧孰云致理自有隋頺靡庶政雕缺徴聲遍於鄭衛衒色靡於燕趙廣場角抵長袖風飄聚而觀之浸而為俗所以戎王奪志夫子遂行也朕方大變澆訛用清淄蠧眷兹女樂事切驕淫傷風害政莫斯為甚既違令式尤宜禁斷自今以後不得更然仍令御史金吾嚴加捉搦如有犯者先罪長官務令杜絶以稱朕意開元二年八月七日內出雲韶舞敕朕聞舞者所以節八音而行八風豈徒誇詡時代眩耀耳目而已也自立雲韶內府百有餘年都不出於九重今欲陳於百姓冀與公卿同樂豈獨娛於一身且珠翠綺羅孰非珍玩常念百金之費每惜十家之産是以所服之服俱非羅綺所冠之冠亦非珠翠至若弋綈之制大帛之衣德雖謝於古人儉不慚於曩哲庶羣公等觀此當體朕之不奢開元十二年正月雅樂名大唐樂制王者作樂古之大猷蓋以殷薦上帝嚴配祖考况順天地之體開山川之風發揮雅音道逹和氣揖讓而理不其盛歟自戰國以來此道隳壞但紀鏗鏘之節寧探述作之深歷代因循莫之改革朕嘗以聽政之暇緬尋前典雖舊制之空存而正聲之多缺將何以列彼祠祀感於靈神斯事體大諒資合度是用躬親有以裁校定六律而為本避五行之相剋哀慢淫過去其弊也清濁剛柔適其中也亦既協應頗為成文或得之於自然乃不知其本然豈上玄幽贊俾正缺遺者哉方於六代之作亦各一時之義也乃命奉常陳於祀事用昭誠敬且敦風俗而王公卿士爰及有司頻詣闕上言請以唐樂名斯至公事朕安得而辭焉然則大成大韶大濩大夏皆以大字表其樂章今之所請宜曰大唐樂開元二十九年六月經史命蕭瑀等修六代史詔經典序言史官紀事考論得失究盡變通所以裁成義類懲惡勸善多識前古貽鑒將來伏羲以降周秦斯及兩漢傳緒三國並命迄于晉宋載籍備焉自有魏南徙上乘機運周隋禪代歷世相仍梁氏稱邦跨據淮海齊遷龜鼎陳建宗祊莫不自命正朔綿歷嵗祀各殊徽號刪定禮儀至於發迹開基受終告代嘉謀善政名臣竒士立言著績無乏於時然而簡牘未修紀傅咸缺炎涼已積謡俗還訛餘烈遺風泯焉將墜朕握圖馭宇長世字民方立典謨永垂憲則顧彼湮落用深歎悼有懷撰録實資良直中書令蕭瑀給事中王敬業著作即殷聞禮可修魏史侍中陳叔逹祕書丞令狐德棻太史令唐儉可修周史兼中書令封德彞中書舍人顔師古可修隋史大理卿崔善為中書舍人孔紹安太子洗馬蕭德言可修梁史太子詹事裴矩兼吏部郎中祖孝孫前祕書監魏徴可修齊史祕書丞竇璡給事中歐陽詢秦王文學姚思亷可修陳史務加核詳博採舊聞義在不刋書法無隱武德五年十二月修晉書詔朕拯溺師旅省方禮畢四海無事百揆多間遂因暇日詳觀典府考龜文於羲載辨鳥册於軒年不出岩廊神交千祀之外穆然旒纊臨睨九皇之表是知右史序言斯不爽昧左官詮事歷兹綿逺發揮文字之本通逹書契之源大矣哉蓋史籍之為用也自沮誦攝官之後伯陽載筆之前代列史臣皆有刪著仲尼修而採檮杌倚相誦而闡丘墳降自西京班馬騰其茂實逮於東漢范謝振其芳聲蕞爾當塗陳夀核其國志眇哉劉宋沈約裁其帝籍至梁陳髙氏朕命勒成惟周及隋亦同甄録莫不彰善疸惡激一代之清芬褒吉懲凶備百王之令典唯晉氏膺運制有中原上帝啓玄石之圖下武代黃星之德及中朝鼎革江左嗣興並宅寰區式重徽號足以飛英麗筆將美册書但十有八家雖存記注而才非良史事虧實録緒煩而寡要思勞而少功叔寧課虗滋味同於畫餅子雲學海涓滴湮於涸流處叔不然於中興法盛莫通於創業洎乎干陸曹鄧略記帝王鸞盛廣松才編載記其文既野其事罕傳遂使典午清髙韜遺芳於簡册金行曩志缺繼美於驪騵遐想寂寥深為歎息宜令修國史所更撰晉書銓次舊聞裁成義類俾夫湮洛之誥咸使發明其所須可依修五代史故事若少學士亦量事追取貞觀二十年閏二月簡擇史官詔修撰國史義在典實自非操履貞白業量該通讜正有聞方堪此任所以承前縱居史官必就中簡擇灼然為衆所推者方令著述如聞近日以來但居此職即知修撰非唯編緝踈舛亦恐漏泄史事自今以後宜遣史司於史官內簡擇堪任修史人録名進內自餘雖居史職不得輒令聞見所修史籍及未行用國史等事總章三年十月令諸儒質定古文孝經尚書詔孝經尚書有古文本孔鄭注其中指趣頗多踳駮精義妙理若無所歸作業用心復何所適宜令諸儒并訪後進逹解者質定奏聞開元七年三月行何鄭所注書敕朕以全經道喪大義久乖淳感之性浸微流遁之源未息是用旁求廢簡逺追缺文欲使發揮異説同歸要道永惟一致之用以開百行之端間者諸儒所傳頗乖通議敦孔學者冀鄭門之息滅尚今文者指古傳為誣偽豈朝廷並列書府以廣儒術之心乎况孔鄭大宗固多殊趣諸生會議曽無所申而推求小疵其細已甚聚訟之訓人無則焉其何鄭二家可令仍舊行用王孔所注傳習者希宜布繼絶之典頗加奬飾子夏傳逸篇既廣前令帖易者停開元七年五月改尚書洪範無頗為陂敕孫逖敕典謨既作雖曰不刋文字或訛豈必相襲朕聼政之暇乙夜觀書匪徒閲於微言實𣣔暢於精理每讀尚書洪範至無偏無頗遵王之義三復兹句常有所疑據其下文並皆協韻唯頗一字實則不倫又周易泰卦中無平不陂釋文云陂有頗音陂之與頗訓詁無别為陂則文亦會意為頗則聲不成文應由煨燼之餘編簡墮缺傳授之際差别相沿原始要終須有刋革朕雖先覺兼訪諸儒僉以為然終非獨斷其尚書洪範無偏無頗字宜改為陂庶使先儒之義去彼膏盲後學之徒正其魚魯仍令宣示國學録開元以來名臣事迹付史館敕敕朕君臨萬邦多歷年所於今行事動必見書循以舊章傳諸實録豈朕之獨理所賴良臣或謀猷以濟其事或規諷以成其道開元以來勳庸德業咸宜備敘其身已沒者宜令子孫具録事迹送史館開元二十五年五月條貫起居注敕記事記言史官是職昭垂法誡著在舊章舉而必書朕所深望自今以後每坐日宰臣及諸司對後如是可備勸誡合在紀述者委承旨宰相宣示左右起居綴録仍準舊例每季送史館元和十二年九月唐大詔令集卷八十一
