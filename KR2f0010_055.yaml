body:
  text: 唐大詔令集卷六十五宋宋敏求編大臣録勳長孫無忌等九人各封一子郡縣公詔封建功臣詔長孫無忌等十四人並為刺史封國公令子孫承襲詔圖功臣像於凌烟閣詔贈淮西軍大將周曽等詔賜將士名及奉天定難功臣詔褒贈淮西立功將士詔録陷蕃官子孫詔為李懷光立後詔令畫中宗以後功臣於凌煙閣詔録李洧等子孫詔録功臣子康志寧等各除官職敕叙用勳舊武臣德音命京兆府修郭子儀墓詔録舊宥周隋名臣子孫配流詔賜盧懷慎家粟帛敕録蘇環孫繫等各除官詔録禇遂良等孫各除官詔録魏徴等三人裔孫詔録勳長孫無忌等九人各封一子郡縣公詔惟王建國厚禮備於元勳惟帝念功茂賞隆於延世是以親賢作屏著在周經支庶畢侯義存漢典開府儀同三司齊國公無忌尚書右僕射䢴國公𤣥齡故尚書左僕射蔡國公如晦靈州都督吳國公尉遲敬德左光祿大夫吏部尚書許國公士亷兵部尚書潞國公侯君集右武衛大將軍郢國公宇文士及左武衛大將軍翼國公秦叔寶瀘州都督宿國公程知節等或宇量凝深地兼賢戚或風鍳宏逺功參帳幕或志懷強正便繁左右或幹略宏舉契闊戎旃或委質籓朝陳力王室誠著出納節表屯夷經文緯武忠勤懇至固已契叶風雲寄深舟楫雖褒賢之道已紀於旗常而推恩之令未洽於𦙍緒宜畀寵章式遵故實無忌𤣥齡如晦敬德各封一子郡公士廉君集士及叔寶知節各封一子縣公俾夫比蹤曩烈如帶如礪垂裕後昆貞觀五年九月封建功臣詔欽明慎徽之朝稽古為本體國經野之治利建為先莫不因可大之功𢎞可久之德與萬方同其樂百姓共其安享祚遐長卜世年永疏爵以五錫壤以三周監二代煥乎前史晋魏迄今舊章廢寢維城之義闕如建侯之道斯絶王綱暫弛內無匡救之臣國步方迍外無藩屏之衛致令大盜猖獗動有窺覦蒸庶播蕩屢遭塗炭進無永為之策退失象賢之典寧邦固本其可得乎朕祗膺大寶欽承景命勵精治術安緝夏夷九服同軌六合一家日月所臨無思不服豈伊人力天實賜之既荷殊休宜𢎞大賚封疆郡國褒賜親賢與夫懿戚元勳共享其利自我作古未必專依前典允今約古隆基垂統令世祿𫝊家足以載德圖身厚已足以端成自然國有常典民獲其福皇家宗室及勳賢之臣德行可稱忠孝永著者宜令鎮籓作部宣條牧民貽厥子孫嗣守其政非有大故無或黜免酬勤報效仍宜有差宜令所司明為條例定等級具以奏聞貞觀五年十一月長孫無忌等十四人並為刺史封國公子孫承襲詔周武定業祚茅土於子孫漢髙受命誓帶礪於功臣豈止重親賢之地崇其禮物抑亦固磐石之基寄以籓垣魏晋以降事不師古建侯之制有乖名實非所謂籓屏王室永固無窮者也隋氏之季四海沸騰朕連屬殷憂戡剪多難上憑明靈之祐下賴英賢之輔廓清㝢縣嗣守寶厯豈豫一人獨能致此時迍既共資其力世安而專享其利乃至於斯甚所不取但今之刺史乃古之諸侯雖立名不同而其監統一也故申命有司斟酌前代宣條委共治之寄象賢在世及之典司空齊國公無忌等或材稱人傑望表國章論道廟堂寄深舟楫用資文武誠著艱難折衝閫外隱如敵國或志力忠烈實為心膂或體氣強果是曰爪牙榮名始運功參締搆義實休戚效彰夷險嘉庸懿績簡於朕心宜賜以籓鎮改錫土宇餘官食邑並如故即令子孫世世承襲貞觀十一年六月圖功臣像於凌煙閣詔自古皇王褒崇功德既勒名於鐘鼎又圖形於丹青是以甘露良佐麟閣著其美建武功臣雲臺紀其迹司徒趙國公無忌司空揚州都督河間王孝恭司空蔡文成公如晦故司空相州都督太子太師鄭文貞公徴司空梁國公𤣥齡開府儀同三司尚書左僕射申國公士廉開府儀同三司鄂國公敬德特進衛國公靖特進宋國公瑀故輔國大將軍揚州都督忠壯公志𤣥輔國大將軍夔國公𢎞基故尚書左僕射蔣國公通故陜東道大行臺尚書左僕射鄖節公開山故荆州都督譙襄公紹故涇州都督郢襄公順德洛州都督鄖國公張亮光祿大夫吏部尚書陳國公侯君集故左驍衛大將軍郯襄公張公謹右領軍大將軍盧國公程知節故禮部尚書永興文懿公虞世南故户部尚書渝襄公劉正㑹光祿大夫户部尚書莒國公唐儉光祿大夫兵部尚書英國公李績故徐州都督敬莊公秦叔寶等才惟棟梁謀猷經逺綢繆帷幄經營霸圖或學綜儒宗德光朝右隱犯同致忠讜日聞或竭力義旗委質籓邸一心表節百戰摽竒或受服廟堂闢土方面重氛載朗王略遐宣並契濶迍夷劬勞師旅贊景業於草昧翼淳化於隆平茂績嘉融冠冕列辟昌言道直寵冠縉紳固以瞻伊呂而連橫邁方召而長騖者矣宜約故實𢎞兹令典可並令畫於凌烟閣庶念功之懷無謝於前載旌賢之義永貽於後昆貞觀十七年二月贈淮寧軍大將軍周曽等敕敕王者體至公而立極明賞罰以垂法旌德表善發揮忠貞其有推丹誠以奉君臨大節而不奪守志明節殺身定難則褒勸之典所宜優異李希烈背天逆物通結羣盜奸謀藏於汴宋罪迹彰於汝鄭傾陷城邑虐毒蒸黎忠義之徒因懷感激故淮寧軍節度都虞候正議大夫試大理卿兼許州别駕占闕兼御史大夫上柱國政和郡王食實封一百户周曽忍奸邪之亂紀處危逼而思正隂建明義叶誅元凶遂與故許州都督鎮遏兵馬使同御寧軍節度副使開府儀同三司賜太常卿兼御史中丞上柱國定州郡王食實封五十户王玢故淮寧軍節度左廂兵馬使兼十將開府儀同三司賜太常卿兼潞州長史占闕兼御史中丞上柱國常林郡王食實封五十户呂從賁故十將輔國大將軍行右金吾大將軍員外置同正員兼賜太常卿上柱國合浦郡王食實封五十户康秀故節度監押衙宣德郎監察御史裏行賜緋魚袋姚憺故十將銀青光祿大夫賜太子賔客上柱國梁興朝故十將開府儀同三司太常卿河東縣開國伯賈樂卿故輔國大將軍員外置同正員兼賜太常卿侯山欽等誓心定志潜結忠謀將臨汝海之郊師以襄城之野方議梟其同惡獻首鎬京率彼戎旗南屯蔡邑傳一􅊾以定計擬尅日而就功希兾有應殱弭可期事方垂成為魁渠之所紏察緬懷義烈悉攖屠戮無辜殞命萬夫增憤形質委于原野忠魂越于草莾恍惚幽壤茫茫無依朕所以負扆長嗟坐朝興悼念忠良之不造空名在而身殁休德壯志貫于神明而為元惡矯誣翻欲歸過豈可使義烈之績泯而不彰宜加褒贈以示中外曽可太尉賜實封二百户通前三百户玢可司徒賜實封二百户通前二百五十户從賁可尚書左僕射賜實封一百户通前一百五十户秀琳可贈尚書右僕射賜實封一百户通前一百五十户憺可贈兵部尚書賜實封二百户興朝可贈户部尚書賜實封一百户樂卿可贈刑部尚書賜實封二百户仙欽可贈工部尚書賜實封一百户仍令右散騎常侍蕭昕往汝州界首以禮致祭并委李勉哥舒曜與州計㑹訪其家口父子兄弟俱以名聞即當類叙别有優奬有子者仍許其回父官爵其子孫三代以來有過犯者得以遞減一等罪論用彰峻節淮寧軍節度押衙中散大夫試殿中監兼唐州别駕占闕上柱國韋清與周曽姚憺始末同志曽等遇害清以智免率其麾下間道歸誠大節可嘉公賞宜茂可銀青光祿大夫守太子賔客兼御史大夫定安郡王食邑三千户仍賜實封二百户勳如故朕撫臨億兆於今五年每旰食宵衣勤求政理推誠委下日兾休兵明未燭幽德慚柔逺戎車尚戒大信猶鬱使忠烈之士殞身賊庭靜言興懷一食三歎罪己之責實謂在豫其周曽等所賜實封可載於典策𫝊其子孫永固山河之誓代代無絶自建中以來如有為國竭誠密圖元惡事或未就翻被誅夷或名氏未彰或休聲未振者既死節於王事宜書勳於竹帛並委諸道招討節度所在博訪明加曉示得其事迹具以奏聞特以褒奬朕方建明義於蠻貊宣大信於四海申必罰以懲其奸慝施厚賞以報其勳庸宜宣布天下令知朕意建中四年賜將士名奉天定難功臣詔陸贄敕國家受天明命平一宇內自武德迄今天寶百四十載海內無事崇德廣化澤及生人時洽和平俗登富教鰥寡孤獨咸得其所鳥獸魚鱉亦莫不寧凡今有生實賴亭育冦戎伺間盜起幽燕率土之人莫保性命肅宗以神武戡大難先朝以仁德紹興運區域再造億兆再康室家離拆而復安子孫煦嫗而相守勞徠安集垂三十年則我列聖之於天下也惠澤深矣朕以寡昧祗膺寶厯常恐不克負荷罔敢怠荒道有未明事多乖謬下情壅而不達大信鬱而不彰兩河之間羣祲連禍朕務除大患靡憚暫勞是以興有征之師問干紀之罪昨以涇原士庶將適汝郊失於撫綏致茲潰叛朱泚乘釁因搆異圖肆其狼心誘我蠧賊謂君可以叛謂天可以欺橫忽凌悖無所愧畏朕至失守宮闕出次郊畿九廟震驚萬姓奔駭內省思咎外顧懷慚罪實在豫不敢自蔽意者宗社降祐大警于朕躬夙夜殷憂庶乎有補實賴股肱心膂勵從戎之節方嶽將校集勤王之師赴難如歸見危思奮堅貞勵操何日忘之平巨猾者必仗於羣雄賞茂績者不限於彞典保勳庸於帶礪𫝊爵邑於子孫崇功美名與國終始其諸軍諸使應到奉天懸將士等宜並賜名奉天定難功臣實封者子子孫孫代代無絶身有過犯遞減罪二等子孫有過犯遞減一等當户應有差科徭役一切蠲免其功臣已後雖衰老疾患不任軍旅當分糧賜等並給金終身死亡之後回給家口十年勿絶如有能梟擒朱泚者即以朱泚在身官爵與之仍加食實封二千户朱泚所在有田宅財物悉便充賜其梟擒朱泚賊大將以下並節級時加優寵仍各與實封應梟擒朱泚人所有田宅便賜之其餘立功因應合授功立賞並准今月七日十一日十四日敕處分其今日巳前身死王事者追贈官爵亦稱奉天定難功臣子孫為功臣之家應合襲封減罪放免差役等一切同例宣告中外令知朕懷建中四年十一月二十四日褒賞淮西立功將士詔叛臣希烈竊據淮沂師旅一興綿聨莫解服勞者役從不暇受汚者無路自新通邑化為丘墟遺骸遍於原野每念及此心傷涕流自昔勞師靡有不悔以虞舜之聖屈於苖人漢武之強弊於戎虜矧乎德猶不逮力或未全我其永懷亦以自誓乃者下哀痛之詔布寬大之恩普天戴新殊化必宥然則尚勞師旅禦扞封陲有纍嵗離棄室家有經時不解甲胄忠雖為國咎實在豫君人若斯寧不知愧賴將相士旅一其誠心奮揚武威慎固疆宇逺人思服元惡就誅黎庶方致於安寧役戍永期於休息茂官以旌美賜宴以勞遝賞不移時式遵懿典都統檢校司空平章劉𤣥佐宜與子孫一人五品正員官節度使檢校右僕射李澄檢校工部尚書曲環檢校户部尚書李臯兼御史大夫樊澤等各與子孫一人七品正員官都防禦使工部尚書賈耽都團練使御史大夫盧𤣥卿張建封等各與子孫一人八品正員官檢校司空平章事李抱貞檢校司空平章事李納檢校右僕射平章事韓工部尚書田緒等各遣將士五千人赴河南行營以討不庭厥有成績抱貞納各與子孫一人六品正員官緒與子孫一人八品正員官應淮西界州縣本軍鎮守及諸道赴行營將士等共賜物三千端匹以充賞設仍委本道條例奏聞並與甄叙其行營將健各放歸本道明加宣諭令悉朕懷興元二年四月録陷蕃官子孫詔乃者吐蕃犯塞毒我生靈俶擾隴東深入河曲朕以兵戎初定傷疾未瘳務息戰伐之謀將遂通和之請亦知戎醜志在貪婪重遺修睦之詞允乃尋盟之㑹果為隱慝變發壝宮縱犬羊凶狡之羣乘文武信誠之衆蒼黃淪陷深用惻然此皆由朕之不明致其若此無德於萬㝢實有愧於四海宵旰貽憂何嗟及矣今兵部尚書崔漢衡等皆國之良士朝之藎臣嬰縶穹廬眇然殊域念其家室或未離於屢空祿以息男庶有資於薄俸漢衡宜與子一人正七品官司勳員外郎鄭叔矩檢校户部尚書路泌殿中侍御史韓弇及大將孟日華辛雲李至言范澄王良貴樂演明陽皆權文誠各與一子八品官試金吾兵曹恭軍袁同直前榆次尉裴頲及副兵馬使已上各與一子九品官仍委本使即具名銜奏聞為李懷光立後詔懷念舊功仁之大也興滅繼絶義之宏也昔蔡叔圯族周公封其子於東土韓信干紀漢后爵其孥以弓髙矦君集之不率景化我太宗存其𦙍以主祀詳考先王之道洎乎列祖之訓皆以刑佐德俾人向方則斧鉞之誅甲兵之伐蓋不得已而用也曩嵗盜臣竊發國步多虞朕狩於近郊指期薄伐將振昆陽之旅以興涿鹿之功徵師未達於諸矦衛士且疲於七萃而李懷光三軍夙駕千里勤王上假雷霆之威下逐虎狼之衆議功云始守節靡終潜搆禍胎拒違朝命棄同即異捨順效逆為臣至此在法必誅猶示綏懷庶其牽復而梟音益厲狶突莫遷大戮所加曽無噍類雖自貽伊戚與衆棄之而言念爾勞何嗟及矣以其前效猶在孤魂無歸懷之恍然是用悽軫豫欲布陳大信兾以化成保合太和期於刑措宜以懷光外孫燕八八賜姓李氏名承緒授右衛率府胄曹參軍承懷光之後仍賜錢一千貫文任於懷光墓側置立莊園供飬懷光妻王氏拜備四時享奠之禮嗚呼朕實不德臨於兆人泣辜宥罪素誠所志爾其保姓受氏宣力承家勉紹乃考之建國庸無若爾父之違王命貞元元年令畫中宗以後功臣於凌煙閣詔昔我列祖乘乾坤之蕩滌掃隋季之荒屯則有熊羆之士不二心之臣左右經綸參翼締搆用端命於上帝付畀四方宇宙既清王業既成乃圖厥容列於新閣懋昭績效式表儀形朝夕不忘永垂來裔君臣之義厚莫重焉貞元已已嵗秋九月我行西宮瞻宏閣崇搆見諸臣遺像顒然肅然和敬在色想雲龍之叶應感王業之艱難覩往思今取類非逺且功與時並才為代生尊主庇人何代不有在中宗則有桓彥範等著匡載之績在𤣥宗則有劉幽求等申翼奉之勳在肅宗代宗則有郭子儀等掃殄氛祲今則李晟等保又朕躬咸宣力肆勤光復宗祏訂之前列夫豈多謝闕而未録孰謂旌賢况念功紀德文祖所為也在豫曷其敢怠有司宜叙年代先後為圖其像列於舊臣之次仍令皇太子書朕是命紀於壁焉庶播嘉庸昭明天下俾後之來者知元勳之不朽貞元元年録李洧等子孫詔建中以來州軍及軍國歸人李洧李再春田昻李士真康日知李澄楊政義符璘李惠登薛翼蘇清沔等王者報功義惟過厚存則加其殊秩殁則恤其遺孤然後忠不徒施人知所勸故徐州觀察使李洧等頃逢艱阻各著欵誠或以地來歸或率徒效順名迹昭顯史冊具存先朝念功皆極封賞嵗月稍久湮沒日多再有甄明用申激勸宜委中書門下即訪其子孫量材叙用元和録功臣子康志寧等各除官職敕君臣運合故殉國以毁家勸賞義明故褒功而顯節存則疇其爵祿殁則祿其子孫然後忠義不遺典章斯在故磁晉隰等州觀察使檢校兵部尚書康日知故徐州刺史兼御史大夫李洧等一十家皆有茂功藏於盟府故命搜訪後嗣光賁前人今志寧等或服戎著績或從官有成或投迹軍府之中或滯才州縣之職咸加甄録各茂官榮庶乎受祿者無忘於聿修懷忠者使知其必報勉膺寵渥無替前勞元和八年八月叙用勳舊武臣德音敕朕聞昭德示威先王所以用武禁暴夷難後代安能去兵故文德誕敷武備宣耀外以環禦四海內以底清中原則軍旅之制有經師律之能必表朕纂承鴻業䖍奉丕圖宵分永懷何以康濟豈獨鼓鼙有感方思將帥之臣征伐為心乃寵干戈之士况文武並用古之格言勳舊不酬勞者何勸惟我髙祖太宗以晋陽之旅平一海內肅宗以靈武之衆收復二京代宗有陕郊元從之臣德宗有奉天戡難之士每念勳伐無忘寤懷如聞近日武班之中淹滯頗多雖負才略無由自明又有諸道薦送大將或隨節度歸朝自今已後宜令神䇿大將軍軍使及南衙常參武臣各具由厯受官年月前後功勳牒送中書門下若勳伐素髙人才特異者候有相當用處即具名奏聞量加奬擢其常參官資考深久未得遷轉者准具年月與改轉不得令有淹滯其先受文武官者亦宜准此使幕賔寮皆有年代改轉軍府大將豈可獨不叙遷自今已後諸道節度都團練經略等使下各隨本處其大將名自巳曽受監察以上官者並限三周年量與改轉如有功效合非時與改者不在此限其職名是兵馬使都虞候押衙以上前後並未曽奏官者亦仰量績效奏官轅門委營壘分師有役干戈無由稼穡况天寶以後屯兵七十餘年皆成父子之軍不習農桑之業一朝罷歸隴畝頓絶衣糧言念飢寒深用嗟憫應天下節度使都團練防禦經略等軍所置兵數各委本道據守舊額以為定數不得輒有減省其有逃亡病死及犯解退當時擇揀有武力藝能者添補奮行於陳决命捐軀不顧危亡每嘉忠烈官健有死王事者三周年不得停本分衣糧如有父兄子弟試其武藝堪在軍中承名請糧賜者先須收補孝本安親惟深飬老用敷恩惠以慰耆年應軍將及官健有父母年及七十已上委本州本道每至節嵗量與酒麵優飬守塞備邉固不可廢煙塵既靜亭障無虞諸道舊有防秋兵馬在邉上者自依年代替近師旅屯集饋運頗多不免於諸道留守留使錢內每貫量抽二百文以充國用幽鎮既以浣雪供費亦漸有常其河北諸道及河東兖鄆淄青汴宋陳滁澤潞河陽鄭滑等道并諸鎮並不量抽刁斗晨嚴烽煙夜警勤勞沙塞寒苦邉陲其沿邉鎮戍烽子等並委所管節度及城鎮使量與校量上下使其勞逸得均使命往來本於𫝊達軍期警急遂至繁多非惟郵𫝊不供抑亦號令難一自今已後應沿山東行營兵馬未歸本道巳來進退事機並宜轉委節度使仍仰條疏舊弊一一奏聞除事關急切須遣專使外其餘書詔文牒一切分付度支入遞發遣制使中使到行營不得輒受人情物錢及行非理鞭朴當加訪察義不優容𣙜管之說誠為救弊隨方適變所貴便人其河南河北鹽法宜委鹽鐡使與本道節度使審計㑹商量務以便人為法閲習土宜則通吏理既因試效可驗政能應河北諸道宜委觀察使訪察管內見攝官中如或清強有才行課績者具前後所攝年月并事迹奏聞當與改授從政之方必援風俗視人相土乃合所宜弛張在達於無私法令所期於不撓應河北諸道并鄆兖青等道應有新舊等科條有不便於人不宜於俗者委宣慰使與所在長吏商量廢置務從人便於戲朕代天子人撡執重器不以四海之富而恃其力每以百姓為念而兢於心慮文教之未敷虞武備之多闕所以輟食當寧未夜求明揣摩萬幾寧止三省頃以馭宇之嵗藩方久安委寄廣謀以緝軍政而有司不達茍以惜費為心致茲停減之名無禆毫厘之用使軍中老幼愁歎無歸朕博聽羣言用革羣弊舉其指要計叶人情庶乎侯伯列城典我師旅勵精撫士用副憂勤中外宣示明知朕意長慶二年三月十日命京兆府修郭子儀墓詔漢祖護信陵之冢厥有前聞晋朝修子房之墓垂有故事况本朝元老功冠鼎彞屬𦙍嗣凋零墟域摧毁雖古無修墓孔子有言而義存掩骼周王是命斷從朕意適表念功宜減賜御膳錢三千貫文雇丁匠即日修築仍令所司明年春仲以太牢祭子儀廟廣明元年十月録舊宥周隋名臣子孫配流詔朕聽朝之暇每觀前史歷覽名賢佐時忠臣殉國何嘗不想見其人廢書欽歎至於近代以來年載非遠然其𦙍緒或當見存縱未能顯加旌擢無容棄之遐裔其周隋二代名臣及忠節子孫有貞觀以來犯流配者宜令所司具録奏聞貞觀中五年七月賜盧懷慎家粟帛敕故銀青光祿大夫檢校黃門監漁陽縣開國伯贈荆州大都督府盧懷慎衣冠重望廊廟周才訏謨當三傑之一學行總四科之二等平津之輔漢同季文之相魯節鄰於古儉實可師雖清白燕翼籝金非寶然妻孥貧窶擔石屢空言念平昔彌深歎悼宜惜凌統之孤用旌晏嬰之德宜賜其家物一百假米粟二百石開元四年十一月録蘇環孫繫等各授官詔朕惟承纍世之業追先正之勞濟於艱難代有勳烈既而本根已遠枝葉稍零詔書屢勤於褒飾有司不忘於遴揀茲命宰輔載宏搜揚録其大功果獲良嗣蘇繫等咸有茂學懿行朂於前修皆人之領袖族之狐趙類能而舉各命以官或任以糾繩或參於閒列庶乎旌太傅之德擬將南城之封紹鄼矦之𦙍不俟東門之感忠義獲寵古今同之元和録禇遂良等孫各授官詔禇遂良五代孫䖍等朕觀列聖紀冊祖宗盛業粲然在前其或道有汚崇政有善否未始不繫乎當時輔弼嘗因寢殿言諸宰臣勉其匡益協心推戴且以元嵗乙已登應門敷大號俾疇賢相以訪遺裔或才器擅價各列官業或血食不繼宗祊已蕪如遂良之委笏面爭垂名史書仁傑之恢復廟社事形先覺宋璟之文吏骨鯁功參洽平元紘之守規畫一持成有裕其胄僅存不絶若髮各受邑吏使其自試太和二年三年録魏徵等三人裔孫詔武德以來輔相之臣以道致君以勞定國若贈司空徵故侍中知古故太尉冕語其功次皆在第一清風餘祉宜及乎後昆爾等乃其曽孫式叶搜奬俾奉貽謀之慶用覃延賞之恩各命以官勉爾祖德太和二年十一月唐大詔令集卷六十五
