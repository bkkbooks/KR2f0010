body:
  text: 唐大詔令集巻二十六宋宋敏求編追諡皇太子諡孝敬皇帝詔寜王諡讓皇帝詔端德太子諡奉天皇帝詔齊王諡承天皇帝制册諡文册諡孝敬皇帝文册諡殤皇帝文册諡讓皇帝文册諡恭皇后文册諡承天皇帝文哀册文孝敬皇帝哀册文哀皇后哀册文讓皇帝哀册文恭皇后哀册文奉天皇帝哀册文承天皇帝哀册文承天皇后哀册文追諡皇太子諡孝敬皇帝詔朕肅承鴻緒無忘馭朽之懐䖍奉聖謨每切臨深之懼幸穹昊垂祐宗社降靈公卿盡協贊之謨黎庶遂懷生之望故得乾坤交泰日月休徴垂衣而晏九瀛端拱而家六合方將迴鑾峒岫體髙尚於軒皇脱屣汾川追逸軌於伊后成功勿處思遵象帝之規守器斯𫝊用申知子之授皇太子𢎞生知誕質惟幾毓性肅敬著於三朝仁孝聞於四海若使負荷宗廟寧濟邦家必能永保昌圖克延景厯豈謂遽嬰霧露遂至彌留顧惟輝掌之珍特切鍾心之念庶其痊復以禪鴻名及腠理㣲和將遜於位而𢎞天資仁厚孝心純確既承朕命掩欷不言因兹感結舊疾増甚億兆攸係方崇下武之基五福無臻俄遷上賔之駕天性之重追懷哽咽宜申往命加以尊名夫諡者行之跡也號者事之表也慈恵親愛曰孝死不忘君曰敬可諡為孝敬皇帝仍遵故典式備徽章布告遐邇使知朕意上元二年四月寧王諡讓皇帝制勅能以位讓為吳太伯存則用成其節殁則當表其名非常之稱旌德斯在故太尉寧王憲誕含粹靈允膺大雅孝悌之至本乎中誠仁和之深非因外奬率由禮度雅尚文儒謙以自牧樂於為善比兩獻而有光與二南而合德自出臨方鎮入配台階逾勵忠勤益聞周慎實謂永為藩屏以輔邦家曽不憗遺奄焉亡殁友于之痛震動良深惟王朕之元昆合昇主嗣以朕奉先朝之睿畧定社稷之阽危推而不居請予主鬯又承慈㫖焉敢固違不然者則宸極之尊豈歸於薄德茂行若此易名是憑自非大號孰副休烈按諡法推功尚德曰讓德性寛柔曰讓敬追諡曰讓皇帝宜令所司備禮册命開元二十九年十一月靖德太子諡奉天皇帝制門下聖人立號天下至公膺其美者必歸有德有其德者或無其位茍徽烈可紀則追崇之典行焉况義貫因心禮優加等稽夫往䇿抑有前聞盛業鴻猷久不可替故靖德太子琮慶鍾霄極親則朕兄性與天通行髙時望宣慈恵和聰明睿哲四科兼綜一以貫之而福壽不遐既隨徃運𬗟惟友愛實軫予心朕昔踐儲宫顧誠非次於君父之命所不敢違以少長而言豈忘其序每思懇讓竟莫獲從遽順聖慈守兹寳位安可不申夙志有闕推恩宜加尊異之名載茂哀榮之典敬用追諡曰奉天皇帝妃竇氏曰恭應皇后宜委有司即擇日册命更以禮葬仍令右僕射冕充使監䕶少府監竇履信為副主者施行九年建寅月齊王諡承天皇帝制勅藩屏之諡古無鴻名先朝親親則有殊禮自我立制垂萬代法嗣位以長天睠在予崇德報功固當升號况時逢多難首建大册進昌言以啟聖聰告成命以開皇運易名之儀特異常典故齊王倓承天祚之慶保鴻名之光降志尊賢髙才好學藝文博洽智畧宏通斷必知来謀皆先事識無不達理至逾精廼者㓂盜横流鑾輿南幸先聖以宸扆之戀將侍君親惟王以宗廟之重誓寜家國克叶朕志載符天時立辨羣議之非同獻五原之計中興之盛實藉竒功景命不融早從厚穸天倫之愛震痛良深流涕追封胙於東海頃加表飾未極哀榮夫以叅舊邦再造之勲成天下一家之業而存未峻其等歿未尊其稱非所以旌徽烈明至公也朕以𦕈身纘膺大寳不及讓王之禮莫申太弟之嗣所懷靡從追想逾切非常之命寵錫攸宜敬用追諡曰承天皇帝與興信公主故第十四女張氏㝠婚諡曰恭順皇后有司准式即擇日冊命加以禮𦵏大厯三年五月七日册諡文册諡孝敬皇帝文維上元二年八月五日皇帝若曰於戲咨夫御圖籙者至聖荷提衡之業承宗廟者元良膺受命之期渺㝷千古之外縱觀百王之表成功不處髙讓之躅惟崇在賢斯授則哲之風逾逺睠彼勲華鼎祚𫝊於有德洎夫湯武寳歴歸於孟侯揖前載之宏模成後王之茂範者也炎精失馭巨猾挺突普天䧟塗炭之危萬姓遭豺狼之毒我髙祖神堯皇帝應天御物撥亂反正斬白蛇而定天下誓蒼兕而㑹諸侯底綏萬邦乂寜六合太宗文武聖皇帝循機綂極出震開階煉彩石而補乾綱拯横流而恢地絡逺穆近肅時清頌平朕式纘昌基欽承睿緒幸憑累聖之福髙居兆人之上靈符叶贊天命允集是以昭報先功鏤玉於升中之觀聿崇嚴配禋珪於布政之宫俗阜歳豐化淳刑措幽明以之郊社夷夏由其乂安馭朽逾兢寢繩多愧嘗以人之所寳者位雖處位以思冲心之所存者道希察道而求逸是以載想褰裳虚襟脱屣凝神不滓宣遊汾水之陽滌慮無為訪道襄城之野咨爾故皇太子𢎞克岐克嶷有德有行事親以孝愛敬極於寢門奉上以忠恭慎形於馳道孝慈不犯恵以及人載隆三善之規無俟八繁之誡發揮絃誦遜業之道彌光黼藻温文承祧之望攸重撫軍監國大闡良圖百揆萬幾佇令居攝庻幾乾坤交泰主鬯之業方新日月重光繼照之明斯逺頃炎象戒節屬爾沈疴實冀惟痊釋予重負恩因疾降告以斯懷爾忠懇特深孝情天至聞言哽咽感絶移時因此彌留奄然長逝伊川可望泣笙駕之無追瑶嶺難躋痛琴風之永絶循環念往震悼良深然事欲必行禮雖崇而徒設徳惟可尚身已謝而宜尊加以尊名允符心許是用諡爾為孝敬皇帝式昭典册俾夫位光一德叶帝載於將来名叅四大播芳聲於奕􅑤爾惟明靈若存享兹寳命嗚呼哀哉册諡殤皇帝文維開元二年嵗次甲寅八月缺辰朔日皇帝若曰於戲咨爾襄王象月降靈自天生派弱不好弄長而勤書衣冠待明有清河之畏慎狗馬不玩得淮南之恭儉徃以中宗晏駕嗣位登皇制於㓙逆是膺虛器懼深禍亂躬為掃除推位太皇誠靖懇到至公克遂雅懷惟虚宜其受兹多福享彼遐齡而腠理俄纒膏肓不救感念親懿用隠悼於厥心夫避德與能𫝊聖永祚承萬方之大福在三讓之髙節周之太伯王則有焉豈可禮均藩臣名齊列國等昌邑之厭毒同營陽之淪棄者哉是用超於舊典享以榮號逺推仁慈之心特傷短折之壽可諡為殤皇帝仍遣某乙持節授册宜膺寵靈式慰泉壤嗚呼哀哉册諡讓皇帝文維開元二十九年歳次辛巳十一月戊申朔二十五日壬申皇帝若曰於戲古者崇德考行猶謙大名餙終追逺亦膺徽册况乃元昆之戚天倫之重豈循恒典者哉咨爾故太尉寜王憲純粹秉靈冲和成量孝友之性發乎天然仁義之道彰乎日用加以好學不倦樂善有聞休問揚於間平清猷光於魯衛實謂儀刑邦國保乂藩維景命不融奄從薨逝興言震慟哀疚纒懷惟王地居元子合膺主鬯昔朕上禀先訓克清羣兇遂固守撝謙懇讓儲副然則深仁厚德茂行巳表於生前壹恵尊名盛禮寜忘於殁後是用諡王為讓皇帝今遣使尚書左丞裴耀卿副使太常卿韋韜等持節禮册因心之感備物飾情瞻典䇿而哀深想棣華而望絶所冀幽穸嘉兹寵榮嗚呼哀哉册諡恭皇后文維開元二十九年歳次辛巳十一月戊申朔二十五日壬申皇帝若曰於戲尊名備禮所以悲友于也因親襲號所以申悼往也讓皇帝故妃元氏門承華烈代襲清猷柔範夙著徽音允穆自伉儷天人能修壼訓克茂詩箴之教載修圖史之文豈謂福善無徴遽先殂逝天倫有感追悼兼懷福貴從尊事資餙贈有行梁苑早膺藩邸之榮將祔壽原允叶椒房之位是用册妃為恭皇后今遣使尚書左丞相裴耀卿副使韋韜持節禮册章服式陳典章攸備永惟神格嘉是哀榮册諡承天皇帝文常衮維大歴四年歳次巳酉五月甲辰朔十二日乙卯皇帝遣使某官某乙持節册命曰於戲稽於古典考於諡法戚藩升號禮或闕文爰自先朝特追尊號葢以長而教順豈私親而立制合之殊禮允屬元勲天下至公不可廢也爾故齊王某慶禀霄極氣陶元和孝彰純行忠表令德學師申穆文友徐陳答東平之詔尤推達禮辨南陽之牘可謂知㣲靜而有謀敏亦能斷徃以王室多故翠華西廵𬗟懷家邦首建大義上戴君父詔開中興㑹五原之兵車復四海之疆宇懋此偉烈屈於流運愛深同氣痛結中腸頃雖褒揚猶未僉允言念經啟之功載加飾終之數爰革舊典追崇大名是用册王曰承天皇帝改置園邑從饗清廟贈以黄屋左纛龍斾九旒必備王者之儀用極送哀之禮庶榮厚穸有愴於懷嗚呼明靈尚服休命哀册文孝敬皇帝哀册文薛元超維上元二年夏四月己亥皇太子𢎞薨於合璧宫之綺雲殿年二十四五月戊申詔追號諡為孝敬皇帝八月庚寅將遷葬於恭陵有司奏哀册文曰嗚呼赫矣皇綂昭哉帝謩光膺寳厯大啟瑶圖昌原𬗟鏡隤阯不渝欽惟妙質誕靈居震若木資芳咸池毓潤韶襟日湛英姿岳峻裕玉摛華鋪金協韻肇外作翰爰歸養德衢室成規軒庭禀則聖敬斯踐温文匪忒傍照四方下貞四國䖍誠問寢嗚謙齒胄洞淹儒城横披禮囿璧流揚彩環林搴秀飛遁来儀鴻生入授率性謂道収縱自天明踰視牘文冠題鞭裁山聳仞締席開延絶簡時繹精義咸甄豪飛紫露言控曬泉務殷監撫寄深社稷鮑爼不陳龍雋在側聰達有裕愉婉兼極瑜珮増輝金華動色乾慈衍渥廼眷儲皇惟天下之重器將釋負於巖廊竭因心之孝辭受終之禮蹐厚載以兢魂跼層穹而擥涕沖旨但聞逾懇神鑒曽不留少㣲告謝大漸無瘳方劭尊師之業奄從賔帝之遊嗚呼哀哉大象潛運灰飛緹幕經霜霣兮文梓寒髙飈起兮仙桂落未戢歸巢之燕空對栖闗之鶴嗚呼哀哉玉靈獻兆蜃隧合隂拖儀旌之委鬱翊羽騎之森沉轢湯渠而迴鶩指豪改以遥臨楚挽驚而疑斷悲笳咽而復㝷蕭索動風雲之氣蒼茫感天地之心嗚呼哀哉流日黯以西傾奔川淼而東度地擬橋山之曲闕如闕陌之路攀宇宙而無追仰容顔以纒慕嗚呼哀哉瀛區有變天柱終飛懷蒼梧而日逺望白雲而不歸沉沉隴樹漠漠泉闈竭五音而載筆藹千祀而騰徽嗚呼哀哉哀皇后册文宋温璩維開元六年歳次戊午五月甲午朔三日丙申哀皇后裴氏梓宫啟自先殯將遷祔於恭陵之山塋禮也皇上御寰區而翼翼纘洪緒而親親感上仙於周副痛未從於虞嬪攀鶴駕於終古贈鑾輅而増新時無逺而推吉物有容而必陳纂芳伸思徴幽寄神載揚清懿之烈爰屬有司之臣其詞曰月麗雲昇靈叶爽馮􅘌鄉茂族晉邑丕承土厚河廣祥發慶膺公侯必復紱冕攸興良精兌象室家化國昌胄延和榮門誕德淑問不巳柔順允塞素里揚英清閨仰則一人元良萬邦大本天作之合興能烈壼家本楙於漢封地先歸於晉衮主饋旌善賀酒騰歡承暉養德奉景訪安揺金羽之頻頻結環珮之珊珊賁日月之光色妙靈象而無端於是含章握文因此敬㣲慎獨崇法服於翬組接懿筐於蠶簇覲皇英而上親祗霄燭而下睦庶無違於信順期有馮於福靈忽虧光於輪月奄落彩於前星爽仁壽於偕老遘天禍而期丁瞻神宇之惟漠感靈衣之靡形驚迴風於虛殿宿衆鳥於空庭顧長御以擥涕甘自殉於山扃制立時而遽終情循節而恒苦草驕春而繞砌蟲吟秋而入戸限百刻之不延調六脈其誰補嗚呼哀哉徂謝𬗟其永久氣節浸以流換感窀穸之幽偏軫皇情以悽歎稽舊章之典禮崇新命之綸煥齊天地而德合綜神靈而道貫嗚呼哀哉日吉兮辰良玉珮兮金章命騏校以進駕翊龍輈而上驤代靈靴於河鼓建叅旗於太常號宫女之噭噭遣使臣之皇皇騰魚軒兮背北渚亂鳯管兮越南岡當赫㬢之畏日如徒靡之秋光望曽城而不返遵厚夜而何長嗚呼哀哉神理惟昧萬物同宅人生有終駟馬過隙訊虞妃於前古聞嬪帝於在昔感伊洛之山川懷靈仙之影迹彼銷形於天壤云誰同兮金石惟彤管之芳輝與青史而無斁嗚呼哀哉讓皇帝哀册文徐安貞維開元二十九年歳次辛巳十一月戊申朔二十四日辛未寜王薨於西京之邸第旋殯於正寢之西階翌日有制册王為讓皇帝葢景龍嵗先帝即位王嫡長將立為皇太子讓大功於我皇洎薨落讓存有追崇之義粤若天寳元年夏五月乙巳朔十七日庚申將遷座於恵陵禮也龜䇿先逺龍輴此時嗚呼哀哉皇帝遣金紫光祿大夫守尚書左僕射攝太尉上柱國許平縣開國侯耀卿奉宵載奠祖筵以申天倫之慽也乃命詞臣序之典册其詞曰昔真人之述作表髙節於讓王太伯聞乎有周皇昆昭於聖唐古徃今来身退業昌沒而不朽揚乎耿光𤣥祖錫慶重熙累盛兹冢嗣之謙德迨遺靈而受命童孺之辰初王壽春開國方大進封於蔡以委親賢是兼中外奄有於宋復遷於寜正疇庸於地理配明德於天星或建符節言歸闕廷既睦天愛承歡帝樂東扈温泉西侍平樂風雅屬和論思辨博晨超北上謁紫殿於蓬莱夕息南歸對瓊樓於花蕚莫匪恩遇周爰咨度坐而論道實惟三公登太尉兼儀同拜司徒命司空儀刑作孚宣和國風稽以前事𬗟懷逝者五王同日曜大君之一龍萬國来朝無梁王之駟馬讓則有之崇名可追踰周盟之禮㑹七月之期太史造時遣奠於兹自藩王之邸第建天子之旌旗度春明而春盡下長樂而長辭經灞川與渭川慘容衛兮遲遲當苑門之宫觀使吾君兮望思嗚呼哀哉髙寢林間隂堂晝閒代謝今昔神之往還列昭穆兮斯在奉忠孝於橋山嗚呼哀哉恭皇后哀册文維開元二十八年歳次庚辰月朔日寜王妃元氏薨於西京之第旋窆於某塋天未忘也相次徂落其明歳十一月二十四日王薨在殯制册為讓皇帝且有後命追諡妃為恭皇后葢以王有讓統之實而妃有恭德之美所以考其行追崇皆聖人天倫篤愛有光於古先者也粤天寳元年五月乙巳朔十七日庚申將遷祔於恵陵王薨及𦵏凡為七月天子之禮也乃命侍臣叙以册書其詞曰皇矣有熊處乎𤣥宫衣冠所在祉𦙍無窮以武而興復於上中以文始大元氣比崇禮侔周恪慶漸柔風展我邦媛倫昭有融至靜委和如天克令莫莫中谷夭夭作詠黄繶導容素沙増映鑒圖閲史隂儀壼政帝寵元昆妃承累命降家人之禮擬隂安之盛漢書文紀隂安侯髙帝鵲橋行化人倫以正或幾望於終古故守冲而益敬祥開夢兆服媚蘭蓀女延湯邑男受推恩縁車齊軫彩㦸盈門各禀柔訓常貽話言天授戩穀無非闕歸賵事凶毁臺闕團月忽蝕朝雲亦霽綵滅闕韶陽収華邸第嗚呼哀哉魯宫未考津門遽哀帝以讓而追諡后從夫而永陪翬揄暫舉璋瓚誰開用小君之備物怨吾王之不来嗚呼哀哉娥輪半上唇輅將移追雙旐兮遲遲巻六衣兮披披青門一别兮不駐素滻既濟兮相隨入松柏顧逺兮參差司馬門兮壘壘㳟后墳兮在斯嗚呼哀哉奉天皇帝哀册文王縉維元年建寅月二十六日故靖德太子諡曰奉天皇帝妃竇氏諡曰㳟應皇后啟自細栁將遷座於新豊望黄山而入上苑過紫極而出天門傍臨鳯闕雙引龍輼乃詔左僕射冕祖饋於行宫禮也今上孝悌通於神明追崇徽諡用達皇情陟岡目送避殿涕盈爰命述者以振休聲其詞曰昔在髙祖文思武德龍戰必勝海飛爭息威加八荒奄有萬國累業繼聖惟天是則昌運斯應睿哲乃生爰自弱嵗有如老成秤象知小測日言輕率爾之對畧而不行問安内䜿豈獨重明深居邸第亦稱惟城禮樂不執藝或可遊聨行魯衛虛佇應劉雁鶩非好神仙不求為善自樂俾躬處休行成於内聲聞於外性實匪驕迹能用晦朝野多歡兄弟髙㑹上客曵裾閒園飛葢仁者當夀天道何昧小山未傾盤石忽碎鳴呼哀哉天慈罔極寵命猶新前星告位少海遷神黄公誰客音容自春空悲天牒獨有芳塵正位乎内進賢闕肅肅令妃幽公之子家自漢室代為戚里百兩比肩四教盈耳不藝珩珮能循沼沚𫝊訓公宫留箴女史旋稱未亡身誓之死柔質冺焉徽音不巳嗚呼哀哉帝念元昆人無間言不及讓國於是追尊惟儲出震惟儷居坤備陳服御更起陵園来九重兮復去動萬乗兮還靜挽凄楚而凝哀駕迤遲而轉影别青門之早春背素滻之斜景路巳窮於咫尺時不延於俄頃嗚呼哀哉神輝永戢軒曜長零穸塏椒閫泉戸彤庭開夀宫兮寂寂虛玉座兮冥冥賔上帝於窅𦕈陪五后之明靈海為田兮岸為谷德不朽兮惟馨嗚呼哀哉承天皇帝哀册文常衮維大歴三年歳在戊申四月丁未朔六日壬子故齊王諡曰承天皇帝興信公主季女諡曰㳟順皇后初天寳十五載㑹有國難王首建大義扈先帝於朔陲以其年八月薨於行在某年某月追封齊王今上親親念切册贈大號以大厯三年六月遷座於咸陽銀棨𫝊曙金根在馭出仙禁兮逶迤泊横橋兮西去乃詔禮儀使工部尚書祖奠於行宫禮也聖慈友愛痛結天倫爰命作册授之儒臣其詞曰天祚我唐帝系其昌鴻明皇皇子孫保光長發其祥倬生賢王英華外揚五色含章聰敏明粹孝友純至文麗春華神清顥氣所全者德不有其貴昔在開元錫羡其蕃儲后愛子天皇弄孫勝衣走拜即啟東藩山委慶賚雲翔渥恩紫殿丹臺兮相屬臨洞音窅兮沉沉聫日元以金友煒芳蕚於瑶林甲觀宴兮承顔數寢門侍兮鍾愛深既閑詳於占對亦自守於冲退忘外事之嬰拂服前言之箴誨謂歡娛之末更何艱否之相㑹雲雷遘屯闗洛揚塵乗輿南幸定議北廵上戴君父協於天人中興之業實頼經綸如何上𤣥不假之年丹誤金鼎樽空玳筵軫於震慟澤漏重泉東負蒼海錫其土田顧謀始之言博謂飾終之恩薄崇章大號自我天作錫梁國之旌旗用魯侯之禮樂備物宫庭巍巍寵靈寳符玉牒照曜青塋仙駕帝儀上升紫㝠邦媛之妹婦道不踰遽辭金屋乆門珠襦錫以象服合於鮒隅嗚呼哀哉出國門兮蒼山轉辭白日兮長安逺驚飈落於桂宫零落沾於蘭坂建翠鳯兮葳㽔瞻落烏兮遲遲夀宫閉兮與天畢玉塵深兮無曉時嬪嬙儼兮侍新寢鳬雁遊兮非故池戢神輝之杳靄結吾君之眷思唯鴻勲之不冺𣺌然終古兮同斯承天皇后哀册文楊炎維大歴三年歳次戊申四月丁未朔六日壬子故齊王諡曰承天皇帝妃張氏諡曰㳟順皇后天寳末賊臣搆難王從二聖南幸成都自以武功定䇿禁中扈先帝於靈武以是年八月薨於行在今上録功追逺詔諡鴻名以大歴三年六月遷座於咸陽禮也雲幡宿懸天鷄切響建翠鳳以雙引度蒼龍而長往皇帝慟極天倫齊於閒館望桂嶼之蕭颯撫蘭臺之傷斷爰詔近臣遺音是纂其詞曰皇圖氛氲麗於天文本支百代聫華千載維王斯㑹其祥則大祖武之烈宗文之配令德純粹温㳟慈愛和必有節動而無悔持盈以中明道若昧金玉是式鼓鍾於外伊昔慶衍維黄握圖天孫載弄甲觀晨趨善問居講嚴師服儒瓊林秋實寳藻晴敷皇用錫土苴茅剖符大邦之翰滄海之隅遥分朱邸近植青梧愛鍾嘉恵寵被宸渥從侍寢門觀風大學禮聞齒讓聴辨聲樂厯運中否鯨災搆昏帝從避狄聖有昌言王叶羣議天廻乗轅適於硭碭之野進於閶闔之門雲趨河北電掃中原方從廟告言守藩垣忽川逝於東海怨夜長於西園鳴呼哀哉志操見於素履勲名流於天壤成宗禋之有聖悲歡愛之易喪獨精聚而魂遊奉君親以長徃展我邦媛德容可仰魯館而家齊風是長翟拜三月軿歸百兩豈鳯吹以有歸而虹銷之無像嗚呼哀哉帝念伊始晬容生憂傷桂色之幽蠧望山河之林丘觧劍龍而追慟燭鴻徽以㝠搜駕之輅旗服以冕裘儼千官於天衢將合祔而從周嗚呼哀哉笳鼔宵陳河山曉發地缺北兮聲逺天空南兮影没入幽隧之穹林伏盤原之宫闕嗚呼哀哉考至公與至性見為子兮為臣臨難不忘其社稷感時致思其君親短而非病逝豈同塵惟芳名與盛德可觀法以求仁嗚呼哀哉唐大詔令集巻二十六
