body:
  text: 唐大詔令集巻四十三宋宋敏求編郡縣主縣主出嫁稱適詔新都郡主適楊泚制安樂郡主適楊守文制新都郡主適盧咸制義安郡主適裴巽制封安定郡主制封新平郡主制東光縣主事跡入國史詔封壽昌縣主制壽昌縣主適崔珍制封仙源縣主制封永年縣主制封華亭縣主制封安吉縣主制加襄樂縣主等實封制封恩王等女為縣主制郡縣主縣主出嫁稱適詔古稱釐降惟屬王姬比聞縣主適人皆云出降娶王女者亦云尚主濫假名噐甚乖禮經其縣主出嫁宜稱適取王女者稱娶仍改令文顯慶二年九月新都郡主適楊泚詔鸞臺皇太子長女新都郡主資靈玉裕比價瑶臺發艶天庭仰儷星辰之像徽諸禁内夙禀河洲之德惠心明婉柔範端莊始踰待年之期甫及有行之歳通事舎人楊泚門擅槐庭地連姻戚箕裘克降才質兼茂可以膺合姓之典奉御輪之躅摽梅興詠方邀六禮之歡在楚言歸宜迨三星之夕郡主可出適楊泚安樂郡主適楊守文制鸞臺皇太子第八女安樂郡主承規銀牓毓彩銅樓寳婺連暉瓊娥比艶貞明發於閫訓窈窕齊於國風固巳儀範不僭柔閑有裕蘋蘩入薦既成四教之德桃李方春宜用三周之禮可出適符節即𢎞農楊承烈男守文新都郡主適盧咸制鸞臺皇太子第二女新都郡主相王長女壽昌縣主第二女安興縣主等並毓靈天漢禀訓皇門惠性早成芳規克茂粉澤四教針縷七篇笄年在時令月有典宜穆三從之禮式光百兩之迓新都郡主可出適左衛翊盧成壽昌縣主可出適太子右奉御楊尚一安興縣主可出適梁王府參軍薛琳所司准式義安郡主適裴巽制鸞臺皇太子第二女義安郡主重月降輝發春揚彩四德淳茂六行㳟脩歳在結纓時方納幣均州司倉裴巽門胄清顯風範昭明既諧委雁之祥宜縟盤螭之禮郡主可出適巽仍以今月十四日成禮所司准式封安定郡主制孫逖門下故惠宣太子第三十女肅雍成性柔婉為容禀訓女師克嫻嬪則爰占近日用叶初笄申錫美名受封良邑可封安定郡主主者施行封新平郡主制孫逖門下惠宣太子第三十一女柔姿婉訓淑德閑和早習組紃備詳圖史移天有禮撰日于歸宜增列郡之封允叶睦親之計可封新平郡主主者施行東光縣主事跡編入國史詔故紀王女東光縣主忠性純孝雅操貞烈感興運之方啟痛亡靈之不追休戚是同悲喜交集發言鯁塞因致殂謝聞之傷惋震於予懷忠孝之情深可嘉尚宜命史官編入國史神龍元年三月封壽昌縣主制鸞臺相王旦長女第三女第四女等毓靈河漢禀訓天人蕙問清淑蘭儀婉順徽章所披抑有之封式開湯沐之邑長女可封壽昌縣主第二女可封淮揚縣主第四女可封夀光縣主壽昌縣主適崔珍制鸞臺相王長女壽昌縣主第五女仙源縣主並禀靈天漢漸訓王門質耀桃李性分蘭蕙帝孫將降甫及笄年國人所承允歸時望清廟齋即崔珍太子左奉御薛伯陽並地襲衣冠躬履名教風猷美茂才藝紛綸飛鳯之占既合其吉乗龍之背宜膺雙舉夀昌縣主可出適珍仙源縣主可出適伯陽仍令所司准式例封仙源縣主制鸞臺相王第五女資靈桂魄禀訓蘭宫六行昭宣四德淳備夭桃穠李既挺淑令之姿紅綬青緺宜開湯沐之邑可封仙源縣主封永年縣主制鸞臺某王某第幾女毓芳桂苑發艶淑庭繡袵初笄巳觀於婉淑瑶筐載弄更表於柔閑韶容將寳婺分暉恵質與瓊蛾比秀承規蹈禮既漸訓於河洲延賔推恩宜加榮於湯沐可封永年縣主封華亭縣主制黄門司空兼虢州刺史邠王守禮第二女王門誕秀師氏尚柔婉嫕凝芳閑和順則佇儀膏族俾錫脂田可封華亭縣主開元二年九月七日封安吉縣主制蘓頲黄門宋王長女流芳桂邸禀訓梧宫體自閑和成其婉娩玉笄始茂金燧方嚴爰寵錫於脂粉俾開榮於湯沐可封安吉縣主主者施行開元二年十二月二十八日加襄樂縣主等實封勅孫逖勅故惠宣太子女襄樂縣主等德禀賢王名髙淑女資其婉順遘此偏孤念逺之德惟恩是屬宜受賜於湯沐俾承榮於敦叙可各賜實封一百户封恩王等女為縣主制王者教化本於婚姻由親以及踈自内而形外故詩稱好合所以成子姓也禮有待年明其必及時也㳟惟累聖之後子孫衆多教於公宫巳知婦順而從人之義重擇配之才難以茲兢慎久曠嘉禮言念及此惕然興懷思𢎞厚恩用叶敦叙恩王等女六人並封縣主仍委中書門下與宗正卿及吏部尚書侍郎計㑹於諸親之内及常選之中精求人門副我誠意元和六年十二月唐大詔令集巻四十三
