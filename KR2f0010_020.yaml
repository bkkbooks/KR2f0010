body:
  text: 唐大詔令集卷三十宋宋敏求編皇太子監國神堯命皇太子决斷庶政詔太上皇崩命皇太子承乾知軍國事詔太宗征遼命皇太子監國詔太宗破髙麗回怡攝命皇太子决斷機務詔髙宗命皇太子領諸司啓事制則天太后命皇太子監國制睿宗命皇太子監國制允皇太子奏讓政事詔明皇命太子監國總師從東討詔肅宗命皇太子監國制順宗命皇太子勾當軍國敕穆宗命皇太子檢校軍國敕文宗立頴王為皇太弟勾當軍國敕武宗立光王為皇太叔勾當軍國敕宣宗立鄆王為皇太子勾當軍國敕懿宗立晉王為皇太子勾當軍國詔僖宗立夀王為皇太子勾當軍國詔昭宗命皇太子監國制何皇后立輝王為皇太子監軍國令𫝊位神堯𫝊位皇太子詔神堯命皇帝正位詔睿宗命皇太子即位詔睿宗令明皇總制軍刑政詔明皇令肅宗即位詔肅宗命皇太子即位詔順宗命皇太子即位詔順宗𫝊位皇太子改元詔何皇后命皇太子即位詔監國神堯命皇太子决斷庶政詔朕君臨率土劬勞庶政昧旦求衣思𢎞至道而萬幾繁委成務殷積當扆日昃實疲聽覽皇太子世民夙禀生知識量明允文德武功平一海內九官惟叙四門以穆朕付託得人義同釋負遐邇寧泰嘉慰良深自今以後軍機時務兵仗倉糧凡厥庶政事無大小悉委皇太子决斷然後奏聞既溥天同慶宜加惠澤為父後者若有封爵皆令襲繼諸赤牒擬授職事官見任者並即為真其巳得替者參選之日聽依階叙亡官失爵者量加擢用逋租宿賦及先頁官錢物悉從蠲免文武官人節級頒賜務存優洽稱朕意焉武德九年六月太上皇崩命皇太子知軍國事詔朕以不天夙罹偏罰假息旦暮分沉苦壤仰賴先皇慈恩鞠育爰自幼年至於成家未及弱冠仍屬亂離翼奉義旗身當矢石克平多難任居藩屏遂復委以萬幾膺兹景命祗懼虛薄弗克負荷日夜兢兢不遑寧晏加以氣患屢幸九成晨昏定省廢於朝夕今歲停行盡行養禮不謂殃罰深重太行崩背號天叩地無所逮及伏奉遺詔追跡漢文以日易月降其常期顧命之㫖誠不可違然三年之喪自天子達殷周以來罔弗遵用漢文變古有乖前式但慈顔日逺欣謁無由俯就之文理即遵奉然朕之情切不可抑荼毒之心何可堪忍皇太子承乾年過志學秉性聰敏頻年治國理務允諧今欲於東宫平决朕得盡哀廬室終其喪紀望羣公卿士股肱王室興言及此唯增哽絶朝多君子恕朕哀心貞觀九年五月太宗征遼命皇太子監國詔朕以寡薄君臨區夏奉神祗之永命當億兆之重責宵衣旰食憂六宫之未安寒心銷志懼一物之失所穢况僻逺豺狼縱毒元惡尚稽乎天罰遺黎久陷於坑穽朕是以發自瀍澗言巡遼碣命元戎以先驅播凱澤於遐裔省方之務既勞於躬親監國之重允屬於儲二皇太子治溫文表德睿哲日躋仁孝之誠彰於溫凊絃誦之美著於膠庠禮義既茂徽猷彌逺委以賞罰之權任以軍國之政詳諸前載實惟令典發定州巡遼左之後宜令太子治監國其宗廟社稷百神咸令主祭軍國事務並取决斷貞觀十九年正月太宗破髙麗回怡攝命皇太子决斷機務詔朕粵在渺年時逢道喪懷生之類盡塗原野是用疚心疾首攘袂救焚以戰場為爼豆以戎戈為章服夕不遑寧思濟四方飢不及餐推移一紀幸賴上𤣥幽贊下土宅心沗承嗣厯勵精求政蠲百王之積弊振千紀之頺綱旰食宵衣百齡行半洎乎至道方泰荼毒遽侵自九年以來亟罹哀恤又屬髙麗逆亂毒被韓夷微物不安無忘隱惻遂復躬行弔伐逺涉遐荒時歷暄寒體親風雨雖復靖氛海外有慰深衷久倦征遼乃多虛弊方今兆庶殷阜六合廓清垂拱無為允在兹日而皇太子某令德逺彰所有幾務並可斷决百辟卿士咸宜受其節度朕當親調五藥暫屏萬幾三兩月間且自怡攝貞觀二十年三月高宗命皇太子領諸司啓事詔東臺二極之基道光於上嗣貞國之本事表於元良故能創北搖之風敬東序之業功少海而逾潤浮前曜而增華皇太子𢎞寢門標美夀街騰懿三善夙茂瑜珮以之含鏘四學早優班翰以之凝映正以年在冲幼未從監撫雖調護方勤助琢磨之器而稼穡靡喻爽德教之途然為政之方義資素習宜令皇太子𢎞每五日於光順門內坐諸司有奏事小者並啓皇太子主者施行則天太后命皇太子監國制鸞臺多難興王殷憂啓聖蕭牆之禍自古有之朕以虛寡宿承先顧社稷宗廟寄在朕躬親理萬幾年逾二紀幸得九𤣥垂祜四海乂安何嘗不日昃忘食夜分輟寢戰戰而臨寶位䖍䖍而握聖圖憂百姓之不寧懼一物之失所久親庶政勤倦成勞頃日以來微加風疢逆豎張易之昌宗兄弟比緣薄解調鍊久在園苑驅馳錫以殊恩加以顯秩不謂豺狼之性潛起梟獍之心積日包藏一朝發露皇太子顯元良守器純孝奉親知此釁萌奔衛宸極與北軍諸將戮力齊心𠞰撲凶渠咸就梟斬斯乃天地之大德幽明所贊叶者乎豈惟朕躬之幸抑亦兆庶之福朕方資藥餌冀保痊和幾務既繁有妨攝理監臨之寄屬在元良宜令皇太子顯監國百官總已以聽朕當養閒髙枕庶獲延齡可大赦天下神龍元年正月睿宗命皇太子監國制張說維天生人牧以元后維王立國二以儲君將以保綏家邦安固後嗣者也朕纂承鴻業欽若寶圖夜分不寐日昃忘倦茫茫四海懼一心之未周蒸蒸萬方恐一物之失所雖卿士竭誠守宰宣化𬗟懷庶域仍未小康皇太子隆基仁智因心溫恭成德深達理體能辨皇猷宜令監國俾爾為政其六品以下授官及徒罪以下並取處分景雲二年二月允皇太子奏讓政事詔朕恭臨宸極嗣守丕圖承九服之康寧當二儀之交泰窅然汾水願遂放勛之遊皇太子諱孝德茂於周儲恭慎超於兩漢翼宣景化允輔朕躬頃以宇宙事殷宗社事重委以幾務叶贊謀猷志切承師情殷問道夏絃春誦心存德藝威刑慶賞罔不當仁循省奏章嘉而不奪景雲二年四月明皇命皇太子監國親總師徒東討詔詔曰通三立極正維之業大明兩作離繼照之功博是以貞我萬國必在元良弼豫一人歸之上嗣將寄丈人之律實資長子之師亦既戒嚴當除羣慝皇太子亨仁明植性孝友因心禀上德之粹靈宅中和之正氣恭敬之䖍豈伊橋梓剛柔之適無取韋絃韞公忠而事君總文武而行巳既不絶馳之美可稱問膳之勤心以三善之明助百揆之務邇安逺肅天平地成屬凶險負恩稱兵向闕人神共憤命爾撫軍將徼福於宗祧以保安於社稷憑天之德何嚮不濟順人之心所戰必尅庶清彼氛沴以寧我國家宜令太子監國仍即親總師徒以誅叛逆取今月二十三日先務所司准式務從省便無使勞煩布告遐邇咸令知悉天寶十四年十二月肅宗命皇太子監國制門下天下之本屬於元良四方之明資其繼照是有𫝊歸之義必膺監撫之重克廣前烈與人守邦非君父之獨親俾生靈之同戴朕號慕弓劍寢居縗絰頃以疾苦未能康寧殘寇猶虞中原多壘軍國大務理須參决乃眷匕鬯共承宗祧皇太子豫天縱聰明日躋德業中興締搆巳有大功問安內寢占九國之夢制勝戎閫髙五官之才時方艱難禮在諒暗其以庶政委之元子宜令權監國又以上天降寶獻自楚州神明告厯數之符奎璧定妖災之氣總集瑞命祗承鴻休因以體元叶於五紀其元年宜改為寶應元年建巳月改為四月其餘月並依常數仍舊以正月一日為歲首受兹福應行以升平因日月之重光布雲雨之渥澤其天下見禁囚徒罪無輕重並巳發覺未發覺巳結正未結正四月十五日昧爽以前一切放免左降官宜量移近處流人即一切放回有司更不得輕有類例條件其楚州刺史并出寶縣官及進寶官等量與進改隨進寶官等典傔各量與一官宣示中外咸知朕意主者施行司徒兼中書令闕戶部侍即同中書門下平章事兼知中書事臣元載宣德即檢校中書僉人臣楊綰奉行特進行侍即上柱國韓國公臣晉卿闕銀青光祿大夫行黃門侍即同中書門下平章事臣遵慶朝請大夫守給事中臣液等言臣聞明兩作離所以照天下洊雷為震所以貞萬邦故書美元良易昭七鬯伏惟皇帝陛下聖德廣被仁風大洽匡復宗社𢎞濟艱難孝道純深聖懷罔極居憂致毁恭默何言伏惟皇太子承纍聖之資禀自天之訓問安有禮無闕三朝保大成功已申七德是命守邦之重允彰知子之明况神其告符天不祕寶克昌景命必靜妖氛豈謝金縢啓翌日之期𤣥符告彞倫之叙是故統元立極復舊惟新因瑞以表年順人而定嗣宥過無大囹圄皆空俾人遷善遐荒必被休徴昭其靈貺官吏沐其鴻私臣等叨侍軒墀恭承典禮感戴之極倍萬恆情無任懇欵之至請奉制付外施行謹言順宗命皇太子勾當軍國敕敕朕承九聖之烈荷萬邦之重顧以寡德涉道未明䖍恭寅畏懼不克荷常恐上墜祖宗之訓下貽卿士之憂夙夜祗勤如臨於谷而積疢未復至於經時怡神保和常所不暇永惟四方之大萬務之殷不躬不親慮有曠廢加以山陵有日霖潦踰旬是用警於朕心思答天戒其軍國政事宜權令皇太子純勾當百辟羣后中外庶僚悉心輔翼同底於理宣布朕意咸使聞知永貞元年七月穆宗命皇太子檢校軍國敕敕朕獲嗣祖宗祗荷重器常恐失墜若陷泉谷而萬務所繫憂勤是切宿疹在體不遑自安陽氣歊蒸沉恙復作不能日臨庶政親領萬幾皇太子湛睿哲溫文孝敬明敏其軍國政事宜權令檢校百辟卿士中外臣僚宜竭乃心輔我元子同底於道以寧邦家宣布朕意庶使知悉長慶四年正月文宗立頴王為皇太弟勾當軍國敕敕朕顧以眇身獲承丕構嚴恭寅畏十有五年列聖鴻猷朕豈能荷涉氷匪懼馭朽非難雖宇內小康而大道猶鬱方自砥礪期臻洽平天不祜豫夙嬰疾疹政慮多闕心靡遑安近者凝沍所侵久而寖劇臣僚愛我內外一心禱祀畢為藥石備至亟換旬朔有加無瘳懼不能躬總萬幾日釐庶政稽於古訓謀及大臣用建親賢以二神器親弟頴王諱朕昔在藩邸常同師訓動成儀矩性秉寬仁俾奉昌圖必諧人欲可立為皇太弟應軍國政事便令權勾當百辟卿士中外庶臣宜竭乃心輔成豫志陳王成美先立為皇太子以其年尚冲幼未漸師資比每念重難不行册命回踐朱邸允叶至公可依前復封為陳王嗚呼萬務不可以久曠萬方不可以乏統惟義所在朕不敢私宣布中外咸令知悉開成五年正月二日武宗立光王為皇太叔勾當軍國敕敕朕以微眇獲守宗祧祗荷鴻休懼不克濟乾乾夕惕若涉春氷旰昃忘疲宵分假寐而陽和布候同隂交爭寒暑所侵乖於攝理忽嬰疾疚羸巳經時漸覺衰羸藥餌未效臣僚愛我中外叶心禱祝畢為針石備至皇子冲幼未經師資軍國事重須選賢德稽於訓典謀及大臣用建明哲以二神器親叔光王怡宜改為忱植性忠孝翼翼小心禮樂生知聰明天縱溫文敏裕博厚寬仁言必依經雅符於詩禮動不違矩式合於典謨俾奉丕圖必愜人欲可立為皇太叔應軍國政事便令權勾當百辟卿士中外庶官宜竭乃心輔成豫志嗚呼萬幾不可以久曠兆人不可以乏統惟義是守朕不敢私宣布中外咸令知悉㑹昌六年三月二十一日宣宗立鄆王為皇太子勾當軍國敕敕朕以寡昧獲承丕搆潔己以奉九廟恭巳以臨兆人宵旰在懷罔敢暇逸而憂勞所迫蒸暑或加疾恙未瘳既踰旬朔萬幾繁重不能躬親詢於大臣稽以古訓永惟負荷之重思建儲二之賢用舉徽章式固大本長子鄆王溫宜改名漼濬哲天縱孝敬日躋秉德不回出言可法英姿齊聖粹厚而恭道叶繼明義符立長可以二於神器增輝前星宜立為皇太子權勾當軍國政事咨爾三事百辟內外臣僚宜協乃心敬輔元子罔違於道俾致時雍布告遐邇咸令知悉大中十三年八月九日懿宗立晋王為皇太子勾當軍國詔敕曰朕守大器之重居兆人之上日慎一日如履如臨旰昃勞懷寢興思理涉道猶淺至化未𢎞而攝養乖方寒暑嬰厲實有慮於闕政且無暇於怡神恙未少瘳日以寖劇萬務繁綜須有主張考之舊章謀於列辟思闡鴻業式建皇儲第五男普王儼改名儇孝敬溫恭寬和博厚日新令德天縱英姿言皆中規動必由禮俾崇邦本允洽人心宜立為皇太子權勾當軍國政事咨爾中外卿士洎於腹心之臣敬保𦙍子輔成豫志各竭乃心以安黎庶布告中外知朕意焉咸通十四年七月十七日僖宗立壽王為皇太弟知軍國詔門下朕幼荷丕搆夙夜不遑蓋以三百年之鴻基十七聖之大業守文重事偃武貞期惟懼冲人不克頁荷果致干戈四處寇盜連年再省藩維兩違陵廟上愧髙祖太宗之締搆下慙中外羣后之匡扶既積殷憂俄成疾疹而上天降祜中道獲痊萬乘還宫六龍挽駕御端門而肆赦閲諸夏而駿奔雖有愧中興而克全舊物繄爾中外方俟報功寧期瘥疾未瘳尚嬰沉痼徒思勿藥詎報有徴腠理是加連綿莫療永惟八方之大萬務之殷既不躬親固當壅滯朕親弟壽王傑天資頴悟生禀溫文孝友通於神明仁愛格於上下必能體朕憂惕濟我艱難用叶和平得就頥養宜册為皇太弟知軍國政事咨爾內外大臣羣方庶尹悉宜聽監國處分盡心輔戴寧國安人酌變從宜同底於理布告天下咸使聞知光啓四年三月六日昭宗命皇太子監國制門下朕以眇身祗膺大寶十有三載懼不克勝上荷祖宗之靈托於兆人之上虛受謙益每勵於恭勤示儉守文靡忘其宵旰而乃兩經播越薦興兵革生類莫躋於仁壽理道未致於洽平尚賴左右大臣奠奬侯伯共戡多難歸復神州豈我眇冲拯此艱運恭念髙祖睿宗𤣥宗順宗或經多難或苦沉疴遂厭萬幾授於令嗣是使進退無爽孝慈兩全人心盡服其至公天性克彰於其美近者忽嬰疾疹旦夕未瘳雖思養襟靈而亦循典故皇太子裕溫恭有立和粹積中藴孝悌以性成禀聰知而夙慧動惟樂義進則思賢必能廣繼絶之心副𫝊歸之命萬幾至重不可暫闕宜令皇太子裕監軍國事咨爾中外匡弼將相卿士輔朕元子永孚於休凡厥庶務悉宜聽監國處分布告遐邇當體朕意主者施行光化一年十一月六日何皇后立輝王為皇太子監軍國令門下我國家化隋為唐奄有天下三百年之盛業十八帝之耿光聖上自纂丕圖垂將二紀雖恭勤無怠屬運數多艱致寰宇之未康覩兵戈之屢起賴勳賢叶力宗社冉安豈意宫闈之中禍亂忽作昭儀李漸榮河東郡夫人裴貞一等潛為逆節輒肆凶謀傷疚既深久及膚革萬幾不可以久曠四海不可以乏君神鼎所歸頃有纂紹輝王祚幼彰岐嶷長實端貞裒然不羣豫所鍾愛必能克奉丕訓以安兆人宜立為皇太子仍改名祝監軍國事於戲孝愛可以承九廟恭儉可以安萬邦無樂逸遊用寧寰宇百辟卿士佐兹冲人冉揚我太宗之休烈主者施行天祐元年八月傳位神堯傳位皇太子詔乾道統天文明於是馭厯大寶曰位宸極所以居尊昔在勳華不昌厥緒揖讓之禮旁求歷試三代以降天下為家繼體承基流朔相襲故能孝饗宗廟卜世長逺貽慶後昆克隆鼎祚朕膺圖受理握國闡極大拯橫流載寧區夏然而昧旦丕顯日昃坐朝馭朽兢懷履氷在念憂勞庶政九載於兹今精華巳竭耄期倦勤久懷物表髙蹈風雲釋纍遺塵有同脫屣深求閒逸用保休和皇太子世民早契禎符夙彰竒表天縱神武智藴深機自雲雷締搆霸業伊始義旗之舉首創成規京邑克平莫非其力及皇極巳建天步猶艱內發謀猷外清氛祲英圖冠世妙算窮神伐暴夷凶無思不服薛舉負西戎之衆武周引北狄之兵蝟起蜂飛假名竊號元戎所指折首傾巢王世充藉府庫之資憑山河之固信臣精卒承間守險建德因之同惡相濟金鼓才振一縱兩擒師不逾時戎衣大定夷劉闥於趙魏覆徐郭於譙兖功格穹蒼德孚宇宙雄才宏略振古莫儔造成大唐繄其是賴既而居中作相任隆羣后百揆時總三階以平地居元良實惟國本萬邦咸正庶兆樂推晷緯呈象休禎允集華夏載佇謳訟知歸今傳皇帝於某所司備禮以時册授公卿百官四方嶽牧爰及長吏下至士民宜悉祗奉以稱朕意夫政惟通變禮貴從宜利在因民義存適要條章法度不便於時者隨事改易勿有凝滯昔漢祖撥亂身定大功羣臣推奉光宅帝位而事父資敬五日一朝備禮尊崇稱號太上朕方游心恬淡安神𤣥默無為拱揖憲章往古稱謂之儀一凖漢代庶宗社之圖申錫無疆天祿之期永安勿替布告天下咸使知悉武德元年八月神堯命皇帝正位詔書曰知人則哲惟帝難之易曰通變則久使民不倦故太伯端委周道以隆東海就國漢祚方永立權致治可不然乎朕世濟緇衣家傳鼎鼐佐魏匡周勤勞王室有隋御厯地居戚里常以補天在慮納揆為心大業道喪皇極如燬傾維折柱天下分崩塗炭納隍黔黎殆盡顧兹九有鋒鏑縱橫靜念一匡計無所出世民幼懷大度性合天道藴經緯之竒才抱湯武之宏略深謀祕䇿沃朕拯溺之心壯志雄圖起豫救焚之志因其感激益廣經綸紏合義師投袂而起車反於平陽之郊劍及於孟津之㑹元戎所至氷銷霧卷曽未浹旬廓清京邑定非常之業建不世之功三古以來未之聞也朱旗西指則仁杲喪元白羽東臨則世充泥首摧武周如拉朽收建德若拾遺至於黑闥逋誅圓朗小醜三捷七擒不可勝計一人之力冠今超古暴之遐邇豈待昌言以建成嫡長冀其養德日就不謂罔思友于忌能毁善讒言屢發始至鑠金賴天啓朕心宗社降福密悟凶邪指麾殱殄朕愧受浸潤深念元功乃敬授帝圖先天傳政懼其溢滿驕上未稱三靈之心縱欲肆情不恤萬方之重朕故仍居紫極處之肅成或察其復禮觀其齊政露往霜來四載於兹矣比聞思我王度克艱克難昧旦丕顯去奢來泰朝夕視膳蒸蒸之性日嚴仄景憂民翼翼之情愈篤南越獻賮北狄欵關四海宴然五兵偃戢招君章之黨止用天書屠師都之城無虧寸刃公卿輯睦逺邇乂安金鼓絶於疆場玉鏡懸於億兆盡善盡美吾無間然匪天祐之孰能至此令月吉辰風調雨順朕俯觀人事仰答穹昊自當養性便宫使其正居宸極宜令有司具禮務在周備朕得脫屣髙蹈擬跡於軒轅授厯𫝊璽爰屬於夏啓大寶既固卜年惟永付託有所何樂如之百辟卿士等或晉陽徒御同披荆棘或幕邸故吏早預艱難至以德舉言揚進忠顯效保乂社稷天平地成惟當帶礪山河與國休戚可以悉心匡弼無黨無偏罔或隳哉替爾丕績善事元首稱朕意焉武德九年八月睿宗命皇太子即位制賈曽朕以寡昧䖍奉鴻休本殊王季之賢早達延州之莭昔在聖厯已讓皇儲之尊爰暨神龍終辭太弟之授豈惟衣冠所睹抑亦兆庶咸知頃屬國步不夷時艱主幼大業有綴旒之懼寶位深墜地之憂議迫公卿遂司契象日慎一日已至於今一紀之勞勤亦至矣萬方之俗化漸行矣將成夙願脫屣寰區昔堯之禪舜惟能是與禹以命啓匪私其親神器之重允歸公授皇太子某有大功於天地定阽危於社稷溫文既習聖敬克躋委之監撫已逾年嵗時政益明庶工惟叙朕之知子庶不負時厯數在躬宜陟元后可令即皇帝位有司擇日授册朕方比迹洪古希風太皇神與化遊思與道合無為無事豈不美歟三公百寮宜識朕意延和元年七月睿宗令明皇總軍國刑政詔大寶之尊諒殊於為巳神器之重必在於與能自昔興王率由斯道我國家運光五聖業盛百齡大賚合於人心淳風偃於區外而道不恆泰時更小屯朕以菲薄屬兹多難抑讓王之宿志順公議於羣情丕業既康天保斯定皇帝神武攸縱睿哲克躋安宗社於綴旒拯生人於在溺用遵舊典令總朕師夙夜在勤刑政益理昨者姦臣搆釁竊犯禁闈凶黨布於蕭牆飛變聞於惟扆朕慮深倉卒爰命討除皇帝遂與岐王範薛王業等勵兹孝心率彼義勇戮鯨鯢於闕下掃欃槍於天路元惡大憝罔不伏誅人神用康功業彌廣信可總璿衡之大政守家國之鴻緒能事備矣朕又何憂自今以後軍國政刑一事巳上並取皇帝處分其岐王範薛王業宜各實封一千戶朕方髙居大庭𬗟懷汾水無為養志以遂素心凡百卿士洎於黎庶宜體朕懷各盡臣節布告遐邇咸使聞知先天二年七月明皇令肅宗即位詔賈至敕帝王受命必膺圖籙上叶天道下順人心不可以智求不可以力取是故我國家之有區夏也乾符疊委人瑞薦臻土應其德山呼其祚髙祖當寶運太宗定鴻業髙宗寧蒸黎中宗復舊績睿宗𢎞至理朕恭五聖之謨訓師三代之淳朴常以道德為念不以富貴為心爰自弱齡即尚𤣥默屬神龍之際邦家中否是用憤發掃除欃槍翼戴先皇再正宸極蓋宗廟是為豈朕私躬哉先帝以朕有戡難之功命朕掌主鬯之任辭不獲巳遂踐皇極聿來臨御垂五十載常思我烈祖𤣥天之道保其清靜之宗伊萬方事殷或日昃不暇食昔堯厭倦勤尚以禪舜髙居汾陽况我元子某睿哲聰明恪慎克孝才備文武量吞海嶽付之神器不亦宜然今宗社未安國家多難其英勇雄毅總戎専征代朕憂勤斯為克荷宜即皇帝位仍令所司擇日宰相持節往宣朕命其諸禮儀皆准故事有如神祗簡册申令須及者朕稱誥焉衣冠表疏禮數須及者朕稱太上皇焉且天下兵權制在中夏朕處巴蜀卒應則難其四海軍郡先奏取皇帝進止仍奏朕知皇帝處分訖仍量事奏報寇難未定朕實同憂誥制所行須相知悉皇帝未至長安已來其有與此便近去皇帝路逺奏報難通之處朕且以誥㫖隨事處置仍令所司奏報皇帝待克復上京已後朕將凝神靜慮偃息大庭縱姑射之人紹鼎湖之事於戲禪讓之禮聖賢髙躅前代明王非不慕之皆享祚短促而不暇也唯唐虞靈長能擅厥美俱革命易姓宗廟失尊非一其心萬古不易之道也朕之傳位有異虞典不改舊物其命維新奉禋祀於祖宗繼雍熙於宇宙布告億兆咸使聞知至德元年八月十六日肅宗命皇太子即位詔楊綰於戲奉天地者是稱大寶承宗廟者必在元良吾以薄德纂承丕緒今以憂勞所積遘疾彌留用申顧命誡爾元子爾性禀生知幼有明德蒸蒸之孝言必因心溫恭睿哲允文允武往在西土爰討凶渠命爾總戎克宣王略收復中夏唯爾之功遂升以儲闈將中我鴻業爾有令聞萬方宅心吾大漸之後即宜膺寶位夫天下至廣神器所重丕承纍聖之德䖍奉大中之道必當任賢勿二去邪勿疑以慈惠為心開諌諍之路兢兢業業無怠無荒嗚呼戒之無替厥命順宗命皇太子即位詔敕惟皇天祐命烈祖誕受方國九聖儲祉萬邦咸休肆豫一人獲纘丕業嚴恭守位不遑暇逸而天祜不降疾恙不瘳將何以奉宗廟之靈展郊禋之禮疇咨庶尹對越上天內愧於朕心上畏於天命夙夜祗栗深維永圖一日萬幾不可以久曠天工人代不可以久違皇太子純睿哲溫文寬和慈惠孝友之德仁愛之誠通於神明格於上下是用舉皇王至公之道遵父子傳歸之制付之重器以撫兆人必能宣祖宗之重光荷天地之休命奉若成憲永綏四方宜令皇太子即皇帝位朕稱太上皇居興慶宫制敕稱誥所司擇日册禮布告中外令知朕意貞元二十一年八月順宗𫝊位皇太子改元詔鄭絪門下有天下者𫝊歸於子前王之制也欽若大典斯為至公式揚耿光用體文德朕獲奉宗廟臨御萬方降疾不瘳庶政多闕乃命元子代豫守邦爰以令辰光膺册禮宜以今月元日册皇帝於宣政殿仍令檢校司徒平章事杜佑充冊使門下侍即平章事杜黃裳充副使國有大命恩俾惟新宜因紀元之慶用覃在宥之澤宜改貞元二十一年為永貞元年自永貞元年八月五日昧爽巳前天下應犯死罪特降從流流罪已下各减一等布告中外咸使聞知何皇后命皇太子即位令豫遭家不造急變爰臻禍生女職之徒事起宫奚之輩皇帝自罹鋒刃以至彌留不及顧遺號慟徒切定大計者安社稷纂丕國者擇賢明議屬未亡人須爾建長䇿承髙祖之寶運繄元勳之忠規仗爾股肱以匡冲昧皇太子祝宜於柩前即皇帝位其哀制並依祖宗故事中書門下准前處分於戲送往事居古人之令範行令報舊前哲之格言收淚宣布言不能喻天祐元年八月唐大詔令集卷三十
