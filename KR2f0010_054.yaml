body:
  text: 唐大詔令集卷六十四宋宋敏求編大臣鐡劵裴寂等恕死詔賜護密國王子鐡劵文賜突騎施黑姓可汗鐡劵文賜懷化王那俱車鼻施鐡劵文賜李納王武俊田悅鐡劵文賜安西管內黃纛官鐡劵文賜陳敬瑄鐡劵文賜韓建鐡劵文附屬籍安康郡公襲譽聽合譜宗正詔燕公藝賜姓上籍宗正詔楚王威賜姓附屬籍詔髙開道賜姓上籍宗正詔胡大恩賜姓屬宗正詔許凉武昭王孫綘郡姑臧等四公子𨽻入宗正屬籍敕令李晟家屬籍詔鐡劵裴寂等恕死詔朕自起義晋陽遂登皇極經營天下實仗羣才尚書令秦王某尚書右僕射寂或契合元謀或同心運始並蹈義輕生捐家殉節艱辛備履金石不移論此忠勤理宜優異官爵之榮抑惟舊典勳賢之議宜有别恩其罪非叛逆可聽恕一死其太原元謀勳效者宜以名聞武德元年八月賜護密國王子鐡劵文維天寶元年嵗次壬午九月癸邜朔十六日戊午皇帝若曰咨爾護密國王子頡里匐夫籓扞所寄惟信是從節義可稱雖逺無隔卿之先代常附國朝通使有恆書譯相次自卿父繼立近阻強鄰被制凶威有違夙志今遂能獻誠欵潜託歸懷自非心悟逺圖何克存先意念此誠懇嘉尚尤深今賜卿丹書鐡劵以旌忠效長表信義永𫝊子孫日月同明山河齊久可不美與可不慎與賜突騎施黑姓可汗鐡劵文維天寶十二年嵗次癸己九月已亥朔六日甲辰皇帝若曰咨爾骨咄祿毗伽突騎施黑姓可汗登里伊羅密施惟皇建極聲教及於遐荒惟帝念功禮命加於恭順卿雖擁在沙漠常扞烟塵識進退存亡之端知古今成敗之數久率蕃部歸化朝廷兼拒凶殘挫其侵軼精貫白日義光青史績因纍著嘉尚良深今授卿持進冊為突騎可汗重爵貴號以崇其寵丹書鐡劵以表其忠宜保始終永固誠節山河帶礪福祿長存可不慎與賜懷化王那俱車鼻施鐡劵文維天寶十二年嵗次癸巳十月戊辰朔十四日辛已皇帝若曰咨爾故石國順義王勇那俱車鼻施夫柔逺之道必先文德録誠之美是加命禮卿之先代纍賔朝化列在藩王卿又能效節輸忠克復居宇扞邉率下循職修貢信彰夷落義貫幽明言念懇誠良多嘉尚今授卿特進仍封懷化王并賜丹書鐡劵以表忠赤宜執於恭順保於終始每資犄角之用永固山河之寵可不美與賜李納王武俊田悅等鐡劵文陸贄維興元元年嵗次甲子正月癸酉朔二日甲戍皇帝若曰咨爾某某嗚呼君者所以撫人失於所撫則叛下者所以奉上失於所奉為尤各當其理德用不擾若乖其分亂於是生朕德薄化淺昧於君道罔自省咎姑務責人是以徴師徂征連嵗靡息惟爾亦以誠志不達反側於厥𠂻阻衆興戎結壘拒守豈非上失所撫而下乖所奉與書曰萬方有罪罪在朕躬我實不德兆人何咎俾廢其業離其室家陷於困窮死於鋒刃老疾廢飬孤窮靡依怨結蒼昊感傷和氣朕為人父母得不愧心晨興以思夕惕以懷自豫嗣位迄今六載天將悔禍朕方覺悟爾亦知衆心厭亂思所以保安叶於朕懷有若符契非天地合德人神合謀將止殺好生則何以臻此朕是以上順天意俯從人心滌爾瑕疵復爾爵位坦然靡阻君臣如初功書鼎彞名藏王府子孫代代為國勳臣山河帶礪𫝊祚無絶朕方布大信承天子人若食其言何以享國於戲其敬聽朕命用保無疆之休吏部尚書同中書門下平章事蕭復宣賜安西管內黃纛官鐡劵文維貞元二年嵗次丙寅八月丁已朔三日已未皇帝若曰咨爾西鎮節度管內黃姓纛官驃騎大將軍行左金吾衛大將軍試太常卿頓啜護波支惟乃祖乃父代服聲教勤勞王家勳書鼎彞名列藩籍爾克紹爾祖先之烈而重之以忠貞嗣守職官秪若教化率其種落保我疆陲丹誠向風萬里如近是用稽之令典錫以劵書若金之堅永承無變子孫繼襲作我藩臣爾其欽承勿替休命賜陳敬瑄鐡劵文烹巨鰲者鼎大於滄海斬長鯨者劔倚於青天既立異勳克膺殊寵李晟免其十死子儀成其九功鏤以金鏞賜其鐡劵後來繼者豈在他人嵗寒知松柏之心國難見忠貞之節卿五山鎮地一柱擎天氣壓乾坤量􅍭宇宙自居環衛出擁旌幢論清政而氷鏡無光吐赤誠而朝霞失色手持玉節身鎮錦城扶乾綱而萬國齊心紐坤維而百蠻繞指三川欽化一境歸仁朕以稅駕褒斜省方卭蜀匐匍而來寧鳯輦驅馳而速建龍宮百辟來朝萬方入貢夏禹塗山之㑹未盛於斯漢髙沛國之歡無以過此戮阡能如剪草除秀升若焚巢不讓武矦之勳無愧文翁之化海東獻欵雲南披誠九榖豐登三農茂盛濟贍軍國拯接朝寮內竭家財外罄公帑千官感惠一國推功今則巨猾奔逃神州克復將歸上國即别成都致朕身安由卿忠力前封公爵後賜郡王詢於衆情未愜羣望今賜卿鐡券捨其十死援泰山而立誓指黃河以為盟山無壞時河無竭日君君臣臣父父子子永逺貴昌並皆無故中和三年十月賜韓建鐡劵文朕以前代功臣實重信賞至有刻於鼎鼐紀在旗常垂帶礪之言保金石之誓勳賢所付宜懋明恩况卿秉謙蹈和持重守正屬朕前嵗巡狩而乃躬親奉迎季孫之道在事君周勃之心唯安國畢力扈駕衛我出居充奉行朝更無餘事可謂忠於社稷光映簡書旋以歸復京都葺修宫闕載宏舊制皆叶規程勝是殊庸實用嘉矚雖迭增崇數而未足酬功宜申誓劵之文以示旌勳之典矧夫黃河不竭青山匪窮比此賞延錫于苖裔使卿永荷祿位長受寵榮對銘鏤以同堅煥聲徽而轉美卿恕九死子孫恕二死或犯常刑所司不可加責禮命甚重往惟欽承宜付史館頒示天下光化元年九月附屬籍安康郡公襲譽聽合譜宗正詔太僕少卿安康郡公襲譽我之同姓𣲖别枝分惟厥祖考世敦恭睦襲譽部率宗人協同義舉立功巴蜀誠節著聞宜有褒崇用超恆序特聽合譜宗正恩禮之差同諸服屬武德元年十月燕公藝賜姓上籍宗正詔昭德以爵前王令範功茂茂賞有道遺訓使持節幽州總管上柱國燕公藝早悟機權夙展誠節革運之始立功燕代鎮守邉要馭控遐荒忠績既宣宜加寵昵可賜姓李氏上籍宗正封燕郡王食五千戶武德二年九月楚王威賜姓附屬籍詔五等列爵茂績超於恆典四嶽分官連帥總其常賦山河之賞義在酬庸萬陌之任實資賢哲使持節和州總管和州刺史東南行臺尚書令上柱國楚王威往因喪亂糾合徒旅綏靜淮濆緝寧江介閭閻安堵吏民率職逺禀朝化具申忠欵仍請立功掃除多難誠節既表志識可嘉委以招懷特宜受禮爵命之序式加常秩可使持節總管江淮以南諸州軍事揚州刺史東南道行臺尚書令淮南安撫大使上柱國進封王食邑五千户賜姓李氏附屬籍武德三年六月髙開道賜姓上籍宗正詔褒德叙功有國彞訓任賢賞善列代通規僞燕王髙開道家本海隅志懷慷慨有隋之末州域雕殘招集徒旅自保邉塞繕修斥堠捍禦寇戎民吏肅清倉庫完實既而審達機變逺慕朝風闔境獻誠歸欵內屬請申經略輯寧代北厥功以茂宜崇褒寵禮命之差用超恆級可使持節蔚州諸軍事蔚州總管加授上柱國賜姓李氏上籍宗正封北平郡王食邑五千户武德三年九月胡大恩賜姓屬籍宗正詔疇庸旌善哲王彞訓任賢使能有國通典胡大恩往因隋李夷狄交侵繕甲聚徒輯寧邉境既而阻隔戎境自保方隅逺慕朝風因機立效催破凶黨亭徼無虞抗疏闕廷以申誠節忠義克舉宜隆寵命因其所統即加榮秩可使持節代州諸軍事代州總管加授上柱國封定襄郡王食邑五千户賜姓李氏上屬籍宗正武德四年正月許凉武昭王孫綘郡姑臧等四公子𨽻入宗正屬籍敕敕古之宗盟異姓為後王者設教莫遺其親殿中侍御史李彥允等奏稱與朕同承凉武昭王後請甄叙者源流實同系譜猶著雖子孫千億各散於一方而本枝百代何殊於近屬况有陳請所宜敦叙自今已後凉武昭王孫寶以下綘都姑臧敦煌武陽等四公子並宜𨽻入宗正編諸屬籍以明尊本之道用廣親親之化令李晟家附屬籍詔夫能定社稷宏濟生人存不朽之名垂可久之業者必報以殊常之寵待以親比之恩與國無疆時惟茂典故奉天定難功臣太尉兼中書令上柱國西平郡王食邑一千五百户贈太師李晟閒代哲賢自天忠勇懷濟時之宏算抱經武之長才貫以至誠協于一德嘗遭迍難之際實著戡定之功鯨鯢既殱宫廟斯復眷茲勳伐則既褒崇永言天步之夷載懷邦傑之力思加崇於往烈爰協比於後昆睦以宗親將豫厚意其家宜令編附屬籍唐大詔令集卷六十四
