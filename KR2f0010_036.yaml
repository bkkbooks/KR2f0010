body:
  text: 唐大詔令集卷四十六宋宋敏求編大臣宰相命相三齊抗平章事制韋執誼平章事制杜黃裳袁滋平章事制鄭餘慶平章事制鄭絪平章事制武元衡平章事制李吉甫平章事制裴垍平章事制李藩平章事制權德輿平章事制李吉甫平章事制李絳平章事制武元衡平章事制張𢎞靖平章事制韋貫之平章事制裴度平章事制命相三齊抗平章事制權德輿敕寅亮天工緝熙王度調隂陽以遂羣品敷教化以統百官必得其人乃濟於理是咨茂德允式具瞻中散大夫守太常卿上柱國賜紫金魚袋齊抗植操清貞秉心諒實精達政理詳明典彞才器可以濟時忠正可以激俗蒞事惟肅休聲茂聞宜入贊於中樞俾發揮於景化式是百辟毗豫一人可守中書侍郎門下平章事散官勳賜如故於戲政之得失在於弼諧爾其竭誠啓沃以廣視聽進規獻納以贊謀猷俾人叶中時乃之績無替朕命厥惟懋哉貞元十六年九月韋執誼平章事制門下宰相之職寅亮緝熙導隂陽之和贊天地之化裁成百揆總領庶官非道契時中識通理本則何以敷暢皇極阜安羣黎朕以眇身嗣守丕業思立人紀以承天休其代豫言允屬良弼朝議大夫守吏部侍郎騎都尉賜緋魚袋章執誼孝友忠肅自誠而明茂實本於宗師英華發於事業久參內署動直靜專纍踐中臺職修事舉克有公望冠於羣倫以豫冲人恭默思道用是命爾納誨弼違必能刑四方之風成天下之務祗服乃職厥惟欽哉可守尚書左丞同中書門下平章事賜紫金魚袋永貞元年二月杜黃裳袁滋平章事制輔弼股肱之臣所與共成天工左右邦理者也朕承至尊之重居羣后之上夙興寅畏不敢康寧思所以統天人之和彰祖宗之烈以行四方之政以遂萬物之宜敷求哲人以輔台德銀青光祿大夫守太常卿充禮儀使上柱國鄭縣開國公杜黃裳𢎞深易簡資博厚之德朝議即檢校左散騎常侍兼左金吾衛大將軍充在街使雲騎尉賜紫金魚袋袁滋冲茂精微體誠明之性咸以器業閎茂服在大僚祗事先朝克荷休命識達道奧文為國經可以儀刑具僚參總庶務寅亮天工毗豫一人罔不同心以匡乃辟黃裳可門下侍郎平章事滋可中書侍郎平章事永貞元年七月鄭餘慶平章事制有天下者曷常不選賢與能納於輔弼用乂厥辟以和羣生所以叙彞倫平憲度建用皇極底於雍熙者也朕祗若大訓圖任舊人疇咨庶工用佐豫理朝議大夫左丞輕車都尉賜紫金魚袋鄭餘慶全器茂學蹈中秉直易則可久和而不流嘗踐禁闈亦參袞職每盡王臣之節實彰君子之風服於大僚克有休問洎綜理㑹府紀綱羣司率由舊章載叶成憲固可以儀型庶尹寅亮天工可中書門下侍郎平章事餘並如故永貞元年八月鄭絪平章事制朝廷者天下之楨幹宰輔者王化之根源朕夙寢晨興講求為理之本思所以仰承宗廟之重俯叶億兆之心諧和隂陽茂育區夏以貞百度以叙九疇佐豫成功實賴良弼具瞻之地公望攸歸朝議大夫守中書舍人翰林學士上柱國賜紫金魚袋鄭絪秉仁迪哲守約居易懿以文德擇乎中庸體元和之淑姿服大雅之明訓纍登班序休有令聞羽儀周行黼藻王度洎發揮綸翰典職禁闈以溫文雅麗之才居獻納論思之地從容中節密勿盡規先朝任能委遇斯重恪恭夙夜綿歷歲年誠節貫於屯夷茂勳參於顧托名書彞鼎心著丹青朕祗膺睿國誕受明命𢎞宣大典澤潤鴻猷保乂於一人儀刑於四國簡於朕志用選厥勞圖任舊人以匡乃辟疇咨萬國罔不僉同宜膺弼采之求式懋彌綸之績於戲為君之難存乎舉而不任為臣之患在乎知而不言事舉其中政修其本永綏厥位乃時之休可中書侍郎同中書門下平章事集賢殿大學士散官勳賜如故永貞元年十二月武元衡平章事制惟人代工與物施化成功者元首輔翼者股肱况國之號令本於內史政所關决審於黃樞爰發四方用凝庶績心求同德資以弼豫朝議即守尚書户部侍郎文水縣開國子賜緋魚袋武元衡挺生偉才克振前緒蹈禮合樂謙厚端和居暗室而不欺處巖廊而益重文能合雅道可立程再司石室之圖遂踐春華之署故事可舉嘉猷日新爰委地征實惟邦本勤於小物𢎞以大綱一心不移於吐茹衆務必歸於領㑹鬱此時里稱為名臣朕祗奉鴻休懼於負荷居則神明之奧位當億兆之尊常恐明不燭幽慮不及逺一物未獲萬方在豫書不云乎臣作股肱耳目是命爾處茲弼諧爾其慎將明勉於規誨必思袞闕無或靣從直哉惟清副我明命可朝議大夫守門下侍郎平章事賜紫金魚袋封如故元和二年正月李吉甫平章事制門下昔周宣王思𢎞文武之道則以申甫代天工漢宣帝思繼祖宗之風則以丙魏執邦柄是以克紹前烈俱稱中興朕以眇身託於人上亦思所以纘列聖之緒致泰階之平懷柔四夷親附百姓將成莫大之業遂獲非常之才授之鈞衡俾作舟楫銀青光祿大夫行中書舍人翰林學士上柱國李吉甫符彩外發清明內融體仁而溫抱義而峻識洞精頥知帝王致理之源學該古今窮天人相與之際自擢於綸閣列在禁闈鼓三變之文潤色王度總五才之用參贊廟謨化俗思邁於成康致君願及於堯舜當注意之所向每罄心而必陳深中不回獨立無懼經綸常見於道達激切多至於涕零王綱以張蜀寇斯殄左右密勿實由嘉言降神而生輔朕為理調三光以序六氣遂物情而熙帝載是為中樞司我大本命爾俞往其惟朂哉於戲宰輔之任安危所寄百辟為憲萬邦是瞻與其明察以為公不若嚴重而有制與其將順於甚美不若匡救於纎違審涇渭以序人倫理繩墨以正天下交泰之運其若斯乎敬聽朕言以踐乃職可守中書侍郎同中書門下平章事散官勳如故主者施行元和二年正月裴垍平章事制門下朕聞后德惟聖臣德惟良在太宗時實有房杜贊貞觀之業在𤣥宗時則有姚宋輔開元之化咸克佐我烈祖格於皇天朕祗奉丕圖懋繼前烈思欲貞百度和萬邦建中於人垂拱而理永惟房杜之化寤寐求思至誠感通上帝眷祐果賚良弼輔豫一人正議大夫行尚書户部侍郎上柱國賜紫金魚袋裴垍器得天爵文為國華行有根源言無枝葉忠敬恭順貫之以誠心方潔貞廉輔之以通識玉立不倚金和有聲洎潤色綸言密參樞務嚴重得大臣之體溫雅秉君子之文每獻納之時動有直氣當顧訪之際言無隱情逺圖是經大事能斷匡豫不逮時乃之功及領地官且司邦賦㑹計務劇出納事殷捉利刃而皆虛委棼絲而必理歷試茲久全才益彰宜登中樞以允僉望夫宰輔者下執邦柄上代天工為國蓍龜注人耳目爾尚降乃德以親百姓廣乃志以序九流匡朕心以清化源從人欲以致和氣豫欲宣力汝為股肱豫欲詢謀汝為心膂豫違望於汝弼勿謂不從汝言逆於朕心必求諸道獨立勿懼直躬而行明聽斯言敬踐厥位嗚呼罔俾房宋専美於前可中書侍郎同中書門下平章事散官勳賜如故主者施行元和二年九月李藩平章事制皇王理本繫於輔弼內以熙庶績釐百工外以撫四夷式羣后三五已降崇替由之朕祗荷丕圖思底於道夙夜惟厲延登俊賢若涉大川俾作舟楫朝散大夫守給事中上柱國李藩天鍾粹美氣禀清英信在言前行為人表藴經邦之識度發自明誠通理道之本根鬱為公器學探㫖奧文以忠貞大玉斯實於東序朱絃可薦於清廟廣則難挹剛而有容處衆無溷其風標存險常推其名節纍登華署克贊彌綸擢授左曺専聞駁議永惟股肱之任翼亮是資必求其人豈限常次黃樞選重僉曰宜之爰舉朝章式副公望於戲爾惟率正邪罔不匿惟匪躬直誠可以事上惟秉鈞平施可以致和毗豫一人允理王事懋乃嘉績永孚於休可朝議大夫守門下侍郎同中書門下平章事賜紫金魚袋元和四年二月權德輿平章事制門下夫宰相之任上以代天工輔佐之宜下以立人極爰得忠正方膺股肱正議大夫守太常卿上柱國襄武開國侯賜紫金魚袋權德輿器度端實知識通敏學成師法文為國華素履常踐於貞方黃中允合於易簡自出入清列茂著嘉聲名利無屑於中懷風雨不易其常性驥騄之質常識於逺途鸞鳯之姿宜巢於阿閣期於至理推之至公寵以春卿掌我樞務輔天地之德俾化及平民導隂陽之和使物靡疵厲豫違汝弼言無靣從君可臣否事已心許用佇𢎞美式副虛懷可守禮部尚書門下平章事散官勳封如故元和五年九月李吉甫平章事制輔弼之重邦家所屬寄深藩翰則外撫諸侯望切股肱則內熙庶績迭居其任厥惟舊章前淮南節度副大使知節度事管內支度營田觀察處置等使金紫光祿大夫檢校兵部尚書侍郎兼中書侍郎同中書門下平章事揚州大都督府長史上柱國趙國公食邑三千户李吉甫𢎞經逺之才研極深之慮脫略細故洞開中懷文稽典謨學升堂室洎司我密命言屢表於獨明參於袞職道每彰於孤直貢其誠節竭以公忠墜典載張彞倫攸序匡豫不逮懷之豈忘曩以淮海大都吳楚雄鎮歲屬艱食人多愁聲是假全才用康疲俗下流於永利不憚乎勞心故矗以長原闕瀦其天澤變舄鹵為稻梁之壤致蒸黎有粒食之源吏守成規人無遷志庶富之教既宣於封內輔相之宜俾及於天下顧兹重務屬於良臣去其外職之繁専以中樞之任至於别館良史之褒貶內殿集賢之清祕爰舉舊典式洽新恩無曠厥官往踐乃位可中書侍即同中書門下平章事兼集賢殿大學士監修國史散官勳封如故元和六年正月李絳平章事制門下司重柄者允屬於長才熙大猷者固資於端士朕纘承鴻緒撫有萬方夙夜祗勤懼逺於道故注意宰輔勞懷夢想誠以得失之效邦家所繫疇若僉論簡豫深𠂻必惟其人是舉成命朝議即守尚書户部侍郎驍騎尉賜紫金魚袋李絳質秀圭玉文含采章抱器挺生居貞特立有史魚秉直之操勵山甫匪懈之誠忠孝兩全學識兼茂清標可以範雅俗正氣可以肅羣倫頃自周行俾參密命動必以義知無不為謇謇懷匡濟之心孜孜陳逺大之略言無隱避居則靜専貫於終初其道一致地卿之二爰委典司理財先示於簡廉利物每懲其聚斂通經立政器用彌光臺閣之間聿有公望是宜權衡百度宰理庶工允副具瞻宰我樞務於戲豫欲驅人俗以躋富夀感人心而致和平爾尚修明憲章宣布德澤必廣大其志無皎察為公恆其道以秉彞裕其體以臨下各任以職無忘陳平之言茍便於人勿憚蕭何之請敬茲寵擢其懋戒哉可朝議大夫守中書侍郎同中書門下平章事勳賜如故主者施行元和六年十一月武元衡平章事制門下邦國興替將相是資選衆而舉思賢俾乂故有台臣外撫宣力以靖於四方袞職迭居懋功復凝於庶績允兹崇踐爰屬上才前劍南西川節度副大使知節度事管內支度營田觀察處置統押近界諸蕃及西山八國雲南安撫等使銀青光祿大夫檢校吏部尚書兼門下侍郎同中書門下平章事成都尹上柱國臨淮郡開國公食邑二千户武元衡粹厚端莊簡易常一有誠明之道以致用有宏茂之略以佐時貞方素得於性術操尚不愆於風雨加以懿文合雅聚學成師通禮樂刑政之源達古今通變之要歷登華貫休問穆然洎處鈞衡中立不倚致君思堯舜之盛修職以丙魏為宗益部大藩比仗兼濟而能布宣威惠撫蒞蠻髦縣道緝寧疲黎安息推心而下皆率附正已而人自嚮方臨之纍年理有異等朕以出納王命緝熙帝圖總庶官之職業為百度之扄鍵惟此重任屬於黃扉分憂遂輟於殿邦具瞻再歸於碩望爾尚行之以忠正煦之以和平毗豫一人膏澤天下祗膺禮命無替徽猷可守門下侍即同中書門下平章事兼崇賢館大學士充太清宫使元和八年三月張𢎞靖平章事制門下虞以為盛猶咨五臣殷之用興亦賴三后朕勵精恭巳十載於茲常以國鈞委之公輔務熙庶績敢怠旁求思欲左右有人在廣股肱之任歷選列辟洎於藩維冀復賢能俾匡正道今茲所命允屬至懷河中晉絳兹隰等州節度支營田觀察處置等使正議大夫檢校禮部尚書兼河中尹御史大夫上柱國髙平縣開國子食邑五百户賜紫金魚袋張𢎞靖德禀精微器含冲用溫恭諒實明允克誠素推君子之風雅有大臣之體藴績稽古之學發揮經緯之文常司朕言動叶謨訓歷踐清貫具揚淑聲爰統方州再膺節制奉法遵道勤公忘私人無不懷績用丕茂豫欲正百工之理成泰階之平若臨巨川以重舟楫是用命爾列於中台每念臣鄰之規以貞棟崇之吉少翁積慶嗣德漢廷文子勤身繼匡晉室爾惟朝夕納誨以翊朕躬是資袞職之勤式重緇衣之美仍帥司寇之屬俾靖臯陶之刑宜懋厥職往踐於位可守刑部尚書平章事散官勳封如故元和九年六月韋貫之平章事制門下弼成大化參叙彞倫克廣元首之明斯服股肱之任朕所以不自暇逸務求賢能式重舟楫之才以𢎞經濟之道疇若豫志僉諧乃公中大夫守尚書左丞上輕車都護賜紫金魚袋韋貫之清明在躬禮樂之器藴圭璋特逹之德茂廉正博雅之規靜而知微動必有守凡踐列位備聞嘉猷當官而行臨事能斷道可鎮於風俗望彌積於朝倫是宜和靜隂陽紀綱邦國命作心膂列於台階夫能慮四方揆百事愛利萬物辨論羣才示公忘私時乃之職而况圖靖藩服繫在廟謀不惟順下以訓人奉上以宣力因衆功而致用熙衆志以為心朝夕獻否可之誠經綸底文武之績祗膺厥命勿懈於時可守尚書右丞平章事散官勳賜如故元和五年十一月裴度平章事制門下輔相之任重作于股肱經濟之才難注人耳目茍非慮研物表識洞事先則何以出納中樞平章大政詢於時論僉曰汝諧朝議即守御史丞兼尚書刑部侍郎飛騎尉賜紫金魚袋裴度徑直徇道清明秉彞文融菁華行茂枝葉居然廊廟之器出於領袖之門西掖司言南臺執憲常陳明略屢告嘉猷實宣力以徇公能外身而憂國霜雪無改雷風有恆朕欲全觀其能用試於事俾歷戎閫載馳使軒玉澤渙汗以遐宣軍情密勿而上達將議抽擢因罹震驚崇道德之藩籬士有致命資忠信之甲胄兵無容刃人具瞻爾天方賚豫昆命於龜爰立作相爾其展四體堅一心廣其道以用賢厚其風以易俗五兵未戢爾惟保定武功百姓未康爾惟勤恤人隱臨事必斷當官而行齊台階於底平補袞職之有闕光膺慎選其戒之哉可朝議大夫守中書侍郎同中書門下平章事勳賜如故元和十年六月唐大詔令集卷四十六
