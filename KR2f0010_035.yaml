body:
  text: 唐大詔令集卷四十五宋宋敏求編大臣宰相命相二張説中書令王晙同三品制韓休平章事制裴耀卿張九齡平章事制裴耀卿侍中張九齡中書令李林甫同三品制陳希烈平章事制陳希烈左相制楊國忠右相制韋見素平章制房琯平章事制吕諲平章事制李峴李揆第五琦平章事制苖晉卿侍中制蕭華平章事制裴遵慶平章事制元載平章事制劉晏平章事制楊綰常袞平章事制蕭復劉從一薑公輔平章事制劉滋崔造齊映平章事制李泌平章事制命相二張説中書令王晙同三品制門下周稱內史以司號令漢曰尚書是主喉舌用平邦國以佐王教兵部尚書兼中書令張説履道體正經德立言吏部尚書王晙忠肅剛簡博聞宏識並才包王佐望重時英內訓五品外清九服嘉謨必盡庶績允康宜參五臣之命以正三台之象説可中書令晙可兵部尚書同中書門下三品開元十一年四月韓休平章事制張九齡敕思致雍熙聿求元輔久勤夢寐延彼周行大中大夫守尚書右丞上柱國韓休藴道𢎞深秉德經逺清裁可以軌物素行可以律人一自登朝備聞體國志存公亮誠著始終而羽翼朕躬金玉王度人望是在朝選無踰宜拜命於瑣闈俾兼和於鼎實可守黃門侍郎同中書門下平章事開元二十二年三月裴耀卿張九齡平章事制徐安貞門下風雲之感必生王佐廊廟之任爰在柱臣中大夫守京兆尹護軍賜紫金魚袋裴耀卿含元精之休體度𢎞逺正議大夫前檢校中書侍郎集賢院學士仍副知院事上柱國賜紫金魚袋曲江縣開國男張九齡挺天生之秀器識通明並風望素髙人倫是仰可以叶彼寅亮當茲啓沃幹時侍士既資鼎實之和為國急賢寧惟金革之事耀卿可黃門侍郎同中書門下平章事𢎞文館學士散官勳如故九齡可起復中書侍郎同中書門下平章事兼修國史餘如故主者施行開元二十一年十二月裴耀卿侍中張九齡中書李林甫同三品制門下春秋之義尚量卿材王國克楨莫先相位用增其命必正其名中大夫守黃門侍郎同中書門下平章事𢎞文閣學士賜紫金魚袋上護軍裴耀卿正議大夫中書侍郎同中書門下平章事集賢院學士副知院事兼修國史紫金魚袋上柱國曲江縣開國男張九齡經濟之才式是百辟正議大夫檢校黃門侍郎賜紫金魚袋上柱國李林甫泉源之智迪惟前人既樞密載光而親賢稱首審能羣會所蒞有浮寧惟是日疇咨故以多年歷選國鈞繄賴邦禮克清宜命曰鼎臣置之廊廟耀卿可銀青光祿大夫守侍中學士勳如故九齡可銀青光祿大夫守中書令集賢院修國史勳如故林甫可銀青光祿大夫守禮部尚書門下三品勳如故主者施行開元二十二年五月陳希烈平章事制翊亮天工緝熙帝載賚豫良弼其在是乎光祿大夫行門下侍郎集賢院學士副知院事兼侍講崇玄館大學士太清太微宫使上柱國臨潁縣開國侯陳希烈中黃賦象靈嶽誕才識洞精微道含淳粹依仁遊藝總儒門之四科寶儉行慈守玄宗之三德自居近侍忠懿逾彰匪躬懷不二之心正色有大臣之節信可以允釐庶績燮贊台階可行門下侍郎同中書門下平章事集賢院𢎞文館學士散官勳封如故天寶五載四月陳希烈左相制門下仲虺相湯言宣雅誥子魚佐魏任總中兵將代天工允憑時傑光祿大夫門下侍郎同中書門下平章事集賢院𢎞文館學士崇賢館大學士太清太微宫使上柱國臨潁縣開國侯陳希烈逸量宏達英才卓邁既履直而成範亦資忠而炳德學該流略義惟守於經門文麗風騷言必全於理要自黃樞二職侍講金華紫府𢎞真參謀玉鉉歲月逾久而其道彌光人師有屬於在二王度式歌於畫一疇咨既久亮采惟熙宜正貂蟬之榮用兼喉舌之寄可行左相兼兵部尚書餘如故天寶六載三月楊國忠右相制先王立政必惟擇賢所以時亮天工叶修人紀總兹三事是屬中樞審於百工僉曰亞相銀青光祿大夫御史大夫判度支事權知太府卿兼蜀郡長史持節劍南節度支度營田等副大使本道兼山南西道採訪處置使兩京太府司農出納監倉祠祭木炭宫市長春九成宫使關內道及京畿採訪處置使上柱國𢎞農縣開國伯楊國忠純粹精明懸解虛受比之管樂文多體要之詞擬於丙魏武有韜鈐之學直方其道簡易能成往自星即爰秉天憲邦國大政𢎞益滋多則造膝沃心已期王佐彌綸經濟同致雍熙况南臺冢宰尤思藻鑑西垣鼎座深佇燮和適會豫宿心命爾為相宜兼啓密式總如綸可守右相兼吏部尚書集賢殿學士修國史崇玄館大學士太清太微宫使仍判度支及蜀郡大都督府長史劍南節度支度營田副大使本道兼山南西道採訪處置使兩京出納勾當租庸鑄錢等使並如故天寶十一載十一月韋見素平章事制門下緝熙帝載必俟大賢砥礪公才允膺殊賞銀青光祿大夫行尚書吏部侍郎上柱國彭城縣開國公韋見素風度宏逺操履貞固懷至公之節守難奪之誠學富典墳每思經濟之義文雄縉紳豈獨雕蟲之美薦居東掖顧問有光纍拜南宫銓衡式序清素之業惠迪彌彰爾惟不矜朕志先定信可發揮邦政翊贊台階將𢎞夢卜之感俾協黎元之望可守武部尚書同中書門下平章事集賢院學士知門下省事散官勳如故天寶十三載八月房琯平章事制敕憲部侍郎房琯清識雅量工文茂學秉忠義之規靡悼艱險挺松筠之操寧移歲寒宜承題劍之榮式允濟川之望可文部尚書同中書門下平章事天寶十五載七月十四日吕諲平章事制出納絲綸是稱喉舌調和鼎飪必藉鹽梅况艱難之際擇賢必資於選衆密勿之地論道固期於得人兵部侍郎吕諲間氣挺生宏才逈發納言敏行強識博聞謀猷出三傑之先德業處五人之上久在朝列尤推審慎允得鈞黃之慶宜膺補袞之求可同中書門下平章事乾元二年三月李峴李揆第五琦平章事制出納帝命經綸王言兆若見於非熊位必登於仲虺行御史大夫行京兆尹李峴朝廷碩德宗室藎臣中書舍人兼禮部侍郎李揆文房學府命代挺生行户部侍郎兼御史大夫第五琦武庫智囊膺期間出中和秀氣維嶽降靈可以宣暢謀猷恢𢎞體要庶得道光風力名重伊臯俱當入夢之辰共學從繩之直既用登王輔宜以道弼豫峴可行吏部尚書同中書門下平章事揆可中書侍郎同中書門下平章事琦可戶部侍郎同中書門下平章事乾元二年二月苖晉卿侍中制宰輔之重陶鈞所寄用諧時望必藉素名是以殷登左相伊尹成乎一德漢命舊臣孔光由其再起蓋所以上扶皇極下庇蒼氓永懷寅亮之美實屬股肱之任特進太子太傅上柱國韓國公苖晉卿衣冠宿望廊廟公才體文雅之宏量負經通之逺識纍踐臺閣久彰名器自艱難之際叶贊有勞早契風雲之期備陳匡濟之術頃以疲疴固辭樞務重違誠懇之志爰假優崇之秩雖訏謨暫間而夢寐無忘今戎事猶虞蒸人未乂漢將且聞於辭第留侯豈遂於停餐成余社稷之本懿爾勳庸之望固可勉紆新紱載珥舊貂宜罷輜車之禮俾膺黃閣之政上元元年五月蕭華平章事制弼豫之選審像是求天步未平廟謀尤切必資明表佇以佐時畫一之才取則不逺正議大夫守河中尹兼御史中丞充本州晉絳等州節度觀察處置使上柱國嗣徐國公賜紫金魚袋蕭華公輔成名承家繼業詞標麗則德藴謨明道開雲物之先節貫嚴凝之序早登臺閣多識舊章再履宫坊尤敦至行致君望美閲相求能且推伊陟之賢更咨漢臣之閣環依日月佐理隂陽俾參政於紫宸用建中於皇極可中書侍郎同中書門下平章事集賢殿崇文館大學士兼修國史散官勳封賜如故上元二年二月裴遵度平章事制致君惟相輔德在和必俟三台之明用增九鼎之重彞倫所屬元氣是調乃眷公才作豫良弼銀青光祿大夫行尚書吏部侍郎上柱國河東縣侯裴遵度體凝清粹理暢黃中學奧全經詞深大雅行歸於簡節固於貞公輔之望攸先古人之風非邈纍階朝序久踐天臺凡所彌綸多為故事咸有斯在王猷是經庶𢎞翼善之功克濟投艱之運登榮瑣闥參政兩闈宜輟山公之啓以光説命之求可行黃門侍郎同中書門下平章事散官勳封如故上元二年四月元載平章事制天位惟艱廟謀是切委在公輔正於四方佇鼎實之能調補袞章之有闕眷求勵翼式允僉諧朝議大夫守尚書户部侍郎兼御史中丞上柱國許昌縣豫賜紫金魚袋充度支等使元載清明在躬貞固幹事言必有績文而不華準繩朝端金玉王度不有其善遹觀厥成固是生靈之傑咸推宰輔之器執兹大政敘以彞倫建中於人莫匪爾相丹青神化參議兩闈宜書一德之篇俾叶賡歌之美可同中書門下平章事兼集賢院崇文館大學士修國史餘如故元年建辰月劉晏平章事制搆廣厦者審象於宏材經萬邦者注意於良弼自非道符夢卜名冠簪裾何以允副虛求式諧時望光祿大夫國子祭酒兼御史大夫京兆尹判度支勾當度支等使上柱國彭城縣開國伯劉晏應期生德維嶽降賢文為君子之儒器藴通人之量學苞前典志在於直方詞蔚古風義存於比興自兼京劇職總均輸變而能通𢎞適時之務居難若易多濟物之心頃者戎事方殷軍賦惟錯率皆倚辦每竭推誠冦難初夷皇猷咨弼周王佐國必自於天宫漢代登台咸由於亞相宜膺選衆之舉用成亮采之功可金紫光祿大夫吏部尚書同中書門下平章事進封城郡開國公食邑二千户勳及度支等使並如故廣德元年五月楊綰常袞平章事制體國經務亮采惠疇以遂萬物之宜以形四方之理彌縫百職金玉王猷平景緯於台階濟鹽梅於鼎飪必先時俊允膺旁求朝議大夫守太常卿兼修國史賜紫金魚袋楊綰贍學懿文崇德廣業表微藏用適務知章朝議即守尚書禮部侍郎集賢院學士上柱國賜紫金魚袋常袞志業貞諒理識宏深守正居中確乎難奪頃以戎車未戢方事仍殷永言庶政有乖彞敘今將本俗刑教澄源振綱宣九德以阜成張四維而翼贊洽於僉論資爾具瞻往副審詳之誠懋緝時雍之化綰可中書侍郎同中書門下平章事集賢殿崇文館大學士修國史散官勳賜如故袞可門下侍郎同中書門下平章事太微宫使崇賢館大學士散官勳賜如故大歷十二年四月蕭復劉從一薑公輔平章事制陸贄敕宰輔之任獻替為務內凝庶績外撫四夷調隂陽以成嵗功贊化育而熙帝載若金用礪其弼豫違如旱為霖允從人望矧時屬多難彌切任賢朕未嘗不朝夕論思夢寐懷想道之所在仁逺乎哉朝議大夫守户部尚書兼御史大夫原闕充荆襄江西等道都元帥統軍長史豐縣開國男賜紫金魚袋蕭復性質端亮理識精敏約巳𢎞物體方用圓為邦益表其異能及事亟聞其鯁議動可為範立不易方守尚書吏部郎中兼御史中丞充荆襄江西等道都元帥判官賜緋魚袋劉從一貞白其行溫恭其文居簡而適用必通體和而臨事有立持重能斷色莊有恆纍更委任多所禆益守京兆府户曺參軍翰林學士賜緋魚袋薑公輔志懷濟物鑒必通理主文而諌忠靡退言經始以謀事皆前定道無屈撓智叶變通並可以參贊大猷允膺僉矚兵戍未靖期爾經綸都邑未康期爾還定豫一人有過爾是用匡伊萬姓不寧爾是用乂欽哉慎乃有位咸懋厥官復可守吏部尚書同平章事散官封如故從一可守尚書刑部侍郎同平章事賜紫金魚袋公輔可守諌議大夫平章事賜紫金魚袋建中四年十月劉滋崔造齊映平章事制門下朕嗣位君臨精求理道小大之務靡不經心日慎一日於今八載教化未洽蒸黎未康因之以甲兵繼之以災沴斯固鑒有所不至慮有所不周豫衷浩然若涉淵氷思所以匡我致理助我官人宣其澤而四方以寧執其要而百工式序允是大任其惟輔臣夢想勞懷敷求俊乂得茲良弼爰在周行權知吏部侍郎劉滋操履貞清介然自守居能慎獨動不違仁析理究其精微勵學探其旨趣給事中賜緋魚袋崔造性合道要識通化源適時有成務之才事上懷匡弼之節藴蓄氣業居為名臣中書舍人賜紫金魚袋齊映修巳以立自明而誠體賢人可大之規用君子時中之道虛受能擇清通不流惟滋之直方可以激風俗惟造之體度可以振綱條惟映之精深可以該物理我有大典爾其參之懋昭厥猷勿替休問滋可守散騎常侍同平章事造映可各守本官同平章事散官勳封賜並如故貞元二年正月李泌平章事制自昔元后表正萬邦必兼聽以求聞乃選賢而自輔理亂之本繫乎其任授之以道將在得人朕嗣守不圖運逢多難每虔心至理思致和平夕惕興懷納隍是慮今干戈甫戢而戎狄為虞豈誠信所未孚何聲教之不洎是以夢想良佐追迪前聞云誰之思朕志先定前檢校禮部尚書陕虢觀察使李泌山河粹氣道德清英殿為楨祥生我王國夷簡不雜髙明有融深厚以致誠直方而可大識窮化本動會時中讜正居心謀猷允哲自膺分陕纍洽嘉聞宜其入掌中樞內司闕袞贊兩儀之化育貞百度之經綸協和神人參總廊廟咨爾才實惠於邦家往欽哉式佇成績可守中書侍郎同中書門下平章事貞元三年六月唐大詔令集卷四十五
